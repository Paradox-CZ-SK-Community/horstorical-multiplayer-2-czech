l_polish:
  MON_GATHERING_STORM_DESC: "Na křižovatce světů si Mongolsko našlo své místo od vyhlášení nezávislosti na říši Čching v roce 1911. Sovětská pomoc proměnila zemi v Lidovou republiku, která v posledních letech prošla obrovskými vládními a ekonomickými změnami. \n\nAle s novou hrozbou povstávající na východě, s čínskou občanskou válkou probíhající na jihu a s rozkládajícími se vztahy se SSSR se země může stát novou hranicí, pokud se mocenská rovnováha přikloní na špatnou stranu..." # todo: NEW TRANSLATION
