  MON_powerful_choibalsan: "Mocný Choibalsan"
  MON_powerful_choibalsan_desc: "Jeden ze sedmi, kteří v roce 1921 vyjednávali mongolskou nezávislost s Čínou a Ruskem; Choibalsan a jeho stoupenci jsou nyní silně zastoupeni ve vládě."
  MON_ministery_of_interior_reorganized: "Ministerstvo vnitra reorganizováno"
  MON_ministery_of_interior_reorganized_desc: "Po vzoru NKVD se naší zemi podařilo drasticky zlepšit fungování státní Tatnuulhim fenhij Gazar (Generální zpravodajská agentura Mongolska)."
  MON_consolidated_power_1: "Konsolidovaná moc v jedné oblasti"
  MON_consolidated_power_1_desc: "Moc je nyní pevně v rukou jednoho vůdce, a to Choibalsana, který působí za zády Anandyna Amara."
  MON_consolidated_power_2: "Konsolidovaná moc ve většině oblastí"
  MON_consolidated_power_2_desc: "Choibalsan zajistil mnoho oblastí zájmu a nyní vládne nad [MON.getNameDef]."
  MON_consolidated_power_3: "Plně konsolidovaná moc"
  MON_consolidated_power_3_desc: "Choibalsan má nyní plnou kontrolu nad [MON.getNameDef]."
  Mon_intellectuals_purged: "Vyčištění intelektuálové"
  Mon_intellectuals_purged_desc: "Několik intelektuálů bylo považováno za "nespolehlivé" a bylo očistěno."
  Mon_party_purged: "Strana pročištěna"
  Mon_party_purged_desc: "Byly provedeny přeskupení a zatýkání, což zanechalo velké jizvy v současné struktuře strany."
  Mon_lamas_purged: "Lámové pročištěni"
  Mon_lamas_purged_desc: "Mnoho členů náboženských institucí uprchlo ze země nebo bylo nuceno se skrýt kvůli nedávným vládním čističkám."
  MON_border_patrols_recruitment: "Nábor pohraničních hlídek"
  MON_border_patrols_recruitment_desc: "Bezpečnost našich pozemních hranic získala nejvyšší prioritu. Potřebujeme vše i všechny dostupné, abychom uchovali náš stát!"
