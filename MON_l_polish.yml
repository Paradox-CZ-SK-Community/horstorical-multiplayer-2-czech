  GEN_tuva_annex_ussr_desc: "Blahopřejeme! Našli jste tajný fokus navržený někým na rt56 Discordu. Myslel si, že jeho prosba byla ignorována, ale proti všem předpokladům byl jeho výzva vyslyšena. Šlechetný Waffle vyslyšel jeho modlitbu a učinil jeho přísahu skutečností pod bezměsíčnou oblohou. Užijte si snadné tuvinské světové dobytí." # todo: NEW TRANSLATION
