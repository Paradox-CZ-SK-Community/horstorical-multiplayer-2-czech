  MON_organize_army_inspection: "Zorganizovat inspekci armády"
  MON_organize_army_inspection_desc: "Navzdory obrovskému obrannému rozpočtu zůstává naše armáda ve velice špatném stavu kvůli nedostatku moderní výzbroje, spoléhání na zastaralé taktiky a silné politizaci vojenského personálu. Pokud chceme vstoupit do moderní éry, musíme ji začít zlepšovat za každou cenu."
  MON_mobilize_the_reserves: "Mobilizovat rezervy"
  MON_mobilize_the_reserves_desc: "Předběžné mobilizační rozkazy se ukázaly jako extrémně neefektivní — na náborové komise se dostavilo pouze 2000 mužů místo plánovaných 20000. Máme některé rezervisty schopné boje, ale takový odvod by byl v míru mimořádně nepopulární."
  MON_field_hospital_initiative: "Iniciativa polních nemocnic"
  MON_field_hospital_initiative_desc: "Nákladná záležitost války uložila těžké břemeno na ramena matek a otců našich vojáků: nejen ty, kteří se nevrátili z bojiště, ale i ty, kteří byli zraněni a nedostali náležitou pomoc. Zavedeme polní nemocnice schopné zachovat životy vojáků na další den a pro další bitvu."
  MON_desperate_measures: "Zoufalá opatření"
  MON_desperate_measures_desc: "Zoufalé časy vyžadují zoufalá opatření — potřebujeme každého možného rekruta schopného bojovat za vítězství vlasti! Bude financována masivní náborová kampaň, aby se zaplnily chybějící řady našich ozbrojených sborů."
  MON_demids_legacy: "Odkaz Demida"
  MON_demids_legacy_desc: "Gelegdorjiin Demid dlouho prosazoval motorizaci a mechanizaci ozbrojených sil, naznačující, že jízda ztratila svůj význam jako hlavní útočná síla a spíše se hodí pro logistiku v drsném prostředí. Půjdeme v jeho šlépějích a dokončíme zahájenou reformu."
  MON_improve_coordination_capabilities: "Zlepšit koordinaci"
  MON_improve_coordination_capabilities_desc: "Komunikace mezi různými bojovými pluky nabývá na důležitosti na rozsáhlých bojištích, kde velitelé nejsou schopni koordinovat činnost vizuálně nebo posly. Radio bude zavedeno ve velkém měřítku, aby byla modernizace úspěšná."
  MON_lessons_from_1934_rebellion: "Poučení z povstání 1934"
  MON_lessons_from_1934_rebellion_desc: "Afera Lkhumbe a odpovídající rolnická povstání téhož roku ukázala, že civilní milice a banditní oddíly těžko odolávají obrněným vozidlům, zvláště rychlým proti-infanterním automobilům a nákladním vozům. Taková vozidla lze využít i pro průzkum."
  MON_foundation_for_special_task_battalion: "Základy praporu pro zvláštní úkoly"
  MON_foundation_for_special_task_battalion_desc: "S omezeným počtem mužstva si nemůžeme dovolit udržovat velkou armádu, přesto nelze přehlédnout potřeby obrany našich zájmů vnitřně i v zahraničí. Důstojnický sbor již vypracoval plány na vytvoření elitního [ROOT.getAdjective] pluku pro zvláštní úkoly, který nyní vyžaduje pouze oficiální schválení od politiků."
  MON_mountainous_specialization: "Specializace na horský terén"
  MON_mountainous_specialization_desc: "S horami táhnoucími se od severozápadu k jihovýchodu a mnoha hřebeny na severu země je přirozené, že speciální síly založí několik táborů a cvičišť v skalnatých částech naší země, čímž se země stane elitně specializovanou na horský terén."
  MON_gobi_training_facilities: "Školící zařízení v Gobi"
  MON_gobi_training_facilities_desc: "Celá naše jižní hranice je pokryta dunami pouště Gobi. Tato drsná a nepřátelská prostředí jsou ideální pro výcvik v extrémních podmínkách, který se očekává v blízké budoucnosti. Je také zásadní cvičit velitele schopné působit v takových podmínkách."
  MON_equipment_recovery_teams: "Týmy pro záchranu vybavení"
  MON_equipment_recovery_teams_desc: "Zprávy z našich speciálních jednotek naznačují, že během výcviku se mnoho vybavení zničí nebo ztratí kvůli specifikům prostředí v lokalitách táborů. I když nemůžeme změnit počasí, můžeme vycvičit speciální posádky schopné zachránit většinu poškozené techniky, čímž minimalizujeme možné ztráty."
  MON_expand_the_general_staff: "Rozšířit generální štáb"
  MON_expand_the_general_staff_desc: "Náš generální štáb má několik velmi prominentních a zkušených členů, ale postrádají adekvátní financování a velkoškálovou organizaci, kterou si mohou dovolit některé větší země. Prozatím zvážíme rozšíření štábu, aby odpovídal moderním standardům. Tato iniciativa osloví i mladší absolventy vojenských škol."
  MON_ratify_battleplans: "Schválit obranné plány"
  MON_ratify_battleplans_desc: "Aby stát byl připraven na probíhající vojenské kampaně, zřídíme oddělení, jehož jediným účelem bude navrhovat, organizovat a vykonávat bojové plány. Jak válka vstupuje na území našich sousedů, můžeme poslat pozorovatele vpředu, aby předpovídali možné manévry nepřítele."
  MON_old_heritage: "Staré dědictví"
  MON_old_heritage_desc: "Jízda byla, je a zůstane klíčovým prvkem našich ozbrojených sil. Ať už se vojenské doktríny vyvinou jakkoli, zachováme kořeny našeho dědictví a zůstaneme pány koní."
  MON_soldier_devotion: "Oddanost vojáka"
  MON_soldier_devotion_desc: "Svět se mění. Pozemní armády nyní sestávají převážně z pěších útvarů, které jsou méně mobilní než jízda, ale mnohem spolehlivější a pevnější v organizaci. Podpora tohoto pojetí nám poskytne výhodu na bojišti."
  MON_legacy_of_tachanka: "Dědictví tachanky"
  MON_legacy_of_tachanka_desc: "Lidský důmysl během ruské občanské války neznal hranic při vymýšlení nových válečných technik: koňský vůz nesoucí kulomet, schopný překonávat velké vzdálenosti s ohromnou palebnou silou a relativním komfortem, bude základem, na kterém budou naše armády stát!"
  MON_support_old_officers_corps: "Podpora starého důstojnického sboru"
  MON_support_old_officers_corps_desc: "Mnoho našich důstojníků jsou zkušení velitelé, kteří bojovali za nezávislost národa a zůstávají populárními postavami mezi obyvatelstvem. Podpora a zajištění jejich pevného postavení v armádě nám poskytne schopné generály a věrné vojáky. Někteří z nich jsou stále staří a konzervativní — ale záleží na tom?"
  MON_favour_young_officers: "Podpora mladých důstojníků"
  MON_favour_young_officers_desc: "Svět se mění a s ním i vojenské taktiky a strategie. Nová generace velitelů se vrací do vlasti ze zahraničních vojenských akademií. Možná přinesou něco nového."
  MON_revive_forgotten_doctrines: "Oživit zapomenuté doktríny"
  MON_revive_forgotten_doctrines_desc: "Na počátku 20. století naše země statečně bojovala za nezávislost proti imperialistickým mocnostem, v tom, co nelze nazvat jinak než partyzánskou válkou. Milice a malé pěší jednotky hlídaly domovy a srdce našeho lidu. Jejich dědictví bude pokračovat přizpůsobením překvapivě efektivního typu válčení."
  MON_bolster_national_awareness: "Posílit národní vědomí"
  MON_bolster_national_awareness_desc: "Ať už vedeme jakoukoli válku, děláme to pro slávu a prosperitu národa. Každý občan by měl být připraven přinést menší oběť pro její dosažení, čímž posílí naše válečné úsilí!"
  MON_expand_universal_military_act: "Rozšířit zákon o všeobecné branné povinnosti"
  MON_expand_universal_military_act_desc: "Zákon o všeobecné branné povinnosti uvaluje přísná omezení věku a pohlaví rekrutů. Uvolnění některých standardů a požadavků v našich byrokratických dokumentech nám umožní narukovat širší části populace, aniž by to vážně narušilo státní administrativu."
  MON_improve_militia_formations: "Zlepšit formace milicí"
  MON_improve_militia_formations_desc: "Místní milice mohou bojovat efektivněji, pokud budou postaveny pod velení lokálních velitelů, kteří lépe znají schopnosti svých podřízených mužů a žen."
  MON_ideological_loyalty_of_the_masses: "Ideologická loajalita mas"
  MON_ideological_loyalty_of_the_masses_desc: "Lidé by měli vědět, za co bojují a o co jde. Trochu propagandy z každého koutu země rozhodně nikomu neuškodí."
  MON_good_old_new_ways: "Staré dobré nové způsoby"
  MON_good_old_new_ways_desc: "Centralizace velení, administrace a strategií kolem rozsáhlého využití milice nám poskytla cenné zkušenosti, které lze zužitkovat a přijmout v řadách pravidelné armády."
  MON_rely_on_soviet_tactics: "Spoléhat se na [SOV.getAdjective] taktiky"
  MON_rely_on_soviet_tactics_desc: "[SOV.getAdjective] poradci dlouho prosazovali osvojování doktríny "hluboké bitvy", zaměřené na potlačení a dezorganizaci nepřítele na více frontách, následované využitím taktického úspěchu k obklíčení a zničení nepřátelských sil. Velmi účinné při použití velkého počtu vojsk."
  MON_weapon_prototype_development: "Vývoj zbraňových prototypů"
  MON_weapon_prototype_development_desc: "Neustálé hraniční střety s různými silami pronikajícími naše obrany nám poskytly několik lekcí k prozkoumání; jednou z nich je ztrácející se efektivita jednorázových palných zbraní, jichž má naše vojsko mnoho. Obrátíme se na naše dobrodince ve snaze získat moderní schémata zbraní."
  MON_mass_firearm_production: "Hromadná výroba střelných zbraní"
  MON_mass_firearm_production_desc: "Velká útočná síla bez palných zbraní učiní jakýkoli obranný či útočný pokus zbytečným bez ohledu na morálku či ideologické přesvědčení. My jsme stát a zajistíme výzbroj. Možná ne pro lid, ale alespoň pro vojáky."
  MON_focus_on_infantry: "Zaměřit se na pěchotu"
  MON_focus_on_infantry_desc: "Pěchota byla a bude klíčovým prvkem jakékoli pozemní armády bez ohledu na doktrínu, politický režim nebo ideologii. Touto základnu posílíme za každou cenu."
  MON_the_inevitable_counterblow: "Nevyhnutelný protiúder"
  MON_the_inevitable_counterblow_desc: "Ať už je útok sebepovedenější, vždy ho bude následovat protiútok nepřátelských sil, pokud nejsou kompletně zničeny při první vlně — toto jsme se tvrdě naučili, ale je to zásadní lekce pro každého vojáka!"
  MON_suitable_high_command: "Vhodné vrchní velení"
  MON_suitable_high_command_desc: "Voják je nádobou, která nese rozkazy vrchního velení. Pokud je to velení nezkušené nebo neschopné vést danou jednotku, musí být buď odvoláno, nebo mu poskytnuto náležité školení a šance se zlepšit. Volba je vždy naše..."
  MON_the_grand_stratagem: "Velký plán"
  MON_the_grand_stratagem_desc: ""Vítězství miluje přípravu" — řekl kdysi moudrý muž. Pro rozhodné a definitivní vítězství potřebujeme tedy propracovaný plán schopný překonat nejlepší plánovače a stratégy známého světa!"
  MON_favour_stronghold_defenses: "Upřednostnit obranu pevností"
  MON_favour_stronghold_defenses_desc: "Každý prapor v jakékoli divizi by měl být proměněn v stálou pevnost schopnou odolávat agresi po dlouhou dobu, dokud nedorazí rozkaz k protiútoku z hlavního štábu. Pak se pevnost vydá do pohybu přes bojiště..."
  MON_advanced_fortification_studies: "Pokročilé studie opevnění"
  MON_advanced_fortification_studies_desc: "Naši inženýři mohou dostat další úroveň výcviku, kde se naučí rychle opravovat stará a stavět nová opevnění. Tyto znalosti se ukážou jako užitečné při přípravě obranných stanovišť pro naše jednotky."
  MON_support_tactical_decision_freedom: "Podpořit svobodu taktických rozhodnutí"
  MON_support_tactical_decision_freedom_desc: "Strategické rozmístění nepřítele a rychlé protiútoky na naše slabiny naznačují, že některé rozkazy štábu mohou být nepřesně doručeny nebo zachyceny nepřítelem. Omezená volnost pro místní velitele jednotlivých praporů zlepší dlouhodobý výkon našich jednotek."
  MON_optimize_infantry_formations: "Optimalizovat pěchotní formace"
  MON_optimize_infantry_formations_desc: "Maximální potenciál našich pozemních sil lze využít, pokud místní velitelé obdrží správné pokyny k formacím a použití svěřených jednotek od generálního štábu. Takové pokyny umožní jádru naší armády fungovat efektivněji."
  MON_unified_operational_command: "Jednotné operační velení"
  MON_unified_operational_command_desc: "Nedávné zprávy ukazují, že vrchní velení vydalo několik rušivých a nelogických rozkazů různým částem ozbrojených sil, což snižuje efektivitu našich vojáků. Unifikace a zpevnění odstraní faktor chyb v této oblasti."
  MON_adopt_tsogs_methods: "Přijmout metody Tsoga"
  MON_adopt_tsogs_methods_desc: "Butochiyn Tsog, čerstvý absolvent Sumské dělostřelecké školy, vnesl do našich starých taktik čerstvý vítr, což nám umožňuje lépe využít potenciál dělostřeleckých jednotek."
  MON_investigate_improvement_opportunities: "Možnosti zlepšení dělostřelectva"
  MON_investigate_improvement_opportunities_desc: "Mnoho našich zbraňových kusů pochází z doby Xinhajské revoluce a vyhlášení nezávislosti v roce 1911. Některé nové konstrukce od našich spojenců by mohly být k dispozici a potenciálně využity v našich zařízeních."
  MON_feature_compact_mortar_designs: "Prosazovat kompaktní konstrukce minometů"
  MON_feature_compact_mortar_designs_desc: "Minomety představují klíčový prvek naší palebné síly na bojišti a musí být dostupné každému, kdo je potřebuje. Takové úsilí vyžaduje úpravy továrního vybavení, které nelze vrátit zpět..."
  MON_strengthen_air_land_links: "Posílit propojení vzduch-země"
  MON_strengthen_air_land_links_desc: "Naši dělostřelci potřebují souřadnice cílů, které mohou získat letecké nebo pozemní průzkumné týmy. První jsou rychlejší a obratnější, druhé však mohou poskytnout lepší informace bez vystavení se. Utěsníme spolupráci mezi nimi!"
  MON_combined_arms_operations: "Operace kombinovaných zbraní"
  MON_combined_arms_operations_desc: "Pouze jedním kombinovaným úderem ze vzduchu, moře a země lze nepříteli způsobit maximální škody. A zatímco naši orli poletují nad jejich hlavami, naši tygři je srazí z bezprostřední blízkosti a vzbudí v nich strach v myslích i duších!"
  MON_the_ultimate_weapon: "Konečná zbraň"
  MON_the_ultimate_weapon_desc: "Zbraně velkého ničivého účinku jsou impozantní, ale dobře zvládnuté dělostřelectvo v rukou mistry vycvičeného vojáka dokáže práci rychleji a pro nás výhodněji. Posilteme tuto základnu a oslavujme tento druh výzbroje!"
  MON_experimental_mobility: "Experimentální mobilita"
  MON_experimental_mobility_desc: "Nový druh doktríny vznikl v západních výcvikových centrech, který využívá vysoce mobilní vozidla pro rychlé přesuny a prudké boje na nepřátelském území. Těžko realizovatelné ve velkém měřítku, ale jaký potenciál pro omezené úderné síly!"
  MON_study_motorized_equipment: "Studovat motorizované vybavení"
  MON_study_motorized_equipment_desc: "Ve spolupráci se SSSR byla založena akciová společnost Mongoltrans, jejímž cílem je zajistit dopravní potřeby osob a zboží, rozšířit silnice a poskytovat vozidla pro vojenské použití. Využitím těchto vozidel můžeme vydat dekret a zabavit některá vozidla ve svůj prospěch."
  MON_specialization_on_vehicle_production: "Specializace na výrobu vozidel"
  MON_specialization_on_vehicle_production_desc: "Můžeme dále diverzifikovat náš průmysl a aplikovat správné techniky pro modernizaci a vylepšení výrobních zařízení pro civilní i vojenskou výrobu vozidel."
  MON_acquire_foreign_tank_designs: "Získat zahraniční konstrukce mechanizace"
  MON_acquire_foreign_tank_designs_desc: "Zahraniční spolupráce již přinesla plody a poskytla nám moderní zbraně, dělostřelectvo, průmyslové nářadí a elektrické přístroje. Tento základ lze posílit a případně aplikovat i na nové mechanizované konstrukce [ROOT.getAdjective] provenience."
  MON_utilize_new_designs_strength: "Využít sílu nových konstrukcí"
  MON_utilize_new_designs_strength_desc: "S omezeným průmyslem, jako je ten náš, nemůžeme plně masově vyrábět různé typy obrněných strojů. Můžeme však specializovat naše zařízení na výrobu konstrukcí speciálního určení za úkor jiných odvětví."
  MON_train_specialized_crews: "Školit specializované posádky"
  MON_train_specialized_crews_desc: "Řádná tanková posádka nemůže být vybrána z náhodných vojáků, kteří by zničili drahý stroj i své ještě dražší životy. Potřebujeme správné lidi na správných místech se skutečnými znalostmi, co dělají."
  MON_establish_the_trade_fleet: "Založit obchodní flotilu"
  MON_establish_the_trade_fleet_desc: "Jako vnitrozemská země jsme po staletí zapomněli mnoho principů mezinárodního námořního obchodu a jak je organizován. S několika skromnými investicemi může být možné pořídit zastaralé civilní lodě pro obchod a zásobování. To bude dobrý začátek."
  MON_lease_foreign_dockyards: "Pronajmout zahraniční loděnice"
  MON_lease_foreign_dockyards_desc: "Omezené možnosti našeho průmyslu nelze roztáhnout na výstavbu vhodných zařízení pro stavbu lodí. Můžeme však spolupracovat se zahraničím a využívat jejich zařízení ve svůj prospěch."
  MON_joint_naval_academy: "Společná námořní akademie"
  MON_joint_naval_academy_desc: "Dalším logickým krokem v námořním partnerství by bylo založení námořní akademie, kde se naši mladí námořníci naučí od zahraničních mořských vlků jejich zkušenosti."
  MON_naval_integration: "Námořní integrace"
  MON_naval_integration_desc: "Podařilo se nám podrobit další námořní mocnost poslušnému loutkovému státu, který poslouchá rozkazy z Ulaanbaataru; jejich námořnictvo by tak mohlo být využito našimi ozbrojenými silami, pokud si to požádáme. Taková spolupráce ale vyžaduje, abychom jim v jiných oblastech poskytli větší autonomii."
  MON_ensure_branches_independence: "Zajistit nezávislost odvětví"
  MON_ensure_branches_independence_desc: "Nemůžeme se spoléhat na cizince, aby nás vedli při budování námořního průmyslu — mnozí z nich usilují pouze o vykořisťování nezkušených [ROOT.getAdjective] námořníků a kapitánů! Nezávislé odvětví s vládními investicemi je od nynějška prioritou!"
  MON_local_specialists: "Místní specialisté"
  MON_local_specialists_desc: "Máme mnoho co se naučit ze zahraničních zkušeností a někteří mladí admirálové jsou připraveni sdílet své znalosti s našimi námořníky, což nám poskytne cenné zkušenosti do budoucna."
  MON_fund_mongolian_naval_forces: "Financovat [ROOT.getAdjective] námořní síly"
  MON_fund_mongolian_naval_forces_desc: "Jedním z hlavních problémů vnitrozemských zemí je naprostá absence mořských zkušeností a nedostatek investic. Některé vládní prostředky musí být vyčleněny na zlepšení této odvážné situace."
  MON_maritime_infantry: "[MON.getAdjective] námořní pěchota"
  MON_maritime_infantry_desc: "Pár oddaných mužů a žen může znamenat rozdíl při provádění překročení řek nebo námořních vylodění, pokud o ně budeme mít zájem. Můžeme se pokusit založit tajný výcvikový tábor na jezeře Uvs, kde by tací lidé byli cvičeni."
  MON_improve_naval_doctrines: "Zlepšit námořní doktríny"
  MON_improve_naval_doctrines_desc: "Taktiky námořního boje jsou neustále modernizovány a vylepšovány zahraničními mocnostmi, a my nesmíme nechat nové triky bez povšimnutí — mohou být zásadní při boji na moři!"
  MON_amphibious_effort: "Amfibiální úsilí"
  MON_amphibious_effort_desc: "Dědictví neúspěšných invazí z let 1274 a 1281 stále přetrvává v srdcích mnoha občanů, kteří nezapomněli křivdy osudu vůči [ROOT.getAdjective] lidu. Moderní techniky již nejsou závislé na počasí, proto do nich investujeme."
  MON_prioritize_small_vessels: "Upřednostnit malé plavidla"
  MON_prioritize_small_vessels_desc: "Ačkoli představa velkého námořnictva může být pro nacionalisty lákavá, nemáme k tomu schopnosti a průmysl. Nejprve se zaměříme na malé jednotky, než přistoupíme k vývoji velkých lodí."
  MON_support_the_mechants: "Podpořit obchodníky"
  MON_support_the_mechants_desc: "Naši obchodníci potřebují řádnou ochranu před nepříjemnými útočníky, kteří kradou naše špatně chráněné lodě. Některé návrhy již jsou na staveništi, ale můžeme je dále vylepšit ve svůj prospěch."
  MON_modernize_escort_tactics: "Modernizovat taktiku eskort"
  MON_modernize_escort_tactics_desc: "Dokončením doktríny obrany konvojů můžeme ještě více zlepšit bezpečnost námořních tras, umožňující plynulý tok zboží a surovin."
  MON_sea_raiders: "Námořní lupiči"
  MON_sea_raiders_desc: "My nepotřebujeme zdroje, ale naši nepřátelé ano. Jejich lodě plují po moři bez obav z následků. Naši námořní lupiči je naučí pár lekcí o přehnané důvěře."
  MON_emphasise_naval_blockades: "Důraz na námořní blokády"
  MON_emphasise_naval_blockades_desc: "Nepřítel si stále myslí, že torpédoborce a lehké křižníky mohou zachránit zásoby plynoucí po moři. Jejich hlubinné nálože jsou účinné, ale pár nových torpédových konstrukcí může obrátit průběh boje."
  MON_large_ships_effort: "Úsilí o velké lodě"
  MON_large_ships_effort_desc: "13. století vidělo naše námořnictvo jako jedno z největších na světě s velkými loděmi pustošícími Žluté moře. Je čas si připomenout minulou slávu a investovat do velkých flotil, které ohromí námořní mocnosti!"
  MON_establish_provisional_airforce: "Zřídit prozatímní letectvo"
  MON_establish_provisional_airforce_desc: "Zemi chybí řádný vojenský personál schopný plnit úkoly na obloze. Je nutné položit základy oficiálních mongolských leteckých sil vzhledem k rostoucí roli letectví v dopravě a průzkumu."
  MON_situational_aerial_presence: "Situční letecká přítomnost"
  MON_situational_aerial_presence_desc: "Není možné udržet velkou leteckou flotilu schopnou bojovat nad rozlehlými vzdušnými prostory národa. Preferovanou taktikou je zřízení několika malých leteckých základen po celé zemi, kde omezený počet peruťí může efektivně plnit svou úlohu zabezpečení nebe nad Mongolskem."
  MON_focus_on_local_engagements: "Zaměřit se na lokální střety"
  MON_focus_on_local_engagements_desc: "Založené letecké základny mají omezený dosah a vzletové dráhy jsou vhodné pro lehká letadla. Naše úsilí o vývoj nových letadel by proto mělo být omezeno na lehčí modely a varianty."
  MON_institute_air_landing_batallions: "Zřídit letecké výsadkové prapory"
  MON_institute_air_landing_batallions_desc: "Nově založené speciální síly mohou výrazně těžit z vytvoření elitního výsadkového praporu schopného provádět vzdušné invaze v extrémních a nepřátelských podmínkách."
  MON_foreign_air_equipment_coordination: "Koordinace zahraničního leteckého vybavení"
  MON_foreign_air_equipment_coordination_desc: "Národní výzkumné týmy mohou hodně získat od svých zahraničních kolegů, zejména v letectví, kde nám chybí praktické zkušenosti. Rozšíření některých dohod o spolupráci nám přinese mnohá vylepšení konstrukcí letadel."
  MON_improve_air_doctrine: "Zlepšit leteckou doktrínu"
  MON_improve_air_doctrine_desc: "Lepší letadla s zkušenými piloty mohou vyhrát mnoho střetnutí, ale dlouhodobým rozhodujícím faktorem jsou moderní letecké doktríny. Vypracování a zpevnění těchto strategií dá našim esům výhodu na obloze."
  MON_air_recon_and_intelligence_protection: "Letecký průzkum a ochrana zpravodajství"
  MON_air_recon_and_intelligence_protection_desc: "Moderní válka je válkou klamu; sběr, zpracování a využití zpravodajství hrají klíčovou roli. S rostoucím významem leteckého průzkumu pro rychlé šetření a sběr informací získáme výhodu za každou cenu!"
  MON_strengthen_air_navy_cooperation: "Posílit spolupráci letectva a námořnictva"
  MON_strengthen_air_navy_cooperation_desc: "Máme mnoho příležitostí k koordinaci našeho nově rozvinutého letectva a vybudované kostry námořnictva vývojem letadel schopných účinně zasahovat nepřátelské námořní síly."
  MON_capital_operations_focus: "Zaměření na operace kolem hlavního města"
  MON_capital_operations_focus_desc: "Malé a mobilní letecké perutě mohou být příliš rozptýlené, aby účinně čelily silnějšímu nepřátelskému letectvu; proto vybudujeme soudržnou leteckou pěst, schopnou udeřit hromadně do cílené vzdušné oblasti."
  MON_wastness_devours: "Pustina požírá"
  MON_wastness_devours_desc: "Velká území naší země nelze účinně střežit ze vzduchu pomocí některých lehkých stíhaček, jejichž dolet je příliš krátký pro zóny vzdušné kontroly samotného Mongolska. Výrobci naznačují, že vylepšení dálkových letadel tento problém účinně vyřeší a umožní našim strojům nerušeně operovat ve vzduchu." # todo: NEW TRANSLATION
  MON_transfer_the_funds_of_mongolbank: "Převést prostředky Mongolbanku"
  MON_transfer_the_funds_of_mongolbank_desc: "Založená v roce 1924 jako akciová společnost mezi [SOV.getAdjective] a [MON.getAdjective] investory, Mongolbank zůstal 50:50 společností s cílem rozvoje národní ekonomiky, dohlížet na bankovní sektor a transakce a kontrolovat zlaté rezervy země. Usilujeme o kontrolu nad jeho fondy, abychom mohli nadále rozvíjet Mongolsko."
  MON_build_the_railroads: "Postavit železnice"
  MON_build_the_railroads_desc: "Rozvoj železniční dopravy otevřel nové možnosti přepravy velkého množství zboží rychle a efektivně. Některé nově získané vládní prostředky lze věnovat na vybudování železniční sítě spojující naši metropoli s okraji státu."
  MON_expand_elementary_schools: "Rozšířit základní školy"
  MON_expand_elementary_schools_desc: "Vysoká míra negramotnosti našeho lidu je důsledkem přirozeného nedostatku státem financovaných základních škol, kde obyčejní muži a ženy učí číst, psát a počítat — dovednosti, které mnozí občané bohužel postrádají."
  MON_strengthen_tugrik: "Posílit tugrik"
  MON_strengthen_tugrik_desc: "Zlaté rezervy země jsou stále vázány na různé měny používané při finančních operacích, jako ruský rubl, mongolský stříbrný dolar, čínský jüan, japonské jeny a americké dolary. S tugrikem vázaným na rubl v poměru jedna ku jedné zavedeme omezení na operace v jiných bankovkách, abychom posílili roli národní měny."
  MON_encourage_foreign_trade: "Podporovat zahraniční obchod"
  MON_encourage_foreign_trade_desc: "Příčiny nízkého hospodářského růstu lze vystopovat do roku 1924, kdy stát znárodnil aktiva investorů a uvalil omezení zahraničního obchodu, čímž efektivně omezil rozvoj zahraničních podniků v naší zemi kvůli národní bezpečnosti. Otevřeme naše trhy, abychom povzbudili některé investory ke návratu do Mongolska."
  MON_improve_machine_tools: "Zlepšit strojní nástroje"
  MON_improve_machine_tools_desc: "Národní závody nesplňují přidělené kvóty hlavně kvůli nízké výrobní efektivitě, spoléhaní na ruční práci místo strojního vybavení a nedostatku pracovních sil. I když poslední nelze okamžitě vyřešit, první dva faktory lze napravit nákupem potřebného zařízení ze zahraničí."
  MON_study_foreign_radio_equipment: "Studovat zahraniční radiotechniku"
  MON_study_foreign_radio_equipment_desc: "Dosud neexistují zařízení schopná vyrábět moderní radiotechniku a elektroniku. Je rozumné učit se od sousedů a zjistit, jak lze situaci v této oblasti zlepšit."
  MON_pastures_into_farms: "Pastviny na farmy"
  MON_pastures_into_farms_desc: "Spoléhání se na zemědělství nám dosud sloužilo dobře; není velká potřeba rozvíjet složité průmyslové techniky, které by mohly poškodit přirozený vývoj naší země. Můžeme však modernizovat některé pozemky na řádné farmy schopné produkovat větší množství potravin pro potřeby lidu."
  MON_end_reliance_on_animal_husbandry: "Ukončit závislost na chovu zvířat"
  MON_end_reliance_on_animal_husbandry_desc: "Zastaralý a značně přežitý, celý ekonomický systém země se silně spoléhal na rozsáhlé zemědělské plochy, které byly nedostatečně využívány. Ačkoli by takové rozhodnutí mohlo být nepopulární, usilujeme o založení správného průmyslového základu pro naši zemi."
  MON_support_arats: "Podporovat araty"
  MON_support_arats_desc: "Tato slibná sociální etnická skupina pastevců je přítomna v každé části naší země a dodává našim lidem různé zemědělské produkty. Představují jádro naší průmyslové společnosti a měly by jim být uděleny jisté výhody, které ukážou jejich důležitost vládním úředníkům."
  MON_expand_woolwashing_facilities: "Rozšířit zařízení na praní vlny"
  MON_expand_woolwashing_facilities_desc: "Vzhledem k tomu, že vlna je hlavním zdrojem, který aratové poskytují místnímu trhu, je velmi důležité, aby zařízení schopná ji zpracovat byla řádně financována a rozšířena, aby podpořila rostoucí průmysl."
  MON_build_energokombinat: "Postavit energetický kombinát"
  MON_build_energokombinat_desc: "S elektrifikací mnoha [ROOT.getAdjective] měst a městeček je otázka zajistit její stabilní a stálé dodávky pro obyvatele čím dál naléhavější. Nesmí se stát, že tak důležitá oblast výroby zůstane v rukou cizinců — musí být postavena a udržována místním obyvatelstvem."
  MON_build_mechanical_factory: "Postavit mechanickou továrnu"
  MON_build_mechanical_factory_desc: "Mnoho nových zemědělských nástrojů a strojů vyžaduje náhradní díly, které jsou obvykle drahé a těžko dostupné. Nedávná iniciativa shromáždila několik prostředků od aktivních občanů k založení takové továrny v blízkosti Ulaanbaataru."
  MON_industrial_expansion: "Průmyslové rozšíření"
  MON_industrial_expansion_desc: "Po účinném rozvoji našich průmyslů můžeme povzbudit lidi, aby se přidali k dělnickým iniciativám zaměřeným na zvýšení kvality vyráběného zboží a efektivity práce na místě."
  MON_new_veterinary_facilities: "Nová veterinární zařízení"
  MON_new_veterinary_facilities_desc: "Nemoci a epidemie mohou zasáhnout zranitelné stáda nepřipravených zemědělců. Riziko infekce a potenciální škody lze minimalizovat, pokud budou po celé zemi vytvořena veterinární zařízení a bude prováděna pravidelná státem financovaná kontrola."
  MON_ulan_bator_promcombinat: "Ulaanbaatar Promcombinat"
  MON_ulan_bator_promcombinat_desc: "Ustanovení Ulaanbaataru jako průmyslového centra je rozhodující krok v národním hospodářském rozvoji; stane se největším výrobním zařízením pro civilní potřeby a poskytne pracovní místa tisícům nezaměstnaných občanů."
  MON_improve_mining_facilities: "Zlepšit těžební zařízení"
  MON_improve_mining_facilities_desc: "Doly Aduunchuluun a Khushuut jsou považovány za jedny z největších na území země, dodávají železo a uhlí našim soustruhům a lisům a slouží státu a lidu. Některé vládní prostředky mohou být poskytnuty tomuto sektoru pro zvýšení průmyslové produkce v těchto dolech."
  MON_armament_expansion: "Rozšíření zbrojního průmyslu"
  MON_armament_expansion_desc: "Dosavadní průmyslový rozvoj naší země byl zaměřen převážně na civilní zboží a potřeby, zatímco armáda byla zdánlivě opomíjena, což je nepřijatelné, protože muži a ženy v ní sloužící chrání stát a jeho stabilitu. Pro jejich potřeby je vhodné založit několik zbrojních výrobních zařízení."
  MON_southern_development_focus: "Zaměření na rozvoj jihu"
  MON_southern_development_focus_desc: "Poušť Gobi je známá svými drsnými a proměnlivými klimatickými podmínkami. Lidé žijící v těchto oblastech potřebují přístup k vodě, plynu a elektřině. Nový vládní program jim zajistí potřebné služby."
  MON_southwest_resource_prospection_area: "Oblast průzkumu zdrojů na jihozápadě"
  MON_southwest_resource_prospection_area_desc: "Jihozápadní oblasti přešly pod naši kontrolu a protože se zdají být bohaté na přírodní zdroje, lze vyvinout několik plánů na průzkum minerálů a surovin."
  MON_encourage_southern_agriculture: "Podpořit zemědělství na jihu"
  MON_encourage_southern_agriculture_desc: "Bývalá území Ma Kliky byla považována za zaostalé provincie bez potenciálu pro imperiální nebo poté republikánské investory. S naší zkušeností v boji proti postupu pouště do našich pastvin může být možné vytvořit několik zelených oblastí a položit základy nových zemědělských půd."
  MON_expand_chahars_processing_region: "Rozšířit oblast zpracování Čachar"
  MON_expand_chahars_processing_region_desc: "Území vnútr Číny lze široce využít pro chov dobytka, včetně zpracování vlny a masa. Zařízení na praní vlny spolu s řeznictvími by měla být zřízena lokálně, aby poskytla pracovní příležitosti v regionu."
  MON_ordos_plateau_exploitation: "Využití plošiny Ordos"
  MON_ordos_plateau_exploitation_desc: "Toto území obdrží intenzivní státní dary, které umožní místním výrobcům rozšířit své provozy v dalším kole ekonomického rozvoje slibného regionu."
  MON_utilize_available_spaces: "Využít dostupné prostory"
  MON_utilize_available_spaces_desc: "Nové industrializační programy otevřely prostor pro mnoho nových zařízení, která lze vybudovat za účelem zvýšení ekonomické síly našeho prosperujícího státu!"
  MON_new_research_centres: "Zřídit nové výzkumné centra"
  MON_new_research_centres_desc: "Naše rostoucí průmyslové kapacity nám poskytly jedinečnou příležitost založit vědeckou síť zahrnující různé výzkumné a vývojové instituce, včetně výrobců nástrojů a materiálů, vývojářů elektroniky, mladých vědců a vojenskoprůmyslových specialistů pracujících pro dobro [ROOT.getAdjective] lidu!"
  MON_modernize_transportation_system: "Modernizovat dopravní systém"
  MON_modernize_transportation_system_desc: "Pro mnoho lidí s kočovným myšlením cesty nebyly zásadní, což vedlo k tomu, že předchozí vlády se nikdy nezaměřily na vybudování centralizované sítě mezi aimagy, hudony a městy. Jak stát roste, tento úkol visí nad vládcem jako Damoklův meč..."
  MON_assist_subsidized_region: "Pomoci subsidovaným regionům"
  MON_assist_subsidized_region_desc: "Tuva je silně dotovaný region vzhledem k nízké industrializaci, nedostatku území pro masové pastevectví a nedostatečnému státnímu financování. I nejmenší investice do regionu poskytne příležitosti k výstavbě průmyslu."
  MON_develop_mongolia_proper: "Rozvíjet Mongolsko vlastního jádra"
  MON_develop_mongolia_proper_desc: "Žádný region nesmí být zapomenut a Mongolsko Proper, srdce našeho státu, také prospěje z těchto programů. Založení průmyslu v různých pastvinách zvýší místní podporu naší věci."
  MON_improve_baigaal_dalai_industries: "Zlepšit průmysl Baigaal Dalai"
  MON_improve_baigaal_dalai_industries_desc: "Buryatie je známá dobře zavedeným průmyslem v Irkutsku, Chitě a Ulan-Ude, širokou dopravní sítí a rozsáhlým těžebním dřevorubectvím, které lze zlepšit několika cílenými státními dary."
  MON_develop_the_rear: "Rozvíjet zadní linii"
  MON_develop_the_rear_desc: "Mnoho východních provincií postrádá adekvátní financování přitom má velký ekonomický potenciál. Rozšíření naší přítomnosti a vlivu tam nám umožní efektivněji využívat jejich zdroje."
  MON_military_industries_expansion: "Rozšíření vojenského průmyslu"
  MON_military_industries_expansion_desc: "Státní investice lze věnovat vojenskému sektoru, kde zajistíme, že státy předchozího zájmu obdrží dávku darů na vybudování vojenských zařízení, čímž výrazně posílíme naši armádu."
  MON_hold_plenum_of_central_committee: "Uspořádat plénum Ústředního výboru"
  MON_hold_plenum_of_central_committee_desc: "Výsledky konference jasně ukazují, že soudruh [SOV.getLeader] je ochoten chránit [MON.getAdjective] stát v dobách nebezpečí a revolučního boje. Náš vedoucí delegace však měl osobní ambice a musí být nahrazen někým s 'spolehlivějšími' vizemi budoucnosti."
  MON_deal_with_genden: "Vyřešit otázku Gendena"
  MON_deal_with_genden_desc: "Genden má stále značnou podporu, zejména mezi chudými a venkovským obyvatelstvem. Jeho neposlušnost vůči našim [SOV.getAdjective] nelze ignorovat. Otázkou zůstává, jak by měl být jeho provokativní postoj potrestán?"
  MON_invite_frinovsky: "Pozvat Frinovského"
  MON_invite_frinovsky_desc: "Michail Frinovskij je známý [SOV.getAdjective] důstojník NKVD, jehož metody 'trojkových' organizací se ukázaly jako mimořádně efektivní při odhalování nepřátel revoluce v SSSR i v zahraničí. Jeho pomoc by byla pro naši revoluci velmi cenná."
  MON_secure_the_transition_of_power: "Zajistit přechod moci"
  MON_secure_the_transition_of_power_desc: "Nová vláda potřebuje prominentní členy strany, kteří prokázali svou odevzdanost straně a [MON.getNameDef]! Tito hrdinové revoluce budou vystaveni jako vzorné příklady v nově organizované státní propagandě!"
  MON_prepare_leftist_takeover: "Připravit levicové převzetí moci"
  MON_prepare_leftist_takeover_desc: "Genden a Demid jsou pryč, stejně jako jejich levicoví protějšky, kteří v roce 1933 vládli zemi, či členové pravicové opozice vyhnaní v roce 1928. Další čistička je na obzoru a musíme udělat vše, aby další diktátor nevstoupil do moci!"
  MON_learn_from_lkhumbe_affair: "Poučit se z aféry Lkhumbe"
  MON_learn_from_lkhumbe_affair_desc: "Selhání povstání z roku 1934, známého jako Afera Lkhumbe, bylo z velké části způsobeno omezeným přístupem rebelů ke zbraním a munici, zatímco vládní síly měly značné množství zbraní, minometů, obrněných vozidel a dokonce i několik letadel. Zřízení podzemních dílen by opozici při ozbrojeném povstání velmi pomohlo."
  MON_partial_religious_compromise: "Částečný náboženský kompromis"
  MON_partial_religious_compromise_desc: "Buddhistický klérus má v zemi mnoho stoupenců a zatímco předchozí režim je ignoroval, my apelujeme na kompromis, abychom zlepšili veřejnou podporu vládní změny. Prozatím mohou kláštery být cenným spojencem."
  MON_arm_civil_militia: "Vyposażit občanskou milici"
  MON_arm_civil_militia_desc: "Rozlehlá území naší země vyžadují formování nezávislých praporů schopných držet linii, dokud nepřijdou naše pravidelné jednotky a nepomohou odrazit útočníka. Vydáním zbraní obyvatelstvu si zajistíme podporu dospělých mužů ochotných zemřít za naši věc."
  MON_invite_political_exiles: "Pozvat politické exuly"
  MON_invite_political_exiles_desc: "Rok 1933 přinesl rychlou změnu státní politiky, po níž byli mnozí levicoví členové strany vyhnáni a ještě více represí. Podařilo se nám kontaktovat zbylé levicové a nabídnout jim místa v naší vládě. Jejich návrat zajistí, že nová vláda bude schopná efektivně vládnout po úspěšném převzetí moci."
  MON_ensure_control_over_the_railways: "Zajistit kontrolu nad železnicemi"
  MON_ensure_control_over_the_railways_desc: "Po převlečení našich stoupenců za členy dělnických brigád a pomoci při stavbě železniční sítě napříč zemí můžeme zajistit kontrolu nad strategickými logistickými hrdly pro budoucí válku a tím si zajistit zahraniční vybavení ve prospěch revoluce."
  MON_contact_the_bandits: "Kontaktovat bandity"
  MON_contact_the_bandits_desc: "Řídce osídlené jižní regiony hostí hrozbu pouště v podobě neregulérních banditních formací, které se těžko odhalují a obtížně jim čelí velké divizní formace. Navázáním kontaktu s jejich vůdci se můžeme mnoho naučit a získat jejich omezenou podporu v podobě lidské síly a zkušeností — za cenu rozhořčení části populace."
  MON_confiscate_soviet_weaponry: "Zkonfiskovat [SOV.getAdjective] zbraně"
  MON_confiscate_soviet_weaponry_desc: "S železnicemi pod naší kontrolou můžeme zřídit dodatečné kontroly a konfiskovat neregistrované vybavení, které jimi projíždí. Pro nejlepší a nejférovější obchod, samozřejmě!"
  MON_seize_the_power: "Uchvátit moc"
  MON_seize_the_power_desc: "S najatými a vyzbrojenými vojáky, připravenými logistickými centry a loajálními členy ve vládě oznámíme, že nové Mongolsko povstalo z popela zkorumpovaných revolucionářů a nová éra začíná nyní!"
  MON_begin_the_collectivization: "Zahájit kolektivizaci"
  MON_begin_the_collectivization_desc: "S upevněnou novou vládou je čas pokračovat v reformách z let 1928–1933, během nichž se zvýšil export a import a rozšíril státní kapitál. Kolektivizace v nebývalém měřítku nyní začne."
  MON_seize_our_advantages: "Uchopit naše výhody"
  MON_seize_our_advantages_desc: "Genden se snažil uspokojit majitele kapitálu svou politikou „Zbohatnout“, cílem bohatnout bohaté a rozmařovat chudé. My už nebudeme rozlišovat — jsme stvořeni rovní; musíme tyto prostředky zabavit a přerozdělit mezi dělníky a rolníky."
  MON_reassure_the_soviets: "Ujistit [SOV.getAdjective]y"
  MON_reassure_the_soviets_desc: "Vnitřní agenda naší republiky bude účinnější, pokud obdržíme pokyny přímo z Moskvy, což umožní našim politikům, diplomatům a špiónům zaměřit se na vnější záležitosti. Je přirozené požádat úředníky v [SOV.getNameDef], aby nás přijali zpět do Kominterny jako rovnocennou republiku pod [SOV.getAdjective] nadvládou. Takové kroky omezí naše přímé politické akce dočasně, ale budou prospěšné v dlouhém horizontu."
  MON_end_political_opportunism: "Ukončit politický oportunismus"
  MON_end_political_opportunism_desc: "Příliš dlouho byla Mongolsko pomocníkem cizí mocnosti! Jsme statečný a hrdý národ, který se dokáže postavit o svůj osud. Jako součást Kominterny samozřejmě."
  MON_reorganize_state_agenda: "Přeorganizovat státní agendu"
  MON_reorganize_state_agenda_desc: "Jak se role obrátily! Ti, kdo utlačovali a klamali obyčejné muže a ženy, jsou pryč nebo vyhnáni. Někteří si mohou pamatovat jedovaté myšlenky a stále být ovlivňováni zvenčí. Ateistická propaganda zajistí loajalitu a čistou mysl našeho lidu."
  MON_make_use_of_monastery_assets: "Využít majetek klášterů"
  MON_make_use_of_monastery_assets_desc: "Kláštery leží buď prázdné, nebo v ruinách po našich útocích na buddhistickou církev. Na základě toho vydal [MON.getLeader] zvláštní dekret znárodňující zbývající majetek náboženských institucí, čímž poskytl vládě prostředky potřebné k pohonu mírových i válečných strojů."
  MON_example_of_communist_paradise: "Příklad komunistického ráje"
  MON_example_of_communist_paradise_desc: "Politické a ekonomické podmínky naší země se navždy změnily od chvíle, kdy [MON.getLeader] uchopil moc. S naší příslušností k marxismu-leninismu můžeme prohlásit založení další Sovětské republiky ve Střední Asii, aby závistivé pohledy sousedů směřovaly k nám!"
  MON_thinking_out_of_bounds: "Myšlení mimo hranice"
  MON_thinking_out_of_bounds_desc: "S vnitřní a vnější politikou státu řízenou z Moskvy stále zůstáváme pod kontrolou ambiciózních a kreativních jednotlivců, kteří mají vliv a různé kontakty napříč Střední čínskou rovinou. Správné využití naší agendy umožní nám, sovětskému satelitnímu státu, zajistit, že Čína zůstane oddaná lidové revoluci bez potřeby [SOV.getAdjective] zásahu."
  MON_means_of_propaganda: "Prostředky propagandy"
  MON_means_of_propaganda_desc: "Státní agendu lze šířit mnoha způsoby a jedním z nich je nadměrné používání propagandy, které může být ještě efektivnější, pokud vybudujeme instituce, jež aktivně vycvičí a vyškolí personál pro tento účel."
  MON_destabilize_the_central_plain: "Destabilizovat Střední rovinu"
  MON_destabilize_the_central_plain_desc: "Centrální oblasti Číny zažily po desetiletí rolnická povstání proti imperialistickým poslušníkům, zkorumpovaným úředníkům Kuomintangu či útlaku místních válečníků. Všechna selhala kvůli špatné organizaci a plánování. S [MON.getAdjective] pomocí ale nepadnou!"
  MON_fruits_of_revolution: "Plody revoluce"
  MON_fruits_of_revolution_desc: "Semena revoluce vyrostla v plody připravené k utržení. A když je Střední rovina v plamenech rolnických povstání, je logické, že nové komunistické vládě pomůžeme všemi dostupnými prostředky. I kdyby to znamenalo je přinutit ke spojení."
  MON_industrial_relocation: "Přemístění průmyslu"
  MON_industrial_relocation_desc: "Invazní síly vstoupily a ohrožují [SOV.getAdjective] vlast! Některé zprávy naznačují, že průmysl je přesouván z Ukrajiny, Běloruska a Pobaltí do centrálních oblastí Ruska a Uralu. Co když nepřítel dosáhne Uralu a ohrozí přestěhovaný průmysl našich soudruhů? Obrátíme se na [SOV.getAdjective] a nabídneme další přesun na východ."
  MON_new_comintern_beacon: "Nové maják Kominterny"
  MON_new_comintern_beacon_desc: "Je jasné, že se proudy změnily a nyní jsme to my, kdo může chránit [SOV.getNameDef] před nepřítelem. S rozpadem [SOV.getAdjective] státu musíme převzít otěže Třetí internacionály a stát se Revolučním ochráncem od nynějška!"
  MON_one_union_government: "Jedna svazová vláda"
  MON_one_union_government_desc: "Svět se mění. Kdo teď má sílu postavit se armádám [ROOT.getNameDef] a [SOV.getNameDef]? Postavíme se proti moci [ROOT.getLeader] a [SOV.getLeader] a o jednotě dvou států. Společně, příteli [SOV.getLeader], budeme vládnout tomuto světu v zájmu revoluce."
  MON_struggle_for_communal_liberation: "Boj za komunitární osvobození"
  MON_struggle_for_communal_liberation_desc: "Na rozdíl od našich sovětských bratří budeme podporovat boj všech národů v novém svazu, aby za každou cenu odrazily invazory a odrazil jejich postupující nepřítel!"
  MON_appoint_soviet_protege: "Jmenovat [SOV.getAdjective] protežé"
  MON_appoint_soviet_protege_desc: "Jeden z nejstarších a nejspolehlivějších revolucionářů, Khorloogiin Choibalsan, je v Moskvě vnímán jako současný nástupce vedení v [MON.getNameDef]. Už drží post ministra vnitra, ministra hospodářství a náčelníka armády. Posílení jeho moci jistě nezpůsobí problémy v budoucnu."
  MON_deal_with_religious_centre: "Vypořádat se s náboženským centrem"
  MON_deal_with_religious_centre_desc: "Trojkové komise odhalily protirevoluční buddhistické centrum tvořené lámami z klášterů po celé zemi. Není jasné, jaký měli plán, ale vzhledem k tomu, že někteří členové se obraceli na [JAP.getAdjective] úředníky pro pomoc, představují hrozbu vnitřní stability a musí být, pokud mají nějakou moc, odstraněni."
  MON_reorganize_homeland_security: "Přeorganizovat bezpečnost domova"
  MON_reorganize_homeland_security_desc: "Závislost na [SOV.getAdjective] pomoci v protizpravodajské činnosti znamená, že jsme vázáni materiály, které nám poskytují. Zřízení Úřadu vnitřní bezpečnosti zajistí minimalizaci rizika infiltrace a že naši operativci dostanou nejaktuálnější informace."
  MON_the_great_terror: "Velký teror"
  MON_the_great_terror_desc: "Stejně jako v [SOV.getNameDef] je naše vláda plná zkorumpovaných úředníků neznámého původu, mocichtivých destruktivních revolucionářů a revizionistických pravičáků. Musíme udělat, co je třeba — pro vyšší dobro musí být tyto prvky vyhubeny."
  MON_new_generation_of_intelligentsia: "Nová generace inteligence"
  MON_new_generation_of_intelligentsia_desc: "Měnící se doby vyžadují změnu lidí a máme mnoho mladých jedinců schopných intelektuálního a ideologického boje. Jejich vzdělání a loajalita jsou formovány v nejlepších univerzitách [SOV.getNameDef] a budou nezbytné k zaplnění mezer po nedávných událostech."
  MON_new_party_elite: "Formovat novou stranickou elitu"
  MON_new_party_elite_desc: "Státní aparát potřebuje lidi, kteří jsou ochotni si umazat ruce pro vyšší dobro. Někteří místní velitelé a byrokraté prokázali vynikající loajalitu vůči Choibalsanovi a budou povýšeni na své pozice."
  MON_remove_nominal_leadership: "Odstranit nominální vedení"
  MON_remove_nominal_leadership_desc: "Ač je lidmi milován, Amar se stal nebezpečným vůdcem schopným zničit vše, co Choibalsan vybudoval a plánuje pro [MON.getAdjective] stát. Pro vnitřní stabilitu a bezpečnost vlády musí být okamžitě řešen."
  MON_true_hero_for_the_people: "Pravý hrdina lidu"
  MON_true_hero_for_the_people_desc: "Jeho naprosté oddání principům marxismu-leninismu a absence opozice vůči jeho vládě ukazují, jak milovaným a populárním se [MON.getLeader] stal! Ještě jasnější je to, když se pověsti o jeho taktickém géniu v boji proti [JAP.getAdjective] agresorům rozšířily mezi obyvatelstvem. Sláva našemu velkému [MON.getLeader]!"
  MON_first_five_year_plan_focus: "První pětiletka"
  MON_first_five_year_plan_focus_desc: "Nový kurz je v každém ohledu nebezpečná a zastaralá politika, která šíří zmatek v myslích lidí. Půjdeme příkladem [SOV.getAdjective] a založíme svou vlastní první pětiletku, aby uspokojila potřeby našeho lidu."
  MON_changing_times: "Měnící se časy"
  MON_changing_times_desc: "Staré vedení se zdá být stále schopné vést zemi, ale jak se jejich tělesný a duševní stav zhoršuje, může se jim čím dál těžší udržet se u moci a efektivně řídit stát. Možná je čas povýšit nové lidi ve straně na nejvyšší stranické posty?"
  MON_join_the_big_brother: "Připojit se k Velkému bratrovi"
  MON_join_the_big_brother_desc: "Náš stát mohl přežít svůj účel; cíl Komise byl konečně splněn. Realizace tohoto faktu mladými komunisty vedla k situaci, kdy můžeme požádat o oficiální sjednocení s našimi velkými přáteli a dobrodinci, [SOV.getNameDef]."
  MON_support_the_red_army_focus: "Podporovat Rudou armádu"
  MON_support_the_red_army_focus_desc: "[SOV.getNameDef] a revoluce mají mnoho nepřátel v zahraničí. Musíme všemožně podporovat naše bratry a sestry v boji za úspěch revoluce. I když nemůžeme nasadit obrovské armády jako naši přátelé, můžeme nabídnout průmyslovou a humanitární pomoc — koně, potraviny, vlnu a maso našim spojencům."
  MON_vessels_of_the_future_war: "Plavidla budoucí války"
  MON_vessels_of_the_future_war_desc: "Účinnost obrněných vozidel na bojišti naznačuje, že by v budoucnu byla velmi důležitá, možná i hlavní silou. A i když nemáme prostředky budovat vlastní tankové divize, můžeme sbírat fondy k vybavení takové divize. Nákladné, ale hodné úsilí."
  MON_aerial_support_initiative: "Iniciativa letecké podpory"
  MON_aerial_support_initiative_desc: "Iniciativa schválená Ústředním výborem navrhuje, aby [MON.getAdjective] lid shromažďoval prostředky k nákupu a vybavení letecké perutě složené z moderních prototypů stíhaček. Další těžká investice k dosažení vítězství dělníků."
  MON_improve_transportation_network: "Zlepšit železniční síť"
  MON_improve_transportation_network_desc: "Naše podpora [SOV.getNameDef] narazí na méně překážek, pokud se vytvoří odpovídající dopravní síť mezi Ulaanbaatarem a Transsibiřskou magistrálou. Očekává se také nákup několika starých vlaků, aby nedocházelo k nedostatku strojů na naší straně železnice."
  MON_reject_choibalsan_advances: "Odmítnout postupy Choibalsana"
  MON_reject_choibalsan_advances_desc: "Choibalsan představuje oportunistického a mocichtivého utlačovatele, který usiluje pouze o získání moci a její zneužití pro osobní touhy. S Amarovou vládou může být jeho vliv postupně omezen až na nic."
  MON_separate_army_and_politics: "Oddělit armádu a politiku"
  MON_separate_army_and_politics_desc: "Struktura socialistické armády silně spoléhá na ideologickou indoktrinaci personálu, což vede k vysokému vlivu politiků na vojsko a naopak. Takový systém brzdí schopnost státu fungovat a řádně reagovat na pokusy o státní převrat."
  MON_local_command_structure: "Místní velitelská struktura"
  MON_local_command_structure_desc: "Generální štáb nemusí být přímo přítomen v poli, aby zajistil, že naše síly bojují správně. Místní velitelé mohou být přiděleni k jednotlivým divizím či i praporům, čímž se výrazně zlepší výkon pozemních sil na bojišti."
  MON_decrease_defense_budget: "Snížit obranný rozpočet"
  MON_decrease_defense_budget_desc: "[SOV.getAdjective] úředníci neustále tlačí naši vládu ke zvýšení obranných výdajů navzdory nedostatkům, které naši lidé už pociťují. V posledních letech dosáhly ohromujících 40 %, což paralyzuje hodnotu tugriku a ještě více snižuje jeho hodnotu na trhu."
  MON_finalize_army_reform: "Dokončit reformu armády"
  MON_finalize_army_reform_desc: "Zavedené reformy zaměřené na zlepšení situace armády se ukazují jako funkční. S vojáky soustředěnými na svoji povinnost vlasti se celkové postavení naší armády výrazně zlepšilo."
  MON_tolerate_religious_groups: "Tolerovat náboženské skupiny"
  MON_tolerate_religious_groups_desc: "Před jen několika lety buddhistická církev silně utrpěla kvůli takzvaným 'progresivním' levicovým reformám, které měly oddělit lidi od náboženství a převést jejich mysl k nové politické agendě. Tyto snahy zničily národní specifika [MON.getAdjective] buddhismu a současná vláda je připravena uznat chyby minulosti nabídkou náboženského kompromisu."
  MON_establish_socialist_society: "Zřídit socialistickou společnost"
  MON_establish_socialist_society_desc: "Revoluční režim jako náš je křehký a zranitelný vůči zahraniční agendě. Toto tvrzení je validní, ale zneužité otevírá možnosti k vykořisťování a zneužívání, stejně jako někteří úředníci dělají. Snížením jejich pravomocí a odrazením aktivních útoků na specifické skupiny může vzniknout nová, socialistická vláda."
  MON_workers_focus: "Dělníci..."
  MON_workers_focus_desc: "Dělníci našeho národa byli zanedbáváni minulými vládami. Zvýraznění jejich významu vytvořením nových zařízení jen posílí jejich víru v legitimitu našeho režimu."
  MON_peasants_focus: "... a rolníci"
  MON_peasants_focus_desc: "Kolektivizace způsobila, že mnohé rodiny přišly o dobytek, domovy a úspory, což je považováno současnými úředníky za hraniční zrádnost a musí být co nejdříve napraveno. Pro dobro národa musí být provedeny reformy."
  MON_workers_and_peasants_unite_focus: "... Spojte se!"
  MON_workers_and_peasants_unite_focus_desc: "\"Rozděleni padneme, jednotní jsme silní!\" — toto heslo by měl znát každý muž a žena naší země. Spolupráce dělníků a rolníků přinese skvělé výsledky, pokud bude správně uplatněna. A Amar ví jak!"
  MON_a_socialist_republic: "Moderní socialistická republika"
  MON_a_socialist_republic_desc: "Socialistické reformy provedené v naší zemi ukazují, kolik se zlepšilo od vlády Gendena. S upevněným socialistickým postojem Mongolsko může otevřít své dveře cizincům a přijmout svůj osud v moderním světě."
  MON_sideline_the_left: "Odsunout levoz"
  MON_sideline_the_left_desc: "Levá a pravá frakce ve vládě jsou rozdělena od VII. stranického sjezdu v roce 1928. Současné vládní reformy nelze bezpečně provádět bez účasti levicových aktivistů ve veřejných záležitostech. Někteří z jejich vůdců otevřeně odporují našemu zákonodárství, proto je nutné je odsunout od moci."
  MON_liberalize_trade_policies: "Liberalizovat obchodní politiky"
  MON_liberalize_trade_policies_desc: "Levicové odchylky raných 30. let vedly k zavedení státního monopolu na zahraniční obchod, zvláště s [CHI.getAdjective]. Nyní, když jsme upevnili stát, obrátíme se k světu a otevřeme se jim."
  MON_increase_border_patrols: "Zvýšit pohraniční hlídky"
  MON_increase_border_patrols_desc: "Naše rozlehlé hranice jsou neustále narušovány bandity, povstaleckými milicemi a nepřátelskými agenty. Mobilizace vojsk na hranice je nezbytná pro naši bezpečnost a správný rozvoj státu."
  MON_affirm_rearmament_program: "Potvrdit program přezbrojení"
  MON_affirm_rearmament_program_desc: "Jak napětí na Východě roste, zůstáváme silně závislí na [SOV.getAdjective] pomoci. To však nebude trvat věčně, a my se musíme připravit na blížící se bouři."
  MON_tackle_the_eastern_threat: "Postavit se východní hrozbě"
  MON_tackle_the_eastern_threat_desc: "Porušování hranic [MAN.getAdjective] jednotkami dosáhlo nepřijatelných rozměrů, které nelze ignorovat! Tvrdí, že hranice mezi Vnitřním a Vnějším Mongolskem sahá hluboko do našich zemí, odvolávajíce se na zastaralé mapy, které jsme nikdy neviděli. Nastal čas je naučit lekci a naši [SOV.getAdjective] přátelé jsou připraveni nám v tom pomoci."
  MON_assist_the_revolutionary_struggle: "Pomoci revolučnímu boji"
  MON_assist_the_revolutionary_struggle_desc: "Vnitřní mocenské boje vedly k vypuknutí jednoho z nejničivějších konfliktů, který má pohlcovat celé [SOV.getNameDef] plameny války. Jako jeden z nejsilnějších a nejspolehlivějších členů Kominterny máme schopnost dosáhnout různých diplomatických cílů."
  MON_rebuke_1932_mediation_issue: "Kritizovat mediaci z roku 1932"
  MON_rebuke_1932_mediation_issue_desc: "Ve snaze získat více území se [TAN.getNameDef] v roce 1932 obrátilo na SSSR a získalo strategické soliště v oblasti hory Dus-Dag, které jsou právoplatně [MON.getAdjective] území! S [SOV.getAdjective] je nyní zaneprázdněn můžeme příležitostně využít situace a znovu sjednotit kdysi naše země."
  MON_ratify_mutual_assistance_treaty: "Ratifikovat smlouvu o vzájemné pomoci"
  MON_ratify_mutual_assistance_treaty_desc: "Naše jasné spojenectví s [SOV.getNameDef] vyžaduje jen několik podpisů našich úředníků, aby bylo oficiálně ratifikováno a otevřelo cestu k silné a vzájemně prospěšné spolupráci. [CHI.getNameDefCap] nebude nadšená, ale co na tom?"
  MON_invite_soviet_advisors: "Pozvat [SOV.getAdjective] poradce"
  MON_invite_soviet_advisors_desc: "V rámci smlouvy o vzájemné pomoci je nyní [SOV.getAdjective] armáda oprávněna být umístěna na našem území v strategických klíčových oblastech. Vojenskou spolupráci lze rozšířit pozváním [SOV.getAdjective] vojenské mise, aby se zapojila do rozvoje armády a asistovala našim velitelům při cvičeních a manévrech."
  MON_approach_soviet_planners: "Oslovit [SOV.getAdjective] plánovače"
  MON_approach_soviet_planners_desc: "V rámci naší ekonomické spolupráce byla do Mongolska pozvána skupina [SOV.getAdjective] plánovačů, jejichž cílem je pomoct průmyslovému rozvoji. Vzhledem k drsným klimatickým podmínkám a nízké urbanizaci se zaměřili spíše na sdílení [SOV.getAdjective] průmyslových inovací s našimi techniky než na výstavbu staveb."
  MON_joint_technological_development: "Společný technologický rozvoj"
  MON_joint_technological_development_desc: "Je v našem nejlepším zájmu zvýšit spolupráci s [SOV.getAdjective] vědci a techniky. Zatímco my můžeme nabídnout málo materiální podpory, oni nám mohou poskytnout cenné nástroje k vylepšení našich výzkumných zařízení."
  MON_intensify_cooperation: "Intenzifikovat spolupráci"
  MON_intensify_cooperation_desc: "Ulaanbaatar momentálně nedokáže poskytnout pevný základ pro stabilní a spolehlivou výrobu elektronických součástek v Mongolsku. S [SOV.getAdjective] pomocí lze ale situaci změnit, vytvořit nové techniky a díly a ve státě se začnou objevovat počítačová zařízení."
  MON_student_exchange_program: "Program výměny studentů"
  MON_student_exchange_program_desc: "[SOV.getNameDefCap] má rozsáhlou institucionální síť schopnou vzdělávat tisíce mladých lidí z různých republik Unie. Můžeme poslat naše nejlepší studenty na výměnný program, aby se učili od našich dobrodinců."
  MON_reform_national_script: "Reformovat národní písmo"
  MON_reform_national_script_desc: "Současné [MON.getAdjective] písmo obsahuje různé abecedy, z nichž některé používají nepřátelé našeho lidu. S [SOV.getAdjective] vlivem v naší zemi a přítomností jejich lingvistů byla vyvinuta nová verze písma v těsné spolupráci s našimi odborníky. Je založena na cyrilici a výrazně pomůže v boji proti negramotnosti."
  MON_solidify_language_institutes: "Zpevnit jazykové instituty"
  MON_solidify_language_institutes_desc: "Závislost na cizích abecedách a přepisech způsobila, že národ byl v minulém století předmětem různých režimů. S vyhlášením nezávislosti byly činěny snahy sjednotit různé mluvené dialekty a používané písmo do koherentního systému sloužícího lidu."
  MON_ulaanbaatar_national_university: "Národní univerzita Ulaanbaatar"
  MON_ulaanbaatar_national_university_desc: "Vládní usnesení schválené před několika měsíci mělo za cíl založit 'instituci vyššího vzdělávání', která se později může stát základem Národní univerzity Mongolska. S aktuálním financováním a žízní po vědění mezi studenty má být úspěch zaručen!"
  MON_dream_of_greater_mongolia: "Sen o Velkém Mongolsku"
  MON_dream_of_greater_mongolia_desc: "Po mnoho let jsme opatrovali sen sjednotit mongolské obyvatelstvo pod vládou jednoho státu, nikoli jako koloniální satelit nebo zaostalou provincii, ale jako stát řízený Mongoly! Nastal čas považovat tyto sny za reálné a začít obnovovat ztracená území!"
  MON_gather_ulaanbaatar_conference: "Svolat konferenci v Ulaanbaataru"
  MON_gather_ulaanbaatar_conference_desc: "Síla v Centrální a Východní Asii je křehká a v rukou tří hlavních aktérů regionu: [SOV.getAdjective]ů, [JAP.getAdjective] a [CHI.getAdjective]. Pozváním těchto stran na 'neutrální půdu' můžeme nastolit otázku [MON.getAdjective] lidu a doufat, že bude pokojně projednána a vyřešena."
  MON_divide_spheres_of_influence: "Rozdělit sféry vlivu"
  MON_divide_spheres_of_influence_desc: "Velké mocnosti jsou možná šokovány naším impulzivním a nepředvídatelným spojenectvím s PRC, ale čas pro rychlé myšlení a rozhodování skončil. Nyní posílíme spolupráci s nimi rozdělením pravé mongolské a čínské oblasti, oddělíme sféry vlivu a zajistíme kontrolu regionu a naše společné zájmy."
  MON_secure_hexi_corridor: "Zajistit Hexi koridor"
  MON_secure_hexi_corridor_desc: "Kontrola nad touto obchodní cestou a nejspolehlivějším strategickým průchodem do Sinkiangu padla do rukou Ma kliky, když místní milice obsadila oblast během Severní expedice v roce 1926. S naším novým spojencem můžeme účinně udeřit na nepřítele ze severu a východu, rozptýlit jeho formace na širokém frontě a umožnit naší hlavní síle bezpečně obsadit sporná území."
  MON_joint_piligrimage_to_mount_wutai: "Společná pouť na horu Wutai"
  MON_joint_piligrimage_to_mount_wutai_desc: "Jedna ze čtyř posvátných čínských buddhistických hor je nyní pod kontrolou oportunistických válečníků, kteří neustále využívají poutníky hledající požehnání. Spolu s naším novým spojencem můžeme poslat několik eskortů, aby jim pomohli v případě byrokratických potíží."
  MON_secure_the_rear: "Zajistit zadní linii"
  MON_secure_the_rear_desc: "Vůdci Sinkiangu a Východního Turkestánu často mění loajalitu od pro-čínské přes pro-sovětské až po pro-fašistické podle vývoje politické situace. Pokud se chceme soustředit na Střední rovinu a nemusíme se obávat dalšího úderu zezadu, musíme oblast okamžitě zajistit."
  MON_reignite_the_civil_war: "Znovuzapálit občanskou válku"
  MON_reignite_the_civil_war_desc: "Nyní, když jsou životně důležité oblasti zajištěny a zásobovací trasy ustaveny, můžeme se pokusit o něco většího a udeřit přímo do srdce rozpadlého systému, který odrazuje lidi od přijetí pravé revoluce: Kuomintang! Nastal čas srazit tohoto nenažraného tvora!"
  MON_the_second_northern_expedition: "Druhá severní expedice"
  MON_the_second_northern_expedition_desc: "První severní expedice ukázala úspěch centrální vlády ve zničení různých válečných klik v oblasti Fengtian. A protože Kuomintang nedokázal zničit zbytky banditů a vzdal se severu, vykročíme a zajistíme oblast ve prospěch nové osy Ulaanbaatar–Shaanxi!"
  MON_a_pragmatic_diplomacy: "Pragmatická diplomacie"
  MON_a_pragmatic_diplomacy_desc: "Je jasné, že v znovuzískávání jádrových zemí pro jednotné [MON.getAdjective] stát jsme na sebe sami. Válka je nyní vyloučena, ale možná lze nalézt jemnější přístup?"
  MON_disagreements_with_sinkiang: "Neshody se Sinkiangem"
  MON_disagreements_with_sinkiang_desc: "Naše jižní hranice je neustále ohrožována [SIK.getLeader] a jeho bandity. Navíc mnozí etničtí Mongolové v Dzungarii a Dabanchengu utekli a hledají azyl kvůli represím místní vlády! Bylo by čestné tato území získat a reintegrovat je zpět."
  MON_one_mongolia_policy: "Politika Jednoho Mongolska"
  MON_one_mongolia_policy_desc: "Autonomní oblast Vnitřní Mongolsko byla vždy pro diplomaty zvláštním útvarem. Jejich autonomie pod vládou [MAN.getAdjective] a [CHI.getAdjective], boj za nezávislost a loajalita k Japonsku pro zachování statusu jsou jasným politickým oportunismem z nedostatku sebeurčení. Tento problém lze a měl by být vyřešen..."
  MON_gobi_border_realignment: "Přeuspořádání hranic Gobi"
  MON_gobi_border_realignment_desc: "Mnohá jižní území obývají etničtí Mongolové, kteří usilují o připojení k Mongolsku Proper. Tyto země byly dlouho součástí [SHX.getNameDef] a [XSM.getNameDef], které potlačovaly jakékoliv náznaky sebeurčení — to je jasná urážka našeho lidu. Je čas ukázat těmto samozvaným vůdcům Střední roviny, jak chutná písek."
  MON_delegation_to_tuva: "Delegace do Tuva"
  MON_delegation_to_tuva_desc: "Od svého nominálního vyhlášení nezávislosti v roce 1922 měla [TAN.getNameDef] napjaté vztahy s naším státem nejen kvůli migraci obyvatelstva, ale také kvůli strategické soli na hoře Dus-Dag. Naše společné kulturní a historické dědictví lze využít k navázání bližších vazeb a možnému vytvoření jednotného státu."
  MON_a_unity_with_buryats: "Jednota s buriaty"
  MON_a_unity_with_buryats_desc: "Rok 1934 přinesl mnoho změn v našich vztazích s Buryaty, když [SOV.getAdjective] úředníci rychle našli 'významné ideologické, kulturní a historické důvody' oddělit naše země a stavět naše politiky proti sobě. Časy se však změnily a můžeme vytvořit burjatsko-mongolskou unii, která naplní sen o sjednocení mongolského obyvatelstva pod jednou vlajkou."
  MON_incorporate_new_lands: "Inkorporovat nová území"
  MON_incorporate_new_lands_desc: "Naše ambice jsou velké a jsou na cestě k naplnění! Nechť svět ví, že [MON.getAdjective] lidé budou stát sjednoceni jako silný národní stát!"
  MON_rely_on_national_strength: "Spoléhat se na národní sílu"
  MON_rely_on_national_strength_desc: "Lidé musí být informováni, že se nemůžeme plně spoléhat na [SOV.getAdjective] podporu v případě ozbrojeného konfliktu. Několik propagačních kampaní a špetka vlastenecké motivace může dělat divy, když je v pravých rukou."
  MON_limited_research_cooperation: "Omezená výzkumná spolupráce"
  MON_limited_research_cooperation_desc: "Navzdory našim nacionalistickým snahám nelze popřít, že našemu státu chybí vhodné vybavení a personál pro fungování v moderní éře. Musí být učiněny určité oběti, pokud chceme vyjít silní na konci."
  MON_strengthen_existing_industrial_contracts: "Posílit stávající průmyslové smlouvy"
  MON_strengthen_existing_industrial_contracts_desc: "Zrušení některých starých dohod a jejich obnovení na základě vzájemně výhodné spolupráce otevírá nové investiční příležitosti, kde můžeme získat moderní nástroje pro náš rozvíjející se průmysl."
  MON_subvert_soviet_control: "Podvrátit [SOV.getAdjective] kontrolu"
  MON_subvert_soviet_control_desc: "I když nemůžeme vést plně nezávislou zahraniční politiku kvůli riziku [SOV.getAdjective] intervence nebo [SOV.getAdjective]-podporovaného převratu, zdá se stále možné, aby několik správných lidí na správných místech nenápadně změnilo kurz a postupně snížilo naši závislost na Velkém rudém bratru."
  MON_expel_choibalsan: "Vyhostit Choibalsana"
  MON_expel_choibalsan_desc: "Stalinističtí agenti jsou stále přítomni v různých sférách naší vlády, včetně elity země v podobě 'velkého revolučního' Choibalsana. I když jeho loajalita k Mongolsku není pochyb, stojí v cestě lidu, aby si zvolil svůj osud. Pravicové čističky z roku 1928 a aféra Lkhumbe již ukázaly jeho chyby. Nadešel čas se ho zbavit."
  MON_sabotage_great_khural: "Sabotovat Velké chural"
  MON_sabotage_great_khural_desc: "Změna vládní politiky vyžaduje schválení Státního velkého churalu, jehož zasedání se brzy svolá. Ač roste podpora samostatného Mongolska mezi lidmi, úředníci mohou vetovat novou legislativu a pokračovat v pro-[SOV.getAdjective] postoji jako dříve. Pokud by však během zasedání došlo k útoku nějakého radikálního levicového prvku..."
  MON_faciliate_cooperation_with_china: "Usnadnit spolupráci s Čínou"
  MON_faciliate_cooperation_with_china_desc: "[CHI.getNameDef] zůstává v těchto tvrdých časech jedním z hlavních obchodních partnerů navzdory ideologickým rozdílům, které naše země roztrhly. Bezpochyby nás jejich úředníci vykořisťovali v minulosti, ale možná je čas otevřít mysl a srdce vzájemně výhodné spolupráci?"
  MON_expand_the_role_of_urga_national_library: "Rozšířit roli Národní knihovny Urgy"
  MON_expand_the_role_of_urga_national_library_desc: "Založená v roce 1921, Národní knihovna v naší metropoli zůstává hlavním zdrojem starobylého i moderního poznání, které je dosud těžko dostupné běžnému obyvatelstvu. Otevření dalších čítacích prostor a distribuce literatury mezi lidem zvýší úroveň gramotnosti."
  MON_stabilize_the_country: "Stabilizovat zemi"
  MON_stabilize_the_country_desc: "Násilný útok na Velký chural zanechal hluboké jizvy na společnosti; mnoho lidí zpochybňuje legitimitu současného režimu a navrhuje distancování od SSSR a jejich agendy. Ač to může znít lákavě, cílem je stabilizovat zbytky socialistického systému, který dosud máme."
  MON_reach_out_to_moscow: "Oslovit Moskvu"
  MON_reach_out_to_moscow_desc: "Není pochyb o tom, že [SOV.getAdjective] úředníci pochybuje o naší loajalitě po všech událostech v posledních dnech. Pošleme vyslance do Moskvy a ujistíme je o naší podpoře pozváním jejich diplomatů a bezpečnostních důstojníků na návštěvu, aby viděli, že stát je zajištěn."
  MON_ensure_mvd_loyalty: "Zajistit loajalitu MVD"
  MON_ensure_mvd_loyalty_desc: "Dobře víme o [SOV.getAdjective] agentech v našich řadách, zvláště v ministerstvu vnitra, kteří mohou narušit život obyčejných lidí, pokud obdrží rozkaz shora. Máme prostředky, které, pokud budou správně použity, mohou tyto lidi přesvědčit, aby nám poskytli cenné informace pro naše vlastní účely..."
  MON_support_the_rebels: "Podpořit rebely"
  MON_support_the_rebels_desc: "Mnoho národů se rozhodlo postavit se [SOV.getAdjective] nadvládě a v těchto nejistých časech vyhlásilo nezávislost! Přidáme se k jejich boji proti utlačovatelům, kteří usilují jen o moc nad národy Střední Asie a Dálného východu! Ke zbraním, bratři a sestry, ať naše slavný pochod na západ nikdy nezapadne!"
  MON_formalize_the_treaty: "Formalizovat smlouvu"
  MON_formalize_the_treaty_desc: "Jednotlivě můžeme být snadno poraženi, ale spojeni jsme silní! Abychom zajistili bezpečnost vznikajících států, je nejlepší formalizovat neoficiální dohodu o vzájemné pomoci do oficiální alianční smlouvy!"
  MON_contest_the_insurgents: "Zpochybnit povstalce"
  MON_contest_the_insurgents_desc: "Občanské nepokoje v SSSR vedly k vypuknutí jednoho z nejničivějších konfliktů moderních dějin! A zatímco vnitřní mocenské boje oslabují naše bratry, někteří oportunističtí nacionalisté se snaží využít příležitost k naplnění svých národních či i imperialistických ambicí! V loajálním spojenectví s Moskvou můžeme některé z těchto režimů upevnit — za cenu, samozřejmě..."
  MON_form_the_rightist_cabinet: "Vytvořit pravičský kabinet"
  MON_form_the_rightist_cabinet_desc: "Éra tzv. 'pravicového oportunismu' skončila v roce 1928 dalším kolem čistek, ale její odkaz přetrvává! Někteří politici unikli neustále hledajícím očím NKVD a nyní je lze pozvat zpět k vytvoření druhého pravičského kabinetu, což značí čtvrtou radikální výměnu kabinetu za posledních deset let."
  MON_denounce_politizised_army: "Odsoudit politizovanou armádu"
  MON_denounce_politizised_army_desc: "Komunistické režimy obvykle usilují o systém, kde strana dohlíží na armádu a armáda je přímo zapojena do ovlivňování státní politiky — to je nepřijatelné, protože obě oblasti jsou zcela odlišné povahy! Otevřeným odsouzením tohoto chování umožníme vládnímu aparátu zůstat nezávislým a svobodným ve volbě státních politik."
  MON_compromise_with_lamas: "Dohoda s lámami" # todo: NEW TRANSLATION
  MON_compromise_with_lamas_desc: "Buddhismus představuje integrální součást [ROOT.getAdjective] společnosti a slouží jako most mezi materiálním světem revoluce a vzdálenými abstraktními hodnotami vyšší moci. Budeme respektovat jejich volby a zajistit, že naše agenda jim nebude stát v cestě."
  MON_secularization_of_education: "Sekularizovat vzdělávání"
  MON_secularization_of_education_desc: "Nelze zapomenout, že navzdory nejlepším záměrům by náboženské instituce neměly řídit státní vzdělávací politiku. Sekularizace vzdělávání je významný krok při prosazování socialistických politik, přičemž zůstáváme v kontaktu s realitou moderního Mongolska."
  MON_repay_old_debths: "Splatit staré dluhy"
  MON_repay_old_debths_desc: "Mnohé zahraniční firmy opustily Mongolsko po revoluci v roce 1921, když jejich aktiva byla znárodněna a dluhy zrušeny armádou hledající prostředky k založení komunistického režimu a jeho ochraně před cizími hrozbami. Oslovením některých jejich zástupců a splacením starých dluhů můžeme získat jejich podporu pro naši věc."
  MON_invite_foreign_investors: "Pozvat zahraniční investory"
  MON_invite_foreign_investors_desc: "Po uznání chyb minulosti někteří investoři vidí Mongolsko jako rozvíjející se zemi, jež může pevně obstát jako bezpečný přístav v regionu. Zajistíme jim to podepsáním pětiletých či desetiletých smluv."
  MON_prepare_for_the_inevitable: "Připravit se na nevyhnutelné"
  MON_prepare_for_the_inevitable_desc: "I přes naše nejlepší úmysly je jasné, že mír v regionu již dlouho nevydrží; musíme být připraveni na nadcházející bouři, která pohltilá Střední Asii a Dálný východ."
  MON_frontline_infrastructure: "Infrastruktura na frontě"
  MON_frontline_infrastructure_desc: "Pokud chceme být schopni bojovat na rovných podmínkách s potenciálními nepřáteli v Sibiři, musíme vybudovat vhodná logistická centra a zásobovací základny kolem našich hranic! Jen tak zajistíme vítězství v těchto drsných podmínkách!"
  MON_excessive_military_build_up: "Nadměrné vojenské shromažďování"
  MON_excessive_military_build_up_desc: "Vládou financovaný program na vybudování silné a moderní armády bude nákladný a spotřebuje mnoho zdrojů, ale přinese masivní výhody v dlouhém horizontu. Musíme přežít počáteční fázi invaze, pokud k ní dojde."
  MON_peace_and_prosperity: "Mír a prosperita"
  MON_peace_and_prosperity_desc: "Je těžké si představit, že by naše země v blízké budoucnosti vstoupila do jakéhokoli ozbrojeného konfliktu. Zaměřme se na průmyslovou výstavbu a zabezpečení občanů v jejich pracovištích!"
  MON_stay_on_guard: "Zůstat ve střehu"
  MON_stay_on_guard_desc: "Cizí imperialistické ambice a revoluční boje dlouho otřásaly mnoha zeměmi Asie. Raději buďme bdělí a zajistěme, že naše hranice jsou chráněny ze všech stran a naše zařízení plně obsazena a připravena na případný boj."
  MON_central_asia_defensive_pact: "Obranný pakt Střední Asie"
  MON_central_asia_defensive_pact_desc: "V posledních letech jsme upevnili svou pozici v oblasti jako regionální mocnost usilující chránit občany. Nyní je čas ukázat naše mírové ambice obranou společných hodnot Střední Asie."
  MON_mengjian_issue: "Otázka Mengjiang"
  MON_mengjian_issue_desc: "Samostatný stát Mengjiang stále existuje navzdory nedostatku mezinárodního uznání! Jejich představa nezávislosti také zahrnuje Vnější Mongolsko jako nedílnou součást. Ne oficiálně, ale neměli by o tom lidé vědět?"
  MON_intervene_in_sinkiang: "Zasáhnout v Sinkiangu"
  MON_intervene_in_sinkiang_desc: "Stálé hraniční provokace a nepřátelské nájezdné kavalérie do aimagů Bayan-Ölgii, Khovd a Govi-Altai ukazují, že Sinkiang se stal hrozbou pro oblast. Jejich banditní gangy sílí s každým nájezdem a naši lidé ztrácejí majetek a životy. Je načase tomuto ohrožení učinit přítrž."
  MON_expand_the_treaty: "Rozšířit smlouvu"
  MON_expand_the_treaty_desc: "Být osamělým vlkem v boji proti útlaku je u lidí obdivuhodné, ale velké války nelze vyhrát bez vnější pomoci. Některé národy v našem okolí sdílejí naše hodnoty a principy, což nám umožní získat životně důležité ideologické spojence."
  MON_oppose_soviet_colonialism: "Oponovat [SOV.getAdjective] kolonialismu"
  MON_oppose_soviet_colonialism_desc: "Nazývají se ochránci lidu, ale nejsou ničím než vykořisťovatelskou koloniální mocností minulého století! Naše dřívější slabost nám nedovolila to říct nahlas, ale nyní můžeme otevřeně odsoudit [SOV.getAdjective] vedení a jejich imperialistické ambice ve Střední Asii a Dálném východě! Ať vědí, že jdeme proti nim!"
  MON_support_east_siberian_independists: "Podporovat východosibiřské nezávislé"
  MON_support_east_siberian_independists_desc: "Ruská občanská válka přiměla mnohé oblasti Dálného východu včetně Zelené Ukrajiny a Dalekého východu přiklonit se k Dohodě v boji proti rudé vlně pohlcující bývalé Ruské impérium. Stále existuje mnoho podporovatelů naší věci, kteří pouze potřebují nějakou podporu k zahájení povstání."
  MON_plea_to_the_russian_far_east: "Výzva k ruskému Dálnému východu"
  MON_plea_to_the_russian_far_east_desc: "Daleký východ je známý jako jedna z posledních přístavek Ruského impéria, což znamená, že zde je podpora ruské věci nejnižší — což nám velmi vyhovuje."
  MON_weaken_soviet_control_over_northwestern_siberia: "Oslabit [SOV.getAdjective] kontrolu severozápadní Sibiře"
  MON_weaken_soviet_control_over_northwestern_siberia_desc: "Rozsáhlé území Sibiře téměř nikdy nevidělo ruskou nohu, což poskytuje dokonalé podhoubí pro naše infiltrační party. Potřebujeme jen čas a nějaké zdroje pro upevnění naší podpory v oblasti."
  MON_infiltrate_transural_region: "Infiltrovat tranzuralský region"
  MON_infiltrate_transural_region_desc: "Asijské části oblasti Ural s jejich rozlehlými územími a bažinatými krajinami málo přitahovaly ruskou pozornost, což je pro nás a naše infiltrační týmy jen výhodné."
  MON_expand_influence_into_greater_steppe: "Rozšířit vliv do Velké stepi"
  MON_expand_influence_into_greater_steppe_desc: "Menshevici nedokázali získat podporu místního obyvatelstva ve Střední Asii během občanské války. Díky našemu společnému dědictví a geografické poloze je možné navázat bližší vazby s lidmi v regionu a získat stoupence i v nejvzdálenějších bývalých asijských SSR."
  MON_increase_presence_in_caucasus: "Zvýšit naši přítomnost v Kavkaze"
  MON_increase_presence_in_caucasus_desc: "Stateční hrdinové Zakarpatí bojovali proti ruským a osmanským hordám po poslední století. Můžeme tam jednoznačně získat nějakou podporu pro naši věc!"
  MON_launch_peoples_uprising: "Vyvolat lidové povstání"
  MON_launch_peoples_uprising_desc: "Nyní, když jsou naši sabotáže na svých pozicích, muniční sklady znefunkčněny a stoupenci vyzbrojeni, vztyčíme pravé prapory napříč vesnicemi a městy Střední Asie a Dálného východu, což znamená konec útlaku ruské vlády nad těmito regiony!"
  MON_declare_official_neutrality: "Vyhlásit oficiální neutralitu"
  MON_declare_official_neutrality_desc: "Jakýkoli vojenský konflikt na půdě [ROOT.getAdjective] by měl katastrofální následky pro všechny složky společnosti. Raději veřejně oznámíme, že jsme ostrovem v těchto rozbouřených mořích."
  MON_open_up_the_country: "Otevřít zemi"
  MON_open_up_the_country_desc: "Naše oddanost zásadám demokratického socialismu nám umožňuje navázat bližší vztahy s mnoha demokratickými institucemi po světě, posílit demokratické základy a zajistit, že svobody lidí budou zachovány."
  MON_riders_of_the_storm: "Jezdci bouře"
  MON_riders_of_the_storm_desc: "Umožníme vznik a vyslání strategických speciálních jednotek schopných chránit demokratické instituce v různých částech světa. Tato skupina zůstane ve stínu a ponese nenápadný název."
  MON_appeal_to_european_democracies: "Obrátit se na evropské demokracie"
  MON_appeal_to_european_democracies_desc: "Jak svět kolem nás padá do chaosu, někteří oportunističtí sousedé mohou vznést nároky na naše území, považujíc je za 'nedílnou součást svého vlivu'. S podporou silných evropských demokracií udržíme svou diplomatickou pozici bezpečnější."
  MON_appeal_for_overseas_protection: "Žádat o zámořskou ochranu"
  MON_appeal_for_overseas_protection_desc: "Posílíme spolupráci s dalšími demokratickými mocnostmi světa. Evropané se ukázali jako nespolehliví v otázkách kolonialismu a zahraniční ochrany; moudré by bylo obrátit se i za oceán a hledat podporu i jinde."
  MON_seek_democratic_alliances: "Hledat demokratická spojenectví"
  MON_seek_democratic_alliances_desc: "Demokratické instituce Mongolska potřebují nejen diplomatické sliby, ale také ekonomickou a vojenskou ochranu. Situace kolem nás se zhoršuje den za dnem a potřebujeme zahraniční pomoc, pokud bude k dispozici."
  MON_democratic_foundation_of_mongolia: "Demokratický základ Mongolska"
  MON_democratic_foundation_of_mongolia_desc: "Těžko se spoléhat na mocnosti tak vzdálené od nás! Posílíme vlastní cestu k demokratickým hodnotám a rozšíříme je kolem nás!"
  MON_provide_shelter_for_refugees: "Poskytnout útočiště uprchlíkům"
  MON_provide_shelter_for_refugees_desc: "S válkou zuřící kolem nás zůstáváme bezpečným přístavem pro ty, kteří potřebují ochranu. Otevřeme hranice každému, kdo hledá pomoc, a ujmeme se těch, kteří chtějí žít v míru."
  MON_offer_facilities_for_exiled_scientists: "Nabídnout zařízení pro exulantní vědce"
  MON_offer_facilities_for_exiled_scientists_desc: "Můžeme poskytnout vědeckým institucím dodatečné prostředky, pracovní prostory a výzkumná zařízení. Náš technologický rozvoj bude taky těžit z této vzájemně výhodné spolupráce."
  MON_forge_asian_self_determination: "Prosazovat asijské sebeurčení"
  MON_forge_asian_self_determination_desc: "Nikdy nezapomeneme, jak se různé mocnosti snažily utlačovat a podkopávat demokratické ideje ve Střední Asii. Nyní, když některá území přešla pod naši kontrolu, budeme usilovat o obnovu demokratických institucí v regionu!"
  MON_bulwark_against_fascist_threat: "Bastion proti fašistické hrozbě"
  MON_bulwark_against_fascist_threat_desc: "Mnohé země v Asii již padly obětí hnědého nebezpečí, které se snaží šířit své jedovaté myšlenky jako 'řešení proti rudé hrozbě'. Usilují jen o moc, vliv a zdroje, ne o ochranu lidí! Budeme hlavním opěrným bodem schopným odolávat jejich snahám!"
  MON_strike_against_communist_menace: "Útok proti komunistické hrozbě"
  MON_strike_against_communist_menace_desc: "Před lety mnoho regionů Asie pocítilo vliv Kominterny a socialistických hodnot, ale jsou hluboce zmýleni — lidová revoluce přináší chaos a devastaci ekonomice a životům lidí. Podpoříme jakékoliv snahy o demokracii v zemích sužovaných komunistickým útlakem!"
  MON_adopt_sun_yat_sen_principles: "Přijmout zásady Sunjatsenovy"
  MON_adopt_sun_yat_sen_principles_desc: "Zakladatel [CHI.getAdjective] demokracie formuloval filozofický koncept založený na třech principech, který má zlepšit život obyčejných lidí Střední roviny. Pokud chceme být zodpovědnou vládou, je správné aplikovat 'vládu lidu, lidem a pro lidi' s národními rysy."
  MON_welfare_focus: "Sociální péče"
  MON_welfare_focus_desc: "Jeden ze tří základních principů se týká poskytování statků pro náš lid v rámci anti-kapitalistického hospodářského rozvoje a diplomatického anti-imperialistického postoje. Prvním krokem je ekonomický rozvoj našeho národa."
  MON_codify_democratic_principles: "Kodifikovat demokratické principy"
  MON_codify_democratic_principles_desc: "Demokratický základ má větší sílu, pokud je kodifikován v zákonech a legislativním systému podporujícím odpovídající systém na všech úrovních moci. Může přijít krátké období politické nestability, ale tyto změny stojí za to."
  MON_five_races_under_one_union: "Pět ras pod jednou unií"
  MON_five_races_under_one_union_desc: "Ozvěny nové filozofické teorie se šíří národem, jak vznešené dědictví Xinhajské revoluce zapouští kořeny v myslích a srdcích lidí! Přepracování starých konceptů posílí naše vazby s Hanem, Mandžusy, Hui a Tibetci!"
  MON_cooperation_with_kuomintang: "Spolupráce s Kuomintangem"
  MON_cooperation_with_kuomintang_desc: "Demokratická orientace současné [CHI.getAdjective] vlády ukazuje, že přehodnocují chyby minulosti a možná jsou připraveni ke spolupráci spíše než k podrobení bývalých subjektů, autonomních oblastí a tributárních států? Usilujme o smíření, alespoň na diplomatické úrovni."
  MON_nationalism: "Nacionalismus"
  MON_nationalism_desc: "Ve stopách Kuomintangu přijmeme druhý klíčový prvek Tří lidových principů a obejmeme naši národní identitu — nejsme Číňané, Rusové nebo Mandžuové, ale Chalkh Mongolové, a ostatní národy musí respektovat naše právo na sebeurčení!"
  MON_put_an_end_to_the_arat_system: "Ukončit systém aratů"
  MON_put_an_end_to_the_arat_system_desc: "Systém aratů nám během počáteční fáze socialistické revoluce sloužil dobře, ale s dnešní vládní orientací je zřejmé, že musí být reformován do základů. Ve spolupráci s našimi čínskými přáteli můžeme použít systém praporů Vnitřního Mongolska, čímž výrazně zlepšíme administrativní vládu nad regionem!"
  MON_revoke_the_kyakhta_treaty: "Zrušit kyachtaskou smlouvu"
  MON_revoke_the_kyakhta_treaty_desc: "Kompromisy a ústupky neznají hranice a jsme připraveni znovu přijmout svůj osud pod ochranou Republiky. Jakmile znovu získáme své sebeurčení, spojíme se úzce s nejsilnějšími mocnostmi Střední roviny."
  MON_confrontations_with_warlords: "Konfrontace s válečnými pány" # todo: NEW TRANSLATION
  MON_confrontations_with_warlords_desc: "Rozdělení mezi válčícími klikami hladovícími po moci činí Střední rovinu extrémně nebezpečným a nestabilním místem, kde budou cizí mocnosti usilovat o vliv. S omezenými zdroji můžeme navázat pouta s některými regionálními mocnostmi a zvýšit naši sféru vlivu."
  MON_the_battle_for_tuva_uriankai: "Bitva o Tuva Uriankai"
  MON_the_battle_for_tuva_uriankai_desc: "Sdílíme společné dědictví s lidem Tuva Urianka; pouze ruská revoluce a čínský imperialismus vytvořily umělé hranice mezi námi. Můžeme usilovat o opětovné začlenění státu do naší domény, ale je velmi nepravděpodobné, že by [SOV.getAdjective] to bralo na lehkou váhu."
  MON_strong_leader_genden: "Silný vůdce Genden"
  MON_strong_leader_genden_desc: "Nyní, když náš milovaný vůdce opět vládne, je nezbytné, aby měl ve vládě veškerou moc sám. Jeho vláda odstartuje novou éru, nový věk pro Mongolsko!"
  MON_independent_army_structure: "Nezávislá armádní struktura"
  MON_independent_army_structure_desc: "Někteří armádní činitelé stále tvrdí, že vedení Gendena je pouhým frašem z hlediska interpretace revoluce. S politickými komisaři stále udržujícími vliv v ozbrojených silách je těžké prosadit jakoukoli ideologickou agendu bez jejich zásahu; představují proto velkou hrozbu pro náš režim."
  MON_ensure_soldier_loyalty: "Zajistit loajalitu vojáků"
  MON_ensure_soldier_loyalty_desc: "Zreformujeme systém politické indoktrinace tak, aby lépe odpovídal cílům současné vlády a ne všeobecné ideologii mas. Vojáci musí vědět, za co a za koho bojují."
  MON_reform_the_high_command: "Reformovat vrchní velení" # todo: NEW TRANSLATION
  MON_reform_the_high_command_desc: "Vyšší důstojníci nemohou být při těchto pokrokových reformách opomíjeni, zvláště s ohledem na to, jak se jejich loajalita neustále přesouvá mezi různými politickými silami a režimy." # todo: NEW TRANSLATION
  MON_mongolian_peoples_army: "[ROOT.getAdjective] Lidová armáda" # todo: NEW TRANSLATION
  MON_mongolian_peoples_army_desc: "Nová struktura armády obsahuje dokonalost ve svém jádru: věrní vojáci vykonávající rozkazy oddaných vysokých činitelů - dokonalá směs pro pravý mongolský lid." # todo: NEW TRANSLATION
  MON_incorporate_buddhism: "Začlenit buddhismus" # todo: NEW TRANSLATION
  MON_incorporate_buddhism_desc: "V jednom ze svých raných děl Genden řekl, že má dva idoly, za kterými by vždy šel: Vladimira Iljiče Lenina a Buddhu. Mnozí si mohou klást otázku, jak lze takový konglomerát ideologií sloučit dohromady. Klíčem k tomu je začlenění buddhistického náboženství do státní agendy, což by výrazně rozšířilo lidovou podporu pro současného vládce." # todo: NEW TRANSLATION
  MON_dealing_with_soviet_sympathisers: "Řešení sympatizantů [SOV.getAdjective]" # todo: NEW TRANSLATION
  MON_dealing_with_soviet_sympathisers_desc: "Vnitřní stabilita a bezpečnost naší vlády jsou neustálou hrozbou od revizionistických pro-[SOV.getAdjective] elementů infiltrovaných do našich shromáždění, schůzí, konferencí a kongresů. Pokud chceme zakořenit nové hodnoty v straně, někteří z těch zrádců musí zaplatit za chyby minulosti." # todo: NEW TRANSLATION
  MON_continue_new_course_policy: "Pokračovat v politice Nového směru" # todo: NEW TRANSLATION
  MON_continue_new_course_policy_desc: "Politika Nového směru představuje interpretaci Leninovy "Nové ekonomické politiky" z počátku 20. let s mongolskými specifiky. Některé z jejích prvků lze dále posílit, aby lépe sloužily státní ekonomice." # todo: NEW TRANSLATION
  MON_get_rich: "Zbohatnout!" # todo: NEW TRANSLATION
  MON_get_rich_desc: "Dlouho očekávaná a slíbená, kooperativní politika Peljidiina Gendena "Zbohatnout!" má za cíl umožnit obyčejným mužům a ženám hromadit bohatství nezávisle na kontrole a dohledu státu, což umožní [ROOT.getNameDef] využít nejlepší části kapitalistických prvků pro rozvoj socialismu!" # todo: NEW TRANSLATION
  MON_empower_hudonets: "Posílit hudonety" # todo: NEW TRANSLATION
  MON_empower_hudonets_desc: "Lidé z chudých částí různých aimagů, hudoni, jsou místně známí také jako hudoneti a mnoho z nich je přítomno ve vládě jako součást stranického křídla ovládaného největším z hudonetů, Gendenem. Udělení části z nich větší moci nám poskytne silný ekonomický růst v chudých oblastech." # todo: NEW TRANSLATION
  MON_provide_for_the_people: "Zajistit pro lid" # todo: NEW TRANSLATION
  MON_provide_for_the_people_desc: "Od bohatých k chudým, od chudých k bohatým, okruh financí končí stále v pěstích vlády. Zajistíme vhodné prostředky pro každého, bez ohledu na jejich bohatství nebo společenský status." # todo: NEW TRANSLATION
  MON_abolish_the_secretary_system: "Zrušit systém tajemníků" # todo: NEW TRANSLATION
  MON_abolish_the_secretary_system_desc: "Systém rovnocenné vlády tří stranických tajemníků zavedený již v roce 1928 splnil svůj účel. Sdílení moci vedlo tuto zemi do hloubky politické a ekonomické krize posledních let a aby se zabránilo dalšímu převzetí moci, musí být jednou provždy zrušen." # todo: NEW TRANSLATION
  MON_subsidise_the_military: "Dotovat vojsko" # todo: NEW TRANSLATION
  MON_subsidise_the_military_desc: "Zbrojní průmysl v posledních letech zažil silný útlum, ale s několika státem financovanými dotacemi může být modernizován a rozšířen, což nám umožní posílit naše vojenské schopnosti a posílit nedostatečně vyzbrojené armády." # todo: NEW TRANSLATION
  MON_leader_of_the_equal: "Vůdce rovných" # todo: NEW TRANSLATION
  MON_leader_of_the_equal_desc: "Genden lidem dokázal, že je schopen vládnout zemi v těchto tvrdých časech. Pod jeho vedením bude [ROOT.getNameDef] následovat cestu náboženského socialismu a usilovat o sjednocení podobných lidí pod jedním státem." # todo: NEW TRANSLATION
  MON_promote_religious_socialism: "Propagovat náboženský socialismus" # todo: NEW TRANSLATION
  MON_religious_socialism_desc: "Vyšli jsme vítězně z minulých bojů, což nám umožnilo zaměřit se na posílení a prosazení našich hodnot v srdcích lidí s novou entitou vznikající na politickém spektru, entitou náboženského socialismu, která se hodí k prosperující zemi, jakou jsme my." # todo: NEW TRANSLATION
  MON_support_buddhist_monasteries: "Podporovat buddhistické kláštery" # todo: NEW TRANSLATION
  MON_support_buddhist_monasteries_desc: "Jelikož je naše věc ušlechtilá a neopotiskávající, můžeme usilovat o spolupráci s mnoha náboženskými institucemi v naší zemi, které mohou poskytnout podporu našemu režimu a zajistit, že nově vybudovaný systém pevně udrží své hodnoty." # todo: NEW TRANSLATION
  MON_oust_genden: "Svrhnout Gendena" # todo: NEW TRANSLATION
  MON_oust_genden_desc: "Gendenova vláda nepřinesla nic než naprosté zničení [ROOT.getAdjective] ekonomiky, průmyslu a sociálních institucí. Lidé jsou unavení z utlačovatelských diktátorů a neustálých změn režimu. Možná je lepší mít vůbec žádnou vládu." # todo: NEW TRANSLATION
  MON_changes_within: "Změny uvnitř" # todo: NEW TRANSLATION
  MON_changes_within_desc: "Prvním krokem směrem k anarchistickému státu je změna v ekonomické struktuře, kterou stát jako instituce přijal dříve. Podpoříme myšlenky společného vlastnictví, svobodné občanské služby a omezené obchodní dohody s našimi nejbližšími sousedy." # todo: NEW TRANSLATION
  MON_spread_of_anarcho_communism: "Šířit ANCOM myšlenky v zahraničí" # todo: NEW TRANSLATION
  MON_spread_of_anarcho_communism_desc: "Myšlenky blížící se anarchistické revoluce nelze omezit liniemi nakreslenými na mapách některými politiky v minulosti. Nechť je slovo rozšířeno, neboť Revoluce Mysli k nim přichází!" # todo: NEW TRANSLATION
  MON_full_social_equality: "Plná sociální rovnost" # todo: NEW TRANSLATION
  MON_full_social_equality_desc: "Dřívější vládní struktury kladly silný důraz na nerovné rozdělení bohatství, majetku a strukturních rolí ve společnosti. Takový nesmysl není pro lidové komuny Mongolska!" # todo: NEW TRANSLATION
  MON_abolish_the_currency: "Zrušit měnu" # todo: NEW TRANSLATION
  MON_abolish_the_currency_desc: "Celý smysl měny lze považovat za zastaralý, pokud obchod probíhá na místní úrovni a je regulován lokálně. Ano, může být někdy neefektivní, ale má to vůbec smysl, pokud to teď funguje?" # todo: NEW TRANSLATION
  MON_workers_control_and_discipline: "Kontrola dělníků a disciplína" # todo: NEW TRANSLATION
  MON_workers_control_and_discipline_desc: "Bez vyšší regulační instituce se někteří dělníci mohou zdát zapomněli na celý cíl anarcho-komunistické revoluce, kde pracují pro své vlastní dobro a dobro komuny. Posílení takových myšlenek ve formě každoročních komunálních shromáždění je hodné úsilí." # todo: NEW TRANSLATION
  MON_eradicate_private_property: "Zničit soukromé vlastnictví" # todo: NEW TRANSLATION
  MON_eradicate_private_property_desc: "Soukromé vlastnictví představuje celý smysl kapitalismu směřující ke změně vlastnictví výrobních a distribučních prostředků, což lze vnímat jen jako nepřátelskou odchylku od přirozených procesů probíhajících ve společnosti. Občané se však bát nemusí, osobní vlastnictví zůstane v rukou jeho oprávněných vlastníků." # todo: NEW TRANSLATION
  MON_remove_hierarchical_structures: "Odstranit hierarchické struktury" # todo: NEW TRANSLATION
  MON_remove_hierarchical_structures_desc: "Žádný svobodný muž či svobodná žena nebude vzat, uvězněn, zbaven majetku, vyloučen, vyhnán nebo jakýmkoli způsobem zničen, ani proti němu nepokročíme nebo ho nebudeme stíhat, s výjimkou zákonného rozsudku jeho rovných, s nejvyšší autoritou náležející lidové komuně." # todo: NEW TRANSLATION
  MON_finalize_state_reforms: "Dovršit státní reformy" # todo: NEW TRANSLATION
  MON_finalize_state_reforms_desc: "Mnozí lidé vidí naši malou Revoluci jako první krok většího úsilí, jehož cílem je šířit a zakládat naše hodnoty napříč hranicemi a dosáhnout nejzazších oblastí světa, zajišťujíc, že komunální revoluce se tam jednoho dne také objeví." # todo: NEW TRANSLATION
  MON_form_the_provisional_government: "Zformovat přechodnou vládu" # todo: NEW TRANSLATION
  MON_form_the_provisional_government_desc: "Naše vláda je v ohrožení: delegace nejvyšších státních činitelů byla zadržena v Moskvě a jejich osud je neznámý. Zformujeme přechodný režim, jehož cílem je zajistit stabilitu státu prozatím." # todo: NEW TRANSLATION
  MON_assists_deviants_struggle: "Pomoci boji deviants" # todo: NEW TRANSLATION
  MON_assists_deviants_struggle_desc: "Zpráva o Gendenově uvěznění dorazila do Ulaanbaataru před několika dny a takového velikána ducha nelze nechat hnít v jednoosobní cele na Lubyance. Pomůžeme statečnému hrdinovi Mongolska všemi možnými způsoby." # todo: NEW TRANSLATION
  MON_infiltrate_the_railway_system: "Infiltrovat železniční systém" # todo: NEW TRANSLATION
  MON_infiltrate_the_railway_system_desc: "Jeho umístění je dobře známo, otázkou zůstává, jakou trasu zvolí, aby ho vlakem odeslali na jih. Nejlépe je obnovit staré kontakty v Lidovém komisařátu komunikačních cest [SOV.getNameDef], abychom získali důležité informace o plánované trase do "důchodu"." # todo: NEW TRANSLATION
  MON_return_of_prodigal_son: "Návrat ztraceného syna" # todo: NEW TRANSLATION
  MON_return_of_prodigal_son_desc: "Podařilo se nám získat plány možné Gendenovy trasy do jeho nového "rehabilitačního místa" na Krymském poloostrově. Je čas použít všechny prostředky, které máme k dispozici, aby se zajistil jeho bezpečný návrat do vlasti." # todo: NEW TRANSLATION
  MON_appeal_to_china: "Obrátit se na Čínu" # todo: NEW TRANSLATION
  MON_appeal_to_china_desc: "Jelikož [SOV.getAdjective] opustili našeho vůdce a [JAP.getAdjective] hledají svůj vlastní osud, nemáme jinou možnost než obrátit se na ty, kteří nás dříve vládli, a hledat vzájemně výhodnou spolupráci s nimi." # todo: NEW TRANSLATION
  MON_matters_of_internal_affairs: "Záležitosti vnitřních věcí" # todo: NEW TRANSLATION
  MON_matters_of_internal_affairs_desc: "S poklesem lidové podpory stalinského režimu po celé zemi by bylo moudré hledat jiné způsoby, jak zlepšit vnitřní stabilitu našeho ohroženého národa." # todo: NEW TRANSLATION
  MON_strengthen_buddhist_community: "Posílit buddhistickou komunitu" # todo: NEW TRANSLATION
  MON_strengthen_buddhist_community_desc: "Představa [ROOT.getAdjective] buddhismu lze popsat pouze jako pacifistickou a antirevoluční, s mnoha lamy vyjadřujícími podporu pro nastolení konzervativnější a ochrannější vlády, která neusiluje o utlačování největší a nejsilnější náboženské komunity v národě." # todo: NEW TRANSLATION
  MON_search_new_bogd_khan: "Hledat nového Bogd Khána" # todo: NEW TRANSLATION
  MON_search_new_bogd_khan_desc: "Zakázané [SOV.getAdjective] a poté i [ROOT.getAdjective] komunistickými úřady, hledání 9. reinkarnace Jebtsundamba Khutughtu lze provádět v utajení, pokud usilujeme o obnovení ceremoniální ústavní monarchie v blízké budoucnosti." # todo: NEW TRANSLATION
  MON_proclaim_the_second_bogd_khanate: "Vyhlásit druhé Bogd Khánství" # todo: NEW TRANSLATION
  MON_proclaim_the_second_bogd_khanate_desc: "" # todo: NEW TRANSLATION
  MON_guard_southern_border: "Střežit jižní hranici" # todo: NEW TRANSLATION
  MON_guard_southern_border_desc: "Zprávy z aimagů Govi-Altaj, Ömnögovi a Dornogovi ukazují zrádnou povahu místních skupin, které zneužívají slabou kontrolu vlády nad rozšířenou jižní hranicí, aby se obohacovaly pomocí neustálých nájezdů a plenění nevinných vesnic. Pošleme několik nově zformovaných eskader, aby se s touto hrozbou vypořádaly." # todo: NEW TRANSLATION
  MON_ensure_rural_support: "Zajistit venkovskou podporu" # todo: NEW TRANSLATION
  MON_ensure_rural_support_desc: "Venkovské oblasti jsou většinou nevědomé toho, co se děje ve vysoké administrativě, a někteří se cítí nejistí ohledně změn probíhajících v zemi. Usilujeme o usmíření s mnoha jejich místními staršími investicemi do jejich rozvoje. Nákladné, ale záslužné úsilí." # todo: NEW TRANSLATION
  MON_shelter_the_banished: "Ubytovat vyhnance" # todo: NEW TRANSLATION
  MON_shelter_the_banished_desc: "Naše síly vyslané do jižních aimagů hlásí zvýšený počet politických uprchlíků z blízkých států, včetně některých levicových členů a bývalých vysokých stranických činitelů z [PRC.getNameDef], což naznačuje drastické vládní změny tam. Místo aby jsme je ignorovali, můžeme využít jejich pomoc při budování nové formy komunistického státu." # todo: NEW TRANSLATION
  MON_the_new_chairman: "Nový předseda" # todo: NEW TRANSLATION
  MON_the_new_chairman_desc: "" # todo: NEW TRANSLATION
  MON_rally_the_radicals: "Svolat radikály" # todo: NEW TRANSLATION
  MON_rally_the_radicals_desc: "Panmongolismus je výrazné hnutí přítomné ve všech koutech naší velké země, přesto mnozí z těchto radikálů postrádají řádnou organizaci a podporu opozice, která je stále výrazně převažující na rozsáhlé politické scéně. Použitím nutných prostředků můžeme nepřímo zajistit, že tyto hlasy budou den za dnem silnější." # todo: NEW TRANSLATION
  MON_host_emergency_great_khural_assembly: "Pořádat mimořádné shromáždění Velkého Churalu" # todo: NEW TRANSLATION
  MON_host_emergency_great_khural_assembly_desc: "Měli jsme velký strach, ale nelze popřít: [SOV.getNameDef] a jeho úředníci oficiálně prohlásili, že již nejsou ochotni podporovat obranu našeho státu před zahraniční hrozbou. Velký Chural musí okamžitě zvolat konferenci, aby projednal státní politiku a diplomatickou orientaci současného režimu." # todo: NEW TRANSLATION
  MON_approach_japan: "Obrátit se na Japonsko" # todo: NEW TRANSLATION
  MON_approach_japan_desc: "Povídačky se šíří rychle a proto jsme otevřeni jakémukoli politickému a vojenskému zásahu od našich přímých a nepřímých sousedů. Strach z obnovené [CHI.getAdjective] okupace našich zemí je velký, a proto možná budeme muset oslovit nepřátele našich nepřátel: [JAP.getNameDef] a hledat jejich podporu v probíhajícím vládním zápasu." # todo: NEW TRANSLATION
  MON_invite_pince_su: "Pozvat prince Su" # todo: NEW TRANSLATION
  MON_invite_pince_su_desc: "Jsme si docela jisti, že zájem [JAP.getAdjective] o naše země není jen expanzivní, ale i partnerský. Někteří z jejich agentů již oslovili různé vládní činitele v nedávné minulosti a nabízeli slušný podíl zisků, pokud by [JAP.getAdjective] investoři mohli ekonomicky pomoci našemu státu a jejich poradci podpořili rozvoj naší armády." # todo: NEW TRANSLATION
  MON_launch_a_coup: "Provést puč" # todo: NEW TRANSLATION
  MON_launch_a_coup_desc: "" # todo: NEW TRANSLATION
  mongol.2.t: "Mongolsko navrhuje smlouvu o vzájemné pomoci" # todo: NEW TRANSLATION
  mongol.2.d: "Plánované setkání dnes večer mělo být bouřlivé, ale nikdo nečekal, že se vyvine tímto způsobem. Po obvyklém přípitku [SOV.getLeader] za "dělníky a rolníky jak [MON.getNameDef], tak [SOV.getNameDef]" začala diskuse na téma rozvoje společné budoucnosti pro SSSR i Mongolsko.\nA zatímco [MON.getLeader] dával přednost myšlence [MON.getAdjective] nezávislosti tváří v tvář neustále rostoucí přítomnosti a vlivu [SOV.getAdjective] v zemi, náčelník generálního štábu Gelegdorjiin Demid se obrátil na Vozhda a navrhl zvýšit spolupráci mezi národy. \n\nŠokovaná tvář [MON.getLeader] a potěšená reakce [SOV.getLeader] zanechaly mnoho otázek ohledně osudu vztahu obou vůdců. Při vysvětlování Demid poukázal na to, že "gentlemanská dohoda" z roku 1934 potřebuje přehodnotit vzhledem k alarmující přítomnosti [JAP.getAdjective] v [MEN.getNameDef] a vysokému napětí po bitvě u Khalkhyn Temple loni. Dohoda by měla zahrnovat vzájemně výhodnou průmyslovou a vojenskou spolupráci včetně vzájemných záruk nezávislosti v případě vojenského konfliktu s jiným státem. \n\nJaké bude rozhodnutí Genseka?" # todo: NEW TRANSLATION
  mongol.2.a: "Souhlasit s poskytnutím pomoci" # todo: NEW TRANSLATION
  mongol.2.b: "Opustit Mongolsko" # todo: NEW TRANSLATION
  mongol.3.t: "SSSR souhlasí se smlouvou" # todo: NEW TRANSLATION
  mongol.3.d: "Demidův návrh byl přijat s velkým nadšením mezi [SOV.getAdjective], [SOV.getLeader] přátelsky poklepal usmívajícího se mladého generála na rameno a pak s ním projednal několik konkrétních detailů smlouvy, jako jsou ekonomické investice, převod zbraní a vybavení, ubytování pro [SOV.getAdjective] vojáky, vojenské výcvikové zařízení, potenciální obranné linie, dohled pohraničního hlídkování a mnoho dalšího. \n\n[MON.getLeader], zdánlivě zapomenutý všemi kromě šéfa NKVD Yagody, který si pak dělal poznámky do svého zápisníku, byl ponechán stranou, aby pil koňak přinesený jedním z [SOV.getAdjective] generálů. O několik minut později byla diskuse o dalších revolučních tématech pokračována ve velkém kruhu." # todo: NEW TRANSLATION
  mongol.3.a: "Jsme rádi, že souhlasili." # todo: NEW TRANSLATION
  mongol.4.t: "SSSR nás opouští!" # todo: NEW TRANSLATION
  mongol.4.d: "Uváděje, že "[SOV.getNameDef] má mnoho naléhavých vnitřních problémů spolu s akutním napětím na Západě, a proto se momentálně nemůže soustředit na rozvoj Dálného východu", [SOV.getLeader] odmítl návrh podepsat "Smlouvu o přátelství a spolupráci" za současných okolností. \n\nZklamaný Demid byl později spatřen, jak tiše diskutuje s nadšeným [MON.getLeader] o tom, na co by se Mongolsko mělo zaměřit v dalším kole jednání." # todo: NEW TRANSLATION
  mongol.4.a: "Dobrá, pokud si to přejí" # todo: NEW TRANSLATION
  mongol.5.t: "Mongolsko navrhuje zaměřit se na vlastní soběstačnost" # todo: NEW TRANSLATION
  mongol.5.d: "Delegace [MON.getAdjective], vedená [MON.getLeader], dlouho prosazovala pojem [MON.getAdjective] soběstačnosti v otázkách obranných výdajů a jejich mezinárodních vztahů v regionu Dálného východu. Ačkoliv jsou de jure nezávislý stát, zůstávají silně závislí na naší ekonomické, průmyslové a vojenské pomoci, de facto jsou řízeným, nebo abychom byli pragmatičtější, loutkovým státem. \nVzhledem k rostoucí přítomnosti [JAP.getAdjective] v Mandžusku s jejich hladovými výhledy na naše transbajkalské bohaté oblasti bychom mohli zvýšit naši přítomnost a rozmístit jednotky na [MON.getAdjective] půdě. Na druhé straně by takový krok mohl zvýšit již tak alarmující napětí mezi nimi a [JAP.getNameDef]. \nPo zvážení všech pro a proti se [SOV.getLeader] rozhodl, že..." # todo: NEW TRANSLATION
  mongol.5.a: "...tyto podmínky jsou přijatelné." # todo: NEW TRANSLATION
  mongol.5.b: "...raději podpoříme naše "bratry"." # todo: NEW TRANSLATION
  mongol.6.t: "[SOV.GetAdjective]ové schválili žádost" # todo: NEW TRANSLATION
  mongol.6.d: "Po zvážení [SOV.getLeader] přesvědčivě prohlásil, že záležitosti vnitřní politiky a vládních výdajů [MON.getAdjective] jsou "záležitostí [MON.getAdjective]ho původu a měly by být vedeny pouze jimi," a schválil naši žádost o autonomii v těchto oblastech. Některé z [SOV.getAdjective] vojenských jednotek zůstanou v klíčových regionech několik měsíců, aby zajistily bezpečnost zranitelných pohraničních oblastí. \nS úspěchem této myšlenky se konečně můžeme soustředit na posun [MON.getadjective] do požadovaného politického směru, bez rizika [SOV.getAdjective] zásahů, zatím." # todo: NEW TRANSLATION
  mongol.6.a: "Výborně!" # todo: NEW TRANSLATION
  mongol.7.t: "SSSR stále zvažuje poslat podporu" # todo: NEW TRANSLATION
  mongol.7.d: ""Nic není naléhavější než obrana lidové revoluce a bezpečí komunistických režimů v našich bratrských státech" - prohlášení [SOV.getLeader] jasně naznačilo, že nevidí důvod nám umožnit ani omezenou autonomii v těchto záležitostech. \nZklamaný [MON.getLeader] byl spatřen, jak s obavami hledá podporu mezi ostatními členy [MON.getAdjective] delegace, z nichž mnozí byli viditelně nespokojeni kromě generálního velitele v čele Demida, který byl pro intenzivnější [SOV.getAdjective]-[MON.getAdjective] vojenskou spolupráci." # todo: NEW TRANSLATION
  mongol.7.a: "Dobrá tedy" # todo: NEW TRANSLATION
  mongol.8.t: "Vyhrožovat [SOV.getLeader] Japonskem?" # todo: NEW TRANSLATION
  mongol.8.d: "[SOV.getAdjective]ové mohou stále podceňovat hrozbu, kterou se v posledních letech stalo [JAP.getNameDef]. Je moudré jim připomenout, kdo je skutečným nepřítelem revoluce a hlavním imperialistou východní Asie. \n\nNa druhou stranu, vzhledem k tomu, že impulzivní a svobodomyslný [MON.getLeader] vede naši delegaci a pravděpodobně by byl prohlášení proneseno způsobem, řekněme, neobvyklým a provokativním, může být lepší toto téma nezvedat, protože [SOV.getLeader] nemusí být v náladě takové výroky slyšet." # todo: NEW TRANSLATION
  mongol.8.a: "Udělej to!" # todo: NEW TRANSLATION
  mongol.8.b: "Přehodnoťme to" # todo: NEW TRANSLATION
  mongol.9.t: "[MON.getLeader] nám vyhrožuje Japonskem" # todo: NEW TRANSLATION
  mongol.9.d: "Pomalý a tichý rozhovor o revolučních prostředcích v obou našich státech, následovaný [SOV.getLeader] vyprávěním o jeho proletářské činnosti, byl náhle přerušen silně opilým [MON.getLeader], který vstal ze židle, vykřikl na Vozhda "Ty zasraný Gruzíne, stal ses virtuálním ruským carem", přiblížil se k Gensekovi, dal mu facku a křičel "dokonce i [JAP.getAdjective] jsou lepšími spojenci než ty", po čemž se nad konferenčním sálem rozhostilo mrtvé ticho. \n\nNikdo předtím nic podobného Gensekovi neudělal, což vyvolává otázku, jak [SOV.getLeader] na to zareaguje?" # todo: NEW TRANSLATION
  mongol.9.a: "Uvědomme si, že hrozba je reálná" # todo: NEW TRANSLATION
  mongol.9.b: "Ignorovat to" # todo: NEW TRANSLATION
  mongol.9.c: "Je Genden pro-japonský agent?" # todo: NEW TRANSLATION
  mongol.10.t: "[SOV.GetAdjective]ové posílají pomoc" # todo: NEW TRANSLATION
  mongol.10.d: "Důrazný projev [MON.getLeader] o moderním [SOV.getAdjective] carovi, který se stará hlavně o své vlastní dobro, přiměl mnoho zahraničních delegací uvědomit si, že něco je v jejich pohledu na situaci na Dálném východě rozhodně špatně, a po rozhovorech byla uvolněná [MON.getAdjective] delegace pozvána ke zpřísnění dohody posilující spolupráci mezi našimi dvěma národy! \n\n[MON.getLeader] byl večer jednoznačně hrdinou, přestože [SOV.getLeader] zůstal většinu večera zjevně rozmrzelý, tiše seděl ve svém křesle v temném koutě místnosti a hovořil s Genrikh Yagodou o některých "nerelevantních vnitřních záležitostech"." # todo: NEW TRANSLATION
  mongol.10.a: "To fungovalo? Hurá!" # todo: NEW TRANSLATION
  mongol.11.t: "Vedení SSSR ignoruje hrozbu" # todo: NEW TRANSLATION
  mongol.11.d: "Pomalu si plníc novou dýmku tabákem, [SOV.getLeader] poukázal na [MON.getLeader] a vyjádřil své nejhlubší obavy o duševním stavu současného zástupce [MON.getNameDef], naznačující, že nadměrná konzumace alkoholu a rvačky nepřivedou žádného diplomata na stranu oponenta v diskusi. Navíc to nebude ospravedlnitelné metodou proti těm malým problémovým skupinám na Východě. \n\nO několik minut později [SOV.getLeader] vydal směrnici, která byla oznámena vrchnímu velení Unie, že východní hrozba je nejnižší důležitosti a [SOV.getAdjective] úředníci mají "důležitější věci na starosti", jasně ukazující opovržení vůči zuřivému nepříteli jako je [JAP.getNameDef]." # todo: NEW TRANSLATION
  mongol.11.a: "Vypadá to, že jsme sami" # todo: NEW TRANSLATION
  mongol.12.t: "[SOV.GetAdjective]ové uvěznili Gendena?!" # todo: NEW TRANSLATION
  mongol.12.d: "Odpověď Genseka byla pomalá a klidná, jako by mu vládnoucí ticho dalo sílu mluvit. \nZa prvé poukázal na zbytečnost takových argumentů, zvláště vzhledem k faktu, že NKVD pracuje na případu mnohem déle, než [MON.getLeader] drží svou funkci. \nZa druhé [SOV.getLeader] zpochybnil "podivnou" frázi o "přátelení se s Japonskem", zda opravdu [MON.getAdjective]ové uvažují o apelování na ochranu těch, kdo utlačují dělnickou třídu. A třetí a nakonec, ukázal na [MON.getLeader] a pozorujíc jeho vyděšenou tvář, zpochybnil jeho oddanost Revoluci a Otci národů, Vladimiru Iljiči Leninovi. \n\nO několik minut později několik úředníků NKVD vedených Genrikhem Yagodou vstoupilo do místnosti a laskavě požádalo opilého [MON.getLeader], aby je následoval do osobní diskuse o tak rozžhaveném tématu. Očekává se, že zbytek delegace brzy opustí Moskvu, aby doručil zprávu do Ulaanbaataru." # todo: NEW TRANSLATION
  mongol.12.a: "Co teď můžeme dělat?" # todo: NEW TRANSLATION
  mongol.13.t: "[MON.GetAdjective] delegace se vrací do Ulaanbaataru" # todo: NEW TRANSLATION
  mongol.13.d: "Delegace složená z [MON.getLeader], Gelegdorjiin Demida a několika dalších stranických činitelů se konečně vrátila z Moskvy po přibližně měsíční absenci ve vládních strukturách. Nejprve cestovali vlakem do Irkutsku, kde jim byla poskytnuta několik [SOV.getAdjective] automobilů a nákladních vozů, aby skupině zajistili bezpečný návrat do [MON.getAdjective]ho hlavního města. \n\nPo všech jednáních, diplomatických manévrech, nabídkách a proti-nabídkách jsou konečně zpět ve svých kancelářích a svolávají Sedmé shromáždění Velkého Churalu za pár dní, aby projednali výsledky konference a stanovili nový směr země pro nadcházející roky." # todo: NEW TRANSLATION
  mongol.13.a: "Jaké novinky budou brzy představeny?" # todo: NEW TRANSLATION
  mongol.14.t: "[MON.GetAdjective] vlak se vrátil prázdný" # todo: NEW TRANSLATION
  mongol.14.d: "Eskorta delegace složená z dvanácti tělesných strážců a několika pomocníků čekala na hlavním nádraží v Irkutsku už několik dní, avšak vlak s delegací dorazil až nyní s částí členů, kteří tvrdili, že Genden zůstal v Moskvě, aby projednal nějaké "naléhavé a velmi nutné záležitosti" v místním hotelu na Lubyance, jak jim informovali někteří z [SOV.getAdjective]. \n\nJeden z Gendenových tělesných strážců, vzpomínajíc na své dřívější zkušenosti ze studií v Moskvě, okamžitě vyjádřil obavy o budovu centrály NKVD se stejným jménem, čímž naznačil, že náš statečný vůdce byl tam uvězněn..." # todo: NEW TRANSLATION
  mongol.14.a: "Kde je náš vůdce?!" # todo: NEW TRANSLATION
  mongol.15.t: "[GetYear] Velký Chural svolán" # todo: NEW TRANSLATION
  mongol.15.d: "Zasedání Sedmého shromáždění Státního Velkého Churalu nebylo nikdy tak plné jako dnes. Mnoho ministrů, zástupců, nižších státních úředníků a členů tisku nyní upírá pohled na hlavní podium, kde se nacházejí vůdci delegace připraveni oznámit shrnutí hodin a dnů jednání vedených v Moskvě s jejich [SOV.getAdjective]mi protějšky. \n\nPo kole bouřlivých ovací se hlava delegace, [MON.getLeader], zvedne ze židle, stovky zvědavých a netrpělivých očí upírají pohled na pevné držení premiéra, dosáhne k mikrofonu a pronesne jedinou větu..." # todo: NEW TRANSLATION
  mongol.15.a: "[SOV.GetAdjective]ové nám poskytli pomoc!" # todo: NEW TRANSLATION
  mongol.15.b: "Naše soběstačnost byla zajištěna!" # todo: NEW TRANSLATION
  mongol.15.c: "Byli jsme jimi opuštěni!" # todo: NEW TRANSLATION
  mongol.19.t: "Zjištěno nadměrné pohybování [MON.getAdjective] armád" # todo: NEW TRANSLATION
  mongol.19.d: "Naše pohraniční hlídky nahlásily zvýšený počet [MON.getAdjective] jednotek hromadících se na jedné z našich hranic během posledních dnů. Nedávno zachycené radiové komunikace naznačují, že plánují nějakou vojenskou operaci na našem území. \nS jejich přesným cílem momentálně neznámým je zřejmé, že tyto regimentu nejsou pro nic dobrého a je zapotřebí rychlá akce a proti-reakce od našich vojáků, aby efektivně bránili proti nově vzniklé hrozbě." # todo: NEW TRANSLATION
  mongol.19.a: "Poslat rozkaz držet pozice za každou cenu!" # todo: NEW TRANSLATION
  mongol.19.b: "Máme jiné starosti než s těmi bandity." # todo: NEW TRANSLATION
  mongol.20.t: "Malý nájezd úspěšný" # todo: NEW TRANSLATION
  mongol.20.d: "Vyslaný eskadron efektivně pronikl přes nepřátelské obranné pásmo a čelíce malému až žádnému odporu se podařilo infiltrovat místní vesnici přestrojení za místní milici, zmocnit se některých nedostatečně střežených zbraní z místních skladů, naložit je na koně a zmizet ve tmě, aniž by vyvolali poplach nebo ublížili civilistům v oblasti. \n\nCestou zpět do základny naši vojáci nahlásili některé varianty zbraní, které lze využít k vylepšení našich vlastních designů - velmi vítaný přírůstek k použití při dalším nájezdu." # todo: NEW TRANSLATION
  mongol.20.a: "Přinést trofeje a studovat je!" # todo: NEW TRANSLATION
  mongol.21.t: "Malý nájezd selhal" # todo: NEW TRANSLATION
  mongol.21.d: "Útočná skupina vyrazila podle plánu a nepotkavši odpor úspěšně překročila spornou hranici s cílem dorazit do místního osídlení před východem slunce, když byly naše síly náhle přepadeny neznámou útočnou silou. Zdá se, že byl připraven dobře vykonaný léčka, jako by byl každý krok našich sil předvídán. \n\nNaše jednotky dokázaly zajistit bezpečný průchod a rychle se stáhnout do našich vlastí. Někteří jsou zraněni, mnozí ztratili své zbraně a ještě více z nich je demoralizováno zdánlivě nadřazeným nepřítelem." # todo: NEW TRANSLATION
  mongol.21.a: "Morálka našich vojáků je zlomena..." # todo: NEW TRANSLATION
  mongol.22.t: "Ofenzíva zastavena" # todo: NEW TRANSLATION
  mongol.22.d: "Na horizontu byl zpozorován jistý pohyb, když náš nájezdní oddíl postupoval do nepřátelských zemí. O několik hodin později byla naše brigáda potkána postupující nepřátelskou skupinou, přičemž krátká výměna se změnila v zuřivou bitvu poté, co byly vypáleny některé výstřely netrpělivými vojáky na obou stranách. \n\nVýměna palby trvala několik hodin a obě strany se stáhly do svých velitelství, aby se reorganizovaly, nabraly sil a doplnily munici. Cíl operace bohužel nebyl splněn, avšak některé taktiky a manévry nám umožnily získat cenné zkušenosti." # todo: NEW TRANSLATION
  mongol.22.a: "Velmi dobře. Naše jednotky se poučily." # todo: NEW TRANSLATION
  mongol.23.t: "Malý nájezd odražen" # todo: NEW TRANSLATION
  mongol.23.d: "Rychlá mobilizace našich rezerv a rychlé nasazení sil zabránily potenciální katastrofě. \nKdyž postupující [MON.getAdjective] jednotky pronikaly hlouběji do našeho území, ostražité pohraniční pluky je sledovaly a pozorovaly situaci z dálky, zatímco běžné jednotky připravovaly bojiště pro tyto ničím netušící bandity. \n\nKrátce před tím, než mohla začít plánovaná hlavní bitva, jeden z našich impulzivních velitelů nařídil jednotkám zapojit se do boje, čímž umožnil ostatním stranám následovat rychlý postup a tím pádem umožnil nájezdníkům uniknout pravděpodobnému obklíčení a zmizet ve tmě, přičemž však zanechali mnoho zbraní, které můžeme využít ve svůj prospěch." # todo: NEW TRANSLATION
  mongol.23.a: "Vítězství pro náš lid!" # todo: NEW TRANSLATION
  mongol.24.t: "Malá [MON.GetAdjective] skupina přepadla naše hranice" # todo: NEW TRANSLATION
  mongol.24.d: "Dříve během dne pohraniční hlídka objevila stopy zjevného nepřátelského eskadronu, který překročil naši hranici nejpozději před několika dny. Stopy a otisky podkov naznačují, že nepřátelský tým se skládal z několika desítek lehce vyzbrojených mužů doprovázených jízdním regimentu, následovali cestu vedoucí k místnímu muničnímu skladu, úspěšně odzbrojili nic netušící stráže a odešli následující noc, odnášejí většinu přítomné munice ze zařízení. \n\nPověst "Duchových jezdců" se už začíná šířit mezi místním obyvatelstvem. Do sporné oblasti bude vyslána malá policejní posádka, aby dohlížela na ochranu regionu během příštích několika týdnů." # todo: NEW TRANSLATION
  mongol.24.a: "Přišli jsme o pár cenných mužů a zdrojů!" # todo: NEW TRANSLATION
  mongol.25.t: "Dosaženo patové situace" # todo: NEW TRANSLATION
  mongol.25.d: "Nepřátelský nájezd byl zpozorován několika pozorovatelnými sedláky, kteří okamžitě předali znepokojivou zprávu kapitánovi místního policejního oddílu, jež vyslal "setkávací delegaci" do sporné oblasti s cílem zpomalit postup nepřítele. \n\nPo krátkém kole jednání obě strany otevřely palbu, tvrze že ony pouze usilují o obranu svých zájmů a eliminaci rostoucí hrozby z druhé strany. Boje pokračovaly až do tmy, když se nepřítel shromáždil zbylé síly a stáhl se, zanechávajíc naše vojáky, aby hojili rány a poučili se z tohoto střetu." # todo: NEW TRANSLATION
  mongol.25.a: "Velmi dobře. Naše jednotky se poučily." # todo: NEW TRANSLATION
  mongol.26.t: "Střední nájezd úspěšný" # todo: NEW TRANSLATION
  mongol.26.d: "Několik týdnů intenzivního plánování a pečlivých příprav se vyplatilo, protože několik našich divizí proniklo přes nepřátelskou hranici na více místech, později se setkaly a překonaly místní posádku chránící vojenskou základnu, infiltrovaly muniční sklady a získaly více variant moderního vojenského vybavení pro naše použití. \n\nPoté, co se spustil poplach, naše eskadrony skryly získané nástroje a bezpečně je přenesly na naši stranu hranice přes dobře zajištěné a chráněné koridory. Místní velitel s nadšením hlásil, že nové kusy lze použít k vybavení našich jednotek nebo využít pro vědecké účely." # todo: NEW TRANSLATION
  mongol.26.a: "Další vybavení k použití! Úžasné!" # todo: NEW TRANSLATION
  mongol.26.b: "Velmi dobře. Použít je pro testování." # todo: NEW TRANSLATION
  mongol.27.t: "Střední nájezd odražen" # todo: NEW TRANSLATION
  mongol.27.d: "Rychlý a poněkud bezohledný postup našich ozbrojených sil byl zachycen pohraniční hlídkou nepřítele, která okamžitě otevřela palbu na místě, zatímco naše jednotky si držely výhodu vyvýšeného terénu a snažily se vytvořit zpevněnou obrannou pozici a přeskupit formace pro obnovený útok, než dorazí nepřátelské posily do sporné oblasti. \n\nNepřítel se zdál být dobře obeznámen s našimi taktikami, protože dříve než mohl začít náš protiútok, provedl nepřátelský jízdní regiment manévr na obkličování, způsobil chaos na hůře bráněných křídlech a zlikvidoval část našich sil v boji zblízka, čímž umožnil zbytku průnikové skupiny sesbírat otřesené přeživší, vytvořit můstek do našich vlastí a stáhnout se, jak se setmělo." # todo: NEW TRANSLATION
  mongol.27.a: "Mnoho matek dnes postrádá své syny..." # todo: NEW TRANSLATION
  mongol.28.t: "Postup nájezdní skupiny zpožděn" # todo: NEW TRANSLATION
  mongol.28.d: "První fáze operace proběhla podle plánu ve většině oblastí zájmu s jednou jedinou, přesto zásadní výjimkou. Očekávalo se, že regiment zaútočí na jednu z opevněných nepřátelských pozic a přeruší komunikační linky, což dalo ostatním našim silám nezbytný čas pro infiltraci sporné oblasti bez větších potíží. \n\nČervený poplach však byl vyhlášen poté, co zadrhlá puška jednoho z našich vojáků vystřelila zdánlivě náhodný výstřel, což donutilo nepřítele ke zblízka boji s našimi jednotkami. Okno příležitosti prošlo a bez signálu k pokračování se zbylé síly musely stáhnout do výchozích pozic, zatímco již zapuštěný oddíl úspěšně evakuoval celou vojenskou skupinu, aby nahlásil velitelskému sboru vzniklou nehodu." # todo: NEW TRANSLATION
  mongol.28.a: "Vylepšit naše regimenta." # todo: NEW TRANSLATION
  mongol.28.b: "Dobře. Přemýšlej o jiné taktice k poučení." # todo: NEW TRANSLATION
  mongol.29.t: "Střední nájezd zničen" # todo: NEW TRANSLATION
  mongol.29.d: "Naivní nepřátelští vetřelci si mysleli, že se mohou pohybovat po našich zemích a ohrožovat náš lid těmito otravnými útoky na civilní a vojenské cíle! Naše pohraniční hlídky totiž nahlásily úspěšné zničení nepřátelské nájezdné skupiny, která se snažila krást a plenit naše země! \n\nNepřátelské postupy byly odhaleny a jejich skupina byla zadržena v oblasti, kde strategická výhoda byla na naší straně, což umožnilo statečnému jízdnímu eskadronu obklíčit nepřítele a udeřit do srdce těchto škůdců, přinucujíc pozůstatky banditů ustoupit. Trofeje jsou předávány vojákům a místní velitel získává další medaili!" # todo: NEW TRANSLATION
  mongol.29.a: "Jsme hrdí na naši milici a armádu!" # todo: NEW TRANSLATION
  mongol.30.t: "[MON.GetAdjective] divize přepadly náš muniční sklad" # todo: NEW TRANSLATION
  mongol.30.d: "Poté, co místní posádka hraniční vojenské základny selhala v komunikaci, byla vyhlášena plná mobilizace ozbrojených sil v regionu a před šířením paniky bylo vyhlášeno vojenské stanné právo. \n\nJen o několik hodin později, když rychle postupující jízda dosáhla pozic, byl viditelný celý hrůzný rozsah nepřátelského počínání: celé zařízení postrádalo nejen výrobní materiály, ale i stroje a nedávno vyrobené a uskladněné vybavení. S takovými těžkými škodami na ekonomice a vojenských schopnostech je zásadní zajistit, že se něco takového nebude v budoucnu opakovat." # todo: NEW TRANSLATION
  mongol.30.a: "Budeme mít hodně co obnovovat od nynějška" # todo: NEW TRANSLATION
  mongol.31.t: "Nájezdní skupina zachycena" # todo: NEW TRANSLATION
  mongol.31.d: "Jedna z našich opevněných oblastí vyhlásila celonárodní poplach poté, co infiltrovavší se nepřátelská skupina vypálila neznámý výstřel. Nicméně vojáci byli nasazeni na pozice snažící se zatlačit nepřítele z dobře zřízených obranných linií. \n\nBoj pokračoval ještě několik hodin a bez jasné převahy jedné strany se nepřítel stáhl, nechávajíc místní posádku přemýšlet o možných motivech takového bezohledného nájezdu. Ostatní pohraniční hlídky také hlásily nárůst nepřátelské aktivity ve svých oblastech zájmu." # todo: NEW TRANSLATION
  mongol.31.a: "Jsme vždy připraveni odrazit jejich útoky!" # todo: NEW TRANSLATION
  mongol.31.b: "Skvěle! Poučme se od nepřítele." # todo: NEW TRANSLATION
  mongol.35.t: "Zabývání se Gendenem" # todo: NEW TRANSLATION
  mongol.35.d: "Na nedávném zasedání Velkého Churalu byly veřejnosti předloženy protokoly naší diplomatické mise, odhalující celou kontroverzi kolem jednání a jednacích taktik některých členů delegace. \n\nJedno z jmen bylo zmiňováno častěji než ostatní a je to bývalý premiér Peljidiin Genden. Zatímco někteří vidí jeho chování jako známku železné vůle a silné nezkrotnosti, jiní vidí jeho provokativní jednání jako nedostatek dovedností, vzdělání a důvtipu, což naznačuje, že taková osoba nemůže v budoucnu zastávat vysoký politický úřad. \n\nMáme k dispozici různé možnosti, jak postupovat. Jaké bude rozhodnutí moudrého [MON.getLeader]?" # todo: NEW TRANSLATION
  mongol.35.a: "Nechat ho zůstat v úřadu jako ministr zahraničí." # todo: NEW TRANSLATION
  mongol.35.b: "Nutit ho do předčasného odchodu do důchodu." # todo: NEW TRANSLATION
  mongol.35.c: "Takové chování nelze tolerovat, zatknout, nebo ještě lépe, zavraždit ho!" # todo: NEW TRANSLATION
  mongol.36.t: "Smrt Gelegdorjiina Demida" # todo: NEW TRANSLATION
  mongol.36.d: "Dnes ráno vládní kancelář obdržela znepokojivou zprávu ze železniční stanice Tajga u Novosibirsku: celá delegace včetně vojenského génia Gelegdorjiina Demida, velitele sboru G. Djantsanhororlose, tajemníka [MON.getAdjective] velvyslanectví v [SOV.getNameDef] Gombosurena, hlavního armádního překladatele T. Dorjiieva a jeho manželky L. Dagsmy byla včera večer nalezena mrtvá ve svých spacích oddílech ve vlaku. \n\nPodle zprávy poskytnuté [SOV.GetAdjective]mi kriminalisty je příčinou smrti otrava jídlem z špatně skladovaných konzervovaných ryb. Incident je velmi nešťastným zvratem událostí pro naši zemi, ale možná šťastným pro někoho jiného? Uvidíme..." # todo: NEW TRANSLATION
  mongol.36.a: "Suspiciousní shoda okolností?!" # todo: NEW TRANSLATION
  mongol.37.t: "Bat-Ochiryn Eldev-Ochir vyjadřuje obavy" # todo: NEW TRANSLATION
  mongol.37.d: "Jeden z vůdců levicové opozice, Bat-Ochiryn Eldev-Ochir, přišel dnes večer do kanceláře [MON.getLeader] po skončení pracovní doby, aby projednal "velmi naléhavou záležitost". \n\nOsvětlen stolní lampou v kanceláři Eldev-Ochir tiše hovořil o tom, že mnoho elitních straníků nyní žije v obavách o svůj život vzhledem k rychlým změnám v politickém klimatu země. Zmínil také, že pokud Choibalsan získá další vojenské nebo vládní povýšení, jeho železný stisk nad zemí kombinovaný s kontakty v NKVD by mohl pohlcovat zemi do další dekády politického násilí, což je třeba zabránit." # todo: NEW TRANSLATION
  mongol.37.a: "Choibalsan je příliš nebezpečný, připravme vzpouru." # todo: NEW TRANSLATION
  mongol.37.b: "Ujistit ho, že je všechno v pořádku." # todo: NEW TRANSLATION
  mongol.38.t: "Levicoví převzali moc!" # todo: NEW TRANSLATION
  mongol.38.d: "Ranní zasedání Státního Churalu bylo přerušeno davem, který se shromáždil před budovou, aby demonstroval proti nedávno přijatým zákonům, tvrzíce, že tyto slouží pouze vládnoucí elitě, nikoli obyčejným mužům a ženám. Parlamentní garda byla rychle posílena, aby zabránila dalšímu narušení zákonodárného procesu. \n\nPo několika hodinách křiku dav pustil své vůdce vpřed, kteří oznámili stráži, že ti, kdo sedí v parlamentní budově, jednají ve svém osobním zájmu a nikoli v zájmu mas, předložili důkazy o vládní korupci. A zatímco byla garda rozptýlena, několik ozbrojených mužů se podařilo nenápadně vniknout do budovy, přerušit komunikace a zrušit parlamentní zasedání, následované ceremoniálním postupem, kdy se [MON.getLeader] vzdal své pozice premiéra a převedl moc na "přechodného" ministra Bata-Ochiryna Eldev-Ochira." # todo: NEW TRANSLATION
  mongol.38.a: "Je to pro vyšší dobro" # todo: NEW TRANSLATION
  mongol.39.t: "Choibalsan spouští puč!" # todo: NEW TRANSLATION
  mongol.39.d: "Navzdory oznámení úředníků Státního Malého Churalu, že politický kurz země se znovu přikloní doleva na příštích pět let, značná část venkovského obyvatelstva pod vedením pro-[SOV.getAdjective] elementů organizovala masivní demonstrace napříč zemí. V konfliktu s policií někteří protestující získali střelné zbraně a začali plenit špatně bráněné muniční sklady po celé zemi, údajně s cílem vytvořit neregulérní milice bojující za sesazení vlády! \n\nNemůžeme dovolit, aby nějací militantí potlačili svobodnou vůli lidu násilím; nadešel čas obnovit pořádek v zemích, které jsme určeni vládnout!" # todo: NEW TRANSLATION
  mongol.39.a: "Na zbraně!" # todo: NEW TRANSLATION
  mongol.40.t: "Mongolsko usiluje o těsnější vazby" # todo: NEW TRANSLATION
  mongol.40.d: "Uvědomujíc si křehkost jejich nově nastoleného režimu, [MON.getNameDef] vyslalo diplomatickou misi, aby zajistila našim úředníkům, že jejich interpretace komunismu se shoduje s naším pohledem na něj. \n\nDelegace také předložila několik návrhů smluv, které by posílily vazby mezi našimi dvěma zeměmi a přisoudily vládní směr Mongolska k směru, který je vnímán [ROOT.getNamedef] a jeho vedením tváří v tvář [SOV.getLeader], čímž by jejich režim účinně proměnili v dozorovaný stát námi." # todo: NEW TRANSLATION
  mongol.40.a: "Velmi dobře, nastal čas." # todo: NEW TRANSLATION
  mongol.40.b: "Není to strategicky důležité." # todo: NEW TRANSLATION
  mongol.41.t: "[SOV.getAdjective]ové souhlasili s těsnějšími vazbami" # todo: NEW TRANSLATION
  mongol.41.d: "Náš návrh rozšířené spolupráce mezi našimi dvěma státy byl přijat s velkým nadšením [SOV.getAdjective]mi úředníky a po několika kolech diskuse o tom, jak různé vnitřní a vnější záležitosti budou vedeny, bylo dohodnuto, že následující den podepíšeme "[SOV.getAdjective]-[MON.getAdjective] Traktát o vedení a pomoci". \n\nDohoda účinně upevňuje [SOV.getAdjective] kontrolu nad státním aparátem v naší zemi, což nám umožní přesunout naše vládní úsilí na posílení postavení země na mezinárodní scéně a snažit se ovlivňovat naše přímé sousedy při prosazování revoluční věci v zahraničí." # todo: NEW TRANSLATION
  mongol.41.a: "Jsme rádi, že to slyšíme." # todo: NEW TRANSLATION
  mongol.42.t: "Sovětští odmítli žádost" # todo: NEW TRANSLATION
  mongol.42.d: "Navzdory našemu nejlepšímu úsilí a upřímným příslibům věčné aliance [SOV.getLeader] oficiálně odmítl naši skromnou nabídku, uvedl, že "interpretace principů marxismu-leninismu [MON.getAdjective] má několik ideologických rozdílů a za současných okolností neumožňuje vládním strukturám obou zemí posílit vnitřní a vnější spolupráci". \n\nVzhledem k takovému neočekávanému vývoji bude nejlepší posílit naši vlastní diplomatickou základnu a prosazovat žádoucí komunistické myšlenky vlastními prostředky a metodami." # todo: NEW TRANSLATION
  mongol.42.a: "No dobře, zvládneme to i sami." # todo: NEW TRANSLATION
  mongol.49.t: "Skrytá konspirace?" # todo: NEW TRANSLATION
  mongol.49.d: "Revoluční prostředky našeho komunistického režimu byly dlouho zpochybňovány mezi různými vrstvami obyvatel, z nichž mnozí mají buď cizí původ, náboženské zázemí nebo netradiční státní smýšlení. Navzdory našemu nejlepšímu úsilí převychovat mnoho vůdců těchto společností a odvrátit je od zkažených nápadů kapitalistického, imperialistického nebo autokratického původu, jejich hlasy stále burácejí mezi lidem, rozhoupávají loajalitu a vzbuzují pochybnosti v myslích našich mužů a žen. \n\nPočáteční vyšetřování ukazuje, že celý propagandistický úsilí těchto lidí lze vystopovat až k jedinému kruhu populárních osobností, které jsou navzájem vázané jedním či druhým způsobem. \n\nNaznačujíc, že koordinují své úsilí, ministr vnitra Khorloogiin Choibalsan vypracoval plán, jak dekapitovat konspiraci a zabezpečit stát před sestupem do další série povstání a vzpour." # todo: NEW TRANSLATION
  mongol.49.a: "Nastal čas" # todo: NEW TRANSLATION
  mongol.50.t: "Otázka inteligence" # todo: NEW TRANSLATION
  mongol.50.d: "Vzdělání našeho obyvatelstva se vyvíjí lépe než kdy dříve, přesto nové knihy a studijní materiály potenciálně zasadily kapitalistické nebo nacionalistické myšlenky do hlav našich občanů. \nMnoho mladých specialistů, kteří se vrátili z výměnných pobytů ve [SOV.GetNameDef], obohatilo naše školy, instituty a výzkumná centra. Přesto zůstává otázkou, nakolik jsou důvěryhodní? \n\nKolik z nich nese potenciální semínka kontrarevoluce a lze jim věřit? Potřebujeme to vědět jistě a metody jsou dobře známé..." # todo: NEW TRANSLATION
  mongol.50.a: "Proveďte masivní kontroly pomocí trojek." # todo: NEW TRANSLATION
  mongol.50.b: "Máme jiné starosti." # todo: NEW TRANSLATION
  mongol.51.t: "Přeskupení strany" # todo: NEW TRANSLATION
  mongol.51.d: "Naše strana je rozdělena mezi levicové jako Choibalsan, pravičáky jako Anandyn Amar a hudonety, jako bývalý premiér Peljidiin Genden. Extrémní rozdělení strany vedlo k pravičáckým kapitalistickým reformám 1926–1928 a k devastaci způsobené radikálním levicovým přístupem ke kolektivizaci 1928–1932. \n\nDrastické vládní změny mají negativní dopad na životy našeho lidu. Neustálé posuny politického kompasu lze vysvětlit mnoha faktory, ale hlavní důvod je jasný: naše strana je infiltrována zahraničními agenty a kolaboranty [JAP.GetNameDef] nebo [CHI.GetNameDef]. To nelze tolerovat a několik podezřelých členů bude muset být odstraněno z vlády jedním nebo druhým způsobem." # todo: NEW TRANSLATION
  mongol.51.a: "Zaměřit všechny do výběru a pečlivě ověřit loajalitu." # todo: NEW TRANSLATION
  mongol.51.b: "Možná je problém v našem úhlu pohledu?" # todo: NEW TRANSLATION
  mongol.52.t: "Problém s lámami" # todo: NEW TRANSLATION
  mongol.52.d: "Buddhismus je hluboce zakořeněn v myslích a srdcích našich občanů, přičemž 10 % obyvatel země jsou lámy a mniši. Takový masivní blok moci nelze opomenout: povstání roku 1932 a spiknutí Lhumbe z roku 1933 jasně ukazují potřebu intervence, než se situace stane příliš napjatou. Naštěstí již máme zkušenosti s omezením moci lám od nástupu Choibalsana k moci. \n\nZůstat loajální k [SOV.GetAdjective]ům, jejich vůdci [SOV.GetLeader] a principům komunismu znamená, že tuto operaci musíme provést co nejdříve." # todo: NEW TRANSLATION
  mongol.52.a: "Nemáme jinou možnost." # todo: NEW TRANSLATION
  mongol.52.b: "Buddhismus nese pravého ducha [MON.GetAdjective]ho lidu!" # todo: NEW TRANSLATION
  mongol.53.t: "Otázka vedení" # todo: NEW TRANSLATION
  mongol.53.d: "Naši informátoři shromáždili důkazy o plánovaném převzetí vlády pro-[JAP.getAdjective] kolaboranty a imperialistické poslušné psy, kteří se podařilo pašovat zbraně přes špatně chráněné oblasti hranice a uskladnit je na známých místech. Některé zajaté telegrafy zmiňovaly "vyšší ešelony moci", zatímco nedávno získaný dopis ukazuje na současného vůdce země, [MON.getLeader]. \n\nDalší vyšetřování poukázalo na několik dalších politiků, kteří jsou v pravidelném kontaktu s kontrarevolučními elementy. \n\nS dostatečnými důkazy potřebujeme stíhat odpovědné a jmenovat nového předsedu pro nadcházející nejisté časy." # todo: NEW TRANSLATION
  mongol.53.a: "Choibalsan je jedinou logickou volbou." # todo: NEW TRANSLATION
  mongol.54.t: "[MON.getLeader] onemocněl!" # todo: NEW TRANSLATION
  mongol.54.d: "K pozdnímu večeru včera [MON.getLeader] jako obvykle pracoval na jednom z nejnovějších vládních dekretů týkajících se vnitřní situace naší prosperující země. Když neodpověděl na volání své sekretářky, ta dorazila do kanceláře a našla obroušeného Giganta Myšlení na podlaze jeho kabinetu. \n\nOkamžitě dopraven do nemocnice v Ulaanbaataru byl prohlédnut místními lékaři a byl mu diagnostikován vážný zdravotní stav, který mu v budoucnu zabrání efektivně vládnout zemí. \n\nZůstává neznámo, zda se stav zhorší, ale je vždy lepší být ostražitý." # todo: NEW TRANSLATION
  mongol.54.a: "Co s tím můžeme dělat?" # todo: NEW TRANSLATION
  mongol.55.t: "Nový nástupce strany?" # todo: NEW TRANSLATION
  mongol.55.d: "Po dlouhou dobu se mezi lidem naší země šířily zvěsti o fyzickém a duševním zdraví [MON.getLeader], o tom jak to ovlivňuje jeho rozhodování a celkový mezinárodní prestiž země zastoupené [MON.GetHerselfHimself]. \n\nZdá se, že náš vůdce již plánoval a zvažoval předání moci mladší generaci komunistů, z nichž někteří zcela potvrdit státní politiku v blízké budoucnosti. \n\nPo zvážení se [MON.getLeader] rozhodl, že předsedou strany bude..." # todo: NEW TRANSLATION
  mongol.55.a: "Tsedenbal, neboť prokázal svou loajalitu k věci" # todo: NEW TRANSLATION
  mongol.55.b: "Předseda? Proč ne předsedkyně?" # todo: NEW TRANSLATION
  mongol.56.t: "Mongolsko žádá anexe!" # todo: NEW TRANSLATION
  mongol.56.d: "Naše ekonomické vazby a politický vliv dosáhly tak bezprecedentních výšin, že nová [MON.getAdjective] vláda vydala otevřený dekret, kde jejich mladé shromáždění oznámilo rozhodnutí připojit se k [SOV.getNameDef] jako integrální republika nebo autonomní okrug. \n\nNavzdory našim bratrským vazbám je vysoce důležité si zachovat reputaci Velké, avšak neútlačující mocnosti. Navíc, pokud nechceme, aby nás ostatní světové mocnosti považovaly za tvrdé imperialisty, bude lepší nechat tyto čisté duše jejich osudu." # todo: NEW TRANSLATION
  mongol.56.a: "Proč ne?" # todo: NEW TRANSLATION
  mongol.56.b: "Nesmíme být imperialisté za žádných okolností!" # todo: NEW TRANSLATION
  mongol.57.t: "[SOV.getAdjective]ové odmítli naši žádost" # todo: NEW TRANSLATION
  mongol.57.d: "Uvádějíce, že bratrství našich národů bude mnohem výhodnější, pokud obě země si zachovají nezávislý status, [SOV.getLeader] zdvořile odmítl pokornou žádost našeho mladého shromáždění o anexe. \n\nV tajném telegramu nám Ústřední úřad oznámil, že mezinárodní tlak na [SOV.getAdjective] vládu je již dost vysoký, a proto raději zachovají současný diplomatický status našich národů." # todo: NEW TRANSLATION
  mongol.57.a: "Pokud si to přejí..." # todo: NEW TRANSLATION
  mongol_khalkin_gol.1.t: "Přípravy [MON.getAdjective] manévrů detekovány!" # todo: NEW TRANSLATION
  mongol_khalkin_gol.1.d: "Před několika hodinami naše místní velitelské středisko obdrželo zprávu, že malý jízdní eskadron zřejmě [MON.getAdjective]ho původu o počtu kolem 70 až 90 mužů přešel hranici v blízkosti řeky Nomonhan a ustavil se tam, jasně naznačující, že oblast je nyní pod jejich kontrolou. \n\nO několik hodin později náš pluk jízdních vojsk vynutil ústup nepřítele jen aby se vetřelci později vrátili v početnější síle. Zpravodajství naznačuje větší počet jednotek hromadících se na jejich straně hranice, zdánlivě připravených provést vojenskou operaci v regionu." # todo: NEW TRANSLATION
  mongol_khalkin_gol.1.a: "Požádat o zahraniční pomoc" # todo: NEW TRANSLATION
  mongol_khalkin_gol.1.b: "Mobilizovat síly!" # todo: NEW TRANSLATION
  mongol_khalkin_gol.2.t: "[MON.getAdjective] vítězství u Khalkhin Gol!" # todo: NEW TRANSLATION
  mongol_khalkin_gol.2.d: "Naše počáteční neúspěchy v boji proti imperialistům dokázaly demoralizovat vysoké velení [761.Controller.getNameDef], protože v následujících dnech někteří z jejich bezohledných generálů vydávali různé sebevražedné rozkazy svým vojákům, kdy byli nuceni zahájit útok za útokem, snažící se dobýt opevněné pozice našich vojáků chráněné několika dobře umístěnými kulomety... s odpovídajícími výsledky vysokých ztrát na lidech a vybavení. \n\nPodařilo se nám také zajmout několik tanků a studovat je, abychom vyvinuli nebo zlepšili naše vlastní pancéřové návrhy." # todo: NEW TRANSLATION
  mongol_khalkin_gol.2.a: "Problém je konečně vyřešen" # todo: NEW TRANSLATION
  mongol_khalkin_gol.2.b: "Velké vítězství pro náš lid!" # todo: NEW TRANSLATION
  mongol_khalkin_gol.3.t: "[761.Controller.getAdjective] vítězství u Khalkhin Gol!" # todo: NEW TRANSLATION
  mongol_khalkin_gol.3.d: "Počáteční fáze invaze byla brilantně provedena [MON.getAdjective]mi jednotkami, které rychle postoupily do sporné oblasti regionu Nomonhan a obsadily levý břeh řeky Khalkhin Gol, vyměnily původní hraniční kameny a posílily hraniční opevnění v regionu. \n\nToto však nezastavilo ozbrojené síly [761.Controller.getNameDef], které později obsadily pozice zpět a odrazily veškeré útoky konfliktující strany, čímž zabezpečily svou dominanci v regionu. \n\nPo týdnech bojů se [MON.getAdjective] velvyslanci omluvili za nepříjemnosti a přijali stav hranice takový, jaký je, což znamená rozhodující [761.Controller.getAdjective] vítězství v tomto konfliktu." # todo: NEW TRANSLATION
  mongol_khalkin_gol.3.a: "Konflikt je u konce. Prozatím." # todo: NEW TRANSLATION
  mongol_khalkin_gol.3.b: "Budeme potřebovat nějaký čas na zotavení z toho!" # todo: NEW TRANSLATION
  mongol_khalkin_gol.4.t: "Žádné rozhodující vítězství..." # todo: NEW TRANSLATION
  mongol_khalkin_gol.4.d: "Stálá rotace jednotek v kombinaci s intenzivním používáním radiové techniky, leteckého průzkumu a řádným řízením podpůrných sil zabránila kterékoli straně využít potenciální prolom v nepřátelských liniích a zabránila jakémukoli rozhodujícímu průlomu, který by mohl zvrátit průběh bitvy ve prospěch jedné strany. \n\nTýdny bojů vyčerpaly bojující strany a bylo dohodnuto příměří, po němž se obě strany vrátily k původním demarkačním čarám." # todo: NEW TRANSLATION
  mongol_khalkin_gol.4.a: "Tento hraniční spor bude jistě znovu vznesen." # todo: NEW TRANSLATION
  mongol_khalkin_gol.5.t: "Escalace u Khalkhin Gol!" # todo: NEW TRANSLATION
  mongol_khalkin_gol.5.d: "Není známo, kdo přišel s tímto nápadem první, ale některým dobrodružným vojákům se rozhodlo obklíčit obklíčeného nepřítele a zapojit se do bojů na novém území! Takové chování vedlo k rozšíření konfliktu do nových oblastí, drasticky eskalovalo již tak vážnou situaci a donutilo naše vojsko nasadit více a více jednotek do sporné oblasti. \n\nDnes ráno nám zahraniční velvyslanec doručil nótu, že naše jednotky musí opustit sporné území nebo čelit následkům v podobě oficiálního vyhlášení války, pokud nebudeme vyhovovat do několika hodin! \n\nJasně, náš nepřítel hledá válku a ukážeme jim, jak se tyto záležitosti řeší!" # todo: NEW TRANSLATION
  mongol_khalkin_gol.5.a: "Přivést všechny dostupné síly!" # todo: NEW TRANSLATION
  mongol_khalkin_gol.6.t: "Zájem [SOV.getAdjective] o manévry" # todo: NEW TRANSLATION
  mongol_khalkin_gol.6.d: "Zpráva od našich partnerů [SOV.getNameDef] naznačuje, že jejich úředníci jsou dobře vědomi napětí mezi našimi a [761.Controller.getAdjective]mi ozbrojenými silami v regionu a pokud by kterákoli strana zvýšila svou přítomnost v oblasti v následujících dnech nebo týdnech, jsou připraveni vyslat malý kontingent sil, aby asistovali našemu boji ve sporném regionu. \n\nVšechno má však cenu a takový krok by rozhodně posílil jejich pozice v naší armádě, ať už si to přejeme nebo ne. Pokud to ovšem nezvládneme sami..." # todo: NEW TRANSLATION
  mongol_khalkin_gol.6.a: "Pozvat [SOV.getAdjective] poradce" # todo: NEW TRANSLATION
  mongol_khalkin_gol.6.b: "Tuto záležitost zvládneme sami" # todo: NEW TRANSLATION
  mongol_democratic.1.t: "Útok na Velký Chural!" # todo: NEW TRANSLATION
  mongol_democratic.1.d: "Občanské nepokoje v venkovských částech země vyvolaly vážné obavy zástupců aimagů z různých regionů země, kteří se shromáždili na mimořádném zasedání Velkého Churalu svolaném před několika týdny. \n\nVšechno šlo podle pořadu dne, dokud zástupci aimagů Khantii a Dornod nevystoupili s vášnivým projevem o revolučních prostředcích a oddanosti komunistickým ideálům, který byl náhle přerušen skupinou neznámých mužů, kteří postříleli některé strážce Churalu a zároveň vhodili několik granátů mezi panikářské skupiny zástupců. \n\nV eruptovaném chaosu mnoho poslanců padlo za oběť útoku, než byli všichni vetřelci postříleni zbývajícími strážemi. \n\nTakový průběh může znamenat jen jedno:" # todo: NEW TRANSLATION
  mongol_democratic.1.a: "Teroristický útok!" # todo: NEW TRANSLATION
  mongol_democratic.1.b: "Intervence!" # todo: NEW TRANSLATION
  mongol_democratic.2.t: "Pokus o převrat s podporou [SOV.getAdjective]" # todo: NEW TRANSLATION
  mongol_democratic.2.d: "Zklamáni nedávným vývojem a prováděním státních politik začaly různé skupiny lidí otevřeně projevovat protesty a organizovat demonstrace vyžadující změnu politického režimu a zrušení reforem zavedených [ROOT.getLeader]! \n\nA zatímco dříve policie dokázala protestující rozehnat mírnými i méně mírnými prostředky, tentokrát si někteří protestující opatřili střelné zbraně a získali zapalovací zbraně neznámého původu, čímž donutili místní policii ustoupit do vládní čtvrti Ulaanbaataru. Dav poté postavil stany před ústřední kanceláří předsedy vlády a neustále požadoval jeho rezignaci. \n\nO několik dní později se naše policejní oddíly posílené teritoriálními jednotkami podařilo rozptýlit dav a zatknout vůdce protestů. Při výslechu někteří z nich přiznali připravy k otevřenému [SOV.getAdjective] povstání proti vládě v západních částech země! Naši informátoři z těchto oblastí potvrzují, že s nepřítelem musí být jednáno jedním rázným úderem našich ozbrojených sil." # todo: NEW TRANSLATION
  mongol_democratic.2.a: "Čas useknout hlavu hadovi!" # todo: NEW TRANSLATION
  mongol_democratic.3.t: "[From.GetNameDefCap] žádá záruky" # todo: NEW TRANSLATION
  mongol_democratic.3.d: "Tvrdíce, že demokratické základy nikdy neměly pevný úchop ve Střední Asii, diplomaté [FROM.getAdjective] oslovili naše zahraniční velvyslance na jednom z výročních mezinárodních setkání a požádali o oficiální záruku podpory „v zájmu stability a prosperity v asijském regionu“. \n\nNavzdory jistým ideologickým rozdílům, velkým geografickým vzdálenostem a některým minulým sporům se jejich vláda zdá být více než připravena posílit své diplomatické instituce a vstoupit na světovou scénu chráněná [ROOT.getNameDef]. Všechno, co máme udělat, říkají, je oznámit naši diplomatickou podporu jejich věci." # todo: NEW TRANSLATION
  mongol_democratic.3.a: "Budou skvělým spojencem v budoucnu" # todo: NEW TRANSLATION
  mongol_democratic.3.b: "Promiňte, kdo žádá O NAŠI podporu?" # todo: NEW TRANSLATION
  mongol_democratic.4.t: "[FROM.getNamedefCap] souhlasí nás chránit" # todo: NEW TRANSLATION
  mongol_democratic.4.d: "Tvrdíce důležitost zabezpečení různých demokratických institucí po celém světě, [FROM.getAdjective] velvyslanec předložil podepsanou smlouvu, která uvádí: \n\n"Od nynějška a dokud bude trvat civilizace, pokud se [ROOT.getNamedef] zaváže chránit demokracii v okolí sebe, [FROM.getNamedef] se všemi svými vojenskými a ekonomickými silami podpoří myšlenku svobody a sebeurčení, budou respektovat hranice a usilovat o těsnější diplomatické vazby!" \n\nJasné diplomatické vítězství a další záruka naší vnitřní bezpečnosti na světové scéně, hurá!" # todo: NEW TRANSLATION
  mongol_democratic.4.a: "Diplomacie vítězí!" # todo: NEW TRANSLATION
  mongol_democratic.5.t: "[FROM.getNamedefCap] odmítá poskytnout ochranu" # todo: NEW TRANSLATION
  mongol_democratic.5.d: "Navzdory našemu nejlepšímu úsilí zahraniční velvyslanec s lítostí informoval naši delegaci, že [FROM.getNamedef] nemá diplomatické ani vojenské prostředky, aby zajistil ochranu demokratických institucí v [ROOT.getNamedef]. \n\nNěkteří z našich radikálních poslanců už vyjádřili pochyby, zda [FROM.getLeader] vůbec dokáže najít naši zemi na mapě, vzhledem ke stavu oficiální odpovědi zahraniční vlády." # todo: NEW TRANSLATION
  mongol_democratic.5.a: "Vypadá to, že jsme sami..." # todo: NEW TRANSLATION
  mongol_democratic.6.t: "[MON.getNamedefCap] svolává své diplomaty" # todo: NEW TRANSLATION
  mongol_democratic.6.d: "Dnes ráno byl nad [MON.getAdjective] velvyslanectvím spatřen stoupající tmavý kouř, jasně ukazující, že někteří z jejich úředníků pálí nebo ničili některé státní dokumenty. \n\nNa oficiální dotaz ohledně činností delegace zástupci [MON.getNameDef] předložili zvláštní dekret o "okamžitém uzavření všech konzulátů a velvyslanectví [MON.getNameDef] přítomných v [ROOT.getNameDef]", čímž naznačili oficiální přerušení diplomatických vztahů z jejich strany." # todo: NEW TRANSLATION
  mongol_democratic.6.a: "Přichází válka?" # todo: NEW TRANSLATION
  mongol_democratic.7.t: "[MON.getNamedefCap] svolává své diplomaty z [FROM.getNamedefCap]" # todo: NEW TRANSLATION
  mongol_democratic.7.d: "Postoj [MON.getAdjective] vůči různým nepřátelům lidu není nic nového, přesto jejich nedávný diplomatický krok šokoval mnoho našich lidí: [MON.getNamedefCap] veřejně oznámilo, že již nebudou vést žádná diplomatická jednání s režimy podobnými těm z [FROM.getNamedefCap]. \n\nNavíc se zdá, že [MON.getAdjective] ozbrojené síly mobilizují značné množství rezerv, zatímco diplomaté země aktivně opouštějí nyní diplomaticky izolovanou zemi." # todo: NEW TRANSLATION
  mongol_democratic.7.a: "Konečně čas postavit se této hrozbě" # todo: NEW TRANSLATION
  mongol_democratic.8.title: "[MON.getAdjective] diplomatická mise otevírá jednání o zahraniční alianční spolupráci" # todo: NEW TRANSLATION
  mongol_democratic.8.desc: "\nNaše zpravodajské služby hlásí zvýšenou aktivitu [MON.getAdjective]ho ministerstva zahraničí a jejich diplomaté navštěvují jiné země, což lze vnímat jako snahu navázat přátelské vztahy s některými potenciálními spojenci. \n\nNicméně zůstává nejasné, zda budou tato jednání plodná nebo ne, a proto musíme být o vznikající situaci informováni a očekávat nejhorší výsledek pro nás." # todo: NEW TRANSLATION
  mongol_democratic.8.a: "Měli bychom zůstat ostražití" # todo: NEW TRANSLATION
  mongol_democratic.10.t: "Mongolsko žádá o usmíření" # todo: NEW TRANSLATION
  mongol_democratic.10.d: "Delegace z Mongolska navázala kontakty s Komisí pro záležitosti Mongolska a Tibetu, snažíce se vyřešit probíhající spory ohledně role Vnějšího Mongolska a našich požadavků na něj. \n\nAčkoliv oficiálně neutrální, [MON.getNamedef] se zdá, že se postupně přibližuje do naší sféry vlivu, poskytujíc nám jedinečnou příležitost spojit největší národ Středního stepi, který drží klíč k břišní oblasti ruského Dálného východu. \n\nMěli bychom usmířit naše ambice a zajistit stabilitu severní hranice?" # todo: NEW TRANSLATION
  mongol_democratic.10.a: "Odložíme naše rozdíly, prozatím" # todo: NEW TRANSLATION
  mongol_democratic.10.b: "Máme s nimi jiné plány" # todo: NEW TRANSLATION
  mongol_democratic.11.t: "[FROM.getNamedefCap] souhlasí s usmířením" # todo: NEW TRANSLATION
  mongol_democratic.11.d: "Uvědomujíce si strategický význam naší země a usilujíce o udržení jejich loajality k jejich věci, [FROM.getAdjective] úředníci z Mongolské komise oznámili stažení minulých nepřátelství a obnovení, pokud ne přátelských, tak alespoň neutrálních vztahů mezi našimi dvěma národy. \n\nPostavení se stranou Číny by mohlo potenciálně odcizit ostatní regionální mocnosti, ale má to opravdu význam?" # todo: NEW TRANSLATION
  mongol_democratic.11.a: "Diplomacie vítězí!" # todo: NEW TRANSLATION
  mongol_democratic.12.t: "[FROM.getNamedefCap] neprojevuje zájem o naše usmíření" # todo: NEW TRANSLATION
  mongol_democratic.12.d: "Naše delegace obdržela zdvořilé odmítnutí od [FROM.getAdjective] zástupců, kteří uznávají boj našeho lidu za uznání a sebeurčení, přesto jejich vláda má momentálně "důležitější věci na starosti a nemůže se proto soustředit na tyto diplomatické iniciativy". \n\nUčinili jsme maximum, abychom rozuměli s centrální vládou a pokud nechtějí spolupracovat, možná by jiné regionální mocnosti ano?" # todo: NEW TRANSLATION
  mongol_democratic.12.a: "Zvážíme i jiné možnosti" # todo: NEW TRANSLATION
  mongol_democratic.15.t: "[FROM.getNamedefCap] apeluje na naše úředníky ohledně odmítnutí nároků" # todo: NEW TRANSLATION
  mongol_democratic.15.d: "[FROM.getAdjective] úředníci, snažící se posílit spolupráci mezi našimi národy, zahájili žádost Mongolské a Tibetské komise oznamující jejich touhu zmírnit napětí mezi našimi dvěma zeměmi pro pokojné a blahobytné soužití. \n\nVedoucí delegace uvedl, že po nesčetně let [ROOT.getNameDef] tvrdošíjně požadovalo území Vnějšího Mongolska jako autonomní region v rámci Číny Proper, což je otázka k diskuzi vzhledem k principu sebeurčení v jejich zemi. \n\nHledajíce přiblížení místo eskalace je jejich národ připraven poskytnout některé ústupky pro přepracování nároků na jejich území. Vzájemně výhodná dohoda pro obě strany, zdá se." # todo: NEW TRANSLATION
  mongol_democratic.15.a: "Požadovat ukázku politické podpory" # todo: NEW TRANSLATION
  mongol_democratic.15.b: "Žádat dodávky zbraní" # todo: NEW TRANSLATION
  mongol_democratic.15.c: "Požádat o průmyslové koncese" # todo: NEW TRANSLATION
  mongol_democratic.15.e: "Požadovat převedení vojenského průmyslu" # todo: NEW TRANSLATION
  mongol_democratic.16.t: "[FROM.getNamedefCap] požaduje ukázku politické podpory" # todo: NEW TRANSLATION
  mongol_democratic.16.d: "Loajalita znamená vše v těchto nejistých časech a [FROM.getLeader], to pochopiv, požadoval ukázku loajality k politickému boji [FROM.getNameDef] v rámci tributární diplomatické návštěvy. \n\nPřestože se to jeví jako nákladná nabídka, byli jsme ujištěni, že jiné způsoby platby by pro nás mohly být ještě tvrdší." # todo: NEW TRANSLATION
  mongol_democratic.16.a: "Nutné závazek" # todo: NEW TRANSLATION
  mongol_democratic.17.t: "[FROM.getNamedefCap] žádá zbraně" # todo: NEW TRANSLATION
  mongol_democratic.17.d: "Snažíc se posílit svou současnou stálou armádu, [FROM.getLeader] nás požádal o poskytnutí vojenského vybavení a garnizon "nejlepších z nejlepších", kteří budou vysláni jako dobrovolní regionální jednotky bojovat v [FROM.getAdjective] válkách. \n\nNaši diplomaté dokázali vyjednat druhou část podmínek, což nám umožnilo poslat pouze požadované zbraně na druhou stranu." # todo: NEW TRANSLATION
  mongol_democratic.17.a: "Dobrá dohoda?" # todo: NEW TRANSLATION
  mongol_democratic.18.t: "[FROM.getNamedefCap] žádá přesun civilního zařízení" # todo: NEW TRANSLATION
  mongol_democratic.18.d: "Naše nacionalizace průmyslu na začátku posledního desetiletí odvedla [FROM.getAdjective] kapitál a mnoho [FROM.getNameDef] obchodníků ztratilo své práce a úspory. \n\nTvrdíce, že takový nešťastný vývoj musí být napravenu, [FROM.getLeader] požádal o vrácení "správného majetku" zpět do jejich rukou..." # todo: NEW TRANSLATION
  mongol_democratic.18.a: "Hodná oběť" # todo: NEW TRANSLATION
  mongol_democratic.19.t: "[FROM.getNamedefCap] požaduje převedení vojenského průmyslu" # todo: NEW TRANSLATION
  mongol_democratic.19.d: "Vojenská kliky v [FROM.getNameDef] má zjevně silné pozice ve vládě, neboť jejich úředníci požadovali převod vojenských zařízení v regionu zájmu, pokud chceme, aby sporný nárok byl stažen. \n\nZa těchto okolností upustí od jakýchkoli expanzionistických myšlenek na těchto územích, protože cena je příliš vysoká..." # todo: NEW TRANSLATION
  mongol_democratic.19.a: "No..." # todo: NEW TRANSLATION
  mongol_democratic.20.t: "[FROM.getNameDefCap] žádá ochranu" # todo: NEW TRANSLATION
  mongol_democratic.20.d: "Obdrželi jsme podivnou žádost od [FROM.getNameDef], kde jejich úředníci, zaujímající silně pro-[ROOT.getAdjective] postoj, oznámili touhu připojit se zpět k říši [ROOT.getNameDef] jako autonomní region, čímž by velice přispěli k bezpečnosti Vnější hranice a výrazně rozšířili náš vliv do Velké stepi. \n\nJaké bude konečné rozhodnutí? Povolíme odtrženému regionu návrat do dědictví?" # todo: NEW TRANSLATION
  mongol_democratic.20.a: "Samozřejmě, proč bychom měli odmítnout?" # todo: NEW TRANSLATION
  mongol_democratic.20.b: "Nezajímá nás to" # todo: NEW TRANSLATION
  mongol_democratic.21.t: "Status protektorátu potvrzen" # todo: NEW TRANSLATION
  mongol_democratic.21.d: "Vysoké úřady [FROM.getLeader] nás ujistily, že naše žádost byla přezkoumána a okamžitě přijata bez známky váhání! \n\nV ranním projevu před národem [FROM.getLeader] oznámil den oslav, neboť jeden z bývalých území Vnější hranice se vrátil pod říši Velké Číny a nyní bude přispívat k ekonomickému růstu, vojenské síle a znovusjednocení celého čínského národa! Nadšený dav vítá "dlouho ztracené bratry a sestry" pod praporem čínských svazů!" # todo: NEW TRANSLATION
  mongol_democratic.21.a: "Skvělý den pro náš lid!" # todo: NEW TRANSLATION
  mongol_democratic.22.t: "Status protektorátu odmítnut" # todo: NEW TRANSLATION
  mongol_democratic.22.d: "Naši nejlepší diplomaté se s upřímnými přísliby nezmohli přesvědčit tvrdohlavé [FROM.getAdjective] úředníky, aby nám umožnili vstoupit do jejich říše jako autonomní region. \n\nTvrdíce, že "není v jejich zájmu podkopávat kontrolu nad odtrženou provincií minulosti", naše druhé odvolání bylo nakonec rovněž odmítnuto!" # todo: NEW TRANSLATION
  mongol_democratic.22.a: "Nezajímají se?!" # todo: NEW TRANSLATION
  mongol_democratic.24.t: "Mongolsko zvedá otázku Tuvy" # todo: NEW TRANSLATION
  mongol_democratic.24.d: "Agresivní rétorika [MON.getAdjective] úředníků vůči sousedům v kombinaci s proradikálním čínským postojem vyvolala oprávněné obavy mnoha našich politiků. \n\nZdá se, že [MON.getNameDef] prosazuje propagandu za sjednocený mongolský stát v hranicích z roku 1911, včetně Uryankhay kraje, který je domovem mnoha Tuvanů a Rusů. \n\nVynaložíme veškeré úsilí, abychom zajistili, že národ zůstane v našich rukou v těchto znepokojivých a nebezpečných časech." # todo: NEW TRANSLATION
  mongol_democratic.24.a: "Uděláme vše, abychom je od sebe drželi" # todo: NEW TRANSLATION
  mongol_genden.1.t: "Politika „Zbohatnout“ oznámena" # todo: NEW TRANSLATION
  mongol_genden.1.d: "Ekonomická politika "Nového směru" a její úspěch byly těžce přerušeny zrušením neoficiální vládní iniciativy "Zbohatnout", kde byli všichni občané země povzbuzováni k hromadění kapitálu pro osobní a kolektivní stabilitu. \n\nSnažící se znovu upevnit své pozice po celé zemi, Genden se snaží sjednotit a obohatit své lidi za každou cenu, bez ohledu na to, jak tvrdé by některé důsledky mohly být. \n\nNově oznámená politika má být posílena po celou zemi na rok a má pomáhat chudým rolníkům a dělníkům, přičemž Ústřední výbor bude sledovat pokrok při implementaci prostřednictvím měsíčních ekonomických zpráv. \n\nČas ukáže, jak úspěšná bude." # todo: NEW TRANSLATION
  mongol_genden.1.a: "Vpřed, soudruzi!" # todo: NEW TRANSLATION
  mongol_genden.2.t: "Občané zakládají novou dílnu" # todo: NEW TRANSLATION
  mongol_genden.2.d: "Někteří z našich nadšených soudruhů údajně založili občanskou dílnu schopnou vyrábět zboží pro spotřebitelské použití, což umožní snížit ekonomickou závislost aimagů na hlavním městě. \n\nNěkteří místní se již připojují do pracovního procesu zatímco místně zvolení předáci dohlížejí na výrobu a přerozdělování zboží pro civilní potřeby pod přísnou kontrolou vlády z hlavního města." # todo: NEW TRANSLATION
  mongol_genden.2.a: "Skvělá práce!" # todo: NEW TRANSLATION
  mongol_genden.3.t: "Nové zařízení na výrobu zbraní postaveno" # todo: NEW TRANSLATION
  mongol_genden.3.d: "Vzhledem k logistickým nedostatkům při zásobování místní posádky a jejich zoufalé potřebě moderních palných zbraní místní občané shromáždili dostatek prostředků k vybudování muničního skladu a upravené infrastruktury určené k zásobování puškami a dalším zbrojním vybavením pro potřeby lidu. \n\nNěkteré z návrhů zbraní se zdají být na úrovni, jakou produkují naši oficiální výrobci, ne-li lepší!" # todo: NEW TRANSLATION
  mongol_genden.3.a: "Zbraně do rukou lidu!" # todo: NEW TRANSLATION
  mongol_genden.4.t: "Místní silnice rozšířeny" # todo: NEW TRANSLATION
  mongol_genden.4.d: "Různé stavební společnosti byly podpořeny štědrými dary od našich občanů, což umožnilo zlepšit silniční spojení po celé zemi a posílit kontrolu lidu nad divokou přírodou regionu. \n\nTakový rozvoj by měl mít pozitivní dopad na výkonnost našich pozemních sil, které budou mít prospěch z moderní logistiky." # todo: NEW TRANSLATION
  mongol_genden.4.a: "Můžeme pokračovat tímto směrem!" # todo: NEW TRANSLATION
  mongol_genden.5.t: "Lidé opevňují své domy" # todo: NEW TRANSLATION
  mongol_genden.5.d: "Snažíc se zachovat své nasbírané kapitály, někteří z obávající se občanů údajně rozšířili své sklepy a postavili řadu opevnění v a kolem svých domů. Zjevně neočekávaný zvrat událostí, vzhledem k tomu, že jsou pod ochranou našich slavných ozbrojených sil. \n\nTato opevnění se ale mohou ukázat jako užitečná, pokud je použijí naši obránci v čase války." # todo: NEW TRANSLATION
  mongol_genden.5.a: "Cože, oni to UDĚLALI?" # todo: NEW TRANSLATION
  mongol_genden.6.t: "Zjištěn korupční plán" # todo: NEW TRANSLATION
  mongol_genden.6.d: "Analýza toků kapitálu za poslední měsíc ukázala, že některé vládní prostředky byly převedeny mezi různými knihami Sbaerkassy, než nakonec skončily na spořicích účtech několika našich poslanců. \n\nDalší vyšetřování Výboru pro boj proti korupci jasně ukazuje dobře maskovaný korupční schéma. \n\nNaši vyšetřovatelé však potřebují další čas a finance k dokončení analýzy a sestavení zprávy. Co uděláme nyní?" # todo: NEW TRANSLATION
  mongol_genden.6.a: "Perzekvovat zodpovědné!" # todo: NEW TRANSLATION
  mongol_genden.6.b: "Začít dlouhý oficiální proces." # todo: NEW TRANSLATION
  mongol_genden.7.t: "Chybí výrobní materiál" # todo: NEW TRANSLATION
  mongol_genden.7.d: "Jeden z předáků naší továrny podal zprávu o chybějícím výrobním materiálu z výrobních linek. Záležitost se stala zřejmou teprve poté, co balicí stanice nebyla schopna naplnit zbývajících pět z dvou set kontejnerů se zbožím. \n\nZůstává neznámo, kdo by mohl být potenciálním sabotážníkem, ale mnoho továrních dělníků už oznámilo, že jsou ochotni pracovat několik hodin navíc, aby naplnili vládní požadavky. Jak statečné a odpovědné od nich!" # todo: NEW TRANSLATION
  mongol_genden.7.a: "Budeme muset zvýšit výrobní kvóty na tento měsíc." # todo: NEW TRANSLATION
  mongol_genden.8.t: "Inflace roste" # todo: NEW TRANSLATION
  mongol_genden.8.d: "S tím, jak lidé hromadí kapitál v tak bezprecedentních číslech, musí vládní agentury zasáhnout a regulovat trh spolu s jeho požadavky a poptávkou, aby se předešlo kolapsu národní měny. \n\nTaková intervence je nákladná a časově náročná, kterou může a musí řídit pouze Centrální banka, která obdrží příkaz regulovat ekonomiku pro příští období." # todo: NEW TRANSLATION
  mongol_genden.8.a: "Mongolbank z toho ponese následky." # todo: NEW TRANSLATION
  mongol_genden.10.t: "Problém se sympatizanty [SOV.getAdjective]" # todo: NEW TRANSLATION
  mongol_genden.10.d: "Pozorujíc nedávný politický vývoj v [SOV.getNameDef], [ROOT.getLeader] ve svých dlouhých filozofických debatách se svými podřízenými dospěl k názoru, že budování komunismu silně závisí na základech vnitřních a vnějších agentů schopných podporovat "správného" vládce při jeho nástupu k moci zevnitř i zvenčí požadované země. \n\nA vzhledem k tomu, jak silná role [SOV.getAdjective] politiků byla při výstavbě komunismu v Mongolsku, stále tu vyvstává otázka, zda někteří lidé v vládě země stále preferují pro-[SOV.getAdjective] směr jednání k dosažení svých osobních či společných cílů. \n\nPo dlouhém zvážení se [ROOT.getLeader] rozhodl vyřešit tuto záležitost jednou provždy." # todo: NEW TRANSLATION
  mongol_genden.10.a: "Nejsme jako oni, žádné čistky nebudou provedeny!" # todo: NEW TRANSLATION
  mongol_genden.10.b: "Odstranit pouze nejradikálnější prvky." # todo: NEW TRANSLATION
  mongol_genden.10.c: "Nenechat nikoho naživu, aby zajistili bezpečnost!" # todo: NEW TRANSLATION
  mongol_genden.14.t: "Genden se vrací do Mongolska!" # todo: NEW TRANSLATION
  mongol_genden.14.d: "Po všech bojích a strastech, kterými jsme museli projít, konečně dorazila zpráva o jeho návratu do Ulaanbaataru! \n\nDoprovázen malou eskortou čtyř lidí vystoupil z dopravního prostředku, který ho dopravil na [SOV.getAdjective]-[MON.getAdjective] hranici a kterou překročili před úsvitem. Když vkročil na kroky své vlasti, hrdina našeho boje o přežití byl spatřen, jak šťastně zdraví naše lidi se slzami radosti stékajícími po jeho ztenčeném a unaveném obličeji. \n\nNásledující den se konal oficiální ceremoniál, kde veřejně oznámil svůj návrat do vlasti před tisíci a tisíci lidmi v naději obnovit zemi, kterou byl kdysi nucen opustit v době boje!" # todo: NEW TRANSLATION
  mongol_genden.14.a: "Všichni jsme rádi, že se vrátileš!" # todo: NEW TRANSLATION
  mongol_genden.15.t: "Genden popraven v SSSR!" # todo: NEW TRANSLATION
  mongol_genden.15.d: "Místní rezident NKVD doručil malou poznámku do kabinetu [ROOT.getLeader] s nálepkou "Naprosto tajné". Poznámka obsahovala protokoly o zadržení a výslechu Gendena, který byl rozpoznán na jedné z železničních stanic pozorným [SOV.getAdjective] úředníkem. \n\nVe svých posledních dnech života byl Genden shledán vinným z kontrarevolučních aktivit, sabotáží nesčetných diplomatických misí a špionáže ve prospěch [JAP.getNameDef] a jejich loutkových režimů. Všechno výše uvedené bylo potvrzeno a podepsáno samotným Gendenem. \n\nNavzdory některým snahám našich diplomatů byl jeho proces rychlý a jeho trest nebylo možné vyjednat..." # todo: NEW TRANSLATION
  mongol_genden.15.a: "Bude nám chybět" # todo: NEW TRANSLATION
  mongol_genden.15.b: "Dobrá zpráva" # todo: NEW TRANSLATION
  mongol_genden.16.t: "Objevena západní trasa!" # todo: NEW TRANSLATION
  mongol_genden.16.d: "Získané plány železnic ukazují, že Genden bude odeslán na své "dovolené místo" na Krymu vlakem vyjíždějícím z Moskvy následující týdny západní železnicí přes tato města:\nKaluga \nBryansk \nShostka \nKyjev \nKirovohrad \nDnipropetrovsk \nSevastopol \n\nNaši agenti již navázali spojení s některými taktickými skupinami působícími v oblasti, které navrhly způsobit veřejné povyražení v [UKR.getAdjective]m hlavním městě Kyjevě, což by poskytlo perfektní příležitost pro našeho milovaného Gendena uniknout v eruptujícím chaosu útoku." # todo: NEW TRANSLATION
  mongol_genden.16.a: "Kyjev je tedy cílem." # todo: NEW TRANSLATION
  mongol_genden.17.t: "Objevena jižní trasa!" # todo: NEW TRANSLATION
  mongol_genden.17.d: "Plánovaný vlak má odjet jihovýchodní železniční linkou, projíždějící přes taková hlavní okresní centra jako:\nTula \nOrel \nKursk \nBělgorod \nCharkov \nStalino \nSevastopol \n\nTrasa má několik potenciálních slabých míst, avšak vzhledem k charakteru železnic a silné přítomnosti NKVD je riskantní zaútočit přímo na vlak nebo nádraží. Podařilo se nám však najít kontakty na zvláště oportunistické úředníky v několika depotech, přičemž nejnadějnější je Charkov. \n\nPokud nabídneme významný úplatek místním představitelům, mohou zorganizovat přerezervování několika vlaků ve stejný čas, což nám umožní buď naskočit Gendenovi na jiný vlak, nebo přesměrovat vlakové jízdní řády na požadované místo." # todo: NEW TRANSLATION
  mongol_genden.17.a: "Charkovu se tedy dostane štědré "darování"." # todo: NEW TRANSLATION
  mongol_genden.18.t: "Objevena jihovýchodní trasa!" # todo: NEW TRANSLATION
  mongol_genden.18.d: "Zvláštní trasa se zdá být otevřena teprve nedávno a vede z jihozápadních předměstí Moskvy, procházející výhradně ruským územím, zjevně kompletně obcházející Ukrajinu. \n\nVlak má projít městy \nLipetsk \nVoronež \nMillerovo \nRostov \nKrasnodar \nNovorossijsk \na Genden má být následně přepraven na Krym lodí, čímž se jakákoli šance na záchranu stane nemožnou. \n\nOblast kolem Rostova, ač na první pohled působí velmi bezpečně, má obyvatele, kteří se zdají mít zkušenosti s rychlými a agresivními útoky na pohybující se cíle z dob Velké války a Rudé revoluce..." # todo: NEW TRANSLATION
  mongol_genden.18.a: "Rostov? Koho tam máme?" # todo: NEW TRANSLATION
  mongol_genden.19.t: "Železniční stanice v Kyjevě zničena!" # todo: NEW TRANSLATION
  mongol_genden.19.d: "Další rutinní ráno na kyjevském nádraží se proměnilo v úplný chaos, když po několika výbuchu začaly betonové stěny krásné budovy nádraží chvět se a metr tlusté ocelové nosníky se začaly ohýbat, neschopné unést tíhu stropu, než se velká část nádraží zhroutila pod vlastní vahou a zničila několik nákladních vlaků stojících v areálu. \n\nNaštěstí zazněl poplach včas a několik zaměstnanců stanice se podařilo evakuovat z padající části budovy, přičemž NKVD společně s milicí uzavřely oblast pro možné vyšetřování incidentu. \n\nJeden ze staničních strážných byl později nalezen v bezvědomí ve své kanceláři, vzpomínajíc si jen na několik stínů, které se objevily za jeho zády, než pro něj vše zčernalo. \n\n"Incident hodný dalšího vyšetřování" - komentář místního zampolita." # todo: NEW TRANSLATION
  mongol_genden.19.a: "COŽE?!" # todo: NEW TRANSLATION
  mongol_genden.19.b: "Ach ne! Každopádně, o Gendenovi..." # todo: NEW TRANSLATION
  mongol_genden.21.t: "Byrokratický chaos v Charkovu" # todo: NEW TRANSLATION
  mongol_genden.21.d: "Kufřík s prostředky a instrukcemi byl ponechán v charkovském železničním depu, kde byl převezen do štábu personálu a předložen místnímu předákovi jedním z našich lidí. \n\nPo "důkladném přemýšlení" a několika přesvědčovacích krocích našich agentů se předák rozhodl posunout odjezdy několika vlaků přicházejících do Charkova v následujících dnech. \n\nDíky zpoždění železnice bylo relativně snadné oddělit Gendena od jeho rezidenta NKVD a odvézt ho jiným vlakem pod identitou profesora východních studií a literatury na jeho dlouhé cestě zpět do Střední Asie. \n\nNyní již jen musíme sledovat vlak a zajistit, že dosáhne cíle." # todo: NEW TRANSLATION
  mongol_genden.21.a: "Odvedli dobrou práci" # todo: NEW TRANSLATION
  mongol_genden.22.t: "Kozáci přepadli náhodný vlak na okraji Rostova!" # todo: NEW TRANSLATION
  mongol_genden.22.d: "Devastující zpráva se rozšířila po Povolží a východní části Ukrajiny, neboť zdánlivě neznámá jízdní skupina přepadla a oloupila civilní vlak směřující k azurovému přístavu Novorossijsk. \n\nNeznámý jezdecký gang přistoupil k vlaku od směru západu, když se nakládal s proviantem k dalšímu putování na jih, a požadoval "poplatek" za bezpečný průjezd do cíle. Po uplynutí ultimáta někteří členové gangu naskočili do vlaku a začali vybírat osobní věci cestujících. \n\nPři pokusu odzbrojit jednoho z přítomných politruků byl vystřelen náhodný výstřel a vlak se proměnil v chaos, kdy civilisté prchali z útočníků různými směry, zatímco důstojníci NKVD bojovali s bandity v boji zblízka. V přesile padli jako hrdinové v nerovném boji, po čemž jezdecký oddíl umístil výbušniny a zapálil zbytky vlaku a zmizel ve tmě." # todo: NEW TRANSLATION
  mongol_genden.22.a: "Promiňte, COŽE?!" # todo: NEW TRANSLATION
  mongol_genden.22.b: "To je jim poučení" # todo: NEW TRANSLATION
  mongol_greater_mongolia.1.t: "Operace úspěšná" # todo: NEW TRANSLATION
  mongol_greater_mongolia.1.d: "Invaze a obsazení sporného území proběhly podle určeného plánu. \n\nPoté, co naše pohraniční hlídka "neodpověděla" na nouzové volání, naši úředníci zahájili oficiální vyšetřování a zároveň poslali diplomatické žádosti o prohledání sporých oblastí a zatčení banditů, kteří spáchali možné zločiny proti našim lidem. \n\nNásledně naše eskadrony převzaly kontrolu nad životně důležitou infrastrukturou regionu včetně poštovních služeb, železnic, silničních přechodů, telegrafu a telefonních linek. Místní posádka byla donucena položit zbraně a připojit se k našim jednotkám k indoktrinaci a výslechu. \n\nNěkteří místní obyvatelé se stále snaží protestovat proti nové vládě, ale jejich hlasy jsou slabé a neorganizované." # todo: NEW TRANSLATION
  mongol_greater_mongolia.1.a: "Skvělý den pro [ROOT.getAdjective] lid!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.2.t: "Katastrofa na jihu" # todo: NEW TRANSLATION
  mongol_greater_mongolia.2.d: "Naše síly, povzbuzené počátečním úspěchem operace, dokázaly zajistit několik pohraničních osad a zajistit, že civilisté neorganizují milice k boji proti osvoboditelům země. \n\nPřesto zatímco jsme připravovali naše jednotky do vnitrozemí nepřítele, rozsáhlá protiútoková operace zdevastovala křídla naší příliš roztažené armády. Místní partyzáni přetnuli zásobovací linky za našimi silami, což donutilo tyto zanechat některé muže a vybavení, aby zachránili hlavní těleso armády. \n\nVraťení se vojáci nyní léčí rány a připravují se na nové boje." # todo: NEW TRANSLATION
  mongol_greater_mongolia.2.a: "Možná jsme přecenili svou sílu" # todo: NEW TRANSLATION
  mongol_greater_mongolia.3.t: "Dosaženo patu" # todo: NEW TRANSLATION
  mongol_greater_mongolia.3.d: "Navzdory počátečnímu úspěchu operace byl pohyb našich ozbrojených sil vážně zastaven po silné obranné linii vybudované v obsazené oblasti. Naši vojáci byli nuceni zapustit se do nepřátelského terénu, zatímco vojenská policie se snaží zabezpečit zadní linie proti partyzánům. \n\nPo několika střetech místní velitelé navrhli opustit tuto vojenskou snahu dříve, než se situace stane příliš kritickou, protože nepřítel může přivézt více jednotek a těžkých děl do oblasti zájmu a my si nemůžeme dovolit obětovat další zdroje pro tento údajně krátký konflikt." # todo: NEW TRANSLATION
  mongol_greater_mongolia.3.a: "Můžeme si z toho vzít hodně." # todo: NEW TRANSLATION
  mongol_greater_mongolia.4.t: "Nepřátelské síly odraženy" # todo: NEW TRANSLATION
  mongol_greater_mongolia.4.d: "Bezohledné nepřátelské síly v miriádách a miriádách vojáků postupovaly do našich vlastí, snažíc se vzít to, co podle nich "patří jim"! \n\nA zatímco pustošili a ničili zadní oblasti, naši mocní bojovníci shromáždili síly a pod prapory našeho nejlepšího generála vpochodovali dát rozhodující boj útočníkům. \n\nMarní nepřátelé nebyli schopni odolat společnému úsilí našich armád a partyzánů a byli spatřeni ustupovat, zanechávajíce část výzbroje a zajatců." # todo: NEW TRANSLATION
  mongol_greater_mongolia.4.a: "Spálíme vaši patetickou armádu až na posledního muže." # todo: NEW TRANSLATION
  mongol_greater_mongolia.5.t: "Naše území bylo zabráno!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.5.d: "Mohl to být přehlédnutí od našich generálů, nebo od pozorovatelů vpředu, nebo možná nedostatečná reakce našich armád - nevíme to přesně. \n\nZnámé však je, že komunikace s jedním z našich předních regionů byla zcela ztracena: nepřítel zabezpečil své komunikační linie a silně narušil ty naše, takže nebylo možné mobilizovat dostatečnou rezervu k porážce nepřítele. \n\nNyní je pozdě, neboť jsme ztratili jedno ze svých aktiv těmto otravným vetřelcům, kýmkoli jsou. Vrátíme se, až přijde vhodná doba!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.5.a: "Jak se máme dívat našim lidem do očí?" # todo: NEW TRANSLATION
  mongol_greater_mongolia.6.t: "Dosaženo patu" # todo: NEW TRANSLATION
  mongol_greater_mongolia.6.d: "Rychle postupující nepřítel dokázal zajistit několik pohraničních vesnic a měst, ale naše místní posádka, posílena mobilizovanými ozbrojenými silami, vybudovala pevnosti na linii nepřátelského postupu, které byly nepřemožitelné během posledních týdnů. \n\nNyní, když naši partyzáni ničí jejich zásobovací linky zatímco naše síly soutěží s pohybem nepřítele na frontě, znechucený nepřítel hledá taktický ústup, zanechávaje zdevastované vesnice a vydrancovaná pole pro naše rolníky k obdělávání. \n\nRozhodující úspěch, avšak za vysokou cenu." # todo: NEW TRANSLATION
  mongol_greater_mongolia.6.a: "Dokážeme udržet linii ještě déle!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.10.t: "Mongolsko žádá sjednocení s buriaty" # todo: NEW TRANSLATION
  mongol_greater_mongolia.10.d: "Usilujíc o oživení vazeb, které spojovaly oba národy po staletí před vzestupem odkazů Rudé revoluce a teorií národního státu, [MON.getAdjective] diplomaté oslovili naše úředníky s žádostí o možné znovusjednocení buriatů a chalkhských Mongolů. \n\nKromě řádného zastoupení ve Velkém a Malém Churalu slibují respektovat národní identitu a práva buriatského lidu a ostatních obyvatel oblasti. \n\nMáme jim tyto země vrátit?" # todo: NEW TRANSLATION
  mongol_greater_mongolia.10.a: "Méně problémů z našich ramen" # todo: NEW TRANSLATION
  mongol_greater_mongolia.10.b: "Těch zemí bez boje nedáme" # todo: NEW TRANSLATION
  mongol_greater_mongolia.10.c: "Souhlasit výměnou za křesla v Churalu" # todo: NEW TRANSLATION
  mongol_greater_mongolia.11.t: "Mongolsko tlačí na začlenění Tuvy" # todo: NEW TRANSLATION
  mongol_greater_mongolia.11.d: "Ve snaze znovu navázat kontrolu nad mongolsky mluvícími zeměmi se [MON.getAdjective] delegace obrátila na naše úředníky v Kyzylu s nabídkou provedení státem sponzorovaného plebiscitu ohledně začlenění Tuva zpět do území Mongolska. \n\nKromě obvyklých slibů sebeurčení, místní autonomie a rovného zacházení s menšinami jsou [MON.getAdjective] úředníci také ochotni investovat do stagnující ekonomiky tohoto regionu, umožňujíc místnímu obyvatelstvu užívat si všech ekonomických a sociálních výhod [MON.GetRulingIdeology]. \n\nJak odpovíme?" # todo: NEW TRANSLATION
  mongol_greater_mongolia.11.a: "Méně problémů k řešení" # todo: NEW TRANSLATION
  mongol_greater_mongolia.11.b: "Proč bychom to vůbec zvažovali?" # todo: NEW TRANSLATION
  mongol_greater_mongolia.11.c: "Souhlasit za řádné zastoupení v Churalu" # todo: NEW TRANSLATION
  mongol_greater_mongolia.12.t: "Žádost o sjednocení přijata!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.12.d: "Usilujíc o vyřešení napětí v regionu představitelé [FROM.getNameDef] podepsali navrhovanou smlouvu a předali administrativní kontrolu nad regionem. Naši úředníci již začali upevňovat se ve nových vládních kancelářích zatímco naši inženýři pracují na reintegraci regionu do infrastruktury naší země. \n\nJako součást ceremonie poslední prapor místních stráží poctivě pozdravil nově příchozí [ROOT.getAdjective] ozbrojené síly, což znamenalo úplný přechod moci na náš režim v regionu!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.12.a: "Skvělé!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.12.b: "Pravé sjednocení!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.13.t: "[FROM.getNameDefCap] souhlasil se speciálním statusem autonomie" # todo: NEW TRANSLATION
  mongol_greater_mongolia.13.d: "Po několika dnech vyjednávání bylo dohodnuto, že sloučení vládního aparátu [FROM.getNameDef] a [ROOT.getNameDef] je příliš komplikované z hlediska administrativní a ekonomické kontroly. \n\n[FROM.getAdjective] byli spíše nakloněni přijmout speciální status jako autonomní region pod naší přímou mandátní kontrolou. \n\n"S sdílenými ekonomickými a vojenskými břemeny budou naše dvě národy týden co týden, měsíc co měsíc silnější!" - řekl hlavní delegace. \n\nMůžeme začít pracovat na sbližování našich lidí!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.13.a: "Velmi dobře" # todo: NEW TRANSLATION
  mongol_greater_mongolia.14.t: "Diplomatická jednání selhala" # todo: NEW TRANSLATION
  mongol_greater_mongolia.14.d: "Navzdory našemu nejlepšímu úsilí [FROM.getAdjective] úředníci odmítli naši pokornou nabídku panmongolské spolupráce! \n\nV projevu tento ráno z balkonu parlamentní budovy [FROM.getLeader] oznámil, že "zbabělí [ROOT.getAdjective] se snaží zotročit urozené lidi kolem sebe a obnovit zkažené a korupční Mongolské impérium!". \n\nS tak jasným projevem neúcty naši ambasadoři opustili vyjednávací stůl a vzhledem k rostoucím represím páchaným na našem obyvatelstvu v regionu je jasné, že existuje pouze jeden způsob, jak zabezpečit oblast..." # todo: NEW TRANSLATION
  mongol_greater_mongolia.14.a: "Vrátíme se" # todo: NEW TRANSLATION
  mongol_greater_mongolia.15.t: "Nadcházející konference v Ulaanbaataru" # todo: NEW TRANSLATION
  mongol_greater_mongolia.15.d: "Střední Asie je dobře známá jako bojiště různých sil snažících se podkopat kontrolu jeden druhého nad tímto strategickým regionem. Mnoho říší se pokusilo dobýt pastviny jezdců s cílem urovnat lidi do sporů ku prospěchu někoho. \n\nNyní, když jsme dokázali zpečnit naši vnitřní vládu a ukázat pouhé procenta naší skutečné síly, je v našem nejlepším zájmu usilovat o spolupráci s velkými mocnostmi regionu a zkoumat, jak mohou přispět k sjednocení mongolského lidu pod jedním národním státem. \n\nTakové politické úsilí je nákladné, ale silně nám a naší agendě prospěje." # todo: NEW TRANSLATION
  mongol_greater_mongolia.15.a: "Nechť přípravy začnou!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.15.b: "Takové úsilí je příliš velké. Přehodnotíme." # todo: NEW TRANSLATION
  mongol_greater_mongolia.16.t: "Pozvat [SOV.getAdjective] úředníky?" # todo: NEW TRANSLATION
  mongol_greater_mongolia.16.d: "Navzdory některým jejich pochybným politikám posledních let, kdy jejich snaha směřovala k oddělení chalkhských Mongolů a buriatů, jsou [SOV.getAdjective] považováni spíše za přátele a partnery než za potlačovatele a kolonizátory. \n\nPřed mnoha lety jejich podpora ochránila Bogd Khanát před úplným zničením a vymazáním Číňany a mandžuskými imperialisty. \n\nO několik let později jejich přispění zajistilo nastolení komunismu v naší zemi; zda to bylo k dobrému nebo zlému, ukáže čas. \n\nVidět, že mají zájem zajistit jejich Transsibiřskou dráhu, stává se zřejmým, že pravděpodobně zajistí naši podporu v jakémkoli budoucím konfliktu. Samozřejmě za cenu." # todo: NEW TRANSLATION
  mongol_greater_mongolia.16.a: "Pozvat [SOV.getAdjective] bratry" # todo: NEW TRANSLATION
  mongol_greater_mongolia.16.b: "Není to v našem zájmu" # todo: NEW TRANSLATION
  mongol_greater_mongolia.17.t: "Pozvat [CHI.getAdjective] diplomaty?" # todo: NEW TRANSLATION
  mongol_greater_mongolia.17.d: "Po staletí rozdělení v jejich interních mocenských bojích se [CHI.getAdjective] stále dívají ven a snaží se zabezpečit svou Vnější hranici před cizím vlivem, ať už je to [SOV.getAdjective], [JAP.getAdjective] nebo jiná mocnost. \n\nMnoho staletí naše a jejich předkové byli nepřátelé, kteří spolu bojovali. Možná převažují přínosy diplomacie nad plameny prachu a leskem čepelí, což našemu lidu umožní ukázat, že naše cíl sjednocení je podobný tomu jejich?" # todo: NEW TRANSLATION
  mongol_greater_mongolia.17.a: "Uvidíme, co řeknou" # todo: NEW TRANSLATION
  mongol_greater_mongolia.17.b: "Nikdy nebudeme spolupracovat s těmi utlačovateli" # todo: NEW TRANSLATION
  mongol_greater_mongolia.18.t: "Uznat PRC pozváním?" # todo: NEW TRANSLATION
  mongol_greater_mongolia.18.d: "Ve snaze osvobodit Čínu Proper od utlačovatelů lidu, [PRC.getLeader] se svými lidmi z [PRC.getNameDef] zřídili nový řád, schopný více či méně úspěšně odolat tlaku centrální vlády prozatím. \n\nJejich sliby respektovat principy sebeurčení a vůli Vnějšího Mongolska lze považovat za základ nového souboru diplomatických vztahů, které posílí stav obou zemí v tomto plodném vztahu! \n\nTakové diplomatické manévrování jistě rozhnevá některé úředníky [CHI.GetRulingParty], ale má to opravdu smysl, pokud dosáhneme našeho dlouhodobého cíle?" # todo: NEW TRANSLATION
  mongol_greater_mongolia.18.a: "Rozhodně" # todo: NEW TRANSLATION
  mongol_greater_mongolia.18.b: "Je to příliš riskantní, raději ne" # todo: NEW TRANSLATION
  mongol_greater_mongolia.19.t: "Pozvat [JAP.getAdjective] militaristy?" # todo: NEW TRANSLATION
  mongol_greater_mongolia.19.d: "Rychlý průmyslový a ekonomický růst [JAP.getNameDef] je z nich učinil sílu, kterou je třeba zvážit, pokud chceme zajistit naše hranice. Navíc jejich ambice na Středním rovině a jihovýchodním Pacifiku by mohly být využity ku našemu prospěchu, pokud uzavřeme dobře promyšlenou dohodu s nimi. \n\nNa druhou stranu jejich zřizování "protektorátních režimů" u našich přímých sousedů nepřispívá k urovnání napětí v regionu. Kdo ví, kam jejich ambice Východní Asii povedou?" # todo: NEW TRANSLATION
  mongol_greater_mongolia.19.a: "To pomůže vyřešit spory v oblasti" # todo: NEW TRANSLATION
  mongol_greater_mongolia.19.b: "Mohou mít skryté ambice" # todo: NEW TRANSLATION
  mongol_greater_mongolia.20.t: "[MON.getAdjective] úředníci nás pozvali na konferenci v Ulaanbaataru" # todo: NEW TRANSLATION
  mongol_greater_mongolia.20.d: "Usilujíc o vyřešení sporů ohledně Vnitřního a Vnějšího Mongolska, přerozdělení populace podle sčítání a místních plebiscitů a zabezpečení odkazu sjednoceného Mongolska, [MON.getAdjective] diplomaté začali organizovat Ulaanbaatarskou konferenci a pozvali nás „jako Velkou moc“, abychom přispěli svou částí do diskuse. \n\nNaši analytici doporučují zúčastnit se konference v Ulaanbaataru, protože bychom mohli zvýšit náš vliv v regionu a možná přimět loajalitu [MON.getNameDef] a jejich vůdců k naší věci. \n\nVíra je dobrá, ale kontrola je lepší." # todo: NEW TRANSLATION
  mongol_greater_mongolia.20.a: "Zúčastníme se." # todo: NEW TRANSLATION
  mongol_greater_mongolia.20.b: "To si dělají legraci!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.21.t: "Delegace [FROM.getAdjective] by se připojila ke konferenci" # todo: NEW TRANSLATION
  mongol_greater_mongolia.21.d: "Po zvážení [FROM.getAdjective] zástupci oznámili při ceremoniální návštěvě našeho velvyslance, že mají zájem se konference zúčastnit za účelem "mírového vyřešení sporů a urovnání konfliktů". \n\nPřipravíme nejlepší možná ubytování pro jejich pobyt v našem hlavním městě. Některé přípravy již probíhají." # todo: NEW TRANSLATION
  mongol_greater_mongolia.21.a: "Stabilita v regionu musí být udržena!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.22.t: "[FROM.getAdjective] zástupci nemají zájem připojit se ke konferenci" # todo: NEW TRANSLATION
  mongol_greater_mongolia.22.d: "Dlouhý odpovědní dopis předaný našemu velvyslanci obsahoval dlouhé prohlášení o věčném přátelství mezi našimi národy, dlouhém a šťastném životě pro všechny naše lidi a krátkou větu na konci, skrytou mezi řádky, že [FROM.getNameDef] má velmi naléhavé záležitosti k vyřízení a proto nemůže poslat delegaci osobně projednat otázky stability v Střední Asii. \n\nZůstaneme ostražití, neboť tento národ ještě není připraven převzít odpovědnost za záruku stability v regionu..." # todo: NEW TRANSLATION
  mongol_greater_mongolia.22.a: "Škoda pro ně." # todo: NEW TRANSLATION
  mongol_greater_mongolia.23.t: "Začátek konference v Ulaanbaataru" # todo: NEW TRANSLATION
  mongol_greater_mongolia.23.d: "Přípravy na konání konference se blíží dokončení a všichni diplomaté dorazí do Ulaanbaataru v následujících dnech. \n\nPo několika dnech vyřizování procedur se nám podařilo umístit všechna sedadla pro delegáty tak, aby nikoho neurazili v konferenční síni. Teď už jen potřebujeme zdravou atmosféru v našem hlavním městě, aby se zahraniční delegace cítily vřele vítány a uvolněné." # todo: NEW TRANSLATION
  mongol_greater_mongolia.23.a: "Ať rozhovory začnou" # todo: NEW TRANSLATION
  mongol_greater_mongolia.24.t: "Přestřelka v konferenční síni" # todo: NEW TRANSLATION
  mongol_greater_mongolia.24.d: "První kolo diskuzí šlo podle našeho plánu: po přivítání [MON.getLeader] z tribuny v konferenční síni všichni členové delegací zaujali svá místa připraveni jednat o otázkách regionální bezpečnosti, jak bylo zamýšleno. \n\nNaši stráže netušily, že někteří zahraniční delegáti spolu se svými osobními ochránci dokázali propašovat palné zbraně údajně "pro osobní ochranu". \n\nJak diskuse zhoustla, jeden z nich vznesl téma "jak může být zachována regionální bezpečnost, pokud druhá strana vede útočnou válku proti nám, hned za těmi dveřmi?". Rozhořčené hlasy z druhé strany byly pobouřeny tímto prohlášením, po čemž nějaký radikál neznámého původu přítomný mezi lidmi otevřel palbu z osobní zbraně, což vedlo k masivní přestřelce mezi protistranami. \n\nO několik hodin později se obě strany dohodly sebrat raněné a vrátit se do svých válčících domovin, což znamená úplné selhání konference." # todo: NEW TRANSLATION
  mongol_greater_mongolia.24.a: "Jaké přehlédnutí z naší strany!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.25.t: "Vzájemné uznání aliance" # todo: NEW TRANSLATION
  mongol_greater_mongolia.25.d: "Naše vratká pozice na mezinárodní scéně byla dříve silně podporována našimi soudruhy v [SOV.getNameDef], protože jejich politici a vojenský personál udržovali pevné ovládnutí naší vnitřní i vnější politiky. \n\nJelikož jsme neoficiálně uznali [PRC.getNameDef] pozváním jejich zástupců na konferenci, stalo se možné zkusit a upevnit naše dříve navázané vazby podpisem tajného protokolu, který by zahrnoval vzájemné uznání našich zemí v kombinaci s možností rozdělení sfér vlivu ve Střední Asii. Konference bude samozřejmě zrušena. \n\nVelké mocnosti by to mohly považovat za "sjednocení nežádoucích", ale je to lepší než nic!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.25.a: "Naše jediná šance!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.25.b: "A vyvolat hněv našich sousedů na nás?" # todo: NEW TRANSLATION
  mongol_greater_mongolia.26.t: "Žádost o alianci přijata" # todo: NEW TRANSLATION
  mongol_greater_mongolia.26.d: "Uvědomujíc si, jak vratké a křehké postavení obou našich národů je, [PRC.getLeader] přijal riskantní návrh a podepsal tajnou dohodu, jejímž cílem je posunout rovnováhu sil v regionu v náš prospěch. \n\nRozhněvaní diplomaté z jiných zemí v následujících dnech opustí Ulaanbaatar, aby doručili zprávu o "tom, jak nespolehliví jsou [MON.getadjective] politici". \n\nNěkteří z našich generálů již doufají v zahájení sdílení zkušeností mezi našimi ozbrojenými silami." # todo: NEW TRANSLATION
  mongol_greater_mongolia.26.a: "Hurá!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.27.t: "Diplomatická mise selhala" # todo: NEW TRANSLATION
  mongol_greater_mongolia.27.d: "[PRC.getLeader] informoval našeho zástupce, že přestože návrh vypadal nadějně, mají nyní jiné věci na práci a nejsou připraveni opustit užitečnou spolupráci s Velkými mocnostmi. \n\nToto oznámení, stejně jako náš návrh, bylo doručeno zabezpečenými kanály bez vědomí zahraničních diplomatů, co se děje za jejich zády. \n\nStále můžeme pokračovat v našem úsilí získat loajalitu velkých hráčů ve Střední Asii." # todo: NEW TRANSLATION
  mongol_greater_mongolia.27.a: "Jak? Proč?" # todo: NEW TRANSLATION
  mongol_greater_mongolia.28.t: "Konference neúspěšná" # todo: NEW TRANSLATION
  mongol_greater_mongolia.28.d: "Navzdory našemu nejlepšímu úsilí o vytvoření co nejproduktivnějšího klimatu a přátelské atmosféry v konferenční síni byly všechny diskuzní kola neúspěšná s různými stranami tvrzíce, že jsou nespravedlivě ošetřeny nebo si zachovávají neutrální postoj v klíčových otázkách. \n\nZatímco jsme se také snažili zajistit loajalitu některých z nich, všechny snahy zůstaly marné a poslanci požadovali stále více ústupků, které jsme fyzicky nebyli schopni poskytnout. \n\nPo ukončení konference [MON.getLeader] pronesl projev, kde se pokusil smířit protistrany a zachovat pracovní atmosféru, což se večer nepodařilo, a konference tak skončila jako naprosté selhání našich diplomatických snah." # todo: NEW TRANSLATION
  mongol_greater_mongolia.28.a: "Udělali jsme, co jsme mohli..." # todo: NEW TRANSLATION
  mongol_greater_mongolia.29.t: "Velké mocnosti poskytnou svou podporu" # todo: NEW TRANSLATION
  mongol_greater_mongolia.29.d: "Po týdnech jednání a sporů o sporná území kontroly a zájmu jsme dokázali ukojit každou delegaci přítomnou na konferenci, což jim umožnilo veřejně prohlásit náš stát jako "status-quo stát pod ochranou Velkých mocností". \n\nNasměrujíce naše hlavní úsilí na zachování Mongolska jako pufrového státu, velcí hráči souhlasili, že zajistí stabilitu a bezpečnost naší země, s podmínkou, že zůstaneme neutrální v naší zahraniční politice vůči zástupcům smlouvy. \n\nTakové ustanovení nám však umožňuje žádat "jádrové mongolské státy" od zahraničních mocností, které souhlasily zachovat naši integritu, tvrzece, že "usilujeme pouze o znovusjednocení právoplatných [MON.getAdjective] států"." # todo: NEW TRANSLATION
  mongol_greater_mongolia.29.a: "Naši diplomaté dokázali nemožné!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.30.t: "Mongolsko požaduje své právoplatné nároky" # todo: NEW TRANSLATION
  mongol_greater_mongolia.30.d: "S odkazem na jejich touhu znovusjednotit [MON.getAdjective] pod jedním národním státem a kryjíc tyto ambice našimi dohodami z Ulaanbaataru, [MON.getLeader] vydal naléhavou žádost o předání státu pod jejich kontrolu. \n\nSplnění jejich požadavků "uchrání rovnováhu sil v regionu bez dlouhodobé újmy", což se jim zdá zcela odůvodněné. \n\nNa druhou stranu riskujeme být považováni za utlačovatele, válečné štváče a ničitele regionálního míru před jinými mocnostmi v regionu, čímž jim dáme oprávněný důvod k vojenské intervenci..." # todo: NEW TRANSLATION
  mongol_greater_mongolia.30.a: "Dostanou, co je oprávněně jejich" # todo: NEW TRANSLATION
  mongol_greater_mongolia.30.b: "To není to, o čem jsme se dohodli" # todo: NEW TRANSLATION
  mongol_greater_mongolia.31.t: "[FROM.getAdjective] se nehodlá řídit dohodami z Ulaanbaataru" # todo: NEW TRANSLATION
  mongol_greater_mongolia.31.d: "Naše počáteční diplomatická žádost se zdá, že nezískala požadovanou pozornost od vlády [FROM.getLeader], navíc druhá žádost zaslaná několik hodin poté byla odmítnuta pod záminkou, že my jsme ti, kdo "eskaluje situaci nevhodným a nebezpečným způsobem". \n\nNaše třetí žádost o udělení slíbených ústupků Mongolsku byla veřejně předložena obyvatelstvu této země a lidé se nahlas smáli politice umírněnosti našich úředníků. \n\nTakové veřejné ponížení a opovržení mezinárodními dohodami nelze tolerovat! Nebo ano?" # todo: NEW TRANSLATION
  mongol_greater_mongolia.31.a: "Čas to udělat tvrději." # todo: NEW TRANSLATION
  mongol_greater_mongolia.31.b: "Válka nyní nepřipadá v úvahu" # todo: NEW TRANSLATION
  mongol_greater_mongolia.32.t: "Převod státu potvrzen" # todo: NEW TRANSLATION
  mongol_greater_mongolia.32.d: "Naše skromná žádost zjevně vyvolala určité obavy zahraniční vlády, přesto přišla odpověď jejich úředníků včas. \n\nUvedli, že jejich cílem je zachovat mír v regionu, [FROM.getAdjective] jsou připraveni přemístit hranice své země nebo svého klientského státu tak, aby [MON.getNameDef] zachovalo svůj status quo ve Střední Asii. \n\nPřípravy na administrativní a vojenská přerozdělení již probíhají a jsou prováděny včas podle navrhovaného plánu." # todo: NEW TRANSLATION
  mongol_greater_mongolia.32.a: "Přesně jak jsme předpokládali" # todo: NEW TRANSLATION
  mongol_greater_mongolia.33.t: "Převod státu odmítnut" # todo: NEW TRANSLATION
  mongol_greater_mongolia.33.d: "Ve snaze zachránit již se rozpadávající říši [FROM.getAdjective] odmítli naši žádost o předání mongolských území zpět pod naši kontrolu! \n\nTvrdí, že země, kterou drží, "je právoplatně jejich", zatímco zcela zapomínají na sliby dané v dohodách Ulaanbaataru, které udělali dříve. \n\nNaše ozbrojené síly hlásí připravenost provést vojenskou operaci, pokud bude potřeba provést násilné předání státu." # todo: NEW TRANSLATION
  mongol_greater_mongolia.33.a: "Dnes nám to nikdo neodepře!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.34.t: "Náš patron nepodpoří naši věc" # todo: NEW TRANSLATION
  mongol_greater_mongolia.34.d: "Úředníci z [FROM.getNameDef] nám museli doručit nešťastnou nótu, že nemohou podpořit naše úsilí kvůli nedostatku volné pracovní síly, vybavení a zdrojů pro financování "dalšího spravedlivého osvobozeneckého boje". \n\nDále nás informovali, že nás budou podporovat v budoucnu, pokud bude znovu vznesena otázka hraničního přeuspořádání." # todo: NEW TRANSLATION
  mongol_greater_mongolia.34.a: "Tak nespolehliví!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.40.t: "[From.GetNameDefCap] nabízí rozdělení sfér vlivu" # todo: NEW TRANSLATION
  mongol_greater_mongolia.40.d: "Hlavním účelem vytvoření aliance bylo opustit Velké mocnosti a pokusit se vybudovat samostatný blok schopný odolávat vlivu gigantů. \n\nNyní, když byla aliance dokončena v náležité formě, zůstává jedna malá, ale významná otázka: \nVnitřní Mongolsko a Severní Sinkiang stále hostí značné množství mongolského obyvatelstva, které zůstává relativně oddělenou součástí místní společnosti. \n\n[MON.getNameDef] vedené [MON.getLeader] usiluje o sjednocení všech Mongolů pod jedním praporem a tlačí nás k rozdělení sfér vlivu, čímž naznačuje, že bychom měli přehodnotit naše politiky sinizace v regionech jejich zájmu." # todo: NEW TRANSLATION
  mongol_greater_mongolia.40.a: "Je to pro dobro věci" # todo: NEW TRANSLATION
  mongol_greater_mongolia.40.b: "Ne, není to v našem zájmu!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.41.t: "[From.GetNameDefCap] souhlasí s rozdělením sfér vlivu" # todo: NEW TRANSLATION
  mongol_greater_mongolia.41.d: "Ve snaze posílit naši nově vzniklou alianci nás [FROM.getAdjective] úředníci informovali, že vzali zpět své nároky a nebudou provádět žádné sinizační politiky v sporném regionu. \n\nNaši lidé si tak budou užívat vyššího stupně svobody a naši politici mohou následovat sen o sjednocení mongolského obyvatelstva pod jedním národním státem." # todo: NEW TRANSLATION
  mongol_greater_mongolia.41.a: "Jak jsem očekával." # todo: NEW TRANSLATION
  mongol_greater_mongolia.42.t: "Žádost zamítnuta!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.42.d: "Přes snahu o přehodnocení jejich politik ve sporném regionu [FROM.getAdjective] stále považují oblasti zájmu za své právoplatné domény! \n\nNaše úsilí o sjednocení mongolského obyvatelstva může pokračovat podle naší vůle, ale někteří jejich stoupenci nám mohou stát v cestě, pokud chceme získat požadované území dohodou nebo dobytím. \n\nViděním toho jako hrozného omylu máme nyní mnohem méně spojenců, na které se můžeme spolehnout!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.42.a: "Zatraceni!" # todo: NEW TRANSLATION
  mongol_greater_mongolia.50.t: "Znovuzrození [From.GetNameDef]" # todo: NEW TRANSLATION
  mongol_greater_mongolia.50.d: "Nedávné územní zisky provedené [FROM.getAdjective] úředníky zahrnuly rozsáhlá území obývaná převážně mongolským obyvatelstvem, což poskytuje jedinečnou politickou příležitost jejich úředníkům. \n\n[FROM.getLeader] dnes ráno před budovou Velkého Churalu veřejně oznámil vznik nové politické entity, reprezentující společnou vůli a touhu mongolského obyvatelstva, s cílem zajistit a chránit jejich zájmy v těchto neklidných časech." # todo: NEW TRANSLATION
  mongol_greater_mongolia.50.a: "Sen o sjednocené Střední Asii čeká" # todo: NEW TRANSLATION
  mongol_greater_mongolia.50.b: "Vznešené mongolské impérium znovu vzrůstá?" # todo: NEW TRANSLATION
  mongol_greater_mongolia.50.c: "Pouhý nepatrný zádrhel, nic víc" # todo: NEW TRANSLATION
  mongol_soviet_puppet.2.t: "Zjištěna podezřelá aktivita" # todo: NEW TRANSLATION
  mongol_soviet_puppet.2.d: "Skupina mladých studentů byla zatčena před několika týdny podezření z toho, že jsou zahraničními agenty poslány do naší země vládou [MON.getAdjective] s cílem destabilizovat situaci v našem zázemí pomocí různých prostředků. \n\nPo několika počátečních výsleších jeden z vůdců přiznal službu [MON.getNameDef] a jejich agendě. Takové drzé jednání bude bráno v potaz a zodpovědní potrestáni. Naši diplomaté již připravili několik způsobů, jak s touto hrozbou naložit. \n\nJaké bude rozhodnutí [ROOT.getLeader]?" # todo: NEW TRANSLATION
  mongol_soviet_puppet.2.a: "Náš problém to není" # todo: NEW TRANSLATION
  mongol_soviet_puppet.2.b: "Vystavit diplomatickou protestaci" # todo: NEW TRANSLATION
  mongol_soviet_puppet.2.c: "Uzavřít hranice" # todo: NEW TRANSLATION
  mongol_soviet_puppet.2.e: "Poslat ultimátum" # todo: NEW TRANSLATION
  mongol_soviet_puppet.3.t: "[FROM.getNameDefCap] protestuje proti naší agendě" # todo: NEW TRANSLATION
  mongol_soviet_puppet.3.d: "Dopis protestu byl dnes ráno doručen do vládního sídla, tvrzece, že drzé šíření komunismu v našem blízkém okolí takto navenek jen zhorší naše vzájemné vztahy. \n\nDopis také vyjádřil, že jakékoli budoucí kroky našich špionů a agentů nebudou tolerovány a budou přijaty důraznější kroky k ochraně [FROM.getAdjective] státu a jeho práva rozhodnout, která ideologie je pro ně nejlepší. \n\nNejistý, jak reagovat, [ROOT.getLeader] se rozhodl tuto "naléhavou" záležitost řešit později." # todo: NEW TRANSLATION
  mongol_soviet_puppet.3.a: "Ach ne! Každopádně..." # todo: NEW TRANSLATION
  mongol_soviet_puppet.4.t: "[FROM.getNameDefCap] nám uvalil embargo!" # todo: NEW TRANSLATION
  mongol_soviet_puppet.4.d: "Jeden z nákladních vlaků nedorazil na hlavní nádraží jednoho z pohraničních měst, což vzbudilo obavy, zda zboží vůbec dorazí podle obchodní dohody, kterou jsme nedávno uzavřeli. Vzbudilo to nepokoje a vedlo k řádnému vyšetřování. \n\nZdá se, že vlak a jeho posádka nyní zůstávají v pohraniční oblasti [FROM.getNameDef], neschopni dorazit do země kvůli obchodním sankcím uvaleným na nás! \n\nOficiální diplomatická žádost na [FROM.getAdjective] velvyslanectví potvrdila, že jejich úředníci nyní uzavřeli hranice a nejsou ochotni propustit žádný nákladní vlak bez formální omluvy." # todo: NEW TRANSLATION
  mongol_soviet_puppet.4.a: "To nám vlastně nevadí" # todo: NEW TRANSLATION
  mongol_soviet_puppet.4.b: "Prosím ne! Poslat omluvu!" # todo: NEW TRANSLATION
  mongol_soviet_puppet.5.t: "[FROM.getNameDefCap] posílá omluvy" # todo: NEW TRANSLATION
  mongol_soviet_puppet.5.d: "Usilujíc o usmíření s našimi úředníky, [FROM.getAdjective] ministerstvo zahraničních věcí doručilo poznámku omluvy. \n\nJejich žádost o zrušení obchodních sankcí také uvádí, že nebudou provádět žádné propagandistické kampaně v našem vnitrozemí v blízké budoucnosti. \n\nNavíc se očekává, že obdržíme solidní kompenzaci za nepokoje, které jejich agenti způsobili, posilující naši pozici v regionu. Na druhou stranu, můžeme jim opravdu věřit?" # todo: NEW TRANSLATION
  mongol_soviet_puppet.5.a: "Dobrá." # todo: NEW TRANSLATION
  mongol_soviet_puppet.5.b: "Nenecháme se tak snadno odkoupit" # todo: NEW TRANSLATION
  mongol_soviet_puppet.6.t: "[FROM.getNameDefCap] souhlasí s kompromisem" # todo: NEW TRANSLATION
  mongol_soviet_puppet.6.d: "Dopis smíru byl přijat prezidentskou kanceláří, uvádějící, že [FROM.getAdjective] úředníci zadrží naše agenty za subverzivní činnost, ale dovolí volný průjezd zboží přes hranice, pokud nedojde k dalším incidentům. \n\nO několik hodin později dorazila problémová posádka do svého cíle a dodala požadované zboží pro náš lid. \n\nJsme rádi, že náš obchod není svázán embargo, protože by to mohlo mít devastující následky pro naši ekonomiku." # todo: NEW TRANSLATION
  mongol_soviet_puppet.6.a: "Malá krize byla zažehnána" # todo: NEW TRANSLATION
  mongol_soviet_puppet.7.t: "[FROM.getNameDefCap] odmítá vyjednávat" # todo: NEW TRANSLATION
  mongol_soviet_puppet.7.d: "Navzdory našim prosbám o usmíření [FROM.getAdjective] odmítají zrušit obchodní sankce s odůvodněním, že takový krok nezastaví zahraniční propagátory působící v jejich zemích. \n\nNavíc se šíří zvěsti, že jejich úředníci nabádají okolní státy, aby na naši zemi také uvalily embargo! \n\nNeschopni potvrdit či vyvrátit pravdivost těchto zpráv, zvážíme, že uděláme naše agenty v [FROM.getNameDef] subtilnějšími, než bude předložen jakýkoli závažnější ultimátum." # todo: NEW TRANSLATION
  mongol_soviet_puppet.7.a: "To nezní dobře" # todo: NEW TRANSLATION
  mongol_soviet_puppet.8.t: "[FROM.getNameDefCap] posílá ultimátum k opuštění vnitřního vměšování" # todo: NEW TRANSLATION
  mongol_soviet_puppet.8.d: "Tvrdíce nutnost zabezpečit vlastní vnitřní stabilitu a sféru vlivu, vláda [FROM.getAdjective] vydala dekret o všeobecné mobilizaci svých ozbrojených sil! \n\nS jasnou přípravou na válku navíc zahájili sérii požadavků tvrzíce, že jsme zodpovědní za nedávné nepokoje a rostoucí podporu komunismu mezi venkovskými masami! \n\nTito válečníci jsou připraveni "zhatit komunistickou hrozbu", bude-li nutné, pokud se nevzdáme všech propagandistických aktivit v jejich zemích. Co uděláme?" # todo: NEW TRANSLATION
  mongol_soviet_puppet.8.a: "Co hodlají udělat? Vyhlásit nám válku?" # todo: NEW TRANSLATION
  mongol_soviet_puppet.8.b: "Ustoupit" # todo: NEW TRANSLATION
  mongol_soviet_puppet.9.t: "Ultimátum odmítnuto" # todo: NEW TRANSLATION
  mongol_soviet_puppet.9.d: "Navzdory jasným důkazům, které jsme předložili, [FROM.getAdjective] úředníci odmítli jakékoli obvinění a tvrdí, že důkazy jsou padělané a skutečnou hrozbou v regionu je jen naše neschopná vláda! \n\nTaková obvinění nemohou být tolerována jakýmkoli rozumným způsobem, proto připravíme naše ozbrojené síly zdrcnout tento otravným národ jednou provždy! \n\nPohraniční hlídky jsou již posíleny čerstvě naverbovanými jednotkami a jen potřebujeme trochu času k přípravě. Na válku! Sláva [ROOT.getAdjective]!" # todo: NEW TRANSLATION
  mongol_soviet_puppet.9.a: "Čas jít na to tvrdě" # todo: NEW TRANSLATION
  mongol_soviet_puppet.10.t: "[FROM.getNameDefCap] ustoupil požadavkům" # todo: NEW TRANSLATION
  mongol_soviet_puppet.10.d: "Naše ultimáta je zřejmě zastrašila a zahraniční úředníci poslali slavnostní delegaci do našeho hlavního města, oznamující svou touhu po věčném míru! \n\nPo kole diskuzí také poskytli přísahu, že přestanou s jakýmkoli vnitřním vměšováním a poskytnou data o dalších členech sítě agentů, kteří narušovali mysl a srdce našeho lidu komunistickými myšlenkami. \n\nSlavný den pro [ROOT.getNameDef] a její lid!" # todo: NEW TRANSLATION
  mongol_soviet_puppet.10.a: "Jak očekáváno" # todo: NEW TRANSLATION
  mongol_soviet_puppet.11.t: "Mongolsko podporuje komunistické povstání" # todo: NEW TRANSLATION
  mongol_soviet_puppet.11.d: "Zpráva o dalším komunistickém povstání, které si klade za cíl "osvobodit proletariát a vytvořit dělnickou republiku", dorazila dnes ráno do našeho štábu. \nO několik hodin později [MON.getLeader] oznámil světu, že vůdci nově vzniklé revoluční vlády požádali o [MON.getAdjective] podporu a jednomyslně hlasovali pro upevnění jejich vztahů tím, že se stali řízeným režimem v jejich boji za nezávislost! \n\n[MON.getNameDefCap] nyní stojí jako pevná záruka komunistického ráje v regionu, připravena absorbovat více a více režimů pod jejich vedením." # todo: NEW TRANSLATION
  mongol_soviet_puppet.11.a: "Udělali CO?" # todo: NEW TRANSLATION
  mongol_soviet_puppet.11.b: "Vítejte, bratři a sestry!" # todo: NEW TRANSLATION
  mongol_soviet_puppet.11.c: "Co si to vůbec myslí?!" # todo: NEW TRANSLATION
  mongol_soviet_puppet.11.e: "Naše nové osud čeká!" # todo: NEW TRANSLATION
  mongol_soviet_puppet.11.f: "Zajímavé, skutečně." # todo: NEW TRANSLATION
  mongol_soviet_puppet.12.t: "[FROM.getNameDefCap] nabízí program přesunu průmyslu" # todo: NEW TRANSLATION
  mongol_soviet_puppet.12.d: "Snažíc se zabezpečit průmysly naší země před postupujícím nepřítelem, [MON.getAdjective] úředníci předložili návrh převezení existujících průmyslových závodů z ohrožených Uralů a Střední Asie dále na východ, na území mongolského proper. \n\nMožná k těmto továrnám nebudeme mít přímý přístup, ale naši bratři v [MON.getNameDef] nám slíbili dodat podstatné procento svých vlastních průmyslových kapacit výměnou za takovou operaci. \n\nJaké bude rozhodnutí Štáb?" # todo: NEW TRANSLATION
  mongol_soviet_puppet.12.a: "Přesunout zbrojní továrnu" # todo: NEW TRANSLATION
  mongol_soviet_puppet.12.b: "Přesunout civilní komplex do bezpečí" # todo: NEW TRANSLATION
  mongol_soviet_puppet.12.c: "Tyto továrny jsou zde bezpečné" # todo: NEW TRANSLATION
  mongol_soviet_puppet.13.t: " [FROM.getAdjective] přemisťují vojenskou továrnu" # todo: NEW TRANSLATION
  mongol_soviet_puppet.13.d: "Stavka oznámila, že jedna z jejich zbrojařských zařízení je připravena k přesunu dále na východ, posilujíc naše vojenské schopnosti na úkor několika průmyslových výnosů z naší strany. \n\nNaše rostoucí průmyslové kapacity budou velkou pomocí nejen našim [SOV.getAdjective] přátelům, ale i nám." # todo: NEW TRANSLATION
  mongol_soviet_puppet.13.a: "Skvělé!" # todo: NEW TRANSLATION
  mongol_soviet_puppet.14.t: "[FROM.getAdjective] převedli průmyslový komplex" # todo: NEW TRANSLATION
  mongol_soviet_puppet.14.d: "Zpráva uvádí, že průmyslový komplex je již na cestě do bezpečného místa v Mongolsku proper. \n\nStavka hlásí, že bychom neměli zapomenout na naši část dohody a proto dokončíme naši část smlouvy podpisem průmyslového kontraktu, abychom našim bratrům pomohli." # todo: NEW TRANSLATION
  mongol_soviet_puppet.14.a: "Skvělé!" # todo: NEW TRANSLATION
  mongol_soviet_puppet.15.t: "Žádost zamítnuta" # todo: NEW TRANSLATION
  mongol_soviet_puppet.15.d: "Stavka informuje, že nyní nejsou schopni vytvořit spolehlivou, bezpečnou a jistou trasu k nám, a proto pošleme další žádost v budoucnu, pokud budeme chtít pokusit se přesunout další průmyslový komplex do našich srdcí. \n\nNěkteří naši rezidenti zmiňují, že to může snížit jejich vliv nad námi, což by pro nás mohlo být také výhodné." # todo: NEW TRANSLATION
  mongol_soviet_puppet.15.a: "Možná příště?" # todo: NEW TRANSLATION
  mongol_soviet_puppet.16.t: "Nový maják komunismu" # todo: NEW TRANSLATION
  mongol_soviet_puppet.16.d: "Uvědomujíc si nutnost změny politického klimatu Komunistického internacionálu, [MON.getAdjective] politici veřejně vyjádřili znepokojení nad rostoucí politickou nestabilitou a nedávnými vojenskými porážkami [SOV.GetNameDef]. \n\n"Je to jen pro větší dobro koordinovat spojené úsilí z dobře bráněného a posíleného místa", uvedl [MON.getLeader] na konci svého projevu, čímž oficiálně převzal vedení aliance [MON.getFactionName]." # todo: NEW TRANSLATION
  mongol_soviet_puppet.16.a: "Od nynějška budeme vést." # todo: NEW TRANSLATION
  mongol_soviet_puppet.16.b: "Připravují se na to, co přijde." # todo: NEW TRANSLATION
  mongol_soviet_puppet.16.c: "To jim nepomůže!" # todo: NEW TRANSLATION
  mongol_soviet_puppet.16.e: "Válka eskaluje..." # todo: NEW TRANSLATION
  mongol_soviet_puppet.16.f: "Naše aliance sílí." # todo: NEW TRANSLATION
  mongol_soviet_puppet.17.t: "[FROM.getNameDefCap] navrhuje sjednocení do jedné vlády" # todo: NEW TRANSLATION
  mongol_soviet_puppet.17.d: "Ve svém projevu dnes [FROM.getLeader] veřejně prohlásil: \n"Svět se mění. Kdo má nyní sílu postavit se vojskům [FROM.getNameDef] a [ROOT.getNameDef]? Postavit se síle [FROM.getLeader] a [ROOT.getLeader] a unii dvou států. Spolu, můj příteli [ROOT.getLeader], vládneme této zemi pro revoluci." \n\nRozhodně sporný projev byl přijat potleskem tisíců, desetitisíců Mongolů po [MON.getNameDef] s mnoha našimi občany připojujícími se k výzvě pro Jednotnou vládu, která by byla schopna bránit hodnoty [ROOT.getFactionName] po celém světě. Jaká bude odpověď vrchního velitele?" # todo: NEW TRANSLATION
  mongol_soviet_puppet.17.a: "Jedna unie, nedělitelná" # todo: NEW TRANSLATION
  mongol_soviet_puppet.17.b: "Samostatně si vystačíme." # todo: NEW TRANSLATION
  mongol_soviet_puppet.18.t: "[FROM.getAdjective] souhlasili s naší žádostí" # todo: NEW TRANSLATION
  mongol_soviet_puppet.18.d: "[FROM.getAdjective] politici, zoufale snažící se vyřešit probíhající vojenský a administrativní kolaps své země, přijali náš návrh na vytvoření jednotného státu [FROM.getAdjective]-[ROOT.getAdjective]. \n\nPosílené generální štáby již začaly pracovat na tvorbě nových plánů boje zaměřených na odražení nepřátelských postupů a znovuzískání území, která padla pod cizí kontrolu. Naši zástupci byli nyní vysláni do právě znovuzískaných území, aby vyřešili byrokratický chaos v nově získaných oblastech." # todo: NEW TRANSLATION
  mongol_soviet_puppet.18.a: "Vše probíhá podle plánu." # todo: NEW TRANSLATION
  mongol_soviet_puppet.19.t: "[FROM.getNameDefCap] zvažuje naši žádost" # todo: NEW TRANSLATION
  mongol_soviet_puppet.19.d: "Vysoké velitelství [FROM.getAdjective] nás informovalo, že tak charismatický projev [ROOT.getLeader] posílil jejich vlastenecké cítění a pevnou víru v revoluční ideje, což naznačuje, že jejich lid stojí jednotně v boji proti nepříteli pod vlajkami a prapory [FROM.getNameDef]. Tvrdíce, že administrativní unifikace by jen zhoršila situační velení na frontě, [FROM.getLeader] uctivě odmítl čestnou nabídku. \n\nZdá se, že stále věří, že krizi dokáží vyřešit vlastními vojenskými prostředky a silně se spoléhat na podporu civilistů. Uvidíme, zda je to pravda." # todo: NEW TRANSLATION
  mongol_soviet_puppet.19.a: "Snažili jsme se." # todo: NEW TRANSLATION
  mongol_rp_advisor.1.t: "První hlášení do kanceláře velení" # todo: NEW TRANSLATION
  mongol_rp_advisor.1.d: "Zdravím, soudruhu, a dovolte mi pogratulovat k nedávnému jmenování jedním z osobních poradců Peljidiina Gendena! \nS lidmi jako jste vy se Genden snaží vést naše velké [MON.getName] k slavné a prosperující budoucnosti. Jmenuji se Dald Zövlökh a již dlouho působím v oddělení vnitřní bezpečnosti jako osobní poradce pro mladé velitelské talenty jako jste vy. Vaše dosavadní znalosti mohou silně záviset na předchozích zkušenostech a aimagu, kam jste byl přidělen. Celkovou situaci lze stručně popsat následovně:\n\nNaše země je stále považována za integrální součást [CHI.getNameDef], i když jejich vedení má v regionu málo nebo žádnou efektivní moc. \n[JAP.getAdjective] imperialisté neustále zvyšují aktivitu ve východních regionech naší země poté, co obsadili majetky Fengtian klanu v roce 1932. \nJediným skutečným spojencem v takových okolnostech byl SSSR, který nám poskytl ideologickou a materiální pomoc od lidové revoluce v roce 1924, čímž výrazně upevnil svůj vliv v našem státě.\n\nS Gendenem a Demidem momentálně na návštěvě v Moskvě můžeme poslat několik nabídek přes telegraf, o jaká další témata by se měli na konferenci zabývat. Čas je omezen a každá hodina se počítá! \n\nNechám vás připravit. Zövlökh konec." # todo: NEW TRANSLATION
  mongol_rp_advisor.1.a: "Očekávám další hlášení v budoucnu." # todo: NEW TRANSLATION
  mongol_rp_advisor.1.b: "Jsem si dobře vědom toho, co dělám, Dalde. Žádná další hlášení nejsou nutná." # todo: NEW TRANSLATION
  mongol_anti_soviet.1.t: "Přechodná vláda ustanovena" # todo: NEW TRANSLATION
  mongol_anti_soviet.1.d: "Po katastrofálním selhání, které vyplynulo z naší delegace snažící se zajistit národní identitu v těchto nejistých časech, se vládní struktury podařilo konsolidovat různé frakce stranické elity a vytvořit přechodný režim, který bude vládnout zemi v těchto nejistých časech. \n\nNěkolik rozdělujících zájmů s několika vůdci bojujícími o moc rozhodně nepřispívá k úspěchu vlády, ale přinejmenším mají mnoho otevřených návrhů. \n\nJe nejlepší hledat jakoukoli formu stabilního a solidního vedení nebo se pokusit zachránit bojujícího Gendena, pokud to stále bude možné." # todo: NEW TRANSLATION
  mongol_anti_soviet.1.a: "Prozatím povedou oni" # todo: NEW TRANSLATION
  mongol_anti_soviet.2.t: "Našli jsme ho!" # todo: NEW TRANSLATION
  mongol_anti_soviet.2.d: "Hledání 9. Jebtsundamba Khutughtu, moderní reinkarnace Bogd Khána zemřelého v roce 1924, se ukázalo jako velký úspěch.\n\nPo tom, co naši mniši shromáždili všechny chlapce ve věku od dvou do pěti let v místní vesnici, byly na každém z účastníků provedeny tři série testů. O několik hodin později výsledky konečného testu pomohly identifikovat pravého reinkarnovaného Jebtsundamba Khutuktu! \n\nPůvodně narozený jako Jampal Namdol Chökyi Gyaltsen byl chlapci oznámeno jeho pravé jméno a že představuje bývalého ducha, který sjednocoval buddhisty Vnějšího Mongolska. Jeho rodiče přísahali, že zjištěná zjištění budou držet v tajnosti, dokud se politická situace nezklidní." # todo: NEW TRANSLATION
  mongol_anti_soviet.2.a: "Skvělé! Ale držet to teď v tajnosti." # todo: NEW TRANSLATION
  mongol_anti_soviet.3.t: "Nikdo neuspěl v testu" # todo: NEW TRANSLATION
  mongol_anti_soviet.3.d: "Vesnice za vesnicí, město za městem, a přesto žádný kandidát neprošel sadou testů určených k objevení nové identity 9. Jebtsundamba Khutughtu. \n\nNaše pátrací skupiny již nadále nikoho vyhledávat v regionu nebudou, což naznačuje, že reinkarnace Bogd Khána je rozhodně někde jinde na tibetské plošině. Rozhodnutí je na nás, zda budeme pokračovat v tomto časově a zdrojově náročném úsilí." # todo: NEW TRANSLATION
  mongol_anti_soviet.3.a: "Nic, ale nevzdáme se!" # todo: NEW TRANSLATION
  mongol_anti_soviet.3.b: "Nic? Už je to příliš velké úsilí." # todo: NEW TRANSLATION
  mongol_anti_soviet.4.t: "Jmenování nového předsedy" # todo: NEW TRANSLATION
  mongol_anti_soviet.4.d: "" # todo: NEW TRANSLATION
  mongol_anti_soviet.4.a: "Chen Duxiu povede zemi na nové cestě ke komunismu!" # todo: NEW TRANSLATION
  mongol_anti_soviet.4.b: "Iosyef Satalinkhan převezme vedení dočasně." # todo: NEW TRANSLATION
  mongol_anti_soviet.4.c: "Předseda? Proč ne předsedkyně?" # todo: NEW TRANSLATION
  mongol_army.1.t: "Schéma přeorientování výroby" # todo: NEW TRANSLATION
  mongol_army.1.d: "S omezenými zdroji k dispozici se nemůžeme plně soustředit na masovou výrobu obrněných vozidel s různými specializacemi. \n\nNový návrh od našeho výzkumného a vývojového týmu navrhuje, abychom upravili naše výrobní linky a zařízení tak, aby odpovídaly konstrukci a nasazení úzce specializovaného tankového vybavení, jehož cílem bude buď být spolehlivý na bojišti za cenu rychlosti vozidla, mít nejlepší typ výzbroje za vyšší výrobní náklady, být levné na výrobu ale snadno porušitelné, nebo překonávat nejdelší vzdálenosti v nejkratším čase. \n\nVždy můžeme naše schémata později přesměrovat, avšak očekává se, že to bude nákladný a časově náročný proces." # todo: NEW TRANSLATION
  mongol_army.1.a: "Upřednostnit spolehlivé modely" # todo: NEW TRANSLATION
  mongol_army.1.b: "Podpořit modelování dobré kvality" # todo: NEW TRANSLATION
  mongol_army.1.c: "Zaměřit se na nejnižší výrobní náklady" # todo: NEW TRANSLATION
  mongol_army.1.e: "Tanky jsou pro rychlost, ne pro boj!" # todo: NEW TRANSLATION
  mongol_army.2.t: "Nadějný generál" # todo: NEW TRANSLATION
  mongol_army.2.d: "Náš rozšiřující se generální štáb zoufale potřebuje nové kandidáty, kteří září nadšením, jsou otevření a mohou našim starším důstojníkům poskytnout spoustu nových a neobvyklých taktik k práci. Nedávný dekret vyhlásil konkurz na několik nových pozic plukovníků a generálů. \n\nS hrstkou přihlášek od různých nedávných absolventů vojenských vysokých škol se před komisí před několika dny objevil nadějný kandidát. \n\nJmenuje se Sandivyn Ravdan, je známý svou oddaností věci a aktivní službou v různých posádkách v posledních letech. Vynikající přírůstek pro náš generální štáb." # todo: NEW TRANSLATION
  mongol_army.2.a: "Přijmout ho!" # todo: NEW TRANSLATION
  mongol_army.3.t: "Žádost o převod plavidel" # todo: NEW TRANSLATION
  mongol_army.3.d: "Naši dobrodinci poslali dekret, kde některé lodě našich námořních sil jsou požadovány k převodu pod přímé velení jednoho z jejich námořních velitelů. Tvrdíce, že je to "pouze na omezenou dobu", naši informátoři hlásí přípravu na obsazení plných posádek složených převážně z [MON.getAdjective] námořníků. \n\nDodávání našim novým ochráncům nám umožňuje zvýšit naši autonomii s ohledem na to, jak přispíváme k potenciálnímu válečnému úsilí, avšak vždy můžeme některé lodě potopit, pokud je nechceme obětovat pro naše nové pány." # todo: NEW TRANSLATION
  mongol_army.3.a: "Máme omezený čas k dispozici" # todo: NEW TRANSLATION
  mongol_army.4.t: "Mongolsko žádá poradce" # todo: NEW TRANSLATION
  mongol_army.4.d: "Ratifikace smlouvy o vzájemné pomoci a spolupráci efektivně umožnila našim ozbrojeným silám být rozmístěny na [MON.getAdjective] půdě, avšak dosud jsme měli málo příležitostí komunikovat s jejich důstojníky. \n\nSnažíc se zvýšit naši vzájemně výhodnou spolupráci jejich generálové podepsali dekret žádající o zvýšené množství [SOV.getAdjective]ho vojenského personálu, který by byl schopen provádět vojenské manévry a cvičení na stálé bázi a posílit naši kontrolu v regionu, zatímco udrží [MON.getAdjective] armádu loajální nám. Jak odpovíme?" # todo: NEW TRANSLATION
  mongol_army.4.a: "Poslat kontingent pro asistenci armádě" # todo: NEW TRANSLATION
  mongol_army.4.b: "Malý tým postačí" # todo: NEW TRANSLATION
  mongol_army.4.c: "Naši lidé jsou potřeba jinde" # todo: NEW TRANSLATION
  mongol_army.5.t: "[SOV.getAdjective] souhlasili poslat tým" # todo: NEW TRANSLATION
  mongol_army.5.d: "Naše skromná žádost získala silnou podporu u [SOV.getAdjective]ho generálního štábu, který zvažuje vyslání dobře vybaveného a vytrénovaného týmu k asistenci při rozvoji našich doktrín na místě. \n\nPřipojen byl dodatečný protokol, uvádějící, že někteří z jejich členů posádky budou také dohlížet na modernizaci a výcvik naší armády jako součást další vojenské mise." # todo: NEW TRANSLATION
  mongol_army.5.a: "Skvělé!" # todo: NEW TRANSLATION
  mongol_army.6.t: "Mírná asistence od [SOV.getAdjective]ů" # todo: NEW TRANSLATION
  mongol_army.6.d: "[SOV.getAdjective] soudruzi se rozhodli omezit svou vojenskou misi na několik poradců, kteří budou dohlížet na celkový rozvoj našich ozbrojených sil a jejich přeozbrojení podle moderních standardů. \n\nNaši generálové podali několik dalších žádostí, ale mnohé z nich byly zřejmě ignorovány nebo odloženy na vyšší polici nějakého byrokratického úřadu k "posouzení v vhodnější době". \n\nLepší než nic, ale bohužel ne tak účinné." # todo: NEW TRANSLATION
  mongol_army.6.a: "Velmi dobře!" # todo: NEW TRANSLATION
  mongol_army.7.t: "Žádná vojenská mise neposlána" # todo: NEW TRANSLATION
  mongol_army.7.d: "Tvrdíce, že jakýkoli další zásah by zvýšil napětí v regionu a eskaloval již nejistou situaci, [SOV.getLeader] oznámil, že vojenská spolupráce bude posílena "v blízké budoucnosti, kdy budou okolnosti příznivější"... \n\nZničující vývoj, ale možná můžeme využít některé z jednání, která jsme slyšeli na místě, abychom získali nějaké bezplatné vojenské odborné znalosti?" # todo: NEW TRANSLATION
  mongol_army.7.a: "Jak hrozné!" # todo: NEW TRANSLATION
  mongol_foreign_influence.2.t: "Administrativní integrace Mongolska" # todo: NEW TRANSLATION
  mongol_foreign_influence.2.d: "Náš vliv v [MON.getNameDef] vedl k prekérní situaci, kde jejich vnitřní a vnější politika je silně závislá na naší pomoci. \n\nViděce boj [MON.getAdjective] lidu v jejich zápasu o přežití [ROOT.getLeader] zvažoval jmenování loajální vlády, která by upevnila naši nadvládu nad zemí v těchto nejistých a nebezpečných časech." # todo: NEW TRANSLATION
  mongol_foreign_influence.2.a: "Poslat vyslance oznamující nové pořadí" # todo: NEW TRANSLATION
  mongol_foreign_influence.2.b: "Není v našem zájmu" # todo: NEW TRANSLATION
  mongol_foreign_influence.3.t: "Mongolsko sympatizuje s naší věcí!" # todo: NEW TRANSLATION
  mongol_foreign_influence.3.d: "Obdrželi jsme tajný telegram z [MON.getNameDef], kde [MON.getLeader] žádá jejich loajalitu k naší věci v těchto nejistých časech. \n\nVzhledem k revolučnímu boji našeho lidu jejich vyslanci navrhli smlouvu o vzájemné pomoci a spolupráci v boji lidové revoluce. \n\nMěli bychom je považovat za přátele nebo zůstat neutrální?" # todo: NEW TRANSLATION
  mongol_foreign_influence.3.a: "Velmi dobře!" # todo: NEW TRANSLATION
  mongol_foreign_influence.3.b: "Nejsme tímto zájmem." # todo: NEW TRANSLATION
  mongol_foreign_influence.4.t: "[FROM.getAdjective] úředníci přijali dohodu" # todo: NEW TRANSLATION
  mongol_foreign_influence.4.d: "Naše delegace se dnes ráno setkala s jejich delegací, aby projednala záležitost vzájemně výhodné pomoci v tomto boji. \n\nDohoda podepsaná oběma stranami oficiálně upevňuje naši alianci s [FROM.getNameDef] a jejich vůdcem [FROM.getLeader], což nám umožní prosazovat různé diplomatické ústupky v tomto boji." # todo: NEW TRANSLATION
  mongol_foreign_influence.4.a: "Ať je to plodná spolupráce!" # todo: NEW TRANSLATION
  mongol_foreign_influence.5.t: "[FROM.getAdjective]-[ROOT.getAdjective] dohoda zamítnuta" # todo: NEW TRANSLATION
  mongol_foreign_influence.5.d: "Navzdory našemu nejlepšímu úsilí [FROM.getLeader] se nenechal přesvědčit našimi "vágními sliby a prázdnými hrozbami", což naznačuje, že se snažíme využít nově získanou dohodu k získání nespravedlivé výhody v této nejisté situaci. \n\nS ukončením jednání se naši diplomaté vracejí s prázdnýma rukama do hlavního města, přinášejíce znepokojivé zprávy." # todo: NEW TRANSLATION
  mongol_foreign_influence.5.a: "To je škoda" # todo: NEW TRANSLATION
  mongol_foreign_influence.6.t: "[MON.getAdjective] úředníci ohlásili touhu zasáhnout do občanské války" # todo: NEW TRANSLATION
  mongol_foreign_influence.6.d: "Snažíc se "vyřešit a ukončit probíhající konflikt v Sovětském svazu jednou provždy", [MON.getLeader] veřejně prohlásil, že [MON.getAdjective] lidé jsou připraveni vložit se do boje za odkaz Ruské revoluce a pravé hodnoty komunistických ideálů. \n\nTvrdíce, že nastal čas přestat se skrývat ve stínu obra, [MON.getNameDef] připravuje své síly k zásahu do Ruské občanské války v těchto kritických časech pro naši vlast." # todo: NEW TRANSLATION
  mongol_foreign_influence.6.a: "Ach ne! Každopádně..." # todo: NEW TRANSLATION
  mongol_foreign_influence.10.t: "Mongolsko nás pozvalo zabezpečit jednoho z warlordů" # todo: NEW TRANSLATION
  mongol_foreign_influence.10.d: "Uvědomujíc si naši hlavní roli a schopnosti v Čínské občanské válce, [MON.getAdjective] diplomaté oslovili naše úředníky se zvědavým návrhem rozdělení sfér vlivu a příslušného warlordského státu v našem sousedství. \n\nVypracovaný plán by měl vypadat následovně: nejprve rozdělíme strategické oblasti budoucího protivníka a jejich satelitů, pokud jsou přítomni a k dispozici pro získání. \n\nPo nakreslení plánu bude vydán ultimátum žádající buď usmíření s regionálními mocnostmi, nebo diplomatickou izolaci a rychlé zničení. \n\nLidé se ptají, zda se přidáme do boje a získáme z toho nějaká území. Jaké bude konečné rozhodnutí [ROOT.getLeader]?" # todo: NEW TRANSLATION
  mongol_foreign_influence.10.a: "Rádi se přidáme!" # todo: NEW TRANSLATION
  mongol_foreign_influence.10.b: "Jiné záležitosti jsou důležitější" # todo: NEW TRANSLATION
  mongol_foreign_influence.11.t: "[FROM.getAdjective] militanti zahájí své síly" # todo: NEW TRANSLATION
  mongol_foreign_influence.11.d: "[FROM.getLeader] nás informoval, že pošle diplomaty a vojenský kontingent k zajištění odtrženého regionu. \n\nVšechno, co nyní musíme udělat, je rozdělit sféry vlivu podle našich přání a vůle našich spojenců. \n\nPoté vydáme ultimátum a uvidíme, jak se hranice Středního rovinění přeskupí v náš prospěch, diplomaticky nebo vojensky..." # todo: NEW TRANSLATION
  mongol_foreign_influence.11.a: "Nádhera!" # todo: NEW TRANSLATION
  mongol_foreign_influence.12.t: "[FROM.getAdjective] úředníci nevykazují zájem" # todo: NEW TRANSLATION
  mongol_foreign_influence.12.d: "Neschopni uvolnit další zdroje pro náš "nebezpečný podnik" [FROM.getLeader] odmítl naši pokornou nabídku. \n\nNebudeme schopni spoléhat na jejich podporu v tomto boji, ale bylo to vůbec potřeba, když se nad tím zamyslíme? \n\nNáš ministr zahraničí již řekl, že taková zdrženlivost nám jen dá více prostoru k manévrování." # todo: NEW TRANSLATION
  mongol_foreign_influence.12.a: "Škoda pro ně" # todo: NEW TRANSLATION
  mongol_foreign_influence.13.t: "[FROM.getAdjective] úředníci nám předali ultimátum!" # todo: NEW TRANSLATION
  mongol_foreign_influence.13.d: "Diplomatické mise z různých zemí nedávno dorazily do hlavních kanceláří našich činitelů a vedeny [MON.getAdjective] delegací nám předaly dlouhý seznam požadavků, kde je diskutováno rozdělení našich oprávněných území! \n\nV předložených dokumentech tvrdí, že "doba warlordismu je minulostí a Střední planina bude přeuspořádána podle potřeb regionálních mocností schopných sjednotit roztroupené národy, které v posledních desetiletích viděly jen trosky." \n\nNáš ministr zahraničí byl šokován surovostí požadavků a množstvím ústupků, které bychom měli poskytnout, abychom zajistili mír. \n\nZdá se, že naši nepřátelé důkladně připravili program..." # todo: NEW TRANSLATION
  mongol_foreign_influence.13.a: "Podvolíme se" # todo: NEW TRANSLATION
  mongol_foreign_influence.13.b: "Nikdy se nevzdáme!" # todo: NEW TRANSLATION
  mongol_foreign_influence.14.t: "[FROM.getAdjective] úředníci přijali nevyhnutelné" # todo: NEW TRANSLATION
  mongol_foreign_influence.14.d: "Neschopni odolat diplomatickému tlaku Koalice [FROM.getLeader] byl donucen odstoupit a předat moc nově ustanovené přechodné vládě, která se ujala obrovského úsilí přeorganizovat administrativní dělení země. \n\nPo několika tvrdých dnech byla území převedena příslušným spojencům a administrace země se efektivně rozpadla." # todo: NEW TRANSLATION
  mongol_foreign_influence.14.a: "Přesně jak bylo naplánováno" # todo: NEW TRANSLATION
  mongol_foreign_influence.15.t: "[FROM.getAdjective] mobilizuje!" # todo: NEW TRANSLATION
  mongol_foreign_influence.15.d: "Ve snaze zabezpečit zbytky rozpadající se země [FROM.getLeader] rozhodl, že čestný boj je lepší než "takové zkažení", což vedlo k vyhlášení výjimečného stavu napříč zemí a rozpuštění různých diplomatických institucí. \n\nS koaličními silami na jejich hranici je jakákoli cizí intervence minimalizována, dokud zpráva o naší invazi nedorazí k světovým diplomatům. \n\nMáme omezený čas k dispozici a proto to využijeme moudře." # todo: NEW TRANSLATION
  mongol_foreign_influence.15.a: "Vybrali si svůj osud" # todo: NEW TRANSLATION
