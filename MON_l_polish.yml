  MON_soviet_NKVD_agents: "Sovětští agenti NKVD"
  MON_soviet_NKVD_agents_desc: "Dědictví revoluce z roku 1924 přineslo jednopartijní systém, který silně spoléhá na podporu a dohled sovětských civilních a vojenských odborníků. Někteří z těchto specialistů mají pevný vliv na politiku země."
