  MON_troika_organized: "Organizovaná "Troika""
  MON_troika_organized_desc: "Následujeme příklad stalinských revolučních trojek a zřídili jsme vlastní trojku, kterou má vést Choibalsan, aby vrátil pořádek a zákon do státu."
  MON_political_opposition_organizing: "Organizování politické opozice"
  MON_political_opposition_organizing_desc: "Když chápou, že jsou odstraňováni z moci, militaristé se pokusí svrhout vládu a ustanovit vojenskou diktaturu. Musíme být připraveni na jejich úder a organizovat vlastní základnu podpory!"
