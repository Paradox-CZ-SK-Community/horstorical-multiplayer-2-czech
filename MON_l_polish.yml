  MON_go_on_pilgrimage_to_the_burkhan_khaldun_desc: "Nejposvátnější hora v Mongolsku, Burkhan Khaldun, může být také posledním odpočinkem Čingischána a jeho nástupců. Místo velkého významu pro každého Mongola, který chce vládnout všemu pod nebem." # todo: NEW TRANSLATION
