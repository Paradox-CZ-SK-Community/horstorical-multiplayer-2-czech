  MON_specialized_crews_tt: "Umožňuje §HSpecializované osádky§!.\nMinimální úroveň výcviku: §R+5%§! \nVšechny obrněné jednotky :\n    Maximální organizace : §G+3§! \n    Průlom : §G+10%§!\n    Obnova organizace : §G+5%§!" # todo: NEW TRANSLATION
  ROOT_is_in_central_asia_tt: "Je ve Střední Asii" # todo: NEW TRANSLATION
  MON_peljidiin_genden_desc: "Narodil se v chudé pastevecké rodině na přelomu století, Genden se brzy přidal k Mongolské lidové revoluční straně a získal podporu mnoha starších stranických vůdců díky své jednoduché a otevřené rétorice. Když začala lidová revoluce v roce 1924, mladý proletář byl jmenován předsedou Baga Khural, což mu otevřelo cestu do nejvyšších pater moci. \n\nPodpora sovětských úředníků mu umožnila stát se jedním ze tří státních tajemníků po Sedmém stranickém sjezdu v roce 1928. Rada začala provádět tvrdou kolektivizaci a protibuddhistické politiky, které vedly k otevřeným povstáním po celé zemi. Jeho přežití protipurge bylo svázáno s vysokou loajalitou k věci a přímým dohledem Iosifa Stalina v roce 1932. \n\nTento vztah však dlouho nevydržel, protože pro-náboženské postoje nevychovaného Gendena jej na počátku roku 1935 učinily „nespolehlivým spojencem“ v očích různých sovětských úředníků..." # todo: NEW TRANSLATION
