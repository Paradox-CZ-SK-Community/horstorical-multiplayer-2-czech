  MON_ill_educated_population_idea: "Špatně vzdělané obyvatelstvo" # todo: NEW TRANSLATION
  MON_ill_educated_population_idea_desc: "Kvůli geografické poloze a jazykovým specifikám stát postrádá centralizovaný vzdělávací systém schopný podporovat mladé a zvědavé mysli. Gramotnost národa byla na počátku 30. let odhadována na přibližně 10%." # todo: NEW TRANSLATION
  MON_population_learning_idea: "Vzdělávání populace" # todo: NEW TRANSLATION
  MON_population_learning_idea_desc: "Reformy školství v posledních letech se ukázaly jako relativně účinné. Celková úroveň gramotnosti v zemi se zlepšuje a více lidí je ochotno využívat dostupné znalosti." # todo: NEW TRANSLATION
  Mon_elementary_schools_idea: "Rozšíření základních škol" # todo: NEW TRANSLATION
  Mon_elementary_school_ideas_desc: "Vládní prostředky byly určeny na výrazné rozšíření současných vzdělávacích standardů po celé zemi." # todo: NEW TRANSLATION
  Mon_tech_coop_idea: "Technologická spolupráce" # todo: NEW TRANSLATION
  Mon_tech_coop_idea_desc: "Máme se co naučit od našich partnerů, ať je tato spolupráce co nejplodnější!" # todo: NEW TRANSLATION
  Mon_soviet_advisors_idea: "[SOV.getAdjective] vojenské poradci" # todo: NEW TRANSLATION
  Mon_soviet_advisors_idea_desc: "[SOV.GetAdjective] vojenské odborníky byly vyslány na naše území jako součást naší smlouvy o vzájemné pomoci." # todo: NEW TRANSLATION
  Mon_soviet_crew_idea: "[SOV.getAdjective] vojenská posádka" # todo: NEW TRANSLATION
  Mon_soviet_crew_idea_desc: "Několik [SOV.getAdjective] generálů a teoretiků pomáhá našemu generálnímu štábu." # todo: NEW TRANSLATION
  MON_changed_script_idea: "Změněné písmo" # todo: NEW TRANSLATION
  MON_changed_script_idea_desc: "Staré mongolské písmo mělo různé formy zápisu, které výrazně brzdily vzdělávací proces našich dětí. Nové změny umožňují našemu obyvatelstvu učit se efektivněji." # todo: NEW TRANSLATION
  MON_script_reform_in_progress_idea: "Probíhá reforma písma" # todo: NEW TRANSLATION
  MON_script_reform_in_progress_idea_desc: "Momentálně se vynakládají velké úsilí k sjednocení neuspořádaného systému psaní [MON.getNameDef]." # todo: NEW TRANSLATION
  MON_weak_currency_idea: "Slabá měna" # todo: NEW TRANSLATION
  MON_weak_currency_idea_desc: "Navzdory zavedení národní měny v roce 1925 zůstává tugrik nepopulární mezi masami, které stále spoléhají na čínský jüan, sovětský rubl, americké nebo mexické dolary a desítky dalších nízkonominálních měn na černém trhu." # todo: NEW TRANSLATION
  MON_new_course_policy_idea: "Politika Nového směru" # todo: NEW TRANSLATION
  MON_new_course_policy_idea_desc: "Nelítostné kolektivizační politiky uplatněné státními orgány na začátku 30. let téměř způsobily povstání v západních částech země, které bylo rychle potlačeno armádou a sliby lepších životních podmínek známými jako \"Politika Nového směru\", sloužící podobně jako Leninova NEP." # todo: NEW TRANSLATION
  MON_buddhist_opposition: "Buddhistický odpor" # todo: NEW TRANSLATION
  MON_buddhist_opposition_desc: "Náboženství má hluboké kořeny v mongolské společnosti a různé náboženské instituce využívají své moci a vlivu k otevřenému odporu proti státní politice a direktivám Ústředního výboru. Vysoké procento venkovského obyvatelstva věnovalo svůj život klášterům a nechtějí se podílet na státních záležitostech." # todo: NEW TRANSLATION
  MON_dominated_animal_husbandry_idea: "Převládající chov dobytka" # todo: NEW TRANSLATION
  MON_dominated_animal_husbandry_idea_desc: "Nomádský způsob života je běžný na rozlehlých planinách a hlasy industrializace zasáhly jen pár jedinců v nejvyšších sférách moci." # todo: NEW TRANSLATION
  MON_animal_husbandry_prioritised_idea: "Upřednostněný chov dobytka" # todo: NEW TRANSLATION
  MON_animal_husbandry_prioritised_idea_desc: "Naše dědictví a úspěch spočívají v chovu dobytka; to, co fungovalo po staletí, by mělo fungovat i v budoucnu." # todo: NEW TRANSLATION
  MON_industrial_growth_prioritised_idea: "Upřednostnění průmyslového růstu" # todo: NEW TRANSLATION
  MON_industrial_growth_prioritised_idea_desc: "Staletí využívání zvířat mají být změněna ve společné úsilí o národní průmyslovou revoluci!" # todo: NEW TRANSLATION
  MON_encourage_trade_idea: "Podporovaný obchod" # todo: NEW TRANSLATION
  MON_encourage_trade_idea_desc: "Náš trh těží z nově získaných obchodních dohod!" # todo: NEW TRANSLATION
  MON_improved_mining_facilities_idea: "Zlepšené těžební zařízení" # todo: NEW TRANSLATION
  MON_improved_mining_facilities_idea_desc: "S několika vládními investicemi může náš průmysl těžby poskytnout národnímu trhu větší množství surovin." # todo: NEW TRANSLATION
  MON_focus_on_south: "Zaměření na jih" # todo: NEW TRANSLATION
  MON_modernizing_transportation_system: "Modernizace dopravního systému" # todo: NEW TRANSLATION
  Mongolbank_very_high_funds: "§HMongolbank - Velmi vysoké prostředky§!"
  Mongolbank_very_high_funds_desc: "Těžko provozovat bankovní systém správně, přesto ekonomika kvete!"
  Mongolbank_high_funds: "§HMongolbank - Vysoké prostředky§!"
  Mongolbank_high_funds_desc: "Provoz financí zůstává problémem, přesto z toho průmysl výrazně profitovat."
  Mongolbank_moderate_funds: "§HMongolbank - Střední prostředky§!"
  Mongolbank_moderate_funds_desc: "Vyvážený přístup k řízení a podpoře průmyslu."
  Mongolbank_low_funds: "§HMongolbank - Nízké prostředky§!"
  Mongolbank_low_funds_desc: "Malé množství peněz a potenciálních půjček brzdí hospodářský růst země."
  Mongolbank_bankrupt: "§HMongolbank - Bankrot§!"
  Mongolbank_bankrupt_desc: "Bankrot a nemožnost vydávat půjčky. Je potřeba přímý vládní zásah!"
