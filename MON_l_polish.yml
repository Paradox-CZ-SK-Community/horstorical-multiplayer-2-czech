  MON_on_the_crossroads_of_the_world_category_desc: "Strategická poloha naší země kombinovaná s narůstajícími napětími ve východní a jihovýchodní Asii nám dovoluje usilovat o různé přízeňi okolních mocností v další Velké hře.\n§HPokud má nějaká země nad §R90§! £influence_icon na nás, může nás §Rozpodrobit§!§!\n\n §H [SOV.GetNameWithFlag] vliv:§! [?MON.sov_influence_in_mon|+0] £influence_icon \n\n §H [JAP.GetNameWithFlag] vliv:§! [?MON.jap_influence_in_mon|+0] £influence_icon \n\n §H [CHI.GetNameWithFlag] vliv:§! [?MON.chi_influence_in_mon|+0] £influence_icon \n\n §H [PRC.GetNameWithFlag] vliv:§! [?MON.prc_influence_in_mon|+0] £influence_icon \n\n" # todo: NEW TRANSLATION
