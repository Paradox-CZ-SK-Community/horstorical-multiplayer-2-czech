l_polish:
  NSB_soviet_five_year_plan.4643.t: "Systém spojenecké velké strategie" # todo: NEW TRANSLATION
  NSB_soviet_five_year_plan.4643.desc: "Systém rovnováhy sil 'Spojenecká velká strategie' může masivně upravit vaše válečné úsilí proti Ose a Větší asijsko‑tichomořské sféře soužití. Můžete získat bonusy a penalizace na základě toho, jak moc se přikláníte k buď §BJapan First!§! nebo §BGermany First!§!. Čím více se přikloníte k jedné z těchto možností, tím silnější je vaše frakce v boji proti danému národu, a tím relevantnější to je pro Spojeneckou velkou strategii. Jako Spojenci je kritické, abyste se nacházeli někde na spektru Germany First! před zahájením vylodění v Normandii, operace Husky nebo jiného boje proti Ose. Musíte zamezit Japonsku obsadit historické cíle, které se jim v realitě nepodařilo dobýt, jako §BArunchal Pradesh§!, §BPapua New Guinea§!, §BWake Island§!, a §BCeylon§!. Japonsko také donutí Spojence přiklonit se k Japan First! poté, co obsadí Singapur. Čím více cílů Japonsko obsadí, tím rychleji se Spojenci posouvají směrem k Japan First!. Naopak, obsazení určitých cílů proti Japonsku vás posune směrem k Germany First!, konkrétně §BMarcus Island§!, §BTaiwan§!, §BOkinawa§!, §BBangkok§!, a §BIwo Jima§!." # todo: NEW TRANSLATION
  NSB_soviet_five_year_plan.4643.a: "Rozumím." # todo: NEW TRANSLATION
  romania.7: "Shromáždění Železné gardy" # todo: NEW TRANSLATION
  romania.7.t: "Shromáždění Železné gardy" # todo: NEW TRANSLATION
  romania.7.desc: "Železná garda se shromáždila na místním náměstí; takové shromáždění je z mnoha důvodů nebezpečné. Jsou známi tím, že organizují hanobení místních památek, obtěžují místní menšiny, protestují proti vládním aktivitám a začínají potyčky s místními orgány." # todo: NEW TRANSLATION
  romania.7.a: "Nechte je si uspořádat jejich malé shromáždění..." # todo: NEW TRANSLATION
  romania.7.b: "Pokud se shromáždí, bude snazší je uvěznit." # todo: NEW TRANSLATION
  romania.8: "Obtěžování menšinových občanů" # todo: NEW TRANSLATION
  romania.8.t: "Železná garda obtěžuje menšiny" # todo: NEW TRANSLATION
  romania.8.desc: "Železná garda je proslulá svými xenofobními ideály a s potěšením je demonstruje vůči těm v Rumunsku, kteří nejsou považováni za 'Rumuny'. Nezasazení se za tyto menšiny povede k mezinárodnímu pobouření bez ohledu na naše současné postoje k těmto otázkám." # todo: NEW TRANSLATION
  romania.8.a: "Koho to zajímá?" # todo: NEW TRANSLATION
  romania.8.b: "To nestrpíme" # todo: NEW TRANSLATION
  romania.9: "Infiltrace prvků armády" # todo: NEW TRANSLATION
  romania.9.t: "Železná garda infiltrovaná do armády" # todo: NEW TRANSLATION
  romania.9.desc: "Naše špionážní síť hlásí, že Železná garda infiltrovala armádu, aby získala větší politickou moc v zemi. Pokud bude Železná garda pomalu nabývat podpory v armádě, nebude v případě ozbrojeného povstání nikdo, kdo by je zastavil." # todo: NEW TRANSLATION
  romania.9.a: "Armáda je dost silná na to, aby si s tím poradila sama." # todo: NEW TRANSLATION
  romania.9.b: "Spustit rozsáhlé vyšetřování" # todo: NEW TRANSLATION
  romania.10.t: "Politický atentát" # todo: NEW TRANSLATION
  romania.10.desc: "Byl zavražděn nižší politik; vrah byl dopaden a tvrdí, že dotyčný politik byl obviňován z navazování aktivit s osobami ne‑rumunského původu. Policie ho nyní drží ve vězení." # todo: NEW TRANSLATION
  romania.10.a: "Ten politik byl příliš upřímný." # todo: NEW TRANSLATION
  romania.10.b: "Nechť spravedlnost udeří, dokud je železo žhavé" # todo: NEW TRANSLATION
  romania.11.t: "Teroristické bombardování" # todo: NEW TRANSLATION
  romania.11.desc: "V Rumunsku došlo k několika velkým teroristickým bombovým útokům; Železná garda tvrdí, že ničí majetek nerumunských obyvatel. Veřejnost je pobouřená, bojí se o své životy a ptá se, jak a proč mohla vláda něco takového připustit..." # todo: NEW TRANSLATION
  romania.11.a: "Vše to jsou nešťastné nehody..." # todo: NEW TRANSLATION
  romania.11.b: "Všem bude vyplacena náhrada a pachatelé budou dopadeni." # todo: NEW TRANSLATION
  romania.12.t: "Rumunské volby 1937" # todo: NEW TRANSLATION
  romania.12.desc: "Ve volbách v prosinci 1937 získala vládnoucí Národní liberální strana premiéra Gheorghe Tătărescu nejvíce křesel, avšak méně, než by bylo třeba k vytvoření většinové vlády v parlamentu. Strana 'All for Fatherland' získala ve volbách 1937 16 % hlasů, což znamenalo vrchol volebního úspěchu Železné gardy. Přesto však král Carol II. jmenoval radical‑ně antisemitického básníka Octaviana Gogu premiérem." # todo: NEW TRANSLATION
  romania.12.a: "Takhle umírá demokracie?" # todo: NEW TRANSLATION
  romania.13.t: "Rumunské volby 1938" # todo: NEW TRANSLATION
  romania.13.desc: "Carol vyhověl Gogově žádosti o rozpuštění parlamentu pro nové volby dne 18. ledna 1938. Volby 1938 byly jedněmi z nejnásilnějších v rumunské historii, když Železná garda a polovojenské křídlo Národní křesťanské strany Lăncieri bojovaly o kontrolu ulic Bukurešti a snažily se upevnit své antisemitské postavení útoky na židovské obyvatele. To bylo samozřejmě součástí plánu Cara, který toužil po moci, aby mohl převzít vládu v Rumunsku. Rumunsko nyní stojí na křižovatce: buď podlehneme polovojenským křídlům, která se stávají čím dál agresivnějšími, nebo důvěřujeme našemu králi, že ochrání zemi a její zájmy." # todo: NEW TRANSLATION
  romania.13.a: "Takhle umírá demokracie..." # todo: NEW TRANSLATION
  Manhattan.1.a: "Budeme to bedlivě sledovat." # todo: NEW TRANSLATION
  countrystartup.129.t: "Operace Compass v Horst §0(ČTĚTE NEBO PROHRAJTE)§!" # todo: NEW TRANSLATION
  countrystartup.129.desc: "Co je Operace Compass? Byla to britská invaze do Libye v pozdním roce 1940. V Horst je Operace Compass stavem války mezi Itálií a Spojenci současně s bitvou o Francii. Itálie vstupuje do války ve stejnou dobu, kdy Německo deklaruje válku.\n\nCo je dobré vědět, pokud hrajete osu:\n- Mějte tankového menšího člena v Libyi; vyrábějte tanky jako Itálie\n- Mějte v Libyi připravené some stíhače a CAS jako Itálie nebo Německo\n- Celá Osa obdrží bonusy k penalizaci za obklíčení, rychlosti zákopnění, rychlosti plánování, ztrátě organizace při nízké org, HP, dosahu zásobování a spotřebě zásob pro každý stát v Libyi ztracený Spojencům, aby se vyrovnaly potíže při znovudobývání Libye.\n\nCo je dobré vědět, pokud hrajete Spojence:\n- Připravíte 1 zásilku konvojů za každý libyjský stát, který ovládáte, za měsíc" # todo: NEW TRANSLATION
  fincon.11.t: "Bitva o Británii" # todo: NEW TRANSLATION
  fincon.11.d: "Jak bitva o Francii končí, němečtí bombardéři a stíhačky se připravují střetnout s RAF nad britským nebem. Letecká kampaň nad Británií může znamenat přípravy na nadcházející amfibní operaci." # todo: NEW TRANSLATION
  fincon.11.a: "Svět sleduje..." # todo: NEW TRANSLATION
  britain.193.t: "Německo přivlastňuje zdroje v severním Švédsku" # todo: NEW TRANSLATION
  britain.193.d: "Po požadavcích německého ministra zahraničí Joachima von Ribbentropa Švédsko převedlo práva na ložiska a doly v Laponsku Třetí říši. Ministr hospodářství říše Walter Funk minulý týden vypracoval 'obchodní dohodu', nazývajíc ji milníkem v zajištění 'mira a přátelství' mezi oběma národy." # todo: NEW TRANSLATION
  britain.193.a: "Svolat mimořádné zasedání Dolní sněmovny" # todo: NEW TRANSLATION
  finland.12.t: "105 dní sněhu a krve" # todo: NEW TRANSLATION
  finland.12.d: "Poslední tři měsíce nasákly bílé a zelené finské lesy krví sovětských útočníků. Dosáhli jsme nemyslitelného — bráníme každý metr finské půdy proti národu padesátkrát většímu!" # todo: NEW TRANSLATION
  finland.12.a: "Finsko je v bezpečí, prozatím." # todo: NEW TRANSLATION
  finland.11.t: "Katastrofa ve Finsku" # todo: NEW TRANSLATION
  finland.11.d: "Červená armáda předvedla ponížené vystoupení, prohrávajíc bitvu za bitvou s Finy. Tato posměška nemůže zůstat bez následků a někdo musí zaplatit za tuto neschopnost!" # todo: NEW TRANSLATION
  finland.11.a: "Do gulagu!" # todo: NEW TRANSLATION
  finland.20.t: "Osvobození Finska" # todo: NEW TRANSLATION
  finland.20.d: "Finský proletariát spolu s našimi komunistickými soudruhy trpěl ve Finsku od doby, kdy Rudí prohráli občanskou válku. Mezitím se Německo čím dál více militarizovalo a jingoizovalo, což představuje existenční hrozbu pro Unii. Požadovali jsme, aby Finsko postoupilo hraniční území, která potřebujeme k zabezpečení sebe samých, ale předvídatelně to odmítli. Nyní je čas připravit invazi do Finska a osvobodit je od kapitalistického útlaku." # todo: NEW TRANSLATION
  finland.20.a: "Pošleme jim ‚chlebové koše‘." # todo: NEW TRANSLATION
  finland.21.t: "Sovětský svaz se připravuje na válku" # todo: NEW TRANSLATION
  Winter_War_Threat: "Zimní válka" # todo: NEW TRANSLATION
  poland.1148.d: "Německá říše vybudovala zeď pobřežních pevností od jižní Francie až po západní pobřeží Norska.\n\n§Tato řada opevnění představuje vážné nebezpečí pro námořní invaze, pokud nebude bombardována.§!" # todo: NEW TRANSLATION
  finland.21.d: "Od našeho úspěšného odtržení od sovětského impéria a vítězství v občanské válce proti Rudým byl Sovětský svaz antagonizujícím a nebezpečným nepřítelem, jen tlumeným časem. Naše rozvědka nyní informuje, že se připravují na válku a vpadnou přibližně za dva měsíce." # todo: NEW TRANSLATION
  news.9990.t: "Německo zahajuje Case Blue!" # todo: NEW TRANSLATION
  zit_failed: "Operace Citadel selhala" # todo: NEW TRANSLATION
  zit_launched: "Operace Citadel byla zahájena" # todo: NEW TRANSLATION
  news.9990.d: "Německá říše zahájila letní operaci proti Sovětskému svazu, krycí název 'Case Blue', s cílem vyřadit jej z války po nezdarech během operace Barbarossa. Bez zimy a bláta, které Němce zpomalují, jsou Sověti znovu tlačeni na ústup." # todo: NEW TRANSLATION
  news.9990.a: "Ještě pět měsíců pekla..." # todo: NEW TRANSLATION
  news.9990.b: "Na Moskvu!" # todo: NEW TRANSLATION
  britain.4254.t: "Admirál Jamamoto mrtvý!" # todo: NEW TRANSLATION
  britain.4254.desc: "Hrozné zprávy! Admirál Jamamoto byl sestřelen nad Pacifikem americkými stíhači! Jak věděli, že to byl jeho letoun?" # todo: NEW TRANSLATION
  britain.4254.a: "Museli mít štěstí..." # todo: NEW TRANSLATION
  britain.1315.t: "Spojenci se připravují na operaci Torch" # todo: NEW TRANSLATION
  britain.1315.d: "Vojenská rozvědka naznačuje, že spojenci chystají invazi do Vichystické francouzské severní Afriky. Můžeme očekávat, že tato invaze proběhne za zhruba měsíc." # todo: NEW TRANSLATION
  britain.1315.a: "Znepokojivé" # todo: NEW TRANSLATION
  nsb_news.6131.t: "USA rozšiřují lend‑lease pro Sovětský svaz" # todo: NEW TRANSLATION
  nsb_news.6131.a: "Dobře." # todo: NEW TRANSLATION
  nsb_news.6131.desc: "Západní spojenci sledují s obavami, jak Operace Barbarossa proniká stále hlouběji do Sovětského svazu. Spojené státy a Spojené království se společně dohodly materiálně podpořit Sovětský svaz v jejich válce proti Ose.\n\nSPOJENCI NYNÍ MOHOU ZAČÍT POSKYTOVAT LEND‑LEASE SOVĚTSKÉMU SVAZU" # todo: NEW TRANSLATION
  countrystartup.29.t: "Námořnictvo a Sea Lion v Horst §0(ČTĚTE NEBO PROHRAJTE)§!" # todo: NEW TRANSLATION
  countrystartup.29.desc: "1) Měli byste mít více flotil, žádná flotila by neměla překročit limit velení 100.\n2) Flotily určené k střetu s jinými flotilami by vždy měly mít 2 letadlové lodě a ne více než 2 letadlové lodě\n3) Flotily by měly mít vysoké hodnoty krytí pro bitevní lodě a letadlové lodě\n4) Pokud se boj jeví špatně, odstupte\n5) Ostřelování pobřeží je důležité! Námořnictvo může také blokovat námořní vylodění s 40% námořní převahy\n6) Stavte obrazovky, kapitální lodě a letadlové lodě\n7) Brnění může být potenciálně užitečné.\n\n§BLimit velení flotily§!\n\nKaždá třída lodí má hodnotu 'limit velení'. Flotila (všechny úkolové síly pod jedním admirálem) může podporovat maximálně 100 'limit velení'. Dokud jste na nebo pod tímto limitem pro každou flotilu s admirálem, nebudou se na vašeho admirála a zemi aplikovat speciální penalizace. Jakýkoli admirál, který vede flotilu obsahující kapitální lodě nebo lehké křižníky, se zobrazí v seznamu vpravo od portrétů admirálů. Tento seznam obsahuje užitečné informace o vašich flotilách, abyste se jím mohli snadno řídit.\n\nDestruktory/Ponorky - 1 limit velení\nLehké křižníky/Těžké křižníky - 2 limit velení\nBitevní lodě a bitevní křižníky - 4 limit velení\nLetadlové lodě/Super těžké bitevní lodě - 6 limit velení.\n\n§RON SEA LION§!: Pouze jihozápadní Anglie a Sussex jsou invadovatelné pro evropskou Ose. Evropská Osa bude teleportována, pokud se pokusí vylodit na jakékoli jiné části Spojeného království nebo Irska! SEA LION JE POVOLEN!" # todo: NEW TRANSLATION
  mtg_netherlands.344.a: "Musíme se okamžitě dozvědět víc!\n§GOdblokujeme nový národní fokus!§!" # todo: NEW TRANSLATION
  mtg_netherlands.345.d: "Tým archeologů z Athén dorazil na ostrov a musel k němu veslovat menší lodí kvůli absenci vhodného přístavu. Ostrov je zarostlý vegetací, která spolu s hustou mlhou pokrývající ostrov skryla něco opravdu ohromujícího. Byly nalezeny dokonale zachovalé ruiny připomínající architekturu jak mykénského, tak helénského období naší historie. Průzkum pokračuje a nachází se množství historických artefaktů v lokalitě, která se zdá být velikostí srovnatelná s moderním řeckým městem!" # todo: NEW TRANSLATION
  mtg_netherlands.344.d: "Archeologové objevili izolovaný ostrov v bouřlivé části Atlantiku. Ostrov dosud nebyl zakreslen a neobjevil se na mapách z posledních pěti století. Návrhy, že vznikl nedávno vulkanickou činností, jsou nemožné — prvotní průzkum neukázal žádnou sopečnou aktivitu. Ostrov je pokryt hustou mlhou, což je pro tuto oblast Atlantiku anomálie. Vědci nenašli vhodné místo k přistání či zavázání lodi. Skrz mlhu byl spatřen jakýsi věžovitý útvar, ale nebylo jasné, z jaké národní provenience či epochy pochází. Byl zorganizován nový expediční výjezd, aby odhalil, co je na tomto zvláštním ostrově skryto..." # todo: NEW TRANSLATION
  mtg_news.791.d: "Od začátku operace Barbarossa Trhací a sedlářská Rudá armáda čelí častému ústupu, což nechává mnoho sovětských průmyslových a městských center blízko hranic pod kontrolou Osy. Josef Stalin reagoval příkazem všem velitelům Rudé armády, aby zamezili neoprávněným ústupům a zřídili speciální oddíly pro práci s dezertéry." # todo: NEW TRANSLATION
  mtg_news.792.d: "Po dlouhém a vyčerpávajícím procesu zotavování se z hrůz Velkého teroru prokázala Rudá armáda v ohni a plamenech války jako taktičtě schopná jako Wehrmacht, navzdory ústupům. Josef Stalin nařídil konec ústupům: 'Ani krok zpět.'" # todo: NEW TRANSLATION
  italy.668.d: "Vítejte v Horstorical Multiplayer stromu národních fokusů pro Slovensko! Horst výrazně upravil strom fokusů Slovenska od mumiago z modu Hearts of Oak 2 pro použití v Horstorical Multiplayer. Děkujeme mumiago!" # todo: NEW TRANSLATION
  italy.968.d: "Vítejte v Horstorical Multiplayer stromu národních fokusů pro Mongolsko! Horst výrazně upravil strom fokusů Mongolska od Fantom#8759 z modu Road to 56 pro použití v Horstorical Multiplayer. Děkujeme Fantom#8759!" # todo: NEW TRANSLATION
  italy.969.d: "Vítejte v Horstorical Multiplayer stromu národních fokusů pro Rumunsko! Horst výrazně upravil strom fokusů Rumunska od mumiago z modu Hearts of Oak 2 pro použití v Horstorical Multiplayer. Děkujeme Mumiago!" # todo: NEW TRANSLATION
  italy.970.d: "Vítejte v Horstorical Multiplayer stromu národních fokusů pro Nový Zéland! Horst výrazně upravil strom fokusů Nového Zélandu od featherus z modu Road to 56 pro použití v Horstorical Multiplayer. Děkujeme featherus!" # todo: NEW TRANSLATION
  italy.971.d: "Vítejte v Horstorical Multiplayer stromu národních fokusů pro Siam! Horst výrazně upravil strom fokusů Siamu od simpyslav z modu Road to 56 pro použití v Horstorical Multiplayer. Děkujeme simpyslav!" # todo: NEW TRANSLATION
  italy.972.d: "Vítejte v Horstorical Multiplayer stromu národních fokusů pro British Raj! Horst výrazně upravil strom fokusů British Raj od asfinag z modu Road to 56 pro použití v Horstorical Multiplayer. Děkujeme asfinag!" # todo: NEW TRANSLATION
  italy.973.d: "Vítejte v Horstorical Multiplayer stromu národních fokusů pro Jižní Afriku! Horst výrazně upravil strom fokusů Jižní Afriky od Sarge z modu South Africa Reworked pro použití v Horstorical Multiplayer. Děkujeme Sarge!" # todo: NEW TRANSLATION
  italy.663.d: "Pokud toto vidíte, váš hostitel nemá nové DLC 'Battle for the Bosphorus' od Paradox. Místo toho Horst výrazně upravil strom fokusů 'Mila Rodino Bulgaria' od Caon pro použití v Horstorical Multiplayer modu. Děkujeme Caonovi za dovoleni použít prostředky modu, včetně bulharských velitelů jednotek, ikon fokusů a dalších." # todo: NEW TRANSLATION
  mtg_news.777.d: "Ruské blátoznění, známé také jako Rasputitsa, je nepříjemný čas, který ničí hlavně motorová vozidla. Sezona bláta skončí za šedesát dní.\n\n§VK všechny divize na sovětském jádrovém území budou mít o 15 % menší útok divize, utrpí 10 % attrition a budou mít -20% penalizaci rychlosti (-35% pro obrněné divize).§!" # todo: NEW TRANSLATION
  mtg_news.778.desc: "Ruská zima, vojáky přátelsky nazývaná generál Mráz, vytváří masivní logistické problémy pro vedení válek." # todo: NEW TRANSLATION
  news.484.t: "Královská diktatura" # todo: NEW TRANSLATION
  news.484.d: "Mezinárodní pozorovatelé rumunských voleb oznámili, že král Carol II. suspendoval ústavu a převzal výjimečné pravomoci. Carol poté vyhlásil výjimečný stav a pozastavil veškeré občanské svobody s odůvodněním, že násilná volební kampaň hrozí zatáhnout národ do občanské války.\nPo sesazení staré vlády, kterou sám jmenoval pod antisemitickým Gogou, Carol kodifikoval svou novou moc ratifikací ústavy a proměnil vládu v de facto legální diktaturu. Veškeré vládní pravomoci v Rumunsku byly v jeho rukou, měníce Rumunsko z demokracie v absolutní monarchii." # todo: NEW TRANSLATION
  news.484.a: "Balkán nikdy nezklame" # todo: NEW TRANSLATION
  news.485.t: "Železná cena" # todo: NEW TRANSLATION
  news.485.d: "Corneliu Zelea Codreanu, 'kapitán', který hlásal krutě xenofobní ultranacionalismus, intenzivní ortodoxní mysticismus, extrémně násilný antisemitismus, populistické pohrdání elitami a oslavu smrti ve službách věci jako nejkrásnější, nejvelkolepější, nejsvatosvatější a erotický zážitek, byl dnes jmenován premiérem Rumunska. S násilím voleb a jmenováním kabinetu Octaviana Gogy neviděl král jinou možnost než předat Codreanovi moc, kterou si žádal; a ačkoli byl Codreanu zpočátku zdrženlivý, nakonec přesvědčil Carla, aby mu skutečně svěřil absolutní a totalitní moc nad státem, čímž proměnil dříve demokratickou zemi ve totalitní diktaturu." # todo: NEW TRANSLATION
  news.485.a: "Balkán nikdy nezklame" # todo: NEW TRANSLATION
  news.486.t: "Nástup Antonescua k moci" # todo: NEW TRANSLATION
  news.486.d: "Německý diplomat Fabricius v Rumunsku zavolal Carolu II. s jednoduchou žádostí: postavit Antonesca do čela Rumunska. S pádem Francie francofilní elita Rumunska téměř přes noc ztratila většinu vlivu. Antonescu částečně vyhověl požadavku, ale také požádal Carla, aby mu udělil rezervní pravomoci rumunských hlav států. Carol ustoupil a 5. září 1940 se generál stal premiérem; Carol mu pak převedl většinu svých diktátorských pravomocí. Jeho prvním krokem bylo omezit potenciální odpor v armádě odvoláním velitele garsony v Bukurešti Gheorghe Argeșanu a jmenováním Dumitru Coroama na jeho místo." # todo: NEW TRANSLATION
  news.486.a: "Balkán nikdy nezklame" # todo: NEW TRANSLATION
  news.487.t: "Pochod na Bukurešť" # todo: NEW TRANSLATION
  news.487.d: "Po vykonání Codreanua zůstala Železná garda dlouho zticha, ale nebyla mrtvá, jen spící a čekající na nejlepší příležitost udeřit. Byla znovu oživena pod vedením Horie Simy a organizovala převrat; nyní s Antonescovým uvězněním přišla ideální příležitost, protože generál byl plný rozhořčení nad současnou vládou a chtěl ukončit královskou diktaturu, která Rumunsko vedla na pokraj zkázy. S rozsáhlým vlivem a kontrolou nad rumunskou armádou, zvláště třetí armádou rozmístěnou ve východních provinciích, vojáci Antonesca a Železná garda vykročili na hlavní město v události známé jako 'Pochod na Bukurešť'. Vojáci, kteří měli chránit hlavní město před 'povstáním', jak ho Carol označil, jednoduše položili zbraně nebo se k pochodu přidali. Carol se dokázal na poslední chvíli dostat na vlak a uprchnout, zatímco pronásledovali jej prvky rumunské armády a Železná garda." # todo: NEW TRANSLATION
  news.487.a: "Balkán nikdy nezklame" # todo: NEW TRANSLATION
  news.488.t: "Smrt Codreanu" # todo: NEW TRANSLATION
  news.488.d: "Loajalističtí generálové krále Carla II. využili loajálních armádních jednotek k odstranění rumunského premiéra Corneliu Zelea Codreanu během jeho cesty zpět do hlavního města. Když to považovali za povstání v armádě, Antonescu rychle převzal kontrolu a nařídil generálům stáhnout vojáky obviněné ze vzpoury a předat pachatele úřadům. Poté, co armádu restrukturalizoval, Antonescu rychle vyměnil další generály za své loajály a efektivně převzal plnou kontrolu nad zbraněmi Rumunska, čímž se de facto ujal moci v zemi. Po tom, co byl považován za hrdinu za pomstu za smrt populárního Codreanu, Antonescu se postavil do čela země jako spoluvůdce, který měl řídit existující vedení Železné gardy." # todo: NEW TRANSLATION
  news.488.a: "Balkán nikdy nezklame" # todo: NEW TRANSLATION
  Manhattan.1.t: "Projekt Manhattan" # todo: NEW TRANSLATION
  Manhattan.1.d: "V maximálním utajení Spojené státy zahájily 'Projekt Manhattan', monumentální výzkumné dílo zahrnující největší vědecké mozky světa. Cílem projektu je využít ničivé potenciály atomové energie. Šeptání v komunitě zpravodajských služeb naznačuje, že se usiluje o vytvoření superzbraně, která by dokázala rychle ukončit války. Hlavní mocnosti projekt bedlivě sledují, neboť jeho výsledek může přehodit globální mocenský poměr. Úspěch či neúspěch projektu rozhodne o budoucnosti světové geopolitiky." # todo: NEW TRANSLATION
  Trinity.1.t: "Projekt Trinity" # todo: NEW TRANSLATION
  Trinity.1.d: "Brzy ráno dnes, v nejvyšším utajení, spojení některých z nejbystřejších myslí světa přinesli ovoce ve slepém záblesku světla a monumentálním houbovém oblaku na poušti Nového Mexika. Kódové označení 'Trinity' — zkouška první atomové bomby na světě — zásadně změnila běh válčení a světové politiky." # todo: NEW TRANSLATION
  news.9991.t: "Německo zahajuje operaci Citadel!" # todo: NEW TRANSLATION
  news.9991.d: "Německá říše zahájila další letní operaci proti Sovětskému svazu, krycí název 'Operace Citadel', cílem zničit sovětskou armádu a vynutit mír. Bez zimy a bláta, které Němce zpomalují, jsou Sověti znovu tlačeni na ústup, ale tentokrát s zkušenostmi ze dvou předchozích kampaní." # todo: NEW TRANSLATION
  news.9991.a: "Jak dlouho ještě musí Sověti vydržet?" # todo: NEW TRANSLATION
  news.9991.b: "Začátek konce." # todo: NEW TRANSLATION
  news.9992.t: "Německo zahajuje operaci Solstice!" # todo: NEW TRANSLATION
  news.9992.d: "Německá říše zahájila další letní operaci proti Sovětskému svazu, krycí název 'Operace Solstice', cílem zničit sovětskou armádu a vynutit mír. Bez zimy a bláta, které Němce zpomalují, jsou Sověti znovu tlačeni na ústup, ale tentokrát s zkušenostmi ze dvou předchozích kampaní." # todo: NEW TRANSLATION
  news.9992.a: "Může Sovětský svaz vyhrát válku?" # todo: NEW TRANSLATION
  news.9992.b: "Podaří se Říši konečně uspět?" # todo: NEW TRANSLATION
  ger_heavy.1.t: "Německo zahajuje výrobu těžké vody" # todo: NEW TRANSLATION
  ger_heavy.1.d: "Agenti MI6 informovali, že Německá říše zahájila výrobu těžké vody pro použití v experimentech jaderného štěpení. Je nemožné vědět, zda a kdy se Německu podaří vyrobit jadernou bombu, ale je jisté, že pokud tak učiní před námi, způsobí to nepředstavitelný chaos a útrapy pro svobodné národy. Musíme ovládnout Norsko, abychom tomu zabránili!" # todo: NEW TRANSLATION
  ger_heavy.1.a: "§RNěmecko odemkne jaderné reaktory a bonus 350 % k jaderným bombám za 1000 dnů§!" # todo: NEW TRANSLATION
  finland.21.a: "Dosáhli jsme bodu zlomu!" # todo: NEW TRANSLATION
  italy.152.t: "Athény dobyty" # todo: NEW TRANSLATION
  countrystartup.28.desc: "1. Divize musí mít šířku boje 39,2 až 40,0 \n\n2. Divize nesmí mít žádné cw obrněných praporů nebo musí mít 20–26 cw obrněných praporů, všechny stejné třídy, zbytek tvoří mobilní pěchota (ne mech/moto dělostřelectvo, mech/moto AT nebo mech/moto protiletadlové) \n\n3. Žádné kombinování pěších praporů s obrněnými či mobilními prapory \n\n3. Nesmí mazat/konsolidovat/upravovat/ měnit šablony, když: divize jsou zachyceny, divize se nacházejí 1–5 polí od fronty nebo pokud hrozí obklíčení (očekávána námořní vylodění) \n\n4. Žádné zahájení námořního vylodění nebo výsadku s méně než 90 % vybavenými divizemi (pokud nejsou sestřeleny protivzdušnou obranou) \n\n5. [ALLIES] Žádné ne‑francouzské/holandské/polské/řecké/norské divize ve francouzské Severní Africe před kapitulací Francie \n\n6. Nad mořskou zónou nesmí být více než 200 letadlových letadel na AS \n\n7. Je zakázáno mít více než jednu úkolovou sílu přidělenou do jedné námořní zóny nebo držet jednotlivou námořní zónu (pohyby jsou výjimkou) \n\n9. Přístavy ve Španělsku jsou povoleny pouze během španělské občanské války." # todo: NEW TRANSLATION
  mtg_news.788.desc: "Po pádu Kujbyševu se sovětské vedení přesunulo hluboko za Uraly a přijalo německé volání po příměří. Kuibyshevské příměří fakticky ukončilo válku na východě." # todo: NEW TRANSLATION
  britain.1115.d: "Sovětský svaz je stejně vražedný a zlý politický režim, který redukuje jedince na kolečko ve stroji. Aby svobodná Evropa existovala, musí být sovětský stát zničen." # todo: NEW TRANSLATION
  britain.1116.d: "S porážkou německého nebezpečí ohrožujícího rovnováhu sil v kontinentální Evropě jsme se zabezpečili proti jednomu tyranovi, ale jiný existuje na východě. Můžeme znovu vyzbrojit italské a německé armády, aby doplnily naše divize, samozřejmě za podmínky, že plně přejdou na tržní demokratický systém." # todo: NEW TRANSLATION
  japan.144.t: "Zaútočit na jih!" # todo: NEW TRANSLATION
  japan.144.d: "S celosvětovou pozorností na válku v Evropě je Asie oslabena a zranitelná. Teď je ideální čas spustit úder na jižní oblast bohatou na suroviny!" # todo: NEW TRANSLATION
  japan.144.a: "Do války!" # todo: NEW TRANSLATION
  peace.1.t: "Vyhlásit válku pro reset dobrovolníků nebo bílý mír se všemi nepřáteli" # todo: NEW TRANSLATION
  soviet.509.t: "Budoucnost Číny" # todo: NEW TRANSLATION
  soviet.509.d: "Momentálně ovládáme část území Mandžuska, a stojí otázka, co s ním udělat. Nejvyšší členové Politbyra důrazně navrhují postoupit jej místním komunistům a vytvořit satelitní stát v Asii. Naši spojenci v Komunistické straně Číny to velmi ocení." # todo: NEW TRANSLATION
  soviet.509.a: "Sovětský svaz a Čína se stanou dvěma pilíři komunismu v Asii." # todo: NEW TRANSLATION
  fincon.1.t: "Pokračovací válka" # todo: NEW TRANSLATION
  fincon.1.d: "Němci konečně zahájili svůj křížový pochod proti bolševikům a nyní můžeme získat zpět zemi, kterou jsme ztratili během Zimní války." # todo: NEW TRANSLATION
  fincon.1.a: "Obnovit bývalé finské hranice!" # todo: NEW TRANSLATION
  fincon.1.b: "Není to dobrý nápad, Němci pravděpodobně v té válce prohrají..." # todo: NEW TRANSLATION
  fincon.2.t: "Začíná pokračovací válka" # todo: NEW TRANSLATION
  fincon.2.d: "Finsko, poraženec Zimní války, opět obnovilo nepřátelství proti Sovětskému svazu v naději, že si získá zpět své území. Jelikož většina sovětských sil je vázána jihozápadně proti Němcům, situace Sovětů se ještě zhoršila, protože teď musí čelit současně Německu i Finsku." # todo: NEW TRANSLATION
  fincon.2.a: "Konec bolševického režimu se blíží." # todo: NEW TRANSLATION
  fincon.2.b: "Mohou do konce roku dosáhnout Leningradu..." # todo: NEW TRANSLATION
  fincon.6.t: "Moskevské příměří" # todo: NEW TRANSLATION
  fincon.6.d: "Dlouhá a marná pokračovací válka je nyní u konce. Finsku se nepodařilo získat území od Sovětů a navíc ztratilo kontrolu nad Petsamo a námořní základnou Porkkala. Sověti naopak nedokázali dobýt Finsko, ale nyní se mohou plně soustředit na Německo." # todo: NEW TRANSLATION
  fincon.6.a: "Zrádci! Všichni!" # todo: NEW TRANSLATION
  fincon.6.b: "Válka v Evropě se blíží ke svému konci." # todo: NEW TRANSLATION
  britain.1113.t: "Norsko usiluje o vstup mezi spojence" # todo: NEW TRANSLATION
  britain.1113.d: "Skandinávský národ Norsko byl napaden silami Osy. Pokud jako ostrovní národ chráněný kanálem před chaosem evropských záležitostí chceme tuto válku vyhrát, musíme navázat nové aliance se všemi, kteří se ocitli pod útlakem Německa a jejích spojenců." # todo: NEW TRANSLATION
  britain.1113.a: "Budeme bojovat i na horách!" # todo: NEW TRANSLATION
  britain.1114.t: "Británie nás vítá" # todo: NEW TRANSLATION
  britain.1114.d: "Naši diplomaté nám zavolali z Londýna a oznámili, že jsme úspěšně vstoupili do formální vojenské aliance s Británií a jejími spojenci. Jako člen Spojenců je každý boj od Londýna po Wellington, od Osla po Káhiru nyní součástí našeho zápasu za Norsko." # todo: NEW TRANSLATION
  britain.1114.a: "Bůh chraň naše krále!" # todo: NEW TRANSLATION
  news.1463.t: "Neutralita Arabie porušena" # todo: NEW TRANSLATION
  news.1463.d: "V překvapivém vývoji byla celá Arabská polopoušť napadena a vstoupila do války." # todo: NEW TRANSLATION
  iran.4.t: "Írán kapituloval" # todo: NEW TRANSLATION
  iran.4.d: "Po úspěchu operace Countenance vláda Persie a její šáh kapitulovali před společnými britsko‑sovětskými silami v Teheránu. Írán a jeho zdroje jsou nyní bezpečně mimo dosah Němců." # todo: NEW TRANSLATION
  iran.4.a: "Na zdraví anglo‑sovětskému spojenectví!" # todo: NEW TRANSLATION
  iran.2.t: "Írán ustupuje severní území" # todo: NEW TRANSLATION
  iran.2.d: "Íránský Ázerbájdžán a Turkmenistán byly konečně znovu spojeny se svými sovětskými sourozenci. Instalace civilní správy a ideologická výchova jsou nyní v plném proudu ze strany soudruhů z obou republik." # todo: NEW TRANSLATION
  iran.2.a: "Vítejte v Unii!" # todo: NEW TRANSLATION
  iran.3.t: "Írán ustupuje ropná pole" # todo: NEW TRANSLATION
  iran.3.d: "Po íránské kapitulaci v Teheránu předal Írán kontrolu nad jižním Íránem Spojenému království, což umožňuje Spojencům kontrolovat strategická ropná pole, využít strategický perský koridor a trans‑íránskou železnici." # todo: NEW TRANSLATION
  iran.3.a: "Skvělé!" # todo: NEW TRANSLATION
  italy.142.t: "Addis Abeba dobyta" # todo: NEW TRANSLATION
  italy.142.d: "S pádem Addis Abeby máme téměř plnou kontrolu nad Etiopií. Nyní, když je naše dlouho očekávané koloniální rameno impéria naše, zůstává rozhodnout, jak budeme území spravovat." # todo: NEW TRANSLATION
  italy.142.a: "Bene! Teď rozhodnout, co dělat s Etiopií..." # todo: NEW TRANSLATION
  italy.143.t: "Osud Etiopie" # todo: NEW TRANSLATION
  italy.143.d: "Etiopie byla dlouho trnem v oku italského národního cítění od porážky v předchozí italsko‑etiopské válce. Nyní svět může spatřit vzestup Itálie jako pánů Středomoří. Král Viktor Emanuel III. udělil maršálovi Pietru Badogliovi titul 'vévoda Addis Abeby' za jeho zásluhy. Etiopie může být buď spravována přímo Itálií, nebo jako koloniální loutkový stát spravovaný koloniálním viceroyem." # todo: NEW TRANSLATION
  italy.143.b: "Vytvořit koloniální protektorát z Etiopie, Somálska a Eritreje" # todo: NEW TRANSLATION
  italy.143.a: "Přímo anektovat Etiopii do Itálie" # todo: NEW TRANSLATION
  italy.144.t: "Osud Etiopie" # todo: NEW TRANSLATION
  italy.144.d: "Etiopie byla dlouho trnem v oku italského národního cítění od porážky v předchozí italsko‑etiopské válce. Nyní svět může spatřit vzestup Itálie jako pánů Středomoří. Král Viktor Emanuel III. udělil maršálovi Pietru Badogliovi titul 'vévoda Addis Abeby' za jeho zásluhy. Etiopie může být buď spravována přímo Itálií, nebo jako koloniální loutkový stát spravovaný koloniálním viceroyem." # todo: NEW TRANSLATION
  italy.144.a: "Vytvořit koloniální protektorát z Etiopie, Somálska a Eritreje" # todo: NEW TRANSLATION
  iran.1.t: "Írán kapituloval" # todo: NEW TRANSLATION
  spain.29.t: "Britové se nedívají" # todo: NEW TRANSLATION
  spain.29.d: "Po německé intervenci v Polsku Spojenci zaútočili na Říši a hledají válku. Jako neutrální pozorovatel této konfrontace můžeme z toho mít obrovský prospěch. Německo je velmi bohaté na ocel, ale chudé na vzácné kovy jako wolfram, kterého je hojný v sousedním Portugalsku. Britové jsou příliš zaneprázdněni ve Francii, než aby zabránili náhlé invazi na portugalské pevniny. Můžeme pak enormně profitovat z obchodu s hladovou válečnou mašinou Osy." # todo: NEW TRANSLATION
  spain.29.a: "Je čas znovu učinit Španělsko velikým." # todo: NEW TRANSLATION
  italy.146.t: "Mussolini zatčen" # todo: NEW TRANSLATION
  italy.146.d: "Po našich neúspěších v severní Africe a následné spojenecké invazi na jižní Itálii podpora pro Il Duce dramaticky poklesla. S válkou zuřící na naší půdě, chronickým nedostatkem potravin a zhoršujícími se stávkami se Velká rada Itálie obrátila proti Mussolinimu v hlasování o nedůvěře. Král Viktor Emanuel I. jej odvolal a nařídil jeho zatčení, nahrazujíc ho maršálem Pietrem Badogliem. Mussolini byl převážen po celé Itálii, než byl nakonec uvězněn v Campo Imperatore, horském středisku v Abruzzu." # todo: NEW TRANSLATION
  italy.146.a: "Kdo teď zajistí, že vlaky pojedou včas?" # todo: NEW TRANSLATION
  italy.147.t: "Monarchistický převrat v Itálii" # todo: NEW TRANSLATION
  italy.147.d: "Po italské neschopnosti v severní Africe a následné spojenecké invazi na jižní Itálii byl Il Duce zrazen svými krajany a nyní je zatčen někde v Itálii. To je pro Říši velmi nebezpečné, neboť bez Mussoliniho nemůžeme očekávat, že Itálie zůstane ve válce po naší straně. Musíme pečlivě zvážit naše další kroky." # todo: NEW TRANSLATION
  italy.147.a: "Kontaktujte Abwehr - musíme okamžitě najít, kde je Mussolini vězněn" # todo: NEW TRANSLATION
  italy.147.b: "To je italská neschopnost v tom nejlepším - můžeme válku vyhrát i bez jejich pomoci" # todo: NEW TRANSLATION
  italy.148.t: "Benito Mussolini nalezen" # todo: NEW TRANSLATION
  italy.148.d: "Díky odposlechu Abwehru jsme lokalizovali Mussoliniho v horském středisku v Abruzzu poblíž hory Gran Sasso. Vrchní velení již připravilo několik plánů na jeho záchranu; nejlepší plán předložil jeden z našich nejlepších generálů, Kurt Student. Navrhl odvážný výsadek pomocí kluzáku." # todo: NEW TRANSLATION
  italy.148.a: "Student se již mnohokrát osvědčil - udělejte to." # todo: NEW TRANSLATION
  italy.148.b: "Nestojí to za námahu - zrušte všechny plány na zásah." # todo: NEW TRANSLATION
  italy.149.t: "Mussolini osvobozen" # todo: NEW TRANSLATION
  italy.149.d: "Dnes ve 14:00 německé SS a faldšármské jednotky provedly odvážný útok na hotel Campo Imperatore a osvobodily Benita Mussoliniho. Hotel byl dobyt bez jediného výstřelu a málo obránců se okamžitě vzdalo. Mussolini bude nyní dopraven do Mnichova na setkání s führerem. Očekáváme, že bude úzce spolupracovat s Říší a pod naším dohledem." # todo: NEW TRANSLATION
  italy.149.a: "Nechte Němce zachránit Itálii." # todo: NEW TRANSLATION
  italy.150.t: "Banda Koch" # todo: NEW TRANSLATION
  italy.150.d: "Od vyhlášení Italské sociální republiky antifašistické prvky z pravice, středu i levice zahajují nájezdy a útoky proti naší armádě. Tyto nepatriotické elementy nám škodí, ale na to Pietro Koch, pošpiněný Ital německého původu, vytvořil protipartyzánskou jednotku zvanou 'Banda Koch', aby tyto teroristy potlačil. Jejich metody jsou však nadměrné." # todo: NEW TRANSLATION
  italy.150.a: "Každopádně je to dočasné." # todo: NEW TRANSLATION
  italy.151.t: "Il Duce se vrací!" # todo: NEW TRANSLATION
  italy.151.d: "Díky německé odvaze a šikovnosti byl Mussolini osvobozen z vězení a vrátil se k moci. Italský stát má být přetvořen na republiku; jak Mussolini sám řekl: 'Není to režim, kdo zradil monarchii, to je monarchie, která zradila režim.' Nový stát se bude jmenovat 'Italská sociální republika'." # todo: NEW TRANSLATION
  italy.151.a: "Avanti!" # todo: NEW TRANSLATION
  france.350.t: "Boj pokračuje!" # todo: NEW TRANSLATION
  france.350.desc: "Po evakuaci francouzské armády z Francie generál De Gaulle oznámil, že boj za Francii bude pokračovat v koloniální říši Francie. De facto hlavní město bylo přesunuto do Casablancy, protože francouzská armáda přesunula své velení a zásobovací střediska tam, v přípravě na africkou kampaň." # todo: NEW TRANSLATION
  france.351.t: "Neúspěchy v Africe" # todo: NEW TRANSLATION
  france.351.desc: "" # todo: NEW TRANSLATION
  france.352.t: "Admirál Emile Henry Muselier přebírá velení" # todo: NEW TRANSLATION
  france.352.desc: "" # todo: NEW TRANSLATION
  france.353.t: "Admirál rezignuje; ministr hospodářství přebírá a přesunuje civilní administrativu na Novou Kaledonii" # todo: NEW TRANSLATION
  britain.193.a: "Svolat mimořádné zasedání Dolní sněmovny" # todo: NEW TRANSLATION
  tfv_south_africa.133.t: "Hertzog rezignuje" # todo: NEW TRANSLATION
  tfv_south_africa.133.d: "Dnes se premiér J. B. M. Hertzog pokusil vyhlásit neutralitu vůči nacistické agresi v Evropě a stáhnout Jižní Afriku z války, jak to dovoluje Zákon Westminsteru. Nicméně návrh byl v Pretorii odmítnut parlamentem vedeným Janem Smutsem poměrem hlasů 80 ku 67. Hertzog se pokusil rozpustit parlament a vyhlásit všeobecné volby, doufaje, že zákon projde, ale guvernér‑generál Sir Patrick Duncan to odmítl. Výsledkem byla Hertzogova rezignace a jmenování Smutsa novým premiérem." # todo: NEW TRANSLATION
  tfv_south_africa.133.a: "Tak tedy do války!" # todo: NEW TRANSLATION
  afghanistan.1.t: "Afghánistán kapituloval" # todo: NEW TRANSLATION
  wtt_manchukou.100.t: "Rozšíření železnice v Liaoningu" # todo: NEW TRANSLATION
  wtt_manchukou.100.desc: "V rámci pětiletého plánu císaře Puyiho je nezbytné rozšířit železniční sítě po Mandžusku, aby se industrializovalo a drželo kroku s výrobními cíli. Provincie Liaoning je středem naší velké ekonomické transformace. Odtud zindustrializujeme zbytek Mandžuska za pomoci japonských investic." # todo: NEW TRANSLATION
  wtt_manchukou.100.a: "Okamžitě pracovat na trati do Mukdenu" # todo: NEW TRANSLATION
  wtt_manchukou.120.t: "Rozšíření železnice v Liaodongu" # todo: NEW TRANSLATION
  wtt_manchukou.120.desc: "S modernizovanou a rozšířenou železniční sítí v Liaodongu máme nyní přístup k ideálním lokalitám pro těžbu oceli. Hliníkové doly v Kirinu by mohly těžit z rozšíření, stejně jako současná málo rozvinutá ropná pole v Heilungkiangu. Velká část naší země zůstává podrozvinutá." # todo: NEW TRANSLATION
  wtt_manchukou.101.t: "Je třeba určit směr rozšíření železnice" # todo: NEW TRANSLATION
  wtt_manchukou.101.desc: "S nedávno dokončenou železniční prací můžeme pokračovat v rozšiřování i do jiných částí naší země. Kam bychom měli položit koleje dál?" # todo: NEW TRANSLATION
  wtt_manchukou.101.a: "Do Jeholu, k rozvoji doků a loděnic" # todo: NEW TRANSLATION
  wtt_manchukou.101.b: "Do Kirinu, k rozvoji hliníkového průmyslu a rozšíření našeho hlavního města" # todo: NEW TRANSLATION
  wtt_manchukou.101.c: "Do Heilungkiangu, k rozvoji petrochemického průmyslu" # todo: NEW TRANSLATION
  wtt_manchukou.101.z: "Do Chaharu, k rozvoji průmyslu malých zbraní a dělostřelectva" # todo: NEW TRANSLATION
  wtt_manchukou.101.e: "Do jižního Chaharu, k rozvoji našeho 'tabákového' průmyslu" # todo: NEW TRANSLATION
  wtt_manchukou.101.f: "Do Sungkiangu, k rozvoji našeho leteckého průmyslu" # todo: NEW TRANSLATION
  wtt_manchukou.101.g: "Do Hulunbuiru, k rozvoji našeho obrněného průmyslu" # todo: NEW TRANSLATION
  wtt_manchukou.101.h: "Dokončili jsme program rozšíření železnice!" # todo: NEW TRANSLATION
