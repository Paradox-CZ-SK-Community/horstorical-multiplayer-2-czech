  wtt_manchukou.127.t: "Dokončení pětiletého plánu" # todo: NEW TRANSLATION
  wtt_manchukou.127.d: "Po letech tvrdé práce a centrálního plánování jsme konečně propojili každý kout impéria. Náš průmysl značně vzrostl, stejně jako náš přístup k přírodnímu minerálnímu a petrochemickému bohatství. Pětiletý plán byl dokončen už za čtyři roky, díky pomoci našich japonských bratrů a vůli mandžuského lidu." # todo: NEW TRANSLATION
  wtt_manchukou.127.a: "Pan‑asijský projekt bude brzy uskutečněn!" # todo: NEW TRANSLATION
  wtt_denmark.2.t: "Operace Fork" # todo: NEW TRANSLATION
  wtt_denmark.2.d: "Za úsvitu dnes připlula britská válečná loď s kontingentem 750 královských mariňáků na pobřeží Islandu. Ostrovní národ nekladl žádný odpor kromě diplomatické protestu. Islandská neutralita je irelevantní, pokud jde o ztrátu drahocenných materiálů a válečných lodí." # todo: NEW TRANSLATION
  wtt_denmark.2.a: "Raději my než Němci" # todo: NEW TRANSLATION
  unitednations.0.t: "Deklarace Spojených národů" # todo: NEW TRANSLATION
  unitednations.0.d: "Vládnoucí státy podepsané níže, [...] přesvědčeny, že úplné vítězství nad jejich nepřáteli je zásadní pro obranu života, svobody, nezávislosti a náboženské svobody, a pro zachování lidských práv a spravedlnosti doma i v jiných zemích, a že nyní jsou zapojeny do společného boje proti surovým a brutálním silám usilujícím o podrobení světa, prohlašují: (1) [...] využít své plné zdroje, vojenské i ekonomické, proti členům Paktu tří a jejich stoupencům, s nimiž daná vláda vede válku. (2) [...] spolupracovat s vládami podepsanými níže a neuzavřít se s nepřáteli samostatné příměří nebo mír. Předchozí deklaraci mohou přijmout i jiné národy, které jsou nebo které mohou poskytovat materiální pomoc a příspěvky v boji za vítězství nad hitlerismem." # todo: NEW TRANSLATION
  unitednations.0.a: "Prázdná slova..." # todo: NEW TRANSLATION
  unitednations.0.b: "Nyní začíná opravdová válka proti Ose!" # todo: NEW TRANSLATION
  HORST_FUELSYS_TT: "Otevřít §GSystém řízení paliva frakce§!" # todo: NEW TRANSLATION
  HORST_FUELSYS_TT_DELAYED: "§WKliknutí tohoto tlačítka otevře menu, které vám umožní spravovat palivové zásoby celé vaší frakce. Tato volba je dostupná pouze vůdcům frakcí (Spojené království, Německo, Japonsko)§!" # todo: NEW TRANSLATION
  horsthelp.1.t: "Nápověda ke správci paliva" # todo: NEW TRANSLATION
  horsthelp.1.d: "Správce paliva je navržen tak, aby vůdce frakce mohl spravovat veškeré palivo ve frakci.\n\nMůžete přiřadit procentuální podíl požadovaných zásob paliva, které by měla země mít. Správce paliva se bude snažit udržet přiřazené procento tím, že bude odebírat palivo z Spojeného království, Německa nebo Japonska. Můžete také přiřadit prioritu založenou na pozici dané země v systému. Pro změnu priority země klikněte na šipky." # todo: NEW TRANSLATION
  horsthelp.1.a: "Díky, Horste, moc fajn!" # todo: NEW TRANSLATION
  vichy.1.desc: "Průlom tankového výsadku Commonwealthu a Svobodných Francouzů prorazil italské linie u Bardii a vtrhl hluboko do Cyrénajiky v Libyi. Spojenecká podpůrná letadla bombardují prchající osské tanky přes poušť směrem k Tripolisu, jen několik set kilometrů od francouzského Alžírska. Vztahy s [ENG.GetFactionName] byly v lep bestě antagonistické. S kolapsem italské Afriky je spravedlivé předpokládat, že [ENG.GetFactionName] využije příležitost postoupit do Alžíru. Máme jen několik dní na přípravu obrany v Africe." # todo: NEW TRANSLATION
  italy.600.t: "Itálie kapitulovala" # todo: NEW TRANSLATION
  italy.600.d: "Vyvrcholení let italské neschopnosti dospělo ke svému konečnému závěru — kapitulaci Itálie. Co zbylo z Regio Esercito je nyní pod velením Heer, kde bude dobře využito." # todo: NEW TRANSLATION
  italy.600.a: "Alter!" # todo: NEW TRANSLATION
  romania.12.t: "Rumunské volby 1937" # todo: NEW TRANSLATION
  romania.12.desc: "Ve volbách v prosinci 1937 získala vládnoucí Národní liberální strana premiéra Gheorghe Tătărescu nejvíce křesel, avšak méně, než by bylo třeba k vytvoření většinové vlády v parlamentu. Strana 'All for Fatherland' získala ve volbách 1937 16 % hlasů, což znamenalo vrchol volebního úspěchu Železné gardy. Přesto však král Carol II. jmenoval radical‑ně antisemitického básníka Octaviana Gogu premiérem." # todo: NEW TRANSLATION
  romania.12.a: "Takhle umírá demokracie?" # todo: NEW TRANSLATION
  yugoslavia.101.t: "Nymphenburský galavečer" # todo: NEW TRANSLATION
  yugoslavia.101.d: "Otázka sňatku a nástupnictví v Království Srbů byla dlouho na rtech politické třídy. Doba, kterou jsme strávili bez legitimního krále na trůnu, vedla některé k pochybnostem o legitimitě vedení Karađorđevićů. Nicméně na nedávném galavečeru v Bavorsku si mladý král Petr zamiloval šlechtickou dívku. Již členové královského kabinetu diskutují o svatebních plánech, aby zajistili královu romantickou pozornost. Není pochyb, že manželství bude mít trvalý diplomatický dopad na náš stát." # todo: NEW TRANSLATION
  yugoslavia.101.a: "Vévoda Anastasia z Mecklenburg‑Schwerinu" # todo: NEW TRANSLATION
  yugoslavia.101.b: "Princezna Maria Antonia z Hohenzollernu" # todo: NEW TRANSLATION
  yugoslavia.101.c: "Princezna Marie Louise z Bulharska" # todo: NEW TRANSLATION
  yugoslavia.101.e: "Princezna Marie Françoise z Bourbon‑Parmy" # todo: NEW TRANSLATION
  yugoslavia.101.g: "Princezna Cecilie z Pruska" # todo: NEW TRANSLATION
  hungarian_princess_name: "Vévodkyně Anastasie" # todo: NEW TRANSLATION
  romanian_princess_name: "Princezna Maria Antonia" # todo: NEW TRANSLATION
  bulgarian_princess_name: "Princezna Marie Louise" # todo: NEW TRANSLATION
  spanish_princess_name: "Princezna Marie‑Françoise" # todo: NEW TRANSLATION
  german_princess_name: "Princezna Cecilie" # todo: NEW TRANSLATION
  yugoslavia.102.t: "Srbsko hledá královnu" # todo: NEW TRANSLATION
  yugoslavia.102.d: "Karađorđevićové Srbska usilují o udržení své královské linie i národa skrze královskou svatbu. Zdá se, že mladý král Petr II. je zamilovaný do [Root.GetPrincessName] a veřejně vyznal svou lásku a oddanost skrze svazek manželství v ceremoniálu v Bělehradě před jásajícími davy, svědící pohádkovému románu dvou milenců svedených dohromady v době krize." # todo: NEW TRANSLATION
  yugoslavia.102.a: "Jak romantické!" # todo: NEW TRANSLATION
  yugoslavia.103.t: "Srbsko hledá královnu" # todo: NEW TRANSLATION
  yugoslavia.103.d: "Karađorđevićové Srbska usilují o udržení své královské linie i národa skrze královskou svatbu. Zdá se, že mladý král Petr II. je zamilovaný do [Root.GetPrincessName] a veřejně vyznal svou lásku a oddanost skrze svazek manželství v ceremoniálu v Bělehradě před jásajícími davy, svědící pohádkovému románu dvou milenců svedených dohromady v době krize." # todo: NEW TRANSLATION
  yugoslavia.103.a: "Jak romantické!" # todo: NEW TRANSLATION
  countrystartup.100.t: "Menší spojenecké státy v Horstorical multiplayeru" # todo: NEW TRANSLATION
  countrystartup.100.d: "Spojenecký menší postup krok za krokem \n\n1. Zeptejte se hráče Spojeného království, jaké stavby máte dělat \n\n2. Zeptejte se hráče Spojeného království, jestli vás chtějí v Africe/Asii/DDAY atd. \n\n3. Poslouchejte vše, co hráč Spojeného království řekne \n\n4. Budujte do 31. 8. 1939 nebo 1. 1. 1941 v závislosti na tom, který front vám Spojené království přidělilo \n\nNEZAPOMEŇTE: VĚNUJTE POZORNOST HRÁČI SPOJENÉHO KRÁLOVSTVÍ, POSLOUCHEJTE HO, PROSÍME A ZBOHOUŘTE HRÁČE SPOJENÉHO KRÁLOVSTVÍ O MILOST" # todo: NEW TRANSLATION
  countrystartup.100.a: "Díky za radu!" # todo: NEW TRANSLATION
  countrystartup.101.t: "Menší státy Osy v Horstorical multiplayeru" # todo: NEW TRANSLATION
  countrystartup.101.d: "Axis minor krok za krokem \n\n1. Zeptejte se hráče Německa, jaké stavby máte dělat \n\n2. Zeptejte se hráče Německa, jestli vás chtějí v Africe/Asii/DDAY atd. \n\n3. Poslouchejte vše, co hráč Německa řekne \n\n4. Budujte do 31. 8. 1939 nebo 1. 1. 1941 v závislosti na tom, který front vám Německo přidělilo \n\nNEZAPOMEŇTE: VĚNUJTE POZORNOST HRÁČI NĚMECKA, POSLOUCHEJTE HO, PROSÍME A ZBOHOUŘTE HRÁČE NĚMECKA O MILOST" # todo: NEW TRANSLATION
  countrystartup.101.a: "Díky za radu!" # todo: NEW TRANSLATION
  countrystartup.102.t: "Spojené království v Horstorical multiplayeru" # todo: NEW TRANSLATION
  countrystartup.102.d: "Spojené království krok za krokem \n\n1. Vyrábějte letectvo pro Spojence. \n\n2. Zajistěte námořní převahu proti Itálii a Německu \n\n3. Bojujte v Africe, abyste vykrvavili Německo před Barbarossou \n\n4. Obsazujte nebo přimějte Japonsko ke kapitulaci v Asii \n\n5. Udržujte tlak v Africe během Barbarossy \n\n6. Naplánujte konečnou hru, buď Husky nebo D‑Day a ukončete hru \n\nNEZAPOMEŇTE: Jste vůdcem frakce, ujistěte se, že dobře řídíte svůj tým! \n\nTaké pamatujte, že jihozápadní Anglie, Sussex, Velký Londýn a Východní Anglie jsou invadovatelné." # todo: NEW TRANSLATION
  countrystartup.102.a: "Díky za radu!" # todo: NEW TRANSLATION
  countrystartup.103.t: "Francie v Horstorical multiplayeru" # todo: NEW TRANSLATION
  countrystartup.103.d: "Francie krok za krokem \n\n1. Postavte tanky (a extra pěchotu) pro bitvu o Francii do 31. 8. 1939 \n\n2. Získáváte 1 legitimitu za den, tak vydržte alespoň do 1. listopadu \n\n3. Po vaší kapitulaci dostanete odměny podle toho, jak dobře jste drželi \n\n4. Držte Afriku s vaší frakcí \n\nNEZAPOMEŇTE: Jste nejsilnější spojenecký tankový menší stát ve hře, ujistěte se, že dobře podporujete svůj tým!" # todo: NEW TRANSLATION
  countrystartup.103.a: "Díky za radu!" # todo: NEW TRANSLATION
  countrystartup.104.t: "Spojené státy v Horstorical multiplayeru" # todo: NEW TRANSLATION
  countrystartup.104.d: "Spojené státy krok za krokem \n\n1. Vaše počáteční ekonomika je omezena Velkou depresí, urychlete focusy, abyste ji odstranili \n\n2. Dávejte pozor na svá místa v kongresu, budete je potřebovat pro kritické focusy \n\n3. Postavte asijskou obranu se svou frakcí a snažte se zpozdit/obsadit/kapitulovat Japonsko \n\n4. Naplánujte konečnou hru s VB, buď pomozte s Husky nebo D‑Day s vaší frakcí \n\nNEZAPOMEŇTE: Jste pozdní hlavní mocnost, od roku 1942 budete mít dost IC na to, abyste se vypořádali s každým v hře." # todo: NEW TRANSLATION
  countrystartup.104.a: "Díky za radu!" # todo: NEW TRANSLATION
  countrystartup.105.t: "Sovětský svaz v Horstorical multiplayeru" # todo: NEW TRANSLATION
  countrystartup.105.d: "Sovětský svaz krok za krokem \n\nTento průvodce se bude lišit od ostatních kvůli vaší jedinečné situaci. \n\n1. Připravte se na Zimní válku 1. prosince 1939 \n\n2. Připravte se na Barbarossu 22. června 1941 \n\n3. Snažte se proti Osě zasáhnout různými politickými cestami ve vašem stromu fokusů \n\n4. Můžete čelit iráckému a japonskému frontu v budoucnu, modlete se, aby vaši spojenci dělali dobře \n\n5. A pokud Spojenci neuspějí, Utáhněte hru na svých bedrech! \n\nNEZAPOMEŇTE: Vaše frontová města začínají s 10% obrany jádra a zadní města s 5% obrany jádra, takže pečlivě vybírejte, kterou linii držet." # todo: NEW TRANSLATION
  countrystartup.105.a: "Díky za radu!" # todo: NEW TRANSLATION
  countrystartup.106.t: "British Raj v Horstorical multiplayeru" # todo: NEW TRANSLATION
  countrystartup.106.d: "British Raj krok za krokem \n\n1. Zeptejte se VB, jestli chce, abyste kapitulovali Etiopii nebo pomohli v Africe. \n\n2. Připravte Barmu a Bengálsko proti japonské invazi k 1. 1. 1941 \n\n3. Přežijte. \n\nNEZAPOMEŇTE: Jste nejsilnější menší stát v hře; asijský front do značné míry závisí na tom, zda kapitulujete nebo ne. Takže se snažte nekapitulovat, poraďte se s Japonskem a vyhrajte hru!" # todo: NEW TRANSLATION
  countrystartup.106.a: "Díky za radu!" # todo: NEW TRANSLATION
  countrystartup.107.t: "Německo v Horstorical multiplayeru" # todo: NEW TRANSLATION
  countrystartup.107.d: "Německo krok za krokem \n\n1. Připravte pěchotu/tanky/letectvo do 31. 8. 1939 \n\n2. Vyhlaste válku Polsku a porazte jej \n\n3. Vyhlaste válku Dánsku a Norsku a buď je porazte sami, nebo požádejte minor spojence \n\n4. Vyhlašte válku Nizozemí a obkličte Francii \n\n5. Pojďte do Afriky a obsad'te Aswan (nebo postoupit za něj, pamatujte, čím více vysajete, tím méně budete mít na Barbarossu) \n\n6. Připravte se na Barbarossu 22. června 1941 \n\n7. Bránit D‑Day a dosáhnout kapitulace Sovětského svazu \n\nNEZAPOMEŇTE: Nezapomeňte udělat fokus 'Atlantic Wall' a pečlivě řiďte činnost vašich minor spojenců; Německo v podstatě kontroluje tok hry svými akcemi, tak jednejte iniciativně." # todo: NEW TRANSLATION
  countrystartup.107.a: "Díky za radu!" # todo: NEW TRANSLATION
  countrystartup.108.t: "Itálie v Horstorical multiplayeru" # todo: NEW TRANSLATION
  countrystartup.108.d: "Itálie krok za krokem \n\n1. Postavte vhodné množství armády/letectva/námořnictva do 31. 8. 1939 \n\n2. Držte Afriku, dokud Francie nekapituluje; zajistěte námořní převahu ve Středozemním moři \n\n3. Postupujte, jak moc vám Německo dovolí, zajišťujte obranné linie \n\n4. Držte Afriku/Írán/Operaci Torch, dokud vaše frakce neporazí Sovětský svaz \n\nNEZAPOMEŇTE: Jste v podstatě slabší verzí Japonska; vaší minimální povinností je držet Spojence, dokud Sovětský svaz nekapituluje. Využijte strategické průsmyky a držte Afriku co nejdéle." # todo: NEW TRANSLATION
  countrystartup.108.a: "Díky za radu!" # todo: NEW TRANSLATION
  countrystartup.109.t: "Japonsko v Horstorical multiplayeru" # todo: NEW TRANSLATION
  countrystartup.109.d: "Japonsko krok za krokem \n\n1. Budujte do 1. 1. 1941 \n\n2. Využijte bonusy 'Tora! Tora!' a 'Invasion Plans', trvají omezenou dobu, tak postupujte volně a obsazujte co nejvíc území \n\n3. Vaším konečným cílem v této hře je vysát spojenecký průmysl a nakonec je zcela zničit \n\nNEZAPOMEŇTE: Japonsko má některé z nejsilnějších modifikátorů v modu, využijte je dobře a nakonec vyhlaste válku Sovětskému svazu splněním podmínek ve vašem fokusu 'War against The Soviet Union'." # todo: NEW TRANSLATION
  countrystartup.109.a: "Díky za radu!" # todo: NEW TRANSLATION
  countrystartup.110.t: "Finsko v Horstorical multiplayeru" # todo: NEW TRANSLATION
  countrystartup.110.d: "Finsko krok za krokem \n\n1. Připravte se na krátkou válku (Zimní válka) 1. 12. 1939 a na Barbarossu 22. 6. 1941 \n\n2. Vítězství ve Zimní válce vám dá 5 civilních továren a 10 veteránů s medailemi, ale můžete se také rozhodnout proti válce \n\n3. Vaším konečným cílem je fokus 'Join the Axis', ujistěte se, že splníte podmínky a držíte Sověty na severu \n\nNEZAPOMEŇTE: Vaše MIO mají jedny z nejsilnějších vlastností ve hře, tak je využijte v boji proti Rudé hrozbě." # todo: NEW TRANSLATION
  countrystartup.110.a: "Díky za radu!" # todo: NEW TRANSLATION
  countrystartup.111.t: "Vichy Francie v Horstorical multiplayeru" # todo: NEW TRANSLATION
  countrystartup.111.d: "Vichy Francie krok za krokem \n\n1. Budujte do kapitulace Francie \n\n2. Pomozte Itálii s obranou Afriky \n\n3. Držte stát Constantine 30 dní, abyste se vyhnuli těžkým penalizacím, když bude vyhlášena operace Torch \n\n4. Vaším konečným cílem je fokus 'End the Occupation', tak držte Afriku pevně, dokud toho nedosáhnete." # todo: NEW TRANSLATION
  countrystartup.111.a: "Díky za radu!" # todo: NEW TRANSLATION
  countrystartup.112.t: "Italská Východní Afrika/Irák v Horstorical multiplayeru" # todo: NEW TRANSLATION
  countrystartup.112.d: "Italská Východní Afrika je spíše zdržovací menší stát. Nemáte žádnou speciální roli kromě zdržování do kapitulace. Podle výchozího nastavení budete hrát jako kooperující Itálie po kapitulaci, ale Itálie vás může rozhodnutím přepnout na Irák poté, co dokončí 'Stoke Iraqi Nationalism'.\n\nPokud skončíte jako Irák, vaše úloha je velmi jednoduchá — pomoci Itálii bránit Írán (a případně Arábii) proti Spojencům. Vaše výzkumy, výroba a řízení průmyslu nejsou příliš důležité, protože jako Irák se objevíte ve středu hry a nemusíte dělat nic zvláštního, abyste byli relevantní v roce 1941. Koordinujte se s Itálií, jak bránit Írán (a Arábii) a jaké doktríny získáte z focusů." # todo: NEW TRANSLATION
  countrystartup.112.a: "Díky za radu!" # todo: NEW TRANSLATION
  countrystartup.113.t: "Chorvatsko v Horstorical multiplayeru" # todo: NEW TRANSLATION
  countrystartup.113.d: "Chorvatsko krok za krokem \n\n1. Vystavte národ až do kapitulace Francie a obsazení vaší země Německem \n\n2. Držte Afriku pevně a pomáhejte Itálii v obraně \n\n3. Bránit se proti jakýmkoli invazím od Spojenců \n\nNEZAPOMEŇTE: Jste v podstatě Manchukuo pro vašeho italského hráče, takže nejoptimálnější výstavba pro Itálii jsou tanky. Navíc nedostáváte žádné bonusy Barbarossy proti Sovětskému svazu, takže není optimální s nimi bojovat." # todo: NEW TRANSLATION
  countrystartup.113.a: "Díky za radu!" # todo: NEW TRANSLATION
  countrystartup.114.t: "Manchukuo v Horstorical multiplayeru" # todo: NEW TRANSLATION
  countrystartup.114.d: "Manchukuo krok za krokem \n\n1. Budujte do 1. 1. 1941 \n\n2. Můžete úplně zvládnout frontu speciálními silami nebo dělat tanky na podporu Japonska \n\n3. Koordinujte s Japonskem boj proti Spojencům." # todo: NEW TRANSLATION
  countrystartup.114.a: "Díky za radu!" # todo: NEW TRANSLATION
  HMP_tank_minor_tips: "Tipy pro tankové menší státy" # todo: NEW TRANSLATION
  countrystartup.115.t: "Tipy pro tankové menší státy" # todo: NEW TRANSLATION
  countrystartup.115.d: "1. Váš 4.–6. fokus by měl být fokus na bonus k výzkumu tanků, nedělte to. \n\n2. 600–900 výzkumního času (i s bonusem) je normálních, nezkoušejte přidávat více výzkumů mezi to. Váš výzkum tieru 2 tanků by měl přijít začátkem roku 1938. \n\n3. Nezapomeňte postavit pozemní zařízení kolem roku 1938. \n\n4. 70 % vaší vojenské produkce by mělo jít na tanky, 20 % na mechanizovanou a 10 % na ostatní. \n\n5. Pokud jste nováček, použijte tanky z 'doporučených' návrhů. \n\n6. Ujistěte se, že výzkumně dokončíte i 'speciální projekty' vyžadované šablonami; možná budete muset licenci něco získat od jiných hráčů. (Např. katyushy, plamenomety atd.)" # todo: NEW TRANSLATION
  countrystartup.115.a: "Díky za radu!" # todo: NEW TRANSLATION
  HMP_infantry_minor_tips: "Tipy pro pěší menší státy" # todo: NEW TRANSLATION
  countrystartup.116.t: "Tipy pro pěší menší státy" # todo: NEW TRANSLATION
  countrystartup.116.d: "1. Váš 4.–6. fokus by měl být to, co potřebujete dostat pro svůj tým, nedělejte to pozdě. Pokud nejste povinni nic urychlit, můžete to trochu odložit. \n\n2. Ve 'Hráčském panelu' jsou přednavržené šablony, můžete je upravit proti nepříteli. \n\n3. Ujistěte se, že vyrábíte 'vybavení pro speciální síly'. \n\n4. Průzkumné tanky a plamenometné tanky mohou vaše divize značně posílit, nevynechávejte je jen proto, že jsou drahé. \n\n5. MW doktrína vám dá organizační zdi, GBP dá obranné a plánovací statistiky a SF dá divize, které mohou udeřit kdykoli." # todo: NEW TRANSLATION
  countrystartup.116.a: "Díky za radu!" # todo: NEW TRANSLATION
  iraq_hist.1.t: "Zlatý čtverec spouští převrat!" # todo: NEW TRANSLATION
  iraq_hist.1.desc: "Hrozby fašistické organizace důstojníků známé jako Al‑Murabbaʿ al‑Dhahabī (Zlatý čtverec) sílily od smrti našeho krále Ghaziho I. a regentství [IRQ.GetLeader]. 'Čtverec' se skládá z plukovníka Salah al‑Din al‑Sabbagha, plukovníka Kamila Shabiba, plukovníka Fahmiho Saida a plukovníka Mahmuda Salmana. Tito důstojníci prosazují nacionalistické převzetí vlády a ustanovení Rashida Ali al‑Gaylaniho jako vůdce Iráku.\n\nDnes tito muži spustili svůj plán. Militární jednotky pod velením al‑Sabbagha se pohybují k zajištění královského paláce a klíčových strategických míst v Bagdádu. Čas je proti nám, musíme převrat zmařit dříve, než uspěje." # todo: NEW TRANSLATION
  iraq_hist.1.a: "Svobodný Irák?" # todo: NEW TRANSLATION
  iraq_hist.2.t: "Převzetí Zlatého čtverce v Iráku!" # todo: NEW TRANSLATION
  iraq_hist.2.desc: "Organizace nacionalistických vojenských důstojníků úspěšně spustila převrat v Iráku, svrhla regenta mladého krále Faisala II. Rashid Ali al‑Gaylani je novým předsedou vlády, pevně arabský nacionalista. Nová Zlatý čtverec Národní obranná vláda se realignovala proti Britům a údajně žádá o pomoc od [GER.GetNameDef], aby odolala pravděpodobné britské invazi.\n\nTato změna geopolitické orientace pravděpodobně přinese válku na Střední východ." # todo: NEW TRANSLATION
  iraq_hist.2.a: "Musíme zabezpečit naši strategickou pozici!" # todo: NEW TRANSLATION
  iraq_hist.2.b: "Tak to chodí." # todo: NEW TRANSLATION
  iraq_hist.2.c: "Okamžitě organizujte pomoc pro naše [IRQ.GetAdjective] kolegy!" # todo: NEW TRANSLATION
  iraq_hist.2.d: "Pošlete jim naše nejlepší přání, ale zůstaňme zdrženliví." # todo: NEW TRANSLATION
  iraq_hist.4.t: "[GER.GetNameDefCap] posílá materiální podporu" # todo: NEW TRANSLATION
  iraq_hist.4.desc: "V naší nadcházející potyčce s imperiálními Brity poslal [GER.GetNameDef] podporu v podobě lehkého letadlového, což není mnoho, ale je to potřebná pomoc proti agresoru!" # todo: NEW TRANSLATION
  iraq_hist.4.a: "Naše díky [GER.GetNameDef]" # todo: NEW TRANSLATION
  iraq_hist.5.t: "[ITA.GetNameDefCap] posílá materiální podporu" # todo: NEW TRANSLATION
  iraq_hist.5.desc: "V naší nadcházející potyčce s imperiálními Brity poslal [ITA.GetNameDef] podporu v podobě dodávky malého množství ručních zbraní. Není to mnoho, ale je to potřebná pomoc proti agresoru!" # todo: NEW TRANSLATION
  iraq_hist.5.a: "Naše díky [ITA.GetNameDef]" # todo: NEW TRANSLATION
  iraq_hist.6.t: "Irácké provokace u RAF Habbaniya!" # todo: NEW TRANSLATION
  iraq_hist.6.desc: "Zástupce [IRQ.GetNameDef] informoval velitele RAF na základně Habbaniya, že plošina v okolí byla obsazena k provedení 'cvičení'. V dopise bylo také požadováno, aby všechny lety okamžitě ustaly a žádné pohyby po zemi či ve vzduchu z areálu nevycházely. To bylo vyloženo jako přímá hrozba." # todo: NEW TRANSLATION
  iraq_hist.6.a: "Musíme odpovědět silou!" # todo: NEW TRANSLATION
  iraq_hist.6.b: "Stáhnout se z letecké základny, naše pozice je kompromitována." # todo: NEW TRANSLATION
  iraq.1.t: "Zlatý čtverec spouští státní převrat" # todo: NEW TRANSLATION
  iraq.1.d: "Převrat vede čtveřice iráckých nacionalistických generálů, známých jako 'Zlatý čtverec', kteří hodlají využít válku k prosazení úplné irácké nezávislosti po omezené nezávislosti udělené v roce 1932. MI6 zjišťuje, že koordinují s německou rozvědkou a přijali vojenskou pomoc od Německa a Itálie." # todo: NEW TRANSLATION
  iraq.1.a: "Tohle nesmíme tolerovat!" # todo: NEW TRANSLATION
  iraq.4.t: "Arabská revoluce" # todo: NEW TRANSLATION
  iraq.4.d: "Naše tajné snahy podporovat arabský nacionalismus prostřednictvím velvyslance Frize Grobbby byly úspěšné: Čtyři nacionalističtí iráčtí důstojníci provedli převrat ve prospěch al‑Gaylaniho, revolučního nacionalisty opačného k britskému impériu a jeho bolševickým spojencům. Al‑Gaylani je jasná příležitost rozšířit podporu Osy v této oblasti." # todo: NEW TRANSLATION
  iraq.4.a: "Jejich malicherná hádka se říši netýká." # todo: NEW TRANSLATION
  iraq.4.b: "Podpoříme arabský nacionalistický boj!" # todo: NEW TRANSLATION
  iraq.5.t: "Obléhání RAF Habbaniya" # todo: NEW TRANSLATION
  iraq.5.d: "Mitten chaosu al‑Gaylaniho převratu obklíčily síly Zlatého čtverce naši základnu RAF Habbaniya, přetínajíc její zásobovací linky s okolním světem. Jakákoli další nepřátelská akce by byla považována za akt války." # todo: NEW TRANSLATION
  iraq.5.a: "Požadovat, aby Zlatý čtverec ustoupil od letecké základny" # todo: NEW TRANSLATION
  iraq.6.t: "Útok na RAF Habbaniya" # todo: NEW TRANSLATION
  iraq.6.d: "Po úspěšném státním převratu Zlatý čtverec a jeho vůdce Rashid Ali tajně posilovali vazby s mocnostmi Osy. Po příjezdu britských posil k zajištění ropných zájmů zahájily irácké síly útok na RAF Habbaniya, jednu ze dvou zbývajících britských leteckých základen v Iráku." # todo: NEW TRANSLATION
  iraq.6.a: "To je akt války!" # todo: NEW TRANSLATION
  iraq.7.t: "Obléhání RAF Habbaniya bylo zrušeno" # todo: NEW TRANSLATION
  iraq.7.d: "Spojenecké síly na RAF Habbaniya úspěšně zvedly obléhání svými prostředky, umožňujíc britským letounům tam nasazeným vyzvat irácké letectvo a systematicky je vyřadit. To nám umožnilo zahájit protiútok směrem na Bagdád a připravit cestu pro obnovení irácké monarchie pod Faisalem II." # todo: NEW TRANSLATION
  iraq.7.a: "Vyrazíme přes poušť." # todo: NEW TRANSLATION
  sov_great_purge_event.01.t: "Průmyslové kvóty nesplněny" # todo: NEW TRANSLATION
  sov_great_purge_event.01.desc: "Naši poradci v měsíčních zprávách nám hlásí, že nesplňujeme průmyslové kvóty; Stalin je rozzuřený; chce odpovědi a chce je hned!" # todo: NEW TRANSLATION
  sov_great_purge_event.01.a: "Zfalšovat zprávy" # todo: NEW TRANSLATION
  sov_great_purge_event.01.b: "Obvinit dělníky a zdvojnásobit kvóty" # todo: NEW TRANSLATION
  sov_great_purge_event.02.t: "Podezřelé akce ze strany armády?" # todo: NEW TRANSLATION
  sov_great_purge_event.02.desc: "Naši špioni zaznamenali různé schůzky mezi důstojníky a podezřelé přesuny mezi kasárnami. Stalin to považuje za bezprecedentní krizi a chce, aby to bylo vyřešeno hned!" # todo: NEW TRANSLATION
  sov_great_purge_event.02.a: "Udat naše špiony" # todo: NEW TRANSLATION
  sov_great_purge_event.02.b: "Očistit armádu (znovu.)" # todo: NEW TRANSLATION
  sov_great_purge_event.03.t: "Spiknutí letectva?" # todo: NEW TRANSLATION
  sov_great_purge_event.03.desc: "Máme zprávy od našich velitelů v letectvu, že cvičení prováděná nad městy v posledních týdnech byla pro plánovaný převrat! Stalin je rozzuřený a chce okamžitou akci!" # todo: NEW TRANSLATION
  sov_great_purge_event.03.a: "Ujistit ho o cvičeních" # todo: NEW TRANSLATION
  sov_great_purge_event.03.b: "Očistit letectvo (znovu.)" # todo: NEW TRANSLATION
  sov_great_purge_event.04.t: "Námořnictvo hlásí..." # todo: NEW TRANSLATION
  sov_great_purge_event.04.desc: "Naši informátoři na lodích hlásí, že někteří kapitáni a některé kvartermastery šíří antikomunistické sentimenty; soudruh Stalin to rozhodně nepřijme." # todo: NEW TRANSLATION
  sov_great_purge_event.04.a: "Důkladně zkontrolovat naše informátory" # todo: NEW TRANSLATION
  sov_great_purge_event.04.b: "Očistit naše admirály" # todo: NEW TRANSLATION
  sov_great_purge_event.05.t: "První moskevský proces" # todo: NEW TRANSLATION
  sov_great_purge_event.05.desc: "Vyšetřování vraždy soudruha Kirova v roce 1934 odhalilo mnoho stop nasvědčujících spiknutí mezi Zinovievem a Trockým. Po sérii zatčení a výslechů důkazy jen rostou.\n\nPo schůzce s [Root.GetLeader] Zinoviev a Kamenev konečně přiznali, že spolupracovali s Trockým na svržení vlády, zavraždění sovětských vůdců a konečném obnovení kapitalismu v SSSR. Nyní jsou postaveni před soud spolu s 14 jejich spolukonspirátory. Obvinění jsou těžká — odsouzení by znamenalo jistou smrt." # todo: NEW TRANSLATION
  sov_great_purge_event.05.a: "Další skupina zrádců přivedená před spravedlnost." # todo: NEW TRANSLATION
  sov_great_purge_event.06.t: "Druhý moskevský proces" # todo: NEW TRANSLATION
  sov_great_purge_event.06.desc: "Po procesu první skupiny trockistů a teroristů pokračovala NKVD ve vyšetřování a odhalila více důkazů. Karl Radek byl zatčen a při výslechu prolomil. Prozradil existenci široké sítě osob spolupracujících s Trockým v skoro všech oblastech vlády, včetně armády. Hlavní organizátoři byli zatčeni a přiznali se pod výslechem.\n\nTito vůdci, včetně Radeka, jsou nyní souděni. Jejich zločiny jsou méně závažné než v předchozím procesu — ale trest smrti je stále možný." # todo: NEW TRANSLATION
  sov_great_purge_event.06.a: "Další skupina zrádců přivedená před spravedlnost." # todo: NEW TRANSLATION
  sov_great_purge_event.07.t: "Proces s generály" # todo: NEW TRANSLATION
  sov_great_purge_event.07.desc: "Vyšetřování před druhým moskevským procesem odhalilo velkou síť trockistů v armádě a ve vedení strany vedenou Bukharinem. Tito lidé byli zatčeni a vyslýcháni, kde se přiznali k těm nejzávažnějším zločinům — od plánovaného sabotáže po pokus o atentát, včetně spiknutí s cizími mocnostmi a dokonce vkládání hřebíků do másla, aby ublížili nebo zabili běžné sovětské občany.\n\nPokud budou usvědčeni, trest za tyto zločiny bude téměř jistě střelba." # todo: NEW TRANSLATION
  sov_great_purge_event.07.a: "Všichni zrádci musí zaplatit nejvyšší cenu." # todo: NEW TRANSLATION
  sov_great_purge_event.08.t: "Třetí moskevský proces" # todo: NEW TRANSLATION
  sov_great_purge_event.08.desc: "Agentům NKVD se podařilo odhalit znepokojivé nové spiknutí zahrnující několik členů naší strany. Ještě zneklidňující je, že po několika zatčeních a vyčerpávajících výsleších vypadly jména několika bývalých bolševiků. Další vyšetřování odhalilo důkazy, že řada těchto údajných spiklenců skutečně byla zapojena do sabotáže, frakcionářství a antisovětského chování. Tito muži byli postaveni před soud a nyní čekají na rozsudek. Podle obvinění bude jejich odsouzení téměř jistě znamenat velmi tvrdý trest." # todo: NEW TRANSLATION
  sov_great_purge_event.08.a: "Další skupina zrádců přivedená před spravedlnost." # todo: NEW TRANSLATION
  sov_great_purge_event.01.b_tt: "§RVelká čistka§! získává; \n$modifier_production_speed_industrial_complex_factor$: §R-1%§! \n$modifier_production_speed_arms_factory_factor$: §R-1%§! \n$MODIFIER_INDUSTRIAL_CAPACITY_FACTOR$: §R-1%§! \n\n" # todo: NEW TRANSLATION
  sov_great_purge_event.02.b_tt: "§RVelká čistka§! získává; \n$MODIFIER_XP_GAIN_ARMY_FACTOR$: §R-2.5%§! \n\n" # todo: NEW TRANSLATION
  sov_great_purge_event.03.b_tt: "§RVelká čistka§! získává; \n$MODIFIER_XP_GAIN_AIR_FACTOR$: §R-2.5%§! \n\n" # todo: NEW TRANSLATION
  sov_great_purge_event.04.b_tt: "§RVelká čistka§! získává; \n$MODIFIER_INDUSTRIAL_CAPACITY_DOCKYARD_FACTOR$: §R-5%§! \n\n" # todo: NEW TRANSLATION
  poland.26.t: "Polská exilová armáda" # todo: NEW TRANSLATION
  poland.26.d: "Naše armády byly poraženy a jsme kompletně vyhnáni z vlastní země, avšak naše exilová vláda se dokázala dostat do Londýna přes Rumunsko. Můžeme organizovat ozbrojený odpor s pomocí našich přátel!" # todo: NEW TRANSLATION
  poland.26.a: "Organizovat naše komanda do námořních jednotek." # todo: NEW TRANSLATION
  poland.26.b: "Organizovat naši armádu do velbloudích jednotek." # todo: NEW TRANSLATION
  poland.26.c: "Organizovat naše tankové posádky do obrněných jednotek." # todo: NEW TRANSLATION
  POL_first_corps_tt: "Zorganizujeme 10 mariňáků v Londýně." # todo: NEW TRANSLATION
