  CHL_famae_rama_de_artilleria: "FAMAE - Rama de Artillería" # todo: NEW TRANSLATION
  PAR_febrerista_land_reform: "Febreristická pozemková reforma" # todo: NEW TRANSLATION
  PAR_guarani_in_the_army: "Guaraní v armádě" # todo: NEW TRANSLATION
  PAR_guarani_in_the_army_desc: "Během války o Chaco paraguayská armáda přijala guaraní jako jazyk pro komunikaci mezi vojáky a vysokým velením, čímž se odklonila od španělštiny, aby jejich bolívijští nepřátelé nemohli snadno dešifrovat jejich komunikaci; ukázalo se to být velmi účinné." # todo: NEW TRANSLATION
  BOL_era_of_national_regression: "Éra národního úpadku" # todo: NEW TRANSLATION
  BOL_era_of_national_regression_desc: "Poslední desetiletí byla pro Bolívii těžká. Nejprve Válka o Pacifik v letech 1879–1883, pak Válka o Acre 1899–1903 a nakonec nejnovější porážka, Válka o Chaco v letech 1932–1935." # todo: NEW TRANSLATION
  BOL_era_of_national_regression_tt: "Bude odstraněno, pokud bude Obnovená Velká Bolívie:\nMá plnou kontrolu nad §YAcre§!, §YAntofagasta§!, §YChaco Boreal§!." # todo: NEW TRANSLATION
