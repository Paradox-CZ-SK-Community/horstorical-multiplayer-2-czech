  CHL_chilean_economy_dynamic_modifier: "Chilská ekonomika" # todo: NEW TRANSLATION
  CHL_chilean_economy_dynamic_modifier_desc: "Kvůli velké závislosti na vývozu mědi a nitrátů byla chilská ekonomika tvrdě zasažena po Velkém krachu, když její největší obchodní partner, konkrétně USA, přestal dovážet z Chile a země byla nucena prodávat části svého území, aby se ekonomika zcela nezhroutila. Byly podniknuty kroky k řešení situace, ale je třeba udělat více. Chilská ekonomika bude jednou opět skvělá!" # todo: NEW TRANSLATION
