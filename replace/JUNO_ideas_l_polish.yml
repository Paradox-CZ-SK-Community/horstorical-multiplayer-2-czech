  BRA_radio_nacional_idea_desc: "Založením národního rádia má vláda přímý způsob komunikace s veřejností. Můžeme ho využít k zajištění nejobjektivnějších, nejaktuálnějších informací, nebo jednoduše informací, které chceme, aby věděli." # todo: NEW TRANSLATION
  BRA_anaue_idea: "Anauê" # todo: NEW TRANSLATION
  BRA_anaue_idea_desc: "Domorodé pozdrav Anauê se stal novým bojovým pokřikem integralistického hnutí. Skandovaný v ulicích členy strany v zelených uniformách v nich instaluje hrdost a v jejich opozici strach." # todo: NEW TRANSLATION
  BRA_ethical_internationalism_idea: "Etický internacionalismus" # todo: NEW TRANSLATION
  BRA_ethical_internationalism_idea_desc: "$BRA_ethical_internationalism$" # todo: NEW TRANSLATION
  BRA_secure_our_borders_idea: "Zabezpečit naše hranice" # todo: NEW TRANSLATION
  BRA_secure_our_borders_idea_desc: "$BRA_secure_our_borders$" # todo: NEW TRANSLATION
  BRA_army_reward: "Odměny věrné armádě" # todo: NEW TRANSLATION
  BRA_navy_reward: "Odměny věrné námořnictvu" # todo: NEW TRANSLATION
  BRA_psad_idea: "Departamento Administrativo do Serviço Público" # todo: NEW TRANSLATION
  BRA_psad_idea_desc: "DASP byl založen, aby pomohl vládě udržet dobře fungující režim a ekonomiku konsolidací a reorganizací různých předchůdců do jednoho soudržného, moderního úřadu." # todo: NEW TRANSLATION
  BRA_commonwealth_idea: "Členský stát Lusofonního společenství" # todo: NEW TRANSLATION
  BRA_commonwealth_idea_desc: "Tento národ je členem Lusofonního společenství, komunity se silnými historickými vazbami, kde se často používá portugalština. Členské státy se dohodly na spolupráci v otázkách společného zájmu, jako je technologie a zahraniční politika." # todo: NEW TRANSLATION
  BRA_proletarian_equality: "Proletářská rovnost" # todo: NEW TRANSLATION
  BRA_proletarian_equality_desc: "$BRA_equality_for_women_desc$" # todo: NEW TRANSLATION
  BRA_promoting_communism: "Vzrůstající komunismus" # todo: NEW TRANSLATION
  BRA_promoting_communism_desc: "Brazílie se snaží ovlivnit naši politiku podporou různých komunisticky orientovaných skupin." # todo: NEW TRANSLATION
  BRA_sway_the_neighbors_lar: "Kampaň zpravodajského vlivu na sousedy" # todo: NEW TRANSLATION
  BRA_army_dummy_idea: "$SMB_army_BRA$" # todo: NEW TRANSLATION
