  CHL_the_grand_chilean_armada_desc: "V důsledku nedávného tónového posunu v [CHL.GetNameDef] začal proces posilování našeho španělského dědictví prostřednictvím vytvoření vlastní Velké armády." # todo: NEW TRANSLATION
