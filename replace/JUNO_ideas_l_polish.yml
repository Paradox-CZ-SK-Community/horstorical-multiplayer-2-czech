l_polish:
  URG_terra_dictatorship: "Terrova diktatura" # todo: NEW TRANSLATION
  URG_terra_dictatorship_desc: "Od Revoluce 31. března 1933 je u moci Gabriel Terra a jeho stoupenci, včetně těch, kteří následují Batllismo, stejně jako Bílá strana a její vůdce Luis Alberto de Herrera. Terra má moc nepodléhající žádné autoritě, která by mohla zpochybnit jeho rozhodnutí. Pro Uruguayi to znamená přísnou neutralitu, protože Terra si přeje vnitřní rozvoj a kontrolu nad výběrem strany v jakýchkoli nepředvídaných válkách, jak v Jižní Americe, tak i za Atlantikem." # todo: NEW TRANSLATION
  BOL_toll_of_the_chaco_war: "Účet z války o Chaco" # todo: NEW TRANSLATION
  BOL_toll_of_the_chaco_war_desc: "Válka o Chaco právě skončila; trvala od roku 1932 do roku 1935. Vůle bojovat byla úplně vyčerpána i u nejhorlivějších stoupenců expanze v Bolívii i Paraguayi a mnozí leží mrtví v dosud sporném regionu Chaco Boreal." # todo: NEW TRANSLATION
  BOL_toll_of_the_chaco_war_2: "Účet z války o Chaco" # todo: NEW TRANSLATION
  BOL_toll_of_the_chaco_war_2_desc: "Válka o Chaco právě skončila; trvala od roku 1932 do roku 1935. Vůle bojovat byla úplně vyčerpána i u nejhorlivějších stoupenců expanze v Bolívii i Paraguayi a mnozí leží mrtví v dosud sporném regionu Chaco Boreal." # todo: NEW TRANSLATION
  PRU_amazonian_war: "Amazonská válka" # todo: NEW TRANSLATION
  PRU_no_factions_tt: "Může vstoupit do frakcí: §RNe§!" # todo: NEW TRANSLATION
  CHL_the_mapuche_conflict: "Konflikt s Mapuche" # todo: NEW TRANSLATION
  CHL_the_mapuche_conflict_desc: "Od doby pacifikace Araucanie a násilné integrace půdy a jejích obyvatel do chilského státu byli domorodí Mapuche vysídleni, znevýhodněni a nespokojeni. Zatímco mezi nimi existují skupiny usilující o spolupráci a integraci, jsou i tací, kteří se snaží stát různými způsoby podvrátit." # todo: NEW TRANSLATION
  CHL_mapuche_conflict_up_tt: "§RZhoršuje§! konflikt s Mapuche.\n" # todo: NEW TRANSLATION
  CHL_mapuche_conflict_down_tt: "§ZLÉTŠÍ§! konflikt s Mapuche.\n" # todo: NEW TRANSLATION
  idea_CHL_the_Hacienda_inquilinaje_system: "Systém Hacienda – Inquilinaje" # todo: NEW TRANSLATION
  idea_CHL_the_Hacienda_inquilinaje_system_desc: "Systém haciend se vztahy mezi majiteli pozemků a nájemci vychází ze starých římských a španělských impériálních způsobů správy země a jak se dalo očekávat, je vysoce zastaralý a utlačovatelský. Současné chilské haciendy vynikají špatnými podmínkami pro dělníky a jsou zaostalou součástí ekonomiky, protože v praxi až dodnes využívají nevolnictví. Jediný způsob, jak se tohoto problému skutečně zbavit, je §YZemědělská reforma§!, která by měla být hlavní prioritou, pokud chceme obnovit naši ekonomiku." # todo: NEW TRANSLATION
  idea_CHL_near_anarchic_society: "Téměř anarchická společnost" # todo: NEW TRANSLATION
  idea_CHL_near_anarchic_society_desc: "Naše národ trpí častými pokusy o převrat a výtržnostmi, stejně jako každodenními protesty. V důsledku velké nepřátelství mezi politiky, armádou a vládními institucemi nic nefunguje dostatečně efektivně. Musíme tyto problémy napravit, pokud chceme zemi jednou provždy stabilizovat." # todo: NEW TRANSLATION
  CHL_anarchic_society_level_down_tt: "§ZSnižuje§! účinky $idea_CHL_near_anarchic_society$" # todo: NEW TRANSLATION
  CHL_anarchic_society_up_tt: "§RZhoršuje§! účinky $idea_CHL_near_anarchic_society$" # todo: NEW TRANSLATION
  CHL_can_not_have_anarchy_tt: "Neobsahuje $idea_CHL_near_anarchic_society$" # todo: NEW TRANSLATION
  idea_CHL_repubican_guard: "Republikánská garda" # todo: NEW TRANSLATION
  idea_CHL_repubican_guard_desc: "Jak věci stojí, republika je ve velkém nebezpečí a na pokraji zhroucení. Prezident Arturo Alessandri od roku 1925 stabilizoval velkou část situace a nyní spoléhání se na tuto tajnou milici odvádí finance, které měly směřovat do armády, čímž se brání rozšíření pravidelných sil." # todo: NEW TRANSLATION
  CHL_german_compensation_idea: "Německé odškodnění" # todo: NEW TRANSLATION
  CHL_spirit_of_the_conquistadors: "Duch conquistadorů" # todo: NEW TRANSLATION
  CHL_spirit_of_the_conquistadors_desc: "Je to zásluha slavné doby conquistadorů, že náš lid přišel sem do našeho velkého království na jižním Atlantiku. Hrají velkou roli v naší historii a nyní slouží jako inspirace pro náš lid; jejich vůle nás povede do budoucna. [CHL.GetNameDefCap] poroste, jak dobýváme slabší sousedy a stáváme se dominantní silou v Jižní Americe." # todo: NEW TRANSLATION
  CHL_relief_efforts_idea: "Úsilí o pomoc" # todo: NEW TRANSLATION
  CHL_relief_efforts_idea_desc: "Vláda založila Rekonstrukční a humanitární korporaci (Reconstruction and Relief Corporation) ve snaze lépe organizovat a podporovat záchranné a rekonstrukční práce po zemětřesení v Chillánu v roce 1939." # todo: NEW TRANSLATION
  CHL_spanish_refugees: "Španělští intelektuální uprchlíci" # todo: NEW TRANSLATION
  CHL_has_left_wing_government: "Má levicovou vládu" # todo: NEW TRANSLATION
  CHL_has_right_wing_government: "Má pravicovou vládu" # todo: NEW TRANSLATION
  CHL_public_works_modifier: "Programy veřejných prací" # todo: NEW TRANSLATION
  CHL_deeper_mines_modifier: "Rozsáhlé důlní sítě" # todo: NEW TRANSLATION
  CHL_devalue_the_peso_idea: "Devalvace pesa" # todo: NEW TRANSLATION
  CHL_devalue_the_peso_idea_desc: "Aby naše ekonomika získala sílu potřebnou k růstu, Peso je v procesu devalvace, i když je to nepopulární opatření." # todo: NEW TRANSLATION
  CHL_devalue_the_franc_idea: "Devalvace franku" # todo: NEW TRANSLATION
  CHL_devalue_the_franc_idea_desc: "Aby naše ekonomika získala sílu potřebnou k růstu, frank Araucanía se devalvuje, i když je to nepopulární opatření." # todo: NEW TRANSLATION
  CHL_introduced_the_franc_idea: "Zavedení franku" # todo: NEW TRANSLATION
  CHL_introduced_the_franc_idea_desc: "Aby země překonala své jizvy a našla své místo na světové scéně, musí se stát součástí širší frankofonní sféry. Velký krok byl učiněn nahrazením starého Pesa araukanijským frankem." # todo: NEW TRANSLATION
  CHL_hydroelectric_power: "Hydroelektrická energie" # todo: NEW TRANSLATION
  CHL_hydroelectric_power_desc: "Díky investicím v regionu Araucanía jsme konečně vybudovali síť přehrad, které vyrábějí elektřinu a regulují průtok řek." # todo: NEW TRANSLATION
  CHL_siphoning_funds: "Vyvádění prostředků" # todo: NEW TRANSLATION
  CHL_siphoning_funds_desc: "Propaganda strany Nacista v současnosti vyvádí prostředky z veřejného sektoru, aby zvýšila svůj vliv na [CHL.GetAdjective] populace." # todo: NEW TRANSLATION
  CHL_the_kings_scouts: "Královi skauti" # todo: NEW TRANSLATION
  CHL_the_kings_scouts_desc: "Od malička si náš král užíval účast v paramilitárních aktivitách francouzského skautského hnutí. Nyní přinese stejnou radost a nadšení i [CHL.GetAdjective] mládeži." # todo: NEW TRANSLATION
  CHL_national_falange: "Falange Nacional" # todo: NEW TRANSLATION
  CHL_national_falange_desc: "Křesťanská politická strana Falange Nacional je progresivní a reformistická, odštěpila se od konzervativní strany v roce 1935 a je více než ochotna podpořit naší současnou politickou koalici." # todo: NEW TRANSLATION
  CHL_popular_front_in_power: "Frente Popular" # todo: NEW TRANSLATION
  CHL_liberal_party_in_power: "Partido Liberal" # todo: NEW TRANSLATION
  CHL_communist_party_in_power: "Partido Comunista" # todo: NEW TRANSLATION
  CHL_democratic_alliance_in_power: "Alianza Democrática" # todo: NEW TRANSLATION
  CHL_conservative_party_in_power: "Partido Conservador" # todo: NEW TRANSLATION
  CHL_radical_party_in_power: "Partido Radical" # todo: NEW TRANSLATION
  CHL_popular_freedom_alliance_in_power: "Alianza Popular Libertadora" # todo: NEW TRANSLATION
  CHL_from_support_chile_static_modifier: "Podpora Království Araucanía a Patagonie" # todo: NEW TRANSLATION
  CHL_non_lar_encryption: "Bonus šifrování" # todo: NEW TRANSLATION
  CHL_lar_encryption: "Bonus šifrování" # todo: NEW TRANSLATION
  CHL_imposed_new_taxes: "Uvaleny nové daně" # todo: NEW TRANSLATION
  CHL_impose_new_taxes_tt: "Když je národní duch §Y$CHL_imposed_new_taxes$§! odstraněn, upravte §Y$CHL_chilean_economy_dynamic_modifier$§! o:\n $MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+5%§! \n $MODIFIER_CONSUMER_GOODS_FACTOR$: §Y-10%§!" # todo: NEW TRANSLATION
  CHL_relief_efforts_idea_tt: "Když je národní duch §Y$CHL_relief_efforts_idea$§! odstraněn:" # todo: NEW TRANSLATION
  CHL_aid_SPR: "Pomoc Španělské republice" # todo: NEW TRANSLATION
  CHL_aid_araucania: "Pomoc Království Araucanía a Patagonie" # todo: NEW TRANSLATION
  CHL_aiding_CHL_payment: "Platba za pomoc Království Araucanía a Patagonie" # todo: NEW TRANSLATION
  CHL_payment_for_aid: "Platba za zahraniční pomoc" # todo: NEW TRANSLATION
  CHL_anti_americanism: "Antiamerikanismus" # todo: NEW TRANSLATION
  CHL_empowered_preparations_department: "Zesílené oddělení příprav" # todo: NEW TRANSLATION
  CHL_empowered_preparations_department_desc: "Nacistické oddělení příprav je nyní prioritou strany a skupina se připravuje na státní převrat proti liberální vládě." # todo: NEW TRANSLATION
  CHL_lack_of_funds: "Nedostatek prostředků" # todo: NEW TRANSLATION
  CHL_lack_of_funds_desc: "Liberální vláda ukradla velké množství prostředků v zemi a uprchla do ciziny. Potrvá dlouho, než se z tohoto ekonomického útlumu zotavíme." # todo: NEW TRANSLATION
  CHL_republican_guards_in_exile: "[CHL.GetAdjective] republikánští gardisté v exilu" # todo: NEW TRANSLATION
  CHL_republican_guards_in_exile_desc: "[CHL.GetAdjective] liberální vláda vytvořila ozbrojené paramilitární síly v naší zemi, které jim pomohou vypořádat se s fašistickou hrozbou ve své zemi, pokud bychom s nimi šli do války." # todo: NEW TRANSLATION
  CHL_naval_mutiny: "Námořní vzpoura" # todo: NEW TRANSLATION
  CHL_naval_mutiny_desc: "Právě probíhá další námořní vzpoura na protest proti našemu nástupu k moci a těžce paralyzuje náš stát." # todo: NEW TRANSLATION
  CHL_the_international_revolution: "Mezinárodní revoluce" # todo: NEW TRANSLATION
  CHL_the_international_revolution_desc: "Musíme zajistit, aby revoluční plamen, jakmile se rozhoří v zahraničí, nemohl být udušen." # todo: NEW TRANSLATION
  CHL_laissez_faire: "Laissez-Faire" # todo: NEW TRANSLATION
  CHL_laissez_faire_desc: "Trh musí volně plynout a pouze tím, že se vyhneme vládnímu zásahu do průmyslových záležitostí, se naše ekonomika může zotavit." # todo: NEW TRANSLATION
  CHL_strict_secularism: "Přísný sekularismus" # todo: NEW TRANSLATION
  CHL_strict_secularism_desc: "Církev nemá co říct v politice a měla by být považována za zcela oddělenou od ní. Musíme požadovat, aby naši politici složili přísahu, že svou víru nepřinesou do parlamentu." # todo: NEW TRANSLATION
  CHL_catholic_church_holding_political_power: "Katolická církev drží politickou moc" # todo: NEW TRANSLATION
  CHL_catholic_church_holding_political_power_desc: "Katolické církvi je momentálně dovoleno podílet se na oficiální vládní politice, což omezuje levici v tom, aby mohla řádně vytvořit silnou koalici proti nám." # todo: NEW TRANSLATION
  CHL_development_inwards_idea: "Rozvoj dovnitř" # todo: NEW TRANSLATION
  CHL_development_inwards_idea_desc: "Nová ekonomická doktrína, označovaná jako Rozvoj dovnitř, nám pomůže při rekonstrukci po dlouhých letech utrpení a nečinnosti." # todo: NEW TRANSLATION
  CHL_socialist_land_reform: "Socialistická pozemková reforma" # todo: NEW TRANSLATION
  CHL_socialist_land_reform_desc: "Éra Hacendados skončila a naši sedláci již nebudou muset žít v nevolnictví. Do [CHL.GetNameDef] skutečně vstoupilo nové období!" # todo: NEW TRANSLATION
  CHL_abolished_serfdom: "Zrušeno nevolnictví" # todo: NEW TRANSLATION
  CHL_abolished_serfdom_desc: "Éra Hacendados skončila a naši sedláci již nebudou muset žít v nevolnictví!" # todo: NEW TRANSLATION
  CHL_comptroller_general_of_chile: "Contraloría General de la República" # todo: NEW TRANSLATION
  CHL_comptroller_general_of_chile_desc: "Contraloría General de la República je nejvyšší kontrolní orgán Chile, autonomní a ústavní povahy, který má na starosti kontrolu legality aktů veřejné správy, dozor nad příjmy a investicemi fiskálních, municipálních a dalších organizací a služeb stanovených zákony, přezkoumává a posuzuje účty osob odpovědných za fiskální a municipální majetek, vede obecné účetnictví národa a vykonává další funkce svěřené zákonem." # todo: NEW TRANSLATION
  CHL_oppressed_working_class: "Utlačovaná dělnická třída" # todo: NEW TRANSLATION
  CHL_oppressed_working_class_desc: "Díky naší brutální represi všeho, co je jen náznakem komunismu, odbory v zemi již nemohou působit a dělnická třída může být přinucena plnit naše příkazy, aniž by mohla řádně protestovat, jinak by porušila Zákon o trvalé obraně." # todo: NEW TRANSLATION
  CHL_socialist_youth_idea: "Socialistická mládež" # todo: NEW TRANSLATION
  CHL_socialist_youth_idea_desc: "Socialistické mládežnické organizace nám pomohou organizovat paramilitární křídla, která mohou pomáhat našim vojákům v boji." # todo: NEW TRANSLATION
  CHL_anti_communist_action: "Acción Chilena Anticomunista" # todo: NEW TRANSLATION
  CHL_anti_communist_action_desc: "Abychom účinně bojovali s domácí komunistickou hrozbou, musíme organizovat vlastenecké skupiny připravené potlačit jakákoli levicová hnutí." # todo: NEW TRANSLATION
  CHL_ligas_patrioticas: "Ligas Patrióticas" # todo: NEW TRANSLATION
  CHL_ligas_patrioticas_desc: "Ligas Patrióticas jsou krajně pravicová para-policie občanská organizace působící v [CHL.GetNameDef], která nám pomáhá potlačovat nesouhlas a odrazovat kohokoli od vyhýbání se povolání." # todo: NEW TRANSLATION
  CHL_hosting_german_intel_lar: "Poskytování útočiště německému zpravodajství a operativcům" # todo: NEW TRANSLATION
  CHL_hosting_german_intel_lar_desc: "Aktivně pomáháme Němcům v jejich operacích špionáže na jiné státy v naší polokouli." # todo: NEW TRANSLATION
  CHL_hosting_german_intel_non_lar: "Poskytování útočiště německému zpravodajství a operativcům" # todo: NEW TRANSLATION
  CHL_hosting_german_intel_non_lar_desc: "Aktivně pomáháme Němcům v jejich operacích špionáže na jiné státy v naší polokouli." # todo: NEW TRANSLATION
  CHL_fascist_assault_department: "Departamento de las Tropas Nacistas de Asalto" # todo: NEW TRANSLATION
  CHL_fascist_assault_and_provinces_department: "Departamento de las Tropas Nacistas de Asalto" # todo: NEW TRANSLATION
  CHL_fascist_youth_department: "Departamento de la Juventud Nacista" # todo: NEW TRANSLATION
  CHL_fascist_youth_and_provinces_department: "Departamento de la Juventud Nacista" # todo: NEW TRANSLATION
  CHL_pan_hispanic_rhetoric: "Pan-hispánská rétorika" # todo: NEW TRANSLATION
  CHL_pan_hispanic_rhetoric_desc: "Brzy přijde éra hispánských národů a my budeme vládnout kontinentu. Je čas zlomit anglohegemonii a sjednotit hispánský lid!" # todo: NEW TRANSLATION
  CHL_pan_hispanic_rhetoric_2: "Pan-hispánská rétorika" # todo: NEW TRANSLATION
  CHL_pan_hispanic_rhetoric_2_desc: "Brzy přijde éra hispánských národů a my budeme vládnout kontinentu. Je čas zlomit anglohegemonii a sjednotit hispánský lid!" # todo: NEW TRANSLATION
  CHL_pan_hispanic_rhetoric_3: "Pan-hispánská rétorika" # todo: NEW TRANSLATION
  CHL_pan_hispanic_rhetoric_3_desc: "Brzy přijde éra hispánských národů a my budeme vládnout kontinentu. Je čas zlomit anglohegemonii a sjednotit hispánský lid!" # todo: NEW TRANSLATION
  CHL_fascist_military_excercises: "Vojenská cvičení" # todo: NEW TRANSLATION
  CHL_the_true_enemy_idea: "Úder proti pravému nepříteli" # todo: NEW TRANSLATION
  CHL_spirit_of_the_pacific_war: "Oživen duch války proti Pacifiku" # todo: NEW TRANSLATION
  CHL_spirit_of_the_pacific_war_desc: "Jednou jsme porazili [BOL.GetAdjective] a [PRU.GetAdjective] armády přesto, že nás početně převažovaly. Nyní to používáme jako propagandu, abychom inspirovali naše vojáky k postupu!" # todo: NEW TRANSLATION
  CHL_ancestral_mapuche_resistance: "Resistencia Ancestral Mapuche" # todo: NEW TRANSLATION
  CHL_mapuche_ancestral_resistance_good: "Resistencia Ancestral Mapuche" # todo: NEW TRANSLATION
  CHL_democratic_volunteer_corps: "Mezinárodní ochrana demokracie" # todo: NEW TRANSLATION
  CHL_democratic_volunteer_corps_desc: "Ať se autoritářství objeví kdekoliv, naši vojáci budou hrdí a připravení ho v mžiku zahubit." # todo: NEW TRANSLATION
  CHL_stubbornly_maintaining_neutrality: "Tvrdohlavé udržování neutrality" # todo: NEW TRANSLATION
  CHL_stricter_labor_laws: "Přísnější zákony o práci" # todo: NEW TRANSLATION
  CHL_enact_stricter_labor_laws_tt: "Když je národní duch §Y$CHL_stricter_labor_laws$§! odstraněn, upravte §Y$CHL_chilean_economy_dynamic_modifier$§! o:\n $MODIFIER_STABILITY_FACTOR$: §G+10%§! \n $MODIFIER_CONSUMER_GOODS_FACTOR$: §Y-25%§!" # todo: NEW TRANSLATION
  CHL_carabineros_de_chile_fascist: "Carabineros de Chile" # todo: NEW TRANSLATION
  CHL_carabineros_de_chile_fascist_desc: "Carabineros de Chile jsou naše národní četnická gendarmerie, která má jurisdikci nad celou zemí. Byli vytvořeni bývalým prezidentem Carlosem Ibáñezem del Campo v roce 1927; jejich misí je udržovat pořádek a prosazovat zákony Chile." # todo: NEW TRANSLATION
  CHL_carabineros_de_chile_neutrality: "Carabineros de Chile" # todo: NEW TRANSLATION
  CHL_carabineros_de_chile_neutrality_desc: "Carabineros de Chile jsou naše národní četnická gendarmerie, která má jurisdikci nad celou zemí. Byli vytvořeni naším skvělým prezidentem Carlosem Ibáñezem del Campo v roce 1927; jejich misí je udržovat pořádek a prosazovat zákony Chile." # todo: NEW TRANSLATION
  CHL_the_francoist_model: "Frankistický model" # todo: NEW TRANSLATION
  CHL_the_francoist_model_desc: "Následováním doktrín neutrálních diktátorů, jako byl španělský generál Francisco Franco, se můžeme vyhnout globálním konfliktům a místo toho se soustředit na naši sféru vlivu." # todo: NEW TRANSLATION
  CHL_the_francoist_model_conquest: "Frankistický model" # todo: NEW TRANSLATION
  CHL_the_francoist_model_conquest_desc: "Následováním doktrín neutrálních diktátorů, jako byl španělský generál Francisco Franco, se můžeme vyhnout globálním konfliktům a místo toho se soustředit na naši sféru vlivu." # todo: NEW TRANSLATION
  CHL_state_supporting_resistance_modifier: "Odpor podporovaný státem" # todo: NEW TRANSLATION
  CHL_state_supporting_resistance_modifier_desc: "Chile tajně dodává zbraně a vybavení a poskytuje vojenský výcvik místním ozbrojeným a partyzánským skupinám." # todo: NEW TRANSLATION
  CHL_mapuche_nationalism_dynamic_modifier: "Mapuchské nacionalismy" # todo: NEW TRANSLATION
  CHL_mapuche_nationalism_dynamic_modifier_desc: "Mapuchský nacionalismus zde zatím nepřevládal dlouho; musíme ho proto sami formovat, aby nabral podobu, kterou si přejeme." # todo: NEW TRANSLATION
  CHL_an_empire_in_the_pacific_idea: "Císařství v Pacifiku" # todo: NEW TRANSLATION
  CHL_an_empire_in_the_pacific_idea_desc: "Konečně přišel čas, aby [CHL.GetNameDef] převzala svůj osud a vybudovala mocné impérium v Pacifiku." # todo: NEW TRANSLATION
  CHL_mapuche_social_classes: "Mapuchské společenské třídy a sou-genderové identity" # todo: NEW TRANSLATION
  CHL_mapuche_social_classes_desc: "Zavedením společenských tříd a norem z naší staré společnosti do nové je můžeme opět učinit prosperujícími." # todo: NEW TRANSLATION
  CHL_cattle_and_wool: "Mapuchské skot a vlna" # todo: NEW TRANSLATION
  CHL_cattle_and_wool_desc: "Díky vynikajícím pastvinářským a chovatelským technikám lidu Mapuche může národ využít maximum z toho, co má." # todo: NEW TRANSLATION
  CHL_machi_in_the_army: "Organizace Machi v armádě" # todo: NEW TRANSLATION
  CHL_machi_in_the_army_desc: "Tím, že budou naši šamani Machi pochodovat s našimi jednotkami, zajistíme, že zůstanou vždy oživení a motivovaní." # todo: NEW TRANSLATION
  CHL_legacy_of_caupolican: "Dědictví Caupolicána" # todo: NEW TRANSLATION
  CHL_legacy_of_caupolican_desc: "Dědictví Caupolicána nás stále ovlivňuje a jeho duch a vůle budou nést dál v myslích a činech našich jednotek." # todo: NEW TRANSLATION
  CHL_unified_in_spirit_idea: "Jednotní duchem" # todo: NEW TRANSLATION
  CHL_unified_in_spirit_idea_desc: "Amerindiánský a polynéský lid spolupracují při koordinaci a výcviku svých armád, čímž se výrazně zvyšuje jejich efektivita." # todo: NEW TRANSLATION
  CHL_patagonian_giants: "Patagonscí obři" # todo: NEW TRANSLATION
  CHL_patagonian_giants_desc: "Kdysi dávno inspirovali Patagónci strach i v srdcích nejodvážnějších evropských průzkumníků. Měli bychom zajistit, aby naše armáda ztělesňovala ducha těchto imaginárních lidí a získala respekt všech kolem." # todo: NEW TRANSLATION
  CHL_crusade_against_imperialism_idea: "Velká křížová výprava proti imperialismu" # todo: NEW TRANSLATION
  CHL_crusade_against_imperialism_idea_desc: "Konečně přišel čas vystrnadit imperialistické a kolonialistické mocnosti z našeho kontinentu a osvobodit amerindiánské a polynéské národy od cizího útlaku!" # todo: NEW TRANSLATION
  CHL_local_mapuche_defense_groups: "Místní obranné skupiny Mapuche" # todo: NEW TRANSLATION
  CHL_ibanez_foriegn_support: "Zahraniční ekonomické investice" # todo: NEW TRANSLATION
  CHL_ibanez_foriegn_support_desc: "Díky velkému množství nových půjček se země může pomalu znovu rozběhnout, jak nové peníze proudí do rukou našich průmyslů." # todo: NEW TRANSLATION
  CHL_state_catholicism_idea: "Státní katolicismus" # todo: NEW TRANSLATION
  CHL_state_catholicism_idea_desc: "Jako další krok směrem k frankofonní sféře přijala [CHL.GetNameDef] katolicismus jako svůj státní náboženství." # todo: NEW TRANSLATION
  CHL_french_investments: "Francouzské investice" # todo: NEW TRANSLATION
  CHL_french_investments_desc: "Jacques Antoine Bernard přijel do země s finanční podporou francouzských šlechticů nespokojených s republikou, v níž žijí, v naději na lepší budoucnost v [CHL.GetNameDef]." # todo: NEW TRANSLATION
  CHL_veteran_legionaries: "Váleční veteráni Legií" # todo: NEW TRANSLATION
  CHL_veteran_legionaries_desc: "Mnoho členů Francouzských cizineckých legií se přidalo k Antoinu Bernardovi na jeho cestě do naší země a pomohou mu v jeho slavnostních dobytích." # todo: NEW TRANSLATION
  CHL_popular_resistance: "Lidový odpor" # todo: NEW TRANSLATION
  CHL_popular_resistance_desc: "V zemi je stále mnoho lidí, kteří nevěří v genialitu krále Antoina Bernarda. Musí být s nimi rychle naloženo!" # todo: NEW TRANSLATION
  CHL_french_aristocracy: "Francouzská aristokracie" # todo: NEW TRANSLATION
  CHL_araucanian_aristocracy: "Nová araukanijská aristokracie" # todo: NEW TRANSLATION
  araucanian_capital_perquenco: "Perquenco" # todo: NEW TRANSLATION
  CHL_invited_french_academia: "Pozvaná francouzská akademie" # todo: NEW TRANSLATION
  CHL_invited_french_academia_desc: "Důležitou součástí členství ve frankofonní sféře je myslet podobně; k tomu povzbudíme francouzskou akademii, aby se přestěhovala do [CHL.GetNameDef]." # todo: NEW TRANSLATION
  CHL_royal_mountaineers: "Les Montagnards Royaux" # todo: NEW TRANSLATION
  CHL_royal_mountaineers_desc: "Ačkoliv to možná není Patagonie, Araucanía je určitě zemí hor a džunglí. Král proto vyzval k vytvoření sboru královských horalistů, kteří se specializují na boj v tomto drsném terénu." # todo: NEW TRANSLATION
  CHL_peru_payments_to_chile: "Platby Chilenu" # todo: NEW TRANSLATION
  CHL_peru_payments_to_chile_desc: "Momentálně jsme povinni platit velkou částku každého měsíce [CHL.GetNameDef], kvůli naší koupi [951.GetName]." # todo: NEW TRANSLATION
  CHL_chile_payments_from_peru: "Platby od Peru" # todo: NEW TRANSLATION
  CHL_chile_payments_from_peru_desc: "V důsledku jejich nedávného nákupu [951.GetName] nám [PRU.GetNameDef] každý měsíc platí velkou částku peněz, čímž oživují naši ekonomiku." # todo: NEW TRANSLATION
  CHL_puppeteering_idea: "Vládnutí ze stínů" # todo: NEW TRANSLATION
  CHL_puppeteering_idea_desc: "Někdo nevládne jen dobýváním všeho a pokusem korunovat se králem. Místo toho musí najít loajální poddané a umístit je na trůny svých dobytých nepřátel, stejně jako to kdysi učinil velký Napoleon Bonaparte!" # todo: NEW TRANSLATION
  BOL_plurinational_democracy: "Demokratický plurinalismus" # todo: NEW TRANSLATION
  BOL_plurinational_democracy_desc: "Náš stát je definován soužitím množství izolovaných nebo zachovaných národnostních skupin v rámci politického celku. V [BOL.GetNameDef] je myšlenka národnosti pluralitní, což znamená, že v organizované komunitě nebo těle národů existuje mnoho národností." # todo: NEW TRANSLATION
