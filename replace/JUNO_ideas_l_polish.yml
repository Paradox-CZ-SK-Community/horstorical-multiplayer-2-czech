  BRA_national_defence_fund_idea: "Zvýšené výdaje na obranu" # todo: NEW TRANSLATION
  BRA_national_defence_fund_idea_desc: "$BRA_defense_spending_desc$" # todo: NEW TRANSLATION
  JUNO_natal_base_sharing: "Sdílení letecké základny Natal" # todo: NEW TRANSLATION
  ToA_aid_against_communists: "Protikomunistické brigády" # todo: NEW TRANSLATION
  ToA_aid_against_communists_desc: "Americká vláda přivírá oči před dobře vyzbrojenými, dobře vybavenými a dobře vycvičenými dobrovolníky, kteří odcházejí do zahraničí pomoci v globálním boji proti komunismu." # todo: NEW TRANSLATION
  ARG_resource_extration_focus: "Zaměření na těžbu zdrojů" # todo: NEW TRANSLATION
  ARG_ferrocarriles_argentinos: "Ferrocarriles Argentinos" # todo: NEW TRANSLATION
  ARG_construction_guilds_idea: "Argentinské stavební cechy" # todo: NEW TRANSLATION
  ARG_roca_runciman_new_partner_idea: "Smlouva La Plata" # todo: NEW TRANSLATION
  ARG_argentine_beef_trade_idea: "Obchod s argentinským hovězím" # todo: NEW TRANSLATION
  BRA_defense_of_the_fatherland_idea: "K dominanci v Americe" # todo: NEW TRANSLATION
  BRA_defense_of_the_fatherland_idea_desc: "$BRA_domination_of_the_americas$" # todo: NEW TRANSLATION
  BRA_neglected_state_dynamic_modifier: "Zapomenutý stát" # todo: NEW TRANSLATION
  BRA_neglected_state_dynamic_modifier_desc: "Tento stát byl chronicky podfinancován po řadu vlád, což vedlo k nedostatku infrastruktury, nezaměstnanosti a resentimentu vůči centrální vládě." # todo: NEW TRANSLATION
  BRA_growing_state_dynamic_modifier: "Rostoucí stát" # todo: NEW TRANSLATION
  BRA_growing_state_dynamic_modifier_desc: "Díky rozsáhlým investicím a rozvoji centrální vládou má tento stát nyní rostoucí ekonomiku, která směřuje k plné industrializaci v nadcházejících letech." # todo: NEW TRANSLATION
  BRA_modify_economy_intro: "Upravte §Y$BRA_undiversified_economy_modifier$§! o: " # todo: NEW TRANSLATION
  BRA_rail_investment: "Investice do železnic" # todo: NEW TRANSLATION
  BRA_rail_investment_desc: "$BRA_invest_in_railways_desc$" # todo: NEW TRANSLATION
  BRA_road_investment: "Investice do silnic" # todo: NEW TRANSLATION
  BRA_road_investment_desc: "$BRA_invest_in_road_infrastructure_desc$" # todo: NEW TRANSLATION
  BRA_port_investment: "Investice do přístavů" # todo: NEW TRANSLATION
  BRA_port_investment_desc: "$BRA_invest_in_ports_desc$" # todo: NEW TRANSLATION
  BRA_new_capital_modifier: "Výstavba nové metropole" # todo: NEW TRANSLATION
  BRA_new_capital_modifier_desc: "Jsme v procesu zakládání nové metropole v srdci země, abychom omezili pocit izolace mezi venkovskými státy." # todo: NEW TRANSLATION
  BRA_separatism_idea: "Separatistické nálady" # todo: NEW TRANSLATION
  BRA_separatism_idea_desc: "Mnozí v zemi mají výhrady vůči centrální vládě Brazílie nebo zášť vůči nutnosti podporovat chudší státy. V minulosti tyto city vedly k krátkodobým separatistickým hnutím, která odtrhla své státy od národa. Pokud se nám nepodaří brzy stabilizovat politickou situaci, taková hnutí mohou způsobit fragmentaci Brazílie." # todo: NEW TRANSLATION
  BRA_propaganda_idea: "Departamento de Propaganda" # todo: NEW TRANSLATION
  BRA_propaganda_idea_desc: "V tak křehkých časech musíme zajistit, aby veřejnost dostávala pouze informace, které potřebuje k pokračování své práce a podpoře vlády." # todo: NEW TRANSLATION
  BRA_cangaceiro_state: "Cangaço aktivní ve státě" # todo: NEW TRANSLATION
  BRA_cangaceiro_state_desc: "V severovýchodní Brazílii kdysi existovalo mocenské vakuum, které vedlo k vzestupu banditů známých jako Cangaço. Tito bandité po desetiletí sužují region a často jsou podporováni sympatiemi místních. Musíme něco udělat proti jejich pokračujícím pleněním a vraždám, než ztratíme kontrolu nad regionem." # todo: NEW TRANSLATION
  BRA_disrupt_bolivar_LaR: "Financování protizpravodajství" # todo: NEW TRANSLATION
  BRA_disrupt_bolivar_LaR_desc: "Zahraniční zpravodajské služby tady působily beztrestně příliš dlouho. S naším novým financováním zajistíme, že se nic nestane bez našeho předchozího vědomí." # todo: NEW TRANSLATION
  BRA_disrupted_bolivar: "Operace Bolívar narušena" # todo: NEW TRANSLATION
  BRA_disrupt_bolivar_no_lar: "Operace Bolívar narušena" # todo: NEW TRANSLATION
  BRA_good_neighbor_policy: "Politika dobrého sousedství" # todo: NEW TRANSLATION
  BRA_good_neighbor_policy_desc: "$BRA_cooperation_in_the_americas_desc$" # todo: NEW TRANSLATION
  BRA_accepted_washington_accords: "Přijata Washingtonská ujednání" # todo: NEW TRANSLATION
  BRA_rejected_washington_accords: "Washingtonská ujednání odmítnuta" # todo: NEW TRANSLATION
  BRA_washington_accords_idea: "Washingtonská ujednání" # todo: NEW TRANSLATION
  BRA_washington_accords_idea_desc: "$BRA_washington_accords$" # todo: NEW TRANSLATION
  BRA_departamento_de_political_e_social_no_lar: "Departamento de Ordem Política e Social" # todo: NEW TRANSLATION
  BRA_departamento_de_political_e_social_no_lar_desc: "$BRA_departamento_de_political_e_social_no_desc$" # todo: NEW TRANSLATION
  BRA_supporting_operation_bolivar: "Podpora operace Bolívar" # todo: NEW TRANSLATION
  BRA_aid_operation_bolivar: "Operace Bolívar" # todo: NEW TRANSLATION
  BRA_aid_operation_bolivar_desc: "$BRA_expand_operation_bolivar_desc$" # todo: NEW TRANSLATION
  BRA_international_crisis: "Mezinárodní krize" # todo: NEW TRANSLATION
  BRA_international_crisis_desc: "$BRA_the_international_crisis_desc$" # todo: NEW TRANSLATION
  BRA_unwilling_subjects: "Nepoddajní poddaní" # todo: NEW TRANSLATION
  BRA_unwilling_subjects_desc: "S tím, jak monarchie opět nabývá politický vliv, se lidé začínají cítit nepříjemně a frustrovaní z toho, že jsou opět poddanými autokrata." # todo: NEW TRANSLATION
  BRA_federal_republic: "Přijetí federalismu" # todo: NEW TRANSLATION
  BRA_federal_republic_desc: "$BRA_greater_federalism_desc$ " # todo: NEW TRANSLATION
  BRA_presidential_republic: "Prezidentská republika" # todo: NEW TRANSLATION
  BRA_presidential_republic_desc: "Národ potřebuje silné, rozhodné vedení, které dokáže sjednotit lidi a bránit naše hranice. K tomu soustřeďujeme politickou pravomoc do rukou prezidenta republiky, i když musíme zajistit silné pojistky a vyvážení, aby se předešlo dalšímu pokusu Vargas uchopit moc." # todo: NEW TRANSLATION
  BRA_tax_haven: "Rostoucí daňový ráj" # todo: NEW TRANSLATION
  BRA_tax_haven_desc: "Nízké zdanění korporací a řada kliček vedly k nárůstu počtu nadnárodních korporací, které se stěhují do Brazílie. Je lepší získat z nich nějaké daňové příjmy než žádné." # todo: NEW TRANSLATION
  BRA_nationalized_banks: "Znárodněné banky" # todo: NEW TRANSLATION
  BRA_nationalized_banks_desc: "Znárodněním bank můžeme zvýšit kontrolu nad množstvím peněz v ekonomice a přesměrovat je z kapes akcionářů do rukou dělníků." # todo: NEW TRANSLATION
  BRA_collaboration_with_the_church: "Spolupráce s církví" # todo: NEW TRANSLATION
  BRA_collaboration_with_the_church_desc: "Církev je pro mnoho Brazilců životně důležitá. Konzultací s ní při tvorbě politik můžeme získat její masovou podporu pro naši administrativu." # todo: NEW TRANSLATION
  BRA_atheist_state: "Ateistický stát" # todo: NEW TRANSLATION
  BRA_atheist_state_desc: "Jako stát zaměřený na vědecký pokrok nemůžeme trávit čas oblbováním kléru. Správa země a náboženství lidí se nemají míchat a my hodláme to tak udržet." # todo: NEW TRANSLATION
  BRA_collectivized_agriculture: "Kolektivizované zemědělství" # todo: NEW TRANSLATION
  BRA_collectivized_agriculture_desc: "Kolektivizací našeho zemědělského průmyslu jsme zvýšili jeho efektivitu a posílili komunistickou ideologii mezi našimi lidmi." # todo: NEW TRANSLATION
  BRA_article_138: "Článek 138" # todo: NEW TRANSLATION
  BRA_article_138_desc: "$BRA_implement_article_138_desc$" # todo: NEW TRANSLATION
  BRA_court_the_military_idea: "Uchvátnout si přízeň armády" # todo: NEW TRANSLATION
  BRA_court_the_military_idea_desc: "Bez zavedeného vlivu a prostředků armády nemůžeme udržet svou moc. Alespoň prozatím se musíme snažit udržet je na naší straně." # todo: NEW TRANSLATION
  BRA_king_vassouras: "Dom Pedro Henrique" # todo: NEW TRANSLATION
  BRA_king_vassouras_desc: "" # todo: NEW TRANSLATION
  BRA_king_petropolis: "Dom Pedro de Alcântara" # todo: NEW TRANSLATION
  BRA_king_petropolis_desc: "" # todo: NEW TRANSLATION
  BRA_us_of_brazil: "Obrana svobody" # todo: NEW TRANSLATION
  BRA_us_of_brazil_desc: "Ideály svobody a demokracie jsou základy, na kterých je naše republika postavena. Uděláme cokoli, abychom tyto hodnoty doma i v zahraničí hájili, pokud bude potřeba." # todo: NEW TRANSLATION
  BRA_radicalized_proletariat: "Radikalizovaný proletariát" # todo: NEW TRANSLATION
  BRA_radicalized_proletariat_desc: "Komunistické myšlenky zakořenily mezi dělnickou třídou v [BRA.GetNameDef]. Balancujeme na tenké hraně mezi jejich potěšením a nepoškozením armády." # todo: NEW TRANSLATION
  BRA_aid_brazilian_communists: "Pomoc brazilským komunistům" # todo: NEW TRANSLATION
  BRA_us_of_south_america: "Obránce jihu" # todo: NEW TRANSLATION
  BRA_us_of_south_america_desc: "Naše hranice se rozšířily tak, že zahrnují většinu kontinentu. Je tedy naší posvátnou povinností bránit práva všech, kdo nazývají Jižní Ameriku svým domovem." # todo: NEW TRANSLATION
  BRA_stability_and_unity: "Řád a pokrok" # todo: NEW TRANSLATION
  BRA_stability_and_unity_desc: "Pečlivým politickým manévrováním jsme dokázali vytvořit silnější a stále více sjednocenou republiku. Na tomto základu budeme i nadále chránit občany našeho velkého národa." # todo: NEW TRANSLATION
  BRA_romanticize_the_old_empire_idea: "Císařské sentimenty" # todo: NEW TRANSLATION
  BRA_romanticize_the_old_empire_idea_desc: "Není nouze o lidi s výhradami vůči vládě Brazílie. Oživením císařských sentimentů a nostalgie sjednotíme tyto rozdrobené frakce do jedné soudržné síly." # todo: NEW TRANSLATION
  BRA_undermine_democracy_idea: "Podkopat demokracii" # todo: NEW TRANSLATION
  BRA_undermine_democracy_idea_desc: "$BRA_undermine_democracy_desc$" # todo: NEW TRANSLATION
  BRA_modify_neglected_state: "Upravte §Y$BRA_neglected_state_dynamic_modifier$§!/§Y$BRA_growing_state_dynamic_modifier$§! o:" # todo: NEW TRANSLATION
  BRA_liberated_by_communist_brazil: "Osvobozeno [BRA.GetNameDefCap]" # todo: NEW TRANSLATION
  BRA_liberated_by_communist_brazil_desc: "Naše země konečně získala zaslouženou nezávislost od kolonizátorů. S pomocí [BRA.GetNameDef] jsme znovu svobodní. Díky jejich činu se komunistické myšlenky, které hlásají, začínají v našem lidu ujímat." # todo: NEW TRANSLATION
  BRA_expanding_the_revolution: "Rozšiřování revoluce" # todo: NEW TRANSLATION
  BRA_expanding_the_revolution_desc: "Revoluce byla přinesena do [BRA.GetNameDef] a nyní musíme hledět za vlastní hranice. Přišel čas šířit revoluci pro dobro našich soudruhů mimo [BRA.GetNameDef]." # todo: NEW TRANSLATION
  BRA_banco_do_brasil_idea: "Banco do Brasil" # todo: NEW TRANSLATION
  BRA_banco_do_brasil_idea_desc: "$BRA_banco_do_brasil_desc$" # todo: NEW TRANSLATION
  BRA_cprm_idea: "Rádio Marconi" # todo: NEW TRANSLATION
  BRA_ef_central_do_brasil_idea: "EF Central do Brasil" # todo: NEW TRANSLATION
  BRA_lloyd_brasileiro_idea: "Lloyd Brasileiro" # todo: NEW TRANSLATION
  BRA_departamento_nacional_do_cafe_idea: "Departamento Nacional do Café" # todo: NEW TRANSLATION
  BRA_brown_water_navy_idea: "Rozšířené říční námořnictvo" # todo: NEW TRANSLATION
  BRA_brown_water_navy_idea_desc: "$SMB_brown_water_navy_desc$" # todo: NEW TRANSLATION
  BRA_brown_water_navy_idea_bonus_tt: "Všechna pěchota:\n §Y-River:§!\n Pohyb: §G+10%§!\n Útok: §G+10%§!\n Obrana: §G+5%§!" # todo: NEW TRANSLATION
  ARG_political_corruption_modifier: "Politická korupce" # todo: NEW TRANSLATION
  ARG_political_corruption_modifier_desc: "Po dlouhá léta bylo [ARG.GetNameDef] sužováno fanatickou korupcí ve vládě. I když se zdálo, že vznik Concordancie to může zmírnit, podvodné volby a zastrašování voličů přetrvávají." # todo: NEW TRANSLATION
  ARG_modify_corruption_ns_intro: "Upravte §Y$ARG_political_corruption_modifier$§! o" # todo: NEW TRANSLATION
  ARG_international_loan_modifier: "Mezinárodní půjčka" # todo: NEW TRANSLATION
  ARG_international_loan_modifier_desc: "Není neobvyklé, že země v dobách krize žádají o finanční pomoc od jiných států po celém světě. Vzhledem k současnému stavu ekonomiky [ROOT.GetNameDef] dává smysl přijmout pomoc od velkých mocností zapojených do tohoto konfliktu." # todo: NEW TRANSLATION
  ARG_modify_international_loan_intro: "Upravte §Y$ARG_international_loan_modifier$§! o" # todo: NEW TRANSLATION
  ARG_corruption_crackdown_modifier: "$ARG_crack_down_on_corruption$" # todo: NEW TRANSLATION
  ARG_corruption_crackdown_modifier_desc: "Korupce, která sužovala vládu našeho národa, byla zcela nepřijatelná. Díky politikám Roberta Maríi Ortize jsme konečně mohli začít končit s flagrantními podvodnými aktivitami, kterých se naši politici dopouštěli." # todo: NEW TRANSLATION
  ARG_anti_corruption_modifier: "Proti-korupční politika" # todo: NEW TRANSLATION
  ARG_anti_corruption_modifier_desc: "Korupce, která sužovala vládu našeho národa, byla zcela nepřijatelná. Díky politikám Marcela T. de Alveara jsme konečně mohli začít končit s flagrantními podvodnými aktivitami, kterých se naši politici dopouštěli." # todo: NEW TRANSLATION
  ARG_infamous_decade_idea: "Nechvalně proslulé desetiletí" # todo: NEW TRANSLATION
  ARG_infamous_decade_idea_desc: "Nechvalně proslulé desetiletí bylo obdobím argentinské historie, které začalo pučem v roce 1930 proti prezidentu Hipólitu Yrigoyenovi. Byla to doba charakterizovaná dvěma věcmi. Na jedné straně významným odlivem obyvatel z venkova po Velké depresi a na druhé straně očividnými volebními podvody udržujícími konzervativní vlády u moci." # todo: NEW TRANSLATION
  ARG_infamous_decade_2_idea: "$ARG_infamous_decade_idea$" # todo: NEW TRANSLATION
  ARG_infamous_decade_2_idea_desc: "$ARG_infamous_decade_idea_desc$" # todo: NEW TRANSLATION
  ARG_infamous_decade_3_idea: "$ARG_infamous_decade_idea$" # todo: NEW TRANSLATION
  ARG_infamous_decade_3_idea_desc: "$ARG_infamous_decade_idea_desc$" # todo: NEW TRANSLATION
  ARG_infamous_decade_4_idea: "$ARG_infamous_decade_idea$" # todo: NEW TRANSLATION
  ARG_infamous_decade_4_idea_desc: "$ARG_infamous_decade_idea_desc$" # todo: NEW TRANSLATION
  ARG_public_works_investment_idea: "Investice do veřejných prací" # todo: NEW TRANSLATION
  ARG_public_works_investment_idea_desc: "Je důležité, aby [ARG.GetAdjective] vláda financovala a obstarávala projekty veřejných prací pro rekreaci, zaměstnanost, zdraví a bezpečnost. To zlepší kvalitu života ve větší [ARG.GetAdjective] komunitě." # todo: NEW TRANSLATION
  ARG_towards_a_greater_argentina_idea: "$ARG_towards_a_greater_argentina$" # todo: NEW TRANSLATION
  ARG_towards_a_greater_argentina_idea_desc: "[ARG.GetNameDefCap] utrpěla na počátku 20. století díky Velké depresi a následnému začátku Nechvalně proslulého desetiletí. Navzdory neustálým podvodným volbám, pokusům o puč a korupci úředníků jsme vyšli jako stabilní a efektivní národ." # todo: NEW TRANSLATION
  ARG_economic_reactivation_idea: "Ekonomická reaktivace" # todo: NEW TRANSLATION
  ARG_economic_reactivation_idea_desc: "Zákon o ekonomické reaktivaci je legislativa, která zajišťuje, že více vládních peněz bude směrováno do rozvoje ekonomických a průmyslových odvětví." # todo: NEW TRANSLATION
  ARG_civilian_economy_boost_idea: "Rozvinutá civilní ekonomika" # todo: NEW TRANSLATION
  ARG_civilian_economy_boost_idea_desc: "Díky pečlivému plánování a dobře umístěným darům se nám podařilo plně rozvinout naši civilní ekonomiku. Zvýšené vybavenosti dostupné občanům znamenají, že index národní spokojenosti se bude pomalu zvyšovat." # todo: NEW TRANSLATION
  ARG_invest_in_roads_idea: "Investice do silnic" # todo: NEW TRANSLATION
  ARG_invest_in_roads_idea_desc: "Dálnice národa jsou klíčové pro ekonomické, průmyslové a vojenské schopnosti [ARG.GetNameDef]. Naše investice do jejich výstavby a údržby se nám v nadcházejících letech vyplatí." # todo: NEW TRANSLATION
  ARG_invest_in_railways_idea: "Investice do železnic" # todo: NEW TRANSLATION
  ARG_invest_in_railways_idea_desc: "V moderní době se každý průmysl spoléhá na oporu národní železniční sítě. Jak jsme rozšířili železniční tratě po celé zemi, položili jsme základy pro pevný přesun zboží z venkovských komunit zpět do měst." # todo: NEW TRANSLATION
  ARG_roca_runciman_treaty_idea: "Smlouva Roca–Runciman" # todo: NEW TRANSLATION
  ARG_roca_runciman_treaty_idea_desc: "Dohoda Roca–Runciman je významný obchodní pakt mezi [ARG.GetNameDef] a [ENG.GetNameDef] podepsaný v květnu 1933, který zaručil [ARG.GetNameDef] fixní podíl na [ENG.GetAdjective] trhu s masem. Na oplátku se [ARG.GetNameDef] zavázala k omezením v obchodě a směnném kurzu, čímž chránila obchodní zájmy [ENG.GetNameDef]." # todo: NEW TRANSLATION
  ARG_eden_malbran_treaty_idea: "Smlouva Eden–Malbrán" # todo: NEW TRANSLATION
  ARG_eden_malbran_treaty_idea_desc: "Jako reakce na tvrdá omezení uložená smlouvou Roca–Runciman byla vyjednána nová dohoda nazvaná Smlouva Eden–Malbrán. Ta umožnila [ENG.GetNameDef] získat další koncese a zároveň snížila náklady na přepravné pšenice." # todo: NEW TRANSLATION
  ARG_raf_cooperation_idea: "Spolupráce s RAF" # todo: NEW TRANSLATION
  ARG_raf_cooperation_idea_desc: "Jak konflikty po světě nadále zuří, musíme vynaložit veškeré úsilí, abychom podpořili naše spojence tím, co dokážeme. Těsnější spolupráce s Královským letectvem [ENG.GetNameDef] jistě přivede naše piloty na modernější úroveň." # todo: NEW TRANSLATION
  ARG_argentine_beef_idea: "Argentinské hovězí" # todo: NEW TRANSLATION
  ARG_argentine_beef_idea_desc: "Od dob, kdy byli do [ARG.GetNameDef] přivezeni první dobytek španělskými conquistadory v roce 1536, je hovězí základním prvkem tradiční argentinské kuchyně. Díky tomu je naše hovězí celosvětově známé a existuje velká poptávka po jeho vývozu." # todo: NEW TRANSLATION
  ARG_argentine_metropole_idea: "Argentinská metropole" # todo: NEW TRANSLATION
  ARG_argentine_metropole_idea_desc: "Až donedávna se naše země opírala o venkovské zemědělské a těžební komunity. Jak se však nadále rozvíjíme v 20. století, časy se mění a představa ideálního [ARG.GetAdjective] života se také vyvíjí. Mnozí se stěhují do našich rozrostlých a prosperujících měst v naději usadit se a přizpůsobit se metropolitnímu životu." # todo: NEW TRANSLATION
  ARG_our_own_path_idea: "$ARG_our_own_path$" # todo: NEW TRANSLATION
  ARG_our_own_path_idea_desc: "Navzdory všemu utrpení, které jsme museli podstoupit, je [ARG.GetNameDef] schopná stát na vlastních nohách, aniž by se skláněla před jinými národy, frakcemi či konglomeráty. Volíme si vlastní cestu v těchto turbulentních časech." # todo: NEW TRANSLATION
  ARG_british_cooperation_idea: "$ARG_british_cooperation$" # todo: NEW TRANSLATION
  ARG_british_cooperation_idea_desc: "[ENG.GetNameDefCap] byla jedním z našich nejdéle trvajících obchodních partnerů. Jak budeme nadále dodržovat naše mnohé smlouvy a dohody, můžeme zjistit, že se naše ideologie posouvá směrem k nim." # todo: NEW TRANSLATION
  ARG_subdue_dissension_idea: "Potlačené nesouhlasy" # todo: NEW TRANSLATION
  ARG_subdue_dissension_idea_desc: "Probíhající vojenské nesouhlasy byly konečně uhašeny. To by pro nás mělo být lekcí do budoucna, abychom dávali pozor na další neklid v různých složkách naší vlády." # todo: NEW TRANSLATION
  ARG_improved_cooperation_idea: "Zlepšená spolupráce" # todo: NEW TRANSLATION
  ARG_improved_cooperation_idea_desc: "[ARG.GetNameDefCap] a [ENG.GetNameDef] se vzájemně sbližují ve svých zájmech." # todo: NEW TRANSLATION
  ARG_refused_embargo_idea: "Odmítnutá žádost o embargo" # todo: NEW TRANSLATION
  ARG_refused_embargo_idea_desc: "[ARG.GetNameDefCap] odmítla naši žádost o embargo na Ose." # todo: NEW TRANSLATION
  ARG_maintain_neutrality_idea: "Oddaní sobě samým" # todo: NEW TRANSLATION
  ARG_maintain_neutrality_idea_desc: "Ukázali jsme, že nemáme zájem o větší konflikty, které zuří po světě. Musíme se nejprve starat o sebe. Ať to je pro všechny prohlášení, že [ARG.GetNameDef] se zaměří na své vlastní cíle." # todo: NEW TRANSLATION
  ARG_american_allyship_idea: "Blízké vazby s Washingtonem" # todo: NEW TRANSLATION
  ARG_american_allyship_idea_desc: "Ve duchu americké spolupráce jsme navázali těsnější politické vazby s [USA.GetNameDef]. Jak stojíme spolu pod významnými slovy Monroeovy doktríny, nic z evropských mocností nás nemůže rozdělit." # todo: NEW TRANSLATION
  ARG_envoy_to_london_idea: "Blízké vazby s Londýnem" # todo: NEW TRANSLATION
  ARG_envoy_to_london_idea_desc: "Pokud budeme nadále vzájemně podporovat, bude mít [ENG.GetNameDev] v [ARG.GetNameDef] přítele. Je důležité, aby naše dvě země zůstaly politicky spojené a zajistily, že naše cíle zůstanou sladěny." # todo: NEW TRANSLATION
  ARG_counter_interlligence_program_idea: "Argentinský protizpravodajský program" # todo: NEW TRANSLATION
  ARG_counter_interlligence_program_idea_desc: "Špionáž je jedním z mnoha frontů, kterým čelíme v tomto globálním konfliktu, a proto je schopnost efektivně provozovat vlastní protizpravodajský program zásadní pro přežití ve válce. Rozhodli jsme se soustředit na obranné politiky spíše než na útočné podvratné taktiky." # todo: NEW TRANSLATION
  ARG_disrupt_bolivar_lar: "Práce proti operaci Bolívar" # todo: NEW TRANSLATION
  ARG_disrupt_bolivar_lar_desc: "Operace Bolívar nám byla dlouho trnem v oku a je na nás, abychom zaujali postoj proti tomuto ohavnému aktu nepřátelské špionáže." # todo: NEW TRANSLATION
  ARG_cut_ties_with_britain_idea: "Přerušit vazby s Británií" # todo: NEW TRANSLATION
  ARG_cut_ties_with_britain_idea_desc: "[ARG.GetNameDefCap] přerušila s námi vazby." # todo: NEW TRANSLATION
  ARG_disrupt_bolivar_no_lar: "Operace Bolívar narušena" # todo: NEW TRANSLATION
  ARG_disrupt_bolivar_no_lar_desc: "$ARG_disrupt_bolivar_lar_desc$" # todo: NEW TRANSLATION
  ARG_red_scare_idea: "Účinky rudého strachu" # todo: NEW TRANSLATION
  ARG_red_scare_idea_desc: "Ideologické napětí mezi těmito dvěma národy přerostlo." # todo: NEW TRANSLATION
  ARG_anti_soviet_idea: "Antisovětské postoje" # todo: NEW TRANSLATION
  ARG_anti_soviet_idea_desc: "Hrozba komunismu a nebezpečí, které představuje pro náš národ, je příliš důležitá na ignorování. [SOV.GetNameDefCap] stále dokazuje, že je mocností schopnou zničit náš způsob života. Lidé se bojí rudé hrozby — a právem!" # todo: NEW TRANSLATION
  ARG_buying_the_islands_idea: "Koupili jižní atlantské ostrovy" # todo: NEW TRANSLATION
  ARG_buying_the_islands_idea_desc: "Ukázalo se, že koupě dvou celých ostrovů je dost drahá. Tento dluh budeme splácet ještě dlouho." # todo: NEW TRANSLATION
  ARG_siam_di_tella: "SIAM Di Tella" # todo: NEW TRANSLATION
  ARG_chade_cade: "CHADE-CADE" # todo: NEW TRANSLATION
  ARG_anti_british_sentiment_idea: "Antibretonský sentiment" # todo: NEW TRANSLATION
  ARG_anti_british_sentiment_idea_desc: "Od té doby, co jsme přerušili vazby s [ENG.GetNameDef], se do naší vlády dostala vlna anti-britských nálad. Už nejsme vázáni jejich smlouvami a obchodními dohodami! Teď se můžeme soustředit na to, co je důležité: válku." # todo: NEW TRANSLATION
  ARG_growing_nationalism_modifier: "Rostoucí nacionalistické hnutí" # todo: NEW TRANSLATION
  ARG_growing_nationalism_modifier_desc: "Argentinská nacionalistická strana zaznamenala v zemi vlnu podpory a čím dál více lidí se přidává k jejich řadám a podporuje jejich rostoucí ideologii. Argentinský nacionalismus sleduje myšlenku obnovení [ARG.GetAdjective] identity a upevnění našeho postavení jako dominantní mocnosti v Jižní Americe." # todo: NEW TRANSLATION
  ARG_modify_growing_nationalism_ns_intro: "Upravte §Y$ARG_growing_nationalism_modifier$§! o" # todo: NEW TRANSLATION
  ARG_military_government_idea: "Vojenská vláda" # todo: NEW TRANSLATION
  ARG_military_government_idea_desc: "Pedro Pablo Ramírez převzal vládu a zřídil vojensky řízený stát. Tato změna režimu byla vyvolána voláním po změně z dříve zkorumpované a podvodné Concordancie. S manifestem orientovaným na [ARG.GeAdjective] expanzionismus je náš stát připraven čelit mnoha konfliktům v budoucnu." # todo: NEW TRANSLATION
  ARG_spirit_of_the_conquistadors_idea: "Duch conquistadorů" # todo: NEW TRANSLATION
  ARG_spirit_of_the_conquistadors_idea_desc: "Díky slávě conquistadorů se náš lid dostal na tuto krásnou zemi stříbra. Hrají významnou roli v naší historii a nyní slouží jako inspirace pro nový nacionalistický režim Nimia de Anquína. [ARG.GetNameDefCap] poroste, jak dobýváme slabší sousedy a stáváme se dominantní mocností v Jižní Americe." # todo: NEW TRANSLATION
  ARG_rapid_militarization_idea: "Rychlá militarizace" # todo: NEW TRANSLATION
  ARG_rapid_militarization_idea_desc: "Rychlá militarizace je proces, při kterém se společnost organizuje pro vojenský konflikt a násilí. Pustili jsme se do plného rozvoje našeho vojensko-průmyslového komplexu a připravujeme se na nadcházející boje." # todo: NEW TRANSLATION
  ARG_argentine_nationalism_idea: "Argentinský nacionalismus" # todo: NEW TRANSLATION
  ARG_argentine_nationalism_idea_desc: "Máme hodně důvodů být hrdí jako [ARG.GetAdjective] a tak i nadále povzbuzujeme obyvatele uvnitř našich hranic, aby identifikovali a podporovali zájmy našeho národa. Nepotřebujeme pomoc těch, kteří by se snažili zavádět tvrdé regulace nebo nás ohrožovat válkou. [ARG.GetNameDefCap] je suverénní země, která stojí sama za sebe." # todo: NEW TRANSLATION
  ARG_war_division_idea: "Válka - sekce" # todo: NEW TRANSLATION
  ARG_war_division_idea_desc: "Nyní, když náš národ stabilizoval vládu a vybudoval silnou ekonomiku, získali jsme konečně dost podpory od našeho lidu, abychom se připravili naplnit naše expanzionistické cíle." # todo: NEW TRANSLATION
  ARG_preparing_for_war_idea: "Připravujeme se na válku" # todo: NEW TRANSLATION
  ARG_preparing_for_war_idea_desc: "Kontinent Jižní Ameriky se nad námi tyčí, zralý k uchopení. Naše armády se připravují na válku, zatímco naši politici a diplomaté horlivě vytvářejí dokumenty a ultimáta v přípravě na naše dobytí. Hrozný had je připraven udeřit." # todo: NEW TRANSLATION
  ARG_spirit_of_the_cisplatine_war_idea: "Duch války cisplatinské" # todo: NEW TRANSLATION
  ARG_spirit_of_the_cisplatine_war_idea_desc: "Cisplatinská válka, rovněž známá jako argentinsko-brazilská válka, byla ozbrojeným konfliktem v 20. letech 19. století a od té doby panovalo mezi našimi dvěma národy napjaté a nejisté mírové soužití. Už to tak není. [BRA.GetNameDefCap] je hrozba, kterou je třeba řešit. Naše jednotky pochodují se duchem naší minulosti v zádech." # todo: NEW TRANSLATION
  ARG_integrate_operation_bolivar_idea_lar: "Integrace operace Bolívar" # todo: NEW TRANSLATION
  ARG_integrate_operation_bolivar_idea_lar_desc: "Díky našemu blízkému propojení s mocnostmi Osy jsme úspěšně začali integrovat Operaci Bolívar a pracovat na podpoře jihoamerického divadla vlastním špionážním programem." # todo: NEW TRANSLATION
  ARG_integrate_operation_bolivar_idea_no_lar: "Integrace operace Bolívar" # todo: NEW TRANSLATION
  ARG_integrate_operation_bolivar_idea_no_lar_desc: "$ARG_integrate_operation_bolivar_idea_lar_desc$" # todo: NEW TRANSLATION
  ARG_anti_american_idea: "Antiamerické nálady" # todo: NEW TRANSLATION
  ARG_anti_american_idea_desc: "$ARG_red_scare_idea_desc$" # todo: NEW TRANSLATION
  ARG_anti_american_propaganda_idea: "Antiamerická propaganda" # todo: NEW TRANSLATION
  ARG_anti_american_propaganda_idea_desc: "[USA.GetNameDefCap] je pozoruhodná hrozba pro náš režim. Ačkoli jsou známí jako spící gigant, nikdy nevíme, kdy se rozhodnou probudit a obrátit svůj zájem k nám. Naše jednotky jsou díky našemu propagačnímu oddělení připraveny postavit se [USA.GetAdjective] nebezpečí na severu." # todo: NEW TRANSLATION
  ARG_state_unions_idea: "Státní odbory" # todo: NEW TRANSLATION
  ARG_state_unions_idea_desc: "Odbory jsou organizace pracovníků, které si kladou za cíl udržet a zlepšit podmínky jejich zaměstnání. Mnohé z těchto podmínek zahrnují lepší mzdy a benefity, zlepšenou bezpečnost a pracovní podmínky a také zajištění, že běžný pracovník nebude nespravedlivě šikanován managementem." # todo: NEW TRANSLATION
  ARG_FJC_empowered_idea: "FJC zmocněna" # todo: NEW TRANSLATION
  ARG_FJC_empowered_idea_desc: "Federación Juvenil Comunista de la Argentina je jednou z nejvlivnějších mládežnických politických organizací v historii země. Je mládežnickou organizací v souladu s PCA a byla založena v roce 1921, aby prosazovala politiku strany mezi argentinskou mládeží. S PCA nyní plně u moci se FJC může dál rozvíjet a vychovávat mladé lidi Argentiny na plnohodnotné revolucionáře!" # todo: NEW TRANSLATION
  ARG_state_atheism_idea: "Státní ateismus" # todo: NEW TRANSLATION
  ARG_state_atheism_idea_desc: "Státní ateismus je začlenění tvrdého ateismu do politických režimů. Považuje se mnohými za pravý opak teologie a je běžnou politikou přijatou komunistickými státy, jdouce v kroku se Sovětským svazem, když poprvé přišel k moci." # todo: NEW TRANSLATION
  ARG_liberation_theology_idea: "Teologie osvobození" # todo: NEW TRANSLATION
  ARG_liberation_theology_idea_desc: "Teologie osvobození je proud křesťanství, který zdůrazňuje osvobození utlačovaných. Jako náboženství se zabývá socio-ekonomickými analýzami s důrazem na sociální péči o chudé a politické osvobození utlačovaných. Teologie osvobození vznikla z touhy našeho lidu po náboženské svobodě a podpoře našich revolučních cílů." # todo: NEW TRANSLATION
  ARG_committee_of_state_security_idea_lar: "Komise státní bezpečnosti" # todo: NEW TRANSLATION
  ARG_committee_of_state_security_idea_lar_desc: "Modelována podle ruských zpravodajských agentur, argentinská Komise státní bezpečnosti je zřízena k provádění zahraniční rozvědky, protizpravodajských a tajných policejních funkcí." # todo: NEW TRANSLATION
  ARG_committee_of_state_security_idea_no_lar: "$ARG_committee_of_state_security_idea_lar$" # todo: NEW TRANSLATION
  ARG_committee_of_state_security_idea_no_lar_desc: "$ARG_committee_of_state_security_idea_lar_desc$" # todo: NEW TRANSLATION
  ARG_socialist_unification_idea: "Sociální unifikace" # todo: NEW TRANSLATION
  ARG_socialist_unification_idea_desc: "Díky síle naší slavné revoluce jsme se konečně dokázali etablovat jako dominantní ideologie na jihu amerického kontinentu. Tato válka, vyhraná krví a odvahou, naplnila náš lid touhou po větší vlasti pro Jihoamerické socialistické republiky." # todo: NEW TRANSLATION
  ARG_eliminate_american_imperialism_idea: "Operación Ocaso Escarlata" # todo: NEW TRANSLATION
  ARG_eliminate_american_imperialism_idea_desc: "Obří severní mocnost dlouho stála jako bašta kapitalismu. Je nejvyšší čas ukončit americký imperialismus a přinést Šarlatový soumrak." # todo: NEW TRANSLATION
  ARG_women_in_industry_idea: "$ARG_women_in_industry$" # todo: NEW TRANSLATION
  ARG_women_in_industry_idea_desc: "S ženou jako vládnoucím vůdcem [ARG.GetNameDef] to nastavuje precedens, že ženy by měly mít právo pracovat i v jiných odvětvích. S tímto velkým přírůstkem do pracovní síly můžeme očekávat velký ekonomický pokrok pro naši zemi." # todo: NEW TRANSLATION
  ARG_socialist_volunteers_idea: "$ARG_socialist_volunteers$" # todo: NEW TRANSLATION
  ARG_socialist_volunteers_idea_desc: "Abychom pomohli zajistit mezinárodní revoluci, musíme nabídnout pomoc našim soudruhům v socialistických státech, kdykoli to bude nutné. Pokud máme volné lidské zdroje, musíme posílat dobrovolníky bojovat proti buržoazii po celém světě!" # todo: NEW TRANSLATION
  ARG_free_association_idea: "Volné sdružení producentů" # todo: NEW TRANSLATION
  ARG_free_association_idea_desc: "Volné sdružení je vztah mezi jednotlivci bez státu, sociálních tříd, hierarchie nebo soukromého vlastnictví výrobních prostředků. Podle anarchosyndikalistů u moci to umožní jednotlivcům svobodně se sdružovat bez sociálních omezení a produkovat a reprodukovat své vlastní životní podmínky." # todo: NEW TRANSLATION
  ARG_no_gods_no_masters_idea: "¡Liberación!" # todo: NEW TRANSLATION
  ARG_no_gods_no_masters_idea_desc: "I když ostatní země na kontinentu nemusí souhlasit s naší vládou, bylo by proti naší ideologii sedět a nechat je být dobyty rozzlobenými agresory. Pokud by kterýkoli z našich sousedů padl do rukou vetřelce, musíme zvednout zbraně a osvobodit je." # todo: NEW TRANSLATION
  ARG_regulated_salaries: "Regulované mzdy" # todo: NEW TRANSLATION
  ARG_regulated_salaries_desc: "Přijali jsme opatření, aby naši zaměstnaní občané nebyli nedostatečně placeni domácím průmyslem. Dohoda dosažená mezi průmyslem a dělníky se ukázala být pro naši zemi velmi prospěšná." # todo: NEW TRANSLATION
  ARG_social_welfare_fund_ns: "Sociální fond [ARG.GetAdjective]" # todo: NEW TRANSLATION
  ARG_social_welfare_fund_ns_desc: "Zvýšené výdaje na sociální opatření byly v [ARG.GetNameDef] zavedeny. Vidíme pozitivní efekty z tohoto zvýšeného rozpočtu ve formě spokojenější populace a stále pozitivnějšího přístupu k vládě." # todo: NEW TRANSLATION
  ARG_british_argentine_agreement: "Smlouva [ENG.GetAdjective]-[ARG.GetAdjective]" # todo: NEW TRANSLATION
  ARG_british_argentine_agreement_desc: "Dohoda o lepších obchodních podmínkách mezi námi a [ENG.GetAdjective] byla dosažena. Od nynějška máme mírnou slevu na náš obchod s [ENG.GetAdjective]." # todo: NEW TRANSLATION
  ARG_fabricaciones_militares_epartamento_de_tanques_del_ejercito_manufacturer: "$ARG_fabricaciones_militares_epartamento_de_tanques_del_ejercito_organization$" # todo: NEW TRANSLATION
  ARG_arsenales_de_marina_manufacturer: "$ARG_arsenales_de_marina_organization$" # todo: NEW TRANSLATION
  ARG_astarsa_manufacturer: "$ARG_astarsa_organization$" # todo: NEW TRANSLATION
  ARG_fma_manufacturer: "$ARG_fma_organization$" # todo: NEW TRANSLATION
  ARG_fabricaciones_militares: "$ARG_fabricaciones_militares_organization$" # todo: NEW TRANSLATION
  ARG_fabricaciones_militares_art_manufacturer: "$ARG_fabricaciones_militares_art_organization$" # todo: NEW TRANSLATION
  ARG_hispano_argentina_manufacturer: "$ARG_hispano_argentina_organization$" # todo: NEW TRANSLATION
  BRA_ford_motor_company: "$USA_ford_motor_company_organization$" # todo: NEW TRANSLATION
  BRA_amrj_manufacturer: "$BRA_amrj_organization$" # todo: NEW TRANSLATION
  BRA_rossi_manufacturer: "$BRA_rossi_organization$" # todo: NEW TRANSLATION
  BRA_cbc_manufacturer: "$BRA_cbc_organization$" # todo: NEW TRANSLATION
  BRA_fnm_manufacturer: "$BRA_fnm_organization$" # todo: NEW TRANSLATION
  BRA_embraer_manufacturer: "$BRA_embraer_organization$" # todo: NEW TRANSLATION
  BRA_bernadini_manufacturer: "$BRA_bernadini_organization$" # todo: NEW TRANSLATION
  BRA_ddam_manufacturer: "$BRA_ddam_organization$" # todo: NEW TRANSLATION
  BRA_fiat_company: "Brazilská Fiat" # todo: NEW TRANSLATION
  SOV_ARG_BRA_rubin_design_bureau_manufacturer: "Rubin" # todo: NEW TRANSLATION
  ARG_argentina_for_all_idea: "Argentina pro všechny" # todo: NEW TRANSLATION
  ARG_argentina_for_all_idea_desc: "Náš velký národ má tak širokou škálu lidí žijících v jeho hranicích a dlouho bylo téměř nemožné sjednotit naši populaci pod jedním praporem. Je čas změnit náš přístup. [ARG.GetNameDef] by měla být zemí přístupnou a přijímající všechny, kteří ji nazývají domovem." # todo: NEW TRANSLATION
  ARG_us_army_training_idea: "$ARG_us_army_training$" # todo: NEW TRANSLATION
  ARG_us_army_training_idea_desc: "S bližšími vazbami s [USA.GetNameDef] jsme byli schopni převzít jejich tréninkové režimy do naší armády. Pokud budeme cvičit naše jednotky jako [USA.GetNameDef], budeme mít silnější a odolnější armádu." # todo: NEW TRANSLATION
  ARG_monroe_doctrine_idea: "V souladu s Monroeovou doktrínou" # todo: NEW TRANSLATION
  ARG_monroe_doctrine_idea_desc: "Monroeova doktrína dlouho sloužila jako způsob, jak zabránit evropskému vměšování na západní polokouli. Je pro nás zásadní ji dodržovat, pokud chceme přežít nával války." # todo: NEW TRANSLATION
  ARG_argentina_first_idea: "$ARG_argentina_first$" # todo: NEW TRANSLATION
  ARG_argentina_first_idea_desc: "Není nikdy snadné jít na to sám, zvláště když máme tak vznešené cíle dobytí v Jižní Americe. Pokud se však zapleteme s fašistickými hnutími v Evropě, můžeme ztratit ze zřetele náš skutečný cíl: sjednocenou Jižní Ameriku." # todo: NEW TRANSLATION
