  USA_monroe_doctrine_idea: "Monroeova doktrína" # todo: NEW TRANSLATION
  USA_monroe_doctrine_idea_desc: "Spojené státy si dlouho kladly za cíl chránit západní polokouli před vnějším vměšováním koloniálních mocností, což znamená, že jakýkoli vpád na naše území by pravděpodobně přiměl USA nám pomoci. Pokud se však naše politika přestane shodovat s politikou Spojených států, můžeme se ocitnout bez ochrany." # todo: NEW TRANSLATION
  USA_monroe_doctrine_enforcer: "Vykonavatel Monroeovy doktríny" # todo: NEW TRANSLATION
  USA_monroe_doctrine_enforcer_desc: "Od poloviny 19. století usilujeme o ochranu západní polokoule před vnějším vměšováním koloniálních mocností. Ačkoli se parametry této doktríny v průběhu času vyvíjely, její jádro znamená, že naši sousedé v Severní i Jižní Americe očekávají, že jim v čase konfliktu pomůžeme. Samozřejmě je naší vládě, kdy a jak doktrínu uplatní." # todo: NEW TRANSLATION
