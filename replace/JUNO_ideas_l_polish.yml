  CHL_compania_general_electricidad: "Compañia General de Electricidad" # todo: NEW TRANSLATION
  CHL_compania_general_electricidad_desc: "CGE byla založena 21. února 1905 skupinou profesionálů vedených inženýry Franciscom Huneeusem Ganou a Raúlem Claro Solarem. Je největším vývojářem elektroniky v celé [ROOT.GetName]." # todo: NEW TRANSLATION
  CHL_compania_sudamerica_vapores: "Compañía Sudamericana de Vapores" # todo: NEW TRANSLATION
  CHL_compania_sudamerica_vapores_desc: "CSAV je [CHL.GetAdjective] lodní společnost, která je momentálně největší svého druhu v Latinské Americe a také jedna z nejstarších; byla založena v roce 1872. Lze ji využít ke zvýšení produkce civilních námořních plavidel." # todo: NEW TRANSLATION
  CHL_via_trans_radio: "Vía Trans Radio Chilena Compañía de Radiotelegrafía" # todo: NEW TRANSLATION
  CHL_via_trans_radio_desc: "VTR byla založena 26. září 1928 společnou investicí Radio Corporation of America, Marconi Wireless Telegraph Company, Compagnie Generale de Telegraphie sans Fils a Telefunken Gesellschaft. Společnost poskytuje radiotelegrafní služby uvnitř i mimo zemi a byla jednou z prvních soukromých telekomunikačních společností v [ROOT.GetName]." # todo: NEW TRANSLATION
  CHL_banco_central_de_chile: "Banco Central de Chile" # todo: NEW TRANSLATION
  CHL_banco_central_de_chile_desc: "Centrální banka Chile byla vytvořena v srpnu 1925 prostřednictvím dekretu č. 486, který také zřídil monopol banky na vydávání bankovek v režimu zlatého standardu. Byla založena během prvního funkčního období Artura Alessandriho jako prezidenta." # todo: NEW TRANSLATION
  CHL_compania_electro_industrial_valdivia: "Compañía Electro-Siderúrgica e Industrial de Valdivia" # todo: NEW TRANSLATION
  CHL_compania_electro_industrial_valdivia_desc: "ESVAL je železářský a ocelářský průmysl sídlící ve Valdivii v Chile. Podnik je považován za dědice Altos Hornos y Acerías de Corral, jehož infrastrukturu koupil v roce 1926, když byl založen podnikateli z Valdivie." # todo: NEW TRANSLATION
  CHL_empresa_ferrocarries_del_estado: "Empresa de los Ferrocarriles del Estado" # todo: NEW TRANSLATION
  CHL_empresa_ferrocarries_del_estado_desc: "EFE je národní železnice a nejstarší státní podnik v Chile. Spravuje infrastrukturu a provoz železničních služeb v zemi." # todo: NEW TRANSLATION
  CHL_compania_manufacura_cartones: "Compañía Manufacturera de Papeles y Cartones" # todo: NEW TRANSLATION
  CHL_compania_manufacura_cartones_desc: "CMPC je [CHL.GetAdjective] papírenská společnost se sídlem v Santiagu. Je největším výrobcem papíru v zemi a společnost byla založena v roce 1920 sloučením továren Cartón del Maipo a Esperanza a spojení podnikatele Luise Matte Larraína a německého inženýra Germána Ebbinghause." # todo: NEW TRANSLATION
  CHL_corporacion_fomento_production: "Corporación de Fomento de la Producción de Chile" # todo: NEW TRANSLATION
  CHL_corporacion_fomento_production_desc: "Po zemětřesení v Chillánu byla založena CORFO, aby distribuovala pomoc potřebným a pomáhala s kontrolou, distribucí a pohybem zboží v rámci [ROOT.GetAdjective]." # todo: NEW TRANSLATION
