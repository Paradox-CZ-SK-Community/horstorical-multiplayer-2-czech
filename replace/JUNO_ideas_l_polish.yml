  SMB_MTG_naval_arms_race_legacy: "Dědictví námořního závodu ve zbrojení" # todo: NEW TRANSLATION
  SMB_MTG_naval_arms_race_legacy_desc: "Ačkoli neexistují formální smlouvy zakazující rozšíření [BRA.GetAdjective], [CHL.GetAdjective] nebo [ARG.GetAdjective] námořnictva, existovalo po Velké válce neformální ujednání, které tomu zabraňovalo. Pokud by některý z národů v regionu začal vyzbrojovat své flotily novými hlavními loděmi, nový závod ve zbrojení by byl nevyhnutelný." # todo: NEW TRANSLATION
  SMB_organization_of_american_states_member: "Člen Organizace amerických států" # todo: NEW TRANSLATION
  BRA_undiversified_economy_modifier: "Nediverzifikovaná ekonomika" # todo: NEW TRANSLATION
  BRA_undiversified_economy_modifier_desc: "Přílišná závislost na vývozu kávy zanechala brazilskou ekonomiku zdecimovanou, když udeřila velká deprese a státy světa přestaly kupovat tento návykový stimulant. Každá vláda bude muset diverzifikovat ekonomiku do nových oblastí, pokud má národ vzkvétat." # todo: NEW TRANSLATION
  BRA_weak_government: "Slabá vláda" # todo: NEW TRANSLATION
  BRA_weak_government_desc: "Revoluce a pokusy o puč v průběhu let oslabily autoritu brazilské vlády. Situaci zhoršuje ústava z roku 1934, dohoda dosažená kompromisem, která má málo stoupenců. Ať už budoucnost Brazílie bude jakákoli, současné politické uspořádání je neudržitelné." # todo: NEW TRANSLATION
  BRA_aftermath_of_the_coup: "Nouzový stav" # todo: NEW TRANSLATION
  BRA_aftermath_of_the_coup_desc: "Nouzový stav byl vyhlášen v listopadu 1935, když komunisté provedli puč, který hrozil přerůst v plnohodnotnou občanskou válku. Ačkoli byl pokus o puč potlačen, prezident dosud nouzový stav nezrušil. Mnozí napříč politickým spektrem nyní obávají, že režim bude pokračovat v používání mimořádných pravomocí k potlačování dalšího nesouhlasu." # todo: NEW TRANSLATION
