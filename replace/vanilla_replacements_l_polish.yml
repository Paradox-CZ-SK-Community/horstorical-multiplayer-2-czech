  FRA_intervention_in_north_africa: "The Gabon Campaign - Equatorial Africa" # todo: NEW TRANSLATION
  FRA_intervention_in_north_africa_desc: "Turning Equatorial Africa to our side is vital for our campaign of liberation." # todo: NEW TRANSLATION
  FRA_intervention_in_west_africa: "Operation Menace" # todo: NEW TRANSLATION
  FRA_intervention_in_west_africa_desc: "De Gaulle believes that we could persuade the French forces in Dakar to join the Allied cause. Much would be gained by this. Another Vichy French colony changing sides would have great political impact. Also the gold reserves of the Banque de France and the Polish government in exile are stored in Dakar; and the port of Dakar is far superior as a naval base to Freetown, Sierra Leone, which is the only Allied port in the area. We should send a taskforce to negotiate a peaceful occupation and if unsuccessful, take the city by force." # todo: NEW TRANSLATION
  FRA_intervention_in_syria: "Operation Exporter" # todo: NEW TRANSLATION
  FRA_intervention_in_syria_desc: "The Vichy French possess a vigorous defence in Syria, but a sudden and surprise strike can shot the defenders before they can react." # todo: NEW TRANSLATION
  FRA_intervention_in_madagascar: "Operation Ironclad" # todo: NEW TRANSLATION
  FRA_intervention_in_madagascar_desc: "Madagascar possesses a security risk to our shipping, should it fall to the Japanese. By seizing the island we can secure the South Atlantic and South Pacific trade routes." # todo: NEW TRANSLATION
  FRA_intervention_in_north_africa: "The Gabon Campaign - Equatorial Africa" # todo: NEW TRANSLATION
  FRA_intervention_in_central_africa: "The Gabon Campaign - Middle Congo" # todo: NEW TRANSLATION
  lar_spain.53.t: "Spanish Gold Reserves" # todo: NEW TRANSLATION
  lar_spain.53.desc: "It has been some time since the Spanish gold reserves arrived in our country, and we have sent ample aid to Spain, without payment. Members of the government are beginning to comment on the farcical state of these affairs, especially given the Nationalist victory over the Republicans." # todo: NEW TRANSLATION
  lar_spain.53.a: "We will seize the gold reserves as 'payment'." # todo: NEW TRANSLATION
  joint_training_exercise: "Joint British-French Training Exercise" # todo: NEW TRANSLATION
  joint_training_exercise_desc: "By land, sea and air, our combined forces will smash the tyrannical aggressors who drove our French allies from their homes and threatened the future of world civilisation! We will launch a training exercise to learn better methods of waging war against our shared belligerents." # todo: NEW TRANSLATION
