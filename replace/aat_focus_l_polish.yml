  FIN_keepers_of_the_north_tt: "[ROOT.GetFlag]§Y[ROOT.GetNameDefCap]§! požaduje anexe každého nordického subjektu nebo spojence ve [ROOT.GetAdjective] frakci. \n[ROOT.GetFlag]§Y[ROOT.GetNameDefCap]§! požaduje každý nordický stát kontrolovaný spojencem. \n[ROOT.GetFlag]§Y[ROOT.GetNameDefCap]§! nárokuje každý nordický stát kontrolovaný neutrálem nebo nepřítelem. \n§YKaždý nordický stát již kontrolovaný [ROOT.GetFlag][ROOT.GetNameDefCap]§!: Přidat §G+30.0%§! poslušnost." # todo: NEW TRANSLATION
