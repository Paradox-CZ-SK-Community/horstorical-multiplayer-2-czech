  NORDIC_large_scale_production: "Velkosériová výroba" # todo: NEW TRANSLATION
  NORDIC_large_scale_production_desc: "TODO_NORDIC" # todo: NEW TRANSLATION
  NORDIC_improved_assembly: "Vylepšená montáž" # todo: NEW TRANSLATION
  NORDIC_improved_assembly_desc: "TODO_NORDIC" # todo: NEW TRANSLATION
  NORDIC_emergency_funding: "Nouzové financování" # todo: NEW TRANSLATION
  NORDIC_emergency_funding_desc: "TODO_NORDIC" # todo: NEW TRANSLATION
  NORDIC_research_tech_sharing_name: "Nordický výzkumný institut" # todo: NEW TRANSLATION
  ICE_expand_the_fishing_industry: "Rozšířit rybářský průmysl" # todo: NEW TRANSLATION
  ICE_expand_the_fishing_industry_desc: "Rybářství bylo vždy klíčovou součástí islandského života. Je to hlavní přírodní zdroj, kterým disponujeme, a máme ho ve velkém. Proto bychom se měli zaměřit právě na to. Posilte oblast, kde je skutečný potenciál." # todo: NEW TRANSLATION
  ICE_mineral_prospecting: "Průzkum minerálů" # todo: NEW TRANSLATION
  ICE_mineral_prospecting_desc: "Teoreticky mohou být v horách skryté přírodní zdroje. Pokud je odhalíme, můžeme poskytnout alternativu k rybolovu a zemědělství jako hlavní průmysl Islandu." # todo: NEW TRANSLATION
  ICE_international_trade: "Mezinárodní obchod" # todo: NEW TRANSLATION
  ICE_international_trade_desc: "Island se musí více angažovat ve světě financí. Přijetím volného obchodu a otevřením země zahraničním investicím můžeme vytvořit více obchodních příležitostí a stimulovat ekonomiku." # todo: NEW TRANSLATION
  ICE_hydroelectric_power: "Vodní energie" # todo: NEW TRANSLATION
  ICE_hydroelectric_power_desc: "Kromě vody a horkých pramenů je tu další zdroj—voda. Rozšíření využití těchto zdrojů může pohánět průmyslový rozvoj země." # todo: NEW TRANSLATION
  ICE_banking_on_the_future: "Bankování na budoucnost" # todo: NEW TRANSLATION
  ICE_banking_on_the_future_desc: "Bankovní sektor nevyžaduje obrovské zdroje; stačí přilákat zahraniční kapitál. Dotováním bankovního sektoru a uděláním všeho pro přitažlivost islandských bank můžeme vybudovat finanční centrum, které přinese užitek v budoucnu." # todo: NEW TRANSLATION
  ICE_infiltration: "Infiltrace" # todo: NEW TRANSLATION
  ICE_infiltration_desc: "Rozšiřování sítí a integrace ekonomiky s ostatními otevírá další možnosti. Navázáním kontaktů s klíčovými lidmi a firmami po celém světě bude Island dobře postaven k získávání informací." # todo: NEW TRANSLATION
  ICE_develop_icelandic_shipping: "Rozvíjet islandskou lodní dopravu" # todo: NEW TRANSLATION
  ICE_develop_icelandic_shipping_desc: "Jsme ostrov uprostřed oceánu. Soustředit se na stavbu lodí je přirozená volba." # todo: NEW TRANSLATION
  ICE_heavy_industry: "Těžký průmysl" # todo: NEW TRANSLATION
  ICE_heavy_industry_desc: "Zemědělství, rybolov a lodní doprava jsou věcí minulosti. Chceme‑li posunout národ do budoucnosti, musíme se zaměřit na těžký průmysl. Rozšířením průmyslu bude Island mít světlou, byť znečištěnou, budoucnost." # todo: NEW TRANSLATION
  ICE_advanced_technology: "Pokročilé technologie" # todo: NEW TRANSLATION
  ICE_advanced_technology_desc: "Ostrov je malý. Nikdy se nemůže rovnat obrovským průmyslovým mocnostem. Musíme najít svou niku a prosperovat v ní. Něco relativně nového, kde nezačínáme ztrátou. Pokročilé technologie a elektronika jsou tam, kde můžeme vzkvétat." # todo: NEW TRANSLATION
  ICE_reykjavik_dockyards: "Loděnice Reykjavík" # todo: NEW TRANSLATION
  ICE_reykjavik_dockyards_desc: "Prvním krokem k vybudování flotily jsou modernější a početnější doky. Státní prostředky by měly jít do rozšíření schopností stavby lodí." # todo: NEW TRANSLATION
  ICE_expand_the_harbour: "Rozšířit přístav" # todo: NEW TRANSLATION
  ICE_expand_the_harbour_desc: "Více a větších lodí znamená potřebu většího přístavu. Stát by měl financovat rozšíření přístavu v Reykjavíku, aby podpořil ekonomický růst." # todo: NEW TRANSLATION
  ICE_local_arms_industry: "Místní zbrojní průmysl" # todo: NEW TRANSLATION
  ICE_local_arms_industry_desc: "Výrobou zbraní doma můžeme zásobovat vlastní síly a prodávat na mezinárodním trhu, čímž podpoříme ekonomiku i obranu. Islandský zbrojní průmysl by proto měl být klíčovou oblastí investic." # todo: NEW TRANSLATION
  ICE_infrastructure_development: "Rozvoj infrastruktury" # todo: NEW TRANSLATION
  ICE_infrastructure_development_desc: "Modernizace infrastruktury a budování dobrého dopravního systému poskytnou té zemi dálnici k prosperitě." # todo: NEW TRANSLATION
  ICE_iceland_air: "Iceland Air" # todo: NEW TRANSLATION
  ICE_iceland_air_desc: "Být ostrovem už dnes neznamená izolaci. Moderními letadly se můžeme přiblížit Evropě i Americe. Vzduch jsou dopravní cesty budoucnosti." # todo: NEW TRANSLATION
  ICE_allied_weapons_seller_trigger: "§YSpojenecké§! nebo §Yneutrální§! země" # todo: NEW TRANSLATION
  ICE_expand_the_civilian_fleet: "Rozšířit civilní loďstvo" # todo: NEW TRANSLATION
  ICE_expand_the_civilian_fleet_desc: "Silné civilní loďstvo má dvojí výhodu: udržuje námořní tradici a posiluje ekonomiku. Obchodní lodě budou v míru nositelem obchodu a v čase války poskytnou zkušené námořníky pro námořnictvo." # todo: NEW TRANSLATION
  ICE_industrial_research_school: "Škola průmyslového výzkumu" # todo: NEW TRANSLATION
  ICE_industrial_research_school_desc: "Univerzita je velkým úspěchem. Země musí na tento úspěch navázat vytvořením více zaměřeného vysokoškolského vzdělávání směřujícího k průmyslovému rozvoji, aby zajistila potřebné inženýry." # todo: NEW TRANSLATION
  ICE_hrafninn_flygur: "Hrafninn Flýgur" # todo: NEW TRANSLATION
  ICE_hrafninn_flygur_desc: "Jako havrani budeme vládnout obloze. Island se stane synonymem leteckého průmyslu a vedoucí letecké technologie — po celém světě." # todo: NEW TRANSLATION
  ICE_agricultural_expansion: "Rozšíření zemědělství" # todo: NEW TRANSLATION
  ICE_agricultural_expansion_desc: "Mnoho zlepšení lze udělat pro modernizaci islandského zemědělství. Využitím moderních technologií a snadno dostupného tepla z horkých pramenů lze zvýšit produkci a uvolnit půdu a pracovní sílu pro jiná odvětví." # todo: NEW TRANSLATION
  ICE_off_shore_oil_drilling: "Pobřežní vrtné práce na ropu" # todo: NEW TRANSLATION
  ICE_off_shore_oil_drilling_desc: "Ropa se stává stále důležitějším zdrojem. Moderní námořnictva ji spotřebovávají obrovské množství. Existují důvody se domnívat, že v mořském dně kolem ostrova může být ropa. Je to vysoce riziková, ale vysoce výnosná volba, kterou stojí za to prozkoumat." # todo: NEW TRANSLATION
  off_shore_drilling_tt: "Odemkne rozhodnutí §YVrtat ropu§! kolem §YIslandu§!" # todo: NEW TRANSLATION
  ICE_the_kingdom_of_iceland: "Království Island" # todo: NEW TRANSLATION
  ICE_the_kingdom_of_iceland_desc: "Tato země udělala velký krok směrem k nezávislosti. Založení království je vnímáno jako poslední krok k úplné svobodě. Nyní sdílíme pouze krále a zahraniční politiku s Dánskem. Postupem času může být tento svazek redukován na formalitu." # todo: NEW TRANSLATION
  ICE_united_we_stand: "Spojeni stojíme" # todo: NEW TRANSLATION
  ICE_united_we_stand_desc: "Během Velké války jsme byli izolováni. Dánsko bylo neutrální a Island přišel o přístup na trhy. Dánsko se znovu vyzbrojuje a měli bychom být připraveni jim pomoci. Tentokrát Island zanechá stopu ve světě." # todo: NEW TRANSLATION
  ICE_declare_absolute_neutrality: "Prohlásit absolutní neutralitu" # todo: NEW TRANSLATION
  ICE_declare_absolute_neutrality_desc: "Ať se děje cokoli v Dánsku, Island musí udělat vše pro to, aby zůstal mimo evropskou válku. Prohlášením absolutní neutrality dáme najevo, že ostrov nenecháme vtáhnout do konfliktu." # todo: NEW TRANSLATION
  ICE_declare_absolute_neutrality_tt: "§Y[ROOT.GetNameDef]§! se stane nezávislým, pokud bude §Y[ROOT.OVERLORD.GetNameDef]§! vyhlášena válka" # todo: NEW TRANSLATION
  ICE_joint_shipbuilding_programme: "Společný program stavby lodí" # todo: NEW TRANSLATION
  ICE_joint_shipbuilding_programme_desc: "Nejlepší způsob, jak pomoci Dánsku, je po moři. Společně můžeme chránit Severní moře. K tomu potřebujeme lodě, takže společné budování flotily je přirozeným krokem vojenské spolupráce." # todo: NEW TRANSLATION
  ICE_research_cooperation_tt: "Společné výzkumné programy" # todo: NEW TRANSLATION
  ICE_overlord_research_cooperation_tt: "Společné islandské výzkumné programy" # todo: NEW TRANSLATION
  ICE_royal_marines: "Královská námořní pěchota" # todo: NEW TRANSLATION
  ICE_royal_marines_desc: "Islandské ozbrojené síly nebudou nikdy velké. Můžeme se ale specializovat—námořní pěchota je pro ostrovní stát jasnou volbou. Vytvořením a vycvičením námořní pěchoty získáme flexibilní síly, které mohou být nasazeny tam, kde je potřeba." # todo: NEW TRANSLATION
  ICE_the_icelandic_police_force: "Islandská policie" # todo: NEW TRANSLATION
  ICE_the_icelandic_police_force_desc: "Armáda Islandu nikdy nebude velká. Alternativou je rozšířit povinnosti národní policie o obranu proti invazi. Tak efektivněji využijeme omezené lidské zdroje a lépe připravíme obranu ostrova." # todo: NEW TRANSLATION
  ICE_infrastructure_projects: "Projekty infrastruktury" # todo: NEW TRANSLATION
  ICE_infrastructure_projects_desc: "Chceme‑li se stát silnou zemí, prvním krokem je vybudování infrastruktury. Dobrá infrastruktura je základem jakékoli průmyslové expanze." # todo: NEW TRANSLATION
  ICE_engineering_projects: "Inženýrské projekty" # todo: NEW TRANSLATION
  ICE_engineering_projects_desc: "Ostrov se musí rozvíjet, pokud chce být silný. Velké inženýrské projekty vytvoří pracovní příležitosti a základ pro průmyslový růst Islandu." # todo: NEW TRANSLATION
  ICE_patrolling_the_atlantic: "Hlídání Atlantiku" # todo: NEW TRANSLATION
  ICE_patrolling_the_atlantic_desc: "Abychom ochránili naše obchodní loďstvo, potřebujeme eskortní oceánské lodě. Měli bychom spolupracovat s Dánskem na návrhu nových modelů." # todo: NEW TRANSLATION
  ICE_joint_military_training: "Společný vojenský výcvik" # todo: NEW TRANSLATION
  ICE_joint_military_training_desc: "Na ostrově nemáme dost zkušeností na řádný výcvik moderní armády. Spolupráce s Dánskem je proto nejlepší přístup pro malý ostrov jako je ten náš." # todo: NEW TRANSLATION
  ICE_industrial_cooperation: "Průmyslová spolupráce" # todo: NEW TRANSLATION
  ICE_industrial_cooperation_desc: "Pozváním dánských průmyslníků založit pobočky na Islandu, výměnou za daňové úlevy a podobně, můžeme vytvořit pracovní příležitosti a podpořit industrializaci ostrova. S dánskou pomocí se může země posunout vpřed." # todo: NEW TRANSLATION
  ICE_gardhur_airfield: "Letiště Garður" # todo: NEW TRANSLATION
  ICE_gardhur_airfield_desc: "Letadla se stávají důležitou součástí moderní infrastruktury. Island nesmí zaostávat. Letiště blízko hlavního města bude klíčové k vystřelení Islandu do budoucnosti." # todo: NEW TRANSLATION
  ICE_the_merchant_fleet: "Obchodní loďstvo" # todo: NEW TRANSLATION
  ICE_the_merchant_fleet_desc: "Lodě byly kdysi jádrem vzniku tohoto národa. Budou i v budoucnu. Silné obchodní loďstvo bude jádrem budoucí islandské ekonomiky." # todo: NEW TRANSLATION
  ICE_not_standing_idly_by: "Nezůstat nečinně" # todo: NEW TRANSLATION
  ICE_not_standing_idly_by_desc: "Válka přichází, ať se nám to líbí nebo ne. Musíme dát národ do zbraní, pokud chceme mít šanci ostrov bránit. Je to buď, nebo — to je jisté." # todo: NEW TRANSLATION
  ICE_expand_industrial_complexes: "Rozšířit průmyslové komplexy" # todo: NEW TRANSLATION
  ICE_expand_industrial_complexes_desc: "Naše vojenské průmysly zaostávají za ostatními evropskými mocnostmi; pokud do nich neinvestujeme a nestimulujeme je, nikdy se nedohoní." # todo: NEW TRANSLATION
  ICE_political_unity: "Politická jednota" # todo: NEW TRANSLATION
  ICE_political_unity_desc: "V čase nebezpečí je důležité, aby národ stál pohromadě. Musíme odložit politické rozdíly a udělat cokoli, co bude třeba, aby [ROOT.GetName] zůstalo mimo válku." # todo: NEW TRANSLATION
  ICE_anglo_icelandic_relations: "Anglo‑islandské vztahy" # todo: NEW TRANSLATION
  ICE_anglo_icelandic_relations_desc: "[ENG.GetNameDefCap] je pravděpodobně náš nejlepší budoucí obchodní partner. V každém případě by bylo velmi škodlivé, a možná přímo nebezpečné, provokovat [ENG.GetAdjective]. Musíme dělat vše pro udržení dobrých vztahů s naším sousedem přes moře." # todo: NEW TRANSLATION
  ICE_anglo_icelandic_relations_tt: "Pokud jste dokončili fokus §YRozšířit rybářský průmysl§!:" # todo: NEW TRANSLATION
  ICE_american_protection: "Americká ochrana" # todo: NEW TRANSLATION
  ICE_american_protection_desc: "[GetAmericanProtectionText]" # todo: NEW TRANSLATION
  ICE_american_protection_desc_standard: "Válka se chystá a jsme příliš malí na to, být sami. [USA.GetNameDefCap] nás může ochránit. Měli bychom oslovit [USA.GetAdjective] vládu a nabídnout umístění jejich jednotek zde k ochraně Islandu. Bude to krok zpět na cestě k nezávislosti, ale jen dočasný. Být obsazen by bylo horší." # todo: NEW TRANSLATION
  ICE_american_protection_desc_british_subject: "[ENG.GetNameDefCap] je vážně zatížen v této válce. Nemusí nás být schopni ochránit před nepřáteli. Měli bychom oslovit [USA.GetAdjective] vládu a nabídnout jim převzetí úkolu ochrany Islandu." # todo: NEW TRANSLATION
  ICE_american_protection_tt: "§Y[ROOT.GetName]§! se stane loutkou §Y[USA.GetNameDef]§!" # todo: NEW TRANSLATION
  ICE_fighting_as_equals: "Bojovat jako sobě rovní" # todo: NEW TRANSLATION
  ICE_fighting_as_equals_desc: "Bojujeme společně. Island přispívá více než svou vahou. Je čas, aby Dánsko přijalo, že Island už není podřízený, ale rovnocenný partner v alianci. Je čas oficiálně prohlásit nezávislost." # todo: NEW TRANSLATION
  ICE_fighting_as_equals_tt: "§Y[ROOT.getName]§! vyhlašuje nezávislost" # todo: NEW TRANSLATION
  ICE_expanding_the_university_of_reykjavik: "Rozšíření univerzity v Reykjavíku" # todo: NEW TRANSLATION
  ICE_expanding_the_university_of_reykjavik_desc: "Vědění je klíč. Chceme‑li být před světem, musíme zvýšit financování univerzity v Reykjavíku a vytvořit platformu pro budoucí růst." # todo: NEW TRANSLATION
  ICE_trade_relations: "Obchodní vztahy" # todo: NEW TRANSLATION
  ICE_trade_relations_desc: "Malý stát nemůže produkovat vše, co potřebuje. Avšak udržováním dobrých vztahů se zeměmi po celém světě a díky strategické poloze mezi Evropou a Amerikou je Island ideálně umístěn k tomu, stát se finančním a obchodním centrem. Tyto spojení využijme co nejlépe." # todo: NEW TRANSLATION
  ICE_keflavik_airbase: "Letiště Keflavík" # todo: NEW TRANSLATION
  ICE_keflavik_airbase_desc: "Američané chtějí vybudovat větší základnu, aby lépe hlídali Atlantik. Měli bychom to schválit; posílí to tuto zemi." # todo: NEW TRANSLATION
  ICE_modernizing_the_island: "Modernizace ostrova" # todo: NEW TRANSLATION
  ICE_modernizing_the_island_desc: "Nové myšlenky je třeba uvést do praxe. Ekonomika potřebuje reformy. Teď je čas tyto změny prosadit." # todo: NEW TRANSLATION
  ICE_compensation: "Kompenzace" # todo: NEW TRANSLATION
  ICE_compensation_desc: "Dokázali jsme Dánsku i světu, že jsme národ, který se má brát vážně. Sedíme v Atlantiku a můžeme chránit ostrovy dánské koruny. Předáním ochrany nám získá Dánsko silnějšího partnera a bude se moci lépe soustředit na ochranu své jádrové země." # todo: NEW TRANSLATION
  ICE_republicanism: "Republikanismus" # todo: NEW TRANSLATION
  ICE_republicanism_desc: "Island nepotřebuje krále. Regency ukázala, že můžeme fungovat bez něho. Nyní je čas odstranit tuto středověkou instituci a připravit se na republiku." # todo: NEW TRANSLATION
  ICE_american_investments: "Americké investice" # todo: NEW TRANSLATION
  ICE_american_investments_desc: "Tisíce Američanů rozmístěných na ostrově jsou dobré pro ekonomiku. Znamená to také, že americké firmy budou více ochotné zakládat pobočky a investovat v islandských společnostech. Tento stav může být velmi přínosný, pokud zahrajeme karty správně." # todo: NEW TRANSLATION
  ICE_american_soldiers: "Ubytovat americké vojáky" # todo: NEW TRANSLATION
  ICE_american_soldiers_desc: "Spojené státy chtějí rozšířit svůj vliv daleko, aby ochránily své hodnoty. Můžeme jim dovolit rozmístit své jednotky u nás a někteří se mohou usadit a posílit naše síly." # todo: NEW TRANSLATION
  ICE_iceland_defense_force: "Islandská obranná síla" # todo: NEW TRANSLATION
  ICE_iceland_defense_force_desc: "S americkou pomocí může Island vybudovat moderní armádu. Mají znalosti, zkušenosti a personál k výcviku našich jednotek. Společná výstavba síly má potenciál udělat z našich jednotek elitu." # todo: NEW TRANSLATION
  ICE_state_owned_enterprises: "Státní podniky" # todo: NEW TRANSLATION
  ICE_state_owned_enterprises_desc: "Nyní, když náš ostrov může lépe obstát sám o sobě, je čas uvažovat o založení odvětví, která přilákají pracovníky, zlepší ekonomiku a efektivitu státního aparátu." # todo: NEW TRANSLATION
  ICE_not_our_king: "Není náš král" # todo: NEW TRANSLATION
  ICE_not_our_king_desc: "Království Islandu—jaký nesmysl. Island nepotřebuje krále, a už určitě ne dánského. Je čas začít budovat podporu mezi Islanďany pro úplné odtržení od minulosti a vykročit k budoucnosti." # todo: NEW TRANSLATION
  ICE_expand_the_industrial_base: "Rozšířit průmyslovou základnu" # todo: NEW TRANSLATION
  ICE_expand_the_industrial_base_desc: "Odebráním závislosti na průmyslových výrobcích našeho nadřízeného získáme silnější průmysl a tím i silnější dělnickou třídu. Revoluce se nemůže stát bez správných nástrojů; odstraněním závislosti na nadřízeném získá země vše potřebné, včetně domácí výroby zbraní a nových talentů." # todo: NEW TRANSLATION
  ICE_anti_capitalist_propaganda: "Antikapitalistická propaganda" # todo: NEW TRANSLATION
  ICE_anti_capitalist_propaganda_desc: "Co nám kdy kapitalismus přinesl? Možná trochu prosperity, ale také nás přivedl do krize, v níž se nacházíme. S nadměrným spojením na liberální demokracii a ochotou našich pánů dávat nám jen zbytky, musí být budoucnost jinde." # todo: NEW TRANSLATION
  ICE_international_relations: "Mezinárodní vztahy" # todo: NEW TRANSLATION
  ICE_international_relations_desc: "Cesta před námi bude obtížná; jestli jí půjdeme sami, bude obtížnější. Musíme hledat nové spojence. Komunistická internacionála je jednou z možností, ale existují i jiné. Důležité je aktivně prorážet nové cesty, začít hned." # todo: NEW TRANSLATION
  ICE_rally_the_workers_of_reykjavik: "Shromáždit dělníky Reykjavíku" # todo: NEW TRANSLATION
  ICE_rally_the_workers_of_reykjavik_desc: "Island nemá armádu, ale dělníci hlavního města se mohou stát silou, se kterou je třeba počítat. Pokud by se dělníci postavili proti systému, moc by jim patřila, takže je získat pro věc je zásadní." # todo: NEW TRANSLATION
  ICE_completion_break_with_the_crown_tt: "Po dokončení fokusu §Y$ICE_break_with_the_crown$§!:" # todo: NEW TRANSLATION
  ICE_prepare_for_the_revolution: "Připravit se na revoluci" # todo: NEW TRANSLATION
  ICE_prepare_for_the_revolution_desc: "Úspěšná revoluce nevzniká sama od sebe. Musí být pečlivě připravena. Semínka musí být zaseta a zalévána. Lidé musí vědět, kdy povstat, revolucionáři je musí vést. Vytisknout plakáty. Nábor a výcvik profesionálních revolucionářů, zbraně uložit a vůdci být připraveni převzít kontrolu." # todo: NEW TRANSLATION
  ICE_state_visits: "Státní návštěvy" # todo: NEW TRANSLATION
  ICE_state_visits_desc: "Nelze popřít, že fašistické země nyní mění svět. Pokud se Island má změnit, možná se od nich lze něco naučit. Navázat oficiální vztahy co nejdříve a prozkoumat možnosti spolupráce." # todo: NEW TRANSLATION
  ICE_general_strike: "Generální stávka" # todo: NEW TRANSLATION
  ICE_general_strike_desc: "Ukažme světu a našemu hanebnému dánskému králi, že dělníci Islandu stojí pevně a jednotně. Velká stávka, která zastaví průmysl a dopravu na ostrově, skutečně uškodí páté vládě a ukáže lidem, kde je pravá moc." # todo: NEW TRANSLATION
  ICE_general_strike_tt: "\nKdyž generální stávka§! skončí:" # todo: NEW TRANSLATION
  ICE_organize_a_march: "Uspořádat pochod" # todo: NEW TRANSLATION
  ICE_organize_a_march_desc: "Příliš dlouho lidé zotročeni cizími pány. Národní pochod na hlavní město jako proti Římu by byl připomínkou naší vikingské minulosti. Pokud se nám podaří přilákat každého milovníka svobody, ukážeme vládě, že Islanďané jsou silní, početní a jednotní! Společně vytvoříme větší budoucnost!" # todo: NEW TRANSLATION
  ICE_break_with_the_crown: "Rozchod s korunou" # todo: NEW TRANSLATION
  ICE_break_with_the_crown_desc: "Je čas formálně se rozejít s dánskou korunou. Odsoudíme krále a jeho dekadentní kabinet v Dánsku a vyhlásíme Island opět nezávislým státem, svobodným jít svou vlastní cestou." # todo: NEW TRANSLATION
  ICE_break_with_the_crown_tt: "[ROOT.GetNameDefCap] se stává nezávislým." # todo: NEW TRANSLATION
  ICE_break_with_the_crown_workers_tt: "Po dokončení fokusu §Y$ICE_rally_the_workers_of_reykjavik$§!:" # todo: NEW TRANSLATION
  ICE_break_with_the_crown_revolution_tt: "Po dokončení fokusu §Y$ICE_prepare_for_the_revolution$§!:" # todo: NEW TRANSLATION
  ICE_embrace_the_workers_revolution: "Přijmout dělnickou revoluci" # todo: NEW TRANSLATION
  ICE_embrace_the_workers_revolution_desc: "Podpora dělníků umožnila tuto změnu. Je tedy přirozené, že odbory, syndikáty a dělníci by měli získat vedoucí postavení v novém státě. Vůdci dělnické revoluce mohou zemi vést k výšinám daleko za hranice toho, co by král kdy dokázal." # todo: NEW TRANSLATION
  ICE_remove_dissent_in_the_working_class_tt: "Odstraní §Y$ICE_dissent_in_the_working_class$§! " # todo: NEW TRANSLATION
  ICE_state_corporatism: "Státní korporativismus" # todo: NEW TRANSLATION
  ICE_state_corporatism_desc: "Když jsme se zbavili posledních pozůstatků dánského jha, je čas vytvořit nový stát. Nejlepší způsob, jak zajistit bezpečnost národa, je sjednotit vedení pod silnou hlavou, s odborovými vůdci, průmyslovými magnáty a stranou pracující společně pro společné dobro. Stát podpoří průmyslníky, a oni na oplátku podpoří stát." # todo: NEW TRANSLATION
  ICE_international_brigades: "Mezinárodní brigády" # todo: NEW TRANSLATION
  ICE_international_brigades_desc: "Boj proti útlaku musí pokračovat i po vítězství zde. Jinak riskujeme, že naše vítězství bude jen dočasné. Syny a dcery [ROOT.GetName] musí být připraveni pomáhat kdekoliv je třeba; stát jim to musí umožnit legislativně a zásobami zbraní a vybavení." # todo: NEW TRANSLATION
  ICE_state_owned_industry: "Státem vlastněný průmysl" # todo: NEW TRANSLATION
  ICE_state_owned_industry_desc: "Malá země jako [ROOT.GetNameDef] se nemůže spoléhat na kapitalisty při produkci nutných věcí. Aby se maximalizovala efektivita a zajištění potřebných výrobků, musí stát vstoupit a převzít kontrolu nad průmyslem. Země už nebude závislá на zahraničních investicích. Islandský stát se postará o své občany a ozbrojené síly." # todo: NEW TRANSLATION
  ICE_organize_the_greyshirts: "Organizovat Šedé košile" # todo: NEW TRANSLATION
  ICE_organize_the_greyshirts_desc: "Dobře ozbrojená milice trénovaná od mládí může být užitečným nástrojem k formování mládeže a jejího začlenění do nové společnosti. Půjde také o posílení schopností ozbrojených sil při dobývání, co je jejich právem." # todo: NEW TRANSLATION
  ICE_research_cooperation: "Výzkumná spolupráce" # todo: NEW TRANSLATION
  ICE_research_cooperation_desc: "Spoluprací s mocnostmi sdílejícími naši orientaci můžeme lépe vyvíjet technologie, které nám přinesou výhodu v budoucím zbrojení. Můžeme se učit od partnerů a zároveň nabídnout izolované testovací území daleko od zvídavých očí." # todo: NEW TRANSLATION
  ICE_infiltrating_the_british_isles: "Infiltrace Britských ostrovů" # todo: NEW TRANSLATION
  ICE_infiltrating_the_british_isles_desc: "Revoluční plamen musí hořet dál. Očividným cílem osvobození jsou utlačovaní dělníci Britských ostrovů. [ROOT.GetNameDefCap] pomůže dělníkům v utlačovaných regionech povstat proti jejich imperialistickým a kapitalistickým pánům. Společně můžeme učinit revoluční ideály realitou každodenního pracovníka." # todo: NEW TRANSLATION
  ICE_infiltrating_the_british_isles_tt: "Odemkne rozhodnutí §YZahájit komunistická povstání§! ve Walesu, Skotsku a Severním Irsku." # todo: NEW TRANSLATION
  ICE_transformation_of_nature: "Proměna přírody" # todo: NEW TRANSLATION
  ICE_transformation_of_nature_desc: "Elektrická energie je klíčem k industrializaci. Příroda Islandu musí sloužit státu, stejně jako občané. Řeky a vodopády mohou být přeměněny na přehrady, kameny lomeny a horké prameny používány k vytápění. Nic nás nesmí zastavit na cestě vpřed." # todo: NEW TRANSLATION
  ICE_the_viking_spirit: "Vikingský duch" # todo: NEW TRANSLATION
  ICE_the_viking_spirit_desc: "Nebojácní a smrtící byli slova spojená s dávnými Vikingy. Překročili oceány, nevěděli, co najdou, a jen silní přežili. Odvaha a smělost jsou tím, co musí Islanďané být dnes; jen skrze odvážnost a statečnost země překoná, co kdysi bylo, a znovu ovládne Severní moře." # todo: NEW TRANSLATION
  ICE_viking_spirit_tt: "Odemkne rozhodnutí k §YZlepšení vikingského ducha§!" # todo: NEW TRANSLATION
  ICE_recruiting_international_workers: "Nábor mezinárodních dělníků" # todo: NEW TRANSLATION
  ICE_recruiting_international_workers_desc: "Přeměnou národa v modelovou společnost pro komunisty a socialisty a udržováním revolučního plamene jasného můžeme přilákat mezinárodní revolucionáře podobně jako v počátcích sovětského státu. Musíme ukázat, že [ROOT.GetName] nese pochodnici a je místem, kam patří." # todo: NEW TRANSLATION
  ICE_international_research_community: "Mezinárodní výzkumná komunita" # todo: NEW TRANSLATION
  ICE_international_research_community_desc: "Je mnoho, co se můžeme naučit od ostatních, jak skrze Kominternu, tak i jinými projekty. Zapojením do mezinárodní komunity dosáhne [ROOT.GetName] nových výšin. Kolektivismus je pravá cesta k pokroku!" # todo: NEW TRANSLATION
  ICE_international_research_community_tt: "Každá komunistická země, která není ve frakci nebo ve frakci s [ROOT.GetName]:" # todo: NEW TRANSLATION
  ICE_reclaiming_the_empire: "Návrat impéria" # todo: NEW TRANSLATION
  ICE_reclaiming_the_empire_desc: "Zelenáland (Grónsko) kdysi osídlili vikingové z Islandu. Norsko a Dánsko o něj vedly spory, i když nemají skutečné právo na ostrov. Je čas požadovat vrácení Grónska jeho právoplatným majitelům. Pokud váží svou dědictví, okamžitě jej odevzdají. Pokračujme na cestě ke slávě!" # todo: NEW TRANSLATION
  ICE_securing_the_north_sea_passage: "Zajištění průchodu Severním mořem" # todo: NEW TRANSLATION
  ICE_securing_the_north_sea_passage_desc: "Je čas vzít zpět to, co by mělo patřit Islandu. Ostrovy Shetland a Faery v Severním moři jsou klíčem k ovládnutí průchodu k a od [ROOT.GetNameDef]." # todo: NEW TRANSLATION
  ICE_vinland: "Vinland" # todo: NEW TRANSLATION
  ICE_vinland_desc: "Myšlenka severoatlantického impéria se zrodila s objevením Ameriky Leifurem Eiríkssonem, který byl islandského původu. Kolonie Vikingů ve Vinlandu zanikla, ale nyní je čas proměnit náš dávný sen ve skutečnost. Pro Odina!" # todo: NEW TRANSLATION
  ICE_the_armed_forces_of_iceland: "Ozbrojené síly Islandu" # todo: NEW TRANSLATION
  ICE_the_armed_forces_of_iceland_desc: "Když přijde válka na Island, musí být Island schopen se bránit. Musíme začít budovat sílu schopnou porazit každé potenciální invazní síly. Je to malý ostrov s malou populací, ale poloha a velikost mohou být výhodou, protože žádný nepřítel nebude moci nasadit velké síly k jeho obsazení." # todo: NEW TRANSLATION
  ICE_an_airbase_in_the_sea: "Letecká základna na moři" # todo: NEW TRANSLATION
  ICE_an_airbase_in_the_sea_desc: "Dominováním obloze nad ostrovem a okolním mořem zajistíme, že žádný nepřítel se zde nedostane v síle. A i kdyby ano, letectvo zajistí, že mu nikdy nebudou chybět zásoby. Přirozenou cestou vybudování islandských ozbrojených sil je vytvoření moderního letectva." # todo: NEW TRANSLATION
  ICE_a_naval_hub_in_the_atlantic: "Námořní uzel v Atlantiku" # todo: NEW TRANSLATION
  ICE_a_naval_hub_in_the_atlantic_desc: "Island je ostrov. Mít flotilu jako hlavní armu dává smysl. Zabrání nepřátelům dosáhnout našich břehů, podpoří spojence v ovládnutí moří a přepraví expediční síly kamkoli. Vytvoření silného námořnictva je jasná volba." # todo: NEW TRANSLATION
  ICE_mine_iceland: "Zaminovat Island" # todo: NEW TRANSLATION
  ICE_mine_iceland_desc: "V námořních drahách je Island kriticky vystaven ve všech směrech kromě severu. Abychom zajistili bezpečnost ostrova, musíme být připraveni rozsáhle minovat islandské vody v případě otevřeného konfliktu." # todo: NEW TRANSLATION
  ICE_flying_boats: "Létající lodě" # todo: NEW TRANSLATION
  ICE_flying_boats_desc: "Když nemůžeme soupeřit na vodě, uchýlíme se k obloze. Pokud ovládneme oblohu, nepřítel nemá pro své lodě žádné využití, protože budou okamžitě potopeny." # todo: NEW TRANSLATION
  ICE_modernizing_the_coast_guard: "Modernizace pobřežní stráže" # todo: NEW TRANSLATION
  ICE_modernizing_the_coast_guard_desc: "Pobřežní stráž Islandu je dlouho hlavní silou pro vnitřní i vnější bezpečnost. Musíme zajistit, aby drželi krok s rychlou modernizací a technologickým pokrokem." # todo: NEW TRANSLATION
  ICE_low_cost_aircrafts: "Levná letadla" # todo: NEW TRANSLATION
  ICE_low_cost_aircrafts_desc: "Nemáme velký průmysl, ale máme několik lidí, kteří umějí optimalizovat stavbu letadel. Využijme jejich talentu, abychom i přes slabou ekonomiku udrželi krok v leteckém závodě." # todo: NEW TRANSLATION
  ICE_support_equipment: "Podpůrné vybavení" # todo: NEW TRANSLATION
  ICE_support_equipment_desc: "Každá jednotka armády i pořádková policie může využít těžší výzbroj, lékárničky a potlačovací zbraně. Měli bychom do toho co nejdříve investovat." # todo: NEW TRANSLATION
  ICE_emergency_conversions: "Nouzové přestavby" # todo: NEW TRANSLATION
  ICE_emergency_conversions_desc: "Země nemusí mít kapacity pro těžké válečné lodě, ale máme mnoho větších rybářských a obchodních plavidel. V nouzi můžeme na ně umístit kulomety nebo lehké děla a rychle vytvořit dostatečnou námořní sílu." # todo: NEW TRANSLATION
  ICE_emergency_conversions_tt: "Odemkne rozhodnutí §YPřeměnit konvoje§! na §Ytorpédoborce§! nebo §YKřižníky§!" # todo: NEW TRANSLATION
  ICE_enact_conscription: "Herþjónustu" # todo: NEW TRANSLATION
  ICE_enact_conscription_desc: "S narůstající nejistotou v budoucnosti se obrana stává prioritou. Abychom napravili fakt, že naše ozbrojené síly jsou prakticky neexistující, mělo by být zavedeno povinné branné povinnosti pro všechny mladé dospělé." # todo: NEW TRANSLATION
  ICE_a_profesional_army: "Profesionalizovat armádu" # todo: NEW TRANSLATION
  ICE_a_profesional_army_desc: "Armáda je nyní příliš slabá na to, aby účinně bránila ostrov; jediným řešením je zajistit, aby armáda sestávala pouze z nejlepších mužů, kteří budou bojovat do posledního dechu." # todo: NEW TRANSLATION
  ICE_thungur_hnifur: "Þungur Hnífur" # todo: NEW TRANSLATION
  ICE_thungur_hnifur_desc: "Islandská armáda nikdy nebude velká. Abychom to vyrovnali, musíme dát našim jednotkám nejlepší výcvik a zaměřit se na naše silné stránky, aby byl každý úder těžký." # todo: NEW TRANSLATION
  ICE_thungur_hnifur_idea: "Elitní síly" # todo: NEW TRANSLATION
  ICE_civilian_war_duty: "Civilní obrana" # todo: NEW TRANSLATION
  ICE_civilian_war_duty_desc: "Je důležité, aby občané věděli, jak se chovat v případě války nebo krize a aby byli připraveni plnit povinnosti jako logistika, hašení požárů a distribuce." # todo: NEW TRANSLATION
  ICE_doctrinal_studies: "Studium doktrín" # todo: NEW TRANSLATION
  ICE_doctrinal_studies_desc: "Umění války není snadné a ne každá země ho ovládá. Musíme studovat světové mocnosti a učit se, jak vedou své války." # todo: NEW TRANSLATION
  ICE_death_from_above: "Smrt z výšky" # todo: NEW TRANSLATION
  ICE_death_from_above_desc: "Když vyhrajeme vzdušnou bitvu, vyhrajeme válku rychle. Ještě rychleji, pokud zvýšíme součinnost mezi leteckými a pozemními složkami a vycvičíme výsadkové jednotky pro zničení zásobovacích tras nepřítele." # todo: NEW TRANSLATION
  ICE_we_shall_defend_our_island: "Budeme bránit náš ostrov" # todo: NEW TRANSLATION
  ICE_we_shall_defend_our_island_desc: "Ostrov je náš domov a nikdo ho nezná lépe než my. Specializací na horský boj se můžeme stáhnout z pobřeží a zničit nepřátele, jakmile vylodí a začnou být sebevědomí." # todo: NEW TRANSLATION
  ICE_taking_the_fight_to_our_enemies: "Vnést boj našim nepřátelům" # todo: NEW TRANSLATION
  ICE_taking_the_fight_to_our_enemies_desc: "Moře nás obklopuje a po staletí formovalo náš lid. Využitím zkušeností z moře můžeme přenést boj k nepřátelům na místa, kde to nejméně čekají." # todo: NEW TRANSLATION
  DEN_kanslergadeforliget: "Pokračovat v Kanslergadeforlig" # todo: NEW TRANSLATION
  DEN_kanslergadeforliget_desc: "Velká deprese je stále cítit v [ROOT.GetName] s rostoucí nezaměstnaností a selhávajícím zemědělstvím. Musíme překlenout strany a dojít ke shodě, jak čelit krizi, v níž se nacházíme." # todo: NEW TRANSLATION
  DEN_devalue_the_krone: "Devalvovat korunu" # todo: NEW TRANSLATION
  DEN_devalue_the_krone_desc: "Devalvací koruny by se naše zemědělské produkty staly konkurenceschopnějšími na mezinárodním trhu a zvýšily by se exportní příležitosti, což by ulevilo trpícím zemědělcům." # todo: NEW TRANSLATION
  DEN_remove_economic_crisis_in_730_days_tt: "§Y$DEN_economic_crisis_dynamic_modifier$§! bude odstraněn za 730 dní" # todo: NEW TRANSLATION
  war_will_cancel_deal_tt: "§YVálka mezi našimi zeměmi ukončí tuto dohodu§!" # todo: NEW TRANSLATION
  DEN_effects_after_fortify_our_borders_tt: "Dokončen fokus §Y$DEN_fortify_our_borders$§!:" # todo: NEW TRANSLATION
  DEN_trade_with_britain: "Obchod s Británií" # todo: NEW TRANSLATION
  DEN_trade_with_britain_desc: "[ENG.GetNameDefCap] historicky byl naším největším exportním trhem pro zemědělské produkty, ale po Velké depresi tento obchod téměř ustal. S devalvací koruny je čas oslovit Brity a zkusit znovu navázat naše dřívější obchodní vazby." # todo: NEW TRANSLATION
  DEN_trade_with_germany: "Obchod s Německem" # todo: NEW TRANSLATION
  DEN_trade_with_germany_desc: "[GER.GetNameDefCap] historicky dováželo velké množství našich zemědělských produktů, a ani Velká válka to nezastavila. Ale v posledních letech obchod mezi oběma zeměmi poklesl. Možná je teď čas to změnit!" # todo: NEW TRANSLATION
  DEN_agricultural_subsidies: "Zemědělské dotace" # todo: NEW TRANSLATION
  DEN_agricultural_subsidies_desc: "Naši zemědělci zápasí s dlužními krizemi a zabavováním. Pocity bezmoci a hněvu v jejich řadách se mohou změnit v něco nebezpečnějšího, pokud se tomu nepostaví. Musíme tuto situaci řešit a co nejlépe podpořit agrární sektor." # todo: NEW TRANSLATION
  DEN_industrial_investments: "Průmyslové investice" # todo: NEW TRANSLATION
  DEN_industrial_investments_desc: "Městská centra nebyla ušetřena otřesů posledních let. Nezaměstnanost vystřelila a podniky jsou na pokraji bankrotu. Můžeme zasáhnout dobře cílenými pomocnými balíčky pro průmysl a stabilizovat situaci." # todo: NEW TRANSLATION
  DEN_support_schleswigian_farmers: "Podpořit schlesvigsko‑jutské zemědělce" # todo: NEW TRANSLATION
  DEN_support_schleswigian_farmers_desc: "V Jižním Jutsku rostou okrajová hnutí, podpořená ekonomickým napětím a sporem o identitu; jsou Němci nebo Dánové? Můžeme zmírnit část tohoto nesouhlasu zvýšením ekonomické podpory v regionu." # todo: NEW TRANSLATION
  DEN_public_works: "Veřejné práce" # todo: NEW TRANSLATION
  DEN_public_works_desc: "Program veřejných prací by mohl zlepšit infrastrukturu stavbou mostů spojujících ostrovy, iniciovat výstavbu nového bydlení a snížit vysokou nezaměstnanost." # todo: NEW TRANSLATION
  DEN_fortify_our_borders: "Opevnit naše hranice" # todo: NEW TRANSLATION
  DEN_fortify_our_borders_desc: "Napětí v Evropě roste znovu. I když jsme vyšli z Velké války nezraněni, není žádná záruka, že se to zopakuje. Musíme se připravit na nejhorší a doufat v nejlepší. Obrana hranic a nezávislosti je naší první prioritou!" # todo: NEW TRANSLATION
  DEN_build_a_modern_dannevirke: "Vybudovat moderní Dannevirke" # todo: NEW TRANSLATION
  DEN_build_a_modern_dannevirke_desc: "Dánové stavěli těžká opevnění směrem k pevnině Evropě po staletí, nejznámější z nich je Dannevirke. Jak se [GER.GetNameDef] znovu vyzbrojuje a rozdmýchává napětí kolem nás, musíme postavit moderní Dannevirke chránící naše hranice." # todo: NEW TRANSLATION
  DEN_unlocks_fortification_efforts: "Odemkne rozhodnutí: §YEfekty opevnění§!\n\n" # todo: NEW TRANSLATION
  DEN_refortify_tunestillingen: "Znovu opevnit Tunestillingen" # todo: NEW TRANSLATION
  DEN_refortify_tunestillingen_desc: "Posledně, když byla Evropa pohlcena válkou, připravili jsme obranu budováním Tunestillingen — sítě opevnění k ochraně Kodaně. Tyto pevnosti chátrají, ale jejich obnovou a modernizací bychom zabezpečili bezpečnost našeho hlavního města." # todo: NEW TRANSLATION
  DEN_secure_our_supply_lines: "Zabezpečit naše zásobovací linie" # todo: NEW TRANSLATION
  DEN_secure_our_supply_lines_desc: "Armáda pochoduje za žaludkem — to platí dnes stejně jako kdysi. Jsme hlavním producentem potravin a s několika úpravami logistiky můžeme zajistit stabilní zásobování vojsk." # todo: NEW TRANSLATION
  DEN_fortify_the_islands: "Opevnit ostrovy" # todo: NEW TRANSLATION
  DEN_fortify_the_islands_desc: "Východní Dánsko leží na stovkách ostrovů a naše námořnictvo není dost velké, aby je všechny ochránilo před většími flotami sousedů. Stavbou pobřežních opevnění na klíčových místech je můžeme odradit." # todo: NEW TRANSLATION
  DEN_unlocks_coastal_fortification_efforts: "Odemkne rozhodnutí: §YPobřežní opevnění§!\n\n" # todo: NEW TRANSLATION
  DEN_connect_the_islands: "Spojit ostrovy" # todo: NEW TRANSLATION
  DEN_connect_the_islands_desc: "[ROOT.GetNameDefCap] se skládá z mnoha ostrovů, kde jediný bod spojující nás s pevninou je v jižním Jutsku. Abychom usnadnili cestování a hlavně spojení mezi ostrovy, musíme postavit mosty, které nás více svážou." # todo: NEW TRANSLATION
  DEN_expand_institut_for_teoretisk_fysik: "Rozšířit Institut pro teoretickou fyziku" # todo: NEW TRANSLATION
  DEN_expand_institut_for_teoretisk_fysik_desc: "Institut pro teoretickou fyziku je světově proslulý a založen Nielsem Bohrem. Financováním a rozšířením institutu bychom mohli sklízet jeho plody a možná dokonce přilákat Nielse Bohra sám." # todo: NEW TRANSLATION
  DEN_aalborg_portland_cement_plant: "Cementárna Aalborg Portland" # todo: NEW TRANSLATION
  DEN_aalborg_portland_cement_plant_desc: "Pevninské Dánsko je chudé na přírodní zdroje, ale výroba cementu je jedním z našich aktiv. Rozšířením Aalborg Portland zajistíme domácí schopnosti výstavby." # todo: NEW TRANSLATION
  DEN_improve_aalborg_portland_tt: "Tím se zlepší průmyslové sdružení §Y$DEN_aalborg_portland$§! o \n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10.00%§!\n\n" # todo: NEW TRANSLATION
  DEN_expand_the_industries: "Rozšířit naše průmysly" # todo: NEW TRANSLATION
  DEN_expand_the_industries_desc: "Dánsko tradičně spoléhá na zemědělství, které zůstává naším největším exportem. Pokud bychom diverzifikovali a rozšířili další průmysly, posílili bychom celou ekonomiku a učinili společnost odolnější vůči náhlým změnám." # todo: NEW TRANSLATION
  DEN_develop_remote_islands: "Odemkne rozhodnutí: §YRozvíjet ostrovy§!\n\n" # todo: NEW TRANSLATION
  DEN_support_the_faroes_industries: "Podpořit průmysly Faerských ostrovů" # todo: NEW TRANSLATION
  DEN_support_the_faroes_industries_desc: "V nejistých časech by bylo rozumné podpořit málo průmyslů na Faerských ostrovech a učinit naši nárok na strategicky položený souostroví nezpochybnitelným." # todo: NEW TRANSLATION
  DEN_support_bornholms_industries: "Podpořit průmysly Bornholmu" # todo: NEW TRANSLATION
  DEN_support_bornholms_industries_desc: "Bornholm postrádá významné přírodní zdroje, ale může mít smysl investovat do jeho pár průmyslů a zároveň připomenout sousedům, čí ostrov to je." # todo: NEW TRANSLATION
  DEN_develop_greenland: "Rozvíjet Grónsko" # todo: NEW TRANSLATION
  DEN_develop_greenland_desc: "Pevninské Dánsko má málo přírodních zdrojů k rozvoji, ale naše držba Grónska je bohatá. Pokud do Grónska investujeme, budeme těžit užitek doma i v zahraničí." # todo: NEW TRANSLATION
  DEN_expand_the_ivittuut_mine: "Rozšířit dol Ivittuut" # todo: NEW TRANSLATION
  DEN_expand_the_ivittuut_mine_desc: "Důl v Ivittuut je náš jediný zdroj hliníku, což je klíčové pro výrobu moderních letadel. Rozšířením dolu bychom mohli zvýšit domácí výrobu letadel nebo hliník vyvážet." # todo: NEW TRANSLATION
  DEN_prospecting_new_sites: "Hledání nových lokalit" # todo: NEW TRANSLATION
  DEN_prospecting_new_sites_desc: "Starý důl v Qaarsuarsuku je vyčerpaný, ale v regionu Qullissat jsou další ložiska. Otevření nového dolu by bylo přínosné nejen pro průmysl v Grónsku, ale i pro naše potřeby doma." # todo: NEW TRANSLATION
  DEN_protect_greenland: "Chránit Grónsko" # todo: NEW TRANSLATION
  DEN_protect_greenland_desc: "Grónsko bylo součástí naší říše dlouho, s nároky sahajícími až do vikingských dob. Ztráta tohoto ostrova by byla národní katastrofou a obrovskou ztrátou prestiže. Abychom odradili potenciální útok, musíme posílit jeho obranu." # todo: NEW TRANSLATION
  DEN_danske_stalvalsevaerket: "Danske Stålvalseværket" # todo: NEW TRANSLATION
  DEN_danske_stalvalsevaerket_desc: "Několik zástupců průmyslu prosazuje zvýšení produkce oceli. Založení nové válcovny by mohl být impuls k ekonomice a udělat nás méně závislými na dovezené oceli." # todo: NEW TRANSLATION
  DEN_reorient_production_lines: "Přeorientovat výrobní linky" # todo: NEW TRANSLATION
  DEN_reorient_production_lines_desc: "Nacházíme se v prekární situaci, kde brzy můžeme potřebovat více vojenského vybavení. Abychom tomu vyhověli, musíme převést civilní továrny na výrobu zbraní." # todo: NEW TRANSLATION
  DEN_strengthen_military_industries: "Posílit vojenský průmysl" # todo: NEW TRANSLATION
  DEN_strengthen_military_industries_desc: "Investice do robustního zbrojního průmyslu může být zásadní v nadcházejících časech. Musíme se ujistit, že jsme připraveni vyzbrojit se, pokud bude třeba." # todo: NEW TRANSLATION
  DEN_protect_the_faroe_islands: "Chránit Faerské ostrovy" # todo: NEW TRANSLATION
  DEN_protect_the_faroe_islands_desc: "S rostoucím napětím mohou být v Severním moři vážné boje. Faerské ostrovy jsou důležitým článkem v našem přístupu k Grónsku a jeho zdrojům. Ztráta tohoto souostroví by byla devastační, proto je důležité zajistit jeho obranu." # todo: NEW TRANSLATION
  DEN_protect_bornholm: "Chránit Bornholm" # todo: NEW TRANSLATION
  DEN_protect_bornholm_desc: "Bornholm leží blízko [SWE.GetNameDef] a [GER.GetNameDef], blíže těmto zemím než zbytku Dánska. Musíme tento strategický ostrov posílit a zajistit naši kontrolu nad ním." # todo: NEW TRANSLATION
  DEN_declare_neutrality: "Potvrdit neutralitu" # todo: NEW TRANSLATION
  DEN_declare_neutrality_desc: "Neangažovanost v minulé válce nám pomohla vyhnout se hrůzám konfliktu. Vyhlášení neutrality nás může opět uchránit." # todo: NEW TRANSLATION
  DEN_political_unity: "Politická jednota" # todo: NEW TRANSLATION
  DEN_political_unity_desc: "Jen spoluprací přes stranické hranice můžeme doufat, že udržíme národ v bezpečí. Odložení politických rozdílů je důležitější než kdy jindy." # todo: NEW TRANSLATION
  DEN_policy_of_disarmament: "Politika odzbrojení" # todo: NEW TRANSLATION
  DEN_policy_of_disarmament_desc: "Dlouhá léta jsme usilovali o odzbrojení, což je jeden z důvodů, proč jsme se vyhnuli hrůzám Velké války. Projevovat se jako nehrozba by nás mohlo opět uchránit." # todo: NEW TRANSLATION
  DEN_import_machinery_and_material: "Dovážet stroje a materiály" # todo: NEW TRANSLATION
  DEN_import_machinery_and_material_desc: "Pokud se chceme měřit s průmyslovou silou našich sousedů, musíme být chytří. Dovážením moderních nástrojů a materiálů od průmyslovějších zemí posílíme vlastní schopnosti." # todo: NEW TRANSLATION
  DEN_modernize_agricultural_machinery: "Modernizovat zemědělské stroje" # todo: NEW TRANSLATION
  DEN_modernize_agricultural_machinery_desc: "Modernizace zemědělských strojů a technologií může přinést lepší sklizeň s větší efektivitou a zvýšit produkci." # todo: NEW TRANSLATION
  DEN_develop_jutland_states_tt: "Odemkne rozhodnutí: §YRozvíjet region Jutland§!\n\n" # todo: NEW TRANSLATION
  DEN_agricultural_reinvestments: "Reinvestice v zemědělství" # todo: NEW TRANSLATION
  DEN_agricultural_reinvestments_desc: "Zemědělství se zefektivnilo mechanizací a zavedením nových strojů. Reinvestování zvýšených daňových příjmů z tohoto sektoru by mohlo dále zlepšit efektivitu." # todo: NEW TRANSLATION
  DEN_industrial_reinvestments: "Průmyslové reinvestice" # todo: NEW TRANSLATION
  DEN_industrial_reinvestments_desc: "Modernizace zemědělství uvolnila lidi z polí. Reinvestice ve městech by nabídla nové pracovní příležitosti, které by zvýšily průmyslovou produkci." # todo: NEW TRANSLATION
  DEN_increase_produce_production: "Zvýšit produkci potravin" # todo: NEW TRANSLATION
  DEN_increase_produce_production_desc: "Naše reinvestice se vyplatily a od malých statků po velké družstva prosperují. Jsme nyní ve vhodné pozici zvýšit produkci potravin ještě více." # todo: NEW TRANSLATION
  DEN_modernize_industrial_machinery: "Modernizovat průmyslové stroje" # todo: NEW TRANSLATION
  DEN_modernize_industrial_machinery_desc: "Dánsko tradičně záviselo na zemědělství, ale městské průmysly získaly na významu. Investice do moderních strojů by umožnily růst průmyslu." # todo: NEW TRANSLATION
  DEN_develop_island_states_tt: "Odemkne rozhodnutí: §YRozvíjet oblast Velkého pásu§!\n\n" # todo: NEW TRANSLATION
  DEN_increase_industrial_production: "Zvýšit průmyslovou produkci" # todo: NEW TRANSLATION
  DEN_increase_industrial_production_desc: "Městské průmysly získaly nedávno na důležitosti tím, že zvýšily zaměstnanost i ekonomický výkon. I když se průmysl již zlepšil, může být ještě efektivnější." # todo: NEW TRANSLATION
  DEN_research_and_development: "Investovat do výzkumu a vývoje" # todo: NEW TRANSLATION
  DEN_research_and_development_desc: "Ropa a strojírenství pohánějí moderní společnost a v těchto oblastech zaostáváme. Musíme zajistit, abychom nezůstali pozadu." # todo: NEW TRANSLATION
  DEN_north_sea_oil_drilling: "Vrty po ropu v Severním moři" # todo: NEW TRANSLATION
  DEN_north_sea_oil_drilling_desc: "Průzkumníci objevili ložiska ropy u pobřeží Nørrejylland. Pokud bychom je těžili, stali bychom se méně závislými na kolísavém trhu a více soběstačnými." # todo: NEW TRANSLATION
  DEN_potential_refinery_tt: "S §Y$synth_oil_experiments$§! výzkumem přidat §G1§! stavební sloty a §G1§! §Y$synthetic_refinery$§! do §Y$STATE_99$§!." # todo: NEW TRANSLATION
  DEN_increase_maritime_trade: "Zvýšit námořní obchod" # todo: NEW TRANSLATION
  DEN_increase_maritime_trade_desc: "Budoucnost leží na otevřeném moři a v našem obchodním loďstvu k exportu produktů daleko a široko. Jsme sice malá země, ale můžeme se stát velkou obchodní mocností." # todo: NEW TRANSLATION
  DEN_full_employment: "Plná zaměstnanost" # todo: NEW TRANSLATION
  DEN_full_employment_desc: "Bezohledně investovali do průmyslu a zemědělství, nyní sklízíme plody. Opouštíme roky krize a vysoké nezaměstnanosti. Národ pracuje na plný výkon a chybějí lidé k náboru. Před námi je prosperita." # todo: NEW TRANSLATION
  DEN_social_stability: "Sociální stabilita" # todo: NEW TRANSLATION
  DEN_social_stability_desc: "Abychom se vyhnuli nestabilitě, která otřásla jinými zeměmi, musíme předem jednat! Než provedeme rozsáhlé reformy, musíme mít pevný a stabilní základ." # todo: NEW TRANSLATION
  DEN_welcome_foreign_scientists: "Přivítat zahraniční vědce" # todo: NEW TRANSLATION
  DEN_welcome_foreign_scientists_desc: "V Evropě se vaří problémy a lidé utíkají před režimy, které je potlačují. Přijetím některých z nich s otevřenou náručí získáme mnoho znalostí a kompetencí." # todo: NEW TRANSLATION
  DEN_build_motorveje: "Vytvořit národní dálnice" # todo: NEW TRANSLATION
  DEN_build_motorveje_desc: "Bylo již hodně řečí a i plánů ohledně národních dálnic. Vybudování sítě motorveje by urychlilo cestování a těsněji spojilo zemi." # todo: NEW TRANSLATION
  DEN_heavy_market_regulations: "Přísné regulace průmyslu" # todo: NEW TRANSLATION
  DEN_heavy_market_regulations_desc: "Průmyslové společnosti vyrůstaly velké a bohaté. Jejich vliv nad ekonomikou znepokojuje mnoho lidí. Musíme je omezit a přísně dohlížet, aby nepokládaly zájmy firmy nad zájmy národa." # todo: NEW TRANSLATION
  DEN_limited_market_regulations: "Omezené regulace průmyslu" # todo: NEW TRANSLATION
  DEN_limited_market_regulations_desc: "Průmysl získal na důležitosti a vzkvétá. Musíme ho zkrotit natolik, abychom nepoškodili jeho růst, ale natolik, aby nepředstavoval bezpečnostní riziko." # todo: NEW TRANSLATION
  DEN_no_market_regulations: "Zrušit všechny regulace průmyslu" # todo: NEW TRANSLATION
  DEN_no_market_regulations_desc: "Průmysly rostly a prosperovaly navzdory regulacím — ne díky nim. Pokud chceme konkurovat, musíme zrušit veškeré regulace." # todo: NEW TRANSLATION
  DEN_industrial_research_bonus_tt: "Bonus k průmyslovému výzkumu: §G+5.00%§!" # todo: NEW TRANSLATION
  DEN_side_with_unions: "Stát na straně odborů" # todo: NEW TRANSLATION
  DEN_side_with_unions_desc: "Pouze zlepšením životních podmínek všech v [Den.GetNameDef] můžeme vyřešit problémy pracovního trhu; jen posílením odborů toho dosáhneme." # todo: NEW TRANSLATION
  DEN_side_with_industry: "Stát na straně průmyslu" # todo: NEW TRANSLATION
  DEN_side_with_industry_desc: "Abychom vyřešili problémy podnikání, musíme snížit mzdy a zvýšit cla na dovozy, jinak zaměstnavatelé budou mít problém prosperovat." # todo: NEW TRANSLATION
  DEN_five_year_plan: "Zavést pětiletý plán" # todo: NEW TRANSLATION
  DEN_five_year_plan_desc: "Abychom zajistili budoucnost našeho lidu, musíme ustavit výbor schopný vytvořit a provést odvážný nový ekonomický model pro [DEN.GetNameDef]. Tento pětiletý plán nás rozzáří a přivede k prosperitě!" # todo: NEW TRANSLATION
  DEN_limited_social_mobilization: "Omezená sociální mobilizace" # todo: NEW TRANSLATION
  DEN_limited_social_mobilization_desc: "Válka visí nad Evropou — ale nesmíme být znovu zaskočeni! Musíme provést nutné přípravy, jak těžké by byly, aby byla naše suverenita zajištěna." # todo: NEW TRANSLATION
  DEN_start_the_rearmament: "Zahájit přeozbrojování" # todo: NEW TRANSLATION
  DEN_start_the_rearmament_desc: "Příliš dlouho [DEN.GetNameDef] zanedbávalo svou armádu a svěřilo naši suverenitu do rukou sousedů. S chaosem v Evropě to už dál nemůže pokračovat! Musíme znovu vybudovat vojenské schopnosti." # todo: NEW TRANSLATION
  DEN_national_unity: "Národní jednota" # todo: NEW TRANSLATION
  DEN_national_unity_desc: "Přeozbrojení a budování armády vyžaduje podporu celého dánského lidu. Musíme sjednotit národ a postupovat pevně." # todo: NEW TRANSLATION
  DEN_industrial_preparations: "Průmyslové přípravy" # todo: NEW TRANSLATION
  DEN_industrial_preparations_desc: "Musíme připravit každý aspekt společnosti na válku — nesmíme být zaskočeni. Průmysly musí být připraveny, aby nás učinily soběstačnějšími a posílily schopnost odolat invazi." # todo: NEW TRANSLATION
  DEN_military_preparations: "Vojenské přípravy" # todo: NEW TRANSLATION
  DEN_military_preparations_desc: "Připravení průmyslu bude k ničemu, pokud naše armády nedokážou odrazit nepřítele. Musíme posílit obranu a zajistit, že naše jednotky mají disciplínu a nervy držet frontu." # todo: NEW TRANSLATION
  DEN_civilian_preparations: "Civilní přípravy" # todo: NEW TRANSLATION
  DEN_civilian_preparations_desc: "I přes připravenost armády a průmyslu to bude k ničemu, pokud se obyčejní lidé zhroutí a rychle vyhledají mír. Musíme zocelit odhodlání v každém dánském srdci a posílit jejich víru." # todo: NEW TRANSLATION
  DEN_full_social_mobilization: "Plná sociální mobilizace" # todo: NEW TRANSLATION
  DEN_full_social_mobilization_desc: "Válka je za dveřmi; k zajištění svobody musíme mobilizovat každý aspekt společnosti. Každý muž, žena i dítě musí znát své povinnosti. Bude to náročné, ale veškeré průmyslové kapacity musí směřovat k přeozbrojení a bezpečnosti dánského lidu." # todo: NEW TRANSLATION
  DEN_seek_protection: "Hledat ochranu" # todo: NEW TRANSLATION
  DEN_seek_protection_desc: "Můžeme se připravovat, jak chceme, ale obklopují nás větší a silnější sousedi — jejich úmysly nejsou jasné. Je tedy rozumné hledat ochranu u někoho jiného, abychom zabezpečili naši nezávislost." # todo: NEW TRANSLATION
  DEN_sign_non_aggression_deal: "Podepsat dohodu o neútočení" # todo: NEW TRANSLATION
  DEN_sign_non_aggression_deal_desc: "Získáme mnoho, když si udobříme silnější zemi a podepíšeme s ní pakt o neútočení. Možná to nezmění naši bezprostřední situaci, ale v budoucnu takové vazby mohou přinést výhody v obchodu a spolupráci." # todo: NEW TRANSLATION
  DEN_sign_a_trade_deal: "Vyjednat obchodní dohodu" # todo: NEW TRANSLATION
  DEN_sign_a_trade_deal_desc: "Jsme odhodláni přeozbrojit, ale to trvá. Musíme získat vybavení rychleji. Otočme se k přátelské zemi a nakupme, co potřebujeme, jelikož vlastní výrobní kapacity jsou omezené." # todo: NEW TRANSLATION
  DEN_science_pact: "Vstoupit do programu výzkumu a partnerství" # todo: NEW TRANSLATION
  DEN_science_pact_desc: "I když jsme udělali velké pokroky ve vědě a technologiích, stále zaostáváme v některých oblastech. Spoluprací s přátelskou zemí můžeme vstoupit do vzájemně výhodného programu výzkumu a partnerství a urychlit náš pokrok." # todo: NEW TRANSLATION
  DEN_territory_for_protection: "Území za ochranu" # todo: NEW TRANSLATION
  DEN_territory_for_protection_desc: "Program přeozbrojení pokračuje, ale armádní kruhy pochybují o jeho dostatečnosti. Mohli bychom prodat část území výměnou za konkrétní záruku ochrany, což by mohlo i ekonomicky pomoci." # todo: NEW TRANSLATION
  DEN_strength_in_numbers: "Síla v počtu" # todo: NEW TRANSLATION
  DEN_strength_in_numbers_desc: "Chceme‑li mít šanci proti výrazně silnějšímu nepříteli, musíme hledat spojence — neutralita stranou! Je čas přizpůsobit se realitě." # todo: NEW TRANSLATION
  DEN_military_cooperation_program: "Program vojenské spolupráce" # todo: NEW TRANSLATION
  DEN_military_cooperation_program_desc: "Po zajištění aliance se obě země mohou vzájemně učit v programu vojenské spolupráce. Aby to bylo atraktivní, náš nový spojenec přislíbil dotace na vojenský materiál, který od něj nakoupíme." # todo: NEW TRANSLATION
  DEN_joint_military_drills: "Společná vojenská cvičení" # todo: NEW TRANSLATION
  DEN_joint_military_drills_desc: "Dánské síly, neutrální od roku 1864, dlouho nesloužily v opravdovém boji. Pokud oslovíme nového spojence, můžeme se mnoho naučit a vzájemná cvičení přinesou zkušenosti oběma stranám." # todo: NEW TRANSLATION
  DEN_nordic_security: "Nordická bezpečnost" # todo: NEW TRANSLATION
  DEN_nordic_security_desc: "Po zajištění naší vlastní nezávislosti novou aliancí se konečně můžeme obrátit na zbytek severských zemí. Musíme je přesvědčit, aby se připojily k naší frakci, aby se vzájemně ochránily; pokud neprojevují rozum, musíme je chránit před sebou samými." # todo: NEW TRANSLATION
  DEN_unify_the_right: "Sjednotit pravici" # todo: NEW TRANSLATION
  DEN_unify_the_right_desc: "[DEN.GetNameDefCap] je vedena nezodpovědně příliš dlouho! Jen houževnatostí a vytrvalostí dánského lidu ještě fungujeme jako stát. Je čas, aby pravicové strany konečně svedly síly proti levicové hrozbě!" # todo: NEW TRANSLATION
  DEN_conservatives_support: "Získat podporu konzervativců" # todo: NEW TRANSLATION
  DEN_conservatives_support_desc: "I když velká část Konzervativní strany nikdy nespolupracuje s Bondepartiet nebo DNSAP, jsou zde tací, kteří vidí, jak bezbranné a nepřipravené [DEN.GetNameDef] je. Musíme je přesvědčit, aby se k nám přidali!" # todo: NEW TRANSLATION
  DEN_conspire_with_the_officer_corps: "Spřáhnout se s důstojnickým sborem" # todo: NEW TRANSLATION
  DEN_conspire_with_the_officer_corps_desc: "S jednotnou pravicovou koalicí s širším mandátem a soudržným programem můžeme přistoupit k důstojnickému sboru a přesvědčit část z nich, aby nás podpořila." # todo: NEW TRANSLATION
  DEN_encourage_paramilitary: "Podporovat paramilitaristické organizace" # todo: NEW TRANSLATION
  DEN_encourage_paramilitary_desc: "Podpora místních paramilitárních organizací nejen posílí národní bezpečnost v případě války, ale i zvýší pocit komunity a jednoty mezi občany." # todo: NEW TRANSLATION
  DEN_overthrow_the_government: "Převrátit vládu" # todo: NEW TRANSLATION
  DEN_overthrow_the_government_desc: "Naše země je příliš dlouho řízena chamtivými lidmi, kteří se starají jen o sebe — ignorují nebezpečí ohrožující Dánský lid. Je čas ustanovit nový řád a uvést novou éru pro [DEN.GetNameDef]!" # todo: NEW TRANSLATION
  DEN_strengthen_the_officer_corp: "Posílit důstojnický sbor" # todo: NEW TRANSLATION
  DEN_strengthen_the_officer_corp_desc: "Důstojníci hrají klíčovou roli ve vojenských operacích. Abychom zajistili účinnost ozbrojených sil, musíme klást důraz na posílení důstojnického sboru a vychovat novou generaci schopných vůdců." # todo: NEW TRANSLATION
  DEN_king_assumes_power: "Král přebírá moc" # todo: NEW TRANSLATION
  DEN_king_assumes_power_desc: "Potřebujeme pevnou ruku, která nás povede v těchto nejistých časech. Potřebujeme stabilitu a tradici. Možná by bylo možné přimět krále, aby v těchto bouřlivých časech převzal plnou autoritu." # todo: NEW TRANSLATION
  DEN_konge_og_faedreland: "For Konge og Fædreland" # todo: NEW TRANSLATION
  DEN_konge_og_faedreland_desc: "Nechť neochvějná oddanost a čest krále Christiana X slouží jako maják naděje pro lid v těchto časech zkoušek. Musíme stát jednotní jako národ, abychom bránili naši vlast!" # todo: NEW TRANSLATION
  DEN_align_industries: "Slaďte průmysl s národními zájmy" # todo: NEW TRANSLATION
  DEN_align_industries_desc: "Potřeba efektivního přerozdělení zdrojů a cílené průmyslové výroby se stala zásadní. Koordinací našich snah a zefektivněním produkce zajistíme, že každá továrna, každý dělník a každý zdroj bude využit na maximum ve službě [DEN.GetNameDef]." # todo: NEW TRANSLATION
  DEN_the_royal_guard: "Rozšířit Den Kongelige Livgarde" # todo: NEW TRANSLATION
  DEN_the_royal_guard_desc: "Den Kongelige Livgarde byla po téměř 300 letech pověřena ochranou bezpečí krále a jeho rodiny a znovu a znovu prokázala, že je oddaná a neochvějná ve svých povinnostech. Zvýšením jejich počtu a kázně bychom mohli ještě více posílit naše ozbrojené síly." # todo: NEW TRANSLATION
  DEN_economic_mobilization_strategy: "Strategie ekonomické mobilizace" # todo: NEW TRANSLATION
  DEN_economic_mobilization_strategy_desc: "Musíme připravit ekonomiku i obyvatelstvo na nadcházející válku. Budeme muset zavést novou ekonomickou strategii, aby průmysl fungoval co nejefektivněji, a současně přesvědčit dánský lid, aby splnil svou povinnost vůči králi a vlasti." # todo: NEW TRANSLATION
  DEN_expand_kobenhavns_university: "Rozšířit Københavns Universitet" # todo: NEW TRANSLATION
  DEN_expand_kobenhavns_university_desc: "Nemůžeme riskovat, že [DEN.GetNameDef] se stane technologickým zaostávajícím regionem. Investice do vědeckého pokroku a technologického vývoje na Københavns Universitet zajistí, že za konkurenty v žádném oboru nezaostaneme." # todo: NEW TRANSLATION
  DEN_scandinavian_security: "Skandinávská bezpečnost" # todo: NEW TRANSLATION
  DEN_scandinavian_security_desc: "Skandinávie a Baltské moře byly hlavními geopolitickými ohnisky pro [DEN.GetNameDef] v uplynulých několika staletích. Než obrátime pozornost k hlavním evropským mocnostem na kontinentu, musíme nejprve podrobit a uklidnit naše severní křídlo." # todo: NEW TRANSLATION
  DEN_reintegrate_iceland: "Znovuzačlenit Island" # todo: NEW TRANSLATION
  DEN_reintegrate_iceland_desc: "Je to teprve krátce, co byl [ICE.GetNameDef] součástí našeho státu – a byl jím po staletí. Je nejvyšší čas přesvědčit [ICE.GetAdjective] lid, aby vstoupil do našeho království a znovu se stal jednotným národem." # todo: NEW TRANSLATION
  DEN_develop_iceland: "Rozvíjet Island" # todo: NEW TRANSLATION
  DEN_develop_iceland_desc: "Poloha Islandu v Severním Atlantiku z něj činí ideální odrazový bod pro námořní expedice, umožňující kontrolu vysokomoří. Směřováním zdrojů a peněz do regionu bychom jej mohli těsněji integrovat do širší říše a lépe využít jeho strategickou polohu" # todo: NEW TRANSLATION
  DEN_sway_the_nordics: "Ovlivnit severské země" # todo: NEW TRANSLATION
  DEN_sway_the_nordics_desc: "Ve starém rčení 'Pero je silnější než meč' je pravda. Může být rozumné snažit se diplomatickými prostředky přetáhnout ostatní národy na naši stranu místo používání hrubé síly." # todo: NEW TRANSLATION
  DEN_offer_protection: "Nabídnout ochranu" # todo: NEW TRANSLATION
  DEN_offer_protection_desc: "Abychom dále zvýšili náš vliv a moc v severském regionu a kolem Baltského moře, měli bychom vytvořit dánskou hegemonii tím, že nabídneme patřičnou ochranu těm, kteří ji potřebují. Obrana našich severských a baltských bratří posílí bezpečnost v celém regionu a prospěje nám všem." # todo: NEW TRANSLATION
  DEN_secure_swedish_steel: "Zajistit švédskou ocel" # todo: NEW TRANSLATION
  DEN_secure_swedish_steel_desc: "[DEN.GetNameDefCap] je země chudá na suroviny, postrádá většinu materiálů potřebných k vedení moderní armády. Švédsko na druhé straně disponuje množstvím přírodních zdrojů – a dříve bylo pod dánskou nadvládou. Nastal čas opět podrobit [SWE.GetNameDef] naší vládě." # todo: NEW TRANSLATION
  DEN_swedish_steel_production: "Švédská produkce oceli" # todo: NEW TRANSLATION
  DEN_swedish_steel_production_desc: "Po zajištění nerostného bohatství severního [SWE.GetNameDef] pod naší nadvládou se nacházíme v vynikající pozici, abychom využili všechny doly ke zvýšení naší těžební kapacity, ale také vyváželi část bohatství do zahraničí — výměnou za bezpečnostní záruky." # todo: NEW TRANSLATION
  DEN_finish_off_finland: "Zajistit naše východní křídlo" # todo: NEW TRANSLATION
  DEN_finish_off_finland_desc: "Naše zájmy v severní Skandinávii budou vždy ohroženy, pokud nezajistíme naše východní křídlo. Musíme přijmout preventivní opatření k ochraně finských území!" # todo: NEW TRANSLATION
  DEN_reclaim_norway: "Znovu získat Norsko" # todo: NEW TRANSLATION
  DEN_reclaim_norway_desc: "Dánská koruna vládla [NOR.GetNameDef] stovky let, než nám ji Švédové v roce 1814 odebrali. Králův bratr, král Haakon z [NOR.GetNameDef], se ukázal být neochotný převzít přímou kontrolu a učinit nutná rozhodnutí k ochraně svého lidu. Nastal čas znovu sjednotit obě země pod dánskou vládou." # todo: NEW TRANSLATION
  DEN_train_mountain_infantry: "Horský výcvik" # todo: NEW TRANSLATION
  DEN_train_mountain_infantry_desc: "Západní a severní části Skandinávie jsou horským terénem — něco, co na pevninské části Dánska nemáme. Musíme provádět vojenské manévry v těchto horách, abychom zvýšili naše bojové schopnosti a lépe chránili naše království." # todo: NEW TRANSLATION
  DEN_pan_scandinavianism: "Panskandinávismus" # todo: NEW TRANSLATION
  DEN_pan_scandinavianism_desc: "Skandinávie, a do menší míry i celý severský region, jsou po tisíciletí úzce provázány dlouhou sdílenou historií. Využitím už existujících blízkých vazeb mezi našimi národy můžeme učinit kroky směrem k unifikaci." # todo: NEW TRANSLATION
  DEN_march_on_the_capital: "Vyrazit na hlavní město" # todo: NEW TRANSLATION
  DEN_march_on_the_capital_desc: "Konečně nastal čas, aby naše strana povstala a převzala kontrolu nad budoucností [DEN.GetNameDef]. Musíme vyrazit na [ROOT.capital.GetCapitalVictoryPointName] a dát o sobě vědět! To bude začátek silného a bezpečného období v [DEN.GetAdjective] historii!" # todo: NEW TRANSLATION
  DEN_seize_power: "Uchopit moc" # todo: NEW TRANSLATION
  DEN_seize_power_desc: "[DEN.GetNameDefCap] je konečně připraven přijmout novou fašistickou vládu. Zrušíme Rigsdag a místo toho vložíme budoucnost našeho velkého národa do rukou $DEN_cay_lembcke$. Pokud se však objeví sebemenší odpor, musíme být připraveni jej navždy potlačit." # todo: NEW TRANSLATION
  DEN_ask_for_support: "Požádat o podporu" # todo: NEW TRANSLATION
  DEN_ask_for_support_desc: "[GER.GetAdjective]ové jsou přímým příkladem země, kterou chceme vybudovat. Proto si nemůžeme vynalézt lepší národ, k němuž bychom se mohli obrátit a žádat o podporu v této turbulentní době. Měli bychom co nejdříve poslat delegaci do [GER.capital.GetCapitalVictoryPointName]!" # todo: NEW TRANSLATION
  DEN_denmark_first: "Dánsko na prvním místě" # todo: NEW TRANSLATION
  DEN_denmark_first_desc: "Doputovali jsme tak daleko vlastními zásluhami, proč tedy sahat na podporu k některé z velmocí? Místo toho si [DEN.GetNameDef] stoupne na vlastní nohy a vyroste v stejně důležitou mocnost jako ostatní hlavní frakce ve světě. Ať žije Dánsko!" # todo: NEW TRANSLATION
  DEN_rally_the_nation: "Sjednotit národ" # todo: NEW TRANSLATION
  DEN_rally_the_nation_desc: "Nyní, když jsme získali kontrolu nad zemí, je nesmírně důležité získat podporu lidu. Ačkoli nám možná nebudou schopni moc odporovat, je mnohem lepší mít u sebe lid, který je ochoten bojovat za svou zemi, než mít někoho s nožem v zádech. Obnovme [DEN.GetAdjective] hrdost a sjednoťme lidi k boji za svou vlast!" # todo: NEW TRANSLATION
  DEN_dano_german_military_cooperation: "Dánsko-německá vojenská spolupráce" # todo: NEW TRANSLATION
  DEN_dano_german_military_cooperation_desc: "Abychom našim ozbrojeným silám umožnili postoupit natolik, abychom dosáhli svých cílů, může být důležité obrátit se na naši kolegiální vládu v [GER.GetNameDef] a požádat o vojenskou a technologickou spolupráci. Díky tomuto návrhu se budoucnost, kterou si pro [DEN.GetNameDef] představujeme, přiblíží realitě." # todo: NEW TRANSLATION
  DEN_institute_corporatism: "Zavést korporativismus" # todo: NEW TRANSLATION
  DEN_institute_corporatism_desc: "Inspirováni italským modelem musí dělníci a kapitalisté z různých ekonomických sektorů participovat na tvorbě národní politiky, abychom mohli zprostředkovávat mezi těmito skupinami a uskutečnit nejprospěšnější reformy pro národní ekonomiku. To nám pomůže zajistit pevnou politickou budoucnost pro [DEN.GetNameDef]." # todo: NEW TRANSLATION
  DEN_experimental_technology: "Experimentální technologie" # todo: NEW TRANSLATION
  DEN_experimental_technology_desc: "Jak vyvíjíme naši válečnou mašinu, měli bychom také zajistit, aby náš sektor výzkumu a vývoje pokračoval ve svých experimentálních pracích. Je nezbytné, abychom zásobovali univerzity a laboratoře financemi, které budou potřebovat k dalšímu posunu našeho rozvoje." # todo: NEW TRANSLATION
  DEN_assault_troops: "Storm Afdeling" # todo: NEW TRANSLATION
  DEN_assault_troops_desc: "Zatímco armáda zvládne držet linii a postupně zatlačovat nepřátele, právě v síle našich elitních jednotek najdeme schopnost zničit jakoukoliv hrozbu, které čelíme. Měli bychom upřednostnit jejich výcvik a zajistit, aby poslušné a disciplinované speciální síly čekaly v rezervě." # todo: NEW TRANSLATION
  DEN_prioritize_navy: "Upřednostnit Søværnet" # todo: NEW TRANSLATION
  DEN_prioritize_navy_desc: "Domovská území jsou jen malým poloostrovem, a proto je velmi důležité upřednostnit rozvoj naší čekající flotily. [DEN.GetAdjective] námořnictvo by se jednoho dne mohlo vyrovnat tomu [ENG.GetAdjective] nebo [JAP.GetAdjective], ale jen pokud do jeho zlepšení vložíme čas a peníze." # todo: NEW TRANSLATION
  DEN_prioritize_army: "Upřednostnit Hæren" # todo: NEW TRANSLATION
  DEN_prioritize_army_desc: "Základem každé armády je pozemní vojsko. Pokud nasměrujeme své zdroje do výcviku vojáků a výroby válečných strojů a vybavení, budeme více než připraveni postavit se komukoli, kdo by se odvážil ohrozit [DEN.GetNameDef]." # todo: NEW TRANSLATION
  DEN_total_war: "Total Krig" # todo: NEW TRANSLATION
  DEN_total_war_desc: "Naše současné ztráty v této válce jsou nepřijatelné. Nicméně to není konec. Musíme svolat naše jednotky a připravit se na total krig. Pokud dokážeme zatlačit nepřítele zpět a vrhnout na něj vše, co máme, můžeme mít šanci přečkat tuto bouři. Sjednoťte lid, mobilizujte poslední z našich průmyslových kapacit, musíme obstát!" # todo: NEW TRANSLATION
  DEN_military_might: "Obnovující se vojenská moc" # todo: NEW TRANSLATION
  DEN_military_might_desc: "Vojenská moc [DEN.GetNameDef] každým dnem sílí, ale vždy je prostor pro zlepšení. Zaměřme naše financování na Hæren a Flyvevåbnet, abychom zlepšili jejich výcvik a efektivitu v poli." # todo: NEW TRANSLATION
  DEN_avenging_1864: "Pomsta za rok 1864" # todo: NEW TRANSLATION
  DEN_avenging_1864_desc: "Ponížená porážka v roce 1864 poznamenala náš národ více než půl století. Je nejvyšší čas zabezpečit naše jižní hranice jednou provždy a zajistit, aby nám žádný nepřítel nikdy znovu neurčoval, jakým podmínkám se máme podřídit." # todo: NEW TRANSLATION
  DEN_dominium_maris_baltici: "Dominium Maris Baltici" # todo: NEW TRANSLATION
  DEN_dominium_maris_baltici_desc: "[ROOT.GetNameDefCap] byla kdysi nejsilnějším národem v okolí Baltského moře. Bojovali jsme s Balty, Poláky, Rusy a především se Švédy o nadvládu nad mořem. Nyní jsme připraveni jednou provždy podřídit celý region naší kontrole." # todo: NEW TRANSLATION
  DEN_establish_the_danelaw: "Danelagen" # todo: NEW TRANSLATION
  DEN_establish_the_danelaw_desc: "Byla doba, kdy naše nadvláda sahala přes Severní moře a Angličané dodržovali naše zákony. Nastal čas znovu vstát a zajistit budoucnost našeho lidu zabezpečením vln. Znovu zavedeme Danelagen a donutíme všechny ostatní země, aby nás poslouchaly!" # todo: NEW TRANSLATION
  DEN_collaboration_government: "Samarbejdsregering" # todo: NEW TRANSLATION
  DEN_collaboration_government_desc: "Podepsání mírové smlouvy a spolupráce s [?DEN.DEN_overlord_nation.GetNameDef] byla jedinou cestou, jak ušetřit náš lid zkázy a zničení. Vytvořením kolaborační vlády, která bude úzce spolupracovat s [?DEN.DEN_overlord_nation.GetAdjective] okupační silou, nám bude udělena mnohem větší nezávislost a suverenita než většině ostatních zemí v podobné situaci." # todo: NEW TRANSLATION
  DEN_seek_independence: "Usilovat o nezávislost" # todo: NEW TRANSLATION
  DEN_seek_independence_desc: "Dánská nezávislost již není zaručena, přestože spolupracujeme s [?DEN.DEN_overlord_nation.GetNameDef]. Musíme zajistit svou svobodu tím, že se postavíme okupačním silám a udeříme, když nastane vhodná chvíle." # todo: NEW TRANSLATION
  DEN_sanction_sabotages: "Schválit sabotáže" # todo: NEW TRANSLATION
  DEN_sanction_sabotages_desc: "I když spolupracujeme s [?DEN.DEN_overlord_nation.GetNameDef], neznamená to nutně, že se nemůžeme bránit okupaci mírovými prostředky. Lze tvrdit, že je naopak naší povinností vzdorovat, aniž bychom ohrozili naše obyvatele." # todo: NEW TRANSLATION
  DEN_form_the_danish_freedom_council: "Danmarks Frihedsråd" # todo: NEW TRANSLATION
  DEN_form_the_danish_freedom_council_desc: "Musíme shromáždit širokou koalici podpory od všech politických stran, které se stavějí proti okupaci [?DEN.DEN_overlord_nation.GetNameDef], a vytvořit radu. Tato Rada svobody by mohla efektivněji koordinovat různé odbojové hnutí, které povstaly po invazi, a mohla by také koordinovat případnou válku za nezávislost." # todo: NEW TRANSLATION
  DEN_arm_the_resistance: "Ozbrojit odpor" # todo: NEW TRANSLATION
  DEN_arm_the_resistance_desc: "Po zahájení okupace se objevilo množství odbojových hnutí. Pokud chceme někdy svrhnout jho [?DEN.DEN_overlord_nation.GetAdjective] útlaku, musíme tyto skupiny vyzbrojit a připravit je na den, kdy znovu vyhlásíme svou nezávislost." # todo: NEW TRANSLATION
  DEN_escalate_the_sabotages: "Zintenzivnit sabotáže" # todo: NEW TRANSLATION
  DEN_escalate_the_sabotages_desc: "Stále více je jasné, že si budeme muset znovu vybojovat svobodu. Musíme zesílit naše sabotážní akce směrem proti [?DEN.DEN_overlord_nation.GetAdjective] okupaci." # todo: NEW TRANSLATION
  DEN_expand_the_resistance: "Rozšířit odboj" # todo: NEW TRANSLATION
  DEN_expand_the_resistance_desc: "I když se od začátku okupace objevilo mnoho odbojových skupin z různých vrstev společnosti, musíme přilákat ještě více lidí do těchto skupin, pokud chceme vytlačit [?DEN.DEN_overlord_nation.GetAdjective] síly z našich zemí." # todo: NEW TRANSLATION
  DEN_declare_independence: "Vyhlásit dánskou nezávislost" # todo: NEW TRANSLATION
  DEN_declare_independence_desc: "Nastal čas znovu vyhlásit naši nezávislost a v případě potřeby za ni i bojovat!" # todo: NEW TRANSLATION
  DEN_secure_danish_freedom: "Zajistit dánskou svobodu" # todo: NEW TRANSLATION
  DEN_secure_danish_freedom_desc: "Odmítnutí [?DEN.DEN_overlord_nation.GetAdjective] sil z našich území nebude stačit k trvalému zajištění dánské svobody. Musíme zajistit, že [?DEN.DEN_overlord_nation.GetNameDef] se už nikdy nestane hrozbou." # todo: NEW TRANSLATION
  DEN_create_danforce: "Vytvořit Danforce" # todo: NEW TRANSLATION
  DEN_create_danforce_desc: "[?DEN.DEN_overlord_nation.GetNameDefCap] nám zakázal mít armádu dostatečně velkou na to, aby skutečně ohrozila jejich nadvládu. Musíme proto hledat jinde svobodný a přátelský stát, který vycvičí a zásobí jednotku schopnou podílet se na osvobození [DEN.GetNameDef] od útlaku." # todo: NEW TRANSLATION
  DEN_buy_foreign_aircraft: "Získat zahraniční letadla" # todo: NEW TRANSLATION
  DEN_buy_foreign_aircraft_desc: "Musíme posílit Dánskou brigádu získáním letadel, které by soupeřily s [?DEN.DEN_overlord_nation.GetNameDef] o nadvládu ve vzduchu nad [DEN.GetNameDef]." # todo: NEW TRANSLATION
  DEN_rigid_training: "Přísný výcvik" # todo: NEW TRANSLATION
  DEN_rigid_training_desc: "Pouhá početní převaha nám v boji o nebe nepřinese nadvládu. Musíme naše piloty podrobit přísnému výcviku, aby udrželi nebe svobodné od [?DEN.DEN_overlord_nation.GetAdjective] letadel." # todo: NEW TRANSLATION
  DEN_strengthen_the_danish_brigades: "Posílit dánské brigády" # todo: NEW TRANSLATION
  DEN_strengthen_the_danish_brigades_desc: "Nebudeme schopni vyrobit stejnou palebnou sílu, jakou má [?DEN.DEN_overlord_nation.GetNameDef], takže musíme bojovat chytře a přelstít je. Musíme studovat naše nepřátele a najít jejich slabiny, abychom je na bojišti využili." # todo: NEW TRANSLATION
  DEN_support_battalions: "Podpůrné prapory" # todo: NEW TRANSLATION
  DEN_support_battalions_desc: "Aby Dánská brigáda byla funkční silou a měla šanci osvobodit [ROOT.GetNameDef], musí mít odpovídající materiální zajištění. Pušky a kulomety jsou sice důležité, ale v dnešní době jsou nezbytné dělostřelectvo a protiletadlová podpora." # todo: NEW TRANSLATION
  DEN_expand_the_brigades: "Rozšířit brigády" # todo: NEW TRANSLATION
  DEN_expand_the_brigades_desc: "Abychom zajistili šance Dánské brigády na osvobození [ROOT.GetNameDef], musíme do jejich divizí přidat více lidí." # todo: NEW TRANSLATION
  DEN_establish_danske_flotille: "Založit Den Danske Flotille" # todo: NEW TRANSLATION
  DEN_establish_danske_flotille_desc: "Založením flotily v exilu můžeme vojáky vycvičit a pořádat námořní cvičení, která jim ostří dovednosti potřebné k osvobození našich zemí. Naše loďstvo bude čelit silnému odporu v [?DEN.DEN_overlord_nation.GetAdjective] námořnictvu a musíme získat převahu jakýmkoli způsobem." # todo: NEW TRANSLATION
  DEN_buy_foreign_ships: "Pořídit torpédoborce" # todo: NEW TRANSLATION
  DEN_buy_foreign_ships_desc: "Abychom zajistili pobřeží [DEN.GetNameDef] a četné ostrovy, musíme nejprve získat schopné loďstvo, které ochrání naše námořní trasy. Diskrétním oslovením zemí, které by mohly být k našemu osudu sympatické, bychom od nich mohli pořídit staré torpédoborce a posílit tak naše námořnictvo." # todo: NEW TRANSLATION
  DEN_align_with_foreign_powers: "Navázat spojenectví se zahraničními mocnostmi" # todo: NEW TRANSLATION
  DEN_align_with_foreign_powers_desc: "[?DEN.DEN_overlord_nation.GetNameDefCap] nevzdá ani stopu dobytého území bez boje a sami se nemůžeme postavit jejich vojenské síle. Pokud se někdy chceme zbavit okovů podřízení a získat svou svobodu zpět, musíme vyhledat potenciální spojence, kteří nám mohou v našem údělu pomoci." # todo: NEW TRANSLATION
  DEN_seek_foreign_support_tt: "Odemkne rozhodnutí: §YPožádat o podporu u zahraničních mocností§!" # todo: NEW TRANSLATION
  DEN_intel_sharing: "Sdílení zpravodajství" # todo: NEW TRANSLATION
  DEN_intel_sharing_desc: "Prohloubení spolupráce s našimi spojenci proti [?DEN.DEN_overlord_nation.GetNameDef] sdílením zpravodajských informací mezi našimi zeměmi posílí naše vazby a schopnost nakonec svrhnout [?DEN.DEN_overlord_nation.GetAdjective] útlak." # todo: NEW TRANSLATION
  DEN_ask_for_weapons: "Požádat o dodávky zbraní" # todo: NEW TRANSLATION
  DEN_ask_for_weapons_desc: "Naši [?DEN.DEN_overlord_nation.GetAdjective] nadvládci neustále vyčerpávají naše zásoby zbraní a munice, což oslabuje naši schopnost bránit se, až nastane den, kdy znovu vyhlásíme nezávislost. Můžeme požádat spojence, aby nám shozem z letadel dodali potřebné zásoby, abychom doplnili vyprázdněné sklady." # todo: NEW TRANSLATION
  DEN_buy_allied_weapons: "Pořídit zbraně od spojenců" # todo: NEW TRANSLATION
  DEN_buy_allied_weapons_desc: "Jako menší země máme omezené možnosti výroby zbrojí — a abychom zajistili naši nezávislost, musíme získat co nejlepší vybavení. Možná bychom mohli přesvědčit naše spojence, aby nám dodali potřebné zbraně v dotované dohodě." # todo: NEW TRANSLATION
  DEN_align_with_overlord: "Sblížit se s [?DEN.DEN_overlord_nation.GetNameDef]" # todo: NEW TRANSLATION
  DEN_align_with_overlord_desc: "Ačkoliv se nám podařilo udržet vysokou míru nezávislosti v naší mírové dohodě s [?DEN.DEN_overlord_nation.GetNameDef], jsme stále jen loutkou. To nám ale otevírá zajímavé možnosti. Možná, kdybychom se s [?DEN.DEN_overlord_nation.GetNameDef] sblížili, mohli bychom využít síly našeho mocnějšího ochránce a proměnit tuto porážku ve vítězství..." # todo: NEW TRANSLATION
  DEN_seek_industrial_investments: "Usilovat o průmyslové investice" # todo: NEW TRANSLATION
  DEN_seek_industrial_investments_desc: "Když jsme se s [?DEN.DEN_overlord_nation.GetNameDef] sblížili a získali si určitou důvěru a přízeň, nacházíme se v příznivé situaci, kdy můžeme požádat našeho ochránce, aby investoval do našeho průmyslu a posílil naše výrobní kapacity." # todo: NEW TRANSLATION
  DEN_pledge_allegiance: "Složit věrnost" # todo: NEW TRANSLATION
  DEN_pledge_allegiance_desc: "Abychom mohli plně využít náš vztah s [?DEN.DEN_overlord_nation.GetNameDef], musíme jim složit věrnost — nechat žádné pochybnosti o naší upřímnosti v úmyslu vytvořit symbiotické partnerství, kde obě země mohou růst a profitovat." # todo: NEW TRANSLATION
  DEN_seek_military_investments: "Požádat o vojenské investice" # todo: NEW TRANSLATION
  DEN_seek_military_investments_desc: "Po složení věrnosti a posílení vztahů s [?DEN.DEN_overlord_nation.GetNameDef] máme nyní přízeň [?DEN.DEN_overlord_nation.GetLeader]. To nám umožňuje obrátit se přímo na něj a požádat o [?DEN.DEN_overlord_nation.GetAdjective] investice do naší vojenské výroby." # todo: NEW TRANSLATION
  DEN_petition_for_independence: "Žádat o nezávislost" # todo: NEW TRANSLATION
  DEN_petition_for_independence_desc: "Plnili jsme svou roli a pomáhali našim [?DEN.DEN_overlord_nation.GetAdjective] pánům ve všech jejich počinech. Ukázali jsme se jako důvěryhodní a spolehliví, takže nastal čas požádat o nezávislost, zatímco zůstaneme loajálním spojencem [?DEN.DEN_overlord_nation.GetNameDef]." # todo: NEW TRANSLATION
  DEN_seize_the_production: "Uchopit výrobní prostředky" # todo: NEW TRANSLATION
  DEN_seize_the_production_desc: "Výjimečné časy vyžadují výjimečná opatření. Abychom dosáhli plného průmyslového potenciálu, musíme uchopit výrobní prostředky. To zajistí, že průmysl bude sloužit potřebám národa a že poběží co nejefektivněji." # todo: NEW TRANSLATION
  DEN_adjust_industrial_prioritize: "Upravit průmyslové priority" # todo: NEW TRANSLATION
  DEN_adjust_industrial_prioritize_desc: "Válka je u nás a musíme podle toho jednat tím, že upravíme naše průmyslové odvětví, aby produkovaly a přispívaly k válečnému úsilí. Každý muž a žena musí chápat a plnit svou povinnost bez stížností ve prospěch země." # todo: NEW TRANSLATION
  DEN_increase_cooperation: "Zintenzivněná spolupráce" # todo: NEW TRANSLATION
  DEN_increase_cooperation_desc: "Ačkoliv to nemusíme rádi přiznat, nikdy bychom nedokázali odolat [?DEN.DEN_overlord_nation.GetAdjective] invazi — a kapitulací jsme si zajistili určitý stupeň autonomie, jakého se žádná jiná země pod [?DEN.DEN_overlord_nation.GetAdjective] nedočkala. Proto bychom měli usilovat o bližší spolupráci s našimi ochránci, abychom tuto nezávislost zajistili a sklidili plody tohoto vztahu." # todo: NEW TRANSLATION
  DEN_acquire_military_equipment: "Získat vojenské vybavení" # todo: NEW TRANSLATION
  DEN_acquire_military_equipment_desc: "Jako menší země máme omezené možnosti výroby zbraní — ale abychom skutečně přispěli k válečnému úsilí [?DEN.DEN_overlord_nation.GetFactionName], musíme získat co nejlepší vybavení. Možná bychom mohli přesvědčit naše spojence, aby nám dodali potřebné zbraně v dotované dohodě." # todo: NEW TRANSLATION
  DEN_contribute_to_the_war: "Přispět k válečnému úsilí" # todo: NEW TRANSLATION
  DEN_contribute_to_the_war_desc: "I když jsme jasně vyjádřili svůj postoj a úmysly vůči našim [?DEN.DEN_overlord_nation.GetAdjective] ochráncům, neumožní nám dál rozvíjet naši armádu. Pouze připojením se k [?DEN.DEN_overlord_nation.GetFactionName] a složením příslibu přispívat k válečnému úsilí nám bude umožněno zlepšit armádu, námořnictvo a letectvo. A s podporou [?DEN.DEN_overlord_nation.GetNameDef] bychom mohli obrátit svůj zrak k ostatním severským zemím..." # todo: NEW TRANSLATION
  DEN_secure_the_norwegian_coast: "Zajistit norské pobřeží" # todo: NEW TRANSLATION
  DEN_secure_the_norwegian_coast_desc: "Dánsko a Norsko byly po staletí jednotné, a pokud chceme kontrolovat Severní moře nebo expandovat dál, musíme opět sjednotit naše země. Norský pobřeží je rozhodující odrazový bod, pokud chceme dominovat Atlantiku." # todo: NEW TRANSLATION
  DEN_reclaim_atlantic_islands: "Znovuzískat naše atlantické državy" # todo: NEW TRANSLATION
  DEN_reclaim_atlantic_islands_desc: "Faerské ostrovy a Island možná nemají žádné významné přírodní zdroje, přesto jsou součástí našeho království a mají zásadní strategický význam, protože slouží jako odrazový bod k ovládnutí Severního Atlantiku.\n\nGrónsko je jedinou částí našeho státu, která skutečně disponuje přírodními zdroji potřebnými k udržení moderní a efektivní armády, proto je naší nejvyšší prioritou." # todo: NEW TRANSLATION
  DEN_claim_sweden: "Nárokovat Švédsko" # todo: NEW TRANSLATION
  DEN_claim_sweden_desc: "Švédové byli kdysi našimi nejtvrdšími rivaly a po staletí se střídavě nacházeli pod naší nadvládou. Na rozdíl od Dánska má Švédsko hojnost přírodních zdrojů potřebných k provozu moderní armády. Možná nastal čas znovu začlenit Švédsko do naší sféry a zpřístupnit si tak všechny jeho zdroje..." # todo: NEW TRANSLATION
  DEN_safeguard_the_eastern_front: "Zabezpečit východní frontu" # todo: NEW TRANSLATION
  DEN_safeguard_the_eastern_front_desc: "Historicky vzato byla Finsko vždy trochu mimo náš dosah, ale s naší obnovující se mocí jsme více než schopni podrobit jej naší hegemonii. Zajištění Finska znamená zajištění našeho východního křídla a posílení naší kontroly nad Baltským mořem." # todo: NEW TRANSLATION
  DEN_sign_forsvarsforliget: "Podepsat Forsvarsforliget" # todo: NEW TRANSLATION
  DEN_sign_forsvarsforliget_desc: "S opět rostoucím napětím v Evropě musíme přiznat, že naše současné obranné schopnosti jsou vážně nedostatečné. Podepsání nové obranné dohody zvyšující financování pozemních sil, námořnictva a letectva by posílilo naši vojenskou schopnost a zajistilo integritu našeho národa." # todo: NEW TRANSLATION
  DEN_stockpile_oil: "Naskladnit ropu" # todo: NEW TRANSLATION
  DEN_stockpile_oil_desc: "Musíme být připraveni na nejhorší a začít se připravovat na válku. I kdybychom nikdy neviděli boj, bude nás silný konflikt v našem okolí ovlivňovat. Abychom minimalizovali tento dopad, potřebujeme shromáždit velké rezervy strategických surovin." # todo: NEW TRANSLATION
  DEN_potential_fuel_silos_tt: "Po výzkumu §YSkladu paliva§! přidejte §G1§! stavebních slotů a §G1§! §YSilo na palivo§! ve §Y2§! provinciích." # todo: NEW TRANSLATION
  DEN_sikkerhedspolitiet: "Sikkerhedspolitiet" # todo: NEW TRANSLATION
  DEN_sikkerhedspolitiet_desc: "Zřízení zpravodajské služby by nám pomohlo zvýšit bdělost, zatímco napětí v Evropě narůstá a konflikt ohrožuje naši svrchovanost." # todo: NEW TRANSLATION
  DEN_expand_vaernepligten: "Rozšířit Værnepligten" # todo: NEW TRANSLATION
  DEN_expand_vaernepligten_desc: "Naše armáda je sotva symbolickou silou, naprosto neschopnou odstrašit případné agresory. Pokud má poskytnout skutečnou obranu národa, musíme rychle rozšířit povinnou vojenskou službu." # todo: NEW TRANSLATION
  DEN_haeren_reorganization: "Reorganizace Hæren" # todo: NEW TRANSLATION
  DEN_haeren_reorganization_desc: "Dánská armáda je malá a zcela nepřipravená bránit naše hranice. Musí být reorganizována do efektivní bojové síly s účinným centrálním velením, aby udržela naši nezávislost a odradila potenciální nepřátele." # todo: NEW TRANSLATION
  DEN_expand_haerens_tekniske_korps: "Rozšířit Hærens Tekniske Korps" # todo: NEW TRANSLATION
  DEN_expand_haerens_tekniske_korps_desc: "Technický sbor armády provozuje Zbrojní arzenál a Hærens Geværfabrik, které vyrábějí zbraně i munici. Rozšíření těchto zařízení by zvýšilo výrobu pušek a dělostřelectva, což by samozřejmě posílilo naše vojenské schopnosti." # todo: NEW TRANSLATION
  DEN_hjemmevaernet: "Hjemmeværnet" # todo: NEW TRANSLATION
  DEN_hjemmevaernet_desc: "Existuje mnoho lidí připravených povstat a bránit Dánsko před jakýmkoli agresorem. Měli bychom využít bojového ducha těchto lidí založením domobrany — pro případ, že by se někdo opovážil nás napadnout." # todo: NEW TRANSLATION
  DEN_expand_dansk_industri_syndikat: "Rozšířit Dansk Industri Syndikat" # todo: NEW TRANSLATION
  DEN_expand_dansk_industri_syndikat_desc: "Dansk Industri Syndikat, či Riffelsyndikatet jak je běžně nazýván, je největší výrobce zbraní v zemi a vyrábí naše armádní pušky Madsen. Investice do a rozšíření jejich továren je záležitostí nejvyššího státního bezpečí." # todo: NEW TRANSLATION
  DEN_new_artillery_tactics: "Nové dělostřelecké taktiky" # todo: NEW TRANSLATION
  DEN_new_artillery_tactics_desc: "Hærens Tekniske Korps dnes vyrábí zbraně, dělostřelectvo a munici. Založením experimentální divize v rámci Hærens Tekniske Korps bychom však mohli navrhovat a vyrábět vlastní dělostřelectvo, z čehož by armáda značně profitovala." # todo: NEW TRANSLATION
  DEN_convert_automobile_production: "Přesměrovat výrobu automobilů" # todo: NEW TRANSLATION
  DEN_convert_automobile_production_desc: "Nastal čas přikázat dánským výrobcům automobilů, aby převedli své civilní výrobní linky, aby přispívaly k válečnému úsilí a podpořily naše obranné schopnosti. Zajištění vlastní výroby nákladních vozů a vyšší mechanizace armády by ji učinilo pohyblivější a flexibilnější." # todo: NEW TRANSLATION
  DEN_slaedepatruljen_sirius: "Slædepatruljen Sirius" # todo: NEW TRANSLATION
  DEN_slaedepatruljen_sirius_desc: "Pevninské Dánsko má v zimě velmi málo sněhu a zřídka vydrží dlouho. Máme však Grónsko, kde je sníh po celý rok silný několik kilometrů. Můžeme toho využít a cvičit tam naše jednotky, aby si zvykly na chlad." # todo: NEW TRANSLATION
  DEN_generalkommandoen: "Generalkommandoen " # todo: NEW TRANSLATION
  DEN_generalkommandoen_desc: "Dobře vycvičení, disciplinovaní a efektivní důstojníci jsou základem úspěšné armády. Měli bychom si klást za cíl vyprodukovat nejefektivnější a nejkompetentnější důstojníky na světě a naplnit jimi generální štáb." # todo: NEW TRANSLATION
  DEN_establish_domestic_tank_manufacturing: "Zřídit domácí výrobu tanků" # todo: NEW TRANSLATION
  DEN_establish_domestic_tank_manufacturing_desc: "Válečnictví se ve 20. století výrazně změnilo — a my se musíme změnit s ním. Rychle se pohybující a silně útočná armáda je dnes klíčem k vítězným bitvám. Zajištění vlastní dodávky tanků zajistí úspěch na moderním bojišti." # todo: NEW TRANSLATION
  DEN_expand_ubadsvabnet: "Rozšířit Ubådsvåbnet" # todo: NEW TRANSLATION
  DEN_expand_ubadsvabnet_desc: "Nejlepší ochranou našeho pobřeží a mnoha ostrovů je ta, kterou nepřítel nevidí. Vlastnit velké ponorkové loďstvo nám umožní udeřit bez povšimnutí a stáhnout naše síly bez ztrát." # todo: NEW TRANSLATION
  DEN_add_basic_submarine_tech_tt: "Přidat technologii: §YTřída Havmanden§!" # todo: NEW TRANSLATION
  DEN_refit_civilian_ships: "Přestavět staré lodě" # todo: NEW TRANSLATION
  DEN_refit_civilian_ships_desc: "Jsme obklopeni zeměmi, které mají mnohem větší námořnictvo než my. Pokud chceme dohnat jejich schopnosti, musíme zvýšit naše počty. S dostatečným množstvím lodí budeme schopni odolat většině námořních sil." # todo: NEW TRANSLATION
  DEN_refit_civilian_ships_decision_tt: "Odemkne rozhodnutí pro přestavbu konvojů pro vojenské účely." # todo: NEW TRANSLATION
  DEN_modernize_the_navy: "Modernizovat námořnictvo" # todo: NEW TRANSLATION
  DEN_modernize_the_navy_desc: "Pokud chceme dnes stát bok po boku s nejlepšími námořnictvy, musíme usilovat o kvalitu před kvantitou. Počty nám nepomohou, pokud budeme technicky zaostávat a budeme přestříleni či přelstěni modernějšími loděmi." # todo: NEW TRANSLATION
  DEN_sovaernets_operative_kommando: "Søværnets Operative Kommando" # todo: NEW TRANSLATION
  DEN_sovaernets_operative_kommando_desc: "Potřebujeme kompetentní centrální velení, které dokáže efektivně koordinovat naše námořnictvo. Jen nejlepší a nejbystřejší důstojníci by měli být tomuto úkolu svěřeni." # todo: NEW TRANSLATION
  DEN_appropriate_odense_staalskibsvaerft: "Zajmout Odense Staalskibsværft" # todo: NEW TRANSLATION
  DEN_appropriate_odense_staalskibsvaerft_desc: "Abychom skutečně rozšířili velikost našeho námořnictva, potřebujeme dodatečné výrobní kapacity. Obsazení loděnic A.P. Møller-Mærsk v Odense by výrazně zrychlilo naše výrobní možnosti." # todo: NEW TRANSLATION
  DEN_restructuring_sovaernet: "Restrukturalizace Søværnet" # todo: NEW TRANSLATION
  DEN_restructuring_sovaernet_desc: "Po tak dlouhé době míru zůstalo v naší námořní velení mnoho chyb nepovšimnutých. Jediným způsobem, jak se s nimi nyní vypořádat, je úplná reorganizace Søværnet." # todo: NEW TRANSLATION
  DEN_baltic_sea_domination: "Nadvláda nad Baltským mořem" # todo: NEW TRANSLATION
  DEN_baltic_sea_domination_desc: "Před vzestupem ruského impéria, a dokonce před krátce žijícím švédským impériem, se Dánsko snažilo ovládnout Baltské moře. Abychom skutečně zajistili naši nezávislost a ochránili naše domovy, musíme znovu usilovat o kontrolu celého Baltského moře prostřednictvím námořní nadvlády." # todo: NEW TRANSLATION
  DEN_north_sea_ambitions: "Ambice na Severním moři" # todo: NEW TRANSLATION
  DEN_north_sea_ambitions_desc: "Jsme rozlehlý národ, od evropských břehů až po vody Severního Atlantského oceánu. Abychom ochránili tuto rozsáhlou říši a zajistili naše zámořské teritorium, musíme se pustit do odvážného a ambiciózního plánu. Vytvoření flotily pro Severní moře, která může konkurovat jakékoliv moci, která nám stojí v cestě, musí být naším jediným cílem." # todo: NEW TRANSLATION
  DEN_with_refit_old_ships_completed_tt: "Po dokončení §Y$DEN_refit_civilian_ships$§!:" # todo: NEW TRANSLATION
  DEN_with_modernize_the_navy_completed_tt: "\nPo dokončení §Y$DEN_modernize_the_navy$§!:" # todo: NEW TRANSLATION
  DEN_naval_power_projection: "Projekce námořní síly" # todo: NEW TRANSLATION
  DEN_naval_power_projection_desc: "Mít velké a mocné námořnictvo by bylo k ničemu, pokud by nedokázalo promítnout naši vůli do každého kouta naší říše. Propojení naší domény řetězcem námořních základen upevní naši nadvládu přes vody." # todo: NEW TRANSLATION
  DEN_baltic_sea_domination_completed_tt: "Dokončil fokus §Y$DEN_baltic_sea_domination$§! a [DEN.GetNameDef] vlastní" # todo: NEW TRANSLATION
  DEN_north_sea_ambitions_completed_tt: "Dokončil fokus §Y$DEN_north_sea_ambitions$§! a [DEN.GetNameDefCap] vlastní" # todo: NEW TRANSLATION
  DEN_fromandskorpset: "Frømandskorpset" # todo: NEW TRANSLATION
  DEN_fromandskorpset_desc: "Nedávná zlepšení jak armády, tak námořnictva významně posílila naše ozbrojené síly. Jsme více než schopni promítat naši moc daleko a široko, přes vody až na cizí pobřeží — pokud si to přejeme." # todo: NEW TRANSLATION
  DEN_domestic_designs: "Domácí návrhy" # todo: NEW TRANSLATION
  DEN_domestic_designs_desc: "Naše letectvo má vážné nedostatky ve schopnostech. To vychází především z toho, že nevyrábíme vlastní letadla, a proto nemáme dostatečný počet k boji, pokud by to přišlo na nejhorší. Musíme založit domácí výrobní linku pro naše vlastní letouny." # todo: NEW TRANSLATION
  DEN_foreign_designs: "Zahraniční návrhy" # todo: NEW TRANSLATION
  DEN_foreign_designs_desc: "Žádné z našich dvou letectev nemá schopnost navrhnout a postavit funkční stíhačku či bombardér. Měli bychom se obrátit jinde pro nákup letadel. Pokud nás návrh uspokojí, můžeme uvažovat o získání výrobní licence. " # todo: NEW TRANSLATION
  DEN_unify_flyvevabnet: "Sjednotit Flyvevåbnet" # todo: NEW TRANSLATION
  DEN_unify_flyvevabnet_desc: "V současnosti máme dvě odlišná a zcela oddělená letectva; armádní Hærens Flyvertropper a námořní Marinens Flyvevæsen. Obě větve jsou často v rozporu. Jejich sjednocení do jedné letecké jednotky by vytvořilo soudržnou strategii a založilo novou složku ozbrojených sil." # todo: NEW TRANSLATION
  DEN_flyvertaktisk_kommando: "Flyvertaktisk Kommando" # todo: NEW TRANSLATION
  DEN_flyvertaktisk_kommando_desc: "Sjednocení obou větví letectva do jedné jednotky nestačí. Aby byla tato nová vojenská složka co nejefektivnější a nejvíce soudržná, musíme vytvořit centrální velení, které bude schopné letectvo řádně koordinovat." # todo: NEW TRANSLATION
  DEN_air_force_power_projection: "Projekce síly letectva" # todo: NEW TRANSLATION
  DEN_air_force_power_projection_desc: "Nyní, když jsme sjednotili Flyvevåbnet do třetí hlavní složky našich ozbrojených sil, se můžeme soustředit na zajištění nebes nad naší rozlehlou říší. Velké a úspěšné letectvo je stále závislé na leteckých základnách, odkud může přistávat a odstartovat." # todo: NEW TRANSLATION
  DEN_flyveskolen: "Flyveskolen" # todo: NEW TRANSLATION
  DEN_flyveskolen_desc: "Po shromáždění všech našich leteckých dovedností a znalostí ve Flyvevåbnet bychom měli rozšířit tuto odbornost na začínající kadety vytvořením společné výcvikové školy." # todo: NEW TRANSLATION
  DEN_torpedofly: "Torpedofly" # todo: NEW TRANSLATION
  DEN_torpedofly_desc: "Jediný způsob, jak si udržet naše zámořské državy, je schopnost promítat naši moc a vůli přes vody. To bude vyžadovat rozsáhlou koordinaci a strategii mezi námořnictvem a letectvem." # todo: NEW TRANSLATION
  DEN_jagerfly: "Jagerfly" # todo: NEW TRANSLATION
  DEN_jagerfly_desc: "Abychom ochránili naše města před ničivými nálety ze vzduchu, musíme soustředit letecké zdroje na vytváření co nejlepších stíhaček, jaké dokážeme." # todo: NEW TRANSLATION
  DEN_luftstotte: "Luftstøtte" # todo: NEW TRANSLATION
  DEN_luftstotte_desc: "Nejlepší využití našeho letectva je co nejlépe podporovat naše pozemní jednotky. Letecká síla se stala ve válčení extrémně důležitou, ale války se stále vyhrávají na zemi." # todo: NEW TRANSLATION
  DEN_bombefly: "Bombefly" # todo: NEW TRANSLATION
  DEN_bombefly_desc: "Jediným způsobem, jak udržet [DEN.GetNameDef] zcela v bezpečí, je schopnost bombardovat a zničit průmyslové kapacity našeho nepřítele." # todo: NEW TRANSLATION
  DEN_advanced_flight: "Pokročilé letectví" # todo: NEW TRANSLATION
  DEN_advanced_flight_desc: "Letecký průmysl zaznamenal v posledních letech rychlý pokrok, ale čeká nás ještě více inovací a vylepšení. Abychom skutečně dominovali nebem, musíme vést technologický pokrok!" # todo: NEW TRANSLATION
