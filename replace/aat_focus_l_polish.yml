  FIN_finnish_supremacy_in_the_north_unlock_decisions_tt: "Odemkne rozhodnutí §YTlačit na vládu§! a §YPodporovat ideologická shromáždění§! v nordických a pobaltských zemích." # todo: NEW TRANSLATION
