  FIN_cw_soviet_commandos_tt: "- Sovětští komanda jednotky, se 6 §YInfanterijními§! prapory, 2 §YDělostřeleckými§! prapory a 4 §YPodpůrnými prapory§!, §Gse zformují v našem hlavním státě§!.\n\n" # todo: NEW TRANSLATION
  FIN_heimosodat_dec_tt: "Odemkne rozhodnutí §Y$FIN_the_last_kinship_war$§! k §Y$FIN_stir_anti_soviet_sentiment_in_karelia$§! ve státech ovládaných SOV: §Y[215.GetName]§! a §Y[216.GetName]§!, a k §Y$FIN_instigate_a_new_karelian_uprising$§! proti [SOV.GetNameDef].\n\n" # todo: NEW TRANSLATION
  FIN_tactical_wargaming_department_every_army_leader_tt: "§YKaždý velitelský generál§! (včetně odemčených): \n  Přidat plánovací dovednost: §G1§!" # todo: NEW TRANSLATION
