l_polish:
  FIN_suomalainen_sosialismi: "Suomalainen Sosialismi" # todo: NEW TRANSLATION
  FIN_suomalainen_sosialismi_desc: "Špatné břemeno kapitalismu nadále prostupuje naší společností kvůli protirevolučnímu zničení, které během občanské války rozpoutal Mannerheim a jeho spojenci. To nesmíme nechat takto — musíme najít způsob, jak osvobodit dělnickou třídu." # todo: NEW TRANSLATION
  FIN_towards_a_red_government: "Ke Rudé vládě" # todo: NEW TRANSLATION
  FIN_towards_a_red_government_desc: "Když v roce 1918 národ zasáhla vlna dělnické revoluce, proletariát byl zrazen reakčními silami Mannerheima a jeho německých spojenců. Nastal čas pomstít naše padlé soudruhy a konečně vytvořit dělnickou republiku, jaká měla být od počátku." # todo: NEW TRANSLATION
  FIN_the_second_finnish_civil_war: "Druhá finská občanská válka" # todo: NEW TRANSLATION
  FIN_the_second_finnish_civil_war_desc: "Díky rozšíření třídního vědomí mezi rostoucím proletariátem a organizačním schopnostem jeho vůdců jsme konečně shromáždili prostředky, abychom svrhli naše buržoazní pány jednou provždy." # todo: NEW TRANSLATION
  FIN_the_peoples_democratic_league: "Lidová demokratická liga" # todo: NEW TRANSLATION
  FIN_the_peoples_democratic_league_desc: "Lidová demokratická liga stojí v čele koordinace různých levicových frakcí v [FIN.GetNameDef]. Vytvořili základy skutečného dělnického spolku, který zajistí prosazení vůle proletariátu." # todo: NEW TRANSLATION
  FIN_cooperate_with_social_democrats: "Spolupracovat se sociálními demokraty" # todo: NEW TRANSLATION
  FIN_cooperate_with_social_democrats_desc: "Ačkoliv jsou zjevně na omylu ve své ochotě kompromisů s kapitalisty, nemůžeme popřít, že sociální demokraté mají značnou podporu mezi proletariátem a mnozí jejich vůdci jsou odborníci ve svých oborech. Měli bychom více spolupracovat při budování naší dělnické republiky." # todo: NEW TRANSLATION
  FIN_the_workers_state: "Dělnický stát" # todo: NEW TRANSLATION
  FIN_the_workers_state_desc: "S jistě ustanovenou diktaturou proletariátu můžeme přistoupit k přetvoření národa tak, aby zájmy proletariátu stály v čele politiky. Všechno od způsobu, jak vychováváme naše děti, po organizaci továren bude kompletně přestavěno." # todo: NEW TRANSLATION
  FIN_the_red_watch: "Rudá stráž" # todo: NEW TRANSLATION
  FIN_the_red_watch_desc: "Existují ti, kdo by podkopali vše, co jsme od občanské války vytvořili, aby znovu nastolili kapitalistickou tyranii. Založením Rudých gard zajistíme, že taková zrádná činnost bude odhalena, než se rozšíří po republice." # todo: NEW TRANSLATION
  FIN_approach_the_soviets: "Navázat kontakt se Sověty" # todo: NEW TRANSLATION
  FIN_approach_the_soviets_desc: "Naši soudruzi v [SOU.GetNameDef] stojí v čele proletářského boje proti buržoaznímu imperialismu. Měli bychom oslovit jejich vedení a pokusit se získat podporu pro náš boj proti buržoazii v [FIN.GetNameDef]." # todo: NEW TRANSLATION
  FIN_antagonize_the_soviets: "Provokovat Sověty" # todo: NEW TRANSLATION
  FIN_antagonize_the_soviets_desc: "[SOU.GetNameDefCap] se může oblékat do rétoriky socialismu, ale není to dělnský ráj. Najdeme vlastní cestu ke zlepšení života dělníků a nebudeme spolupracovat s [SOV.GetAdjective] hrozbou." # todo: NEW TRANSLATION
  FIN_finno_soviet_pact: "Finno-sovětský pakt" # todo: NEW TRANSLATION
  FIN_finno_soviet_pact_desc: "Historické křivdy stranou, [SOU.GetAdjective] lid se ukázal být cenným spojencem v boji za socialismus. Je čas formálně sjednat dohodu mezi našimi vládami v přípravě na nevyhnutelný nápor reakční Evropy." # todo: NEW TRANSLATION
  FIN_subsidized_national_industrialization: "Dotovaná národní industrializace" # todo: NEW TRANSLATION
  FIN_subsidized_national_industrialization_desc: "[SOU.GetNameDef] učinil velké pokroky v masové mobilizaci výrobních sil prostřednictvím industrializace. Možná bychom měli požádat jejich odborníky o pomoc při zavádění podobného programu ve Finsku." # todo: NEW TRANSLATION
  FIN_finnish_learned_societies: "Finské učené společnosti" # todo: NEW TRANSLATION
  FIN_finnish_learned_societies_desc: "Zatímco mnoho intelektuálů uprchlo do zahraničí, zůstává značný počet těch, kteří měli moudrost přijmout socialistické myšlení. Měli bychom tyto intelektuály povýšit investicemi do jejich výzkumu." # todo: NEW TRANSLATION
  FIN_finnish_federation_of_trade_unions: "Finský svaz odborů" # todo: NEW TRANSLATION
  FIN_finnish_federation_of_trade_unions_desc: "Odbory představují skutečné pány průmyslu — dělníky. Spoluprací se svazem odborů můžeme přeuspořádat celou ekonomiku ku prospěchu dělnické třídy." # todo: NEW TRANSLATION
  FIN_defensive_preparations: "Obranné přípravy" # todo: NEW TRANSLATION
  FIN_defensive_preparations_desc: "Bez ohledu na ideologii se zdá, že jsme předurčeni ke konfliktu s naším východním sousedem. Musíme se připravit na nevyhnutelné a rychle rozšířit naše obrany. Pokud selžeme, náš národ může být opět pohlcen nepřáteli." # todo: NEW TRANSLATION
  FIN_trade_agreements: "Obchodní dohody" # todo: NEW TRANSLATION
  FIN_trade_agreements_desc: "Ačkoliv ne vždy podporují naše domácí politická rozhodnutí, existuje mnoho států, které by uzavřely obchodní dohody na podporu naší vojenské modernizace — především abychom oslabili bezpečnost našich méně sympatických sousedů." # todo: NEW TRANSLATION
  FIN_finno_estonian_union: "Finnsko-estonská unie" # todo: NEW TRANSLATION
  FIN_finno_estonian_union_desc: "S Estonci sdílíme dlouhou historii; bolí nás je vidět uvězněné mezi velmocemi, čekající, až se jejich domov stane dalším bojištěm v mezinárodním boji. Možná je unie zachrání před takovým osudem." # todo: NEW TRANSLATION
  FIN_social_democracy: "Sociální demokracie" # todo: NEW TRANSLATION
  FIN_social_democracy_desc: "Viděli jsme selhání a hrůzy, které plynnou, když je národ postižen revolucí bolševického typu. Pokud chceme vytvořit trvalou společnost ku prospěchu dělníků, musí to být demokratickými, poklidnými prostředky, kde to jen půjde." # todo: NEW TRANSLATION
  FIN_pragmatic_socialism: "Pragmatický socialismus" # todo: NEW TRANSLATION
  FIN_pragmatic_socialism_desc: "Ačkoliv pohrdáme metodami bolševiků a jim podobných, nepopíráme, že je třeba víc pro osvobození dělnické třídy od hrůz moderního kapitalismu. Pečlivou aplikací demokratického, pragmatického socialismu toho dosáhneme." # todo: NEW TRANSLATION
  FIN_sosialistinen_eduskuntaryhma: "Sosialistinen Eduskuntaryhmä" # todo: NEW TRANSLATION
  FIN_sosialistinen_eduskuntaryhma_desc: "Sociální parlamentní skupina lobuje za sblížení s [SOU.GetNameDef] místo antagonizace. Jejich návrhy mohou nabídnout nejlepší naději na zachování naší vlastní formy socialismu bez vměšování [SOU.GetAdjective]ů." # todo: NEW TRANSLATION
  FIN_social_democratic_womens_union: "Svaz sociálně demokratických žen" # todo: NEW TRANSLATION
  FIN_social_democratic_womens_union_desc: "Postavení žen ve společnosti bylo od nepaměti opomíjeno. Zapojením Svazu sociálně demokratických žen hlouběji do vlády můžeme konečně řešit jejich problémy a vytvořit spravedlivější společnost pro všechny." # todo: NEW TRANSLATION
  FIN_mineral_wealth: "Minerální bohatství" # todo: NEW TRANSLATION
  FIN_mineral_wealth_desc: "[ROOT.GetNameDefCap] má hojnost nerostných surovin, které zůstávají nevyužité. Pokud chceme udržet důvěryhodné ozbrojené síly, měli bychom tyto zdroje využít a zlepšit naši ekonomickou soběstačnost." # todo: NEW TRANSLATION
  FIN_funds_from_kalevala_koru_oy: "Prostředky od Kalevala Koru Oy" # todo: NEW TRANSLATION
  FIN_funds_from_kalevala_koru_oy_desc: "Kalevala Koru Oy, výrobce jemných šperků založený členy Svazu sociálně demokratických žen, se stal velkým úspěchem. Využitím jejich odbornosti můžeme posílit naši ekonomiku a použít bohatství k financování dalších iniciativ." # todo: NEW TRANSLATION
  FIN_join_the_comintern: "Připojit se k [GetSovietFactionForFinland]" # todo: NEW TRANSLATION
  FIN_join_the_comintern_desc: "Musíme odmítnout zastaralé představy nacionalismu a s nimi spojené křivdy a spolupracovat s [SOU.GetNameDef]. Společně můžeme pomoci obrátit příliv proti reakčním silám Evropy a zároveň zajistit naši vlastní budoucnost." # todo: NEW TRANSLATION
  FIN_finnish_influence_in_the_baltic: "Finský vliv v Baltském moři" # todo: NEW TRANSLATION
  FIN_finnish_influence_in_the_baltic_desc: "Kolektivní bezpečnost Baltského regionu závisí na tom, že my, podobně smýšlející, budeme spolupracovat a zajistíme, aby všichni udržovali důvěryhodnou obranu proti agresi. Proto bychom měli zajistit, že sousedé táhnou za stejný konec." # todo: NEW TRANSLATION
  FIN_approach_major_democracies: "Oslovit hlavní demokracie" # todo: NEW TRANSLATION
  FIN_approach_major_democracies_desc: "Máme společný zájem s liberálními demokraciemi světa, které chtějí omezit rostoucí vliv agresivnějších aktérů v geopolitice. Možná můžeme spolupracovat na tomto společném cíli." # todo: NEW TRANSLATION
  FIN_finnish_autonomy: "Finská autonomie" # todo: NEW TRANSLATION
  FIN_finnish_autonomy_desc: "I někteří nejoddanější komunisti u nás se obávali, že spolupráce s [SOU.GetNameDef] povede k faktické ruské dominanci naší politiky. Avšak pečlivou diplomacií jsme dosáhli porozumění s našimi spojenci, které zabezpečuje naši autonomii." # todo: NEW TRANSLATION
  FIN_integrate_kola_and_karelia: "Integrovat Kolu a Karelii" # todo: NEW TRANSLATION
  FIN_integrate_kola_and_karelia_desc: "Ač jsme vytvořili silné vztahy se [SOU.GetAdjective]mi soudruhy, hranicní spory nad nimi visí jako chmura. Možná bychom měli vyjasnit situaci a konečně tyto otázky vyřešit jako spojenci, ne nepřátelé." # todo: NEW TRANSLATION
  FIN_keepers_of_the_baltic_countries: "Strážci baltských zemí" # todo: NEW TRANSLATION
  FIN_keepers_of_the_baltic_countries_desc: "Národy Baltského moře nemají zájem být pohlceny [GER.GetNameDef] nebo [SOU.GetNameDef]. Jen my, s naší sdílenou historií a pohledem, můžeme tyto státy vést pokojně způsobem, který je nevyhladí." # todo: NEW TRANSLATION
  FIN_british_threat: "Britská hrozba" # todo: NEW TRANSLATION
  FIN_british_threat_desc: "[ENG.GetNameDefCap] je srdcem globálního buržoazního hospodářství a jeho imperialistických chapadel. Musíme vrazit dýku do toho srdce, aby svět konečně osvobodil od jeho útlaku." # todo: NEW TRANSLATION
  FIN_red_finland: "Rudé Finsko" # todo: NEW TRANSLATION
  FIN_red_finland_desc: "Pomstili jsme naše soudruhy, kteří padli při Bílé teroru, vytvořením skutečné dělnické republiky. Nyní zbývá jen zajistit, co jsme dosáhli, proti těm za našimi hranicemi, kteří by to chtěli zničit." # todo: NEW TRANSLATION
  FIN_united_under_the_north_star: "Sjednoceni pod Polární hvězdou" # todo: NEW TRANSLATION
  FIN_united_under_the_north_star_desc: "Naši nordičtí přátelé a soudruzi jsou na milost imperialistickým mocnostem, kterým je region lhostejný. Ale společně můžeme zajistit mír pro náš lid vytvořením aliance, která odradí i nejsilnější říše." # todo: NEW TRANSLATION
  FIN_preserve_sapmi: "Zachovat Sápmi" # todo: NEW TRANSLATION
  FIN_preserve_sapmi_desc: "Lidé Sámi dlouho trpěli útlakem imperialistických mocností, jak v rámci našich hranic, tak mimo ně. Měli bychom s těmito lidmi usmířit a pomoci je osvobodit od pokračujícího utrpení na rukou našich sousedů." # todo: NEW TRANSLATION
  FIN_confederated_finno_russian_republics_desc: "Pod naší správou nyní spadá mnoho různých národů. Abychom zabránili vytvoření hierarchie národů uvnitř státu, reorganizujeme vládu jako konfederaci republik. To umožní všem lidem spravedlivě se podílet na vládnutí." # todo: NEW TRANSLATION
  FIN_secure_the_baltic_sea: "Zajistit Baltské moře" # todo: NEW TRANSLATION
  FIN_secure_the_baltic_sea_desc: "Zatímco se často zaměřujeme na pozemní hranice a jejich obranu, nesmíme zneužít své úsilí zanedbáním zranitelnosti našeho pobřeží. Musíme proto investovat do masivního programu pobřežní obrany, abychom ochránili tento bok." # todo: NEW TRANSLATION
  FIN_german_threat: "Německá hrozba" # todo: NEW TRANSLATION
  FIN_german_threat_desc: "Pruský militarismus znovu zvedá ošklivou hlavu v [GER.Capital.GetCapitalVictoryPointName]. Zatímco jiní jsou spokojeni, že evropské metropole stlačí bota [GER.GetLeader], my ne. Je čas jednou provždy vyřešit tuto hrozbu míru." # todo: NEW TRANSLATION
  FIN_socialist_welfare: "Sociální blahobyt" # todo: NEW TRANSLATION
  FIN_socialist_welfare_desc: "Pečlivým řízením ekonomiky a obranou národa máme nyní prostředky odměnit pracující lidi vytvořením skutečného sociálního státu. Zajistíme, že náš lid bude žít dlouhý a šťastný život." # todo: NEW TRANSLATION
  FIN_aid_for_entrepreneurs: "Pomoc podnikatelům" # todo: NEW TRANSLATION
  FIN_aid_for_entrepreneurs_desc: "Ačkoliv musíme omezit nejhorší prvky kapitalismu, naše ekonomika by mohla značně prospěch z vyšší podnikatelské aktivity. Založením investičních grantů a půjček pro klíčová odvětví tuto aktivitu podpoříme." # todo: NEW TRANSLATION
  FIN_soviet_threat: "Sovětská hrozba" # todo: NEW TRANSLATION
  FIN_soviet_threat_desc: "[SOU.GetNameDefCap] je hrozbou pro životy pracujících po celém světě, nebude váhat je vrhnout do dobývací války. Než nabyde příliš velké síly, musíme tuto hrozbu ukončit nyní." # todo: NEW TRANSLATION
  FIN_proclaim_greater_finland: "Vyhlásit Velkou finskou federaci" # todo: NEW TRANSLATION
  FIN_proclaim_greater_finland_desc: "Naše hranice nyní přesahují, co jsme si před pár lety dokázali představit. S tolika novým územím je nutné reorganizovat vládu tak, aby lépe odrážela různorodý region, který spravuje." # todo: NEW TRANSLATION
  FIN_control_the_flux_of_iron_ore: "Ovládnout tok železné rudy" # todo: NEW TRANSLATION
  FIN_control_the_flux_of_iron_ore_desc: "Švédská železná ruda a norská distribuce nadále fungují jako mechanismus, jímž se vedou války po kontinentu i dál. Musíme převzít kontrolu nad tímto klíčovým tokem zdrojů dříve, než padne do rukou našich nepřátel." # todo: NEW TRANSLATION
  FIN_finnish_neutrality: "Finská neutralita" # todo: NEW TRANSLATION
  FIN_finnish_neutrality_desc: "Sílu a odhodlání našeho lidu bojovat za svobodu nelze vymazat. Měli bychom však sledovat politiku neutrality, aby naši sousedé neměli důvod zmařit naše těžce vybojované nezávislosti." # todo: NEW TRANSLATION
  FIN_the_finnish_swedish_peoples_party: "Finská švédská lidová strana" # todo: NEW TRANSLATION
  FIN_the_finnish_swedish_peoples_party_desc: "Lidé švédského původu tvoří podstatnou menšinu ve Finsku; spolupráce s stranou, která nejdůrazněji zastupuje jejich zájmy, nám může přinést značnou podporu pro naše politiky a získat přízeň Švédska." # todo: NEW TRANSLATION
  FIN_align_the_agrarian_league: "Sblížit se s Agrární ligou" # todo: NEW TRANSLATION
  FIN_align_the_agrarian_league_desc: "[ROOT.GetNameDefCap] prošel pozoruhodnou industrializací za poslední století; nebudeme přehlížet bídu milionů, kteří zásobují národ potravinami. Spoluprací s Agrární ligou zajistíme, že jejich obavy budou řešeny stejně jako obavy městských obyvatel." # todo: NEW TRANSLATION
  FIN_political_unity: "Politická jednota" # todo: NEW TRANSLATION
  FIN_political_unity_desc: "Bez ohledu na politickou ideologii všichni chceme to nejlepší pro náš lid. V této době krize musíme odložit maličkosti a pracovat společně." # todo: NEW TRANSLATION
  FIN_collaboration_with_the_left: "Spolupráce s levicí" # todo: NEW TRANSLATION
  FIN_collaboration_with_the_left_desc: "Odstavení stran na levici příliš nepomůže vládě. Pokud najdeme způsob spolupráce, můžeme získat větší část populace pro náš cíl." # todo: NEW TRANSLATION
  FIN_railways_and_infrastructure: "Železnice a infrastruktura" # todo: NEW TRANSLATION
  FIN_railways_and_infrastructure_desc: "Velká válka ukázala nutnost robustních železničních a silničních sítí, které podporují průmysl a armádu v přepravě zdrojů a lidí tam, kde jsou potřeba. Po desetiletích okupace a krveprolití naše logistické sítě zoufale potřebují investice." # todo: NEW TRANSLATION
  FIN_repurpose_small_industries: "Přesměrovat malé průmysly" # todo: NEW TRANSLATION
  FIN_repurpose_small_industries_desc: "Nemáme obrovské průmyslové závody velmocí, ale máme řadu menších továren. Místo začínání od nuly bychom tyto malé provozy přestavěli pro válečnou výrobu." # todo: NEW TRANSLATION
  FIN_expand_state_military_factories: "Rozšířit státní vojenské továrny" # todo: NEW TRANSLATION
  FIN_expand_state_military_factories_desc: "Naše státem řízené továrny nestačí poptávce armády v této krizi. Pokud chceme udržet zásobovací linky, musíme rozšířit výrobní kapacity." # todo: NEW TRANSLATION
  FIN_a_new_course_for_kokoomus: "Nový kurz pro Kokoomus" # todo: NEW TRANSLATION
  FIN_a_new_course_for_kokoomus_desc: "Nedávné události vedly k nárůstu podpory strany Kokoomus, protože lidé hledají pevné, rozumné vedení a návrat k tradičním hodnotám. Měli bychom toho využít prosazením konzervativní agendy strany." # todo: NEW TRANSLATION
  FIN_the_finnish_throne: "Finský trůn" # todo: NEW TRANSLATION
  FIN_the_finnish_throne_desc: "Kokoomus dlouho prosazoval finskou monarchii. S jejich nedávným vzestupem podpory a utahováním kontroly nad mocí mají nyní prostředky rozložit současný systém a ustanovit království." # todo: NEW TRANSLATION
  FIN_strengthen_military_administration: "Posílit vojenskou správu" # todo: NEW TRANSLATION
  FIN_strengthen_military_administration_desc: "Mannerheim hrdinsky vedl národ těmito bouřlivými časy, prořezávaje politické dogma vojenskou precizností. Pro přežití národa mu a armádě musíme dát pravomoci vládnout tak, jak uznají za vhodné." # todo: NEW TRANSLATION
  FIN_dreams_of_expansionism: "Sny o expanzi" # todo: NEW TRANSLATION
  FIN_dreams_of_expansionism_desc: "Risto Ryti správně uznává, že nenastane trvalý mír, dokud nezískáme kontrolu nad karelskými zeměmi na východě. Jakmile je zajistíme, vytvoříme mnohem lépe bránitelnou hranici." # todo: NEW TRANSLATION
  FIN_reach_out_to_scandinavia: "Oslovit Skandinávii" # todo: NEW TRANSLATION
  FIN_reach_out_to_scandinavia_desc: "Většina našich skandinávských sousedů sdílí naše názory a nemají zájem být zatahováni do boje velmocí. Udržením silných vztahů s nimi můžeme položit základy kolektivní obrany." # todo: NEW TRANSLATION
  FIN_moderate_politics: "Umírněná politika" # todo: NEW TRANSLATION
  FIN_moderate_politics_desc: "Jak napětí mezi velmocemi stoupá, musíme zajistit, aby naše vláda nebyla vnímána jako příliš vstřícná vůči ideologiím jakékoli frakce. Proto musíme prosazovat domácí umírněnost." # todo: NEW TRANSLATION
  FIN_join_the_allies: "Připojit se k [GetAlliesFactionForFinland]" # todo: NEW TRANSLATION
  FIN_join_the_allies_desc: "Neutralita rychle zastarává a vede k vassalizaci rukou velmocí. Ač je to riziko vzhledem k naší geopolitické pozici, připojení se k Spojencům nám může v dlouhodobém horizontu umožnit zachovat suverenitu." # todo: NEW TRANSLATION
  FIN_northern_defense_front: "Severský obranný front" # todo: NEW TRANSLATION
  FIN_northern_defense_front_desc: "Naši sousedé napříč Skandinávií a Baltem jsou snadnou kořistí velmocí. Pokud bychom spojili zdroje a spolupracovali vojensky, mohli bychom odradit i nejsilnější nepřátele." # todo: NEW TRANSLATION
  FIN_the_lone_wolf: "Osamělý vlk" # todo: NEW TRANSLATION
  FIN_the_lone_wolf_desc: "Nikdo nemá zájem o [ROOT.GetAdjective] lidi více než oni sami. Historie ukázala, že místo spoléhání se na ostatní se musíme spoléhat sami na sebe." # todo: NEW TRANSLATION
  FIN_military_aid: "Vojenská pomoc" # todo: NEW TRANSLATION
  FIN_military_aid_desc: "Spojenci mají široký výběr zbrojních výrobců — měli bychom je využít k rychlé modernizaci našich ozbrojených sil." # todo: NEW TRANSLATION
  FIN_mineral_wealth_development: "Rozvoj minerálního bohatství" # todo: NEW TRANSLATION
  FIN_mineral_wealth_development_desc: "Vzhledem k naší geografii a sousedům hrozí, že budeme odříznuti od potenciálních spojenců nebo ekonomických partnerů. Měli bychom proto využít nevyužité zdroje národa, aby nám zajistily možnost pokračovat v boji i v izolaci." # todo: NEW TRANSLATION
  FIN_industrialize_the_region: "Industrializovat region" # todo: NEW TRANSLATION
  FIN_industrialize_the_region_desc: "Ač společná vojenská síla Severského frontu je značná, musíme udělat více, aby naše ekonomiky dokázaly frontu dlouhodobě podporovat. To vyžaduje investice oživení průmyslu." # todo: NEW TRANSLATION
  FIN_increase_military_investment: "Zvýšit vojenské investice" # todo: NEW TRANSLATION
  FIN_increase_military_investment_desc: "Ekonomický a logistický aspekt konfliktu je stejně zásadní jako boje na frontách. Proto bychom měli investovat do zbrojního průmyslu, aby mohl nadále zásobovat naše síly veškerým vybavením." # todo: NEW TRANSLATION
  FIN_cooperation_with_germany: "Spolupráce s Německem" # todo: NEW TRANSLATION
  FIN_cooperation_with_germany_desc: "Můžeme se spolehnout na geopolitickou realitu, že [GER.GetNameDef] a [SOU.GetNameDef] se nakonec střetnou. Spoluprací s [GER.GetAdjective]mi bychom mohli pomstít ztráty z předchozích válek se [SOU.GetAdjective]mi a otevřít si nové příležitosti." # todo: NEW TRANSLATION
  FIN_wartsila_engine_production: "Výroba motorů Wärtsilä" # todo: NEW TRANSLATION
  FIN_wartsila_engine_production_desc: "Schopnost a kapacita vyrábět vlastní motory pro armádu zlepší naši národní bezpečnost. Spoluprací s našimi spojenci a domácími firmami, jako je Wärtsilä, toho můžeme dosáhnout." # todo: NEW TRANSLATION
  FIN_german_military_advisors: "Němečtí vojenskí poradci" # todo: NEW TRANSLATION
  FIN_german_military_advisors_desc: "Válečnictví se rychle mění díky použití motorových vozidel a letadel. Možná je čas, abychom se od našich [GER.GetAdjective] bratrů ve zbrani naučili, jak tyto nové prostředky nejlépe využít ve svůj prospěch." # todo: NEW TRANSLATION
  FIN_finnish_march_of_conquest: "Finský pochod za dobytím" # todo: NEW TRANSLATION
  FIN_finnish_march_of_conquest_desc: "Příliš dlouho jsme byli v defenzivě proti [SOU.GetNameDef] a jeho předchůdcům. Nyní je čas obrátit průběh a zatlačit hranice zpět, osvobodit lid Karelie od [SOU.GetAdjective] útlaku, jakýmikoliv prostředky." # todo: NEW TRANSLATION
  FIN_joint_scientific_program: "Společný vědecký program" # todo: NEW TRANSLATION
  FIN_joint_scientific_program_desc: "Získat technologickou převahu nad nepřáteli může být rozhodujícím faktorem, zda národ z konfliktu vyjde vítězně. Sdílením našich vědeckých poznatků s našimi spojenci si můžeme zajistit, že technologická převaha bude naší." # todo: NEW TRANSLATION
  FIN_modernize_the_industry: "Modernizovat průmysl" # todo: NEW TRANSLATION
  FIN_modernize_the_industry_desc: "Plody našich technických prací mají využití i mimo bitevní pole. Mnohé z nich by mohly učinit náš průmysl efektivnějším. S trochou investic bychom mohli zahájit masivní program průmyslové modernizace s našimi nově nabytými znalostmi." # todo: NEW TRANSLATION
  FIN_modernize_the_army: "Modernizovat armádu" # todo: NEW TRANSLATION
  FIN_modernize_the_army_desc: "Prioritou každé vlády je obrana a bezpečí jejího lidu. Když naše ozbrojené síly selhávají, jsme proto povinni investovat do jejich modernizace a zlepšení natolik, aby opět mohly plnit svou primární povinnost." # todo: NEW TRANSLATION
  FIN_weapon_caches: "Sklady zbraní" # todo: NEW TRANSLATION
  FIN_weapon_caches_desc: "V případě, že by naše ozbrojené síly byly přemoženy a vláda padla, musíme mít záložní plán, abychom mohli zemi znovu získat. Jedním návrhem je tajně rozmístit sklady zbraní, které by budoucí odbojové síly mohly použít." # todo: NEW TRANSLATION
  FIN_national_unity: "Národní jednota" # todo: NEW TRANSLATION
  FIN_national_unity_desc: "Jak se válka nezadržitelně blíží, shromáždíme lid našeho velkého národa a znovu světu ukážeme, co znamená být Finský." # todo: NEW TRANSLATION
  FIN_viron_kansa: "Viron Kansa" # todo: NEW TRANSLATION
  FIN_viron_kansa_desc: "Přes Baltické moře odděleni, lidé [ROOT.GetName] a [EST.GetName] mají mezi sebou dlouhou společnou historii. Navíc čelíme podobným výzvám v boji o udržení nezávislosti. Možná mírovým sjednocením můžeme zachránit naše lidi před válkou." # todo: NEW TRANSLATION
  FIN_ambitions_in_the_south: "Ambice na jihu" # todo: NEW TRANSLATION
  FIN_ambitions_in_the_south_desc: "Malé pobaltské státy jsou dychtivě sledovány svými sousedy. Pokud mají být poraženy, lépe, aby to bylo v náš prospěch než ve prospěch potenciálního protivníka." # todo: NEW TRANSLATION
  FIN_union_of_finnish_brothers_in_arms: "Svaz finských bratrů ve zbrani" # todo: NEW TRANSLATION
  FIN_union_of_finnish_brothers_in_arms_desc: "Svaz finských bratrů ve zbrani je v čele národně socialistického hnutí a získává stále více podpory, jak se náš národ dostává pod hrozbu zvenčí. Pokud s nimi budeme spolupracovat, můžeme získat značnou podporu pro obranu národa." # todo: NEW TRANSLATION
  FIN_arm_the_lotta_svard: "Ozmatnit Lotta Svärd" # todo: NEW TRANSLATION
  FIN_arm_the_lotta_svard_desc: "Lotta Svärd se ukázaly být velkým přínosem v roli pomocné síly. Vzhledem k jejich dovednostem a naší zoufalé situaci je možná čas lépe vyzbrojit organizaci a efektivněji ji integrovat do ozbrojených sil." # todo: NEW TRANSLATION
  FIN_parmis_devils: "Pärmiho ďáblové" # todo: NEW TRANSLATION
  FIN_parmis_devils_desc: "Trestanecký prapor Nikke Pärmiho se ukázal být efektivním využitím pracovní síly, která by jinak zahnívala za mřížemi. Měli bychom jeho práci rozšířit vytvořením divize z vězňů, kteří jsou ochotni bojovat za svou vlast." # todo: NEW TRANSLATION
  FIN_militarized_society: "Militarizovaná společnost" # todo: NEW TRANSLATION
  FIN_militarized_society_desc: "Pokud má náš národ přežít nápor, kterému čelíme, musíme shodit fasádu politiky a přijmout úplnou militarizaci společnosti. Jen takovými extrémními opatřeními porazíme naše nepřátele." # todo: NEW TRANSLATION
  FIN_a_cry_for_help: "Výkřik o pomoc" # todo: NEW TRANSLATION
  FIN_a_cry_for_help_desc: "Společnost národů selhala ve své povinnosti chránit členské státy před konfliktem. Přesto jsou v zahraničí ti, kdo mohou ještě zaslechnout náš výkřik o pomoc a přispěchat na naši pomoc. Nebo tak doufáme." # todo: NEW TRANSLATION
  FIN_greater_finland: "Velké Finsko" # todo: NEW TRANSLATION
  FIN_greater_finland_desc: "Už nebudeme kořistí bezohledných sousedů, kteří pohrdnou našimi zeměmi. Místo toho se staneme predátorem a rozšíříme naše hranice k jejich přirozeným mezím, za hranice Karelie." # todo: NEW TRANSLATION
  FIN_right_wing_policies: "Pravicová politika" # todo: NEW TRANSLATION
  FIN_right_wing_policies_desc: "Levice jsou nic než agenti zahraničních mocností. Za okamžik by prodali svou vlast, pokud by jim to přineslo přízeň [SOU.Capital.GetCapitalVictoryPointName]. Pokud má náš národ prospívat a přežít, musíme se obrátit k stranám a organizacím pravice." # todo: NEW TRANSLATION
  FIN_discredit_the_democratic_system: "Diskreditovat demokratický systém" # todo: NEW TRANSLATION
  FIN_discredit_the_democratic_system_desc: "Náš demokratický systém jen přešlapuje z jedné krize do druhé bez rozhodného, smysluplného jednání. V této nebezpečné situaci již nemůžeme takovou slabost tolerovat a musíme masy poučit o selháních tohoto politického systému." # todo: NEW TRANSLATION
  FIN_prepare_a_military_coup: "Připravit vojenský převrat" # todo: NEW TRANSLATION
  FIN_prepare_a_military_coup_desc: "[FIN.GetNameDef] potřebuje silné, rozhodné vedení schopné činit těžká rozhodnutí v krizi. Jediní lidé, kteří jsou k tomu momentálně schopni, jsou vojenští. Místo čekání, až národ pod demokraty a socialisty rozpadne, připravíme půdu pro vojenský převrat." # todo: NEW TRANSLATION
  FIN_a_fascist_regime: "Fašistický režim" # todo: NEW TRANSLATION
  FIN_a_fascist_regime_desc: "S národním parlamentem pod vlivem armády můžeme nyní vytvářet režim založený na síle, cti a věrnosti [FIN.GetName]." # todo: NEW TRANSLATION
  FIN_seek_german_protection: "Hledat německou ochranu" # todo: NEW TRANSLATION
  FIN_seek_german_protection_desc: "Společnost národů naprosto selhala v prosazování mezinárodního práva. Musíme přijmout, že síla ozbrojených sil je jediným rozhodujícím faktorem v mezinárodních vztazích. Aby náš národ přežil, musíme proto hledat pomoc od silnějších sousedů, jako je [GER.GetNameDef]." # todo: NEW TRANSLATION
  FIN_join_axis: "Připojit se k [GetFascistFactionForFinland]" # todo: NEW TRANSLATION
  FIN_join_axis_desc: "Je jen málo těch, kdo by obstáli proti mohutnosti Osy. Místo stání stranou bychom se měli připojit k jejich alianci a využít ji k prosazování našich vlastních zahraničněpolitických cílů." # todo: NEW TRANSLATION
  FIN_finnish_supremacy_in_the_north: "Finská nadřazenost na severu" # todo: NEW TRANSLATION
  FIN_finnish_supremacy_in_the_north_desc: "Zatímco ostatní národy v našem regionu se hádají a vyjednávají své podrobení mocnějším státům, jen my můžeme nabídnout alternativu. Pod naším vedením dovedeme naše národy k vítězství proti každému nepříteli, který nám může hrozit." # todo: NEW TRANSLATION
  FIN_finnish_legion_of_honor: "Finská legie cti" # todo: NEW TRANSLATION
  FIN_finnish_legion_of_honor_desc: "Naše jednotky jsou štítem, který zadržuje komunistické hordy na naší hranici. Měli bychom více oceňovat jejich statečnost vytvořením elitní Legie cti, do které mohou usilovat nejodvážnější z nich." # todo: NEW TRANSLATION
  FIN_tactical_wargaming_department: "Oddělení taktických wargamingů" # todo: NEW TRANSLATION
  FIN_tactical_wargaming_department_desc: "Požadavky moderní války rostou každým dnem. Pokud chce náš vrchní štáb držet krok, musíme jej rozšířit o nová oddělení, kde mohou experimentovat s novými metodami prostřednictvím taktických wargamingů." # todo: NEW TRANSLATION
  FIN_advanced_jaeger_training_program: "Pokročilý výcvikový program jägerů" # todo: NEW TRANSLATION
  FIN_advanced_jaeger_training_program_desc: "Naše jednotky jägerů jsou dlouho považovány za elitu ozbrojených sil, jejich původ sahá až k Velké válce, kdy první z nich byli školeni v Německu. Možná je čas tyto jednotky oživit modernizací a tím zvýšit morálku celé armády." # todo: NEW TRANSLATION
  FIN_industrial_cooperation: "Průmyslová spolupráce" # todo: NEW TRANSLATION
  FIN_industrial_cooperation_desc: "Členové mocností Osy disponují bohatými znalostmi a zdroji. Je načase, abychom průmyslově spolupracovali a lépe využili tyto nevyužité zdroje pro zlepšení našich příslušných států." # todo: NEW TRANSLATION
  FIN_bring_foreign_armor_experts: "Přivést zahraniční experty na pancéřování" # todo: NEW TRANSLATION
  FIN_bring_foreign_armor_experts_desc: "Tanky jsou klíčovou součástí každé moderní armády, ale naše zkušenosti s nimi jsou omezené. Možná bychom mohli rozšířit naše schopnosti pozváním zahraničních expertů v této oblasti, aby nám pomohli." # todo: NEW TRANSLATION
  FIN_military_research: "Vojenský výzkum" # todo: NEW TRANSLATION
  FIN_military_research_desc: "Válečnictví se neustále mění s příchodem nových technologií a taktik, které je využívají. Abychom zajistili trvalou sílu a připravenost našich ozbrojených sil, členové našeho spojenectví by měli spojit naše znalosti a technologie." # todo: NEW TRANSLATION
  FIN_patriotic_peoples_movement: "Vlastenecké lidové hnutí" # todo: NEW TRANSLATION
  FIN_patriotic_peoples_movement_desc: "Vlastenecké lidové hnutí, i přes odpor předchozího režimu, odvádí skvělou práci ve vzdělávání mas o potřebě národní hrdosti a obraně státu před komunismem. Pokud bychom je přijali do svého kruhu, získali bychom mnohem širší podporu pro náš režim." # todo: NEW TRANSLATION
  FIN_academic_karelian_society: "Akademická karelská společnost" # todo: NEW TRANSLATION
  FIN_academic_karelian_society_desc: "Po více než dekádu se skupina intelektuálů a studentů na Univerzitě v Helsinkách stává stále vlivnější. Jejich hlavní cíle se dobře shodují s našimi — usilovat o vylepšení Finska v souladu s naší historií. Možná najdeme způsob, jak spolupracovat." # todo: NEW TRANSLATION
  FIN_mustapaidat: "Mustapaidat" # todo: NEW TRANSLATION
  FIN_mustapaidat_desc: "Pokračující militarizace společnosti zajistí, že náš lid bude co nejsilnější. Zapojením polovojenských sil můžeme prosazovat vojenské hodnoty ve všech vrstvách společnosti, od těch, kteří jsou ještě příliš mladí na vstup do armády, až po ty, kteří jsou možná příliš staří." # todo: NEW TRANSLATION
  FIN_take_over_the_suojeluskunta: "Převzít Suojeluskunta" # todo: NEW TRANSLATION
  FIN_take_over_the_suojeluskunta_desc: "Suojeluskunta působila jako pomocná síla rezervistů, které lze v čase krize povolat k obraně státu. Pokud organizaci přivedeme pod naši kontrolu, mohli bychom ji využít k indoktrinaci tisíců do naší věci." # todo: NEW TRANSLATION
  FIN_maan_turva: "Maan Turva" # todo: NEW TRANSLATION
  FIN_maan_turva_desc: "Pouze pečlivým dohledem populace můžeme zajistit, že se nikde neprojevuje zrady nebo subverze. Na oplátku můžeme chránit režim a zajistit, že národ nebude zničen zevnitř." # todo: NEW TRANSLATION
  FIN_finnish_irredentism: "Finský irredentismus" # todo: NEW TRANSLATION
  FIN_finnish_irredentism_desc: "I přes získání nezávislosti od bývalého Ruského impéria existují země a lidé, které by nám právem měly náležet, ale zůstávají pod jhem útlaku našich nepřátel. Musíme mobilizovat náš lid k osvobození těchto zemí." # todo: NEW TRANSLATION
  FIN_keepers_of_the_north: "Strážci severu" # todo: NEW TRANSLATION
  FIN_keepers_of_the_north_desc: "Jsme jediný režim na severu, který má vůli vládnout a bránit tento region před vnějšími nepřáteli. Dokud všichni lidé regionu nebudou sjednoceni pod naší nadvládou, nemůžeme mít trvalý mír." # todo: NEW TRANSLATION
  FIN_sotilaalliset_kappalaiset: "Sotilaalliset Kappalaiset" # todo: NEW TRANSLATION
  FIN_sotilaalliset_kappalaiset_desc: "Přístup k vojenskému kaplanovi je klíčová služba, na kterou se naši vojáci spoléhají. Mnozí z těchto kaplanů mají oprávněné obavy o budoucnost našeho národa. Pokud s nimi budeme spolupracovat, získáme nejen oči a uši na frontě, ale také zajistíme, že správná poselství budou dosahovat k jednotkám." # todo: NEW TRANSLATION
  FIN_national_fanatism: "Národní fanatismus" # todo: NEW TRANSLATION
  FIN_national_fanatism_desc: "Společnost musí být naplněna fanatismem a oddaností věci [FIN.GetAdjective] nadřazenosti. Opakovaně jsme dokázali, že nás nic nezastaví a že když pracujeme společně, nic nemůže zastavit vzestup našeho národa k velkosti." # todo: NEW TRANSLATION
  FIN_military_promotions: "Vojenská povýšení" # todo: NEW TRANSLATION
  FIN_military_promotions_desc: "Naši vojenská důstojníci sloužili národu s velkou ctí a oddaností. Je načase odměnit ty nejlepší z nich za jejich podíl na záchraně nás před podrobením našimi historickými nepřáteli." # todo: NEW TRANSLATION
  FIN_indoctrinate_the_workers: "Indoktrinovat dělníky" # todo: NEW TRANSLATION
  FIN_indoctrinate_the_workers_desc: "Díky zvýšenému dohledu nad populací máme lepší přehled o tom, co dělá propagu účinnou. Měli bychom tyto znalosti využít k indoktrinaci populace a zajistit jejich absolutní loajalitu vládě a [FIN.GetNameDef]." # todo: NEW TRANSLATION
  FIN_intellectual_elite: "Intelektuální elita" # todo: NEW TRANSLATION
  FIN_intellectual_elite_desc: "Pečlivou spoluprací armády a nejosvícenějších členů inteligence se nám podařilo zachránit národ z drápů socialismu a degenerace. Je čas odměnit ty, kteří nás podpořili, investicí do jejich akademických snah." # todo: NEW TRANSLATION
  FIN_enhance_southern_infrastructure: "Zlepšit infrastrukturu na jihu" # todo: NEW TRANSLATION
  FIN_enhance_southern_infrastructure_desc: "Jak se [ROOT.GetAdjective] národ snaží zajistit své místo ve světě, musí se soustředit na budování a zlepšení své průmyslové kapacity. Prvním krokem k dosažení tohoto cíle je zlepšení infrastruktury v jižních regionech, aby byly lépe připraveny zvládat nároky lehkého i těžkého průmyslu v krátkodobém horizontu." # todo: NEW TRANSLATION
  FIN_industrial_development: "Průmyslový rozvoj" # todo: NEW TRANSLATION
  FIN_industrial_development_desc: "Jak se svět stále více průmyslově rozvíjí, [ROOT.GetName] musí držet krok, pokud chce stát se významným hráčem na světové scéně. Investice do těžkého průmyslu nejen vytvoří pracovní místa a podpoří ekonomiku, ale také zajistí zdroje potřebné k zvládnutí budoucích výzev." # todo: NEW TRANSLATION
  FIN_bank_of_aland: "Banka Åland" # todo: NEW TRANSLATION
  FIN_bank_of_aland_desc: "Bank of Åland je pilířem ekonomiky [ROOT.GetName], poskytující stabilitu a podporu nezbytnou pro růst a prosperitu. \nInvestováním do Bank of Åland [ROOT.GetName] investuje do své budoucnosti a klade základy silnějšího, prosperujícího státu." # todo: NEW TRANSLATION
  FIN_suomen_akatemia: "Suomen Akatemia" # todo: NEW TRANSLATION
  FIN_suomen_akatemia_desc: "Několik [ROOT.GetAdjective] intelektuálů vedených renomovaným matematikem Leem Sariem tlačí na založení Suomen Akatemia, která se stane předním národním akademickým ústavem, podporujícím vědecké inovace a pomáhajícím postavit [ROOT.GetName] do čela technologického rozvoje." # todo: NEW TRANSLATION
  FIN_janiskoski_power_plant: "Elektrárna Jäniskoski" # todo: NEW TRANSLATION
  FIN_janiskoski_power_plant_desc: "Postavíme elektrárnu v Jäniskoski, aby poskytla spolehlivou energii pro elektrický slévárenský provoz niklového dolu Kolosjoki a poháněla rozvoj oblasti [722.GetName], což následně podpoří ekonomický rozvoj severního [ROOT.GetName]." # todo: NEW TRANSLATION
  FIN_found_pohjolan_voima: "Založit Pohjolan Voima" # todo: NEW TRANSLATION
  FIN_found_pohjolan_voima_desc: "S nedávným rozšířením lesního a těžkého průmyslu vzniká potřeba většího množství energie. Centralizujeme výrobu energie a využijeme neomezený potenciál vodní energie k zásobování průmyslového růstu [ROOT.GetName]." # todo: NEW TRANSLATION
  FIN_expand_imatra_hydropower_plant: "Rozšířit vodní elektrárnu Imatra" # todo: NEW TRANSLATION
  FIN_expand_imatra_hydropower_plant_desc: "Vodní elektrárna Imatra, založená v roce 1922, se ukázala být spolehlivým zdrojem energie pro rostoucí průmysl [ROOT.GetName]. S rozšířením pátého a šestého stroje se kapacita elektrárny zvýší a umožní další průmyslový rozvoj v regionu [928.GetName]." # todo: NEW TRANSLATION
  FIN_makola_mine: "Důl Makola" # todo: NEW TRANSLATION
  FIN_makola_mine_desc: "Bohaté ložiska niklu a mědi byla nalezena v Makole a Hituře. Naši experti se domnívají, že tato ložiska mají velký potenciál pro ekonomický růst a rychle se rozvíjející vojenský průmysl národa, a doporučují zahájit výstavbu dolu Makola co nejdříve, aby byl zajištěn stabilní zdroj drahých nerostů." # todo: NEW TRANSLATION
  FIN_power_from_the_dams: "Síla z přehrad" # todo: NEW TRANSLATION
  FIN_power_from_the_dams_desc: "Využitím přírodních zdrojů hojných řek [ROOT.GetName] byl navržen významný rozvoj naší vodní energetické infrastruktury. Podle našich expertů investice do výstavby nových vodních elektráren poskytne prostředky k drastickému rozšíření průmyslové kapacity a povzbudí růst národa." # todo: NEW TRANSLATION
  FIN_tire_factory_at_nokia: "Výroba pneumatik v Nokii" # todo: NEW TRANSLATION
  FIN_tire_factory_at_nokia_desc: "V dobách konfliktu potřebuje [ROOT.GetName] zdroj pneumatik pro armádu, proto zabezpečení spolehlivé dodávky pro mobilitu a připravenost našich ozbrojených sil by mělo být prioritou. \nPlánujeme rozšířit továrnu Suomen Gummitehdas v Nokii a modernizovat výrobní linky tak, aby využívaly syntetický kaučuk a recyklované materiály k překonání možných nedostatků." # todo: NEW TRANSLATION
  FIN_vaisala_radiosonde_tests: "Testy radiosondy Väisälä" # todo: NEW TRANSLATION
  FIN_vaisala_radiosonde_tests_desc: "Pod vedením profesora Vilho Väisäläho průkopnické práce na technologii radiosond otevřely cestu k úspěšné komerční produkci. Navazujíc na úspěch prvního finského startu radiosondy v roce 1931 vedl kontinuální výzkum a vývoj k významnému technologickému pokroku." # todo: NEW TRANSLATION
  FIN_oy_alkoholiliike: "Oy Alkoholiliike" # todo: NEW TRANSLATION
  FIN_oy_alkoholiliike_desc: "Zoufalé časy vyžadují zoufalá opatření, a nyní je čas, aby Oy Alkoholiliike, Společnost pro alkohol, podpořila finskou armádu poskytováním zásadních součástí pro jejich zbraně. \nPečlivou výrobou a rafinací se specializují na tvorbu vysoce účinných zápalných koktejlů, které daleko zvýhodní pěchotu při neutralizaci lehkých nepřátelských obrněných prostředků." # todo: NEW TRANSLATION
  FIN_integrate_oy_tikkakoski: "Integrovat Oy Tikkakoski" # todo: NEW TRANSLATION
  FIN_integrate_oy_tikkakoski_desc: "Abychom posílili [ROOT.GetAdjective] zbrojní průmysl, bude Oy Tikkakoski integrována do státní zbrojní továrny. Tento krok zvýší výrobu zbraní a podpoří vývoj nových ručních zbraní pro [ROOT.GetAdjective] armádu." # todo: NEW TRANSLATION
  FIN_national_firepower: "Národní palebná síla" # todo: NEW TRANSLATION
  FIN_national_firepower_desc: "Vzhledem k naléhavým vnějším hrozbám, kterým národ čelí, se musíme zavázat k velkým investicím do nových vojenských továren. Tyto závody se budou věnovat výrobě nejnovějších dělostřeleckých kanónů pro naše pozemní síly a pobřežní baterie, čímž zajistí, že [ROOT.GetNameDef] bude mít potřebnou palebnou sílu k obraně svých hranic." # todo: NEW TRANSLATION
  FIN_contract_with_yhteissisu: "Smlouva s Yhteissisu" # todo: NEW TRANSLATION
  FIN_contract_with_yhteissisu_desc: "Ve spolupráci s předními [ROOT.GetAdjective] korporacemi založíme společnost Yhteissisu Oy s cílem poskytovat spolehlivou a efektivní dopravu pro [ROOT.GetAdjective] obranné síly. \nPřesunem výroby nákladních vozů Sisu S-21 na Yhteissisu posílíme produkci vojenských nákladních vozů a autobusů, čímž zajistíme, že naše síly budou vybaveny nezbytnými prostředky pro jakoukoli situaci." # todo: NEW TRANSLATION
  FIN_outokumpu_for_defence_industry: "Outokumpu pro obranný průmysl" # todo: NEW TRANSLATION
  FIN_outokumpu_for_defence_industry_desc: "Investice do národního podniku v oboru kovů, Outokumpu Oy, pomůže zvýšit obrannou připravenost [ROOT.GetName]. \nZřízení domácí kovárny v Pori a závodu na elektrolytickou rafinaci mědi přinese [ROOT.GetName] soběstačnost v produkci mědi a mosazi." # todo: NEW TRANSLATION
  FIN_industrial_upgrade_in_harjavalta: "Průmyslové vylepšení v Harjavalta" # todo: NEW TRANSLATION
  FIN_industrial_upgrade_in_harjavalta_desc: "V Harjavalta probíhají snahy o modernizaci a zefektivnění průmyslu niklu a mědi. S špičkovou technologií a vylepšenými výrobními postupy je cílem maximalizovat výstup a posílit postavení [ROOT.GetName] jako předního producenta těchto zásadních minerálů." # todo: NEW TRANSLATION
  FIN_expand_mining_prospection: "Rozšířit prospekci dolů" # todo: NEW TRANSLATION
  FIN_expand_mining_prospection_desc: "Investice do moderních těžebních nástrojů a rozšíření důlní infrastruktury kladou základy pro robustní průmysl těžby nerostů. Zvýšený výtěžek poslouží potřebám národní obrany a posílí připravenost země na konflikt." # todo: NEW TRANSLATION
  FIN_elijarvi_mine: "Důl Elijärvi" # todo: NEW TRANSLATION
  FIN_elijarvi_mine_desc: "Obdrželi jsme vzorky získané při výkopových pracích v okolí Elijärvi, které naznačují existenci chromové rudy, která by mohla být velmi bohatá na chrom. Musíme zahájit nové těžební operace v oblasti a zajistit spolehlivý zdroj chromu pro vojenský průmysl." # todo: NEW TRANSLATION
  FIN_tornio_steel_factory: "Tornijská ocelárna" # todo: NEW TRANSLATION
  FIN_tornio_steel_factory_desc: "Zřízení ocelárny v Tornio poblíž dolu Kemi slibuje revoluci v finském kovoprůmyslu. S přístupem k nyní bohatým zásobám chromu a niklu z Outokumpu bude nová továrna vyrábět špičkovou ocel a zaplní mezeru ve finských průmyslových schopnostech." # todo: NEW TRANSLATION
  FIN_increase_military_budget: "Zvýšit vojenský rozpočet" # todo: NEW TRANSLATION
  FIN_increase_military_budget_desc: "Bezpečnost národa je nejvyšší prioritou. Zvýšením vojenského financování budou obranné síly dobře vybaveny a lépe připraveny odolat jakýmkoli potenciálním hrozbám." # todo: NEW TRANSLATION
  FIN_suomen_maavoimat: "Suomen Maavoimat" # todo: NEW TRANSLATION
  FIN_suomen_maavoimat_desc: "Musíme posílit schopnosti Finských obranných sil investicemi do výzkumu nového vojenského vybavení a modernizace výcvikových zařízení, abychom zajistili připravenost tváří v tvář jakýmkoli možným hrozbám." # todo: NEW TRANSLATION
  FIN_operation_kilpapurjehdus: "Operace Kilpapurjehdus" # todo: NEW TRANSLATION
  FIN_operation_kilpapurjehdus_desc: "Rozhodnutím Společnosti národů byly Ålandy od roku 1921 demilitarizovány, což znamená, že v oblasti nejsou rozmístěny žádné vojenské jednotky ani zásoby. Napětí v Evropě však stoupá a čelíme-li vážné hrozbě nepřátelského vylodění na ostrovech, naše vrchní velení vypracovalo plán na vyzbrojení a opevnění Åland. \nPřípravy jsou uskutečněny a naše jednotky jsou připraveny jednat!" # todo: NEW TRANSLATION
  FIN_extra_refresher_exercises: "Extra cvičení" # todo: NEW TRANSLATION
  FIN_extra_refresher_exercises_desc: "Napětí v Evropě stoupá, a pokud má být zachována [ROOT.GetAdjective] nezávislost, musíme posílit obranu Finska intenzivními výcvikovými cvičeními, připravit se na jakýkoli možný výbuch konfliktu a ukázat odhodlání a připravenost Finů bránit suverenitu národa, pokud bude třeba." # todo: NEW TRANSLATION
  FIN_the_cold_front: "Studená fronta" # todo: NEW TRANSLATION
  FIN_the_cold_front_desc: "Tvrdé zimní podmínky na finské frontě vyžadují řádnou přípravu. Dodávkové trasy musí být zajištěny a maskovací taktiky vylepšeny, aby obranné síly byly odolné vůči výzvám zimy." # todo: NEW TRANSLATION
  FIN_jaeger_movement: "Hnutí jägerů" # todo: NEW TRANSLATION
  FIN_jaeger_movement_desc: "[ROOT.GetAdjective] vrchní velení předložilo návrh oživit obranné síly povyšováním důstojníků s dřívějším jägerským výcvikem. Tito důstojníci jsou experti na partyzánskou válku a sabotáž za nepřátelskými liniemi, což z nich činí ideální kandidáty k vycvičení nových jednotek v netradičních taktikách a vedení do boje." # todo: NEW TRANSLATION
  FIN_salvaged_and_retooled: "Zachráněno a přestavěno" # todo: NEW TRANSLATION
  FIN_salvaged_and_retooled_desc: "Pokud mají naše ozbrojené síly zvítězit ve válce, musíme se zaměřit na maximalizaci válečných zdrojů. Využití ukořistěného nepřátelského vybavení, záchrana poškozených materiálů a jejich přesměrování podle Finské taktického učení nám umožní uspokojit zásoby armády a výrazně posílit naše vojenské schopnosti." # todo: NEW TRANSLATION
  FIN_winter_warfare: "Zimní válka" # todo: NEW TRANSLATION
  FIN_winter_warfare_desc: "Připravit se na to nejhorší, bojovat jako nejlepší. Potřebujeme posílit zásobovací trasy pro drsné zimní podmínky a vycvičit naše jednotky, aby vydržely chlad a udržely boj na frontě." # todo: NEW TRANSLATION
  FIN_motti_tactics: "Motti taktiky" # todo: NEW TRANSLATION
  FIN_motti_tactics_desc: "Motti strategie zahrnuje obklíčení a izolaci nepřátelských jednotek s cílem ochromit jejich logistiku a komunikační linky. Implementace tohoto přístupu vyžaduje pečlivé plánování a výcvik obranných sil, aby byla zajištěna jeho účinnost na bojišti. Využitím a zdokonalením motti boje překonáme nepřítele a udeříme tam, kde to nejméně očekává." # todo: NEW TRANSLATION
  FIN_foreign_armor: "Zahraniční obrněnci" # todo: NEW TRANSLATION
  FIN_foreign_armor_desc: "Jak se [ROOT.GetAdjective] armáda snaží posílit své obrněné schopnosti v době války, musíme hledat řešení i za našimi hranicemi. Získání zahraniční obrněné techniky, jako je švédský Landsverk L-62 II, může být vítaným doplňkem k arzenálu [ROOT.GetAdjective] a ukázat schopnost země být vynalézavá a přizpůsobivá v obličeji obtíží." # todo: NEW TRANSLATION
  FIN_utilize_the_sami: "Využít Sámi" # todo: NEW TRANSLATION
  FIN_utilize_the_sami_desc: "Musíme uznat jedinečné dovednosti Sámi, kteří jsou experti v orientaci v drsném arktickém terénu. Využitím jejich znalostí krajiny můžeme zlepšit průzkumné schopnosti, a zaměstnáváním je jako pastevce sobů můžeme zlepšit zásobovací trasy v odlehlých oblastech. Sámi mohou hrát klíčovou roli v naší obranné strategii a musíme zajistit, aby jejich odbornost byla plně využita." # todo: NEW TRANSLATION
  FIN_long_range_patrols: "Dálkové hlídky" # todo: NEW TRANSLATION
  FIN_long_range_patrols_desc: "Dálkové hlídky se stanou zásadním prvkem v rozvědce a sabotáži [ROOT.GetAdjective] armády, která nyní čelí výzvám moderní války. Tyto vysoce vycvičené jednotky se specializují na průnik za nepřátelské linie, sběr zpravodajství a vykonávání ničivých překvapivých útoků, čímž se stanou klíčovým aktivem válečného úsilí." # todo: NEW TRANSLATION
  FIN_finnish_radio_intelligence: "Finská radiová rozvědka" # todo: NEW TRANSLATION
  FIN_finnish_radio_intelligence_desc: "Jak konflikt sílí, finská armáda si uvědomila důležitost sběru spolehlivého zpravodajství. Pod vedením Reina Hallamy byla sestavena skupina talentovaných radiových operátorů k odposlechu a dešifrování nepřátelské komunikace. Díky jejich dovednostem a znalostem poskytnou cenné informace finským ozbrojeným silám, které mohou změnit průběh války." # todo: NEW TRANSLATION
  FIN_sissi: "Sissi" # todo: NEW TRANSLATION
  FIN_sissi_desc: "Jak konflikt zuří, naše lehká pěchota Sissi se stává neocenitelným přínosem pro finskou armádu, využívajíc jejich znalost terénu a schopnosti pohybovat se rychle a tiše k úderům na nepřátelské cíle. Osvědčují se jako trn v oku nepřítele a zdroj hrdosti finského lidu." # todo: NEW TRANSLATION
  FIN_national_armor_focus: "Národní zaměření na obrněnou techniku" # todo: NEW TRANSLATION
  FIN_national_armor_focus_desc: "Jak intenzita válečného úsilí roste, [ROOT.GetName] se musí obrátit k vlastnímu vojenskému průmyslu. S důrazem na rozvoj domácí produkce tanků usilujeme o posílení našich obrněných sil a vytvoření vozidel přizpůsobených jejich jedinečným potřebám na bojišti." # todo: NEW TRANSLATION
  FIN_underground_resistance_cells: "Podzemní odbojové buňky" # todo: NEW TRANSLATION
  FIN_underground_resistance_cells_desc: "Jak nepřítel postupuje, někteří Finové odmítají se podrobit. Malé, obratné odbojové buňky se chopí zbraní a provádějí přepady, nájezdy a sabotáže. Jejich znalost terénu a oddanost věci z nich činí hrozbu pro jakéhokoli vetřelce, bez ohledu na jeho sílu." # todo: NEW TRANSLATION
  FIN_mannerheim_line: "Mannerheimova linie" # todo: NEW TRANSLATION
  FIN_mannerheim_line_desc: "Ve snaze posílit naši obranu se musíme zaměřit na Mannerheimovu linii. Komplexní síť obranných opevnění se táhne přes východní hranici země a musí být zabezpečena proti nepřátelským nájezdům. Armáda pracuje na zlepšení jak samotných opevnění, tak zásobovacích linií, které je udržují zásobené a provozuschopné." # todo: NEW TRANSLATION
  FIN_defense_in_depth: "Obrana do hloubky" # todo: NEW TRANSLATION
  FIN_defense_in_depth_desc: "Sílící a odhodlanější nepřítel nás učí, že jedna statická fronta možná nestačí jeho zastavení. Musíme vybudovat nová opevnění a menší obranné linie za hlavní frontovou linií, čímž vytvoříme více vrstev ochrany a dáme našim silám flexibilitu k protiútoku. Nutíme nepřítele platit za každý centimetr [ROOT.GetAdjective] půdy, který se pokusí získat." # todo: NEW TRANSLATION
  FIN_helsinki_air_defense: "Vzdušná obrana Helsinek" # todo: NEW TRANSLATION
  FIN_helsinki_air_defense_desc: "Jak se válka blíží nad [ROOT.GetName], Helsinky musí být opevněny. Město a jeho pobřeží jsou zranitelné útokem, a je povinností [ROOT.GetAdjective] armády je chránit. Vylepšená protivzdušná obrana a pobřežní opevnění nejen zabezpečí město, ale také posílí odhodlání národa odolat jakémukoli útoku." # todo: NEW TRANSLATION
  FIN_suomen_ilmavoimat: "Suomen Ilmavoimat" # todo: NEW TRANSLATION
  FIN_suomen_ilmavoimat_desc: "Musíme se soustředit na zvýšení efektivity [ROOT.GetAdjective] letectva investicemi do výzkumu a výcviku. \nCílem je vytvořit moderní a flexibilní leteckou složku schopnou čelit výzvám moderní války a poskytovat důležitou podporu pozemním jednotkám během bojových operací." # todo: NEW TRANSLATION
  FIN_expand_air_bases: "Rozšířit letecké základny" # todo: NEW TRANSLATION
  FIN_expand_air_bases_desc: "Jak napětí kolem [ROOT.GetName] roste, musíme zajistit, že naše obranné síly mají prostředky k řádnému operování. \nPodpoříme letectvo v úsilí rozšířit počet leteckých základen po celé zemi, aby piloti mohli být rychle nasazeni v době konfliktu." # todo: NEW TRANSLATION
  FIN_pilot_training: "Výcvik pilotů" # todo: NEW TRANSLATION
  FIN_pilot_training_desc: "S rostoucí poptávkou po letecké síle v moderní válce je potřeba pokročilejší a specializovanější výcvik pilotů. Investicemi do nových výcvikových metod a vybavení může [ROOT.GetAdjective] letectvo zajistit, že jeho piloti budou mezi nejlepšími na světě." # todo: NEW TRANSLATION
  FIN_naval_airforce: "Námořní letectvo" # todo: NEW TRANSLATION
  FIN_naval_airforce_desc: "S růstem námořních sil [ROOT.GetName] musí růst i jeho letecké schopnosti. Vytvoření specializovaného námořního letectva zajistí, že finské námořnictvo bude mít podporu k ovládnutí Baltského moře, koordinující leteckou sílu a hladinové flotily k odražení všech hrozeb." # todo: NEW TRANSLATION
  FIN_national_aircraft_production: "Národní výroba letadel" # todo: NEW TRANSLATION
  FIN_national_aircraft_production_desc: "Jak [ROOT.GetName] čelí hrozbě války, stává se čím dál zřejmější, že moderní letectvo je nezbytné pro obranu země. Za tímto účelem byl zahájen program národní výroby letadel s cílem poskytnout prostředky a podporu [ROOT.GetAdjective] návrhářům a výrobcům letadel, aby [ROOT.GetName] mohl konkurovat velmocím Evropy." # todo: NEW TRANSLATION
  FIN_expand_air_force_academy: "Rozšířit akademii letectva" # todo: NEW TRANSLATION
  FIN_expand_air_force_academy_desc: "V rámci národního úsilí o vylepšení letectva zahájíme významné rozšíření Akademie letectva. Rozšíření bude zahrnovat nové zařízení i modernizaci výcviku pilotů, včetně výstavby nových letišť v Kauhavě a Tikkakoski." # todo: NEW TRANSLATION
  FIN_foreign_aircraft: "Zahraniční letadla" # todo: NEW TRANSLATION
  FIN_foreign_aircraft_desc: "[ROOT.GetAdjective] letectvo musí rozšířit své schopnosti k ochraně suverenity národa a zajištění bezpečí naší vlasti. Budou hledány zahraniční návrhy letadel a odborné znalosti ke zlepšení našich schopností a rozvoji vlastní výroby." # todo: NEW TRANSLATION
  FIN_support_for_ground_forces: "Podpora pozemních sil" # todo: NEW TRANSLATION
  FIN_support_for_ground_forces_desc: "Jak válka zuří, ukazuje se, že pozemní síly potřebují více letecké podpory. Proto investujeme do vývoje a výroby letadel těsné vzdušné podpory, aby poskytla našim jednotkám na zemi životně důležité krytí. To jim dá podporu potřebnou k udržení postavení a zatlačení nepřítele." # todo: NEW TRANSLATION
  FIN_dominate_the_skies: "Ovládnout nebe" # todo: NEW TRANSLATION
  FIN_dominate_the_skies_desc: "[ROOT.GetAdjective] nebe bude patřit nám! Výroba nových stíhacích letounů a investice do výzkumu a vývoje moderních technologií leteckého boje nám umožní zajistit vzdušnou převahu a chránit naši vlast. Naši zkušení piloti ovládnou nebe a přenesou boj k nepříteli." # todo: NEW TRANSLATION
  FIN_expand_production_lines: "Rozšířit výrobní linky" # todo: NEW TRANSLATION
  FIN_expand_production_lines_desc: "[ROOT.GetAdjective] letectvo potřebuje rozšířit výrobní kapacity, aby uspokojilo rostoucí požadavky válečného úsilí. Vytvořením nových výrobních linek můžeme zvýšit výrobu nových letounů a zajistit, že naše letectvo zůstane silným aktivem v boji proti nepřátelům." # todo: NEW TRANSLATION
  FIN_modernize_production_lines: "Modernizovat výrobní linky" # todo: NEW TRANSLATION
  FIN_modernize_production_lines_desc: "Abychom vytvořili světový letecký průmysl schopný vyrábět nejpokročilejší vojenská letadla, vláda [ROOT.GetAdjective] investuje do modernizace národních továren odpovědných za výrobu letecké techniky, čímž zajistí, že letectvo [ROOT.GetName] bude mít přístup k nejnovější a nejspolehlivější technologii." # todo: NEW TRANSLATION
  FIN_suomen_merivoimat: "Suomen Merivoimat" # todo: NEW TRANSLATION
  FIN_suomen_merivoimat_desc: "Námořní síly [ROOT.GetName] musí být připraveny bránit svou vlast proti jakékoli potenciální hrozbě. S důrazem na výzkum moderní námořní techniky a vývoj vylepšeného výcvikového programu se [ROOT.GetAdjective] námořnictvo stane silnou silou schopnou chránit naše zájmy na vodě." # todo: NEW TRANSLATION
  FIN_the_merchant_fleet: "Obchodní loďstvo" # todo: NEW TRANSLATION
  FIN_the_merchant_fleet_desc: "V rámci válečného úsilí musí obchodní loďstvo [ROOT.GetName] udržet krok, aby zajistilo přepravu životně důležitých zásob tam, kde jsou potřeba. Investicemi do výroby nových plavidel můžeme posílit naši schopnost se udržet a zajistit si postavení v jakémkoli konfliktu." # todo: NEW TRANSLATION
  FIN_conversion_of_civilian_vessels: "Přestavba civilních plavidel" # todo: NEW TRANSLATION
  FIN_conversion_of_civilian_vessels_desc: "Jak válka zuří, musíme využít všechny dostupné zdroje. Přestavbou civilních plavidel může [ROOT.GetName] rychle posílit své námořní schopnosti a chránit své pobřeží před nepřátelskými hrozbami. Velké ledoborce mohou být přeměněny na pobřežní obranné lodě, zatímco menší plavidla mohou sloužit jako torpédoborce nebo hlídkové lodě, čímž vznikne impozantní obranná síť podél [ROOT.GetAdjective] pobřeží." # todo: NEW TRANSLATION
  FIN_coastal_defense: "Pobřežní obrana" # todo: NEW TRANSLATION
  FIN_coastal_defense_desc: "Tváří v tvář zahraniční agresi je nejvyšší důležitostí zajistit, aby bylo finské pobřeží dobře chráněno. Vylepšením infrastruktury pobřežní obrany se můžeme lépe připravit na jakékoli možné hrozby z moře." # todo: NEW TRANSLATION
  FIN_marine_jaeger_divisions: "Divize námořních jägerů" # todo: NEW TRANSLATION
  FIN_marine_jaeger_divisions_desc: "Založení v pozdním roce 1934, finské námořní jägery, Rannikkojääkärit, vznikly jako elitní námořní pěchota finského námořnictva. Tito vysoce vycvičení a adaptabilní vojáci jsou vybaveni k plnění různých misí, od pobřežní obrany po přepadové výsadky, a budou klíčovým prvkem v případných střetnutích podél Baltského pobřeží." # todo: NEW TRANSLATION
  FIN_rapid_raiders: "Rychlí nájezdníci" # todo: NEW TRANSLATION
  FIN_rapid_raiders_desc: "Jak svět postupuje, musí i naše námořnictvo. Investicemi do výzkumu a výroby moderních torpédoborců vybavených nejnovější torpédovou technologií budeme schopni udeřit na naše nepřátele rychle a smrtící silou." # todo: NEW TRANSLATION
  FIN_deep_sea_raiders: "Nájezdníci hlubokého moře" # todo: NEW TRANSLATION
  FIN_deep_sea_raiders_desc: "S ohledem na válečné úsilí musí [ROOT.GetAdjective] námořnictvo zvýšit výrobu moderních ponorek, aby narušovaly nepřátelské zásobovací linie a chránily naše vlastní obchodní trasy. Tyto štíhlé a smrtící lodě budou vnášet strach do srdcí nepřátelských námořníků a pomohou zabezpečit postavení [ROOT.GetName] jako námořní mocnosti." # todo: NEW TRANSLATION
  FIN_sea_mines_strategy: "Strategie námořních min" # todo: NEW TRANSLATION
  FIN_sea_mines_strategy_desc: "Rozmisťováním min na strategických místech se [ROOT.GetAdjective] námořnictvo snaží učinit vody kolem svých břehů nebezpečnými pro nepřátelské flotily, což ztíží jejich přiblížení k [ROOT.GetAdjective] pobřeží a zajistí bezpečnost našeho námořního obchodu." # todo: NEW TRANSLATION
  FIN_expansion_towards_the_atlantic: "Expanze směrem k Atlantskému oceánu" # todo: NEW TRANSLATION
  FIN_expansion_towards_the_atlantic_desc: "[ROOT.GetAdjective] loděnice vyplují směrem k Atlantiku, rozšíří své námořní schopnosti a stavět větší lodě, aby promítaly moc přes oceán. S přidáním bitevních lodí a letadlových lodí se námořnictvo [ROOT.GetName] stane silou, se kterou se bude muset počítat na světové scéně." # todo: NEW TRANSLATION
  FIN_strengthen_the_naval_bases: "Posílit námořní základny" # todo: NEW TRANSLATION
  FIN_strengthen_the_naval_bases_desc: "Jak se [ROOT.GetName] připravuje na válku, je zásadní, aby jeho námořní základny byly dobře vybavené a chráněné. Zlepšením infrastruktury a obrany našich námořních základen zajistíme, že naše flotila zůstane bezpečná a připravená zapojit se do boje." # todo: NEW TRANSLATION
  FIN_expand_ship_building_industry: "Rozšířit loděnický průmysl" # todo: NEW TRANSLATION
  FIN_expand_ship_building_industry_desc: "S rostoucí potřebou vojenských lodí roste i potřeba loděnic schopných je vyrábět. S rozšířeným loděnickým průmyslem bude [ROOT.GetName] lépe vybaveno poskytovat ozbrojeným silám plavidla, která potřebují k prosazení moci a ochraně svých břehů." # todo: NEW TRANSLATION
  FIN_acquire_andros_dockyards: "Získat doky Andros" # todo: NEW TRANSLATION
  FIN_acquire_andros_dockyards_desc: "Získání doků Andros v Turku výrazně zlepší výrobní schopnosti našeho předního lodního konstruktéra, $FIN_crichton_vulcan_organization$. S touto novou přídavkou bude [ROOT.GetAdjective] námořnictvo schopno vyrábět více a lepších lodí, čímž zvýší svou moc a vliv v regionu." # todo: NEW TRANSLATION
  FIN_innovative_designs: "Inovativní návrhy" # todo: NEW TRANSLATION
  FIN_innovative_designs_desc: "V odvážném skoku inovací naši inženýři představují ambiciózní projekt 'Hyökkäysvaunu', návrh supertěžkého tanku, který zpochybňuje hranice obrněného boje. I když se může zdát neortodoxní, toto drzé úsilí odráží odhodlání [ROOT.GetNameDef] zkoumat průlomové konstrukce a posouvat hranice toho, co je na bojišti možné." # todo: NEW TRANSLATION
  FIN_found_pohjolan_voima_factories_tt: "\nPřidává §G2§! výrobní místa a §Y1 $industrial_complex$§! v až §Y5 plně kontrolovaných jádrových státech§! s alespoň 3 úrovněmi $infrastructure$." # todo: NEW TRANSLATION
