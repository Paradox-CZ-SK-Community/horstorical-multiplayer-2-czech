  NORDIC_expert_naval_mechanics_desc: "TODO_NORDIC" # todo: NEW TRANSLATION
  NORDIC_air_production: "Výroba letadel" # todo: NEW TRANSLATION
  NORDIC_air_production_desc: "Chceme‑li ovládnout severní polokouli a dál, musíme dohnat roky zásob, které nad námi mají velmoci. Naštěstí můžeme sdílet postupy, znalosti a vybavení, abychom předehnali nepřátele v produkci." # todo: NEW TRANSLATION
  NORDIC_naval_aircraft: "Námořní letadla" # todo: NEW TRANSLATION
  NORDIC_naval_aircraft_desc: "Budoucnost námořního boje leží na obloze. Naše námořní bombardéry pošlou nepřátelské lodě ke dnu a z našich letadlových lodí stíhačky zahalí oblohu dýmem nepřátelských strojů." # todo: NEW TRANSLATION
  NORDIC_air_exercises: "Letecké cvičení" # todo: NEW TRANSLATION
  NORDIC_air_exercises_desc: "Jak letecký boj přinesl novou éru války, tato nová éra spolupráce mezi našimi národy musí být doprovázena pečlivě vykonanými společnými leteckými operacemi. Pro to musí naše síly cvičit společně, dokud nebudou létat jako jeden celek." # todo: NEW TRANSLATION
  NORDIC_bomber_command: "Velitelství bombardérů" # todo: NEW TRANSLATION
  NORDIC_bomber_command_desc: "Zřízení společného velitelství bombardérů nám umožní lépe koordinovat podporu pozemních operací na bojišti a nálety za nepřátelské linie. Je to jediný způsob, jak mohou naše severní národy provést soustředěné údery proti nepřátelům." # todo: NEW TRANSLATION
  NORDIC_fighter_command: "Velitelství stíhačů" # todo: NEW TRANSLATION
  NORDIC_fighter_command_desc: "Stejně jako sdílíme ideály, sdílíme i nebe nad námi. Musíme létat spolu, chránit vzdušný prostor jeden druhého a získat nadvládu nad bojištěm, aby naše vazby nebyly přerušeny nepřátelskou pozemní podporou." # todo: NEW TRANSLATION
  NORDIC_carrier_effort: "Úsilí o letadlové lodě" # todo: NEW TRANSLATION
  NORDIC_carrier_effort_desc: "Nová hranice námořního boje jsou obloha nad nimi. Musíme spojit naše zdroje k vytvoření nejlepších letadlových lodí a letadel pro ně. Tak můžeme vládnout vlnám a zajistit bezpečnost, kterou naše země potřebují." # todo: NEW TRANSLATION
  NORDIC_ground_operations: "Pozemní operace" # todo: NEW TRANSLATION
  NORDIC_ground_operations_desc: "Budování více základen nám umožní větší flexibilitu v našich společných leteckých operacích; budováním více protivzdušných baterií ochráníme naše země a ulevíme pilotům. Tím vytvoříme propojený systém podpory pozemních operací, který maximalizuje efektivitu leteckých akcí." # todo: NEW TRANSLATION
  NORDIC_naval_exercises: "Námořní cvičení" # todo: NEW TRANSLATION
  NORDIC_naval_exercises_desc: "Všechny naše země mají námořní tradici sahající staletími; Baltské moře a Severní Atlantik formovaly naši kulturu a životní styl. Jak každý námořní národ ví, moře může být jak příkopem, tak dálnicí. Naučme se útočit a bránit z moře." # todo: NEW TRANSLATION
  NORDIC_defend_the_danish_belt: "Bránit Dánský průliv" # todo: NEW TRANSLATION
  NORDIC_defend_the_danish_belt_desc: "Dánský průliv je bránou do Baltského moře. Pokud nepovolíme přístup do Baltského moře z Atlantského oceánu, naše země budou mnohem bezpečnější před námořní invazí. Soustřeďme úsilí na proměnu průlivu ve zeď, abychom mohli volně ovládat Baltské moře." # todo: NEW TRANSLATION
  NORDIC_control_the_northern_sea: "Ovládnout severní moře" # todo: NEW TRANSLATION
  NORDIC_control_the_northern_sea_desc: "Norské a Severní moře jsou branou do Atlantiku. Soustředění úsilí tam nám dovolí zabývat se zeměmi na severním pobřeží Evropy a dokonce dosáhnout Severní Ameriky, pokud budeme chtít." # todo: NEW TRANSLATION
  NORDIC_baltic_sea_dominance: "Dominance v Baltském moři" # todo: NEW TRANSLATION
  NORDIC_baltic_sea_dominance_desc: "Baltské moře bylo dlouho naší zadní zahradou. Nemůžeme dovolit jiným národům volný průchod jeho vlnami. Vybudujme břehy tak, abychom ovládali tu studenou a odměřenou vodu." # todo: NEW TRANSLATION
  NORDIC_naval_research_institute: "Námořní výzkumný institut" # todo: NEW TRANSLATION
  NORDIC_naval_research_institute_desc: "Nesnažíme se jen dohnat nepřátele; musíme být v čele námořních technologií, jako bývali předtím. Vraťme se k dědictví regionu průzkumu a námořní dominance." # todo: NEW TRANSLATION
  NORDIC_submarine_cooperation: "Spolupráce v ponorkách" # todo: NEW TRANSLATION
  NORDIC_submarine_cooperation_desc: "Odepřením nepříteli schopnosti přepravovat vojáky a zásoby po moři jsme už v polovině války. Nejlepší cestou je společná práce na výrobě špičkových ponorek." # todo: NEW TRANSLATION
  NORDIC_naval_officer_academy: "Námořní důstojnická akademie" # todo: NEW TRANSLATION
  NORDIC_naval_officer_academy_desc: "Dobrý důstojník v námořním boji znamená víc než v jiných formách boje. Bez koordinace hierarchie důstojníků nemůže jeden námořník mnoho udělat. Investice do výcviku těchto mužů pro obtížná rozhodnutí a spolupráci je nejvyšší důležitosti." # todo: NEW TRANSLATION
  NORDIC_amphibious_forces: "Amfibické síly" # todo: NEW TRANSLATION
  NORDIC_amphibious_forces_desc: "Zajištěním schopnosti udeřit nepřátele kdekoli a kdykoli snížíme jejich útočnou schopnost. Pokud se budou obávat vylodění kdekoli na pobřeží, nebudou moci nasadit tolik jednotek na frontu. Soustřeďme se na amfibické operace a námořní pěchotu." # todo: NEW TRANSLATION
  NORDIC_joint_military_exercises: "Společná vojenská cvičení" # todo: NEW TRANSLATION
  NORDIC_joint_military_exercises_desc: "Naši vojáci a důstojníci nikdy nezažili alianci jako tuhle; musí být cvičeni tak, aby spolupráce byla druhou přirozeností. Až se tak stane, budou síly [NORDIC_get_alliance_name] neporazitelné." # todo: NEW TRANSLATION
  NORDIC_unified_recruitment: "Jednotný nábor" # todo: NEW TRANSLATION
  NORDIC_unified_recruitment_desc: "Musíme standardizovat nábor a zefektivnit proces, abychom dostali více mužů z náborového úřadu na frontu co nejrychleji." # todo: NEW TRANSLATION
  NORDIC_mechanized_army: "Mechanizovaná armáda" # todo: NEW TRANSLATION
  NORDIC_mechanized_army_desc: "Když zaměříme úsilí na výcvik mužů pro boj uvnitř a vedle obrněných kolosů, můžeme s menším počtem mužů udeřit silněji. Samozřejmě za předpokladu, že je dokážeme produkovat dost." # todo: NEW TRANSLATION
  NORDIC_infantry_first: "Pěchota na prvním místě" # todo: NEW TRANSLATION
  NORDIC_infantry_first_desc: "Generace našich mužů vstupovaly na bojiště s pouhou zbraní a oděvem, aby bojovaly zub za zub. Když naši vojáci uvidí nepřítele ve tváři, uvidí hrozbu a budou bojovat až do smrti za své národy." # todo: NEW TRANSLATION
  NORDIC_expedited_training: "Zrychlený výcvik" # todo: NEW TRANSLATION
  NORDIC_mountaineers: "Horská specialisté" # todo: NEW TRANSLATION
  NORDIC_mountaineers_desc: "Nordický region je ideální pro výcvik a použití horalů. Se silným jádrem horských specialistů bychom měli mnohem snadněji bránit region a být schopni protiúderu, kdykoli se naskytne příležitost. I když část území padne, nikdy se nevzdáme." # todo: NEW TRANSLATION
  NORDIC_nordic_construction_developments: "Nordické stavební projekty" # todo: NEW TRANSLATION
  NORDIC_nordic_construction_developments_desc: "Je mnoho práce v [NORDIC_get_alliance_name] a málo času než hodina zkázy přijde. Budeme muset spolupracovat na zlepšeních, která potřebujeme, abychom dohnali vývoj našich zemí." # todo: NEW TRANSLATION
  NORDIC_materiel_design: "Návrh materiálu" # todo: NEW TRANSLATION
  NORDIC_materiel_design_desc: "Válka se v průběhu generací změnila, ale po staletí to často končilo u muže a jeho pušky. V této nové éře války nemůžeme opomíjet zbraně našich mužů; navržením lepších zbraní vytvoříme lepší vojáky." # todo: NEW TRANSLATION
  NORDIC_nordic_electronics: "Nordická elektronika" # todo: NEW TRANSLATION
  NORDIC_nordic_electronics_desc: "Elektronika je tady a může se stát rozhodujícím faktorem budoucích válek; nesmíme nechat nepřítele předběhnout nás v elektronickém závodě. Vyvíjejme tyto technologie společně, aby tato nová moc byla na naší straně." # todo: NEW TRANSLATION
  NORDIC_research_investments: "Společné výzkumné investice" # todo: NEW TRANSLATION
  NORDIC_research_investments_desc: "Naše aliance je těsnější než jakákoli jiná; není důvod si nechávat technologické pokroky pro sebe. Sdílejme výzkum, aby naše válečné nástroje měly výhodu potřebnou k porážce nepřátel." # todo: NEW TRANSLATION
  NORDIC_civilian_contributions: "Civilní příspěvky" # todo: NEW TRANSLATION
  NORDIC_civilian_contributions_desc: "Když má populace nový pocit sdílené identity s ostatními členy aliance, budou ochotni přispět a obětovat pro válečný stroj, který přinese bezpečí a slávu [NORDIC_get_alliance_name]." # todo: NEW TRANSLATION
  NORDIC_nuclear_research: "Výzkum jaderné energie" # todo: NEW TRANSLATION
  NORDIC_nuclear_research_desc: "Vědci nemohou držet jazyk za zuby o novém světě, který přijde, až bude štěpení atomu zbraňově využito. Proč bychom měli být vyloučeni z tohoto technologického zázraku, který by mohl jedním úderem ukončit válku?" # todo: NEW TRANSLATION
  NORDIC_nordic_rocketry: "Nordická raketová technika" # todo: NEW TRANSLATION
  NORDIC_nordic_rocketry_desc: "Co kdyby naše bomby mohly být doručeny bez zásahu letadla? Samopoháněné zbraně jsou budoucnost; mohli bychom zničit nepřítele z pohodlí [NORDIC_get_alliance_name], pokud bychom chtěli." # todo: NEW TRANSLATION
  NORDIC_standarized_parts: "Standardizované díly" # todo: NEW TRANSLATION
  NORDIC_standarized_parts_desc: "Teď, když stojíme jako celek, můžeme si vzájemně sdílet standardy, aby naše továrny urychlily běh. Vybavení a součástky se mohou stát zaměnitelnými, což výrazně zefektivní výrobu." # todo: NEW TRANSLATION
  NORDIC_fill_the_infrastructure_gaps: "Vyplnit mezer v infrastruktuře" # todo: NEW TRANSLATION
  NORDIC_fill_the_infrastructure_gaps_desc: "Před sjednocením byly naše země na různých úrovních rozvoje; i některé regiony v nejvyspělejších zemích by potřebovaly lepší infrastrukturu. Musíme se spojit, abychom zvedli všechny lodě." # todo: NEW TRANSLATION
  NORDIC_develop_resources: "Rozvíjet zdroje" # todo: NEW TRANSLATION
  NORDIC_develop_resources_desc: "Nikdy nevíš, co najdeš, když hledáš dost tvrdě. Pokud se zaměříme, můžeme objevit neprozkoumané ložiska důležitých surovin a dokonce vyvinout nové způsoby, jak z nich dostat víc." # todo: NEW TRANSLATION
  NORDIC_military_industry_hub: "Centrum vojenského průmyslu" # todo: NEW TRANSLATION
  NORDIC_military_industry_hub_desc: "Soustředěním průmyslu efektivně využijeme blízkost a specializaci k dosažení nových výšin pro naše válečné stroje. Přehlušíme nepřátele, pokud udržíme továrny na místě." # todo: NEW TRANSLATION
  NORDIC_ad_hoc_military_industry: "Ad‑hoc vojenský průmysl" # todo: NEW TRANSLATION
  NORDIC_ad_hoc_military_industry_desc: "Není čas plánovat monumentální tovární komplexy. Musíme stavět průmysl rychle, kdekoli je to možné, s malými továrničkami roztroušenými po [NORDIC_get_alliance_name], abychom neriskovali ztrátu všeho v jedné bitvě." # todo: NEW TRANSLATION
  NORDIC_railway_expansion: "Rozšíření železnic" # todo: NEW TRANSLATION
  NORDIC_railway_expansion_desc: "Železnice jsou tepnami našich národů a nyní více než kdy jindy je potřebujeme co nejrozsáhlejší. Teď, když máme společný cíl, musíme se fyzicky spojit skrze ocel a rychlost lokomotiv." # todo: NEW TRANSLATION
  NORDIC_naval_construction: "Námořní stavitelství" # todo: NEW TRANSLATION
  NORDIC_naval_construction_desc: "Dlouhá námořní tradice a první třída námořníků nic neznamená, pokud nemáme lodě, s nimiž je můžeme nasadit proti nepřátelům. Postavme společný velký loďstvo a použijme jej k drcení každé země, která nás ohrožuje." # todo: NEW TRANSLATION
  NORDIC_nuclear_production: "Jaderná produkce" # todo: NEW TRANSLATION
  NORDIC_nuclear_production_desc: "Teď, když máme znalosti štěpení atomu, použijme je. Ale nejdříve musíme vyprodukovat materiály a infrastrukturu k výrobě dostatečného množství k obratu válek v náš prospěch." # todo: NEW TRANSLATION
  NORDIC_jet_engines: "Ve věk tryskových motorů" # todo: NEW TRANSLATION
  NORDIC_jet_engines_desc: "Nové pokroky v tryskových motorech dělají z špičkových vrtulových letadel papírové draky. Nová éra leteckého boje přichází a bude dominována tryskovým motorem. Pokud spojíme investice, můžeme přeskočit nepřátele a vyrábět vrchol letectva." # todo: NEW TRANSLATION
  NORDIC_machine_tools_research: "Výzkum obráběcích strojů" # todo: NEW TRANSLATION
  NORDIC_machine_tools_research_desc: "Lidská síla je jen část rovnice. Musíme překonat nepřátele v produkci, abychom nahradili jejich ztráty. Proto nesmíme omezit pozornost pouze na nové válečné stroje, ale i na stroje, které je tvoří." # todo: NEW TRANSLATION
  NORDIC_equipment_conversion_focus: "Zaměření na přestavbu vybavení" # todo: NEW TRANSLATION
  NORDIC_equipment_conversion_focus_desc: "Máme obrovské sklady starého vybavení a vozidel, uskladněných nebo ukořistěných. Toto staré zařízení lze upravit na nejnovější a nejnebezpečnější prostředky současného válečného stroje." # todo: NEW TRANSLATION
