  FIN_communist_cw_trade_unions_tt: "- §GČlenové odborů provedou sabotážní akce§! proti §YVojenskému průmyslu§! a §YDokům§!.\n" # todo: NEW TRANSLATION
  FIN_red_guard_divisions_tt: "\n- Jednotky Rudé gardy, s 6 §YMiličnickými§! prapory a 1 §YPodpůrným praporem§!, §Gse rozmístí v kontrolovaných státech§!.\n" # todo: NEW TRANSLATION
