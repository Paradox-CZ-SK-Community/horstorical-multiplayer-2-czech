  SWE_loyalty_laws: "Zákony o loajalitě" # todo: NEW TRANSLATION
  SWE_loyalty_laws_desc: "" # todo: NEW TRANSLATION
  SWE_organize_a_putsch: "Organizovat puč" # todo: NEW TRANSLATION
  SWE_organize_a_putsch_desc: "Konečně jsme shromáždili dostatečnou podporu mezi [SWE.GetAdjective] lidmi, abychom mohli uchopit kontrolu nad Riksdagem. Nezbytně dojde k odporu od zmatených demokratů a socialistů, kteří zapomněli, co to znamená být [SWE.GetAdjective], ale máme sílu je prostě smést." # todo: NEW TRANSLATION
  SWE_delegation_to_berlin: "Delegace do Berlína" # todo: NEW TRANSLATION
  SWE_delegation_to_berlin_desc: "Přestože jsme dosáhli velkých pokroků v mobilizaci mas pro naši věc, zatím nemáme dost podpory k převzetí státu. Nicméně se šíří zvěsti, že [GER.GetLeader] by mohl být ochoten nasadit [GER.GetAdjective] síly, aby nám pomohl v našem boji, za cenu." # todo: NEW TRANSLATION
  SWE_civil_war_tt: "§RVyvolá občanskou válku v§! §Y[ROOT.GetFlag][ROOT.GetName]§! §Rmezi Národněsocialisty a současnou vládou!§!" # todo: NEW TRANSLATION
  SWE_delegation_to_berlin_tt: "Pokud §Y[GER.GetFlag][GER.GetNameDef]§! přijme žádost, připojí se k §Y[ROOT.GetFlag][ROOT.GetAdjective]§! národněsocialistům v občanské válce a §R[ROOT.GetFlag][SWE.GetNameDefCap] se stane loutkou [GER.GetNameDef]!§!" # todo: NEW TRANSLATION
  SWE_king_in_council: "Král v radě" # todo: NEW TRANSLATION
  SWE_king_in_council_desc: "Když Gustav nastoupil na trůn, disponoval velkou mocí nad [SWE.GetAdjective] politikou. Během jeho panování byla jeho autorita ukrajována idealistickými politiky s utopickými vizemi demokracie. Tento nenormální stav musí být obnoven návratem starodávných pravomocí krále." # todo: NEW TRANSLATION
  SWE_king_in_council_tt: "§YRoyalisté§! se stanou vládnoucí stranou." # todo: NEW TRANSLATION
  SWE_restoring_order: "Obnovit pořádek" # todo: NEW TRANSLATION
  SWE_restoring_order_desc: "Řád se rozpadl mezi veřejností po našem hrdinském uchopení moci. Abychom přiklonili populaci na naši stranu, musíme jim ukázat, že můžeme obnovit národ k velikosti. A ti, kdo nás stále odporují, budou vykořeněni a odstraněni." # todo: NEW TRANSLATION
  SWE_the_new_order: "Nový řád" # todo: NEW TRANSLATION
  SWE_the_new_order_desc: "Přežití nejsilnějšího je jádrem našich přesvědčení. Je čas zničit oslabené [GER.GetName] a znovu se prosadit jako nezávislá velmoc." # todo: NEW TRANSLATION
  SWE_the_new_order_tt: "Po dokončení $SWE_the_new_order$ uzavřeme bílý mír s každým nepřítelem [GER.GetNameDef]" # todo: NEW TRANSLATION
  SWE_the_new_order_tt_2: "§Y[SWE.GetName]§! bude známa jako §Y$SWE_the_new_order$§!" # todo: NEW TRANSLATION
  SWE_the_new_order_peace_message: "Švédsko se vzbouřilo proti Německu" # todo: NEW TRANSLATION
  SWE_mythologize_swedish_history: "Kontrarevoluce" # todo: NEW TRANSLATION
  SWE_mythologize_swedish_history_desc: "Uchopili jsme kontrolu nad státním aparátem, ale stále je mnoho věcí, které je třeba udělat, abychom zajistili náš pevný úchop moci. Proto provedeme vlnu reforem, abychom uspokojili naše politické podporovatele a zároveň vymýtili všechny odpůrce na odporu vůči naší autoritě." # todo: NEW TRANSLATION
  SWE_mythologize_swedish_history_tt: "Odemkne rozhodnutí a aktivuje mise k naplnění předchozích závazků vůči frakcím, které podpořily nacionalisty během jejich nástupu k moci. §RStabilita bude drasticky ovlivněna, pokud závazky nebudou splněny!§!" # todo: NEW TRANSLATION
  SWE_crisis_affecting_variables: "Budou pravděpodobněji přijmout, pokud:\n -Budou mít §Yvysoký názor na nás§!\n -Máme silnější §Yarmádu§! než oni\n -Mají méně než §Y40% válečné podpory§!\n -Nejsou ve frakci" # todo: NEW TRANSLATION
  SWE_narvik_crisis: "Narvická krize" # todo: NEW TRANSLATION
  SWE_narvik_crisis_desc: "Narvik je strategicky důležitý jako hlavní vývozní trasa pro naši železnou rudu během zimních měsíců. Abychom zajistili naši národní bezpečnost v těchto bouřlivých časech, region by měl být postaven pod naši jurisdikci. A pokud při tom [NOR.GetName] oslabíme, tím lépe." # todo: NEW TRANSLATION
  SWE_bornholm_crisis: "Bornholmská krize" # todo: NEW TRANSLATION
  SWE_bornholm_crisis_desc: "Ostrovy Bornholm jsme ztratili, když se před staletími vzbouřily, přestože právně nikdy nebyly postoupeny [Den.GetName]. Strategicky důležité, protože kontrolují Dolní Baltské moře, je jasné, že [Den.GetName] je nedokáže bránit. My je můžeme a musíme znovu získat pro naši bezpečnost." # todo: NEW TRANSLATION
  SWE_the_aland_issue: "Otázka Åland" # todo: NEW TRANSLATION
  SWE_the_aland_issue_desc: "Ålanďané mluví švédsky, identifikují se jako Švédové a byli by Švédové nebýt vměšování Společnosti národů. Jak si může někdo myslet, že nejsou Švédy? Je čas napravit tuto historickou nespravedlnost." # todo: NEW TRANSLATION
  SWE_join_the_anti_soviet_pact: "Připojit se k anti-sovětskému paktu" # todo: NEW TRANSLATION
  SWE_join_the_anti_soviet_pact_desc: "Většina národů se bojí vzestupu [SOV.GetNameDef], ale má malý záměr dělat cokoli, aby zabránila šíření jejich vlivu, kromě signatářů Paktu proti Kominterně. Měli bychom jasně ukázat své úmysly tím, že se také připojíme k paktu." # todo: NEW TRANSLATION
  SWE_join_the_anti_soviet_pact_tt: "Zřídíme sféry vlivu s [GER.GetName], což je udělá velmi nepravděpodobnými útočit na §Y[DEN.GetName]§! a §Y[NOR.GetName]§! po §Y2 roky§!" # todo: NEW TRANSLATION
  SWE_demand_atlantic_resource_rights: "Požadovat práva na atlantské zdroje" # todo: NEW TRANSLATION
  SWE_demand_atlantic_resource_rights_desc: "Úspěšně jsme podkopali suverenitu [DEN.GetAdjective], nyní musíme učinit další krok a připravit se jim o území v Atlantském oceánu pod záminkou ochrany před možnými agresory v regionu." # todo: NEW TRANSLATION
  SWE_demand_demilitarization_of_finnish_border: "Demilitarizace finské hranice" # todo: NEW TRANSLATION
  SWE_demand_demilitarization_of_finnish_border_desc: "Jako součást našich plánů na reintegraci [FIN.GetName] musíme i nadále ohlodávat jejich suverenitu, zatímco jim umožníme zachovat věrohodnou obranu proti [SOV.GetAdjective] na východě. Měli bychom proto tlačit na demilitarizaci jejich hranice s námi, což ztíží jejich obranu, pokud budeme muset do jejich záležitostí zasáhnout silou." # todo: NEW TRANSLATION
  SWE_united_kingdoms_of_sweden_and_norway: "Spojené království Švédska a Norska" # todo: NEW TRANSLATION
  SWE_united_kingdoms_of_sweden_and_norway_desc: "Po narvické krizi a našich následných ziscích byl [NOR.GetName] oslaben a zdeptán. Nyní musíme zasadit rozhodující úder do [NOR.GetAdjective] nezávislosti a vynutit znovusjednocení našich národů pod jedním vládcem." # todo: NEW TRANSLATION
  SWE_swedish_finnish_defense_agreement: "Švédsko-finská obranná dohoda" # todo: NEW TRANSLATION
  SWE_swedish_finnish_defense_agreement_desc: "Dokud nebude hrozba [SOV.GetNameDef] zažehnána, je v našem zájmu vojensky spolupracovat s [FIN.GetAdjective] stranou. Jednou je vrátíme pod naši nadvládu, ale prozatím máme větší problémy na řešení." # todo: NEW TRANSLATION
  SWE_danish_alignment: "Dánské vyrovnání" # todo: NEW TRANSLATION
  SWE_danish_alignment_desc: "[DEN.GetName] má strategickou polohu a je podstatně slabší než jeho sousedé, takže je téměř nevyhnutelné, že se je některý z nich pokusí připravit o nezávislost. Proto bychom měli udeřit první, než ztratíme příležitost." # todo: NEW TRANSLATION
  SWE_finnish_integration: "Östra Rikshalvan" # todo: NEW TRANSLATION
  SWE_finnish_integration_desc: "Suverenita [FIN.GetAdjective] byla naším úsilím v posledních letech úspěšně podkopána. Nyní musíme učinit konečný krok a požadovat, aby zaujali své místo jako naši právoplatní poddaní. Pokud tak neudělají dobrovolně, donutíme je přijmout rozum silou." # todo: NEW TRANSLATION
  SWE_crusade_against_bolshevism: "[AAT_crusade_against_sov]" # todo: NEW TRANSLATION
  SWE_crusade_against_bol: "Křížová výprava proti bolševismu" # todo: NEW TRANSLATION
  SWE_crusade_against_rus: "Křížová výprava proti ruskému imperialismu" # todo: NEW TRANSLATION
  SWE_crusade_against_bolshevism_desc: "[SOV.GetNameDefCap] je největší hrozbou pro tradiční evropské hodnoty, kterou jsme za staletí viděli. Už nestačí jej pouze zadržovat, musíme zahájit novou křížovou výpravu proti bolševismu a zničit ho." # todo: NEW TRANSLATION
  SWE_crusade_against_bolshevism_tt: "\nPokud je §Y$SWE_crusade_against_the_eastern_threat$§! aktivní, zatímco §Y[SWE.GetName]§! nebo jakýkoli člen frakce obsadí některý z těchto států:\n§Y[195.GetName]§!,§Y[206.GetName]§!,§Y[202.GetName]§!,§Y[242.GetName]§!,§Y[219.GetName]§!,§Y[137.GetName]§!,§Y[218.GetName]§!,§Y[217.GetName]§!,§Y[252.GetName]§!,§Y[249.GetName]§!,§Y[229.GetName]§!,§Y[247.GetName]§!,§Y[408.GetName]§!,§Y[214.GetName]§! bude resetován na plných 365 dní." # todo: NEW TRANSLATION
  SWE_reclaiming_the_rus: "Reintegrace Rusů" # todo: NEW TRANSLATION
  SWE_reclaiming_the_rus_desc: "Naši předkové kdysi obývali řeky západního Ruska a Ukrajiny, usazovali se podél jejich břehů. Je načase integrovat tyto regiony do naší domény a dokončit to, co začali kolonizací." # todo: NEW TRANSLATION
  SWE_greater_nordic_reich: "Det Stornordiska Riket" # todo: NEW TRANSLATION
  SWE_greater_nordic_reich_desc: "Pouze silou jsme se stali nepochybnými pány Skandinávie. Ale to je teprve začátek pro náš lid. Jak se sjednotíme jako jedno Rike, svět by se měl připravit na to, co přijde." # todo: NEW TRANSLATION
  SWE_greater_nordic_reich_tt: "Umožňuje připojování a anektování §YNordických§! subjektů" # todo: NEW TRANSLATION
  SWE_the_cross_we_bear: "Kříž, který neseme" # todo: NEW TRANSLATION
  SWE_the_cross_we_bear_desc: "Jsme všichni nordičtí bratři a sestry. [SWE.GetAdjective] stát nemůže v dobrém svědomí jen tak nečinně přihlížet, zatímco naši nordičtí bratři trpí okupací. Je naší povinností je osvobodit, aby jsme všichni mohli žít a umírat na severu, svobodní od války a tyranie." # todo: NEW TRANSLATION
  SWE_the_cross_we_bear_tt_1: "Za každou §YNordickou§! zemi, která je okupována:" # todo: NEW TRANSLATION
  SWE_the_cross_we_bear_tt_2: "Za každou §YNordickou§! zemi, která je osvobozena: " # todo: NEW TRANSLATION
  SWE_the_cross_we_bear_tt_3: "Zvyšuje sílu §Y$SWE_the_cross_we_bear$§! o:" # todo: NEW TRANSLATION
  SWE_scandinavian_defense_union: "Skandinávská obranná unie" # todo: NEW TRANSLATION
  SWE_scandinavian_defense_union_desc: "Nedávné konflikty ukázaly, že setrvávání v izolované neutralitě je extrémně nebezpečné. Pokud se chceme vyhnout obklíčení nepřáteli v budoucnu, měli bychom vytvořit dohodu s našimi nordickými sousedy, abychom se vzájemně bránili v případě útoku." # todo: NEW TRANSLATION
  SWE_the_threat_of_the_iron_curtain: "Hrozba železné opony" # todo: NEW TRANSLATION
  SWE_the_threat_of_the_iron_curtain_desc: "Navzdory nedávnému konfliktu, který pohltil velkou část světa, mezi vítěznými mocnostmi roste napětí. Abychom se vyhnuli tomu, že nás postupně vyřadí protivníci, měli bychom je odstrašit tím, že budeme součástí aliance podobně smýšlejících států." # todo: NEW TRANSLATION
  SWE_special_forces: "Investovat do speciálních sil" # todo: NEW TRANSLATION
  SWE_special_forces_desc: "Moderní válka někdy vyžaduje malé skupiny specializovaných sil, které dokáží provádět mise v drsném terénu nebo působit za nepřátelskými liniemi bez podpory. Měli bychom proto vytvořit speciální silu schopnou působit jako předvoj [SWE.GetAdjective] armády, když to bude nezbytné." # todo: NEW TRANSLATION
  SWE_acquire_ww2_tanks_and_wrecks: "Získat polomontované tanky z bojiště" # todo: NEW TRANSLATION
  SWE_acquire_ww2_tanks_and_wrecks_desc: "Jak se prach po celé Evropě usazuje, na bitevních polích leží bezpočet opuštěných tanků, které bychom mohli využít k výzkumu a vývoji zlepšení našich vlastních konstrukcí. Možná je čas tuto situaci využít dříve, než tyto válečné kořisti vezmou jiní." # todo: NEW TRANSLATION
  SWE_extend_the_time_of_preparedness: "Prodlužení stavu pohotovosti" # todo: NEW TRANSLATION
  SWE_extend_the_time_of_preparedness_desc: "Zatímco někteří chtějí, aby se věci okamžitě vrátily do normálu v [ROOT.GetName], hrozby na obzoru přetrvávají. Abychom si udrželi schopnost bránit národ, musíme pokračovat v současném stavu připravenosti a odhodlání k totalitní obraně." # todo: NEW TRANSLATION
  SWE_increase_intelligence_funding: "Zvýšit financování rozvědky" # todo: NEW TRANSLATION
  SWE_increase_intelligence_funding_desc: "[SWE.capital.GetCapitalVictoryPointName] se v posledních letech stalo centrem špionážní činnosti. Měli bychom zvýšit financování naší tajné služby, aby mohli vyvíjet nové technologie a aktivněji sledovat tuto činnost dříve, než ohrozí naše zájmy." # todo: NEW TRANSLATION
  SWE_karnvapenprogram: "Kärnvapenprogram" # todo: NEW TRANSLATION
  SWE_karnvapenprogram_bonus: "Bonus Kärnvapenprogram" # todo: NEW TRANSLATION
  SWE_karnvapenprogram_nuclear_bonus: "Jaderný bonus Kärnvapenprogram" # todo: NEW TRANSLATION
  SWE_karnvapenprogram_air_bonus: "Vzdušný bonus Kärnvapenprogram" # todo: NEW TRANSLATION
  SWE_ger_swe_nuclear_bonus: "Německo-švédský uranový projekt bonus" # todo: NEW TRANSLATION
  SWE_karnvapenprogram_desc: "S vývojem atomových zbraní je jediným způsobem skutečně zaručit naši národní bezpečnost vyvinutí takových zbraní a adekvátních nosičů. Využitím záměrného vývoje jaderné energie a konvenčních zbraní to můžeme udělat, aniž bychom vyvolali poplach u velmocí." # todo: NEW TRANSLATION
  SWE_specialized_equipment: "Specializované vojenské vybavení" # todo: NEW TRANSLATION
  SWE_specialized_equipment_desc: "Výcvik nových speciálních sil pokračuje dobře. Nicméně je zřejmé, že by byly efektivnější s specializovaným vybavením a vozidly pro jejich mise." # todo: NEW TRANSLATION
  SWE_specialized_equipment_tt: "Odemkne specializované vybavení podle dříve zvolených speciálních sil (rangers, výsadkáři nebo mariňáci)." # todo: NEW TRANSLATION
  SWE_something_something_neutrality_butt_really: "Něco něco neutrality, no fakt" # todo: NEW TRANSLATION
  SWE_something_something_neutrality_butt_really_desc: "TODO" # todo: NEW TRANSLATION
  SWE_the_lion_of_the_north_rises: "Vznešený lev severu povstává" # todo: NEW TRANSLATION
  SWE_the_lion_of_the_north_rises_desc: "Příliš dlouho Švédsko stálo stranou světových mocenských bojů. Kvůli tomu jsme byli vystaveni nepřijatelným požadavkům a blokádám ze strany velmocí. Tyto dny jsou pryč, lev severu znovu povstane a vezme si své místo jako vůdce regionu." # todo: NEW TRANSLATION
  SWE_preemptive_strike: "Preemptivní úder" # todo: NEW TRANSLATION
  SWE_preemptive_strike_desc: "Zatímco mnozí si přejí konflikt opustit v minulosti, nemůžeme si dovolit opakovat stejné chyby. Musíme udeřit na naše protivníky dříve, než zesílí nebo co hůř, vyvinou vlastní atomové zbraně. Pokud zaútočíme rychle a tvrdě, můžeme je zaskočit." # todo: NEW TRANSLATION
  SWE_war_games: "Válečné hry" # todo: NEW TRANSLATION
  SWE_war_games_desc: "Mezi námi a našimi protivníky už není žádné předstírání, pokud jde o naše geopolitické postavení. Proto nemáme co ztratit, když zapojíme armádu do válečných her, které předvídají konflikt s těmito protivníky." # todo: NEW TRANSLATION
  SWE_scramble_for_the_baltic: "Rvačka o Baltské moře" # todo: NEW TRANSLATION
  SWE_scramble_for_the_baltic_desc: "Území, které nyní zaujímají pobaltské státy, kdysi patřilo švédské říši. Pokud chceme znovu prosadit naši nadvládu nad širým Baltským mořem, musíme jednat rychle, abychom tato území získali dřív, než je obsadí [GER.GetAdjective] nebo [SOV.GetAdjective]." # todo: NEW TRANSLATION
  SWE_economic_integration: "Integrovat ekonomiku s [GER.GetNameDef]" # todo: NEW TRANSLATION
  SWE_economic_integration_desc: "Po naší krvavé cestě k moci leží národ v troskách a zoufale potřebuje obnovu. S naším průmyslem v rozvalinách bychom měli usilovat o propojení naší ekonomiky s širší [GER.GetAdjective] ekonomikou, abychom využili jejich hospodářské síly." # todo: NEW TRANSLATION
  SWE_economic_independence: "Udržet ekonomickou nezávislost" # todo: NEW TRANSLATION
  SWE_economic_independence_desc: "I když jsme vděční za [GER.GetAdjective] podporu při naší slávné revoluci, nemáme v úmyslu stát se jedním z jejich provincií. K obnovení ekonomiky musíme strukturovat hospodářství tak, aby upřednostňovalo ekonomickou nezávislost." # todo: NEW TRANSLATION
  SWE_military_integration: "Integrovat vojensko s [GER.GetNameDef]" # todo: NEW TRANSLATION
  SWE_military_integration_desc: "Švédové zapomněli, jak vést válku, ale máme příležitost obnovit tyto znalosti vybudováním našich vztahů s [GER.GetNameDef]. Integrací naší armády s jejich můžeme přispět k osvobození Evropy od bolševismu a zároveň zesílit [SWE.GetAdjective] lid v procesu." # todo: NEW TRANSLATION
  SWE_military_independence: "Udržet nezávislou armádu" # todo: NEW TRANSLATION
  SWE_military_independence_desc: "Proč by měli [SWE.GetAdjective] vojáci umírat za [GER.GetNameDef] v Alpách nebo severní Africe, když máme naléhavější problémy blíže domovu? Musíme udržet vojenskou nezávislost a shromáždit síly pro hrozby na našich hranicích." # todo: NEW TRANSLATION
  SWE_germanify_sweden: "Přijmout germánskou kulturu" # todo: NEW TRANSLATION
  SWE_germanify_sweden_desc: "Zatímco mnozí tvrdí, že jsme odlišné národy, nedávné zkušenosti ukázaly, že Švédsko je součástí germánského bratrství, spojeného krví. Je čas zbavit se pozůstatků cizího vlivu a znovu přijmout naše germánské kořeny." # todo: NEW TRANSLATION
  SWE_promote_nordic_identity: "Prosazovat nordickou identitu" # todo: NEW TRANSLATION
  SWE_promote_nordic_identity_desc: "Mohou existovat podobnosti mezi nordickou a [GER.GetAdjective] kulturou, ale nejsme [GER.GetAdjective]. Lidé Skandinávie a Finska mají vlastní kulturu a tradice sahající hlouběji do historie, které musí být zachovány a chráněny před ostatními." # todo: NEW TRANSLATION
  SWE_finland_claims: "Uznání našich finských nároků" # todo: NEW TRANSLATION
  SWE_finland_claims_desc: "Území [FIN.GetNameDef] je právoplatně naší doménou a s naší nově nabytou silou bychom mohli znovu uplatnit nad ním kontrolu. Nedávné konflikty v regionu však komplikovaly geopolitickou situaci. Proto potřebujeme podporu [GER.GetNameDef], aby naše nároky měly váhu." # todo: NEW TRANSLATION
  SWE_establish_nordland: "Reichsprotektorát Nordland" # todo: NEW TRANSLATION
  SWE_establish_nordland_desc: "Vystoupali jsme z popela pod vedením [GER.GetNameDef], silnější než kdy předtím. Nyní budeme odměněni za naši loajalitu rozšířením naší domény hluboko na východ." # todo: NEW TRANSLATION
  SWE_establish_nordland_tt: "§Y[SWE.GetNameDef]§! bude znám jako §Y$SWE_establish_nordland$§!" # todo: NEW TRANSLATION
  SWE_uranium_project: "[GER.GetAdjective]-[SWE.GetAdjective] Uranprojekt " # todo: NEW TRANSLATION
  SWE_uranium_project_desc: "[GER.GetAdjective] vědci se mnoho let zabývají jaderným výzkumem. Tvrdí, že energie atomu by mohla být uvolněna v jediném kolosálním výbuchu. S přístupem k těžké vodě pro experimenty a našimi společnými vědeckými znalostmi jim můžeme pomoci vytvořit takové zázračné zbraně." # todo: NEW TRANSLATION
  SWE_betray_germany_plan: "Směřem ke švédskému Rike" # todo: NEW TRANSLATION
  SWE_betray_germany_plan_desc: "[GER.GetNameDefCap] je přetížen a odsouzen k rozpadu. Měli bychom proto plánovat zajištění naší vlastní budoucnosti urychlením jejich pádu. Ale to bude možné jen tehdy, pokud jsou nepřátelé [GER.GetNameDef] ochotni uzavřít s námi separátní mír…" # todo: NEW TRANSLATION
  SWE_undermine_the_fascists: "Podkopat fašisty" # todo: NEW TRANSLATION
  SWE_undermine_the_fascists_desc: "Fašisté usilující o moc jsou nic než rozzuřená masa, která by, kdyby dostala šanci, zavedla národ do záhuby. Musíme podkopat jejich podporu a zajistit, aby všichni praví vlastenci zůstali loajální králi." # todo: NEW TRANSLATION
  SWE_revoke_anti_militia_laws: "Zrušit zákony proti milicím" # todo: NEW TRANSLATION
  SWE_revoke_anti_militia_laws_desc: "Krátkozrací politici v Riksdagu zakázali vytváření polovojenských skupin v roce 1934 po odhalení Munckska kåren. S tolika socialisty a jinými zrádci mezi námi musíme zákaz zvrátit a vytvořit novou sílu Stormtruppers k ochraně národa." # todo: NEW TRANSLATION
  SWE_revoke_anti_militia_laws_tt: "Vytvoří novou šablonu divize §YStormtrupper§! a odemkne §YNábor Stormtrupper milicí§! poté, co se dostane k moci [SWE.GetFascistParty]." # todo: NEW TRANSLATION
  SWE_unify_the_national_socialist_movement: "Sjednotit národněsocialistické hnutí" # todo: NEW TRANSLATION
  SWE_unify_the_national_socialist_movement_desc: "Národněsocialistické hnutí je rozděleno do nespočtu frakcí, které si navzájem píší malicherné články nebo se prostě rvou v ulicích. Pokud mají mít šanci sestavit vládu, budou se muset sjednotit kolem jednoho vůdce a jeho poselství." # todo: NEW TRANSLATION
  SWE_unify_the_national_socialist_movement_tt_1: "Jednu z následujících možností lze z události zvolit:" # todo: NEW TRANSLATION
  SWE_unify_the_national_socialist_movement_tt_2: "Nebo:" # todo: NEW TRANSLATION
  SWE_unify_the_national_socialist_movement_tt_3: "Odemkne rozhodnutí ke zvýšení fašistické podpory prostřednictvím pochodů ve státech, kde byly rekrutovány Stormtrupper jednotky." # todo: NEW TRANSLATION
  SWE_meet_with_the_king: "Setkat se s králem" # todo: NEW TRANSLATION
  SWE_meet_with_the_king_desc: "Vzestup nacionalismu v [SWE.GetName] upoutal pozornost krále. Požádal vedoucí osobnosti, které shromáždily tuto podporu, aby se s ním setkaly v královském paláci a probraly své záměry." # todo: NEW TRANSLATION
  SWE_meet_with_the_king_tt: "Odemkne rozhodnutí ke zvýšení podpory royalistického hnutí prostřednictvím královských turné po [SWE.GetName]" # todo: NEW TRANSLATION
  SWE_attack_Landsorganisationen: "Útok na Landsorganisationen" # todo: NEW TRANSLATION
  SWE_attack_Landsorganisationen_desc: "Sociální demokraté jsou hlavní překážkou, kterou musíme překonat, pokud chceme zachránit národ před bolševismem. Místo přímého boje v malicherných volbách použijeme naše zdroje k obrácení veřejnosti proti odborům, které stranu financují." # todo: NEW TRANSLATION
  SWE_appeal_for_support: "Žádat o podporu" # todo: NEW TRANSLATION
  SWE_appeal_for_support_desc: "Aristokratická establishment [SWE.GetName] viděla, jak jejich moc a vliv byly postupně ohlodávány, ale ještě nezmizely. Shromážděním jejich podpory a zdrojů můžeme vrátit národ k přirozenějšímu typu vlády." # todo: NEW TRANSLATION
  SWE_appeal_for_support_tt: "Odemkne rozhodnutí 'Žádat o podporu'§! k získání politické podpory pro nacionalistické hnutí." # todo: NEW TRANSLATION
  SWE_align_more_closely_with_the_landsorganisationen: "Sblížit se s Landsorganisationen" # todo: NEW TRANSLATION
  SWE_align_more_closely_with_the_landsorganisationen_desc: "Silné odbory a pracovní ochrany jsou nutností v moderní pracovní síle. Vytvoříme silná pouta s těmito odbory pro lepší postavení všech pracovníků." # todo: NEW TRANSLATION
  SWE_align_more_closely_with_the_landsorganisationen_tt: "Odemkne poradce:\n" # todo: NEW TRANSLATION
  SWE_socialist_reforms: "Socialistické reformy" # todo: NEW TRANSLATION
  SWE_socialist_reforms_desc: "Nyní, když jsme získali dost moci v Riksdagu, můžeme začít klást základy skutečné socialistické republiky. Abychom zajistili naši pozici, musíme rychle zavést reformy omezující vliv buržoazie a získat podporu proletariátu." # todo: NEW TRANSLATION
  SWE_socialist_reforms_tt: "§YFolkhemmet§! nyní poskytuje bonus k výzkumu ve výši 25% z §Y$MODIFIER_CONSUMER_GOODS_FACTOR$§!.\n§YFolkhemmet§! nyní poskytuje bonus §Y$BONUS_PRODUCTION_EFFICIENCY_CAP_FACTOR$§! rovnající se 50% z §Y$MODIFIER_CONSUMER_GOODS_FACTOR$§!." # todo: NEW TRANSLATION
  SWE_ture_nerman_tt: "$SWE_ture_nerman$" # todo: NEW TRANSLATION
  SWE_fredrik_strom_tt: "$SWE_fredrik_strom$" # todo: NEW TRANSLATION
  SWE_zeth_hoglund_tt: "$SWE_zeth_hoglund$" # todo: NEW TRANSLATION
  SWE_police_reforms: "Zabránit kontrarevoluci" # todo: NEW TRANSLATION
  SWE_police_reforms_desc: "Naše politiky si pochopitelně vytvořily mocné nepřátele mezi buržoazií a aristokracií. Abychom zabránili kontrarevoluci, musíme jednat rychle a vymýtit je, spolu se všemi možnými zrádci mezi proletariátem." # todo: NEW TRANSLATION
  SWE_refuge_from_war: "Útočiště před válkou" # todo: NEW TRANSLATION
  SWE_refuge_from_war_desc: "Válka nevyhnutelně vede k exodu těch, kteří se bojí o život pod novým režimem. Mnozí z těch na útěku mají dovednosti, které by nám mohly prospět. S trochou snahy se můžeme dohodnout na vzájemně výhodném uspořádání." # todo: NEW TRANSLATION
  SWE_refuge_from_war_tt: "Získá pracovní sílu za každou zemi, která není momentálně komunistická, škálovaně podle komunisticé podpory dané země. §YNordické§! a §Yvelmoci§! poskytují větší možný podíl pracovní síly, zatímco §Ymaly státy§! menší podíl, s maximálním možným nárůstem manpower: §G+80000§!\nCelková získaná pracovní síla podle současné světové situace: §G+[?SWE_refugee_from_war_total_manpower_gained]§!\nNárod poskytující nejméně pracovní síly: §Y[?SWE_refugee_min_manpower_country.GetName]§!: §G+[?SWE_refugee_min_manpower_gained]§!\nNárod poskytující nejvíce pracovní síly: §Y[?SWE_refugee_max_manpower_country.GetName]§!: §G+[?SWE_refugee_max_manpower_gained]§!\nPrůměr získané pracovní síly na zemi: §G+[?SWE_refugee_from_war_average_manpower_per_country]§!" # todo: NEW TRANSLATION
  SWE_refuge_for_revolutionaries: "Útočiště pro revolucionáře" # todo: NEW TRANSLATION
  SWE_refuge_for_revolutionaries_desc: "I když je socialismus nevyhnutelný, stále existují revolucionáři na prohrané straně nebo uvěznění v zemi, která zradila proletariát. Jasně ukážeme, že všichni tací revolucionáři mohou nalézt účel a bezpečí ve [SWE.GetName]." # todo: NEW TRANSLATION
  SWE_refuge_for_revolutionaries_tt: "Komunističtí poradci z jiných zemí se přemístí do [SWE.GetName] v závislosti na politické situaci jejich domovské země. Aktuálně se do [SWE.GetName] přemístí tito poradci:" # todo: NEW TRANSLATION
  SWE_liquidate_the_monarchy: "Zlikvidovat monarchii" # todo: NEW TRANSLATION
  SWE_liquidate_the_monarchy_desc: "Nastal čas zničit parazitickou instituci monarchie v [SWE.GetName] jednou provždy. Královské rodině a širší aristokracii budou odebrány tituly a jejich bohatství bude přerozděleno lidu." # todo: NEW TRANSLATION
  SWE_establish_politburo: "Zřídit politbyro" # todo: NEW TRANSLATION
  SWE_establish_politburo_desc: "S jejich mocí zbavenou, buržoazie a aristokracie přestaly existovat. Rozpustíme poslední pozůstatek jejich vlivu, Riksdag. Na jeho místo ustanovíme novou dělnickou vládu." # todo: NEW TRANSLATION
  SWE_five_year_plan: "Státní plánovací komise" # todo: NEW TRANSLATION
  SWE_five_year_plan_desc: "S ustavením politbyra a znárodněním průmyslu nyní potřebujeme agenturu, která bude monitorovat hospodářské záležitosti a doporučovat politická rozhodnutí ústřednímu výboru politbyra." # todo: NEW TRANSLATION
  SWE_peoples_commissar_for_defense: "Lidový komisař pro obranu" # todo: NEW TRANSLATION
  SWE_peoples_commissar_for_defense_desc: "Jednoho dne budou všechny hranice rozpuštěny, až se dělníci světa sjednotí. Do té doby musíme zůstat ostražití a připravení na jakýkoli vpád do našeho území. Abychom dohlédli na naši obranu, potřebujeme nové ministerstvo obrany bez vlivu bývalé aristokracie." # todo: NEW TRANSLATION
  SWE_starve_the_fascists_of_iron: "Odmítat železnou rudu našim nepřátelům" # todo: NEW TRANSLATION
  SWE_starve_the_fascists_of_iron_desc: "Nebudeme opakovat chybu druhých, že jsme svým budoucím nepřátelům dovolili používat naše zdroje k vedení války proti nám. Od této chvíle zakážeme veškeré vývozy zdrojů těmto zemím, včetně naší ceněné železné rudy." # todo: NEW TRANSLATION
  SWE_finnish_buffer_state: "Finský ochranný stát" # todo: NEW TRANSLATION
  SWE_finnish_buffer_state_desc: "Není pochyb o tom, že [SOV.GetNameDef] by dal přednost, aby někdo více nakloněný jejich zájmům kontroloval [SWE.GetAdjective] záležitosti. Abychom předešli konfliktu, je zásadní, aby [FIN.GetName] se stal ochranným státem, který bude nakloněn našim zájmům." # todo: NEW TRANSLATION
  SWE_support_norwegian_communists: "Podpora norských komunistů" # todo: NEW TRANSLATION
  SWE_support_norwegian_communists_desc: "Nebudeme nikdy plně v bezpečí, dokud nebude [NOR.GetName] osvobozen od buržoazní nadvlády. Nepřijali by však nikdy socialistickou vládu vnutou námi. Proto musíme podpořit [NOR.GetAdjective] komunisty v jejich snaze svrhnout ustavený řád." # todo: NEW TRANSLATION
  SWE_support_danish_communists: "Podpora dánských komunistů" # todo: NEW TRANSLATION
  SWE_support_danish_communists_desc: "[DEN.GetName] má strategickou polohu mezi Baltem a Severním mořem a poskytuje nepřijatelnou míru kontroly nad naší národní bezpečností. Jediný způsob, jak zajistit, aby nás nezradili, je podpořit [DEN.GetAdjective] komunistické hnutí a ustanovit tam přátelský režim." # todo: NEW TRANSLATION
  SWE_sami_reconcilliation: "Usmíření se Sámi" # todo: NEW TRANSLATION
  SWE_sami_reconcilliation_desc: "Sámi lid trpěl po staletí, když národy kradly jejich historické půdy a omezovaly jejich práva. Uděláme, co je v našich silách, abychom napravili křivdy a zahájili proces usmíření se Sámi." # todo: NEW TRANSLATION
  SWE_deep_mining_complexes: "Hluboké těžební komplexy" # todo: NEW TRANSLATION
  SWE_deep_mining_complexes_desc: "[SWE.GetName] má hojný podzemní nerostný bohatství. Měli bychom zvýšit investice do těžebního sektoru, abychom tyto zdroje lépe využili. Dále můžeme odradit útoky proti nám zničením dolů, čímž nepřátelům odepřeme přístup ke zdrojům, které by chtěli." # todo: NEW TRANSLATION
  SWE_affordable_housing: "Dostupné bydlení" # todo: NEW TRANSLATION
  SWE_affordable_housing_desc: "Zatímco standard bydlení ve městech se začal zlepšovat, příliš mnoho lidí je stále uvězněno chudobou kvůli neúnosným nájmům. Musíme zajistit, aby všichni měli přístup k dostupnému bydlení a tím napravit situaci." # todo: NEW TRANSLATION
  SWE_continue_the_second_industrial_revolution: "Pokračovat v druhé průmyslové revoluci" # todo: NEW TRANSLATION
  SWE_continue_the_second_industrial_revolution_desc: "Pokračující industrializace je klíčem k větší prosperitě a bezpečí pro náš lid. Musíme tedy využít sílu nových technologií a usilovat o rychlejší tempo industrializace po celém [SWE.GetName]." # todo: NEW TRANSLATION
  SWE_paid_holidays: "Státem placená dovolená" # todo: NEW TRANSLATION
  SWE_paid_holidays_desc: "Příčinou mnoha napětí mezi dělníky a podniky byla otázka dovolené. Soukromý sektor bude dělat jen minimum bez porušení zákona, zatímco maximalizuje své zisky. Je čas, aby stát zasáhl a reguloval dovolené ve prospěch dělníků." # todo: NEW TRANSLATION
  SWE_paid_holidays_policy_tt: "§G+3%§! §YStabilita§! a §G+5%§! §YRychlost výstavby§! během většiny roku.\n§Y+20% spotřebního zboží§! po dobu 30 dnů v roce" # todo: NEW TRANSLATION
  SWE_privately_managed_holidays: "Soukromě řízené dovolené" # todo: NEW TRANSLATION
  SWE_privately_managed_holidays_desc: "Stát nemá právo zasahovat do toho, jak podnik vede svoji činnost. Proto dovolíme soukromému sektoru řídit politiku dovolených. Pokud se dělníkům nelíbí, mohou si najít jiné zaměstnání." # todo: NEW TRANSLATION
  SWE_kockums: "Kockums" # todo: NEW TRANSLATION
  SWE_kockums_desc: "Kockums se ukázal být schopný vyrábět lodě a ponorky pro námořnictvo. Měli bychom rozšířit jejich provoz a zvýšit produkci lodí, které mohou vyrábět." # todo: NEW TRANSLATION
  SWE_gotaverken: "Götaverken" # todo: NEW TRANSLATION
  SWE_gotaverken_desc: "Abychom modernizovali námořnictvo, musíme rozšířit loděnice Götaverken a investovat do nových výrobních technologií pro konstrukci válečných lodí." # todo: NEW TRANSLATION
  SWE_refit_gotaverken_for_rapid_repairs: "Přestavět Götaverken pro rychlé opravy" # todo: NEW TRANSLATION
  SWE_refit_gotaverken_for_rapid_repairs_desc: "Věnování doků opravám může snížit rychlost, jakou můžeme stavět lodě, ale výrazně zlepší naši schopnost udržet flotilu v bojeschopném stavu." # todo: NEW TRANSLATION
  SWE_retool_dockyards: "Přeorientovat loděnice" # todo: NEW TRANSLATION
  SWE_retool_dockyards_desc: "Soustředění našeho úsilí na menší lodě a ponorky bude hrát do našich sil více než pokus konkurovat velmocím." # todo: NEW TRANSLATION
  SWE_archapeligo_harrasment: "Obtěžování v souostroví" # todo: NEW TRANSLATION
  SWE_archapeligo_harrasment_desc: "Naše pobřeží jsou překážkou pro každého potenciálního agresora. Můžeme však více využít naši znalost souostroví k lepšímu obtěžování nepřátelských lodí v oblasti, pokud poskytneme námořnictvu zdroje k tomu." # todo: NEW TRANSLATION
  SWE_unrestricted_submarine_warfare: "Neomezená ponorková válka" # todo: NEW TRANSLATION
  SWE_unrestricted_submarine_warfare_desc: "Ponorky nabízejí možnost obtěžovat dopravu a nepřátelské válečné lodě, které jsou mnohem dražší na náhradu. Měli bychom je využít k uzavření rozdílu mezi naším námořnictvem a protivníky." # todo: NEW TRANSLATION
  SWE_lindholmens_varv: "Lindholmens Varv" # todo: NEW TRANSLATION
  SWE_lindholmens_varv_desc: "Lindholmens Varv se v posledních letech zaměřoval na stavbu civilních lodí. S několika drobnými úpravami by jejich loděnice mohly být přeměněny na podporu rozšíření a modernizace námořnictva." # todo: NEW TRANSLATION
  SWE_italian_destroyers: "Zakoupit italské torpédoborce" # todo: NEW TRANSLATION
  SWE_italian_destroyers_desc: "Stavba lodí od nuly je drahá. Mnoho států by ale mohlo být ochotno prodat některá svá starší plavidla. [ITA.GetNameDefCap] například již projevila zájem prodat nám několik torpédoborců za velmi rozumnou cenu." # todo: NEW TRANSLATION
  SWE_italian_ships_tt: "Povede k [ROOT.GetFlag][ROOT.GetName]: \n " # todo: NEW TRANSLATION
  SWE_italian_ships_tt_2: "\n§R[ENG.GetNameDefCap] se může pokusit zachytit dodávku lodí!§!" # todo: NEW TRANSLATION
  SWE_rule_the_baltic: "Ovládnout Baltské moře" # todo: NEW TRANSLATION
  SWE_rule_the_baltic_desc: "Švédsko nebude v bezpečí, dokud Baltské moře nebude pevně pod naší kontrolou. K tomu potřebujeme získat odbornost ve stavbě větších lodí, které dokážou čelit nejlepším konstrukcím našich sousedů." # todo: NEW TRANSLATION
  SWE_defense_act: "Akt o obraně" # todo: NEW TRANSLATION
  SWE_defense_act_tt: "§YBudeme moci před volbami přeskupit naše politické vůdce§!" # todo: NEW TRANSLATION
  SWE_defense_act_desc: "Válka se opět blíží Evropě a v Riksdagu musí padnout těžká rozhodnutí. Žádné nejsou naléhavější než schválení Aktu o obraně a jeho potenciál rozbít vládnoucí koalici." # todo: NEW TRANSLATION
  SWE_strike_the_capitalist_beast_down: "Zničit kapitalistického obra" # todo: NEW TRANSLATION
  SWE_strike_the_capitalist_beast_down_desc: "Dělnická třída Švédska trpěla pod jhem buržoazie příliš dlouho. Zatímco Sociální demokraté věří, že mohou zjemnit tvrdost kapitalismu, pouze socialisté říkají pravdu: kapitalismu nelze opravit. Kapitalismus musí být zrušen." # todo: NEW TRANSLATION
  SWE_social_democracy: "Sociální demokracie" # todo: NEW TRANSLATION
  SWE_social_democracy_desc: "Sociální demokraté mají vizi Švédska založenou nikoliv na strachu nebo hněvu, ale na naději. Naději, že podporou nejslabších ve společnosti lze dosáhnout stability a štěstí pro všechny. Prostřednictvím naší spolupráce a laskavosti konečně vytvoříme lidový domov." # todo: NEW TRANSLATION
  SWE_as_the_barometer_falls: "Jak barometr padá" # todo: NEW TRANSLATION
  SWE_as_the_barometer_falls_desc: "Nemůžeme si dovolit být zaskočeni vniknutím na naše území, bez ohledu na příčinu. Musíme proto zajistit, aby ozbrojené síly měly havarijní plány a dostatečný výcvik na řešení takových scénářů." # todo: NEW TRANSLATION
  SWE_the_old_enemy_stirs: "Starý nepřítel se probouzí" # todo: NEW TRANSLATION
  SWE_the_old_enemy_stirs_desc: "Po krvavé občanské válce a desetiletí masivní industrializace se [SOV.GetNameDef] snaží znovu prosadit kontrolu nad územími bývalého Ruského impéria a dále. Pokud se chceme vyhnout tomu, že se staneme součástí sfér vlivu [SOV.GetName], musíme jednat rychle a připravit se na válku." # todo: NEW TRANSLATION
  SWE_license_skf_ball_bearings: "SKF kuličková ložiska" # todo: NEW TRANSLATION
  SWE_license_skf_ball_bearings_desc: "SKF se stala světovým lídrem ve výrobě kuličkových ložisek, které jsou zásadní pro výrobu mnoha moderních vojenských vozidel. Měli bychom toho využít ve svůj prospěch při obchodních jednáních s bojujícími státy." # todo: NEW TRANSLATION
  SWE_en_svensk_tiger: "En Svensk Tiger" # todo: NEW TRANSLATION
  SWE_en_svensk_tiger_desc: "Jakékoliv informace, které o nás mohou zneužít naši protivníci, by mohly ohrozit naši národní bezpečnost. Abychom tomu zabránili, musí být být silní a ticho jako mocný tygr součástí [SWE.GetAdjective] charakteru." # todo: NEW TRANSLATION
  SWE_swedes_not_sweden_to_finlands_aid_post_fin_war: "Švédové, ne Švédsko, aby pomohli Finsku" # todo: NEW TRANSLATION
  SWE_swedes_not_sweden_to_finlands_aid_pre_fin_war: "Švédský dobrovolnický sbor" # todo: NEW TRANSLATION
  SWE_swedes_not_sweden_to_finlands_aid: "[SWE_FinnishVolunteerFocusLoc]" # todo: NEW TRANSLATION
  SWE_swedes_not_sweden_to_finlands_aid_desc: "Zatímco vláda nemůže aktivně vojensky pomoci [FIN.GetName] bez porušení neutrality, tisíce [SWE.GetAdjective] občanů jsou připraveny složit život na ochranu našich nordických sousedů jako dobrovolníci." # todo: NEW TRANSLATION
  SWE_swedes_not_sweden_to_finlands_aid_tt: "\nBude automaticky upgradováno na: " # todo: NEW TRANSLATION
  SWE_swedes_not_sweden_to_finlands_aid_tt_2: "když bude [FIN.GetName] ve válce s velmocí" # todo: NEW TRANSLATION
  SWE_finlands_cause_is_ours: "Finský boj je náš" # todo: NEW TRANSLATION
  SWE_finlands_cause_is_ours_desc: "Agrese [SOV.GetAdjective], která je namířena proti [FIN.GetName], jednoho dne nevyhnutelně zasáhne i nás. Místo odstupu se musíme připojit k [FIN.GetAdjective] a odrazit starou hrozbu." # todo: NEW TRANSLATION
  SWE_coalition_war_cabinet: "Koaliční válečná kancelář" # todo: NEW TRANSLATION
  SWE_coalition_war_cabinet_desc: "Nedávné události po celém světě otřásly národem a vyvolaly obavy z rozšíření konfliktu do [SWE.GetName]. Abychom podpořili pocit jednoty v těchto těžkých časech, vytvoříme koaliční válečnou kancelář složenou z vůdců hlavních stran v Riksdagu." # todo: NEW TRANSLATION
  SWE_coalition_war_cabinet_tt: "§YOdemkne rozhodnutí přidávající rysy našemu současnému vůdci§!" # todo: NEW TRANSLATION
  SWE_the_aland_question: "Otázka [145.GetName]" # todo: NEW TRANSLATION
  SWE_the_aland_question_desc: "Jak se [SOV.GetNameDef] snaží znovu prosadit kontrolu nad [FIN.GetName], nemůžeme jim dovolit získat strategické území [145.GetName]. Ostrovy, ležící těsně u našich břehů, by mohly být použity k projektování [SOV.GetAdjective] letecké a námořní moci hluboko do [SWE.GetAdjective] území." # todo: NEW TRANSLATION
  SWE_the_aland_question_tt: "§Y[FIN.GetName]§! bude pravděpodobněji ochotno převést kontrolu nad §YÅlandy§! v tomto scénáři než v §Y§Y$SWE_the_aland_issue$§!§!, pokud §Y[SWE.GetName]§! nemá mnohem větší armádu než §Y[FIN.GetName]§!" # todo: NEW TRANSLATION
  SWE_the_nordic_defense_council: "Severská obranná rada" # todo: NEW TRANSLATION
  SWE_the_nordic_defense_council_desc: "Sami všichni jsou severské země snadným cílem pro expanzivní sousedy. Ale spojením se a sdílením zátěže společné obrany bychom mohli vytvořit skutečný odstrašující prostředek. Nejprve musíme ratifikovat obrannou smlouvu mezi potenciálními členy takové organizace." # todo: NEW TRANSLATION
  SWE_nordic_defense_fleet: "Severská obranná flotila" # todo: NEW TRANSLATION
  SWE_nordic_defense_fleet_desc: "S ratifikací severské obranné dohody můžeme začít proces sloučení našich námořních prostředků pod společným velením." # todo: NEW TRANSLATION
  SWE_nordic_defense_fleet_tt: "Každý §Yčlen severské obranné rady§! subjektu typu:\nPředá flotilu §Y[SWE.GetName]§!" # todo: NEW TRANSLATION
  SWE_nordljus: "Postavit Nordljus" # todo: NEW TRANSLATION
  SWE_nordljus_desc: "Naše námořnictvo nemůže konkurovat ostatním mocnostem Baltu a je potřeba nová vlajková loď, která by čelila nejtěžším protivníkům. Takový velký projekt negativně ovlivní nordické ekonomiky, ale někdy je to jednoduché:\n\nSíla musí být setkána silou" # todo: NEW TRANSLATION
  SWE_nordljus_tt: "Každý §Yčlen severské obranné rady§! získá: " # todo: NEW TRANSLATION
  SWE_nordljus_tt_2: "Výrobní linka začne s §Y60%§! dokončením" # todo: NEW TRANSLATION
  SWE_centralized_military_aid: "Centralizovaný vojenský průmysl" # todo: NEW TRANSLATION
  SWE_centralized_military_aid_desc: "Musíme zlepšit naše i členské státy vojenské schopnosti. Investice do výroby zbraní poskytnou našim armádám nástroje k obraně hranic." # todo: NEW TRANSLATION
  SWE_centralized_military_aid_tt: "Každý §Yčlen severské obranné rady§! získá:\n   Přidat §G1§! výrobní místo\n   Přidat §G1§! §YVojenskou továrnu§!" # todo: NEW TRANSLATION
  SWE_merge_army_complexes: "Sloučit armádní komplexy" # todo: NEW TRANSLATION
  SWE_merge_army_complexes_desc: "Bude efektivnější centralizovat naše vojenské komplexy. Nechat je v členských státech zvyšuje riziko jejich ztráty v případě invaze." # todo: NEW TRANSLATION
  SWE_merge_army_complexes_tt: "Každý §Yčlen severské obranné rady§!: §R-1§! §YVojenská továrna§!\n(§Y[SWE.GetName]§!) §G+1§! §YVojenská továrna§! za každého §Yčlena severské obranné rady§!" # todo: NEW TRANSLATION
  SWE_nordic_centralized_air_command: "Centralizované severské letecké velení" # todo: NEW TRANSLATION
  SWE_nordic_research_exchange: "Severská výzkumná výměna" # todo: NEW TRANSLATION
  SWE_nordic_research_exchange_desc: "Seveřané jsou technologicky vyspělí a bylo by škoda si navzájem nevyužít naše pokroky." # todo: NEW TRANSLATION
  SWE_nordic_protection_complex: "Severský obranný komplex" # todo: NEW TRANSLATION
  SWE_nordic_protection_complex_desc: "My nordičtí chceme jen mír. Jediné, co skutečně žádáme, je právo žít na severu, zestárnout a být zde pohřbeni. Kdo se nám to pokusí vzít, bude zde také pohřben." # todo: NEW TRANSLATION
  SWE_nordic_protection_complex_tt: "Každý §Yčlen severské obranné rady§! získá:\n   Přidat §G1§! výrobní místo\n   Přidat §G1§! §YCivilní továrnu§!" # todo: NEW TRANSLATION
  SWE_decentralized_nordic_volunteer_group: "Severská dobrovolnická skupina" # todo: NEW TRANSLATION
  SWE_decentralized_nordic_volunteer_group_tt: "Získat §G+5000§! pracovní síly za každého §Yčlena severské obranné rady§!\nKaždý §Yčlen severské obranné rady§!: §G+5000§! pracovní síly za každého člena!" # todo: NEW TRANSLATION
  SWE_decentralized_nordic_volunteer_group_desc: "Ve všech severských zemích je mnoho schopných mužů; lovců, ostrostřelců a podobně, kteří by mohli sloužit v armádě. Musíme je najít a naverbovat." # todo: NEW TRANSLATION
  SWE_nordic_centralized_air_command_desc: "Protiraková obrana se stala klíčovou frontou moderní války, ale udržet krok s technologickým postupem je drahé. Abychom udrželi náklady nízko a zachovali silnou obranu, měli bychom vytvořit společné severské letecké velení." # todo: NEW TRANSLATION
  SWE_nordic_centralized_air_command_tt: "Každý §Yčlen severské obranné rady§! subjekt typu:\nPředá letectvo §Y[SWE.GetName]§!" # todo: NEW TRANSLATION
  SWE_train_the_sheltered: "Vycvičit úkryté" # todo: NEW TRANSLATION
  SWE_train_the_sheltered_desc: "Konflikt v našem regionu přiměl několik našich nordických sousedů hledat útočiště zde v [SWE.GetName]. Mnozí z nich jsou v bojeschopném věku a mohli by být povoláni k obraně národa." # todo: NEW TRANSLATION
  SWE_the_narvik_solution: "Narvické řešení" # todo: NEW TRANSLATION
  SWE_the_narvik_solution_desc: "Narvik je klíčový pro přepravu naší železné rudy, a stal se cílem belligerantních mocností, které se jej snaží buď zabezpečit, nebo narušit. Abychom zachovali naši neutralitu a exporty, měli bychom snížit napětí v regionu převzetím kontroly nad Narvikem jménem [NOR.GetName]." # todo: NEW TRANSLATION
  SWE_icelandic_independence: "Nezávislost Islandu" # todo: NEW TRANSLATION
  SWE_icelandic_independence_desc: "TODO" # todo: NEW TRANSLATION
  SWE_cement_control_of_the_baltic: "Zajistit kontrolu nad Baltem" # todo: NEW TRANSLATION
  SWE_cement_control_of_the_baltic_desc: "Pokud vybudujeme a budeme promítat naši námořní moc přes Baltské moře, můžeme zajistit, že válka se nikdy nedostane na břeh žádného severského národa." # todo: NEW TRANSLATION
  SWE_seek_foreign_guarantees: "Požádat o zahraniční záruky" # todo: NEW TRANSLATION
  SWE_seek_foreign_guarantees_desc: "TODO" # todo: NEW TRANSLATION
  SWE_ga_pa_tactics: "Gå-på šokové taktiky" # todo: NEW TRANSLATION
  SWE_ga_pa_tactics_desc: "[SWE.GetName] kdysi pioneeroval použití vysoce mobilních sil na bojišti, dlouho před nástupem tanků. Je čas znovu zažehnout ten inovativní duch a vyvinout naši vlastní formu bleskové války." # todo: NEW TRANSLATION
  SWE_winter_drill: "Zimní výcvik" # todo: NEW TRANSLATION
  SWE_winter_drill_tt: "§G-25%§! náklady na §YPoslední stánek§!\n" # todo: NEW TRANSLATION
  SWE_winter_drill_desc: "Důkladným výcvikem našich jednotek, aby rozuměly [SWE.GetAdjective] terénu a jak využít počasí ve svůj prospěch, by mohly získat výraznou převahu nad nepřátelskými silami podstatně většími než ony." # todo: NEW TRANSLATION
  SWE_research_slot_1: "The [AAT_Sweden_royal_institute_name]" # todo: NEW TRANSLATION
  SWE_research_slot_1_desc: "Rozšíření vědeckých a inženýrských schopností národa bude rozhodující pro udržení moderní, schopné armády. Abychom toho dosáhli, investujeme do rozšíření [AAT_Sweden_royal_institute_name]." # todo: NEW TRANSLATION
  SWE_RIT_communist: "Institute of Technology" # todo: NEW TRANSLATION
  SWE_RIT_historical: "Royal Institute of Technology" # todo: NEW TRANSLATION
  SWE_infrastructure: "Investice do infrastruktury" # todo: NEW TRANSLATION
  SWE_infrastructure_desc: "Velké části [SWE.GetName] jsou stále venkovské a bídně nedostatečně rozvinuté. Měli bychom to napravit, abychom lépe využili naše přírodní zdroje." # todo: NEW TRANSLATION
  SWE_varnplikt: "Värnplikt" # todo: NEW TRANSLATION
  SWE_varnplikt_desc: "Spoléhání se na malou profesionální armádu nebude stačit k obraně naší suverenity proti agresivnějším sousedům. Proto zavedeme systém vojenské služby, aby každý muž bojového věku získal alespoň nějaký vojenský výcvik." # todo: NEW TRANSLATION
  SWE_per_albin_bus: "[SWE.GetLeader] Bus" # todo: NEW TRANSLATION
  SWE_per_albin_bus_desc: "S takovou palebnou silou v rukou našich protivníků je možné, že vláda může být dekapitována leteckým náletem nebo invazí. Abychom takové situaci zabránili, potřebujeme mobilní vládní štáb, který dokáže udržet kontakt s ozbrojenými silami a veřejností během krize." # todo: NEW TRANSLATION
  SWE_per_albin_bus_tt: "Vytvoří mobilní velitelské místo, které umožní našemu vůdci evakuovat se. Pokud bude autobus zničen, nebude to pro našeho premiéra dobře." # todo: NEW TRANSLATION
  SWE_land_air_warfare: "Pozemní - letecká válka" # todo: NEW TRANSLATION
  SWE_land_air_warfare_desc: "I když každá složka ozbrojených sil vyžaduje vlastní specializovaný výcvik a vybavení, jsou na bojišti nejúčinnější, když spolupracují na přemožení nepřítele na zemi i ve vzduchu současně." # todo: NEW TRANSLATION
  SWE_totalforsvar: "Totalförsvar" # todo: NEW TRANSLATION
  SWE_totalforsvar_desc: "Jak jsme tušili, nedávné konflikty se nevyhnutelně přibližují k totální válce. Musíme tedy přepnout ekonomiku na válečnou výrobu, aby zásobila naše jednotky vybavením, které potřebují k obraně národa." # todo: NEW TRANSLATION
  SWE_totalforsvar_tt: "Deaktivuje misi demobilizovat naši ekonomiku" # todo: NEW TRANSLATION
  SWE_jagartrupper: "Jägartrupper" # todo: NEW TRANSLATION
  SWE_jagartrupper_tt: "Umožní posílat elitní rangerské jednotky, které mohou sabotovovat nepřátelské přístavy a zásobovací uzly do sousedních kontrolovaných států za cenu §YManpower§!\nVelitelé armády bez stávajícího terénního traitu získají §YRanger§! trait" # todo: NEW TRANSLATION
  SWE_jagartrupper_desc: "Když čelíme numericky silnějším silám, je nutné vyrovnat pole tím, že omezíme jejich pohyb nebo přístup k zásobám. Použitím malých komandoských týmů můžeme proniknout za nepřátelské linie a sabotovat jejich infrastrukturu na klíčových místech." # todo: NEW TRANSLATION
  SWE_hedgehog_defense: "Hedgehog obrana" # todo: NEW TRANSLATION
  SWE_hedgehog_defense_desc: "Můžeme zvýšit efektivitu našich operací obrany do hloubky využitím 'ježkových' taktik, které sestávají z malých kapes jednotek na obranných pozicích, kterým se nepřítel může vyhnout. Nicméně obklíčení těchto kapes vyčerpá nepřátelský tlak a učiní je zranitelnými proti protiútoku." # todo: NEW TRANSLATION
  SWE_a_plea_of_desperation: "Volání zoufalství" # todo: NEW TRANSLATION
  SWE_a_plea_of_desperation_desc: "Obklíčeni na mnoha stranách nepřáteli, kteří chtějí našu suverenitu zlikvidovat, máme málo na výběr, než obrátit se na možné spojence, pokud chceme přežít blížící se nápor." # todo: NEW TRANSLATION
  SWE_rapid_response_force: "Rychlá reakční síla" # todo: NEW TRANSLATION
  SWE_rapid_response_force_desc: "Udržováním rychlé reakční síly obrněných vozidel, která může být rychle přesunuta napříč frontou podle potřeby, získáme výhody tanků bez nutnosti podpory jejich obrovského počtu." # todo: NEW TRANSLATION
  SWE_hemvarnet: "Hemvärnet" # todo: NEW TRANSLATION
  SWE_hemvarnet_tt: "Umožňuje zřízení buňek domobrany, které lze aktivovat jako nouzové jednotky v případě války" # todo: NEW TRANSLATION
  SWE_hemvarnet_desc: "Existují tisíce ochotných dobrovolníků, které lze vybavit starším vojenským materiálem k obraně strategických míst v jejich regionech. To by velmi pomohlo zabránit přepětí armády, když by se snažila bránit národ všude najednou." # todo: NEW TRANSLATION
  SWE_lottakaren: "Lottakåren" # todo: NEW TRANSLATION
  SWE_lottakaren_desc: "Ženy ze [SWE.GetName] jsou stejně ochotné bránit národ jako muži. Financováním organizace, která by je naverbovala a vycvičila v neumístěných úkolech, můžeme doplnit ozbrojené síly a zvýšit naše obranné schopnosti." # todo: NEW TRANSLATION
  SWE_rapid_mobilization: "Rychlá mobilizace" # todo: NEW TRANSLATION
  SWE_rapid_mobilization_desc: "Celá země zadržuje dech kvůli strachu z invaze. Vzhledem k nedávným událostem v zahraničí už nelze váhat, musíme plně zmobilizovat ozbrojené síly k obraně naší suverenity." # todo: NEW TRANSLATION
  SWE_rapid_mobilization_tt: "Umožňuje zvýšit zákon o branné povinnosti až na §YSlužbu na požádání§! i přesto, že jsme demokracie" # todo: NEW TRANSLATION
  SWE_secret_mobilization: "Tajná mobilizace" # todo: NEW TRANSLATION
  SWE_secret_mobilization_desc: "Pokud budeme postupovat příliš rychle při mobilizaci našich sil, můžeme upozornit naše protivníky a vyvolat právě invazi, které se snažíme zabránit. Musíme proto jednat opatrně, abychom nevyvolali podezření." # todo: NEW TRANSLATION
  SWE_tank_development: "Vývoj tanků" # todo: NEW TRANSLATION
  SWE_tank_development_desc: "I když nemůžeme nasadit obrněná vozidla v takových množstvích jako jiné země, můžeme být účinnější v jejich návrhu a výrobě." # todo: NEW TRANSLATION
  SWE_per_albin_line: "[SWE.GetLeader] linie" # todo: NEW TRANSLATION
  SWE_per_albin_line_tt: "Přidává opevnění v klíčových obranných oblastech kolem Malmö a jeho průlivu, dále vnitrozemí u hrdla kolem jezer Vänern a Vättern, stejně jako na Gotlandu a v Stockholmu" # todo: NEW TRANSLATION
  SWE_per_albin_line_desc: "Pobřeží [SWE.GetName] je rozsáhlé a většinou neopevněné. Abychom zabránili nepříteli vylodit invazní síly na našich březích, musíme vytvořit linii opevněných pozic přes pobřeží, schopných odrazit je zpět do Baltu." # todo: NEW TRANSLATION
  SWE_swedish_shooting_movement: "Švédské střelecké hnutí" # todo: NEW TRANSLATION
  SWE_swedish_shooting_movement_desc: "Po téměř sto let organizovalo [SWE.GetAdjective] střelecké hnutí střelnice a soutěže, aby zvýšilo civilní dovednosti ve střelbě a ochotu bojovat, pokud bude třeba. Vzhledem k turbulentní situaci, ve které se nacházíme, bychom do organizace možná měli investovat." # todo: NEW TRANSLATION
  SWE_swedish_shooting_movement_tt: "Manpower: §G+400§! za každou úroveň Hemvärnet\n§Y+100§! jednotek $SWE_infantry_equipment_0$ je přidáno do národní zásoby za každou úroveň Hemvärnet\nZvyšuje počáteční zkušenosti nasazených Hemvärn divizí na §Y30%§! z §Y10%§!\nZvyšuje počáteční výbavu nasazených Hemvärn divizí na §Y90%§! z §Y60%§!\nZvyšuje počáteční pracovní sílu nasazených Hemvärn divizí na §Y90%§! z §Y70%§!" # todo: NEW TRANSLATION
  SWE_mobilization_of_society: "Mobilizace společnosti" # todo: NEW TRANSLATION
  SWE_mobilization_of_society_desc: "Každý od dělníka ve továrně po člena kabinetu musí být ochoten obětovat se pro obranu národa. Ať už to znamená přeorientovat zdroje na válečnou výrobu nebo vzít zbraň do ruky, uděláme cokoli, abychom zajistili přežití [SWE.GetName]." # todo: NEW TRANSLATION
  SWE_end_the_fubkrieg: "Moderní taktika, moderní válka" # todo: NEW TRANSLATION
  SWE_end_the_fubkrieg_desc: "Válka se za poslední roky rychle změnila a nemůžeme dovolit, aby veškeré naše úsilí vyšlo nazmar, protože armáda se připravovala na konflikt včerejška. Zajištění toho, že využívají nejnovější taktiky, bude rozhodující pro obranu národa." # todo: NEW TRANSLATION
  SWE_let_fly_all_guns: "Vypusťte všechny zbraně" # todo: NEW TRANSLATION
  SWE_let_fly_all_guns_desc: "I když nemáme rozsáhlý průmysl jiných států, máme některé z nejzručnějších zbrojovek. S dodatečnými investicemi bychom mohli plně využít jejich talentů, abychom dali našim silám technologickou výhodu na bojišti." # todo: NEW TRANSLATION
  SWE_operation_save_denmark: "Operace: Zachránit Dánsko" # todo: NEW TRANSLATION
  SWE_operation_save_denmark_desc: "Mohli jsme mít po staletí neshody s [DEN.GetName], ale dnes stojíme s jejím lidem a jsme připraveni je osvobodit od tyranie." # todo: NEW TRANSLATION
  SWE_operation_save_norway: "Operace: Zachránit Norsko" # todo: NEW TRANSLATION
  SWE_operation_save_norway_desc: "[NOR.GetName] a [SWE.GetName] mají propojenou historii sahající staletí zpět. Vidět jejich lid pod botou cizí moci je nepřijatelné a musíme naplánovat jejich osvobození, až se naskytne příležitost." # todo: NEW TRANSLATION
  SWE_nordic_liberation_movement: "Nordické osvobozenecké hnutí" # todo: NEW TRANSLATION
  SWE_nordic_liberation_movement_desc: "TODO" # todo: NEW TRANSLATION
  SWE_central_nordic_army_command: "Centralizované severské armádní velení" # todo: NEW TRANSLATION
  SWE_central_nordic_army_command_desc: "Centralizací armád členů severské obranné rady můžeme efektivněji využít naše síly jako jednotný celek." # todo: NEW TRANSLATION
  SWE_central_nordic_army_command_tt: "\nPředává armádu a generála každého §Yčlena severské obranné rady§! do [SWE.GetName].\nKaždý §Yčlen severské obranné rady§! kromě §Y[SWE.GetName]§! získá:" # todo: NEW TRANSLATION
  SWE_central_nordic_army_command_tt_2: "Budou pravděpodobněji přijmout, pokud:\n -Budou mít §Yvysoký názor na nás§!\n -Máme silnější §Yarmádu§! než oni\n -Máme stejný §Ytyp vlády§! jako oni\n -§Yzaručíme§! je" # todo: NEW TRANSLATION
  SWE_decentralized_nordic_army_command: "Decentralizované severské armádní velení" # todo: NEW TRANSLATION
  SWE_decentralized_nordic_army_command_desc: "Centralizace velení armády Severské obranné rady by způsobila příliš mnoho střetů zájmů pro velitelské důstojníky. Jedinou zárukou národní bezpečnosti každého členského státu je ponechat si kontrolu nad vlastními silami." # todo: NEW TRANSLATION
  SWE_decentralized_nordic_army_command_tt: "\nKaždý §Yčlen severské obranné rady§! získá: §YRozsáhlou brannou povinnost§!.\nKaždý §Yčlen severské obranné rady§! získá:" # todo: NEW TRANSLATION
  SWE_decentralized_nordic_army_command_tt_2: "Každý §Yčlen severské obranné rady§!: " # todo: NEW TRANSLATION
  SWE_neither_death_nor_dishonor: "Ani smrt ani hanba" # todo: NEW TRANSLATION
  SWE_neither_death_nor_dishonor_tt: "$MODIFIERS_ARMY_CORE_DEFENCE_FACTOR$: §G+4%§! \n$MODIFIERS_ARMY_CORE_ATTACK_FACTOR$: §G+4%§! \n$MODIFIER_INDUSTRIAL_CAPACITY_FACTOR$: §G+4%§!\n$MODIFIER_INDUSTRIAL_CAPACITY_DOCKYARD_FACTOR$: §G+4%§! za každou nordickou zemi ve stejné frakci jako §Y[SWE.GetName]§! nebo za každého §Y$autonomy_aat_defense_council_member$§!" # todo: NEW TRANSLATION
  SWE_neither_death_nor_dishonor_desc: "Nordici stojí na pokraji propasti. Němečtí vlci vyjí na západě. Na východě bolševici čekají na svůj okamžik, připraveni zasunout své rudé dýky hluboko do našich srdcí. Náš per se stane mečem, naše důmyslnost se stane naším brněním. \nNebudeme volit mezi dvěma zly, nebude zde smrt ani hanba." # todo: NEW TRANSLATION
  SWE_prevent_a_red_dictatorship: "Zabránit rudé diktatuře" # todo: NEW TRANSLATION
  SWE_prevent_a_red_dictatorship_desc: "Sociální demokraté jsou nic než trojský kůň pro komunisty. Abychom zabránili pádu Švédska do sovětského vlivu, musíme zajistit, aby voliči dali nacionalistickým stranám kontrolu nad Riksdagem. Použijeme k tomu jakékoli prostředky." # todo: NEW TRANSLATION
  SWE_defense_in_depth: "Obrana do hloubky" # todo: NEW TRANSLATION
  SWE_defense_in_depth_desc: "Žádná nepřátelská síla nemá nekonečný spád, hlavně kvůli omezením zásobovacích linií a fyzickým i psychickým limitům vojáků. Robustnější forma obrany není založena na tuhých frontách, které se zhroutí při propíchnutí, ale na vrstvách obrany, které postupně okrádají nepřítele o jeho hybnost." # todo: NEW TRANSLATION
  SWE_beneath_sticks_and_stones: "Pod holemi a kameny" # todo: NEW TRANSLATION
  SWE_beneath_sticks_and_stones_desc: "Nepřátelská letadla ztrácí mnoho své účinnosti, pokud nemohou na bojišti vidět své cíle. Výcvikem našich sil v používání maskovacích technik můžeme připravit nepřáteli tuto zásadní výhodu." # todo: NEW TRANSLATION
  SWE_norma_projektilfabrik: "Norma Projektilfabrik" # todo: NEW TRANSLATION
  SWE_norma_projektilfabrik_desc: "Norma Projektilfabrik vyrábí munici v [SWE.GetName] a [NOR.GetName] od minulého století. Rozšíření jejich výrobních kapacit by výrazně pomohlo udržet stabilní zásobu munice pro naše ozbrojené síly." # todo: NEW TRANSLATION
  SWE_norma_projektilfabrik_tt: "Přidá §G1§! extra §YVojenskou továrnu§! pokud bude dokončeno zatímco §Y[NOR.GetNameDef]§!:\nJe ve válečném stavu s velmocí\nMá více než 0% pokroku kapitulace\n§Y[SWE.GetNameDef]§!: Nemá válku s §YNorway§!" # todo: NEW TRANSLATION
  SWE_government_weapons_contract: "Vládní zbrojní kontrakt" # todo: NEW TRANSLATION
  SWE_allow_landsverk_to_operate: "Povolit Landsverk samostatně operovat" # todo: NEW TRANSLATION
  SWE_allow_landsverk_to_operate_tt: "§RVstup do války s [GER.GetNameDef] umožní [GER.GetAdjective] dělníkům v Landsverk dočasně poškodit 2 Landsverk továrny ve Švédsku§!" # todo: NEW TRANSLATION
  SWE_government_weapons_contract_desc: "V celé [SWE.GetName] existuje mnoho společností se zkušenostmi ve výrobě zbraní. Abychom byli připraveni na totální válku, musíme stimulovat rozšíření těchto společností státními zbrojními zakázkami." # todo: NEW TRANSLATION
  SWE_bofors_fly_swatter: "Bofors Fly Swatter" # todo: NEW TRANSLATION
  SWE_bofors_fly_swatter_desc: "Bofors má potenciál stanovit nový standard pro protiletadlovou technologii. Měli bychom jim dát prostředky a zajistit, aby švédské nebe zůstalo čisté od nepřátelských letadel." # todo: NEW TRANSLATION
  SWE_husqvarna_vapenfabrik: "Husqvarna zbrojovka" # todo: NEW TRANSLATION
  SWE_husqvarna_vapenfabrik_desc: "Husqvarna má dlouhou historii výroby malých zbraní pro [SWE.GetAdjective] armádu. Nastal čas rozšířit jejich průmyslovou základnu a využít jejich odbornost k modernizaci armády." # todo: NEW TRANSLATION
  SWE_work_projects_for_the_unemployed: "Pracovní projekty pro nezaměstnané" # todo: NEW TRANSLATION
  SWE_work_projects_for_the_unemployed_desc: "Lidé, kteří jsou schopni pracovat, ale nemohou najít zaměstnání, jsou hnacím motorem radikalismu. Pokud chceme zabránit lidem, aby se obrátili proti vládě, musíme vytvořit pracovní projekty pro nezaměstnané." # todo: NEW TRANSLATION
  SWE_bofors_anti_tank_gun: "Protitankový kanón Bofors" # todo: NEW TRANSLATION
  SWE_bofors_anti_tank_gun_tt: "Umožňuje §HBofors Anti Tank Gun§!\nPodpůrný protitankový tvrdý útok: §G+10%§!\nPodpůrný protitankový průraz: §G+10%§!\nProtitankový tvrdý útok: §G+10%§!\nProtitankový průraz: §G+10%§!\nMotorized Anti-Tank Hard attack: §G+10%§!\nMotorized Anti-Tank Piercing: §G+10%§!\nLight Tank Destroyer Hard attack: §G+10%§!\nLight Tank Destroyer Piercing: §G+10%§!\nMedium Tank Destroyer Hard attack: §G+10%§!\nMedium Tank Destroyer Piercing: §G+10%§!\nHeavy Tank Destroyer Hard attack: §G+10%§!\nHeavy Tank Destroyer Piercing: §G+10%§!\nSuper Heavy Tank Destroyer Hard attack: §G+10%§!\nSuper Heavy Tank Destroyer Piercing: §G+10%§!\nModern Tank Destroyer Hard attack: §G+10%§!\nModern Tank Destroyer Piercing: §G+10%§!" # todo: NEW TRANSLATION
  SWE_bofors_anti_tank_gun_desc: "Odbornost Bofors ve výrobě zbraní se ukázala jako nepostradatelná. S menší investicí by mohli vytvořit novou generaci protitankových děl, aby čelili nejlépe obrněným vozidlům, které nám protivníci mohou nasadit." # todo: NEW TRANSLATION
  SWE_landverk_l_62: "Landsverk L-62" # todo: NEW TRANSLATION
  SWE_landverk_l_62_desc: "Stavěním na úspěchu návrhů tanků Landsverk a protiletadlových zbraní Bofors můžeme vytvořit světové mobilní protiletadlové platformy, které drží krok i s nejrychlejšími manévry." # todo: NEW TRANSLATION
  SWE_form_saab: "Založit SAAB" # todo: NEW TRANSLATION
  SWE_form_saab_desc: "V [SWE.GetName] je několik výrobců letadel, které soupeří o lukrativní vládní zakázky. S jejich sloučením můžeme využít kolektivní odbornost všech v ekonomicky efektivním měřítku." # todo: NEW TRANSLATION
  SWE_domestic_designs: "Domácí návrhy letadel" # todo: NEW TRANSLATION
  SWE_domestic_designs_desc: "Po založení SAAB bychom měli využít jejich návrhářské a inženýrské schopnosti k vytvoření letadel vyhovujících specifickým požadavkům [SWE.GetAdjective] letectva." # todo: NEW TRANSLATION
  SWE_foreign_designs: "Studovat zahraniční návrhy letadel" # todo: NEW TRANSLATION
  SWE_foreign_designs_desc: "Neměli bychom ztrácet čas znovuobjevováním toho, co ostatní státy již mají. Odbornost SAAB můžeme lépe využít adaptací a výrobou licencovaných návrhů z ciziny." # todo: NEW TRANSLATION
  SWE_foreign_designs_tt: "Získat §Y1x§! §G35%§! bonus k výzkumu pro §YDopravní letadla§! za každou velmoc, která sdílí naši ideologii a se kterou nejsme ve válce" # todo: NEW TRANSLATION
  SWE_formation_flying: "Formace letu" # todo: NEW TRANSLATION
  SWE_formation_flying_desc: "Udržování robustní letecké obrany vyžaduje dobře organizované skupiny stíhaček schopné rychle reagovat na potenciální hrozby." # todo: NEW TRANSLATION
  SWE_marauder_bombers: "Marauder bombardéry" # todo: NEW TRANSLATION
  SWE_marauder_bombers_desc: "Nedávné zkušenosti ukázaly, že schopnost ničit pozemní cíle ze vzduchu může často rozhodnout bitvy. Může dokonce představovat prostředek ke zcela ukončení války." # todo: NEW TRANSLATION
  SWE_airforce_modernization: "Modernizace letectva" # todo: NEW TRANSLATION
  SWE_airforce_modernization_desc: "Zajištění, že naše letectvo má nejmodernější vybavení, je marné, když ho nedokáže plně využít. Měli bychom zajistit, že zkušenosti našich pilotů budou začleněny do naší letecké doktríny." # todo: NEW TRANSLATION
  SWE_the_barrel: "Hlaveň" # todo: NEW TRANSLATION
  SWE_the_barrel_desc: "Nedávné konflikty urychlily technologický vývoj v oblasti letectví. Musíme tedy držet krok s našimi potenciálními protivníky a vyvíjet vlastní trysková letadla k ochraně našeho vzdušného prostoru." # todo: NEW TRANSLATION
  SWE_rockets: "Raketová hnací technologie" # todo: NEW TRANSLATION
  SWE_rockets_desc: "I když jsou trysková letadla působivá, raketová technologie nám nabízí možnost vytvořit jednorázové zbraně s mnohem větší rychlostí a dosahem bez nákladné potřeby výcviku pilotů." # todo: NEW TRANSLATION
  SWE_radiojanst: "Radiotjänst" # todo: NEW TRANSLATION
  SWE_radiojanst_desc: "Radiotjänst se stalo populární mezi veřejností, vysílá kulturní akce a zprávy denně. Rozšířením tohoto vysílače můžeme zvýšit typy pořadů a zároveň udržet dobře informované obyvatelstvo." # todo: NEW TRANSLATION
  SWE_urbanization: "Urbanizace" # todo: NEW TRANSLATION
  SWE_urbanization_tt: "Odemkne rozhodnutí utratit §Ypolitickou moc§! za získání §YCivilních továren§! a §YNámořních doků§!" # todo: NEW TRANSLATION
  SWE_urbanization_desc: "Industrializace a urbanizace jdou ruku v ruce. Jak se ve městech objeví více pracovních míst, více lidí z venkova do nich přestěhuje. Abychom zabránili přelidnění a vzniku slumů, musíme investovat do jejich infrastruktury a připravit se na populační růst." # todo: NEW TRANSLATION
  SWE_hygenic_housing: "Hygienické bydlení" # todo: NEW TRANSLATION
  SWE_hygenic_housing_tt: "§YPolitika hygienického bydlení§! se bude postupně rozšiřovat ze Södermanland tak, že každé druhé měsíc získá nová jádrová provincie!" # todo: NEW TRANSLATION
  SWE_hygenic_housing_desc: "Příliš mnoho lidí stále žije v přelidněných slumech, nevhodných pro důstojné bydlení. Musíme začít znovu a zajistit, že každý má přístup k hygienickému, funkčnímu bydlení." # todo: NEW TRANSLATION
  SWE_vasa_ii: "[SWE_vasa_ii_loc]" # todo: NEW TRANSLATION
  SWE_vasa_ii_desc: "Je čas postavit následovníka legendárního Vasy. Snad tentokrát bude mít příležitost ukázat svou hodnotu v boji." # todo: NEW TRANSLATION
  SWE_vasa_ii_communist: "Röd Orkan" # todo: NEW TRANSLATION
  SWE_vasa_ii_default: "Vasa II" # todo: NEW TRANSLATION
  SWE_coastal_support: "Pobřežní podpora" # todo: NEW TRANSLATION
  SWE_coastal_support_desc: "Naše námořnictvo by mělo být důkladně vycvičeno v používání svých děl k podpoře obojživelných útoků na pobřeží nepřátelských států." # todo: NEW TRANSLATION
  SWE_all_cards_on_deck: "Všechny karty na stole" # todo: NEW TRANSLATION
  SWE_all_cards_on_deck_desc: "Prodloužené potyčky po moři příliš nemění průběh války. Když naše námořnictvo vypluje, bude cílem zničit nepřítele jedním rozhodujícím úderem." # todo: NEW TRANSLATION
  SWE_decisive_battle_tactics: "Taktiky rozhodující bitvy" # todo: NEW TRANSLATION
  SWE_seize_landsverk: "Obsadit Landsverk" # todo: NEW TRANSLATION
  SWE_kp_bill: "Mechanizovaný KP Bil" # todo: NEW TRANSLATION
  SWE_kp_bill_desc: "Nedávné vývoje na bitevním poli ukázaly nutnost rychlého přesunu jednotek tam, kde jsou potřeba. Doposud jsme používali přizpůsobené civilní nákladní vozy, ale účinnější by byl transportér určený pro boj." # todo: NEW TRANSLATION
  SWE_lynx_winter_armored_cars: "Lynx obrněný vůz" # todo: NEW TRANSLATION
  SWE_lynx_winter_armored_cars_desc: "Pokud k nám válka přijde, mobilita bude klíčová pro naši obranu. Vývoj moderního speciálního obrněného vozu poskytne našim jednotkám důležitý nástroj pro průzkum a útok na měkké cíle." # todo: NEW TRANSLATION
  SWE_lynx_armored_car_tt: "Umožňuje §YLynx obrněný vůz§! který přináší: \n§YObrněný vůz§! a §Y$armored_car_recon$§!:\n Tvrdý útok: §G+10%§!\n Průraz: §G+10%§! \n Organizace: §G+5§!\n\n§YObrněný vůz§!:\n§YLes:§!\n Změna efektivity pohybu: §G+15%§!\n Změna efektivity útoku: §G+20%§! \n§YPoušť:§!\n  Změna efektivity pohybu: §R-40%§!\n  Změna efektivity útoku: §R-20%§!\n§YSníh:§!\n Změna efektivity pohybu: §G+35%§!\n Změna efektivity útoku: §G+20%§!" # todo: NEW TRANSLATION
  SWE_lynx_armored_car_recon_company_tt: "\n§Y$armored_car_recon$§!:\n§YLes:§!\n Změna efektivity pohybu: §G+5%§!\n Změna efektivity útoku: §G+5%§! \n§YPoušť:§!\n  Změna efektivity pohybu: §R-15%§!\n  Změna efektivity útoku: §R-15%§!\n§YSníh:§!\n Změna efektivity pohybu: §G+8%§!\n Změna efektivity útoku: §G+5%§!\n\n" # todo: NEW TRANSLATION
  SWE_standardize_equipment: "Standardizovat výzbroj" # todo: NEW TRANSLATION
  SWE_standardize_equipment_desc: "Příliš dlouho naše ozbrojené síly operovaly s množstvím malých zbraní, některé pocházejí ani ne z minulého století. To ztěžuje zásobování vojáků municí a činí nás zranitelnými vůči narušení. Musíme to napravit standardizací zbraní a munice." # todo: NEW TRANSLATION
  SWE_standardize_equipment_trigger_tt: "Více než §Y13000§! pěchotního vybavení v armádě" # todo: NEW TRANSLATION
  SWE_individual_liberty_and_prosperity_for_all: "Snížení chudoby" # todo: NEW TRANSLATION
  SWE_individual_liberty_and_prosperity_for_all_desc: "Je jasné, že musíme udělat více pro zvednutí lidí z chudoby. Musíme však pečlivě vyvážit naši podporu se potřebou udržet životaschopnou národní obranu." # todo: NEW TRANSLATION
  SWE_defense_above_all: "Obrana nade vše" # todo: NEW TRANSLATION
  SWE_defense_above_all_desc: "Musíme čelit faktu, že svět má jiný časový plán než my, a už nemůžeme hazardovat s budoucností našeho státu bez obranných schopností." # todo: NEW TRANSLATION
  SWE_volvo: "Volvo" # todo: NEW TRANSLATION
  SWE_volvo_desc: "Volvo si vybudovalo reputaci pro stavbu odolných, spolehlivých komponent a vozidel. Měli bychom rozvíjet jejich úspěch přizpůsobením civilních návrhů na nákladní automobily a motory pro vojenské účely." # todo: NEW TRANSLATION
  SWE_allow_landsverk_to_operate_desc: "Landsverk dlouho fungoval jako skulina pro [GER.GetAdjective] armádu obcházet omezení Versaillské smlouvy na vývoj obrněných vozidel. Měli bychom jim umožnit pokračovat, abychom si udrželi blízké vztahy s [GER.GetName] a využili jejich technologických pokroků." # todo: NEW TRANSLATION
  SWE_sieze_landsverk: "Obsadit Landsverk" # todo: NEW TRANSLATION
  SWE_sieze_landsverk_desc: "Landsverk dlouho sloužil jako skulina pro [GER.GetAdjective] armádu obcházet omezení versailleské smlouvy na vývoj obrněných vozidel. Někteří ve vládě tvrdí, že musíme firmu obsadit, abychom se distancovali od [GER.GetAdjective] válečného stroje." # todo: NEW TRANSLATION
  SWE_saltsjobaden_agreement: "Přijmout dohodu ze Saltsjöbaden" # todo: NEW TRANSLATION
  SWE_saltsjobaden_agreement_desc: "Neshody mezi dělníky a zaměstnavateli přerůstají a hrozí přivést národ na kolena. Musíme být jednotní, pokud chceme čelit hrozbám na našich hranicích. Proto musíme uzavřít dohodu, která minimalizuje narušení pracovních sporů." # todo: NEW TRANSLATION
  SWE_reject_saltsjobaden: "Odmítnout dohodu ze Saltsjöbaden" # todo: NEW TRANSLATION
  SWE_reject_saltsjobaden_desc: "Tuto dohodu je třeba odmítnout, zbaví zaměstnavatele práva řídit své podniky podle svého a omezí práva dělníků stávkovat, když se cítí poškozeni. Nikdo z nás z toho nezíská." # todo: NEW TRANSLATION
  SWE_ring_a_ding_ding: "Militärcykel" # todo: NEW TRANSLATION
  SWE_ring_a_ding_ding_desc: "Kola možná nejsou tak impozantní jako obrněné vozy nebo tanky, ale nabízejí zvýšenou mobilitu za zlomek nákladů." # todo: NEW TRANSLATION
  SWE_aquire_modern_panzers: "Získat moderní panzery" # todo: NEW TRANSLATION
  SWE_aquire_modern_panzers_desc: "Technologická stagnace ukázala, že i zdánlivě nejsilnější národy v dobách války mohou zkrachovat. Získání moderních obrněných vozidel pro armádu je proto prioritou, pokud se chceme vyhnout stejnému osudu." # todo: NEW TRANSLATION
  SWE_military_academy: "Vojenská akademie" # todo: NEW TRANSLATION
  SWE_military_academy_desc: "Všechny větve ozbrojených sil nasbíraly za poslední roky mnoho zkušeností. Zřízením systému vojenských akademií zajistíme, že jejich znalosti budou předávány dalším generacím." # todo: NEW TRANSLATION
  SWE_surface_raiders: "Povrchoví nájezdníci" # todo: NEW TRANSLATION
  SWE_surface_raiders_desc: "S řadou rychle postavených malých lodí můžeme vážně poškodit nepřátelský válečný úsilí narušením jejich námořní dopravy a přesunů jednotek." # todo: NEW TRANSLATION
  SWE_rationing: "Racionování" # todo: NEW TRANSLATION
  SWE_rationing_desc: "Všichni si příliš dobře pamatujeme ekonomické problémy, které způsobila Velká válka nevinným lidem [SWE.GetName]. Musíme se takové pohromě znovu vyvarovat zavedením systému přídělování potravin, paliva a dalších nezbytností." # todo: NEW TRANSLATION
  SWE_rationing_tt: "Odemkne rozhodnutí zavést racionování za cenu malé části §Yválečné podpory§!, §Ystability§! nebo §Yspotřebního zboží§!. Možné politiky zahrnují:\n" # todo: NEW TRANSLATION
  SWE_folkhemmet_modification_tt: "Mění §YFolkhemmet§! o:" # todo: NEW TRANSLATION
  SWE_education_reform: "Stadsbarn" # todo: NEW TRANSLATION
  SWE_research_slot_2: "Rozšířit Univerzitu v Uppsale" # todo: NEW TRANSLATION
  SWE_research_slot_2_desc: "Univerzita v Uppsale je nejstarší univerzitou v severském regionu, hostila takové velikány jako Anders Celsius, Carl Linnaeus a Jacob Berzelius. V době, kdy se svět mění, je jasné, že věda je největší zbraň v nejistém světě, a investice do tak prestižní univerzity by byly úspěchem." # todo: NEW TRANSLATION
  SWE_education_reform_desc: "Kniha Alvy Myrdalové 'Stadsbarn' vyvolává rozruch mezi pedagogy ohledně role státu ve vývoji dětství. Alva a její manžel Gunnar také rozhýbali debatu ohledně sociální politiky. Možná bychom je měli přivést do kabinetu, aby teorie proměnili v praxi." # todo: NEW TRANSLATION
  SWE_economic_deregulation: "Ekonomická deregulace" # todo: NEW TRANSLATION
  SWE_economic_deregulation_desc: "Nemůžeme si dovolit podporovat to rozhazovačné sociální utrácení, když národ čelí existenčním hrozbám. Musíme tedy učinit tvrdá rozpočtová rozhodnutí a odstranit zatěžující regulace, aby soukromý sektor mohl vyplnit mezery, které stát zanechal." # todo: NEW TRANSLATION
  SWE_economic_deregulation_tt: "Odstraňuje §YFolkhemmet§!" # todo: NEW TRANSLATION
  SWE_approach_the_allies: "Oslovit spojence" # todo: NEW TRANSLATION
  SWE_approach_the_allies_desc: "[ENG.GetNameDefCap] a jejich spojenci nakonec vyjdou jako vítězové konfliktu v Evropě. Bylo by proto rozumné dát jasně najevo, že nemáme v úmyslu stát se jejich nepřáteli." # todo: NEW TRANSLATION
  SWE_join_allies_for_colonies: "Výměna kolonií" # todo: NEW TRANSLATION
  SWE_join_allies_for_colonies_desc: "S posílením vztahů mezi námi a spojenci máme příležitost znovu získat naše bývalé kolonie po celém světě výměnou za vstup do jejich vojenské koalice." # todo: NEW TRANSLATION
  SWE_universal_basic_income: "Univerzální základní příjem" # todo: NEW TRANSLATION
  SWE_universal_basic_income_desc: "Každý muž a žena by měli mít zajištěnou alespoň základní minimální existenci a stát je povinen o své občany pečovat. Univerzální základní příjem to řeší." # todo: NEW TRANSLATION
  SWE_universal_basic_income_tt: "Nově dobytá území začínají s §G+25%§! poslušností a §Y0%§! odporem" # todo: NEW TRANSLATION
  NOR_a_resurgent_labor_movement: "Ožívající dělnické hnutí" # todo: NEW TRANSLATION
  NOR_a_resurgent_labor_movement_desc: "Lidé [NOR.GetName] už nepřijímají slepě kapitalismus. Konečně vidí pravdu, že je kapitalismus pomalu utopil v chudobě ustanovené jejich pány. Nyní zvedají hlavy a na obzoru se rodí revoluce!" # todo: NEW TRANSLATION
  NOR_compromise_with_the_nkp: "Dohoda s NKP" # todo: NEW TRANSLATION
  NOR_compromise_with_the_nkp_desc: "Jak se bezpečnost naší země zdá být na hraně propasti, možná kompromis s Norges Kommunistiske Parti a jejich hlubokými vazbami na Stalinismus nám může pomoci zajistit pomoc [SOU.GetNameDef]. Určitě je to lepší než budoucnost pod nadvládou fašistů nebo kapitalistů." # todo: NEW TRANSLATION
  NOR_prosecute_the_nkp: "Stíhat NKP" # todo: NEW TRANSLATION
  NOR_prosecute_the_nkp_desc: "Labour Party se odtrhla od NKP, když se ukázalo, že jejich věrnost patří Stalinovi spíše než dělníkům [NOR.GetName]. Nechali jsme jeho zkažené tělo příliš dlouho hnít. Musíme tyto zrádce rozdrtit plnou silou dříve, než nás zradí [SOU.GetName]." # todo: NEW TRANSLATION
  NOR_the_seeds_of_the_revolution: "Zrna revoluce" # todo: NEW TRANSLATION
  NOR_the_seeds_of_the_revolution_desc: "Kapitalismus vytvořil nástroje svého vlastního zničení, a to je náš úkol. Musíme zasít semena lepší budoucnosti mezi lid [NOR.GetName]. Poté budeme čekat, až sklidíme plody naší práce." # todo: NEW TRANSLATION
  NOR_the_voice_of_the_people: "Hlas lidu" # todo: NEW TRANSLATION
  NOR_the_voice_of_the_people_desc: "Musíme naslouchat lidem a přinést nástroje, které ten hlas znásobí a rozšíří Marxovy pravdy. Teprve pak bude naše revoluce dosažena odspodu. Nechme lid křičet své požadavky na svobodu od útlaku kapitálu." # todo: NEW TRANSLATION
  NOR_organize_partisan_militias: "Organizovat partizánské milice" # todo: NEW TRANSLATION
  NOR_organize_partisan_militias_desc: "Je jasné, že kapitalismus nezměkne bez boje. Ozbrojíme ochotné a vycvičíme je, aby přišel čas mohli vyskočit a uvolnit cestu pro revoluci, která rozbije řetězy kapitálu." # todo: NEW TRANSLATION
  NOR_consolidate_power: "Konsolidovat moc" # todo: NEW TRANSLATION
  NOR_consolidate_power_desc: "Nyní, když máme moc zajistit budoucnost, kterou chceme, je čas ji udržet. Prostřednictvím čistek a nových jmenování upravíme stát do podoby, která nám umožní uspět a prosperovat." # todo: NEW TRANSLATION
  NOR_demand_nationalizations: "Požadovat znárodnění" # todo: NEW TRANSLATION
  NOR_demand_nationalizations_desc: "Tato buržoazní vláda ještě nepochopila sílu kolektivního vlastnictví výrobních prostředků. Musíme požadovat znárodnění důležitých továren po celé zemi, abychom nastartovali revoluci dříve, než začne. Více továren znamená více dělníků a více spojenců naší věci." # todo: NEW TRANSLATION
  NOR_squash_dissent: "Potlačit nesouhlas" # todo: NEW TRANSLATION
  NOR_squash_dissent_desc: "Nemůžeme nechat plody našich snah ukrást červi. Je nezbytné najít a zničit nesouhlas jednou provždy. Koneckonců, kdo pochybuje o naší vládě, je náš nepřítel." # todo: NEW TRANSLATION
  NOR_denounce_the_german_reich: "Odsoudit [GetNorwegianThreateningFascist]" # todo: NEW TRANSLATION
  NOR_denounce_the_german_reich_desc: "Nemůžeme dovolit, aby [GetNorwegianThreateningFascist] šlapal po lidech světa. Musíme dát světu najevo, za co bojujeme, aby se k nám připojil proti fašismu." # todo: NEW TRANSLATION
  NOR_moscows_education_centers: "Komunistická vzdělávací centra" # todo: NEW TRANSLATION
  NOR_moscows_education_centers_desc: "Roky učil Komintern soudruhy ze všech koutů Skandinávie dovednostem nutným k vedení revoluce z podsvětí. Nyní je můžeme hostit na světle, učit, jak udržit revoluci věčně." # todo: NEW TRANSLATION
  NOR_workers_and_farmers_rise: "Vzestup dělníků a rolníků" # todo: NEW TRANSLATION
  NOR_workers_and_farmers_rise_desc: "Půda je připravena, semeno zaseto a plamen revoluce je na pokraji zapálení. Nechť dělníci a rolníci [NOR.GetNonIdeologyName] povstanou a vezmou výrobní prostředky z krutých rukou kapitalistů a vlastníků půdy." # todo: NEW TRANSLATION
  NOR_war_in_finland: "Válka ve Finsku" # todo: NEW TRANSLATION
  NOR_war_in_finland_desc: "Lidé Finska už dlouho trpí, musíme se spojit s [SOU.GetName] a osvobodit je od kapitalismu. To bude jen prvním krokem k osvobození všech nordických národů." # todo: NEW TRANSLATION
  NOR_defend_finland: "Bránit Finsko" # todo: NEW TRANSLATION
  NOR_defend_finland_desc: "Nemůžeme dovolit hanebnému [SOU.GetName] zneužít hrdé [FIN.GetName]. Musíme se chopit zbraní proti tyranii režimu, který se tváří, že hájí lid, ale jen ho utlačuje. Finsko musí zůstat nezávislé." # todo: NEW TRANSLATION
  NOR_send_the_king_back_to_denmark: "Poslat krále zpět do Dánska" # todo: NEW TRANSLATION
  NOR_send_the_king_back_to_denmark_desc: "Nemůžeme se nazývat komunisty, pokud si necháme královskou rodinu. Po uchopení moci a výrobních prostředků by monarchie byla ohniskem pro kontrarevoluci a nesouhlas. Musíme královskou rodinu rychle odstranit." # todo: NEW TRANSLATION
  NOR_worker_armies: "Dělnické armády" # todo: NEW TRANSLATION
  NOR_worker_armies_desc: "Je mnoho práce a nedostatek obyvatel k jejímu vykonávání najednou. Zřízením hierarchie dělníků jako vojenských jednotek a divizí můžeme začít obnovovat zemi po projektech krok za krokem." # todo: NEW TRANSLATION
  NOR_nationalize_the_hydro_plants: "Znárodnit hydroelektrárny" # todo: NEW TRANSLATION
  NOR_nationalize_the_hydro_plants_desc: "Vodní elektrárny jsou jedním ze základů [ROOT.GetAdjective] průmyslu, ale jsou momentálně v rukou kapitalistů! Pojďme převzít zdroje energie, které pohánějí další fáze revoluce." # todo: NEW TRANSLATION
  NOR_expand_military_industry: "Rozšířit vojenský průmysl" # todo: NEW TRANSLATION
  NOR_expand_military_industry_desc: "Náš vznikající vojenský průmysl nebude stačit k porážce globálního kapitalismu. Musí být rozšířen, aby vyhověl potřebám našich rostoucích ozbrojených sil." # todo: NEW TRANSLATION
  NOR_a_new_norway: "Nové Norsko" # todo: NEW TRANSLATION
  NOR_a_new_norway_desc: "Norský lid je konečně osvobozen od jha kapitálu a to musí být zjeveno, když se naše nová země formuje. Už žádní oligarchové a magnáti nebudou určovat směr země; od nynějška lidé Norska rozhodují o své budoucnosti. Pro nové Norsko a dál!" # todo: NEW TRANSLATION
  NOR_norwegian_engineering: "Norský inženýring" # todo: NEW TRANSLATION
  NOR_norwegian_engineering_desc: "Pokud chceme dosáhnout skutečně trvalé revoluce, musíme se odtrhnout od nástrojů válek vyrobených z vykořisťovaných bratrů a sester. Musíme vyvinout vlastní návrhy a vyrábět vlastní vybavení, pokud chceme nazývat revoluci opravdově naší." # todo: NEW TRANSLATION
  NOR_reawaken_the_permanent_revolution: "Znovu probudit trvalou revoluci" # todo: NEW TRANSLATION
  NOR_reawaken_the_permanent_revolution_desc: "Trotskij nás učil, že revoluce nezastaví, a skutečně revoluce nemůže přestat, dokud proletariát nebude na sedadle řidiče dějin. Pozvedněme proletariát Skandinávie a dále!" # todo: NEW TRANSLATION
  NOR_crush_stalin: "[GetCrushStalinName]" # todo: NEW TRANSLATION
  NOR_crush_stalin_desc: "Roku Iosif Stalin ohýbal Marxova a Leninova slova ve svůj prospěch, falešně odsuzoval své nepřátele v kangaroo soudech a obětoval nespočet životů v honbě za svým egem. Musíme ho zastavit dřív, než zničí budoucnost proletariátu." # todo: NEW TRANSLATION
  NOR_crush_stalin_canonical: "Zničit Stalina" # todo: NEW TRANSLATION
  NOR_crush_stalin_generic: "Rozdrtit Rudého medvěda" # todo: NEW TRANSLATION
  NOR_crush_big_communist: "Rozdrtit [?GLOBAL.platonic_big_communist.GetNameDef]" # todo: NEW TRANSLATION
  NOR_crush_hitler: "Zničit Hitlera" # todo: NEW TRANSLATION
  NOR_crush_hitler_desc: "Málo kdo se dopustil tolika zločinů proti lidskosti jako Adolf Hitler. Zničil nespočet životů a jeho zlo se zdá nemít hranic. Jeho konečným cílem je zničení všeho, co máme rádi, proto musíme ukončit jeho plány dřív, než nás zničí on." # todo: NEW TRANSLATION
  NOR_prepare_for_war: "Připravit se na válku" # todo: NEW TRANSLATION
  NOR_prepare_for_war_desc: "Zdá se to nyní nevyhnutelné, tak proč si klamat iluze, že mír bude věčný. Válka může našim zemím připlížit, takže musíme být připraveni na cokoli." # todo: NEW TRANSLATION
  NOR_join_the_allies: "Přidat se k spojencům" # todo: NEW TRANSLATION
  NOR_join_the_allies_desc: "Až přijde to nejhorší, silní a důvěryhodní spojenci budou rozdílem mezi podrobením a svobodou. [FRA.GetName] a [ENG.GetName] vyhráli Velkou válku proti Německu a věříme, že to mohou zopakovat." # todo: NEW TRANSLATION
  NOR_proactive_defense: "Proaktivní obrana" # todo: NEW TRANSLATION
  NOR_proactive_defense_desc: "Naši nepřátelé nás nemohou napadnout, pokud je už předtím zničíme. Pojďme přinést válku na jejich území dřív, než se dotkne našeho, ukažme, co lidé z [NOR.GetName] dokážou, když jsou ohroženi." # todo: NEW TRANSLATION
  NOR_secure_the_swedish_iron_ore: "Zajistit švédskou železnou rudu" # todo: NEW TRANSLATION
  NOR_secure_the_swedish_iron_ore_desc: "[SWE.GetName] má obrovské zásoby vysoce kvalitní železné rudy pod svým územím, které v zimě proudily přes Narvik, když byly jejich severní přístavy zamrzlé. Nechat tento zdroj tak vystavený a snadno dostupný jakémukoli zahraničnímu tyranovi je nepřijatelné, musíme ho zajistit dřív, než to udělají naši nepřátelé." # todo: NEW TRANSLATION
  NOR_secure_denmark: "Zajistit Dánsko" # todo: NEW TRANSLATION
  NOR_secure_denmark_desc: "Velmoci na jih od [NOR.GetName] byly dlouho drženy na uzdě naším bývalým pánem, [DEN.GetName]. Pokud by jejich slabá armáda kapitulovala, brána k [NOR.GetName] by byla dokořán. Musíme tomu zabránit tím, že tuto bránu obsadíme sami." # todo: NEW TRANSLATION
  NOR_invite_secret_army: "Získat Hemmelige Hæren (Tajnou armádu)" # todo: NEW TRANSLATION
  NOR_invite_secret_army_desc: "V minulosti vůdci [NOR.GetNonIdeologyName] vytvořili tajnou armádu na obranu země v případě komunistické revoluce, ale není třeba je stíhat nyní, když jejich původní účel postrádá význam. Můžeme udělat kompromis a pozvat ty, kdo chtějí bránit svou zemi s námi místo proti nám." # todo: NEW TRANSLATION
  NOR_revive_pomor_trade: "Oživit pomorský obchod" # todo: NEW TRANSLATION
  NOR_revive_pomor_trade_desc: "Po staletí naši lidé na severu obchodovali s Pomorským regionem na Bílem moři. Umožnilo to oběma populacím prosperovat, ale impéria a kapitalismus to zastavily. Oživme obchod s našimi dlouholetými bratry." # todo: NEW TRANSLATION
  NOR_join_the_comintern: "Připojit se ke Kominterně" # todo: NEW TRANSLATION
  NOR_join_the_comintern_desc: "Komunistická internacionála je skutečným deštníkem, který bojuje za proletářskou revoluci po celém světě. Pokud chceme porazit kapitalismus a fašismus, je to nejlepší a jediná cesta." # todo: NEW TRANSLATION
  NOR_soviet_industrial_cooperation: "Sovětská průmyslová spolupráce" # todo: NEW TRANSLATION
  NOR_soviet_industrial_cooperation_desc: "Není hanbou hledat pomoc větších, rozvinutějších zemí. V boji za obranu revoluce je každý dělník, rolník a inženýr naším soudruhem a uvítáme jejich pomoc při rozvoji průmyslu, stejně jako bychom jim pomohli, kdyby to bylo naopak." # todo: NEW TRANSLATION
  NOR_field_hospitals: "Polní nemocnice" # todo: NEW TRANSLATION
  NOR_field_hospitals_desc: "Populace [NOR.GetName] není nekonečná jako v jiných zemích. Materiál lze nahradit, ale ztracený soudruh je jedna duše navíc méně v mezinárodním boji proti kapitalismu. Musíme soustředit úsilí na záchranu každého zraněného vojáka, abychom je mohli co nejdříve poslat zpět na frontu, jinak riskujeme ztrátu jak mužů, tak území." # todo: NEW TRANSLATION
  NOR_expanded_conscription_drive: "Rozšířený nábor do povolání z povolání" # todo: NEW TRANSLATION
  NOR_expanded_conscription_drive_desc: "Dokud boj neskončí, budeme potřebovat čerstvé jednotky k napájení bitev, které utvářejí dějiny podle našich ideálů. Každý muž a žena schopní bojovat musí vstoupit do našich řad, jinak bude naše vlast přemožena." # todo: NEW TRANSLATION
  NOR_invite_soviet_designers: "Pozvat sovětské konstruktéry" # todo: NEW TRANSLATION
  NOR_invite_soviet_designers_desc: "Technické know‑how, které naši komunističtí spojenci mají, je desítky let napřed před námi; pokud nám půjčí své odborníky, můžeme přeskočit naše nepřátele a vyhnout se zbytečnému krveprolití díky lepším zbraním a vozidlům." # todo: NEW TRANSLATION
  NOR_vote_of_no_confidence: "Neschopnost vlády (hlasování o nedůvěře)" # todo: NEW TRANSLATION
  NOR_vote_of_no_confidence_desc: "Můžeme důvěřovat Nygaardsvoldovi a jeho labouristické straně, že udrží bolševiky a nacisty na uzdě? Toto jejich zbavení se zdá spíše jako otevření bran Tróji než premiér připravený bránit svou zemi před komunismem. Nemůžeme jim dovolit postoupit naši mladou zemi [SOU.GetNameDef]." # todo: NEW TRANSLATION
  NOR_liberal_conservative_alliance: "Aliance liberálů a konzervativců" # todo: NEW TRANSLATION
  NOR_liberal_conservative_alliance_desc: "Ačkoliv Høyre a Venstre znamenají v názvech pravici a levici, naše dvě strany mají dost společných zájmů na to, abychom vytvořili vládní koalici a odvrátili útoky labouristické strany. Společně utvoříme [ROOT.GetName] přátelskou kapitalu a připravenou bojovat doma i v zahraničí." # todo: NEW TRANSLATION
  NOR_sabotage_unions: "Sabotovat odbory" # todo: NEW TRANSLATION
  NOR_sabotage_unions_desc: "Co dělníci nazývají lidskými právy, pro nás jsou překážkami průmyslového růstu. Můžeme potlačit syndikalistické hnutí zvnitřku i zvenčí, abychom odstranili překážky naší vojenské připravenosti." # todo: NEW TRANSLATION
  NOR_invite_foreign_investment: "Pozvat zahraniční investice" # todo: NEW TRANSLATION
  NOR_invite_foreign_investment_desc: "Náš průmysl byl desetiletí zanedbáván, takže postrádáme kapitál k industrializaci na úroveň jiných evropských zemí. Naštěstí existuje mnoho hladových zahraničních investorů, kteří jsou ochotni investovat do naší budoucnosti—za cenu." # todo: NEW TRANSLATION
  NOR_invite_transnational_manufacturers: "Pozvat nadnárodní výrobce" # todo: NEW TRANSLATION
  NOR_invite_transnational_manufacturers_desc: "Soustředili jsme se na obchod tolik, že jsme nevyužili všechny možnosti výroby v naší zemi. Teď, když jsme se vypořádali s odbory, se k nám pohrnou zahraniční firmy kvůli nerušenému přístupu na trh práce." # todo: NEW TRANSLATION
  NOR_contain_the_labor_movement: "Zadržet dělnické hnutí" # todo: NEW TRANSLATION
  NOR_contain_the_labor_movement_desc: "Dokud existuje hnutí věnované zájmům dělnické třídy, nikdy nebudeme moci plně kontrolovat kapitál vstupující do [NOR.GetName] a prostředky, které jej udržují v pohybu." # todo: NEW TRANSLATION
  NOR_uproot_secret_army: "Vykopat Tajnou armádu" # todo: NEW TRANSLATION
  NOR_uproot_secret_army_desc: "Založená v roce 1918 předchozí vládou, tajná armáda číhá ve stínech a čeká na komunistický puč, který nikdy nepřišel; mezitím mnozí radikalizovali k tvrdému fašismu. Tito muži jsou časovaná bomba, která nám může kdykoli explodovat do obličeje, musí být vyřízena." # todo: NEW TRANSLATION
  NOR_support_finland_in_winter_war: "Podpořit Finsko ve zimní válce" # todo: NEW TRANSLATION
  NOR_support_finland_in_winter_war_desc: "Bolševici míří na Finsko a nemáme důvod věřit, že tam skončí. Musíme podpořit naše finské bratry proti rudému medvědovi na východě dřív, než pohltí nás všechny." # todo: NEW TRANSLATION
  NOR_arrest_quisling: "Zatknout Quislinga" # todo: NEW TRANSLATION
  NOR_arrest_quisling_desc: "Když se sestavuje seznam nebezpečných jedinců v [NOR.GetName], bývalý ministr obrany Vidkun Quisling se málokdy objeví. Jeho strana chřadne, přátel má málo a především jeho slepá zbožňování Adolfa Hitlera—fakt, který by z každého jiného udělal nebezpečí—ho činí ještě směšnějším. Přesto je lepší být v bezpečí než litovat." # todo: NEW TRANSLATION
  NOR_protect_finnmark_from_the_bolsheviks: "Chráníme Finnmark před bolševiky" # todo: NEW TRANSLATION
  NOR_protect_finnmark_from_the_bolsheviks_desc: "Jako naše nejsevernější a nejvýchodnější oblast by byl Finnmark zřejmým vstupním bodem, pokud by se [SOV.GetNameDef] rozhodl, že zastrašování [FIN.GetNonIdeologyName] nestačí." # todo: NEW TRANSLATION
  NOR_replace_laake: "Nahradit Laakea" # todo: NEW TRANSLATION
  NOR_replace_laake_desc: "Kristian Laake je nástrojem Liberální strany od svého jmenování. Prosadil řadu omezení armádních schopností a nezdá se, že by měl dovednosti nebo vůli vést Norsko k vítězství. Potřebujeme někoho, kdo dá armádě přednost v životě [NOR.GetName]." # todo: NEW TRANSLATION
  NOR_fde_intelligence_agency: "Forsvarets Intelligence Service" # todo: NEW TRANSLATION
  NOR_fde_intelligence_agency_desc: "Naši vojáci a důstojníci nemohou jít do fronty naslepo. Potřebují vědět, čemu čelí, a umět používat klam v plánech. Proto založíme zpravodajský orgán Armády, aby si špinili ruce místo našich vojáků." # todo: NEW TRANSLATION
  NOR_reform_the_army: "Reformovat armádu" # todo: NEW TRANSLATION
  NOR_reform_the_army_desc: "Roky zanedbávání Kristianem Laakem a Liberální stranou zanechaly armádu v tom, co lze nazvat troskami. Musíme přestavět vojenskou hierarchii, logistiku, strategie a protokoly, aby odpovídaly moderním armádám, kterým pravděpodobně čelíme." # todo: NEW TRANSLATION
  NOR_improved_training: "Zlepšit výcvik" # todo: NEW TRANSLATION
  NOR_improved_training_desc: "Pokud pošleme naše muže na frontu bez řádného výcviku, můžeme si rovnou odpustit mobilizační rozkazy a vydat úmrtní listy.\nSkřípající výcvikový program pro nové rekruty potřebuje zásah, abychom měli lepší bojeschopné síly a dostali je ven co nejrychleji." # todo: NEW TRANSLATION
  NOR_officers_academy: "Akademie důstojníků" # todo: NEW TRANSLATION
  NOR_officers_academy_desc: "Dobrý důstojník násobí účinnost našich bojových sil a vzhledem k naší malé populaci to bude rozhodující, zvláště pokud máme nějakou naději, že přežijeme cizí nápor." # todo: NEW TRANSLATION
  NOR_offensive_doctrines: "Ofenzivní doktríny" # todo: NEW TRANSLATION
  NOR_offensive_doctrines_desc: "Naše stará doktrína předpokládala, že se jednoduše budeme bránit, dokud protivník nezestárne. To byla očekávání našich předchůdců i našich budoucích nepřátel, a proto musíme jít od začátku do ofenzívy." # todo: NEW TRANSLATION
  NOR_continue_nygaardsvold_government: "Pokračovat ve vládě Nygaardsvolda" # todo: NEW TRANSLATION
  NOR_continue_nygaardsvold_government_desc: "Labouristická vláda vedená Johanem Nygaardsvoldem nám dosud dobře sloužila, proto bez ohledu na politické napětí u našich sousedů na jihu bychom měli pokračovat v úsilí vytáhnout norskou ekonomiku z krize." # todo: NEW TRANSLATION
  NOR_weathering_the_storm_to_come: "Přečkat bouři, která přichází" # todo: NEW TRANSLATION
  NOR_weathering_the_storm_to_come_desc: "Navzdory předchozím snahám o zlepšení blahobytu našich lidí musíme čelit realitě rostoucích hrozeb ze všech stran. Musíme začít připravovat se na bouři, která se valí Evropou. Vše, co jsme vybudovali, bude zbytečné, pokud to nebudeme umět bránit." # todo: NEW TRANSLATION
  NOR_broken_gun_policies: "Politika rozzbrojení" # todo: NEW TRANSLATION
  NOR_broken_gun_policies_desc: "Abychom se vyhnuli budoucím konfliktům, musíme dokázat, že usilujeme jen o neutralitu a nepřipravujeme se na invazi do cizí země. Jen tehdy nás velmoci nebudou vnímat jako hrozbu a nechají nás na pokoji. Věříme, že to lze dosáhnout rozsáhlou demilitarizací, bez ohledu na to, co by si [SWI.GetAdjective] a jejich pošetilá doktrína ozbrojené neutrality mohla myslet." # todo: NEW TRANSLATION
  NOR_leaving_the_hard_thirties_behind: "Opustit tvrdá třicátá léta" # todo: NEW TRANSLATION
  NOR_leaving_the_hard_thirties_behind_desc: "Roky pociťujeme otřesy Velké hospodářské krize a bez potřebných nástrojů a průmyslové základny je malá šance postavit naši mladou zemi na pevné základy. Je čas začít budovat základnu, z níž se [ROOT.GetName] může rozvíjet a prosperovat." # todo: NEW TRANSLATION
  NOR_cut_military_budget: "Snížit vojenský rozpočet" # todo: NEW TRANSLATION
  NOR_cut_military_budget_desc: "Svět se může zdát, že hoří, ale to neznamená, že potřebujeme armádu. Máme jasnou politiku neutrality, takže můžeme ušetřené prostředky z obrany přesměrovat na budování spravedlivějšího a prosperujícího [ROOT.GetName]." # todo: NEW TRANSLATION
  NOR_bail_out_towns: "Zachránit města" # todo: NEW TRANSLATION
  NOR_bail_out_towns_desc: "Ekonomická krize zasáhla mnoho malých měst po celém [ROOT.GetName]. Trpí obrovským zadlužením, které samy nemohou překonat. Máme prostředky i vůli tyto komunity zachránit a nastartovat jejich prosperitu, využijme je." # todo: NEW TRANSLATION
  NOR_restore_public_trust_in_the_storting: "Obnovit veřejnou důvěru ve Storting" # todo: NEW TRANSLATION
  NOR_restore_public_trust_in_the_storting_desc: "Po desetiletích nestability a nečinnosti je pochopitelné, že obecná populace nedůvěřuje našemu parlamentu, Stortingu. Bez veřejné důvěry nebudeme schopni prosadit opatření potřebná k stabilizaci země." # todo: NEW TRANSLATION
  NOR_the_neutrality_guard: "Stráž neutrality" # todo: NEW TRANSLATION
  NOR_the_neutrality_guard_desc: "Jiní by mohli zneužít naši neutrální pozici k získání výhody nad nepřítelem a zatáhnout nás do války, pokud nedokážeme bránit hranice. Vyhrazená Stráž neutrality může zaručit, že žádný zahraniční bojovník neporuší naši důvěru." # todo: NEW TRANSLATION
  NOR_rearm_for_defense: "Přeozbrojit pro obranu" # todo: NEW TRANSLATION
  NOR_rearm_for_defense_desc: "Možná jsme neodhadli nebezpečí. Naše pobřeží nás neochrání proti odhodlanému nepříteli a nemůžeme slepě spoléhat na severské sousedy jako věčný štít. Musíme dohnat ztracený čas a přeozbrojit [NOR.GetName], aby se mohla bránit." # todo: NEW TRANSLATION
  NOR_patrol_our_coast: "Pohlídat naše pobřeží" # todo: NEW TRANSLATION
  NOR_patrol_our_coast_desc: "Naše pobřeží čelí rozlehlému moři, které je potenciálním koridorem pro průnik do [NOR.GetAdjective] území. Současná flotila je rozptýlena. Musíme rozšířit námořnictvo, aby dokázalo bránit toto obrovské území." # todo: NEW TRANSLATION
  NOR_social_incrementalism: "Sociální postupné změny" # todo: NEW TRANSLATION
  NOR_social_incrementalism_desc: "Jak se tvrdá třicátá léta stávají jen vzpomínkou v mysli [NOR.GetAdjective] lidu, musíme hledat sociální pokrok, byť pomalu, abychom neprovokovali hnízdo konzervatismu." # todo: NEW TRANSLATION
  NOR_print_more_money: "Tisknout více peněz" # todo: NEW TRANSLATION
  NOR_print_more_money_desc: "Náš začínající finanční systém se ještě zcela nevzpamatoval z úsporných opatření tvrdých třicátých let; musíme použít všechny dostupné nástroje, včetně tisku více hotovosti, aby obíhala v zemi a zabránila zhoršení situace." # todo: NEW TRANSLATION
  NOR_restart_public_investment: "Obnovit veřejné investice" # todo: NEW TRANSLATION
  NOR_restart_public_investment_desc: "Není čas nechat infrastrukturu a ekonomiku zahnívat kvůli zanedbání; labouristická vláda musí znovu investovat do budoucnosti země, ať už jde o civilní výrobu, nebo přípravy na válku, která může přijít dřív, než doufáme." # todo: NEW TRANSLATION
  NOR_coastal_defense: "Pobřežní obrana" # todo: NEW TRANSLATION
  NOR_coastal_defense_desc: "[NOR.GetName] má jedno z nejdelších pobřeží na světě, takže jeho opevnění bude ohromný úkol, ale je nezbytné, pokud chceme udržet nedávno nabytou nezávislost." # todo: NEW TRANSLATION
  NOR_fortify_norway: "Opevnit Norsko" # todo: NEW TRANSLATION
  NOR_fortify_norway_desc: "Naše pevnosti byly dlouho zanedbávány; musíme svolat stavební jednotky, rychle modernizovat a případně přestavět stávající pevnosti a postavit nové tam, kde to bude potřeba." # todo: NEW TRANSLATION
  NOR_prepare_a_mobile_government: "Připravit mobilní vládu" # todo: NEW TRANSLATION
  NOR_prepare_a_mobile_government_desc: "Nyní, když válka začala, má naše vláda na zádech terč. Nepřítel udělá cokoli, aby vyhubil naše vůdce a podrobil lid [NOR.GetName]. Je důležité, abychom byli připraveni přesunout kritické funkce vlády mimo dosah nebezpečí." # todo: NEW TRANSLATION
  NOR_the_kings_no: "Královo NE" # todo: NEW TRANSLATION
  NOR_the_kings_no_desc: "Náš král Haakon VII odmítl požadavek nepřítele na podrobení. [NOR.GetName] není jen země, ale lid, a [NOR.GetAdjective] lid bude pokračovat v boji i když jim vezmou všechno území." # todo: NEW TRANSLATION
  NOR_prince_olavs_inspiration: "Prince Olavova inspirace" # todo: NEW TRANSLATION
  NOR_prince_olavs_inspiration_desc: "Navzdory současné situaci má [NOR.GetAdjective] lid stále víru ve svého prince. I když se nezapojuje do boje osobně, jeho podpora z exilu je neocenitelná pro legitimitu naší vlády." # todo: NEW TRANSLATION
  NOR_establish_milorg: "Založit Milorg" # todo: NEW TRANSLATION
  NOR_establish_milorg_desc: "Odboj proti okupaci v [NOR.GetName] zůstává silný, ale postrádá organizaci a disciplínu. Dobře koordinovaný vojenský odpor řízený z exilu by mohl položit základ pro návrat naší vlády na [NOR.GetAdjective] půdu." # todo: NEW TRANSLATION
  NOR_approach_the_coordinating_committee: "Oslovit Koordinační výbor" # todo: NEW TRANSLATION
  NOR_approach_the_coordinating_committee_desc: "Když naše země zůstává v rukou nepřítele, je potřeba organizace, která bude jednat v utajení a organizovat menší civilní skupiny k odporu okupaci. Věříme, že rozmanití profesionálové z Koordinasjonskomiteen tuto práci vykonají." # todo: NEW TRANSLATION
  NOR_approach_kretsen: "Oslovit Kretsen" # todo: NEW TRANSLATION
  NOR_approach_kretsen_desc: "V okupovaném území žijí prominentní [NOR.GetAdjective] lidé, kteří před válkou byli proti vládě Nygaardsvolda, ale nyní s námi sdílejí společného nepřítele. Tito soudci, správci, manažeři a obchodníci, kteří se tajně scházejí na statku Grimelund, by mohli být při odporu klíčoví, pokud nám poskytnou svůj vliv." # todo: NEW TRANSLATION
  NOR_use_xu: "Využít XU" # todo: NEW TRANSLATION
  NOR_use_xu_desc: "V okupovaném [NOR.GetName] existují cenné informace. Potřebujeme organizaci, která poskytne zpravodajské údaje pro naše odbojové bojovníky, spojence a naši válečnou snahu v exilu." # todo: NEW TRANSLATION
  NOR_recruit_norwegian_refugees: "Naverbovat norské uprchlíky" # todo: NEW TRANSLATION
  NOR_recruit_norwegian_refugees_desc: "Stovky ne-li tisíce [NOR.GetAdjective] lidí opouštějí okupaci, aby unikli útlaku nepřítele. Mnozí z nich patří mezi síly bránící zemi, ale nemohli uniknout; jiní se naučili bojovat v odboji; někteří nikdy nebojovali, ale lze je vycvičit. Musíme využít každého, koho můžeme, abychom přežili tuto válku." # todo: NEW TRANSLATION
  NOR_empower_sivorg: "Posílit Sivorg" # todo: NEW TRANSLATION
  NOR_empower_sivorg_desc: "Teď, když Kretsen a Koordinační výbor se k nám připojili, je čas je spojit pod jedním deštníkem. Sivorg bude organizace zahrnující civilisty všeho druhu, aby organizovala civilní odpor v [NOR.GetName]." # todo: NEW TRANSLATION
  NOR_preparing_the_return_to_norway: "Připravujeme návrat do Norska" # todo: NEW TRANSLATION
  NOR_preparing_the_return_to_norway_desc: "Scéna je připravena: máme odbojové síly způsobující škody za nepřátelskými liniemi, podporu klíčových okupantních administrátorů, dobře vycvičené jednotky v exilu a vojenskou pomoc od spojenců. Je čas přenést boj zpět k našim nepřátelům a znovu obsadit [NOR.GetNonIdeologyName]!" # todo: NEW TRANSLATION
  NOR_quislings_coup_happened: "Quisling už zahájil svůj státní převrat" # todo: NEW TRANSLATION
  NOR_the_stumbling_storting: "Zakopávající Storting" # todo: NEW TRANSLATION
  NOR_the_stumbling_storting_desc: "Viděli jsme světýlko na konci tunelu politické nestability, ale nyní se to začne zmítat směrem k dalšímu chaosu. Přes Johanovy nejlepší snahy se vnitřní boje ve Stortingu blíží k anarchii." # todo: NEW TRANSLATION
  NOR_lurk_in_the_shadows: "Číhat ve stínech" # todo: NEW TRANSLATION
  NOR_lurk_in_the_shadows_desc: "Zatímco se Storting živí sám sebou, použijeme to ve svůj prospěch. Pokračující selhání parlamentu je shromaždištěm, které potřebujeme k náboru [NOR.GetAdjective] lidu do Nasjonal Samling a do spárů fašismu." # todo: NEW TRANSLATION
  NOR_fascist_invasion_of_norway: "Fašistická invaze do Norska" # todo: NEW TRANSLATION
  NOR_fascist_invasion_of_norway_desc: "Nedomyslitelné se stalo skutečností: fašistická hrozba, o níž jsme si mysleli, že je daleko, se objevila u našich dveří a prorazila je. Můžeme jen doufat, že vydržíme dost dlouho na příchod pomoci." # todo: NEW TRANSLATION
  NOR_ask_for_foreign_support: "Požádat o zahraniční podporu" # todo: NEW TRANSLATION
  NOR_ask_for_foreign_support_desc: "Protože v našem království nikdy nebyla velká fašistická základna, potřebujeme podporu fašistických bratří v zahraničí. S jejich pomocí můžeme ukázat [NOR.GetName] cestu k pan‑germánskému fašistickému impériu." # todo: NEW TRANSLATION
  NOR_approach_the_fatherland_league: "Oslovit Fatherland League" # todo: NEW TRANSLATION
  NOR_approach_the_fatherland_league_desc: "Po léta Fatherland League prosazovala konzervativní agendu v Norsku, ale postrádá impulz a odhodlání. Můžeme jim ukázat, jak jsme naladěni a jak můžeme spojit síly proti komunismu." # todo: NEW TRANSLATION
  NOR_cultivate_the_conservative_parties: "Pěstovat konzervativní strany" # todo: NEW TRANSLATION
  NOR_cultivate_the_conservative_parties_desc: "Navzdory nízké podpoře fašismu v [NOR.GetName] je zde mnoho konzervativních skupin kroužících kolem Stortingu. Můžeme je kultivovat, zasadit semena fašismu a poté je přivést k nám, aby upevnily naši moc v [NOR.GetAdjective] politice." # todo: NEW TRANSLATION
  NOR_get_industrialist_support: "Získat podporu průmyslníků" # todo: NEW TRANSLATION
  NOR_get_industrialist_support_desc: "Přestože naše industrializace je nízká, velké podniky mají velký vliv na páky moci a s naší pomocí mohou získat další vliv, pokud nás budou podporovat.\nKoneckonců jedinou ideologií kapitálu je expanze kapitálu, a pokud mu poskytneme nástroje, budou na naší straně." # todo: NEW TRANSLATION
  NOR_nasjonal_samling: "Nasjonal Samling" # todo: NEW TRANSLATION
  NOR_nasjonal_samling_desc: "Po léta byla přední fašistická strana v [NOR.GetName] stranou hlavního politického proudu. To teď končí. Musíme se sjednotit za jejím vůdcem Vidkunem Quislingem, naším schopným a charizmatickým vůdcem, abychom přinesli skutečně [NOR.GetAdjective] fašistický režim." # todo: NEW TRANSLATION
  NOR_the_secret_army: "Tajná armáda" # todo: NEW TRANSLATION
  NOR_the_secret_army_desc: "Od roku 1918 byla po celé [NOR.GetName] skryta autonomní síla nazvaná Hemmelige Hæren, aby zasáhla v případě komunistického převratu. Jejich přísaha proti komunismu může být přesměrována na podporu fašismu a, co je důležitější, na podporu našeho převzetí moci." # todo: NEW TRANSLATION
  NOR_empower_hirden: "Posílit Hirden" # todo: NEW TRANSLATION
  NOR_empower_hirden_desc: "Naše vlastní polovojenská organizace Hirden byla páteří plánů Nasjonal Samling pro budoucnost [NOR.GetName]. Soustředit se na ni bude klíčové k uchopení vlády a boji, pokud bude třeba." # todo: NEW TRANSLATION
  NOR_quislings_coup: "Quislingův puč" # todo: NEW TRANSLATION
  NOR_quislings_coup_desc: "Podmínky jsou zralé pro nevyhnutelné nastoupení Nasjonal Samling k moci. Pod vedením svého Führera Vidkuna Quislinga je to první krok k úplné kontrole [NOR.GetAdjective] území a následné expanzi po celé Skandinávii." # todo: NEW TRANSLATION
  NOR_required_prep_fascist_TT: "§YCelková podpora fašistického převratu§! je vyšší než $RIGHT|0Y$ (aktuální podpora: $LEFT|0Y$)" # todo: NEW TRANSLATION
  NOR_quislings_regime: "Quislingův režim" # todo: NEW TRANSLATION
  NOR_quislings_regime_desc: "Stabilní genialita vůdce Nasjonal Samling je zřejmá. Ačkoliv ho mnozí odmítají politicky i osobně, dokonce i v jeho vlastní vládě, nelze popřít, že jeho tvrdohlavost a sebejistota přinesly výsledky. Je schopen udržet fungující režim — na jak dlouho? To ukáže čas." # todo: NEW TRANSLATION
  NOR_get_rid_of_quisling: "Zbavit se Quislinga" # todo: NEW TRANSLATION
  NOR_get_rid_of_quisling_desc: "Quislingův puč nebyl myšlen trvale. Byl to dočasný prostředek pokud naši fašističtí spojenci potřebovali někoho k poskytnutí zdání legimity invaze. Teď, když je jasné, že tohohle přezíravého blázna nepotřebujeme, musíme se ho co nejdříve zbavit." # todo: NEW TRANSLATION
  NOR_elevate_hirden: "Povýšit Hirden" # todo: NEW TRANSLATION
  NOR_elevate_hirden_desc: "Hirden nám dobře sloužil jako polovojenská složka Nasjonal Samling, ale jak rosteme v budování fašistického režimu, měli bychom zvážit posílení jeho postavení v mocenské struktuře [NOR.GetAdjective] vlády." # todo: NEW TRANSLATION
  NOR_military_police: "Vojenská policie" # todo: NEW TRANSLATION
  NOR_military_police_desc: "Jak roste odpor vůči našemu režimu, potřebujeme nástroje k jeho včasnému potlačení. Pokročilejší vojenská policie může být jediným způsobem, jak ochránit naši moc, dokud se lid [NOR.GetName] nenaučí přijímat nový řád." # todo: NEW TRANSLATION
  NOR_extensive_recruitment: "Rozsáhlý nábor" # todo: NEW TRANSLATION
  NOR_extensive_recruitment_desc: "Chceme‑li rozšířit naše impérium, musíme prohledat [NOR.GetAdjective] území a najít vojáky s duchem svých norských předků. Rybaření a zemědělství jsou druhořadé vůči rozšíření impéria; každý schopný muž by měl být připraven vzít zbraň a bojovat proti našim nepřátelům." # todo: NEW TRANSLATION
  NOR_the_weapons_of_conquest: "Zbraně dobytí" # todo: NEW TRANSLATION
  NOR_the_weapons_of_conquest_desc: "Dobytí nepřátel vyžaduje víc než jen muže a vůli bojovat. Mnozí zemřou, ale vyrábět nástroje zvyšující jejich šance znamená, že můžeme své hranice rozšířit ještě více." # todo: NEW TRANSLATION
  NOR_lynrytter: "Lynrytter" # todo: NEW TRANSLATION
  NOR_lynrytter_desc: "Nyní, když Blitzkrieg prokázal nadřazenost, musíme ho přijmout a přejet svými tanky nepřátelské linie. Sám Odin bude na naší straně, když naše pancéřování přinese rychlé vítězství [NOR.GetNameDef]" # todo: NEW TRANSLATION
  NOR_ulfhedhnar_wolf_coats: "Ulfheðnar" # todo: NEW TRANSLATION
  NOR_ulfhedhnar_wolf_coats_desc: "Jako vlčí kožichy starých časů, kteří byli silou berserkerů chránících krále Haralda Krásnovlasého, budou tito noví Ulfheðnar elitní kastou válečníků, jež povedou naše síly k obraně a rozšiřování našich území." # todo: NEW TRANSLATION
  NOR_crackdown_on_civilian_life: "Útlak civilního života" # todo: NEW TRANSLATION
  NOR_crackdown_on_civilian_life_desc: "Není čas na volnočasové aktivity. Válka je tu a v těchto nových časech může být pouze totalitní, jinak skončí smrtí a hanbou pro náš režim. Civilní život musí ustoupit službě vlasti." # todo: NEW TRANSLATION
  NOR_the_administrative_council: "Správní rada" # todo: NEW TRANSLATION
  NOR_the_administrative_council_desc: "Upřímně, [NOR.GetAdjective] okupace by mohla jít lépe. Možná změní přístup pomůže, takže namísto přímé správy jmenujeme radu místních kolaborantů, aby lidem poskytla zdání autonomie." # todo: NEW TRANSLATION
  NOR_abandoning_nynorsk: "Opustit nynorsk" # todo: NEW TRANSLATION
  NOR_abandoning_nynorsk_desc: "Ačkoliv má zdánlivě nacionalistický účel, nynorsk je jen smíšený jazyk složený z mnoha zbytků venkovských nářečí a městských dialektů. Lepší bude soustředit se na jazyk, ve kterém většina [NOR.GetAdjective] píše a čte. Mluvčí menšin se budou muset přizpůsobit našemu řádu." # todo: NEW TRANSLATION
  NOR_pan_germanic_cooperation: "Pangermánská spolupráce" # todo: NEW TRANSLATION
  NOR_pan_germanic_cooperation_desc: "Kulturně [NOR.GetNonIdeologyName] patří do širší germánské oblasti, takže dává smysl usilovat o bližší spolupráci. Oslovme je a budujme společně naše impéria." # todo: NEW TRANSLATION
  NOR_secret_police: "Tajná policie" # todo: NEW TRANSLATION
  NOR_secret_police_desc: "Je čas utáhnout sevření nad [NOR.GetAdjective] populací. Zaznamenali jsme ohniska vzpour. Mohou se zdát bezvýznamná, ale mohou se před naším vývojem stát jednotnou frontou. Koneckonců nejlepší způsob, jak udržet ostrost čepele, je jej často používat." # todo: NEW TRANSLATION
  NOR_fascist_military_collaboration: "Fašistická vojenská spolupráce" # todo: NEW TRANSLATION
  NOR_fascist_military_collaboration_desc: "Fašisté ze zahraničí nám pomohli dosáhnout stávajícího režimu, a naštěstí jsme nyní v pozici navázat bližší vojenskou spolupráci, téměř jako sobě rovní." # todo: NEW TRANSLATION
  NOR_frontkjempere: "Frontkjempere" # todo: NEW TRANSLATION
  NOR_frontkjempere_desc: "Mnoho [NOR.GetAdjective] touží být na frontách, pomáhat našim osvoboditelům dobývat v cizině. Mnozí zemřou, ale to je cena za účast v globálním nacionalistickém hnutí. Kdo ví, možná si [NOR.GetName] získá dostatečnou přízeň, aby mu bylo svěřeno řízení vlastní okupace." # todo: NEW TRANSLATION
  NOR_fascist_industrial_investments: "Fašistické průmyslové investice" # todo: NEW TRANSLATION
  NOR_fascist_industrial_investments_desc: "Naši fašističtí přátelé mají bystrý úsudek a kapitál potřebný pro pokročilý průmysl, který moderní země potřebuje k soutěžení. Můžeme toho využít k tomu, abychom se stali ještě užitečnějším spojencem." # todo: NEW TRANSLATION
  NOR_norwegian_reichsprotectorate: "Norský říšský protektorát" # todo: NEW TRANSLATION
  NOR_norwegian_reichsprotectorate_desc: "Díky našim mnoha úspěchům rozhodl se [GetNorwegianFascistOverlord], že [NOR.GetName] je připraveno se plně připojit k jejich impériu. Je to odraz jejich síly a naší úcty k ní. Uděláme cokoli, aby jsme ukojili jejich neustálou žízeň po moci a zemi." # todo: NEW TRANSLATION
  NOR_jonas_lie_coup: "Puč Jonase Lieho" # todo: NEW TRANSLATION
  NOR_jonas_lie_coup_desc: "Quislingova neschopnost se zdá být bez mezí. Byl škodou pro náš režim ještě před jeho vznikem a je slabým článkem v našem řetězu velení. Na druhé straně máme Jonase Lieho, který od začátku silně podporoval okupaci [ROOT.GetName] [GetNorwegianFascistOverlord] a je neústupným agentem pořádku. Měl by vést lid v plnění cílů našich spojenců." # todo: NEW TRANSLATION
  NOR_bring_back_quisling: "Přivést zpět Quislinga" # todo: NEW TRANSLATION
  NOR_bring_back_quisling_desc: "Mnozí ho považují za bezradného blázna, ale jeho vzestup naznačuje prozíravý plán za jeho údajnými selháními. Takový muž by měl být u kormidla, aby vedl [NOR.GetName] k novým a úrodným zemím jako dávní vikingové." # todo: NEW TRANSLATION
  NOR_a_valuable_partner_to_germany: "Cenný partner pro [GetNorwegianFascistOverlord]" # todo: NEW TRANSLATION
  NOR_a_valuable_partner_to_germany_desc: "Úspěch tohoto národa je neoddělitelně spojen s úspěchem [GetNorwegianFascistOverlord]. Čím více pro ně uděláme, tím více nás odmění kořistí z válek. Musíme se vydat cestou, která promění [NOR.GetNAme] v nepostradatelného partnera." # todo: NEW TRANSLATION
  NOR_invite_german_engineers: "Pozvat fašistické inženýry" # todo: NEW TRANSLATION
  NOR_invite_german_engineers_desc: "[NOR.GetName] nikdy nebylo průmyslovou velmocí; naši předchůdci se víc soustředili na obchod než výrobu vlastních produktů. Proto potřebujeme pomoc [GetNorwegianFascistOverlord] k zajištění znalostí, abychom dohnali spojence i nepřátele." # todo: NEW TRANSLATION
  NOR_the_kings_abdication: "Králova abdikace" # todo: NEW TRANSLATION
  NOR_the_kings_abdication_desc: "Král a jeho komorník, když si uvědomili ohromnou sílu našich vetřelců, už nemají co dát svému lidu ani vzít. Král Haakon VII v jednom z mála veřejných vystoupení oznámil, že každý [NOR.GetAdjective] občan by se měl poddat fašistovi, který zaplavil naše země." # todo: NEW TRANSLATION
  NOR_reviving_the_norgesveldet: "Obnovení Norgesveldet" # todo: NEW TRANSLATION
  NOR_reviving_the_norgesveldet_desc: "Naši předkové byli obávaní, plenili a dobývali všude, kam mohli dohlédnout a doplout. Musíme se ohlédnout zpět a přinést ten duch zpět. Mohli bychom být novou vikingovou hrozbou, která drží děti vzhůru v noci." # todo: NEW TRANSLATION
  NOR_old_vinland: "Staré Vinland" # todo: NEW TRANSLATION
  NOR_old_vinland_desc: "Staří norské výpravy se neustále posouvaly na západ dál než kdokoli jiný, až konečně dosáhly úrodných zemí Vinlandu, dnes Newfoundlandu a Labradoru. Pojďme opět vydat na západ a dobýt to, co nám mělo zůstat." # todo: NEW TRANSLATION
  NOR_claims_on_scotland: "Nároky na Skotsko" # todo: NEW TRANSLATION
  NOR_claims_on_scotland_desc: "Než se stalo součástí Spojeného království, bylo Skotsko jen dvorem našich předků. Vraťme si ho od těch slabých rukou, které sotva udrží jeho vikingské kořeny, a opět obcházejme pobřeží a hory Severní Británie." # todo: NEW TRANSLATION
  NOR_claims_on_ireland: "Nároky na Irsko" # todo: NEW TRANSLATION
  NOR_claims_on_ireland_desc: "Co bylo kdysi černou lagunou, naši norští předkové osídlili a nazvali Duibhlinn. Z tohoto zdánlivě nevýznamného místa mnoho Vikingů prosperovalo, plenilo a mísilo se s keltskými kmeny. Určitě jim nebude vadit, když si to vezmeme zpět, slovem či silou." # todo: NEW TRANSLATION
  NOR_the_chamberlains_overture: "Královnická komorníkova nabídka" # todo: NEW TRANSLATION
  NOR_the_chamberlains_overture_desc: "Jak Storting kulhá směrem k irelevanci, vzor šlechtických hodnot, baron Peder Anker Wedel‑Jarlsberg, druhý v pořadí na Feudálním hrabství Jarlsberg a kancléř našeho skromného krále Haakona VII, navrhuje, abychom hledali řešení v minulosti. Konkrétně, že možná by královský aparát mohl převzít kontrolu nad celou vládou." # todo: NEW TRANSLATION
  NOR_send_the_storting_home: "Poslat Storting domů" # todo: NEW TRANSLATION
  NOR_send_the_storting_home_desc: "Náš národní parlament měl poslední výdechy už dávno. Jeho udržování při životě jen prodlužuje utrpení, a upřímně, i naše. Nechme politiky jít domů k rodinám, královi muži vezmou věci do svých rukou." # todo: NEW TRANSLATION
  NOR_assure_the_population: "Ujistit populaci" # todo: NEW TRANSLATION
  NOR_assure_the_population_desc: "Může se zdát, že [ROOT.GetName] směřuje k zkáze, ale královský kancléř jménem krále Haakona VII chce, aby lid věděl, že monarchie udrží pevnou ruku a navrátí zemi stabilitě." # todo: NEW TRANSLATION
  NOR_demand_king_haakons_rise_to_power: "Požadovat, aby král Haakon převzal moc" # todo: NEW TRANSLATION
  NOR_demand_king_haakons_rise_to_power_desc: "Díky bouřlivému projevu barona Wedel‑Jarlsberga lid [NOR.GetName] volá po pevné monarchii, která převezme vládu. Problém je v tom, že sám král Haakon VII opakovaně zdůrazňuje, že zemi by měli vládnout zástupci lidu. Zdá se, že krále je třeba přesvědčit." # todo: NEW TRANSLATION
  NOR_the_crowns_executive_powers: "Vykonavatelské pravomoci Koruny" # todo: NEW TRANSLATION
  NOR_the_crowns_executive_powers_desc: "Když král nadále odmítá volání po absolutní moci, nemáme jinou možnost než mu udělit výkonné pravomoci. Až se probudí ze svého politického spánku, bude mít nástroje k tomu, aby vedl [ROOT.GetNonIdeologyName] ke slávě!" # todo: NEW TRANSLATION
  NOR_a_warden_king: "Strážný král" # todo: NEW TRANSLATION
  NOR_a_warden_king_desc: "Je povinností krále, ba jeho privilegiem, bránit země, které mu byly svěřeny vyššími mocnostmi. Nechť ozbrojené síly jsou meč absolutní královské moci, spící, dokud se král nerozhodne povstat a užít jej." # todo: NEW TRANSLATION
  NOR_the_kingdom_of_norway: "Království Norsko" # todo: NEW TRANSLATION
  NOR_the_kingdom_of_norway_desc: "Je čas, ať už si král Haakon VII myslí, nebo ne. Odstraníme veškeré přetvářky demokracie a vlády lidu a necháme království srazit naše nepřátele na padrť. Král nebude mít na výběr než se zúčastnit vlastního korunovace." # todo: NEW TRANSLATION
  NOR_appoint_prince_olav_to_army_staff: "Jmenovat prince Olava do armádního štábu" # todo: NEW TRANSLATION
  NOR_appoint_prince_olav_to_army_staff_desc: "Nyní, když je královská rodina na palubě, musíme využít jejich dovednosti a dát je do služby obraně našeho království. Pokud pověříme prince Olava velením armády, můžeme si být jisti, že využije své školení a zkušenosti v boji na zemi." # todo: NEW TRANSLATION
  NOR_prince_olav_to_navy_staff: "Prince Olav do námořního štábu" # todo: NEW TRANSLATION
  NOR_prince_olav_to_navy_staff_desc: "Navzdory jejich odporu k našemu projektu je princ Olav otevřen představě vedení námořních sil našeho království. Koneckonců získal zlatou medaili v plachtění na olympiádě 1928, takže víme, že je jeden s vlnami. Když se zaměří na vedení námořnictva, naši nepřátelé skončí jako potrava pro lososy, které naši poddaní loví." # todo: NEW TRANSLATION
  NOR_promote_civilian_donations: "Podporovat civilní dary" # todo: NEW TRANSLATION
  NOR_promote_civilian_donations_desc: "Jako feudální léna dřív, každý vazal musí platit svému pánovi. Samozřejmě barbarské dny jsou pryč; náš skromný monarchický systém je osvícenější, takže tento příspěvek je z velké části dobrovolný." # todo: NEW TRANSLATION
  NOR_research_funding: "Financování výzkumu" # todo: NEW TRANSLATION
  NOR_research_funding_desc: "Naši urození [ROOT.GetAdjective] vládci jsou oddáni osvícenství, a proto rádi patronují vědeckému pokroku potřebnému k rozšíření našeho panství nejdřív silou a koncem postupně jen laskavostí." # todo: NEW TRANSLATION
  NOR_invite_cadillac_to_norway: "Pozvat Cadillac do Norska" # todo: NEW TRANSLATION
  NOR_invite_cadillac_to_norway_desc: "Před mnoha lety byl našemu milému princi Olavovi, tehdy radostnému dítěti, darován miniaturní Cadillac. Určitě ocení, když pozveme Cadillac do [NOR.GetNameDef], aby nám pomohl vyvíjet a vyrábět vozidla, která ponesou naše prapory přes těla nepřátel. Ať mu to přinese radostné vzpomínky na dětství." # todo: NEW TRANSLATION
  NOR_enhance_coastal_defense: "Posílit pobřežní obranu" # todo: NEW TRANSLATION
  NOR_enhance_coastal_defense_desc: "Rozsah našich pobřežních území je dvojsečný meč. Na jedné straně umožňuje našim lidem živit se mořem, ale na druhé dává nepříteli obrovský vstupní bod pro námořní invazi." # todo: NEW TRANSLATION
  NOR_rule_the_northern_sea: "Ovládnout Severní moře" # todo: NEW TRANSLATION
  NOR_rule_the_northern_sea_desc: "Ať naše království expanduje do Severního moře! Naše lodě budou paží rozšiřující království do horizontu. Aby se to stalo, potřebujeme námořní základny k udržení takové dominance a postupy, které nám umožní jít dál." # todo: NEW TRANSLATION
  NOR_ramp_up_naval_production: "Zvýšit námořní výrobu" # todo: NEW TRANSLATION
  NOR_ramp_up_naval_production_desc: "Navzdory naší slavné námořní tradici naše současné námořní síly neodpovídají ambicím. Nespořme úsilí v prvním kroku: postavit loděnice, které budou pohánět loďstvo našeho prince a budoucího krále Olava." # todo: NEW TRANSLATION
  NOR_power_to_the_royal_guard: "Moc královské gardě" # todo: NEW TRANSLATION
  NOR_power_to_the_royal_guard_desc: "Hans Majestet Kongens Garde, naše milovaná králova královská garda, byla vždy nejlépe vycvičenou a nejodhodlanější bojovou silou v království. Inspiraci čerpají od našeho krále a jeho regenta, a musí vést útok naší armády; budou špičkou kopí, jež rozdrtí naše nepřátele." # todo: NEW TRANSLATION
  NOR_encourage_recruitment: "Podporovat nábory" # todo: NEW TRANSLATION
  NOR_encourage_recruitment_desc: "Jak rád říká náš milovaný komorník, Král Haakon žije v našich srdcích, takže kdokoli může bojovat a zemřít za něj! Nechť jeho duch pozvedne každého poddaného v [ROOT.GetNameDef], aby se přihlásili a bojovali pro svého pána." # todo: NEW TRANSLATION
  NOR_for_the_king_and_prince: "Pro krále a prince" # todo: NEW TRANSLATION
  NOR_for_the_king_and_prince_desc: "Náš král Haakon a jeho syn, princ Olav, jsou inspirací pro každého [NOR.GetAdjective]. Musíme připomínat vojákům, že každý krok vpřed, každý zabitý nepřítel a každá kapka prolitá krve nejsou marné. Vše je to pro naši královskou rodinu, šlechtu [NOR.GetName] a to, co představují." # todo: NEW TRANSLATION
  NOR_the_kings_line: "Králova linie" # todo: NEW TRANSLATION
  NOR_the_kings_line_desc: "Bunkry a střelecké pevnůtky lemující hranice našeho království jsou fyzickým zobrazením královy odolnosti a vůle. Nechť naši muži prolévají svou krev tak, aby králova linie vydržela a jeho království zůstalo neporušené." # todo: NEW TRANSLATION
  NOR_the_glucksburg_sea_wall: "Zeď Glücksburg" # todo: NEW TRANSLATION
  NOR_the_glucksburg_sea_wall_desc: "Hrabě z Jarlsbergu zahájil stavbu mořské hráze ve jménu rodu, do něhož patří náš slavný král Haakon VII, rod Glücksburg. Bude stát jako zástup za moc královské rodiny, zadrží nepřátele a ochrání naše fjordy a hory před ohrožením." # todo: NEW TRANSLATION
  NOR_shield_of_the_north: "Štít severu" # todo: NEW TRANSLATION
  NOR_shield_of_the_north_desc: "Co je meč, pokud ho neovládáš? Co je štít, pokud neochrání své poddané? Naše královská rodina musí chránit nejen [NOR.GetNameDef], ale i království a země, které jsou povinností jejich ochrany. I když ne nutně de iure." # todo: NEW TRANSLATION
  NOR_our_royal_claims: "Naše královské nároky" # todo: NEW TRANSLATION
  NOR_our_royal_claims_desc: "[NOR_GetOurRoyalClaimsDesc]" # todo: NEW TRANSLATION
  NOR_our_royal_claims_desc_king: "Máme štěstí, že máme tak skromného krále, který popírá nároky na země mimo svou současnou jurisdikci. Jsme ještě šťastnější, že máme drahého hraběte Pedera Anker Wedel‑Jarlsberga, který je ochoten udělat cokoli, aby tyto nároky prosadil a připojil je k našemu panství. Bojujme za zemi našeho krále!" # todo: NEW TRANSLATION
  NOR_our_royal_claims_desc_queen: "Je smutné, že král Haakon VII už s námi není, ale musíme si pamatovat dědictví, které po sobě zanechal, včetně jeho četných nároků po Evropě. Jsme šťastnější, že máme naši drahou královnu Mathilde I, která nejenže má vlastní nároky, ale je ochotna udělat cokoli, aby je prosadila a připojila k našemu panství. Bojujme za zemi naší koruny!" # todo: NEW TRANSLATION
  NOR_swedish_claims: "Nároky na Švédsko" # todo: NEW TRANSLATION
  NOR_swedish_claims_desc: "[NOR_GetSwedishClaimsDesc]" # todo: NEW TRANSLATION
  NOR_swedish_claims_desc_mon: "Neochotně byly naše dějiny a královské rody spjaty s [SWE.GetNonIdeologyName]. Během těchto střídání po staletí [SWE.GetAdjective] ukradli obrovské úseky země; Jämtland, Härjedalen a Bohuslän. Ať už za to mohla dynastie Bernadotte, Vasa, Oldenburg nebo kdokoli jiný, nezáleží. Pomstíme se a vrátíme si naše země." # todo: NEW TRANSLATION
  NOR_swedish_claims_desc_fas: "Dějiny monarchií ve Skandinávii jsou dlouhá a zamotaná, ale můžeme toho využít v náš prospěch. Švédsko ukradlo celé regiony, které kdysi patřily naší zemi; můžeme použít pomstu jako ospravedlnění k invazi do [SWE.GetAdjective] a rozšíření našeho impéria do směsi historických [NOR.GetAdjective] území." # todo: NEW TRANSLATION
  NOR_claims_on_faroe_islands: "Nároky na Faerské ostrovy" # todo: NEW TRANSLATION
  NOR_claims_on_faroe_islands_desc: "[NOR_GetFaroeClaimsDesc]" # todo: NEW TRANSLATION
  NOR_claims_on_faroe_islands_desc_PAWJ: "V důsledku minulých křivd ze strany monarchií [DEN.GetNonIdeologyName] a [SWE.GetNonIdeologyName] nám byly Faerské ostrovy odepřeny. To končí nyní. Náš urozený komoří zaplatí krví cenu, aby byly vráceny k nám." # todo: NEW TRANSLATION
  NOR_claims_on_faroe_islands_desc_ALT: "V důsledku minulých křivd ze strany monarchií [DEN.GetNonIdeologyName] a [SWE.GetNonIdeologyName] nám byly Faerské ostrovy odepřeny. To končí nyní. Naše ctnostná královna Mathilde I zaplatí krví cenu, aby byly vráceny k nám." # todo: NEW TRANSLATION
  NOR_eirik_raudes_land: "Eirik Raudes země" # todo: NEW TRANSLATION
  NOR_eirik_raudes_land_desc: "Absurdní rozhodnutí Haagu z roku 1933 musí být zvráceno. Jak si dovolili nechat [DEN.GetName] mít zemi, kterou objevil Erik Rudý, Nor, před tisícem let? Před pár lety jsme vlastnili část východního pobřeží Grónska, ale brzy si vezmeme to a ještě více; odkaz Erika Rudého bude pokračovat, když si vezmeme zpět, co je naše." # todo: NEW TRANSLATION
  NOR_iceland: "Island" # todo: NEW TRANSLATION
  NOR_iceland_desc: "[NOR_GetIcelandClaimDesc]" # todo: NEW TRANSLATION
  NOR_iceland_desc_PAWJ: "Po rozpadu Kalmarovy unie byl Island nespravedlivě odebrán. Ačkoli je to století staré, nezapomněli jsme. Náš komoří, náš král a náš princ nebudou spát, dokud to nebude napraveno a Island opět nebude součástí Království Norska." # todo: NEW TRANSLATION
  NOR_iceland_desc_ALT: "Po rozpadu Kalmarovy unie byl Island nespravedlivě odebrán. Ačkoli je to století staré, nezapomněli jsme. Naše královna, náš princ a lid, jimž vládnou, nebudou spát, dokud to nebude napraveno a Island opět nebude součástí Království Norska." # todo: NEW TRANSLATION
  NOR_bjarmeland: "Bjarmeland" # todo: NEW TRANSLATION
  NOR_bjarmeland_desc: "[ROOT.GetAdjective] průzkumníci po staletí rozšiřovali hranice možného a dosažitelného. Jedním z případů je Bjarmeland, který byl jako první prozkoumán [NOR.GetAdjective] a nyní je mimo náš dosah. Musíme znovu natáhnout ruku a popadnout tuto zemi pro sebe." # todo: NEW TRANSLATION
  NOR_claims_on_denmark: "Nároky na Dánsko" # todo: NEW TRANSLATION
  NOR_claims_on_denmark_desc: "[NOR_GetDanishClaimsDesc]" # todo: NEW TRANSLATION
  NOR_claims_on_denmark_desc_mon: "Dánsko možná bylo zemí, odkud náš milovaný král pocházel, ale víme, že jeho skutečný domov byl vždy [NOR.GetNonIdeologyName], ještě před tím, než byl zvolen na trůn. Přesto musíme přivést jeho starou vlast do jeho království; možná ho to přiměje být aktivnějším ve vládě naší monarchie." # todo: NEW TRANSLATION
  NOR_claims_on_denmark_desc_fasc: "Monarchové [DEN.GetNonIdeologyName] bývali naši pánové, ale už nikdy více. Jsou nyní slabí a bezvýznamní, tak je země k mání. S naší nově nabytou silou se ich armáda rozpadne jako máslové sušenky v rukou dítěte!" # todo: NEW TRANSLATION
  NOR_consolidate_kingdom: "Konsolidovat království" # todo: NEW TRANSLATION
  NOR_consolidate_kingdom_desc: "[GetConsolidateKingdomDesc]" # todo: NEW TRANSLATION
  NOR_consolidate_kingdom_desc_PAWJ: "Nyní, když náš urozený markýz Peder Anker Wedel‑Jarlsberg, královský komoří a pravá ruka našeho milovaného Haakona VII, rozšířil území naší koruny, musíme se posunout dovnitř, konsolidovat naše zisky a vládnout našim poddaným zlatou, pevnou, byť mírně přísnou rukou." # todo: NEW TRANSLATION
  NOR_consolidate_kingdom_desc_alt: "Nyní, když naše právoplatná královna Mathilde I pečlivě dohlíží na rozsáhlé země naší koruny, musíme se obrátit dovnitř, konsolidovat naše zisky a vládnout poddaným v sametových rukavicích a pevnou rukou." # todo: NEW TRANSLATION
  NOR_start_rearmament: "Zahájit přeozbrojování" # todo: NEW TRANSLATION
  NOR_start_rearmament_desc: "Možná úplné odzbrojení není tím spolehlivým způsobem, jak se vyhnout válce, jak jsme doufali. Raději začněme přípravy na možný útok na naši zemi." # todo: NEW TRANSLATION
  NOR_kickstart_military_industry: "Nakopnout vojenský průmysl" # todo: NEW TRANSLATION
  NOR_kickstart_military_industry_desc: "[ROOT.GetName] byla dlouho předmětem jiných národů a proto nikdy neutvořila interní vojenský průmysl. Abychom ochránili naši svobodu, musíme přestat spoléhat na jiné země pro naši obrannou produkci a začít budovat vlastní válečný stroj." # todo: NEW TRANSLATION
  NOR_build_supplies_network: "Vytvořit síť zásobování" # todo: NEW TRANSLATION
  NOR_build_supplies_network_desc: "Naše ohromující hory, jezera a fjordy jsou záviděníhodné, ale zároveň ztěžují přesun zásob. Musíme vědomě usilovat o to, aby zásoby rychleji doputovaly k našim frontám." # todo: NEW TRANSLATION
  NOR_drobak_coastal_fort: "Pobřežní pevnost Drøbak" # todo: NEW TRANSLATION
  NOR_drobak_coastal_fort_desc: "Drøbak, konkrétně Drøbaksund, může být klíčem k obraně našeho hlavního města. Nikdy nevíte, kdy dobře umístěná torpéda mohou zpozdit invazi natolik, aby nám dala čas na přípravu odpovědi." # todo: NEW TRANSLATION
  NOR_modernize_fortifications: "Modernizovat opevnění" # todo: NEW TRANSLATION
  NOR_modernize_fortifications_desc: "Někteří nazývají naše opevnění 'napoleonskými', což zde není kompliment. Naše bunkry možná jsou staré, ale zbraně našich nepřátel ne. Úsilí a zdroje vložené do modernizace pevností se v budoucnu jistě vyplatí." # todo: NEW TRANSLATION
  NOR_artillery_development: "Vývoj dělostřelectva" # todo: NEW TRANSLATION
  NOR_artillery_development_desc: "Velká válka prokázala důležitost dělostřelectva; nesmíme si dovolit zaostávat dál, abychom neohrozili schopnost odolat obuškovým granátům nepřítele." # todo: NEW TRANSLATION
  NOR_anti_air_support: "Protivzdušná podpora" # todo: NEW TRANSLATION
  NOR_anti_air_support_desc: "Bez ohledu odkud útočník přijde, jedno je jisté: pokusí se použít letadla k ovládnutí oblohy a bombardování našich měst a jednotek. To můžeme zneškodnit budováním protivzdušné obrany." # todo: NEW TRANSLATION
  NOR_rikstanken: "Rikstanken" # todo: NEW TRANSLATION
  NOR_rikstanken_desc: "Smutnou pravdou je, že [ROOT.GetName] nikdy předtím nevlastnilo tank. Pokud doufáme v šanci na vítězství, pancíř je nutnost. Otázka je, jaký přístup zvolit? Velké množství tanků by mohlo být pro naši zemi nákladné; možná začneme jedním tankem? Nebo obětujeme něco jiného než peníze za národní tanky." # todo: NEW TRANSLATION
  NOR_tank_procurement: "Zajištění tanků" # todo: NEW TRANSLATION
  NOR_tank_procurement_desc: "Náš domácí tankový program je zjevně nedostatečný pro obrněné boje 20. století. Na druhou stranu mnoho zemí s potřebnou odborností a výrobou by mohlo nabízet své obrněné stroje k prodeji — to by byl skvělý zkrat k tomu, aby se [ROOT.GetAdjective] armáda dostala do tohoto století." # todo: NEW TRANSLATION
  NOR_norges_rikstanksfabrikk: "Norges Rikstanksfabrikk" # todo: NEW TRANSLATION
  NOR_norges_rikstanksfabrikk_desc: "Když jsme se naučili základy obrněného boje, jsme připraveni vyvinout vlastní národní program výroby tanků, Rikstanksfabrikk. Je to jediný způsob, jak garantovat nepřerušené dodávky obrněných vozidel." # todo: NEW TRANSLATION
  NOR_improve_production_lines: "Zlepšit výrobní linky" # todo: NEW TRANSLATION
  NOR_improve_production_lines_desc: "Nemá smysl odvaha v obraně země, pokud nemůžeme poskytnout zbraně a vybavení k pokračování boje. Moderní válka závisí na tom, mít dostatek munice; ujistěme se, že je umíme vyrábět rychleji, než je spotřebujeme." # todo: NEW TRANSLATION
  NOR_the_royal_guards_battalion: "Batalion královské gardy" # todo: NEW TRANSLATION
  NOR_the_royal_guards_battalion_desc: "Královská garda je již nějakou dobu naší nejelitnější silou; můžeme tento program rozšířit a zlepšit jejich výcvik, aby byli předvojem našich ozbrojených sil." # todo: NEW TRANSLATION
  NOR_expand_Haeren: "Rozšířit Hæren (Armádu)" # todo: NEW TRANSLATION
  NOR_expand_Haeren_desc: "Naše pozemní síly blednou v porovnání s armádami na kontinentu; [ROOT.GetName] prostě nebylo nikdy militaristickou zemí. Jak hrozba globální války roste, musíme zajistit, že naše populace je připravena bránit naši mladou zemi." # todo: NEW TRANSLATION
  NOR_improved_weapons: "Vylepšené zbraně" # todo: NEW TRANSLATION
  NOR_improved_weapons_desc: "Vybavení našich pozemních sil je v žalostném stavu. Toto zanedbání je nepřijatelné a může stát naši nezávislost. Musíme co nejrychleji tento trend obrátit, dokud je čas." # todo: NEW TRANSLATION
  NOR_building_an_independent_norway: "Budování nezávislého Norska" # todo: NEW TRANSLATION
  NOR_building_an_independent_norway_desc: "[ROOT.GetAdjective] národ v současné nezávislé podobě existuje teprve od roku 1905, takže je mnoho práce na budování národa, zejména v průmyslu, který bude pro naši nezávislost zásadní." # todo: NEW TRANSLATION
  NOR_independent_norway_removal_tt: "§Y$NOR_independent_norway_dmod$§! bude odstraněn, pokud se [ROOT.GetNonIdeologyName] stane závislým na jiné zemi!§!" # todo: NEW TRANSLATION
  NOR_norwegian_school_of_economics: "Norská škola ekonomie" # todo: NEW TRANSLATION
  NOR_norwegian_school_of_economics_desc: "Pokud se chceme etablovat ve světové ekonomice, je třeba odbornosti, a ta se buduje časem. Založení Norges Handelshøyskole jako naší národní školy ekonomie je prvním krokem, aby náš civilní a později vojenský průmysl vzkvétal." # todo: NEW TRANSLATION
  NOR_hurtigruten: "Hurtigruten" # todo: NEW TRANSLATION
  NOR_hurtigruten_desc: "Nelze popřít, že [ROOT.GetNonIdeologyName] je neobvykle dlouhá země s obtížným terénem. To formovalo naši národní identitu, ale také ztěžuje budování infrastruktury a železnic. Musíme založit Hurtigruten jako dočasné řešení — sérii trajektů přepravujících lidi a zboží podél [ROOT.GetAdjective] pobřeží." # todo: NEW TRANSLATION
  NOR_norges_tekniske_hogskole: "Norges Tekniske Høgskole" # todo: NEW TRANSLATION
  NOR_norges_tekniske_hogskole_desc: "Více než dvě desetiletí norské Technické vysoké učení v Trondheimu stálo v čele inženýrství v zemi, ale chceme‑li soutěžit se sousedy a potenciálními nepřáteli, bude třeba více financí do technického vzdělávání. Nemůžeme nechat náš průmysl bez nutné odbornosti." # todo: NEW TRANSLATION
  NOR_empower_large_industrial_groups: "Posílit velké průmyslové skupiny" # todo: NEW TRANSLATION
  NOR_empower_large_industrial_groups_desc: "Velké průmyslové podniky mají prokázanou schopnost budovat a udržovat továrny a vyrábět každodenní potřeby průměrného [ROOT.GetAdjective] občana. Důvěřovat jim je jistě správná cesta k průmyslové nezávislosti [ROOT.GetNonIdeologyName]." # todo: NEW TRANSLATION
  NOR_fund_local_construction: "Financovat místní výstavbu" # todo: NEW TRANSLATION
  NOR_fund_local_construction_desc: "Nesmíme nechat industrializaci soustředěnou jen v hlavním městě a několika dalších městech. Pokrok by měl pokrýt celé [ROOT.GetName] co nejrovnoměrněji. Investujme do měst a menších center, aby vznikla různorodější průmyslová základna a odolnější ekonomika." # todo: NEW TRANSLATION
  NOR_aluminum_production: "Výroba hliníku" # todo: NEW TRANSLATION
  NOR_aluminum_production_desc: "Výroba hliníku je extrémně náročná na energii; i když postrádáme ložiska bauxitu, [ROOT.GetAdjective] topografie je ideální pro vodní elektrárny, takže můžeme snadno dovážet bauxit a přeměňovat ho v hodnotný zdroj pro náš rozvíjející se vojenský průmysl." # todo: NEW TRANSLATION
  NOR_build_the_northern_rail: "Postavit severní železnici" # todo: NEW TRANSLATION
  NOR_build_the_northern_rail_desc: "Severní část naší země byla příliš dlouho opomíjena. Ačkoliv terén ztěžuje výstavbu infrastruktury, je to úsilí, které se nám v budoucnu vyplatí." # todo: NEW TRANSLATION
  NOR_complete_the_sourthern_railway_network: "Dokončit jižní železniční síť" # todo: NEW TRANSLATION
  NOR_complete_the_sourthern_railway_network_desc: "I když je jižní část [ROOT.GetNonIdeologyName] o poznání rozvinutější než sever, ve srovnání s infrastrukturou jiných zemí, i sousedních, je zřejmé, že je mnoho práce." # todo: NEW TRANSLATION
  NOR_increase_research_funding: "Zvýšit financování výzkumu" # todo: NEW TRANSLATION
  NOR_increase_research_funding_desc: "[ROOT.GetName] dosud nebyla technologickou velmocí. Musíme investovat do nového výzkumu, chceme‑li dohnat zbytek Evropy, jinak hrozí závislost na budoucím nepříteli." # todo: NEW TRANSLATION
  NOR_expand_norges_tekniske_hogskole: "Rozšířit Norges Tekniske Høgskole" # todo: NEW TRANSLATION
  NOR_expand_norges_tekniske_hogskole_desc: "Vzhledem k velkému konfliktu, který se zdá viset na obzoru, budeme potřebovat rozšířit kapacity našeho technického institutu, aby vyhověl požadavkům stále složitější války." # todo: NEW TRANSLATION
  NOR_revamp_hydroelectric_capacity: "Přepracovat hydroelektrickou kapacitu" # todo: NEW TRANSLATION
  NOR_revamp_hydroelectric_capacity_desc: "Hliník je nezbytný pro stavbu letadel a jiných válečných prostředků, ale zpracování bauxitu na hliník vyžaduje obrovské množství energie. Naštěstí má [NOR.GetName] ideální topografii k přeměně mnoha jezer a řek na vodní elektrárny. Tak můžeme vyprodukovat hliník i bez velkých ložisek bauxitu." # todo: NEW TRANSLATION
  NOR_haerens_flyvevaaben: "Hærens Flyvevaaben" # todo: NEW TRANSLATION
  NOR_haerens_flyvevaaben_desc: "Nová hranice války je v oblacích. Pokud necháme nepříteli plnou kontrolu nad naším vzdušným prostorem, pozemní síly nebudou moci efektivně působit. Musíme vybudovat letectvo, které bude účinně podporovat pozemní jednotky." # todo: NEW TRANSLATION
  NOR_norwegian_planes: "Norská letadla" # todo: NEW TRANSLATION
  NOR_norwegian_planes_desc: "Viděli jsme, že dnes spojenci mohou být zítra vetřelci; proto se nemůžeme spoléhat na cizí mocnosti ohledně našich letadel — jejich význam na moderním bojišti je příliš velký." # todo: NEW TRANSLATION
  NOR_foreign_plane_designs: "Zahraniční návrhy letadel" # todo: NEW TRANSLATION
  NOR_foreign_plane_designs_desc: "Jako mladý a dlouho opomíjený národ nemá [ROOT.GetName] infrastrukturu, know‑how ani nástroje k navržení a výrobě letecké síly, kterou moderní boj vyžaduje. Musíme se obrátit na mezinárodní zbrojní trh, abychom zajistili letecké síly [NOR.GetName]." # todo: NEW TRANSLATION
  NOR_anti_air_artillery_research: "Výzkum protivzdušného dělostřelectva" # todo: NEW TRANSLATION
  NOR_anti_air_artillery_research_desc: "Jak se vznášejí nové technologie ve vzduchu, musí odpovídající zbraně k obraně našem vzdušném prostoru ze země držet krok, abychom nepodlehlili vzdušné nadvládě nepřítele." # todo: NEW TRANSLATION
  NOR_anti_air_construction: "Stavba protivzdušné obrany" # todo: NEW TRANSLATION
  NOR_anti_air_construction_desc: "Náš členitý terén dělá [NOR.GetName] obtížným cílem pro invazi, ale naše nebe je zranitelné vůči nepřátelským letadlům, což dává útočníkům výhodu. Musíme postavit potřebné protivzdušné baterie, abychom tomu zabránili." # todo: NEW TRANSLATION
  NOR_invest_in_airfields: "Investovat do letišť" # todo: NEW TRANSLATION
  NOR_invest_in_airfields_desc: "Nemá smysl mít letadla, když nemáme infrastrukturu k jejich startování. Postrádáme letištní kapacity potřebné k rozvinutí stoupajícího letectva." # todo: NEW TRANSLATION
  NOR_stavanger_airfield: "Letiště Stavanger" # todo: NEW TRANSLATION
  NOR_stavanger_airfield_desc: "Letiště Stavanger má být brzy dokončeno; jeho poloha je ideální pro vojenskou základnu. Můžeme provést úpravy k využití tohoto civilního letiště jako vojenské základny." # todo: NEW TRANSLATION
  NOR_increase_air_production: "Zvýšit výrobu letadel" # todo: NEW TRANSLATION
  NOR_increase_air_production_desc: "[NOR.GetName] potřebuje letadla a potřebuje je teď! Pokud nasměrujeme úsilí na výrobu letadel, možná se dokážeme bránit a prorazit nepřátelské obranné linie." # todo: NEW TRANSLATION
  NOR_buy_aa_from_sweden: "Koupit protiletadlové zbraně od Švédska" # todo: NEW TRANSLATION
  NOR_buy_aa_from_sweden_desc: "Náš východní soused, [SWE.GetName], dlouhodobě exceluje ve výrobě protiletadlových děl, daleko nad naše možnosti. Můžeme je požádat o koupi těchto děl Bofors k obraně našeho nebe při blížící se invazi." # todo: NEW TRANSLATION
  NOR_luftforsvaret: "$NOR_royal_air_force_dmod$" # todo: NEW TRANSLATION
  NOR_luftforsvaret_desc: "Je čas, aby naše letectvo přestalo být jen podpůrnou silou armád a vyvinulo se v samostatnou složku ozbrojených sil. Takovou, která má prostředky k provádění moderních operací efektivně." # todo: NEW TRANSLATION
  NOR_radar_research: "Výzkum radaru" # todo: NEW TRANSLATION
  NOR_radar_research_desc: "Jako země s rozsáhlým pobřežím je zásadní, abychom jej mohli efektivně monitorovat. Díky technologickému zázraku jménem Radar můžeme včas zaznamenat připlouvající lodě a letadla z větší vzdálenosti." # todo: NEW TRANSLATION
  NOR_repurpose_lighthouses: "Přesměrovat majáky" # todo: NEW TRANSLATION
  NOR_repurpose_lighthouses_desc: "Počasí a geologie učinily majáky podél [ROOT.GetAdjective] pobřeží nezbytnými a ikonickými. Můžeme je proměnit v majáky naděje tím, že je využijeme k podpoře radarového vybavení a pomohou nám odrazit vetřelce." # todo: NEW TRANSLATION
  NOR_pilot_training: "Výcvik pilotů" # todo: NEW TRANSLATION
  NOR_pilot_training_desc: "I když naše začínající letectvo je malé a nedostatečně rozvinuté, můžeme čerpat z tradice letců a průzkumníků a inspirovat novou generaci [NOR.GetAdjective] pilotů, kteří nám zajistí pokračující nezávislost." # todo: NEW TRANSLATION
  NOR_the_royal_norwegian_navy: "$NOR_royal_navy_dmod$" # todo: NEW TRANSLATION
  NOR_the_royal_norwegian_navy_desc: "Mít jedno z nejdelších pobřeží na světě má své výhody, ale také to znamená, že musíme vynaložit extra úsilí na jeho obranu. Naše námořnictvo bude první linii obrany národa." # todo: NEW TRANSLATION
  NOR_expand_the_dockyards: "Rozšířit loděnice" # todo: NEW TRANSLATION
  NOR_expand_the_dockyards_desc: "Přestože máme jeden z největších obchodních loďstev na světě, kapacita loděnic může být rozšířena a optimalizována pro vyšší produkci válečných lodí místo pouhých nákladních a tankerů." # todo: NEW TRANSLATION
  NOR_battleship_focus: "Zaměření na bitevní lodě" # todo: NEW TRANSLATION
  NOR_battleship_focus_desc: "Pouze obrovské obrněné monstra mohou zaručit, že skutečně budeme vládnout vlnám. Hrozba spatření jednoho z našich bitevních lodí na jejich pobřeží odradí každého potenciálního vetřelce." # todo: NEW TRANSLATION
  NOR_kystvakten: "Kystvakten" # todo: NEW TRANSLATION
  NOR_kystvakten_desc: "Abychom ochránili naše rozsáhlé pobřeží, potřebujeme množství plavidel, které zajistí dohled nad každým palcem horizontu. Vytvořme síť lodí, které budou hlídat naše vody proti nepřátelským lodím." # todo: NEW TRANSLATION
  NOR_convert_merchant_ships: "Přeměnit obchodní lodě" # todo: NEW TRANSLATION
  NOR_convert_merchant_ships_desc: "Náš obchodní loďstvo je hrdostí ekonomiky, ale nebude nám k užitku, pokud vetřelci zničí naši zemi. Naši kapitáni budou muset obětovat pro [ROOT.GetName] a nechat tyto lodě upravit pro boj." # todo: NEW TRANSLATION
  NOR_expand_merchant_marine: "Rozšířit obchodní loďstvo" # todo: NEW TRANSLATION
  NOR_expand_merchant_marine_desc: "Moderní válka potřebuje zdroje a vybavení, dvě věci, které [ROOT.GetName] zoufale postrádá. Jak válka hrozí, musíme zajistit dostatek lodí k dopravě všeho, co potřebujeme k přežití. Ano, máme více civilních lodí než většina zemí, ale očekáváme mnoho ztrát a nemůžeme být krátcí." # todo: NEW TRANSLATION
  NOR_expand_naval_academy: "Rozšířit námořní akademii" # todo: NEW TRANSLATION
  NOR_expand_naval_academy_desc: "Více lodí znamená více důstojníků k jejich velení. Naše námořní akademie byla dlouho dostačující, ale jak naše námořnictvo roste, musí růst i počet důstojníků a námořníků." # todo: NEW TRANSLATION
  NOR_norwegian_carriers: "Norské letadlové lodě" # todo: NEW TRANSLATION
  NOR_norwegian_carriers_desc: "Opakovaně jsme viděli, že budoucnost námořního boje silně závisí na kontrole vzduchu, i na moři. Letadlové lodě nám pomohou ovládnout oblohu nad nepřátelskými loděmi a rychle je porazit." # todo: NEW TRANSLATION
  NOR_mine_laying_effort: "Úsilí o kladení min" # todo: NEW TRANSLATION
  NOR_mine_laying_effort_desc: "Naše lodě nemohou být všude, ale miny mohou pokrýt více vod a znemožnit nepřátelům pocit bezpečí. Potřebujeme lepší miny, abychom překonali nové techniky jejich vyhýbání se a deaktivace." # todo: NEW TRANSLATION
  NOR_submarine_fleet: "Flotila ponorek" # todo: NEW TRANSLATION
  NOR_submarine_fleet_desc: "Ponorky svou efektivitou a utajením mohou zvrátit průběh námořní války torpédem. Potřebujeme vyrábět více a lepší ponorky, chceme‑li maximalizovat naše šance." # todo: NEW TRANSLATION
  NOR_naval_air_force: "Námořní letectvo" # todo: NEW TRANSLATION
  NOR_naval_air_force_desc: "Naše letadla mohou rozhodnout o tom, zda flotila podpoří invazi do [ROOT.GetName], nebo zda zůstane naše moře klidné. Pokud ovládneme oblohu nad mořem, můžeme opět vládnout vlnám." # todo: NEW TRANSLATION
  NOR_convoy_defense: "Obrana konvojů" # todo: NEW TRANSLATION
  NOR_convoy_defense_desc: "Perlou národa je jeho rozsáhlé obchodní loďstvo; nesmíme ho promarnit. Musíme zlepšit úsilí o jeho obranu, aby déle vydrželo a mělo větší dopad ve válce." # todo: NEW TRANSLATION
  NOR_nortraship: "Nortraship" # todo: NEW TRANSLATION
  NOR_nortraship_desc: "Nyní, když nás válka vyhnala do exilu, musíme konsolidovat námořní úsilí pod jednou vlajkou. Nortraship nám umožní podporovat válečné úsilí z dálky a pomoct spojencům dostatečně dlouho, aby nás uvedli zpátky do [ROOT.GetName]." # todo: NEW TRANSLATION
  NOR_convoy_bombing: "Bombardování konvojů" # todo: NEW TRANSLATION
  NOR_convoy_bombing_desc: "Čím menší je obchodní loďstvo nepřítele, tím větší dopad může mít naše obrovské loďstvo. Pokud podlomíme jejich dopravu, můžeme zvrátit průběh války." # todo: NEW TRANSLATION
  NOR_rebuild_the_royal_navy: "Přestavět královské námořnictvo" # todo: NEW TRANSLATION
  NOR_rebuild_the_royal_navy_desc: "Jsme daleko od své země, takže se tam pravděpodobně vrátíme po moři. Přestavba královského námořnictva je totéž co přestavba našeho národa." # todo: NEW TRANSLATION
  NOR_pan_germanic_entent: "Pan‑germánské spojenectví" # todo: NEW TRANSLATION
  NOR_emergency_conversions: "Přeměnit obchodní lodě" # todo: NEW TRANSLATION
  NOR_emergency_conversions_desc: "Máme obrovské obchodní loďstvo, ale plují v obrovském riziku. Měli bychom některé z těchto menších lodí osadit lehkým ozbrojením a nechat je chránit naši zranitelnou dopravu. Později je můžeme upravit pro specializované úkoly." # todo: NEW TRANSLATION
  NOR_emergency_conversions_tt: "Odemkne §Yrozhodnutí§! k přeměně §Ykonvojů§! na §Ytorpédoborce§!" # todo: NEW TRANSLATION
  NORDIC_reaching_out_to_our_neighbors: "Navázat kontakt s našimi sousedy" # todo: NEW TRANSLATION
  NORDIC_reaching_out_to_our_neighbors_desc: "TODO_NORDIC" # todo: NEW TRANSLATION
  NORDIC_to_arms_against_tyranny: "Ke zbraním proti tyranii" # todo: NEW TRANSLATION
  NORDIC_to_arms_against_tyranny_desc: "TODO_NORDIC" # todo: NEW TRANSLATION
  NORDIC_against_tyranny_TT: "Odemkne rozhodnutí §YPoslat zbraně do Nordické země§!, §YPoslat dobrovolníky do Nordické země§! a §YBránit nordickou zemi§! k podpoře nordických zemí proti invazi ze zahraničí." # todo: NEW TRANSLATION
  NORDIC_leverage_nordic_investments: "Využít nordické investice" # todo: NEW TRANSLATION
  NORDIC_leverage_nordic_investments_desc: "TODO_NORDIC" # todo: NEW TRANSLATION
  NORDIC_industrial_cooperation: "Průmyslová spolupráce" # todo: NEW TRANSLATION
  NORDIC_industrial_cooperation_desc: "TODO_NORDIC" # todo: NEW TRANSLATION
  NORDIC_the_nordic_march: "Nordický pochod" # todo: NEW TRANSLATION
  NORDIC_the_nordic_march_desc: "TODO_NORDIC" # todo: NEW TRANSLATION
  NORDIC_court_foreign_power_TT: "Odemkne rozhodnutí §YSoudit cizí mocnost§!, které vám umožní vstoupit do komunistické nebo fašistické frakce velmoci." # todo: NEW TRANSLATION
  NORDIC_mutual_guarantees: "Vzájemné záruky" # todo: NEW TRANSLATION
  NORDIC_mutual_guarantees_desc: "TODO_NORDIC" # todo: NEW TRANSLATION
  NORDIC_strengthen_ties: "Posílit vazby" # todo: NEW TRANSLATION
  NORDIC_strengthen_ties_desc: "TODO_NORDIC" # todo: NEW TRANSLATION
  NORDIC_form_joint_alliance: "Formovat [NORDIC_get_alliance_name]" # todo: NEW TRANSLATION
  NORDIC_form_joint_alliance_desc: "Pan‑skandinávský sen utrpěl vážný úder nejednotou v roce 1864. [NORDIC_GetFormAllianceSecondParagraph]" # todo: NEW TRANSLATION
  NORDIC_form_joint_alliance_desc_dem: "Nicméně vytvoření nové aliance založené na demokratických hodnotách, které sdílíme, by se mohlo stát majákem pro demokracie všude a zároveň nás bránit a přinést rychlé vítězství proti nepřátelům svobody." # todo: NEW TRANSLATION
  NORDIC_form_joint_alliance_desc_com: "Nicméně impulzem proletářské revoluce můžeme spojit naše národy a soustředit je na boj proti kapitalismu tím, že spojíme naše země do aliance Severních národů." # todo: NEW TRANSLATION
  NORDIC_form_joint_alliance_desc_mon: "Nicméně královské dědictví zakořeněné v našich dlouhotrvajících tradicích nám dovoluje vidět širší obraz a pracovat společně jako jedno pro zachování našich milovaných králů a královen." # todo: NEW TRANSLATION
  NORDIC_political_cooperation: "Politická spolupráce" # todo: NEW TRANSLATION
  NORDIC_political_cooperation_desc: "Samo o sobě nic nestačí, abychom skutečně pracovali společně. Pokud chceme být silou, s níž je třeba počítat, musí být všechny naše systémy součástí větší, dobře naolejované mašiny." # todo: NEW TRANSLATION
  NORDIC_consolidating_institutions: "Konsolidace institucí" # todo: NEW TRANSLATION
  NORDIC_consolidating_institutions_desc: "TODO_NORDIC" # todo: NEW TRANSLATION
  NORDIC_economic_union: "Hospodářská unie" # todo: NEW TRANSLATION
  NORDIC_economic_union_desc: "Musíme spojit naše zdroje; každý z nás má něco, co soused potřebuje. Zrušením bariér, které oddělovaly naše ekonomiky, dosáhneme vyšší efektivity. Zdroje musí mezi námi proudit, abychom si vzájemně lépe pomáhali." # todo: NEW TRANSLATION
  NORDIC_procurement_fund: "Fond pro nákup materiálu" # todo: NEW TRANSLATION
  NORDIC_procurement_fund_desc: "Hospodářské a vojenské velmoci mají kapacity na výrobu obranných a dobyvačných prostředků; ač máme domácí vojenský průmysl, nemůže se s tímto srovnávat—zatím. Můžeme však spojit prostředky na nákup velkého množství zbraní a vozidel nezbytných pro naši obranu." # todo: NEW TRANSLATION
  NORDIC_shared_intelligence: "Sdílené zpravodajství" # todo: NEW TRANSLATION
  NORDIC_shared_intelligence_desc: "Celý projekt [NORDIC_get_alliance_name] spočívá ve sdílení naší moci; pokud je znalost skutečně moc, sdílejme to, co víme o našich nepřátelích, co ví oni o nás a dokonce co si myslí, že o nás ví." # todo: NEW TRANSLATION
  NORDIC_northern_command: "Severní velení" # todo: NEW TRANSLATION
  NORDIC_northern_command_desc: "Společné vojenské velení je nutností, abychom lépe koordinovali akce. Ozbrojené síly musí hladce spolupracovat a rozhodnutí musí být přijímána rychle, s ohledem na všechny strany. Měli bychom zajistit, aby takové velení vzniklo, aby bylo možné plánovat společné ozbrojené síly." # todo: NEW TRANSLATION
  NORDIC_democratic_institution_1: "Nordická komise ministrů" # todo: NEW TRANSLATION
  NORDIC_communist_institution_1: "Severní federace" # todo: NEW TRANSLATION
  NORDIC_monarchist_institution_1: "Noblesa Norden" # todo: NEW TRANSLATION
  NORDIC_first_joint_institution: "[NORDIC_get_institution_1_name]" # todo: NEW TRANSLATION
  NORDIC_first_joint_institution_desc: "Když učiníme první kroky k opravdové integraci a spolupráci, [NORDIC_get_alliance_name] potřebuje novou instituci, [NORDIC_get_institution_1_desc]" # todo: NEW TRANSLATION
  NORDIC_first_joint_institution_desc_dem: "kde se ministři kabinetů různých zemí naší nadnárodní organizace mohou bavit o tom, jak lépe spojit úsilí, aby vedli naše lidi skrze rostoucí napětí v Evropě." # todo: NEW TRANSLATION
  NORDIC_first_joint_institution_desc_com: "která může sjednotit naše národy a zaručit jejich vlastnictví výrobních prostředků a přitom jim nadále nabízet sebeurčení." # todo: NEW TRANSLATION
  NORDIC_first_joint_institution_desc_mon: "která může rozplést naši síť šlechtických vazeb a umístit je do jednotné konstelace našich urozených vrstevníků, z nichž každý má roli v mocenské struktuře." # todo: NEW TRANSLATION
  NORDIC_democratic_institution_2: "Nordický předsednický parlament" # todo: NEW TRANSLATION
  NORDIC_communist_institution_2: "Severní politbyro" # todo: NEW TRANSLATION
  NORDIC_monarchist_institution_2: "Konkláve severních lvů" # todo: NEW TRANSLATION
  NORDIC_second_institution: "The [NORDIC_get_institution_2_name]" # todo: NEW TRANSLATION
  NORDIC_second_institution_desc: "Naše aliance je blíže a více propojená než kdy dřív, ale to také znamená, že jako jednotka je těžkopádná a pomalá. Založením [NORDIC_get_institution_2_name] [NORDIC_get_institution_2_desc]" # todo: NEW TRANSLATION
  NORDIC_second_institution_desc_dem: "můžeme mít legislativní orgán, který reprezentuje voliče našich národů a má výkonné pravomoci konat rychle tváří v tvář válce." # todo: NEW TRANSLATION
  NORDIC_second_institution_desc_com: "můžeme si být jisti, že vůle dělníků bude zastoupena; pár zástupců mnoha bude jistě konat v zájmu proletariátu." # todo: NEW TRANSLATION
  NORDIC_second_institution_desc_mon: "shromáždíme nejmocnější pány a dámy našich sjednocených království, aby statečně a rozhodně přijímali těžké kompromisy, které jsou břemenem šlechty." # todo: NEW TRANSLATION
  NORDIC_nordic_army_democratic: "Oddělení pozemních operací" # todo: NEW TRANSLATION
  NORDIC_nordic_army_communist: "Severní lidová armáda" # todo: NEW TRANSLATION
  NORDIC_nordic_army_monarchist: "Pochozí lvi" # todo: NEW TRANSLATION
  NORDIC_nordic_army: "[NORDIC_get_nordic_army_name]" # todo: NEW TRANSLATION
  NORDIC_nordic_army_desc: "[NORDIC_get_nordic_army_desc]" # todo: NEW TRANSLATION
  NORDIC_nordic_army_desc_dem: "Role [NORDIC_get_nordic_army_name] bude stanovit parametry, aby se pozemní síly našich demokracií doplňovaly. Silné stránky jednoho vyrovnají slabiny druhého s cílem zbavit kontinent útlaku provincie po provincii." # todo: NEW TRANSLATION
  NORDIC_nordic_army_desc_com: "Bez ohledu na národ, odkud pocházejí, všichni vojáci [NORDIC_get_nordic_army_name] jsou součástí [NORDIC_get_alliance_name] a budou pochodovat, dokud kapitalismus nebude vykořeněn naší společnou silou a neúprosnou vůlí." # todo: NEW TRANSLATION
  NORDIC_nordic_army_desc_mon: "Síly [NORDIC_get_alliance_name] nejsou pouhými armádami; jsou mnohem víc. [NORDIC_get_nordic_army_name] bude statečně bojovat pod jednou vlajkou za svého pána a zemi, kterou zastupují." # todo: NEW TRANSLATION
  NORDIC_nordic_navy_democratic: "Koordinační námořní velení" # todo: NEW TRANSLATION
  NORDIC_nordic_navy_communist: "Severní námořní komisařát" # todo: NEW TRANSLATION
  NORDIC_nordic_navy_monarchist: "Královská armáda" # todo: NEW TRANSLATION
  NORDIC_nordic_navy: "[NORDIC_get_nordic_navy_name]" # todo: NEW TRANSLATION
  NORDIC_nordic_navy_desc: "[NORDIC_get_nordic_navy_desc]" # todo: NEW TRANSLATION
  NORDIC_nordic_navy_desc_dem: "Rozlehlost moří by jednotlivé země přerostla v bezvýznamnost, ale pokud spojíme síly, můžeme koordinovat operace a účinněji využívat omezené prostředky. To bude úkol zástupců v [NORDIC_get_nordic_navy_name], náročný úkol, ale budou mít za zády veškeré zdroje [NORDIC_get_alliance_name]." # todo: NEW TRANSLATION
  NORDIC_nordic_navy_desc_com: "Vlny patří lidu a [NORDIC_get_alliance_name] je odhodláno je osvobodit a nárokovat pro severní národy. [NORDIC_get_nordic_navy_name] zajistí, že poslední, co naši nepřátelé uvidí, budou naše lodě na rudém horizontu." # todo: NEW TRANSLATION
  NORDIC_nordic_navy_desc_mon: "Spojená námořnictva [NORDIC_get_alliance_name] budou vládnout vlnám napříč všemi našimi dominii. [NORDIC_get_nordic_navy_name] bude příliv, který rozdrtí nepřátele až z nich nezbyde nic než vraky." # todo: NEW TRANSLATION
  NORDIC_nordic_airforce_democratic: "Nordický program vzdušné obrany" # todo: NEW TRANSLATION
  NORDIC_nordic_airforce_communist: "Severní lidový vzdušný komisařát" # todo: NEW TRANSLATION
  NORDIC_nordic_airforce_monarchist: "Spojená královská letectva" # todo: NEW TRANSLATION
  NORDIC_nordic_airforce: "[NORDIC_get_nordic_airforce_name]" # todo: NEW TRANSLATION
  NORDIC_nordic_airforce_desc: "Nebe je nová hranice naší aliance. [NORDIC_get_nordic_airforce_desc]" # todo: NEW TRANSLATION
  NORDIC_nordic_airforce_desc_dem: "Proto [NORDIC_get_nordic_airforce_name] bude spravovat prostředky potřebné k ochraně občanů našich zemí v rámci [NORDIC_get_alliance_name]. Zajistí také hladkou spolupráci našich letectev." # todo: NEW TRANSLATION
  NORDIC_nordic_airforce_desc_com: "Nemůžeme dovolit, aby síly kapitalismu uchvátily vzduch, který musí patřit nám všem. Naše letectvo zaplní oblohu nad nepřáteli a spustí na ně peklo." # todo: NEW TRANSLATION
  NORDIC_nordic_airforce_desc_mon: "Rozvojem leteckých schopností lépe nasměrujeme svou sílu. Přinutíme nepřátele sklonit se před mocí našich společných vzdušných sil." # todo: NEW TRANSLATION
  NORDIC_nordic_research_democratic: "Nordická výzkumná rada" # todo: NEW TRANSLATION
  NORDIC_nordic_research_communist: "Lidová univerzita severu" # todo: NEW TRANSLATION
  NORDIC_nordic_research_monarchist: "Spojené královské akademie" # todo: NEW TRANSLATION
  NORDIC_nordic_research: "[NORDIC_get_nordic_research_name]" # todo: NEW TRANSLATION
  NORDIC_nordic_research_desc: "Síla sama o sobě války nevyhrává. Technologický pokrok dává 20. století její výhodu v moderním boji. [NORDIC_get_nordic_research_desc]" # todo: NEW TRANSLATION
  NORDIC_nordic_research_desc_dem: "Program [NORDIC_get_nordic_industry_name] vloží kapitál a zdroje tam, kde budou mít vojáci a generálové nejlepší nástroje k řešení výzev války. Pokročilé technologie ochrání naše občany před marným proléváním krve." # todo: NEW TRANSLATION
  NORDIC_nordic_research_desc_com: "Program [NORDIC_get_nordic_industry_name] bude institutem pro vývoj nejnovějších prostředků zničení a hromadnou výrobu nejlepších nástrojů, které v rukou lidu mohou být gilotinami nadšenými fasismu a kapitalismu." # todo: NEW TRANSLATION
  NORDIC_nordic_research_desc_mon: "Království na severu vždy dávala prostor vědě k pokroku a [NORDIC_get_nordic_industry_name] bude pokračovat v této tradici, sjednocujíc nejlepší mozky našich říší do jedné budovy, která bude sloužit svým pánům pomocí spolupráce." # todo: NEW TRANSLATION
  NORDIC_nordic_military_industry_democratic: "Nordické zajišťování materiálu" # todo: NEW TRANSLATION
  NORDIC_nordic_military_industry_communist: "Výroba zbraní severního lidu" # todo: NEW TRANSLATION
  NORDIC_nordic_military_industry_monarchist: "Královské zbrojní továrny" # todo: NEW TRANSLATION
  NORDIC_nordic_military_industry: "[NORDIC_get_nordic_military_industry_name]" # todo: NEW TRANSLATION
  NORDIC_nordic_military_industry_desc: "[NORDIC_get_nordic_military_industry_desc]. Pokud bojujeme do posledního muže, pak ti muži udeří silněji s těmi pravými nástroji." # todo: NEW TRANSLATION
  NORDIC_nordic_military_industry_desc_dem: "Program [NORDIC_get_nordic_industry_name] bude zřízen, aby zajistil, že náš válečný stroj bude mít vždy potřebné součástky k fungování a k obraně našich národů před terorem a tyranií." # todo: NEW TRANSLATION
  NORDIC_nordic_military_industry_desc_com: "Revoluce se sama neobrání, stejně tak se nerozšíří bez silného impulsu již osvobozených dělníků našeho [NORDIC_get_alliance_name]." # todo: NEW TRANSLATION
  NORDIC_nordic_military_industry_desc_mon: "V našich moderních časech království padá jedno po druhém a pouhý duch královské rodiny je nezachrání před zánikem. Musíme zajistit, že naše říše mají nezbytné zbraně k boji o své přežití." # todo: NEW TRANSLATION
  NORDIC_nordic_industry_democratic: "Nordický fond průmyslového rozvoje" # todo: NEW TRANSLATION
  NORDIC_nordic_industry_communist: "Dělníci v souladu" # todo: NEW TRANSLATION
  NORDIC_nordic_industry_monarchist: "Královský institut rozvoje" # todo: NEW TRANSLATION
  NORDIC_nordic_industry: "[NORDIC_get_nordic_industry_name]" # todo: NEW TRANSLATION
  NORDIC_nordic_industry_desc: "[NORDIC_get_nordic_industry_desc]" # todo: NEW TRANSLATION
  NORDIC_nordic_industry_desc_dem: "S válkou či bez ní, naše národy musí vystavět infrastrukturu a kapitál potřebný k podpoře civilního obyvatelstva a zlepšit jejich životní úroveň. V době války to bude životně důležitý základ naší válečné ekonomiky." # todo: NEW TRANSLATION
  NORDIC_nordic_industry_desc_com: "Dělníci jsou živou esencí [NORDIC_get_alliance_name] a důvodem jeho existence. S [NORDIC_get_nordic_industry_name] můžeme zaručit účast pracujících na výrobě každodenních potřeb a zároveň během války podpořit náš válečný stroj." # todo: NEW TRANSLATION
  NORDIC_nordic_industry_desc_mon: "Koncept Noblesse Oblige nás zavazuje zajistit pro naše poddané infrastrukturu, která jim nejen získá přízeň, ale v době války bude základem válečné ekonomiky. [NORDIC_get_nordic_industry_name] tuto roli naplní, dokud nebude zbytečná." # todo: NEW TRANSLATION
