  FIN_military_aid_subsidies_tt: "Přidání dotace na vybavení pro §Y[ROOT.GetName]§! s [?ROOT.FIN_basic_subsidies_value|Y2] £GFX_civ_factory_output, pro §Y$small_plane_airframe$§!, §Y$medium_plane_airframe$§!, §Y$light_tank_chassis$§!, §Y$medium_tank_chassis$§!, §Y$artillery_equipment$§!, §Y$anti_air_equipment$§! a §Y$anti_tank_equipment$§!, cílící na §Ykaždého hlavního spojence§!." # todo: NEW TRANSLATION
  FIN_military_aid_equipment_tt: "\nObdržíme vybavení od spojenců." # todo: NEW TRANSLATION
  FIN_cooperation_with_germany_subsidies_tt: "Přidání dotace na vybavení pro §Y[ROOT.GetName]§! s [?ROOT.FIN_basic_subsidies_value|Y2] £GFX_civ_factory_output, pro §Y$small_plane_airframe$§!, §Y$medium_plane_airframe$§!, §Y$light_tank_chassis$§!, §Y$medium_tank_chassis$§!, §Y$artillery_equipment$§!, §Y$anti_air_equipment$§! a §Y$anti_tank_equipment$§!, cílící na §Y[GER.GetName]§!." # todo: NEW TRANSLATION
  FIN_strengthen_military_administration_history_entry: "Ocenění vojenské zásluhy" # todo: NEW TRANSLATION
  FIN_confederated_finno_russian_republics_dec_cat_tt: "Odemkne rozhodnutí kategorie §Y$FIN_confederated_finno_russian_republics_category$§!, umožňující nám integrovat bývalé [SOV.GetAdjective] státy s finským obyvatelstvem jako jádrové státy §Y[ROOT.GetNameDef]§!." # todo: NEW TRANSLATION
  FIN_confederated_finno_russian_republics_state_modifier_tt: "\n§YKaždý jádrový stát [SOV.GetNameDef] kontrolovaný [ROOT.GetNameDef]§!:" # todo: NEW TRANSLATION
  FIN_join_the_comintern_leader_tt: "\n§Y$FIN_otto_wille_kuusinen$§! se stane vůdcem země kdykoliv, když komunistický [ROOT.GetFlag]§Y[ROOT.GetNonIdeologyName]§! vstoupí do frakce vedené Stalinem [SOV.GetFlag]§Y[SOV.GetName]§!." # todo: NEW TRANSLATION
  FIN_foreign_aircraft_equipment_and_subsidies_tt: "\nNakoupit letecké vybavení od §Yzemí ochotných nám prodat vybavení§!. \nPřidat dotaci na vybavení pro §Y[ROOT.GetName]§! s [?ROOT.FIN_basic_subsidies_value|Y2] £GFX_civ_factory_output pro §Y$small_plane_airframe$§!, cílící na §Yzemě ochotné nám prodat vybavení§!.\nZemě prodávající:\n" # todo: NEW TRANSLATION
  FIN_foreign_armor_equipment_and_subsidies_tt: "\nNakoupit obrněné vybavení od §Yzemí ochotných nám prodat vybavení§!. \nPřidat dotaci na vybavení pro §Y[ROOT.GetName]§! s [?ROOT.FIN_basic_subsidies_value|Y2] £GFX_civ_factory_output pro §Y$light_tank_chassis$§!, cílící na §Yzemě ochotné nám prodat vybavení§!.\nZemě prodávající:\n" # todo: NEW TRANSLATION
  FIN_foreign_armor_equipment_only_tt: "\nNakoupit obrněné vybavení od §Yzemí ochotných nám prodat vybavení§!. \nZemě prodávající:\n" # todo: NEW TRANSLATION
