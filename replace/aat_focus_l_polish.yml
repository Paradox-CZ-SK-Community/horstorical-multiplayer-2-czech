  FIN_socialist_welfare_if_leino_tt: "\nEfekty pokud je §Y$FIN_yrjo_leino$§! jmenován vůdcem země před dokončením tohoto fokusu:" # todo: NEW TRANSLATION
  FIN_socialist_welfare_if_laaltonen_tt: "\nEfekty pokud je §Y$FIN_aimo_aaltonen$§! jmenován vůdcem země před dokončením tohoto fokusu:" # todo: NEW TRANSLATION
