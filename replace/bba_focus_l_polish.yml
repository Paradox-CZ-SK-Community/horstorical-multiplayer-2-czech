  ITA_milizia_marittima_di_artiglieria_coastal_forts_tt: "Přidá §Y4 $coastal_bunker$§! do každé vlastněné provincie s §Y$naval_base$§!." # todo: NEW TRANSLATION
  ITA_cooperation_programs_deal_sweden_tt: "([ROOT.GetFlag]§Y[ROOT.GetName]§!): Převede §Y2 torpédoborce třídy Curtatone§! a §Y2 torpédoborce třídy Maestrale§! na [SWE.GetFlag]§Y[SWE.GetName]§!." # todo: NEW TRANSLATION
  ITA_flotta_d_evasione_dockyards_tt: "\nU některých států v §YSeverní Africe§!, na §YZápadním pobřeží Iberského poloostrova§! a na §YZápadním pobřeží Francie§! se také přidá §Y1 $dockyard$§!, pokud jsou plně kontrolovány §Y[ROOT.GetFlag][ROOT.GetName]§! nebo §Y[ROOT.GetAdjective] subjektem§!." # todo: NEW TRANSLATION
  ITA_the_abyssinian_fiasco_completion_tt: "Lze automaticky dokončit po neúspěchu v misích §Y$ITA_conquer_the_north_mission$§! a §Y$ITA_conquer_the_south_mission$§!, vydaných $ITA_benito_mussolini$ v lednu 1936.\n" # todo: NEW TRANSLATION
  ITA_solid_progress_completion_tt: "Bude automaticky dokončeno po úspěchu v obou misích §Y$ITA_conquer_the_north_mission$§! a §Y$ITA_conquer_the_south_mission$§!, vydaných $ITA_benito_mussolini$ v lednu 1936.\n" # todo: NEW TRANSLATION
  ITA_topple_amhara_rulers_event_chain_tt: "\nSpustí řetězec událostí §YLocal Rulers Approach Italian Officials§!, který nám umožní zvýšit loajalitu nebo zřídit italského vazala v některých etiopských státech, pokud si to přejeme." # todo: NEW TRANSLATION
  ITA_a_colonial_empire_claims_tt: "Získává nárok na §Yvšechna území [EGY.GetAdjective], [KEN.GetAdjective], [SUD.GetAdjective], [SOM.GetAdjective], [DJI.GetAdjective], [ETH.GetAdjective], [ERI.GetAdjective] nebo [UGA.GetAdjective]§! not already claimed by [ROOT.GetFlag][ROOT.GetNameDef] or under [ROOT.GetFlag][ROOT.GetAdjective] control. \nCurrent effects:" # todo: NEW TRANSLATION
  generic_ROOT_gains_claim_tt: "§Y[ROOT.GetFlag][ROOT.GetNameDef]§! získává nárok na stát." # todo: NEW TRANSLATION
  generic_ROOT_gains_wargoal_tt: "§Y[ROOT.GetFlag][ROOT.GetNameDef]§! získává §Y$annex_everything$§! válečný cíl proti:\n" # todo: NEW TRANSLATION
  ITA_masters_of_the_aegean_claims_tt: "Získává nárok na §Yvšechny pobřežní státy [GRE.GetAdjective] a [TUR.GetAdjective] ve Středozemí§!, které již nejsou nárokovány [ROOT.GetFlag][ROOT.GetNameDef] nebo nejsou pod kontrolou §Y[ROOT.GetFlag][ROOT.GetAdjective]§!. \nAktuální efekty:" # todo: NEW TRANSLATION
  ITA_masters_of_the_mediterranean_claims_tt: "Získává nárok na §Ykaždý pobřežní stát ve Středozemí§!, který již není nárokován [ROOT.GetFlag][ROOT.GetNameDef] nebo není pod kontrolou §Y[ROOT.GetFlag][ROOT.GetAdjective]§!. \nAktuální efekty:" # todo: NEW TRANSLATION
  ITA_support_albanian_irredentism_subject_effects_tt: "\nNásledující efekty budou aplikovány, pokud je §Y[ALB.GetFlag][ALB.GetNameDefCap]§! §Yvazalem§! §Y[ROOT.GetFlag][ROOT.GetName]§!:" # todo: NEW TRANSLATION
  ITA_the_eastern_threat_claims_tt: "Získává nárok na §Ykaždý stát v Černém moři, který vlastní [SOV.GetFlag][SOV.GetNameDef]§!. \nAktuální efekty:" # todo: NEW TRANSLATION
  ITA_joint_military_programs_two_allies_tt: "Efekty jsou zdvojnásobeny, protože §Y[ROOT.GetNameWithFlag]§! je ve frakci jak s §Y[ENG.GetNameWithFlag]§!, tak s §Y[FRA.GetNameWithFlag]§!." # todo: NEW TRANSLATION
  ITA_joint_military_programs_one_ally_tt: "Efekty budou zdvojnásobeny, pokud bude §Y[ROOT.GetNameWithFlag]§! ve frakci jak s §Y[ENG.GetNameWithFlag]§!, tak s §Y[FRA.GetNameWithFlag]§!." # todo: NEW TRANSLATION
  ITA_war_with_france_claims_tt: "Získává nárok na §Ykaždou [FRA.GetAdjective] kolonii§! v §Y$STRATEGICREGION_182$§!, §Y$STRATEGICREGION_126$§!, §Y$STRATEGICREGION_128$§!, §Y$STRATEGICREGION_28$§!, §Y$STRATEGICREGION_17$§! a §Y$STRATEGICREGION_216$§! nebo středomořský ostrov, který již není nárokován [ROOT.GetFlag][ROOT.GetNameDef]. \nAktuální efekty:" # todo: NEW TRANSLATION
  ITA_war_with_the_uk_claims_tt: "Získává nárok na §Ykaždou [ENG.GetAdjective] kolonii§! v §Y$STRATEGICREGION_182$§!, §Y$STRATEGICREGION_126$§!, §Y$STRATEGICREGION_128$§!, §Y$STRATEGICREGION_28$§!, §Y$STRATEGICREGION_17$§! a §Y$STRATEGICREGION_216$§! nebo středomořský ostrov, který již není nárokován [ROOT.GetFlag][ROOT.GetNameDef]. \nAktuální efekty:" # todo: NEW TRANSLATION
