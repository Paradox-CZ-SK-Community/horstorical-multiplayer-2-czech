  ITA_cooperation_programs_decisions_tt: "Odemkne §Y$ITA_naval_cooperation_programs_dec_cat$§! Rozhodnutí ke spolupráci s italskými spojenci a jejich námořnictvy." # todo: NEW TRANSLATION
  ITA_has_completed_cooperation_programs_focus_tt: "\nWhen focus §Y$ITA_cooperation_programs$§! is completed:" # todo: NEW TRANSLATION
  ITA_unlocks_decision_cede_aquila_class_destroyers_to_spain_tt: "Odemkne rozhodnutí: §YPostoupit torpédoborce třídy Aquila§!\n\n" # todo: NEW TRANSLATION
  ITA_midget_submarines_decision_tt: "\nWhen §Y$ITA_cooperation_programs$§! focus is completed: \nOdemkne rozhodnutí §Y$ITA_export_midget_submarines$§!" # todo: NEW TRANSLATION
  ITA_monarchia_d_italia: "Monarchia d'Italia" # todo: NEW TRANSLATION
  ITA_monarchia_d_italia_desc: "Vittorio Emanuele nikdy neměl otevřít dveře italské politiky fašismu. Nastal čas tuto chybu napravit a přinutit fašisty, aby ustoupili do pozadí v vládě." # todo: NEW TRANSLATION
  ITA_new_corporations: "Nové korporace" # todo: NEW TRANSLATION
  ITA_new_corporations_desc: "Musíme převzít dřívější koncept korporací používaný fašistickým režimem a přizpůsobit jej potřebám naší nové vlády." # todo: NEW TRANSLATION
  ITA_extraction_industry: "Těžební průmysl" # todo: NEW TRANSLATION
  ITA_extraction_industry_desc: "Musíme rozšířit náš průmysl těžby surovin, aby uspokojil poptávku našich výrobních linek. Nemůžeme dovolit, aby nedostatek surovin ohrozil naši vojenskou výrobu." # todo: NEW TRANSLATION
  ITA_prepare_for_the_coming_wars: "Připravit se na nadcházející války" # todo: NEW TRANSLATION
  ITA_prepare_for_the_coming_wars_desc: "Válka visí nad námi ze všech stran a potřebujeme robustní vojenský průmysl, který uspokojí potřeby našich ozbrojených sil." # todo: NEW TRANSLATION
  ITA_mobilize_the_railway_guns: "Mobilizovat železniční děla" # todo: NEW TRANSLATION
  ITA_mobilize_the_railway_guns_desc: "Zoufalé situace vyžadují zoufalá opatření, nastal čas znovu uvést naše stará železniční děla do provozu." # todo: NEW TRANSLATION
  ITA_bring_back_old_glories: "Obnovit starou slávu" # todo: NEW TRANSLATION
  ITA_bring_back_old_glories_desc: "Máme řadu starých lodí v různých přístavech čekajících na sešrotování. Někteří naši inženýři a námořní důstojníci tvrdí, že s několika úpravami bychom tyto staré slávy mohli opět uvést do provozu." # todo: NEW TRANSLATION
  ITA_new_forms_of_weaponry: "Nové druhy zbraní" # todo: NEW TRANSLATION
  ITA_new_forms_of_weaponry_desc: "Pokud se má Itálie stát jednou z největších vojenských mocností světa, musíme zkoumat nové druhy zbraní. Naši vědci jsou přesvědčeni, že vývoj průkopnického výzkumného programu atomové energie by mohl přinést velké naděje." # todo: NEW TRANSLATION
  ITA_revoke_the_acerbo_law: "Zrušit Acerbův zákon" # todo: NEW TRANSLATION
  ITA_revoke_the_acerbo_law_desc: "Acerbův zákon dal Mussolinimu a jeho fašistické straně pevnou kontrolu nad Itálií, o kterou tak usilovali. Nastal čas tento zákon zrušit, aby se to už nikdy nestalo." # todo: NEW TRANSLATION
  ITA_christian_democracy: "Křesťanská demokracie" # todo: NEW TRANSLATION
  ITA_christian_democracy_desc: "Křesťansko-demokratická strana je konzervativní středová politická organizace vedená Alcide de Gasperi, která dokázala získat lidovou podporu spojením křesťanských ideálů s ideou svobody. Měli bychom jim dovolit vytvořit vládu, pokud zůstanou věrní monarchii." # todo: NEW TRANSLATION
  ITA_democratic_king: "Demokratický král" # todo: NEW TRANSLATION
  ITA_democratic_king_desc: "Nastal čas, aby italská monarchie udělala krok směrem k demokratickému státu, přičemž zachová postavení krále jako hlavního vůdce." # todo: NEW TRANSLATION
  ITA_cooperate_with_moderates: "Spolupracovat s umírněnými" # todo: NEW TRANSLATION
  ITA_cooperate_with_moderates_desc: "Není důvod nespolupracovat s méně radikálními prvky bývalého fašistického režimu. Jsou zde velmi schopní lidé, kteří by mohli pomoci posunout tento obnovený italský stát kupředu." # todo: NEW TRANSLATION
  ITA_expand_intelligence_services: "Rozšířit zpravodajské služby" # todo: NEW TRANSLATION
  ITA_expand_intelligence_services_desc: "V této nové době je vědění moc. Musíme rozšířit naše různé zpravodajské složky, abychom zajistili, že dokážeme konkurovat zahraničním tajným službám." # todo: NEW TRANSLATION
  ITA_crush_opposition: "Potlačit opozici" # todo: NEW TRANSLATION
  ITA_crush_opposition_desc: "Stále existuje mnoho podporovatelů starého fašistického režimu, kteří se staví proti našim politikám a brání práci naší nové vlády. Nastal čas se s nimi vypořádat." # todo: NEW TRANSLATION
  ITA_power_to_the_king: "Předat moc králi" # todo: NEW TRANSLATION
  ITA_power_to_the_king_desc: "V této době velkých sociálních a politických napětí je jediný způsob, jak zajistit, aby v Itálii neuspěl žádný extremistický režim, ať už fašistický nebo komunistický, zvýšit koncentraci moci do rukou krále, který je jistě nejvhodnější osobou, aby vedla naši zemi." # todo: NEW TRANSLATION
  ITA_disband_the_blackshirts: "Rozpustit Černé košile" # todo: NEW TRANSLATION
  ITA_disband_the_blackshirts_desc: "Černé košile jsou velmi nebezpečná organizace ve službách fašismu, takže je čas, aby zmizely stejně jako jejich fašistický režim. Ihned rozpustíme všechny aktivní jednotky." # todo: NEW TRANSLATION
  ITA_utilize_the_blackshirts: "Využít Černé košile" # todo: NEW TRANSLATION
  ITA_utilize_the_blackshirts_desc: "Ačkoliv byly Černé košile historicky věrné fašistickému režimu a Duceovi, pokud jim ukážeme, že jejich organizace má v tomto novém režimu prostor k rozkvětu, možná je budeme moci využít pro naše vlastní zájmy. Koneckonců, je mezi těmito dvěma režimy opravdu tak velký rozdíl?" # todo: NEW TRANSLATION
  ITA_expand_the_royal_guard: "Rozšířit královskou gardu" # todo: NEW TRANSLATION
  ITA_expand_the_royal_guard_desc: "Posílíme a rozšíříme sbor Královské gardy, abychom měli spolehlivé jednotky věrné italské monarchii a schopné plnit různé role v jakékoli vojenské operaci, pokud to bude potřeba." # todo: NEW TRANSLATION
  ITA_gloria_al_regno_d_italia: "Gloria al Regno d'Italia" # todo: NEW TRANSLATION
  ITA_gloria_al_regno_d_italia_desc: "Ti, kdo tvrdí, že monarchie je zastaralý systém vlády, jsou blázni, kteří nevidí, jak se pod ušlechtilou a pevnou rukou může skromný národ stát jednou z největších mocností světa. \nAť žije král!" # todo: NEW TRANSLATION
  ITA_paramilitary_training: "Paramilitární výcvik" # todo: NEW TRANSLATION
  ITA_paramilitary_training_desc: "Nastal čas rozšířit naši organizaci dobrovolnické milice a zlepšit jejich vojenské vzdělání. Použijeme vynikající důstojníky z našich elitních divizí k výcviku nových rekrutů a k vedení jednotek Černých košil." # todo: NEW TRANSLATION
  ITA_seek_papal_support: "Usilovat o papežovu podporu" # todo: NEW TRANSLATION
  ITA_seek_papal_support_desc: "Abychom se vypořádali s rostoucí sociální a politickou nestabilitou v naší zemi, budeme se muset opřít o Církev, která historicky uplatňovala takový vliv nad italským lidem. Musíme oslovit papeže a hledat jeho schválení a podporu." # todo: NEW TRANSLATION
  ITA_agents_of_the_church: "Agenti Církve" # todo: NEW TRANSLATION
  ITA_agents_of_the_church_desc: "Církev má nespočet zástupců po celém světě; pokud se nám podaří získat Vatikán na svou stranu, mohli bychom získat nové agenty k dispozici s dokonalým krytím jako vyslanci Církve, kteří zlepší naše zpravodajské sítě." # todo: NEW TRANSLATION
  ITA_strengthen_the_papacy: "Posílit papežství" # todo: NEW TRANSLATION
  ITA_strengthen_the_papacy_desc: "Je zřejmé, že vliv papeže v italské společnosti je velmi silný. Jediný způsob, jak udržet národní stabilitu, je posílit moc Církve v Království Itálie." # todo: NEW TRANSLATION
  ITA_setting_course: "Určení směru" # todo: NEW TRANSLATION
  ITA_setting_course_desc: "Království Itálie je připraveno naplnit svůj osud. Velikost a sláva čekají hrdý italský lid, je čas rozhodnout, jak postupovat dál." # todo: NEW TRANSLATION
  ITA_mare_nostrum_bba: "Mare Nostrum" # todo: NEW TRANSLATION
  ITA_mare_nostrum_bba_desc: "Právě námořní silou Římská říše nejprve porazila Kartágo. Investováním do námořní síly může Itálie usilovat o kontrolu nad Středozemím a znovu jej učinit 'Mare Nostrum', naším mořem." # todo: NEW TRANSLATION
  ITA_auxiliaries: "Pomocné jednotky" # todo: NEW TRANSLATION
  ITA_auxiliaries_desc: "Stejně jako za dob našich římských předků, i dnes pomocné jednotky hrají důležitou roli při podpoře pravidelných vojenských jednotek, průzkumu terénu a obtěžování nepřítele. Musíme rozšířit tyto paramilitární milice, abychom posílili naši armádu." # todo: NEW TRANSLATION
  ITA_the_italian_legions: "Italské legie" # todo: NEW TRANSLATION
  ITA_the_italian_legions_desc: "Naše ozbrojené síly sice v nedávné minulosti nemusely obstát, ale nyní, když je italský lid hrdější než kdy předtím na naše římské dědictví, musíme uplatnit nové doktríny v našich ozbrojených silách, aby naše legie byly dnes stejně hrozivé jako před tisíci lety." # todo: NEW TRANSLATION
  ITA_new_roman_citizens: "Noví římanští občané" # todo: NEW TRANSLATION
  ITA_new_roman_citizens_desc: "Udílení občanství rodilému obyvatelstvu našich kolonií nám jistě pomůže získat souhlas a spolupráci místních." # todo: NEW TRANSLATION
  ITA_all_roads_lead_to_rome: "Všechny cesty vedou do Říma" # todo: NEW TRANSLATION
  ITA_all_roads_lead_to_rome_desc: "Římské legie byly v minulosti proslulé svou rychlostí a efektivitou ve výstavbě silnic a infrastruktury, které jejich armády potřebovaly k operacím. O tisíce let později jsou logistika a zásobovací trasy při vedení války ještě důležitější." # todo: NEW TRANSLATION
  ITA_the_king_of_the_skies: "Král oblohy" # todo: NEW TRANSLATION
  ITA_the_king_of_the_skies_desc: "Na rozdíl od našich římských předků musí naše ozbrojené síly dominovat oblohám, aby mohly optimálně působit na zemi i na moři. Italská letadla jsou již proslulá svou všestranností a kvalitou, ale nastal čas, aby naši letečtí inženýři vystoupili vpřed a vyvinuli skutečnou létající pevnost." # todo: NEW TRANSLATION
  ITA_modern_musculus: "Modern Musculus" # todo: NEW TRANSLATION
  ITA_modern_musculus_desc: "Stejně jako Římané musíme vyvíjet mocné válečné stroje, které nám umožní dominovat na bojišti. Navrhneme ultimátní tank, aby prorazil frontové linie a zasel hrůzu do srdcí našich nepřátel." # todo: NEW TRANSLATION
  ITA_caligulas_pride: "Kaligulova pýcha" # todo: NEW TRANSLATION
  ITA_caligulas_pride_desc: "Nastal čas vyvinout největší válečnou loď, jaká kdy existovala. Naši nejlepší námořní inženýři zdokonalovali návrh a testovali prototypy a nyní jsou přesvědčeni, že Neptunus se stane králem nejen Středomoří, ale i dál." # todo: NEW TRANSLATION
  ITA_iberian_protection: "Iberská ochrana" # todo: NEW TRANSLATION
  ITA_iberian_protection_desc: "Iberské národy si v nedávné minulosti užívaly relativního bezpečí, ale je jasné, že nyní by se sami nedokázaly bránit proti velkým nepřátelským mocnostem. Musíme jim nabídnout naši ochranu dříve, než bude příliš pozdě." # todo: NEW TRANSLATION
  ITA_south_american_alliances: "Jižní americká spojenectví" # todo: NEW TRANSLATION
  ITA_south_american_alliances_desc: "Nastal čas rozšířit hranice naší frakce. Obrátíme se na latinskoamerické státy a přesvědčíme je o důležitosti vytvoření silného spojenectví proti mnoha hrozbám, které nás všechny obklopují." # todo: NEW TRANSLATION
  ITA_the_papacy_reborn: "Znovuzrozené papežství" # todo: NEW TRANSLATION
  ITA_the_papacy_reborn_desc: "Nyní, když Svatý Otec svržel krále a ujmul se úplné kontroly nad Itálií, je čas, aby se italský lid přiklonil k vizi a cílům Církve." # todo: NEW TRANSLATION
  ITA_deus_vult: "Deus Vult" # todo: NEW TRANSLATION
  ITA_deus_vult_desc: "Katolická církev byla po staletí majákem naděje a stability v Evropě a vzhledem k temným časům, které nás čekají, se musí znovu stát tímto majákem světla. \nBůh to žádá!" # todo: NEW TRANSLATION
  ITA_catholic_action: "Katolická akce" # todo: NEW TRANSLATION
  ITA_catholic_action_desc: "Naše katolická mládežnická organizace se ukazuje být velmi efektivním nástrojem k vymýcení komunistů, prosazování katolických principů sociální spravedlnosti a rozšiřování řad našich ozbrojených sil o nadšené nové rekryty." # todo: NEW TRANSLATION
  ITA_a_time_for_war: "Čas na válku" # todo: NEW TRANSLATION
  ITA_a_time_for_war_desc: "Dokud bude kacířství přítomné v Evropě, nemůže být mír. Nastal čas pro novou svatou válku. Nové válečné stroje budou burácet v Jeho jménu, připraveny udeřit kacíře spravedlivým hněvem. Ať není míru, dokud trest nezasáhne každého bezvěrce z hlavně 105mm kanónu." # todo: NEW TRANSLATION
  ITA_the_holy_lands: "Svaté země" # todo: NEW TRANSLATION
  ITA_the_holy_lands_desc: "Oblast stejně důležitá jako Palestina pro křesťanskou víru legitimně patří Království Božímu. Musíme zajistit, aby se Svatá země nám bez prodlení vrátila." # todo: NEW TRANSLATION
  ITA_the_catholic_dominion: "Katolické panství" # todo: NEW TRANSLATION
  ITA_the_catholic_dominion_desc: "S nástupem papežství jako znovu významné mocnosti je čas obrátit se ke všem věrným křesťanům a jednat jako ruka, která vede lid, stejně jako pastýř vede své stádo a chrání je před zlem. To je boží mandát!" # todo: NEW TRANSLATION
  ITA_unite_the_opposition: "Sjednotit opozici" # todo: NEW TRANSLATION
  ITA_unite_the_opposition_desc: "Kořeny fašismu jsou v Itálii silné a jeho vykořenění bude vyžadovat velké úsilí. Musíme najít společné cíle mezi různými skupinami, které se staví proti fašistickému režimu, protože jen sjednoceni dokážeme svrhnout toho odpudivého Duce." # todo: NEW TRANSLATION
  ITA_liberate_gramsci: "Osvobodit Gramsciho" # todo: NEW TRANSLATION
  ITA_liberate_gramsci_desc: "Náš soudruh, marxistický filozof Antonio Gramsci, je držán ve vězení fašistickou vládou více než deset let a nyní se jeho zdraví rychle zhoršuje. Musíme zorganizovat tajnou operaci, abychom ho osvobodili a zachránili mu život, protože se jistě stane klíčovým aktérem naší dělnické revoluce." # todo: NEW TRANSLATION
  ITA_organize_strikes_in_the_north: "Organizovat stávky na severu" # todo: NEW TRANSLATION
  ITA_organize_strikes_in_the_north_desc: "Než udeříme, soustředíme veškeré úsilí na získání podpory průmyslových dělníků v Itálii a zajistíme, aby průmyslovější oblasti severu stály s námi proti fašistickému režimu." # todo: NEW TRANSLATION
  ITA_the_southern_farmlands: "Jižní zemědělské oblasti" # todo: NEW TRANSLATION
  ITA_the_southern_farmlands_desc: "Navzdory promarněným snahám fašistického režimu zůstává Itálie prakticky zemědělská země. Musíme spoléhat na rolnictvo, aby úspěšně provedlo naši revoluci, a právě na jihu Itálie jsou rolníci nejsilnější." # todo: NEW TRANSLATION
  ITA_defy_the_duce: "Vzdorovat Duce" # todo: NEW TRANSLATION
  ITA_defy_the_duce_desc: "Nastal čas povstat proti fašistickému režimu a vyhladit mor, který představuje pro italský lid. \nDělníci a rolníci Itálie, k zbrani!" # todo: NEW TRANSLATION
  ITA_appeal_to_the_bourgeoisie: "Oslovit buržoazii" # todo: NEW TRANSLATION
  ITA_appeal_to_the_bourgeoisie_desc: "Musíme oslovit buržoazní skupiny zainteresované na pádu fašistického režimu. S prostředky, které mají k dispozici, a odvahou našich revolucionářů budeme schopni rychle ukončit tuto krveprolití!" # todo: NEW TRANSLATION
  ITA_seize_old_equipment: "Zabavit staré vybavení" # todo: NEW TRANSLATION
  ITA_seize_old_equipment_desc: "Ve skladu různých zbrojnic po celé zemi je velké množství starého vojenského vybavení. Navzdory svému stáří bude zabavení tohoto vybavení a jeho rozdělení našim silám mít velký význam pro vítězství ve válce." # todo: NEW TRANSLATION
  ITA_the_italian_republic: "Italská republika" # todo: NEW TRANSLATION
  ITA_the_italian_republic_desc: "Monarchie je starý a zkažený systém, který jen brzdí naši revoluci. Je čas zbavit se královské rodiny a postarat se o jejich následovníky." # todo: NEW TRANSLATION
  ITA_the_popular_front: "Lidový front" # todo: NEW TRANSLATION
  ITA_the_popular_front_desc: "Občanská válka ukázala, že komunisté jsou schopni nejen dovést italský lid k vítězství proti fašismu, ale i ke společenskému a průmyslovému pokroku, který naše země tak zoufale potřebovala." # todo: NEW TRANSLATION
  ITA_the_garibaldi_legion: "Legie Garibaldiho" # todo: NEW TRANSLATION
  ITA_the_garibaldi_legion_desc: "Zorganizujeme dobrovolnické jednotky, které budou bojovat vedle našich druhů ve Španělské republice jako součást Mezinárodních brigád ve Španělské občanské válce." # todo: NEW TRANSLATION
  ITA_gruppi_di_difesa_della_donna: "Gruppi di Difesa della donna" # todo: NEW TRANSLATION
  ITA_gruppi_di_difesa_della_donna_desc: "Revoluční ženy z různých politických formací navrhly vytvořit ženské obranné skupiny pro aktivní účast a mobilizaci sil ve všech třídách a sociálních vrstvách v případě války." # todo: NEW TRANSLATION
  ITA_a_new_era_for_the_red_shirts: "Nová éra Červených košil" # todo: NEW TRANSLATION
  ITA_a_new_era_for_the_red_shirts_desc: "Půjdeme ve stopách Giuseppe Garibaldiho a jeho Červených košil, posílíme tyto milice a vycvičíme je, aby optimálně plnily své povinnosti, jak jako součást italské armády, tak jako dobrovolnické brigády v zahraničí." # todo: NEW TRANSLATION
  ITA_pugno_alzato: "Pugno Alzato" # todo: NEW TRANSLATION
  ITA_pugno_alzato_desc: "Nastal čas vyhladit mor fašismu a hrozbu, kterou představuje pro celé lidstvo. Pozvedneme v této zásadní bitvě pěsti v jednotě!" # todo: NEW TRANSLATION
  ITA_a_leader_steps_forward: "Vůdce kráčí vpřed" # todo: NEW TRANSLATION
  ITA_a_leader_steps_forward_desc: "Je čas rozhodnout, kdo bude osobou v čele nové Italské republiky. Naštěstí můžeme vybírat z vysoce kvalifikovaných kandidátů." # todo: NEW TRANSLATION
  ITA_the_path_to_progress: "Cesta k pokroku" # todo: NEW TRANSLATION
  ITA_the_path_to_progress_desc: "Obrátíme se na komunistické a socialistické vlády po celém světě, které by mohly být ochotny s námi spolupracovat a pomoci nám zotavit se z devastující občanské války, které jsme byli nuceni čelit." # todo: NEW TRANSLATION
  ITA_industrial_socialization: "Industrializace vlastnictví" # todo: NEW TRANSLATION
  ITA_industrial_socialization_desc: "Je čas vyvlastnit velké továrny z rukou velkých podnikatelů a buržoazie, aby mohly být používány pro největší prospěch celého italského lidu." # todo: NEW TRANSLATION
  ITA_institute_the_five_year_plan: "Zavést pětiletý plán" # todo: NEW TRANSLATION
  ITA_institute_the_five_year_plan_desc: "Stejně jako naši sovětští soudruzi, musíme zindustrializovat naši převážně agrární zemi, abychom mohli soutěžit s velkými mocnostmi. Vypracujeme pětiletý plán, který nám pomůže nejen vrátit se na úroveň průmyslu před občanskou válkou, ale ji významně překonat." # todo: NEW TRANSLATION
  ITA_new_ricostruzione_industriale: "Nová Ricostruzione Industriale" # todo: NEW TRANSLATION
  ITA_new_ricostruzione_industriale_desc: "Instituto per la Ricostruzione Industriale dosud hrálo důležitou roli při záchraně, restrukturalizaci a financování bank a soukromých společností v úpadku. S drobnými úpravami zajistíme, že bude i nadále fungovat bez fašistických nádechů minula." # todo: NEW TRANSLATION
  ITA_political_commissars: "Politické komisaře" # todo: NEW TRANSLATION
  ITA_political_commissars_desc: "Abychom udrželi oddanost komunismu a inspirovali ideologický zápal u našich jednotek, zřídíme post politických komisařů v armádě, odpovědných za politické vzdělávání a organizaci útvarů, ke kterým jsou přiděleni." # todo: NEW TRANSLATION
  ITA_common_ground: "Společná půda" # todo: NEW TRANSLATION
  ITA_common_ground_desc: "Musíme nechat za sebou rozdíly s jinými politickými skupinami, s nimiž v podstatě sdílíme stejné cíle. Je čas spolupracovat, abychom nové italské státvedli k pokroku." # todo: NEW TRANSLATION
  ITA_appease_the_military: "Uklidnit armádu" # todo: NEW TRANSLATION
  ITA_appease_the_military_desc: "Mnoho důstojníků ve ozbrojených silách je nespokojeno s novou vládou nebo se svým statusem po občanské válce; bylo by moudré zajistit, aby se nespokojenost v armádě vykořenila a aby důstojníci cítili, že jejich role ve válce je uznána." # todo: NEW TRANSLATION
  ITA_crush_the_mafia: "Zničit mafii" # todo: NEW TRANSLATION
  ITA_crush_the_mafia_desc: "Mafie a četné gangy pašeráků, vyděračů a zločinců se během občanské války opět rozmohly. Je naší povinností vůči italskému lidu je vykořenit a obnovit bezpečnost a stabilitu země." # todo: NEW TRANSLATION
  ITA_empower_the_carabinieri: "Posílit Carabinieri" # todo: NEW TRANSLATION
  ITA_empower_the_carabinieri_desc: "Carabinieri hrají klíčovou roli v odhalování mafie a ve udržování klidu a bezpečnosti v zemi. Je čas tuto policejní složku posílit a umožnit jí vykonávat další úkoly." # todo: NEW TRANSLATION
  ITA_army_modernization: "Modernizace armády" # todo: NEW TRANSLATION
  ITA_army_modernization_desc: "Naše ozbrojené síly by mohly mít prospěch z nového vybavení a výcvikových technik, které jim umožní držet krok s armádami a doktrínami ostatních velmocí." # todo: NEW TRANSLATION
  ITA_union_in_the_party: "Jednota v straně" # todo: NEW TRANSLATION
  ITA_union_in_the_party_desc: "Jednota ve straně je nejdůležitějším faktorem pro rozvoj naší země směrem ke komunismu. Musíme zajistit, aby všichni členové sdíleli stejnou vizi, měli stejné cíle a dodržovali procesy stanovené stranou k jejich dosažení." # todo: NEW TRANSLATION
  ITA_follow_the_soviet_union: "Jít ve stopách Sovětského svazu" # todo: NEW TRANSLATION
  ITA_follow_the_soviet_union_desc: "Existuje jasná cesta ke komunismu již vyznačená Sovětským svazem; musíme ji následovat, pokud chceme, aby naše úsilí v nové republice přineslo ovoce a dosáhli skutečného komunistického státu." # todo: NEW TRANSLATION
  ITA_military_cooperation: "Vojenská spolupráce" # todo: NEW TRANSLATION
  ITA_military_cooperation_desc: "Musíme navázat dohody o vojenské spolupráci s našimi spojenci, pokud chceme obstát ve světě, protože velmoci kolem nás jsou s jistotou nepřátelé proletariátu." # todo: NEW TRANSLATION
  ITA_defense_against_capitalism: "Obrana proti kapitalismu" # todo: NEW TRANSLATION
  ITA_defense_against_capitalism_desc: "Fašismus je naším prvním a největším ideologickým nepřítelem, nicméně není jediným. Kapitalisté představují hroznou hrozbu pro naši zemi a proletářskou revoluci. Musíme být připraveni jim čelit." # todo: NEW TRANSLATION
  ITA_combined_research_effort: "Kombinované výzkumné úsilí" # todo: NEW TRANSLATION
  ITA_combined_research_effort_desc: "Technologický pokrok je zásadní, pokud chceme, aby naše ozbrojené síly měly moderní vybavení k boji s nepřáteli. Musíme spolupracovat s našimi spojenci, aby technologický pokrok pokračoval, zejména v oblasti vojenského výzkumu." # todo: NEW TRANSLATION
  ITA_special_brigades: "Speciální brigády" # todo: NEW TRANSLATION
  ITA_special_brigades_desc: "Vytvoříme speciální útočné brigády schopné podporovat naše vojenské jednotky v boji během velkých ofenzív. Tyto brigády budou tvořeny milicionáři, kteří se v rámci svých jednotek vyznamenali." # todo: NEW TRANSLATION
  ITA_defend_the_land: "Bránit zemi" # todo: NEW TRANSLATION
  ITA_defend_the_land_desc: "Sovětský svaz a jeho politika zklamaly proletariát a marxistickou ideologii. Italský lid si zvolí svou vlastní cestu ke komunismu, cestu plnou překážek a hrozeb, které budeme muset překonat, ale snad i s soudruhy a spojenci, kteří si vzájemně pomáhají." # todo: NEW TRANSLATION
  ITA_united_anarchist_confederations: "Spojené anarchistické konfederace" # todo: NEW TRANSLATION
  ITA_united_anarchist_confederations_desc: "Musíme hledat spolupráci se španělskými anarchisty a dalšími anarchisty po celém světě v našem boji proti fašismu a kapitalismu. Vytvoříme Velkou komisi pro spolupráci, která sdruží aktivisty, intelektuály a bojovníky za svobodu z celého světa." # todo: NEW TRANSLATION
  ITA_the_fight_against_stalinism: "[GetAppropriateRussianGovernmentIdeology]" # todo: NEW TRANSLATION
  ITA_russian_government_ideology_default: "Boj proti těm, kteří nám stojí v cestě" # todo: NEW TRANSLATION
  ITA_russian_government_ideology_alt: "Boj proti stalinismu" # todo: NEW TRANSLATION
  ITA_russian_government_ideology_alt2: "Boj proti těm, kdo nás rozdělují" # todo: NEW TRANSLATION
  ITA_the_fight_against_stalinism_desc: "[GetAppropriateRussianGovernmentIdeologyDesc]" # todo: NEW TRANSLATION
  ITA_russian_government_ideology_desc_default: "Než jsme se stačili vypořádat s hrozbou stalinistické doktríny, byla již nahrazena něčím ještě horším. S ohledem na to, čeho je současné vedení schopné, nemůžeme čekat se založenýma rukama, až zaútočí; musíme být my ti, kdo udeří první!" # todo: NEW TRANSLATION
  ITA_russian_government_ideology_desc_alt: "Bohužel kapitalismus a fašismus nejsou jediní nepřátelé, kterým čelíme; stoupenci stalinistické doktríny považují naši vládu a naši zemi za hrozbu a jsou ochotni nás zničit za každou cenu. Nemůžeme čekat se založenýma rukama, až zaútočí; musíme být my ti, kdo udeří první!" # todo: NEW TRANSLATION
  ITA_russian_government_ideology_desc_alt2: "Bohužel existují celé země, které tvrdě pracují na tom, aby nás rozdělily. Ačkoliv jsme Stalina a jeho vládu nikdy zvlášť nemilovali, současná situace není o mnoho lepší. Takové země představují hrozbu; nemůžeme čekat se založenýma rukama, až zaútočí; musíme být my ti, kdo udeří první!" # todo: NEW TRANSLATION
  ITA_raise_the_peoples: "Pozvednout lid" # todo: NEW TRANSLATION
  ITA_raise_the_peoples_desc: "Existuje mnoho statečných italských rolníků ochotných bojovat za naše ideály. S nimi můžeme vytvořit více jednotek Červených košil k posílení řad našich ozbrojených sil." # todo: NEW TRANSLATION
  ITA_il_sol_dell_avvenire: "Il Sol dell'Avvenire" # todo: NEW TRANSLATION
  ITA_il_sol_dell_avvenire_desc: "Je čas vyhlásit nový italský stát, Italskou národní unii, ve které jsou všichni občané svobodní a rovní před státem. \nSlunce budoucnosti vyjde v Itálii!" # todo: NEW TRANSLATION
  ITA_italian_socialism: "Italský socialismus" # todo: NEW TRANSLATION
  ITA_italian_socialism_desc: "Cesta k socialismu se nám otevírá, je čas ji s odhodláním vykročit, abychom dosáhli spravedlivé společnosti v rámci našich hranic a mezinárodního postavení, které si Italská republika zaslouží." # todo: NEW TRANSLATION
  ITA_cooperate_with_the_mafia: "Spolupracovat s mafií" # todo: NEW TRANSLATION
  ITA_cooperate_with_the_mafia_desc: "Mafijní organizace, které se rozmohly během občanské války, mohou představovat příležitost zlepšit výkonnost soukromých i státních podniků na jejich území, pokud jsme ochotni poskytnout jim určité výsady a koncese." # todo: NEW TRANSLATION
  ITA_mafia_abroad: "Mafia v zahraničí" # todo: NEW TRANSLATION
  ITA_mafia_abroad_desc: "Vliven mafijních rodin, s nimiž máme dohody, roste nejen v Itálii, ale i v zahraničí. Musíme poslat agenty s nimi spojené do velkých kapitalistických mocností, kde jejich podnikání může prosperovat ve prospěch našich zájmů." # todo: NEW TRANSLATION
  ITA_empower_the_unions: "Zmocnit odbory" # todo: NEW TRANSLATION
  ITA_empower_the_unions_desc: "Italskému proletariátu se nabízí velký potenciál. Musíme zajistit, aby odbory měly prostředky a pravomoci regulovat a optimalizovat pracovní sílu v naší zemi." # todo: NEW TRANSLATION
  ITA_production_lines: "Výrobní linky" # todo: NEW TRANSLATION
  ITA_production_lines_desc: "Nastal čas rozšířit a modernizovat naše hlavní výrobní linky, aby naše ozbrojené síly dostaly zásoby a vybavení potřebné k udržení špičkového výkonu." # todo: NEW TRANSLATION
  ITA_the_republics_leadership: "Vedení republiky" # todo: NEW TRANSLATION
  ITA_the_republics_leadership_desc: "Musíme vybrat správnou stranu a politického vůdce, kteří povedou mladou Italskou republiku k socialistické společnosti, kterou si náš lid zaslouží. Ferruccio Parri i Ivanoe Bonomi se zdají být hodenými kandidáty, kteří jsou vysoce kvalifikovaní pro tento úkol." # todo: NEW TRANSLATION
  ITA_bring_back_exiled_intellectuals: "Vrátit vyhnané intelektuály" # todo: NEW TRANSLATION
  ITA_bring_back_exiled_intellectuals_desc: "Fašistický režim donutil nespočet italských občanů do exilu, včetně velkých filozofů, intelektuálů a vědců. Je čas nabídnout všem těmto uprchlíkům možnost vrátit se domů." # todo: NEW TRANSLATION
  ITA_social_stability: "Sociální stabilita" # todo: NEW TRANSLATION
  ITA_social_stability_desc: "Opustili jsme hrůzy občanské války, naše společnost je nyní spravedlivější a rovnostářštější, a i když máme před sebou stále dlouhou cestu k dosažení socialismu, můžeme hrdě říci, že italský lid konečně dosáhl sociálního míru." # todo: NEW TRANSLATION
  ITA_aid_for_the_spanish_republic: "Pomoc Španělské republice" # todo: NEW TRANSLATION
  ITA_aid_for_the_spanish_republic_desc: "Musíme pomoci našim španělským soudruhům v občanské válce. Jejich socialistická republika je obléhána krvilačnými generály, kteří se kdysi přísahali státu, který teď pustoší, podporovaní velkými fašistickými mocnostmi Evropy." # todo: NEW TRANSLATION
  ITA_italia_libera: "Italia Libera" # todo: NEW TRANSLATION
  ITA_italia_libera_desc: "Musíme převzít iniciativu a navrhnout přátelským sousedním vládám vytvoření aliance v Evropě, která nám umožní spolupracovat a bránit se proti mnoha hrozbám, které nás obklopují." # todo: NEW TRANSLATION
  ITA_european_democracies: "Evropské demokracie" # todo: NEW TRANSLATION
  ITA_european_democracies_desc: "Musíme pokračovat v politice solidarity a spolupráce mezi demokratickými evropskými zeměmi. Diplomacií můžeme vytvořit silnou alianci schopnou čelit komukoli." # todo: NEW TRANSLATION
  ITA_peace_preservation: "Udržování míru" # todo: NEW TRANSLATION
  ITA_peace_preservation_desc: "V těchto časech nestability a mezinárodních konfliktů jen italský lid je schopen udržovat a vynucovat mír v Evropě." # todo: NEW TRANSLATION
  ITA_scientific_cooperation: "Vědecká spolupráce" # todo: NEW TRANSLATION
  ITA_scientific_cooperation_desc: "Musíme vyvinout program vědecké spolupráce, abychom drželi krok s technologickým pokrokem ostatních světových mocností." # todo: NEW TRANSLATION
  ITA_secure_the_borders: "Zajistit hranice" # todo: NEW TRANSLATION
  ITA_secure_the_borders_desc: "S rostoucím mezinárodním napětím je každá země, která není naším spojencem, potenciálně nepřátelská. Musíme co nejdříve posílit a obsadit hranice, abychom zamezili a zastavili jakoukoli invazi." # todo: NEW TRANSLATION
  ITA_bring_down_fascist_strongholds: "Srazit fašistická ohniska" # todo: NEW TRANSLATION
  ITA_bring_down_fascist_strongholds_desc: "Vzhledem ke kritické situaci v Evropě nemůžeme čekat, až na nás zaútočí agresivní fašistické síly. Kdo udeří první, udeří nejlépe, takže se ujistíme, že udeříme fašisty nejdřív a tvrdě." # todo: NEW TRANSLATION
  ITA_reestablish_old_alliances: "Obnovit staré aliance" # todo: NEW TRANSLATION
  ITA_reestablish_old_alliances_desc: "Musíme se pokusit obnovit alianci, kterou jsme vytvořili během Velké války. Pouze spojením s velkými demokratickými mocnostmi Evropy budeme schopni zvítězit proti mnoha hrozbám, které na nás čekají." # todo: NEW TRANSLATION
  ITA_military_agreements: "Vojenské dohody" # todo: NEW TRANSLATION
  ITA_military_agreements_desc: "Máme mnoho se naučit od našich spojenců; musíme je oslovit s návrhem na rozvoj programu vojenské a technologické spolupráce." # todo: NEW TRANSLATION
  ITA_the_enemies_of_capitalism: "Nepřátelé kapitalismu" # todo: NEW TRANSLATION
  ITA_the_enemies_of_capitalism_desc: "Sovětský komunismus představuje velkou hrozbu pro celou Evropu a tím i pro italský stát. Nastal čas se jím věnovat." # todo: NEW TRANSLATION
  ITA_the_ethiopian_question: "Etiopská otázka" # todo: NEW TRANSLATION
  ITA_the_ethiopian_question_desc: "Válka v Etiopii byla krutá a nespravedlivá záležitost. Musíme se omluvit za zvěrstva způsobená fašisty v zemi a obrátit se na místní orgány s cílem usmíření." # todo: NEW TRANSLATION
  ITA_abolish_the_colonies: "Zrušit kolonie" # todo: NEW TRANSLATION
  ITA_abolish_the_colonies_desc: "Vypracujeme a představíme revoluční plán zrušení koloniálního statusu pro jakékoli regiony Itálie. Poprvé v dějinách naší země budou mít místní občané postižených regionů příležitost rozhodnout o svém osudu. Je na nás, abychom jim ukázali výhody stát se legitimní provincií italského státu." # todo: NEW TRANSLATION
  ITA_cooperatives_for_intensive_exploitation: "Družstva pro intenzivní využívání" # todo: NEW TRANSLATION
  ITA_cooperatives_for_intensive_exploitation_desc: "Afrika je bohatý kontinent s velkými ložisky surovin; měli bychom investovat do zlepšení způsobů jejich těžby, abychom z nich vytěžili maximum." # todo: NEW TRANSLATION
  ITA_condemn_colonialism: "Odsoudit kolonialismus" # todo: NEW TRANSLATION
  ITA_condemn_colonialism_desc: "Je čas odsoudit kolonialismus a vyzvat evropské mocnosti, které léta utlačují africké národy, a pokud bude třeba, budeme s nimi bojovat ve prospěch afrického lidu." # todo: NEW TRANSLATION
  ITA_new_colonial_policies: "Nová koloniální politika" # todo: NEW TRANSLATION
  ITA_new_colonial_policies_desc: "Příliš dlouho fašistický režim špatně zacházel s místním obyvatelstvem v koloniích. Je čas přehodnotit naši koloniální politiku, udělit těmto regionům jistou autonomii a napravit křivdy způsobené v minulosti." # todo: NEW TRANSLATION
  ITA_negotiations_with_albania: "Jednání s Albánií" # todo: NEW TRANSLATION
  ITA_negotiations_with_albania_desc: "Dějiny Albánie byly v posledních desetiletích silně ovlivněny Itálií. Nyní, když jsme opustili autoritářský fašistický režim, měli bychom Albánské vládě navrhnout posílení vazeb mezi našimi národy a dokonce možnost integrace albánské správy do naší, formálním sjednocením obou zemí." # todo: NEW TRANSLATION
  ITA_enlist_the_bashkimi_kombetar: "Naverbovat Bashkimi Kombëtar" # todo: NEW TRANSLATION
  ITA_enlist_the_bashkimi_kombetar_desc: "Existuje mnoho občanů z Albánie, kteří jsou nám a naší ideologii nakloněni a přejí si narukovat do jednotek Červených košil. Měli bychom vytvořit novou odnož našich dobrovolnických milic, v níž zorganizujeme jednotky složené z těchto rekrutů." # todo: NEW TRANSLATION
  ITA_the_italian_confederation: "Italská konfederace" # todo: NEW TRANSLATION
  ITA_the_italian_confederation_desc: "Po přehodnocení naší koloniální politiky je dalším krokem vytvoření konfederace zahrnující všechny státy vzniklé tímto dekolonizačním procesem, která bude rámcem pro spolupráci a vzájemný prospěch našich národů." # todo: NEW TRANSLATION
  ITA_planned_economy: "Plánované hospodářství" # todo: NEW TRANSLATION
  ITA_planned_economy_desc: "Zástupci naší nové konfederace navrhli ekonomickou iniciativu, která podle nich umožní regulovat a posílit ekonomiky všech členských států efektivním a udržitelným způsobem." # todo: NEW TRANSLATION
  ITA_the_fight_overseas: "Boj za hranicemi" # todo: NEW TRANSLATION
  ITA_the_fight_overseas_desc: "Nastal čas posílit obranu a připravit logistiku na podporu velkých vojenských kampaní na africkém kontinentu. Vyvineme specializované výcvikové techniky pro naše jednotky a námořnictvo, aby mohly optimálně působit v mnoha náročných podmínkách, na které narazí." # todo: NEW TRANSLATION
  ITA_irregulars: "Neregulérní jednotky" # todo: NEW TRANSLATION
  ITA_irregulars_desc: "Neregulérní jednotky hrají klíčovou roli v kampani v Africe. Musíme zvýšit nábor mezi místním obyvatelstvem a zlepšit výcvik těchto jednotek." # todo: NEW TRANSLATION
  ITA_liberate_the_workers_of_africa: "Osvobodit dělníky Afriky" # todo: NEW TRANSLATION
  ITA_liberate_the_workers_of_africa_desc: "Nastal čas osvobodit africký lid jednou provždy od různých vlád, které je utlačují!" # todo: NEW TRANSLATION
  ITA_ascari: "Ascari" # todo: NEW TRANSLATION
  ITA_ascari_desc: "Pravidelné divize složené z místních vojsk z Afriky se ukázaly být vysoce účinné v plnění různých úkolů, nejen jako posádky nebo rezervy, ale i v operacích v náročném terénu, kde by jiné divize bojovaly." # todo: NEW TRANSLATION
