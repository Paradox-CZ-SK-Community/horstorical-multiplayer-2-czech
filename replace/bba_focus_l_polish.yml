  ITA_via_della_vittoria_extra_states_tt: "\nPřidá §Y1 $infrastructure$§! do každého severoafrického státu ve Středozemí kontrolovaného §Y[ROOT.GetFlag][ROOT.GetNameDef]§! nebo §Y[ITA.GetFlag][ITA.GetAdjective] subjektu§!.\nAktuální efekty:" # todo: NEW TRANSLATION
