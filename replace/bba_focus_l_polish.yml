  ITA_spreading_the_eagles_wings_tt: "Získá §Yloutkový§! válečný cíl proti §Yjakémukoli ne-spojenému sousedovi v Evropě§!:" # todo: NEW TRANSLATION
  ITA_italian_hegemony_subjects_tt: "\nKaždý [ROOT.GetAdjective] subjekt:\n" # todo: NEW TRANSLATION
  ITA_proclaim_the_italian_empire_tt: "Získá §Yloutkový§! válečný cíl proti §Yjakémukoli ne-spojenému sousedovi v Africe§!:" # todo: NEW TRANSLATION
  ITA_bop_will_shift: "§YBalance of Power§! se posune směrem k vůdci země." # todo: NEW TRANSLATION
  ITA_novus_ordo_forts_tt: "Přidat až §Y5 pozemních pevností§! ve státech plně kontrolovaných podél hranic Libye." # todo: NEW TRANSLATION
  ITA_novus_ordo_create_units_tt: "Vytvořit §Y[ROOT.GetFlag][ROOT.GetAdjective]§! jednotky v vlastněných a kontrolovaných libyjských státech:" # todo: NEW TRANSLATION
  ITA_novus_ordo_irregular_troops_tt: "Vytvořit §Y5 $infantry$ divizí§!." # todo: NEW TRANSLATION
  ITA_new_economic_policy: "Nová ekonomická politika" # todo: NEW TRANSLATION
  SWI_swiss_guiding_principles: "Švýcarské vodící principy" # todo: NEW TRANSLATION
  SWI_swiss_guiding_principles_desc: "[ROOT.GetNameDefCap] stojí jako nejstarší demokracie na kontinentu, ale prudké tempo změn v Evropě to ohrožuje. Pokračujeme v kurzu vytyčeném Eidgenossenschaft a Ústavou z roku 1848, nebo se nám otevře nová cesta?" # todo: NEW TRANSLATION
  SWI_increase_defense_budget: "Zvýšit obranný rozpočet" # todo: NEW TRANSLATION
  SWI_increase_defense_budget_desc: "I když jsme si udrželi neutralitu a suverenitu v Velké válce, nemůžeme polehávat na vavřínech; existuje reálná možnost, že jedna z velmocí kolem nás napadne naši zemi, aby obešla opevnění mezi nimi, a náš současný rozpočet nebude stačit tomu zabránit." # todo: NEW TRANSLATION
  SWI_national_defense_fund: "Fond národní obrany" # todo: NEW TRANSLATION
  SWI_national_defense_fund_desc: "Obrana země vyžaduje více než dřinu, potřebujeme i prostředky na dovoz vybavení a surovin potřebných k přípravě na nejhorší. Zřídit a podporovat fond, kam [ROOT.GetAdjective] občané mohou dobrovolně přispět, nám umožní vyrovnat zvýšení vojenského rozpočtu a zároveň ukáže participativní postoj [ROOT.GetAdjective] občanů." # todo: NEW TRANSLATION
  SWI_reaffirm_spiritual_defense: "Potvrdit duchovní obranu" # todo: NEW TRANSLATION
  SWI_reaffirm_spiritual_defense_desc: "Od roku 1932 se naše konfederace zavázala bránit švýcarské národní hodnoty proti rostoucí hrozbě autoritářství. Nyní, více než kdy jindy, tato hrozba vyvstává, a proto musíme obnovit slib bránit náš způsob života fyzicky i duchovně." # todo: NEW TRANSLATION
  SWI_fortify_border_with_germany: "Opevnit hranici s Německem" # todo: NEW TRANSLATION
  SWI_fortify_border_with_germany_desc: "[GER.GetNameDefCap] představuje existenční hrozbu pro přežití [ROOT.GetAdjective] konfederace. Pokud by vypukla válka mezi [GER.GetName] a [FRA.GetName], [GER.GetAdjective] by mohli projít přes [ROOT.GetName] místo silně opevněné hranice s [FRA.Getname] nebo přes [HOL.GetName] a [BEL.Getname]. Můžeme postavit opevnění mezi našimi zeměmi, aby odradily [GER.GetNameDef]." # todo: NEW TRANSLATION
  SWI_fortify_border_with_italy: "Opevnit hranici s Itálií" # todo: NEW TRANSLATION
  SWI_fortify_border_with_italy_desc: "[ITA.GetAdjective] expanzivní ambice se mohou kdykoli přelévat do [ROOT.GetName]. Koneckonců významná část naší populace mluví italsky, a stačí jedno vystoupení [ITA.GetLeader], aby se [ROOT.GetName] ocitlo v jejich hledáčku. Musíme jim ukázat, že nejsme snadný cíl." # todo: NEW TRANSLATION
  SWI_fortify_border_with_france: "Opevnit hranici s Francií" # todo: NEW TRANSLATION
  SWI_fortify_border_with_france_desc: "Navzdory jejich závazku k demokratickým hodnotám a dlouhodobým přátelským vztahům nemůžeme ignorovat možnost, že by [FRA.GetName] mohla porušit území [ROOT.GetAdjective], aby spustila překvapivý útok na [GER.GetNonIdeologyName] nebo [ITA.GetNonIdeologyName]." # todo: NEW TRANSLATION
  SWI_ban_foreign_nazi_propaganda: "Zabavit zahraniční nacistickou propagandu" # todo: NEW TRANSLATION
  SWI_ban_foreign_nazi_propaganda_desc: "Nemůžeme nechat tento prostředek cizí propagandy stát. Nacismus odporuje každé hodnotě, která definuje [ROOT.GetAdjective] federaci. Proto to nelze tolerovat v zemi postavené na demokracii a toleranci, jinak riskujeme, že budou použity k její vnitřní destrukci." # todo: NEW TRANSLATION
  SWI_buero_ha: "Buero Ha" # todo: NEW TRANSLATION
  SWI_buero_ha_desc: "Nemůžeme nechat sousedy vědět, že se je snažíme špehovat, takže se musíme spolehnout na semi-nezávislé zpravodajské agentury pro skryté operace. V tom nám pomůže fotografický podnikatel-převlečený špion Hans Hausamann se svým malým obratným kancelářským aparátem, který může vykonávat práci bez znečištění našich rukou." # todo: NEW TRANSLATION
  SWI_federal_police: "Federální policejní zpravodajství" # todo: NEW TRANSLATION
  SWI_federal_police_desc: "Bylo by bláhové bránit [ROOT.GetName] před vnějšími nepřáteli a pak ho nechat zničit těmi vnitřními. Musíme zmocnit Federální policii, aby odhalovala možné hrozby uvnitř našich hranic a bránila před zahraničními elementy." # todo: NEW TRANSLATION
  SWI_spab_counter_intelligence_agency: "SpAb" # todo: NEW TRANSLATION
  SWI_spab_counter_intelligence_agency_desc: "Víme, že [GER.GetNameDef] založili školicí středisko pro páté kolony diverzantů ve Stuttgartu zvané Panoramaheim. Proto musíme posílit Federální policii divizí Spionage Abwehr, aby čelila těmto hrozbám a bojovala proti zahraniční špionáži a sabotáži." # todo: NEW TRANSLATION
  SWI_armed_neutrality: "Ozbrojená neutralita" # todo: NEW TRANSLATION
  SWI_armed_neutrality_desc: "Naše dlouhodobá neutralita je nedílnou součástí identity [ROOT.GetAdjective]. Ale samotná neutralita nemůže zaručit naši suverenitu. Nakonec, jak moc pomohla [BEL.GetNonIdeologyName] v první světové válce? Nejlepší odstrašující prostředek je národ připravený vzít zbraně a bojovat proti každému vetřelci." # todo: NEW TRANSLATION
  SWI_promote_guisan: "Podpořit Henriho Guisana" # todo: NEW TRANSLATION
  SWI_promote_guisan_desc: "Náš politický systém umožňuje jediného generála a vrchního velitele jen v časech krajní nouze, když je naše konfederace ohrožena. Toto je určitě jedna z těch situací a mužem pro práci je Henri Guisan: nejen nejvhodnější, ale těší se široké oblibě napříč [ROOT.GetNameDef]." # todo: NEW TRANSLATION
  SWI_national_redoubt: "Réduit National" # todo: NEW TRANSLATION
  SWI_national_redoubt_desc: "Henri Guisan navrhuje jiný způsob obrany [ROOT.GetName]. Místo snahy bránit hranice za jakoukoli cenu můžeme strategicky ustoupit z Švýcarské plošiny a ustoupit do Alp, kde můžeme obsazení obrátit v nákladné vítězství pro nepřítele." # todo: NEW TRANSLATION
  SWI_expedite_mobilization: "Urychlit mobilizaci" # todo: NEW TRANSLATION
  SWI_expedite_mobilization_desc: "Role naší malé stálé armády je držet protivníka, zatímco lidé [ROOT.GetName] se chopí zbraní a vytvoří občanské milice, jádro naší obrany. Musíme zajistit, aby byly připraveny co nejdříve, abychom snížili riziko, že budou přemoženy." # todo: NEW TRANSLATION
  SWI_fortify_the_jura: "Opevnit Jura" # todo: NEW TRANSLATION
  SWI_fortify_the_jura_desc: "Bylo provedeno mnoho příprav na opevnění Alp, ale můžeme také opevnit pohoří Jura, které sice není tak strmé ani obranně výhodné, ale může se ukázat jako výhodné jako druhé předpolí k útoku na Plošinu, jakmile by byla v nepřátelských rukou." # todo: NEW TRANSLATION
  SWI_rig_infrastructure_to_blow: "Připravit infrastrukturu ke zničení" # todo: NEW TRANSLATION
  SWI_rig_infrastructure_to_blow_desc: "Pokud necháme vetřelce vstoupit do našich hranic, nemůžeme jim vše naservírovat na stříbrném podnose. Je naprosto důležité připravit infrastrukturu tak, aby ji nepřítel nemohl využít, zpomalit jejich postup a donutit je vynaložit cenné prostředky na náhrady." # todo: NEW TRANSLATION
  SWI_emergency_industry: "Nouzový průmysl" # todo: NEW TRANSLATION
  SWI_emergency_industry_desc: "Jelikož jsme se rozhodli zničit vlastní průmyslovou kapacitu, když nás nepřítel obsadí, musíme mít záložní kapacitu pro obnovu a odrazit vetřelce. Tajné tunely a továrny budou rozptýleny v srdcích našich hor a údolí, některé možná i mimo naše hranice." # todo: NEW TRANSLATION
  SWI_flood_the_valleys: "Zaplavit údolí" # todo: NEW TRANSLATION
  SWI_flood_the_valleys_desc: "Očekáváme velké invazní síly v oblasti kolem Bodamského jezera; je to ideální místo pro kanály a hráze, které zaplaví zemědělskou půdu a zpomalí vetřelce. Zatímco se budou snažit přejít tento nehostinný bažinatý terén, využijeme příležitost zasypat je vším, co máme. Budou litovat, že se někdy pokusili nás napadnout." # todo: NEW TRANSLATION
  SWI_defend_the_skies: "Bránit nebe" # todo: NEW TRANSLATION
  SWI_defend_the_skies_desc: "Moderní válka je silně závislá na vzdušné převaze a podpoře. [ROOT.GetName] není připraven na tuto novou realitu, proto musíme připravit každý kanton, aby bránil svá oblohy proti nepřátelským letadlům." # todo: NEW TRANSLATION
  SWI_attack_from_the_mountains: "Útok z hor" # todo: NEW TRANSLATION
  SWI_attack_from_the_mountains_desc: "Jakmile se umístíme na opevněných pozicích v Alpách a Juře, můžeme způsobit peklo nepřátelským jednotkám dolů v údolí. Musíme zajistit, aby věděli, že každá minuta v našem území pro ně znamená větší ztráty mužstva a materiálu." # todo: NEW TRANSLATION
  SWI_frontier_defense_plan: "Plán obrany hranic" # todo: NEW TRANSLATION
  SWI_frontier_defense_plan_desc: "Pokud je necháme proniknout do našich hranic, [ROOT.GetNameDef] je prakticky odsouzeno. Nemůžeme povolit ani palec území, naše hranice jsou posvátné. Proto musíme své hranice opevnit a být připraveni je bránit." # todo: NEW TRANSLATION
  SWI_fight_until_death: "Bojovat až do smrti" # todo: NEW TRANSLATION
  SWI_fight_until_death_desc: "Šance jsou proti nám, [ROOT.GetName] je početně i technicky slabší a nepřipravený. Proto musí každý [ROOT.GetAdjective] občan být připraven obětovat život za svůj kanton a konfederaci." # todo: NEW TRANSLATION
  SWI_total_defense: "Celková obrana" # todo: NEW TRANSLATION
  SWI_total_defense_desc: "Totální válka vyžaduje totální obranu; pokud každá milice bude připravena a dá vše proti vetřelcům, můžeme mít šanci na přežití." # todo: NEW TRANSLATION
  SWI_the_army_position: "Pozice armády" # todo: NEW TRANSLATION
  SWI_the_army_position_desc: "Postavíme naše občanské milice a stálou armádu na hranicích [ROOT.GetName], takže budou potřebovat opevnění, které zvýší jejich schopnost odrazit vetřelce." # todo: NEW TRANSLATION
  SWI_prolonged_service: "Prodloužená služba" # todo: NEW TRANSLATION
  SWI_prolonged_service_desc: "Současná povinná služba nestačí na dlouhodobý konflikt; musíme vládě dát nástroje, aby udržela občany pod zbraní déle, i kdyby to znamenalo obětování některých svobod." # todo: NEW TRANSLATION
  SWI_enhanced_training: "Vylepšený výcvik" # todo: NEW TRANSLATION
  SWI_enhanced_training_desc: "Válka se od posledního ohrožení hodně změnila. Musíme aktualizovat a zlepšit základní výcvik každého schopného občana. Jsou naším nejlepším aktivem v obraně země." # todo: NEW TRANSLATION
  SWI_integrate_refugees_into_the_army: "Integrovat uprchlíky do armády" # todo: NEW TRANSLATION
  SWI_integrate_refugees_into_the_army_desc: "Jako oáza míru a demokracie přicházejí k nám mnozí hledající útočiště. Někteří z nich chtějí bojovat a mnozí jsou profesionální vojáci. Můžeme je nechat připojit se k obraně Švýcarska a lepší budoucnosti." # todo: NEW TRANSLATION
  SWI_expanded_military_support: "Rozšířená vojenská podpora" # todo: NEW TRANSLATION
  SWI_expanded_military_support_desc: "Naše milice nejsou složeny pouze z vojáků; mnoho dalších rolí je nezbytných. Musíme najmout, vycvičit a zásobovat podpůrné jednotky pro naše milice, pokud chceme uspět v obraně [ROOT.GetName]." # todo: NEW TRANSLATION
  SWI_all_adults_training: "Výcvik všech dospělých" # todo: NEW TRANSLATION
  SWI_all_adults_training_desc: "Není místo pro náhodu v současné situaci. Každý schopný dospělý musí být připraven vzít zbraň proti jakémukoli vetřelci; Švýcarsko patří všem a musí být bráněno všemi." # todo: NEW TRANSLATION
  SWI_anti_tank_divisions: "Protitankové divize" # todo: NEW TRANSLATION
  SWI_anti_tank_divisions_desc: "Tank je špičkou moderního boje; náš terén nám už dává výhodu, ale pokud vybavíme jednotky protitankovým vybavením, odřízneme hrot jejich kopí." # todo: NEW TRANSLATION
  SWI_reduce_military_training_age: "Snížit věk náboru" # todo: NEW TRANSLATION
  SWI_reduce_military_training_age_desc: "Obvykle se [ROOT.GetAdjective] trénují od 20 let, ale abychom získali potřebné počty, naši občané musí začít výcvik o rok dříve. Snad to stačí." # todo: NEW TRANSLATION
  SWI_veteran_sharpshooter_divisions: "Divize veteránských střelců" # todo: NEW TRANSLATION
  SWI_veteran_sharpshooter_divisions_desc: "Tisíce veteránských střelců žádají o možnost sloužit jako pomocné jednotky a bojovat za obranu své země a demokracie. Jejich zkušenosti a nadšení budou přínosem pro naše milice." # todo: NEW TRANSLATION
  SWI_fortify_ticino: "Fortezza Ticino" # todo: NEW TRANSLATION
  SWI_fortify_ticino_desc: "Jako neutrální země mezi třemi historicky válčícími státy nemůžeme ponořit stráž. [ITA.GetName] je stejně pravděpodobným útočníkem jako [GER.GetNameDef] nebo [FRA.GetName], a když zaútočí, bude to přes [846.GetName]. Proto musíme Ticino udělat neproniknutelnou pevností pro dobro [SWI.GetNameDef]." # todo: NEW TRANSLATION
  SWI_fortify_sargans_gotthard_and_st_maurice: "Opevnit Sargans, Gotthard a St Maurice" # todo: NEW TRANSLATION
  SWI_fortify_sargans_gotthard_and_st_maurice_desc: "Naše Alpy jsou pýchou [ROOT.GetName], a v těchto nejistých časech je můžeme opevnit, aby pomohly zaručit bezpečnost konfederace." # todo: NEW TRANSLATION
  SWI_defend_against_paratroopers: "Bránit proti parašutistům" # todo: NEW TRANSLATION
  SWI_defend_against_paratroopers_desc: "Viděli jsme, jak parašutisté mohou obejít opevnění a zneplatnit přípravy. Je nezbytné, abychom byli připraveni jim čelit, než způsobí chaos v naší obraně." # todo: NEW TRANSLATION
  SWI_expand_special_forces: "Rozšířit speciální jednotky" # todo: NEW TRANSLATION
  SWI_expand_special_forces_desc: "Naše stálá armáda je dobře připravená, ale extrémně malá v porovnání s ostatními národy. Potřebujeme jich více, aby vedly [ROOT.GetAdjective] k vítězství!" # todo: NEW TRANSLATION
  SWI_purchase_german_planes: "[SWI_purchase_fascist_planes_name]" # todo: NEW TRANSLATION
  SWI_purchase_german_planes_default: "Koupit německá letadla" # todo: NEW TRANSLATION
  SWI_purchase_german_planes_alt: "Koupit letadla od fašistického souseda" # todo: NEW TRANSLATION
  SWI_purchase_german_planes_desc: "S zastaralým letectvem a nedostatkem průmyslu a technologie k masové výrobě letadel jsme nuceni je kupovat od sousedů. Nákup letadel od [GER.GetName] nám nejen poskytne vybavení, které potřebujeme, ale také udrží jejich přízeň." # todo: NEW TRANSLATION
  SWI_ban_the_communist_party: "Zákaz švýcarské komunistické strany" # todo: NEW TRANSLATION
  SWI_ban_the_communist_party_desc: "Komunistické strany představují velké riziko pro [SWI.GetNameDef]. I přes vzdálenost mezi námi a [SOU.GetNameDef] je jejich revoluční vliv cítit. Nemůžeme riskovat destabilizaci našeho státu v těchto nebezpečných časech, proto musíme jednat rychle a zakázat každou stranu, která se snaží svrhnout vládu." # todo: NEW TRANSLATION
  SWI_withdraw_from_the_league_of_nations: "Stažení z Společnosti národů" # todo: NEW TRANSLATION
  SWI_withdraw_from_the_league_of_nations_desc: "Naše členství ve Společnosti národů je neslučitelné s neutralitou, o kterou usilujeme v [ROOT.GetName], takže je nezbytné z této umírající organizace vystoupit. Také to signalizuje našim sousedům naši oddanost skutečné neutralitě." # todo: NEW TRANSLATION
  SWI_limited_censorship_of_the_press: "Limitní cenzura tisku" # todo: NEW TRANSLATION
  SWI_limited_censorship_of_the_press_desc: "Síly, které nás chtějí vidět poražené, použijí cokoliv k ospravedlnění invaze. Svoboda tisku je pro demokracii důležitá, ale nyní musí jít stranou, aby nám neudělala zadní vrátka." # todo: NEW TRANSLATION
  SWI_tighten_press_censorship: "Zpřísnit cenzuru tisku" # todo: NEW TRANSLATION
  SWI_tighten_press_censorship_desc: "Není prostor pro chybu; jedno slovo může znamenat rozdíl mezi přežitím konfederace a jejím zánikem. Nemůžeme dovolit, aby svobodný tisk ohrozil naši budoucnost; musí být pevně kontrolován přesně tak, jak požaduje [?SWI.SWI_biggest_fascist.GetNameDef]." # todo: NEW TRANSLATION
  SWI_seek_trade_agreement_with_germany: "Obchodní dohoda s Německem" # todo: NEW TRANSLATION
  SWI_seek_trade_agreement_with_germany_desc: "Fašismus pokračuje v děsivém vzestupu, a i když to může být těžké přijmout, povolit určitou ekonomickou spolupráci může být to, co potřebujeme, aby si od nás odvrátili pozornost." # todo: NEW TRANSLATION
  SWI_axis_gold: "Zlatá osa" # todo: NEW TRANSLATION
  SWI_axis_gold_desc: "Být neutrální zemí znamená, že naše trhy zůstanou otevřené všem státům, což je výhoda, kterou můžeme využít. Otevřením našeho trhu se zlatem [?SWI.SWI_biggest_fascist.GetNameDef] můžeme svázat naše ekonomiky a uklidnit je, což zlepší obě ekonomiky." # todo: NEW TRANSLATION
  SWI_spirit_of_resistance: "Duch odboje" # todo: NEW TRANSLATION
  SWI_spirit_of_resistance_desc: "Srdce a mysl lidí [ROOT.GetName] jsou nejdůležitější frontou v boji o naše přežití. Musíme zajistit, aby každý [ROOT.GetAdjective] občan byl připraven bojovat až do konce, i když se zdá být vše ztraceno." # todo: NEW TRANSLATION
  SWI_pro_helvetia: "Pro Helvetia" # todo: NEW TRANSLATION
  SWI_pro_helvetia_desc: "Duchovní obrana [ROOT.GetName] vyžaduje, aby [ROOT.GetAdjective] kultura zůstala jednotná, nerozdělená a odlišná od sousedů. Tato nová organizace Pro Helvetia bude uchovávat a podporovat naše sdílené švýcarské hodnoty spojené s demokracií a zajistí naše přežití." # todo: NEW TRANSLATION
  SWI_spirit_of_saint_bernard: "Duch Svatého Bernarda" # todo: NEW TRANSLATION
  SWI_spirit_of_saint_bernard_desc: "Od nepaměti si ceníme naší lékařské tradice a ochoty pomáhat potřebným. Velký Svatý Bernard a Červený kříž jsou toho důkazem. Nyní lze tento duch zbranit a přesměrovat tak, aby posílil naše milice." # todo: NEW TRANSLATION
  SWI_adopt_romansh: "Přijmout románštinu" # todo: NEW TRANSLATION
  SWI_adopt_romansh_desc: "[ROOT.GetName] není zemí složenou z [GER.GetAdjective], [FRA.GetAdjective] a [ITA.GetAdjective] regionů určených pro nárokování našimi chamtivými sousedy. [ROOT.GetName] je jeden, nedělitelný multikulturní národ. Přijetí rumantského jazyka, jazyka mluveného pouze v horách našich [ROOT.GetAdjective] Alp, ukáže, že naše kultura a hodnoty jsou odlišné, bez ohledu na jazyk." # todo: NEW TRANSLATION
  SWI_patriotic_shooting_clubs: "Vlastenecké střelecké kluby" # todo: NEW TRANSLATION
  SWI_patriotic_shooting_clubs_desc: "[ROOT.GetName] má dlouhou tradici střeleckých klubů a soutěží. Někteří našich rekreačních střelců jsou lepší než profesionální odstřelovači jiných zemí. Můžeme tyto kluby využít a integrovat je do milic, aby zlepšily naši obrannou schopnost." # todo: NEW TRANSLATION
  SWI_aktion_nationaler_widerstand: "Aktion Nationaler Widerstand" # todo: NEW TRANSLATION
  SWI_aktion_nationaler_widerstand_desc: "Existuje malá skupina občanů v každé části [ROOT.GetAdjective] společnosti, kteří jsou ochotni tajně spolupracovat, aby ovlivnili populaci. Jejich cílem je bojovat proti poraženeckému myšlení, inspirovat jednotu a připravit půdu pro odboj." # todo: NEW TRANSLATION
  SWI_heer_und_haus: "Heer und Haus" # todo: NEW TRANSLATION
  SWI_heer_und_haus_desc: "Lidé Švýcarska, a tedy i jeho armáda, musí být povzbuzováni k odporu a boji za obranu své domoviny. Aby si byli vědomi, co je v sázce, Pro Helvetia s pomocí Aktion Nationaler Widerstand jsou klíčoví pro jejich myšlení a jednání [ROOT.GetAdjective]" # todo: NEW TRANSLATION
  SWI_ortswehren: "Ortswehren" # todo: NEW TRANSLATION
  SWI_ortswehren_desc: "Totální válka znamená, že každý [ROOT.GetAdjective] občan musí být připraven bránit svůj kanton, ale ne každý může sloužit v milicích. Můžeme založit místní hlídky jako páteř, na kterou se milice mohou spolehnout." # todo: NEW TRANSLATION
  SWI_luftschutz: "Luftschutz" # todo: NEW TRANSLATION
  SWI_luftschutz_desc: "Válka se změnila, vzduch je novým bojištěm a nesmíme dovolit, aby se stal naší Achillovou patou. Místní protiletadlové obranné síly musí být zřízeny, obsazeny civilisty a vybaveny nástroji pro detekci a likvidaci leteckých hrozeb. Není smysl bránit hory, pokud mohou nepřátelé projít nad nimi!" # todo: NEW TRANSLATION
  SWI_train_swiss_women: "Vyškolit švýcarské ženy" # todo: NEW TRANSLATION
  SWI_train_swiss_women_desc: "Pokud chceme bránit naši zemi, bylo by absurdní vyloučit polovinu populace z našich snah. [ROOT.GetAdjective] ženy by měly být vyškoleny, aby se připojily k boji o přežití země." # todo: NEW TRANSLATION
  SWI_ban_national_movement_for_switzerland: "Zákaz National Movement for Switzerland" # todo: NEW TRANSLATION
  SWI_ban_national_movement_for_switzerland_desc: "Fašisté se skrývají v zákoutích společnosti a rostou naší nedbalostí. Už ne! Jejich nový vzhled a název nás neoblbnou, musíme udeřit rozhodně, pokud chceme zachovat naši demokracii." # todo: NEW TRANSLATION
  SWI_fortify_austrian_border: "Opevnit hranici s Rakouskem" # todo: NEW TRANSLATION
  SWI_fortify_austrian_border_desc: "Nyní, když je Rakousko v rukou potenciálního nepřítele, nemůžeme mít otevřé křídlo, které by nepřítel mohl využít. Stejně jako u hranice s [GER.GetNonIdeologyName], musíme tento front opevnit." # todo: NEW TRANSLATION
  SWI_seek_allied_trade: "Usilovat o obchod se spojenci" # todo: NEW TRANSLATION
  SWI_seek_allied_trade_desc: "S nepřáteli kolem nás musíme zajistit životně důležitý obchod se Spojenci, abychom přežili. Pokud budeme mít štěstí, můžeme se vyhnout rozhořčení ostatních sousedů za hledání bližšího obchodu s jejich rivaly." # todo: NEW TRANSLATION
  SWI_case_north: "Případ Sever" # todo: NEW TRANSLATION
  SWI_case_north_desc: "Nelze vyloučit válku proti [?SWI.SWI_biggest_fascist.GetNameDef]. Musíme být připraveni. Plány musí být vypracovány, zásoby alokovány, zákopy vykopány a vojáci vyzbrojeni." # todo: NEW TRANSLATION
  SWI_freeze_german_assets: "Zmrazit německé aktiva" # todo: NEW TRANSLATION
  SWI_freeze_german_assets_desc: "Roky [?SWI.SWI_biggest_fascist.GetNameDef] využívá naši neutralitu a právní skuliny v našem bankovním systému k uchování svých zisků. Morální povinnost musí mít přednost před absolutní neutralitou, i když to bude mít důsledky." # todo: NEW TRANSLATION
  SWI_fund_resistance_groups: "Financovat odbojové skupiny" # todo: NEW TRANSLATION
  SWI_fund_resistance_groups_desc: "Evropské národy válčily mezi sebou a podrobovaly jiné kontinenty po staletí. Je povinností [ROOT.GetAdjective] pomoci obětem těchto válek tím, že jim dáme nástroje k rozbití řetězů a určení vlastní budoucnosti." # todo: NEW TRANSLATION
  SWI_citizen_supply_mandate: "Povinnost zásobování domácností" # todo: NEW TRANSLATION
  SWI_citizen_supply_mandate_desc: "Nevíme, jak by invaze probíhala, a i kdybychom měli centralizovanou síť zásobování, ta není kompatibilní s naší strukturou velení. Proto musí každá [ROOT.GetAdjective] domácnost skladovat alespoň 2 měsíce zásob pro sebe a pro místní milice." # todo: NEW TRANSLATION
  SWI_prepare_infrastructure_and_industry: "Připravit infrastrukturu a průmysl" # todo: NEW TRANSLATION
  SWI_prepare_infrastructure_and_industry_desc: "Obrana země není jen o budování pevností; musíme také posílit infrastrukturu v Alpách, abychom přesunuli jednotky a civilní zboží efektivněji, spolu s větší průmyslovou základnou na Plošině pro další rozvoj." # todo: NEW TRANSLATION
  SWI_build_up_military_readiness: "Zvyšit vojenskou pohotovost" # todo: NEW TRANSLATION
  SWI_build_up_military_readiness_desc: "Úkol připravit švýcarské obyvatelstvo je nekonečný. Nemůžeme polevit, dokud hrozba invaze neustane, a možná nikdy neustane. Musíme národ orientovat na obranné připravenosti bez prodlení." # todo: NEW TRANSLATION
  SWI_support_active_militias_continuous_focus: "Podpora aktivních milic" # todo: NEW TRANSLATION
  SWI_support_active_militias_continuous_focus_desc: "Naši občané jsou ozbrojeni a nasazeni do místních milic; je povinností ostatních je podporovat, aby udrželi nepřátele konfederace na uzdě." # todo: NEW TRANSLATION
  SWI_rig_infrastructure_to_blow_TT: "Když některý z našich core států je obsazen nepřítelem, veškerá §Yinfrastruktura§!, §Yželeznice§!, §YZásobovací uzly§! a §Ybunkry§! budou úplně poškozeny. §YVojenské§! a §YCivilní továrny§! budou částečně poškozeny." # todo: NEW TRANSLATION
  SWI_create_anti_tank_template_TT: "Bude vytvořena šablona pro §Yšvýcarské protitankové milice§!" # todo: NEW TRANSLATION
  SWI_closer_ties_with_germany: "Bližší vazby s [SWI_get_fascist_neighbor_cap]" # todo: NEW TRANSLATION
  SWI_closer_ties_with_germany_desc: "Máme mocného a nebezpečného souseda na severu. Pokud chceme přežít, může být dobré zůstat na jeho straně a navázat lepší vztahy, přičemž si zachováme neutralitu." # todo: NEW TRANSLATION
  SWI_panoramaheim_branch: "Panoramaheim" # todo: NEW TRANSLATION
  SWI_panoramaheim_branch_desc: "Ve Stuttgartu je dům zvaný 'Panorama House', zdroj mnoha pátých kolon operativců snažících se destabilizovat [ROOT.GetAdjective] vládu a otevřít cestu fašistickému režimu." # todo: NEW TRANSLATION
  SWI_the_national_front: "Národní fronta" # todo: NEW TRANSLATION
  SWI_the_national_front_desc: "Národní fronta je vedoucí fašistická strana v [ROOT.GetNonIdeologyName]; pokud má někdo převzít moc v této demokraticky nakloněné zemi, budou to oni. Někteří vysoce postavení členové už mají blízké vazby na [GER.GetNameDef], což by mohlo znamenat určitý stupeň ochrany, až přijde válka." # todo: NEW TRANSLATION
  SWI_infiltrate_federal_police: "Infiltrovat federální policii" # todo: NEW TRANSLATION
  SWI_infiltrate_federal_police_desc: "S mandátem odhalovat zahraniční propagandu a nedemokratické síly je Federální policie ideálním místem pro infiltrace, aby se předešlo cílení na naši frakci. Nakonec to umožní eliminovat nepřátele pod záminkou národní bezpečnosti." # todo: NEW TRANSLATION
  SWI_the_petition_of_the_200: "Petice 200" # todo: NEW TRANSLATION
  SWI_the_petition_of_the_200_desc: "200 členů široké škály stran zastupujících [ROOT.GetAdjective] fašismus a autoritářství předložilo tuto petici sněmu s žádostí, aby v zájmu sebezáchovy začali přijímat a spolupracovat s [GER.GetNameDef]." # todo: NEW TRANSLATION
  SWI_case_west: "Případ Západ" # todo: NEW TRANSLATION
  SWI_case_west_desc: "Musíme být připraveni na jakýkoli scénář. [FRA.GetName] je hrozba stejně jako [GER.GetNameDef] a musí být takto připraven. Musíme připravit armádu a zemi na válku s [FRA.GetAdjective] nebo riskovat zánik [ROOT.GetNonIdeologyName]." # todo: NEW TRANSLATION
  SWI_german_industrial_investments: "[SWI_get_fascist_neighbor_adjective] průmyslové investice" # todo: NEW TRANSLATION
  SWI_german_industrial_investments_desc: "Průmyslová moc [?SWI.SWI_biggest_fascist.GetNonIdeologyName] je nepopiratelná. Pokud chceme přežít blížící se válku, budeme potřebovat průmyslovou základnu vlastní, abychom mohli konkurovat a mít páku. Investice [?SWI.SWI_biggest_fascist.GetNameDefCap] v nás také znamenají, že budou mít důvod udržet [ROOT.GetNonIdeologyName] netknutou." # todo: NEW TRANSLATION
  SWI_complete_siegfried_line: "Dokončit Ziggfridovu linii" # todo: NEW TRANSLATION
  SWI_complete_siegfried_line_desc: "[GER.GetNameDefCap] vybudovalo impozantní bariéru k obraně proti [FRA.GetName], a máme důvod věřit, že se také budeme muset bránit proti nim, zejména jak se více přibližujeme [?SWI.SWI_biggest_fascist.GetNonIdeologyName], proto musíme koordinovat a budovat komplementární obrany." # todo: NEW TRANSLATION
  SWI_military_exercises_with_germany: "Vojenská cvičení s [SWI_get_fascist_neighbor]" # todo: NEW TRANSLATION
  SWI_military_exercises_with_germany_desc: "Navzdory jejich nepřátelskému postoji vůči našim demokratickým hodnotám může být [SWI_get_fascist_neighbor] cenným spojencem, až přijde čas bránit se, a navíc by to snížilo pravděpodobnost invaze z jejich strany." # todo: NEW TRANSLATION
  SWI_abandon_neutrality: "Opustit neutralitu" # todo: NEW TRANSLATION
  SWI_abandon_neutrality_desc: "V celé Evropě se sides vymezují; nemůžeme být necháni na holičkách. Jediným zřejmým řešením je opustit historickou neutralitu a hledat ochranu u [SWI_get_fascist_neighbor], nebo riskovat být mezi dvěma ohni." # todo: NEW TRANSLATION
  SWI_promote_tobler: "Podpořit Toblera" # todo: NEW TRANSLATION
  SWI_promote_tobler_desc: "Jako jediný člen fašistické strany zvolený do parlamentu a vůdce Národní fronty je Robert Tobler zřejmým kandidátem, aby vedl [ROOT.GetNonIdeologyName] k pomalé, ale jisté transformaci z demokratické pluralistické země na [SWI_get_fascist_neighbor_adjective] spojence řízeného železnou pěstí. To samozřejmě znamená odvolání Rolf Henne z vedení strany; může být jen jeden Führer." # todo: NEW TRANSLATION
  SWI_promote_henne: "Podpořit Henneho" # todo: NEW TRANSLATION
  SWI_promote_henne_desc: "Jako energický zastánce fašismu a spolupráce s [SWI_get_fascist_neighbor] je Rolf Henne hlavním kandidátem vést Národní frontu a [ROOT.GetName] k [SWI_get_fascist_neighbor_adjective] klientskému státu, což jistě přinese výhody, včetně naší bezpečnosti. To bude samozřejmě znamenat odvolání Roberta Toblera z vedení strany." # todo: NEW TRANSLATION
  SWI_propagandize_swiss_military_tradition: "Propagovat švýcarskou vojenskou tradici" # todo: NEW TRANSLATION
  SWI_propagandize_swiss_military_tradition_desc: "Není čas vzpomínat na naši demokratickou minulost. Měli bychom se soustředit na naši vojenskou tradici; [ROOT.GetAdjective] pěchota a kušník byli proslulí disciplinou a efektivitou, najímaní po celém světě. Pokud chceme přežít nadcházející válku, musíme lidem připomenout jejich vojenskou historii." # todo: NEW TRANSLATION
  SWI_ban_democratic_party: "Zákaz demokratických stran" # todo: NEW TRANSLATION
  SWI_ban_democratic_party_desc: "Naše demokratické strany ohrožují náš postup směrem k [SWI_get_fascist_neighbor]. Pokud chceme jít dál, budeme muset udělat to, co ještě před pár lety bylo nemyslitelné, a zbavit se demokratických politických stran. Pokud je to oběť, kterou musíme přinést, ať tak bude." # todo: NEW TRANSLATION
  SWI_centralize_switzerland: "Centralizovat Švýcarsko" # todo: NEW TRANSLATION
  SWI_centralize_switzerland_desc: "Nová forma [ROOT.GetNonIdeologyName], ke které směřujeme, je daleko od staré konfederace. Už nebudeme konfederací, ale centralizovanou zemí s mocí vycházející z horní úrovně." # todo: NEW TRANSLATION
  SWI_german_military_collaboration: "[SWI_get_fascist_neighbor_adjective] vojenská spolupráce" # todo: NEW TRANSLATION
  SWI_german_military_collaboration_desc: "Postrádáme zkušenosti s moderním bojem, které jsou nezbytné, aby naše armáda prosperovala. V tom nám může [?SWI.SWI_biggest_fascist.GetName] pomoci; jejich ozbrojené síly jsou síla, se kterou je třeba počítat, a spolupráce s nimi nám umožní bránit se, nebo dokonce útočit preventivně." # todo: NEW TRANSLATION
  SWI_join_the_axis: "Přidat se k Ose" # todo: NEW TRANSLATION
  SWI_join_the_axis_desc: "To je ono. Naše sázka na přežití [ROOT.GetNonIdeologyName] v nadcházející bouři; připojíme se k bouři pod praporem [?SWI.SWI_biggest_fascist.GetName]. Doufejme, že jsme učinili správné rozhodnutí." # todo: NEW TRANSLATION
  SWI_become_german_puppet: "Stát se loutkou [SWI_get_fascist_neighbor_adjective]" # todo: NEW TRANSLATION
  SWI_become_german_puppet_desc: "Henne zasvětil svou kariéru tomuto okamžiku. [ROOT.GetNonIdeologyName] vlastní Anschluss, takříkajíc. I když ztrácíme naši dlouhodobou suverenitu, možná dostaneme nějaké jejich zbytky. Doufejme, že to neznamená naši zkázu." # todo: NEW TRANSLATION
  SWI_ask_for_vorarlberg: "Žádat o [848.GetName]" # todo: NEW TRANSLATION
  SWI_ask_for_vorarlberg_desc: "Nyní, když jsme pod křídly [?SWI_fascist_overlord.GetName] nějakou dobu a prokázali naši loajalitu, je čas, aby nám důvěřovali s tím, co nám právem náleží. [848.GetName] hlasovalo pro připojení k nám, když byla země demokratickou konfederací, takže není pochyb, že by chtěli připojení i nyní." # todo: NEW TRANSLATION
  SWI_size_and_opinion_chance_tooltip: "\nBudou více nakloněni přijmout na základě §Yvelikosti§! našich ozbrojených sil a jejich §Ynálady§! k nám." # todo: NEW TRANSLATION
  SWI_request_austrian_occupation: "Požádat o [AUS.GetAdjective] okupaci" # todo: NEW TRANSLATION
  SWI_request_austrian_occupation_desc: "[ROOT.GetNonIdeologyName] anektovalo [848.GetName]; to není náš konečný cíl. Můžeme dokázat [?SWI_fascist_overlord.GetName], že zvládneme správu většího území, tím ulehčíme jejich zátěž a učiníme [ROOT.GetFactionName] efektivnějším válečným strojem." # todo: NEW TRANSLATION
  SWI_request_italian_alps_occupation: "Požádat o [ITA.GetAdjective] okupaci Alp" # todo: NEW TRANSLATION
  SWI_request_italian_alps_occupation_desc: "S částí naší země obývanou [ITA.GetAdjective] mluvícími občany můžeme hladce přejít k administraci [ITA.GetName] a využít její lidi a zdroje k pokračování našeho úsilí o dokončení války." # todo: NEW TRANSLATION
  SWI_request_french_alps_occupation: "Požádat o [FRA.GetAdjective] okupaci Alp" # todo: NEW TRANSLATION
  SWI_request_french_alps_occupation_desc: "[FRA.GetNonIdeologyName] po generace touží po našem území; je férové, že nyní jsme v pozici, kdy můžeme převzít správu jejich území pro budoucnost obou." # todo: NEW TRANSLATION
  SWI_the_alpine_supremacy: "Alpská nadvláda" # todo: NEW TRANSLATION
  SWI_the_alpine_supremacy_desc: "[SWI.GetNonIdeologyName], plachý a bez směru národ z diplomacie, už neexistuje. Nyní budeme znáni jako Alpská nadvláda, reprezentující naše panství nad Alpami, jejím lidem a dále." # todo: NEW TRANSLATION
  SWI_professionalize_militias: "Profesionalizovat milice" # todo: NEW TRANSLATION
  SWI_professionalize_militias_desc: "S tím, jak se situace vyvíjí, pouhá milice složená z rezervistů nebude stačit. Musíme vyškolit každého schopného a udělat z nich profesionální armádu, které se budou ostatní bát." # todo: NEW TRANSLATION
  SWI_modernize_airforce: "Modernizovat letectvo" # todo: NEW TRANSLATION
  SWI_modernize_airforce_desc: "Je zřejmé, že moderní válka je definována nejen tím, co se děje na bojišti, ale i nad ním. Musíme se připravit dominovat obloze." # todo: NEW TRANSLATION
  SWI_swiss_airplane_designs: "Švýcarské návrhy letadel" # todo: NEW TRANSLATION
  SWI_swiss_airplane_designs_desc: "Nemůžeme se spoléhat na sousedy pro stroje, které nám umožní ovládnout oblohu, protože jim nelze zcela důvěřovat." # todo: NEW TRANSLATION
  SWI_license_axis_plane_designs: "Licencovat návrhy letadel Osy" # todo: NEW TRANSLATION
  SWI_license_axis_plane_designs_desc: "Nejrychlejší cesta, jak vyrůst do nebe, je získat návrhy od fašistických států. Mají nedávné bojové zkušenosti, které určují, co skutečně vítězí v bitvě, a navíc nás to přiblíží k nim, možná je to odradí od invaze." # todo: NEW TRANSLATION
  SWI_airspace_surveillance: "Monitorování vzdušného prostoru" # todo: NEW TRANSLATION
  SWI_airspace_surveillance_desc: "Pokud chceme bránit [ROOT.GetName] a jeho hory, musíme mít oči na nebi. Nové nástroje nám umožní najít nepřítele a nasměrovat naše stíhače a protiletadlové jednotky." # todo: NEW TRANSLATION
  SWI_professionalize_militias_TT: "Všechny §Yšvýcarské občanské milice§! se stanou §Yběžnými pěchotními§! divizemi a rozhodnutí §Y$SWI_military_readiness_decisions_category$§! budou zakázána." # todo: NEW TRANSLATION
  SWI_neutrality_decisions_disabled_TT: "Rozhodnutí §Y$SWI_absolute_neutrality_decisions_category$§! budou zakázána." # todo: NEW TRANSLATION
  SWI_has_fascist_neighbor_trigger_TT: "Má vhodného fašistického souseda" # todo: NEW TRANSLATION
  SWI_crack_down_on_dissent: "Utlačit nesouhlas" # todo: NEW TRANSLATION
  SWI_crack_down_on_dissent_desc: "[ROOT.GetNonIdeologyName] nesmí být rozdělen v čase, kdy jediná trhlina ve společnosti může vést k rozkladu [ROOT.GetAdjective] vlády." # todo: NEW TRANSLATION
  SWI_military_police: "Vojenská policie" # todo: NEW TRANSLATION
  SWI_military_police_desc: "Naše dlouhodobé federální instituce nebudou stačit k udržení pořádku v těchto nejistých časech. Potřebujeme vojenskou policii k udržení pořádku." # todo: NEW TRANSLATION
  SWI_expand_federal_police_intelligence: "Rozšířit zpravodajství Federální policie" # todo: NEW TRANSLATION
  SWI_expand_federal_police_intelligence_desc: "Nepřítel číhá ve stínu a může mít podobu i mezi našimi vlastními občany. Proto musí mít zpravodajství Federální policie nástroje k potlačení nespokojenosti kdekoliv." # todo: NEW TRANSLATION
  SWI_martial_law: "Válečný stav" # todo: NEW TRANSLATION
  SWI_martial_law_desc: "Některé situace vyžadují skalpel, ale naše současné časy ne; [ROOT.GetNameDef] potřebuje kladivo, kterému lze důvěřovat, aby udrželo nepřátele i populaci pod kontrolou." # todo: NEW TRANSLATION
  SWI_expand_weapons_industry: "Rozšířit zbrojní průmysl" # todo: NEW TRANSLATION
  SWI_expand_weapons_industry_desc: "Naše chabé vojenské průmyslové kapacity nestačí v totální válce. Moderní konflikt vyhrává ten, kdo dojde poslední s municí, takže musíme zajistit, že budeme schopni vyrábět vybavení rychleji a déle." # todo: NEW TRANSLATION
  SWI_swiss_armored_divisions: "Švýcarské obrněné divize" # todo: NEW TRANSLATION
  SWI_swiss_armored_divisions_desc: "Historicky jsme byli hrdí na skvělou pěchotu, ale to nestačí proti obrněným kolosům nepřítele. Musíme vytvořit své mechanizované monstra." # todo: NEW TRANSLATION
  SWI_alpine_specialization: "Alpská specializace" # todo: NEW TRANSLATION
  SWI_alpine_specialization_desc: "Více než jakýkoliv jiný národ můžeme využít naše horské tradice a vycvičit nezastavitelnou sílu, která dokáže bránit a útočit v horách jako nikdo jiný. Budou lavinou, která srazí nepřítele." # todo: NEW TRANSLATION
  SWI_tank_development: "Vývoj tanků" # todo: NEW TRANSLATION
  SWI_tank_development_desc: "Nemůžeme polevit v vývoji nových a lepších tanků, jinak promarníme ocel na zastaralé plechové želvy." # todo: NEW TRANSLATION
  SWI_mechanized_support: "Mechanizovaná podpora" # todo: NEW TRANSLATION
  SWI_mechanized_support_desc: "Naši vojáci potřebují dostat se na bojiště rychleji než dřív, a tak i podpora, jinak bude veškerá rychlost k ničemu." # todo: NEW TRANSLATION
  SWI_artillery: "Švýcarské dělostřelectvo" # todo: NEW TRANSLATION
  SWI_artillery_desc: "Ať granáty padají na naše nepřátele, zatímco postupujeme vpřed. Dělostřelectvo umožní [ROOT.GetNonIdeologyName] bránit se z hor a útočit nejefektivněji, drtíc opozici deštěm olova." # todo: NEW TRANSLATION
  SWI_industrial_production: "Průmyslová výroba" # todo: NEW TRANSLATION
  SWI_industrial_production_desc: "Nemůžeme ignorovat domácí frontu. Každá schopná ruka v kantonech [ROOT.GetNonIdeologyName] musí být ochotná obětovat se pro náš válečný stroj." # todo: NEW TRANSLATION
  SWI_swiss_heavy_planes: "Švýcarská těžká letadla" # todo: NEW TRANSLATION
  SWI_swiss_heavy_planes_desc: "Z našich základen v [ROOT.GetNonIdeologyName] můžeme vykonávat operace daleko, pokud budeme mít těžká letadla, ale nejprve je musíme navrhnout." # todo: NEW TRANSLATION
  SWI_air_research: "Výzkum letectví" # todo: NEW TRANSLATION
  SWI_air_research_desc: "Jsme připraveni zvýšit výzkum a vývoj nových leteckých technologií, pokud chceme držet krok s pokrokem nepřítele a nakonec ovládnout oblohu." # todo: NEW TRANSLATION
  SWI_air_production: "Výroba letadel" # todo: NEW TRANSLATION
  SWI_air_production_desc: "Mít návrhy letadel je jen první krok; druhý je vyrobit jich dost, abychom mohli naše piloty držet ve vzduchu a bojovat s nepřítelem na zemi i ve vzduchu." # todo: NEW TRANSLATION
  SWI_mountaneer_paratroopers: "Horské parašutisté" # todo: NEW TRANSLATION
  SWI_mountaneer_paratroopers_desc: "[ROOT.GetNonIdeologyName] je známo svými strmými vrcholy a mnoho našich občanů žije v horách. Můžeme toho využít a vycvičit vynikající parašutisty, jednotku, která může seskočit z cizí oblohy a obsadit zahraniční hory pro slávu [ROOT.GetNameDef]." # todo: NEW TRANSLATION
  SWI_purchase_american_planes: "[SWI_purchase_democratic_planes_title]" # todo: NEW TRANSLATION
  SWI_purchase_american_planes_usa: "Koupit americká letadla" # todo: NEW TRANSLATION
  SWI_purchase_american_planes_other: "Koupit letadla od demokratické země" # todo: NEW TRANSLATION
  SWI_purchase_american_planes_desc: "Naše letectvo postrádá potřebné počty a technologii, proto musíme hledat jinde pro vybavení. [SWI_purchase_american_planes_second_paragraph]" # todo: NEW TRANSLATION
  SWI_american_planes_desc_usa: "Pokud budeme kupovat letadla od jiné země, [USA.GetNameDef], se svou tradicí demokracie, relativní neutralitou a vynikajícím aerotechnickým průmyslem je ideálním kandidátem." # todo: NEW TRANSLATION
  SWI_american_planes_desc_other: "Protože nemůžeme ohrozit naše demokratické hodnoty kvůli pár letadlům, je důležité, aby vybavení pocházelo od jiné demokracie; [?SWI.SWI_best_dem_ally.GetNameDef] se zdá být nejlepší volbou." # todo: NEW TRANSLATION
  SWI_allied_gold: "Spojenecké zlato" # todo: NEW TRANSLATION
  SWI_allied_gold_desc: "Chaotické události a sankce omezily obchod se zlatem, ale díky naší neutralitě můžeme otevřít možnost zvýšeného zlatého obchodu s demokratickými zeměmi a tak podpořit jejich ekonomiky v boji proti fašismu." # todo: NEW TRANSLATION
  SWI_closer_democratic_ties: "Bližší demokratické vazby" # todo: NEW TRANSLATION
  SWI_closer_democratic_ties_desc: "Jak autoritářství vrhá stín na Evropu, možná sami neobstojíme, ale spoluprací s jinými demokraciemi můžeme zastavit jeho postup. Prvním krokem je navázat bližší vztahy a ukázat, že můžeme přispět." # todo: NEW TRANSLATION
  SWI_connect_to_the_maginot_line: "Spojit s Maginotovou linií" # todo: NEW TRANSLATION
  SWI_connect_to_the_maginot_line_desc: "Válka směřuje k [FRA.GetName] a je velká šance, že její nepřítel bude obcházet Masignotovu linii, což nás staví do nebezpečné polohy, protože [?SWI.SWI_biggest_fascist.GetNonIdeologyName] by se mohl pokusit obejít ji skrz nás. Proto musíme koordinovat s [FRA.GetName] a vytvořit jednotný front." # todo: NEW TRANSLATION
  SWI_american_industrial_investments: "Americké průmyslové investice" # todo: NEW TRANSLATION
  SWI_american_industrial_investments_desc: "Velká válka ukázala, že [USA.GetAdjective] průmyslová síla může obrátit jakýkoliv osud. Pokud je přimějeme investovat do nás, posílí to naši pozici a zajistí, že obrana naší nezávislosti bude v jejich zájmu." # todo: NEW TRANSLATION
  SWI_take_a_stance: "Zaujmout postoj" # todo: NEW TRANSLATION
  SWI_take_a_stance_desc: "Fašistický [?SWI_biggest_fascist.GetNonIdeologyName] je zvrhlý systém. [?SWI_biggest_fascist.GetNameDefCap] je smrtelný nepřítel nové [ROOT.GetName]; proto musíme stát a bránit naši demokracii za každou cenu." # todo: NEW TRANSLATION
  SWI_join_france: "Přidat se k Francii" # todo: NEW TRANSLATION
  SWI_join_france_desc: "Ač nerozumíme si vždy, [ROOT.GetName] a [FRA.GetName] sdílejí demokratické hodnoty a jazyk; pokud bychom si museli vybrat stranu v blížícím se konfliktu, jejich ochrana je jednoznačně lepší volba." # todo: NEW TRANSLATION
  SWI_the_second_helvetic_republic: "Druhá helvetská republika" # todo: NEW TRANSLATION
  SWI_the_second_helvetic_republic_desc: "V roce 1798 Napoleon Bonaparte dobyl [ROOT.GetName] a zřídil Helvetskou republiku jako nástroj podrobení. Naštěstí jsou ty časy pryč a nyní můžeme doufat v spravedlivější unii se starším sousedem." # todo: NEW TRANSLATION
  SWI_alpine_aspirations: "Alpská aspirace" # todo: NEW TRANSLATION
  SWI_alpine_aspirations_desc: "Centrální vláda [ROOT.GetNonIdeologyName] se rozrostla a zralá; nyní máme zdroje řídit větší území. Měli bychom požádat [FRA.GetNameDef] o rozšíření naší zóny kontroly, abychom byli blíže k sjednocení Alp pod jedním praporem." # todo: NEW TRANSLATION
  SWI_support_allied_espionage: "Podporovat spojeneckou špionáž" # todo: NEW TRANSLATION
  SWI_support_allied_espionage_desc: "Naše neutralita nám nebrání tajně podporovat jiné demokratické státy v potlačování fašismu v Evropě. Právě naše neutralita a blízkost k [?SWI.SWI_biggest_fascist.GetNameDef] nás dělá klíčovými v mezinárodním boji proti fašismu." # todo: NEW TRANSLATION
  SWI_expand_spy_networks: "Rozšířit špionážní sítě" # todo: NEW TRANSLATION
  SWI_expand_spy_networks_desc: "Nepřítel je venku; musíme se dostat do pole, abychom bránili hranice a domácí frontu. Naše špionážní sítě mohou být základem obrany, která bude zvenčí vypadat neutrálně a neškodně." # todo: NEW TRANSLATION
  SWI_share_spy_networks: "Sdílet špionážní sítě" # todo: NEW TRANSLATION
  SWI_share_spy_networks_desc: "[?SWI.SWI_best_dem_ally.GetNameDefCap] má stejný cíl jako my: udržet fašismus na uzdě. Nemusíme tím urazit [?SWI.SWI_biggest_fascist.GetNameDef]. [ROOT.GEtName] má přístup k zkušeným operativcům, kteří se mohou infiltrují do [GER.GetAdjective], [ITA.GetAdjective] a [FRA.GetAdjective] společností; můžeme to nabídnout [?SWI.SWI_best_dem_ally]." # todo: NEW TRANSLATION
  SWI_secret_pact_with_the_allies: "Tajná dohoda se spojenci" # todo: NEW TRANSLATION
  SWI_secret_pact_with_the_allies_desc: "[ROOT.GetName] není připraven na otevřený vstup do války, ale nebudeme v bezpečí bez přátel. Tajně se můžeme setkat s [?SWI.SWI_best_dem_ally.GetNameDef] a dohodnout se, že je budeme potají podporovat při přípravách na vstup do války; výměnou nám oni pomohou, pokud budeme napadeni." # todo: NEW TRANSLATION
  SWI_oasis_of_democracy: "Oáza demokracie" # todo: NEW TRANSLATION
  SWI_oasis_of_democracy_desc: "Nepřátelé demokracie obklopují [ROOT.GetName], proto v těchto bouřlivých časech musíme stát pevně při našich hodnotách. [ROOT.GetName] a její demokracie jsou neoddělitelné; není smysl přežít jako země, pokud naše demokracie zanikne." # todo: NEW TRANSLATION
  SWI_oasis_of_democracy_tt: "Když je fokus §Y$SWI_axis_gold$§! dokončen a alespoň §Y1§! fašistická země má duch §Y$SWI_gold_trade$§!:" # todo: NEW TRANSLATION
  SWI_volunteer_force: "Dobrovolnické síly" # todo: NEW TRANSLATION
  SWI_volunteer_force_desc: "Ještě nejsme ve válce, ale [ROOT.GetAdjective] lidé jsou připraveni bojovat za demokracii. Nemůžeme být navenek zjevní, ale jako demokracie nemůžeme kontrolovat, kam naši lidé půjdou a kde budou bojovat; můžeme to tiše povzbudit jako přípravu na pozdější otevřené zapojení." # todo: NEW TRANSLATION
  SWI_export_saboteurs: "Vyvážet sabotéry" # todo: NEW TRANSLATION
  SWI_export_saboteurs_desc: "Nemusíme vstoupit do války, pokud můžeme zničit nepřátele zevnitř. Naše zpravodajská agentura může zdokonalit operace k agitaci a posílení odboje v okupovaných územích a postupně oslabit jejich moc." # todo: NEW TRANSLATION
  SWI_lay_the_groundwork: "Položit základy" # todo: NEW TRANSLATION
  SWI_lay_the_groundwork_desc: "Abychom byli připraveni na totální válku, potřebujeme solidní základ. Infrastruktura a dopravní sítě [ROOT.GetName] musí být vylepšeny a modernizovány. Teprve potom budou občané efektivně mobilizováni." # todo: NEW TRANSLATION
  SWI_arsenal_of_the_alps: "Arzenál Alp" # todo: NEW TRANSLATION
  SWI_arsenal_of_the_alps_desc: "Naše strmé vrcholy, silné opevnění a znalost terénu z Alp dělají ideální místo pro dramatické zvýšení našeho vojenského potenciálu a uchování kapacit pro případ ústupu." # todo: NEW TRANSLATION
  SWI_thunder_in_the_valleys: "Hřmění v údolích" # todo: NEW TRANSLATION
  SWI_thunder_in_the_valleys_desc: "Obrněná válka nemá místo v horách, které známe, ale pokud chceme být na útočné straně a zasáhnout nepřítele dříve, musíme rychle dohnat vývoj vozidel." # todo: NEW TRANSLATION
  SWI_fighting_for_the_hills: "Boj o kopce" # todo: NEW TRANSLATION
  SWI_fighting_for_the_hills_desc: "Pěchota je nakonec nejuniverzálnějším prvkem našich ozbrojených sil. Ač se [ROOT.GetNonIdeologyName] pyšní pěchotou, už skoro sto let nevedla válku; je proto nezbytné revidovat a zaktualizovat pěchotní technologie a doktríny." # todo: NEW TRANSLATION
  SWI_fly_over_the_mountains: "Přelétat přes hory" # todo: NEW TRANSLATION
  SWI_weapons_of_democracy: "Zbraně demokracie" # todo: NEW TRANSLATION
  SWI_weapons_of_democracy_desc: "Než nepřítel učiní neodpustitelné, musíme být připraveni udělat, co je nutné k jejich zastavení, i za cenu použití ničivých zbraní, které mohou seslat peklo na naše protivníky. To je jistě odstraší od dalších zvěrstev." # todo: NEW TRANSLATION
  SWI_jump_into_action: "Přistoupit k akci" # todo: NEW TRANSLATION
  SWI_jump_into_action_desc: "Ještě před deseti lety by to bylo nemyslitelné, ale [ROOT.GetNameDef] připravil vše pro otevřené zapojení do války. Připravili jsme infrastrukturu, průmysl a vědecké instituce pro totální konflikt. [ROOT.GetAdjective] válečný stroj je připraven zaútočit." # todo: NEW TRANSLATION
  SWI_exiled_government: "Exilová vláda" # todo: NEW TRANSLATION
  SWI_exiled_government_desc: "Navzdory našemu nejlepšímu úsilí se zdá, že jsme selhali v obraně naší vlasti, takže nám nezbývá jiná možnost než bojovat o její znovuzískání z dálky. [ROOT.GetAdjective] demokratické hodnoty jsou tím, co umožnilo naší zemi tak dlouho vzkvétat, a budou našimi vodítky k jejímu znovuzískání; koneckonců [ROOT.GetName] není definováno svým územím nebo jazykem jeho obyvatel, ale naší vzájemnou úctou a podporou." # todo: NEW TRANSLATION
  SWI_join_the_allies: "Připojit se k Alianci" # todo: NEW TRANSLATION
  SWI_join_the_allies_desc: "Materiální oběti a morální kompromisy, které vyžaduje udržování naší neutrality, se stávají nesnesitelnými. Pro neutralitu už není místo, zvláště v současném politickém stavu Evropy. Navzdory jejich selháním jsou spojenci naší nejlepší volbou, pokud chceme zachovat naši zemi a naši konfederaci. Toto je opravdu čas jako žádný jiný." # todo: NEW TRANSLATION
  SWI_gotthardbund_party_name: "Gotthardbund" # todo: NEW TRANSLATION
  SWI_gotthardbund_party_name_long: "Gotthardbund" # todo: NEW TRANSLATION
  SWI_the_alpine_confederation: "Alpská konfederace" # todo: NEW TRANSLATION
  SWI_the_alpine_confederation_desc: "Naše velká země se rozšířila za hranice našich historických mezí, a zatímco nové kantony v naší péči získají stejný status jako Schwyz, musíme uznat naši novou roli jako správců Alp. Vzniká nová demokratická moc: Alpská konfederace!" # todo: NEW TRANSLATION
  SWI_the_alpine_confederation_chance_TT: "\nBudou s větší pravděpodobností ochotni udělit nám nezávislost na základě §Yvelikosti§! našich ozbrojených sil, a také to zvýší naše šance, že nám přidělí další alpská území v závislosti na jejich §Ynázoru§! na nás." # todo: NEW TRANSLATION
  SWI_gotthard_union: "Gotthardbund" # todo: NEW TRANSLATION
  SWI_gotthard_union_desc: "Čas na hádky a frakcionářství skončil. Je čas, aby se [ROOT.GetNonIdeologyName] sjednotilo pod jedinou demokracií s kategorickou pravomocí činit razantní opatření. Všechno ve jménu přežití našich [ROOT.GetAdjective] tradic a hodnot. Budeme odolávat a zvítězíme!" # todo: NEW TRANSLATION
  SWI_press_for_vorarlberg: "Usilovat o Vorarlberg" # todo: NEW TRANSLATION
  SWI_press_for_vorarlberg_desc: "Jelikož vláda [AUS.GetAdjective] zůstává v troskách, musíme naplnit demokratickou vůli [848.GetName], vyjádřenou v jejich referendu z roku 1919, a integrovat je do naší demokracie. Je povinností [ROOT.GetNameDef] chránit je před fašismem a autokracií." # todo: NEW TRANSLATION
  SWI_pre_empt_anschluss: "Předejít Anschluss" # todo: NEW TRANSLATION
  SWI_pre_empt_anschluss_desc: "Objevují se zvěsti, že [GER.GetNameDef] chce anektovat [AUS.GetName] jménem [GER.GetAdjective] jednoty. To není něco, co by [ROOT.GetNAmeDef] mohl(a) dovolit, protože by to posílilo [GER.GetNameDef] v tom, aby uplatňoval stejné nároky na naše německy mluvící kantony. Musíme spěchat a připravit půdu pro obranu celého [AUS.GetName]." # todo: NEW TRANSLATION
  SWI_pre_empt_anschluss_tt: "§YPokud [AUS.GetNameDef] přijmou, získáme nároky na jejich hlavní státy§! \n\nS větší pravděpodobností přijmou na základě §Yvelikosti§! našich ozbrojených sil, jejich §Ynázoru§! na nás a pokud §Yse [GER.GetNameDef] připravuje§! na anektování [AUS.GetName]." # todo: NEW TRANSLATION
  SWI_demand_italian_alps: "Požadovat italské Alpy" # todo: NEW TRANSLATION
  SWI_demand_italian_alps_desc: "Desítky let si [ITA.GetName] bezostyšně činila nároky na naše [ITA.GetAdjective] mluvící kantony. Pokud to mohou dělat oni, můžeme rozhodně požadovat, aby jejich Alpy vstoupily do našeho demokratického režimu; koneckonců patří do [ROOT.GetNameDef] stejně jako Ticino patří [ITA.GetNameDef]." # todo: NEW TRANSLATION
  SWI_demand_french_alps: "Požadovat francouzské Alpy" # todo: NEW TRANSLATION
  SWI_demand_french_alps_desc: "Je jen otázkou času, než se [FRA.GetNameDef] zhroutí pod vnitřními a vnějšími tlaky. Musíme zaujmout proaktivní postoj v obraně Alp, jinak by nebezpečný nepřítel mohl ovládnout bránitelné pozice, které mohou sloužit jako odrazový můstek pro invazi na naše území." # todo: NEW TRANSLATION
  SWI_alpine_redoubt: "Alpské útočiště" # todo: NEW TRANSLATION
  SWI_alpine_redoubt_desc: "Pokud máme opevněné útočiště, kam se můžeme stáhnout, můžeme být proti vetřelcům nezastavitelnou silou. Musíme učinit Alpy ještě nepropustnějšími a odtud rozšiřovat náš vliv, teprve pak si můžeme udělat odstup od nepřítele, kdekoli by byl.." # todo: NEW TRANSLATION
  SWI_the_alpine_protectorate: "Alpský protektorát" # todo: NEW TRANSLATION
  SWI_the_alpine_protectorate_desc: "Nikdy předtím nebyly Alpy sjednoceny pod jedním režimem, až do dneška. Díky spojené moci se můžeme bránit proti jakékoliv hrozbě a rozšířit tu obranu i za hranice Alp, s našimi vrcholy jako neprostupnou citadelou, odkud se naše velení nikdy nezhroutí." # todo: NEW TRANSLATION
  SWI_bring_democracy_to_germany: "Přinést demokracii do Německa" # todo: NEW TRANSLATION
  SWI_bring_democracy_to_germany_desc: "Třetí říše je nejvzdálenější, kam se dá od demokracie dostat, Výmarská republika předtím byla pouhým rukojmím vítězných mocností Velké války a válečnický režim starého [GER.GetNonIdeologyName] byl jen nástrojem císařových dravých ambic. Je načase, aby naši sousedé na severu poznali, co demokracie znamená." # todo: NEW TRANSLATION
  SWI_liberate_italy: "Osvobodit Itálii" # todo: NEW TRANSLATION
  SWI_liberate_italy_desc: "Staletími [ROOT.GetNonIdeologyName] vidělo, jak se malá městská státy a království na jihu navzájem perou a nakonec jsou pohlceny slabou monarchií. Je správné, aby [ITA.GetNonIdeologyName] byla osvobozena od okovů autokracie a fašismu svým starším sourozenecem." # todo: NEW TRANSLATION
  SWI_take_over_france: "Chránit Francii" # todo: NEW TRANSLATION
  SWI_take_over_france_desc: "[FRA.GetNonIdeologyName] byla vždy vrtkavým národem s častými otřesy, kde hod mince rozhodne, zda revoluce dne přinese slabou demokracii nebo militaristický režim. Pod [ROOT.GetAdjective] ochranou by mohl francouzský lid prospívat, řízen naším demokratickým stabilním zřízením." # todo: NEW TRANSLATION
  SWI_the_new_eidgenossenschaft: "Nová Eidgenossenschaft" # todo: NEW TRANSLATION
  SWI_the_new_eidgenossenschaft_desc: "Ve 13. století vůdci tří zakládajících kantonů složili slib věčné aliance, kterou nazýváme Eidgenossenschaft. Nyní je čas jej obnovit, aby mohl být rozšířen a více kantonů mohlo okusit naši demokratickou konfederaci." # todo: NEW TRANSLATION
  SWI_expand_the_confederation: "Rozšířit konfederaci" # todo: NEW TRANSLATION
  SWI_expand_the_confederation_desc: "Žádný národ není v bezpečí před rychlým postupem totalitarismu; mnohé regiony v okolních státech mohou těžit z ochrany, kterou nabízí naše tradice neutrality, a pokud vypukne válka, naše ohromující obranné schopnosti." # todo: NEW TRANSLATION
  SWI_empower_the_council: "Posílit Radu" # todo: NEW TRANSLATION
  SWI_empower_the_council_desc: "Nebezpečí číhá všude kolem nás, a když na nás zaútočí, budeme bezmocní, pokud se začneme hádat mezi sebou; naši nepřátelé setřou [ROOT.GetName] z mapy. Silná centralizovaná vláda je v těchto nestálých časech jistě jediná cesta." # todo: NEW TRANSLATION
  SWI_switzerland_on_the_offense: "Švýcarsko do útoku" # todo: NEW TRANSLATION
  SWI_switzerland_on_the_offense_desc: "Nemůžeme spočívat na horách a čekat na útok. Musíme převzít iniciativu a přenést boj k našim nepřátelům dříve, než nás budou schopni napadnout. Teprve tehdy si můžeme být jisti, že je přežití [ROOT.GetNameDef] zajištěno. Koneckonců, nejlepší obranou je silný útok." # todo: NEW TRANSLATION
  SWI_neutral_entente: "Neutrální ententa" # todo: NEW TRANSLATION
  SWI_neutral_entente_desc: "Nejsme jediným neutrálním národem na světě, a vzhledem k riziku války a válečných mocností, které ohrožují naše přání zůstat mimo jejich konflikty, musíme je ještě více odradit. Musíme usilovat o vzájemnou pomoc všech ostatních neutrálních států, aby válka proti jednomu neutrálnímu znamenala válku proti všem neutrálním." # todo: NEW TRANSLATION
  SWI_plains_warfare: "Válka na rovinách" # todo: NEW TRANSLATION
  SWI_plains_warfare_desc: "[ROOT.GetName] má bohaté zkušenosti s výcvikem v údolích, horách, na kopcích a v lesích, ale pokud máme bojovat v cizích zemích, musíme se přizpůsobit moderním doktrínám války. Viděli jsme, jak rychle se pohybující mechanizovaná pěchota může šokovat obranu a přinést rychlé vítězství, takže se z toho můžeme poučit a přivést [ROOT.GetAdjective] armádu do 20. století." # todo: NEW TRANSLATION
  SWI_multipurpose_tanks: "Víceúčelové tanky" # todo: NEW TRANSLATION
  SWI_multipurpose_tanks_desc: "Stejně jako všestranné multifunkční nože, které vydáváme naší pěchotě, potřebujeme stroje, které mohou zaplnit jakoukoli mezeru a splnit jakékoliv úkoly potřebné pro naše válečné úsilí. Musíme dohnat zpoždění v tankové válce, takže musíme vyvíjet širokou škálu typů, abychom měli komplexní sílu." # todo: NEW TRANSLATION
  SWI_rolling_fortresses: "Pojízdné pevnosti" # todo: NEW TRANSLATION
  SWI_rolling_fortresses_desc: "Naše tanky mohou být součástí našich současných obranných doktrín, takže představují pokročilé postavení pevností, které brání naše hory. Pokud nepřítel nemůže prolézt našimi opevněnými frontovými liniemi, nikdy se nedostane k našim kantonům." # todo: NEW TRANSLATION
  SWI_extended_supply_lines: "Prodloužené zásobovací trasy" # todo: NEW TRANSLATION
  SWI_extended_supply_lines_desc: "Ve světě rychlých ofenzív a dlouhých operací jsou zásobovací logistika důležitější než kdy dříve, a když se budeme vydávat dále od našich kantonů, vznikne potřeba nových a lepších zásobovacích tras. Musíme se naučit zlepšit naši logistiku, abychom mohli prodloužit zásobovací trasy a stavět nové rychleji." # todo: NEW TRANSLATION
  SWI_dissolve_the_federal_council: "Rozpustit federální radu" # todo: NEW TRANSLATION
  SWI_president_for_life: "Prezident na doživotí" # todo: NEW TRANSLATION
  SWI_president_for_life_desc: "Federální rada je v Evropě jedinečná, dobře sloužila [ROOT.GetNonIdeologyName] v dobách míru, ale nyní, když je jasné, že [?SWI.SWI_confederation_president.GetName] vede radu a zemi jako celek, existuje dobrý argument pro to, aby vláda [?SWI.SWI_confederation_president.GetHerHis] pokračovala neomezeně jako pilíř stability v [ROOT.GetNameDef]." # todo: NEW TRANSLATION
  SWI_guisans_coup: "Guisanův puč" # todo: NEW TRANSLATION
  SWI_guisans_coup_desc: "[?SWI.SWI_confederation_president.GetName] zavedl naši skvělou a mírumilovnou zemi do války a bídy. Toto není [ROOT.GetNonIdeologyName], které známe a milujeme; bylo zkorumpováno ve jménu sebezáchovy. Je tu jen jeden muž natolik oblíbený a schopný, aby tuto válku jednou provždy ukončil a snad navrátil tuto kdysi neutrální zemi ke jejím kořenům; Henri Guisan." # todo: NEW TRANSLATION
  SWI_return_to_the_old_switzerland: "Návrat ke starému Švýcarsku" # todo: NEW TRANSLATION
  SWI_return_to_the_old_switzerland_desc: "Nyní, když se válka chýlí ke konci, můžeme konečně podniknout kroky k navrácení [ROOT.GetNonIdeologyName] tomu, čím byla předtím; demokratickému a neutrálnímu národu založenému na principech vzájemné úcty a sebeurčení. Jakmile válka skončí, konečně budeme moci vynucovat demokracii a neutralitu kolem nás." # todo: NEW TRANSLATION
  SWI_a_swiss_navy: "Švýcarské námořnictvo" # todo: NEW TRANSLATION
  SWI_a_swiss_navy_desc: "Poprvé v [ROOT.GetAdjective] historii máme pobřeží. To znamená, že ho můžeme využít k vedení válek na moři, ale také to znamená, že máme novou frontu k obraně; musíme zvýšit úsilí o vybudování námořnictva pro [ROOT.GetName]." # todo: NEW TRANSLATION
  SWI_buy_foreign_surplus_ships: "Koupit přebytečné zahraniční lodě" # todo: NEW TRANSLATION
  SWI_buy_foreign_surplus_ships_desc: "Přebytky jedné země jsou pro jinou námořnictvem. Mnohé z velkých námořních mocností mají nyní flotily plné zcela nových lodí, což znamená, že staré lodě jsou téměř zastaralé a jejich udržování je pro ně nákladné. Pokud chceme rychle vybudovat námořní sílu, není lepší způsob než koupit od nich nechtěné lodě." # todo: NEW TRANSLATION
  SWI_swiss_ship_designs: "Švýcarské návrhy lodí" # todo: NEW TRANSLATION
  SWI_swiss_ship_designs_desc: "Možná nemáme mnoho zkušeností s navrhováním a výrobou mořských válečných plavidel, ale čím dříve začneme, tím dříve si mezi starými a velkými námořními mocnostmi jako [ENG.GetNameDef] a [ITA.GetName] postavíme vlastní reputaci." # todo: NEW TRANSLATION
  SWI_submarine_raiders: "Ponorkoví nájezdníci" # todo: NEW TRANSLATION
  SWI_submarine_raiders_desc: "Ať si staré námořní mocnosti ponechají své mohutné hromady oceli. Zatímco ony budou bojovat hrubou silou na povrchu, my budeme bojovat důmyslně pod hladinou s našimi ponorkami a odebírat jim kousky z jejich zastaralé námořní moci." # todo: NEW TRANSLATION
  SWI_floating_fortresses: "Plovoucí pevnosti" # todo: NEW TRANSLATION
  SWI_floating_fortresses_desc: "Umíme stavět pevnosti k obraně našich hor a údolí; nyní, když máme pobřeží, je nesmírně důležité, abychom toto rozšířili i na moře. Naše plavidla budou nezničitelná." # todo: NEW TRANSLATION
  SWI_naval_industry: "Námořní průmysl" # todo: NEW TRANSLATION
  SWI_naval_industry_desc: "I když nově získané pobřežní území může mít nějaké zbytky námořního průmyslu, musíme rychle tento průmysl rozsáhle rozšířit a vytvořit koherentní rámec výroby a údržby důstojný opravdu mocného švýcarského námořnictva." # todo: NEW TRANSLATION
  SWI_naval_industry_tt: "Přidá §G1§! stavební slot a §Y1 loděnici§! v každém pobřežním státě. (Max. 10)" # todo: NEW TRANSLATION
  SWI_build_naval_bases: "Vybudovat námořní základny" # todo: NEW TRANSLATION
  SWI_build_naval_bases_desc: "Základny, které jsme dobyli, nestačí, a nedokážeme dostatečně rychle postavit nové, abychom dohnali to, co požadujeme. Musí být vyvinuto nové úsilí, abychom dosáhli našich námořních cílů." # todo: NEW TRANSLATION
  SWI_build_naval_bases_tt: "Přidá §Y2 námořní základny§! ke každé existující §Ynámořní základně§!. (Max. 15)" # todo: NEW TRANSLATION
  SWI_train_navy_staff: "Školit námořní personál" # todo: NEW TRANSLATION
  SWI_protect_liechtenstein: "Chránit Lichtenštejnsko" # todo: NEW TRANSLATION
  SWI_protect_liechtenstein_desc: "Zaklíněné mezi třemi našimi kantony, malé knížectví Lichtenštejnsko musí být chráněno, aby byl zajištěn jejich lid. Koneckonců proti žádné cizí armádě, včetně té naší, by neměli šanci. Můžeme jim nabídnout naši pomoc obsazením jejich území; mohou se připojit k naší přísaze a stát se naším nejnovějším kantonem." # todo: NEW TRANSLATION
  SWI_train_navy_staff_desc: "Námořní infrastruktura se nebuduje pouze z oceli a betonu; vyžaduje také muže a ženy s odvahou a výcvikem, kteří dokážou přinést vítězství na moři a oceánech." # todo: NEW TRANSLATION
  SWI_reduce_militia_activation_time_TT: "Čas potřebný k plné mobilizaci našich §YObčanských milicí§! bude zkrácen o §G$RIGHT|0$§! dní" # todo: NEW TRANSLATION
  SWI_generic_fascist_neighbor_cap: "Náš fašistický soused" # todo: NEW TRANSLATION
  SWI_generic_fascist_neighbor: "náš fašistický soused" # todo: NEW TRANSLATION
  SWI_secret_pact_with_allies_TT: "Pokud se ocitneme ve válce, okamžitě se připojíme k jejich frakci." # todo: NEW TRANSLATION
  SWI_neutral_entente_faction: "Neutrální ententa" # todo: NEW TRANSLATION
  SWI_militias_turned_into_regulars: "Občanské milice byly profesionalizovány" # todo: NEW TRANSLATION
  SWI_old_switzerland_TT: "\n§YJakmile válka skončí:§!\n" # todo: NEW TRANSLATION
  SWI_viable_fascist_in_europe: "Existuje životaschopný evropský §Yfašistický stát§!" # todo: NEW TRANSLATION
  HOA_develop_capitalstate: "Rozvíjet [Root.Capital.GetName]" # todo: NEW TRANSLATION
  HOA_develop_capitalstate_desc: "Musíme zvýšit tempo industrializace pro blaho našeho lidu a ochranu [ROOT.GetNameDef]. Proto investujeme do oblasti kolem [ROOT.Capital.GetCapitalVictoryPointName] a proměníme ji v průmyslové srdce národa." # todo: NEW TRANSLATION
  HOA_the_state_bank_of_name: "Státní banka [ROOT.GetNameDef]" # todo: NEW TRANSLATION
  HOA_the_state_bank_of_name_desc: "Rozšířením zdrojů centrální banky [ROOT.GetNameDef] můžeme lidem poskytnout novou úvěrovou linku a fungovat jako finanční diuretikum pro nemocnou [ROOT.GetAdjective] ekonomiku." # todo: NEW TRANSLATION
  HOA_pave_the_roads: "Zpevnit silnice" # todo: NEW TRANSLATION
  HOA_pave_the_roads_desc: "Přeprava lidí a zboží napříč [ROOT.GetNameDef] je v současnosti příliš neefektivní. Investice do našich silnic by nejen prospěla ekonomice, ale také by nás více zabezpečila tím, že umožní snazší přesuny vojenských prostředků." # todo: NEW TRANSLATION
  HOA_the_steam_locomotive: "Parní lokomotiva" # todo: NEW TRANSLATION
  HOA_the_steam_locomotive_desc: "Zatímco auta a nákladní vozy jsou užitečné pro krátké vzdálenosti nebo malé množství, vlaky jsou mnohem efektivnější při přepravě obrovského množství zboží a lidí. Investice do naší železniční sítě by byly velkým posílením ekonomiky národa." # todo: NEW TRANSLATION
  HOA_the_adjective_regional_development_fund: "Regionální rozvojový fond [ROOT.GetAdjective]" # todo: NEW TRANSLATION
  HOA_state_owned_industry_tt: "Upraví §Y$ETH_state_development_dynamic_modifier$§! následovně:\n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+15%§!\n$MODIFIER_LOCAL_BUILDING_SLOTS$: §G+15%§!" # todo: NEW TRANSLATION
  HOA_the_adjective_regional_development_fund_desc: "Regiony [ROOT.GetNameDef] stagnují a zoufale potřebují investice. Vytvořením regionálního rozvojového fondu zajistíme místním vládám nástroje nezbytné k modernizaci jejich regionu." # todo: NEW TRANSLATION
  HOA_the_adjective_industrial_fund: "Průmyslový fond [ROOT.GetAdjective]" # todo: NEW TRANSLATION
  HOA_the_adjective_industrial_fund_desc: "[ROOT.GetNameDefCap] je alarmujícím způsobem nedostatečně industrializovaná. Pokud chceme zlepšit životy lidí a mít kapacitu je chránit před cizí agresí, musíme národ rychle industrializovat." # todo: NEW TRANSLATION
  HOA_exploit_national_resources: "Využít národní zdroje" # todo: NEW TRANSLATION
  HOA_exploit_national_resources_desc: "[ROOT.GetNameDefCap] má hojnou zásobu přírodních zdrojů, které čekají na využití. Malou investicí bychom konečně mohli začít tyto zdroje těžit." # todo: NEW TRANSLATION
  HOA_support_the_agrarians: "Podporovat agrárníky" # todo: NEW TRANSLATION
  HOA_support_the_agrarians_desc: "Venkovské obyvatelstvo [ROOT.GetNameDef] pracující v zemědělství je páteří národa. Proto bychom je měli více podporovat v jejich zásadní práci." # todo: NEW TRANSLATION
  HOA_support_the_agrarians_tt: "Upraví §Y$ETH_state_development_dynamic_modifier$§! následovně:\n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10%§!\n$MODIFIER_LOCAL_BUILDING_SLOTS$: §G+10%§!" # todo: NEW TRANSLATION
  HOA_promote_local_crafts: "Podporovat místní řemeslnou výrobu" # todo: NEW TRANSLATION
  HOA_promote_local_crafts_desc: "[ROOT.GetNameDefCap] má mnoho zručných řemeslníků pracujících v malém měřítku na zásobování národa zbožím. Měli bychom navázat na jejich odborné znalosti a usnadnit jim rozšíření provozu a výroby jejich produktů." # todo: NEW TRANSLATION
  HOA_use_the_natural_harbors: "Využít přirozené přístavy" # todo: NEW TRANSLATION
  HOA_use_the_natural_harbors_desc: "S naší nedávnou akvizicí pobřežní země máme příležitost výrazně zvýšit přístup na mezinárodní trhy založením vlastního přístavu. Usnadní to import a export zboží a výrazně pomůže naší ekonomice." # todo: NEW TRANSLATION
  HOA_the_capital_city_airport: "Letiště [Root.Capital.GetCapitalVictoryPointName]" # todo: NEW TRANSLATION
  HOA_the_capital_city_airport_desc: "Letecká doprava stále více spojuje města světa s globální ekonomikou. Měli bychom zřídit vlastní letiště, abychom využili tohoto trendu." # todo: NEW TRANSLATION
  HOA_a_steamboat_fleet: "Flotila parníků" # todo: NEW TRANSLATION
  HOA_a_steamboat_fleet_desc: "Abychom chránili naše pobřeží a námořní trasy, musíme vybudovat flotilu pobřežních lodí schopných odradit jakoukoli cizí agresi." # todo: NEW TRANSLATION
  HOA_improved_irrigation_systems: "Vylepšené zavlažovací systémy" # todo: NEW TRANSLATION
  HOA_improved_irrigation_systems_desc: "Nemůžeme mít národní bezpečnost bez robustní kapacity produkce potravin. Abychom zvýšili výnosy plodin, investujeme do masivního zavlažovacího programu napříč naší ornou půdou." # todo: NEW TRANSLATION
  HOA_improved_irrigation_systems_tt: "Upraví §Y$ETH_state_development_dynamic_modifier$§! následovně:\n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+15%§!\n$MODIFIER_LOCAL_BUILDING_SLOTS$: §G+15%§!" # todo: NEW TRANSLATION
  HOA_the_adjective_air_fleet: "Letecká flotila [ROOT.GetAdjective]" # todo: NEW TRANSLATION
  HOA_the_adjective_air_fleet_desc: "Vzdušné válčení se rychle stává klíčovou oblastí, ve které se rozhoduje vítěz konfliktu. Proto musíme vybudovat vlastní letectvo a připravit jej na obranu nebes [ROOT.GetNameDef]." # todo: NEW TRANSLATION
  HOA_state-funded_projects: "Projekty financované státem" # todo: NEW TRANSLATION
  HOA_state-funded_projects_desc: "Naše ekonomika stagnuje kvůli nedostatku infrastruktury a průmyslu. Abychom tomu učinili přítrž, intenzivně investujeme do nových projektů po celém [ROOT.GetNameDef]." # todo: NEW TRANSLATION
  HOA_the_grand_university_of_capital: "Velká univerzita [Root.Capital.GetCapitalVictoryPointName]" # todo: NEW TRANSLATION
  HOA_the_grand_university_of_capital_desc: "Předávání znalostí z jedné generace na druhou je životně důležité pro bezpečnost a růst každého národa. Proto založíme novou velkou univerzitu v [ROOT.Capital.GetCapitalVictoryPointName], abychom lépe vzdělávali příští generaci vědců, historiků a umělců." # todo: NEW TRANSLATION
  HOA_the_adjective_armed_forces: "Ozbrojené síly [ROOT.GetAdjective]" # todo: NEW TRANSLATION
  HOA_the_adjective_armed_forces_desc: "Svět je stále méně stabilní, jak napětí mezi velmocemi roste. Pokud chceme uchovat naši nezávislost, musí být [ROOT.GetAdjective] armáda připravena na válku." # todo: NEW TRANSLATION
  HOA_warrior_tradition: "Válečnická tradice" # todo: NEW TRANSLATION
  HOA_warrior_tradition_desc: "[ROOT.GetNameDefCap] má dlouhou historii statečných bojovníků bránících své domovy před byrokraty dobývání. Nyní více než kdy jindy musíme tuto tradici využít pro obranu domoviny." # todo: NEW TRANSLATION
  HOA_strengthen_the_irregulars: "Posílit neregulérní jednotky" # todo: NEW TRANSLATION
  HOA_strengthen_the_irregulars_desc: "Systém neregulérních jednotek a odvedenců nám sloužil po staletí. Není mnoho důvodů měnit to, co se osvědčilo." # todo: NEW TRANSLATION
  HOA_every_man_a_warrior: "Každý muž válečníkem" # todo: NEW TRANSLATION
  HOA_every_man_a_warrior_desc: "Pokud má [ROOT.GetNameDef] úspěšně odolat cizím agresorům, musíme militarizovat společnost do takové míry, aby byl každý schopen v případě potřeby vzít do ruky zbraň pro národní obranu." # todo: NEW TRANSLATION
  HOA_names_finest: "Nejlepší z [ROOT.GetName]" # todo: NEW TRANSLATION
  HOA_names_finest_desc: "Naše jednotky vědí, že jsou jedinou překážkou tomu, aby se náš národ stal závislým na cizí moci. S touto vědomostí přichází neochvějné odhodlání bránit domovinu a zachovat [ROOT.GetAdjective] svobodu." # todo: NEW TRANSLATION
  HOA_utilize_our_strengths: "Využít naše silné stránky" # todo: NEW TRANSLATION
  HOA_utilize_our_strengths_desc: "I když naše armáda nemusí být tak rozsáhlá nebo formalizovaná jako armády jiných zemí, má mnoho neortodoxních dovedností, které lze na bojišti využít." # todo: NEW TRANSLATION
  HOA_reform_the_conscription: "Reformovat brannou povinnost" # todo: NEW TRANSLATION
  HOA_reform_the_conscription_desc: "S tím, jak se světová situace stává čím dál napjatější, je čas rozšířit program branné povinnosti, abychom byli připraveni na jakoukoli formu cizí agrese." # todo: NEW TRANSLATION
  HOA_eyes_on_the_imperialists: "Pozor na imperialisty" # todo: NEW TRANSLATION
  HOA_eyes_on_the_imperialists_desc: "Imperiální mocnosti v regionu sledují nezávislost [ROOT.GetNameDef] s pohrdáním. Musíme zůstat ostražití a vyhnout se tomu, abychom se stali obětí jejich ambicí." # todo: NEW TRANSLATION
  HOA_encourage_local_arms_production: "Podpořit místní výrobu zbraní" # todo: NEW TRANSLATION
  HOA_encourage_local_arms_production_desc: "Pokud nebudeme schopni zásobit naše jednotky vybavením, nebudou schopny adekvátně bránit národ. Proto musíme rozšířit kapacitu zbrojního průmyslu." # todo: NEW TRANSLATION
  HOA_metal_beasts: "Kovová monstra" # todo: NEW TRANSLATION
  HOA_metal_beasts_desc: "Stává se stále zřetelnějším, že obrněná vozidla budou hrát na bojišti čím dál větší roli. Armáda se musí naučit, jak tato vozidla nejlépe využívat a proti nim bojovat." # todo: NEW TRANSLATION
  HOA_the_roars_of_thunder: "Ryk hromu" # todo: NEW TRANSLATION
  HOA_the_roars_of_thunder_desc: "Někdy je na bojišti jediným způsobem, jak vyhnat nepřítele, ohromující palebná síla. Nejefektivnějším způsobem, jak ji uvolnit, je dělostřelectvo." # todo: NEW TRANSLATION
  HOA_develop_indigenous_models: "Vyvíjet domácí modely" # todo: NEW TRANSLATION
  HOA_develop_indigenous_models_desc: "Spoléhání se na zahraniční návrhy pro pěchotní vybavení nás vystavuje riziku technologického zaostávání. Tento bezpečnostní problém lze adekvátně řešit jen zvýšením domácí odbornosti ve vývoji ručních zbraní." # todo: NEW TRANSLATION
  HOA_the_steel_lions: "Oceloví lvi" # todo: NEW TRANSLATION
  HOA_the_steel_lions_desc: "Éra statické války je za námi. Je čas začít nasazovat naše specializované obrněné jednotky na bojiště a učit se metody pohyblivé války." # todo: NEW TRANSLATION
  HOA_warfare_from_afar: "Válka z dálky" # todo: NEW TRANSLATION
  HOA_warfare_from_afar_desc: "Dělostřelectvo opakovaně prokázalo svou hodnotu na bojišti. Měli bychom ho lépe využít tím, že specializované dělostřelecké jednotky těsněji integrujeme do pěších divizí." # todo: NEW TRANSLATION
  HOA_modern_infantry: "Moderní pěchota" # todo: NEW TRANSLATION
  HOA_modern_infantry_desc: "Naše armádní reformy významně zvýšily jejich efektivitu. Měli bychom na tomto postupu stavět zvýšením počtu divizí v poli." # todo: NEW TRANSLATION
  HOA_the_first_album: "[ROOT.GetNameDefCap]" # todo: NEW TRANSLATION
  HOA_the_first_album_desc: "Svět vypadá čím dál nebezpečněji, jak napětí mezi velmocemi roste, ale to také otevírá svět příležitostí pro ty národy, které jsou ochotné a připravené chopit se okamžiku." # todo: NEW TRANSLATION
  HOA_a_loyal_subject: "Lojální poddaný" # todo: NEW TRANSLATION
  HOA_a_loyal_subject_desc: "Jak se situace na světové scéně stává čím dál nestabilnější, je možná lepší být po nějakou dobu pod ochranou mocnějšího státu..." # todo: NEW TRANSLATION
  HOA_political_stability: "Politická stabilita" # todo: NEW TRANSLATION
  HOA_political_stability_desc: "Nemůžeme doufat v zachování nezávislého státu, pokud jsme doma rozděleni. Jen vytvořením jednotného frontu můžeme odolat tomu, abychom byli smeteni změnami, které obklopují svět." # todo: NEW TRANSLATION
  HOA_the_capital_railroad: "Železnice [Root.Capital.GetCapitalVictoryPointName]" # todo: NEW TRANSLATION
  HOA_the_capital_railroad_desc: "Propojením naší železniční sítě se sousedy můžeme lépe vyvážet naše zboží a suroviny k nim. To by mělo naději povzbudit naši ekonomiku." # todo: NEW TRANSLATION
  HOA_invite_foreign_settlers: "Pozvat zahraniční osadníky" # todo: NEW TRANSLATION
  HOA_invite_foreign_settlers_desc: "Je před námi stále velká práce při modernizaci národa. Měli bychom využít dovedností cizích osadníků tím, že vytvoříme pobídky pro jejich přesídlení do [ROOT.GetNameDef]." # todo: NEW TRANSLATION
  HOA_countryleader: "[ROOT.GetLeader]" # todo: NEW TRANSLATION
  HOA_countryleader_desc: "[ROOT.GetLeader] je jediná osoba, která může udržet národ pohromadě v těchto těžkých dobách, proto musí lidé podporovat [ROOT.GetLeader.GetHerHim]." # todo: NEW TRANSLATION
  HOA_securing_the_adjective_future: "Zajištění [ROOT.GetAdjective] budoucnosti" # todo: NEW TRANSLATION
  HOA_securing_the_adjective_future_desc: "[ROOT.GetNameDefCap] je malý národ s velmi málo přáteli na světové scéně. Změna tohoto stavu hodně přispěje k zajištění naší budoucí svobody a nezávislosti." # todo: NEW TRANSLATION
  HOA_improving_the_educational_system: "Zlepšení vzdělávacího systému" # todo: NEW TRANSLATION
  HOA_improving_the_educational_system_desc: "Naše děti drží osud národa ve svých rukou. Dát jim proto co nejlepší vzdělání hodně přispěje k zabezpečení budoucnosti [ROOT.GetNameDef]." # todo: NEW TRANSLATION
  HOA_construct_great_monuments: "Vystavět velké památníky" # todo: NEW TRANSLATION
  HOA_construct_great_monuments_desc: "[ROOT.GetAdjective] lid má mnoho důvodů být hrdý. Máme dlouhou historii, která by měla být připomenuta v památnících, které inspirují k usilování o stále větší výšiny." # todo: NEW TRANSLATION
  HOA_the_adjective_volunteer_force: "Dobrovolnické síly [ROOT.GetAdjective]" # todo: NEW TRANSLATION
  HOA_the_adjective_volunteer_force_desc: "Malé hraniční potyčky na jiném kontinentu mohou potenciálně vyvolat obrovské konflikty, které zachvátí svět. Musíme udělat vše pro to, abychom uhasili tyto jiskry dříve, než způsobí další Velkou válku." # todo: NEW TRANSLATION
  HOA_military_cooperation: "Vojenská spolupráce" # todo: NEW TRANSLATION
  HOA_military_cooperation_desc: "Zatímco činíme velké kroky ke zlepšení našich ozbrojených sil, existují lekce, které se můžeme naučit od našich mezinárodních přátel prostřednictvím společných cvičení a zvýšené vojenské spolupráce." # todo: NEW TRANSLATION
  HOA_that_which_is_rightfully_ours: "To, co nám právem náleží" # todo: NEW TRANSLATION
  HOA_that_which_is_rightfully_ours_desc: "[ROOT.GetNameDefCap] je stínem toho, čím by měla být. Historie ukazuje, že naši předci panovali nad mnohem širšími územími než naše současná správa, ale většina z nich nám byla v průběhu generací ukradena. Je čas vzít si zpět, co nám právem patří." # todo: NEW TRANSLATION
  HOA_commandos: "Komanda" # todo: NEW TRANSLATION
  HOA_commandos_desc: "Někdy ve válce může malá, ale dobře vycvičená skupina vojáků dosáhnout za nepřátelskými liniemi větších vítězství než největší armády na bojišti." # todo: NEW TRANSLATION
  HOA_a_jagged_alliance: "Nerovnoměrná aliance" # todo: NEW TRANSLATION
  HOA_a_jagged_alliance_desc: "I když s jinými národy nejsme vždy na stejném názoru, často čelíme stejným hrozbám. Soustředění se na tyto společné problémy může být základem trvalých aliancí a zvýšené národní bezpečnosti." # todo: NEW TRANSLATION
  HOA_observe_and_learn: "Pozorovat a učit se" # todo: NEW TRANSLATION
  HOA_observe_and_learn_desc: "Válčení se neustále vyvíjí kvůli technologickému pokroku a inovativnímu myšlení. Abychom udrželi robustní armádu, musíme se učit lekcím z válek a nikdy nepřestat hledat způsoby, jak se zlepšovat." # todo: NEW TRANSLATION
  HOA_foreign_investors: "Zahraniční investoři" # todo: NEW TRANSLATION
  HOA_foreign_investors_desc: "Potřebujeme investice do našeho průmyslu a infrastruktury, pokud chceme prosperovat. Naštěstí není nouze o cizince hledající zisk." # todo: NEW TRANSLATION
  HOA_research_exchange_programmes: "Programy výzkumné výměny" # todo: NEW TRANSLATION
  HOA_research_exchange_programmes_desc: "Náš průmysl zoufale potřebuje modernizaci; vytvořením výměnného programu můžeme získat znalosti ze zahraničí o tom, jak nejlépe využít nové technologické pokroky v našich továrnách." # todo: NEW TRANSLATION
  HOA_foreign_trained_officials: "Úředníci školení v zahraničí" # todo: NEW TRANSLATION
  HOA_foreign_trained_officials_desc: "Stále se máme hodně co naučit od odborníků ze zahraničí. Je čas je lépe využít tím, že jim dáme pozice autority v rámci státu." # todo: NEW TRANSLATION
  HOA_countryadjective_loyalist_advisors: "[ROOT.GetAdjective] loajalističtí poradci" # todo: NEW TRANSLATION
  HOA_countryadjective_loyalist_advisors_desc: "Nemůžeme dovolit, aby náš národ a kultura byly pohlceny imperialisty. Musíme dosadit věrné [ROOT.GetNameDef] do pozic autority a zahájit proces znovuzískání naší svobody." # todo: NEW TRANSLATION
  HOA_lay_claim_to_the_danakil: "Uplatnit nárok na Danakil" # todo: NEW TRANSLATION
  HOA_lay_claim_to_the_danakil_desc: "[ROOT.GetNameDefCap] bude vždy zranitelné vůči námořní invazi, pokud nezajistí region Danakil na severu." # todo: NEW TRANSLATION
  HOA_push_for_the_highlands: "Usilovat o vysočiny" # todo: NEW TRANSLATION
  HOA_push_for_the_highlands_desc: "Hospodářské srdce Východní Afriky leží ve vysočinách. Zajištění tohoto pro [ROOT.GetNameDef] výrazně rozšíří náš ekonomický potenciál." # todo: NEW TRANSLATION
  HOA_secure_the_ogaden: "Zajistit Ogaden" # todo: NEW TRANSLATION
  HOA_secure_the_ogaden_desc: "Zajištěním Ogadenu si vytvoříme řadu přírodních bariér mezi námi a případnými agresory a zároveň otevřeme naši ekonomiku obchodování přes Indický oceán." # todo: NEW TRANSLATION
  HOA_rallying_the_adjective_people: "Svolání [ROOT.GetAdjective] lidu" # todo: NEW TRANSLATION
  HOA_rallying_the_adjective_people_desc: "Svět je zasažen konflikty. Všechno, co stojí mezi naší současnou svobodou a propastí podrobení, je ochota [ROOT.GetAdjective] lidu postavit se a bojovat. Jednotní stojíme, rozděleni padneme." # todo: NEW TRANSLATION
  HOA_the_capital_school_of_technology: "Technická škola [Root.Capital.GetCapitalVictoryPointName]" # todo: NEW TRANSLATION
  HOA_the_capital_school_of_technology_desc: "To, co bylo před několika lety špičkové na bojišti a v továrnách, je dnes často zcela zastaralé. Pokud máme držet krok s vývojem nových technologií, musíme investovat do vzdělání nové generace." # todo: NEW TRANSLATION
  HOA_promote_countryadjective_nationalism: "Podporovat [ROOT.GetAdjective] nacionalismus" # todo: NEW TRANSLATION
  HOA_promote_countryadjective_nationalism_desc: "Lidé [ROOT.GetNameDef] už nebudou tolerovat svou potlačovanost cizími mocnostmi. Musíme využít příležitost a zrychlit naše plány na nezávislost." # todo: NEW TRANSLATION
  HOA_crowning_of_the_negusa_nagast: "Kronování Negusa Nagasta" # todo: NEW TRANSLATION
  HOA_crowning_of_the_negusa_nagast_desc: "Jak se stáváme dominantní mocností v regionu, je čas přijmout naši roli tím, že pomazáme našeho vůdce jako nového Negusa Nagasta. Všichni musí stát za [ROOT.GetLeader.GetHerHim] nebo čelit naší moci." # todo: NEW TRANSLATION
  HOA_control_ethiopia_tt: "Ovládá veškeré etiopské území" # todo: NEW TRANSLATION
  HOA_proclaim_east-african_hegemony: "Prohlásit východoafrickou hegemonii" # todo: NEW TRANSLATION
  HOA_proclaim_east-african_hegemony_desc: "Neustále bouřlivá situace v Rogu Afriky může být stabilizována pouze pod vládu našeho slavného císaře, [ROOT.GetName]. Je čas sjednotit region." # todo: NEW TRANSLATION
