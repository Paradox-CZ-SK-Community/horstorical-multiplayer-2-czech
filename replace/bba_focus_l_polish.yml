  ITA_italia_libera_invite_tt: "\n§YNěkteré nezávislé demokratické země§! blízké [ROOT.GetName] ve Střední a Jižní Evropě budou pozvány do §Y$ITA_free_states_of_europe$§!." # todo: NEW TRANSLATION
  ITA_italia_libera_faction_tt: "Obdrží událost §Y'[ROOT.GetName] nás zve do $ITA_free_states_of_europe$'§!." # todo: NEW TRANSLATION
