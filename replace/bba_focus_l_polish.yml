  ITA_peace_preservation_ns_tt: "\nZíská národní duch §Y$ITA_peace_keepers_of_europe$§!, který poskytuje (Spotřební továrny: §Y-2.0%§! za každou zaručenou zemi (max §Y-10.0%§!), Podpora ve válce: §G+1.00%§! za každou zaručenou zemi (max §Y+10.00%§!), Týdenní mužstvo: §G+100§! za každou zaručenou zemi (max §Y+1000§!))." # todo: NEW TRANSLATION
