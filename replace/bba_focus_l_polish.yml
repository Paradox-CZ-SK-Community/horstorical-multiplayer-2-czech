  ITA_comandante_diavolo_create_units_tt: "\nVytvoří §Y[ROOT.GetFlag][ROOT.GetAdjective]§! nepravidelné jednotky v vlastněných a kontrolovaných koloniích:" # todo: NEW TRANSLATION
