  ITA_reestablish_old_alliances_tt: "Pošle událost k §Y[ENG.GetFlag][ENG.GetNameDef]§! nebo §Y[FRA.GetFlag][FRA.GetNameDef]§! s žádostí o připojení k jejich frakci. \nPokud je dotázaná země ve válečném stavu:" # todo: NEW TRANSLATION
  ITA_abolish_the_colonies_decision_effects_tt: "\nEfekty rozhodnutí za [?ITA_abolish_the_colonies_days] dní:\n" # todo: NEW TRANSLATION
  ITA_cooperate_with_the_mafia_dm_tt: "\nKaždý kontrolovaný stát s modifikátorem '§Y$ITA_mafia_on_the_rise$§!':" # todo: NEW TRANSLATION
  ITA_is_constitutional_monarchy_tt: "Je §Ykonstituční monarchií§!." # todo: NEW TRANSLATION
  ITA_is_not_constitutional_monarchy_tt: "Není §Ykonstituční monarchií§!." # todo: NEW TRANSLATION
  ITA_antifascist_civil_war_triggered_flag: "Italská protifašistická občanská válka se stala." # todo: NEW TRANSLATION
  ITA_production_lines_factories_tt: "Přidá §Y2 stavební sloty§! a §Y2 vojenské továrny§! v až dvou core státech." # todo: NEW TRANSLATION
  ITA_industrial_socialization_factories_tt: "Přidá §Y2 stavební sloty§! a §Y2 civilní továrny§! v až dvou core státech. \nPřidá §Y2 stavební sloty§! a §Y2 vojenské továrny§! v až dvou jiných core státech." # todo: NEW TRANSLATION
  ITA_RDS_exists_tt: "Země je §Y$RDS$§!." # todo: NEW TRANSLATION
  generic_every_allied_country: "§YKaždá spojenecká země§!:\n" # todo: NEW TRANSLATION
  generic_decision_effects: "\nEfekty rozhodnutí při odstranění:\n" # todo: NEW TRANSLATION
  ITA_il_vento_aureo: "Il Vento Aureo" # todo: NEW TRANSLATION
  ITA_il_vento_aureo_desc: "Papežství bylo dlouho utlačováno cizími silami. Nicméně můžeme optimalizovat naše letectví a programy výcviku pilotů tak, aby umožnily mnohem levnější, ale statečnější piloty, přinášející zlaté panství Katolické církve našim nepřátelům ze vzduchu. To bude naše největší requiem!" # todo: NEW TRANSLATION
  form_greater_italy_tt: "Odemkne rozhodnutí: §YProhlásit Velkou Itálii§!" # todo: NEW TRANSLATION
  ITA_papal_faction: "Katolické Panství" # todo: NEW TRANSLATION
  ITA_roman_faction: "Imperium Romanum" # todo: NEW TRANSLATION
  ITA_latin_initiatives: "Latinská iniciativa" # todo: NEW TRANSLATION
  ITA_depose_mussolini: "Sesadit Mussoliniho" # todo: NEW TRANSLATION
  ITA_depose_mussolini_desc: "Nastal čas svrhnout Mussoliniho z moci! Prokázal, že je neschopný vůdce, který naši milovanou Itálii přivedl do mnoha zbytečných útrap a testoval její odolnost za hranici možného. I když jeho stín může nad námi viset ještě nějaký čas, Itálie a její lid přece jen zvítězí!" # todo: NEW TRANSLATION
  ITA_italo_balbo_focus: "Italo Balbo" # todo: NEW TRANSLATION
  ITA_italo_balbo_focus_desc: "Potřebujeme schopného vojenského vůdce, který nás provede turbulentními časy. Italo Balbo není pouze vojenský vůdce, je to i letecký hrdina, který podnikl několik diplomatických misí a účinně spravoval naše libyjské državy. Určitě zlepší bídný stav naší armády a přinese Itálii slávu!" # todo: NEW TRANSLATION
  ITA_remove_balbo_as_advisor_tt: "§YItalo Balbo§! už nebude dostupný jako §Yporadce§! nebo §Ymaršál polní§!." # todo: NEW TRANSLATION
  ITA_dino_grandi_focus: "Dino Grandi" # todo: NEW TRANSLATION
  ITA_dino_grandi_focus_desc: "Potřebujeme někoho diplomaticky zdatného, kdo se nebojí reorganizovat staré instituce, pokud chceme prosperovat. Dino Grandi sloužil jako ministr zahraničí a reformoval diplomatické kruhy, otevírající je dalším lidem mimo šlechtu. Nebude se zdráhat provést potřebné reformy a posunout Itálii do nové a zářivé budoucnosti!" # todo: NEW TRANSLATION
  ITA_remove_grandi_as_advisor_tt: "§YDino Grandi§! už nebude dostupný jako §Yporadce§!." # todo: NEW TRANSLATION
  ITA_has_new_duce_flag: "Byl sesazen Velkou radou§!." # todo: NEW TRANSLATION
  ITA_stop_the_squandering: "Zastavit plýtvání" # todo: NEW TRANSLATION
  ITA_stop_the_squandering_desc: "Příliš dlouho Mussolini utrácel peníze a zdroje, které si Itálie nemůže dovolit - je čas ukončit toto bezohledné plýtvání! Musíme omezit naše výdaje a zaměřit kapitál na zlepšení jiných oblastí." # todo: NEW TRANSLATION
  ITA_consolidate_power: "Konsolidovat moc" # todo: NEW TRANSLATION
  ITA_consolidate_power_desc: "Naše kontrola nad stranou a zemí obecně zůstává slabá. Musíme konsolidovat to, co máme, a posílit náš režim, abychom ukázali veřejnosti, že jsme stejně silní a spolehliví jako dřív!" # todo: NEW TRANSLATION
  ITA_purge_the_party: "Pročistit stranu" # todo: NEW TRANSLATION
  ITA_purge_the_party_desc: "Dostaly se k nám zvěsti, že někteří touží po znovuzavedení starého režimu. I když byl Mussolini sesazen a zbaven moci, jeho stín je stále přítomen v celé vládě i v myslích lidí. Musíme předvést sílu a pročistit stranu od prvků, které nejsou opravdu loajální nám, ale zůstávají oddaní starému Duce." # todo: NEW TRANSLATION
  ITA_the_fate_of_mussolini: "Osud Mussoliniho" # todo: NEW TRANSLATION
  ITA_the_fate_of_mussolini_desc: "Dokud Mussolini zůstává v domácím vězení, nemůžeme se skutečně pohnout vpřed s jeho neustálou přítomností nad námi. Zajistili jsme si postavení jako skutečná moc v rámci strany, a proto nastal čas rozhodnout se o osudu bývalého Duce!" # todo: NEW TRANSLATION
  ITA_divino_duce: "Divino Duce" # todo: NEW TRANSLATION
  ITA_divino_duce_desc: "Je zřejmé, jaký vliv může mít jediný člověk na zemi a její lidi. Možná to můžeme využít a přizpůsobit. Využitím státních kanálů můžeme propagovat našeho nového Duce jako silného a schopného vůdce, který může sjednotit Itálii. Dáme lidem někoho většího než je život, v koho budou moci věřit - někoho božského, v koho vloží svou víru!" # todo: NEW TRANSLATION
  ITA_blackshirt_loyalty: "Získat loajalitu Černých košil" # todo: NEW TRANSLATION
  ITA_blackshirt_loyalty_desc: "Černé košile dlouho zaujímaly zvláštní místo v italském fašismu, a pokud chceme vzbudit inspiraci v obyvatelstvu, bylo by dobré získat loajalitu této organizace. Byly by velmi užitečné při šíření božského vnímání slavného nového Duce mezi ozbrojenými silami - a dál." # todo: NEW TRANSLATION
  ITA_a_greater_purpose: "Vyšší cíl" # todo: NEW TRANSLATION
  ITA_a_greater_purpose_desc: "Nedávné spory ve straně nám odhalily nevýhody vázání myšlenky fašismu příliš úzce na jednu osobu. Měli bychom se zaměřit na propagaci fašismu jako vyššího konceptu, něco, co přesahuje smrtelné životy jednotlivců - ideu, kolem které se lidé mohou shromažďovat." # todo: NEW TRANSLATION
  ITA_spreading_the_eagles_wings: "Rozprostření orlích křídel" # todo: NEW TRANSLATION
  ITA_spreading_the_eagles_wings_desc: "Okolo nás jiné ideologie kolabují a selhávají. Zdá se, že pouze fašismus odolal této bouři událostí s odolností a dokonce prosperuje. Je naší povinností přinést tuto stabilitu i jiným národům; být jim majákem světla v těchto temných časech!" # todo: NEW TRANSLATION
  ITA_italian_hegemony: "Italská hegemonie" # todo: NEW TRANSLATION
  ITA_italian_hegemony_desc: "S válečným světem kolem nás musíme inspirovat a sjednotit různé národy a kultury pod naší hegemonii, abychom jim ukázali, jak jim fašismus a §ROOT.GetNameDefCap§! prospívají. Musíme být průkopníky pro jasnější budoucnost!" # todo: NEW TRANSLATION
  ITA_reorganize_regio_esercito: "Přeskupit Regio Esercito" # todo: NEW TRANSLATION
  ITA_reorganize_regio_esercito_desc: "S novým vedením přicházejí nové poznatky. Je jasné každému, kdo se podívá, že naše vítězná armáda má stále oblasti, kde se může zlepšit. S nedávno uvolněnými zdroji bychom měli investovat do výcviku a reorganizace ozbrojených sil, aby nic nemohlo stát v jejich cestě!" # todo: NEW TRANSLATION
  ITA_reinforce_regia_aeronautica: "Posílit Regia Aeronautica" # todo: NEW TRANSLATION
  ITA_reinforce_regia_aeronautica_desc: "Regia Aeronautica je obdivována a záviděna po celém světě, ale stále je prostor pro zlepšení. S více zdroji bychom měli investovat do vybavení a výcviku, aby se stalo nejstrašnějším letectvem!" # todo: NEW TRANSLATION
  ITA_compagnie_auto_avio_sahariane: "Rozšířit Compagnie Auto Avio Sahariane" # todo: NEW TRANSLATION
  ITA_compagnie_auto_avio_sahariane_desc: "Auto-saharské kompanie v Libyi se ukázaly jako velmi účinné v kombinaci se svými průzkumnými letadly. Rozšíření tohoto konceptu učiní naše síly ještě více hrozivými a naplní naše nepřátele strachem!" # todo: NEW TRANSLATION
  ITA_combined_land_and_air_warfare: "Kombinované pozemní a letecké válčení" # todo: NEW TRANSLATION
  ITA_combined_land_and_air_warfare_desc: "Pomoc Regia Aeronautica Regio Esercito ukázala schopnosti italské armády, ale stále je prostor pro pokrok! Prohloubení této spolupráce by zdevastovalo naše nepřátele na bojišti a přineslo Itálii věčnou slávu!" # todo: NEW TRANSLATION
  ITA_the_fourth_shore: "Čtvrté pobřeží" # todo: NEW TRANSLATION
  ITA_the_fourth_shore_desc: "Libye je často označována jako Itálie Čtvrté pobřeží a je nedílnou součástí naší budoucnosti. Je to nejbližší kolonie a jedna z nejcennějších, protože slouží jako spojka k zbytku afrického kontinentu. Investováním zde zajišťujeme naše zámořské državy a v budoucnu z toho budeme hojně těžit." # todo: NEW TRANSLATION
  ITA_oil_in_tripoli: "Ropa u Tripolisu" # todo: NEW TRANSLATION
  ITA_oil_in_tripoli_desc: "Našli jsme v Libyi černé zlato! Objevili jsme obrovské zásoby ropy na pouštích u Tripolisu. Nemůžeme takovou příležitost nechat uniknout a musíme tyto zdroje využít pro slávu Itálie!" # todo: NEW TRANSLATION
  ITA_steel_in_tripoli: "Ocel u Tripolisu" # todo: NEW TRANSLATION
  ITA_steel_in_tripoli_desc: "Vypadá to, že v pouštích u Tripolisu je velké množství železa, které čeká, až ho vytěžíme a zpracujeme. Vybudováním ocelárny v blízkosti bychom mohli využít ocel k dalšímu rozvoji našich sil!" # todo: NEW TRANSLATION
  ITA_novus_ordo: "Novus Ordo" # todo: NEW TRANSLATION
  ITA_novus_ordo_desc: "Osud Itálie je úzce spjat s Libyí, a proto ji musíme ještě více integrovat do našeho království. Toho lze dosáhnout nabídkou „speciálního občanství“ každému Libyjci ochotnému bojovat pro nás, čímž zajistíme naši kontrolu nad Středomořím a severní Afrikou." # todo: NEW TRANSLATION
  ITA_seek_british_military_cooperation: "Hledat britskou vojenskou spolupráci" # todo: NEW TRANSLATION
  ITA_seek_british_military_cooperation_desc: "I přes zradu našich bývalých spojenců v minulé válce může dávat smysl podávat jim olivovou ratolest. Můžeme se od Britů mnoho naučit, zejména ohledně jejich námořnictva a letectva." # todo: NEW TRANSLATION
  ITA_anglo_italian_pact: "Podepsat anglo-italský pakt" # todo: NEW TRANSLATION
  ITA_anglo_italian_pact_desc: "Vojenská spolupráce s Brity nám prospěla, a tak by pakt o neútočení byl prospěšný. Takový pakt by zajistil velké části našich afrických držeb a umožnil nám soustředit se jinde." # todo: NEW TRANSLATION
  ITA_invite_france_to_military_partnership: "Pozvat Francii ke vojenskému partnerství" # todo: NEW TRANSLATION
  ITA_invite_france_to_military_partnership_desc: "Francie je nejsilnějším z našich bezprostředních sousedů a starým spojencem. I když jim nebudeme zapomínat zradu v minulé válce, můžeme odpustit. Možná je čas dát staré křivdy za hlavu a snažit se posílit naši armádu prostřednictvím těsného partnerství." # todo: NEW TRANSLATION
  ITA_franco_italian_pact: "Podepsat franco-italský pakt" # todo: NEW TRANSLATION
  ITA_franco_italian_pact_desc: "Vojenská spolupráce s Francií byla velmi cenná, stejně jako pakt o neútočení. Nejenže bychom zajistili naše západní křídlo v Evropě, ale také velké části našich afrických držeb, což by nám umožnilo soustředit se jinde." # todo: NEW TRANSLATION
  ITA_proclaim_the_italian_empire: "Prohlásit Italské impérium" # todo: NEW TRANSLATION
  ITA_proclaim_the_italian_empire_desc: "S našimi nedávnými zisky v Africe přichází nový den. S rozvíjející se říší a rozumnými investicemi do vojska už nejsme jen královstvím; konečně máme důvěru prohlásit vznik Italského impéria! Dlouho jsme na tento okamžik čekali!" # todo: NEW TRANSLATION
  ITA_italy_will_guarantee_tt: "[GetItalyGuaranteesMajor]" # todo: NEW TRANSLATION
  ITA_italy_will_guarantee_tt_standard: "§Y[ROOT.GetNameDefCap]§! bude §Yzaručovat§! každou §Yvelkou zemi§!, která zaručí §Y[ROOT.GetNameDefCap]§!." # todo: NEW TRANSLATION
  ITA_italy_will_guarantee_tt_fulfilled: "§Y[ROOT.GetNameDefCap]§! bude §Yzaručovat§! každou §Yvelkou zemi§!, která zaručí §Y[ROOT.GetNameDefCap]§!. Aktuální efekt:" # todo: NEW TRANSLATION
  ITA_african_conquests_tt: "S naší aspirující říší bude §Ylevnější§! §Yanektovat§! území na §YAfrickém kontinentu§!." # todo: NEW TRANSLATION
  ITA_economic_reforms: "Hospodářské reformy" # todo: NEW TRANSLATION
  ITA_economic_reforms_desc: "Ekonomika stagnovala pod starým režimem, ale s oživeným Partito Nazionale Fascista jsme připraveni tuto významnou úlohu vyřešit! Nyní můžeme jmenovat schopné lidi, kteří oživí ekonomiku." # todo: NEW TRANSLATION
  ITA_improve_the_industries: "Zlepšit průmysl" # todo: NEW TRANSLATION
  ITA_improve_the_industries_desc: "S oživenou ekonomikou máme zdroje věnovat se průmyslu a provést rozsáhlé reformy. Efektivnější průmysl znamená, že více vybavení bude rychleji doručeno našim vítězným silám." # todo: NEW TRANSLATION
  ITA_reorganize_the_party: "Přeskupit stranu" # todo: NEW TRANSLATION
  ITA_reorganize_the_party_desc: "Partito Nazionale Fascista se stal zatuchlým a neobratným orgánem, plným intrik a sebestředného rozmazlování. S pevnějším uchopením strany můžeme začít její reorganizaci od základů, aby byla efektivnější a dynamičtější." # todo: NEW TRANSLATION
  ITA_meritocracy: "Meritokracie" # todo: NEW TRANSLATION
  ITA_meritocracy_desc: "Poté, co jsme potlačili opozici ve vlastních řadách, můžeme nyní otevřít instituce členům mimo fašistickou stranu. To přinese nové a vzrušující nápady a příležitosti." # todo: NEW TRANSLATION
  ITA_expanded_corporatism: "Rozšířený korporatismus" # todo: NEW TRANSLATION
  ITA_expanded_corporatism_desc: "Korporatismus je zásadní myšlenkou fašismu a měli bychom jej prosazovat ve všech nově získaných teritorích co nejvíce. K tomu bychom se museli spolehnout na místní elity a talenty a otevřít dveře postupu v rámci fašistické hierarchie. Je to snadný způsob, jak vnést loajalitu a efektivitu do naší nové domény." # todo: NEW TRANSLATION
  ITA_stop_the_squandering_military_industry_tt: "$ITA_modify_military_industry_dynamic_modifier_ns_intro$ \n$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY$: §G+5.00%§! \n\n" # todo: NEW TRANSLATION
  ITA_stop_the_squandering_ricostruzione_industriale_tt: "$ITA_modify_ricostruzione_industriale_dynamic_modifier_ns_intro$ \n$modifier_production_speed_arms_factory_factor$: §G+10.00%§! \n\n" # todo: NEW TRANSLATION
  ITA_potential_refinery_in_libya_tt: "S výzkumem §YSynthetic Oil Experiments§! přidat §G1§! stavební slot a §Y1 syntetickou rafinerii§! v §YTripoli§!." # todo: NEW TRANSLATION
  ITA_economic_reforms_ricostruzione_industriale_tt: "$ITA_modify_ricostruzione_industriale_dynamic_modifier_ns_intro$ \n$MODIFIER_CONSUMER_GOODS_FACTOR$: §Y-5%§!" # todo: NEW TRANSLATION
  ITA_improve_the_industries_ricostruzione_industriale_tt: "$ITA_modify_ricostruzione_industriale_dynamic_modifier_ns_intro$ \n$MODIFIER_CONVERSION_COST_CIV_TO_MIL_FACTOR$: §G-10.00%§! \n\n" # todo: NEW TRANSLATION
