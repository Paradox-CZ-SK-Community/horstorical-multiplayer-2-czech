  ETH_selassie_left_flag: "$ETH_haile_selassie$ opustil Etiopii" # todo: NEW TRANSLATION
  ETH_university_bonus: "Univerzita [ROOT.Capital.GetCapitalVictoryPointName] - výzkum elektroniky" # todo: NEW TRANSLATION
  ETH_new_weapons_and_tactics_bonus: "Výzkum nových zbraní a taktik" # todo: NEW TRANSLATION
  ETH_shipbuilding_bonus: "[ETH.GetAdjective] loděnice" # todo: NEW TRANSLATION
  ecole_militaire_haile_selassie_1er: "Ecole Militaire Haile Selassie 1er" # todo: NEW TRANSLATION
  holeta_military_academy: "Vojenská akademie Holeta" # todo: NEW TRANSLATION
  every_league_of_nations_member_tt: "Každá členská země Společnosti národů:" # todo: NEW TRANSLATION
  ETH_strengthen_the_black_lions: "Posílit Černé lvy" # todo: NEW TRANSLATION
  ETH_strengthen_the_black_lions_desc: "I když jsme ztratili území proti nepříteli, boj musí pokračovat. Černí lvi kladou Italům značný odpor a měli bychom je proto podporovat všemi dostupnými prostředky." # todo: NEW TRANSLATION
  ETH_supporting_the_arbegnoch: "Podpora Arbegnoch" # todo: NEW TRANSLATION
  ETH_supporting_the_arbegnoch_desc: "V celém [ROOT.GetName] jsou vlastenci ochotní vzít do rukou zbraně proti [ITA.GetAdjective] invazím. Musíme udělat vše, co je v našich silách, abychom těmto statečným mužům a ženám pomohli činit [ITA.GetAdjective] válečný stroj neúčinným." # todo: NEW TRANSLATION
  ETH_ecole_militaire_haile_selassie_1er: "[GetEthiopianMilitaryAcademyName]" # todo: NEW TRANSLATION
  ETH_ecole_militaire_haile_selassie_1er_desc: "Naše armáda se ukazuje být technologicky zastaralá oproti ostatním mocnostem v regionu, jak v vybavení, tak i v myšlení. Zřídíme vlastní vojenskou akademii, která vychová novou generaci důstojníků pro vedení moderních válek." # todo: NEW TRANSLATION
  ETH_ecole_militaire_haile_selassie_1er_tt: "Upraví §Y[GetEthiopianArmySpiritName]§! o:\n$MODIFIER_XP_GAIN_ARMY$: §G+5%§! " # todo: NEW TRANSLATION
  ETH_unlock_academy_tt: "Odemkne §Y$academy_spirit$§!" # todo: NEW TRANSLATION
  ETH_university_of_capital: "Univerzita [ROOT.Capital.GetCapitalVictoryPointName]" # todo: NEW TRANSLATION
  ETH_university_of_capital_desc: "Kdysi zuřivost vojsk určovala průběh bitvy. Nyní lze bojovat na velké vzdálenosti, aniž by vojáci viděli nepřítele. Musíme investovat do vzdělávacích institucí, abychom mohli vyvíjet nové technologie války a výroby nástrojů pro ni." # todo: NEW TRANSLATION
  ETH_university_of_capital_tt: "Upraví §Y$ETH_corrupt_bureaucracy_dynamic_modifier$§! o:\n$MODIFIER_RESEARCH_SPEED_FACTOR$: §G+5%§! " # todo: NEW TRANSLATION
  ETH_scavenging_tactics: "Taktiky sběru vybavení" # todo: NEW TRANSLATION
  ETH_scavenging_tactics_desc: "Zatímco rozvíjíme průmyslovou základnu, měli bychom vycvičit naše jednotky, aby rozpoznaly, co je na bojišti užitečné a opravitelné. To výrazně pomůže udržet je zásobené, dokud nebudeme schopni stabilně vyrábět a přepravovat vlastní vybavení." # todo: NEW TRANSLATION
  ETH_scavenger_random_generals_tt: "§YTři§! náhodně vybraní velitelé armády získají §Y$scavenger$§!: \n-$MODIFIER_EQUIPMENT_CAPTURE_FACTOR$: §G+3%§! " # todo: NEW TRANSLATION
  ETH_keep_the_chitet: "Zachovat [GetChitetName]" # todo: NEW TRANSLATION
  ETH_keep_the_chitet_desc: "[GetChitetName] nám sloužil dobře. Jako relativně zemědělská země bychom měli problém udržet stálou profesionální armádu. Je nejlepší držet se toho, co známe." # todo: NEW TRANSLATION
  ETH_keep_the_chitet_tt: "Upraví §Y[GetEthiopianArmySpiritName]§! o:\n $modifier_army_sub_unit_irregular_infantry_max_org_factor$: §G+5%§!\n Přidává §Y2 $irregular_infantry$§! prapory do divizí Chitet Sefari." # todo: NEW TRANSLATION
  ETH_expand_the_mehal_sefari: "Rozšířit [ETH_GetSefariName]" # todo: NEW TRANSLATION
  ETH_expand_the_mehal_sefari_desc: "Jednotky [ETH_GetSefariName] ukázaly potřebu dobře vycvičených profesionálních vojáků. Doba nasazování rolnických armád v krizích je pryč. Proto přeskupíme naši armádu jako stálou profesionální sílu." # todo: NEW TRANSLATION
  ETH_chitet_sefari_no_recruiting_tt: "Divize §YChitet Sefari§! už nelze rekrutovat." # todo: NEW TRANSLATION
  ETH_expand_the_mehal_sefari_tt: "Upraví §Y[GetEthiopianArmySpiritName]§! o:\n$MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+25%§! \n$MODIFIER_ARMY_ORG_FACTOR$: §G+5%§!" # todo: NEW TRANSLATION
  ETH_the_ethiopian_air_force: "[ROOT.GetAdjective] letectvo" # todo: NEW TRANSLATION
  ETH_the_ethiopian_air_force_desc: "Ať už jde o podporu jednotek na bojišti nebo ničení nepřátelské infrastruktury, letadlo se ukazuje jako neocenitelný prostředek. Musíme založit vlastní letectvo, chceme-li chránit náš lid a ničit nepřátele." # todo: NEW TRANSLATION
  ETH_the_ethiopian_air_force_tt: "Odemkne §Y$air_force_command_spirit$§!" # todo: NEW TRANSLATION
  ETH_establish_a_naval_base: "Zřídit námořní základnu" # todo: NEW TRANSLATION
  ETH_establish_a_naval_base_desc: "S nedávným získáním přístavu jsme otevřeli nové divadlo války. Musíme zřídit námořní základnu a začít stavět námořnictvo, které ochrání naše pobřeží." # todo: NEW TRANSLATION
  ETH_improve_the_administration: "Zlepšit správu" # todo: NEW TRANSLATION
  ETH_improve_the_administration_desc: "Ve vzdělávacích institucích přetrvává značná korupce. To je nepřijatelné v místech, která se mají chlubit zásluhovostí. Musíme tuto korupci v učilištích a univerzitách beze zbytku vymýtit." # todo: NEW TRANSLATION
  ETH_improve_the_administration_tt: "Upraví §Y$ETH_corrupt_bureaucracy_dynamic_modifier$§! o:\n$MODIFIER_RESEARCH_SPEED_FACTOR$: §G+5%§!\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+5%§!\n$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY_FACTOR$: §G+5%§!" # todo: NEW TRANSLATION
  ETH_mounted_levies: "Jízdní [GetChitetName]" # todo: NEW TRANSLATION
  ETH_mounted_levies_desc: "Od východních pouští po západní hory se naše vlast skládá z členitých terénů nevhodných pro kolová nebo pásová vozidla. Velbloudi a koně se ale po staletí osvědčili jako spolehliví." # todo: NEW TRANSLATION
  ETH_mounted_levies_tt: "Nábory §Y$cavalry$§! a §Y$camelry$§! divizí." # todo: NEW TRANSLATION
  ETH_regional_training_centers: "Regionální výcviková centra" # todo: NEW TRANSLATION
  ETH_regional_training_centers_desc: "[GetChitetName] není dokonalý. Naše jednotky by byly mnohem efektivnější, pokud bychom zřídili regionální výcviková centra, která by je učila taktice a standardizovala výcvik bez nutnosti stálé armády." # todo: NEW TRANSLATION
  ETH_regional_training_centers_tt: "Upraví §Y[GetEthiopianArmySpiritName]§! o:\n $modifier_army_sub_unit_irregular_infantry_defence_factor$: §G+5%§! \n $modifier_army_sub_unit_irregular_infantry_speed_factor$: §G+10%§! \n $modifier_army_sub_unit_irregular_infantry_max_org_factor$: §G+15%§!" # todo: NEW TRANSLATION
  ETH_expand_the_kebur_zabagna: "Rozšířit [ETH_GetGuardsName]" # todo: NEW TRANSLATION
  ETH_expand_the_kebur_zabagna_desc: "[ETH_GetGuardsName] se ukázali jako nejlepší v našich ozbrojených silách. Měli bychom lépe využít jejich schopnosti zlepšením přístupu k vybavení a posilám." # todo: NEW TRANSLATION
  ETH_expand_the_kebur_zabagna_tt: "Nábory další divize §YKebur Zabagna§!. \nPřidává další §Y$infantry$§! a §Y$cavalry$§! prapory do šablony §YKebur Zabagna§!.\nPřidává §Y$recon$§! a §Y$artillery$§! pokud byly příslušné technologie prozkoumány." # todo: NEW TRANSLATION
  ETH_tactical_training: "Standardizovaný taktický výcvik" # todo: NEW TRANSLATION
  ETH_tactical_training_desc: "Výcvik našich ozbrojených sil je příliš často nekonzistentní a zastaralý. Musíme standardizovat taktický výcvik všech jednotek, aby byly na bojišti účinnější." # todo: NEW TRANSLATION
  ETH_tactical_training_tt: "Upraví §Y[GetEthiopianArmySpiritName]§! o:\n$MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+10%§! " # todo: NEW TRANSLATION
  ETH_peacekeeping_forces: "Mírové síly" # todo: NEW TRANSLATION
  ETH_peacekeeping_forces_desc: "Klíčem naší bezpečnosti je zajistit, že jakákoliv krize v zahraničí bude rychle řešena, než se vymkne kontrole. Udržování mírové síly schopné být nasazena kdekoli na světě je proto zásadní." # todo: NEW TRANSLATION
  ETH_copy_plane_designs: "Kopírovat návrhy letadel" # todo: NEW TRANSLATION
  ETH_copy_plane_designs_desc: "Nemá smysl znovu vynalézat to, co již jiní vyvinuli. Jednoduše reprodukujeme návrhy letadel z jiných zemí a využijeme jejich investice do výzkumu." # todo: NEW TRANSLATION
  ETH_copy_light_plane_tt: "Vytvoří variantu §Y$iw_small_airframe$: [ITA.GetFlag]CR.32§!" # todo: NEW TRANSLATION
  ETH_copy_medium_plane_tt: "Vytvoří variantu §Y$iw_medium_airframe$: [ITA.GetFlag]Ca.101§!" # todo: NEW TRANSLATION
  ETH_asmera_naval_college: "[GetNavalCollegeName]" # todo: NEW TRANSLATION
  ETH_asmera_naval_college_desc: "Pouhá výroba a údržba lodí nestačí k vytvoření námořnictva. Potřebujeme důstojníky a specialisty vycvičené v používání námořních prostředků v boji. Zřídíme proto první námořní akademii [ETH.GetName]." # todo: NEW TRANSLATION
  ETH_asmera_naval_college_tt: "Upraví §Y[GetEthiopianNavySpiritName]§! o:\n$MODIFIER_NAVAL_DOCTRINE_COST_FACTOR$: §G-30%§!" # todo: NEW TRANSLATION
  unlock_spirit_of_naval_academy_tt: "Odemkne §YDuch námořní akademie§!" # todo: NEW TRANSLATION
  ETH_naval_college_reduction: "Výzkum námořní akademie" # todo: NEW TRANSLATION
  ETH_capital_school_of_technology: "[ROOT.Capital.GetCapitalVictoryPointName] Škola technologie" # todo: NEW TRANSLATION
  ETH_capital_school_of_technology_desc: "Naše reformy vzdělávání se osvědčují a investice stály za to. Měli bychom zrychlit pokrok shromážděním národních odborníků do jediné školy technologie." # todo: NEW TRANSLATION
  ETH_regional_supply_depots: "Regionální zásobovací sklady" # todo: NEW TRANSLATION
  ETH_regional_supply_depots_desc: "Naše jednotky nebudou schopny bránit vlast, pokud nebudou mít střelivo nebo jídlo. Armáda přeci pochoduje po žaludku. Zajistíme, aby byly vždy dobře zásobovány zřízením regionálních vojenských skladů napříč [ETH.GetName]." # todo: NEW TRANSLATION
  ETH_expand_the_levy: "Rozšířit [GetChitetName]" # todo: NEW TRANSLATION
  ETH_expand_the_levy_desc: "S lepší podporou a výcvikem se [GetChitetName] stal robustní a flexibilní silou. Na tomto pevném základu jej rozšíříme, abychom odradili jakéhokoli zahraničního agresora." # todo: NEW TRANSLATION
  ETH_expand_the_levy_tt: "Zvyšuje počet divizí Chitet Sefari, které lze nasadit, na §Y48§!.\nPřidává §Y3 $irregular_infantry$§! prapory do divizí Chitet Sefari. Přidává §Y$engineer$§!, §Y$military_police$§! a §Y$field_hospital$§! pokud byly příslušné technologie prozkoumány." # todo: NEW TRANSLATION
  ETH_the_junior_officer_corps: "Sbor mladších důstojníků" # todo: NEW TRANSLATION
  ETH_the_junior_officer_corps_desc: "Ozbrojené síly jsou po staletí ovládány aristokracií. Chceme-li zvýšit jejich efektivitu na bojišti, musíme zřídit školy důstojníků a školení podporující zásluhovost před klientelismem. Krokem k tomu bude vytvoření sboru mladších důstojníků." # todo: NEW TRANSLATION
  ETH_camouflage: "Maskování" # todo: NEW TRANSLATION
  ETH_camouflage_desc: "S nástupem letadel na bojišti je stále těžší získat element překvapení. Aby se minimalizovala viditelnost našich taktických záměrů, potřebujeme výcvik v maskování a skrývání pro naše jednotky." # todo: NEW TRANSLATION
  ETH_camouflage_army_tt: "Upraví §Y[GetEthiopianArmySpiritName]§! o:\n $MODIFIER_CAS_DAMAGE_REDUCTION$: §G+10%§! \n $MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+10%§!" # todo: NEW TRANSLATION
  ETH_camouflage_air_tt: "Upraví §Y[GetEthiopianAirforceSpiritName]§! o:\n $MODIFIER_ENEMY_ARMY_BONUS_AIR_SUPERIORITY_FACTOR$: §G-15%§! " # todo: NEW TRANSLATION
  ETH_the_fetno-derash: "Fetno-Derash" # todo: NEW TRANSLATION
  ETH_the_fetno-derash_desc: "Špionážní činnost se stává rozhodujícím faktorem nejen na bojišti, ale i při ochraně politického vedení. Zřídíme proto specializovanou zpravodajskou agenturu pro zajištění bezpečnosti a lepší pochopení nepřátel." # todo: NEW TRANSLATION
  ETH_debre_zeyit_air_force_training_center: "[ETHGetAirBaseName] Centrum výcviku letectva" # todo: NEW TRANSLATION
  ETH_debre_zeyit_air_force_training_center_desc: "Piloti jsou sami o sobě těžce učitelná profese. Nasazení do boje pak vyžaduje ještě více odbornosti. Aby byli naši piloti připraveni, zřídíme centrální výcvikové centrum letectva a začneme standardizovat jejich výcvik." # todo: NEW TRANSLATION
  ETH_debre_zeyit_air_force_training_center_tt: "Upraví §Y[GetEthiopianAirforceSpiritName]§! o:\n$MODIFIER_AIR_DOCTRINE_COST_FACTOR$: §G-25%§! " # todo: NEW TRANSLATION
  ETH_unlock_spirit_airforce_tt: "Odemkne §Y$air_force_spirit$§!" # todo: NEW TRANSLATION
  ETH_purchase_obsolete_ships: "Nákup zastaralých lodí" # todo: NEW TRANSLATION
  ETH_purchase_obsolete_ships_tt: "Odemkne rozhodnutí koupit starší lodě od velmocí." # todo: NEW TRANSLATION
  ETH_purchase_obsolete_ships_desc: "Ač postupujeme v námořním rozvoji, nejsme ještě schopni nasadit loďstvo, které by adekvátně bránilo naše pobřeží. Můžeme však od ostatních států získat starší lodě, které posílí naši flotilu." # todo: NEW TRANSLATION
  ETH_new_weapons_and_tactics: "Nové zbraně a taktiky" # todo: NEW TRANSLATION
  ETH_new_weapons_and_tactics_desc: "Držet krok s technologickým pokrokem jiných armád vyžaduje stálé investice do vlastního výzkumu, aby byly jednotky vždy vybaveny a vycvičeny čelit nejnovějším hrozbám." # todo: NEW TRANSLATION
  ETH_old_reliable: "Staré, spolehlivé" # todo: NEW TRANSLATION
  ETH_old_reliable_desc: "Jednoduché, spolehlivé a opravitelné zbraně jsou v poli cennější než přehnaně komplikované konstrukce, které mnoho armád nasazuje. Proč ztrácet čas tréninkem nových pušek, když vojáci ovládají ty staré?" # todo: NEW TRANSLATION
  ETH_old_reliable_tt: "Upraví §Y[GetEthiopianArmySpiritName]§! o:\n $MODIFIER_MAX_DIG_IN$: §G+0.5§!\n $MODIFIER_DIG_IN_SPEED_FACTOR$: §G+25%§!\n $modifier_army_sub_unit_infantry_attack_factor$: §G+5%§!\n $modifier_army_sub_unit_infantry_defence_factor$: §G+10%§!\n $modifier_army_sub_unit_infantry_speed_factor$: §G+10%§!" # todo: NEW TRANSLATION
  ETH_bring_in_foreign_advisors: "Přivést zahraniční poradce" # todo: NEW TRANSLATION
  ETH_bring_in_foreign_advisors_desc: "I přes pokrok v budování [ETH.GetAdjective] letectva postrádáme přímé zkušenosti, aby naši piloti byli využíváni optimálně. Povoláme proto cizí důstojníky jako poradce." # todo: NEW TRANSLATION
  ETH_bring_in_foreign_advisors_tt: "Upraví §Y[GetEthiopianAirforceSpiritName]§! o:\n $MODIFIER_ENEMY_ARMY_BONUS_AIR_SUPERIORITY_FACTOR$: §G-5%§!\n $MODIFIER_AIR_DOCTRINE_COST_FACTOR$: §G-5%§!\n $MODIFIER_AIR_ACCIDENTS$: §G-15%§!  " # todo: NEW TRANSLATION
  ETH_available_as_air_chief_tt: "Dostupný jako náčelník letectva: " # todo: NEW TRANSLATION
  ETH_ethiopian_officers: "[ROOT.GetAdjective] důstojníci" # todo: NEW TRANSLATION
  ETH_ethiopian_officers_desc: "S pokračujícím rozvojem [ETH.GetAdjective] letectva potřebujeme důstojníky, kteří dokáží efektivně koordinovat piloty. Místo dočasných poradců vychováme vlastní odborníky." # todo: NEW TRANSLATION
  ETH_ethiopian_officers_tt: "Upraví §Y[GetEthiopianAirforceSpiritName]§! o:\n $MODIFIER_AIR_ATTACK$: §G+15%§!" # todo: NEW TRANSLATION
  ETH_promote_the_war_heroes: "Povýšit válečné hrdiny" # todo: NEW TRANSLATION
  ETH_promote_the_war_heroes_desc: "Naší svobodě vděčíme hrdinům, kteří na bojišti riskují životy. Abychom udrželi vysokou morálku a podporu armády, povýšíme válečné hrdiny do prestižnějších pozic." # todo: NEW TRANSLATION
  ETH_expand_the_officer_corps: "Rozšířit sbor důstojníků" # todo: NEW TRANSLATION
  ETH_expand_the_officer_corps_desc: "Nedostatek zásluhovosti v armádě je jejím hlavním slabým místem. Aby nejlépe kvalifikovaní vedli naše jednotky, rozšíříme důstojnický sbor a umožníme nahrazování těch, kdo dosáhli stupně kvůli protekci." # todo: NEW TRANSLATION
  ETH_medal_gain_tt: "Zvyšuje množství XP udělené velitelům divizí při udělení medaile o §G+75%§!" # todo: NEW TRANSLATION
  ETH_officer_promotion_boost_tt: "Všichni budoucí §Ydůstojníci§! povýšení na hodnost §Ygenerál§! obdrží §G+1 Útok§! a §G+1 Obrana§!" # todo: NEW TRANSLATION
  ETH_the_common_soldier: "Běžný voják" # todo: NEW TRANSLATION
  ETH_the_common_soldier_desc: "Armáda nic neznamená bez obyčejných vojáků, kteří denně riskují životy bez očekávání odměny. Tito hrdinové si zaslouží úctu za svůj přínos naší společné bezpečnosti." # todo: NEW TRANSLATION
  ETH_develop_the_capital_region: "Rozvíjet [271.GetName]" # todo: NEW TRANSLATION
  ETH_develop_the_capital_region_desc: "Musíme zrychlit industrializaci pro blaho našeho lidu a ochranu [ETH.GetNameDef]. Investujeme do oblastí kolem [ETH.Capital.GetCapitalVictoryPointName] a přeměníme je na průmyslové srdce [ETH.GetName]." # todo: NEW TRANSLATION
  ETH_develop_the_capital_region_tt: "Odemkne rozhodnutí rozšířit elektrickou síť tak, aby pokrývala celé [271.GetName]." # todo: NEW TRANSLATION
  ETH_the_state_bank_of_ethiopia: "Státní banka [ETH.GetNonIdeologyName]" # todo: NEW TRANSLATION
  ETH_the_state_bank_of_ethiopia_desc: "Rozšířením zdrojů Státní banky [ETH.GetName] můžeme lidem nabídnout nový úvěrový nástroj a působit jako finanční injekce pro trpící [ETH.GetAdjective] ekonomiku." # todo: NEW TRANSLATION
  ETH_the_state_bank_of_ethiopia_tt: "Upraví §Y$ETH_corrupt_bureaucracy_dynamic_modifier$§! o:\n$MODIFIER_RESEARCH_SPEED_FACTOR$: §G+5%§!\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+5%§!" # todo: NEW TRANSLATION
  ETH_infrastructure_projects: "Projekty infrastruktury" # todo: NEW TRANSLATION
  ETH_infrastructure_projects_desc: "[ETH.GetName] disponuje mnoha přírodními zdroji, o které svět stojí. Bez vhodných cest, jak je dopravit do továren nebo zemi ven, z nich ale nemáme užitek. Musíme rychle rozšířit infrastrukturu a odstranit tento ekonomický úzký hrdelní bod." # todo: NEW TRANSLATION
  ETH_rebuilding_the_country_idea: "Obnova země" # todo: NEW TRANSLATION
  ETH_cie: "[GetEthiopianRailwayName]" # todo: NEW TRANSLATION
  ETH_cie_imperial: "Compagnie Impériale des Chemins de Fer Éthiopiens" # todo: NEW TRANSLATION
  ETH_anarchist_bank: "Africká komunitní banka" # todo: NEW TRANSLATION
  ETH_central_bank: "Africká centrální banka" # todo: NEW TRANSLATION
  ETH_GuardsNameCommunist: "Revoluční gardy" # todo: NEW TRANSLATION
  ETH_GuardsNameDefault: "Kebur Zabagna" # todo: NEW TRANSLATION
  ETH_GuardsNameDemocratic: "Národní gardy" # todo: NEW TRANSLATION
  ETH_SefariNameCommunist: "Revoluční armáda" # todo: NEW TRANSLATION
  ETH_SefariNameDemocratic: "Národní obranné síly" # todo: NEW TRANSLATION
  ETH_SefariNameDefault: "Mehal Sefari" # todo: NEW TRANSLATION
  ETH_cie_anarcho_communist: "[ETH.GetAdjective] železniční kolektiv" # todo: NEW TRANSLATION
  ETH_cie_stalinist: "[ETH.GetAdjective] železniční rada" # todo: NEW TRANSLATION
  ETH_cie_fascist: "Ferrovie Imperiali Etiopiche" # todo: NEW TRANSLATION
  ETH_host_nation_name: "[?ETH.host_nation.GetNameWithFlag]" # todo: NEW TRANSLATION
  ETH_host_nation_fallback_name: "Hostitelská země" # todo: NEW TRANSLATION
  ETH_second_italo_ethiopian_war_flag: "Druhá italsko-etiopská válka" # todo: NEW TRANSLATION
  ETH_infrastructure_projects_tt: "Upraví §Y$ETH_state_development_dynamic_modifier$§! o:\n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10%§!" # todo: NEW TRANSLATION
  ETH_state_owned_industry: "Státní průmysl" # todo: NEW TRANSLATION
  ETH_state_owned_industry_desc: "Vidíme na příkladu velmocí, že vlády ochotné zasahovat do volného trhu dosahují značných ekonomických zisků kontrolou výroby a snižováním nezaměstnanosti. Půjdeme jejich cestou a rychle rozšíříme ekonomiku prostřednictvím státem vlastněného průmyslu." # todo: NEW TRANSLATION
  ETH_state_owned_industry_tt: "Upraví §Y$ETH_state_development_dynamic_modifier$§! o:\n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+20%§!\n$MODIFIER_LOCAL_BUILDING_SLOTS$: §G+20%§!" # todo: NEW TRANSLATION
  ETH_encourage_local_development: "Podporovat místní rozvoj" # todo: NEW TRANSLATION
  ETH_encourage_local_development_desc: "Nikdo nemůže dokonale předvídat potřeby celé ekonomiky a je nebezpečné předstírat, že ano. Necháme regiony rozvíjet se po svém; místní politická správa a podniky nejlépe vědí, co je v jejich oblastech potřeba." # todo: NEW TRANSLATION
  ETH_encourage_local_development_tt: "Upraví §Y$ETH_state_development_dynamic_modifier$§! o:\n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10%§!\n$MODIFIER_LOCAL_BUILDING_SLOTS$: §G+10%§!" # todo: NEW TRANSLATION
  ETH_encourage_local_development_2_tt: "Místní orgány začnou samy provádět státní zlepšení." # todo: NEW TRANSLATION
  ETH_a_port_of_our_own: "Vlastní přístav" # todo: NEW TRANSLATION
  ETH_a_port_of_our_own_desc: "S nedávným získáním pobřežní půdy máme možnost výrazně zlepšit přístup na mezinárodní trhy založením vlastního přístavu. Usnadní to import a export zboží a výrazně pomůže naší ekonomice." # todo: NEW TRANSLATION
  ETH_expanding_the_railway_network: "Rozšiřování železniční sítě" # todo: NEW TRANSLATION
  ETH_expanding_the_railway_network_desc: "Železnice jsou klíčové pro dopravu surovin do továren a dál na domácí či zahraniční trhy. Rozšířením sítě zlepšíme schopnost dopravit tyto zdroje do cíle a zároveň vytvoříme příležitosti pro přesun obyvatel do rostoucích průmyslových měst." # todo: NEW TRANSLATION
  ETH_taxing_the_nobility: "[ETH_GetSeizeAssetsTitle]" # todo: NEW TRANSLATION
  ETH_taxing_the_nobility_desc: "[ETH_GetTaxNobilityDesc]" # todo: NEW TRANSLATION
  ETH_expand_tax_exemptions: "[ETH_GetTaxExemptionTitle]" # todo: NEW TRANSLATION
  ETH_expand_tax_exemptions_desc: "[ETH_GetTaxExemptionDesc]" # todo: NEW TRANSLATION
  ETH_expand_tax_exemptions_tt: "Upraví §Y$ETH_corrupt_bureaucracy_dynamic_modifier$§! o:\n$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY$: §R-5%§!\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §R-5%§!" # todo: NEW TRANSLATION
  ETH_reform_the_currency: "Reformovat měnu" # todo: NEW TRANSLATION
  ETH_reform_the_currency_desc: "Ačkoliv oběh [ETH.GetAdjective] bankovek v posledních letech vzrostl, mnoho lidí stále preferuje cizí měny při obchodování v [ETH.GetName]. Musíme reformovat birr, aby byl více přijímán doma i v zahraničí." # todo: NEW TRANSLATION
  ETH_increased_factory_output: "Zvýšená výrobní kapacita továren" # todo: NEW TRANSLATION
  ETH_increased_factory_output_desc: "Jak svět vypadá čím dál nebezpečněji, potřebujeme, aby továrny zvýšily výrobu vybavení, aby armáda zůstala věrohodným odstrašujícím prostředkem vůči cizím agresorům." # todo: NEW TRANSLATION
  ETH_increased_factory_output_tt: "Upraví §Y$ETH_industrialization_dynamic_modifier$§! o:\n$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY$: §G+10%§!" # todo: NEW TRANSLATION
  ETH_adapt_and_improve: "Přizpůsobit a zlepšit" # todo: NEW TRANSLATION
  ETH_adapt_and_improve_desc: "Konzultace s armádou umožní průmyslovým vedoucím pochopit, co je na bojišti skutečně potřeba, a předat to inženýrům. To zabrání nevhodnému vybavení a umožní rychlé návrhy na zlepšení." # todo: NEW TRANSLATION
  ETH_adapt_and_improve_tt: "Upraví §Y$ETH_industrialization_dynamic_modifier$§! o:\n$MODIFIER_LAND_EQUIPMENT_UPGRADE_XP_COST$: §G-25%§!\n$MODIFIER_AIR_EQUIPMENT_UPGRADE_XP_COST$: §G-25%§!" # todo: NEW TRANSLATION
  ETH_the_state_court: "Státní soud" # todo: NEW TRANSLATION
  ETH_the_state_court_desc: "Právní systém [ETH.GetName] je zakořeněn v archaických praktikách sahajících stovky let zpět. S vlnou reforem nastal čas kodifikovat zákony v souladu s ústavou a zřídit moderní státní soud pro případy národního významu." # todo: NEW TRANSLATION
  ETH_the_state_court_tt: "Upraví §Y$ETH_corrupt_bureaucracy_dynamic_modifier$§! o:\n$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY$: §G+5%§!\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10%§!\n$MODIFIER_RESEARCH_SPEED_FACTOR$: §G+10%§!" # todo: NEW TRANSLATION
  ETH_ethiopian_shipbuilding: "[ROOT.GetAdjective] loděnice" # todo: NEW TRANSLATION
  ETH_ethiopian_shipbuilding_desc: "Po zřízení vlastního přístavu by bylo rozumné položit základy pro stavbu a údržbu vlastní flotily. Budeme potřebovat vlastní lodě, chceme-li udržet přístup k globálním námořním cestám." # todo: NEW TRANSLATION
  ETH_connecting_the_south: "Propojení jihu" # todo: NEW TRANSLATION
  ETH_connecting_the_south_desc: "Jižní oblasti [ETH.GetName] jsou od hlavního regionu odděleny horským terénem. Pro plné začlenění do rostoucí ekonomiky je třeba je železnicí propojit s průmyslovými centry." # todo: NEW TRANSLATION
  ETH_bomb_proofing: "Ochrana proti bombardování" # todo: NEW TRANSLATION
  ETH_bomb_proofing_desc: "Udržení průmyslové kapacity pro moderní armádu je za války životně důležité. Letecká válka bude pravděpodobně rozhodující, protože letadla cílují na průmyslová centra nepřátel. Musíme zajistit, aby naše továrny přežily takové útoky." # todo: NEW TRANSLATION
  ETH_bomb_proofing_tt: "Upraví §Y$ETH_industrialization_dynamic_modifier$§! o:\n$MODIFIER_INDUSTRY_AIR_DAMAGE_FACTOR$: §G-10%§!\n$MODIFIER_INDUSTRY_REPAIR_FACTOR$: §G+10%§!\n$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY$: §G+5%§!" # todo: NEW TRANSLATION
  ETH_rapid_industrial_expansion: "Rychlá průmyslová expanze" # todo: NEW TRANSLATION
  ETH_rapid_industrial_expansion_desc: "I přes hrdinské úsilí domácího frontu potřebujeme ještě větší průmyslovou kapacitu, chceme-li zůstat svobodní. Zintenzivníme ekonomické plány a urychlíme industrializaci." # todo: NEW TRANSLATION
  ETH_rapid_industrial_expansion_tt: "Upraví §Y$ETH_industrialization_dynamic_modifier$§! o:\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10%§!" # todo: NEW TRANSLATION
  ETH_develop_the_horn_of_africa: "Rozvíjet Africký roh" # todo: NEW TRANSLATION
  ETH_develop_the_horn_of_africa_desc: "Africký roh obsahuje množství národů, zdrojů a potenciálu. Spoluprací s regionálními vládami na ekonomických otázkách bychom mohli tento potenciál společně využít v oboustranně prospěšných vztazích." # todo: NEW TRANSLATION
  ETH_develop_the_horn_of_africa_tt: "Odemkne §Yrozhodnutí§! zlepšit nezávislé nebo [ROOT.getAdjective] závislé země v Africkém rohu a případně je integrovat." # todo: NEW TRANSLATION
  ETH_horn_of_africa_tt: "Odemkne §Yrozhodnutí§! vytvořit Africký roh." # todo: NEW TRANSLATION
  ETH_invest_tt: "Odemkne investiční §Yrozhodnutí§! ve státě." # todo: NEW TRANSLATION
  ETH_invest_in_the_north: "Investovat na severu" # todo: NEW TRANSLATION
  ETH_invest_in_the_north_desc: "Výroba strojů se začíná rozvíjet na severu [ETH.GetName]. Podpoříme tento rozvoj zvýšenými investicemi, abychom pomohli rozšířit tento rostoucí průmysl." # todo: NEW TRANSLATION
  ETH_invest_in_the_east: "Investovat na východě" # todo: NEW TRANSLATION
  ETH_invest_in_the_east_desc: "Investicemi na východě můžeme využít historické obchodní sítě regionu a proměnit oblast v průmyslové centrum pro zpracování surovin [ETH.GetName], připravené k exportu." # todo: NEW TRANSLATION
  ETH_invest_in_the_west: "Investovat na západě" # todo: NEW TRANSLATION
  ETH_invest_in_the_west_desc: "Regiony [ETH.GetName] mají přístup k různorodým zdrojům. Investicemi na západě bychom rychle zvýšili industrializaci oděvního průmyslu a využili místních odborností." # todo: NEW TRANSLATION
  ETH_expand_the_coffee_industry: "Rozšířit kávový průmysl" # todo: NEW TRANSLATION
  ETH_expand_the_coffee_industry_desc: "Po celém světě je velká poptávka po kávě. Jako jeden z hlavních zdrojů bychom měli investovat do kávového průmyslu a zvýšit naše exporty." # todo: NEW TRANSLATION
  ETH_modernizing_the_industry: "Modernizace průmyslu" # todo: NEW TRANSLATION
  ETH_modernizing_the_industry_desc: "Dosáhli jsme velkého pokroku ve zvyšování průmyslové kapacity. To bude ovšem pokračující úkol, jak se mění požadavky ekonomiky a vznikají nové výrobní metody. Budeme se snažit zavést elektřinu a další průmyslové inovace do celého [ETH.GetName] a pokračovat v modernizaci." # todo: NEW TRANSLATION
  ETH_modernizing_the_industry_tt: "Pro všechny státy v regionech, do kterých bylo investováno:\n Přidat §G1§! §Yslot pro budovu§!.\nJedna země v každém investovaném regionu:\n Přidat §G1§! §Y$industrial_complex$§!." # todo: NEW TRANSLATION
  ETH_animal_husbandry: "Chov zvířat" # todo: NEW TRANSLATION
  ETH_animal_husbandry_desc: "Koně a velbloudi hrají důležitou roli v distribuci zboží a dopravě lidí v [ETH.GetNameDef]. Zvýšíme investice do chovu zvířat, aby zásoba a kvalita těchto zvířat neklesla." # todo: NEW TRANSLATION
  ETH_ethiopian_industrial_research_institute: "[ROOT.GetAdjective] průmyslový výzkumný institut" # todo: NEW TRANSLATION
  ETH_ethiopian_industrial_research_institute_desc: "Chceme-li přestat být stále o krok pozadu za jinými státy, musíme zlepšit domácí výzkumné instituce. Díky tomu začneme vytvářet vlastní inovace místo importu nápadů ze zahraničí." # todo: NEW TRANSLATION
  ETH_invite_foreign_prospectors: "Pozvat zahraniční hledače" # todo: NEW TRANSLATION
  ETH_invite_foreign_prospectors_desc: "Místo snahy duplikovat výzkum ze zahraničí bychom měli využít odbornosti cizích vlád a podniků, aby nám pomohly lépe využít naše bohaté přírodní zdroje." # todo: NEW TRANSLATION
  ETH_invite_foreign_prospectors_tt: "Odemkne §Y$ETH_prospect_for_resources$§! rozhodnutí v severním [ROOT.GetName]. Vyžaduje §Y$excavation2$§! a více než §Y2§! dostupné §Ycivilní továrny§! pro přijetí rozhodnutí o průzkumu.\n\n" # todo: NEW TRANSLATION
  ETH_invite_foreign_industrialists: "Pozvat zahraniční [ETH_GetInvestorName]" # todo: NEW TRANSLATION
  ETH_invite_foreign_industrialists_desc: "Masivně jsme v posledních letech zlepšili infrastrukturu a průmysl, což zefektivnilo využití přírodních zdrojů. Můžeme však urychlit rozvoj průmyslu pozváním zahraničních odborníků a průmyslníků do [ETH.GetName]." # todo: NEW TRANSLATION
  ETH_invite_foreign_industrialists_tt: "Návrháři z jiných zemí budou k dispozici, pokud cílová země má §Ynázor na [ETH.GetFlag][ETH.GetNameDef] nad§! §G75§!. \n\n§RVybraní návrháři budou deaktivováni, pokud jejich domovská země vstoupí do války proti [ETH.GetNameDef]!§! \n\nMožné země zahrnují: §Y[ENG.GetFlag][ENG.GetName]§!, §Y[FRA.GetFlag][FRA.GetName]§!, §Y[GER.GetFlag][GER.GetName]§!, §Y[JAP.GetFlag][JAP.GetName]§!, §Y[CZE.GetFlag][CZE.GetName]§!, §Y[SWE.GetFlag][SWE.GetName]§!" # todo: NEW TRANSLATION
  ETH_the_second_italo-ethiopian_war: "Druhá italsko-etiopská válka" # todo: NEW TRANSLATION
  ETH_the_second_italo-ethiopian_war_desc: "Vánoční ofenzíva nám nepřinesla vítězství, které jsme doufali a potřebovali. Je čas, aby [ETH.GetLeader] opustil hlavní město a převzal osobní velení armád. Válka proti Italům musí být ukončena!" # todo: NEW TRANSLATION
  ETH_the_second_italo-ethiopian_war_tt: "§Y$ETH_haile_selassie$§! bude dostupný jako polní maršál" # todo: NEW TRANSLATION
  ETH_renewed_offensive: "Obnovená ofenzíva" # todo: NEW TRANSLATION
  ETH_renewed_offensive_desc: "Italové se možná snaží znovu získat iniciativu. To znamená, že jsou nečekající útok našich sil. Místo pasivního držení linií bychom jim měli přinést bitvu k nim." # todo: NEW TRANSLATION
  ETH_renewed_offensive_tt: "Útok pěchoty §G+10%§!\nÚtok neregulérní pěchoty §G+10%§!\nObrana divize §R-5%§!" # todo: NEW TRANSLATION
  ETH_renewed_offensive_tt_1: "Upravuje §Y$ETH_army_1_dynamic_modifier$§!:\n" # todo: NEW TRANSLATION
  ETH_falling_back: "Stahování" # todo: NEW TRANSLATION
  ETH_falling_back_desc: "Naše fronty rychle ztrácejí obranyschopnost a zásobovací linie jsou natažené; organizovaný ústup do [ROOT.Capital.GetCapitalVictoryPointName] může být rozumný, ale musíme být opatrní, abychom se nezhroutili zcela." # todo: NEW TRANSLATION
  ETH_falling_back_tt: "Italské jednotky obdrží penalizaci pohybu a útoku v etnicky etiopsky kontrolovaných pohraničních státech na 60 dní." # todo: NEW TRANSLATION
  ETH_northern_thrust: "Severní úder" # todo: NEW TRANSLATION
  ETH_northern_thrust_desc: "Naší první prioritou by mělo být ovládnutí Eritreje. Pokud Italům odřízneme přístupy k přístavům na severu, budou mít mnohem těžší zásobování sil a my se pak budeme moct vypořádat se slabší jižní frontou." # todo: NEW TRANSLATION
  ETH_victory_in_the_desert: "Vítězství v poušti" # todo: NEW TRANSLATION
  ETH_victory_in_the_desert_desc: "Ogaden je nejslabší částí italské fronty. Zaměřme zde úsilí, porazme je a poté obsadíme jejich přístavy na jihu. To nám otevře zadní linie k postupu na Eritreju." # todo: NEW TRANSLATION
  ETH_the_defense_of_addis_ababa: "Obrana Addis Abeby" # todo: NEW TRANSLATION
  ETH_the_defense_of_addis_ababa_desc: "Addis Abeba je historické hlavní město a průmyslové centrum Etiopie. Pokud město padne, náš boj je ztracen. Musíme udělat vše pro jeho udržení." # todo: NEW TRANSLATION
  ETH_the_defense_of_addis_ababa_tt_1: "§Y$VICTORY_POINTS_5010$§!:\n" # todo: NEW TRANSLATION
  ETH_the_defense_of_addis_ababa_tt_2: "§Y$VICTORY_POINTS_8036$§!:\n" # todo: NEW TRANSLATION
  ETH_the_hindenburg_wall: "Hindenburgova zeď" # todo: NEW TRANSLATION
  ETH_the_hindenburg_wall_desc: "Náš turecký poradce $ETH_wehib_pasha$ chce vybudovat opevnění rovná německým z předchozí války kolem měst Harar a Dire Dawa. Udržením regionu zabráníme Italům spojit fronty a zajistíme přístup k moři přes přístav v Džibuti." # todo: NEW TRANSLATION
  ETH_the_hindenburg_wall_tt_1: "§Y$VICTORY_POINTS_7980$§!:\n" # todo: NEW TRANSLATION
  ETH_the_hindenburg_wall_tt_2: "§Y$VICTORY_POINTS_13249$§!:\n" # todo: NEW TRANSLATION
  ETH_mercenaries: "Žoldnéři" # todo: NEW TRANSLATION
  ETH_mercenaries_desc: "Mnoho cizinců se chce z různých důvodů přidat k našemu boji. Většina z nich jsou dobrodruzi za peníze, ale můžeme najmout žoldnéře z Belgického Konga a z Arábie. Zkušení bojovníci na naší straně mohou převážit poměr sil." # todo: NEW TRANSLATION
  ETH_mercenaries_congo_tt: "Přidá §Y3 kongolské žoldnéřské jednotky§!, pokud je jedna z §Y[838.GetName]§! nebo §Y[837.GetName]§! přátelsky kontrolována." # todo: NEW TRANSLATION
  ETH_mercenaries_arabia_tt: "Přidá §Y2 arabské žoldnéřské jednotky§!, pokud je jedna z §Y[843.GetName]§! nebo §Y[835.GetName]§! přátelsky kontrolována." # todo: NEW TRANSLATION
  ETH_reach_out_to_the_world: "Oslovit svět" # todo: NEW TRANSLATION
  ETH_reach_out_to_the_world_desc: "Svět musí vědět, co se děje v [ROOT.GetName]. Odolali jsme přesilu déle, než se zdá lidsky možné, a postavili jsme se evropské velmoci. Mezinárodní společenství musí vidět, že potřebujeme pomoc proti tomuto nezákonnému útoku!" # todo: NEW TRANSLATION
  ETH_a_last_stand: "Poslední obrana" # todo: NEW TRANSLATION
  ETH_a_last_stand_desc: "Nesmíme se nechat odradit neúspěchy. Jako poslední možnost se můžeme stáhnout k $VICTORY_POINTS_13244$ a připravit tam obranu. Italové budou mít potíže udržet zásobování až daleko na západ [ROOT.GetName]." # todo: NEW TRANSLATION
  ETH_the_lessons_of_war: "Lekce z války" # todo: NEW TRANSLATION
  ETH_the_lessons_of_war_desc: "Nikdo neví, jaké psychické tlaky unese jednotka na bojišti, natož jak s nimi poradí impérium. Ač jsme byli podvyzbrojeni pro moderní válku, naše armáda se z války poučila a zesílila." # todo: NEW TRANSLATION
  ETH_the_lessons_of_war_tt: "Upraví §Y[GetEthiopianArmySpiritName]§! o:\n$MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+10%§! \n$MODIFIER_MAX_DIG_IN$: §G+2§!\n$MODIFIER_DIG_IN_SPEED_FACTOR$: §G+10%§!" # todo: NEW TRANSLATION
  ETH_arms_purchases: "Nákupy zbraní" # todo: NEW TRANSLATION
  ETH_arms_purchases_desc: "Společnost národů selhala v zastavení italské invaze; místo toho uvalila embargo na prodej zbraní oběma zemím. Musí přece vidět, že to více škodí nám než [ITA.GetName]. Měli bychom předložit argument, že jako zákonný obránce můžeme mezinárodně nakupovat zbraně." # todo: NEW TRANSLATION
  ETH_arms_purchases_tt: "Odemkne rozhodnutí koupit zbraně od mezinárodních obchodníků se zbraněmi." # todo: NEW TRANSLATION
  ETH_request_embargo: "Požádat o embargo" # todo: NEW TRANSLATION
  ETH_request_embargo_desc: "Embargo na [ITA.GetName] je pouhý symbol, který jim vůbec neškodí. Společnost národů je připravena vyslechnout naše požadavky. Zaměřme úsilí na přesvědčení rady, aby uvalila přísnější embargo, které Itálii skutečně zasáhne — včetně ropy a oceli, které jsou pro jejich válečný stroj klíčové." # todo: NEW TRANSLATION
  ETH_international_brigades: "Mezinárodní brigády" # todo: NEW TRANSLATION
  ETH_international_brigades_desc: "Nastal čas, aby Společnost národů nejen zrušila zákaz posílání sil k naší podpoře, ale dokonce povzbudila členské státy, aby povstaly proti invazím!" # todo: NEW TRANSLATION
  ETH_league_of_nations_volunteer_resolution: "Rezoluce Společnosti národů o mezinárodních brigádách" # todo: NEW TRANSLATION
  ETH_closing_the_suez: "Uzavření Suezu" # todo: NEW TRANSLATION
  ETH_closing_the_suez_desc: "Společnost národů by měla donutit [453.Owner.GetNameDef] uzavřít Suezský průplav pro [ITA.GetAdjective] lodní dopravu. To by vážně poškodilo [ITA.GetAdjective] válečný stroj a umožnilo nám bojovat za rovných podmínek." # todo: NEW TRANSLATION
  ETH_international_mediation: "Mezinárodní mediace" # todo: NEW TRANSLATION
  ETH_international_mediation_desc: "Společnost národů si nemůže dovolit nechat konflikt mezi dvěma členskými státy pokračovat tak dlouho. Musí zasáhnout a donutit [ITA.GetName] stáhnout se na své předválečné hranice!" # todo: NEW TRANSLATION
  ETH_international_mediation_tt: "[ITA.GetName] a [ETH.GetName] podepíší bílý mír.\n " # todo: NEW TRANSLATION
  ETH_rally_around_the_emperor: "Sjednotit se kolem císaře" # todo: NEW TRANSLATION
  ETH_rally_around_the_emperor_desc: "Jeho veličenstvo [ETH.GetLeader] je pilířem, který drží rozmanité impérium pohromadě. V této krizové době odložme drobné křivdy a sjednoťme se za jeho majestátem — naší existenci a lidu jde o přežití." # todo: NEW TRANSLATION
  ETH_rally_around_the_emperor_tt: "Odemkne rozhodnutí nastavit možnou §YHostitelskou zemi§! pro etiopskou §Yvládu v exilu§!." # todo: NEW TRANSLATION
  ETH_support_spain_static_modifier: "Podpořit Španělsko" # todo: NEW TRANSLATION
  ETH_boarding_the_train: "Nástup do vlaku" # todo: NEW TRANSLATION
  ETH_boarding_the_train_desc: "Naše obranné linie začínají povolovat a pokud se nic zásadního nezmění, [ETH.GetName] přestane existovat. Zatímco mnozí z jeho poradců upozorňují na škodlivé důsledky absence trůnu, Jeho Veličenstvo [ETH.GetLeader] se rozhodl odcestovat do Ženevy s cílem získat mezinárodní podporu pro naši věc v Lize národů." # todo: NEW TRANSLATION
  ETH_boarding_the_train_tt: "§Y$ETH_haile_selassie$§! opouští [ROOT.GetName], aby šel do Ligy národů. Pokud Etiopie kapitulují, $ETH_haile_selassie$ vytvoří §Yvládu v exilu§!." # todo: NEW TRANSLATION
  ETH_has_host_nation_tt: "Potenciální §Yhostitelská země§! pro Vládu v exilu byla určena\n" # todo: NEW TRANSLATION
  ETH_the_emperor_stays: "Císař zůstává" # todo: NEW TRANSLATION
  ETH_the_emperor_stays_desc: "Navzdory prosbám poradců se Jeho Veličenstvo [ETH.GetLeader] rozhodl hrdinsky zůstat v [ETH.GetName] a pokračovat v boji po boku svých statečných válečníků. Doufejme, že nás dovede k vítězství v temné hodině impéria." # todo: NEW TRANSLATION
  ETH_the_american_radio_address: "Americký rozhlasový projev" # todo: NEW TRANSLATION
  ETH_the_american_radio_address_desc: "Zákony Ligy národů jsou neustále porušovány, protože se opakovaně dějí akty agrese. Ať nad lidskou rasou nepřevezme vládu duch prokletých, všichni mírumilovní lidé by měli spolupracovat, aby obstáli v obraně zákonnosti a míru." # todo: NEW TRANSLATION
  ETH_the_patriots: "Vlastenci" # todo: NEW TRANSLATION
  ETH_the_patriots_desc: "Zatímco vlastenci z Gojjamu byli překážkou pro císařskou vládu v plánech pro region, nyní nám pomáhají bránit, aby [ITA.GetAdjective]s vůbec nezřídili správu v oblasti. Měli bychom dělat, co můžeme, abychom vlastencům pomohli, udrželi si oporu v zemi a zabránili, aby se [ITA.GetAdjective]s příliš usadili." # todo: NEW TRANSLATION
  ETH_the_patriots_tt: "Odemkne §Y$ETH_supporting_the_arbegnoch$§! kontinuální fokus.\nPřidá §G+10§! cíl odporu ve státech okupovaných nepřítelem v severní a centrální Etiopii." # todo: NEW TRANSLATION
  ETH_allow_fundraising_campaigns_tt: "Odemkne §Yrozhodnutí§! zahájit fundraisingové kampaně ke zvýšení císařské pokladny." # todo: NEW TRANSLATION
  ETH_patriot_resistance_tt: "Aktivní odpor Arbegnoch: §R+10%§!" # todo: NEW TRANSLATION
  ETH_addressing_the_league_of_nations: "Projev v Lize národů" # todo: NEW TRANSLATION
  ETH_addressing_the_league_of_nations_desc: "Selhání shromáždění zakročit v záležitosti [ITA.GetName] války za dobytí a výsledná politika opuštění obětí agrese ohrožuje samotnou existenci Ligy. Ti členové, kteří zvolili politiku opuštění, by si měli pamatovat: dnes jsme to my, zítra to budete vy..." # todo: NEW TRANSLATION
  ETH_the_abuna: "Abuna" # todo: NEW TRANSLATION
  ETH_the_abuna_desc: "Odpor proti [ITA.GetAdjective]m vetřelcům není jen otázkou věrnosti císaři, ale i otázkou mravnosti. Konzultací s $ETH_abuna_qerellos_iv$ můžeme lidu ukázat spravedlnost naší věci a naléhavost jejich povinnosti ve jménu našeho boha." # todo: NEW TRANSLATION
  ETH_the_lion_stands_firm: "Lev stojí pevně" # todo: NEW TRANSLATION
  ETH_the_lion_stands_firm_desc: "Pod praporem Dobývajícího lva kmene Judy prokázal Jeho císařské veličenstvo [ETH.GetLeader] svou schopnost být válečníkem. Musíme povzbuzovat vojsko tím, že jim ukážeme sílu svého císaře, když bojuje po jejich boku a dokazuje, že válečná mašinérie [ITA.GetAdjective]ů může být poražena." # todo: NEW TRANSLATION
  ETH_the_lion_stands_firm_tt: "\nModifikuje §Y$ETH_army_1_dynamic_modifier$§!:\n$modifier_army_sub_unit_irregular_infantry_max_org_factor$: §G+5%§!" # todo: NEW TRANSLATION
  ETH_unification_of_the_habesha: "Sjednocení Habesha" # todo: NEW TRANSLATION
  ETH_unification_of_the_habesha_desc: "Válka s [ITA.GetName] způsobila nepředstavitelné škody na naší infrastruktuře a utrpení našemu lidu. Pouhé získání vlasti zpět již nestačí. Domáháme se odškodnění od [ITA.GetAdjective]ů včetně územních ústupků, které nám umožní sjednotit národy Habesha." # todo: NEW TRANSLATION
  ETH_the_ferengi: "Ferengi" # todo: NEW TRANSLATION
  ETH_the_ferengi_desc: "I když Liga národů pomalu reaguje na naše žádosti o pomoc, není nedostatek jednotlivců ze zahraničí, kteří jsou ochotni bojovat za naši věc. Pokud jim za to zaplatíme." # todo: NEW TRANSLATION
  ETH_the_ferengi_tt: "Odemkne §Yrozhodnutí§! náboru žoldnéřů za prostředky v císařské pokladně." # todo: NEW TRANSLATION
  ETH_recruit_from_the_african_diaspora: "Nábory z africké diaspory" # todo: NEW TRANSLATION
  ETH_recruit_from_the_african_diaspora_desc: "Nechtějí-li vidět zánik jednoho z posledních zbytků nezávislé Afriky, mnozí z africké diaspory po celém světě jsou ochotni vzít zbraně a bojovat po našem boku. Společně zachráníme nejen [ETH.GetName], ale samotnou myšlenku africké svobody." # todo: NEW TRANSLATION
  ETH_anti-italian_propaganda: "Protiitalská propaganda" # todo: NEW TRANSLATION
  ETH_anti-italian_propaganda_desc: "Ačkoliv velice oceňujeme pohostinnost našich hostitelů, že císaři umožnili bezpečný pobyt, mohli by udělat víc pro urychlení osvobození našeho lidu od fašistické okupace. Musíme je plně informovat o hrůzách, které [ITA.GetAdjective]ové rozpoutali nad lidmi [ETH.GetName], a získat je na naši stranu pro případnou osvobozeneckou kampaň." # todo: NEW TRANSLATION
  ETH_black_lions_resistance_tt: "Aktivní odpor Černých lvů: §R+10%§!" # todo: NEW TRANSLATION
  ETH_unlock_black_lions_tt: "Odemkne §Y$ETH_strengthen_the_black_lions$§! kontinuální fokus.\nPřidá §G+10§! cíl odporu ve státech okupovaných nepřítelem v jižní Etiopii." # todo: NEW TRANSLATION
  ETH_the_heroes_of_ethiopia: "Hrdinové Etiopie" # todo: NEW TRANSLATION
  ETH_the_heroes_of_ethiopia_desc: "Mnozí z našich vojenských velitelů se ukázali jako vynikající stratégové. Navzdory nepřátově ohromné materiální převaze dokázali naši vojenskí vůdci jejich postup zastavit. Musíme tyto hrdiny odměnit za jejich přínos k pokračujícímu přežití [ETH.GetNameDef]." # todo: NEW TRANSLATION
  ETH_seyoum_mengesha_upgrade_tt: "Získá: \n§Y$army_regrouping_2$§!" # todo: NEW TRANSLATION
  ETH_mulugeta_yeggazu_of_illubabor_upgrade_tt: "Získá: \n§Y$army_chief_morale_3$§!" # todo: NEW TRANSLATION
  ETH_ras_imru_haile_selassie_upgrade_tt: "Získá: \n§Y$army_infantry_2$§!" # todo: NEW TRANSLATION
  ETH_the_heroes_of_ethiopia_tt: "\nModifikuje §Y$ETH_army_1_dynamic_modifier$§!:\n$modifier_army_sub_unit_irregular_infantry_attack_factor$: §G+5%§!\n$modifier_army_sub_unit_irregular_infantry_speed_factor$: §G+5%§!" # todo: NEW TRANSLATION
  ETH_learning_from_the_enemy: "Učení se od nepřítele" # todo: NEW TRANSLATION
  ETH_learning_from_the_enemy_desc: "Navzdory naší omezené průmyslové kapacitě můžeme využít technologické převahy [ITA.GetAdjective]ů reverzním inženýrstvím jejich vozidel a vybavení a otočit je proti jejich tvůrcům." # todo: NEW TRANSLATION
  ETH_learning_from_the_enemy_tt: "Modifikovat §Y$ETH_industrialization_dynamic_modifier$§! o:\n$MODIFIER_INDUSTRIAL_CAPACITY_FACTOR$: §G+10%§!" # todo: NEW TRANSLATION
  ETH_learning_from_the_enemy_armor: "Učení se od nepřítele: Obrněná vozidla" # todo: NEW TRANSLATION
  ETH_learning_from_the_enemy_air: "Učení se od nepřítele: Letectvo" # todo: NEW TRANSLATION
  ETH_light_tank_tt: "Vytvořit variantu §Y$light_tank_chassis_1$: [ITA.GetFlag] L3/35§!" # todo: NEW TRANSLATION
  ETH_aircraft_tt: "Vytvořit variantu §Y$small_plane_airframe_0$: [ITA.GetFlag] CR.32§! \n Vytvořit variantu §Y$medium_plane_airframe_0$: [ITA.GetFlag] Ca.101§!" # todo: NEW TRANSLATION
  ETH_organize_regional_revolts: "Organizovat regionální povstání" # todo: NEW TRANSLATION
  ETH_organize_regional_revolts_desc: "[ITA.GetAdjective]ové si ještě nevybudovali pevný stisk nad naší vlastí. Odpor vůči okupaci postupně vysiluje jejich vybavení, personál a především jejich zápal pro pokračování v tomto krveprolití. Musíme pokračovat v pomoci odboji a začít koordinovat úsilí o svržení okupantů [ITA.GetAdjective]." # todo: NEW TRANSLATION
  ETH_organize_regional_revolts_tt: "Odemkne §Yrozhodnutí§! k organizaci povstaleckých armád na okupovaném území." # todo: NEW TRANSLATION
  ETH_secure_arms: "Zajistit zbraně" # todo: NEW TRANSLATION
  ETH_secure_arms_desc: "Sparťanský průmysl [ETH.GetName] zjevně není schopen zabezpečit armádu. Musíme využít bohatství císařské pokladny k nákupu zbraní a okamžitému doručení našim hrdinným bojovníkům." # todo: NEW TRANSLATION
  ETH_secure_arms_tt: "Odemkne §Yrozhodnutí§! k nákupu vojenského vybavení za prostředky v císařské pokladně" # todo: NEW TRANSLATION
  ETH_volunteers: "Dobrovolníci" # todo: NEW TRANSLATION
  ETH_volunteers_desc: "Po celém světě utlačované národy hledí na [ETH.GetName] jako na symbol naděje v boji proti drtivé imperialistické agresi. Nyní se lidé z našich hranic rozhodli se shromáždit pod [ETH.GetAdjective] prapory, aby bojovali po našem boku. Zdá se, že stále existují ti, kteří nejsou ochotni nechat sen o svobodě zhasnout kvůli rozmarům [ITA.GetLeader]." # todo: NEW TRANSLATION
  ETH_fait_accompli: "Fait Accompli" # todo: NEW TRANSLATION
  ETH_fait_accompli_desc: "Zatímco mnozí předpokládali, že [ETH.GetName] se stane jen poznámkou v dějinách kolonialismu, podařilo se mu překonat přesily nejen odporem proti invazi [ITA.GetAdjective]ů, ale i úplným vyhnáním [ITA.GetName] z Východní Afriky. Jediné, co zbývá, je donutit [ITA.GetAdjective]y formálně uznat svou porážku." # todo: NEW TRANSLATION
  ETH_fait_accompli_tt: "§Y[ITA.GetNameWithFlag]§! podepíše mír s §Y[ROOT.GetNameWithFlag]§!, postoupí jakékoli africké státy kontrolované [ROOT.GetNameDef].\n " # todo: NEW TRANSLATION
  ETH_reclaiming_ethiopia: "Obnova Etiopie" # todo: NEW TRANSLATION
  ETH_reclaiming_ethiopia_desc: "Postupně přesvědčujeme naše hostitele, aby formálně uznali [ETH.GetLeader] jako pokračujícího právoplatného vládcem [ETH.GetName], navzdory nelegální okupaci [ITA.GetName]. Stačí jim ještě poslední impuls a možná konečně zahájíme dlouho očekávanou osvobozeneckou kampaň." # todo: NEW TRANSLATION
  ETH_reclaiming_ethiopia_not_exile_tt: "\nEfekty, pokud nejsme Vláda v exilu:" # todo: NEW TRANSLATION
  ETH_reclaiming_ethiopia_exile_tt: "Efekty, pokud má [ROOT.GetName] Vládu v exilu:" # todo: NEW TRANSLATION
  ETH_haile_selassie_returns_tt: "$ETH_haile_selassie$ se vrací do [ETH.GetName]:" # todo: NEW TRANSLATION
  ETH_reclaiming_ethiopia_event_tt: "§Y[GetEthiopianHostName]§!:" # todo: NEW TRANSLATION
  ETH_formal_request_unlocked_tt: "Odemkne §Yrozhodnutí§! učinit formální žádost Hostitelské zemi o vstup do války pokud existuje Vláda v exilu" # todo: NEW TRANSLATION
  ETH_ethiopia_recognized_tt: "[ROOT.GetLeader] je uznáván jako pravý vůdce [ROOT.GetNameDef]:\n §Y[ROOT.GetName]§! může svolat spojence do války." # todo: NEW TRANSLATION
  ETH_the_heir_of_solomon: "Dědic Šalomounův" # todo: NEW TRANSLATION
  ETH_the_heir_of_solomon_desc: "[ENG.GetName] vytvořili napjatou situaci v Palestině, která vedla ke zhroucení podpory jejich mandátu Ligy národů. Možná by byli otevřeni převést správu regionu někomu jinému? A kdo by byl lépe způsobilý než dědic Šalomounův, [ETH.GetLeader]." # todo: NEW TRANSLATION
  ETH_protector_of_the_somalis: "Ochránce Somálců" # todo: NEW TRANSLATION
  ETH_protector_of_the_somalis_desc: "Nejenže [SOM.GetAdjective]ové jsou podrobeni barbarské vládě [ITA.GetAdjective]ů, ale byli také naverbováni, aby bojovali proti svému vlastnímu lidu ve jménu územní expanze [ITA.GetLeader]. Když [ITA.GetName] bude vyhnán z regionu, ochráníme [SOM.GetAdjective]y před vykořisťováním ze strany jakéhokoli evropského mocnáře." # todo: NEW TRANSLATION
  ETH_the_king_of_kings: "Král králů" # todo: NEW TRANSLATION
  ETH_the_king_of_kings_desc: "Jeho Veličenstvo, [ETH.GetLeader], nás vysvobodil z ponižujícího osudu stát se služebníky [ITA.GetAdjective]ů. Je vůdcem bez rovného v moderním světě a měl by být uctíván jako takový." # todo: NEW TRANSLATION
  ETH_rebuilding_the_country: "Obnova země" # todo: NEW TRANSLATION
  ETH_rebuilding_the_country_desc: "S plnou mocí nad našimi územími navrácenou konečně můžeme začít opravovat škody na domech a průmyslu způsobené [ITA.GetAdjective]y." # todo: NEW TRANSLATION
  ETH_support_anti-colonialist_resistance: "Podpora antikolonialistického odporu" # todo: NEW TRANSLATION
  ETH_support_anti-colonialist_resistance_tt: "Odemkne §Yrozhodnutí§! k posílení odporu v koloniálních státech v §YVýchodní Africe§!." # todo: NEW TRANSLATION
  ETH_support_anti-colonialist_resistance_desc: "Hrozba konfliktu nad námi bude viset, dokud koloniální mocnosti udrží svou oporu ve Východní Africe. Musíme je vytlačit z regionu povzbuzením mas a poskytnutím prostředků k získání nezávislosti." # todo: NEW TRANSLATION
  ETH_empower_the_ras: "Zmocnit Rasy" # todo: NEW TRANSLATION
  ETH_empower_the_ras_desc: "Dál zesílit negramotné rolnictvo impéria povede v dlouhodobém horizontu jen k zničení císařského systému. Místo toho zmocníme Rasy výměnou za pokračující loajalitu císaři." # todo: NEW TRANSLATION
  ETH_re-convene_the_parliament: "Znovusvolat parlament" # todo: NEW TRANSLATION
  ETH_re-convene_the_parliament_desc: "Je čas obnovit ústavu z roku 1931 a pokračovat v procesu modernizace institucí [ETH.GetName]. Svoláme císařský parlament a zvýšíme počet poslanců, abychom lépe spravovali různé regiony impéria.  " # todo: NEW TRANSLATION
  ETH_unite_the_afar: "Sjednotit Afar" # todo: NEW TRANSLATION
  ETH_unite_the_afar_desc: "S evropskou pozorností přesunutou na jejich vlastní kontinent můžeme získat podporu Afarů na severu nákupem regionu [DJI.GetName] a opětovným sjednocením Afarů po desetiletích separation." # todo: NEW TRANSLATION
  ETH_lord_of_lords: "Pán pánů" # todo: NEW TRANSLATION
  ETH_lord_of_lords_desc: "Ačkoliv naše impérium tvoří mnoho kultur, všichni se klanějí stejnému Pánu pánů. I nejurozenější páni vědí, že jejich povinnost patří císaři. Jeho veličenstvo je nesporným vládcem těchto zemí." # todo: NEW TRANSLATION
  ETH_elect_of_god: "Vyvolený Bohem" # todo: NEW TRANSLATION
  ETH_elect_of_god_desc: "Vidíme boha v činech našeho císaře. Jak jinak vysvětlit jeho úspěchy na bojišti a v správě našeho velkého impéria? Lidé vědí, že plnit přání císaře je jednat v souladu s vůlí všemohoucího." # todo: NEW TRANSLATION
  ETH_restore_the_empire_of_axum: "Obnovit Aksumské impérium" # todo: NEW TRANSLATION
  ETH_restore_the_empire_of_axum_desc: "Od soudánských zemí až po Arabský poloostrov, kdysi to vše ovládali naši předkové. Naše panství se v průběhu staletí zmenšilo a vystavilo nás rozmarům Evropanů. Nastal čas obrátit směr. Přijmeme naše dědictví reformou Aksumského impéria a znovuzískáním našich předků." # todo: NEW TRANSLATION
  ETH_restore_the_empire_of_axum_tt: "Odemkne §Yrozhodnutí§! vytvořit Aksumské impérium při kontrole dostatečného počtu států." # todo: NEW TRANSLATION
  ETH_a_federal_empire: "Federální impérium" # todo: NEW TRANSLATION
  ETH_a_federal_empire_desc: "Imperiální systém nabídne mnohem více stability ve srovnání s chaosem parlamentní demokracie. Dokud páni různých regionů budou nadále skládati věrnost Jeho veličenstvu [ETH.GetLeader], nám je jedno, jak spravují své državy." # todo: NEW TRANSLATION
  ETH_a_federal_empire_tt: "Odstraní modifikátor §Y$ETH_state_decentralization_dynamic_modifier$§! z všech států." # todo: NEW TRANSLATION
  ETH_federal_factories_tt: "Přidá §Y1 místo pro budovu§! a §Y1 $industrial_complex$§! v každém uvolněném loutkovém státě." # todo: NEW TRANSLATION
  ETH_empower_the_chambers: "Zmocnit sněmovny" # todo: NEW TRANSLATION
  ETH_empower_the_chambers_desc: "Ústava z roku 1931 nedostatečně kodifikovala roli císaře. Ani dostatečně nezapojila lid do vládních rozhodovacích procesů. Musíme zmocnit Sněmovnu poslanců, dát jí větší kontrolu nad záležitostmi státu, při zachování posvátné role císaře." # todo: NEW TRANSLATION
  ETH_empower_the_chambers_tt: "Modifikovat §Y$ETH_corrupt_bureaucracy_dynamic_modifier$§! o:\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+5%§!" # todo: NEW TRANSLATION
  ETH_the_african_union: "Smer k africkému sjednocení" # todo: NEW TRANSLATION
  ETH_the_african_union_desc: "Domáháme se konce kolonialismu, protože ovládání jednoho lidu druhým je špatné. Koordinované akce všech Afričanů na společných problémech jsou nezbytné, chceme-li, aby naše názory měly náležitou váhu. Proto budeme jednat z integrity a přesvědčení našich nejhlubších přesvědčení, bojem za osvobození celého kontinentu Afriky." # todo: NEW TRANSLATION
  ETH_african_independence_tt: "Odemkne §Yrozhodnutí§! zvyšující odpor a urychlující zisk autonomie v afrických zemích." # todo: NEW TRANSLATION
  ETH_arabian_independence_tt: "Odemkne §Yrozhodnutí§! zvyšující odpor a urychlující zisk autonomie v zemích na Arabském poloostrově." # todo: NEW TRANSLATION
  ETH_african_independence_join_tt: "Umožní §Y[ROOT.GetNameDef]§! zasahovat v afrických válkách za nezávislost." # todo: NEW TRANSLATION
  ETH_african_union_faction: "Africká unie" # todo: NEW TRANSLATION
  ETH_pan-africanism: "Pan-afrikanismus" # todo: NEW TRANSLATION
  ETH_pan-africanism_desc: "Cíl rovnosti, který hledáme, je opakem vykořisťování jednoho národa druhým, o čemž hovoří stránky nedávných afrických dějin. Ať už má jakoukoli podobu, toto zlo je třeba odmítnout tam, kde neexistuje, a zničit tam, kde ano. Je naší posvátnou povinností zajistit, aby sen rovnosti byl konečně uskutečněn pro všechny, kterým je stále odepřen." # todo: NEW TRANSLATION
  ETH_the_one_true_heir_of_solomon: "Jediný pravý dědic Šalomounův" # todo: NEW TRANSLATION
  ETH_the_one_true_heir_of_solomon_desc: "Jeho Veličenstvo, [ETH.GetLeader], dokáže vysledovat svou královskou krev až k velkému králi Šalomounovi. Zatímco mnoho národů se odvrátilo od Boha, my [ETH.GetAdjective]ové jsme zůstali pevní ve své víře. V této době chaosu je spravedlivé, aby jediný pravý dědic Šalomounův vládl nad Svatou zemí, aby ji ochránil před korupčním vlivem ideologií vytvořených lidmi." # todo: NEW TRANSLATION
  ETH_the_one_true_heir_of_solomon_tt: "Odemkne §Yrozhodnutí§! vytvořit Impérium Šalomounovo" # todo: NEW TRANSLATION
  ETH_jah: "Jah" # todo: NEW TRANSLATION
  ETH_jah_desc: "Hnutí rastafariánů vytvořilo nečekanou síť příznivců [ETH.GetName] po celém světě. Mnozí přisuzují našemu císaři, [ETH.Getleader], velký náboženský význam. Někteří jdou tak daleko, že tvrdí, že je ztělesněním Boha, nebo přesněji Jah. Možná bychom měli využít naší mezinárodní podpory přijetím tohoto rastafariánského hnutí." # todo: NEW TRANSLATION
  ETH_jah_tt: "Odemkne §Yrozhodnutí§! vytvořit Impérium Sion" # todo: NEW TRANSLATION
  ETH_military_communism: "Vojenský komunismus" # todo: NEW TRANSLATION
  ETH_military_communism_desc: "Nějaké naše úspěchy na frontě jsou výsledkem důvtipu a odvahy obyčejného vojáka, nikoli jejich dědičných vládců. Bubliny nevole sílí. Imperialismus dosáhl svého konce. Nyní je čas na přerozdělení bohatství, silou." # todo: NEW TRANSLATION
  ETH_defending_our_homes: "Obrana našich domovů" # todo: NEW TRANSLATION
  ETH_defending_our_homes_desc: "Císařská kliky v [ROOT.Capital.GetCapitalVictoryPointName] dbají jen o svou vlastní bezpečnost. Mezitím naše domovy a rodiny byly zničeny. Nemůžeme to dál trpět. Budeme bránit každý centimetr naší vlasti, ne pro císaře, ale pro sebe." # todo: NEW TRANSLATION
  ETH_anti_imperialist_agitation: "Antimperialistická agitace" # todo: NEW TRANSLATION
  ETH_anti_imperialist_agitation_desc: "Věrnost lidu vůči [ROOT.GetLeader] slábne. Selháním v jejich nejdůležitější povinnosti – ochraně lidu – naši údajní vůdci plně prokázali svou neschopnost. Na frontě i v ulicích se nyní otevřeně diskutuje, co bylo kdysi nepředstavitelné: národ bez císaře." # todo: NEW TRANSLATION
  ETH_in_the_name_of_the_people: "Ve jménu lidu" # todo: NEW TRANSLATION
  ETH_in_the_name_of_the_people_desc: "Ve jménu lidu rozpustíme dynastické tyranii, která vládla [ROOT.GetName] po staletí. Na jejím místě vytvoříme dělnickou republiku, osvobozenou od pout feudálního řádu. A skrze naši kolektivní sílu porazíme fašismus v Africe." # todo: NEW TRANSLATION
  EHT_in_the_name_of_the_people_tt: "Vytvořit §Ydvě§! elitní divize komunistických §YRudých gard§! a §Ytři§! elitní divize anarchistických §YČerných lvů§! v [ETH.Capital.GetCapitalVictoryPointName]. \n\n§R$ETH_seyoum_mengesha$ již nebude dostupný!§!" # todo: NEW TRANSLATION
  ETH_callout_to_the_world: "Výzva světu" # todo: NEW TRANSLATION
  ETH_callout_to_the_world_desc: "Náš boj proti fašismu není záležitostí jen naší země, je součástí širšího globálního boje proti autoritářství. Shromáždíme síly antifašismu po celém světě k naší věci, neboť dnes je to nás, koho surově trestají, zítra to může být celý svět." # todo: NEW TRANSLATION
  ETH_callout_to_the_world_tt: "§Y$ENG_sylvia_pankhurst$§! a §Y$IA_emma_goldman$§! budou dostupné jako poradkyně." # todo: NEW TRANSLATION
  ETH_soviet_aid: "Sovětská pomoc" # todo: NEW TRANSLATION
  ETH_soviet_aid_desc: "Svázali jsme pouta feudální podřízenosti. Teď musíme porazit fašisty a začít tvořit naši dělnickou republiku. Pokud nám někdo projeví sympatie, budou to jistě lidé ze [SOV.Getname]." # todo: NEW TRANSLATION
  ETH_soviet_aid_tt: "§R\n[SOV.GetNameDefCap] bude očekávat větší kontrolu nad našimi záležitostmi výměnou za pomoc! §!" # todo: NEW TRANSLATION
  ETH_humanitarian_aid: "Humanitární pomoc" # todo: NEW TRANSLATION
  ETH_humanitarian_aid_desc: "Nepřítel se nestará o to, kolik utrpení způsobí našemu lidu. Pokud to bude pokračovat, nezůstane země k obraně. Svět musí vidět hrůzy, které se tady dějí, a poslat humanitární pomoc okamžitě." # todo: NEW TRANSLATION
  ETH_humanitarian_aid_tt: "Modifikovat §Y$ETH_international_red_cross_dynamic_modifier$§! o:\n$MODIFIER_INDUSTRY_REPAIR_FACTOR$: §G+10%§!" # todo: NEW TRANSLATION
  ETH_support_from_the_japanese_communists: "Japonský anarcho-komunismus" # todo: NEW TRANSLATION
  ETH_support_from_the_japanese_communists_desc: "Japonci a [ETH.GetAdjective]ové si dlouho vzájemně projevovali respekt jako jedni z mála, kteří úspěšně vzdorovali evropské kolonizaci. Při přechodu mimo feudální epochu v [ETH.GetNameDef] tu jsou v [JAP.GetNameDef] lidé, kteří sdílejí naše ideály a mohou nám pomoci vytvořit model anarcho-komunistické společnosti." # todo: NEW TRANSLATION
  ETH_support_from_the_japanese_communists_tt: "§Y$IA_sakutaro_iwasa$§! a §Y$IA_sanshiro_ishikawa$§! se stanou dostupnými jako poradkyně." # todo: NEW TRANSLATION
  ETH_support_from_the_japanese_communists_fascist_tt: "§RMůže vést k tomu, že [JAP.GetFlag][JAP.GetName] uvalí obchodní embargo proti [ETH.GetFlag][ETH.GetName]!§!" # todo: NEW TRANSLATION
  ETH_raise_from_the_ranks: "Povýšit z řad" # todo: NEW TRANSLATION
  ETH_raise_from_the_ranks_desc: "Šlechta už nebude mít velení nad ozbrojenými silami. Mnozí z našich statečných vojáků se ukázali jako schopní velitelé. Je čas odměnit odvahu a dovednosti na bojišti místo dynastických spojení či osobného bohatství." # todo: NEW TRANSLATION
  ETH_raise_from_the_ranks_tt: "Přidat §Ydvě§! nové důstojníky s hodností §Ygenerál§!." # todo: NEW TRANSLATION
  ETH_soviet_rifles: "Sovětské pušky" # todo: NEW TRANSLATION
  ETH_soviet_rifles_desc: "Byli jsme zoufale nepřipravení, když nás napadli [ITA.GetName]. Nyní náš průmysl nestíhá logistické požadavky moderní války. Potřebujeme pušky a munici do rukou každého, kdo je schopen je držet. Možná nám pomohou naši přátelé v [SOV.Capital.GetCapitalVictoryPointName]. " # todo: NEW TRANSLATION
  ETH_soviet_rifles_tt: "\nPokud [SOV.GetFlag]§Y[SOV.GetName]§! souhlasí, [ETH.GetFlag]§Y[ETH.GetName]§! obdrží §G10,000§! pěchotního vybavení." # todo: NEW TRANSLATION
  ETH_military_advisors: "Sovětské generály" # todo: NEW TRANSLATION
  ETH_military_advisors_desc: "Zatímco mnozí z našich důstojníků se přizpůsobili požadavkům moderní války, je zřejmé, že do značné míry improvizují, jak nejlépe dovedou. Mnohé se můžeme naučit od našich soudruhů v [SOV.GetAdjective] armádě." # todo: NEW TRANSLATION
  ETH_military_advisors_tt: "\nPokud [SOV.GetFlag]§Y[SOV.GetName]§! souhlasí, [ETH.GetFlag]§Y[ETH.GetName]§! získá polního maršála (§Y$SOV_semyon_budyonny$§!) a generála (§Y$SOV_vasily_kuznetsov$§!)." # todo: NEW TRANSLATION
  ETH_international_brigades_communist: "Mezinárodní brigády"
  ETH_soviet_rejection_tt: "\n[SOV.GetFlag]§Y[SOV.GetNameDefCap]§! §Rpravděpodobně tento návrh odmítne, pokud už nejsou komunističtí nebo prožívají občanskou válku!§!"
  ETH_international_brigades_communist_desc: "Na celém světě je mnoho lidí, kteří soucítí s naším bojem proti [ITA.GetAdjective]ům. Měli bychom využít jejich sympatie a nabídnout jim možnost chopit se zbraní proti fašismu po našem boku."
  ETH_peoples_army: "Lidová armáda"
  ETH_peoples_army_desc: "Navzdory naší počáteční slabosti ve vedení moderní války se nám podařilo zpomalit [ITA.GetAdjective] invazi použitím nekonvenčních taktik. Můžeme to zakotvit v naší vojenské doktríně a vycvičit důstojníky, jak vést asymetrickou válku."
  ETH_the_new_administration: "Nová správa"
  ETH_the_new_administration_desc: "Uprostřed nedávného zmatku mnoho lidí překročilo hranici povinností, aby bránilo naši zemi. Někteří, jako Senedu Gebru, mají také dovednosti a znalosti pro zásadní zlepšení společnosti. Nyní jim dáme příležitost to udělat."
  ETH_the_new_administration_tt: "§YSenedu Gebru§! je k dispozici jako politický poradce.\n   $rebellious_educator_tt$ \nDva §Ynáhodní§! postavy se také stanou dostupnými jako politické poradci."
  ETH_clearing_the_skies: "Vyčištění oblohy"
  ETH_clearing_the_skies_desc: "Naši vojáci jsou zcela vystaveni nepřátelským letadlům beze zbraně k obraně. Co je horší, nepřítel vždy zná naše rozmístění a pohyby. Potřebujeme vlastní letectvo a protiopatření, pokud máme naději na vítězství. Měli bychom proto poslat dobrovolníky na výcvik k [SOV.GetAdjective]mu letectvu."
  ETH_clearing_the_skies_tt: "\nPokud [SOV.GetFlag]§Y[SOV.GetName]§! souhlasí, [ETH.GetFlag]§Y[ETH.GetName]§! obdrží §G100§! [SOV.GetAdjective] stíhacích letadel a §YEarly Fighter§! technologii."
  ETH_counter_the_armored_threat: "Zamezit obrněné hrozbě"
  ETH_counter_the_armored_threat_desc: "Obrněné válčení jasně nahrazuje roli jízdy na bojišti. Bohužel nemáme dostatečný prostředek, jak účinně čelit [ITA.GetAdjective] obrněným silám a náš průmysl ještě nedosahuje schopnosti takové vyrobit. Možná by [SOV.GetName] byl ochoten se vzdát některých svých starších obrněných vozidel?"
  ETH_counter_the_armored_threat_LaR_tt: "\nPokud [SOV.GetFlag]§Y[SOV.GetName]§! souhlasí, [ETH.GetFlag]§Y[ETH.GetName]§! obdrží §YInterwar Armored Car§! technologii a §G480§! [SOV.GetAdjective] obrněných automobilů."
  ETH_counter_the_armored_threat_NoLaR_tt: "\nPokud [SOV.GetFlag]§Y[SOV.GetName]§! souhlasí, [ETH.GetFlag]§Y[ETH.GetName]§! obdrží §YInterwar Tank§! technologii a §G200§! [SOV.GetAdjective] tanků."
  ETH_counter_the_armored_threat_NoNSB_tt: "\nPokud [SOV.GetFlag]§Y[SOV.GetName]§! souhlasí, [ETH.GetFlag]§Y[ETH.GetName]§! obdrží §YGreat War Tank§! technologii a §G200§! [SOV.GetAdjective] tanků."
  ETH_peace_negotiations: "Mírová jednání"
  ETH_peace_negotiations_desc: "Náš lid obětoval mnoho, aby zastavil [ITA.GetAdjective] invazi. Nyní, když jsme [ITA.GetAdjective]ům dokázali, že se před nimi nezhroutíme, máme příležitost uzavřít mír. Nebo alespoň dohodu o příměří."
  ETH_soviet_mediation: "Sovětská mediace"
  ETH_soviet_mediation_desc: "Navzdory hrdinskému úsilí našeho lidu při zastavení [ITA.GetAdjective] invaze jsme daleko od úplného vítězství. Společnost národů ukázala neochotu nám pomoci, takže naší jedinou nadějí je [SOV.GetNameDefCap]."
  ETH_soviet_mediation_tt: "§R\n[SOV.GetNameDefCap] se může pokusit nás ovládnout výměnou za vyjednávání s [ITA.GetName]! §!"
  ETH_support_spain: "Podpora Španělsku"
  ETH_support_spain_desc: "Španělsko trpělo rukou domácích fašistů. Nicméně jsou tací, kteří věří jako my, že fašismus musí být setkán pevně a že lid může vládnout sám sobě. Použijeme lekce získané v naší válce s [ITA.GetAdjective]mi k podpoře [SPC.GetAdjective]ho odporu."
  ETH_local_committees: "Místní výbory"
  ETH_local_committees_desc: "Máme příležitost vytvořit nový systém vlády, osvobozený od zbytečných vrstev hierarchie, které nevyhnutelně rodí korupci a potlačují vůli lidu. Měli bychom využít této příležitosti k formování federace komun, z nichž každá bude dodržovat principy anarcho-komunismu."
  ETH_a_guiding_hand: "Vedená ruka"
  ETH_a_guiding_hand_desc: "Volně spojená koalice komun bez vyšší autority je příliš idealistická. Potřebujeme kabinet zástupců a odborníků, který bude řídit hospodářskou politiku a rychle reagovat na nouzové situace. Nemůžeme si dovolit opakovat selhání císařské správy v krizi."
  ETH_transformation_of_nature: "Proměna přírody"
  ETH_transformation_of_nature_desc: "[ETH.GetNameDefCap] je bohatá na přírodní zdroje, jen čekající na využití. Vytvořením vodních elektráren na našich řekách můžeme přinést elektřinu do každého domova v zemi. Současně můžeme využít vodní cesty k rozšíření zemědělské kapacity pro podporu rostoucí populace."
  ETH_transformation_of_nature_tt: "(§Y4 Randomly Selected Owned States§!): Přidat §G1§! stavební slot"
  ETH_laying_the_tracks: "Pokládání kolejí"
  ETH_laying_the_tracks_desc: "Většina populace a průmyslu se soustřeďuje na západě naší země. Proto, abychom lépe využili naše bohaté přírodní zdroje, potřebujeme masivní rozšíření železniční sítě k jejich dopravě do továren."
  ETH_red_army_engineers: "Inženýři Rudé armády"
  ETH_red_army_engineers_desc: "Velká část infrastruktury naší země byla těžce poškozena během [ITA.GetAdjective] invaze. Pokud chceme vybudovat pravou dělnickou republiku, budeme muset nejen opravit, co jsme měli, ale zahájit program rychlé industrializace. Měli bychom využít dovednosti našich soudruhů v Rudé armádě k nastartování procesu."
  ETH_liberate_aussa: "Přinést revoluci Afarům"
  ETH_liberate_aussa_desc: "[AFA.GetNameDefCap] je ovládána zrádnou oligarchií, která několikrát stála na straně našich nepřátel. Taková hrozba pro [ETH.GetNameDef] již nemůže být přehlížena. Osvobodíme [AFA.GetAdjective] lid a začleníme region do naší dělnické republiky."
  ETH_demand_DJI: "Osvobodit [268.GetName]"
  ETH_demand_DJI_desc: "S osvobozením [AFA.GetName] nyní vládneme významnému počtu Afarů. Afarové však zůstávají rozděleni kvůli [FRA.GetAdjective] okupaci [DJI.GetName]. Tím, že požádáme o osvobození Afarů od imperialistické nadvlády, můžeme získat jejich loajalitu a zároveň strategické přístavní místo."
  ETH_the_rif: "Rif"
  ETH_the_rif_desc: "Mnoho fašistů, kteří nyní usilují o moc ve Španělsku, byli kdysi vojáci, kteří zničili Republiku Rifu v severním Maroku. Měli bychom využít naše blízké vazby s [SPC.GetName], abychom prosazovali dekolonizaci jejich afrických držav. Pokud jsou skutečně naši soudruzi, jistě souhlasí. A pokud ne, už víme, jak se vypořádat s kolonialismem."
  ETH_communal_education: "Komunální vzdělání"
  ETH_communal_education_desc: "Zajistit, aby každá komunita v [ETH.GetNameDef] měla přístup ke vzdělání přes školy a knihovny, je zásadní, pokud chceme zlepšit životní úroveň jejich obyvatel."
  ETH_african_wildfire: "Africké požáry odporu"
  ETH_african_wildfire_desc: "Úspěšně jsme překonali [ITA.GetAdjective] invazi, ale neměli bychom odpočívat, dokud není celá Afrika osvobozena od hrůz kolonialismu. Měli bychom použít naše dovednosti a zdroje, aby jsme rozdmýchali plameny odporu po celém kontinentu a přinutili imperialisty se stáhnout."
  ETH_flames_across_the_sea: "Plameny za mořem"
  ETH_flames_across_the_sea_desc: "Nejen Afrika trpěla pod evropskou hegemonií. Naši sousedé přes Rudé moře mají malou nebo žádnou skutečnou nezávislost vůči požadavkům imperialistů. Měli bychom rozšířit plameny odporu na Arabský poloostrov, aby lid měl šanci jednoho dne plně vládnout sám sobě."
  ETH_heavy_industry: "Těžký průmysl"
  ETH_heavy_industry_desc: "Musíme pokračovat v procesu rychlé industrializace, pokud chceme uniknout spárům feudální ekonomiky. Vytvoření těžkého průmyslu přiláká dělníky do měst a vytvoří třídu vzorových proletářů místo stávajících sedláků."
  ETH_arms_production: "Výroba zbraní"
  ETH_arms_production_desc: "Vyvrcholením industrializace bude vznik našeho vlastního zbrojního průmyslu. Už nikdy nebudeme závislí na jiných státech pro naši obrannou výzbroj."
  ETH_mytishchi-ababa_plant: "Závod Mytishchi-Ababa"
  ETH_mytishchi-ababa_plant_desc: "Měli bychom využít naše blízké vazby se Sovětským svazem, abychom získali odbornost ve výrobě domácích a vojenských strojů. Společný projekt továrny by byl ideálním mechanismem pro získání takových znalostí, a kdo jiný by byl lepším partnerem než Mytishchi Machine-Building."
  ETH_send_home_advisors: "Poslat poradce domů"
  ETH_send_home_advisors_desc: "Zatímco jsme využili podporu [SOV.GetName] během války s [ITA.GetName], nikdy jsme neočekávali, že nám budou vnucovat tak podřízenou roli. Jak budujeme vlastní průmyslovou a vojenskou kapacitu, máme rostoucí sílu odolávat [SOV.GetAdjective] požadavkům. Je tedy čas jasně ukázat, kdo má na starosti [ETH.Capital.GetCapitalVictoryPointName]."
  ETH_send_home_advisors_tt: "Vrátit všechny [SOV.GetAdjective] vojenské poradce zpět do [SOV.GetNameDef]."
  ETH_soviet-ethiopian_trade_agreement: "Sovětsko-etiopská obchodní dohoda"
  ETH_soviet-ethiopian_trade_agreement_desc: "Mnoho zemí po světě nerado s námi obchoduje kvůli ideologickému odporu k naší dělnické republice. Nicméně máme příležitost vytvořit vzájemně výhodnou obchodní dohodu s [SOV.GetAdjective]mi, což nám umožní vyměňovat zdroje a zboží bez obvyklých obchodních bariér."
  ETH_seek_new_trading_partners: "Hledat nové obchodní partnery"
  ETH_seek_new_trading_partners_desc: "Lidé po celém světě dychtí po bohatství, které naše země nabízí, přesto obchodujeme výhradně s [SOV.GetAdjective]mi. Měli bychom oslovit jiné státy, abychom ukázali, že nejsme jen prodlouženou rukou [SOV.GetName], a začít přivádět bohatství zpět k [ETH.GetAdjective]mu lidu."
  ETH_freedom_at_gunpoint: "Svoboda pod bodcem"
  ETH_freedom_at_gunpoint_desc: "Podařilo se nám několikrát odrazit [ITA.GetAdjective] v jejich snaze podrobit náš lid. Naši sousedé však v odporu proti kolonialistům neměli tolik štěstí. Je čas obrátit naše válečné zkušenosti a nově nabytou ekonomickou sílu k osvobození Afriky jediným jazykem, kterému kolonizátoři rozumějí. Hrubou silou."
  ETH_freedom_at_gunpoint_tt: "Odemknout §YFreedom at Gunpoint§! rozhodnutí k osvobození afrických zemí."
  ETH_boots_on_the_shore: "Boty na pobřeží"
  ETH_boots_on_the_shore_desc: "Máme dlouhou historii obchodu a kulturní výměny s obyvateli Arabského poloostrova. Bohužel jsou stále uvězněni ve svých feudálních systémech vlády. Pokud bychom osvobodili obyvatele poloostrova, mohli bychom kontrolovat důležitou obchodní trasu podél Rudého moře a promítat náš vliv hluboko do Středního východu."
  ETH_request_soviet_hulls: "Požádat o sovětské trupové části bitevních lodí"
  ETH_request_soviet_hulls_desc: "Pokud se chceme v budoucích konfliktech vyhnout blokádám, musíme se naučit vyrábět vlastní lodě. [SOV.GetNameDefCap] nedávno seškrtal některé z bitevních projektů a mohl by být otevřen jejich prodeji nepotvrzených trupů. Z takového nákupu bychom se mohli mnoho naučit."
  ETH_organization_of_african_unity: "Organizace africké jednoty"
  ETH_organization_of_african_unity_desc: "Doteď byla svoboda od evropské kolonizace vnímána jako záležitost prostého získání nezávislosti. Zdá se však, že jsme všichni stále potenciálními cíli pro dobytí v očích mnoha vůdců mimo Afriku. Jen společným postojem a spoluprací může lid Afriky doufat, že se vyhne opětovnému podřízení."
  ETH_organization_of_african_unity_tt: "Odemknout rozhodnutí pozvat nezávislé africké země do §YOrganization of African Unity§!"
  ETH_pan-africanism_liberate_tt: "Získat §Yosvobodit válečné cíle§! proti všem koloniálním mocnostem v Africe:"
  ETH_executive_council: "Výkonná rada"
  ETH_executive_council_desc: "Měli bychom prosadit větší spolupráci v Organizaci africké jednoty vytvořením výkonného orgánu, který bude jednat dle vůle lidu a bude moci rychle reagovat na hrozby stability v našem regionu."
  ETH_executive_council_tt: "Odemknout rozhodnutí pozvat členy §YOrganization of African Unity§! do Výkonné rady."
  ETH_african_union: "Africká unie"
  ETH_african_union_desc: "Nastal čas, aby byl lid Afriky sjednocen v Africké unii. Už nikdy nebudeme ohrožováni imperialisty nebo fašisty, jak usilujeme stát se první africkou supervelmocí."
  ETH_african_union_tt: "Odemknout rozhodnutí začlenit členy §YExecutive Council§! do §YAfrican Union§!"
  ETH_african_central_bank: "Centrální banka [ETH_GetCentralBankName]"
  ETH_african_central_bank_desc: "Vytvořením [ETH_GetCentralBankName] bychom mohli zahájit proces integrace ekonomik v rámci Organizace africké jednoty. To by nám umožnilo efektivněji využívat zdroje a infrastrukturu ku prospěchu všech členských států."
  ETH_african_central_bank_tt: "Odemknout rozhodnutí pozvat členy §YOrganization of African Unity§! do [ETH_GetCentralBankName]."
  ETH_african_central_bank_2_tt: "$MODIFIER_STABILITY_FACTOR$: §R-5%§! \n$modifier_production_speed_industrial_complex_factor$: §R-10%§! \n$modifier_production_speed_infrastructure_factor$: §R-10%§!"
  ETH_mass_transit: "Kolektivizovaná hromadná doprava"
  ETH_mass_transit_desc: "Velká část naší dopravní infrastruktury je zastaralá a vyžaduje reorganizaci, aby mohla být využívána efektivněji. Nejlépe kvalifikovaní implementovat takové reformy jsou dělníci, kteří infrastrukturu provozují."
  ETH_mutual_defense: "Vzájemná obrana "
  ETH_mutual_defense_desc: "Lidé Afriky nikdy nebudou mít trvalý mír, dokud světa nepochopí, že snaha kolonizovat nás je příliš nákladná. Aby toho dosáhli, členové Organizace africké jednoty by měli vytvořit dohodu o vzájemné obraně, slibující chránit jeden druhého v případě útoku."
  ETH_mutual_defense_tt: "Odemknout rozhodnutí pozvat členy §YOrganization of African Unity§! do dohody o vzájemné obraně."
  ETH_our_own_path: "Naše vlastní cesta"
  ETH_our_own_path_desc: "Byli jsme příliš slabí, abychom odolali [SOV.GetAdjective]m, když nás zradili převzetím kontroly nad našimi záležitostmi. Nyní jsme v mnohem silnějším postavení a konečně můžeme učinit krok k obnovení naší nezávislosti. Musíme se však připravit na možné odvety ze strany [SOV.GetAdjective]ů."
  ETH_our_own_path_tt: "§R[SOV.GetNameDefCap] bude touto cestou rozzuřen a může se snažit vrátit Etiopii pod [SOV.GetAdjective] kontrolu!§!"
  ETH_communal_agriculture: "Komunální zemědělství"
  ETH_communal_agriculture_desc: "Kolektivizací zemědělství a zavedením nových zemědělských metod můžeme masivně zvýšit naši zemědělskou produkci a garantovat přístup potravin všem. To také umožní emancipovaným sedlákům najít alternativní zaměstnání ve městech namísto živoření."
  ETH_communal_agriculture_industry_tt: "Modifikovat §Y$ETH_industrialization_dynamic_modifier$§! o:\n$MODIFIER_INDUSTRIAL_CAPACITY_FACTOR$: §G+10%§!"
  ETH_communal_agriculture_consumer_tt: "Modifikovat §Y$ETH_industrialization_dynamic_modifier$§! o:\n$MODIFIER_CONSUMER_GOODS_FACTOR$: §Y-5%§!"
  ETH_seize_the_means: "Zabrat výrobní prostředky"
  ETH_seize_the_means_desc: "Generace [ETH.GetAdjective] dělníků obdělávaly pole a budovaly průmysl měst. Jejich krev je v půdě. Proto už neumožníme bohaté kliky požadovat vlastnictví těchto aktiv. Vrátíme je lidu."
  ETH_preparing_for_the_inevitable: "Příprava na nevyhnutelné"
  ETH_preparing_for_the_inevitable_desc: "Mocní po celém světě nebudou tolerovat naše radikální reformy v [ETH.GetNameDef] ze strachu, že jejich vlastní lidé budou požadovat totéž. Musíme být připraveni na jejich nevyhnutelné pokusy zničit náš způsob života."
  ETH_refuge_for_the_spanish_exiles: "Útočiště pro španělské exily"
  ETH_refuge_for_the_spanish_exiles_desc: "Naši ideologičtí soudruzi ve Španělsku viděli své sny o anarchismu zničeny kombinovaným úsilím fašistů, stalinistů a kapitalistů z celého světa. Musíme otevřít naše hranice našim vysídleným přátelům a nabídnout jim druhou šanci na vybudování lepší budoucnosti."
  ETH_the_lion_and_the_sun: "Lev a slunce"
  ETH_the_lion_and_the_sun_desc: "Jeho Veličenstvo [ETH.GetLeader] a japonský císař, [JAP.GetLeader], nalezli mnoho společného mezi našimi velkými impérii. [JAP.GetLeader] dokonce naznačil, že jeho vláda investuje do [ETH.GetName], až znovu získáme naši vlast."
  ETH_japanese_investments_tt: "Odemkne §Yrozhodnutí§! pro japonské investice v [ROOT.GetName], jakmile bude [ROOT.GetName] osvobozen"
  ETH_an_ethiopian_navy_in_exile: "Etiopské námořnictvo v exilu"
  ETH_an_ethiopian_navy_in_exile_desc: "Po demonstracích [JAP.GetAdjective] námořní síly Jeho Veličenstvo [ETH.GetLeader] požádal naše štědré hostitele o pomoc při vybudování [ETH.GetAdjective] námořnictva, které by pomohlo osvobození naší vlasti a její ochraně před budoucími útoky."
  ETH_an_arabic_base: "Arabská základna"
  ETH_an_arabic_base_desc: "Stále jasněji se ukazuje, že [JAP.GetName] hodlá v příštích letech přetvořit region Asie a Pacifiku. Jak jsme se stále více srovnávali s [JAP.GetAdjective]mi, dává smysl prokousat si kus pro sebe. Nejprve bychom měli požádat o kontrolu nad zeměmi našich předků na Arabském poloostrově."
  ETH_uk_arabia_tt: "Každý §YArabský§! stát vlastní §Y[ENG.GetNameWithFlag]§! nebo §Yspojenec§! §Y[ENG.GetNameDef]§!"
  ETH_an_empire_in_the_shade_of_the_sun: "Impérium ve stínu slunce"
  ETH_an_empire_in_the_shade_of_the_sun_desc: "Jeho Veličenstvo [ETH.GetLeader] je císař bez impéria. To je nejen ponižující pro našeho císaře, ale také omezuje naši schopnost učinit opatření pro osvobození [ETH.GetName]. Možná by naši přátelé v [JAP.Capital.GetCapitalVictoryPointName] byli ochotni dát nám kontrolu nad ostrovem, abychom jej využili jako základnu pro eventualní osvobození své vlasti."
  ETH_japan_has_island_tt: "Japonsko kontroluje alespoň jeden nestandardní ostrovní stát."
  ETH_japan_joins_tt: "§Y[JAP.GetNameDefCap]§! se připojí ke §Y[ROOT.GetName]§! válce proti [ITA.GetName].\n§Y[ROOT.GetName]§! se stane loutkou §Y[JAP.GetName]§!"
  ETH_an_audience_with_countryleadertitle: "Audience u [GetGermanCountryLeaderTitle]"
  ETH_an_audience_with_countryleadertitle_desc: "[GER.GetLeader] má ambiciózní plány na přeuspořádání nejen [GER.GetNameDef], ale i celého světa. Získáním audience u [GER.GetAdjective]ho vůdce bude svět i nadále vnímat Jeho Veličenstvo, [ETH.GetLeader], jako jediného pravého vládce [ETH.GetName]."
  GER_fascism_leader_title: "Führer"
  GER_male_kaiser_title: "Kaiser"
  GER_female_kaiser_title: "Kaiserin"
  GER_chancellor_title: "Kancelář"
  GER_generalfeldmarshall_title: "Generalfeldmarshall"
  ETH_befriend_goring: "Sblížit se s Göringem"
  ETH_befriend_goring_desc: "Německá vláda je sítí politických intrik a zrady. Kdo má ucho [GER.GetLeader] v daném okamžiku, má potenciál masivně ovlivnit [GER.GetAdjective] politická rozhodnutí. Možná bychom mohli získat nějaký vliv tím, že se skamarádíme s členem vládnoucí elity, jako je $GER_hermann_goring$."
  ETH_steel_lions: "Oceloví lvi"
  ETH_steel_lions_desc: "[GER.GetNameDefCap] průkopní nových metod vedení války. Dny jízdy a zákopové války jsou pryč. Budoucnost patří tanku. Měli bychom využít náš čas v [GER.GetNameDef], abychom se naučili, jak používat moderní zbraně a připravit se na osvobození naší vlasti."
  ETH_armor_officers_tt: "Až dva [ROOT.GetAdjective] důstojníci získají vlastnost §Y$armor_officer$§!"
  ETH_german_mediation: "[GER.GetAdjective] mediace"
  ETH_german_mediation_desc: "Jak se ambice [GER.GetAdjective] a [ITA.GetAdjective] začínají sjednocovat, otázka [ETH.GetName] zůstává kamenem úrazu pro zvýšenou spolupráci mezi oběma státy. Možná [GER.GetLeader] dokáže přesvědčit [ITA.GetLeader] k ukončení jeho nesmyslné okupace a umožnit císaři návrat na jeho právoplatné místo v [ETH.GetName]."
  ETH_ger_and_ita_have_same_dieology_tt: "[GER.GetFlag]§Y[GER.GetName]§! má stejnou ideologii jako [ITA.GetFlag]§Y[ITA.GetName]§!."
  ETH_sabotage_italo-german_relations: "Sabotovat italsko-německé vztahy"
  ETH_sabotage_italo-german_relations_desc: "Nemůžeme dovolit, aby se [GER.GetNameDef] a [ITA.GetName] považovali navzájem za potenciální spojence. Musíme udělat vše pro sabotáže vztahů mezi nimi. Jinak bychom mohli vidět Jeho Veličenstvo stát se vězněm [ITA.GetLeader] a sen o svobodné [ETH.GetName] zničen."
  ETH_unlock_false_flag_tt: "Odemkne rozhodnutí zahájit operaci falešné vlajky s cílem obvinit [ITA.GetFlag] §Y[ITA.GetName]§!"
  ETH_joint_swedish-ethiopian_intelligence_program: "Společný švédsko-etiopský zpravodajský program"
  ETH_joint_swedish-ethiopian_intelligence_program_desc: "Přímá pomoc [ETH.GetName] by vyvolala otázky ohledně neutrality [SWE.GetName]. Mohli by však být ochotni nabídnout utajenou podporu, aby uchovali zdání popření. Využitím našich spojení v regionu a prostředků [SWE.GetName] můžeme postupně oslabovat [ITA.GetAdjective] koloniální nadvládu v Africe."
  ETH_anti-tank_guns: "Protitankové kanóny"
  ETH_anti-tank_guns_desc: "[SWE.GetName] má některé z nejlepších zbrojnic na světě. Ačkoliv jsou technicky neutrální v zahraničních věcech, [SWE.GetAdjective] mohou být ochotni se vzdát některých protitankových děl, pokud to omezí rostoucí fašistickou sféru vlivu."
  ETH_a_libyan_revolt: "Libyjské povstání"
  ETH_a_libyan_revolt_desc: "[ITA.GetAdjective] má problémy udržet kontrolu nad svými nedávnými zisky ve Východní Africe. S jejich pozorností rozptýlenou učiníme vše pro zasetí semínek vzpoury v jejich cenných [LBA.GetAdjective] územích."
  ETH_ethiopias_cause_is_ours: "Etiopská věc je naše"
  ETH_ethiopias_cause_is_ours_desc: "Vládě [SWE.GetAdjective] se začíná od neutrality odklánět, když si uvědomuje, že fašistický úspěch v Africe bude mít dopady i v Evropě. Naše cíle sebeurčení a respektu mezinárodního práva jsou v souladu, proto dává smysl pokračovat v prohlubování spolupráce v zahraniční politice."
  ETH_SWE_join_war_tt: "Pokud hlavní státy vedou válku proti §Y[ITA.GetFlag][ITA.GetName]§! a §Y[SWE.GetFlag][SWE.GetName]§! souhlasí s přihlášením do vzájemné frakce, pokusí se připojit k frakci a vstoupit do války.\n §RPokud není k dispozici žádná frakce, [SWE.GetFlag][SWE.GetName] nepůjde do války sám proti [ITA.GetFlag][ITA.GetName]!§!"
  ETH_reach_out_to_the_italians: "Oslovit Italy"
  ETH_reach_out_to_the_italians_desc: "Je jasné, že už nemáme naději porazit [ITA.GetAdjective] na bojišti. Přesto [ETH.GetLeader] pokračuje v posílání našich vojáků na smrt v marných ofenzívách. Je čas na nové vedení pod silnějším vůdcem, někým, kdo bude schopen spolupracovat s Italy a přinést našemu domovu mír."
  ETH_reach_out_to_the_italians_tt: "Nabídka spolupráce bude zaslána §Y[ITA.GetNameDef]§!, nabízející mír výměnou za území."
  ETH_can_start_a_civil_war_tt: "[ROOT.GetName] může rozpoutat občanskou válku dokončením fokusu §Y$ETH_declare_for_italy$§!."
  ETH_sway_the_warlords: "Ovlivnit válečné pány"
  ETH_sway_the_warlords_desc: "I když nemůžeme přesvědčit některé z mocnějších Rasů, aby otevřeně vystoupili proti $ETH_haile_selassie$, můžeme alespoň zasadit semeno pro budoucí spolupráci. Navíc bychom se měli pokusit přesvědčit některé z menších válečných pánů o výhodách spolupráce s Italy místo boje proti nim."
  ETH_sway_the_warlords_tt: "Zvětšuje velikost povstání. \nNěkteří loajální generálové budou po válce dostupní k naverbování."
  ETH_expand_the_bodyguard: "Rozšířit osobní stráž"
  ETH_expand_the_bodyguard_desc: "Je čím dál obtížnější určit, komu lze důvěřovat, jak se mocenské struktury [ETH.GetName] začínají rozpadat. V těchto obtížných časech budoucí vůdce naší velké země potřebuje stálou osobní stráž, loajální pouze jemu, aby ho chránila před zrádnými prvky."
  ETH_expand_the_bodyguard_tt: "Přidá extra jednotky při začátku občanské války"
  ETH_declare_for_italy: "Vyhlásit loajalitu Itálii"
  ETH_declare_for_italy_desc: "Mnozí to budou považovat za zrádectví a otočí se zády k pravdě. Ale proto jsme předurčeni vládnout těmto zemím. Protože víme, že jen my máme sílu vůle učinit to, co je nutné pro dobro národa. Je čas svrhnout [ETH.GetLeader]."
  ETH_restore_the_country: "Obnovit zemi"
  ETH_restore_the_country_desc: "Když bude v [ETH.GetName] konečně obnoven mír, nastal čas zahájit proces obnovy pořádku po celé zemi. Znovu postavíme domovy a infrastrukturu lépe než dříve a ukážeme, že zářná budoucnost čeká náš lid pod vládou [ETH.GetLeader]."
  ETH_invite_italian_settlers: "Pozvat italské osadníky"
  ETH_invite_italian_settlers_desc: "Vidět naši velkou zemi stát se dalším cílem evropské kolonizace bude pro mnohé trpkou pilulkou. Nicméně nedávná historie ukázala slabost našeho průmyslu a infrastruktury a potřebujeme radikální opatření k jejich zlepšení. Proto využijeme situace tím, že využijeme odbornosti a bohatství naivních [ITA.GetAdjective]s tím, že je pozveme, aby se zde usadili." # todo: NEW TRANSLATION
  ETH_invite_italian_settlers_tt: "§Y2 owned states§! will gain a number of Settlers from [ITA.GetName], changing them from rural or pastoral states and giving §Ynew building slots.§!" # todo: NEW TRANSLATION
  ETH_replace_the_abuna: "[Get_ETH_replace_the_abuna_name]" # todo: NEW TRANSLATION
  ETH_replace_the_abuna_desc: "[Get_ETH_replace_the_abuna_desc]" # todo: NEW TRANSLATION
  abuna_abraham_gojjam_tt: "§Y$ETH_abuna_abraham$§!:" # todo: NEW TRANSLATION
  ETH_replace_the_abuna_original: "Vyměnit abunu" # todo: NEW TRANSLATION
  ETH_change_state_religion: "Změnit státní náboženství" # todo: NEW TRANSLATION
  ETH_replace_the_abuna_desc_ethiopia: "Vůdce Ortodoxní církve, $ETH_abuna_qerellos_iv$, je příliš úzce spojen s $ETH_haile_selassie$. Musíme ho nahradit někým, kdo je loajálnější k naší věci." # todo: NEW TRANSLATION
  ETH_replace_the_abuna_desc_gojjam: "Vůdce Ortodoxní církve, $ETH_abuna_qerellos_iv$, je příliš úzce spojen s $ETH_haile_selassie$. $ETH_abuna_abraham$ je ideálním kandidátem, aby ho nahradil, čímž se Gojjam stane politickým i náboženským centrem impéria." # todo: NEW TRANSLATION
  ETH_replace_the_abuna_desc_jimma: "Příliš dlouho Ortodoxní církev Tewahedo ovlivňovala politiku této země. Je čas oficiálně přerušit vazby mezi impériem a církví. Místo toho bychom měli hledat bližší vztahy s našimi bratry a sestrami za úzkým mořem." # todo: NEW TRANSLATION
  ETH_the_capital_victory_parade: "Vítězná přehlídka [ROOT.Capital.GetCapitalVictoryPointName]" # todo: NEW TRANSLATION
  ETH_the_capital_victory_parade_desc: "Přestože náš velký vůdce nás zachránil před jistým zničením, mnozí z našeho lidu pochybují o motivech [ETH.GetLeader] a touží po dobách staré císařské rodiny. Musíme jim připomenout, jak vděční by měli být [ETH.GetLeader], a ukázat slavnou budoucnost, která čeká [ETH.GetName]." # todo: NEW TRANSLATION
  ETH_amedeos_feast_of_maskal: "Amedeův svátek Maskal" # todo: NEW TRANSLATION
  ETH_amedeos_feast_of_maskal_desc: "Abychom zajistili trvalou stabilitu [ETH.GetName], shromáždíme zbývající Rasy na knížecí hostině Amedea při Maskalu v [ETH.Capital.GetCapitalVictoryPointName]. Tam se setkáme s místokrálem [ITA.GetAdjective] Východní Afriky a probereme budoucnost regionu." # todo: NEW TRANSLATION
  ETH_amedeos_feast_of_maskal_tt: "If §Y$ETH_sway_the_warlords$§! has been completed: \n§Y$ETH_seyoum_mengesha$§!, §Y$ETH_ayalew_birru$§! and §Y$ETH_ras_kassa$§! will become loyal." # todo: NEW TRANSLATION
  ETH_assertiveness: "[Get_ETH_assertiveness_name]" # todo: NEW TRANSLATION
  ETH_assertiveness_autonomy_effect: "Asertivní Negus" # todo: NEW TRANSLATION
  ETH_assertiveness_desc: "Souhlasili jsme spolupracovat s [ITA.GetAdjective]s, abychom ochránili naši velkou zemi před zničením, ale nyní by nás chtěli připravit o identitu a kulturu a stát se ničím jiným než kolonií. To nesmíme dovolit. Dáme jim najevo, kým jsme, a na každém kroku budeme odolávat jejich kolonizaci." # todo: NEW TRANSLATION
  ETH_assertiveness_tt: "If §Y$ETH_sway_the_warlords$§! has been completed and country is §Y$jimma$§!:\n§Y$ETH_balcho_safo$§! and §Y$ETH_tadesse_birru$§! will become loyal." # todo: NEW TRANSLATION
  ETH_assertiveness_gojjam: "Gojjamský Negash" # todo: NEW TRANSLATION
  ETH_assertiveness_jimma: "Garad z Jimma" # todo: NEW TRANSLATION
  ETH_assertiveness_ethiopia: "Negus Šewy" # todo: NEW TRANSLATION
  ETH_exploit_french_weakness: "Využít slabosti Francie" # todo: NEW TRANSLATION
  ETH_exploit_french_weakness_desc: "Zatímco jsou [FRA.GetAdjective] zaměstnáni hádkami nad popelem svého impéria, máme příležitost anektovat území Francouzského Somalilandu do našeho velkého impéria. Je nepravděpodobné, že by [FRA.GetAdjective] měli velkou ochotu do dalšího boje, ale musíme být připraveni na cokoli." # todo: NEW TRANSLATION
  ETH_exploit_french_weakness_tt: "Unlock decisions to occupy §YFrench Somaliland§! \n§RTaking these decisions risks war with Vichy France!§!" # todo: NEW TRANSLATION
  ETH_france_divided_tt: "Francie byla rozdělena" # todo: NEW TRANSLATION
  ETH_invite_italian_investors: "Pozvat italské investory" # todo: NEW TRANSLATION
  ETH_invite_italian_investors_desc: "Měli bychom využít našich nových pánů přilákáním jejich investorů, aby navštívili [ETH.GetName]. Příliv investic by značně pomohl nejen napravit škody způsobené válkou, ale také výrazně rozšířit naši průmyslovou kapacitu." # todo: NEW TRANSLATION
  ETH_italian_general_staff: "Italský generální štáb" # todo: NEW TRANSLATION
  ETH_italian_general_staff_desc: "Naše armáda má ještě dlouhou cestu k modernizaci. Ačkoli dosahujeme výrazného pokroku ve výrobě či získávání moderního vybavení pro ozbrojené síly, naši důstojníci mají mnoho zastaralých názorů na jeho využití. Možná se můžeme naučit, jak vést moderní válku, pokud pozveme důstojníky [ITA.GetAdjective] do našeho generálního štábu." # todo: NEW TRANSLATION
  ETH_italian_general_staff_tt: "If relations with Italy are positive and they agree, §Y$ITA_giuseppe_tellera$§!, §Y$ITA_mario_berti$§! and §Y$ITA_alessandro_pirzio_biroli$§! will be transferred to Ethiopia." # todo: NEW TRANSLATION
  ETH_cooperation: "[Get_ETH_cooperation_name]" # todo: NEW TRANSLATION
  ETH_cooperation_desc: "Náš osud spočívá v dominanci východní Afriky. Nicméně k dosažení tohoto cíle máme stále daleko. Musíme proto spolupracovat s existujícími mocenskými strukturami v regionu a snažit se získat jakoukoli výhodu." # todo: NEW TRANSLATION
  ETH_cooperation_sud_tt: "Gain a Sudanese political advisor:\n§Y$economic_organizer$:§! \n   Consumer Goods Factories: §G-5%§!\n   Stability: §G+5%§!" # todo: NEW TRANSLATION
  ETH_cooperation_som_tt: "Gain a Somalian political advisor:\n§Y$economic_organizer$:§! \n   Consumer Goods Factories: §G-5%§!\n   Stability: §G+5%§!" # todo: NEW TRANSLATION
  ETH_cooperation_gugsa_tt: "§Y$ETH_domenico_mondelli$§! becomes available as §YChief of Airforce§!: \n§Y$air_chief_ground_support_1$§!" # todo: NEW TRANSLATION
  ETH_cooperation_gojjam: "Spolupráce se Súdánci" # todo: NEW TRANSLATION
  ETH_cooperation_jimma: "Spolupráce s Araby" # todo: NEW TRANSLATION
  ETH_cooperation_gugsa: "Spolupráce s Eritrejci" # todo: NEW TRANSLATION
  ETH_reinforce_dynamic_identity: "[Get_ETH_reinforce_dynamic_identity_name]" # todo: NEW TRANSLATION
  ETH_reinforce_dynamic_identity_desc: "Lidé zůstávají v nové správě zmatení ohledně svých národních identit. Bez ohledu na jejich drobné stížnosti jsou nyní [ETH.GetAdjective]s. A je čas, aby se naučili, že dobří [ETH.GetAdjective]s jsou loajální [ETH.GetLeader] a státu." # todo: NEW TRANSLATION
  ETH_reinforce_ethiopian_identity: "Posílit etiopskou identitu" # todo: NEW TRANSLATION
  ETH_reinforce_gojjam_identity: "Posílit identitu Gojjamu" # todo: NEW TRANSLATION
  ETH_reinforce_jimman_identity: "Posílit identitu Jimmy" # todo: NEW TRANSLATION
  ETH_reinforced_identity: "Posílená identita" # todo: NEW TRANSLATION
  ETH_underground_wargames: "Podzemní vojenské cvičení" # todo: NEW TRANSLATION
  ETH_underground_wargames_desc: "V poslední válce jsme se obtížně bránili proti [ITA.GetAdjective]s kvůli nedostatku pochopení, jak se válčení v posledních desetiletích změnilo. Abychom se téže chyby nedopustili znovu, je nezbytné, aby naši důstojníci začali provádět válečné hry a plánovat svržení sil [ITA.GetAdjective]s. Samozřejmě při tom musíme zabránit vzbuzení podezření..." # todo: NEW TRANSLATION
  ETH_adopt_the_lira: "Přijmout liru" # todo: NEW TRANSLATION
  ETH_adopt_the_lira_desc: "Naše měna prudce ztratila na hodnotě kvůli hospodářskému zmatku způsobenému válkou s [ITA.GetName] a nákladům na rekonstrukci. Místo pokusu stabilizovat znečištěnou měnu bychom měli tuto příležitost využít ke zvýšení ekonomické integrace s [ITA.GetAdjective]s přijetím liry." # todo: NEW TRANSLATION
  ETH_request_italian_equipment: "Požádat o italské vybavení" # todo: NEW TRANSLATION
  ETH_request_italian_equipment_desc: "Ačkoliv děláme velký pokrok v reformě naší ekonomiky a posilování armády, stále bychom mohli využít určitou podporu v těchto úkolech. Díky prohlubujícím se vztahům s [ITA.GetAdjective]s by mohli být ochotni poslat nám část svého přebytečného vybavení." # todo: NEW TRANSLATION
  ETH_request_italian_equipment_tt: "If [ITA.GetFlag][ITA.GetName] agrees, [ETH.GetFlag][ETH.GetName] will receive either §G500 $artillery_equipment$§! or §G2500 $infantry_equipment_1$ §!" # todo: NEW TRANSLATION
  ETH_recruit_mercenaries: "Najmout žoldáky" # todo: NEW TRANSLATION
  ETH_recruit_mercenaries_desc: "V armádě panuje značné napětí mezi vojáky z různých prostředí. Mnozí jsou loajální ke starému režimu a nelze jim věřit. Dokud neodstraníme tyto neloajální prvky, potřebujeme síly, které budou bezvýhradně loajální nám. Nejsnazší způsob, jak vzbudit loajalitu, je chladná hotovost." # todo: NEW TRANSLATION
  ETH_askari_tt: "Recruit §G4 Divisions§! of §YEritrean Askari§!" # todo: NEW TRANSLATION
  ETH_sudanese_mercs_tt: "Recruit §G4 Divisions§! of §YSudanese Mercenaries§!" # todo: NEW TRANSLATION
  ETH_arab_mercs_colab_tt: "Recruit §G4 Divisions§! of §YArab Mercenaries§!" # todo: NEW TRANSLATION
  ETH_set_up_a_customs_barrier: "Zřídit celní bariéru" # todo: NEW TRANSLATION
  ETH_set_up_a_customs_barrier_desc: "Čím déle necháme naši ekonomiku zaplést s [ITA.GetName], tím obtížnější bude vymanit se z jejich zkorumpovaného vlivu. Ačkoli to zpomalí náš ekonomický růst, měli bychom zavést celní bariéru, aby byl obchod mezi našimi národy obtížnější. Režim [ITA.GetAdjective] bude tímto rozzloben, ale najdeme ekonomické odůvodnění, pokud to bude nutné." # todo: NEW TRANSLATION
  ETH_contact_the_exiles: "Kontaktovat vyhnance" # todo: NEW TRANSLATION
  ETH_contact_the_exiles_desc: "Když válka s [ITA.GetName] skončila, mnozí uprchli do sousedních regionů ze strachu z toho, co nový režim může přinést. Jak začínáme realizovat naše plány na znovuzískání nezávislosti, můžeme přesvědčit tuto širší diasporu, aby se k nám připojila. Navzdory našim minulým rozdílům je nyní čas spolupracovat pro dobro vlasti." # todo: NEW TRANSLATION
  ETH_outsourced_production: "Zadání výroby externě" # todo: NEW TRANSLATION
  ETH_outsourced_production_desc: "Náš průmysl zůstává malý a nezkušený, pokud jde o výrobu nástrojů války. Nicméně nyní, kdy jsme pevně v oblasti vlivu [ITA.GetAdjective]s, můžeme situaci využít tím, že zadáme naše výrobní potřeby externě a využijeme odbornosti jejich zbrojních výrobců." # todo: NEW TRANSLATION
  ETH_outsourced_production_tt: "Request [ITA.GetFlag]§Y[ITA.GetAdjective]§! army or airforce designers:" # todo: NEW TRANSLATION
  ETH_outsourced_production_air_tt: "Airforce Designers:" # todo: NEW TRANSLATION
  ETH_outsourced_production_army_tt: "\nArmy Designers:" # todo: NEW TRANSLATION
  ETH_outsourced_production_factories_tt: "\n If [ITA.GetFlag]§Y[ITA.GetNameDef]§! agrees, [ETH.GetFlag]§Y[ETH.GetNameDef]§! gains §Y4 Military Factories§!." # todo: NEW TRANSLATION
  ETH_together_for_victory: "Společně za vítězstvím" # todo: NEW TRANSLATION
  ETH_together_for_victory_desc: "Čas se blíží, kdy si obnovíme čest a zlomíme řetězy italského utlačování. Abychom zajistili, že naše plány nepropadnou, musíme posílit naše síly a získat podporu napříč Východní Afrikou. Jen společně bude vítězství zajištěno." # todo: NEW TRANSLATION
  ETH_together_for_victory_tt: "Rebel warriors will rise up behind enemy lines when the independence war starts" # todo: NEW TRANSLATION
  ETH_our_enemys_enemy: "Náš nepřítelův nepřítel" # todo: NEW TRANSLATION
  ETH_our_enemys_enemy_desc: "Existuje mnoho států, které jsou z ideologických nebo strategických důvodů proti expanzionismu [ITA.GetAdjective]s. Měli bychom oslovit tyto země kvůli dodávkám zbraní, abychom mohli svrhnout síly [ITA.GetAdjective] v našem regionu." # todo: NEW TRANSLATION
  ETH_our_enemys_enemy_tt: "If a nation agrees to send arms, [ETH.GetFlag][ETH.GetName] will receive §G1000 infantry equipment§! from them." # todo: NEW TRANSLATION
  ETH_raid_italian_depots: "Přepadnout italské sklady" # todo: NEW TRANSLATION
  ETH_raid_italian_depots_desc: "Italská armáda soustředila velké množství vybavení ve skladech po celé naší zemi. Jak se připravujeme na nevyhnutelnou konfrontaci, můžeme jim tímto vybavením odepřít a posílit naše vlastní síly přepadením těchto skladů." # todo: NEW TRANSLATION
  ETH_raid_italian_depots_tt: "Raids will happen sporadically over the coming §Yyear§!, adding [ITA.GetFlag]§Y[ITA.GetAdjective]§! equipment to [ETH.GetFlag]§Y[ETH.GetName]'s§! stockpile each time." # todo: NEW TRANSLATION
  ETH_the_italian_language: "Italský jazyk" # todo: NEW TRANSLATION
  ETH_the_italian_language_desc: "Jazyk zůstává jednou z největších překážek pro hlubší spolupráci s [ITA.GetAdjective]s. Proto zavedeme [ITA.GetAdjective] jako druhý jazyk v naší správě, včetně armády. Snad to zrychlí kulturní výměnu mezi námi a zefektivní strategické plánování." # todo: NEW TRANSLATION
  ETH_compensation: "Kompenzace" # todo: NEW TRANSLATION
  ETH_compensation_desc: "Navzdory počátečnímu napětí mezi našimi velkými národy jsme [ITA.GetName] opakovaně prokázali svou loajalitu. To však našemu obyvatelstvu k vládě příliš nepřičetlo. Možná by byly [ITA.GetAdjective]s ochotni odškodnit nás předáním kontroly nad některými ze svých dalších zemí, abychom tak posílili podporu našeho režimu." # todo: NEW TRANSLATION
  ETH_negusa_nagast: "Negusa Nagast" # todo: NEW TRANSLATION
  ETH_negusa_nagast_desc: "Nastal čas zbavit [ETH.GetName] vlivu [ITA.GetAdjective] vyhlášením naší nezávislosti. Díky vedení [ETH.GetLeader] brzy opět poneseme otěže svého osudu sami." # todo: NEW TRANSLATION
  ETH_negusa_nagast_tt: "§Y[ROOT.GetNameWithFlag]§! declares independence" # todo: NEW TRANSLATION
  ETH_the_italo-ethiopian_empire: "Italo-[ETH.GetAdjective]ská říše" # todo: NEW TRANSLATION
  ETH_the_italo-ethiopian_empire_desc: "Jak povstáváme z popelek staré říše, začíná se formovat nová italo-[ETH.GetAdjective]ská. Ačkoli jsme se nedávno nazívali nepřáteli, je stále jasnější, že [ITA.GetName] i [ETH.GetName] jsou nyní silnější společně. Nyní je naší povinností rozšířit doménu naší sdílené říše." # todo: NEW TRANSLATION
  ETH_the_italo-ethiopian_empire_tt: "Unlock §YItalo-[ETH.GetAdjective] Empire§! decisions to gain cores on claimed territory once they are captured.\nThey will be transfered if there is no enemy division in the claimed state or any adjecent state" # todo: NEW TRANSLATION
  ETH_reclaim_the_empire: "Znovuzískat říši" # todo: NEW TRANSLATION
  ETH_reclaim_the_empire_desc: "Pod vedením našeho velkého vůdce [ETH.GetLeader] jsme odmítli ničivý vliv [ITA.GetName] na naši velkou zemi a znovuobjevili nesrovnatelnou sílu našeho lidu. Nyní před námi stojí velký úkol – znovuzískat naše právoplatná území a sjednotit [ETH.GetAdjective] lid." # todo: NEW TRANSLATION
  ETH_reclaim_the_empire_tt: "Unlock §YReclaim the Empire§! decisions to regain cores on territory ceded to [ITA.GetFlag][ITA.GetName] once they are under [ETH.GetFlag][ETH.GetAdjective] control again." # todo: NEW TRANSLATION
  ETH_the_liberator_of_country_short: "[Get_ETH_the_liberator_of_country_short_name]" # todo: NEW TRANSLATION
  ETH_the_liberator_of_country_short_desc: "[ETH.GetLeader] nás hrdinsky dovedl k nezávislosti, osvobození od kazivého vlivu [ITA.GetName]. Nevíme, co přinese budoucnost, ale víme, že bude slavná, pokud budeme mít vysvoboditele [ETH.GetName], který nás do ní povede." # todo: NEW TRANSLATION
  ETH_the_liberator_of_gojjam: "Vysvoboditel $gojjam$" # todo: NEW TRANSLATION
  ETH_the_liberator_of_jimma: "Vysvoboditel $jimma$" # todo: NEW TRANSLATION
  ETH_the_liberator_of_ethiopia: "Vysvoboditel $ETH$" # todo: NEW TRANSLATION
  ETH_consolidate_east_africa: "Konsolidovat Východní Afriku" # todo: NEW TRANSLATION
  ETH_consolidate_east_africa_desc: "Světový řád se kolem nás mění, jak stará impéria začínají padat. Jediný způsob, jak zajistit místo pro náš lid v tomto novém řádu, je dobytí a ukázání, že dokážeme překonat jakoukoli překážku. Proto konsolidujeme Východní Afriku pod naší kontrolou a ukážeme světu sílu [ETH.GetName]." # todo: NEW TRANSLATION
  ETH_consolidate_east_africa_tt: "Gain claims in:\n§Y[SUD.GetName]§!\n§Y[SOM.GetName]§!\n§Y[ERI.GetName]§!\n§Y[DJI.GetName]§!\n§Y[KEN.GetName]§!\n§Y[UGA.GetName]§!\nGain decisions to core territory once under [ETH.GetFlag][ETH.GetAdjective] control." # todo: NEW TRANSLATION
  ETH_chitet_name: "Chitet" # todo: NEW TRANSLATION
  ETH_chitet_name_democratic: "Territorial Army" # todo: NEW TRANSLATION
  ETH_chitet_name_communist: "People's Militia" # todo: NEW TRANSLATION
  ETH_naval_college_name_communist: "Námořní akademie Rudého moře" # todo: NEW TRANSLATION
  ETH_naval_college_name_historical: "Námořní akademie Asmery" # todo: NEW TRANSLATION
  ETH_naval_college_name_fallback: "[ETH.GetAdjective] Naval Academy" # todo: NEW TRANSLATION
  ETH_airbase_name: "Debre Zeyit" # todo: NEW TRANSLATION
  ETH_airbase_name_fallback: "[ETH.GetAdjective]" # todo: NEW TRANSLATION
  ETH_experts: "Experti" # todo: NEW TRANSLATION
  ETH_investors: "Průmyslníci" # todo: NEW TRANSLATION
  ETH_reintegrate_aussa: "Integrovat Aussu" # todo: NEW TRANSLATION
  ETH_reintegrate_aussa_desc: "Zrádné sultanát Aussa nás opakovaně zradil, když se postavil na stranu [ITA.GetAdjective]’s. Je čas sultanát rozpustit a integrovat region do [ETH.GetName]." # todo: NEW TRANSLATION
  ETH_communist_tax_exemption_title: "Podpořit specialisty" # todo: NEW TRANSLATION
  ETH_communist_tax_exemption_desc: "Abychom zabránili 'odlivu mozků', který postihnul Sovětský svaz po jejich revoluci, musíme vytvořit daňový systém, který povzbudí specialisty zůstat v [ETH.GetNameDef]. Alespoň do doby, než vychováme novou generaci proletářských specialistů..." # todo: NEW TRANSLATION
  ETH_communist_seize_assets_desc: "Zatímco lidé se potýkali s nedostatkem prostředků, předrevoluční elity [ETH.GetName] si přisvojily obrovské množství aktiv ve formě cizí měny, umění a samozřejmě půdy. Musíme tato aktiva zabavit jménem lidu a přerozdělit bohatství." # todo: NEW TRANSLATION
  ETH_communist_seize_assets_title: "Zrušit soukromé vlastnictví" # todo: NEW TRANSLATION
  ETH_tax_exemption_default_desc: "Musíme udržet šlechtu spokojenou, aby nedošlo k rozštěpení [ETH.GetName]. Odměníme je proto za jejich pokračující loajalitu rozšířením daňových výjimek, aby si mohli ponechat více svého majetku." # todo: NEW TRANSLATION
  ETH_seize_assets_default_desc: "Jako někteří z nejbohatších lidí v [ETH.GetName] je málo ekonomického smyslu v tom, aby šlechta mohla vyhýbat se placení daní zastaralými zákony a kličkami. Musíme šlechtu náležitě zdanit a použít výnosy k dalšímu industrializaci impéria." # todo: NEW TRANSLATION
  ETH_tax_exemption_default_title: "Rozšířit daňové výjimky" # todo: NEW TRANSLATION
  ETH_seize_assets_default_title: "Zdanění šlechty" # todo: NEW TRANSLATION
  ITA_italian_highways_bba: "Italské dálnice" # todo: NEW TRANSLATION
  ITA_italian_highways_bba_desc: "Staří Římané vybudovali silnice, kterým záviděl celý svět. Nyní povýšení Němci věří, že jejich Autobahn je něčím mnohem lepším. Ukážeme jim, že se mýlíme." # todo: NEW TRANSLATION
  ITA_develop_libya: "Rozvíjet Libyi" # todo: NEW TRANSLATION
  ITA_develop_libya_desc: "Libye je naše nejbližší kolonie a ta s největším potenciálem. Než budeme moci sklízet plody naší dlouhé a tvrdé práce při pacifikaci oblasti, musíme zlepšit její infrastrukturu." # todo: NEW TRANSLATION
  ITA_develop_eritrea: "Rozvíjet Eritreu" # todo: NEW TRANSLATION
  ITA_develop_eritrea_desc: "Eritrea je naše nejstarší kolonie na africkém kontinentu a snad jedna z nejcennějších. Díky své vynikající strategické poloze ji lze snadno vybudovat na kámen úhelný našeho koloniálního impéria." # todo: NEW TRANSLATION
  ITA_develop_somaliland: "Rozvíjet Somaliland" # todo: NEW TRANSLATION
  ITA_develop_somaliland_desc: "Na první pohled se oblast na Rogu Afriky nezdá mít velký ekonomický nebo strategický potenciál. Ale s několika dobře umístěnými investicemi můžeme z této oblasti udělat odrazový můstek pro další postupy do Indického oceánu." # todo: NEW TRANSLATION
  ITA_regional_development: "Regionální rozvoj" # todo: NEW TRANSLATION
  ITA_regional_development_desc: "Naše předchozí investice do různých oblastí impéria připravily půdu pro výrazný nárůst ekonomického výstupu v těchto regionech. Stačí vyslovit slovo a odměny můžeme sklízet krátkodobě." # todo: NEW TRANSLATION
  ITA_ministry_of_italian_africa: "Ministerstvo italské Afriky" # todo: NEW TRANSLATION
  ITA_ministry_of_italian_africa_desc: "Různé kmeny a národy Afriky nelze spravovat stejně jako ostatní poddané lidé. Správa těchto oblastí bude vyžadovat odlišný přístup." # todo: NEW TRANSLATION
  ITA_develop_ethiopia: "Rozvíjet Etiopii" # todo: NEW TRANSLATION
  ITA_develop_ethiopia_desc: "Zoufalí Etiopané nám dlouho vzdorovali a ponížili nás. Nyní, když jsou konečně zkrocení, můžeme rozvíjet jejich zemi a ukázat jim, že naše invaze byla v jejich vlastním zájmu." # todo: NEW TRANSLATION
  ITA_ethiopian_railways: "Etiopské železnice" # todo: NEW TRANSLATION
  ITA_ethiopian_railways_desc: "Nedostatečně rozvinutá etiopská železniční síť brzdí ekonomický rozvoj kolonie. Odesláním italských odborníků ji můžeme rychle dovést na italské standardy a zajistit, že vlaky budou jezdit načas kdekoli v impériu." # todo: NEW TRANSLATION
  ITA_polizia_dell_africa_italiana: "Polizia dell'Africa Italiana" # todo: NEW TRANSLATION
  ITA_polizia_dell_africa_italiana_desc: "Naše koloniální policie se doposud ukázala jako schopná síla. S dalšími reformami bude schopna zajistit, že z kolonií vytěžíme tolik, kolik do nich investujeme." # todo: NEW TRANSLATION
  ITA_strengthen_ascari_corps: "Posílit sbor Askari" # todo: NEW TRANSLATION
  ITA_strengthen_ascari_corps_desc: "Naše jednotky z evropských částí impéria často zápasí v drsném africkém klimatu. Domorodci tímto problémem zjevně netrpí. Měli bychom některé z nich najmout, aby podporovali naše jednotky v boji v horkém klimatu." # todo: NEW TRANSLATION
  ITA_comandante_diavolo: "Comandante Diavolo" # todo: NEW TRANSLATION
  ITA_comandante_diavolo_desc: "Během našeho dobytí Eritrey a války v Etiopii nás často trápila rychlost a houževnatost domorodých jezdectev. Když s nimi zápasíme, mohli bychom získat mnoho, pokud je přesvědčíme ke spolupráci, a vynalézavý mladý důstojník by se mohl stát naším vlastním 'Velitelem ďábla'." # todo: NEW TRANSLATION
  ITA_prospect_for_oil: "Průzkum ropy" # todo: NEW TRANSLATION
  ITA_prospect_for_oil_desc: "Naši geologové se domnívají, že v libyjské poušti mohou spočívat značné zásoby ropy. Měli bychom provést důkladný průzkum, zda mají pravdu." # todo: NEW TRANSLATION
  ITA_libyan_refineries: "Libyjské rafinerie" # todo: NEW TRANSLATION
  ITA_libyan_refineries_desc: "S velkými ložisky ropy identifikovanými v libyjské poušti musí být naším dalším krokem zvýšení rafinační kapacity v regionu." # todo: NEW TRANSLATION
  ITA_libyan_infrastructure_bba: "Libyjská infrastruktura" # todo: NEW TRANSLATION
  ITA_libyan_infrastructure_bba_desc: "Vzhledem k důležitosti Libye jako základny pro operace v severní Africe musíme neustále pracovat na zlepšení její infrastruktury, abychom mohli v případě potřeby operovat velké formace jednotek." # todo: NEW TRANSLATION
  ITA_litoranea_balbo: "[GetAppropriateLitoraneaBalboName]" # todo: NEW TRANSLATION
  ITA_litoranea_balbo_default: "Litoranea Balbo" # todo: NEW TRANSLATION
  ITA_litoranea_balbo_alt: "Litoranea Libica" # todo: NEW TRANSLATION
  ITA_litoranea_balbo_desc: "Silnice v Libyi jsou příšerné. Dokonce i v blízkosti pobřeží je silniční síť nevhodná pro moderní stát. Je třeba mnoho práce na jejím zlepšení, včetně velké dálnice podél pobřeží." # todo: NEW TRANSLATION
  ITA_via_della_vittoria: "Via della Vittoria" # todo: NEW TRANSLATION
  ITA_via_della_vittoria_desc: "Chabá infrastruktura nadále brzdí naše operace v severní Africe. Větší úsilí zaměřené na jedinou 'Vítěznou cestu' by mohlo dramaticky zlepšit situaci a umožnit nám volněji operovat kolem egyptské hranice." # todo: NEW TRANSLATION
  ITA_libyan_railway: "Libyjská železnice" # todo: NEW TRANSLATION
  ITA_libyan_railway_desc: "Investice do libyjské silniční sítě jsou jistě cenné, ale pro přesun velkých formací jednotek, zdrojů a zásob je nezbytná moderní železniční síť." # todo: NEW TRANSLATION
  ITA_steel_industry_in_terni: "Ocelářský průmysl v Terni" # todo: NEW TRANSLATION
  ITA_steel_industry_in_terni_desc: "Ocelárny v Terni dlouho tvořily páteř italské výroby oceli. V budoucích válkách se na ně budeme muset ještě více spolehnout. Několik investic nyní se s největší pravděpodobností později vyplatí mnohonásobně." # todo: NEW TRANSLATION
  ITA_power_plants_in_terni: "Elektrárny v Terni" # todo: NEW TRANSLATION
  ITA_power_plants_in_terni_desc: "Naše současné elektrárny v Terni jsou nedostatečné a je třeba je rozšířit, pokud chceme proměnit region v ještě větší průmyslové centrum." # todo: NEW TRANSLATION
  ITA_industria_della_gomma_sintetica: "Industria della Gomma Sintetica" # todo: NEW TRANSLATION
  ITA_industria_della_gomma_sintetica_desc: "Naše geografická poloha v srdci Středozemního moře nás činí jedinečně zranitelnými blokádou nepřátelských mocností. Pokud chceme zaujmout zasloužené místo ve světě, musíme být schopni udržet naše průmysly bez zahraničních dovozů." # todo: NEW TRANSLATION
  ITA_strengthen_northern_industry: "Posílit průmysl na severu" # todo: NEW TRANSLATION
  ITA_strengthen_northern_industry_desc: "Severní Itálie je dlouho průmyslovým srdcem naší země. Celý region má vynikající předpoklady pro další růst za pouhou drobnou investici času a zdrojů." # todo: NEW TRANSLATION
  ITA_modernize_the_mezzogiorno: "Modernizovat Mezzogiorno" # todo: NEW TRANSLATION
  ITA_modernize_the_mezzogiorno_desc: "Jih Itálie byl problémovým dítětem tak dlouho, jak jsme existovali jako sjednocený stát. Ale s naší touhou stát se dominantní mocností v Středomoří musí být tento nevyužitý potenciál mobilizován." # todo: NEW TRANSLATION
  ITA_new_industrialization_program: "Nový program industrializace" # todo: NEW TRANSLATION
  ITA_new_industrialization_program_desc: "Držet krok se zbytkem světa vyžaduje neustálé inovace a zlepšování. Nemůžeme očekávat, že zůstaneme konkurenceschopní, pokud se budeme spokojovat s tím, co máme, a místo toho se musíme neustále snažit o víc." # todo: NEW TRANSLATION
  ITA_railway_innovations: "Inovace v železnici" # todo: NEW TRANSLATION
  ITA_railway_innovations_desc: "I v době automobilu je silná železniční síť stále páteří silné ekonomiky. Další rozšíření železnic v Itálii nás připraví na budoucí růst." # todo: NEW TRANSLATION
  ITA_expand_foggia_farm_fields: "Rozšířit zemědělské plochy v Foggii" # todo: NEW TRANSLATION
  ITA_expand_foggia_farm_fields_desc: "Region Foggia dlouho sloužil jako obilnice, která zásobuje celou Itálii. Až válka začne, budeme muset odvést do armády mnoho mužů pracujících na polích. Musíme modernizovat a rozšířit zemědělství v oblasti, pokud chceme udržet naši populaci nasycenou." # todo: NEW TRANSLATION
  ITA_investments_in_edison: "Investice do Edisonu" # todo: NEW TRANSLATION
  ITA_investments_in_edison_desc: "Itálie se pyšnila prvním elektrárním zařízením v Evropě a vždy byla na špici technologie. Investicí do společnosti Edison zajistíme, že zůstaneme v čele." # todo: NEW TRANSLATION
  ITA_expand_national_universities: "Rozšířit národní univerzity" # todo: NEW TRANSLATION
  ITA_expand_national_universities_desc: "Pro technologicky vyspělý národ, jako je ten náš, je vždy potřeba více inženýrů. Identifikovali jsme naše univerzity jako největší úzké hrdlo při vzdělávání dostatečného počtu nových odborníků, aby naše země zůstala konkurenceschopná." # todo: NEW TRANSLATION
  ITA_fiocchi_munizioni: "Fiocchi Munizioni" # todo: NEW TRANSLATION
  ITA_fiocchi_munizioni_desc: "Fiocchi dlouho zásobuje naše ozbrojené síly vysoce kvalitní municí. Stabilní zásoba munice bude v nadcházejících válkách zásadní, a proto musíme zajistit, aby závody Fiocchi byly schopné to zvládnout." # todo: NEW TRANSLATION
  ITA_brescia_small_arms_industry: "Brescia Small Arms Industry" # todo: NEW TRANSLATION
  ITA_brescia_small_arms_industry_desc: "Italské ruční zbraně jsou proslulé po celém světě svou vysokou kvalitou. Musíme však také zajistit dostatečné zásoby nejmodernějších typů zbraní, pokud chceme, aby naši vojáci porazili každého protivníka v poli." # todo: NEW TRANSLATION
  ITA_milan_comms_industry: "Milan Comms Industry" # todo: NEW TRANSLATION
  ITA_milan_comms_industry_desc: "Nová oblast radio-detekce a určování vzdálenosti nabízí mnoho příležitostí a nepochybně se stane důležitou oblastí vojenské technologie. Musíme zajistit, že dokážeme držet krok s vývojem v této oblasti." # todo: NEW TRANSLATION
  ITA_redirect_alfa_romeo_production: "Přesměrovat výrobu Alfa Romeo" # todo: NEW TRANSLATION
  ITA_redirect_alfa_romeo_production_desc: "Desítky let byly italské sportovní automobily na absolutním vrcholu technologie. Ale s mraky války se zavírajícími se nad námi musí každý v Itálii přispět. Nemůžeme si dovolit zbytečné luxusy a stroje v závodech Alfa Romeo mohou být lépe využity pro vojenské účely." # todo: NEW TRANSLATION
  ITA_increase_production: "Zvýšit produkci" # todo: NEW TRANSLATION
  ITA_increase_production_desc: "Průmyslová válka vyžaduje především jednu věc: kvantitu. Množství granátů, množství pušek, množství letadel. To, co nejvíce záleží, je mít víc věcí než nepřítel." # todo: NEW TRANSLATION
  ITA_keep_specialization: "Udržet specializaci" # todo: NEW TRANSLATION
  ITA_keep_specialization_desc: "Zatímco zbytek světa možná zapomněl hodnotu dovednosti, přesnosti a kvality, my v Itálii ne. Naši řemeslníci budou vždy dbát na ten nejmenší detail a vytvoří bezkonkurenčně nejkvalitnější kus vybavení, na kterém pracují." # todo: NEW TRANSLATION
  ITA_thermojet_research: "Výzkum thermojetu" # todo: NEW TRANSLATION
  ITA_thermojet_research_desc: "Naši inženýři věří, že v budoucnu nebudou letadla poháněna vrtulemi nebo pístovými motory. Místo toho nová technologie umožní letadlům větší rychlost a radikálně odlišné konstrukce. Itálie musí být v čele tohoto vývoje." # todo: NEW TRANSLATION
  ITA_army_primacy_bba: "Přednost armády" # todo: NEW TRANSLATION
  ITA_army_primacy_bba_desc: "V posledku je válka vyhrána nasazením vojáků na nepřátelské území a zabráním věcí, které nepřítel potřebuje k vedení války. I když jsou námořnictvo a letectvo bezpochyby užitečné organizace, je to armáda, která válku vyhraje." # todo: NEW TRANSLATION
  ITA_preserve_army_traditions: "Zachovat armádní tradice" # todo: NEW TRANSLATION
  ITA_preserve_army_traditions_desc: "V dnešní době koluje mnoho myšlenek o nových způsobech vedení války. Některé z nich mají jistě své opodstatnění, ale základy úspěšné armády se od dob Caesara nezměnily: disciplína, individuální odvaha a schopné velení." # todo: NEW TRANSLATION
  ITA_increase_artillery_production: "Zvýšit výrobu dělostřelectva" # todo: NEW TRANSLATION
  ITA_increase_artillery_production_desc: "Velká válka byla především válkou dělostřelectva. Musíme předpokládat, že i příští válka bude vedena převážně dělostřelectvem. Nesmíme zaostávat v této oblasti." # todo: NEW TRANSLATION
  ITA_vallo_alpino_del_littorio: "Vallo Alpino del Littorio" # todo: NEW TRANSLATION
  ITA_vallo_alpino_del_littorio_desc: "Naše pozemní hranice jsou téměř celé pokryty Alpami. I když jsou tyto hory samy o sobě impozantní překážkou, z minulé války jsme se naučili, že nejsou zcela neproniknutelné. Vystavba řady opevnění nám pomůže udržet linii proti jakékoliv pozemní invazi." # todo: NEW TRANSLATION
  ITA_moschettieri_del_duce: "[GetAppropriateMoschetieridelDuceName]" # todo: NEW TRANSLATION
  ITA_moschettieri_del_duce_default: "Moschettieri del Duce" # todo: NEW TRANSLATION
  ITA_moschettieri_del_duce_king: "Moschettieri del Re" # todo: NEW TRANSLATION
  ITA_moschettieri_del_duce_alt: "Moschettieri della Republica" # todo: NEW TRANSLATION
  ITA_moschettieri_del_duce_pope: "Moschettieri del Santo Padre" # todo: NEW TRANSLATION
  ITA_moschettieri_del_duce_desc: "[GetAppropriateMoschetieridelDuceDesc]" # todo: NEW TRANSLATION
  ITA_moschettieri_del_duce_desc_default: "Duce má pro svou ochranu jednotku elitních střelců pod svým velením. I když je bezpečnost Duce samozřejmě nejvyšší prioritou, tito vzorní vojáci by mohli být také využiti k lepšímu výcviku našich pravidelných jednotek, čímž by se zlepšila jejich účinnost v poli." # todo: NEW TRANSLATION
  ITA_moschettieri_del_duce_desc_king: "Král má pro svou ochranu jednotku elitních střelců pod svým velením. I když je bezpečnost krále samozřejmě nejvyšší prioritou, tito vzorní vojáci by mohli být také využiti k lepšímu výcviku našich pravidelných jednotek, čímž by se zlepšila jejich účinnost v poli." # todo: NEW TRANSLATION
  ITA_moschettieri_del_duce_desc_pope: "Svatý Otec má pro svou ochranu jednotku elitních střelců pod svým velením. I když je bezpečnost Svatého Otce samozřejmě nejvyšší prioritou, tito vzorní vojáci by mohli být také využiti k lepšímu výcviku našich pravidelných jednotek, čímž by se zlepšila jejich účinnost v poli." # todo: NEW TRANSLATION
  ITA_moschettieri_del_duce_desc_alt: "Moschettieri della Republica je jednotka elitních střelců, kteří složili přísahu chránit Republiku před jakoukoliv hrozbou, ať už přichází zvenčí nebo zevnitř státu. Tito vzorní vojáci by také mohli být využiti k lepšímu výcviku našich pravidelných jednotek, čímž by se zlepšila jejich účinnost v poli." # todo: NEW TRANSLATION
  ITA_a_bandits_war: "Válka banditů" # todo: NEW TRANSLATION
  ITA_a_bandits_war_desc: "Staré způsoby vedení války měly zemřít v zákopech na Isonzu. Někteří z našich starých generálů stále věří, že moderní válku lze vyhrát vržením masa vojáků do masokostírny. Teď už víme lépe: moderní válku vyhrávají rychlé manévry a flexibilní organizace, které se dokážou rychle přizpůsobit. Musíme připravit naši armádu na tento typ války." # todo: NEW TRANSLATION
  ITA_carica_di_isbuscenskij: "Carica di Isbuscenskij" # todo: NEW TRANSLATION
  ITA_carica_di_isbuscenskij_desc: "Někteří říkají, že dny koně a jezdce na bojišti jsou pryč. Že roli jízdní pěchoty převzaly tanky a letadla. Ale mýlí se - kůň nepotřebuje palivo, nepotřebuje pozemní pomoc, nevyžaduje náhradní díly kromě podkovy občas. To dává jízdě jasnou výhodu i na moderním bojišti." # todo: NEW TRANSLATION
  ITA_army_leaders: "Velení armády" # todo: NEW TRANSLATION
  ITA_army_leaders_desc: "Naši vojáci musí být vždy vedeni nejzdatnějšími důstojníky. Je nezbytné vytvořit stálý přísun nových a kompetentních důstojníků, aby se udržela výhoda." # todo: NEW TRANSLATION
  ITA_superesercito: "Superesercito" # todo: NEW TRANSLATION
  ITA_superesercito_desc: "Koordinace velké armády není snadný úkol. Potřebujeme vytvořit strukturu pro vrchní velení, které dokáže vést a podporovat síly v poli." # todo: NEW TRANSLATION
  ITA_italian_tankettes: "Italské tankety" # todo: NEW TRANSLATION
  ITA_italian_tankettes_desc: "Zatímco jiné země mohou vyvíjet stále větší a těžší tanky ve snaze vytvořit supertank, který zneplatní ostatní, my víme, že nejlepší tank je ten, který je skutečně na poli. Tank musí být dostatečně rychlý, aby dorazil tam, kde je potřeba, a opravdu potřebuje pancíř jen dostatečný, aby odolal puškám. Takové vozidlo bude levné a rychlé na výrobu." # todo: NEW TRANSLATION
  ITA_bersaglieri: "Bersaglieri" # todo: NEW TRANSLATION
  ITA_bersaglieri_desc: "Bersaglieri, naše elitní lehká pěchota, se dlouho vyznačovala v boji. I když může být budoucnost války mechanizovaná, kvalita jednotlivého vojáka zůstane rozhodující." # todo: NEW TRANSLATION
  ITA_divisioni_alpine: "Divisioni Alpine" # todo: NEW TRANSLATION
  ITA_divisioni_alpine_desc: "Naše vzpomínky na Velkou válku budou navždy zahrnovat brutální boje ve vysokých Alpách. Pokud někdy budeme muset znovu bránit naši zemi proti cizí invazi, určitě přijde ze severu a bude vyžadovat boje v nepřátelských horách. Musíme mít vojáky schopné účinně bojovat v tomto terénu." # todo: NEW TRANSLATION
  ITA_fanti_dell_aria: "Fanti dell'Aria" # todo: NEW TRANSLATION
  ITA_fanti_dell_aria_desc: "Krvavé patové stavy na Isonzu během Velké války nás nutily k frontálním útokům proti dobře připravenému nepříteli. Jediný způsob, jak dosáhnout průlomu, byl překročit zem nikoho a získat nepřátelský zákop. Moderní letadla mohou rychle přenést skupinu vojáků hluboko na zadní linie nepřítele. Přistáním padákem mohou obsadit strategické cíle a destabilizovat nepřátelskou frontu." # todo: NEW TRANSLATION
  ITA_self_propelled_guns: "Samohybná děla" # todo: NEW TRANSLATION
  ITA_self_propelled_guns_desc: "Tank možná revolucionalizoval válku, ale v mnoha ohledech je samohybná děla nejcennějším vozidlem na bojišti. Palebná podpora nabízená relativně levnými a jednoduchými vozidly je neocenitelná při boji přes opevnění nebo proti nepřátelským tankům." # todo: NEW TRANSLATION
  ITA_end_fiat_ansaldo_duopoly: "Konec duopolu Fiat-Ansaldo" # todo: NEW TRANSLATION
  ITA_end_fiat_ansaldo_duopoly_desc: "Náš strojírenský a automobilový sektor byl dlouho ovládán dvěma firmami: Fiat a Ansaldo. I když jsou tyto dvě firmy světové třídy, v jisté míře brzdily růst, protože konkurence na trhu nemohla přežít. Budeme muset zlomit tento duopol, pokud chceme mít dlouhodobě zdravý strojírenský sektor." # todo: NEW TRANSLATION
  ITA_modernize_ansaldo_facilities: "Modernizovat závody Ansaldo" # todo: NEW TRANSLATION
  ITA_modernize_ansaldo_facilities_desc: "Ekonomický pokles po Velké válce uvrhl Ansaldo do finančních potíží natolik, že byly z velké části schopny modernizovat své továrny jen stěží. Pouze jejich vyvýšený status je uchránil před bankrotem. Pokud chceme, aby Ansaldo zůstalo takovým pilířem našeho strojírenského sektoru, musíme zajistit, že používají moderní stroje a techniky." # todo: NEW TRANSLATION
  ITA_ferrea_mole_ferreo_cuore: "Ferrea Mole Ferreo Cuore" # todo: NEW TRANSLATION
  ITA_ferrea_mole_ferreo_cuore_desc: "Náš tankový sbor bude nepochybně povolán k velkým vojenským činům odvahy. K tomu nebude stačit jen jezdit ve slupkách z kovu, musí mít také Srdce z železa." # todo: NEW TRANSLATION
  ITA_air_innovations_bba: "Letecké inovace" # todo: NEW TRANSLATION
  ITA_air_innovations_bba_desc: "Válka ve vzduchu se stala jedním z rozhodujících polí moderní války. Nesmíme si dovolit zaostávat v této klíčové oblasti." # todo: NEW TRANSLATION
  ITA_citta_dell_aria: "Città dell'Aria" # todo: NEW TRANSLATION
  ITA_citta_dell_aria_desc: "Naše výzkumné snahy byly dlouho rozptýlené po celé zemi. To bylo velmi neefektivní. Měli bychom sloučit naše výzkumné úsilí a založit 'Město nebe', kde by vědci a inženýři z různých oborů mohli spolupracovat na vývoji nových generací letadel." # todo: NEW TRANSLATION
  ITA_expand_rome_flying_school: "Rozšířit římskou leteckou školu" # todo: NEW TRANSLATION
  ITA_expand_rome_flying_school_desc: "S rostoucí složitostí moderních letadel roste i riziko nehod, pokud piloti nejsou dostatečně vycvičeni. Musíme zajistit, aby naše letecké školy držely krok s technickým vývojem jak kvalitou výcviku, tak i tempem přijímání nových pilotů potřebných pro rozšíření armády." # todo: NEW TRANSLATION
  ITA_reggianes_exports: "Vývoz Reggiane" # todo: NEW TRANSLATION
  ITA_reggianes_exports_desc: "Společnost Reggiane vyvinula řadu velmi schopných stíhacích letounů, které upoutaly pozornost zahraničních armád snažících se zmodernizovat své letectvo. Pokud jim dovolíme vyvážet svá letadla, zkušenosti z úprav základního návrhu pro různé specifikace budou nepochybně cenné pro naše vlastní vývojové projekty." # todo: NEW TRANSLATION
  ITA_diving_bombers: "Ponorní bombardéry" # todo: NEW TRANSLATION
  ITA_diving_bombers_desc: "Téma blízké letecké podpory získalo v vojenských kruzích značný význam. I když se letadla již dlouho používají k shazování bomb, zdá se, že některé země začaly vyvíjet specializovaná letadla, která mohou umístit bombu s bezkonkurenční přesností potápěním z velké výšky. I když by náš průmysl časem mohl takové letadlo vyrobit, jiné země už mají návrhy pro tento účel." # todo: NEW TRANSLATION
  ITA_superaereo: "Superaereo" # todo: NEW TRANSLATION
  ITA_superaereo_desc: "Dny malých skupinek letadel létajících sem a tam jsou dávno pryč. Moderní letecká kampaň je v mnoha ohledech stejně složitá jako pozemní operace. Potřebujeme specializovaný plánovací štáb, který zkoordinuje naše různé perutě, aby mohly jednat společně a plnit své mise." # todo: NEW TRANSLATION
  ITA_officers_of_the_service_role: "Důstojníci vycvičení v dané službě" # todo: NEW TRANSLATION
  ITA_officers_of_the_service_role_desc: "Už nestačí jen vzít důstojníky z armády a naučit je létat. Naše letectvo vyžaduje nový typ důstojníka, který byl vychován a formován službou, místo toho aby ji pouze přijal." # todo: NEW TRANSLATION
  ITA_standardization: "Standardizace" # todo: NEW TRANSLATION
  ITA_standardization_desc: "Válka ve vzduchu, více než válka na moři a na zemi, je válkou průmyslu proti průmyslu. Kvantita a jen kvantita je rozhodující. Musíme zajistit, že dokážeme vyrobit co nejvíce letadel, i když to znamená, že bude obtížnější měnit návrhy později." # todo: NEW TRANSLATION
  ITA_specialization: "Specializace" # todo: NEW TRANSLATION
  ITA_specialization_desc: "I kdybychom se snažili sebevíc, nikdy nebudeme schopni vyrovnat se větším mocnostem v surovém objemu výroby. Jediný způsob, jak můžeme v letectvu soutěžit, je stavět lepší letadla než ostatní. Každé z nich musí být schopné vyhrát souboj i v poměru tři nebo čtyři ku jedné." # todo: NEW TRANSLATION
  ITA_multirole_aircraft: "Víceúčelová letadla" # todo: NEW TRANSLATION
  ITA_multirole_aircraft_desc: "Vývojem konstrukcí trupů schopných plnit různé role v boji můžeme dosáhnout výrazného snížení výrobních nákladů a doby výcviku posádek. Pošleme naše inženýry okamžitě pracovat na navrhování těchto univerzálních trupů." # todo: NEW TRANSLATION
  ITA_long_range_aircraft: "Dálková letadla" # todo: NEW TRANSLATION
  ITA_long_range_aircraft_desc: "Základny nepřítele, průmysl a zásobovací linky často leží hluboko za frontou. Potřebujeme vyvíjet a zlepšovat naše dálkové letouny, aby dosáhly a zasáhly tyto životně důležité cíle." # todo: NEW TRANSLATION
  ITA_fighter_designs: "Návrhy stíhaček" # todo: NEW TRANSLATION
  ITA_fighter_designs_desc: "Stíhačky jsou páteří každého letectva. Musíme zajistit, aby naše stíhací letouny měly prostředky k dosažení vzdušné nadvlády a ochraně našich bombardérů na cestě k cílům." # todo: NEW TRANSLATION
  ITA_bomber_designs: "Návrhy bombardérů" # todo: NEW TRANSLATION
  ITA_bomber_designs_desc: "S novými návrhy našich bombardérů bude naše letectvo schopné podporovat naše síly na zemi i na moři a zároveň ohrožovat nepřátelské jednotky a jejich zásobovací linky." # todo: NEW TRANSLATION
  ITA_supremacy_in_the_skies: "Nadvláda na obloze" # todo: NEW TRANSLATION
  ITA_supremacy_in_the_skies_desc: "Moderní armáda nemůže úspěšně fungovat bez podpory silného letectva. Je nesmírně důležité, aby naše země měla špičková letadla a technologie k dominanci na obloze." # todo: NEW TRANSLATION
  ITA_naval_power_projection: "Projekce námořní moci" # todo: NEW TRANSLATION
  ITA_naval_power_projection_desc: "Po vzoru našich předků musíme zajistit, že máme průmysl potřebný k vyvinutí impozantní námořní síly schopné udržet italskou nadvládu ve Středomoří nad jakýmkoliv jiným námořnictvem." # todo: NEW TRANSLATION
  ITA_intensify_torpedo_manufacturing: "Zintenzivnit výrobu torpéd" # todo: NEW TRANSLATION
  ITA_intensify_torpedo_manufacturing_desc: "Italská torpéda patří mezi nejspolehlivější na světě. Fiume bylo rodištěm torpéda a s továrnou tam a závodem Silurificio Italiano v Neapoli máme dobrý základ pro další rozšíření používání této smrtící námořní zbraně." # todo: NEW TRANSLATION
  ITA_expand_naval_facilities: "Rozšířit námořní zařízení" # todo: NEW TRANSLATION
  ITA_expand_naval_facilities_desc: "Prvotřídní námořnictvo nepotřebuje jen silnou bojovou flotilu, ale také přístavy a loděnice k její podpoře. Investicemi do naší námořní infrastruktury zajistíme, že naše námořnictvo bude mít základny a kapacity pro výstavbu a opravy potřebné v případě války." # todo: NEW TRANSLATION
  ITA_oto_naval_guns: "OTO námořní děla" # todo: NEW TRANSLATION
  ITA_oto_naval_guns_desc: "Itálie spoléhá na firmy Ansaldo a Oderi-Terni-Orlando pro velká děla svých kapitálních lodí. Cílenými investicemi do jejich kapacit můžeme udělat naše bitevní lodě záviděníhodnými na světě." # todo: NEW TRANSLATION
  ITA_improve_overseas_naval_bases: "Zlepšit zámořské námořní základny" # todo: NEW TRANSLATION
  ITA_improve_overseas_naval_bases_desc: "Modernizace přístavů v našich zámořských územích poskytne pevný základ pro naše námořnictvo k obraně rostoucího impéria a ohrožení obchodních cest našich nepřátel." # todo: NEW TRANSLATION
  ITA_milizia_marittima_di_artiglieria: "Milizia Marittima di Artiglieria" # todo: NEW TRANSLATION
  ITA_milizia_marittima_di_artiglieria_desc: "Itálie má rozsáhlé pobřeží a izolované ostrovní přístavy, zranitelné vůči invazi. Reformou naší Milizia Costiera a investicemi do pobřežní obrany zajistíme, že jakýkoliv útočník zaplatí vysokou cenu." # todo: NEW TRANSLATION
  ITA_supermarina: "Supermarina" # todo: NEW TRANSLATION
  ITA_supermarina_desc: "Pro Regia Marina by měl být zřízen moderní operační štáb pro vrchního velitele, který bude koordinovat operace našich námořních formací po celém Středomoří a dál." # todo: NEW TRANSLATION
  ITA_stockpile_fuel: "Skladovat palivo" # todo: NEW TRANSLATION
  ITA_stockpile_fuel_desc: "Ropa je krví našich lodí, bez které by flotila byla nečinná. S tím, že Itálie postrádá významné domácí zásoby ropy, je nezbytné postavit zásobníky na ropu a naplnit je, aby naše síly vydržely i v případě, že nás budoucí konflikty odříznou od dovozu." # todo: NEW TRANSLATION
  ITA_forza_navale_especiale: "Forza Navale Speciale" # todo: NEW TRANSLATION
  ITA_forza_navale_especiale_desc: "Schopnost provádět amfibické vylodění se pravděpodobně ukáže jako neocenitelná v jakémkoli konfliktu ve Středomoří. Zřízením Zvláštní námořní síly, vycvičené a vybavené pro amfibické operace, budeme schopni projekce síly z moře po dlouhém pobřeží Středomoří." # todo: NEW TRANSLATION
  ITA_naval_air_coordination: "Koordinace námořnictva a letectva" # todo: NEW TRANSLATION
  ITA_naval_air_coordination_desc: "Dosud vrchní velení letectva dodržovalo svou doktrínu a nekoordinovalo se dobře s námořnictvem. To omezovalo schopnost Regia Marina provádět efektivní průzkum. Vypracováním společné námořně‑letecké doktríny a zjednodušením komunikace mezi námořními a leteckými jednotkami budou naše lodě lépe schopny nalézt a udeřit nepřítele." # todo: NEW TRANSLATION
  ITA_decima_flottiglia_mas: "Decima Flottiglia MAS" # todo: NEW TRANSLATION
  ITA_decima_flottiglia_mas_desc: "Teseo Tesei a Elios Toschi z Genio Navale navrhli samopoháněné torpédo, které lze použít k infiltraci nepřátelských přístavů – financováním vývoje této a dalších unikátních zbraní a výcvikem speciální operační jednotky k jejich použití můžeme dosáhnout dramatických, nečekaných vítězství nad našimi nepřáteli." # todo: NEW TRANSLATION
  ITA_incrociatori_leggeri: "Incrociatori Leggeri" # todo: NEW TRANSLATION
  ITA_incrociatori_leggeri_desc: "Dostatečně rychlé a silné, aby se postavily jiným lehkým křižníkům a očistily torpédoborce před sebou, ale dost levné na masovou výrobu — lehké křižníky jsou důležité k ochraně našich námořních cest a k boji proti nepřátelským konvojům. Stavbou na zkušenostech s třídami Condottieri, Montecuccoli a Garibaldi můžeme vytvořit křižnickou sílu, která bude dominovat mořím mezi Evropou a Afrikou." # todo: NEW TRANSLATION
  ITA_incrociatori_pesanti: "Incrociatori Pesanti" # todo: NEW TRANSLATION
  ITA_incrociatori_pesanti_desc: "Prozatím Itálie postrádá průmyslovou základnu k výrobě dostatečného počtu bitevních lodí, aby byly všude tam, kde je potřebujeme. Stavbou výkonných, dobře pancéřovaných křižníků jako naše třída Zara budeme mít lodě, které budou schopny contestovat kontrolu moří napříč více operacemi." # todo: NEW TRANSLATION
  ITA_expand_naval_intelligence: "Rozšířit námořní zpravodajství" # todo: NEW TRANSLATION
  ITA_expand_naval_intelligence_desc: "Italská signální zpravodajská služba fungovala léta s malým rozpočtem, spoléhajíc na značné talenty Giorgio Verità Poeta a Luigi Donini, ale to má své hranice. Poskytnutím více personálu a náborem nových talentů jako poručík Eliso Porto budeme mít větší šanci rozluštit kódy nepřátel a odhalit polohu jejich sil." # todo: NEW TRANSLATION
  ITA_cooperation_programs: "Programy spolupráce" # todo: NEW TRANSLATION
  ITA_cooperation_programs_desc: "Náš robustní loděnický a zbrojní průmysl má nedávnou historii stavby válečných lodí pro jiné země, jako řecké torpédoborce třídy Hydra, nebo asistence při návrhu, například pro SSSR u Projektu 7. Hledání podobných příležitostí by mohlo pomoci dále rozvinout naši průmyslovou základnu pro zkoušky, které nás čekají." # todo: NEW TRANSLATION
  ITA_cruiser_submarines: "Křižníkové ponorky" # todo: NEW TRANSLATION
  ITA_cruiser_submarines_desc: "K útokům na námořní trasy nepřátel mimo Středomoří potřebujeme dálkové ponorky, které budou moci volně procházet oceány. Další podpora našeho rozsáhlého programu ponorek po WW1, založeného hlavně na práci inženýrů Cavalliniho a Bernardise, nám pomůže toho dosáhnout." # todo: NEW TRANSLATION
  ITA_midget_submarines: "Miniponorky" # todo: NEW TRANSLATION
  ITA_midget_submarines_desc: "Čisté vody Středomoří jsou pro větší ponorky nebezpečné. Stavba malých, krátkého doletu a nízce viditelných člunů může zvýšit jejich šance na přežití v prostředí Středomoří a dát nám sílu k hlídkování důležitých úžin, jako je Sicílský průliv." # todo: NEW TRANSLATION
  ITA_cacciatorpediniere_di_scorta: "Cacciatorpediniere di Scorta" # todo: NEW TRANSLATION
  ITA_cacciatorpediniere_di_scorta_desc: "Jedním z úkolů [GetAppropriateRegiaMarinaNsName] je chránit námořní trasy mezi Itálií, Severní Afrikou a našimi středomořskými ostrovy. Stavbou malých torpédoborců zaměřených na boj proti ponorkám a efektivním výcvikem posádek budeme lépe schopni udržovat tok zásob pro naše síly v zámoří." # todo: NEW TRANSLATION
  ITA_ispettorato_dei_mezzi_antisommergibili: "Ispettorato dei Mezzi Antisommergibili" # todo: NEW TRANSLATION
  ITA_ispettorato_dei_mezzi_antisommergibili_desc: "Založení Mariantisom jako velení pro boj proti ponorkám poskytne organizační schopnosti lépe koordinovat naše doprovodné lodě a pohánět technologické inovace, které nám dají výhodu v boji proti nepřátelským ponorkám." # todo: NEW TRANSLATION
  ITA_navi_da_battaglia: "Navi da Battaglia" # todo: NEW TRANSLATION
  ITA_navi_da_battaglia_desc: "Bitevní lodě třídy Littorio jsou rychlé a silné příklady kapitálních lodí. Stavbou dalších těchto plavidel a zdokonalením naší doktríny pro jejich efektivnější použití významně zlepšíme naši bitevní linii." # todo: NEW TRANSLATION
  ITA_proper_carriers: "Skutečné letadlové lodě" # todo: NEW TRANSLATION
  ITA_proper_carriers_desc: "Inovativní konstruktéři jako Luigi Gagnotto vypracovali návrhy letadlových lodí po celé poslední desetiletí. Využitím tohoto know‑how spolu s existujícím trupem rychlíku Roma (s novými, výkonnějšími motory) můžeme získat operační letadlovou loď rychleji než stavbou od základu." # todo: NEW TRANSLATION
  ITA_refit_civilian_ships: "Přestavět civilní lodě" # todo: NEW TRANSLATION
  ITA_refit_civilian_ships_desc: "I když jsou pravé letadlové lodě mnohem schopnější, pokud chceme letadlové lodě rychle, musí se obcházet rohy. Konverzí stávajících pasažérských lodí jako Rex a Conte di Savoia můžeme rychle zajistit letecké krytí pro naši flotilu." # todo: NEW TRANSLATION
  ITA_flotta_d_evasione: "Flotta d'Evasione" # todo: NEW TRANSLATION
  ITA_flotta_d_evasione_desc: "Příliš dlouho byla Itálie spokojena omezit své námořní ambice na Středomoří a Rudé moře. Zavázáním se k 'flotě průlomu' a stavbou lodí navržených pro Atlantský a Indický oceán budeme schopni prosazovat svůj vliv napříč oceány světa." # todo: NEW TRANSLATION
  ITA_ethiopian_war_logistics_bba: "Logistika etiopské války" # todo: NEW TRANSLATION
  ITA_ethiopian_war_logistics_bba_desc: "Z nedostatku pokroku v Etiopii se ukazuje, že jsme podcenili, kolik zásob moderní armáda skutečně potřebuje. Musíme udělat cílené úsilí zlepšit silnice a přístavy v našich držbách východní Afriky, aby potřebné zásoby dorazily na frontu." # todo: NEW TRANSLATION
  ITA_the_abyssinian_fiasco: "Etiopský fiasko" # todo: NEW TRANSLATION
  ITA_the_abyssinian_fiasco_desc: "Naše invaze do Etiopie se proměnila v katastrofu. Opět čelíme ostudnému obrazu italské armády, která nedokáže přemoci etiopskou. Jako naši předci u Adwy jsme byli poraženi. Můžeme jen hádat, co taková porážka znamená pro budoucnost fašistického systému v Itálii." # todo: NEW TRANSLATION
  ITA_solid_progress: "Stálý pokrok" # todo: NEW TRANSLATION
  ITA_solid_progress_desc: "V Etiopii dosahujeme stabilního pokroku, aniž bychom prodlužovali linie nebo vystavovali naše síly etiopským protiútokům. Ač vítězství zatím nebylo dosaženo, je to jen otázka času." # todo: NEW TRANSLATION
  ITA_struggle_in_ethiopia: "Boj v Etiopii" # todo: NEW TRANSLATION
  ITA_struggle_in_ethiopia_desc: "Náš postup v Etiopii je výrazně za plánem, ale nemůžeme dovolit menšímu nezdaru, aby nás demoralizoval. Italské zbraně a fašistický systém zvítězí - za jakoukoli cenu." # todo: NEW TRANSLATION
  ITA_undermine_the_duce: "Podlomit Duce" # todo: NEW TRANSLATION
  ITA_undermine_the_duce_desc: "Mussoliniova šílená touha dobýt Etiopii nás opět přivedla na pokraj porážky. Ač vítězství je stále možné, musí být jasné, že toto vítězství nebude Mussoliniho." # todo: NEW TRANSLATION
  ITA_conspiracies_in_the_shadows: "Konspirace ve stínech" # todo: NEW TRANSLATION
  ITA_conspiracies_in_the_shadows_desc: "Šepoty v mocenských kruzích čím dál častěji vyjadřují nespokojenost s Mussolinim. Spřádají se konspirace a formují aliance mezi lidmi, kteří obvykle nemají moc společného. Čas na změnu se rychle blíží." # todo: NEW TRANSLATION
  ITA_servizio_informazione_militare: "Servizio Informazioni Militare" # todo: NEW TRANSLATION
  ITA_servizio_informazione_militare_desc: "Naše armáda potřebuje přesné informace k plánování operací. Potřebujeme proto centrální organizaci, která bude tato data sbírat a analyzovat, a v případě nutnosti podnikat i útočné akce proti vybraným cílům." # todo: NEW TRANSLATION
  ITA_triumph_in_africa_bba: "Triumf v Africe" # todo: NEW TRANSLATION
  ITA_triumph_in_africa_bba_desc: "Ostuda Adwy byla smazána. Asi 40 let po ponížení, které jsme utrpěli rukou Etiopanů, jsme konečně vykonali pomstu. Naše síly prokázaly svou schopnost bez nejmenších pochyb a celý svět nyní musí uznat naši sílu!" # todo: NEW TRANSLATION
  ITA_defeat_in_ethiopia_flag: "[ITA.GetNameDefCap] byla poražena v [ETH.GetNameDef]" # todo: NEW TRANSLATION
  ITA_devaluate_the_lire: "Devalvovat liru" # todo: NEW TRANSLATION
  ITA_devaluate_the_lire_desc: "Válka byla mnohem nákladnější, než bychom si přáli. Naše ekonomika bojuje s následky. Devalvace naší měny učiní naše produkty konkurenceschopnějšími na mezinárodním trhu, ale zpřísní život průměrného Itala - nezbytné oběti, které ochotně podstoupí." # todo: NEW TRANSLATION
  ITA_anglo_italian_agreements: "Anglo‑italské dohody" # todo: NEW TRANSLATION
  ITA_anglo_italian_agreements_desc: "S novou realitou ve Východní Africe si ostatní koloniální mocnosti musí s námi podat ruce. Potřebujeme, aby nám umožnily průchod Suezem, ale ony nás potřebují mnohem víc. Pokud odmítnou, možná si budeme muset hledat podporu jinde." # todo: NEW TRANSLATION
  ITA_topple_amhara_rulers: "Svrhout vládců Amhary" # todo: NEW TRANSLATION
  ITA_topple_amhara_rulers_desc: "Etiopie je mnohem rozmanitější a rozdrobenější zemí, než si většina myslí. Existuje mnoho skupin, které nejsou silnými podporovateli starého etiopského režimu. Poskytnutím malých koncesí je snadno přetáhneme na naši stranu, což výrazně usnadní pacifikaci regionu." # todo: NEW TRANSLATION
  ITA_the_new_emperor_of_ethiopia: "Nový císař Etiopie" # todo: NEW TRANSLATION
  ITA_the_new_emperor_of_ethiopia_desc: "Lidé Etiopie žili po staletí pod císařem. Bezpochyby by nám to ulehčilo úkol, kdybychom jim představili nového císaře k nahrazení starého, korunováním našeho krále jako nového císaře." # todo: NEW TRANSLATION
  ITA_ministero_della_cultura_popolare: "Ministero della Cultura Popolare" # todo: NEW TRANSLATION
  ITA_ministero_della_cultura_popolare_desc: "Náš lid musí mít vždy přístup k přesným informacím. Během války mohou nepřátelští agenti snadno šířit dezinformace a my tomu musíme čelit tím, že lidem dáme skutečně pravdivou verzi událostí." # todo: NEW TRANSLATION
  ITA_culto_del_duce: "Culto del Duce" # todo: NEW TRANSLATION
  ITA_culto_del_duce_desc: "Benito Mussolini, dobyvatel Afriky, pomstitele Adwy, je bezpochyby nejdůležitějším italským státníkem od dob římských císařů. Je absolutním vrcholem mužnosti, zcela bez strachu. Musíme zajistit, aby každý Ital věděl, že by se měl navždy snažit být co nejpodobnější Mussolinimu." # todo: NEW TRANSLATION
  ITA_devotion: "Oddanost" # todo: NEW TRANSLATION
  ITA_devotion_desc: "Italský lid dluží Mussolinimu velký dluž. Svou vůlí je v mnoha směrech zlepšil. Jsou statečnější, bohatší, morálně úplnější. To nejmenší, co mohou Italové udělat na oplátku, je vzdát díků a následovat jeho rozkazy." # todo: NEW TRANSLATION
  ITA_legge_bottai: "Legge Bottai" # todo: NEW TRANSLATION
  ITA_legge_bottai_desc: "Římské umění a kultura byly základem veškeré moderní kultury v Evropě. Nikdy nesmíme dovolit, aby tyto historické poklady zastínil modernismus. Itálie musí vždy hledět do budoucnosti, ale nesmí zapomenout na svou minulost." # todo: NEW TRANSLATION
  ITA_boost_the_grand_council_of_fascism: "Posílit Velkou radu fašismu" # todo: NEW TRANSLATION
  ITA_boost_the_grand_council_of_fascism_desc: "Benito Mussolini udělal mnohé pro Itálii, ale je stále jen člověk. Pokud by někdy zavedl zemi na scestí, Velká rada fašismu tu bude, aby ho zastavila." # todo: NEW TRANSLATION
  ITA_to_live_as_a_lion: "Žít jako lev" # todo: NEW TRANSLATION
  ITA_to_live_as_a_lion_desc: "Italové nebyli stvořeni jako ovce. Nejsou určeni tiše sedět a být druhořadou silou v historii. Byli stvořeni, aby urvali svůj osud! Benito Mussolini je ten, kdo je k tomu přiměje, a připomene jim, že je lepší žít jeden den jako lev než sto let jako ovce." # todo: NEW TRANSLATION
  ITA_la_battaglia_del_grano: "La Battaglia del Grano" # todo: NEW TRANSLATION
  ITA_la_battaglia_del_grano_desc: "Zemi nelze považovat za opravdu velkou, pokud je závislá na jiných zemích při zásobování potravinami. Itálie musí být v základních potravinách soběstačná, chceme‑li být bráni vážně. Pro tento účel musíme bojovat a bojovat stejně tvrdě jako v jakékoliv jiné bitvě. Pouze vítězstvím v Bitvě o zrno můžeme doufat ve vítězství ve válce." # todo: NEW TRANSLATION
  ITA_la_battaglia_per_la_terra: "La Battaglia per la Terra" # todo: NEW TRANSLATION
  ITA_la_battaglia_per_la_terra_desc: "Základem silné fašistické společnosti je země sama a lidé, kteří ji obdělávají. V Itálii je stále mnoho oblastí, kde můžeme získat užitečnou půdu odvodněním bažin a zavlažováním polí." # todo: NEW TRANSLATION
  ITA_la_battaglia_per_le_nascite: "La Battaglia per le Nascite" # todo: NEW TRANSLATION
  ITA_la_battaglia_per_le_nascite_desc: "Chceme‑li si vydobýt své právoplatné místo ve světě, musíme mít vojenskou sílu, abychom ho násilím získali. K tomu potřebujeme vojáky. Nestačí, aby pár měl jedno nebo dvě děti - dříve než vyhrajeme války, musíme vyhrát Bitvu o počet narozených." # todo: NEW TRANSLATION
  ITA_strengthen_the_regime: "Posílit režim" # todo: NEW TRANSLATION
  ITA_strengthen_the_regime_desc: "Bitvy za ekonomickou nezávislost ukázaly, že fašismus není slabá a měkká ideologie jako liberální režimy, které mu předcházely. Měli bychom zajistit, aby lid nikdy na to nezapomněl." # todo: NEW TRANSLATION
  ITA_the_man_of_providence: "Muž prozřetelnosti" # todo: NEW TRANSLATION
  ITA_the_man_of_providence_desc: "Mussolini nebyl jen ve správný čas na správném místě. Každý krok byl vedený, jako by božská vůle zajistila, že Mussolini uchopil otěže Itálie, když tak učinil." # todo: NEW TRANSLATION
  ITA_believe_obey_fight: "Věř, poslouchej, bojuj" # todo: NEW TRANSLATION
  ITA_believe_obey_fight_desc: "Naše strana byla založena na jednoduchých principech. Za prvé, abys uchopil moc, musíš věřit, že je to možné. Za druhé, abys uchopil moc, musíš poslouchat ty, kdo jsou u moci. Za třetí, abys uchopil moc, musíš bojovat. A uchopení moci je jediným skutečným cílem každého politického hnutí hodného jména." # todo: NEW TRANSLATION
  ITA_banda_carita: "Banda Carità" # todo: NEW TRANSLATION
  ITA_banda_carita_desc: "Válka není vždy slavná záležitost. Zatímco veřejnost se může soustředit na boje na frontách, víme, že domovská fronta je stejně důležitá a že vymýcení odporu v zadních liniích je stejně nezbytné." # todo: NEW TRANSLATION
  ITA_banda_koch: "Banda Koch" # todo: NEW TRANSLATION
  ITA_banda_koch_desc: "Moderní válka je často záležitostí celých národů ve válce. To znamená, že fronta už není jediným místem, kde se bojuje. Musíme být připraveni zajistit naše komunikační linky i s nasazením bojových oddílů." # todo: NEW TRANSLATION
  ITA_security_militias: "Bezpečnostní milice" # todo: NEW TRANSLATION
  ITA_security_militias_desc: "Odvádění jednotek z fronty na zabezpečení zadních oblastí je plýtvání dobrými vojáky. Měli bychom vytvořit jednotky speciálně pro hlídání zad armády, abychom uvolnili více vojáků k boji s nepřítelem." # todo: NEW TRANSLATION
  ITA_battaglioni_d_assalto: "Battaglioni d'Assalto" # todo: NEW TRANSLATION
  ITA_battaglioni_d_assalto_desc: "Naše Černé košile stojí v hrdé tradici útočných skupin Velké války. Integrací do naší armády jim dáme mocný ofenzivní úder v boji." # todo: NEW TRANSLATION
  ITA_strengthen_the_blackshirts: "Posílit Černé košile" # todo: NEW TRANSLATION
  ITA_strengthen_the_blackshirts_desc: "Královská armáda je příliš svázaná způsoby starých režimů a opakovaně ukázala znepokojivý nedostatek fašistického zápalu. Je jasné, že potřebujeme mít celé divize složené z našich loajálních Černých košil." # todo: NEW TRANSLATION
  ITA_milizia_coloniale: "Milizia Coloniale" # todo: NEW TRANSLATION
  ITA_milizia_coloniale_desc: "Musíme posílit a rozšířit naše fašistické milice, Černé košile, s dalšími odvodněmi z kolonií loajálními režimu. Nábor nejen mezi italskými kolonisty, ale i mezi místním obyvatelstvem nám umožní výrazně zvýšit jejich počet." # todo: NEW TRANSLATION
  ITA_towards_a_greater_italy: "Směřem k větší Itálii" # todo: NEW TRANSLATION
  ITA_towards_a_greater_italy_desc: "Italský irredentismus je přirozeným důsledkem zrady, které byl italský lid vystaven od Dohody po Velké válce. Podle práva by Itálie měla mít plné panství nad Středomořím, a proto musíme rozšiřovat naše hranice." # todo: NEW TRANSLATION
  ITA_heroes_of_the_nation: "Hrdinové národa" # todo: NEW TRANSLATION
  ITA_heroes_of_the_nation_desc: "Musíme uznat a odměnit zásluhy velkých hrdinů našeho národa, i když nesmíme zapomenout, že bez moudrého vedení Duce by jejich potenciál byl zcela promarněn." # todo: NEW TRANSLATION
  ITA_capo_supremo: "Capo Supremo" # todo: NEW TRANSLATION
  ITA_capo_supremo_desc: "V Itálii je pouze jedna osoba schopná přinést slávu a moc, které si naše velká země zaslouží. Časy dekadentní monarchie jsou pryč, je čas, aby náš energický Duce stal nejvyšším vůdcem Itálie." # todo: NEW TRANSLATION
  ITA_bend_the_bars: "Ohni mříže" # todo: NEW TRANSLATION
  ITA_bend_the_bars_desc: "Itálie se nachází v žaláři vytvořeném Brity po Velké válce, a čím lidnatější a mocnější Itálie bude, tím více bude trpět svým uvězněním. Je čas ohnout články té mříže a rozšířit italskou kontrolu dál." # todo: NEW TRANSLATION
  ITA_subdue_the_sentinels: "Podrobit strážce" # todo: NEW TRANSLATION
  ITA_subdue_the_sentinels_desc: "Dalším krokem směrem k svobodě a slávě, kterou si Italové zaslouží, je podrobit strážce, kteří nás drží v zajetí ve Středomoří, tedy Gibraltar a Suez." # todo: NEW TRANSLATION
  ITA_a_colonial_empire: "Koloniální impérium" # todo: NEW TRANSLATION
  ITA_a_colonial_empire_desc: "Navzdory snahám našich nepřátel a rivalů se Itálie stala mocným koloniálním impériem. Musíme zajistit nejen to, že využijeme své území naplno, ale i pokračovat v rozšiřování italské kontroly v Africe." # todo: NEW TRANSLATION
  ITA_by_blood_alone: "Pouze krví" # todo: NEW TRANSLATION
  ITA_by_blood_alone_desc: "Díky síle naší armády a neomezenému fanatismu italských irredentistů loajálních našemu režimu, Itálie konečně zanechá svůj podpis v análech dějin, nikoli jako pouhý vedlejší aktér, ale jako hlavní protagonist. \nPouze krev pohání kola dějin!" # todo: NEW TRANSLATION
  ITA_masters_of_the_aegean: "Páni Egeje" # todo: NEW TRANSLATION
  ITA_masters_of_the_aegean_desc: "Chceme‑li ovládat Středomoří, musíme nejprve zajistit absolutní nadvládu Itálie nad Egejským mořem. Díky tomu nebudeme jen kontrolovat přístup ke Černému moři a většinu balkánského pobřeží, ale získáme i nové námořní základny k zajištění Suezu." # todo: NEW TRANSLATION
  ITA_masters_of_the_mediterranean: "Páni Středomoří" # todo: NEW TRANSLATION
  ITA_masters_of_the_mediterranean_desc: "Síla státu je úměrná jeho námořní pozici. Je čas nárokovat si úplnou kontrolu nad Středomořím, je právem italského lidu dominovat starobylému moři, které bylo kolébkou naší civilizace." # todo: NEW TRANSLATION
  ITA_convene_the_grand_council: "Svolat Velkou radu" # todo: NEW TRANSLATION
  ITA_convene_the_grand_council_desc: "Musíme svolat Velkou radu fašismu, aby projednala, co dělat s Mussolinim. Jeho poslední výprava do Etiopie a neochota sdílet moc či odpovědnost nechala mnohé pochybovat o jeho schopnostech jako vůdce. Služil zemi dobře a je tváří fašismu, ale možná nastal čas na nové vedení…" # todo: NEW TRANSLATION
  ITA_foreign_affairs: "Zahraniční věci" # todo: NEW TRANSLATION
  ITA_foreign_affairs_desc: "Každá velmoc potřebuje stanovit jasné zahraničněpolitické cíle a mít talentované lidi vycvičené k vedení diplomacie tak, aby těchto cílů dosáhli." # todo: NEW TRANSLATION
  ITA_balkan_ambition: "Balkánské ambice" # todo: NEW TRANSLATION
  ITA_balkan_ambition_desc: "Je čas rozšířit italské hranice na východ směrem ke Slovinsku a, důležitěji, k dalmátskému pobřeží. Zdůrazníme benátské kulturní dědictví Dalmácie a ukážeme světu, jak benátská vláda byla v minulosti pro Dalmáty nejen prospěšná, ale i velmi přijímaná." # todo: NEW TRANSLATION
  ITA_potential_allies_in_the_balkans: "Potenciální spojenci na Balkáně" # todo: NEW TRANSLATION
  ITA_potential_allies_in_the_balkans_desc: "Abychom kontrolovali Balkán, nemusíme podrobit a ovládnout všechny národy v regionu. Je čas použít diplomacii k zajištění výhodných spojenců na Balkáně a pak podrobit zbytek." # todo: NEW TRANSLATION
  ITA_albanian_occupation: "Obsazení Albánie" # todo: NEW TRANSLATION
  ITA_albanian_occupation_desc: "Albánie je snadný cíl pro naše jednotky k obsazení. Pravděpodobně se setkáme jen s malým odporem. Musíme ukázat světu italskou moc a obnovit slávu minulosti!" # todo: NEW TRANSLATION
  ITA_albanian_oil: "Albánská ropa" # todo: NEW TRANSLATION
  ITA_albanian_oil_desc: "Je čas nahradit naše zastaralé vybavení použité pro starou ropnou koncesi v Albánii a proměnit to nyní, když máme plnou kontrolu nad zemí, v silný ropný průmysl." # todo: NEW TRANSLATION
  ITA_support_albanian_irredentism: "Podpořit albánský irredentismus" # todo: NEW TRANSLATION
  ITA_support_albanian_irredentism_desc: "Musíme se pokusit legitimizovat italskou nadvládu nad Albánií. Podpora albánského irredentismu v oblastech Kosova a Epiru a dále jistě získá významnou veřejnou podporu místního obyvatelstva a poskytne nám příležitost dále rozšířit naši sféru vlivu." # todo: NEW TRANSLATION
  ITA_albanian_fascist_militia: "[GetAppropriateAlbanianFascistMilitiaName]" # todo: NEW TRANSLATION
  ITA_albanian_fascist_militia_default: "Albanian Fascist Militia" # todo: NEW TRANSLATION
  ITA_albanian_fascist_militia_alt: "Legaliteti Militia" # todo: NEW TRANSLATION
  ITA_albanian_fascist_militia_desc: "Vytvoříme novou odnož italských Černých košil v Albánii, dbající na nábor nejen italských kolonistů v zemi, ale i albánských dobrovolníků." # todo: NEW TRANSLATION
  ITA_guarantee_austrian_independence: "Zaručit nezávislost Rakouska" # todo: NEW TRANSLATION
  ITA_guarantee_austrian_independence_desc: "Nesmíme tolerovat německý zásah v Rakousku, protože představuje velkou hrozbu pro italský národ a rovnováhu sil v Evropě. Zaručíme nezávislost Rakouska a budeme se stavět proti jakýmkoli diplomatickým manévrům, které Německo zamýšlí využít k jeho ovlivnění." # todo: NEW TRANSLATION
  ITA_negotiate_italian_claims: "Vyjednat italské nároky" # todo: NEW TRANSLATION
  ITA_negotiate_italian_claims_desc: "Naše opozice vůči Německu nás postavila do silné pozice vůči bývalým spojencům Dohody, kteří zoufale hledají roztržení mezi italským a německým režimem. Musíme tuto situaci využít ve svůj prospěch a znovu získat koloniální území, která nám byla odepřena po Velké válce." # todo: NEW TRANSLATION
  ITA_peace_with_ethiopia_tt: "Po mírových jednáních s §Y[ETH.GetNameWithFlag]§!:" # todo: NEW TRANSLATION
  ITA_ENG_must_control_necessary_states_tt: "§Y[ENG.GetNameWithFlag]§! nekontroluje historické britské kolonie v Rogu Afriky a Maltu." # todo: NEW TRANSLATION
  ITA_FRA_must_control_necessary_states_tt: "§Y[FRA.GetNameWithFlag]§! nekontroluje historické francouzské kolonie v Džibutsku a Tunisku." # todo: NEW TRANSLATION
  ITA_ratify_the_stresa_front: "Ratifikovat Streskou frontu" # todo: NEW TRANSLATION
  ITA_ratify_the_stresa_front_desc: "Územní ústupky byly nyní Itálii uděleny, takže je čas zahájit proces, který přivede Itálii a Francii do vojenské aliance nazvané Streská fronta." # todo: NEW TRANSLATION
  ITA_joint_military_programs: "Společné vojenské programy" # todo: NEW TRANSLATION
  ITA_joint_military_programs_desc: "Musíme podporovat spolupráci mezi Itálií a našimi novými spojenci jak v oblasti armády, tak vědy, protože obě jsou úzce propojené." # todo: NEW TRANSLATION
  ITA_italys_destiny: "Osud Itálie" # todo: NEW TRANSLATION
  ITA_italys_destiny_desc: "Určíme roli, kterou musí Itálie v této alianci hrát: že bude vrchní námořní mocností ve Středomoří. Dalším klíčovým krokem k dosažení tohoto cíle je zajistit nadvládu na Balkáně." # todo: NEW TRANSLATION
  ITA_the_eastern_threat: "Východní hrozba" # todo: NEW TRANSLATION
  ITA_the_eastern_threat_desc: "Není tajemstvím, že vznikající Sovětský svaz představuje hrozbu nejen pro naše zájmy, ale i pro zájmy všech západních mocností. Ochromíme schopnost této země expandovat tím, že jim odepřeme jeden z nejbohatších regionů, k němuž mají přístup: Černé moře." # todo: NEW TRANSLATION
  ITA_german_military_cooperation: "Německá vojenská spolupráce" # todo: NEW TRANSLATION
  ITA_german_military_cooperation_desc: "$ITA_german_millitary_cooperation_desc$" # todo: NEW TRANSLATION
  ITA_sea_wolves_bba: "Mořští vlci" # todo: NEW TRANSLATION
  ITA_sea_wolves_bba_desc: "$ITA_sea_wolves_desc$" # todo: NEW TRANSLATION
  ITA_secret_weapons: "$secret_weapons$" # todo: NEW TRANSLATION
  ITA_secret_weapons_desc: "$secret_weapons_desc$" # todo: NEW TRANSLATION
  ITA_treaty_with_germany: "Smlouva s Německem" # todo: NEW TRANSLATION
  ITA_treaty_with_germany_desc: "$ITA_german_rd_treaty_desc$" # todo: NEW TRANSLATION
  ITA_request_control_of_french_territories: "Žádat o kontrolu francouzských území" # todo: NEW TRANSLATION
  ITA_request_control_of_french_territories_desc: "$ITA_claims_on_france_desc$" # todo: NEW TRANSLATION
  ITA_befriend_japan: "Sblížit se s Japonskem" # todo: NEW TRANSLATION
  ITA_befriend_japan_desc: "$ITA_japan_friend_desc$" # todo: NEW TRANSLATION
  ITA_italian_irredentism: "Italský irredentismus" # todo: NEW TRANSLATION
  ITA_italian_irredentism_desc: "Italský irredentismus se po Velké válce díky našemu fašistickému režimu stal stále agresivnějším. Nastal čas, aby Itálie dosáhla svých přirozených hranic a sjednotila všechna území, která správně patří italskému lidu!" # todo: NEW TRANSLATION
  ITA_war_with_france: "Válka s [FRA.GetName]" # todo: NEW TRANSLATION
  ITA_war_with_france_desc: "$ITA_go_after_france_desc$" # todo: NEW TRANSLATION
  ITA_war_with_greece: "Válka s Řeckem" # todo: NEW TRANSLATION
  ITA_war_with_greece_desc: "Jakou mocnou říší se staneme, když do ní nezařadíme Řecko? Mělo by to být snadný cíl..." # todo: NEW TRANSLATION
  ITA_war_with_the_uk: "Válka se Spojeným královstvím" # todo: NEW TRANSLATION
  ITA_war_with_the_uk_desc: "$ITA_anti_uk_war_goals_desc$" # todo: NEW TRANSLATION
  ITA_befriend_greece: "Sblížit se s Řeckem" # todo: NEW TRANSLATION
  ITA_befriend_greece_desc: "$ITA_greece_friend_desc$" # todo: NEW TRANSLATION
  ITA_claims_on_turkey_bba: "Nároky na Turecko" # todo: NEW TRANSLATION
  ITA_claims_on_turkey_bba_desc: "$ITA_claims_on_turkey_desc$" # todo: NEW TRANSLATION
  ITA_befriend_turkey: "Sblížit se s Tureckem" # todo: NEW TRANSLATION
  ITA_befriend_turkey_desc: "$ITA_turkey_friend_desc$" # todo: NEW TRANSLATION
  ITA_corpo_di_truppe_volontarie: "Corpo di Truppe Volontarie" # todo: NEW TRANSLATION
  ITA_corpo_di_truppe_volontarie_desc: "$ITA_support_nationalist_spain_desc$" # todo: NEW TRANSLATION
  ITA_spanish_italian_alliance: "Španělsko-italské spojenectví" # todo: NEW TRANSLATION
  ITA_spanish_italian_alliance_desc: "$ITA_spanish_italian_faction_desc$" # todo: NEW TRANSLATION
  ITA_demand_balearic_islands_bba: "Požadovat Baleárské ostrovy" # todo: NEW TRANSLATION
  ITA_demand_balearic_islands_bba_desc: "$ITA_demand_balearic_islands_desc$" # todo: NEW TRANSLATION
  ITA_befriend_portugal: "Sblížit se s Portugalskem" # todo: NEW TRANSLATION
  ITA_befriend_portugal_desc: "$ITA_portugal_friend_desc$" # todo: NEW TRANSLATION
  banda_carita_tt: "Brání Německu dokončit jejich fokus §Y$GER_assassinate_mussolini$§!" # todo: NEW TRANSLATION
  ITA_demand_ticino: "Požadovat Ticino" # todo: NEW TRANSLATION
  ITA_demand_ticino_desc: "Pohořnatý stát Švýcarsko hostí mnoho různých etnik, ale mezi nimi jsou Italové, kteří žijí převážně v jižních kantonech země, jako je Ticino. Abychom zajistili velký italský stát, musíme zajistit, aby všichni naši lidé mohli žít v jedné zemi." # todo: NEW TRANSLATION
  ITA_austrian_guarantees_tt: "V případě, že se Německo pokusí o Anschluss, Itálie získá možnost zasáhnout." # todo: NEW TRANSLATION
  ITA_all_eth_initial_states_controlled_tt: "Všechny počáteční etiopské státy jsou kontrolovány §Y[ROOT.GetFlag][ROOT.GetNameDef]§! nebo §Y[ROOT.GetAdjective] spojencem§!." # todo: NEW TRANSLATION
  ITA_fronte_militare_clandestino_modifier_tt: "Přidej §Y$ITA_fronte_militare_clandestino_modifier$ (Itálie)§! (§Y730§! dní), který uděluje: \n   $MODIFIER_RESISTANCE_GROWTH_ON_OUR_OCCUPIED_STATES$: §G+10%§! \n   $MODIFIER_REQUIRED_GARRISON_FACTOR$: §R+15%§! \n\n" # todo: NEW TRANSLATION
  ITA_flotta_d_evasione_admiral_traits_tt: "Dva náhodní admirálové získají vlastnost §Y$bold$§!: \n- $MODIFIER_NAVAL_SPEED$: §G+10%§! \n- $MODIFIER_NAVAL_DAMAGE_FACTOR$: §G+5.00%§! \n\n" # todo: NEW TRANSLATION
  ITA_heroes_of_the_nation_general_traits_tt: "\nTři náhodní generálové získají vlastnost §Y$war_hero$§!: \n- $MODIFIER_UNIT_LEADER_PROMOTE_COST_FACTOR$: §G-50.0%§! \n- $MODIFIER_REASSIGNMENT_DURATION_FACTOR$: §R+50.0%§! \n\n" # todo: NEW TRANSLATION
  ITA_mussolini_becomes_field_marshal_tt: "$ITA_benito_mussolini$ se stává polním maršálem." # todo: NEW TRANSLATION
  ITA_the_italian_liberation_war: "Italská osvobozenecká válka" # todo: NEW TRANSLATION
  ITA_the_italian_liberation_war_desc: "Nastal čas povstat proti fašistům a svrhnout jejich nemocný režim! Antifašističtí partyzáni z celé Itálie jsou připraveni bojovat a obětovat své životy v této národní osvobozenecké válce!" # todo: NEW TRANSLATION
  ITA_fronte_militare_clandestino: "Fronte Militare Clandestino" # todo: NEW TRANSLATION
  ITA_fronte_militare_clandestino_desc: "Zorganizujeme tajnou vojenskou organizaci připojenou k odbojovým buňkám v každém italském městě a v součinnosti s našimi ozbrojenými silami, aby koordinovala naše vojenské operace a partyzánské akce za frontovými liniemi." # todo: NEW TRANSLATION
  ITA_corpo_volontari_della_liberta: "Corpo Volontari della Libertà" # todo: NEW TRANSLATION
  ITA_corpo_volontari_della_liberta_desc: "Národní výbor pro osvobození hodlá posílit naši strukturu vojenské koordinace, Corpo Volontari della Libertà, aby efektivně řídila a koordinovala větší počet partyzánů a ozbrojených sil." # todo: NEW TRANSLATION
  ITA_the_carabinieri: "Carabinieri" # todo: NEW TRANSLATION
  ITA_the_carabinieri_desc: "Vzhledem k roli, kterou carabinieri sehráli při pádu fašistického režimu, jsou nyní fašisty napadáni, což způsobuje, že mnozí z nich se připojují k italskému odboji. Tyto jednotky bychom měli připojit k Italskému osvobozeneckému sboru." # todo: NEW TRANSLATION
  ITA_gappisti: "Gappisti" # todo: NEW TRANSLATION
  ITA_gappisti_desc: "Zformujeme Gruppi di Azione Patriottica, malé partyzánské jednotky, které budou operovat převážně ve městech, podobně jako francouzský odboj. Naši Gappisti zasáhnou nepřítele tvrdě za frontovými liniemi, demoralizují posádky a získají podporu místních obyvatel." # todo: NEW TRANSLATION
  ITA_partisan_republics: "Partyzánské republiky" # todo: NEW TRANSLATION
  ITA_partisan_republics_desc: "Budeme podporovat vznik provizorních státních útvarů ve formě Partyzánských republik na územích osvobozených partyzány, jako způsob shromáždění odporových bojovníků a zaneprázdnění nepřítele za frontovými liniemi." # todo: NEW TRANSLATION
  ITA_the_kings_finest: "Králova elita" # todo: NEW TRANSLATION
  ITA_the_kings_finest_desc: "Zformujeme speciální divize složené z vojáků a důstojníků loajálních italské koruně a vycvičíme je, aby se stali elitou naší osvobozenecké armády." # todo: NEW TRANSLATION
  ITA_grande_rivolta_rurale: "Grande Rivolta Rurale" # todo: NEW TRANSLATION
  ITA_grande_rivolta_rurale_desc: "Nastal čas, aby italské rolnictvo připojilo se k naší věci a chopilo se zbraní proti fašistickým utlačovatelům. Nepřítel už v venkovských oblastech nebude mít šanci!" # todo: NEW TRANSLATION
  ITA_liberation_or_death: "Osvobození nebo smrt!" # todo: NEW TRANSLATION
  ITA_liberation_or_death_desc: "Tvrdě jsme bojovali za osvobození italských národů od fašistického útlaku. Utrpěli jsme velké ztráty, ale nebyly zbytečné, nyní je čas udělat poslední rázné tažení, aby byl fašismus v Itálii jednou provždy vykořeněn!" # todo: NEW TRANSLATION
  ITA_independence_rds: "Italská nezávislost" # todo: NEW TRANSLATION
  ITA_independence_rds_desc: "Dost bylo tohoto podrobení, kterému nás vystavují naši údajní spojenci. Italský národ si od nynějška rozhodne o svém osudu. Pokud bude potřeba opět prolít krev k dosažení tohoto cíle, hrdý italský lid bude připraven." # todo: NEW TRANSLATION
  ITA_the_italian_social_republic: "Italská sociální republika" # todo: NEW TRANSLATION
  ITA_the_italian_social_republic_desc: "Royalisté a další antifašističtí prvky v Itálii se zrádně postavily proti našemu režimu. Přetvořili jsme naši stranu v republikánskou fašistickou stranu proti monarchii a vytvořili Italskou sociální republiku, nové vtělení italského fašistického státu. Odoláme útoku nepřítele a znovu sjednotíme naši zemi!" # todo: NEW TRANSLATION
  ITA_guardia_nazionale_repubblicana: "Guardia Nazionale Repubblicana" # todo: NEW TRANSLATION
  ITA_guardia_nazionale_repubblicana_desc: "Vzhledem k roli, kterou Královští karabinieri sehráli při pokusu o svržení fašistického režimu, okamžitě tuto ozbrojenou sílu nahradíme. Už máme plán na obnovení Černých košil a ustanovení Republikánské národní gardy k vykonávání policejních a vojenských funkcí." # todo: NEW TRANSLATION
  ITA_integrate_polizia_dell_africa_italiana: "Začlenit Polizia dell'Africa Italiana" # todo: NEW TRANSLATION
  ITA_integrate_polizia_dell_africa_italiana_desc: "Musíme integrovat naši koloniální policii, dokud tyto jednotky zůstávají věrné Itálii a našemu režimu. Partyzáni se bezpochyby brzy pokusí ovládnout tyto jednotky..." # todo: NEW TRANSLATION
  ITA_anti_partisan_measures: "Proti-partyzánská opatření" # todo: NEW TRANSLATION
  ITA_anti_partisan_measures_desc: "Nejnověji jsou nepřátelští partyzáni mimořádně aktivní, obtěžují naše rezervy a ohrožují naše zásobovací linky. Musíme nasadit nové jednotky specializované na proti-partyzánské boje, aby tyto prokleté gangy udržely na uzdě." # todo: NEW TRANSLATION
  ITA_all_within_the_state: "Vše ve státě" # todo: NEW TRANSLATION
  ITA_all_within_the_state_desc: "Pokud máme zvítězit v této krveprolitné válce, je nutné, aby všichni přispěli k válečnému úsilí. Ne všechno se však týká přímého boje s nepřítelem — naše frontové linie musí být podporovány silným průmyslem a logistikou stejně jako vojáky, kteří je budou držet." # todo: NEW TRANSLATION
  ITA_battaglioni_m: "Battaglioni M" # todo: NEW TRANSLATION
  ITA_battaglioni_m_desc: "Potřebujeme nové elitní jednotky k zadržení nepřátelského útoku. Musíme přetvořit a posílit bataliony Černých košil, které se vyznamenaly v boji, a použít tyto jednotky k posílení nejslabších míst naší fronty a vytlačení nepřítele zpět, odkud přišel." # todo: NEW TRANSLATION
  ITA_reinforce_the_gustav_line: "Posílit Gustavovu linii" # todo: NEW TRANSLATION
  ITA_reinforce_the_gustav_line_desc: "Musíme posílit naše obranné linie, aby se zabránilo postupu jakýchkoli nepřátelských jednotek. Italská sociální republika nesmí nyní selhat!" # todo: NEW TRANSLATION
  ITA_the_social_republic_prevails: "Sociální republika vítězí!" # todo: NEW TRANSLATION
  ITA_the_social_republic_prevails_desc: "Prolili jsme příliš mnoho krve v této hořké válce rozpoutané bandou manipulativních zrádců, ale nyní je čas tomu udělat přítrž. Italský stát se znovu zrodí, silnější než kdy dřív!" # todo: NEW TRANSLATION
  ITA_independence_rsi: "$ITA_independence_rds$" # todo: NEW TRANSLATION
  ITA_independence_rsi_desc: "$ITA_independence_rds_desc$" # todo: NEW TRANSLATION
