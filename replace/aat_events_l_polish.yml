  denmark_expansion_event.300.t: "[FROM.GetNameDefCap] nabízí práva na zdroje" # todo: NEW TRANSLATION
  denmark_expansion_event.300.desc: "[DEN.GetAdjective] vláda nás dnes oslovila s nabídkou práv na zdroje v jejich nově dobytém území $STATE_666$. Zmiňovaná oblast je bohatá na minerální bohatství. Možná stojí za zvážení?" # todo: NEW TRANSLATION
  denmark_expansion_event.300.a: "Přijmeme tento štědrý návrh!" # todo: NEW TRANSLATION
  denmark_expansion_event.300.b: "To nepotřebujeme." # todo: NEW TRANSLATION
  denmark_expansion_event.301.t: "[FROM.GetNameDefCap] přijal naši nabídku na práva k zdrojům" # todo: NEW TRANSLATION
  denmark_expansion_event.301.desc: "[FROM.GetNameDefCap] laskavě přijal naši nabídku ohledně nově získaných [SWE.GetAdjective] zdrojů. Možná to znamená, že mezi našimi zeměmi může v budoucnu panovat pozitivní vztah." # todo: NEW TRANSLATION
  denmark_expansion_event.301.a: "Výborně!" # todo: NEW TRANSLATION
  denmark_expansion_event.302.t: "[FROM.GetNameDefCap] odmítá naši nabídku na práva k zdrojům" # todo: NEW TRANSLATION
  denmark_expansion_event.302.desc: "Bohužel [FROM.GetNameDef] odmítl naši štědrou nabídku [SWE.GetAdjective] zdrojů. Možná je lepší hledat vyjednávání jinde?" # todo: NEW TRANSLATION
  denmark_expansion_event.302.a: "Jak hrubé." # todo: NEW TRANSLATION
  denmark_expansion_event.400.t: "Otázka neutrality" # todo: NEW TRANSLATION
  denmark_expansion_event.400.desc: "Po mnoho let zůstal [ROOT.GetNameDef] celkově neutrální v mnoha konfliktech, které sužují svět. Nicméně jak napětí v Evropě opět stoupá, musíme konečně zpochybnit, co znamená být neutrální. Velké Skandinávie a Baltského moře byly po několik století klíčovými oblastmi pro naši zemi, a je zásadní rozhodnout, jak chceme postupovat ve vztazích s nimi do budoucna." # todo: NEW TRANSLATION
  denmark_expansion_event.400.a: "Teď, když už nejsou fašisté, můžeme se přiklonit k [GER.GetNameDef]." # todo: NEW TRANSLATION
  denmark_expansion_event.400.b: "Ustanovme vlastní frakci a pozvěme k ní ostatní." # todo: NEW TRANSLATION
  denmark_expansion_event.400.c: "Možná je nejlepší zatím zůstat mimo..." # todo: NEW TRANSLATION
  denmark_expansion_event.401.t: "[FROM.GetNameDefCap] hledá alianci" # todo: NEW TRANSLATION
  denmark_expansion_event.401.desc: "[FROM.GetNameDefCap] zůstal neutrální během Velké války a zůstal tak i v následujících letech, ale dnes ráno jsme obdrželi dánskou [FROM.GetAdjective] delegaci, která naznačila, že zvažují opustit tuto pozici. To by mohl být vhodný okamžik je přetáhnout na naší stranu." # todo: NEW TRANSLATION
  denmark_expansion_event.500.t: "Nabídka aliance" # todo: NEW TRANSLATION
  denmark_expansion_event.500.desc: "Ve snaze postavit se společně a poskytnout menším státům Evropy jistotu se nás [FROM.GetNameDef] obrátil s nabídkou aliance. Měli bychom se spojit s našimi [FROM.GetAdjective] přáteli? Nebo je lepší stát na vlastní noze?" # todo: NEW TRANSLATION
  denmark_expansion_event.500.a: "Přidáme se k [FROM.GetNameDef]!" # todo: NEW TRANSLATION
  denmark_expansion_event.500.b: "Dnes alianci nepotřebujeme." # todo: NEW TRANSLATION
  denmark_expansion_event.501.t: "[DEN.GetNameDefCap] získává spojence" # todo: NEW TRANSLATION
  denmark_expansion_event.501.desc: "[FROM.GetNameDefCap] souhlasil s naší nabídkou aliance a oficiálně podepsal deklaraci. Postavme se společně proti bouři a zajistěme si navzájem bezpečí pro roky dopředu." # todo: NEW TRANSLATION
  denmark_expansion_event.501.a: "Výborně!" # todo: NEW TRANSLATION
  denmark_expansion_event.502.t: "[FROM.GetNameDefCap] odmítá alianci" # todo: NEW TRANSLATION
  denmark_expansion_event.502.desc: "Bohužel [FROM.GetNameDef] odmítl naši nabídku aliance. Zdá se, že společné záruky bezpečí nebyly v jejich nejlepším zájmu." # todo: NEW TRANSLATION
  denmark_expansion_event.502.a: "Velmi nešťastné." # todo: NEW TRANSLATION
  denmark_expansion_event.600.t: "[FROM.GetNameDefCap] žádá o dohodu o výzkumu" # todo: NEW TRANSLATION
  denmark_expansion_event.600.desc: "Aby se zvýšil duch spolupráce mezi našimi dvěma národy, [FROM.GetAdjective] vláda požádala o uzavření výzkumné dohody, aby jsme si mohli vzájemně sdílet naše technologické schopnosti." # todo: NEW TRANSLATION
  denmark_expansion_event.600.a: "Přijmout. To nás jen posílí." # todo: NEW TRANSLATION
  denmark_expansion_event.600.b: "Na to nemáme čas." # todo: NEW TRANSLATION
  denmark_expansion_event.601.t: "[FROM.GetNameDefCap] připojuje se k naší dohodě o výzkumu" # todo: NEW TRANSLATION
  denmark_expansion_event.601.desc: "Skvělé zprávy! [FROM.GetNameDefCap] souhlasil vstoupit do společného programu sdílení technologií s námi. To znamená, že získáme přístup k jejich technologickým pokrokům a jistě nám to pomůže při plánování budoucnosti naší země." # todo: NEW TRANSLATION
  denmark_expansion_event.601.a: "Společně jsme silnější!" # todo: NEW TRANSLATION
  denmark_expansion_event.602.t: "[FROM.GetNameDefCap] odmítl náš návrh" # todo: NEW TRANSLATION
  denmark_expansion_event.602.desc: "Navzdory našim nejlepším snahám se [FROM.GetAdjective] vláda rozhodla držet si svou technologii. To je nešťastné, protože společně bychom mohli posunout naše technologické schopnosti dál." # todo: NEW TRANSLATION
  denmark_expansion_event.602.a: "To je nešťastné..." # todo: NEW TRANSLATION
  denmark_expansion_event.700.t: "[FROM.GetAdjective] vměšování" # todo: NEW TRANSLATION
  denmark_expansion_event.700.desc: "Odhalili jsme důkazy o [FROM.GetAdjective] podvratné činnosti v [ROOT.GetNameDef], snažící se ovlivnit veřejné mínění. Nechat Dány v tom pokračovat bude mít vážné následky pro nás." # todo: NEW TRANSLATION
  denmark_expansion_event.701.t: "[FROM.GetNameDefCap] zhatil naše plány" # todo: NEW TRANSLATION
  denmark_expansion_event.701.desc: "[FROM.GetAdjective] zhatili naše plány ovlivnit veřejné mínění ve prospěch naší věci." # todo: NEW TRANSLATION
  denmark_expansion_event.800.t: "[FROM.GetNameDefCap] nabízí ochranu" # todo: NEW TRANSLATION
  denmark_expansion_event.800.desc: "Delegace [FROM.GetAdjective] k nám přišla s nabídkou plné vojenské ochrany. Všechno, co za to žádají, je, abychom poklekli..." # todo: NEW TRANSLATION
  denmark_expansion_event.801.t: "[FROM.GetNameDefCap] přijímá naši ochranu" # todo: NEW TRANSLATION
  denmark_expansion_event.801.desc: "Dostali jsme odpověď od [FROM.GetAdjective] vlády ohledně naší nabídky řádně je ochránit, a oni naši plnou ochranu s radostí přijali!" # todo: NEW TRANSLATION
  denmark_expansion_event.802.t: "[FROM.GetNameDefCap] odmítá naši ochranu" # todo: NEW TRANSLATION
  denmark_expansion_event.802.desc: "Dostali jsme odpověď od [FROM.GetAdjective] vlády ohledně naší nabídky řádně je ochránit, a bohužel odmítli se podřídit. Časem uvidí, jaká to byla pošetilá chyba." # todo: NEW TRANSLATION
  denmark_fascist_event.1.t: "[FROM.GetNameDefCap] hledá naši podporu" # todo: NEW TRANSLATION
  denmark_fascist_event.1.desc: "Dnes ráno jsme přivítali delegaci z [FROM.GetAdjective] fašistické strany, která hledala naši podporu ve snaze získat moc ve své zemi. Pokud jim pomůžeme, znamená to další národ, který by mohl být cenným spojencem naší věci." # todo: NEW TRANSLATION
  denmark_fascist_event.1.a: "Podpoříme jejich vzestup k moci!" # todo: NEW TRANSLATION
  denmark_fascist_event.1.b: "Máme teď větší starosti." # todo: NEW TRANSLATION
  denmark_fascist_event.2.t: "[FROM.GetNameDefCap] posílá svou podporu" # todo: NEW TRANSLATION
  denmark_fascist_event.2.desc: "Zdá se, že naše prosba o vnější podporu byla vyslyšena, protože [FROM.GetNameDef] souhlasil podat ruku při našem pokusu uchopit moc. To je krok správným směrem pro naše politické hnutí." # todo: NEW TRANSLATION
  denmark_fascist_event.2.a: "Skvělé!" # todo: NEW TRANSLATION
  denmark_fascist_event.3.t: "[FROM.GetNameDefCap] odmítl naši žádost" # todo: NEW TRANSLATION
  denmark_fascist_event.3.desc: "Bohužel [FROM.GetAdjective] vláda odmítla poslat podporu v našem pokusu svrhnout Rigsdagen. V tuto chvíli čelíme potenciálnímu ozbrojenému odporu proti našemu převratu, což ztěžuje náš vzestup k moci. To je velmi zklamání." # todo: NEW TRANSLATION
  denmark_fascist_event.3.a: "Prokleté!" # todo: NEW TRANSLATION
  denmark_fascist_event.20.t: "[FROM.GetNameDefCap] žádá o dohodu o výzkumu" # todo: NEW TRANSLATION
  denmark_fascist_event.20.desc: "Aby se zvýšil duch spolupráce mezi našimi dvěma národy, [FROM.GetAdjective] vláda požádala o uzavření výzkumné dohody, abychom si mohli vzájemně sdílet naše technologické schopnosti." # todo: NEW TRANSLATION
  denmark_fascist_event.20.a: "Přijmout. To nás jen posílí." # todo: NEW TRANSLATION
  denmark_fascist_event.20.b: "Na to nemáme čas." # todo: NEW TRANSLATION
  denmark_fascist_event.21.t: "[FROM.GetNameDefCap] přijal náš návrh" # todo: NEW TRANSLATION
  denmark_fascist_event.21.desc: "Skvělé zprávy! [FROM.GetNameDefCap] souhlasil vstoupit do společného programu sdílení technologií s námi. To znamená, že získáme přístup k jejich technologickým pokrokům a jistě nám to pomůže při budování naší budoucí vojenské síly." # todo: NEW TRANSLATION
  denmark_fascist_event.21.a: "Naše armáda bude záviděná v celém severu!" # todo: NEW TRANSLATION
  denmark_fascist_event.22.t: "[FROM.GetNameDefCap] odmítl náš návrh" # todo: NEW TRANSLATION
  denmark_fascist_event.22.desc: "Navzdory našim snahám být zdvořilí se [FROM.GetAdjective] vláda rozhodla držet si svou technologii. To je nešťastné, protože společně bychom mohli výrazně rozvinout naše technologické schopnosti." # todo: NEW TRANSLATION
  denmark_fascist_event.22.a: "Dobrá tedy, nechte si své tajemství." # todo: NEW TRANSLATION
  denmark_trade_deal.1.t: "[FROM.GetNameDefCap] nabízí obchodní návrh" # todo: NEW TRANSLATION
  denmark_trade_deal.1.desc: "Dánská delegace k nám přišla s obchodním návrhem. Dánsko produkuje velké množství potravinářských produktů, které jsme dříve hodně dováželi. Nedávno devalvovali svou domácí měnu, korunu, což učinilo jejich zemědělské zboží mnohem konkurenceschopnějším. Tato obchodní dohoda by pro nás mohla být velkým přínosem, protože by zajistila potraviny pro naši populaci a posílila naše dodavatelské řetězce." # todo: NEW TRANSLATION
  denmark_trade_deal.1.a: "To by mohlo být přínosné" # todo: NEW TRANSLATION
  denmark_trade_deal.1.b: "Nepotřebujeme dánské produkty" # todo: NEW TRANSLATION
  denmark_trade_deal.2.t: "[FROM.GetNameDefCap] přijal náš obchodní návrh" # todo: NEW TRANSLATION
  denmark_trade_deal.2.desc: "Naše obchodní delegace se vrátila z [FROM.GetName] s pozitivními výsledky! [FROM.GetAdjective] podepsali navrhovanou obchodní dohodu, která posílí náš zemědělský sektor a vytvoří nová pracovní místa a příležitosti." # todo: NEW TRANSLATION
  denmark_trade_deal.2.a: "Skvělé rozhodnutí pro obě strany!" # todo: NEW TRANSLATION
  denmark_trade_deal.3.t: "[FROM.GetNameDefCap] odmítl náš obchodní návrh" # todo: NEW TRANSLATION
  denmark_trade_deal.3.desc: "Naše obchodní delegace se vrátila z [FROM.GetName] zklamaná. Zdá se, že [FROM.GetAdjective] neviděli výhody naší obchodní nabídky - ačkoliv jich bylo mnoho. To znamená ztrátu pro zemědělský sektor, ale nic, s čím bychom se nedokázali vypořádat." # todo: NEW TRANSLATION
  denmark_trade_deal.3.a: "Ať hladoví!" # todo: NEW TRANSLATION
  denmark_trade_deal.4.t: "Dotaz na rozšíření obchodní dohody" # todo: NEW TRANSLATION
  denmark_trade_deal.4.desc: "[FROM.GetLeader] vyslal obchodní delegaci k nám, žádají rozšíření naší stávající obchodní dohody týkající se zemědělských produktů. Zdá se, že jim naše produkty nestačí. Rozšíření této dohody by vytvořilo více pracovních míst a ještě posílilo naše farmáře." # todo: NEW TRANSLATION
  denmark_trade_deal.4.a: "Skvělý návrh!" # todo: NEW TRANSLATION
  denmark_trade_deal.4.b: "Už máme, co potřebujeme" # todo: NEW TRANSLATION
  denmark_trade_deal.5.desc: "Naše obchodní delegace se vrátila z [FROM.DetName] s opravdu vynikajícími zprávami! Vůdce delegace nám řekl, že [FROM.GetLeader] byl velmi dychtivý podepsat náš návrh na rozšíření dohody." # todo: NEW TRANSLATION
  denmark_trade_deal.6.desc: "Naše obchodní delegace se vrátila z [FROM.DetName] s znepokojivými zprávami. Vůdce delegace nám řekl, že [FROM.GetLeader] byl docela lhostejný k rozšíření naší stávající obchodní dohody a neviděl přínos v prohloubení vazeb mezi našimi zeměmi." # todo: NEW TRANSLATION
  denmark_trade_deal.6.a: "Jak promarněná příležitost!" # todo: NEW TRANSLATION
  denmark_trade_deal.7.t: "[FROM.GetNameDefCap] ruší obchodní dohodu" # todo: NEW TRANSLATION
  denmark_trade_deal.7.desc: "[ROOT.GetLeader] dostal osobní telegraf od [FROM.GetLeader], že zemědělská obchodní dohoda mezi oběma zeměmi končí. Nebyl nabídnut žádný důvod, což všechny nechává spekulovat o smyslu tohoto náhlého rozhodnutí." # todo: NEW TRANSLATION
  denmark_trade_deal.7.a: "Více pro nás!" # todo: NEW TRANSLATION
  denmark_trade_deal.7.b: "Zvládneme to bez jejich produktů" # todo: NEW TRANSLATION
  denmark_trade_deal.8.t: "[GetCanceledTradeTitle]" # todo: NEW TRANSLATION
  denmark_trade_deal.8.t_subjugation_cancelation: "Okupace přerušuje dánský obchod" # todo: NEW TRANSLATION
  denmark_trade_deal.8.t_war_cancelation_partner: "Válka přerušuje dánský obchod" # todo: NEW TRANSLATION
  denmark_trade_deal.8.t_war_cancelation_denmark: "Válka přerušuje [FROM.GetAdjective] obchod" # todo: NEW TRANSLATION
  denmark_trade_deal.8.desc: "[GetCanceledTradeDesc]" # todo: NEW TRANSLATION
  denmark_trade_deal.8.desc_subjugation_cancelation: "Veškerý obchod s dánskými produkty přestal kvůli [?DEN.DEN_overlord_nation.GetAdjective] invazi a podrobení [DEN.GetNameDef]." # todo: NEW TRANSLATION
  denmark_trade_deal.8.desc_war_cancelation_partner: "Obchodní dohoda s [DEN.GetNameDef] skončila kvůli nedávným nepřátelstvím mezi našimi zeměmi." # todo: NEW TRANSLATION
  denmark_trade_deal.8.desc_war_cancelation_denmark: "Obchodní dohoda s [FROM.GetNameDef] skončila kvůli nedávným nepřátelstvím mezi našimi zeměmi." # todo: NEW TRANSLATION
  denmark_trade_deal.8.a: "Nešťastné události" # todo: NEW TRANSLATION
  denmark_trade_deal.8.b: "Dohoda stejně vypršela" # todo: NEW TRANSLATION
  denmark_trade_deal.8.c: "Nezaslouží si naše produkty!" # todo: NEW TRANSLATION
  denmark_events.1.t: "Konec krizových let" # todo: NEW TRANSLATION
  denmark_events.1.desc: "Konečně, po letech ekonomických těžkostí, utrpení způsobené Velkou depresí je za námi. Během krizových let jsme tvrdě pracovali na stabilizaci [DEN.GetAdjective] ekonomiky a zmírnění škod, které krach způsobil naší zemi." # todo: NEW TRANSLATION
  denmark_events.1.a: "Jdeme správným směrem" # todo: NEW TRANSLATION
  DEN_end_of_crisis_consumer_goods_modifier_tt: "$DEN_modify_industrial_capability_dynamic_modifier$ \n$MODIFIER_CONSUMER_GOODS_FACTOR$: §Y-10.0%§!\n\n" # todo: NEW TRANSLATION
  denmark_events.2.t: "Lidé se cítí v bezpečí" # todo: NEW TRANSLATION
  denmark_events.2.desc: "Od té doby, co jsme vložili prostředky do posílení našich hranic, dostáváme zprávy od veřejnosti, že se začínají cítit bezpečněji, zejména s ohledem na rostoucí bouři v Evropě. Doufejme, že tyto obrany udrží kohokoli, kdo by mohl mít plány okupovat [DEN.GetNameDef]." # todo: NEW TRANSLATION
  denmark_events.2.a: "Bezpečí nade vše" # todo: NEW TRANSLATION
  denmark_events.100.t: "Dánský král hledá útočiště!" # todo: NEW TRANSLATION
  denmark_events.100.desc: "Po totální revoluci, která sužuje [DEN.GetNameDef], jsme obdrželi zprávu, že dánský král a jeho rodina žádají útočiště v naší zemi. Není to snadné rozhodnutí hostit vyhnaného monarchu, a měli bychom pečlivě zvážit naše možnosti. Pomůžeme dánskému králi? Nebo ho pošleme jinam?" # todo: NEW TRANSLATION
  denmark_events.100.a: "Ubytujme ho, můžeme pracovat na obnovení jeho království." # todo: NEW TRANSLATION
  denmark_events.100.b: "U nás není místo pro krále." # todo: NEW TRANSLATION
  denmark_events.200.t: "Thorvald Stauning zemřel" # todo: NEW TRANSLATION
  denmark_events.200.desc: "Známý politik Thorvald Stauning zemřel. Působil jako předseda vlády Dánska v několika obdobích a byl obdivován mnohými. Ke konci svého života se increasingly obával o budoucnost sociální demokracie v Evropě." # todo: NEW TRANSLATION
  denmark_events.200.a: "Pohřbít ho" # todo: NEW TRANSLATION
  denmark_events.201.t: "Král Kristian X zemřel" # todo: NEW TRANSLATION
  denmark_events.201.desc: "Král Kristian X, který vládl svým dánským poddaným třicet pět let a vedl zemi skrze některé z nejbouřlivějších časů Evropy, včera tiše zemřel. Jeho nástupcem je jeho syn, Frederik IX." # todo: NEW TRANSLATION
  denmark_events.201.a: "Ať žije král" # todo: NEW TRANSLATION
  denmark_events.300.t: "Vznikají nové firmy" # todo: NEW TRANSLATION
  denmark_events.300.desc: "Cihlu po cihle se nám daří obnovovat ekonomiku a nové firmy zakládají téměř každý den a země prosperuje. Probíhá i technologický posun, protože některé firmy začaly experimentovat s možnostmi plastů." # todo: NEW TRANSLATION
  denmark_events.300.a: "Leg Godt" # todo: NEW TRANSLATION
  denmark_events.666.t: "Vzrůst Velkého Dánska" # todo: NEW TRANSLATION
  denmark_events.666.desc: "Po dlouhou dobu jsme žili v ochablém bytí, věříc, že naše nejlepší dny jsou za námi. Odhodili jsme jakýkoli sen o velikosti, aniž bychom mu věnovali druhou myšlenku - ale už ne. Stojíme před novým zlatým věkem! Naše moc a vliv roste s každým dnem a nastal čas vyhlásit Velké Dánsko." # todo: NEW TRANSLATION
  denmark_events.666.a: "Ať svět baží v naší slávě!" # todo: NEW TRANSLATION
  denmark_events.666.b: "To se zdá poněkud přehnané..." # todo: NEW TRANSLATION
  iceland_events.1.t: "Dánsko napadeno" # todo: NEW TRANSLATION
  iceland_events.1.desc: "[?ICE.overlord_attacker.GetAdjective] síly napadly Dánsko. [ROOT.getName] vydal prohlášení neutrality, které by měly všechny strany respektovat.\n$ICE_sveinn_bjornsson$ byl prohlášen regentem v nepřítomnosti krále a fakticky převzal zahraniční politiku [ROOT.GetName]. Je to samozřejmě považováno za dočasné opatření, dokud se situace nezklidní a svět nebude mírnější, ale prozatím [ROOT.GetName] funguje jako suverénní národ ve všech ohledech toho slova." # todo: NEW TRANSLATION
  iceland_events.1.a: "Uvidíme, jak dlouho to bude dočasné" # todo: NEW TRANSLATION
  aat_news.1.t: "Island vyhlašuje neutralitu" # todo: NEW TRANSLATION
  aat_news.1.desc: "Islandský Althing vydal prohlášení, jímž vyhlašuje neutralitu Islandu v konfliktu mezi Dánskem a [?ICE.overlord_attacker.GetName]. \nParlament také prohlásil $ICE_sveinn_bjornsson$ regentem v nepřítomnosti krále a $ICE_sveinn_bjornsson$ bude řídit zahraniční politiku Islandu. Prohlášení uvádí, že se jedná o dočasné opatření a že předválečné vztahy s Dánskem budou po skončení konfliktu znovu obnoveny. Do té doby je Island fakticky nezávislý." # todo: NEW TRANSLATION
  aat_news.1.a: "Neutralita Dánsku nepomohla" # todo: NEW TRANSLATION
  aat_news.2.t: "[ICE.GetAdjective]-[USA.GetAdjective] spolupráce" # todo: NEW TRANSLATION
  aat_news.2.desc: "V poněkud překvapivém kroku vláda [USA.GetAdjective] prohlásila [ICE.GetName] za součást své sféry zájmu a na žádost [ICE.GetAdjective] vlády souhlasila vyslat jednotky k ochraně [ICE.GetName]. Veškerá islandská zahraniční politika bude od té doby řízena [USA.GetAdjective] vládou, čímž se [ICE.GetName] stává fakticky [USA.GetAdjective] loutkovým státem." # todo: NEW TRANSLATION
  aat_news.2.a: "Zajímavý krok" # todo: NEW TRANSLATION
  iceland_events.2.t: "[FROM.GetName] žádá o [ROOT.GetAdjective] ochranu" # todo: NEW TRANSLATION
  iceland_events.2.desc: "[ICE.GetAdjective] velvyslanec v [ROOT.Capital.GetCapitalVictoryPointName] nás požádal, abychom poslali jednotky do [FROM.GetName]. V podstatě žádají o [ROOT.GetAdjective] ochranu proti možné invazi. Nabízejí nám v tom případě předání správy své zahraniční politiky." # todo: NEW TRANSLATION
  iceland_events.2.a: "Skvělá příležitost" # todo: NEW TRANSLATION
  iceland_events.2.b: "Ne, musí si poradit sami" # todo: NEW TRANSLATION
  iceland_events.2.c: "Nedělejme škodu [ROOT.GetAdjective]-[FROM.OVERLORD.GetAdjective] vztahům" # todo: NEW TRANSLATION
  iceland_events.3.t: "[FROM.GetNameDefCap] přijímá" # todo: NEW TRANSLATION
  iceland_events.3.desc: "[FROM.GetAdjective] vláda přijala naši žádost, aby převzala obranu [ROOT.GetName]. Doufejme, že naše země z toho bude profitovat nejen tím, že se vyhneme invazi, ale i finančně díky závazku [FROM.GetAdjective]." # todo: NEW TRANSLATION
  iceland_events.3.a: "Asi jsme teď v bezpečí" # todo: NEW TRANSLATION
  iceland_events.4.t: "[FROM.GetNameDefCap] odmítá" # todo: NEW TRANSLATION
  iceland_events.4.desc: "Bohužel [FROM.GetLeader] nechtěl stát za [ROOT.GetName]. Jako hlavní důvod uvedl, že [FROM.GetNameDef] má už dost vlastních problémů a neodvážil se prohlásit se za ochránce [ROOT.GetNameDef]." # todo: NEW TRANSLATION
  iceland_events.4.a: "Budeme muset najít jiné řešení." # todo: NEW TRANSLATION
  iceland_events.5.t: "Španělská válka" # todo: NEW TRANSLATION
  iceland_events.5.desc: "Vypuknutí nepokojů ve Španělsku dramaticky snížilo islandské vývozy do regionu. Země bývala hlavním dovozcem sušené ryby z Islandu. To je nešťastné nejen pro rybářský průmysl, ale pro celý Island, protože to byl jeden z mála sektorů, který se po válce a velké depresi začal zotavovat." # todo: NEW TRANSLATION
  iceland_events.5.a: "Je to znamení" # todo: NEW TRANSLATION
  iceland_events.5.b: "Konec je blízko!" # todo: NEW TRANSLATION
  iceland_events.5.c: "Economy, hlupáci!" # todo: NEW TRANSLATION
  iceland_events.5.d: "Přál bych si žít ve vyspělejších časech" # todo: NEW TRANSLATION
  iceland_events.6.t: "Rovní partneři" # todo: NEW TRANSLATION
  iceland_events.6.desc: "[FROM.GetLeader] of [FROM.GetName] oficiálně prohlásil, že jelikož [FROM.GetName] bojuje ve válce s Dánskem a nese vlastní tíhu, již není potřeba žádného dánského vedení v zahraniční politice - nebo v jiných záležitostech týkajících se [FROM.GetAdjective] politiky. To je v podstatě deklarace nezávislosti." # todo: NEW TRANSLATION
  iceland_events.6.a: "Upřímně, moc s tím nezmůžeme" # todo: NEW TRANSLATION
  iceland_events.6.b: "Tu drzost trestáme po skončení války" # todo: NEW TRANSLATION
  iceland_events.7.t: "[FROM.GetName] přijímá naši nezávislost" # todo: NEW TRANSLATION
  iceland_events.7.desc: "Kromě několika zamračených hlášek v dánském parlamentu byla naše deklarace rovnoprávného postavení s Dánskem přijata bez vážného odporu. Dáni chápou naši pozici a vzhledem k tomu, že bojujeme ve válce po boku, považují budoucí spolupráci za důležitější než staré feudální instituce a národní hrdost. Král Christian abdikoval jako král Islandu, jak jsme požadovali. Nyní jsme plně suverénní zemí. Musíme se nyní rozhodnout, jak zacházet s otázkou monarchie. Jsme momentálně monarchií bez krále..." # todo: NEW TRANSLATION
  iceland_events.7.a: "Krále nepotřebujeme" # todo: NEW TRANSLATION
  iceland_events.7.b: "V Dánsku je přece více royalty..." # todo: NEW TRANSLATION
  iceland_events.8.t: "Požadavek z Islandu" # todo: NEW TRANSLATION
  iceland_events.8.desc: "Náš malý bratr ze moře si uvědomil, že monarchie bez krále je zvláštní. Vrátili se k nám s žádostí, abychom jednoho z dánských princů korunovali králem Islandu. Jako výraz budoucí přátelství, tvrdí." # todo: NEW TRANSLATION
  iceland_events.8.a: "Ještě jednou - pro prince Knuda" # todo: NEW TRANSLATION
  iceland_events.8.b: "Nemyslím, že je to dobrý nápad" # todo: NEW TRANSLATION
  iceland_events.9.t: "Dánský král opět" # todo: NEW TRANSLATION
  iceland_events.9.desc: "Jednání s [FROM.GetAdjective] dvorem byla úspěšná. Prince Knuda jsme nabídli islandskou korunu a on ji přijal." # todo: NEW TRANSLATION
  iceland_events.9.a: "Ať žije král Knud, vládce [ROOT.GetName]!" # todo: NEW TRANSLATION
  iceland_events.9.b: "Skvělé, musíme zajistit, aby jeho pravomoci byly omezené" # todo: NEW TRANSLATION
  iceland_events.10.t: "Bez úspěchu v jednání" # todo: NEW TRANSLATION
  iceland_events.10.desc: "Naše rozhovory s dánským dvorem nepřinesly výsledek. Stále jsou uraženi tím, že [ROOT.GetName] už nechce být dánským subjektem. Možná je čas posunout se dál." # todo: NEW TRANSLATION
  iceland_events.10.a: "Republika tedy, domnívám se" # todo: NEW TRANSLATION
  iceland_events.11.t: "[FROM.GetName] rozhořčen" # todo: NEW TRANSLATION
  iceland_events.11.desc: "Navzdory našim nejlepším snahám [FROM.GetName] odmítá přijmout, že [ROOT.GetName] už nechce být ovládán z [FROM.Capital.GetCapitalVictoryPointName]. Dokonce nás vyhrožovali použitím síly. Nicméně nyní, když [ROOT.GetName] začalo budovat obranné síly, jejich úspěch je méně pravděpodobný." # todo: NEW TRANSLATION
  iceland_events.11.a: "Naše cesta vpřed je pevně nastavena" # todo: NEW TRANSLATION
  iceland_events.12.t: "[FROM.GetLeader] chce kompenzaci" # todo: NEW TRANSLATION
  iceland_events.12.desc: "[FROM.GetLeader] požaduje kompenzaci za [FROM.GetAdjective] pomoc [ROOT.GetName] v průběhu let, zejména v nedávných těžkých časech. Podle [FROM.GetLeader] by to pomohlo [FROM.GetNameDef] růst a udržet schopnost dále podporovat [ROOT.GetName] v budoucnu, jakož i lépe bránit tyto ostrovy." # todo: NEW TRANSLATION
  iceland_events.12.a: "Můžou mít jak [101.GetName], tak [337.GetName]" # todo: NEW TRANSLATION
  iceland_events.12.b: "Ne, neudělali dost na to, aby si to zasloužili" # todo: NEW TRANSLATION
  iceland_events.12.c: "Dát jim jeden ostrov asi neublíží" # todo: NEW TRANSLATION
  iceland_events.13.t: "[101.GetName] a [337.GetName] budou [ROOT.GetAdjective]" # todo: NEW TRANSLATION
  iceland_events.13.desc: "[FROM.GetLeader] plně pochopil a podpořil naši právoplatnou žádost o kompenzaci. [FROM.GetName] se rozhodl předat oba ostrovy [101.GetName] a [337.GetName] [ROOT.GetName]. Souhlasili, že jsme v lepší pozici je bránit, a že to bude k obecnému prospěchu." # todo: NEW TRANSLATION
  iceland_events.13.a: "Naše impérium roste" # todo: NEW TRANSLATION
  iceland_events.14.t: "[FROM.GetLeader] odmítá" # todo: NEW TRANSLATION
  iceland_events.14.desc: "Bohužel naše pokorná žádost o kompenzaci za všechnu pomoc, kterou jsme [FROM.GetName] poskytli v průběhu let, zůstala nevyslyšena. [FROM.GetLeader] odmítá nám cokoli dát, i když by to bylo v nejlepším zájmu [FROM.GetName]." # todo: NEW TRANSLATION
  iceland_events.14.a: "Budeme si muset vzít, co je naše, silou" # todo: NEW TRANSLATION
  iceland_events.15.t: "Kompenzace od [FROM.GetName]" # todo: NEW TRANSLATION
  iceland_events.15.desc: "Naštěstí [FROM.GetAdjective] vláda pochopila naše potřeby a schválila naši žádost o územní kompenzaci. [ROOT.GetName] bude muset zaplatit malou částku peněz, aby kompenzoval [FROM.GetName], ale to je nyní malá starost." # todo: NEW TRANSLATION
  iceland_events.15.a: "To je hrdý den pro [ROOT.GetName]" # todo: NEW TRANSLATION
  iceland_events.17.t: "[FROM.GetNameDefCap] vyhlašuje nezávislost" # todo: NEW TRANSLATION
  iceland_events.17.desc_kingdom: "[FROM.getAdjective] parlament prohlásil své vztahy k Christianovi X za zrušené a neplatné. Už nepovažují krále Dánska za krále Islandu. V důsledku toho oznámili, že Dánsko již nemá žádný vliv na politiku [FROM.GetName], ať už vnitřní nebo zahraniční." # todo: NEW TRANSLATION
  iceland_events.17.desc_generic: "[FROM.getAdjective] parlament prohlásil [FROM.GetNameDef] za plně nezávislý a suverénní stát bez vazeb na jiný národ. To znamená, že oficiálně přerušili vztahy s námi a jednostranně vyhlásili nezávislost." # todo: NEW TRANSLATION
  iceland_events.17.a: "Máme důležitější starosti" # todo: NEW TRANSLATION
  iceland_events.17.b: "Vyřešíme to, až bude čas" # todo: NEW TRANSLATION
  iceland_events.18.t: "[FROM.GetNameDefCap] přijímá [ROOT.GetAdjective] nezávislost" # todo: NEW TRANSLATION
  iceland_events.18.desc: "[FROM.GetNameDefCap] vydal pouze drobný protest. Neodvážili se dál provokovat [ROOT.GetAdjective] lid. [ROOT.GetNameDefCap] se nyní může soustředit na důležitější záležitosti než vztahy s [FROM.GetName]." # todo: NEW TRANSLATION
  iceland_events.18.a: "Dobře" # todo: NEW TRANSLATION
  iceland_events.19.t: "[FROM.GetNameDefCap] odmítá přijmout [ROOT.GetAdjective] nezávislost"" # todo: NEW TRANSLATION
  iceland_events.19.desc: "Válečníci z [FROM.GetNameDefCap] se rozhodli neratifikovat smlouvu udělující nám nezávislost, která jim byla předložena. Místo toho trvají na tom, že [ROOT.GetName] je součástí [FROM.GetName] a vyhrožují obnovením poddanství silou. Musíme se připravit na blížící se bouři." # todo: NEW TRANSLATION
  iceland_events.19.a: "Ať to zkusí" # todo: NEW TRANSLATION
  iceland_events.20.t: "[ICE.GetName] požaduje vrácení Grónska" # todo: NEW TRANSLATION
  iceland_events.20.desc: "[ICE.GetLeader] z [ICE.GetNameDef] oznámil vytvoření nového Severomořského impéria postaveného kolem hranic starých vikingů. Protože Grónsko bylo součástí tohoto území, nyní nás žádají, abychom jim ostrov laskavě předali." # todo: NEW TRANSLATION
  iceland_events.20.a: "Nestojí za to o to bojovat..." # todo: NEW TRANSLATION
  iceland_events.20.b: "Nemají právo to požadovat!" # todo: NEW TRANSLATION
  iceland_events.21.t: "Grónsko se vrátilo!" # todo: NEW TRANSLATION
  iceland_events.21.desc: "Slabí vůdci v [FROM.GetNameDef] se rozhodli dát nám kontrolu nad Grónskem, neboť se nechtěli vystavit riziku konfliktu s námi. To dokazuje, že naše chvíle slávy opět přišla!" # todo: NEW TRANSLATION
  iceland_events.21.a: "To jsou skvělé zprávy" # todo: NEW TRANSLATION
  iceland_events.22.t: "[FROM.GetName] zůstává vzdorovitý" # todo: NEW TRANSLATION
  iceland_events.22.desc: "[FROM.GetLeader] z [FROM.GetNameDef] zůstává neústupný v otázce Grónska. Zdá se, že chtějí zkázu našimi meči, a tak ji dostanou." # todo: NEW TRANSLATION
  iceland_events.22.a: "Zahynou!" # todo: NEW TRANSLATION
  iceland_events.23.t: "[ICE.GetName] prohlašuje sebe 'ochráncem Severomořské průplavní cesty'" # todo: NEW TRANSLATION
  iceland_events.23.desc: "[ICE.GetLeader] veřejně prohlásil [ICE.GetNameDef] za ochránce Severního moře. [ICE.GetNameDefCap] pak bude působit jako garant bezpečí obyvatel severomořských ostrovů.\nPodle [ICE.GetLeader], by tedy [ROOT.GetNameDef] měl postoupit naše severomořské majetky [ICE.GetName]." # todo: NEW TRANSLATION
  iceland_events.23.a: "Nestojí za to bojovat o pár pustých ostrovů" # todo: NEW TRANSLATION
  iceland_events.23.b: "To se nestane" # todo: NEW TRANSLATION
  iceland_events.24.t: "[FROM.GetNameDefCap] ustoupil našim požadavkům" # todo: NEW TRANSLATION
  iceland_events.24.desc: "Slabí vůdci v [FROM.GetNameDef] se rozhodli dát nám kontrolu nad jejich severomořskými majetky, protože nechtějí riskovat konflikt s námi." # todo: NEW TRANSLATION
  iceland_events.24.a: "Naše impérium roste" # todo: NEW TRANSLATION
  iceland_events.25.t: "[FROM.GetName] zůstává vzdorovitý" # todo: NEW TRANSLATION
  iceland_events.25.desc: "[FROM.GetLeader] z [FROM.GetNameDef] odmítá předat své severomořské majetky. Vysmívali se naší žádosti a řekli, že pokud ostrovy chceme, musíme je vzít silou." # todo: NEW TRANSLATION
  iceland_events.25.a: "Silou to bude" # todo: NEW TRANSLATION
  iceland_events.45.t: "Prezidentské volby" # todo: NEW TRANSLATION
  iceland_events.45.desc: "Nastal čas, aby [ROOT.GetName] shodila okovy monarchie. Cesta vpřed leží u lidu a prezidenta voleného lidmi." # todo: NEW TRANSLATION
  iceland_events.45.a: "$ICE_sveinn_bjornsson$ je ideální vůdce" # todo: NEW TRANSLATION
  iceland_events.45.b: "$ICE_hermann_jonasson$ v minulosti skvěle sloužil zemi" # todo: NEW TRANSLATION
  iceland_events.45.c: "$ICE_olafur_thors$ může vést do budoucnosti" # todo: NEW TRANSLATION
  iceland_events.45.d: "$ICE_brynjolfur_bjarnason$ je ten, kdo může sjednotit lid" # todo: NEW TRANSLATION
  iceland_events.45.e: "$ICE_gisli_sigurbjornsson$ přinese slávu [ROOT.GetName]" # todo: NEW TRANSLATION
  iceland_events.26.t: "Došel nám olej!" # todo: NEW TRANSLATION
  iceland_events.26.desc: "Naše pobřežní rafinerie oznámily, že v okolí [ICE.GetName] již nelze najít další ropu. Vyschly a neočekává se, že budou nalezeny další zásoby, takže pokračování těžby by bylo plýtvání zdroji." # todo: NEW TRANSLATION
  iceland_events.26.a: "No, je to, jak to je..." # todo: NEW TRANSLATION
  AAT_finland_motti.01.t: "[FROM.GetAdjective] taktika motti" # todo: NEW TRANSLATION
  AAT_finland_motti.01.desc: "[FROM.GetAdjective] jednotky začaly aplikovat motti taktiky v oblasti [FROM.FROM.GetName]. Motti taktika je devastující technika, při níž [FROM.GetAdjective] síly obklíčí nepřátelské jednotky a přeruší jejich zásobovací linky, čímž je vystaví útoku. To činí útočící síly vysoce zranitelnými vůči [FROM.GetAdjective] protiofenzívám, a musíme rychle zakročit, abychom jim zabránili získat převahu, pokud chceme postupovat do Finska." # todo: NEW TRANSLATION
  AAT_finland_motti.01.a: "Buďme ostražití a připraveni bojovat!" # todo: NEW TRANSLATION
  AAT_finland_motti_tt: "\n§ROd této chvíle bude moci [FROM.GetNameDefCap] připravovat motti taktiky i v jiných jádrových státech.§!" # todo: NEW TRANSLATION
  AAT_finland_national_defense.01.t: "[FROM.FROM.GetAdjective] zbrojní zásoby v [?FIN_state_with_weapon_caches.GetName]" # todo: NEW TRANSLATION
  AAT_finland_national_defense.01.desc: "Naše zpravodajské služby hlásí, že finské zbrojní zásoby jsou ukryty v [?FIN_state_with_weapon_caches.GetName]. Můžeme očekávat, že vojenské operace tam budou výrazně ztíženy a musíme dávat pozor na agresivnější taktiky místního odboje. V závislosti na jejich úspěšnosti můžeme podobná překvapení najít i v jiných finských státech." # todo: NEW TRANSLATION
  AAT_finland_national_defense.01.a: "Marné opatření." # todo: NEW TRANSLATION
  AAT_finland_national_defense.02.t: "[FIN.GetAdjective] zbrojní zásoby zabaveny v [FROM.FROM.GetName]" # todo: NEW TRANSLATION
  AAT_finland_national_defense.02.desc: "Po zprávách o skrytých finských zbrojních zásobách v [FROM.FROM.GetName] naše jednotky oblast prohledaly. Hlásí, že nalezly zásoby ukryté pod budovami, v padlých stromech a ponořené v jezerech v naolejovaných vaku. Zabavili jsme ty, které jsme našli, a nepředpokládáme, že by jich zůstalo mnoho." # todo: NEW TRANSLATION
  AAT_finland_national_defense.02.a: "Skvělé zprávy." # todo: NEW TRANSLATION
  AAT_finland_national_defense.02.b: "Dobré, ale už mě s dalšími hlášeními o zásobách neotravujte." # todo: NEW TRANSLATION
  AAT_finland_national_defense.03.t: "[FROM.GetName] zabral naše zbrojní zásoby v [FROM.FROM.FROM.GetName]" # todo: NEW TRANSLATION
  AAT_finland_national_defense.03.desc: "Navzdory našim snahám udržet zbrojní zásoby skryté před našimi nepřáteli v [FROM.FROM.GetName], nepřátelští agenti je našli a zabavili. Může jich ještě nějaké zbývat, ale ne v počtech, které by zde měly význam." # todo: NEW TRANSLATION
  AAT_finland_national_defense.03.a: "Hrozné zprávy!" # todo: NEW TRANSLATION
  AAT_finland_national_defense.03.b: "Máme důležitější záležitosti." # todo: NEW TRANSLATION
  FIN_weapon_caches_in_state_tt: "\nZbrojní zásoby budou odstraněny po §Y4 letech§! existence. \nOdemkne §Y$FIN_finnish_resistance_category$§! kategorii rozhodnutí, která nám umožní aktivně vyhledávat zbrojní zásoby a zabavovat je." # todo: NEW TRANSLATION
  FIN_weapon_caches_seized_event_spam_tt: "\nBudeme nadále dostávat události o zabavování zbrojních zásob v jiných finských státech." # todo: NEW TRANSLATION
  FIN_weapon_caches_seized_event_no_spam_tt: "\nNEbudeme dostávat další události o zabavování zbrojních zásob v jiných finských státech." # todo: NEW TRANSLATION
  FIN_weapon_caches_seized_by_enemy_event_spam_tt: "\nBudeme nadále dostávat události o tom, že nepřítel zabaven naše zbrojní zásoby v jiných státech." # todo: NEW TRANSLATION
  FIN_weapon_caches_seized_by_enemy_event_no_spam_tt: "\nNEbudeme dostávat další události o tom, že nepřítel zabaven naše zbrojní zásoby v jiných státech." # todo: NEW TRANSLATION
  AAT_finland_misc_events.01.t: "Evakuace dětí" # todo: NEW TRANSLATION
  AAT_finland_misc_events.01.desc: "Jak [GetFinnishWinterWarOrNot] zuří, [ROOT.GetAdjective] vláda učinila těžké rozhodnutí evakuovat děti naší země do [GetFinnishChildrenDestination] pro jejich bezpečí. Toto srdcervoucí rozhodnutí bylo učiněno vzhledem ke stálému nebezpečí, kterému civilisté v konfliktu čelí.\n\nEvakuace byla masivním podnikem, mnoho rodin bylo odloučeno a děti opustily své domovy. Musíme si ale pamatovat, že jejich bezpečí je nejvyšší prioritou a musíme udělat vše pro to, aby byly během té obtížné doby v bezpečí a dobře o ně postaráno.\n\nJak [ROOT.GetAdjective] lid čelí tvrdým realitám války, musíme držet naději a důvěru, že naše děti budou v bezpečí. Cesta před námi může být dlouhá a náročná, ale musíme vytrvat a stát pevně tváří v tvář nepřízni." # todo: NEW TRANSLATION
  FIN_winter_war_name: "Zimní válka s [SOV.GetNameDef]" # todo: NEW TRANSLATION
  FIN_normal_war: "válka" # todo: NEW TRANSLATION
  FIN_children_destination_sweden: "[SWE.GetNameDef]" # todo: NEW TRANSLATION
  FIN_children_destination_norway: "[NOR.GetNameDef]" # todo: NEW TRANSLATION
  FIN_children_destination_denmark: "[DEN.GetNameDef]" # todo: NEW TRANSLATION
  FIN_children_destination_iceland: "[ICE.GetNameDef]" # todo: NEW TRANSLATION
  FIN_children_destination_other: "neutrální země, které nejsou zapojeny do konfliktů" # todo: NEW TRANSLATION
  AAT_finland_misc_events.01.a: "Zachraňme naše děti!" # todo: NEW TRANSLATION
  AAT_finland_misc_events.02.t: "Zákaz tance" # todo: NEW TRANSLATION
  AAT_finland_misc_events.02.desc: "Jak válka pokračuje, roste počet politiků a dalších vedoucích osobností, kteří prosazují zákaz veřejného tance, aby tak projevili úctu a solidaritu se našimi vojáky bojujícími na frontách.\n\nTito lidé považují tanec v této době krize za nevhodný. Říkají, že je naší povinností podpořit vojáky a ukázat oddanost válečnému úsilí zdržováním se takových aktivit, přičemž porušení může být trestáno pokutami nebo dokonce vězením.\n\nMnozí jiní však takový návrh odmítají a poukazují, že v jiných zemích je tanec podporován, aby lidem pomohl snést tvrdé podmínky války." # todo: NEW TRANSLATION
  AAT_finland_misc_events.02.a: "Musíme všichni něco obětovat v těchto těžkých časech, i když je to směšné." # todo: NEW TRANSLATION
  AAT_finland_misc_events.02.b: "To je prostě hloupé." # todo: NEW TRANSLATION
  AAT_finland_misc_events.03.t: "[?FIN_faction_leader_recieving_resource_rights.GetAdjective] pomoc pro rozvojní projekt" # todo: NEW TRANSLATION
  AAT_finland_misc_events.03.desc: "Naše pokračující investice do infrastruktury těžby nerostů se vyplácejí stále vyššími výnosy, ale myslíme si, že bychom mohli získat ještě více, kdybychom přizvali zdroje a odborné znalosti větších států. \n\nMěli bychom oslovit [?FIN_faction_leader_recieving_resource_rights.GetNameDef] a nabídnout jim podíl na vytěžených materiálech, pokud nám pomohou investicemi a specialisty k posunu těžby na vyšší úroveň. Tím budeme oba těžit." # todo: NEW TRANSLATION
  AAT_finland_misc_events.03.a: "Ano, měli bychom požádat [?FIN_faction_leader_recieving_resource_rights.GetNameDef] o více investic." # todo: NEW TRANSLATION
  AAT_finland_misc_events.03.b: "Ne, nechceme být svázáni ostatními." # todo: NEW TRANSLATION
  AAT_finland_misc_events.03_tt: "Přidá +1" # todo: NEW TRANSLATION
  AAT_finland_misc_events.04.t: "Splacení pomoci" # todo: NEW TRANSLATION
  AAT_finland_misc_events.04.desc: "Po počátečních kolech našich jednání s [?FIN_faction_leader_recieving_resource_rights.GetNameDef] jednání nyní ustrnula na hlavním bodě zájmu, totiž co za to dostanou. [?FIN_faction_leader_recieving_resource_rights.GetNameDef] má na zřeteli několik podniků v naší zemi, musíme tedy navrhnout, které z nich získají.\n\nMůžeme nabídnout podíl na produkci dolu Makola v Oulu, poskytnout práva na nikl z dolů v Petsamu, přesměrovat část surovin do našich loděnic v Turku, nebo dát průzkumná práva v Lappi." # todo: NEW TRANSLATION
  AAT_finland_misc_events.04.a: "Přidělit práva na těžbu v [929.GetName]." # todo: NEW TRANSLATION
  AAT_finland_misc_events.04.b: "Poskytnout práva na těžbu niklu v [722.GetName]." # todo: NEW TRANSLATION
  AAT_finland_misc_events.04.c: "Přesměrovat práva na suroviny v [926.GetName]." # todo: NEW TRANSLATION
  AAT_finland_misc_events.04.d: "Udělít průzkumná práva v [148.GetName]." # todo: NEW TRANSLATION
  AAT_finland_misc_events.05.t: "[FROM.GetName] uděluje práva na zdroje" # todo: NEW TRANSLATION
  AAT_finland_misc_events.05.desc: "Dobrá zpráva! Několik průmyslových podniků kolektivně investovalo peníze, vybavení a odborníky do [FROM.GetAdjective] těžebního sektoru a tato investice se začala vyplácet udělením práv na těžbu. Byla nám přiřazena část produkce v [?FROM.FIN_state_given_for_resource_rights.GetName]. \n\nTyto nové zdroje bychom měli co nejdříve využít!" # todo: NEW TRANSLATION
  AAT_finland_misc_events.05.a: "Hezké" # todo: NEW TRANSLATION
  AAT_finland_misc_events.06.t: "[FROM.GetAdjective] vojenské investice v [ROOT.GetName]" # todo: NEW TRANSLATION
  AAT_finland_misc_events.06.desc: "[FROM.GetName] uznal, že čím více se rozvíjí region Nordu, tím více prospívají naši lidé a tím více všichni profitujeme ze společné obrany a obchodu. Prvním krokem k dosažení tohoto snu je zvýšit naše kolektivní obranné schopnosti k odražení cizích hrozeb. \n\nVýsledkem je, že [FROM.GetName] nám štědře nabídl průmyslové vybavení a specialisty k posílení naší vojenské výroby." # todo: NEW TRANSLATION
  AAT_finland_misc_events.06.a: "Dobrým způsobem to využijeme!" # todo: NEW TRANSLATION
  AAT_finland_misc_events.07.t: "[FROM.GetAdjective] program výzkumu a vývoje" # todo: NEW TRANSLATION
  AAT_finland_misc_events.07.desc: "Ve světě stále více zahaleném temnotou a nejistotou se [FROM.GetName] obrátil na maják vědy a technologie, aby nám ukázal cestu. Tato malá země v posledních letech učinila obrovské pokroky, stejně jako my. Navrhli, abychom sjednotili naši vědeckou komunitu a sdíleli to, co víme, pro dobro všech. Staňme se světlem osudu pro ostatní v temnotě." # todo: NEW TRANSLATION
  AAT_finland_misc_events.07.a: "Skvělá iniciativa!" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.01.t: "[FROM.GetAdjective] návrh na sjednocení" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.01.desc: "Byli jsme osloveni diplomaty z [FROM.GetNameDef], kteří v zájmu vzájemné ochrany a prosperity navrhují myšlenku národního sjednocení. To by znamenalo sloučení našich vlád, armád a průmyslů, abychom vytvořili silnější, jednotnou frontu proti těm, kteří by mohli ohrozit naši bezpečnost. \n\nMohlo by v tom být zlato, ale volba je nakonec na nás." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.01.a: "Zní to jako dobrý nápad!" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.01.b: "Můžeme spolupracovat a přitom zachovat autonomii." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.01.c: "Nezajímá nás to." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.02.t: "[FROM.GetAdjective]-[ROOT.GetAdjective] unie" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.02.desc: "Naši triumfální diplomaté se vrátili z mise do [FROM.capital.GetCapitalVictoryPointName] a přinesli zprávu, že [FROM.GetName] shledal nutné postavit jednotnou frontu proti našim společným rivalům a že náš návrh unie byl přijat. \n\nVládní úředníci už míří do naší metropole, aby zařídili hladkou integraci nových území." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.02.a: "Společně jsme silnější!" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.03.t: "[FROM.GetName] vstupuje do [ROOT.GetFactionName]" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.03.desc: "Naši diplomaté se vrátili z mise do [FROM.GetName] a i když bylo uznáno, že je potřeba jednoty, nechtěli vzdát veškerou suverenitu. Jednání původně probíhala dobře, ale s ohledem na historické boje [FROM.GetName] za nezávislost [GetDiplomacyDescriptionNiceNotNice] \n\nMísto unie se rozhodli připojit k naší frakci jako nezávislý stát." # todo: NEW TRANSLATION
  FIN_not_nice_desc: "je zřejmé, že se z chyb nepoučili." # todo: NEW TRANSLATION
  FIN_nice_desc: "jejich zdrženlivost je pochopitelná." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.03.a: "Stačí to..." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.04.t: "[FROM.GetName] odmítá náš návrh" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.04.desc: "Naši diplomaté se vrátili z mise do [FROM.GetName], ale zdá se, že nedokázali přesvědčit [FROM.GetAdjective] vládu o smyslu stání spolu. Málokteré důvody byly uvedeny a naši úředníci zůstali přemýšlet, jaké to bude mít důsledky. \n\nMožná bychom měli začít posilovat vlastní obranu, pokud by jejich záměry byly nechutné, nebo hledat jiné prostředky, jak zajistit jejich... spolupráci." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.04.a: "Budeme respektovat jejich rozhodnutí." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.04.b: "Zvolili si svůj osud." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.05.t: "[FROM.GetAdjective] petice za zachování Sámů" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.05.desc: "Zdá se, že [FROM.GetName] vzal na sebe úlohu chránit svobodu a kulturu Sámského lidu, domorodé komunity severní Evropy. \n\n[FROM.GetNameDefCap] nás žáda, abychom jim postoupili území tradičně obývané Sámy, aby je mohli lépe chránit jako jednotný lid." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.05.a: "Oběť pro ušlechtilou věc!" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.05.b: "[FROM.GetAdjective] vedení zbláznělo." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.06.t: "[FROM.GetAdjective] postoupení sámských území" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.06.desc: "Výborné zprávy! [FROM.GetNameDefCap] souhlasil svěřit historické domovy Sámského lidu do naší péče. Nyní je na nás, abychom chránili a pečovali o obyvatele těchto zemí. Už máme gratulační dopisy od vůdců Sámského lidu, které potvrzují jejich naději, že budeme i nadále s respektem zacházet s jejich kulturou a zvyky." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.06.a: "Lid chválí rozhodnutí [FROM.GetLeader]" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.07.t: "[FROM.GetName] odmítá naši petici" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.07.desc: "Imperialisté z [From.GetNameDef] odmítli naši osvícenou petici sjednotit země Sámského lidu. Ve své oficiální odpovědi uvádějí obavy o naši schopnost zachovat kulturu a důstojnost místního obyvatelstva, ale chápeme, že skutečnou motivací je jen zvětšit jejich stát." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.07.a: "S tím nic neuděláme." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.07.b: "Musíme pečovat o Sámský lid!" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.08.t: "[FROM.GetAdjective] tlak na kontrolu toku železné rudy" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.08.desc: "[FROM.GetNameDefCap] nás tlačí ohledně výroby železné rudy. Mají obavy z narůstajícího globálního napětí a považují se za nejschopnější vojenskou moc v Nordu. Proto požádali o kontrolu nad severními státy bohatými na zdroje, aby je mohli chránit a zároveň využít tyto zdroje pro válečné úsilí." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.08.a: "Nemáme prostředky se jejich požadavkům postavit." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.08.b: "Budeme bránit [ROOT.GetAdjective] suverenitu nad těmito územími." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.09.t: "[FROM.GetName] ustupuje požadovanému území" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.09.desc: "Máme vítané zprávy, že [From.GetName] se moudře rozhodl převést nám přímou kontrolu nad jejich bohatými státy. Naše armáda se připravuje na nasazení do regionu a naši průmysloví vůdci plánují, jak nejlépe začlenit dodané suroviny do naší výroby." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.09.a: "Vedení [FROM.GetAdjective] udělalo to nejlepší pro svůj lid." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.10.t: "[FROM.GetName] odmítá naše požadavky" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.10.desc: "Bohužel se zdá, že [FROM.GetAdjective] vůdce, [FROM.GetLeader], je příliš krátkozraký a nezajímá ho obcházení žraloků, kteří se snaží sebrat bohatství Skandinávie. Dostali jsme jasnou odpověď od [FROM.GetLeader.GetHerHis], že naše jednotky mají zůstat na naší straně hranice a varují proti dalšímu tlaku. \n\nNaše vlastní cíle zůstávají nezměněny, a bez ohledu na jejich proklamace stále potřebujeme ty suroviny pro zajištění naší bezpečnosti a bezpečí všech v oblasti." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.10.a: "Jsou tak omezení, že nevidí svou hrobovou chybu." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.10.b: "Budeme muset násilím převzít kontrolu, mobilizujte jednotky!" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.11.t: "[FROM.GetAdjective] návrh integrace Koly a Karélie" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.11.desc: "Mladý [FIN.GetAdjective] národ má své lidi roztroušené v mnoha státech. S cílem sjednotit více finského lidu nás požádali o integraci Východní Karelie a poloostrova Kola do [FIN.GetAdjective] národa." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.11.a: "Ustoupíme [ROOT.GetAdjective] území pro tuto ušlechtilou věc." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.11.b: "[ROOT.GetAdjective] území zůstane [ROOT.GetAdjective]!" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.12.t: "[FROM.GetName] přijímá naše územní požadavky" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.12.desc: "Velký [FROM.GetLeader] souhlasil s naším návrhem na sjednocení s východními Karelany a jako takový předal své území v regionu nám. Velký [FROM.GetAdjective] lid je dobrým přítelem Finů!" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.12.a: "[FROM.GetLeader] udělal to nejlepší pro Kolský a Karelský lid." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.13.t: "[FROM.GetLeader] odmítá naše požadavky" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.13.desc: "[FROM.GetLeader] oznámil, že své východokarelské území nám nepředá a tvrdí, že naše požadavky nic nepřinesou a pouze přivedou zkázu [FROM.GetAdjective] lidu v oblasti." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.13.a: "V tuto chvíli nemůžeme [FROM.GetLeader] provokovat..." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.13.b: "Ten blázen za to zaplatí!" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.14.t: "[FROM.GetAdjective] požadavky na integraci [ROOT.GetName]" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.14.desc: "Náš nadvládce [FIN.GetNameDef] požaduje, abychom se plně integrovali do jejich národa. Tvrdí, že baltská území patří jim a že náš regionalismus nakonec destabilizuje jejich říši." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.14.a: "Pokud to říkají..." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.14.b: "Kdo si myslí, že jsou?" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.15.t: "[FROM.GetName] se stává součástí [ROOT.GetNameDef]" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.15.desc: "[FROM.GetAdjective] vláda souhlasila s naším návrhem integrovat se do našeho státu a začala přepracovávat své zákony tak, aby fungovala jako autonomní region, namísto jako nezávislý stát." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.15.a: "Inteligentní volba" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.16.t: "[FROM.GetAdjective] vedení odmítá naše požadavky" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.16.desc: "[FROM.GetAdjective] vláda prohlásila, že naše nové návrhy zasahují do dřívějších dohod mezi našimi národy, a odvolávají se na mezinárodní právo, když tvrdí, že naše nové myšlenky sjednocení jsou nelegální a nespravedlivé." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.16.a: "Budeme respektovat jejich rozhodnutí" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.16.b: "Ošidili sami sebe!" # todo: NEW TRANSLATION
  AAT_finland_diplomacy_nordic: "Nordické" # todo: NEW TRANSLATION
  AAT_finland_diplomacy_baltic: "Baltské" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.17.t: "[FROM.GetAdjective] požadavky na [GetBalticOrNordic] území" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.17.desc: "[FIN.GetNameDefCap] požádal, abychom jim předali všechna území, která držíme v tradičních [GetBalticOrNordic] zemích, jako součást jejich nové agendy vytvořit větší [FIN.GetAdjective] federaci národů." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.17.a: "Ať tak bude" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.17.b: "Jejich hlavy rostou příliš" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.18.t: "[FROM.GetName] předává [GetBalticOrNordic] území" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.18.desc: "[FROM.GetLeader] moudře souhlasil podat nám svá [GetBalticOrNordic] území, protože necítí, že by stálo za to zpochybňovat naše nároky. Naše armáda se připravuje oblast ozbrojeně zajišťovat a průmysloví vůdci plánují, jak nejlépe začlenit dodané suroviny." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.18.a: "Udělali správnou volbu" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.19.t: "[FROM.GetAdjective] vláda odmítá naše požadavky" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.19.desc: "[FROM.GetLeader] odmítl převést své [GetBalticOrNordic] území a tvrdí, že nemáme silnější nárok než kdokoli jiný. Jak reagovat na toto potupné rozhodnutí?" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.19.a: "S tím nic nenaděláme" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.19.b: "Dejte jim vědět, že přicházíme" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.20.t: "[FROM.GetAdjective] návrh na Finno-[ROOT.GetAdjective] pakt" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.20.desc: "[FIN.GetLeader] nás požádal podepsat pakt o neútočení a věčném míru mezi našimi národy. Tento návrh je součástí nového směru [FIN.GetAdjective] vlády směřující ke smíru se sousedy a opětovnému navázání vztahů s námi." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.20.a: "Z toho nemůže vzniknout škoda" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.20.b: "Nevědí, co pro ně chystáme" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.21.t: "[FROM.GetName] souhlasí podepsat Finno-[FROM.GetAdjective] pakt" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.21.desc: "Velký [FROM.GetLeader] z [FROM.GetNameDef] slíbil pracovat na trvalém a dlouhodobém míru mezi našimi národy. Skutečně jsou dobrými přáteli [FIN.GetAdjective] lidí." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.21.a: "Čeká nás jasnější budoucnost" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.22.t: "[FROM.GetLeader] odmítá náš návrh na Finno-[FROM.GetAdjective] pakt" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.22.desc: "Nedůvěryhodný [FROM.GetLeader] prohlásil, že nám nemůže zajistit mír mezi našimi národy, zjevně plánuje nějaký útok proti nám, na který bychom se měli připravit." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.22.a: "Jak se odvážil!" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.23.t: "[FROM.GetNameDefCap] žádá ochranu proti [SOV.GetNameDef]" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.23.desc: "[FROM.GetLeader] z [FROM.GetNameDef] nás požádal, abychom jim pomohli v obraně proti možné agresi ze strany [SOV.GetNameDef]. Tvrdí, že si jsou vědomi, že mohou být brzy napadeni, a že jsme jejich jedinou nadějí na přežití." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.23.a: "Přesadíme je pod naše křídla" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.23.b: "A proč bychom to měli dělat?" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.24.t: "[FROM.GetAdjective] vláda slibuje chránit [ROOT.GetNameDef]" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.24.desc: "[FROM.GetAdjective] vláda přijala naši žádost a slíbila nás chránit v případě jakékoliv agrese od [SOV.GetAdjective]. Můžeme konečně vydechnout s úlevou." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.24.a: "Naši zachránci" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.25.t: "[FROM.GetNameDef] odmítá naši žádost o ochranu" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.25.desc: "[FROM.GetAdjective] vláda zamítla naši žádost o ochranu před [SOV.GetAdjective]. Vzhledem k nastalé hrozbě musíme připravit obranu co nejstatečněji." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.25.a: "Osud nás opustil!" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.26.t: "[FROM.GetName] žádá o [ROOT.GetAdjective] ochranu" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.26.desc: "[FIN.GetLeader] z [FIN.GetNameDef] žádá ochranu před [SOV.GetNameDef], který znovu začal očichávat své sousedy. Výměnou za ochranu nabízí práva k různým [FIN.GetAdjective] přírodním zdrojům." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.26.a: "Přispějeme jim na pomoc!" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.26.b: "Není to náš problém." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.27.t: "[FROM.GetNameDefCap] nám poskytne ochranu" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.27.desc: "[GER.GetNameDefCap] přijal náš návrh vyměnit zdroje za ochranu a slíbil, že nám pomůže, pokud dojde k válce. Náš lid může konečně vydechnout." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.27.a: "Postojíme spolu!" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.28.t: "[ROOT.GetName] se nemůže spolehnout na [FROM.GetAdjective] ochranu" # todo: NEW TRANSLATION
  AAT_finland_diplomacy.28.desc: "Zrádný [GER.GetLeader] z [GER.GetNameDef] odmítl naši nabídku vyměnit zdroje za ochranu a tím nám osudově zhatil budoucnost. Uvidíme, jak mu jeho sobecká povaha pomůže." # todo: NEW TRANSLATION
  AAT_finland_diplomacy.28.a: "Jsme tedy sami!" # todo: NEW TRANSLATION
  AAT_finland_winter_war.02.t: "[ROOT.GetAdjective] mírové požadavky" # todo: NEW TRANSLATION
  AAT_finland_winter_war.02.desc: "Přinášíme radostné zprávy z fronty! Naše síly nedávno dobily obléhané město [195.GetName] a podařilo se nám zajistit město. S tímto rozhodujícím úderem proti [SOV.GetNameDef] jsme v silné pozici zahájit mírová jednání. \n\nJedním z vytyčených cílů invaze [SOV.GetAdjective] bylo zvětšit bezpečnostní zónu kolem [195.GetName] a nyní, když v tom zcela selhali a dokonce město ztratili, domníváme se, že budou mít hlad po ukončení konfliktu. \n\nJe na nás, kdy začít jednání; můžeme boj pokračovat a pokusit se získat víc, nebo rychle usilovat o bílý mír." # todo: NEW TRANSLATION
  AAT_finland_winter_war.02.a: "Možná je čas na mír..." # todo: NEW TRANSLATION
  AAT_finland_winter_war.03.t: "[FROM.GetAdjective] mírové požadavky" # todo: NEW TRANSLATION
  AAT_finland_winter_war.03.desc: "Právě jsme obdrželi zprávu od našich nepřátel v [FROM.GetNameDef]. Nabídli nám podmínky bílého míru, podle kterých naše síly okamžitě přestanou jakoukoli ofenzívu a stáhnou se na naši stranu hranice. Co se týče území, zdá se, že [FROM.GetNameDef] je spokojen vidět své hranice navrácené do předválečného stavu, bez zisků na kterékoli straně. \n\nS ohledem na naše nedávné ztráty nejsme si jisti, jak naši populace podpoří pokračování boje. Můžeme je krátkodobě přesvědčit o nadcházejícím vítězství, ale pokud se věci budou dál zhoršovat, může narůstat nespokojenost." # todo: NEW TRANSLATION
  AAT_finland_winter_war.03.a: "Nemáme jinou volbu než přiznat porážku..." # todo: NEW TRANSLATION
  AAT_finland_winter_war.03.b: "Obrátíme příliv války!" # todo: NEW TRANSLATION
  AAT_finland_winter_war.04.t: "[FROM.GetNameDefCap] přijímá naše mírové požadavky" # todo: NEW TRANSLATION
  AAT_finland_winter_war.04.desc: "Přijali mírovou dohodu! Na ulicích propukly spontánní oslavy, jak se šíří zpráva o našem vítězství. [FROM.GetAdjective] jednotky už začaly stahovat své síly z našeho území, vracejíce se zarmouceně domů. \n\nToto je jistě den, který se zapíše do historie našeho národa, ale nesmíme polevit v ostražitosti, neboť stále je mnoho nebezpečí." # todo: NEW TRANSLATION
  AAT_finland_winter_war.04.a: "Lépe, ať si nás už nezkouší." # todo: NEW TRANSLATION
  AAT_finland_winter_war.05.t: "[FROM.GetNameDefCap] odmítá naše mírové požadavky" # todo: NEW TRANSLATION
  AAT_finland_winter_war.05.desc: "Ti blázni v [FROM.GetNameDef] odmítli naši milostivou nabídku míru. Jejich bláhové tvrzení je, že nedávné ztráty jsou krátkodobé a brzy je překonají. Víme, že je to lživé zakrývání, ale pravda brzy vyjde najevo. \n\nNaši vojáci dál zůstávají v poli, jejich duch vysoký, vědomi si, že bojují za spravedlivou věc a připraveni na další boje." # todo: NEW TRANSLATION
  AAT_finland_winter_war.05.a: "Hlupáci za to zaplatí!" # todo: NEW TRANSLATION
  AAT_finland_winter_war.06.t: "[FROM.GetAdjective] územní požadavky pro mír" # todo: NEW TRANSLATION
  AAT_finland_winter_war.06.desc: "Právě jsme obdrželi požadavek na kapitulaci od našich [FROM.GetAdjective] rivalů. Jako součást podmínek pro mír požadují, abychom předali několik území v oblasti Karelien-Kola a aby jsme se z těchto zemí co nejdříve stáhli." # todo: NEW TRANSLATION
  AAT_finland_winter_war.06.a: "Nemáme jinou volbu než přiznat porážku..." # todo: NEW TRANSLATION
  AAT_finland_winter_war.06.b: "Jak se odvážili!?" # todo: NEW TRANSLATION
  AAT_finland_winter_war.07.desc: "Přijali mírovou dohodu! Na ulicích propukly spontánní oslavy, jak se šíří zpráva o našem vítězství. [FROM.GetAdjective] jednotky už začaly stahovat své síly z našeho území, vracejíce se zarmouceně domů. \n\nTento den bude pyšným okamžikem našeho národa, neboť nejen jsme porazili vetřelce, ale porazili jsme je natolik, že jsme získali i území!" # todo: NEW TRANSLATION
  AAT_finland_winter_war.07.a: "Doufejme, že se poučili." # todo: NEW TRANSLATION
  AAT_finland_winter_war.08.desc: "Ti blázni v [FROM.GetNameDef] odmítli naši nabídku milosti. Jejich stále zoufalá vláda se drží iluze, že zvítězí, a obávají se, že pokud pravda o stavu války vyjde najevo, budou čelit povstáním a možná revoluci. \n\nNaši vojáci zůstávají na svých postech, jejich duch vysoký, jistí, že pokračují v spravedlivém boji a připravují se na další střety, s přesvědčením, že vítězství je blízko." # todo: NEW TRANSLATION
  AAT_finland_winter_war.08.a: "Hlupáci za to zaplatí!" # todo: NEW TRANSLATION
  FIN_winter_war_push_back_tt: "\nOdražení [SOV.GetAdjective] a obsazení §Y[195.GetName]§! nám umožní požadovat mírová jednání. \nKontrola také §Y[213.GetName]§!, §Y[215.GetName]§! nebo §Y[216.GetName]§! nám umožní požadovat tato území jako teritoriální ústupky od [SOV.GetNameDef]." # todo: NEW TRANSLATION
  AAT_finland_continuation_war.01.t: "[FROM.GetAdjective] návrh na pokračovací válku" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.01.desc: "Členové vládnoucího kruhu [FROM.GetName] nás oslovili ohledně možnosti vojenské spolupráce proti [SOV.GetAdjective] hrozbě na východě. Jejich návrh by umožnil rozmístit vojenské prostředky v [FROM.GetName] pod podmínkou, že budeme chránit své hranice navzájem a spolupracovat při jakýchkoli agresivních vstupech do [SOV.GetAdjective] území." # todo: NEW TRANSLATION
  AAT_finland_continuation_war.01.a: "Jistě, jen aby o tom nezůstaly žádné záznamy!" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.01.b: "[FROM.GetAdjective] záležitosti nás nezajímají." # todo: NEW TRANSLATION
  AAT_finland_continuation_war.02.t: "Finno-[FROM.GetAdjective] pakt pro pokračovací válku" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.02.desc: "[FROM.GetLeader] dal souhlas s naší vojenskou kooperací proti [SOV.GetNameDef]. Důstojníci z našich ozbrojených sil jsou nyní zváni do [FROM.Capital.GetCapitalVictoryPointName], aby zahájili koordinaci spojených sil." # todo: NEW TRANSLATION
  AAT_finland_continuation_war.02.a: "Ujistěte se, že po tom nezůstane žádný záznam!" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.03.t: "[FROM.GetName] odmítá náš návrh" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.03.desc: "[FROM.GetLeader] pošetile odmítl naši nabídku vojenské kooperace. Může to být tím, že [FROM.GetAdjective] nechtějí riskovat křehké dohody se [SOV.GetAdjective], nebo to může znamenat, že mají jiné plány. Každopádně bychom měli být opatrní a hledat jinou pomoc." # todo: NEW TRANSLATION
  AAT_finland_continuation_war.03.a: "Zmařená příležitost..." # todo: NEW TRANSLATION
  AAT_finland_continuation_war.04.t: "Pakt pro pokračovací válku zničen" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.04.desc: "Naše plány spolupráce s [FROM.GetNameDef] proti [SOV.GetNameDef] jsou zmařeny kvůli nedávnému posunu v geopolitice. Vložili jsme spoustu práce do plánů společných operací, ale teď se musíme vrátit ke kreslícímu prknu jak vojensky, tak v zahraniční politice." # todo: NEW TRANSLATION
  AAT_finland_continuation_war.04.a: "Překonáme to." # todo: NEW TRANSLATION
  AAT_finland_continuation_war.05.t: "[FROM.GetAdjective] pokračovací válka" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.05.desc: "Realizace naší diplomatické manévrování a vojenského plánování se blíží, protože [FROM.GetNameDef] konečně zahájil Operaci Barbarossa, invazi na [SOV.GetNameDef]. Nyní musíme dodržet naše závazky a provést naši část plánu." # todo: NEW TRANSLATION
  AAT_finland_continuation_war.05.a: "Přidejme se k našim bratřím zbraní!" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.06.desc: "[FROM.GetAdjective] vojenské síly zahájily plánované útoky proti [SOV.GetAdjective] pozicím v souladu s naší dohodou o spolupráci. S pomocí našich [FROM.GetAdjective] bratří v zbrani jsme rozšířili sovětskou frontu na větší délku, tlačíce je k bodu zlomu." # todo: NEW TRANSLATION
  AAT_finland_continuation_war.06.a: "Vítězství je na dosah!" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.07.desc: "Navzdory našim diplomatickým snahám odrazit [GER.GetNameDef] a [FIN.GetNameDef] od spolupráce, naše snahy se zdají marné. Finská armáda zahájila útoky proti nám bok po boku s [GER.GetAdjective], s takovou přesností, že musely být koordinovány dlouhou dobu." # todo: NEW TRANSLATION
  AAT_finland_continuation_war.07.a: "Jen jak jsme se obávali..." # todo: NEW TRANSLATION
  FIN_pact_for_continuation_war_ger_tt: "Efekty když [ROOT.GetFlag]§Y[ROOT.GetNameDef]§! vyhlásí válku [SOV.GetFlag]§Y[SOV.GetNameDef]§!:\n[FROM.GetFlag]§Y[FROM.GetNameDefCap]§! se připojí do války proti [SOV.GetFlag]§Y[SOV.GetNameDef]§!." # todo: NEW TRANSLATION
  FIN_pact_for_continuation_war_fin_tt: "Efekty když [FROM.GetFlag]§Y[FROM.GetNameDef]§! vyhlásí válku [SOV.GetFlag]§Y[SOV.GetNameDef]§!:\n[ROOT.GetFlag]§Y[ROOT.GetNameDefCap]§! se připojí do války proti [SOV.GetFlag]§Y[SOV.GetNameDef]§!." # todo: NEW TRANSLATION
  FIN_pact_for_continuation_war_broken_tt: "Pakt byl porušen a země již nejsou povinny si navzájem pomáhat v případě války proti [SOV.GetFlag]§Y[SOV.GetNameDef]§!." # todo: NEW TRANSLATION
  FIN_the_lone_wolf_no_faction_tt: "[FIN.GetFlag]§Y[FIN.GetNameDefCap]§! §Rnemůže vstoupit do žádné frakce, dokud má Národní duch§! '§Y$FIN_the_lone_wolf$§!'." # todo: NEW TRANSLATION
  AAT_finland_continuation_war.08.t: "[FROM.GetName] žádá příměří" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.08.desc: "Vláda v [FROM.GetNameDef] nás žádá o podepsání příměří, slibujíce další územní ústupky a přerušení veškerých vztahů s [GER.GetNameDef]. Přijetím toho se můžeme plně soustředit na [GER.GetAdjective] a zatlačit je zpět." # todo: NEW TRANSLATION
  AAT_finland_continuation_war.08.a: "Podepišme moskevské příměří" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.08.b: "Tentokrát jim to nepůjde lehce!" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.09.t: "[FROM.GetNameDef] odmítá naši nabídku míru" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.09.desc: "[FROM.GetLeader] z [FROM.GetNameDef] naši žádost odmítl a oznámil, že se máme připravit na zkázu, protože [FROM.GetAdjective] armáda nám to nedá zadarmo. To je nejhorší scénář!" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.09.a: "Fáty nás opustily!" # todo: NEW TRANSLATION
  aat_news.120.t: "Moskevské příměří podepsáno" # todo: NEW TRANSLATION
  aat_news.120.desc: "Po dlouhých rozhovorech představitelé [FIN.GetLeader] a [SOV.GetLeader] podepsali příměří, které vstupuje v platnost okamžitě. Toto příměří však pro [FIN.GetNameDef] přichází za těžkou cenu a spojenci [FIN.GetName] se jistě cítí zrazeni." # todo: NEW TRANSLATION
  aat_news.120.a: "Muselo to být uděláno..." # todo: NEW TRANSLATION
  aat_news.120.b: "Díky, že jste neprokázali bratrství zbraní!" # todo: NEW TRANSLATION
  aat_news.120.c: "Jdeme vpřed!" # todo: NEW TRANSLATION
  aat_news.120.d: "Zajímavý vývoj, to jistě..." # todo: NEW TRANSLATION
  AAT_finland_continuation_war.10.t: "Sověti nás nutí vyhostit [GER.GetAdjective] jednotky" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.10.desc: "Sovětské zástupce si všimli naší neochoty plnit příměří, které jasně uvádí, že musíme vyhostit jakékoliv cizí jednotky, a [GER.GetAdjective] se snaží získat zbraně a zdroje, které jsme povinni odevzdat. Jak naše jednotky začaly snažit se odzbrojit [GER.GetAdjective] vojáky, vypukly potyčky a [GER.GetAdjective] pálí naši zem a dobývají naše vody." # todo: NEW TRANSLATION
  AAT_finland_continuation_war.10.a: "Musíme vyhovět, jinak hrozí opět válka" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.11.t: "Naši důstojníci zahajují odsun z [FIN.GetNameDef]" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.11.desc: "Navzdory počátečnímu zdráhání [FIN.GetAdjective] vláda pod tlakem Sovětů začala vyhánět a odzbrojovat naše vojáky. Naši důstojníci zahájili plány připravené pro tento scénář, ale váhají, kterou verzi provést. Co je důležitější?" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.11.a: "Zahájit operaci Birke" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.11.b: "Zahájit operaci Nordlicht" # todo: NEW TRANSLATION
  aat_news.121.t: "Laplandská válka" # todo: NEW TRANSLATION
  aat_news.121.desc: "Mezi [FIN.GetNameDef] a [GER.GetNameDef] vypukly boje, když se finské síly pokusily odzbrojit a vyhostit [GER.GetAdjective] vojska z jejich země v souladu s dohodou podepsanou během Moskevského příměří. Není pochyb o tom, že [GER.GetAdjective] budou z [FIN.GetName] vyhnáni, ale za jakou cenu, to je otázka." # todo: NEW TRANSLATION
  aat_news.121.a: "Vyženeme je!" # todo: NEW TRANSLATION
  aat_news.121.b: "Ukázali svou pravou tvář..." # todo: NEW TRANSLATION
  aat_news.121.c: "Další naše vítězství" # todo: NEW TRANSLATION
  aat_news.121.d: "Příliv se obrátil" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.12.t: "[FIN.GetName] chce přejít na druhou stranu" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.12.desc: "[FIN.GetLeader] z [FIN.GetNameDef] nás dnes oslovil s velmi zajímavou nabídkou. Tvrdí, že [FIN.GetName] je připraven ukončit válku s [SOV.GetNameDef], protože se válka obrací stále více proti nim, a nabídl nám, že se vylodíme v Petsamu a připojí se k naší frakci, abychom společně vyhnali [GER.GetAdjective]s ze Skandinávie a jednou provždy ukončili [GER.GetNameDef]. Co na to říkáme?" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.12.a: "Dobře, snad s tím [SOV.GetLeader] nebude mít problém..." # todo: NEW TRANSLATION
  AAT_finland_continuation_war.12.b: "Nemůžeme si dovolit provokovat Sovětský svaz!" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.13.t: "[FIN.GetName] se snaží přidat k Spojencům" # todo: NEW TRANSLATION
  AAT_finland_continuation_war.13.desc: "Zdá se, že zástupci [FIN.GetNameDef] oslovili hlavní demokracie a pokoušejí se vykroutit z války proti nám tím, že nabízejí, že se k nim přidají v jejich válce proti [GER.GetAdjective]s, v podstatě přecházejí na druhou stranu. Pokud by Spojenci s tím souhlasili, moc bychom nenadělali než si stěžovat a požadovat odškodnění, ale alespoň by to znamenalo nového partnera v našem boji proti fašismu." # todo: NEW TRANSLATION
  AAT_finland_continuation_war.13.a: "Dobře, ale jen pokud dostaneme odškodnění" # todo: NEW TRANSLATION
  AAT_finland_political.01.t: "Hlasování o nedůvěře proti [ROOT.GetLeader]" # todo: NEW TRANSLATION
  AAT_finland_political.01.desc: "Dnes došlo k tomu, že [Root.GetLeader] nezajistil hlasy, které by [ROOT.GetLeader.GetSheHe] potřeboval k přežití hlasování o nedůvěře, které proti [ROOT.GetLeader] bylo svoláno v eduskunta, [ROOT.GetAdjective] parlamentu. \n\nPřestože sloužil jako prezident od roku 1931 a těšil se rozsáhlé oblibě, [ROOT.GetLeader.GetHerHis] postavení bylo výrazně oslabeno odmítnutím zahrnout sociální demokraty do kabinetu, čímž porušil [ROOT.GetLeader.GetHerHis] sliby. Tento politický přešlap vyústil v tuto politickou krizi, jejíž obětí se nyní stal [ROOT.GetLeader.GetSheHe]." # todo: NEW TRANSLATION
  AAT_finland_political.01.a: "Kallio má co dělat!" # todo: NEW TRANSLATION
  AAT_finland_political.02.t: "Prezidentské období končí" # todo: NEW TRANSLATION
  AAT_finland_political.02.desc: "Dnes nastal den, kdy zkoušený [ROOT.GetLeader] musí znovu zajistit své místo v čele státu. \n\nPřestože sloužil jako prezident od roku 1931 a těšil se rozsáhlé oblibě, [ROOT.GetLeader.GetHerHis] postavení bylo výrazně oslabeno odmítnutím zahrnout sociální demokraty do kabinetu, čímž porušil [ROOT.GetLeader.GetHerHis] sliby. Tento politický přešlap vážně snížil [ROOT.GetLeader.GetHerHis] šance na znovuzvolení, a dnes se dozvíme, zda to stačí svrhnout [GetPoliticsDescriptionOldManPete]" # todo: NEW TRANSLATION
  FIN_reelection_old_man_pete: "Stařík Pete." # todo: NEW TRANSLATION
  FIN_reelection_other_leader: "[ROOT.GetLeader]." # todo: NEW TRANSLATION
  AAT_finland_political.02.a: "Svinhufvud si musí získat důvěru lidu." # todo: NEW TRANSLATION
  AAT_finland_political.02.b: "Jmenujte Kyostiho Kallia, má podporu středových a demokratických sil!" # todo: NEW TRANSLATION
  AAT_finland_political.03.desc: "Bohužel musíme čelit skutečnosti, že [ROOT.GetLeader] není vůbec v pořádku. [ROOT.GetLeader] již prodělal mrtvici, při níž se [ROOT.GetLeader.GetHerHis] pravá paže stala ochrnutou, a lékaři se obávají, že se [ROOT.GetLeader.GetHerHis] zdraví rychle zhorší, pokud [ROOT.GetLeader.GetSheHe] nebude okamžitě odvolán z úřadu. \n\nEduskunta, finský parlament, proto svolala nouzové zasedání, aby předložila návrh na vyslovení nedůvěry a odvolání prezidenta kvůli jeho zdraví. Premiér Risto Ryti již převzal řadu prezidentských povinností a je připraven úřad převzít." # todo: NEW TRANSLATION
  AAT_finland_political.03.a: "Jmenujte Risto Rytiho, už přebírá Kalliovy povinnosti!" # todo: NEW TRANSLATION
  AAT_finland_political.04.t: "Úmrtí [ROOT.GetLeader]" # todo: NEW TRANSLATION
  AAT_finland_political.04.desc: "Máme tragické zprávy, velmi milovaný prezident [ROOT.GetName], [ROOT.GetLeader], zemřel. [ROOT.GetLeader.GetSheHeCap] byl již delší dobu ve špatném stavu, neboť prodělal mrtvici, která ochrnula [ROOT.GetLeader.GetHerHis] pravou paži. \n\n[ROOT.GetLeader.GetSheHeCap] se vracel domů poté, co právě podal [ROOT.GetLeader.GetHerHis] rezignaci ze zdravotních důvodů, když [ROOT.GetLeader.GetSheHe] utrpěl smrtelný infarkt a zemřel tam na Hlavním nádraží v Helskini. Čestná stráž hrála vlasteneckou finskou pochodovou píseň Porilaisten marssi, aby se mu u jeho úřadu rozloučila v době jeho smrti." # todo: NEW TRANSLATION
  AAT_finland_political.04.a: "Ať odpočívá v pokoji!" # todo: NEW TRANSLATION
  AAT_finland_political.05.t: "Rezignace [ROOT.GetLeader]" # todo: NEW TRANSLATION
  AAT_finland_political.05.desc: "Dnes jsme obdrželi dopis o rezignaci od [ROOT.GetLeader]. V něm [ROOT.GetLeader.GetSheHe] uvedl, že existují trvalé obavy o [ROOT.GetLeader.GetHerHis] zdraví, a proto se [ROOT.GetLeader.GetSheHe] rozhodl učinit rozumné rozhodnutí a podat [ROOT.GetLeader.GetHerHis] rezignaci. \n\n[GetPoliticsDescriptionKallioWinterWar]" # todo: NEW TRANSLATION
  FIN_politics_kallio_winter_war: "[ROOT.GetLeader] není také žádný neznalec války, a [ROOT.GetLeader.GetSheHe] s obavami zvažoval rostoucí světové napětí. [ROOT.GetLeader.GetHerHis] varování byla veřejností brána vážně, protože [ROOT.GetLeader.GetSheHe] byl ten, kdo vedl naši zemi temnými hodinami Zimní války." # todo: NEW TRANSLATION
  FIN_politics_no_kallio_winter_war: "[ROOT.GetLeader.GetSheHeCap] také s obavami poukázal na rostoucí napětí ve světě a vyjádřil hluboké a upřímné přání bezpečí [ROOT.GetAdjective]ho lidu v těchto těžkých časech." # todo: NEW TRANSLATION
  AAT_finland_political.05.a: "$FIN_risto_ryti$ je další v pořadí!" # todo: NEW TRANSLATION
  AAT_finland_political.06.desc: "S jistým překvapením vláda právě obdržela dopis o rezignaci od [ROOT.GetLeader] s odvoláním na zdravotní důvody. Nicméně [ROOT.GetLeader.GetSheHe] působil jako vzor dobrého zdraví, takže někteří podezřívají, že za tím mohou být jiné motivace. \n\nPrezident byl zapleten v nedávném politickém skandálu, kdy se zjistilo, že [ROOT.GetLeader.GetSheHe] poslal osobní dopis [GER.GetLeader], v němž [ROOT.GetLeader.GetSheHe] prosil o vojenskou pomoc proti našim nepřátelům, skutečným i domnělým. \n\nNení divu, že některé národnostně orientované složky kabinetu odsoudily tento zjevný útok na naši suverenitu a mohly [ROOT.GetLeader.GetHerHim] přimět k rezignaci." # todo: NEW TRANSLATION
  AAT_finland_political.06.a: "Země už muže jako Ryti nepotřebuje." # todo: NEW TRANSLATION
  AAT_finland_political.07.t: "$FIN_carl_mannerheim$ jmenován prezidentem" # todo: NEW TRANSLATION
  AAT_finland_political.07.desc: "Protože je existence [ROOT.GetName] touto válkou ohrožena, musíme učinit těžké rozhodnutí a nahradit [ROOT.GetLeader] vojenskou vládou vedenou hrdinou [ROOT.GetAdjective] Války za svobodu, polním maršálem Carlem G. Mannerheimem. Potřebujeme jeho vojenské zkušenosti, pokud máme alespoň naději svrhnout jho vetřelce a zachránit naši vlast. \n\nMannerheim se novým povinnostem ujal s vervou a prohlásil: 'Tato válka není ničím jiným než pokračováním a závěrečným aktem naší Války za nezávislost. Bojujeme za naše domovy, naši víru a naši zemi.'" # todo: NEW TRANSLATION
  AAT_finland_political.07.a: "Mannerheim se postará o situaci." # todo: NEW TRANSLATION
  AAT_finland_political.08.t: "Mannerheim splnil své povinnosti" # todo: NEW TRANSLATION
  AAT_finland_political.08.desc: "S vděčností uznáváme zásluhy [ROOT.GetLeader], neboť je jisté, že bez [ROOT.GetLeader.GetHerHis] vedení bychom bouři nepřežili a náš národ by byl nyní ztracen. \n\nMusíme však učinit těžké rozhodnutí: máme požádat maršála, aby ve funkci pokračoval, nebo má opustit svůj post a přenechat vůli lidu a znovu zavést civilní vládu?" # todo: NEW TRANSLATION
  AAT_finland_political.08.a: "[ROOT.GetAdjective] lid vám děkuje za vaši službu, maršále barone Mannerheim!" # todo: NEW TRANSLATION
  AAT_finland_political.08.b: "Mannerheim je stále potřeba ve své funkci!" # todo: NEW TRANSLATION
  AAT_finland_political.09.desc: "S vděčností uznáváme zásluhy [ROOT.GetLeader], neboť je jisté, že bez [ROOT.GetLeader.GetHerHis] vedení bychom bouři nepřežili a náš národ by byl nyní ztracen. \n\nNicméně je nyní čas hledět za hranice války, na mír a obnovu, které musí následovat. Abychom řádně vyléčili rány a čelili budoucnosti, musíme obnovit civilní vládu." # todo: NEW TRANSLATION
  AAT_finland_political.09.a: "[ROOT.GetAdjective] lid vám děkuje za vaši službu, maršále barone Mannerheim!" # todo: NEW TRANSLATION
  AAT_finland_kinship_war.01.t: "[FROM.GetAdjective] agitátoři ve Východní Karelii" # todo: NEW TRANSLATION
  AAT_finland_kinship_war.01.desc: "Uprostřed rostoucího protisovětského sentimentu v Karelsku naši loajální občané vyjádřili obavy, že se blížíme opakování Heimosodat a Východokarelského povstání. Ať už je cílem nezávislé karelské území, sjednocení finských národů, prostý kmenismus nebo dokonce finské imperialistické sny, je jasné, že za tím stojí finská agitace." # todo: NEW TRANSLATION
  AAT_finland_kinship_war.01.a: "S povstalci se vypořádáme!" # todo: NEW TRANSLATION
  AAT_finland_kinship_war.02.t: "Povstání ve Východním Karelsku!" # todo: NEW TRANSLATION
  AAT_finland_kinship_war.02.desc: "Naše snahy o podněcování nespokojenosti proti [SOU.GetName] měly velký úspěch. 20 000 východokarelců uprchlo do Finska během Východokarelského povstání a v rámci Akademické karelské společnosti pilně pracovali na uchování vzpomínek na to, co ztratili. Heimosodat nebyly nikdy zapomenuty, ani zacházení Karelců ze strany sovětských orgánů. \n\nV důsledku toho lidé ve Východním Karelsku začali otevřeně mluvit o povstání proti svým utlačovatelům. Zbraně a zásoby do regionu proudily již delší dobu, ale nyní volají po návratu vysídlených a uchopení zbraní. \n\nOtázkou nyní je, připojí se [ROOT.GetName] znovu k jejich boji?" # todo: NEW TRANSLATION
  AAT_finland_kinship_war.02.a: "Plně podporujeme naše karelské bratry!" # todo: NEW TRANSLATION
  AAT_finland_kinship_war.02.b: "Povolíme finským agitátorům přecházet hranice." # todo: NEW TRANSLATION
  AAT_finland_kinship_war.03.desc: "První výstřely zazněly dnes ráno, když rebelové ve Východním Karelsku, vyprovokovaní k razantním činům [FIN.GetAdjective]mi prvky, zaútočili na vládní pozice. V oblasti se již delší dobu objevovaly problémy, protože sem byly pašovány zbraně od našeho nespolehlivého souseda, aby podpořily přítomné povstalecké frakce. [FIN.GetName] nikdy nebyl spokojen s Mírem v Tartu podepsaným v roce 1920 a od té doby podporuje povstalecké frakce ve Východním Karelsku. \n\nAž dosud to byla hranice jejich angažmá, avšak vypadá to, že se [FIN.GetName] konečně zapojuje přímo. Situace eskalovala, když [FIN.GetAdjective] síly přešly hranici, čímž konflikt rozšířily a přivedly naše dvě národy do stavu války." # todo: NEW TRANSLATION
  AAT_finland_kinship_war.03.a: "Nemají proti našim silám šanci!" # todo: NEW TRANSLATION
  AAT_finland_kinship_war.04.t: "Východokarelské povstání potlačeno!" # todo: NEW TRANSLATION
  AAT_finland_kinship_war.04.desc: "Po několik posledních měsíců [FROM.GetAdjective] síly sondovaly města ve Východním Karelsku a pokoušely se najít způsoby, jak destabilizovat region a vrhnout místní posádky do chaosu, avšak odpor bránících se [SOV.GetAdjective] jednotek byl příliš silný. \n\nMnoho finských agitátorů a východokarelsých povstalců bylo zatčeno, deportováno nebo donuceno uprchnout zpět do Finska dříve, než mohlo být plánované skutečné povstání. Lidé se bojí a to už není možné." # todo: NEW TRANSLATION
  AAT_finland_kinship_war.04.a: "Budeme muset osvobodit Východní Karelsko jinými prostředky." # todo: NEW TRANSLATION
  AAT_finland_kinship_war.05.desc: "Po několik posledních měsíců [FIN.GetAdjective] síly sondovaly města ve Východním Karelsku a snažily se najít způsoby, jak destabilizovat region a vrhnout naše místní posádky do chaosu, avšak statečný odpor bránících [SOV.Adjective] jednotek byl samozřejmě příliš silný. \n\nMnoho finských agitátorů a východokarelsých povstalců bylo zatčeno, deportováno nebo donuceno uprchnout zpět do Finska, než mohl být vyprovokován skutečný povstalecký výbuch. Lidé se radují, že se mír v regionu konečně obnovil!" # todo: NEW TRANSLATION
  AAT_finland_kinship_war.05.a: "Snad poslední Heimosodat, tentokrát napořád..." # todo: NEW TRANSLATION
  AAT_finland_kinship_war_dynamic_modifier_tt: "Dokud je státní modifikátor §Y$FIN_anti_soviet_sentiment$§! přítomen v §Y[215.GetName]§!, §Y[216.GetName]§!, §Y[146.GetName]§! nebo §Y[147.GetName]§!, může [FROM.GetNameDef] vyvolat karelské povstání." # todo: NEW TRANSLATION
  AAT_finland_kinship_war_rebellion_crushed_fin_tt: "§RPovstalci v Karelsku byli rozprášeni dříve, než mohlo být povstání zorganizováno§!." # todo: NEW TRANSLATION
  AAT_finland_kinship_war_rebellion_crushed_sov_tt: "§GPovstalci v Karelsku byli rozprášeni dříve, než mohlo být povstání zorganizováno§!." # todo: NEW TRANSLATION
  AAT_finland_kinship_war.06.t: "Druhé Heimosodat" # todo: NEW TRANSLATION
  AAT_finland_kinship_war.06.desc: "Jak se občanské instituce v Sovětském svazu rozkládají, mnoho místních nacionalistických vlád vyhlašuje nezávislost, přičemž [KAR.GetNameDef] je jedním z nich. Karelští irredentisté a militaristé prohlašují, že čelíme druhému Heimosodat, zatímco umírnění a socialisté tvrdí, že bychom se do sovětských záležitostí zapojovat neměli." # todo: NEW TRANSLATION
  AAT_finland_kinship_war.06.a: "Měli bychom jim poslat muže a materiál" # todo: NEW TRANSLATION
  AAT_finland_kinship_war.06.b: "Nesmíme budit spícího medvěda..." # todo: NEW TRANSLATION
  AAT_finland_the_white_death.1.t: "Naši odstřelovači se ukazují jako vysoce účinní" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.1.desc: "Dorazily zprávy, že naši odstřelovači jsou vysoce efektivní v boji proti nepřátelským silám vnikajícím do našich lesů. Je to dobrá příležitost pro válečnou propagandu, protože mezi nepřátelskými vojáky se objevuje pojem Bílá smrt, odkazující na nebezpečí, které představuje finská příroda a lid, a můžeme to připisovat určité osobě, abychom povzbuzovali populaci, pokud se taková osoba objeví." # todo: NEW TRANSLATION
  AAT_finland_the_white_death.1.a: "Výborně!" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.1.b: "Měli bychom dát lovcům více zbraní" # todo: NEW TRANSLATION
  FIN_our_snipers_will_be_more_deadly_tt: "Naši §YOdstřelovači§! budou smrtelnější" # todo: NEW TRANSLATION
  aat_news.105.t: "Bílá smrt" # todo: NEW TRANSLATION
  aat_news.105.desc: "Jak do [FIN.GetNameDef] dorazila válka, mnoho lovců, členů Suojeluskunta a střeleckých klubů vzalo zbraně, aby odrazili své utlačovatele. [FIN.GetAdjective] Sisu v nich proudí, když odrážejí nepřátelské útoky a využívají finskou přírodu ve svůj prospěch, což si nepřátelští vojáci začali nazývat Bílou smrtí." # todo: NEW TRANSLATION
  aat_news.105.a: "To je dobrá příležitost pro propagandu!" # todo: NEW TRANSLATION
  aat_news.105.b: "Smrt přišla vzít naše muže, ale nevzdáme se bez boje!" # todo: NEW TRANSLATION
  aat_news.105.c: "Oni opravdu umí bojovat" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.2.t: "[FIN.GetAdjective] odstřelovači vnášejí strach do srdcí našich vojáků" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.2.desc: "Naši vojáci hlásí, že celé kolony mužů byly překvapeny a rozstříleny v lesích [FIN.GetNameDef]. Začali mluvit o Bílé smrti, vtělení drsného chladu [FIN.GetNameDef] a smrtících střelcích [FIN.GetAdjective] armády. Pokud budeme chtít, můžeme vynaložit rozsáhlé úsilí, abychom se těchto překážek zbavili dříve, než způsobí ještě větší škody." # todo: NEW TRANSLATION
  AAT_finland_the_white_death.2.a: "Není třeba se jich obávat" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.2.b: "Zlikvidujte je!" # todo: NEW TRANSLATION
  FIN_we_will_be_more_likely_to_put_down_the_finnish_snipers_tt: "Budeme mít větší šanci ulovit §Yfinské odstřelovače§!" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.4.t: "Simo Häyhä uznán za Bílou smrt" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.4.desc: "Viipurský odstřelovač Simo Häyhä, kterému naši vojáci často přezdívají Taika-Ampuja, 'Kouzelný střelec', pro jeho impozantní střelecké schopnosti, je nyní považován také za Bílou smrt. Dosud nepřátelé tímto termínem označovali drsnost finské přírody a jejích obyvatel, a tisk tuto novou narrativu silně podporuje. Jaký by měl být náš oficiální postoj?" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.4.a: "Měli bychom šířit příběhy o tomto moderním finském hrdinovi" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.4.b: "Bílá smrt je ztělesněním Finska, ne nějaké osoby!" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.5.t: "Simo Häyhä uznán za Bílou smrt" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.6.t: "Simo Häyhä uznán za Bílou smrt" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.7.t: "Bílá smrt nás objímá!" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.7.desc: "Navzdory maximálnímu úsilí našich vojáků je Bílá smrt daleko od zajetí a terorizuje naše vojáky už týdny, přičemž naši důstojníci nemají nic, čím by se mohli pochlubit. Jak to pokračuje, naši vojáci váhají a jejich morálka prudce klesla..." # todo: NEW TRANSLATION
  AAT_finland_the_white_death.7.a: "To je špatné..." # todo: NEW TRANSLATION
  AAT_finland_the_white_death.8.t: "Přes těžké ztráty naše jednotky úspěšně zranily Bílou smrt" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.8.desc: "Přišly zprávy od našich důstojníků v [FIN.GetNameDef] o úspěšném zranění Bílé smrti. To ale přišlo za vysokou cenu, protože mnoho vojáků bylo zabito a další byli během akce zraněni. Přesto už bychom se s ním na bojišti neměli setkat." # todo: NEW TRANSLATION
  AAT_finland_the_white_death.8.a: "Zbavili jsme se otravného hmyzu!" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.9.t: "Navzdory těžkým ztrátám se našim jednotkám podařilo zabít Bílou smrt!" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.9.desc: "Přišly zprávy od našich důstojníků v [FIN.GetNameDef] o úspěšném zlikvidování [FIN.GetAdjective]ho odstřelovače známého jako Bílá smrt. Přes těžké ztráty byl velký nepřítel [ROOT.GetNameDef] odstraněn a naši vojáci si nyní mohou oddechnout." # todo: NEW TRANSLATION
  AAT_finland_the_white_death.9.a: "Ve skutečnosti proti nám neměl šanci" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.10.t: "Bílá smrt pokračuje v pronásledování své kořisti" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.10.desc: "Přes četná blízká setkání a falešná tvrzení je Simo Häyhä nezraněn a bude pokračovat v boji tak dlouho, jak bude třeba. Bílá smrt sužuje naše nepřátele!" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.10.a: "Poznají pravý strach" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.11.t: "Simo Häyhä byl zraněn a odvezen z bojiště" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.11.desc: "Došly zprávy, že Häyhä byl těžce zraněn poté, co ho výbušný projektil vystřelený nepřátelským vojákem zasáhl do levé dolní čelisti, a zatímco se zdálo, že je mrtvý, dostal se zpět do blízkého polního tábora, aby oznámil, že je naživu. Nemůže však dále bojovat, ale zasloužil si věčnou vděčnost [FIN.GetAdjective] lidu." # todo: NEW TRANSLATION
  AAT_finland_the_white_death.11.a: "Nicméně je to pravý finský hrdina!" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.12.t: "Simo Häyhä byl zabit!" # todo: NEW TRANSLATION
  AAT_finland_the_white_death.12.desc: "Přišly zprávy, že Häyhä byl zabit poté, co byl zasažen výbušným projektilm vystřeleným nepřátelským vojákem během boje. Jeho tělo bylo úspěšně vyzvednuto našimi jägery a převezeno do hlavního města. Bude navždy vzpomínán vděčným lidem [FIN.GetNameDef]." # todo: NEW TRANSLATION
  AAT_finland_the_white_death.12.a: "Ať jeho duše odpočívá mezi dávnými hrdiny." # todo: NEW TRANSLATION
  generic_could_lead_to_tt: "Může vést k:" # todo: NEW TRANSLATION
  aat_news.100.t: "[FIN.GetAdjective] pokračovací válka" # todo: NEW TRANSLATION
  aat_news.100.desc: "Po porážce v předchozí válce proti [SOV.GetAdjective] vládě se [FIN.GetAdjective] lid mobilizoval a je připraven znovu získat ztracená území a osvobodit [FIN.GetAdjective] a [KAR.GetAdjective] lid z cizího útlaku, jako duchovní nástupce [FIN.GetAdjective] války za nezávislost a Heimosodat." # todo: NEW TRANSLATION
  aat_news.100.a: "Vpřed za konečným vítězstvím!" # todo: NEW TRANSLATION
  aat_news.100.b: "A nebudou bojovat sami!" # todo: NEW TRANSLATION
  aat_news.100.c: "Fini za to zaplatí!" # todo: NEW TRANSLATION
  aat_news.100.d: "Je to další loutka [GER.GetLeader], která vstupuje do války..." # todo: NEW TRANSLATION
  aat_news.101.t: "Remilitarizace ostrovů Åland" # todo: NEW TRANSLATION
  aat_news.101.desc: "Po ruské porážce v krymské válce byly ostrovy Åland demilitarizovány a jejich obyvatelé osvobozeni od jakéhokoli branného povolání. Ačkoliv byl tento status mnohokrát napadán, stále jej dodržují mnohé velmoci. Nyní však, po [FIN.GetAdjective] operaci Kilpapurjehdus, byly ostrovy opět remilitarizovány." # todo: NEW TRANSLATION
  aat_news.101.a: "Je to nezbytné opatření." # todo: NEW TRANSLATION
  aat_news.101.b: "To nás nezastaví." # todo: NEW TRANSLATION
  aat_news.101.c: "Mír nemůže trvat..." # todo: NEW TRANSLATION
  aat_news.666.t: "Obnovení Říše Severního moře" # todo: NEW TRANSLATION
  aat_news.666.desc: "Po znovudobytí všech zemí, které kdysi vládl Cnut Veliký, [From.GetOldAdjective] vláda začala zvyšovat kroky směřující k integraci nově dobytých území. V důsledku toho, ve snaze sjednotit lid za státem, došlo k nárůstu pan-nacionalistické propagandy s jasnou podporou vlády.\n\n[FROM.GetOldAdjective] vůdce [FROM.GetLeader] prohlásil, že sjednocená království [DEN.GetOldNameDef], [NOR.GetOldNameDef] a Anglie se od nynějška budou nazývat '[From.GetNameDef]'." # todo: NEW TRANSLATION
  aat_news.666.a: "Zdá se, že Vikingové se vrátili" # todo: NEW TRANSLATION
  aat_news.777.t: "Vznik Baltského impéria" # todo: NEW TRANSLATION
  aat_news.777.desc: "Poté, co se podařilo dobyt většinu oblastí Baltského moře, [From.GetOldAdjective] vláda začala zvyšovat kroky směřující k integraci nově dobytých území. V důsledku toho, ve snaze sjednotit lid ke státu, došlo k nárůstu pan-nacionalistické propagandy s jasnou podporou vlády.\n\n[FROM.GetOldAdjective] vůdce [FROM.GetLeader] pronesl projev o tom, jak [FROM.GetOldNameDef] dokázala to, co žádná jiná země, a podrobila si Baltské moře. [FROM.GetSheHeCap] zakončil projev vyhlášením vzniku '[From.GetNameDef]'." # todo: NEW TRANSLATION
  aat_news.777.a: "Dominium maris baltici" # todo: NEW TRANSLATION
  AAT_britain_narvik.1.t: "[SWE.GetAdjective] doly byly vyhozeny do vzduchu" # todo: NEW TRANSLATION
  AAT_britain_narvik.1.desc: "Úspěšně jsme vyhodili do povětří [SWE.GetAdjective] doly a připravili [GER.GetNameDef] o jeden z jeho nejdůležitějších dovozních zdrojů. Ačkoliv byla hlavní motivací této akce nabídka pomoci [FIN.GetName], opravdu nebylo životaschopné zapojit se do přímého konfliktu se [SOV.GetNameDef], a přesto jsme zasadili velkou ránu našemu hlavnímu protivníkovi. V [SWE.GetNameDefCap] nemáme skutečného nepřítele a nyní musíme rozhodnout, co dál." # todo: NEW TRANSLATION
  AAT_britain_narvik.1.a: "Stáhnout se" # todo: NEW TRANSLATION
  AAT_britain_narvik.1.b: "Pokračovat v kampani" # todo: NEW TRANSLATION
  AAT_britain_narvik.2.t: "[ENG.GetName] napadá [SWE.GetName]" # todo: NEW TRANSLATION
  AAT_britain_narvik.2.desc: "[ENG.GetAdjective] jednotky překročily hranici do [SWE.GetName]. Bez vyhlášení války a mlčení ze strany [ENG.GetAdjective] vlády jsou [SWE.GetAdjective] úřady pobouřené nedostatkem úcty k [SWE.GetAdjective] suverenitě. Nejpravděpodobnějším vysvětlením je, že [ENG.GetAdjective] jednotky se snaží dostat k dolům v Gällivare a Kiruně, aby je sabotovaly a zabránily tak přepravě vysoce kvalitní rudy do [GER.GeName], což by bylo obrovskou ránou pro jak [GER.GetAdjective], tak [SWE.GetAdjective] ekonomiky a velkým porušením neutrality [SWE.GetAdjective]." # todo: NEW TRANSLATION
  AAT_britain_narvik.2.a: "Jak si to dovolí?!" # todo: NEW TRANSLATION
  AAT_britain_narvik.2.b: "Musíme je zastavit!" # todo: NEW TRANSLATION
  AAT_britain_narvik.3.t: "[ENG.GetName] sabotovalo [SWE.GetAdjective] doly" # todo: NEW TRANSLATION
  AAT_britain_narvik.3.desc: "[ENG.GetNameDefCap] nelegálně vtrhlo do [SWE.GetName] a zničilo jejich doly bez řádného vyhlášení války. Klíčové ekonomické odvětví [SWE.GetAdjective] ekonomiky je nyní jen zničený lom. [ENG.GetAdjective] vláda obhájila své kroky tím, že obchodování s [GER.GetNameDefCap] je stejně špatné jako stranění jim, a že jsou akce ospravedlnitelné, ale zdá se, že i domácí obyvatelstvo se necítí pohodlně s výkladem své vlády." # todo: NEW TRANSLATION
  AAT_britain_narvik.3.a: "To je pobuřující" # todo: NEW TRANSLATION
  AAT_britain_narvik.4.t: "[ENG.GetName] se stáhl z [SWE.GetName]" # todo: NEW TRANSLATION
  AAT_britain_narvik.4.desc: "[ENG.GetName] oznámil, že jeho strategický cíl v [SWE.GetName] byl dosažen a stahuje své jednotky. Jeho vláda také zopakovala, že nemá skutečnou nepřátelství vůči [SWE.GetAdjective] státu a že jeho akce v [SWE.GetName] byly čistě v zájmu obrany demokracie. Jak [GER.GetAdjective], tak [SWE.GetAdjective] velvyslanectví zaslala dopis s protestem; [GER.GetAdjective] strana tvrdí, že [ENG.GetName] porušil neutralitu a napadl cizí zemi v oblasti bojů, a [SWE.GetAdjective] kritizuje [ENG.GetAdjective] vládu za to, že navzdory svým vznešeným cílům pomoci [FIN.GetName] je nyní jasné, že šlo o špatně připravený trik k dosažení vlastních cílů za cenu životů [SWE.GetAdjective]." # todo: NEW TRANSLATION
  AAT_britain_narvik.4.a: "To je stále pobuřující" # todo: NEW TRANSLATION
  AAT_MIO_events.2.t: "$CZE_skoda_works$ investice" # todo: NEW TRANSLATION
  AAT_MIO_events.2.desc: "Průmyslníci v $CZE_skoda_works$ touží po investicích, nicméně si můžeme dovolit vložit peníze pouze do jedné z tří odvětví v rámci společnosti. Tím jim umožníme upřednostnit vývoj buď lodí, tanků nebo dělostřelecké techniky." # todo: NEW TRANSLATION
  AAT_MIO_events.2.a: "Investujte do $CZE_skoda_shipyards$" # todo: NEW TRANSLATION
  AAT_MIO_events.2.b: "Investujte do $CZE_skoda_armor$" # todo: NEW TRANSLATION
  AAT_MIO_events.2.c: "Investujte do $CZE_skoda_artillery$" # todo: NEW TRANSLATION
  AAT_USA_events.01.t: "[USA.GetNameDefCap] okupuje Grónsko" # todo: NEW TRANSLATION
  AAT_USA_events.01.desc: "[USA.GetAdjective] vláda vedená [USA.GetLeader] oznámila okupaci Grónska jako součást svého nového Grónského hlídkování, operace k zajištění Severní Ameriky před cizími hrozbami a vlivy, jak bylo rozhodnuto na Havaneské konferenci. Slibují, že nám ho vrátí, jakmile se světová situace uklidní." # todo: NEW TRANSLATION
  AAT_USA_events.01.a: "Alespoň to později vrátí..." # todo: NEW TRANSLATION
  AAT_USA_events.02.t: "[FROM.GetNameDefCap] okupuje Faerské ostrovy" # todo: NEW TRANSLATION
  AAT_USA_events.02.desc: "[FROM.GetAdjective] tvrdí, že v tuto chvíli okupují Faerské ostrovy, které patří Dánsku a jsou strategicky velmi důležitým bodem. Tvrdí, že Faerské ostrovy ochrání před všemi hrůzami války a usadí se tam výhodně po moři a vzduchem až do chvíle, kdy budou ostrovy předány zpět nám, osvobozeny od špinavého područí, do něhož je vrhla agrese [?DEN.DEN_overlord_nation.GetAdjective]." # todo: NEW TRANSLATION
  AAT_USA_events.02.a: "Alespoň naši lidé jsou v bezpečných rukách..." # todo: NEW TRANSLATION
  AAT_USA_events.03.t: "[FROM.GetName] chce zpět Faerské ostrovy" # todo: NEW TRANSLATION
  AAT_USA_events.03.desc: "[FROM.GetLeader] z [FROM.GetNameDef] vyzývá, abychom dodrželi naše sliby a jak bylo dohodnuto, vrátili jim Faerské ostrovy, nyní, když jsou opět svobodné od útlaku." # todo: NEW TRANSLATION
  AAT_USA_events.03.a: "Slibovali jsme" # todo: NEW TRANSLATION
  AAT_USA_events.03.b: "Vlastně jsme si to rozmysleli" # todo: NEW TRANSLATION
  AAT_USA_events.04.t: "[FROM.GetName] odmítá naše požadavky" # todo: NEW TRANSLATION
  AAT_USA_events.04.desc: "[FROM.GetLeader] z [FROM.GetNameDef] zamítl naši žádost s tvrzením, že po referendu lid Faerských ostrovů jasně chce být pod vládou nikoho jiného než [FROM.getAdjective]." # todo: NEW TRANSLATION
  AAT_USA_events.04.a: "Tak či tak je nemůžeme napadnout" # todo: NEW TRANSLATION
  AAT_USA_events.04.b: "Zaslouží si to" # todo: NEW TRANSLATION
  AAT_USA_events.05.t: "[FROM.GetName] chce zpět Grónsko" # todo: NEW TRANSLATION
  AAT_USA_events.05.desc: "[FROM.GetLeader] z [FROM.GetNameDef] vyzývá, abychom dodrželi naše sliby a jak bylo dohodnuto vrátili jim Grónsko, nyní, když jsou opět osvobozeni od útlaku." # todo: NEW TRANSLATION
  AAT_USA_events.06.t: "[FROM.GetName] odmítá naše požadavky" # todo: NEW TRANSLATION
  AAT_USA_events.06.desc: "[FROM.GetLeader] z [FROM.GetNameDef] odmítl naši žádost s tvrzením, že po referendu lid Grónska jasně chce být pod vládou nikoho jiného než [FROM.getAdjective]." # todo: NEW TRANSLATION
  AAT_USA_events.07.t: "[FROM.GetName] vrací území" # todo: NEW TRANSLATION
  AAT_USA_events.07.desc: "[FROM.GetLeader] z [FROM.GetNameDef] dodržel svůj slib a souhlasil s navrácením území, která držel v péči, nyní, když jsme opět osvobozeni od útlaku." # todo: NEW TRANSLATION
  AAT_USA_events.07.a: "Grónsko se vrací!" # todo: NEW TRANSLATION
  AAT_USA_events.07.b: "Faerské ostrovy se vracejí!" # todo: NEW TRANSLATION
  AAT_USA_events.08.t: "[FROM.GetNameDefCap] požaduje dánské území" # todo: NEW TRANSLATION
  AAT_USA_events.08.desc: "[FROM.GetLeader] z [FROM.GetNameDef] nám zaslal žádost o vrácení nezákonně drženého dánského území jeho právoplatnému vlastníkovi." # todo: NEW TRANSLATION
  AAT_USA_events.08.a: "Vraťte území" # todo: NEW TRANSLATION
  AAT_USA_events.08.b: "Nevzdáme se utlačovatelům!" # todo: NEW TRANSLATION
  AAT_USA_events.09.t: "[FROM.GetNameDefCap] vrací dánské území" # todo: NEW TRANSLATION
  AAT_USA_events.09.desc: "[FROM.GetLeader] z [FROM.GetNameDef] souhlasil s navrácením nezákonně drženého dánského území jeho právoplatnému vlastníkovi." # todo: NEW TRANSLATION
  AAT_USA_events.09.a: "Jak ohleduplné" # todo: NEW TRANSLATION
