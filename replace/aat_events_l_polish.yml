l_polish:
  AAT_nordic_shared.1.t: "[FROM.GetName] nás zve, abychom se připojili k nim v [NORDIC_get_alliance_name]"
  AAT_nordic_shared.1.desc_faction_member: "[FROM.GetNameDefCap] chce naši alianci posunout o krok dál a prohloubit naši spolupráci na několika úrovních. Vnímají vojenskou alianci jen jako první krok k silnějšímu, sjednocenému severskému regionu."
  AAT_nordic_shared.1.desc_non_faction_member: "[FROM.GetNameDefCap] pracuje na vytvoření hluboké spolupráce mezi všemi severskými zeměmi. Chtějí založit [NORDIC_get_alliance_name] a zvou nás, abychom se k nim připojili."
  AAT_nordic_shared.1.a: "Blízká spolupráce je cesta, jak přežít"
  AAT_nordic_shared.1.b: "To zní příliš nebezpečně, raději zůstaňme mimo to"
  AAT_nordic_shared.2.t: "[FROM.GetName] navrhuje vzájemné záruky"
  AAT_nordic_shared.2.desc: "Jak napětí po světě roste, nalézt důvěryhodné spojence je čím dál těžší. [FROM.GetAdjective] vláda navrhuje, abychom jako severské země oznámili světu, že [ROOT.GetName] a [FROM.GetName] budou stát při sobě v případě cizí invaze. Jsme připraveni se k tomu zavázat?"
  AAT_nordic_shared.2.a: "Může to být jediný způsob, jak přežít"
  AAT_nordic_shared.2.b: "Nedovolíme, aby nás s sebou strhli"
  AAT_nordic_shared.3.t: "[FROM.GetName] bude stát při nás!"
  AAT_nordic_shared.3.desc: "Dostali jsme zprávu, že [FROM.GetAdjective] lidé budou bránit nezávislost [ROOT.GetName] a my zase jejich. Severské země musí být připraveny odrazit jakoukoli invazi jako sjednocená síla místo rozdrobených malých národů."
  AAT_nordic_shared.3.a: "Skvělé zprávy!"
  AAT_nordic_shared.4.t: "Náš návrh byl [FROM.GetName] odmítnut"
  AAT_nordic_shared.4.desc: "Století společné historie se zdají mít jen malý vliv při přesvědčování [FROM.GetAdjective] vlády, že naši lidé musí stát spolu proti cizím tyranům. Doufejme, že si to rozmyslí dříve, než bude pozdě."
  AAT_nordic_shared.4.a: "Smutná zpráva"
  AAT_nordic_cooperation.1.t: "[FROM.GetName] překročil hranici!"
  AAT_nordic_cooperation.1.desc: "Znovu a znovu jsme našli důkazy, že naše válečné snahy proti [?GLOBAL.NORDIC_country_to_defend.GetName] byly narušovány tajnou podporou [FROM.GetName]. \n\nMožná je čas je naučit lekci o tom, jak vést válku opravdovým způsobem."
  AAT_nordic_cooperation.1.a: "Nemůžeme si dovolit eskalovat tento konflikt dál"
  AAT_nordic_cooperation.1.b: "Jsou už mrtví, jen si to ještě neuvědomují"
  AAT_nordic_cooperation.2.t: "[FROM.GetName] nabízí pomoc v našem válečném úsilí"
  AAT_nordic_cooperation.2.desc: "V těchto zrádných časech jsou vazby, které nás pojí s [FROM.GetNonIdeologyName], neocenitelné. Poskytli podporu v našem boji proti [?NORDIC_attacker.GetName] a nyní jsou ochotni jít ještě dál a nabídli se, že se zapojí do obrany naší země. Koneckonců, útok na jednoho z nás je útokem na všechny severské národy."
  AAT_nordic_cooperation.2.a: "Jejich pomoc je vítaná"
  AAT_nordic_cooperation.2.b: "Dokážeme to zvládnout i bez nich"
  AAT_nordic_cooperation.3.t: "[FROM.GetName] odmítl naši nabídku pomoci"
  AAT_nordic_cooperation.3.desc: "Navzdory našim nejlepším úmyslům se zdá, že [FROM.GetNameDef] naši pomoc nepotřebuje ani nechce. Jen oni vědí důvody za tímto záhadným rozhodnutím.\n\nTo ovšem neznamená, že musíme přestat podporovat je jinými způsoby, nebo že [?FROM.NORDIC_attacker.GetName] může považovat nás za bojující stranu."
  AAT_nordic_cooperation.3.a: "No nic..."
  AAT_nordic_cooperation.4.t: "[FROM.GetName] žádá investice"
  AAT_nordic_cooperation.4.desc: "Naši severscí sousedé poslali delegaci žádat o investice pro další rozvoj své ekonomiky. To bude rozhodně prospěšné i pro náš průmyslový sektor, ale měli bychom si být jisti, že podporujeme přátelského souseda a ne potenciálního nepřítele."
  AAT_nordic_cooperation.4.a: "To prospívá oběma stranám"
  AAT_nordic_cooperation.4.b: "Nestojí to za riziko"
  AAT_nordic_cooperation.5.t: "Investice od [FROM.GetName] se nyní hrnou"
  AAT_nordic_cooperation.5.desc: "Naši severscí sousedé laskavě přijali naše pozvání investovat do naší ekonomiky. Budou samozřejmě odměněni za svou důvěru, ale důležitější je, že to umožní naší ekonomice růst rychlejším tempem."
  AAT_nordic_cooperation.5.a: "Skvělé zprávy!"
  AAT_nordic_cooperation.6.t: "[FROM.GetName] odmítl investovat do naší ekonomiky"
  AAT_nordic_cooperation.6.desc: "Navzdory našim nejlepším snahám jsme nedokázali přesvědčit naše severské sousedy, aby nám pomohli dále rozvíjet naši ekonomiku. Můžeme to zkusit znovu s jinou zemí."
  AAT_nordic_cooperation.6.a: "Nešťastné"
  AAT_nordic_cooperation.7.t: "[FROM.GetName] žádá ekonomickou spolupráci"
  AAT_nordic_cooperation.7.desc: "Naši severscí sousedé chtějí najít společnou řeč, aby uzavřeli vzájemně prospěšnou smlouvu o ekonomické a průmyslové spolupráci. Pokud bude provedena správně, jak doufáme, to posílí obě naše ekonomiky stejně, protože do ní vstoupíme jako sobě rovní.\n\nVzhledem k historickému kolísání nepřátelství v našem regionu musíme být ostražití, abychom nepomohli budoucímu rivalovi, kdyby se nám později obrátil zády."
  AAT_nordic_cooperation.7.a: "Férová dohoda"
  AAT_nordic_cooperation.7.b: "Zní podezřele"
  AAT_nordic_cooperation.8.t: "[FROM.GetName] přijal naši dohodu"
  AAT_nordic_cooperation.8.desc: "Právě jsme byli informováni, že [FROM.GetAdjective] vůdci souhlasili s naší vzájemně prospěšnou dohodou. To bude skvělé pro obě ekonomiky a pro severský region obecně."
  AAT_nordic_cooperation.8.a: "Skvělé zprávy!"
  AAT_nordic_cooperation.9.t: "Vůdci [FROM.GetName] odmítli naši nabídku!"
  AAT_nordic_cooperation.9.desc: "Navzdory našemu cíli jednat s [FROM.GetName] jako s rovným partnerem nám oznámili, že o takové ujednání nemají zájem.\n\nMůžeme to zkusit znovu, nebo s jiným severským partnerem."
  AAT_nordic_cooperation.9.a: "Zarážející"
  NORDIC_escalation_hostility_reason: "Pomohl bránící se severské zemi"
  AAT_norway.1.t: "Fašisté obtěžovali [NOR_lev_trotsky.GetName]"
  AAT_norway.1.desc: "Zatímco kontroverzní revolucionář byl na rybářském výletě se svým hostitelem, fašisté spjatí s stranou Nasjonal Samling vnikli do domu Konrada Knudsena, kde [NOR_lev_trotsky.GetName] pobýval.\n\nLupiče zajímaly jakékoli kompromitující důkazy, které by ospravedlnily odstranění vyhnaného komunisty, ale naštěstí je ze pozemku vystrašila Knudsenova dcera Hjørdis dříve, než stihli získat cokoli významného."
  AAT_norway.1.a: "Musí být držen mimo potíže"
  AAT_norway.1.b: "Můžeme zabít dvě mouchy jednou ranou"
  AAT_norway.1.c: "Dejte tomuto muži úřad!"
  AAT_norway.1.d: "Jeho minulost je dost důkazů, dejte ho do vězení!"
  AAT_norway.2.t: "Trotskij v domácím vězení na farmě"
  AAT_norway.2.desc: "S odkazem na porušení dohody o vyhýbání se politické účasti během svého exilu a na chatrné důkazy, které fašističtí lupiči ukradli, jsme poslali [NOR_lev_trotsky.GetName] na farmu v Hurumu, kde bude pod dohledem policie a izolován od vnějšího světa.\n\nJe to přísný trest, ale tlaky ze strany [SOU.GetNameDef] a místních fašistů z něj dělají nebezpečný bod shromažďování."
  AAT_norway.2.a: "Je to to nejlepší, co teď můžeme udělat"
  AAT_norway.3.t: "Obecné potlačování nesouhlasu [ROOT.GetLeader.GetName]"
  AAT_norway.3.desc: "Po potyčce ve vilce Knudsenových se ukázalo, že politická situace je kvůli komunistům a fašistům, kteří jsou proti sobě, plná nebezpečí.\n\nHádkám a politickému chaosu musí být učiněno za dost. Přítomnost Trotskyje hrozí přivodit hněv [SOU.GetNameDef] na nás a zároveň Nasjonal Samling je jisté, že při první příležitosti předá zemi [FGR.GetLeader], takže jejich vliv musí být za každou cenu omezen.\n\nNejlepší cestou je poslat ho do Mexika, kde [MEX.GetLeader] souhlasil, že ho přijme."
  AAT_norway.3.a: "To je pro přežití Norska"
  AAT_norway.4.t: "Trotskij se připojuje k naší vládě!"
  AAT_norway.4.desc: "Řešení problémů [NOR.GetAdjective] lidu bylo přímo před našima očima. [NOR_lev_trotsky.GetName] není jen jeden z největších marxistických spisovatelů své doby, ale také charizmatický revolucionář a vynikající generál.\n\nTo jistě vyvolá určité napětí s [SOV.GetNameDef], ale bude to stát za to. Jeho zkušenosti mohou dovést náš mladý národ a dělníky Skandinávie k velikosti."
  AAT_norway.4.a: "Exil jednoho národa je spása jiného!"
  AAT_norway.5.t: "[NOR_lev_trotsky.GetName] uvězněn!"
  AAT_norway.5.desc: "Jiní mohou nazývat důkazy nalezené v Knudsenově domě chatrnými, nevýznamnými nebo dokonce vyrobenými, a mohou mít pravdu, ale snad v určitém okamžiku soud uzná jejich platnost. Kromě toho zůstává fakt, že si v tuto chvíli nemůžeme dovolit přivodit odcizení Nasjonal Samling. Proto byl [NOR_lev_trotsky.GetName] okamžitě uvězněn.\n\nKdy nebo jak se znovu objeví na světle je nyní málo důležité, ale postaráme se, aby měl alespoň lepší ubytování než měl na Sibiři."
  AAT_norway.5.a: "Museli jsme ho zastavit"
  AAT_norway.6.t: "Osud Trotského"
  AAT_norway.6.desc: "Uplynula nějaká doba od té doby, co jsme [NOR_lev_trotsky.GetName] umístili do domácího vězení na farmě v Hurumu, a zdá se, že to není dobré pro žádnou zúčastněnou stranu. [SOV.GetNameDefCap] žádá o vydání, Nasjonal Samling chce jeho popravu a všichni ostatní, kteří nejsou zapálení trockisté, ho chtějí z domu pryč. Musíme rozhodnout, co uděláme s tímto potížistou v exilu.\n\nMexický prezident [MEX.GetLeader] nabídl, že ho přijme, pokud se rozhodneme nechat ho v exilu, ale můžeme ho také poslat k [SOV.GetLeader] jako gesto přátelství."
  AAT_norway.6.a: "Bude si užívat mexického slunce"
  AAT_norway.6.b: "Stalin nás za to bude milovat!"
  AAT_norway.7.t: "[get_trotsky_lastname] přijíždí do Mexika"
  AAT_norway.7.desc: "Po letech trpkého exilu v naší zemi dorazil problémový exulant [NOR_lev_trotsky] do Mexika, kde ho přivítají malíři Frida Kahlo a Diego Rivera, kteří si s ním a jeho ženou jistě padnou do noty.\n\nPravděpodobně bude v bezpečí před [SOV.GetNameDef], ale hlavně už pro nás nebude problémem."
  AAT_norway.7.a: "Konečně trochu klidu"
  AAT_norway.8.t: "[get_trotsky_lastname] přijíždí do Moskvy"
  AAT_norway.8.desc_SOV: "O tomto okamžiku jsme snili léta. Zrádná zmije [SOV_lev_trotsky.GetName] je v naší moci. Zaplatí za své zločiny proti Revoluci, a především proti souputníkovi Stalinovi. Ani v očích proletariátu není mezi nimi vlastně rozdíl."
  AAT_norway.8.desc_NOR: "Problémový bývalý revolucionář [NOR_lev_trotsky.GetName] byl odvezen do Moskvy, kde bude zadržen nebo snad popraven podle rozmarů [SOU.GetLeader].\n\nBez ohledu na jeho osud si konečně můžeme opláchnout ruce od této táhlé záležitosti, s přidaným bonusem, že se přiblížíme k [SOU.GetNameDef]."
  AAT_norway.8.a: "Konečně!"
  AAT_norway.8.b: "Dobrá rána!"
  AAT_norway.9.t: "Kabinet Nygaardsvolda"
  AAT_norway.9.desc: "Vláda vedená Labour Party s [NOR_johan_nygaardsvold.GetName] v čele je první stabilní vládou s jasnou většinou, jakou náš mladý národ kdy měl. Kabinet v uplynulém roce tvrdě pracoval na opatřeních, která i když pomalu, pomohou [NOR.GetName] dostat se z hluboké hospodářské krize a zajistit blahobyt obyvatel.\n\nSamozřejmě tato opatření jsou na úkor jakýchkoli vojenských příprav, které bychom mohli potřebovat, kdybychom se ocitli obklopeni válkou. Můžeme jen doufat, že nebudou potřeba."
  AAT_norway.9.a: "Před námi jen mír a stabilita!"
  AAT_norway.10.t: "Storting klopýtá"
  AAT_norway.10.desc: "Jak válka v Evropě visí nad námi stále více nevyhnutelně, [NOR.GetAdjective] parlament, neboli Storting, je zmítán vlnami chaosu a nesouladu. Příznaky, že kabinet Nygaardsvolda přinese éru stability, jsou dávno zapomenuty, jelikož poslanci nedokážou najít shodu na žádném soudržném opatření, jak bezpečně provést [NOR.GetName] bouřkou, která přichází.\n\nMezitím nepřátelé lidu brousí své nože, rostou a až [NOR.GetName] bude pohlceno plameny války."
  AAT_norway.10.a: "Jak rychlý bude náš pád?"
  AAT_norway.11.t: "Lid [ROOT.GetName] se probouzí!"
  AAT_norway.11.desc: "Po staletích podrobení jiným severským mocnostem a poté ponechání na milost kapitalistickým průmyslníkům se lid [ROOT.GetNonIdeologyName] učí stát spolu proti svým utlačovatelům a odmítat jejich hegemonii.\n\nTeď [ROOT.GetAdjective] hledají inspiraci pro svou revoluci!"
  AAT_norway.11.a: "Lidé této staré země už nejsou spící!"
  AAT_norway.12.t: "Hlasování o nedůvěře Johanovi Nygaardsvoldovi"
  AAT_norway.12.desc: "Navzdory počátečním nadějím se zdá, že vláda, kterou Johan Nygaardsvold loni sestavil, nejenže selhává v dodávání výsledků, ale je také odhodlána k demilitarizaci. Mnoho poslanců věří, že [ROOT.GetName] by měl rozvíjet svůj průmysl tak, aby umožnil investice do zrodu [NOR.GetAdjective] ozbrojených sil s cílem odstrašit cizí mocnost od invaze.\n\nA tak hlasování o nedůvěře iniciovala konzervativní strana Høyre. Ačkoli její předseda, průmyslník Johan H. Andresen, už uvažoval o odchodu do důchodu, chopil se příležitosti vést Norsko novým směrem; prezentuje se jako pragmatická a efektivní alternativa k Nygaardsvoldovým sociálním snům."
  AAT_norway.12.a: "Nygaardsvold pryč, Andresen dovnitř"
  AAT_norway.13.t: "Quislingův puč"
  AAT_norway.13.desc: "Zatímco jsme se zabývali posunem naší ekonomiky vpřed a sledovali fašisty v zahraničí, dovolili jsme domácímu fašismu vřít přímo pod našimi nosy. Přes jeho zmenšující se podporu a fakt, že jeho strana Nasjonal Samling nikdy nezískala žádné místo ve Stortingu, Vidkun Quisling vytvořil [?NOR.NOR_cw_fascist_attacker.GetAdjective]-podporovanou vládu a tvrdí, že ovládl páky moci v [ROOT.GetNonIdeologyName]."
  AAT_norway.13.a: "Quislingův čas konečně přišel!"
  AAT_norway.13.b: "Lidé [ROOT.GetNonIdeologyName] ti nikdy neodpustí, zrádče."
  AAT_norway.13.c: "Musíme udělat vše pro zdržení jejich postupu!"
  AAT_norway.14.t: "Užitečný spolupracovník"
  AAT_norway.14.desc: "Vidkun Quisling, který byl léta hlavním zastáncem fašismu v [NOR.GetNonIdeologyName], nabídl pomoc při naší invazi do jeho rodiště.\n\nChce zahájit puč v Oslu s naší podporou a ustavit režim přátelský [ROOT.GetNameDef]. Jakmile se usadí, připraví cestu naší invazi a legitimizuje [ROOT.GetAdjective] okupaci [NOR.GetName]."
  AAT_norway.14.a: "Bude užitečný"
  AAT_norway.14.b: "Ten blázen? O [NOR.GetNonIdeologyName] se postaráme sami."
  AAT_norway.15.t: "Quislingův puč je nyní nevyhnutelný!"
  AAT_norway.15.desc: "Navzdory našim nejlepším snahám Vidkun Quisling zahájil pokus o převzetí moci v Oslu. S podporou útočících fašistů vysílá proklamaci nové vlády věnované kolaboraci s našimi nepřáteli.\n\nNedá se to nijak omluvit; už jsme prohrávali a tento puč jen zhorší naši válečnou situaci."
  AAT_norway.15.a: "Bohužel budoucnost [NOR.GetName] může být Quislingova"
  AAT_norway.15.b: "Budeme dál bojovat!"
  AAT_norway.16.t: "Jsme v exilu, ale ne s prázdnýma rukama"
  AAT_norway.16.desc: "Navzdory tragickému ústupu z [NOR.GetName] můžeme alespoň najít útěchu v tom, že naši vůdci měli předvídavost připravit se na nejhorší a přesunout zdroje, které nám pomohou znovu získat [NOR.GetAdjective] území.\n\nTyto nástroje by měly usnadnit začátek odyseje zpět na naše břehy."
  AAT_norway.16.a: "Vrátíme se!"
  AAT_norway.17.t: "[NOR.GetAdjective] územní požadavky"
  AAT_norway.17.desc_monarchist: "S odkazem na staletí staré dokumenty [FROM.GetAdjective] koruna tvrdí, že kontrolujeme území, která jsou de jure součástí královských titulů zděděných králem Haakonem VII. Norska.\n\nKonkrétně se odvolávají na [GetNorwegianClaims]."
  AAT_norway.17.desc_fascist: "Vůdce [NOR.GetNameDef] požaduje, abychom mu postoupili část našeho území, kterou nazývá navrácením starobylých rodných půd jejich lidu. Samozřejmě hrozí válkou, pokud odmítneme.\n\nZmiňované území je [GetNorwegianClaims]."
  AAT_norway.17.desc_denmark: "Dvořan krále Haakona VII. Norska, nebo jak jsme ho kdysi znali, princ Carl z Dánska, se na nás obrátil se vážným nárokem. Podle nich a sbírky starých dokumentů pochybných zdrojů je Dánsko právoplatně součástí Království Norska, a ne Dánska.\n\nNáznakem také avizovali, že je vezmou silou, pokud odmítneme, tvrdošíjně že je to pro naše vlastní bezpečí."
  AAT_norway.17.a: "Nemáme na výběr"
  AAT_norway.17.b: "Nesmysl!"
  GetNorwegianClaims_iceland: "Island, trvajíce na tom, že jim byl nespravedlivě ponechán dánskou korunou při formování současného norského královského rodu"
  GetNorwegianClaims_greenland: "Grónsko, nebo Eirik Raudes Land, jak mu říkají. Podle nich mělo být předáno jim, když byl Haakon ustanoven králem Norska"
  GetNorwegianClaims_faroes: "Faerské ostrovy, které považují za součást titulu své koruny"
  GetNorwegianClaims_sweden: "provincie Bohuslän, Dalarna a Jämtland; které podle nich švédská koruna ukradla"
  GetNorwegianClaims_bjarmeland: "území kolem Bílého moře, která tvrdí, že poprvé osídlili jejich vikingští předci, a nazývají je Bjarmeland"
  GetNorwegianClaims_ireland: "hrabství Leinster, které podle nich nejprve kolonizovali jejich vikingští předci"
  GetNorwegianClaims_scotland: "Shetlandy a Skotské vysočiny, které podle nich náleží jim v důsledku dobytí vikingskými předky"
  GetNorwegianClaims_vinland: "Vinland, nám známé jako Newfoundland a Labrador, trvajíce na tom, že jejich vikingští předci to objevili dříve, a proto mají nárok na vlastnictví"
  GetNorwegianClaims_denmark: "ve skutečnosti celé Dánsko, odvážný nárok"
  AAT_norway.18.t: "[FROM.GetName] přijal naše požadavky"
  AAT_norway.18.desc_monarchist: "Podařilo se nám ukázat [FROM.GetAdjective] státu, že naše nároky jsou oprávněné, a oni souhlasili postoupit naše nárokovaná území na naši korunu."
  AAT_norway.18.desc_fascist: "Slabá [FROM.GetAdjective] vláda ustoupila a dovolí nám převzít území, které silou nebo právem patří nám."
  AAT_norway.18.a: "Vítejte mezi námi"
  AAT_norway.19.t: "[FROM.GetName] odmítl naše nároky!"
  AAT_norway.19.desc_monarchist: "Prestiž naší koruny utrpěla velkou ránu, jelikož [FROM.GetName] odmítl naše legitimní územní nároky. To je urážka [ROOT.GetAdjective] koruny a nebude tolerována."
  AAT_norway.19.desc_fascist: "Jasně, [FROM.GetAdjective] stát nemá ponětí, koho odmítá. Nezůstaneme nečinní, zatímco naše oprávněné území je jimi obsazeno. Naší jedinou volbou nyní je vzít je silou."
  AAT_norway.19.a: "Zaplatí za svou neuctivost"
  AAT_norway.20.t: "Naše královna zemřela!"
  AAT_norway.20.desc: "Během návštěvy své rodiny v Anglii tragicky zemřela náhlou srdeční příhodou během spánku.\n\nPůvodně titulovaná princezna Maud z Walesu, královna Norska je přežita králem Haakonem a princem Olavem - kteří už jsou na cestě do Anglie - ale i všemi Norovými, protože byla milována po celém království."
  AAT_norway_news.1.desc: "Po letech náročného exilu dorazil renomovaný revolucionář Lev Trockij do [MEX.GetNonIdeologyName] z [NOR.GetNonIdeologyName]. Přivítali ho slavná malířka Frida Kahlo a její manžel Diego Rivera, kteří ho ubytují ve svém domě v Mexico City a jistě si s ním a jeho ženou skvěle rozumějí.\n\nVýznamněji bude daleko od nebezpečí plynoucího od jeho nepřátel v [SOV.GetNameDef], a možná si užije klidný exil v latinamerické zemi."
  AAT_norway_news.1.a: "Zajímavé..."
  AAT_norway_news.1.sov: "S ním se musí něco udělat!"
  AAT_norway_news.2.t: "Královna Maud z Norska zemřela"
  AAT_norway_news.2.desc: "Během návštěvy Anglie, aby viděla svou rodinu a svého bratra krále Jiřího V. Spojeného království, královna-sjednávač Norska, dříve princezna z Walesu, zemřela náhlou srdeční příhodou ve spánku. Příčinou se považuje komplikace po břišní operaci dříve tento týden.\n\nByla milovanou postavou v Norsku a bude jistě postrádána synem princem Olavem a manželem Haakonem VII., králem Norska."
  AAT_norway_news.2.a: "Ztráta pro nás všechny"
  AAT_norway_news.2.b: "O jednoho krále méně k řešení!"
  AAT_norway_news.3.t: "Král Haakon VII. Norska zemřel"
  AAT_norway_news.3.desc: "Po zdánlivě úspěšné operaci po lyžařské nehodě zemřel milovaný král Haakon VII. Norska na komplikace.\n\nNorsko nyní prochází jedním z nejtemnějších období své historie; doufejme, že princ Olav co nejdříve nastoupí na trůn, aby jej dovedl do bezpečí."
  AAT_norway_news.99.t: "Král Wojtek přivádí Jan Mayen pod svou korunu"
  AAT_norway_news.99.desc: "Přes to, že byl většinou světa přehlížen, král Wojtek, nositel dělostřelectva a trůnu, spatřil potenciál tohoto arktického ostrova. \n\nS pomocí místních a nově příchozích ledních medvědů se Jan Mayen znovu osidluje a proměňuje v náležité stát, schopný čelit jakékoliv výzvě. Opravdu pohled nevídaný od dob viktoriánské éry.\n\nMezi jeho občany vyniká jedna polarizující postava, jejíž staré jméno není podstatné, ale od nynějška bude známa jako velký admirál Johan Mayen."
  AAT_norway_news.99.a: "To přerůstá přes hlavu!"
  AAT_norway_rikstanken.1.t: "[ROOT.GetAdjective] tankový program"
  AAT_norway_rikstanken.1.desc: "Tanky nikdy nebyly součástí [ROOT.GetAdjective] arzenálu, a i když může být pro nás pozdě na to, abychom se sami dohnali, to neznamená, že je máme zcela opustit.\n\nPrvním krokem je najít vhodného partnera, od kterého buď nakoupit, nebo s ním spolupracovat na vývoji našich obrněných sil. Očividnou volbou by byla jedna z velkých vojenských mocností Evropy, ale možná má dlouhodobé výhody najít dodavatele blíže domovu."
  AAT_norway_rikstanken.1.a: "Náš soused [?NOR_nordic_tank_seller.GetName]"
  AAT_norway_rikstanken.1.b: "[?NOR_communist_tank_seller.GetName] určitě má prostředky"
  AAT_norway_rikstanken.1.c: "[?NOR_fascist_tank_seller.GetAdjective] tanky vypadají nadějně"
  AAT_norway_rikstanken.2.t: "Náš přístup k [NOR.GetAdjective] programu obrněnců"
  AAT_norway_rikstanken.2.desc_NORDIC: "Náš soused a spoluseverská země [?NOR_nordic_tank_seller.GetName] má jistě rozvinutý vojenský průmysl, který bychom mohli využít k zásobování našich obrněných sil, ale pro náš malý národ by to bylo velmi nákladné.\n\nMáme také možnost zakoupit jeden tank a uvidíme, kam se dostaneme dál."
  AAT_norway_rikstanken.2.desc_SOV: "[?NOR_communist_tank_seller.GetName] uchvátil prostředky výroby, což znamená, že mají kapacitu vyrábět velké množství tanků, což by nám umožnilo dohnat naše nepřátele.\n\nMůžeme také využít této příležitosti ukázat dělníkům našeho národa, co dokáže komunistický stát, a zvýšit podporu komunismu v [ROOT.GetName]."
  AAT_norway_rikstanken.2.desc_GER: "Síla [?NOR_fascist_tank_seller.GetAdjective] Pancerů je nepopiratelná a jejich průmyslová moc nám umožní vybudovat tankové síly, které budou schopny konkurovat každému cíli. Můžeme se také spojit s nimi k vývoji vlastních tanků a pomoci jejich inženýrům, jak jen budeme moci.\n\nSamozřejmě budou očekávat, že se ideologicky s nimi sblížíme bez ohledu na to, jaké máme plány."
  AAT_norway_rikstanken.2.a: "Začneme s jedním tankem"
  AAT_norway_rikstanken.2.b: "Potřebujeme množství, abychom mohli soutěžit"
  AAT_norway_rikstanken.2.c: "Obchodní pakt může sblížit naše země ideologicky"
  AAT_norway_rikstanken.2.d: "Požádejme o pomoc při vývoji vlastních tanků"
  AAT_norway_rikstanken.3.t: "[FROM.GetName] chce koupit [ROOT.GetAdjective] tank"
  AAT_norway_rikstanken.3.desc: "Vláda [FROM.GetName] nás oslovila s žádostí, zda by jim bylo povoleno zakoupit tank. Podmínkou je, že z rozpočtových důvodů si mohou dovolit pouze jeden lehký tank... bez věže.\n\nJe to jistě neobvyklá žádost, která vzbuzuje podezření, ale tvrdí, že si ho chtějí vyzkoušet dřív, než se rozhodnou, jak vybudovat své obrněné síly."
  AAT_norway_rikstanken.3.a: "Jednomu tanku neuškodí"
  AAT_norway_rikstanken.3.b: "Nestojí to za náš čas"
  AAT_norway_rikstanken.4.t: "[FROM.GetName] chce koupit naše tanky"
  AAT_norway_rikstanken.4.desc: "Vláda [FROM.GetAdjective] chce koupit naše tanky pro svůj první vstup do obrněné války.\n\nTo by bylo dobré pro naši ekonomiku a zbrojní průmysl, ale musíme myslet na náš vlastní sklad tanků nejdřív a zda jim můžeme důvěřovat s obrněnými jednotkami."
  AAT_norway_rikstanken.4.a: "Uzavřeme obchodní dohodu"
  AAT_norway_rikstanken.4.b: "Potřebujeme ty tanky pro sebe"
  AAT_norway_rikstanken.5.t: "[FROM.GetName] žádá o bližší vztahy a tanky"
  AAT_norway_rikstanken.5.desc_SOV: "Vláda [FROM.GetAdjective] nás oslovila s žádostí koupit velké množství lehkých tanků od nás, a nechtějí jen obchodní dohodu, ale i bližší vztahy mezi našimi národy.\n\nTo je příležitost ukázat obyvatelstvu [FROM.GetName], co lze dosáhnout, když se prostředky výroby uchvátí, a povede to k budoucí bližší spolupráci."
  AAT_norway_rikstanken.5.desc_GER: "Zástupci [FROM.GetAdjective] administrativy chtějí koupit velké množství našich suverénních lehkých tanků.\n\nKromě toho projevili zájem o principy naší ideologie a chtějí ukázat svému obyvatelstvu, jak vypadá vrchol [ROOT.GetRulingIdeologyNoun], aby to rozšířili v jejich zemi."
  AAT_norway_rikstanken.5.a: "Vítáme jejich zájem"
  AAT_norway_rikstanken.5.b: "Nestojí to za náš čas"
  AAT_norway_rikstanken.6.t: "[FROM.GetName] chce spolupracovat na výzkumu tanků"
  AAT_norway_rikstanken.6.desc: "Vláda [FROM.GetAdjective] chce vyvinout vlastní tankový program a hledají nás jako pomoc. Tvrdí, že nejen získají technologické a ideologické know-how, ale i náš vlastní tankový program by z této dohody profitoval."
  AAT_norway_rikstanken.6.a: "Jejich tanky budou nezastavitelné"
  AAT_norway_rikstanken.6.b: "To nepotřebujeme"
  AAT_norway_rikstanken.7.t: "Vítáme náš nový národní tank"
  AAT_norway_rikstanken.7.desc: "[FROM.GetName], náš soused, přijal prodej prvního tanku [ROOT.GetName]. Jasně, nemá moc pancíře ani věž, ale po úpravách to může být začátek [ROOT.GetAdjective] tankových sil."
  AAT_norway_rikstanken.7.a: "Nejlepší nápad Panství!"
  AAT_norway_rikstanken.8.t: "[FROM.GetNameDefCap] nám poskytne tanky"
  AAT_norway_rikstanken.8.desc: "Vláda [FROM.GetAdjective] přijala dohodu prodat nám velké množství tanků. To umožní naší armádě skutečně konkurovat velmocím."
  AAT_norway_rikstanken.8.a: "Konečně!"
  AAT_norway_rikstanken.9.t: "[ROOT.GetAdjective] a [FROM.GetAdjective] národy se sblížily díky tankům"
  AAT_norway_rikstanken.9.desc: "Lídři [FROM.GetAdjective] souhlasili prodat nám své tanky a spolu s nimi přišla formální smlouva, která přiblíží [ROOT.GetName] k [FROM.GetAdjective] [FROM.GetRulingIdeologyNoun]."
  AAT_norway_rikstanken.9.a: "Nyní [FROM.GetRulingIdeologyNoun] zvítězí"
  AAT_norway_rikstanken.10.t: "[FROM.GetNameDefCap] přijal dohodu o výzkumu"
  AAT_norway_rikstanken.10.desc: "Envoyové [FROM.GetAdjective] potvrdili, že jsou ochotni nám pomoci vyvinout vlastní tanky, pokud naše země budou nadále ideologicky s nimi sladěny. Jsme si jisti, že i oni budou z naší spolupráce těžit díky novým přístupům k vývoji tanků."
  AAT_norway_rikstanken.10.a: "Konečně, norské tanky!"
  AAT_norway_rikstanken.11.t: "Co se můžeme naučit z Rikstanken"
  AAT_norway_rikstanken.11.desc: "Naše království má už nějaký čas tank, přezdívaný Rikstanken, neboli národní tank. Viděli jsme, jak funguje a co s ním můžeme dělat, takže možná to vezmeme dál a pokusíme se tank rozebrat, abychom nakonec navrhli a vyrobili vlastní. Koneckonců, samotný tank příliš nevylepšuje bojovou sílu."
  AAT_norway_rikstanken.11.a: "Více tanků!"
  AAT_norway_rikstanken.11.b: "Tanky nepotřebujeme"
  AAT_norway_rikstanken.12.t: "[FROM.GetName] odmítá náš návrh"
  AAT_norway_rikstanken.12.desc: "Navzdory naší ochotě startovat [ROOT.GetAdjective] tankový program s pomocí [FROM.GetNonIdeologyName] odmítli naši žádost. To bude rána pro naše naděje na modernizaci ozbrojených sil."
  AAT_norway_rikstanken.12.a: "Najdeme jinou cestu"
  AAT_rikstanken_program_tech_bonus: "Norský tankový program"
  AAT_norway_allied.1.t: "[FROM.GetName] hledá investice"
  AAT_norway_allied.1.desc: "Vláda [NOR.GetAdjective] chce rozvíjet svůj průmysl s naší pomocí. To by byla skvělá příležitost k zisku a pro nás příležitost vychovat z nich potenciálního spojence v budoucnu, pokud by vypukla válka."
  AAT_norway_allied.1.a: "Nemá smysl nechat si ujít pomoc budoucímu spojenci"
  AAT_norway_allied.1.b: "Může to být nebezpečné"
  AAT_norway_allied.2.t: "[FROM.GetNameDefCap] investuje do našeho rozvoje"
  AAT_norway_allied.2.desc: "Naše pokusy o navázání styku s [FROM.GetAdjective] vládou byly úspěšné a souhlasili investovat do naší ekonomiky. To také znamená, že se k nim přiblížíme a možná je v budoucnu budeme považovat za spojence."
  AAT_norway_allied.2.a: "To je pokrok"
  AAT_norway_allied.3.t: "[FROM.GetName] nebude investovat do naší ekonomiky"
  AAT_norway_allied.3.desc: "Navzdory našim snahám [FROM.GetAdjective] administrativa nám nepomůže rozvíjet průmyslovou kapacitu, kterou potřebujeme k obraně v případě války.\n\nMěli bychom si to pamatovat."
  AAT_norway_allied.3.a: "Budeme se muset podívat jinde"
  AAT_norway_allied.4.t: "Laakeho náhrada"
  AAT_norway_allied.4.desc: "Kristian Laake sloužil v [NOR.GetAdjective] armádě dlouho a byl jmenován vrchním velitelem téměř před deseti lety, za míru a roky před tím, než se riziko pro naši zemi stalo zřejmým.\n\nJakmile jsme ztratili důvěru v jeho schopnosti vést za války, musí být nahrazen; otázka zní, kdo povede síly [NOR.GetName] k vítězství?"
  AAT_norway_allied.4.a: "[NOR.NOR_carl_gustav_fleischer.GetName] bude odvážná volba"
  AAT_norway_allied.4.b: "[NOR.NOR_wilhelm_von_tangen_hansteen.GetName] má potenciál"
  AAT_norway_allied.4.c: "[NOR.NOR_otto_ruge.GetName] je bezpečná volba"
  AAT_norway_fascist.1.t: "Nasjonal Samling z [FROM.GetName] chce, abychom napadli jejich zemi!"
  AAT_norway_fascist.1.desc: "Koalice [FROM.GetAdjective] nacionalistů a fašistů spojených s naší věcí nabízí pomoc při dobytí [NOR.GetName]. Připravili půdu pro převzetí vlády a správu [FROM.GetAdjective] území naším jménem.\n\nPokud je to pravda, může být příležitost příliš dobrá na to, abychom ji propásli, ale musíme se ujistit, že jsme připraveni udeřit."
  AAT_norway_fascist.1.a: "[FROM.GetName] se k nám připojí!"
  AAT_norway_fascist.1.b: "S místními se moc dělit nebudeme"
  AAT_norway_fascist.2.t: "[FROM.GetNameDefCap] nás odmítl!"
  AAT_norway_fascist.2.desc: "Navzdory naší štědré nabídce nám [FROM.GetAdjective] komunikoval, že pokud by napadli [ROOT.GetName], naši pomoc nepotřebují ani nechtějí. Zdá se tedy, že v našem poslání ovládnout vládu [ROOT.GetNameDef] jsme na to sami."
  AAT_norway_fascist.2.a: "Bude jim líto!"
  AAT_norway_fascist.3.t: "[FROM.GetNameDefCap] nám pomůže!"
  AAT_norway_fascist.3.desc: "Zástupci fašistické strany z [FROM.GetAdjective] nás kontaktovali a ujistili nás, že [FROM.GetNameDef] poskytne podporu, kterou potřebujeme k převzetí vlády.\n\nTo nám může umožnit vystoupit ze stínů a uchopit moc v [ROOT.GetName]."
  AAT_norway_fascist.3.a: "Je čas!"
  AAT_norway_fascist.5.a: "$AAT_norway_fascist.3.a$"
  AAT_norway_fascist.4.t: "Naši [NOR.GetAdjective] protějšci žádají o naši podporu"
  AAT_norway_fascist.4.desc: "Zástupci fašismu v [NOR.GetName] nám vyprávějí o velkém boji o budování podpůrné základny a převzetí moci v [NOR.GetAdjective] státě, navzdory tomu, jak slabá a nešikovná je jejich vláda.\n\nZřejmě potřebují naši pomoc posílit jejich pevný úchop na pákách moci v zemi, která by se v budoucnu mohla stát užitečným spojencem."
  AAT_norway_fascist.4.a: "Pomůžeme našim spolufašistům"
  AAT_norway_fascist.4.b: "Z toho nic nezískáme"
  AAT_norway_fascist.6.t: "[FROM.GetNameDefCap] odmítl!"
  AAT_norway_fascist.6.desc: "Zástupci fašistické strany z [FROM.GetAdjective] nám přinesli hrozné zprávy. [FROM.GetNameDefCap] odmítl naše prosby o pomoc.\n\nTo znamená, že jsme sami při hledání fašistického režimu v [ROOT.GetNonIdeologyName], který bychom mohli ovládat."
  AAT_norway_fascist.6.a: "Najdeme způsob!"
  AAT_norway_communist.1.t: "[FROM.GetName] chce oživit pomorský obchod!"
  AAT_norway_communist.1.desc: "Po staletí před naším Vítězstvím přeplouvali pomorští obchodníci z Severního Ruska Barentsovo moře, aby obchodovali s našimi [NOR.GetAdjective] soudruhy na severu jejich země.\nNyní navrhují oživit tuto dlouhotrvající tradici, která bude jistě vzájemně prospěšná a přiblíží naše komunistické státy ještě blíže."
  AAT_norway_communist.1.a: "Barentsovo moře bude pulzovat obchodem!"
  AAT_norway_communist.1.b: "Obchod je buržoazní koncept!"
  AAT_norway_communist.2.t: "Nový pomorský obchod"
  AAT_norway_communist.2.desc: "Jako jejich předci, naši soudruzi v [FROM.GetNameDef] jsou dychtiví obchodovat s námi přes naše nejsevernější pobřeží. Bude to vzájemně výhodné uspořádání, které ukáže dělníkům obou našich národů výhody naší komunistické solidarity."
  AAT_norway_communist.2.a: "Vpřed!"
  AAT_norway_communist.3.t: "[FROM.GetName] odmítl náš obchodní návrh"
  AAT_norway_communist.3.desc: "Navzdory naší sdílené historii obchodu přes Barentsovo moře, [FROM.GetNameDef] si nemyslí, že stojí za oživení. Měli bychom zkusit jiné cesty rozvoje našich nejsevernějších pobřeží."
  AAT_norway_communist.3.a: "No nic..."
  AAT_norway_communist.4.t: "[FROM.GetName] chce, abychom jim pomohli rozvíjet jejich vojenský průmysl"
  AAT_norway_communist.4.desc: "Naši soudruzi v [FROM.GetName] potřebují naši pomoc. Jak jejich revoluce je přiblížila k nám, dává smysl, abychom podpořili jejich úsilí o modernizaci armádního průmyslu.\n\nByl by to politický úspěch ukázat, že podporujeme soudruha, a ukázat jejich dělníkům, jak to dělá [ROOT.GetNameDef]."
  AAT_norway_communist.4.a: "Jejich zbraně budou bojovat proti našim nepřátelům!"
  AAT_norway_communist.4.b: "Nemůžeme riskovat, že zbraně použijí proti nám"
  AAT_norway_communist.5.t: "[FROM.GetNameDefCap] přijal!"
  AAT_norway_communist.5.desc: "Naši soudruzi přijali naši skromnou žádost o pomoc a nyní umožní rozšíření naší vojenské výroby tak, aby vyhověla potřebám obrany naší revoluce."
  AAT_norway_communist.5.a: "Použijeme tyto zbraně k boji proti našim společným nepřátelům!"
  AAT_norway_communist.6.t: "[FROM.GetNameDefCap] odmítl naše prosby o podporu!"
  AAT_norway_communist.6.desc: "Zdá se, že jejich důvěra v nás byla značně nadsazená. [FROM.GetName] se zdá být neochotný pomoci nám zvýšit výrobu zbraní."
  AAT_norway_communist.6.a: "Zbabělci!"
  AAT_norway_communist.7.t: "Pád norské královské rodiny"
  AAT_norway_communist.7.desc: "Dávno pryč jsou dny, kdy byla [NOR.GetAdjective] monarchie jednou z nejoblíbenějších královských rodin na kontinentu. Ačkoli Haakonova insistence, že přijme trůn až po referendu, a jeho závazek k mírnému zanedbání byly ušlechtilé, monarchie je monarchie a nemá místo v rovnostářské společnosti, kterou chceme vybudovat v [ROOT.GetNonIdeologyName]. \n\nKrál Haakon VII. a princ Olav, spolu s ostatními členy královské rodiny, byli zatčeni a pokojně posláni do exilu, jejich zabavené majetky budou použity na výstavbu našeho komunistického projektu.\n\n[NOR_GetExiledMonarchyLastParagraph]"
  NOR_exiled_monarchy_to_desc_DEN: "Vracíce se k dánskému rodnému jménu princ Carl, má být přijat v [DEN.GetName] svým bratrem, králem Frederikem, kde vykoná jakoukoli roli, kterou královské osobnosti mají v dánské společnosti."
  NOR_exiled_monarchy_to_desc_ENG: "Jelikož návrat do jeho rodné země, [DEN.GetName], nebyl možný, je bývalý král Haakon a jeho rodina nyní nucena přijmout svůj exil v [ENG.GetName], zemi, která kdysi hostila svatbu prince Carla z Dánska a Maud z Walesu, bývalých členů bývalého královského páru."
  NOR_exiled_monarchy_to_desc_SWE: "Nemohouce se vrátit ani do zemí Haakonova ani Maudina původu, byla bývalá královská rodina nucena najít útočiště u sympatické sousední monarchie. Ironie, že norská koruna je tak brzy závislá na švédském království po získání nezávislosti, nezůstala bez povšimnutí."
  NOR_exiled_monarchy_to_desc_NONE: "Svět je velmi odlišné místo od roku 1905. Počínající norská monarchie se ocitla bez země, nad kterou by panovala, a bez jasného cíle pro svůj exil. Monarchismus ve světě je brzy u konce."
  AAT_norway_communist.7.a: "Dobrá riddance!"
  AAT_norway_communist.8.t: "Norská královská rodina přijíždí"
  AAT_norway_communist.8.desc_DEN: "Po odchodu tvořit vlastní královskou rodinu v Norsku se náš princ Carl, nebo Haakon VII., jak byl dlouhá léta nazýván, vrátil do [ROOT.GetName].\n\nByl náhle sesazen a vyhoštěn po kruté komunistické revoluci a nyní musí přijmout život v exilu v naší zemi se svou rodinou."
  AAT_norway_communist.8.desc_ENG: "Norská královská rodina byla spojena s naší po mnoho let, kdy královna Viktorie hostila sňatek své vnučky Maud s budoucím králem Haakonem VII., tehdejším princem Carlem z Dánska.\n\nBohužel byl jejich sesazení po revoluci a protože Dánsko nyní není možností, hledají u nás azyl."
  AAT_norway_communist.8.desc_SWE: "Královská rodina Norska byla poslána do exilu a protože získat azyl u příbuzných v Dánsku a Velké Británii není v tuto chvíli možné, rozhodli se opustit hrdost a hledat útočiště u nás.\n\nNavzdory nedostatku rodinných vazeb je naší povinností bránit skandinávskou monarchii před vyhynutím."
  AAT_norway_communist.8.a: "Jsou u nás vítáni!"
  AAT_norway_communist.8.b: "Mohou zůstat, ale nejsou vítáni."
  AAT_norway_monarchist.1.t: "Námluva královského komorníka"
  AAT_norway_monarchist.1.desc: "Navzdory Haakonově trvání na udržení nezávislosti Stortingu a nechat jej řešit své záležitosti interně, jeho komorník Peder Anker Wedel-Jarlsberg navrhuje, aby norská koruna zasáhla v nebezpečně nestabilní situaci.\n\nS odvoláním na nejasnou hrozbu cizí invaze žádá, aby lid [ROOT.GetName] projevil svou důvěru v krále po celé zemi a požadoval opatření od svého věrného panovníka.\n\nJe to králův nejbližší důvěrník a dobře propojený člen nejsilnější šlechtické rodiny v [NOR.GetName], takže tento vývoj by měl vyvolat opatrnost."
  AAT_norway_monarchist.1.a: "Jaký může být jeho cíl?"
  AAT_norway_monarchist.2.t: "Král je mrtvý!"
  AAT_norway_monarchist.2.desc: "Neslýchané se stalo skutečností. Po zdánlivě úspěšné operaci po lyžařské nehodě zemřel náš milovaný král Haakon VII.\n\nNaše země nyní prochází jedním z nejtemnějších období své historie, doufejme, že princ Olav co nejdříve usedne na trůn, aby nás vedl do bezpečí."
  AAT_norway_monarchist.2.a: "Jaké další tragédie může budoucnost přinést?"
  AAT_norway_monarchist.3.t: "Nástupnictví v naší zemi"
  AAT_norway_monarchist.3.desc: "Když národ truchlí nad smrtí milovaného krále Haakona VII., je jasné, že pozornost prince Olava je na bojišti a i kdyby ne, je údajně tolik zmožen, že se soustředí jen na vedení našich mužů k vítězství. Zbývá nám otázka, kdo provede [NOR.GetNameDef] těmito bouřlivými časy. Můžeme být alespoň vděčni markýzi Jarlsbergovi za jeho pevnou ruku."
  AAT_norway_monarchist.3.a: "Zoufalé časy vyžadují neobvyklá opatření"
  AAT_norway_monarchist.3.b: "Nemůžeme rozhýbat loď"
  AAT_norway_monarchist.4.t: "Královna Mathilde I. Norska" # todo: NEW TRANSLATION
  AAT_norway_monarchist.4.desc: "Možná se nikdy nedozvíme, co se dělo za zavřenými dveřmi v královském paláci, ale vláda Norska oznámila, že královna Maude, zesnulého krále Haakona manželka, bude nyní vládnout království a přijme jméno Mathilde I. Je to obzvláště neobvyklé, protože princ Olav byl dalším v pořadí na trůn, ale zdá se, že preferuje toto uspořádání, aby se mohl nadále soustředit na válečné úsilí. Koneckonců je to přece vnučka královny Viktorie, takže by jen následovala její kroky a zákony o nástupnictví své domoviny.\n\nJe pozoruhodné, že jméno markýze Wede-Jarlsberg nebylo v žádných veřejných oznámeních zmíněno; jeho role v novém režimu je neznámá, stejně jako jeho pobyt." # todo: NEW TRANSLATION
  AAT_norway_monarchist.4.a: "Ať žije královna Mathilde!" # todo: NEW TRANSLATION
  AAT_norway_monarchist.5.t: "Záměry regenta" # todo: NEW TRANSLATION
  AAT_norway_monarchist.5.desc: "S nástupem našeho nového regenta, který přebírá pravomoci místo krále, se objevila otázka, jaké skutečné jsou jeho úmysly vůči národu. Chce v dlouhodobém horizontu nahradit krále Haakona, nebo je jeho cílem jen pomáhat mu při vládě? Pouze čas ukáže, jaké jsou jeho skutečné ambice." # todo: NEW TRANSLATION
  AAT_norway_monarchist.5.a: "Jarlsberg povede národ jako jeho pravý král" # todo: NEW TRANSLATION
  AAT_norway_monarchist.5.b: "Nejlepší bude udržet dobré vztahy se sousedy" # todo: NEW TRANSLATION
  AAT_norway_monarchist.5.c: "Konečným cílem je obnovit Norsko do bývalé slávy!" # todo: NEW TRANSLATION
  illegitimate_norwegian_monarchy: "Nelegitimní norský panovník na trůnu"
  friendly_norwegian_monarchy: "Naši severské bratři"
  norwegian_imperial_ambitions: "Norské imperiální ambice"
  Sweden_rearnament.1.t: "Rozpočet armády"
  Sweden_rearnament.1.desc: "Naše pozemní síly jsou hlavní svalovinou naší armády, pověřené ochranou našich břehů, měst a hranic.\nPřesto také představují velké společenské finanční náklady, které mohou být pro obyčejného člověka nepřijatelné"
  Sweden_rearnament.1.a: "Rozzbrojit"
  Sweden_rearnament.1.b: "Nízký rozpočet"
  Sweden_rearnament.1.c: "Střední rozpočet"
  Sweden_rearnament.1.d: "Vysoký rozpočet"
  Sweden_rearnament.2.t: "Rozpočet letectva"
  Sweden_rearnament.2.desc: "Odborníci a komentátoři říkají, že budoucí války se povedou nejen na zemi a moři, ale i na obloze. Tento nový typ války získal zvýšenou pozornost velkých mocností a bude rozhodující v jakékoli budoucí obraně.\nAčkoli tento způsob vedení války směřuje k budoucnosti, porozumí tomu obyčejný dělník, když není dost chleba?"
  Sweden_rearnament.3.t: "Rozpočet námořnictva"
  Sweden_rearnament.3.desc: "Po staletí usilovaly státy kolem Baltu o kontrolu nad jeho průlivem, Švédsko není výjimkou. S dlouhým pobřežím sahajícím od dalekého severu po západní pobřeží směřující k severnímu Atlantiku.\nČelíme hrozbám od Rudé flotily v Leningradu a Kriegsmarine na jihu.\nI když je silné námořnictvo kritické pro naši obranu, velké kovové trupy nejsou levné. Proto je pečlivě zvážený rozpočet důležitý."
  Sweden_rearnament.4.t: "Výbor pro zbrojení se právě schází"
  Sweden_rearnament.4.desc: "Na vaše přání vás upozorňujeme, že je čas, kdy se výbor pro zbrojení znovu schází. To je naše příležitost stanovit politiku vyzbrojování pro příští rok.\nRozvaha a jasnost myšlení jsou nutné, protože to nás zaváže k plánu na předvídatelnou dobu, když svět směřuje k bodu zlomu."
  Sweden_rearnament.4.desc.a: "Jistě, jasno"
  Sweden_rearnament_delta_low: "Efektivní změna: [?folkhemmet_air_part_delta_low_tooltip]"
  Sweden_rearnament_delta_medium: "Efektivní změna: [?folkhemmet_air_part_delta_medium_tooltip]"
  army_budget_event_active: "Výbor pro rozpočet armády je aktivní"
  air_budget_event_active: "Výbor pro rozpočet letectva je aktivní"
  navy_budget_event_active: "Výbor pro rozpočet námořnictva je aktivní"
  AAT_Sweden.1.t: "Vláda jmenuje komisi, která doporučuje zbrojení" # todo: NEW TRANSLATION
  AAT_Sweden.1.desc: "V roce 1930 stát jmenoval parlamentní vyšetřovací komisí, která má poskytnout vodítko pro budoucí výdaje na obranu Švédska. Strana rolníků spolu s umírněnými tlačí na zvýšené výdaje, zatímco premiér Per-Albin Hansson ze sociálních demokratů tomu ostře odporuje a tvrdí, že takový krok by zhatil jeho vizi sociálních reforem.\nUprostřed stále víc hrozivé rétoriky od sousedů se vyšetřování nyní pevně přiklonilo na stranu pravicově orientovaných stran. Tvrdí, že \"zanedbání obrany by bylo proti zájmům státu a jeho lidu\".\n\nTo vyvolalo vládní krizi, kdy Per-Albin Hansson hrozí rezignací, dokud si neupevní svoji základnu v nadcházejících volbách v roce 1936.\nMezitím bychom měli jmenovat někoho, kdo povede zemi až do nadcházejících voleb." # todo: NEW TRANSLATION
  AAT_Sweden.1.a: "Strana rolníků je nejlepší volba" # todo: NEW TRANSLATION
  AAT_Sweden.1.c: "Zjevně opoziční strana na pravici" # todo: NEW TRANSLATION
  AAT_Sweden.1.b: "Není důvod, proč by Per-Albin měl rezignovat" # todo: NEW TRANSLATION
  AAT_Sweden.1.b_tt: "§RToto bude mít negativní politické důsledky§!" # todo: NEW TRANSLATION
  AAT_Sweden.2.t: "Hlasování o nedůvěře" # todo: NEW TRANSLATION
  AAT_Sweden.2.desc: "Uprostřed Per-Albinovy neústupnosti ohledně rozpočtu a současného odmítání odstoupit ve prospěch jiného kandidáta se koalice Strany rolníků a Umírněných rozhodla předložit premiérovi hlasování o nedůvěře.\n\nS těmito dvěma stranami spojenými nemá Per-Albin jinou možnost než rezignovat a post premiéra zůstává neobsazený. To vyvolalo krizi ve vládě, kde žádná strana nemá politické páky, aby mohla nastoupit k moci.\n\nSám král promluvil proti vznikajícímu chaosu, což je mimořádný krok od panovníka, který oficiálně nemá politickou moc." # todo: NEW TRANSLATION
  AAT_Sweden.2.a: "Jak to skončí?" # todo: NEW TRANSLATION
  AAT_Sweden.3.a: "Per Albin-Hansson má mandát lidu." # todo: NEW TRANSLATION
  AAT_Sweden.3.b: "[AAT_Sweden_3_b_loc]" # todo: NEW TRANSLATION
  AAT_Sweden.3.axel_is_leader: "Axel zatím dobře pracoval, nechte ho pokračovat." # todo: NEW TRANSLATION
  AAT_Sweden.3.axel_is_not_leader: "Strana rolníků by měla dostat šanci." # todo: NEW TRANSLATION
  AAT_Sweden.3.c: "[AAT_Sweden_3_c_loc]" # todo: NEW TRANSLATION
  AAT_Sweden.3.bagge_is_leader: "Jasně, Bagge nás povede do budoucnosti." # todo: NEW TRANSLATION
  AAT_Sweden.3.bagge_is_not_leader: "Umírnění, v těchto těžkých dobách potřebujeme nové vedení" # todo: NEW TRANSLATION
  AAT_Sweden.3.d: "P-A způsobil tento chaos, Wigforss by měl vést sociální demokracii místo něj" # todo: NEW TRANSLATION
  AAT_Sweden.3.t: "Švédské všeobecné volby 1936" # todo: NEW TRANSLATION
  AAT_Sweden.3.desc: "Dnes lidé po celé [ROOT.GetNameDef] přicházejí volit v národních volbách. Očekává se, že sociální demokraté udělají comeback, projekce naznačují, že získají několik křesel v Riksdagu.\nNicméně Bondeförbundet i strana Högern doufají, že nečekaný obrat by některou z nich mohl dostat k moci. S tím, jak se v nejistém světovém prostředí očekává, že menší okrajové strany mohou získat mírné zisky, je cokoliv možné." # todo: NEW TRANSLATION
  AAT_Sweden.4.t: "Politik nazývá soupeře „neschopným až k ostudě“" # todo: NEW TRANSLATION
  AAT_Sweden.4.desc: "Dnes se v Riksdagu rozprava vyostřila, když hádka o tom, kdo by měl zaujmout post premiéra, přerostla v osobní útoky. Karl Sjöblom napadl Glenn Wernera během debaty a prohlásil, že „jediné, k čemu se hodíš, je venčení psa“.\n\nMluvčí Glenna uvedl, že Glenn nikdy psa nevlastnil." # todo: NEW TRANSLATION
  AAT_Sweden.4.a: "Doufejme, že brzy najdeme premiéra" # todo: NEW TRANSLATION
  AAT_Sweden.5.t: "Politik nalezen schovaný v křoví" # todo: NEW TRANSLATION
  AAT_Sweden.5.desc: "Dnes byl Lennart Jansson nalezen schovaný v křoví blízko Riksdagu. Když byl spatřen, trval na tom, že vlastně v křoví neskrýval, nýbrž obdivoval konkrétní hezkou berušku. Poté se rychle přesunul do Riksdagu.\nSpekuluje se, že se skutečně skrýval v křoví, aby se vyhnul politickému protivníkovi, který byl viděn vstupovat několik sekund před ním kvůli dalším úvahám o premiérovi." # todo: NEW TRANSLATION
  AAT_Sweden.5.a: "To je prostě směšné" # todo: NEW TRANSLATION
  AAT_Sweden.6.t: "Skandál kvůli srkání" # todo: NEW TRANSLATION
  AAT_Sweden.6.desc: "Předsedající vyzval k novým pravidlům ohledně jídla v Riksdagu poté, co Agda Sörlp „velmi hlasitě“ srkala polévku během projevu jiného politika o volbě nového premiéra. Nazval to „úmyslným rozptýlením“, ale paní Sörlp uvedla, že kvůli dlouhým jednáním v poslední době není dost času na oběd v běžnou dobu." # todo: NEW TRANSLATION
  AAT_Sweden.6.a: "Žádné další srkání!" # todo: NEW TRANSLATION
  AAT_Sweden.7.t: "12 lidí zatčeno před Riksdagem" # todo: NEW TRANSLATION
  AAT_Sweden.7.desc: "Dnes bylo před Riksdagem zatčeno 12 lidí, kteří se údajně snažili vniknout dovnitř. Když je policie zadržela, tvrdili, že jen chtěli urychlit přijetí usnesení, protože sociální služby, na které se spoléhají, v politickém chaosu vymizely.\nByli zastaveni v hale kvůli tomu, že jeden z dvanácti, Rikard Persson, je hledán policií za nelegální pašování tabáku. Persson musel použít veřejné toalety, byl rozpoznán jedním z důstojníků na toaletě a poté zadržen.\nPerssonovi hrozí 2 roky vězení, zbylým 11 až 6 měsíců a pokuta za přestupek." # todo: NEW TRANSLATION
  AAT_Sweden.7.a: "Ach můj bože" # todo: NEW TRANSLATION
  AAT_Sweden.8.t: "11 lidí zatčených u Riksdagu propuštěno" # todo: NEW TRANSLATION
  AAT_Sweden.8.desc: "Dnes bylo na podmínku propuštěno 11 lidí, kteří byli zatčeni při pokusu vtrhnout do Riksdagu, zatímco 1 osoba zůstává ve vězení kvůli obvinění z pašování." # todo: NEW TRANSLATION
  AAT_Sweden.8.a: "Doufejme, že si tito tuláci vezmou ponaučení" # todo: NEW TRANSLATION
  AAT_Sweden.9.t: "Pašerák tabáku obrací život k lepšímu" # todo: NEW TRANSLATION
  AAT_Sweden.9.desc: "Rikard Persson byl zatčen, když se spolu s 11 dalšími pokusil vtrhnout do Riksdagu. Jelikož byl hledán za pašování tabáku, byl uvězněn na 2 roky. Následovali jsme ho, kde je nyní, a s radostí oznamujeme, že po výkonu trestu se rozhodl změnit život a okamžitě vstoupil do námořnictva.\nJeho nadřízení v generálním štábu objevili výtečného mladého, cílevědomého člověka, a od té doby byl povýšen za svou tvrdou práci a přirozený talent." # todo: NEW TRANSLATION
  AAT_Sweden.9.a: "Opravdu inspirující" # todo: NEW TRANSLATION
  AAT_Sweden.10.t: "Herman Eriksson odevzdává dopis o rezignaci" # todo: NEW TRANSLATION
  AAT_Sweden.10.desc: "Dnes Herman Eriksson podal dopis o rezignaci a uvedl, že se chce stáhnout, aby převzal post generálního ředitele ve Vin och Sprit AB.\nNavzdory jeho přáním může být stále potřeba ve vládě, ale mít ho jako ředitele státního výrobce lihovin může mít své výhody." # todo: NEW TRANSLATION
  AAT_Sweden.10.a: "Jeho služby ve vládě jsou stále potřeba" # todo: NEW TRANSLATION
  AAT_Sweden.10.b: "Nechme ho jít" # todo: NEW TRANSLATION
  AAT_Sweden.11.t: "[GER.GetNameDef] pracovníci obsazují továrny Landsverk" # todo: NEW TRANSLATION
  AAT_Sweden.11.desc: "Po vypuknutí nepřátelství mezi [SWE.GetNameDef] a [GER.GetNameDef] se německému personálu podařilo dočasně obsadit továrny Landsverk a zabarikádovat se v komplexech. I když se očekává, že armáda komplex včas obsadí, při potyčkách dojde k určitým škodám a továrny proto nebudou plně provozuschopné po nějakou dobu.\nO továrně Landsverk umístěné v Německu samotném je málo známo, ale švédské úřady nemají pochyb, že je vláda [GER.GetNameDef] v odvetě obsadila." # todo: NEW TRANSLATION
  AAT_Sweden.11.a: "Možná nebyl dobrý nápad mít vojenské komplexy vlastněné [GER.GetNameDef]" # todo: NEW TRANSLATION
  AAT_Sweden.12.t: "[?ROOT.GetLeader] umírá na infarkt" # todo: NEW TRANSLATION
  AAT_Sweden.12.desc: "Dnes [?SWE.bus_capture_tag.GetAdjective] úřady oznámily zajetí a následnou smrt [?SWE.GetLeader]. Uvádějí, že [?SWE.bus_capture_tag.GetAdjective] komanda dokázala částečně obklíčit premiérovo mobilní velitelství, které bylo přimáčknuto v blízkosti fronty.\nPo kontaktu s autobusem, ve kterém byl [?SWE.GetLeader] a jeho štáb uvězněni, komanda tvrdí, že premiér se zdál při vystupování z vozidla zakopnout a upadnout na zem. Navzdory probíhajícím nepřátelstvím [?SWE.bus_capture_tag.GetAdjective] úřady laskavě vrátily tělo zesnulého předsedy vlády k státnímu pohřbu. Pitva odhalila, že premiér utrpěl infarkt následovaný srdeční zástavou.\nNavzdory chaosu, který nastal, převzal Tage Erlander kontrolu jako nouzový premiér, dokud nebudou moci být konány řádné volby." # todo: NEW TRANSLATION
  AAT_Sweden.12.a: "Opravdu tragédie" # todo: NEW TRANSLATION
  AAT_Sweden.13.t: "[SWE.GetNameDefCap] žádá kontrolu severního Norska" # todo: NEW TRANSLATION
  AAT_Sweden.13.desc: "Švédská vláda požádala o kontrolu oblasti kolem Narviku. Tvrdí, že jde pouze o humanitární krok a pramení z touhy ochránit norské obyvatelstvo před probíhajícím konfliktem. Jako bezpečnostní záruku nabídli udržení zóny demilitarizované a vykonávání všech policejních činností potřebných až do konce konfliktu.\nNorská populace by pravděpodobně byla spokojenější pod švédskou okupací, což by uvolnilo více zdrojů pro naše jednotky na frontě." # todo: NEW TRANSLATION
  AAT_Sweden.13.a: "Zní to jako dobrý obchod" # todo: NEW TRANSLATION
  AAT_Sweden.13.b: "Všechno to patří [THIS.GetNameDef]" # todo: NEW TRANSLATION
  AAT_Sweden.13.tt: "§R[SWE.GetName] by mohl eskalovat do války§!" # todo: NEW TRANSLATION
  AAT_Sweden.14.t: "[FROM.GetNameDefCap] ustupuje" # todo: NEW TRANSLATION
  AAT_Sweden.14.desc: "[FROM.GetNameDefCap] přijalo náš návrh na demilitarizovanou zónu kolem Narviku. Jejich jednotky oblast opustily a my nyní vyhlásíme nezónu bojů. Očekáváme, že [NOR.GetAdjective] vláda si území na konci války vyzvedne zpět, ale prozatím udržíme [NOR.GetAdjective] obyvatelstvo v bezpečí." # todo: NEW TRANSLATION
  AAT_Sweden.14.a: "Začněme tím, že pošleme pomocné zásoby" # todo: NEW TRANSLATION
  AAT_Sweden.14.a_tt: "§Y[NOR.GetNameDefCap] nás požádá, abychom jim po válce vrátili území§!" # todo: NEW TRANSLATION
  AAT_Sweden.15.t: "[FROM.GetNameDefCap] odmítá náš návrh" # todo: NEW TRANSLATION
  AAT_Sweden.15.desc: "[FROM.GetNameDefCap] odmítl náš návrh na demilitarizovanou zónu kolem Narviku. Musíme se rozhodnout, jak odpovědět — buď trvat na takové zóně pro dobro našich severských bratrů, nebo je nechat v temnotě." # todo: NEW TRANSLATION
  AAT_Sweden.15.a: "Nemůžeme kvůli tomu riskovat naši zemi" # todo: NEW TRANSLATION
  AAT_Sweden.15.b: "Nemůžeme nechat [NOR.GetName] samotné" # todo: NEW TRANSLATION
  AAT_Sweden.15.a_tt: "§YToto povede k válečnému cíli proti [FROM.GetNameDef], pokud odmítnou§!" # todo: NEW TRANSLATION
  AAT_Sweden.16.t: "[SWE.GetNameDef] hrozí nepřátelstvím o Narvik" # todo: NEW TRANSLATION
  AAT_Sweden.16.desc: "Poté, co odmítli vydat oblasti kolem Narviku, vláda [SWE.GetAdjective] jasně pohrozila vypuknutím nepřátelství mezi našimi zeměmi, pokud jim odmítneme předat severní [NOR.GetAdjective] území." # todo: NEW TRANSLATION
  AAT_Sweden.16.a: "Nemůžeme riskovat další nepřátele" # todo: NEW TRANSLATION
  AAT_Sweden.16.b: "Ať přijdou" # todo: NEW TRANSLATION
  AAT_Sweden.17.t: "[FROM.GetNameDefCap] tvrdohlavě odmítá odevzdat Narvik" # todo: NEW TRANSLATION
  AAT_Sweden.17.desc: "Navzdory hrozbám ohledně Narviku [FROM.GetName] odmítá ustoupit od našich požadavků. Nemůžeme a nebudeme nechat [NOR.GetAdjective] lidi být zacházeni jako dobytek za nelidských podmínek. Musíme zajistit [NOR.GetAdjective] přístavy, odříznout útočící síly a osvobodit [NOR.GetAdjective] lid." # todo: NEW TRANSLATION
  AAT_Sweden.17.a: "Nu har du skitit i det blå skåpet [FROM.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden.18.t: "[NOR.GetName] žádá o vrácení Narviku" # todo: NEW TRANSLATION
  AAT_Sweden.18.desc: "Obnovená [NOR.GetAdjective] vláda žádá o předání Narviku a přilehlých území poté, co jsme je během války chránili. Ve své komunikaci uvádějí, že jsou hluboce vděční za činy naší vlády během války a těší se na další spolupráci s námi. Bude uspořádána slavnostní ceremonie na poctu mužů, kteří udrželi tento zbytek [NOR.GetAdjective] nezávislosti během temné noci války." # todo: NEW TRANSLATION
  AAT_Sweden.18.a: "Samozřejmě, Narvik patří [NOR.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden.18.b: "Nárok na Narvik uplatníme jako odplatu za naše úsilí" # todo: NEW TRANSLATION
  AAT_Sweden.19.t: "[SWE.GetNameDefCap] vrací Narvik" # todo: NEW TRANSLATION
  AAT_Sweden.19.desc: "Je to slavný den, když je [Nor.GetName] opět sjednoceno. [SWE.GetName] laskavě přijala naši žádost o vrácení Narviku, oblasti, kterou během války chránila švédská vláda. Projevili jsme nejhlubší vděk švédské vládě; toto skutečně předznamenává hlubší spojení mezi našimi zeměmi, které vydrží věky." # todo: NEW TRANSLATION
  AAT_Sweden.19.a: "Norvégie je opět celistvá" # todo: NEW TRANSLATION
  AAT_Sweden.19_tt: "§Y[ROOT.GetNameDefCap]§! nyní bude moci udělit §YNorské ocenění za obranu§! §FPolním velitelům§!." # todo: NEW TRANSLATION
  AAT_Sweden.20.t: "[SWE.GetNameDefCap] odmítá vrátit Narvik" # todo: NEW TRANSLATION
  AAT_Sweden.20.desc: "Během války [SWE.GetNameDef] drzým způsobem okupovalo části naší země pod záminkou „záchrany norského obyvatelstva před ještě horší okupací“. Ukázalo se to být pouze zástěrkou švédské vlády pro rozšíření svých vlastních územních ambicí, protože odmítli vydat obsazená území s odůvodněním \"probíhající světové nestability a nepokojů po válce\". Vidíme skrz to; je to zjevný oportunismus v nejčistší podobě, klamání, které ohrožuje svobodu a integritu našeho státu. Narvik je norský a zůstane ním, silou, bude-li potřeba." # todo: NEW TRANSLATION
  AAT_Sweden.20.a: "Tak tedy válka" # todo: NEW TRANSLATION
  AAT_Sweden.21.t: "[FROM.GetName] nás zve do $scandinavian_defense_union$" # todo: NEW TRANSLATION
  AAT_Sweden.21.desc: "Vzhledem k obavám z poválečného napětí mezi vítěznými mocnostmi [FROM.GetName] tvrdí, že bychom se neměli vracet k neúspěšné politice izolované neutrality, ale měli bysme koordinovat naši vojenskou a zahraniční politiku v regionu, abychom lépe odrazili případnou agresi v budoucnu." # todo: NEW TRANSLATION
  AAT_Sweden.21.a: "Tento návrh není v našem zájmu." # todo: NEW TRANSLATION
  AAT_Sweden.21.b: "Vynikající návrh." # todo: NEW TRANSLATION
  AAT_Sweden.22.t: "[FROM.GetName] odmítá návrh na obranný svaz" # todo: NEW TRANSLATION
  AAT_Sweden.22.desc: "[FROM.GetAdjective] diplomaté nás dnes informovali, že jejich vláda nechce vstoupit do $scandinavian_defense_union$. Tvrdí, že jejich zájmy by byly v tuto chvíli lépe slouženy mimo takovou organizaci." # todo: NEW TRANSLATION
  AAT_Sweden.22.a: "Velké zklamání." # todo: NEW TRANSLATION
  AAT_Sweden.23.t: "[FROM.GetName] žádá o vstup do aliance" # todo: NEW TRANSLATION
  AAT_Sweden.23.desc: "[FROM.GetName] požádalo o vstup do naší aliance kvůli obavám z možného poválečného napětí mezi vítěznými mocnostmi. Přijetí [FROM.GetName] do naší aliance by rozšířilo náš vliv v jejich regionu, ale samozřejmě by nás to zavázalo je bránit, pokud by vypukl další konflikt." # todo: NEW TRANSLATION
  AAT_Sweden.23.a: "Byli by pro naši bezpečnost zatížením." # todo: NEW TRANSLATION
  AAT_Sweden.23.b: "Byli bychom potěšeni, kdyby se k nám připojili." # todo: NEW TRANSLATION
  AAT_Sweden.24.t: "[FROM.GetName] odmítá členství v alianci" # todo: NEW TRANSLATION
  AAT_Sweden.24.desc: "[FROM.GetName] na tuto chvíli odmítli přijmout naše členství v jejich alianci. Vyjádřili obavu, že by rozšíření aliance je mohlo zatáhnout do většího konfliktu. Prozatím se zdá, že jsme na to sami." # todo: NEW TRANSLATION
  AAT_Sweden.24.a: "Velké zklamání. " # todo: NEW TRANSLATION
  AAT_Sweden.25.t: "Investice do zvláštních sil" # todo: NEW TRANSLATION
  AAT_Sweden.25.desc: "Po dlouhé diskusi mezi vrchními důstojníky o tom, jak rozdělit financování pro nové speciální jednotky, se proces zablokoval. Zdá se, že jediný způsob, jak prolomit patovou situaci, je, aby vláda vstoupila a podpořila jeden z návrhů." # todo: NEW TRANSLATION
  AAT_Sweden.25.a: "Rangers by byli nejúčinnější vzhledem k našemu terénu." # todo: NEW TRANSLATION
  AAT_Sweden.25.b: "Mariňáci by nám pomohli dominovat Baltu." # todo: NEW TRANSLATION
  AAT_Sweden.25.c: "Parašutisté by byli nejuniverzálnější silou." # todo: NEW TRANSLATION
  AAT_Sweden.26.t: "[?195.GetName] je ztracen." # todo: NEW TRANSLATION
  AAT_Sweden.26.desc: "Nestalo se to, co jsme mohli očekávat. Naše ozbrojené síly ztratily kontrolu nad [195.GetnameDef], klíčový monument ruského lidu je nyní v rukou nepřítele. To není jen strategická ztráta, ale obrovský zásah do morálky našeho národního cítění a armády. Již nyní je patrný výrazný pokles morálky mezi obyčejnými vojáky a šeptání o dezercích; pokud budeme v této válce pokračovat, uděláme to s vojáky, kteří už nevěří, že jejich život stojí za obětování kvůli marnému boji." # todo: NEW TRANSLATION
  AAT_Sweden.26.a: "Musíme žádat o mír" # todo: NEW TRANSLATION
  AAT_Sweden.26.b: "Takové ponížení si nemůžeme dovolit" # todo: NEW TRANSLATION
  AAT_Sweden.27.t: "[SOV.GetNameDefCap] se vzdává svého nároku na [?146.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden.27.desc: "Poté, co naše koalice obsadila [?146.GetName], jsou ztráty Rudé armády natolik drtivé, že Moskva byla nucena přehodnotit svou agresi. Souhlasili s bílým mírem a slíbili, že dále neprosadí svůj nárok. Ve Stockholmu i Helsinkách je lidnaté veselí — kdo by čekal, že Rudý medvěd je z papíru?" # todo: NEW TRANSLATION
  AAT_Sweden.27.a: "To jistě povzbudí morálku armády" # todo: NEW TRANSLATION
  AAT_Sweden.28.t: "[SWE.GetNameDefCap] žádá o vrácení ztracených území" # todo: NEW TRANSLATION
  AAT_Sweden.28.desc: "Jak se rétorika [SWE.GetLeader] stala stále více imperialistickou, možná by nemělo překvapit, že [SWE.GetLeader.GetSheHe] nyní požaduje navrácení jejich ztracených imperialních držeb. Jakýkoli nárok je zjevně prošlý a v nejlepším případě sporný, ale během konfliktu si nemůžeme dovolit ztrácet spojence. Možná gesto dobré vůle udrží jejich vůdce spokojeného?" # todo: NEW TRANSLATION
  AAT_Sweden.28.a: "Rozhodně ne" # todo: NEW TRANSLATION
  AAT_Sweden.28.b: "Cena za spojence" # todo: NEW TRANSLATION
  AAT_Sweden.29.t: "[FROM.GetNameDefCap] odmítá předat území" # todo: NEW TRANSLATION
  AAT_Sweden.29.desc: "[FROM.GetNameDefCap] odmítl náš požadavek na předání našich bývalých kolonií a uvedl, že náš nárok je tak mimo dobu moderní geopolitiky, že by cokoli jiného než přímé odmítnutí tuto frašku přetáhlo příliš dlouho." # todo: NEW TRANSLATION
  AAT_Sweden.29.a: "Ukažeme jim to" # todo: NEW TRANSLATION
  AAT_Sweden.30.t: "[FROM.GetNameDefCap] předává kolonie" # todo: NEW TRANSLATION
  AAT_Sweden.30.desc: "[FROM.GetNameDefCap] přijalo naši žádost a nyní odevzdává naše bývalé kolonie, což naši vládu značně překvapilo, protože očekávala větší odpor. To vyvolalo protesty v našich nových územích, ale časem jistě utichnou." # todo: NEW TRANSLATION
  AAT_Sweden.30.a: "Špatné napravit dobře" # todo: NEW TRANSLATION
  AAT_Sweden.31.t: "[FROM.GetNameDefCap] žádá Bornholm" # todo: NEW TRANSLATION
  AAT_Sweden.31.desc: "Ambasador [FROM.GetAdjective] přinesl ponuré poselství. Požadují, abychom vrátili Bornholm, tvrdíce, že ostrov nebyl nikdy legálně postoupen [DEN.GetName], protože byl ztracen během povstání. Vzhledem k tomu, že se to stalo v 17. století, je to zjevně tenká zástěrka pro [FROM.GetAdjective] expansionismus." # todo: NEW TRANSLATION
  AAT_Sweden.31.a: "Nemůžeme si dovolit bojovat s [FROM.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden.31.a_tt: "§RToto může nakonec vést k tomu, že [FROM.GetName] bude moci nad námi vytvořit loutkovou vládu§!" # todo: NEW TRANSLATION
  AAT_Sweden.31.b: "To je prostě absurdní" # todo: NEW TRANSLATION
  AAT_Sweden.32.t: "[FROM.GetName] se vzdává Bornholmu" # todo: NEW TRANSLATION
  AAT_Sweden.32.desc: "[FROM.GetNameDefCap] nás informovalo, že nebudou zpochybňovat náš nárok na Bornholm, ale zároveň upozorňují, že jde o bezprecedentní krok, který ohrožuje stabilitu nordických zemí." # todo: NEW TRANSLATION
  AAT_Sweden.32.a: "Beze studu bezprecedentní" # todo: NEW TRANSLATION
  AAT_Sweden.33.t: "[FROM.GetName] odmítá vzdát se Bornholmu" # todo: NEW TRANSLATION
  AAT_Sweden.33.desc: "Vlád a [FROM.GetAdjective] nás informovala, že nebude zvažovat náš nárok na Bornholm, s tvrzením, že náš nárok vypršel před staletími. Pokud jej nevydají dobrovolně, budeme ho muset získat silou, stejně jako před staletími." # todo: NEW TRANSLATION
  AAT_Sweden.33.a: "Znovu přejdeme přes průliv" # todo: NEW TRANSLATION
  AAT_Sweden.34.t: "[FROM.GetName] požaduje autonomní území" # todo: NEW TRANSLATION
  AAT_Sweden.34.desc: "Velvyslanec [FROM.GetAdjective] nás informoval, že je názorem [SWE.GetAdjective] vlády, že jak se mezinárodní řád předefinuje, vláda [THIS.GetAdjective] již není schopna řádně chránit svá zámořská území. Pokud [THIS.GetName] nemůže adekvátně bránit svá území, bylo by na místě, aby vláda postoupila vládu někomu, kdo to dokáže; a [FROM.GetAdjective] by byla preferovaná volba." # todo: NEW TRANSLATION
  AAT_Sweden.34.a: "Nemáme na výběr" # todo: NEW TRANSLATION
  AAT_Sweden.34.a_tt: "§RToto povede k tomu, že [FROM.GetName] bude moci nad námi vytvořit loutkovou vládu§!" # todo: NEW TRANSLATION
  AAT_Sweden.34.b: "To si nemůžeme dovolit" # todo: NEW TRANSLATION
  AAT_Sweden.35.t: "[FROM.GetName] předává [DEN.GetAdjective] zámořská území" # todo: NEW TRANSLATION
  AAT_Sweden.35.desc: "[FROM.GetName] se rozhodlo neochotně postoupit svá autonomní území. To jistě poškodí naše vztahy s [FROM.GetName], ale dlouhodobě to nebude důležité, protože brzy budou vtahována do naší sféry vlivu." # todo: NEW TRANSLATION
  AAT_Sweden.35.a: "Skvělé" # todo: NEW TRANSLATION
  AAT_Sweden.36.t: "[FROM.GetName] odmítá převést [DEN.GetAdjective] zámořská území" # todo: NEW TRANSLATION
  AAT_Sweden.36.desc: "[FROM.GetName] nás informovalo, že nebude poslušno podporovat naši vizi nového světového řádu. Navzdory tlaku [FROM.GetAdjective] vláda tvrdě odmítá vrátit naše oprávněná území." # todo: NEW TRANSLATION
  AAT_Sweden.36.a: "Pak je vezmeme silou" # todo: NEW TRANSLATION
  AAT_Sweden.37.t: "Osud [DEN.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden.37.desc: "Vláda [DEN.GetAdjective] byla natolik oslabená, že již není schopna účinně odolat koncentraci našeho úsilí o prosazení nadvlády nad nimi. Jak jsme kdysi podléhali Dánům, tak se nyní stanou našimi poddanými. Musíme se pouze rozhodnout, co s nimi uděláme, než jim doručíme ultimátum." # todo: NEW TRANSLATION
  AAT_Sweden.37.a: "Použijeme je jako nárazníkovou zónu" # todo: NEW TRANSLATION
  AAT_Sweden.37.b: "$AAT_Sweden.37.a$" # todo: NEW TRANSLATION
  AAT_Sweden.38.t: "[FROM.GetName] se snaží učinit z [DEN.GetName] loutku" # todo: NEW TRANSLATION
  AAT_Sweden.38.desc: "V bezprecedentním kroku [FROM.GetName] požadovalo, abychom odevzdali všechny vládní funkce a instituce jim. Náš hlava státu důrazně protestoval u jejich velvyslance, ale v té době byly poblíž Kodaňě spatřeny [SWE.GetAdjective] bitevní lodě. Dánská vláda byla bezmocná reagovat na takovou hrozbu a oficiální kapitulace byla podepsána o 6 hodin později." # todo: NEW TRANSLATION
  AAT_Sweden.38.a: "Forpulet" # todo: NEW TRANSLATION
  AAT_Sweden.39.t: "$AAT_Sweden.38.t$" # todo: NEW TRANSLATION
  AAT_Sweden.39.desc: "V bezprecedentním kroku [FROM.GetName] požadovalo, abychom odevzdali všechny vládní funkce a instituce jim. Nyní je jasné, že [FROM.GetAdjective] vláda nás místo pomoci postupně podkopávala, dokud nebyla schopna uplatnit nad námi kontrolu." # todo: NEW TRANSLATION
  AAT_Sweden.39.a: "Nikdy už nepřekročí led!" # todo: NEW TRANSLATION
  AAT_Sweden.39.b: "$AAT_Sweden.38.a$" # todo: NEW TRANSLATION
  AAT_Sweden.40.t: "[FROM.GetName] požaduje [145.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden.40.desc: "Stejně jako v roce 1919 [FROM.GetAdjective] vláda znovu zvyšuje napětí ohledně ostrova Åland. Navzdory rozhodnutí Společnosti národů, které udělilo suverenitu ostrovům nám, se [FROM.GetName] zdá neschopno nechat to být. Možná nás považují za oslabené a s implozí Společnosti národů cítí krev v moři; jsou to vůlí pohánění oportunisté." # todo: NEW TRANSLATION
  AAT_Sweden.40.a: "Nemůžeme bojovat s [FROM.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden.40.b: "Nikdy je nepřevedeme" # todo: NEW TRANSLATION
  AAT_Sweden.41.t: "[FROM.GetName] ustupuje!" # todo: NEW TRANSLATION
  AAT_Sweden.41.desc: "[FROM.GetName] ustoupilo a postoupilo nám ostrovy Åland. Konečně byly křivdy minulosti napraveny a jejich správný status byl obnovен." # todo: NEW TRANSLATION
  AAT_Sweden.41.a: "Skvělé" # todo: NEW TRANSLATION
  AAT_Sweden.42.t: "[FROM.GetName] odmítá postoupit [145.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden.42.desc: "[FROM.GetName] nás informovalo, že rozhodně odmítá postoupit [145.GetName], s tvrzením, že záležitost byla již vyřešena Společností národů. Jasně, [FROM.GetName] nadhodnocuje svůj vliv. Měli bychom ukázat [FROM.GetName] chybu jejich cest." # todo: NEW TRANSLATION
  AAT_Sweden.42.a: "Bude naše" # todo: NEW TRANSLATION
  AAT_Sweden.43.t: "[FROM.GetName] požaduje demilitarizaci [148.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden.43.desc: "[FROM.GetName] požaduje, abychom demilitarizovali naši severní hranici. Mají obavy o hrozby vůči svým těžebním provozům, a zároveň zdůrazňují, že jakákoliv hrozba by přišla z Východu, nikoliv ze Západu. Snížilo by to napětí mezi [FROM.GetName] a námi, které rostlo od krize ohledně Åland." # todo: NEW TRANSLATION
  AAT_Sweden.43.a: "Malé gesto by mohlo zmírnit napětí" # todo: NEW TRANSLATION
  AAT_Sweden.43.b: "To zasahuje do naší suverenity" # todo: NEW TRANSLATION
  AAT_Sweden.44.t: "[FROM.GetName] souhlasí s demilitarizací [148.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden.44.desc: "Jako projev dobré vůle [FROM.GetName] souhlasilo s demilitarizací [148.GetName]. Velký krok pro nás v obnovování východního království, pomalu roste náš vliv nad [FROM.GetName]." # todo: NEW TRANSLATION
  AAT_Sweden.44.a: "Jak bylo plánováno" # todo: NEW TRANSLATION
  AAT_Sweden.45.t: "[FROM.GetName] odmítá demilitarizovat [148.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden.45.desc: "[FROM.GetName] odmítlo demilitarizovat [148.GetName], s tvrzením, že nemáme jurisdikci rozhodovat o tom, co [FROM.GetName] dělá na svém území. To jistě znamená, že proti nám aktivně spřádají plány. Je nutné udeřit jako první." # todo: NEW TRANSLATION
  AAT_Sweden.45.a: "Spiklenci?" # todo: NEW TRANSLATION
  AAT_Sweden.46.t: "Otázka [FIN.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden.46.desc: "Je každému jasné, že [FIN.GetName] nemůže odolat [SOV.GetAdjective] hrozbě. Finové mluví o své suverenitě, neschopni si uvědomit, že to, co vnímají jako nezávislost, nebylo uděleno žádnou politickou nebo vojenskou mocí, ale existuje jako důsledek chaosu ruské občanské války. Od té doby tiká hodiny, které brzy dosáhnou nuly, a starý nepřítel znovu vystoupí. Je proto nezbytné, abychom převzali kontrolu nad záležitostmi [FIN.GetAdjective], než to učiní [SOV.GetAdjective]." # todo: NEW TRANSLATION
  AAT_Sweden.46.a: "Udělejme z nich loutku" # todo: NEW TRANSLATION
  AAT_Sweden.46.b: "$AAT_Sweden.46.a$" # todo: NEW TRANSLATION
  AAT_Sweden.47.t: "[FROM.GetName] se snaží učinit z nás loutku" # todo: NEW TRANSLATION
  AAT_Sweden.47.desc: "Je jasné, že sousedovy „obavy“ o svou bezpečnost byly zástěrkou. Ochabeni vůle a ztrátou strategické výhody nebyla naše armáda organizována podle nových geografických realit. Překvapivě byly spatřeny [FROM.GetAdjective] válečné lodě u našeho hlavního města, [FROM.GetAdjective] jednotky překročily demilitarizovanou zónu na severu a ultimátum kapitulace nám bylo doručeno. Mezinárodní společenství nás opustilo." # todo: NEW TRANSLATION
  AAT_Sweden.47.a: "Doufejme, že naši noví pánové budou shovívaví." # todo: NEW TRANSLATION
  AAT_Sweden.48.t: "$AAT_Sweden.47.t$" # todo: NEW TRANSLATION
  AAT_Sweden.48.desc: "Je jasné, že sousedovy \"obavy\" o jejich bezpečnost byly zástěrkou. Vláda [FROM.GetName] nyní požaduje, abychom se s nimi sladili proti společnému nepříteli z Východu. Ustoupit jejich požadavkům by nás pevně postavilo do [FROM.GetAdjective] sféry a podkopalo naši nezávislost. Otázkou zůstává, je-li alternativa horší?" # todo: NEW TRANSLATION
  AAT_Sweden.48.a: "Nikdy už nenecháme náš osud určovat někým jiným" # todo: NEW TRANSLATION
  AAT_Sweden.48.b: "$AAT_Sweden.47.a$" # todo: NEW TRANSLATION
  AAT_Sweden.49.t: "[FROM.GetName] odmítá ustoupit" # todo: NEW TRANSLATION
  AAT_Sweden.49.desc: "[FROM.GetName] odmítlo naše požadavky a kategoricky je zamítlo. Jedná se o zjevné pohrdání našimi obavami a současně ohrožování našich těžebních provozů. Je jediná odpověď." # todo: NEW TRANSLATION
  AAT_Sweden.49.a: "Když diplomacie selže..." # todo: NEW TRANSLATION
  AAT_Sweden.50.t: "[SWE.GetName] žádá [144.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden.50.desc: "[SWE.GetName] požádalo o plnou kontrolu nad přístavem Narvik. Jejich vláda odůvodňuje tuto rétoriku obavami, že by nepřítel mohl vylodit v Narviku a zaútočit na švédské železnorudné doly. Neshoda by mohla vést k dalšímu eskalování do konfliktu." # todo: NEW TRANSLATION
  AAT_Sweden.50.a: "Nestojí to za boj" # todo: NEW TRANSLATION
  AAT_Sweden.50.b: "To je absurdní" # todo: NEW TRANSLATION
  AAT_Sweden.50.a_tt: "§RToto povede k tomu, že [SWE.GetName] bude moci nad námi vytvořit loutkovou vládu§!" # todo: NEW TRANSLATION
  AAT_Sweden.51.t: "[FROM.GetName] ustupuje" # todo: NEW TRANSLATION
  AAT_Sweden.51.desc: "[FROM.GetName] ustoupilo a předalo nám Narvik. To zajišťuje železnou rudu z Gällivare a Kiruny a současně oslabuje [FROM.GetName]." # todo: NEW TRANSLATION
  AAT_Sweden.51.a: "Výborně" # todo: NEW TRANSLATION
  AAT_Sweden.52.t: "$AAT_Sweden.49.t$" # todo: NEW TRANSLATION
  AAT_Sweden.52.desc: "$AAT_Sweden.49.desc$" # todo: NEW TRANSLATION
  AAT_Sweden.52.a: "$AAT_Sweden.49.a$" # todo: NEW TRANSLATION
  AAT_Sweden.53.t: "Otázka [NOR.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden.53.desc: "Vláda [SWE.GetAdjective] bez provokace požádala, abychom stáhli svou armádu a přidali se k novému severskému státu. Zatímco tvrdí, že jde o program spolupráce, je jasné, kdo by byl podřízený a kdo pán. Je to efektivně návrat k bývalým dnům Unie." # todo: NEW TRANSLATION
  AAT_Sweden.53.a: "Nikdy! Ke zbraním" # todo: NEW TRANSLATION
  AAT_Sweden.53.b: "Nemáme dost mocenských páek, abychom odolali" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.1.t: "Stanovte podmínky obchodu s kuličkovými ložisky pro [FROM.FROM.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.1.desc: "Naše kuličková ložiska jsou špičková a hledaná hlavními mocnostmi světa pro jejich stroje války. Vstupujeme do jednání s [FROM.GetName] o výměně těchto neocenitelných položek, ale nejprve musíme rozhodnout, co požadujeme na oplátku." # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.1.a: "Potřebujeme zajistit potraviny" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.1.a_tt: "\n$we_will_gain_tt$\n  Stabilita: §G+2%§!\n  Týdenní pracovní síla: §G+15§!. \nTo lze kumulovat." # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.1.b: "Potřebujeme jejich vojenskou expertizu" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.1.c: "Žádejte sdílení know-how" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.1.c_tt: "\nPokud bude přijato, [SWE.GetNameDef] si bude moci vybrat §G+25%§! bonus k výzkumu buď u §Ylodí§!, §Yradaru§!, §Ysyntetických zdrojů§! nebo §Ypodpůrné technologie§!" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.1.d: "Zrušit jednání prozatím" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.2.t: "[SWE.GetNameDefCap] žádá výměnu potravin za kuličková ložiska" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.2.desc: "[SWE.GetNameDefCap] požádalo vyměnit jejich neocenitelná kuličková ložiska, která by byla významným zdrojem pro naše válečné úsilí, za dovoz potravin. [SWE.GetAdjective] vláda se zdá hledat způsoby, jak zajistit tento životně důležitý dovoz v budoucím konfliktu, protože to byl hlavní problém během blokády během Velké války." # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.2.a: "Vzájemně výhodný obchod" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.2.b: "To si nemůžeme dovolit" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.3.t: "[SWE.GetNameDefCap] žádá výměnu vojenské expertizy za kuličková ložiska" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.3.desc: "[SWE.GetNameDefCap] požádalo vyměnit jejich neocenitelná kuličková ložiska, která by byla významným zdrojem pro naše válečné úsilí, za sdílení naší vojenské expertizy s nimi. [SWE.GetAdjective] vláda se zdá hledat způsoby, jak vyrovnat pole s více vojensky pokročilými evropskými mocnostmi v případném budoucím konfliktu." # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.3.a: "$AAT_Sweden_ball_bearing.2.a$" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.3.b: "$AAT_Sweden_ball_bearing.2.b$" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.4.t: "[SWE.GetNameDefCap] žádá výměnu sdílení znalostí za kuličková ložiska" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.4.desc: "[SWE.GetNameDefCap] požádalo vyměnit jejich neocenitelná kuličková ložiska, která by byla významným zdrojem pro naše válečné úsilí, za naši vědeckou odbornost a pokrok. [SWE.GetAdjective] vláda se zdá hledat způsoby, jak získat převahu v možném konfliktu prostřednictvím vědy, s čímž jim jistě můžeme pomoci." # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.4.a: "$AAT_Sweden_ball_bearing.2.a$" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.4.b: "$AAT_Sweden_ball_bearing.2.b$" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.5.t: "[FROM.GetNameDefCap] přijímá obchod s kuličkovými ložisky" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.5.desc: "$AAT_Sweden.25.desc$\nNyní se musíme zaměřit na to, jaký typ technologie chceme mít lepší přehled, abychom zmenšili rozdíl mezi námi a ostatními velmocemi." # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.5.a: "Podpůrná technologie" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.5.b: "Radarová technologie" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.5.c: "Technologie syntetického oleje" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.5.d: "Technologie lodí" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.6.t: "[FROM.GetNameDefCap] přijímá obchod s kuličkovými ložisky" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.6.desc: "[FROM.GetNameDefCap] laskavě přijalo naši obchodní nabídku. Tento obchod přinese oboustranné výhody. V neklidném světě se stává obchod zásadním nástrojem ke snižování napětí mezi suverénními státy." # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.6.a: "Skvělé zprávy" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.7.t: "[FROM.GetNameDefCap] odmítá obchod s kuličkovými ložisky" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.7.desc: "[FROM.GetNameDefCap] odmítlo jakýkoliv návrh vzájemné obchodní dohody. Uvádějí rychlé zhoršení globálního politického klimatu a že z tohoto důvodu musí být všechny větší vojenské dohody odloženy." # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.7.a: "Škoda" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.8.t: "Obchod s kuličkovými ložisky zrušen po vypuknutí války" # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.8.desc: "Není překvapením, že se po vypuknutí války mezi našimi zeměmi obchod s kuličkovými ložisky oběma vládami násilně zrušil. Tato obchodní dohoda, kdysi oslavovaná jako krok ke zmírnění pomalého postupu ke světové válce, se nepochybně ukázala jako selhání.\nNyní budou tyto klíčové součásti proměněny v válečné stroje, které nakonec přinesou nic než krev, bolest a utrpení." # todo: NEW TRANSLATION
  AAT_Sweden_ball_bearing.8.a: "Bylo to nevyhnutelné?" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.10.t: "[SOV.GetAdjective] nálet na severní [SWE.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.10.desc: "Obyvatelé Pajaly, vesnice blízko [FIN.GetAdjective] hranice, byli dnes zaskočeni sérií explozí, které zničily několik budov a vozidel. Naštěstí nebyl nikdo vážně zraněn. Důkazy jasně naznačují, že exploze způsobily [SOV.GetAdjective] bombardéry, které oblast zaměnily za cíle ve [FIN.GetName]. \n\nMusíme situaci zvládnout, než se veřejné mínění vymkne kontrole. Avšak měli bychom být také opatrní, abychom nevyprovokovali širší konflikt s [SOV.GetNameDef]." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.10.a: "Svět musí slyšet o tomhle aktu agrese." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.10.b: "Přistoupíme k [SOV.GetAdjective] velvyslanectví opatrně, abychom se vyhnuli eskalaci." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.10.c: "Málo co získáme konfrontací se Sověty." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.11.t: "[SWE.GetName] rozhořčené bombardováním Pajaly" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.11.desc: "[SOV.GetAdjective] piloti náhodně provedli nálet na [SWE.GetAdjective] vesnici po záměně s cílem ve [FIN.GetName]. Švédská vláda nyní jedná s pobouřením a upozorňuje svět na tuto nešťastnou nehodu. \n\nMůžeme incident uznat a nabídnout odškodnění za škody, ale to by mohlo vést k tomu, že naši občané začnou zpochybňovat naše vojenské akce ve [FIN.GetName] a mohlo by to být vnímáno ostatními státy jako známka slabosti." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.11.a: "Nemůžeme riskovat, že se dostaneme do širšího konfliktu. Omluvíme se [SWE.GetAdjective] vládě." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.11.b: "Popřít zapojení a obvinit [SWE.GetAdjective] z nastrojování útoku." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.12.t: "[SWE.GetAdjective] diplomaté požadují vysvětlení náletu na Pajalu" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.12.desc: "[SOV.GetAdjective] piloti omylem provedli nálet na [SWE.GetAdjective] vesnici po záměně s cílem ve [FIN.GetName]. Velvyslanci ze [SWE.GetAdjective] velvyslanectví k nám přistoupili a žádají vysvětlení útoku a jak zamýšlíme odškodnit škody. \n\nNaštěstí se o nehodě ještě nerozšířily zprávy, a proto máme příležitost rychle situaci vyřešit, než k eskalaci dojde." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.12.a: "Zaplatíme odškodnění [SWE.GetName] za škody." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.12.b: "Popřeme zapojení a obviníme [SWE.GetAdjective], že útok sami zinscenovali." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.13.t: "[SOV.GetNameDefCap] se omlouvá za bombardování Pajaly" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.13.desc: "Úředníci z [SOV.GetNameDef] se omluvili za nedávný útok v Pajale, trvajíce na tom, že šlo o opravdovou chybu jejich pilotů. Také souhlasili, že nám uhradí škody. Zdá se, že [SOV.GetAdjective] se snaží přijmout více kooperativní tón ve vztazích v naději, že se vyhnou dalšímu vyostření mezi námi." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.13.a: "Považujeme záležitost za vyřešenou." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.14.t: "[SOV.GetNameDefCap] odmítá přiznat zapojení do Pajaly" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.14.desc: "Snažení našich diplomatů pohovořit o incidentu Pajala s [SOV.GetAdjective] úředníky naráží na popírání zapojení. Dále se nás snaží obvinit z útoku jako záminku pro zasahování do jejich vojenských operací ve [FIN.GetName]." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.14.a: "Skandální postoj. Necháme je trpět." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.14.b: "Nemůžeme riskovat kroky, které eskalují situaci." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.15.t: "[SWE.GetName] posílá vojenskou pomoc" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.15.desc: "[SOV.GetAdjective] bombardéry byly nedávno spatřeny přelétávat naše vzdušné prostory do [SWE.GetName] a bombardovat vesnici, mylně považovanou za [FIN.GetAdjective] cíl. Od té doby vypukla diplomatická krize mezi [SOV.GetNameDef] a [SWE.GetName], která eskalovala do té míry, že [SWE.GetAdjective] se rozhodli aktivně dodávat nám zbraně k boji proti [SOV.GetAdjective]. Zůstává otázkou, jak Sověti zareagují." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.15.a: "Tragické, jsme vděční našim [SWE.GetAdjective] sousedům." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.16.t: "Napětí snižuje s [SWE.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.16.desc: "Po sérii vyostřeného napětí mezi [SWE.capital.GetCapitalVictoryPointName] a [SOV.capital.GetCapitalVictoryPointName] se napětí konečně zdá klesat. [SWE.GetAdjective] vláda ustoupila od své agresivní rétoriky kolem incidentu Pajala a zdá se, že přijali, že nemáme důvod přiznat se. " # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.16.a: "Konečně, ať ustoupili." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.17.t: "[SWE.GetName] eskaluje napětí vyzbrojováním [FIN.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.17.desc: "Po neúspěšném pokusu [SWE.GetName] pošpinit naši reputaci ohledně náletu na Pajalu nyní otevřeně vyzbrojují [FIN.GetAdjective] armádu výzbrojí pro pěchotu. Je to jasný pokus vydírat nás, abychom přijali odpovědnost za útok, nebo riskovali větší ztráty sovětským vojákům. \n\nMusíme pečlivě zvážit další krok, abychom zabránili plnému zapojení [SWE.GetAdjective] do války jako spojence [FIN.GetAdjective]." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.17.a: "Escalujeme, abychom de-eskalovali tím, že pohrozíme válkou, pokud nepřestanou." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.17.b: "Musíme [SWE.GetAdjective] uklidnit. Prozatím." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.18.t: "[SOV.GetNameDefCap] požaduje ukončení dodávek zbraní" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.18.desc: "Naše úmyslně provokativní zásilky zbraní do [FIN.GetName] upoutaly pozornost [SOV.GetNameDef]. Diplomaté z Moskvy nás informovali, že [SOV.GetLeader] považuje naše kroky za ekvivalent připojení se ke konfliktu proti [SOV.GetNameDef] a že budou podniknuty veškeré nezbytné kroky proti nám." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.18.a: "[SOV.GetLeader] jen blufuje, nenecháme se zviklat. Pokračujte v zásilkách." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.18.b: "Nemůžeme riskovat další eskalaci se Sověty." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.19.t: "[SWE.GetName] odmítá ultimátum" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.19.desc: "[SWE.GetAdjective] diplomaté dali najevo, že nemají v úmyslu zastavit dodávky zbraní dříve, než uznáme naše zapojení do náletu na Pajalu a zaplatíme odškodnění. Pokud nebudeme jednat podle našich hrozeb, ostatní mocnosti regionu nás mohou považovat za snadný cíl. Avšak zapojení více států do naší operace ve [FIN.GetAdjective] by mohlo eskalovat do globálního konfliktu." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.19.a: "Nechali nám žádnou volbu." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.19.b: "Musíme [SWE.GetAdjective] uklidnit. Prozatím." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.20.t: "[SWE.GetName] navrhuje protisovětskou alianci" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.20.desc: "S nedávnou eskalací napětí mezi [SWE.GetName] a [SOV.GetNameDef] do otevřeného konfliktu navrhla [SWE.GetAdjective] diplomatická reprezentace úzkou spolupráci v rámci vojenské aliance proti našemu společnému nepříteli." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.20.a: "Společně můžeme překonat [SOV.GetAdjective] hrozbu." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.20.b: "Zvládneme to sami." # todo: NEW TRANSLATION
  SWE_nordic_defense_pact: "Severský obranný pakt" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.21.t: "[SWE.GetAdjective]-[FIN.GetAdjective] aliance" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.21.desc: "S nedávnou eskalací napětí mezi [SWE.GetName] a [SOV.GetNameDef] do otevřeného konfliktu diplomaté navrhují, abychom oslovili jejich [FIN.GetAdjective] protějšky a utvořili vojenskou alianci proti našemu společnému nepříteli." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.21.a: "Měli bychom podporovat větší spolupráci mezi našimi zeměmi." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.21.b: "Porazíme [SOV.GetLeader] bez [FIN.GetAdjective] podpory." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.22.t: "[FIN.GetName] odmítá návrh aliance" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.22.desc: "[FIN.GetAdjective] diplomaté nás informovali, že navzdory sdílenému společnému nepříteli v [SOV.GetNameDef] jsou jejich strategické cíle příliš odlišné od našich. Proto bohužel odmítli náš návrh aliance." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.22.a: "Škoda." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.30.t: "Tranzitní práva v [SWE.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.30.desc: "Ačkoli jsme získali pevný základ v Skandinávii, přeprava jednotek a vybavení přes Dánské průlivy může být nebezpečná. Konvoje často padají za oběť útokům ze vzduchu a námořním útokům na otevřeném moři. Proto by bylo pro naše válečné úsilí užitečné minimalizovat používání námořních tras.\n\nMohlo by stát za to vyvíjet tlak na sousední [SWE.GetName], aby nám umožnili přístup k jejich železničním a komunikačním sítím. Musíme však být taktičtí a postupně podkopávat jejich neutralitu, pokud chceme zabránit tomu, aby se stali základnou pro naše nepřátele." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.30.a: "Požádejme [SWE.GetName] o humanitární tranzit po jejich železnici." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.30.b: "Nepotřebujeme [SWE.GetAdjective] infrastrukturu." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.31.t: "[GER.GetName] žádá tranzitní práva pro zraněné" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.31.desc: "Byli jsme osloveni zástupci [GER.GetAdjective] vlády s žádostí o omezené použití naší železniční sítě, aby zranění vojáci a osoby na dovolené mohli cestovat do a z [GER.GetNameDef] přes [SWE.GetName] a [DEN.GetName]. Ačkoli trvají, že žádost je čistě humanitární, není těžké si představit, že to využijí k postupnému podkopávání naší neutrality." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.31.a: "Přežití je důležitější než neutralita." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.31.b: "Odmítněte žádost a připomeňte jim naši neutralitu." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.32.t: "[SWE.GetName] odmítá žádost" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.32.desc: "[SWE.GetName] tvrdohlavě odmítlo umožnit nám přístup k jejich infrastruktuře, přičemž se odvolává na svůj závazek k neutralitě. Možná potřebují pevnější odpověď, aby si připomněli, že jejich pokračující nezávislost je pouze odměnou od nás za jejich poslušnost, jak reorganizujeme Evropu." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.32.a: "Informujte je, že [GER.GetLeader] začíná pochybuje o jejich neutralitě." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.32.b: "Opusťme to, nemůžeme riskovat, že se připojí k nepříteli." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.33.t: "Adolf Hitler zpochybňuje neutralitu [SWE.GetAdjective]" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.33.desc: "Dostali jsme silně formulovaný telegram z [GER.Capital.GetCapitalVictoryPointName], že [GER.GetLeader] je znepokojen naším odmítnutím jejich nedávné žádosti. Zjevně [GER.GetAdjective] vůdce začíná zpochybňovat naši neutralitu a věří, že naše nedávné kroky naznačují sklouzávání k stranění nepřátelům [GER.GetName]. \n\nZdá se, že by byli ochotni eskalovat situaci do konfliktu, pokud bude třeba. Možná je čas přehodnotit naši současnou pozici." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.33.a: "Přežití je důležitější než neutralita." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.33.b: "Nebudeme se nechat zastrašit [GER.GetLeader], začněte mobilizovat naše síly. " # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.34.t: "[SWE.GetName] zvyšuje vojenskou pohotovost" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.34.desc: "Švédská armáda byla záměrně postavena do zvýšeného stavu pohotovosti, patrně aby demonstrovala svou ochotu odolat našemu nátlaku. Musíme postupovat opatrně, jinak riskujeme, že se zapleteme do dalšího konfliktu ve Skandinávii." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.34.a: "Začněte přípravy na útok proti [SWE.GetName] a pošlete jim ultimátum." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.34.b: "Nestojí to za riziko." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.35.t: "[GER.GetName] vydává ultimátum" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.35.desc: "[GER.GetNameDefCap] vydalo tvrdé ultimátum, ve kterém požaduje, abychom ustoupili jejich nedávným požadavkům na přístup k naší infrastruktuře. Pokud selžeme, budou nás považovat za nepřítele [GER.GetNameDef] a použijí veškerou sílu k zabezpečení svých zájmů ve Skandinávii." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.35.a: "Přežití je důležitější než neutralita." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.35.b: "Pokud je válka nevyhnutelná, měli bychom bojovat za svých podmínek." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.35.c: "Necháme se neodchýlit od naší neutrality." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.36.t: "Napětí s [GER.GetNameDef] klesá" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.36.desc: "Nedávné napětí s [GER.GetNameDef] naštěstí začíná opadat. Přes veškerý jejich blaf se zdá, že jsme dokázali zvládnout velmi obtížnou diplomatickou situaci. Přesto bychom měli být ostražití, protože naše nedávné kroky pravděpodobně vyvolaly mnoho zášti vůči nám v [GER.Capital.GetCapitalVictoryPointName]." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.36.a: "Doufejme, že udržíme neutralitu." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.37.t: "[SWE.GetName] odmítá ultimátum" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.37.desc: "Švédská vláda tvrdě odmítla naše ultimátum s tím, že bychom neměli chápat jejich neutralitu jako přiznání slabosti nebo nepřipravenosti. Pokračovali, že naše armáda by měla počítat s těžkými ztrátami na životech, pokud se nepřiměřeně postaví proti [SWE.GetName]. \n\nMůže to být jen blaf, ale pozorování švédských jednotek naznačují, že jsou ochotni bojovat za svou nezávislost." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.37.a: "Nemůžeme riskovat, že se vojensky přetížíme." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.37.b: "Zahajte invazi do [SWE.GetName]." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.38.t: "[SWE.GetName] zahajuje preventivní útok" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.38.desc: "Zdá se, že jsme vážně podcenili ochotu Švédů bojovat. Navzdory více než století neutrality [SWE.GetAdjective] ozbrojené síly dnes provedly preventivní úder proti našim jednotkám v Norsku, který nás zaskočil. Ačkoli výsledek konfliktu není jistý, je těžké si nepřiznat určité uznání odvaze našich [SWE.GetAdjective] protějšků." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.38.a: "[SWE.GetName] bude pouhým poznámkovým údajným v naší historii." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.39.t: "[SWE.GetName] povoluje tranzit zraněných" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.39.desc: "[SWE.GetName] povolilo našim zraněným vojákům a těm na dovolené cestovat železniční sítí zpět do [GER.GetNameDef]. Trvají však na tom, že pouze neozbrojené osoby mohou tak učinit a budou platit přísné kvóty, aby se zajistilo, že ve Švédsku nikdy nebude příliš mnoho vojáků najednou. " # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.39.a: "Výborně, vyhneme se dalšímu jejich rozhořčení." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.39.b: "Pokračujte v tlaku, možná získáme přístup i ke komunikačním sítím." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.40.t: "[GER.GetName] žádá přístup k telefonním a telegrafním sítím" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.40.desc: "Jak jsme se obávali, nedávná žádost Německa o přístup k naší železnici se nyní rozšířila. [GER.Adjective] vláda žádá možnost použít naše telegrafní a telefonní sítě, aby mohla přímo komunikovat mezi [NOR.GetName] a [GER.GetNameDef].\n\nUstoupit tomuto požadavku by byl další úder na naši neutralitu, nicméně bychom mohli prošetřit odposlech komunikačních linek a špehovat, co [GER.GetAdjective] armáda plánuje." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.40.a: "Přežití je důležitější než neutralita." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.40.b: "Můžeme toho využít v náš prospěch." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.40.c: "Nemůžeme opustit naši neutralitu." # todo: NEW TRANSLATION
  SWE_spying_on_GER: "Špehujeme německou komunikaci proudící naší sítí" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints_tt_arne_beurling: "Odemkne §YArne Beurling§! ($MODIFIER_DECRYPTION_POWER$: §G+15§!) jako poradce" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.41.t: "[SWE.GetName] povoluje přístup k telefonním a telegrafním sítím" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.41.desc: "Komunikace mezi [GER.Capital.GetCapitalVictoryPointName] a našimi silami v [NOR.GetName] se díky spolupráci švédské vlády značně zjednodušila. Možná bychom se jim měli vyhnout provokaci dál, abychom nepřišli o vyjednané ústupky." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.41.a: "Výborně, získali jsme od nich maximum." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.41.b: "Měli bychom udělat poslední pokus o plný vojenský přístup." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.42.t: "[GER.GetName] žádá vojenský přístup" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.42.desc: "Nespokojeni s předchozími ústupky od nás, vláda [GER.GetNameDef] požádala o vojenský přístup, aby ulehčila tlak na jejich vojenské operace ve Skandinávii. Zdá se zřejmé, že to byla vždy jejich původní snaha a nesplnění jejich požadavků bude odstraněno jako záminka [GER.GetLeader] k invazi do [SWE.GetName]. Nicméně pokud přístup povolíme, naši sousedé a nepřátelé [GER.GetNameDef] nás pravděpodobně budou považovat za komplicy jejich okupace [NOR.GetName]." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.42.a: "Nemáme sílu bojovat proti [GER.GetName]." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.42.b: "Musíme odolat tomuto požadavku, pokud nechceme být zataženi do války." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.43.t: "[SWE.GetName] povoluje vojenský přístup" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.43.desc: "[SWE.GetName] nám poskytlo úplný vojenský přístup do jejich země. To nejenže usnadní naše operace ve Skandinávii, ale také zvyšuje náš vliv nad [SWE.GetName] a zabraňuje jim snadno se přidat k našim nepřátelům." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.43.a: "Jsou pod naší kontrolou vším kromě jména." # todo: NEW TRANSLATION
  SWE_GER_military_access_tt: "§Y[GER.GetFlag][GER.GetNameDefCap]§! §Rzíská vojenský přístup do§! §Y[SWE.GetFlag][SWE.GetName]§!" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.50.t: "Nepřítel uvnitř" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.50.desc: "I když jsme vždy sledovali aktivity krajní levice, není nemožné předvídat, že komunisté budou sabotovat naši armádu nebo šířit nespokojenost v klíčových odvětvích, aby ulehčili [SOV.GetAdjective] vpád do [SWE.GetName]. Proto bychom měli předcházet takové činnosti internováním těch, kteří jsou známi jako sympatizanti [SOV.GetNameDefCap] nebo obecně radikální levice." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.50.a: "Nemůžeme riskovat, že způsobí potíže. Zavřeme je." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.50.b: "To je nepřijatelné v demokratické společnosti. " # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.51.t: "Rozhořčení nad rozhodnutím o internacích" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.51.desc: "Po našem rozhodnutí internovat radikální levicové aktivisty po celé [SWE.GetName] se razie a zatčení setkaly s ostrým odporem od pracujících. Mnozí pomáhají radikálům uniknout zadržení nebo přímo útočí na policisty. Tvrdí, že masové věznění znamená vznik policejního státu. Musíme být opatrní, jak postupujeme, nebo se věci mohou rychle vymknout." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.51.a: "Pošleme armádu, aby podpořila policii." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.51.b: "To byla chyba, musíme propustit ty, které jsme již zatkli." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.52.t: "Masové protesty a násilí kvůli zatýkání levicových aktivistů" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.52.desc: "Naše rozhodnutí podpořit policii armádou při zatýkání radikálních levicových aktivistů vyvolalo spirálu násilí, která hrozí pohltit národ občanskou válkou. Srážky mezi dělníky a policií vedly k mnoha úmrtím a zraněním. Radikálové, které se nám nepodařilo zatknout, mobilizují dělníky proti nám a volají po úplném zrušení vlády. Navíc jsme zaznamenali vojáky, kteří odmítají vykonávat rozkazy a dokonce dezerují. To může být nejvážnější situace, v níž se národ nachází za více než století." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.52.a: "Nemůžeme nechat tuto hrstku zničit náš národ. " # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.52.b: "Musíme zastavit zatýkání, ničíme zemi." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.53.t: "[SWE.GetAdjective] občanská válka vypuká" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.53.desc: "Sporadické násilí posledních týdnů se nyní formuje do organizovaných hnutí po celé zemi. Většina z nich je spojena s $SWE_communism_party_long$ a může být dokonce afilována s [SOV.GetNameDef].\n\nKomunistické milice obsadily řadu urbanizovaných oblastí a začaly zatýkat kohokoli spojeného s našimi plány zadržovat levici. Mezitím nacionalistické milice, často podporované místní policií, vytvářejí ozbrojené skupiny, aby zabránily svým městům padnout komunistům. Násilí mezi oběma skupinami a naší armádou eskalovalo natolik, že lze hovořit o občanské válce." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.53.a: "Tato revoluce je dávno opožděná." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.53.b: "Rozdrtíme tyto agenty [SOV.GetNameDef]." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.54.t: "Napětí v [SWE.GetName] klesá" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.54.desc: "Nedávné napětí mezi úřady a těmi, kteří protestovali proti naší internaci levicových aktivistů, začíná polevovat. I když se ztratilo mnoho důvěry mezi vládou a lidmi, už nejsme v bezprostředním riziku, že se situace promění v sektářský konflikt." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.54.a: "Bylo to o fous od katastrofy." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.56.t: "Návrh na Gotland" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.56.desc: "Poté, co se několik vysokých armádních důstojníků přidalo k komunistickým revolucionářům, je důvěra v jakoukoli jinou odvětví než v námořnictvo na historickém minimu. S nedávnou aktivitou, která ohrožuje bezpečí krále, se navrhují drastická opatření, aby se zajistilo jeho přežití. Admiralitě se podařil odvážný plán obnovit kontrolu přesunutím krále na ostrov Gotland a zřízením vojenské správy loajálních, která by vládla z bezpečí ostrova." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.56.a: "Nemůžeme opustit pevninu." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.56.b: "Výborný návrh." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.57.t: "Král Švédska zraněn při pokusu o evakuaci" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.57.desc: "Brzy ráno se švédská vláda rozhodla evakuovat krále z hlavního města a přesunout ho na bezpečnější místo na Gotland. Konvoj byl zachycen partyzány a královo vozidlo bylo zasaženo, čímž byla rozbita čelní skla.\nPři následné přestřelce král utrpěl vážné zranění, které trvale poškodilo jeho levé oko. Jak vláda uniká na ostrov, slibuje návrat jako legitimní vláda Švédska, ale kolují zvěsti, že král sám převzal faktickou kontrolu nad vládou a získal novou energii po svém zranění." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.57.a: "Jaký složitý nepořádek" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints_civil_war_tt: "§RSnížení stability §Y[SWE.GetFlag][SWE.GetName]§! může vést k občanské válce, pokud komunisté udrží vysokou podporu!§!" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.60.t: "[SWE.GetName] obsazuje Landsverk" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.60.desc: "[SWE.GetName] obsadilo Landsverk, společnost, kterou jsme spolu s [SWE.GetAdjective] provozovali na vývoj obrněných vozidel. I když už užitečnost Landsverk pro nás v posledních letech klesla, je to jasný signál, že [SWE.GetName] chce distancovat od [GER.GetNameDef]." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.60.a: "Pak my obsadíme [SWE.GetAdjective] aktiva v [THIS.GetNameDef]." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.60.b: "Landsverk už dávno přestal sloužit svému účelu." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.61.t: "[FROM.GetName] konfiskuje švédská aktiva" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.61.desc: "V razantní eskalaci po našem zabavení Landsverk reagovala vláda [GER.GetNameDef] konfiskací mnoha aktiv v jejich zemi, která mají vazby na [SWE.GetAdjective] občany. I když jsme chtěli pomalu se vzdálit od [GER.GetNameDef], toto rozhodnutí vyvolalo pobouření mezi [SWE.GetAdjective] veřejností." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.61.a: "Uvidíme, jak si poradí bez našeho obchodu." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.61.b: "Nepřekvapivé, ale nešťastné." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.62.t: "[FROM.GetName] vyhlašuje obchodní embargo vůči [GER.GetNameDef]" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.62.desc: "[SWE.GetNameDef] dnes posunulo napětí na novou úroveň vyhlášením obchodního embarga vůči [GER.GetNameDef]. Toto rozhodnutí výrazně ovlivní naši schopnost produkovat železo pro zbrojní průmysl." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.62.a: "Pokud s námi nebudou obchodovat, už nebudeme respektovat jejich hranice." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.62.b: "Escalace by jen ukázala naši závislost na menších zemích." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.63.t: "[FROM.GetNameDefCap] hrozí válkou" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.63.desc: "Naše nedávné embargo vůči [GER.GetNameDef] bylo ve [GER.Capital.GetCapitalVictoryPointName] přijato pobouřeně. Pravděpodobně panika kvůli historické závislosti na švédské železné rudě je vedla k vydání ultimáta. Říkají, že pokud embargo okamžitě nezrušíme, budou nuceni podniknout drastické kroky proti nám, včetně války." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.63.a: "Odmítněte jejich ultimátum." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.63.b: "Nemůžeme si takový konflikt dovolit." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.64.t: "[FROM.GetNameDefCap] odmítá ultimátum" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.64.desc: "[SWE.GetNameDef] pevně odmítlo naše ultimátum. Prohlásili, že jakýkoliv útok proti nim nezlepší přístup k jejich zásobám rudy, protože měniče dolů zničí dříve, než naše jednotky stihnou obsadit doly." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.64.a: "To si přivodili sami." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.64.b: "Zvládneme to bez nich." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.65.t: "[FROM.GetNameDefCap] ruší embargo" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.65.desc: "Vláda [SWE.GetAdjective] konečně uznala rozum a rozhodla se zrušit embargo proti nám. Obchod může chvíli trvat, než se plně normalizuje, ale jasně jsme jim ukázali, že je stále můžeme přivést na kolena, pokud bude potřeba." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.65.a: "Teď už chápou své místo ve světě." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.70.t: "Zakoupené lodě opouštějí přístavy [ITA.GetAdjective]" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.70.desc: "Naše nedávno zakoupené lodě z [ITA.GetName] právě opustily přístav. Cesta do [SWE.GetNameDef] jim potrvá přibližně měsíc kvůli nutnosti doplňovat palivo na cestě." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.70.a: "Šťastnou plavbu." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.71.t: "Bývalé [ITA.GetAdjective] lodě míří do [SWE.GetName] " # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.71.desc: "Čtyři bývalé [ITA.GetAdjective] torpédoborce dnes dorazily do jednoho z našich přístavů. Lodě koupila [SWE.GetAdjective] vláda a probíhá jejich převod do [SWE.GetName]. Zatímco doplňují palivo, mohli bychom lodě obsadit a potenciálně je použít my. I když by to pravděpodobně poškodilo vztahy se [SWE.GetName]." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.71.a: "Mohli bychom ty lodě lépe využít." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.71.b: "Nechceme poškodit vztahy se [SWE.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.72.t: "[ENG.GetName] zabírá naše nové lodě" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.72.desc: "Při zastávce v přístavu kontrolovaném [ENG.GetAdjective] námořnictvem byly naše čtyři nové lodě zabaveny jejich flotou. Zdá se, že využívají právo 'angarie' jako záminku k záběru. Musíme postupovat opatrně, pokud chceme lodě získat zpět bez vyvolání války." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.72.a: "To je akt války. Musí je propustit nebo ponesou následky." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.72.b: "Nemůžeme si dovolit válku s [ENG.GetName]." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.73.t: "[SWE.GetName] požaduje propuštění lodí" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.73.desc: "Švédská vláda jasně dala najevo, že považuje náš zabavení jejich plavidel za akt války a bude nucena reagovat, pokud je okamžitě neuvolníme." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.73.a: "Nemáme v úmyslu je uvolnit." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.73.b: "V tom není nic výhodného, když lodě zadržujeme." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.74.t: "[SWE.GetName] přijímá internaci lodí" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.74.desc: "Švédská vláda se zdá vzdala snahu získat své lodě zpět. Po několika drobných úpravách jsou lodě nyní připraveny do služby v naší flotile." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.74.a: "Neměli na výběr." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.75.t: "[ENG.GetName] odmítá propustit lodě" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.75.desc: "Vláda [ENG.GetAdjective] kategoricky odmítla propustit naše internované lodě. Zdá se, že je jediný způsob, jak je získat zpět, bojovat o ně." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.75.a: "Získali si nového nepřítele." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.75.b: "Nestojí to za válku." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.76.t: "[ENG.GetName] propouští lodě" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.76.desc: "Napětí mezi [ENG.GetName] a [SWE.GetName] konečně opadlo po propuštění našich lodí. Zjevně [ENG.GetAdjective] nechtěli zaplést do konfliktu s námi kvůli několika starým lodím." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.76.a: "Těšíme se, až je uvidíme." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.77.t: "Nové lodě dorazily bezpečně" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.77.desc: "Lodě, které jsme koupili od [ITA.GetNameDef], dorazily bez větších problémů. Posádky hlásí, že při doplňování paliva v přístavech byly pod velkým dohledem." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.77.a: "Budou nám velmi užitečné." # todo: NEW TRANSLATION
  FIN_agree_peace_with_SWE: "Finsko souhlasilo postoupit nám Åland výměnou za mír" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.78.t: "[SWE.GetName] žádá kontrolu Åland" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.78.desc: "[SWE.GetName] je stále více znepokojeno strategicky umístěnými ostrovy Åland, které by mohly být použity k ovládnutí Baltského moře.\nVzhledem k naší současné situaci a většinovému obyvatelstvu ostrovů, které mluví [SWE.GetAdjective], se jejich vláda ptá, zda bychom byli ochotni ostrovy vzdát, dokud se svět nezklidní. Jako důvod uvádějí snahu zabránit tomu, aby se ostrovy dostaly do rukou nepřátel, a potřebu chránit [SWE.GetAdjective] občany." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.78.a: "Åland je náš a zůstane tak" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.78.b: "Je to správná volba" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.78.c: "Pokud nám [SWE.GetName] zaplatí" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.79.t: "[FIN.GetName] odmítá" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.79.desc: "[FIN.GetName] nám velmi přímo odpovědělo 'ne' ohledně převodu kontroly nad ostrovy Åland." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.79.a: "Škoda" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.80.t: "[FIN.GetName] souhlasí" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.80.desc: "Vzhledem k jejich prekérní situaci raději vidí ostrovy pod naší kontrolou než pod cizí okupací. Místní obyvatelé, kteří již většinově mluví [SWE.GetAdjective], to přijali dobře a jejich životy pokračují jako obvykle." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.80.a: "Skvělé" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.81.t: "[FIN.GetName] souhlasí, za cenu" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.81.desc: "[FIN.GetName] přiznává, že je ochotno se Åland vzdát, ale zdůrazňují, že jsou nyní finančně velmi ohroženi. Jsou ochotni nám ostrovy postoupit za část státních rezerv na kompenzaci ztráty příjmů." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.81.a: "Stojí to za to" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.81.b: "Ne" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.82.t: "[SWE.GetName] souhlasí" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.82.desc: "[SWE.GetName] souhlasilo finančně nás odškodnit za Åland. Transakce probíhá a proběhla malá ceremonie; ačkoli někteří Ålané jsou pochopitelně znepokojeni o svou budoucnost, [SWE.GetAdjective] úřady prohlašují, že přechod bude co nejhladší a že respektují jejich způsob života." # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.82.a: "Nutné náklady" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.83.t: "[SWE.GetName] odmítá" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.83.desc: "[SWE.GetName] \"rozhodlo, že nechce utratit tolik rezerv na převod Åland.\"" # todo: NEW TRANSLATION
  AAT_Sweden_flashpoints.83.a: "[SWE.GetName] \"Tak s tím nechtěli vystoupit dost\"" # todo: NEW TRANSLATION
  AAT_Sweden_BoP.10.t: "Volební kampaň - ekonomická politika" # todo: NEW TRANSLATION
  AAT_Sweden_BoP.10.desc: "Opět nastala volební sezóna a strany bojující o kontrolu nad Riksdagem jsou v plném proudu kampaně. Hlavní otázkou, která zdá se zaujala voliče, je ekonomika. Zatímco někteří hájí pokračování současných politik, jiní chtějí radikální změnu, ale jen jedna z možností získává podporu." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.10.a: "Ekonomika musí být spravována dělnickou třídou a pro ni." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.10.b: "Musíme najít střední cestu mezi extrémy kapitalismu a komunismu." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.10.c: "Proč dusíme nejúspěšnější ve společnosti tak vysokým zdaněním?" # todo: NEW TRANSLATION
  AAT_Sweden_BoP.10.d: "Rozšíření armády sníží nezaměstnanost a zvýší národní bezpečnost." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.11.t: "Volební kampaň - sociální politika" # todo: NEW TRANSLATION
  AAT_Sweden_BoP.11.desc: "Kampaň se přesunula k sociální politice, strany nyní prezentují, jak plánují řešit společenské problémy. Některé strany prosazují radikální přetvoření vlády, jiné opatrnější přístup postupnými změnami. Jen jedno poselství se ale zdá rezonovat s voličstvem." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.11.a: "Nemůže být sociální rovnost, dokud buržoazie nebude odstraňena z moci." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.11.b: "Lepší přístup ke vzdělání a zdravotní péči pomůže vyvést lidi z chudoby." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.11.c: "Musíme udělat více pro podporu těch mimo velká města." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.11.d: "Zapomněli jsme, co znamená být [ROOT.GetAdjective], potřebujeme více vlastenecké výchovy." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.12.t: "Volební kampaň - zahraniční politika" # todo: NEW TRANSLATION
  AAT_Sweden_BoP.12.desc: "S blížícím se dnem voleb se debaty přesunuly k naléhavé otázce národní bezpečnosti a zahraniční politiky. Mnohé strany prosazují neutralitu a izolacionismus, aby udržely zemi v bezpečí, zatímco jiné tlačí na více asertivní směřování zahraniční politiky. V tak nebezpečném světě se jen jedno poselství zdá dávat naději voličům." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.12.a: "Dělníci světa se musí spojit proti imperialistickým válkám agrese." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.12.b: "Musíme zachovat neutralitu a zároveň vybudovat silný vojenský odstrašující prostředek." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.12.c: "Jsme slabí a zranitelní, musíme být lépe připraveni na válku." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.12.d: "Jediný způsob, jak zajistit mír v regionu, je prosadit nad ním naši kontrolu." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.14.t: "Volební výsledky" # todo: NEW TRANSLATION
  AAT_Sweden_BoP.14.d_socialist: "Den voleb přišel a voliči rozhodli. $SWE_communism_party_long$ sestaví v příštích dnech většinovou vládu. Zdá se, že jejich radikální politiky znárodňování, třídní solidarity a odmítání zahraničních imperialistických zapojení oslovily veřejnost. Zůstává otázkou, kolik jejich slibů bude skutečně splněno." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.14.d_democratic: "Den voleb přišel a voliči rozhodli. $SWE_democratic_party_long$ sestaví v příštích dnech většinovou vládu. Zatímco někteří věřili, že sliby Folkhemmetu zastaraly, tento výsledek je vyvrací. Teď jim zbývá dokončit, co začali." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.14.d_non_aligned: "Den voleb přišel a voliči rozhodli. $SWE_neutrality_party_long$ sestaví v příštích dnech většinovou vládu. Jejich plán posílit národní obranu a politiky k přilákání venkovských voličů jasně uspěl. Nyní musí vytvořit romantizovanou verzi [ROOT.GetName], kterou během kampaně slibovali." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.14.d_fascist: "Den voleb přišel a voliči rozhodli. $SWE_fascism_party_long$ sestaví v příštích dnech většinovou vládu a nikdo se zdá netěší tak překvapení jako ostatní. Jak dlouho demokratický aparát [ROOT.GetName] přežije pod novým režimem, je nejisté." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.14.d_left: "Den voleb přišel a přestože se strany snažily, žádné z nich nezískalo většinu křesel v Riksdagu. Avšak socialisté a sociální demokraté se dohodli na koalici. Zda koalice vydrží celé volební období, je nejisté, ale možná strach z pravice ji udrží pohromadě." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.14.d_right: "Den voleb přišel a přestože se strany snažily, žádné z nich nezískalo většinu křesel v Riksdagu. Konzervativci a fašisté se však dohodli na koalici. Zda koalice vydrží celé volební období, je nejisté, ale možná strach z levice ji udrží pohromadě." # todo: NEW TRANSLATION
  AAT_Sweden_BoP.14.a: "Voliči promluvili. " # todo: NEW TRANSLATION
  SWE_folkhemmet_event_result_tt: "Po přijetí této politiky bude duch Folkhemmetu mít tyto hodnoty:\n" # todo: NEW TRANSLATION
  AAT_Sweden_strike.1.t: "Nepokoje v [?SWE.GetNameDef]" # todo: NEW TRANSLATION
  AAT_Sweden_strike.1.desc: "Možnost potravinové blokády podobné té za Velké války vedla k protestům mezi [SWE.GetAdjective] dělníky. Podněcováni místními agitátory se nespokojenost rozšířila z továren do celostátního problému. Musíme stabilizovat situaci a zajistit, aby vláda byla vnímána jako silná a vedoucí ruka v těchto nejistých dobách." # todo: NEW TRANSLATION
  AAT_Sweden_strike.1.a: "Teď nemůžeme nic dělat, jen čekat" # todo: NEW TRANSLATION
  AAT_Sweden_strike.1.b: "Musíme investovat do zvýšení morálky lidí a uklidnit situaci" # todo: NEW TRANSLATION
  AAT_Sweden_strike.2.t: "Násilné nepokoje po celé zemi" # todo: NEW TRANSLATION
  AAT_Sweden_strike.2.desc: "Bohužel se nám nepodařilo zastavit protesty. Skoro každý dělník, švadlena a truhlář se zdá být v ulicích protestujících proti vládní politice. K situaci přispívá i to, že mnoho protestů přechází do násilí a zraněni jsou jak civilisté, tak policie." # todo: NEW TRANSLATION
  AAT_Sweden_strike.2.a: "Nakonec se uklidní" # todo: NEW TRANSLATION
  AAT_Sweden_strike.2.b: "Musíme to ihned zastavit" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.1.t: "[SWE.GetAdjective] národní socialisté žádají zásah" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.1.desc: "Zástupci vedoucí národní socialistické strany ve [SWE.GetName] se na nás obrátili s nabídkou. Jsou v procesu svržení své současné vlády a žádají nás o podporu v jejich pokusu. Výměnou za vojenskou podporu souhlasili, že zemi pevně zařadí do naší sféry vlivu." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.1.a: "Nemůžeme si dovolit poslat jednotky, ale můžeme jim zaslat podporu." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.1.b: "Podpoříme je." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.2.t: "[FROM.GetNameDefCap] odmítá návrh" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.2.desc: "Vláda [GER.GetAdjective] náš návrh odmítla s tím, že nechtějí vytvořit další frontu pro jejich přetíženou armádu. Nicméně poslali několik pušek a dobrovolníků jako gesto dobré vůle." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.2.a: "Je to lepší než nic." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.3.t: "[FROM.GetNameDefCap] souhlasí s návrhem" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.3.desc: "Vedení [GER.GetAdjective] souhlasilo nás vojensky podpořit při zajišťování kontroly nad touto zemí. Výměnou za jejich podporu jsme souhlasili stát se součástí jejich širší sféry vlivu na kontinentu. Doufáme, že nás jednoho dne budou považovat za rovné." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.3.a: "Znovu vstaneme z popela, silnější než dřív!" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.4.t: "Sjednotit hnutí národních socialistů" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.4.desc: "Národně socialistické hnutí je příliš roztříštěné, aby převzalo moc ve [SWE.GetName]. Pokud se to má změnit, hnutí musí přestat s drobnými vnitřními spory a sjednotit se za jedním pravým vůdcem." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.4.a: "$SWE_sven_olov_lindholm$ může sjednotit různé nacionalistické frakce." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.4.b: "$SWE_birger_furugard$ je předurčen stát se vůdcem [SWE.GetName]." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.5.t: "Katastrofální pochod Stormtrupper v [FROM.FROM.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.5.desc: "Obavy z narušení pochodu Stormtrupper v [FROM.FROM.GetName] vyvrcholily, když se obě skupiny násilně střetly na ulicích. Mnozí byli zraněni a zabiti na obou stranách, ale veřejné mínění se zdá být na straně antifasistů a Stormtrupper byli nuceni ukrýt se v místním obchodě, dokud nepřijela policie." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.5.a: "Ztrácejí hybnost." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.6.t: "Bezproblémový pochod Stormtrupper v [FROM.FROM.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.6.desc: "Dnešní pochod Stormtrupper v [FROM.FROM.GetName] byl překvapivě nudnou záležitostí. Jen několik členů se shromáždilo a prošli se hlavními ulicemi, zatímco lidé pokračovali ve svých povinnostech. Navzdory malému počtu se Stormtrupper začínají stát běžnou součástí [SWE.GetAdjective] politiky." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.6.a: "Pomalu si budují hybnost." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.7.t: "Úspěšný pochod Stormtrupper v [FROM.FROM.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.7.desc: "S podporou místní policie, která držela protivníky stranou, se Stormtrupperům podařilo uspořádat masový pochod v [FROM.GetName]. Procházejí hlavní třídou a byli povzbuzováni nadšenými příznivci stojícími v ulicích." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.7.a: "Obnoví [SWE.GetName]." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.8.t: "Členové aristokracie nabízejí podporu" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.8.desc: "Členové aristokracie jsou dlouho nespokojeni s tím, že jejich vliv na národní záležitosti byl omezen ve prospěch volených úředníků. Mnozí souhlasili, že využijí své zbývající zdroje k podpoře našeho nacionalistického hnutí. Výměnou očekávají politické ústupky, pokud hnutí získá kontrolu nad Riksdagem." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.8.a: "Malá cena za obnovení národa do velikosti." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.9.t: "Průmyslníci nabízejí podporu" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.9.desc: "Švédský průmysl se stává čím dál konkurenceschopnějším vůči zahraničním konkurentům kvůli zásahům sociálních demokratů a Landsorganisationen. Řada předních průmyslníků proto souhlasila s podporou našeho nacionalistického hnutí, pokud se zavážeme rozpuštěním odborů jednou provždy." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.9.a: "Odbory budou zlikvidovány." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.10.t: "Vojenské složky nabízejí podporu" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.10.desc: "Nechybí počet důstojníků, kteří jsou nespokojeni se špatným řízením obrany státu pod současnou administrativou. Mnozí vyšší důstojníci z armády a námořnictva proto souhlasili, že podpoří nacionalistickou věc výměnou za navýšení obranného rozpočtu, až přijedeme k moci." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.10.a: "[SWE.GetName] se stane opět velmocí." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.11.t: "Podpora z venkova roste" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.11.desc: "Mnozí mimo městská centra cítí, že je sociální demokraté opomíjejí. Navíc se bojí industrializace a obávají se, že jejich tradiční způsob života mizí. Zaséváním nespokojenosti mezi nimi jsme dokázali vytvořit vlnu podpory pro nacionalistické hnutí, které slibuje investice na venkov a obnovu tradičních hodnot." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.11.a: "Venkovský lid je páteří národa." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.16.t: "Katastrofální královská návštěva v [FROM.FROM.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.16.desc: "Skupina antimonarchistů se podařilo narušit královu návštěvu v [FROM.FROM.GetName] dnes. Navzdory snahám policie zadržet protestující zablokovali plánovanou trasu králova vozu, což ho donutilo výlet zrušit z obavy, že by ho mohli vnést do nebezpečnější situace." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.16.a: "Lidé nemají úctu ke svým pánům." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.17.t: "Bezproblémová královská návštěva v [FROM.FROM.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.17.desc: "Králova návštěva v [FROM.FROM.GetName] byla spíše nudná. Král doufal, že se shromáždí dav, ale jen několik příznivců stálo v ulicích. Král byl údajně rozmrzelý a zahanben a slíbil, že se v budoucnu nebude účastnit takových pošetilostí." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.17.a: "Musí v tom pokračovat, aby si budoval podporu" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.18.t: "Úspěšná královská návštěva v [FROM.FROM.GetName]" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.18.desc: "Králova návštěva v [FROM.FROM.GetName] se proměnila v velké posílení popularity monarchie. Nadšení příznivci mávali [SWE.GetAdjective] vlajkami a házeli květiny před královskou procesí. Ačkoli byli nějací odpůrci, byli drženi daleko od průvodu místní policií." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.18.a: "S takovou podporou můžeme obnovit autoritu krále." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.19.t: "Fika s králem" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.19.desc: "Během tajného setkání v paláci krále v [SWE.Capital.GetCapitalVictoryPointName] se vedoucí různých nacionalistických hnutí setkali s monarchou, aby projednali svou touhu vidět [SWE.GetName] obnovené do bývalé slávy. Po dlouhé debatě o koordinaci hnutí do soudržného celku bylo rozhodnuto, že až přijde ten správný čas, měl by král Gustaf znovu prosadit svou roli vládce místo figurky. Král váhá se závazkem, ale souhlasil, že se více zapojí do politických záležitostí, začínaje cestou po říši, aby změřil podporu mezi lidem." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.19.a: "Musíme ukázat králi, že pro naši velkou zemi ještě není pozdě." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.20.t: "[FROM.GetName] chce rozšířit svou kontrolu" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.20.desc: "Náš věrný subjekt, [FROM.GetName], požádal, abychom jim rozšířili odpovědnost přiřčením území na severu [SOV.GetName]. Toto by nám umožnilo zmírnit břemeno okupace na naše poddané a zaměřit se na velkého nepřítele." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.20.a: "Dobrý plán" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.20.b: "Všechna území patří Říši!" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.21.t: "[FROM.GetName] odevzdává kontrolu nám" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.21.desc: "Berlín se rozhodl dát nám větší odpovědnost předáním větší části severních území, čímž se efektivně formuje správní oblast Reichskommissariat Nordland" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.21.a: "Náš vliv roste" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.22.t: "[FROM.GetName] odmítá náš návrh" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.22.desc: "Berlín se rozhodl náš požadavek neschválit s odůvodněním, že nejsme připraveni na obrovskou odpovědnost spojenou s tak rozsáhlou výměnou území. Možná se bojí dávat Reichskommissariatu příliš moci?" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.22.a: "Možná to byla chyba.." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.23.t: "Nůž ve tmě" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.23.desc: "Německý loutkový stát [SWE.GetName] nám poslal posla na tajnou misi bez vědomí svého pána. [SWE.GetAdjective] stát vidí, co se děje, a teď hledá cestu ven z tohoto konfliktu a přišel k nám s návrhem. Připravuje se na rozsáhlé přepadení, aby svržel [GER.GetAdjective] pevninu, zatímco jsou jejich síly zaměstnány jinde, ale zdůrazňují, že se nemohou bránit ve dvou frontách. Navrhují, abychom zatím předstírali loajalitu, ale až přejdou na naši stranu, podepíšeme bílý mír a budeme bojovat bok po boku.\nNěkdy je nůž ve tmě efektivnější než beranidlo na plné světlo." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.23.a: "To je vynikající nápad" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.23.a_tt: "§Y[SWE.GetName]§! se v pravý čas vzbouří proti svému pánovi a přidá se k nám v boji" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.23.b: "Všichni fašisté musí být pohnáni k odpovědnosti" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.24.t: "[FROM.GetName] přijímá náš návrh" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.24.desc: "[FROM.GetName] náš návrh přijalo. Jakmile přijde vhodný čas, domluví se na bílém míru, abychom mohli společně svrhnout [GER.GetName]." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.24.a: "Zoufale kroky, jistě, ale nutné." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.25.t: "[FROM.GetName] odmítá náš návrh" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.25.desc: "[FROM.GetName] náš návrh odmítlo. Byla to dlouhá sázka, ale stálo to za to vzhledem k naší zoufalé situaci." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.25.a: "Zdá se, že jsme sami" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.26.t: "[FROM.GetName] se vzbouří" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.26.desc: "Brzy ráno jsme ztratili kontakt s našimi emisary v [FROM.GetName] a několik brigád, které zde vykonávaly hlídkovou službu, se zdálo, že se všechny vzdaly. Volání na [SWE.GetAdjective] vládu pro vysvětlení bylo bez odpovědi; je nyní zřejmé, že náš neposlušný loutkový stát má větší plány, které nás nezahrnují." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.26.a: "Verdammt" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.27.t: "[FROM.GetName] hlásí nárok na [FIN.GetAdjective] území" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.27.desc: "Náš věrný subjekt, [FROM.GetName], požádal o rozšíření své odpovědnosti udělením území ve [FIN.GetName]. To by nám umožnilo zmírnit břemeno okupace na našich poddaných a zaměřit se na velkého nepřítele." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.27.a: "Skvělý nápad" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.28.t: "$AAT_Sweden_nationalists.21.t$" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.28.desc: "$AAT_Sweden_nationalists.21.desc$" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.28.a: "$AAT_Sweden_nationalists.21.a$" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.29.t: "$AAT_Sweden_nationalists.22.t$" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.29.desc: "$AAT_Sweden_nationalists.22.desc$" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.29.a: "$AAT_Sweden_nationalists.22.a$" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.30.t: "[FROM.GetName] nárokuje [FIN.GetAdjective] území" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.30.desc: "Německý loutkový stát, [SWE.GetName], požádal Adolfa Hitlera, aby uznal jejich nároky na naše území. To je výmysl, který jen slouží oboustrannému rozmachu expanze." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.30.a: "Ošklivá lest" # todo: NEW TRANSLATION
  AAT_Sweden_nordic_defense_council.1.t: "[SWE.GetNameDef] nás zve do severské obranné rady" # todo: NEW TRANSLATION
  AAT_Sweden_nordic_defense_council.1.desc: "Jak se svět připravuje na nevyhnutelný střet mezi hlavními evropskými mocnostmi, severské země riskují, že budou při vznikajícím náporu přejaty. [FROM.GetAdjective] vláda navrhuje, abychom jako severské státy vytvořili jednotnou armádu, abychom společně vytvořili soudržnější obranu." # todo: NEW TRANSLATION
  AAT_Sweden_nordic_defense_council.1.a: "Máme jiné plány" # todo: NEW TRANSLATION
  AAT_Sweden_nordic_defense_council.1.b: "Připojíme se jako členská frakce" # todo: NEW TRANSLATION
  AAT_Sweden_nordic_defense_council.1.c: "Připojíme se jako integrovaní členové rady" # todo: NEW TRANSLATION
  AAT_Sweden_nordic_defense_council.2.t: "[FROM.GetName] se přidává k severské obraně" # todo: NEW TRANSLATION
  AAT_Sweden_nordic_defense_council.2.desc: "[FROM.GetName] se rozhodlo připojit k naší unii. Alespoň teď, kdyby se stalo nečekané, nejsme sami." # todo: NEW TRANSLATION
  AAT_Sweden_nordic_defense_council.2.a: "Skvělé" # todo: NEW TRANSLATION
  AAT_Sweden_nordic_defense_council.3.t: "[FROM.GetName] odmítá návrh severské obrany" # todo: NEW TRANSLATION
  AAT_Sweden_nordic_defense_council.3.desc: "[FROM.GetName] odmítlo se k nám připojit, navzdory probíhajícímu napětí ve světě. Zdá se, že preferují jinou politiku, doufejme, že ne jednu, která poškodí náš status na světové scéně" # todo: NEW TRANSLATION
  AAT_Sweden_nordic_defense_council.3.a: "Škoda" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.12.t: "Aristokracie vítá reformy" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.12.desc: "Kromě právních expertů nikdo netušil, že naše nedávné reformy v podstatě znamenaly obnovení aristokratických privilegií. Samozřejmě, s médii pod naší kontrolou, takoví odborníci neměli způsob, jak šířit nespokojenost mezi veřejností. Mezitím jsou členové aristokracie nadšeni a těší se, že napraví křivdy posledních desetiletí." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.12.a: "Doufejme, že nám nebudou stát v cestě." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.13.t: "Průmyslníci povzbuzeni ekonomickými reformami" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.13.desc: "Přední průmyslníci očekávají rekordní zisky a dividendy v nadcházejících letech po kriminalizaci odborů. S odbory zakázanými budou moci průmyslníci odstranit byrokracii, kterou jim v posledních letech vkládali sociální demokraté, a tím zvýšit ekonomický růst." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.13.a: "Takové reformy byly dávno zpožděné." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.14.t: "Plány na rozšíření armády" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.14.desc: "Ministr války oznámil, že vojenský rozpočet bude zvýšen na základě doporučení předních důstojníků, kteří dlouho tvrdili, že země je špatně vybavena k obraně. S navýšeným rozpočtem se věrnost armády našemu novému režimu zdá být zajištěna." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.14.a: "Udržet armádu na naší straně bude vždy prioritou." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.15.t: "Podpora z venkova zůstává silná" # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.15.desc: "Po masivních investicích do venkovské infrastruktury se venkovští pracovníci stali jedněmi z nejhlasnějších podporovatelů naší vlády. S jejich podporou a vlivem nad národním potravinovým řetězcem máme pevný blok, který může v budoucnu držet městské dělníky na uzdě." # todo: NEW TRANSLATION
  AAT_Sweden_nationalists.15.a: "Taková podpora upevní náš úchop moci." # todo: NEW TRANSLATION
  SWE_royal_visit_in_progress: "Královská návštěva je již v průběhu." # todo: NEW TRANSLATION
  SWE_appeal_for_support_in_progress: "Již získává podporu frakce." # todo: NEW TRANSLATION
  AAT_Sweden_communism.1.t: "Šepoty o fašistické kontrarevoluci" # todo: NEW TRANSLATION
  AAT_Sweden_communism.1.desc: "Konečně jsme se dostali u moci ve vládě, a zatímco [ROOT.GetDemocraticParty] s grácií přijala vůli voličů, krajně pravicové strany jsou méně vstřícné a zpochybňují legitimitu hlasování. Zatím jsou to jen disidenti, ale měli bychom dbát, aby se tato nespokojenost dále nerozšířila." # todo: NEW TRANSLATION
  AAT_Sweden_communism.1.a: "Znepokojivé" # todo: NEW TRANSLATION
  AAT_Sweden_communism.2.t: "Neloajalita v armádě" # todo: NEW TRANSLATION
  AAT_Sweden_communism.2.desc: "Vládní vyšetřování armády vyústilo ve spis, který spojuje několik vysokých velitelů s podzemním fašistickým hnutím snažícím se podkopat zvolenou vládu. Zpráva poznamenává, že vojenská rétorika o politickém směru země zesílila, a doporučuje, aby se s takovou rétorikou něco udělalo." # todo: NEW TRANSLATION
  AAT_Sweden_communism.2.a: "Ještě více znepokojující" # todo: NEW TRANSLATION
  AAT_Sweden_communism.3.t: "Chybějící zbrojní zásoby" # todo: NEW TRANSLATION
  AAT_Sweden_communism.3.desc: "Vládní vyšetřování odhalilo, že vysokokapacitní vojenské zbraně zmizely ze zásob armády. Zpráva uvádí, že zatím nelze určit, kde zásoby skončily, ale až 60 % zmizelo, než si toho někdo všiml." # todo: NEW TRANSLATION
  AAT_Sweden_communism.3.a: "Toto může být jen vnitřní práce někoho z vysokého postavení." # todo: NEW TRANSLATION
  AAT_Sweden_communism.4.t: "[ROOT.GetFascistParty] a armáda přebírají kontrolu nad Stockholmem" # todo: NEW TRANSLATION
  AAT_Sweden_communism.4.desc: "Dne [?global.date.GetDateStringShortMonth] bylo z Riksdagu slyšet několik hlasitých ran a neznámí ozbrojení muži v hnědých košilích se objevili po celém hlavním městě. Vláda byla evakuována a vyzvala místní policii a národní gardu k obnově pořádku, ale výzva zůstala bez odezvy. Šíří se zvěsti, že fašistické hnědé košile vytvářejí koalici s nejvyššími generály ve snaze vytvořit dočasnou vládu. Díky jednotlivým vojákům stále věrným skutečné vládě se celému štábu podařilo uniknout z hořícího hlavního města." # todo: NEW TRANSLATION
  AAT_Sweden_communism.4.a: "Vrátíme se." # todo: NEW TRANSLATION
  AAT_Sweden_communism.5.t: "Hlavní vůdci odhaleni" # todo: NEW TRANSLATION
  AAT_Sweden_communism.5.desc: "Byly nalezeny tajné zásoby těžkých zbraní ve skladech po městských centrech v [ROOT.GetName]. Záznamy o tom, kdo platil za tyto sklady, všechny vedou k [ROOT.GetFascistParty] a vůdci paramilitantních skupin spojených s stranou Brownshirts byli zatčeni.\nDopisy nalezené v jednom ze skladů rovněž vyzradily generály zapojené do spiknutí, kteří tyto zbraně zpronevěřili a falšovali inventární čísla. Takt je zde naprosto zásadní, protože tito vůdci mohou mít vliv na významnou část ozbrojených sil." # todo: NEW TRANSLATION
  AAT_Sweden_communism.5.a: "Obžalovat je." # todo: NEW TRANSLATION
  AAT_Sweden_communism.5.b: "\"Propagovat\" vůdce mimo moc." # todo: NEW TRANSLATION
  AAT_Sweden_communism.6.t: "Osud rodu Bernadotte" # todo: NEW TRANSLATION
  AAT_Sweden_communism.6.desc: "V této osvícené době se zdá zvláštní lpět na monarchii, zvláště monarchii bez moci. Stará hlava státu si stále strká nos do politiky, navzdory několikerým varováním, že takové chování je nevhodné a protiústavní. Co je horší, čím dál více se přiklání k extrémní pravici, hledajíce starou slávu carů, císařů a králů. To není budoucnost společnosti a jsme dávno za potřebou monarchy; je načase zabavit jejich majetky ve prospěch lidu a nechat je žít jako normální lidé, jací jsou." # todo: NEW TRANSLATION
  AAT_Sweden_communism.6.a: "Zabavme jejich majetek, budou pracovat jako všichni ostatní" # todo: NEW TRANSLATION
  AAT_Sweden_communism.7.t: "Kilbom směřuje k sesazení Flyg" # todo: NEW TRANSLATION
  AAT_Sweden_communism.7.desc: "Karl Kilbom se chystá převzít kontrolu nad stranou. To rozděluje stranu na dvě poloviny, jedna podporuje Flyg a druhá Kilboma. To ohrožuje stabilitu našeho politického vítězství a pokud to bude pokračovat, můžeme ztratit moc úplně. Musíme rozhodnout, kdo nás povede do světlé budoucnosti [SWE.GetName]." # todo: NEW TRANSLATION
  AAT_Sweden_communism.7.a: "Kilbom nás povede do budoucnosti" # todo: NEW TRANSLATION
  AAT_Sweden_communism.7.b: "Flyg je odpověď" # todo: NEW TRANSLATION
  AAT_Sweden_communism__7_tt_1: "Tímto se sblížíme se spojenci" # todo: NEW TRANSLATION
  AAT_Sweden_communism__7_tt_2: "Tímto se sblížíme s Němci" # todo: NEW TRANSLATION
  AAT_Sweden_communism.7.c: "Vlastně, stalinismus možná není tak špatný nápad" # todo: NEW TRANSLATION
  denmark_political_events.1.t: "Návrh na vyslovení nedůvěry" # todo: NEW TRANSLATION
  denmark_political_events.1.desc: "Vedení [Den.GetLeader] se v poslední době stalo předmětem přísné kritiky a Rigsdag požaduje, aby premiér odstoupil." # todo: NEW TRANSLATION
  denmark_political_events.1.a: "Hlasování o nedůvěře" # todo: NEW TRANSLATION
  denmark_political_events.1.b: "Vyhlásit předčasné volby!" # todo: NEW TRANSLATION
  DEN_available_candidates_tt: "§YDostupní kandidáti:§!" # todo: NEW TRANSLATION
  denmark_political_events.2.t: "Hlasování o novém vedení" # todo: NEW TRANSLATION
  denmark_political_events.2.desc: "Rigsdag rozhodl podat návrh na vyslovení nedůvěry vedení premiéra [Den.GetLeader]. Otázka je, kdo by měl jeho místo zaujmout?" # todo: NEW TRANSLATION
  denmark_political_events.2.a: "Sociální demokraté, nebo chaos!" # todo: NEW TRANSLATION
  denmark_political_events.2.b: "Potřebujeme liberální vládu" # todo: NEW TRANSLATION
  denmark_political_events.2.c: "Lidová revoluce bez krveprolití" # todo: NEW TRANSLATION
  denmark_political_events.2.d: "Potřebujeme tradici a stabilitu" # todo: NEW TRANSLATION
  denmark_political_events.2.e: "Musíme zkusit něco nového" # todo: NEW TRANSLATION
  DEN_prime_minister_resigns_tt: "§Y[DEN.GetLeader]§! odstupuje z funkce §Ypředsedy vlády§!" # todo: NEW TRANSLATION
  denmark_political_events.3.t: "Plánování volební kampaně" # todo: NEW TRANSLATION
  denmark_political_events.3.desc: "[GetElectionCampaignDesc]" # todo: NEW TRANSLATION
  denmark_political_events.3.desc_annual_election: "Je opět čas, aby [DEN.GetNameDef] uspořádalo volby. Různé strany plánují své nadcházející kampaně, aby shromáždily své stoupence a mobilizovaly voliče pro své cíle." # todo: NEW TRANSLATION
  denmark_political_events.3.desc_snap_election: "Vyhlášení předčasných voleb přimělo strany [DEN.GetNameDef] rychle sestavit kampaně, které by přesvědčily voliče k jejich stranám." # todo: NEW TRANSLATION
  denmark_political_events.3.a: "Demokracie nebo chaos" # todo: NEW TRANSLATION
  denmark_political_events.3.b: "Naplánovat komunistickou kampaň" # todo: NEW TRANSLATION
  denmark_political_events.3.c: "Naplánovat kampaň Bondepartiet" # todo: NEW TRANSLATION
  denmark_political_events.3.d: "Naplánovat fašistickou kampaň" # todo: NEW TRANSLATION
  denmark_political_events.4.t: "Zahájení demokratické kampaně" # todo: NEW TRANSLATION
  denmark_political_events.4.desc: "Zdá se, že mezi různými demokratickými stranami panuje spor o to, jak sestavit své kampaně. Někteří nechtějí stupňovat už tak vysoké napětí a chtějí zachovat slušný tón po celou dobu kampaně. Jiní tvrdí, že právě proto je třeba přejít do ofenzivy a získat drtivé vítězství – aby se udržely temné tendence na uzdě. Ještě jiní zase tvrdí, že by měli aktivně útočit na své oponenty, aby je udrželi mimo moc." # todo: NEW TRANSLATION
  denmark_political_events.4.a: "Zůstaňme slušní" # todo: NEW TRANSLATION
  denmark_political_events.4.b: "Přejít do ofenzívy" # todo: NEW TRANSLATION
  denmark_political_events.4.c: "Útočit na naše oponenty" # todo: NEW TRANSLATION
  denmark_political_events.5.t: "Zahájení kampaně $DEN_communism_party$" # todo: NEW TRANSLATION
  denmark_political_events.5.desc: "V řadách $DEN_communism_party_long$ vypukl spor ohledně nadcházející volební kampaně. Někteří nechtějí stupňovat už tak vysoké napětí a chtějí zachovat slušný tón po celou kampaň. Jiní argumentují, že právě proto musíme přejít do ofenzívy — abychom udrželi zlo na uzdě. Ještě jiní zase tvrdí, že bychom měli aktivně útočit na naše oponenty, aby je to od moci odradilo." # todo: NEW TRANSLATION
  denmark_political_events.6.t: "Zahájení kampaně $DEN_neutrality_party$" # todo: NEW TRANSLATION
  denmark_political_events.6.desc: "V řadách $DEN_neutrality_party_long$ vypukl spor ohledně nadcházející volební kampaně. Někteří nechtějí stupňovat napětí a chtějí zachovat slušný tón. Jiní tvrdí, že aby mohli realizovat naši vizi pro [DEN.GetNameDef], musíme přejít do ofenzívy. A další zase tvrdí, že útoky na oponenty jsou jediný způsob, jak je oslabit a posílit nás." # todo: NEW TRANSLATION
  denmark_political_events.7.t: "Zahájení kampaně $DEN_fascism_party$" # todo: NEW TRANSLATION
  denmark_political_events.7.desc: "V $DEN_fascism_party_long$ vypukl spor ohledně nadcházející volební kampaně. Někteří váhají stupňovat už tak vysoké napětí a prosazují zachování slušného tónu. Jiní argumentují, že aby bylo možné realizovat naši vizi pro [DEN.GetNameDef], musíme přejít do ofenzívy. A další zase tvrdí, že útok na naše oponenty je jediný způsob, jak je oslabit a posílit nás." # todo: NEW TRANSLATION
  denmark_political_events.8.t: "Formování nové vlády" # todo: NEW TRANSLATION
  denmark_political_events.8.desc: "Dánské volby skončily. Různé strany udělaly, co mohly, aby přesvědčily lidi hlasovat pro své cíle. Kampaň možná skončila — ale někteří by řekli, že nejtěžší část teprve začíná; formování vlády. Volba předsedy vlády určí směr [DEN.GetNameDef] na předvídatelnou dobu." # todo: NEW TRANSLATION
  denmark_political_events.8.a: "Zvolit demokratického předsedu vlády" # todo: NEW TRANSLATION
  denmark_political_events.8.b: "$DEN_aksel_larsen$ nás uvede do nové éry!" # todo: NEW TRANSLATION
  denmark_political_events.8.c: "$DEN_knud_bach$ nás povede správným směrem" # todo: NEW TRANSLATION
  denmark_political_events.8.d: "Dopřejme $DEN_frits_clausen$ vzestup" # todo: NEW TRANSLATION
  denmark_political_events.9.t: "Demokratický předseda vlády" # todo: NEW TRANSLATION
  denmark_political_events.9.desc: "S koncem dánských voleb je jasným vítězem demokracie. Na rozdíl od jednotných komunistů nebo uniformních fašistů nejsou demokratické strany monolit. Každá strana má svou vizi, jak nejlépe provést [Den.GetNameDef] bouřlivými časy, které nás čekají. Otázka zní, kdo by měl mít právo sestavit novou vládu?" # todo: NEW TRANSLATION
  denmark_political_events.9.a: "Socialdemokratiet nás uchrání před chaosem" # todo: NEW TRANSLATION
  denmark_political_events.9.b: "Venstre nás udrží svobodné a rozumné" # todo: NEW TRANSLATION
  denmark_political_events.9.c: "Konservative Folkepartiet nás ochrání" # todo: NEW TRANSLATION
  denmark_political_events.10.t: "Politická opozice" # todo: NEW TRANSLATION
  denmark_political_events.10.desc: "Po našem úspěchu v posledních volbách se šíří zákeřné lži, které mají podkopat naši vládu. Je jasné, kdo za těmito zvěstem stojí, ale těžko s tím něco uděláme. Neměli bychom se divit, že se politická opozice sdružuje kolem těchto lží!" # todo: NEW TRANSLATION
  denmark_political_events.10.a: "Fašistické lži!" # todo: NEW TRANSLATION
  denmark_political_events.10.b: "Komunistické lži!" # todo: NEW TRANSLATION
  denmark_political_events.11.t: "Monarchistické hnutí" # todo: NEW TRANSLATION
  denmark_political_events.11.desc: "Ve státě [ROOT.GetNameDef] je něco shnilého! Konečně máme vládu vedenou lidmi pro lidi, ale ne všichni jsou spokojeni. Vzniklo hnutí samoproklamovaných vlastenců, které se sdružuje za zastaralou institucí monarchie. Získávají určitou podporu, ale zatím se nezdají představovat hrozbu. Ještě ne." # todo: NEW TRANSLATION
  denmark_political_events.11.a: "Vraťte se do stínu, odkud jste přišli!" # todo: NEW TRANSLATION
  denmark_occupation_event.1.t: "Bojovat nebo se poddat" # todo: NEW TRANSLATION
  denmark_occupation_event.1.desc: "I když jsme se explicitně prohlásili za neutrální, válka přišla do [DEN.GetNameDef]. Můžeme stále ochránit lidi před hrůzami války, pokud se brzy podvolíme a kapitulujeme. Tímto způsobem bychom mohli získat příznivé ústupky a pokračovat v částečné nezávislosti." # todo: NEW TRANSLATION
  denmark_occupation_event.1.a: "Nemůžeme tuto bitvu vyhrát" # todo: NEW TRANSLATION
  DEN_denmark_keeps_government_form_tt: "[DEN.GetFlag]§Y[DEN.GetNameDefCap]§! si ponechá současnou formu vlády\n\n" # todo: NEW TRANSLATION
  denmark_occupation_event.1.b: "Musíme se postavit a bojovat!" # todo: NEW TRANSLATION
  denmark_occupation_event.2.t: "[DEN.GetNameDefCap] skládají zbraně" # todo: NEW TRANSLATION
  denmark_occupation_event.2.desc: "Obdrželi jsme telegram od dánské vlády a [DEN.GetLeader], v němž jsou vyložené jejich podmínky kapitulace. Pokud jsme ochotni uznat a respektovat jejich suverenitu a územní celistvost, souhlasí s tím, že složí zbraně a stanou se de facto protektorátem pod naším vedením." # todo: NEW TRANSLATION
  denmark_occupation_event.2.a: "Budeme je chránit" # todo: NEW TRANSLATION
  denmark_occupation_event.2.b: "Je to sotva víc než malá překážka" # todo: NEW TRANSLATION
  denmark_occupation_event.3.t: "[FROM.GetNameDefCap] přijímá naši kapitulaci" # todo: NEW TRANSLATION
  denmark_occupation_event.3.desc: "Podepsáním příznivé mírové dohody s [FROM.GetNameDef] na začátku války se nám podařilo zachovat část naší nezávislosti a udržet naši formu vlády. Abychom tuto relativní svobodu uchovali jako de facto [FROM.GetAdjective] protektorát, jsme nuceni s nimi spolupracovat a vytvořit širokou politiku spolupráce. Prozatím." # todo: NEW TRANSLATION
  denmark_occupation_event.3.a: "Přinejmenším si uchováme částečnou nezávislost" # todo: NEW TRANSLATION
  denmark_occupation_event.5.t: "[FROM.GetNameDefCap] odmítl náš návrh" # todo: NEW TRANSLATION
  denmark_occupation_event.5.desc: "[FROM.GetNameDefCap] odmítl naši velkorysou nabídku kapitulace a zvolil násilí a krev. Zkrvavíme [FROM.GetAdjective] jednotky a ukážeme jim, že nejsme tak snadno poraženi!" # todo: NEW TRANSLATION
  denmark_occupation_event.5.a: "K odporu, všichni Dánové!" # todo: NEW TRANSLATION
  denmark_occupation_event.6.t: "[DEN.GetDanishIndependenceTitle]" # todo: NEW TRANSLATION
  denmark_occupation_event.6.t_declares_independence: "[DEN.GetNameDefCap] vyhlašuje nezávislost!" # todo: NEW TRANSLATION
  denmark_occupation_event.6.t_asks_for_independence: "[DEN.GetNameDefCap] žádá o nezávislost" # todo: NEW TRANSLATION
  denmark_occupation_event.6.desc: "[DEN.GetDanishIndependenceDesc]" # todo: NEW TRANSLATION
  denmark_occupation_event.6.desc_declares_independence: "Zdá se, že se Dánové prohlásili nezávislými a tvrdí, že už neuznávají naši hegemonii nad nimi. My jsme jim poskytli stabilitu a bezpečí pod naší ochranou — a to je ten dík?" # todo: NEW TRANSLATION
  denmark_occupation_event.6.desc_asks_for_independence: "Obdrželi jsme delegaci od našeho věrného poddaného [FROM.GetNameDef], vedenou samotným [FROM.GetLeader]. Zřejmě přišli přímo za [ROOT.GetLeader], aby projednali konec jejich podřízenosti a požádali o navrácení svobody." # todo: NEW TRANSLATION
  denmark_occupation_event.6.a: "Nevděční zrádci" # todo: NEW TRANSLATION
  denmark_occupation_event.6.b: "Nemají žádný význam" # todo: NEW TRANSLATION
  denmark_occupation_event.7.t: "Dánská válka za nezávislost" # todo: NEW TRANSLATION
  denmark_occupation_event.7.desc: "[FROM.GetLeader] opět odmítá rozum a odmítá uznat naši nezávislost. Musíme si nárokovat svobodu a bojovat za ni, protože zdá se, že není jiné východisko z tohoto nevolnictví. Krev bude prolita, ale [ROOT.GetNameDef] bude opět svobodný!" # todo: NEW TRANSLATION
  denmark_occupation_event.7.a: "K odporu, všichni Dánové!" # todo: NEW TRANSLATION
  denmark_occupation_event.7.b: "Spravedlnost zvítězí!" # todo: NEW TRANSLATION
  denmark_occupation_event.8.t: "Dánská nezávislost" # todo: NEW TRANSLATION
  denmark_occupation_event.8.desc: "[FROM.GetLeader] tentokrát pochopil a uznal naši nezávislost. Zdá se, že naše nevolnictví končí bez krveprolití." # todo: NEW TRANSLATION
  denmark_occupation_event.8.a: "To bylo... neočekávaně snadné" # todo: NEW TRANSLATION
  denmark_occupation_event.10.t: "Propukají stávky proti okupaci" # todo: NEW TRANSLATION
  denmark_occupation_event.10.desc: "V [DEN.GetNameDef] propukly stávky napříč zemí na protest proti okupaci. Je to pokojný způsob, jak projevit nespokojenost a odpor, ale jistě to poškodí náš vztah s [?DEN.DEN_overlord_nation.GetNameDef]." # todo: NEW TRANSLATION
  denmark_occupation_event.10.a: "Jak... nečekané" # todo: NEW TRANSLATION
  denmark_occupation_event.11.t: "Stávky proti okupaci končí" # todo: NEW TRANSLATION
  denmark_occupation_event.11.desc: "Celonárodní stávky na protest proti [?DEN.DEN_overlord_nation.GetAdjective] okupaci skončily. Dánský lid ukázal okupantům, že naše touha po svobodě a nezávislosti je stále silná." # todo: NEW TRANSLATION
  denmark_occupation_event.11.a: "To je teprve začátek" # todo: NEW TRANSLATION
  denmark_occupation_event.20.t: "Úspěšný nájezd na zásobárny zbraní" # todo: NEW TRANSLATION
  denmark_occupation_event.20.desc: "Po pečlivém plánování a odvážné operaci se skupina členů odboje vrátila z úspěšného nájezdu se zbraněmi určenými pro naše nominální pány. Tento čin posílí náš pokračující boj za svobodu!" # todo: NEW TRANSLATION
  denmark_occupation_event.20.a: "Tyto zbraně se budou hodit" # todo: NEW TRANSLATION
  denmark_occupation_event.30.t: "Civilní průmysl úspěšně sabotován" # todo: NEW TRANSLATION
  denmark_occupation_event.30.desc: "Do této operace bylo vloženo pečlivé plánování a všechny přípravy a dlouhé čekání na vhodné okolnosti se vyplatily. Úspěšně jsme sabotovali kritickou průmyslovou infrastrukturu, která zásobovala [?DEN.DEN_overlord_nation.GetNameDef] dánskými výrobky. Tento odvážný čin omezí množství produktů, které od nás náš nominální pán dostává." # todo: NEW TRANSLATION
  denmark_occupation_event.30.a: "Velký úspěch!" # todo: NEW TRANSLATION
  denmark_occupation_event.40.t: "Úspěšně sabotovány vojenské průmyslové závody" # todo: NEW TRANSLATION
  denmark_occupation_event.40.desc: "Členové odbojového hnutí plánovali měsíce sérii sabotáží a konečně své plány uskutečnili. Sabotáže klíčové vojensko-průmyslové infrastruktury znamenají, že [?DEN.DEN_overlord_nation.GetNameDef] obdrží méně zbraní vyrobených na dánské půdě." # todo: NEW TRANSLATION
  denmark_occupation_event.40.a: "Velký úspěch!" # todo: NEW TRANSLATION
  denmark_occupation_event.100.t: "Přeorientování Dánska" # todo: NEW TRANSLATION
  denmark_occupation_event.100.desc: "Zdá se, že dánská vláda si uvědomila, kde leží její nejlepší zájmy, a přeorientovala svou politiku tak, aby ladila s naší. Obdrželi jsme žádost od [FROM.GetLeader], aby jim bylo dovoleno rozvíjet své vojenské schopnosti a spojit síly s námi. To by jim umožnilo vést agresivnější zahraniční politiku více nezávislou na nás." # todo: NEW TRANSLATION
  denmark_occupation_event.100.a: "Přivítejme naše bratry v zbrani!" # todo: NEW TRANSLATION
  denmark_occupation_event.100.b: "Zvládneme to bez jejich ubohé armády" # todo: NEW TRANSLATION
  denmark_occupation_event.101.t: "[FROM.GetNameDefCap] přijímá náš návrh na alianci" # todo: NEW TRANSLATION
  denmark_occupation_event.101.desc: "Moudrý [FROM.GetLeader] nás laskavě přijal jako spojence a uznává naši schopnost přispět k válečnému úsilí. Také jsme dostali povolení rozvíjet naše vojenské schopnosti. To vše nám umožní vést agresivnější zahraniční politiku a zajistit nordické země pro naše [FROM.GetAdjective] pány." # todo: NEW TRANSLATION
  denmark_occupation_event.101.a: "Opravdu slavný den!" # todo: NEW TRANSLATION
  denmark_occupation_event.102.t: "[FROM.GetNameDefCap] odmítá náš návrh na alianci" # todo: NEW TRANSLATION
  denmark_occupation_event.102.desc: "[FROM.GetLeader] pošetile odmítl naši nataženou ruku, která žádala o zahájení hlubší spolupráce mezi našimi zeměmi, kde bychom [FROM.GetNameDef] mohli pomoci. Zdá se, že raději půjdou sami, než by se spolehli na své spojence." # todo: NEW TRANSLATION
  denmark_occupation_event.102.a: "Podceňují naši sílu!" # todo: NEW TRANSLATION
  denmark_occupation_event.110.t: "[FROM.GetNameDefCap] přísahá svou věrnost" # todo: NEW TRANSLATION
  denmark_occupation_event.110.desc: "Dánská delegace vedená samotným [FROM.GetLeader] dorazila do naší metropole, aby osobně složila přísahu věrnosti [ROOT.GetLeadr] a [ROOT.GetAdjective] věci. Dánská vláda se zdá odhodlána plně přijmout naši spolupráci a pomáhat, jak nejlépe umí." # todo: NEW TRANSLATION
  denmark_occupation_event.110.a: "Přijmout je s otevřenou náručí" # todo: NEW TRANSLATION
  denmark_occupation_event.110.b: "Nechceme jejich věrnost" # todo: NEW TRANSLATION
  denmark_occupation_event.111.t: "[FROM.GetNameDefCap] vítá naši věrnost" # todo: NEW TRANSLATION
  denmark_occupation_event.111.desc: "[FROM.GetLeader] přivítal [ROOT.GetLeader] s otevřenou náručí a uznal naši hodnotu a přínos, který přinášíme partnerství. To spojí naše země blíže a posílí nás oba." # todo: NEW TRANSLATION
  denmark_occupation_event.111.a: "Velký projev důvěry" # todo: NEW TRANSLATION
  denmark_occupation_event.112.t: "[FROM.GetNameDefCap] odmítá naši věrnost" # todo: NEW TRANSLATION
  denmark_occupation_event.112.desc: "[FROM.GetLeader] nerozvážně odvrhl [ROOT.GetLeader] a odmítl naši věrnost, shazující naše schopnosti a rostoucí moc. To nám nechává jen jedinou možnost, pokud chceme někdy znovu získat svobodu: válku." # todo: NEW TRANSLATION
  denmark_occupation_event.112.a: "Dáme jim lekci pokory!" # todo: NEW TRANSLATION
  denmark_resistance_event.1.t: "[DEN.GetNameDefCap] hledá naši podporu" # todo: NEW TRANSLATION
  denmark_resistance_event.1.desc: "Obdrželi jsme zprávu doručenou v nejpřísnějším utajení od [DEN.GetNameDef]. Ti tiše hledají spojence, kteří by podpořili jejich nárok na nezávislost, až přijde ten den a budou se snažit znovu získat suverenitu od [?DEN.DEN_overlord_nation.GetNameDef]. Chceme se v tomto konfliktu postavit na jejich stranu?" # todo: NEW TRANSLATION
  denmark_resistance_event.1.a: "Za svobodné [DEN.GetNameDef]!" # todo: NEW TRANSLATION
  denmark_resistance_event.1.b: "Mají to sami na svědomí" # todo: NEW TRANSLATION
  DEN_supports_denmark_TT: "Souhlasíme podpořit a spojit se s [DEN.GetFlag]§Y[FROM.GetNameDef]§!, pokud vyhlásí nezávislost" # todo: NEW TRANSLATION
  denmark_resistance_event.2.t: "[FROM.GetNameDefCap] souhlasil, že nás podpoří" # todo: NEW TRANSLATION
  denmark_resistance_event.2.desc: "Statečný [FROM.GetLeader] se rozhodl tajně poskytnout [FROM.GetAdjective] podporu v našem boji za znovuzískání svobody! To nám jistě velmi pomůže, až nadejde čas vyhlásit nezávislost od našich krutých pánů." # todo: NEW TRANSLATION
  denmark_resistance_event.2.a: "Skvělé!" # todo: NEW TRANSLATION
  denmark_resistance_event.3.t: "[FROM.GetNameDefCap] odmítl naší žádost o pomoc" # todo: NEW TRANSLATION
  denmark_resistance_event.3.desc: "Zbabělý [FROM.GetLeader] se rozhodl neposkytnout [FROM.GetAdjective] podporu v našem boji za znovuzískání svobody. Musíme hledat podporu jinde." # todo: NEW TRANSLATION
  denmark_resistance_event.3.a: "Zatraceno!" # todo: NEW TRANSLATION
  denmark_resistance_event.4.t: "[DEN.GetNameDefCap] žádá o zbraně" # todo: NEW TRANSLATION
  denmark_resistance_event.4.desc: "Obdrželi jsme žádost od [DEN.GetNameDef], která žádá o dodávky zbraní za účelem vyzbrojení jejich odbojového hnutí a pomoci v boji za znovuzískání svobody." # todo: NEW TRANSLATION
  denmark_resistance_event.4.a: "Dodáme jim, co máme" # todo: NEW TRANSLATION
  denmark_resistance_event.4.b: "Nemáme nic navíc..." # todo: NEW TRANSLATION
  denmark_resistance_event.5.t: "[FROM.GetNameDefCap] souhlasil s dodáním zbraní" # todo: NEW TRANSLATION
  denmark_resistance_event.5.desc: "[FROM.GetAdjective] se rozhodli vyslyšet naše prosby o zbraně a plánují seskok materiálu. Členové odboje již sladili místo a čas setkání pro dodávky se zástupci [FROM.GetAdjective] zpravodajské služby." # todo: NEW TRANSLATION
  denmark_resistance_event.6.t: "[FROM.GetNameDefCap] odmítl naši žádost o zbraně" # todo: NEW TRANSLATION
  denmark_resistance_event.6.desc: "Naše žádost o zbraně od našich [FROM.GetAdjective] spojenců byla odmítnuta. Omluvně nám sdělili, že momentálně nemají žádné vybavení navíc." # todo: NEW TRANSLATION
  denmark_resistance_event.7.t: "[DEN.GetNameDefCap] žádá naši podporu" # todo: NEW TRANSLATION
  denmark_resistance_event.7.desc: "[DEN.GetNameDefCap] vyhlásil nezávislost od svých utlačovatelských pánů. Podle zpráv se [?DEN.DEN_overlord_nation.GetAdjective] vůdce, [?DEN.DEN_overlord_nation.GetLeader], rozzlobil a křičel nadávky při přijetí zprávy. Dánové nás nyní žádají, abychom dodrželi naši dohodu a přijali je do naší aliance." # todo: NEW TRANSLATION
  denmark_resistance_event.7.a: "Spojme se s nimi!" # todo: NEW TRANSLATION
  denmark_resistance_event.7.b: "Okolnosti se změnily..." # todo: NEW TRANSLATION
  denmark_resistance_event.7.c: "Nejsme v pozici to rozhodnout" # todo: NEW TRANSLATION
  denmark_resistance_event.8.t: "[FROM.GetNameDefCap] nás zve do své frakce" # todo: NEW TRANSLATION
  denmark_resistance_event.8.desc: "[From.GetLeader] dodržel naši dohodu a pozval nás, abychom se připojili k jejich alianci." # todo: NEW TRANSLATION
  denmark_resistance_event.9.t: "[FROM.GetNameDefCap] odstoupil od naší dohody" # todo: NEW TRANSLATION
  denmark_resistance_event.9.desc: "Nečestný [From.GetLeader] porušil naši dohodu a odmítl nás pozvat do své aliance!" # todo: NEW TRANSLATION
  denmark_resistance_event.9.a: "Zrádci a podrazáci!" # todo: NEW TRANSLATION
  denmark_resistance_event.10.t: "[FROM.GetNameDefCap] požaduje, aby se [DEN.GetNameDefCap] připojil k naší frakci" # todo: NEW TRANSLATION
  denmark_resistance_event.10.desc: "Právě jsme obdrželi zprávu, že [FROM.GetNameDef] údajně podepsal dohodu s [DEN.GetNameDef], aby podpořil jejich vyhlášení nezávislosti a spojil síly. [FROM.GetLeader] nyní trvá na tom, abychom dodrželi a podpořili jejich část dohody s Dány." # todo: NEW TRANSLATION
  denmark_resistance_event.10.a: "To posílí celou alianci" # todo: NEW TRANSLATION
  denmark_resistance_event.10.b: "Nejsme povinni dodržet jejich dohodu" # todo: NEW TRANSLATION
  denmark_resistance_event.11.t: "[DEN.GetNameDefCap] nabízí zpravodajské informace" # todo: NEW TRANSLATION
  denmark_resistance_event.11.desc: "Členové naší zpravodajské služby byli osloveni jejich dánskými protějšky, kteří chtějí sdílet zpravodajské informace mezi našimi zeměmi. To by nepochybně posílilo naše vlastní tajné operace a prospělo oběma zemím." # todo: NEW TRANSLATION
  denmark_resistance_event.11.a: "Nepřítel mého nepřítele, jak se říká..." # todo: NEW TRANSLATION
  denmark_resistance_event.11.b: "Nepotřebujeme jejich pomoc" # todo: NEW TRANSLATION
  denmark_resistance_event.12.t: "[FROM.GetNameDefCap] přijímá naši výměnu zpravodajských informací" # todo: NEW TRANSLATION
  denmark_resistance_event.12.desc: "Zpravodajská služba [FROM.GetAdjective] viděla výhody sdílení informací mezi našimi zeměmi a souhlasila s naším návrhem. " # todo: NEW TRANSLATION
  denmark_resistance_event.12.a: "Rozumné rozhodnutí" # todo: NEW TRANSLATION
  denmark_resistance_event.13.t: "[FROM.GetNameDefCap] odmítá výměnu zpravodajských informací" # todo: NEW TRANSLATION
  denmark_resistance_event.13.desc: "Zpravodajská služba [FROM.GetNameDef] je stejně krátkozraká jako nerozumná, [FROM.GetAdjective] ředitel zpravodajství nevidí výhody sdílení informací mezi našimi zeměmi a náš návrh odmítl." # todo: NEW TRANSLATION
  denmark_resistance_event.13.a: "Jak nerozumné rozhodnutí" # todo: NEW TRANSLATION
  denmark_resistance_event.20.t: "Dánský dotaz na hostování jednotek" # todo: NEW TRANSLATION
  denmark_resistance_event.20.desc: "Obdrželi jsme tajnou žádost od [DEN.GetLeader], která zjišťuje náš zájem hostit dánské jednotky na [ROOT.GetAdjective] území, aby je zde vycvičily a vybavily na přípravu úplného osvobození [DEN.GetNameDef]. Můžeme jejich počet a skutečný účel skrýt označením jako „vojenská policie“." # todo: NEW TRANSLATION
  denmark_resistance_event.20.a: "Přijmeme je" # todo: NEW TRANSLATION
  denmark_resistance_event.20.b: "Nemůžeme si dovolit rozhněvat jejich nadvládu" # todo: NEW TRANSLATION
  denmark_resistance_event.21.t: "[FROM.GetNameDefCap] souhlasí s hostováním našich jednotek" # todo: NEW TRANSLATION
  denmark_resistance_event.21.desc: "[FROM.GetNameDefCap] laskavě souhlasil s hostováním našich dánských brigád v exilu, aby je připravil na osvobození [DEN.GetNameDef], až nastane ten čas." # todo: NEW TRANSLATION
  denmark_resistance_event.22.t: "[FROM.GetNameDefCap] odmítá naše jednotky" # todo: NEW TRANSLATION
  denmark_resistance_event.22.desc: "[FROM.GetNameDefCap] hanebně odmítl hostit naše dánské brigády v exilu a nepřipraví je na osvobození [DEN.GetNameDef], až nastane vhodný čas. Musíme hledat jinde pomoc, kterou potřebujeme." # todo: NEW TRANSLATION
  denmark_resistance_event.23.t: "[DEN.GetAdjective] dotaz na koupi starých lodí" # todo: NEW TRANSLATION
  denmark_resistance_event.23.desc: "Dánská delegace nás tajně navštívila a ptala se, zda bychom jim byli ochotni prodat některé z našich starších torpédoborců. [DEN.GetNameDefCap] se nachází pod nadvládou [?DEN.DEN_overlord_nation.GetNameDef], a může to být jasným znamením, že shromažďují síly k vyhlášení nezávislosti. Jsme ochotni jim pomoci znovu získat nezávislost?" # todo: NEW TRANSLATION
  denmark_resistance_event.23.a: "Dejme jim pár starých torpédoborců" # todo: NEW TRANSLATION
  denmark_resistance_event.23.b: "Nemůžeme si dovolit rozhněvat jejich nadvládu" # todo: NEW TRANSLATION
  denmark_resistance_event.24.t: "[FROM.GetNameDefCap] souhlasil s prodejem torpédoborců" # todo: NEW TRANSLATION
  denmark_resistance_event.24.desc: "[FROM.GetNameDefCap] moudře souhlasil prodat nám některé ze svých starších torpédoborců! Musíme je skrýt před [?DEN.DEN_overlord_nation.GetNameDef] a nasadit je pouze, až přijde čas udeřit." # todo: NEW TRANSLATION
  denmark_resistance_event.25.t: "[FROM.GetNameDefCap] odmítá prodat nám torpédoborce" # todo: NEW TRANSLATION
  denmark_resistance_event.25.desc: "[FROM.GetNameDefCap] nerozumně odmítl naši žádost prodat některé ze svých starších torpédoborců. Jejich pošetilý krok nás nezastaví v posílení naší flotily, abychom zajistili naše vody. Hledat budeme jinde přívětivější země." # todo: NEW TRANSLATION
  denmark_resistance_event.30.t: "Každodenní jízdy krále" # todo: NEW TRANSLATION
  denmark_resistance_event.30.desc: "Král si zvykl jezdit denně bez stráží po Kodani jako tichý protest proti okupujícímu mocnáři a stal se symbolem celého národa proti [?DEN.DEN_overlord_nation.GetAdjective] okupaci." # todo: NEW TRANSLATION
  denmark_resistance_event.30.a: "Jak odvážné!" # todo: NEW TRANSLATION
  denmark_overlord_events.1.t: "Telegrafní krize" # todo: NEW TRANSLATION
  denmark_overlord_events.1.desc: "Mezi naší zemí a [?DEN.DEN_overlord_nation.GetNameDef] se rozvrhá diplomatická krize, která vznikla z telegrafu odeslaného naším králem. Zpráva zněla jednoduše 'S vděčností', ale [?DEN.DEN_overlord_nation.GetLeader] se údajně urazil z králova zdánlivě odměřeného odpisu na gratulaci [?DEN.DEN_overlord_nation.GetAdjective] vůdci ke královým narozeninám. \nVztah mezi našimi národy je už nějakou dobu napjatý a může to být záminka, kterou hledal náš nadvládce, aby utáhl svůj sevření nad naší nezávislostí a vládou." # todo: NEW TRANSLATION
  denmark_overlord_events.1.a: "Omluvit se a zachránit situaci" # todo: NEW TRANSLATION
  denmark_overlord_events.1.b: "Poslat [?DEN.DEN_overlord_nation.GetLeader] naše pozdravy" # todo: NEW TRANSLATION
  denmark_overlord_events.2.desc: "Náš milostivý vůdce [ROOT.GetLeader] poslal srdečný telegraf přející králi [FROM.GetNameDef] vše nejlepší k narozeninám, ale obdržel krátkou a chladnou odpověď. Dáni si nyní uvědomují vážnost jejich urážky a navrhují poslat korunního prince Frederika, aby se [ROOT.GetLeader] osobně omluvil. \nMohli bychom však tuto příležitost využít k uvalení přísnější kontroly nad našimi subjektami, kteří si užívají poměrně liberálních privilegií pod naší jurisdikcí." # todo: NEW TRANSLATION
  denmark_overlord_events.2.a: "Přijmout omluvu" # todo: NEW TRANSLATION
  denmark_overlord_events.2.b: "Potrestat je za hrubost" # todo: NEW TRANSLATION
  denmark_overlord_events.3.t: "[FROM.GetLeader] přijímá naši omluvu" # todo: NEW TRANSLATION
  denmark_overlord_events.3.desc: "Naše snahy uklidnit [FROM.GetLeader] se zdají být úspěšné - prozatím." # todo: NEW TRANSLATION
  denmark_overlord_events.3.a: "Krize zažehnána" # todo: NEW TRANSLATION
  denmark_overlord_events.4.t: "[FROM.GetLeader] odmítá naši omluvu" # todo: NEW TRANSLATION
  denmark_overlord_events.4.desc: "[FROM.GetLeader] odmítá přijít k rozumu a vzal si králův krátký telegraf jako osobní urážku a zdá se, že je rozhodnut nás za toto nešťastné nedorozumění potrestat." # todo: NEW TRANSLATION
  denmark_overlord_events.4.a: "Lítostivé" # todo: NEW TRANSLATION
  denmark_overlord_events.5.desc: "Náš milostivý vůdce [ROOT.GetLeader] poslal srdečný telegraf s přáním všeho nejlepšího králi [FROM.GetNameDef], ale obdržel krátkou a chladnou odpověď. Co je ještě horší, Dáni nyní odmítají uznat chybu svého krále a náležitě se omluvit. \nTo by mohla být skvělá příležitost postavit naše subjekty na místo a připomenout jim, že jejich výjimečná privilegia pod naší jurisdikcí nejsou samozřejmostí." # todo: NEW TRANSLATION
  denmark_overlord_events.5.a: "Máme důležitější záležitosti..." # todo: NEW TRANSLATION
  denmark_overlord_events.5.b: "Tato neúcta musí být potrestána!" # todo: NEW TRANSLATION
  denmark_overlord_events.6.t: "Telegrafní krize se sama vyřešila" # todo: NEW TRANSLATION
  denmark_overlord_events.6.desc: "Zdá se, že naše odmítnutí omluvit se za to, jak se [FROM.GetLeader] osobně urazil královou stručnou, ale výstižnou odpovědí na jeho narozeninový telegram, buď zůstalo bez povšimnutí, nebo bylo ignorováno." # todo: NEW TRANSLATION
  denmark_overlord_events.6.a: "Museli připustit, že chyba je jen jejich" # todo: NEW TRANSLATION
  denmark_overlord_events.7.t: "[FROM.GetNameDefCap] uvaluje přísné nové zákony" # todo: NEW TRANSLATION
  denmark_overlord_events.7.desc: "Jako přímý důsledek toho, co je nyní známé jako 'Telegrafní krize' a neschopnosti [FROM.GetLeader] vidět rozum, byly na nás uvaleny nové, tvrdé zákony." # todo: NEW TRANSLATION
  denmark_overlord_events.7.a: "Tyto zákony jsou pouze dočasné - postaráme se o to!" # todo: NEW TRANSLATION
  denmark_overlord_events.10.t: "[FROM.GetNameDefCap] požaduje rezignaci [ROOT.GetLeader]" # todo: NEW TRANSLATION
  denmark_overlord_events.10.desc: "Zhoršující se vztah mezi našimi zeměmi vedl k oficiální žádosti [FROM.GetAdjective] ministerstva zahraničí o rezignaci[ROOT.GetLeader]. \nI když nám byla udělena jedinečná autonomie pod [FROM.GetAdjective] 'ochranou', může být nerozumné dále oslabovat vztahy mezi našimi zeměmi." # todo: NEW TRANSLATION
  denmark_overlord_events.10.a: "Musíme vyhovět" # todo: NEW TRANSLATION
  denmark_overlord_events.10.b: "To není jejich věc!" # todo: NEW TRANSLATION
  denmark_overlord_events.11.t: "Volba nového předsedy vlády" # todo: NEW TRANSLATION
  denmark_overlord_events.11.desc: "Nastal čas nejen vybrat, kdo bude vést [ROOT.GetNameDef], ale také kdo bude řešit [FROM.GetAdjective] okupační moc." # todo: NEW TRANSLATION
  denmark_overlord_events.11.a: "Demokratický vůdce" # todo: NEW TRANSLATION
  denmark_overlord_events.11.b: "$DEN_knud_bach$" # todo: NEW TRANSLATION
  denmark_overlord_events.11.c: "$DEN_aksel_larsen$" # todo: NEW TRANSLATION
  denmark_overlord_events.11.d: "Fašistický vůdce" # todo: NEW TRANSLATION
  denmark_overlord_events.12.desc: "Krása demokracie spočívá v množství možných voleb vůdců." # todo: NEW TRANSLATION
  denmark_overlord_events.12.a: "Sociální demokrat" # todo: NEW TRANSLATION
  denmark_overlord_events.12.b: "Liberál" # todo: NEW TRANSLATION
  denmark_overlord_events.12.c: "Konzervativec" # todo: NEW TRANSLATION
  denmark_overlord_events.12.d: "Externí kandidát" # todo: NEW TRANSLATION
  denmark_overlord_events.13.desc: "Jen pevná ruka může navést [ROOT.GetNameDef] vpřed." # todo: NEW TRANSLATION
  denmark_overlord_events.13.a: "$DEN_frits_clausen$" # todo: NEW TRANSLATION
  denmark_overlord_events.13.b: "$DEN_cay_lembcke$" # todo: NEW TRANSLATION
  denmark_overlord_events.14.t: "[FROM.GetNameDefCap] volí nového předsedu vlády" # todo: NEW TRANSLATION
  denmark_overlord_events.14.desc: "Dánská vláda vyhověla naší žádosti a zvolila nového předsedu vlády." # todo: NEW TRANSLATION
  denmark_overlord_events.14.a: "Dobře" # todo: NEW TRANSLATION
  denmark_overlord_events.15.t: "[FROM.GetLeader] odmítá rezignovat" # todo: NEW TRANSLATION
  denmark_overlord_events.15.desc: "Zdá se, že dánská vláda odmítla poslechnout naši upřímnou žádost, aby [FROM.GetLeader] odstoupil z funkce předsedy vlády pro lepší spolupráci mezi oběma zeměmi. Tento druh neúcty zhoršil náš vztah s dánským lidem! Něco se musí udělat, aby se zachovala pokračující spolupráce mezi našimi vládami." # todo: NEW TRANSLATION
  denmark_overlord_events.15.a: "Nyní není čas" # todo: NEW TRANSLATION
  denmark_overlord_events.15.b: "Naučme je lekci" # todo: NEW TRANSLATION
  denmark_overlord_events.15.c: "Instalujme loajálního kolaboranta" # todo: NEW TRANSLATION
  denmark_overlord_events.16.desc: "V reakci na naše odmítnutí podvolit se [FROM.GetAdjective] požadavkům, aby [ROOT.GetLeader] rezignoval, se naši nadvládci rozhodli uvalit nový soubor zákonů, aby nás naučili pokornosti a poslušnosti." # todo: NEW TRANSLATION
  denmark_overlord_events.16.a: "Jednoho dne je naučíme pravé pokoře...." # todo: NEW TRANSLATION
  denmark_overlord_events.17.t: "[FROM.GetAdjective] plánuje instalovat loajální vládu" # todo: NEW TRANSLATION
  denmark_overlord_events.17.desc: "[FROM.GetNameDefCap] jasně oznámili, že mají v úmyslu nainstalovat více pro-[FROM.GetAdjective] vládu v reakci na [ROOT.GetLeader] odmítnutí odstoupit jako předseda vlády. To bude znamenat menší nezávislost pro nás, pokud nyní nevstoupíme do boje - ať už jsme na to připraveni nebo ne..." # todo: NEW TRANSLATION
  denmark_overlord_events.17.a: "Nemáme na výběr..." # todo: NEW TRANSLATION
  denmark_overlord_events.17.b: "Svoboda nebo smrt!" # todo: NEW TRANSLATION
  denmark_overlord_events.20.t: "[FROM.GetnameDefCap] požaduje novou vládu" # todo: NEW TRANSLATION
  denmark_overlord_events.20.desc: "Není žádným tajemstvím, že [FROM.GetnameDef] je vášnivým zastáncem [FROM.GetRulingIdeologyNoun], a považuje [ROOT.GetRulingIdeologyNoun] za největší pohrdání. Není tedy velkým překvapením, že již nemohou tolerovat, aby jeden z jejich subjektů vyznával právě tuto ideologii. Jasně dali najevo, že si přejí, abychom opustili [ROOT.GetRulingIdeologyNoun]." # todo: NEW TRANSLATION
  denmark_overlord_events.20.a: "Musíme - pro dobro lidu..." # todo: NEW TRANSLATION
  denmark_overlord_events.20.b: "Nikdy se nevzdáme!" # todo: NEW TRANSLATION
  denmark_overlord_events.21.t: "Nová vláda" # todo: NEW TRANSLATION
  denmark_overlord_events.21.desc: "Protože nemáme na výběr a musíme vyhovět přáním našeho nadvládce, musíme nyní sestavit novou vládu." # todo: NEW TRANSLATION
  denmark_overlord_events.21.b: "Pro krále a vlast" # todo: NEW TRANSLATION
  denmark_overlord_events.21.c: "Komunismus bez revoluce" # todo: NEW TRANSLATION
  denmark_overlord_events.21.d: "Fašismus bez krveprolití" # todo: NEW TRANSLATION
  denmark_overlord_events.22.t: "Demokracie a svoboda znamená mnoho možností" # todo: NEW TRANSLATION
  denmark_overlord_events.22.desc: "Krása demokracie spočívá v množství voleb vůdců." # todo: NEW TRANSLATION
  denmark_overlord_events.23.t: "[FROM.GetNameDefCap] ustupuje a mění vládu" # todo: NEW TRANSLATION
  denmark_overlord_events.23.desc: "Podařilo se nám přesvědčit Dány, aby opustili své špatné způsoby a přijali [FROM.GetRulingIdeologyNoun]." # todo: NEW TRANSLATION
  denmark_overlord_events.23.a: "Dobře. Dobře!" # todo: NEW TRANSLATION
  denmark_overlord_events.24.t: "[FROM.GetLeader] odmítá opustit moc" # todo: NEW TRANSLATION
  denmark_overlord_events.24.desc: "Vůdce [FROM.GetRulingIdeology] [FROM.GetLeader] z [FROM.GetNameDef] odmítá naslouchat rozumu a dělat to, co je nejlepší pro svou zemi. Takové toužení po moci je charakteristické pro [FROM.GetRulingIdeologyNoun], a neměli bychom být překvapeni dánskou reakcí. Možná z nich budeme muset udělat příklad..." # todo: NEW TRANSLATION
  denmark_overlord_events.24.a: "Vypořádáme se s nimi později" # todo: NEW TRANSLATION
  denmark_overlord_events.24.b: "Pak je donutíme" # todo: NEW TRANSLATION
  denmark_overlord_events.25.t: "[FROM.GetNameDefCap] plánuje instalovat [FROM.GetRulingIdeology] vládu" # todo: NEW TRANSLATION
  denmark_overlord_events.25.desc: "Důrazně jsme odmítli [FROM.GetAdjective] požadavek opustit [ROOT.GetRulingIdeologyNoun], ale měli jsme si uvědomit, že nebudou spokojeni s naší odpovědí. [FROM.GetAdjective] [FROM.GetRulingIdeologyNoun] nezná hranic a vždy se bude snažit dostat se k moci." # todo: NEW TRANSLATION
  denmark_overlord_events.25.a: "Musíme vyhovět - abychom ušetřili lidem válku" # todo: NEW TRANSLATION
  denmark_overlord_events.26.t: "[FROM.GetNameDefCap] požaduje zákaz komunismu" # todo: NEW TRANSLATION
  denmark_overlord_events.26.desc: "Obdrželi jsme požadavky od [FROM.GetNameDef] zakázat veškeré komunistické aktivity v zemi. Tvrdí, že je téměř vlastizrady nechávat tuto škodlivou ideologii rozkvétat, zatímco naši odhodlaní [FROM.GetAdjective] nadvládci statečně brání sebe a svobodný svět proti zemi, která plně přijala komunismus." # todo: NEW TRANSLATION
  denmark_overlord_events.26.a: "Zakázat komunismus" # todo: NEW TRANSLATION
  denmark_overlord_events.26.b: "Nenecháme se vydírat a zakázat svobodnou vůli!" # todo: NEW TRANSLATION
  denmark_overlord_events.27.t: "[FROM.GetNameDefCap] zakazuje komunismus" # todo: NEW TRANSLATION
  denmark_overlord_events.27.desc: "Úspěšně jsme přesvědčili dánskou vládu, aby zakázala komunismus, protože s touto ideologií bojujeme v souboji na život a na smrt. Může zvítězit jen jeden, a my musíme zvítězit, aby [ROOT.GetAdjective] lidé prosperovali!" # todo: NEW TRANSLATION
  denmark_overlord_events.27.a: "Ke vítězství!" # todo: NEW TRANSLATION
  denmark_overlord_events.28.t: "[FROM.GetNameDefCap] odmítá zákaz komunismu" # todo: NEW TRANSLATION
  denmark_overlord_events.28.desc: "Navzdory našim prosbám a přesvědčování dánská vláda odmítá zakázat komunismus. Tato korupční ideologie už se zdá mít hluboké kořeny v srdcích dánského lidu, když bojujeme s myšlenkou komunismu v boji na život a na smrt. Může zvítězit jen jeden, a my musíme zvítězit, aby [ROOT.GetAdjective] lidé prosperovali!" # todo: NEW TRANSLATION
  denmark_overlord_events.28.a: "My zvítězíme!" # todo: NEW TRANSLATION
  denmark_overlord_events.29.t: "[FROM.GetNameDefCap] požaduje zákaz fašismu" # todo: NEW TRANSLATION
  denmark_overlord_events.29.desc: "Obdrželi jsme požadavky od [FROM.GetNameDef] zakázat veškeré fašistické aktivity v zemi. Tvrdí, že je téměř vlastizrady nechávat tuto škodlivou ideologii rozkvétat, zatímco naši odhodlaní [FROM.GetAdjective] nadvládci statečně brání sebe a svobodný svět proti zemi, která plně přijala fašismus." # todo: NEW TRANSLATION
  denmark_overlord_events.29.a: "Zakázat fašismus" # todo: NEW TRANSLATION
  denmark_overlord_events.30.t: "[FROM.GetNameDefCap] zakazuje fašismus" # todo: NEW TRANSLATION
  denmark_overlord_events.30.desc: "Úspěšně jsme přesvědčili dánskou vládu, aby zakázala fašismus, protože s touto ideologií bojujeme v souboji na život a na smrt. Může zvítězit jen jeden, a my musíme zvítězit, aby [ROOT.GetAdjective] lidé prosperovali!" # todo: NEW TRANSLATION
  denmark_overlord_events.31.t: "[FROM.GetNameDefCap] odmítá zákaz fašismu" # todo: NEW TRANSLATION
  denmark_overlord_events.31.desc: "Navzdory našim prosbám a přesvědčování dánská vláda odmítá zakázat fašismus. Tato korupční ideologie už se zdá mít hluboké kořeny v srdcích dánského lidu, když bojujeme s myšlenkou fašismu v boji na život a na smrt. Může zvítězit jen jeden, a my musíme zvítězit, aby [ROOT.GetAdjective] lidé prosperovali!" # todo: NEW TRANSLATION
  denmark_overlord_events.32.t: "[FROM.GetNameDefCap] požaduje dodávky zbraní" # todo: NEW TRANSLATION
  denmark_overlord_events.32.desc: "Zdá se, že [FROM.GetAdjective] zásoby ubývají, protože se na nás obracejí s požadavkem, abychom jim dodávali zbraně do jejich probíhajících konfliktů. \nTo může být také lest, jak nás zbavit zbraní potají, aby nás udrželi v podřízeném stavu a zabránili nám povstat a svrchovat [FROM.GetAdjective] jho, pod kterým se nacházíme." # todo: NEW TRANSLATION
  denmark_overlord_events.32.a: "Dodat zbraně" # todo: NEW TRANSLATION
  denmark_overlord_events.32.b: "Co málo máme, potřebujeme pro případ, že by se válka dostala k nám..." # todo: NEW TRANSLATION
  denmark_overlord_events.33.t: "[FROM.GetNameDefCap] poskytuje zbraně" # todo: NEW TRANSLATION
  denmark_overlord_events.33.desc: "Naše žádost o dánské dodávky zbraní byla vyslyšena a obdrželi jsme první šarži." # todo: NEW TRANSLATION
  denmark_overlord_events.34.t: "[FROM.GetNameDefCap] odmítá poskytnout zbraně" # todo: NEW TRANSLATION
  denmark_overlord_events.34.desc: "Naše žádost o dánské dodávky zbraní byla odmítnuta, protože dánská vláda uvedla slabou výmluvu, že potřebují co málo zbraní mají pro případ, že by se válka dostala k nim. Dále tvrdili, že jsou neutrální zemí a posílání zbraní by porušilo tuto neutralitu..." # todo: NEW TRANSLATION
  denmark_overlord_events.34.a: "Tentokrát to necháme být..." # todo: NEW TRANSLATION
  denmark_overlord_events.34.b: "Nenechají nás tak snadno oklamat!" # todo: NEW TRANSLATION
  denmark_overlord_events.35.desc: "[FROM.GetNameDefCap] vykřikl náš blaf a uvalil nové zákony, které stanovují stálý tok zbraní z našich továren přímo k nim" # todo: NEW TRANSLATION
  denmark_overlord_events.35.a: "Ty zbraně jsme zoufale potřebovali pro sebe" # todo: NEW TRANSLATION
  denmark_overlord_events.36.t: "[FROM.GetNameDefCap] požaduje brance" # todo: NEW TRANSLATION
  denmark_overlord_events.36.desc: "Zdá se, že [FROM.GetAdjective] lidské zdroje docházejí, protože se na nás obracejí s požadavkem, abychom jim dodávali muže na vedení jejich probíhajících konfliktů. \nTo může být také lest, jak nás zbavit sil potají, aby nás udrželi pod jejich jhem a zabránili nám povstat." # todo: NEW TRANSLATION
  denmark_overlord_events.36.a: "Musíme plnit rozkazy našeho pána..." # todo: NEW TRANSLATION
  denmark_overlord_events.36.b: "Žádný Dán nezemře v cizích zemích!" # todo: NEW TRANSLATION
  denmark_overlord_events.37.t: "[FROM.GetNameDefCap] souhlasí poskytnout brance" # todo: NEW TRANSLATION
  denmark_overlord_events.37.desc: "Naše žádost o dánské brance byla vládou přijata a první jednotky nám byly zaslány, aby nám pomohly v probíhajících konfliktech." # todo: NEW TRANSLATION
  denmark_overlord_events.38.t: "[FROM.GetNameDefCap] odmítá poslat brance" # todo: NEW TRANSLATION
  denmark_overlord_events.38.desc: "Naše žádost o dánské brance byla odmítnuta; dánská vláda uvedla slabou výmluvu, že odmítají posílat své občany umírat za cizí zemi na cizích bozích. Také tvrdili, že jsou neutrální zemí a posílání vojáků by porušilo tuto neutralitu..." # todo: NEW TRANSLATION
  denmark_overlord_events.38.b: "Pak je vezmeme silou!" # todo: NEW TRANSLATION
  denmark_overlord_events.39.desc: "[FROM.GetNameDefCap] nenechal naší odmítnutí poslat dánské muže do cizí války bez povšimnutí a uvalil nové zákony, které stanoví, že určitá část dospělých mužů musí sloužit v [FROM.GetAdjective] ozbrojených silách." # todo: NEW TRANSLATION
  denmark_overlord_events.39.a: "Opravdu pobuřující!" # todo: NEW TRANSLATION
  denmark_overlord_events.40.t: "[FROM.GetAdjective] plenipotenciář" # todo: NEW TRANSLATION
  denmark_overlord_events.40.desc: "Direktivou [FROM.GetAdjective] ministerstva zahraničí jsme byli informováni, že [FROM.GetAdjective] vedení již má dost křehké spolupráce a napjatých vztahů mezi našimi zeměmi. Rozhodli se proto nahradit naši zákonnou vládu plenipotenciářem - loajálním guvernérem [FROM.GetNameDef]. \nTo by vážně omezilo autonomii a suverenitu, kterou nám ještě zůstala, a mohlo způsobit nevratné škody." # todo: NEW TRANSLATION
  denmark_overlord_events.40.a: "Toto bude [FROM.GetAdjective] vláda ve všem kromě názvu" # todo: NEW TRANSLATION
  denmark_overlord_events.40.b: "[ROOT.GetAdjective] lidé se nikdy nepodvolí!" # todo: NEW TRANSLATION
  denmark_overlord_events.41.t: "[ROOT.GetAdjective] plenipotenciář přebírá moc" # todo: NEW TRANSLATION
  denmark_overlord_events.41.desc: "Jak jsme předpokládali, dánská vláda podlehla našemu tlaku a nám se podařilo instalovat plenipotenciáře, který bude vládnout [FROM.GetNameDef]. To utáhne naši kontrolu nad zemí a přiblíží je k naší věci." # todo: NEW TRANSLATION
  denmark_overlord_events.41.a: "Všechno podle plánu" # todo: NEW TRANSLATION
  denmark_overlord_events.42.t: "Dánská vláda odmítá rezignovat" # todo: NEW TRANSLATION
  denmark_overlord_events.42.desc: "Naše plány nainstalovat loajálního plenipotenciáře k vládnutí [FROM.GetNameDef] byly zmařeny houževnatostí a pošetilostí dánské vlády a jejích lidí! Instalace vlády loajální naší věci by utáhla naši kontrolu nad zemí a přiblížila je k nám." # todo: NEW TRANSLATION
  denmark_overlord_events.42.a: "Nepokračujeme v tlaku" # todo: NEW TRANSLATION
  denmark_overlord_events.42.b: "Změny málokdy přicházejí dobrovolně" # todo: NEW TRANSLATION
  denmark_overlord_events.43.t: "[FROM.GetNameDefCap] vymáhá vládu plenipotenciáře" # todo: NEW TRANSLATION
  denmark_overlord_events.43.desc: "[FROM.GetNameDefCap] opět ukázali, že jim nelze věřit a že usilují o konec dánské nezávislosti. [FROM.GetLeader] přes ignorování našeho odmítnutí nechal jmenovat plenipotenciáře i tak." # todo: NEW TRANSLATION
  denmark_overlord_events.43.a: "Neodvážíme se dotlačit to dál" # todo: NEW TRANSLATION
  denmark_overlord_events.43.b: "Budeme bojovat za svobodu!" # todo: NEW TRANSLATION
  denmark_overlord_events.44.t: "[FROM.GetNameDefCap] usiluje o anexi Jutska!" # todo: NEW TRANSLATION
  denmark_overlord_events.44.desc: "Právě jsme odhalili rozhořčující [FROM.GetAdjective] plán připojit celý Jutsk. To se nedá tolerovat!" # todo: NEW TRANSLATION
  denmark_overlord_events.45.t: "[FROM.GetNameDefCap] postoupil Jutsk" # todo: NEW TRANSLATION
  denmark_overlord_events.45.desc: "Naše nabídka převzít ochranu Jutska zřejmě něco v [FROM.GetLeader] zlomila, protože po obdržení naší žádosti se svalil do křesla a prostě přikývl." # todo: NEW TRANSLATION
  denmark_overlord_events.46.t: "[FROM.GetNameDefCap] odmítá postoupit Jutsk" # todo: NEW TRANSLATION
  denmark_overlord_events.46.desc: "Naše žádost převzít ochranu Jutska zdá se poslala [FROM.GetLeader] do záchvatu vzteku před tím, než naši velkorysou nabídku odmítl." # todo: NEW TRANSLATION
  denmark_overlord_events.46.b: "Vezmeme to i tak" # todo: NEW TRANSLATION
  denmark_overlord_events.47.t: "[FROM.GetNameDefCap] nárokuje zbytek našich zemí!" # todo: NEW TRANSLATION
  denmark_overlord_events.47.desc: "Delegace z [FROM.GetCapitalVictoryPointName] dorazila a předala formální deklaraci, že celé [ROOT.GetNameDef] má být oficiálně začleněno do větší sféry [FROM.GetNameDef]." # todo: NEW TRANSLATION
  denmark_overlord_events.48.t: "[FROM.GetNameDefCap] odmítá anexi" # todo: NEW TRANSLATION
  denmark_overlord_events.48.desc: "[FROM.GetLeader] nám poslal krátký telegraf s jediným slovem - 'nikdy'. Zdá se, že naši plnou ochranu nechtějí." # todo: NEW TRANSLATION
  denmark_overlord_events.48.b: "Jejich žalostné síly nám nebudou soupeřem!" # todo: NEW TRANSLATION
  denmark_protection_event.1.t: "[FROM.GetNameDefCap] nabízí pakt o neútočení" # todo: NEW TRANSLATION
  denmark_protection_event.1.desc: "Dnes ráno k nám dorazil posel od [FROM.GetAdjective] vlády s nabídkou podepsat pakt o neútočení. Volba podepsat tuto dohodu by znamenala rozvinutí bližšího partnerství s [FROM.GetAdjective]." # todo: NEW TRANSLATION
  denmark_protection_event.1.a: "Podepíšeme smlouvu." # todo: NEW TRANSLATION
  denmark_protection_event.1.b: "To nyní není v našem nejlepším zájmu." # todo: NEW TRANSLATION
  denmark_protection_event.2.t: "[FROM.GetNameDefCap] podepsal pakt o neútočení" # todo: NEW TRANSLATION
  denmark_protection_event.2.desc: "Posel, kterého jsme vyslali do [FROM.GetNameDef], se vrátil s dobrými zprávami! [FROM.GetAdjective] vláda se rozhodla podepsat naši smlouvu a nyní jsme vstoupili do paktu o neútočení. Je to velký den pro obě naše země." # todo: NEW TRANSLATION
  denmark_protection_event.2.a: "Skvělé!" # todo: NEW TRANSLATION
  denmark_protection_event.3.t: "[FROM.GetNameDefCap] odmítl pakt o neútočení" # todo: NEW TRANSLATION
  denmark_protection_event.3.desc: "Posel, kterého jsme poslali do [FROM.GetNameDef], se vrátil se špatnými zprávami. [FROM.GetAdjective] vláda se rozhodla, že pakt o neútočení není v jejich nejlepším zájmu v tuto chvíli. To je nešťastné, ale nemůžeme je přinutit." # todo: NEW TRANSLATION
  denmark_protection_event.3.a: "Ztracený čas..." # todo: NEW TRANSLATION
  denmark_protection_event.4.t: "[FROM.GetNameDefCap] nabízí obchodní dohodu" # todo: NEW TRANSLATION
  denmark_protection_event.4.desc: "Dostali jsme zprávu z [FROM.GetNameDef], že chtějí zvýšit obchod mezi našimi zeměmi. Přijetím této nabídky bezpochyby navážeme bližší spojení s [FROM.GetAdjective]." # todo: NEW TRANSLATION
  denmark_protection_event.4.a: "Zvýšený obchod by prospěl oběma." # todo: NEW TRANSLATION
  denmark_protection_event.4.b: "Toto nepotřebujeme." # todo: NEW TRANSLATION
  denmark_protection_event.5.t: "[FROM.GetNameDefCap] přijal obchodní dohodu" # todo: NEW TRANSLATION
  denmark_protection_event.5.desc: "Dohoda, kterou jsme navrhli [FROM.GetAdjective] vládě, byla přijata! Nyní zahájíme přípravy na zavedení této nové obchodní dohody." # todo: NEW TRANSLATION
  denmark_protection_event.5.a: "Začněte vypracovávat podmínky!" # todo: NEW TRANSLATION
  denmark_protection_event.6.t: "[FROM.GetNameDefCap] odmítl obchodní dohodu" # todo: NEW TRANSLATION
  denmark_protection_event.6.desc: "Bohužel náš návrh na zvýšení obchodu byl [FROM.GetNameDef] odmítnut navzdory našim snahám. Zdá se, že budeme muset nabídku směřovat jinam." # todo: NEW TRANSLATION
  denmark_protection_event.6.a: "Velmi nešťastné." # todo: NEW TRANSLATION
  denmark_protection_event.7.t: "[FROM.GetNameDefCap] nabízí dohodu o výzkumu" # todo: NEW TRANSLATION
  denmark_protection_event.7.desc: "Dorazila nabídka z [FROM.GetNameDef], že by se naše země mohly spojit ve výzkumné dohodě. To by znamenalo, že si budeme vzájemně sdílet technologické pokroky. Jak postupovat?" # todo: NEW TRANSLATION
  denmark_protection_event.7.a: "Podepsat smlouvu!" # todo: NEW TRANSLATION
  denmark_protection_event.7.b: "Na to nemáme čas." # todo: NEW TRANSLATION
  denmark_protection_event.8.t: "[FROM.GetNameDefCap] přijal dohodu o výzkumu" # todo: NEW TRANSLATION
  denmark_protection_event.8.desc: "Dnes ráno jsme dostali zprávu z [FROM.GetNameDef], že přijali naši nabídku společného výzkumu. To jsou skvělé zprávy a znamená to, že naše technologické pokroky se nyní jen urychlí." # todo: NEW TRANSLATION
  denmark_protection_event.8.a: "Skvělé!" # todo: NEW TRANSLATION
  denmark_protection_event.9.t: "[FROM.GetNameDefCap] odmítl dohodu o výzkumu" # todo: NEW TRANSLATION
  denmark_protection_event.9.desc: "Dnes ráno jsme se dozvěděli, že [FROM.GetNameDef] odmítl naši nabídku o společném výzkumu. To bohužel znamená, že nebudeme mít prospěch ze sdílení technologií s [FROM.GetAdjective] vládou." # todo: NEW TRANSLATION
  denmark_protection_event.9.a: "Zklamání." # todo: NEW TRANSLATION
  denmark_protection_event.10.t: "[FROM.GetNameDefCap] nabízí prodej území" # todo: NEW TRANSLATION
  denmark_protection_event.10.desc: "Ve snaze získat záruky nabídli [FROM.GetNameDef] prodat nám část svého území. Je to značná nabídka a měli bychom pečlivě zvážit, jak s touto dohodou naložit." # todo: NEW TRANSLATION
  denmark_protection_event.10.a: "Přijmout dohodu." # todo: NEW TRANSLATION
  denmark_protection_event.10.b: "To nepotřebujeme." # todo: NEW TRANSLATION
  denmark_protection_event.11.t: "[FROM.GetNameDefCap] přijal naši nabídku koupě území" # todo: NEW TRANSLATION
  denmark_protection_event.11.desc: "Výborné zprávy! [FROM.GetNameDefCap] přijal naši nabídku koupit území pro záruky. Musíme dodržet naši část dohody a připravit převod vlastnických listin do jména [FROM.GetAdjective] vlády." # todo: NEW TRANSLATION
  denmark_protection_event.11.a: "Skvělé!" # todo: NEW TRANSLATION
  denmark_protection_event.12.t: "[FROM.GetNameDefCap] odmítl naši nabídku koupě území" # todo: NEW TRANSLATION
  denmark_protection_event.12.desc: "Zdá se, že naše nabídka prodat území [FROM.GetNameDef] byla odmítnuta. Možná příště bude třeba nabídku vylepšit, abychom uspěli." # todo: NEW TRANSLATION
  denmark_protection_event.12.a: "Jejich ztráta." # todo: NEW TRANSLATION
  denmark_protection_event.100.t: "[FROM.GetNameDefCap] hledá alianci" # todo: NEW TRANSLATION
  denmark_protection_event.100.desc: "[FROM.GetLeader] z [FROM.GetNameDef] nás oslovil s nabídkou spojit síly, tvrdí, že pokud bychom stáli spolu, mohli bychom konkurovat i velmocím světa. Co říkáme?" # todo: NEW TRANSLATION
  denmark_protection_event.100.a: "Dobře, přijímáme" # todo: NEW TRANSLATION
  denmark_protection_event.100.b: "Něco tu smrdí" # todo: NEW TRANSLATION
  denmark_protection_event.101.t: "[FROM.GetNameDefCap] přijímá náš návrh" # todo: NEW TRANSLATION
  denmark_protection_event.101.desc: "Diplomaté zastupující [FROM.GetLeader] nám předložili odpověď [FROM.GetNameDef] na naši nedávnou návrh aliance. Tvrdí, že je jasné, že pokud si nevybudujeme obranu a nebudeme spolupracovat, oba padneme, až válka dorazí." # todo: NEW TRANSLATION
  denmark_protection_event.101.a: "Udělali správnou volbu" # todo: NEW TRANSLATION
  denmark_protection_event.102.t: "[FROM.GetNameDefCap] odmítá náš návrh" # todo: NEW TRANSLATION
  denmark_protection_event.102.desc: "Diplomaté zastupující [FROM.GetLeader] nám předložili odpověď [FROM.GetNameDef] na naši nedávnou nabídku aliance. Tvrdí, že pokud by se k nám přidali, nespravedlivě bychom se snažili ovlivňovat jejich politiku, a že z této nabídky nic nezískají, a proto náš návrh odmítli." # todo: NEW TRANSLATION
  denmark_protection_event.102.a: "Nevědí, že jejich činy mají následky" # todo: NEW TRANSLATION
  denmark_protection_event.110.t: "Společné [ROOT.GetAdjective]-[FROM.GetAdjective] armádní cvičení" # todo: NEW TRANSLATION
  denmark_protection_event.110.desc: "[FROM.GetAdjective] diplomaté nás požádali o uspořádání společného [ROOT.GetAdjective]-[FROM.GetAdjective] armádního cvičení, aby se [DEN.GetNameDef] lépe připravil na budoucnost a posílil spolupráci mezi našimi národy." # todo: NEW TRANSLATION
  denmark_protection_event.110.a: "Je to ku prospěchu" # todo: NEW TRANSLATION
  denmark_protection_event.110.b: "Na to nemáme čas" # todo: NEW TRANSLATION
  denmark_protection_event.111.t: "Společné [ROOT.GetAdjective]-[FROM.GetAdjective] armádní cvičení" # todo: NEW TRANSLATION
  denmark_protection_event.111.desc: "[FROM.GetNameDefCap] přijal náš návrh na společné [ROOT.GetAdjective]-[FROM.GetAdjective] vojenské cvičení, a následně jsme oba silnější." # todo: NEW TRANSLATION
  denmark_protection_event.111.a: "Perfektní!" # todo: NEW TRANSLATION
  denmark_protection_event.112.t: "Nebude žádné [ROOT.GetAdjective]-[FROM.GetAdjective] cvičení" # todo: NEW TRANSLATION
  denmark_protection_event.112.desc: "[FROM.GetNameDefCap] nám zrušil naděje a zamítl naše společné [ROOT.GetAdjective]-[FROM.GetAdjective] vojenské cvičení. Shledali nás příliš nedůležitými na další čas a úsilí..." # todo: NEW TRANSLATION
  denmark_protection_event.112.a: "Jejich ztráta" # todo: NEW TRANSLATION
  denmark_protection_event.120.t: "[FROM.GetLeader] žádá o sdílení technologií" # todo: NEW TRANSLATION
  denmark_protection_event.120.desc: "[FROM.GetNameDefCap] možná v mnoha oblastech zaostává, ale v některých oborech vynikají. Tvrdí, že větší spolupráce mezi našimi laboratořemi by mohla přinést prospěšné průlomy na obou stranách. Přijmeme?" # todo: NEW TRANSLATION
  denmark_protection_event.120.a: "Skvělá iniciativa!" # todo: NEW TRANSLATION
  denmark_protection_event.120.b: "Chtějí jen vysát naše know-how" # todo: NEW TRANSLATION
  denmark_protection_event.121.t: "[FROM.GetName] přijímá sdílení technologií" # todo: NEW TRANSLATION
  denmark_protection_event.121.desc: "Vděčný [FROM.GetLeader] z [FROM.GetNameDef] rád přijal naši žádost o sdílení technologií a naši vědci již začali koordinovat své úsilí." # todo: NEW TRANSLATION
  denmark_protection_event.121.a: "Společně jsme silnější" # todo: NEW TRANSLATION
  denmark_protection_event.122.t: "[FROM.GetName] odmítá sdílení technologií" # todo: NEW TRANSLATION
  denmark_protection_event.122.desc: "Nevděčný [FROM.GetLeader] z [FROM.GetNameDef] odmítl naši nabídku sdílení technologií, tvrdí, že z výměny nezískají a že se jim chceme jen přisávat na jejich vědecké znalosti." # todo: NEW TRANSLATION
  denmark_protection_event.122.a: "Dobrá tedy, nechte si své tajemství" # todo: NEW TRANSLATION
  denmark_protection_event.130.t: "[FROM.GetNameDefCap] zve nás do své aliance" # todo: NEW TRANSLATION
  denmark_protection_event.130.desc: "[FROM.GetAdjective] diplomaté nám přicházejí s zajímavou nabídkou. Tvrdí, že bychom mohli vytvořit frakci spolu, čímž by se posílil mír a vzájemná ochrana, a zajistilo by se, že nikomu z nás se nic nestane. Co říkáme?" # todo: NEW TRANSLATION
  denmark_protection_event.130.a: "Postavíme se společně" # todo: NEW TRANSLATION
  denmark_protection_event.130.b: "Půjdeme osamoceně" # todo: NEW TRANSLATION
  denmark_protection_event.131.t: "[FROM.GetNameDefCap] se připojuje k naší frakci" # todo: NEW TRANSLATION
  denmark_protection_event.131.desc: "[FROM.GetLeader] z [FROM.GetNameDef] přijal naši žádost vstoupit do společné frakce a stojí připraven nám pomoci, pokud budeme potřebovat, pokud uděláme totéž pro ně v dobách nouze." # todo: NEW TRANSLATION
  denmark_protection_event.131.a: "Perfektní!" # todo: NEW TRANSLATION
  denmark_protection_event.132.t: "[FROM.GetNameDefCap] se nepřidává k naší frakci" # todo: NEW TRANSLATION
  denmark_protection_event.132.desc: "[FROM.GetLeader] z [FROM.GetNameDef] odmítl naši nabídku připojit se k frakci, tvrdí, že z takového jednání s ďáblem získají velmi málo. Destabilizují region a musí být rychle řešeni!" # todo: NEW TRANSLATION
  denmark_protection_event.132.a: "No, je to jejich ztráta" # todo: NEW TRANSLATION
  denmark_protection_event.200.t: "Armádní cvičení" # todo: NEW TRANSLATION
  denmark_protection_event.200.desc: "Tváří v tvář válce je důležité připravit armádu na cokoli, co na ni bude vrženo. Prováděním těchto cvičení budou naše jednotky více než připravené bránit hranice [DEN.GetNameDef], kdykoli to bude potřeba." # todo: NEW TRANSLATION
  denmark_protection_event.200.a: "Skvělé!" # todo: NEW TRANSLATION
  denmark_protection_event.201.t: "Námořní cvičení" # todo: NEW TRANSLATION
  denmark_protection_event.201.desc: "Tváří v tvář válce je důležité připravit námořnictvo na cokoli, co na ně bude vrženo. Prováděním těchto cvičení budou naši námořníci více než připravení bránit vody [DEN.GetNameDef], kdykoli to bude třeba." # todo: NEW TRANSLATION
  denmark_protection_event.201.a: "Skvělé!" # todo: NEW TRANSLATION
  denmark_protection_event.202.t: "Cvičení letectva" # todo: NEW TRANSLATION
  denmark_protection_event.202.desc: "Tváří v tvář válce je důležité připravit letectvo na cokoli, co na ně bude vrženo. Prováděním těchto cvičení budou naši piloti více než připravení bránit nebe [DEN.GetNameDef], kdykoli to bude třeba." # todo: NEW TRANSLATION
  denmark_protection_event.202.a: "Skvělé!" # todo: NEW TRANSLATION
  denmark_expansion_event.1.t: "[FROM.GetNameDefCap] požaduje naši anexi" # todo: NEW TRANSLATION
  denmark_expansion_event.1.desc: "Dánská vláda nám poslala ultimátum, ve kterém požaduje, aby se [ICE.GetNameDef] podřídil jim a byl začleněn do jejich národa. Musíme být opatrní, protože naše odpověď by mohla určovat budoucnost [ICE.GetNameDefCap] jako suverénní země, nebo v nejhorším případě nás přiblížit k válce." # todo: NEW TRANSLATION
  denmark_expansion_event.1.a: "Nemáme jinou volbu než přijmout." # todo: NEW TRANSLATION
  denmark_expansion_event.1.b: "Nemůžeme se podřídit Dánům!" # todo: NEW TRANSLATION
  denmark_expansion_event.2.t: "[FROM.GetNameDefCap] přijal náš návrh reintegrace" # todo: NEW TRANSLATION
  denmark_expansion_event.2.desc: "Dnes ráno jsme obdrželi zprávu, že [ICE.GetAdjective] vláda laskavě přijala náš návrh znovu začlenit jejich území do [DEN.GetNameDefCap]. To pomůže oběma našim národům stát silněji bok po boku proti našim nepřátelům." # todo: NEW TRANSLATION
  denmark_expansion_event.2.a: "Rád, že viděli rozum." # todo: NEW TRANSLATION
  denmark_expansion_event.3.t: "[FROM.GetNameDefCap] odmítl náš návrh reintegrace" # todo: NEW TRANSLATION
  denmark_expansion_event.3.desc: "Bohužel se zdá, že [ICE.GetAdjective] vláda odmítla náš návrh reintegrace. Pošetilé rozhodnutí, řekněme, ale to nás nezastaví v uplatnění našeho nároku na tento ostrov." # todo: NEW TRANSLATION
  denmark_expansion_event.3.a: "K válce..." # todo: NEW TRANSLATION
  denmark_expansion_event.4.t: "[FROM.GetNameDefCap] požaduje [ICE.GetNameDef]" # todo: NEW TRANSLATION
  denmark_expansion_event.4.desc: "Dnes ráno jsme obdrželi zprávu, že [DEN.GetAdjective] vláda si přeje, abychom převedli vlastnictví [ICE.GetNameDef] na ně. Podle nich toto ostrovní území právem patří do jejich hranic." # todo: NEW TRANSLATION
  denmark_expansion_event.4.a: "To je přijatelné." # todo: NEW TRANSLATION
  denmark_expansion_event.4.b: "Nepřijatelné." # todo: NEW TRANSLATION
  denmark_expansion_event.5.t: "[FROM.GetNameDefCap] přijal naše požadavky na [ICE.GetNameDef]" # todo: NEW TRANSLATION
  denmark_expansion_event.5.desc: "Zdá se, že [FROM.GetNameDefCap] přijal naše pochopitelné požadavky na kontrolu nad [ICE.GetNameDef]. Je povzbuzující vidět naše spojence jednat rozumně." # todo: NEW TRANSLATION
  denmark_expansion_event.5.a: "[DEN.GetAdjective] nárok je absolutní!" # todo: NEW TRANSLATION
  denmark_expansion_event.6.t: "[FROM.GetNameDefCap] odmítl naše požadavky na [ICE.GetNameDef]" # todo: NEW TRANSLATION
  denmark_expansion_event.6.desc: "Je neuvěřitelné, že [FROM.GetNameDef] by odmítl naše požadavky! Máme právoplatný nárok na ten ostrov a pokud nám ho nedají pokojně, musíme jej vzít silou!" # todo: NEW TRANSLATION
  denmark_expansion_event.6.a: "Shromáždit naše síly!" # todo: NEW TRANSLATION
  denmark_expansion_event.10.t: "[FROM.GetNameDefCap] požaduje naše podrobení" # todo: NEW TRANSLATION
  denmark_expansion_event.10.desc: "Zdá se, že [DEN.GetAdjective] vláda je dychtivá přitlačit nám bota na krk. Jejich 'návrh' žádá, abychom se zcela podřídili jejich vládě na základě získání zdrojů. Pokud se chceme vyhnout krveprolití, možná bychom se měli podvolit, jinak nám mohou vyhlásit válku." # todo: NEW TRANSLATION
  denmark_expansion_event.10.a: "Neměli bychom být zataženi do války s naším sousedem." # todo: NEW TRANSLATION
  denmark_expansion_event.10.b: "[DEN.GetNameDefCap] nemá právo na naše země." # todo: NEW TRANSLATION
  denmark_expansion_event.11.t: "[FROM.GetNameDefCap] přijal náš návrh podrobení" # todo: NEW TRANSLATION
  denmark_expansion_event.11.desc: "Skvělé zprávy! Zdá se, že [SWE.GetNameDef] pochopil, že jejich zdroje je lepší sdílet s námi. Přinejmenším nyní může být jejich země chráněna našimi novými moderními vojenskými silami!" # todo: NEW TRANSLATION
  denmark_expansion_event.11.a: "[DEN.GetNameDefCap] poroste!" # todo: NEW TRANSLATION
  denmark_expansion_event.12.t: "[FROM.GetNameDefCap] odmítl náš návrh podrobení" # todo: NEW TRANSLATION
  denmark_expansion_event.12.desc: "Ti blázni v [SWE.GetAdjective] vládě se rozhodli odmítnout náš rozumný návrh podrobení! No, pokud nám nechtějí dát své zdroje, vezmeme si je sami." # todo: NEW TRANSLATION
  denmark_expansion_event.12.a: "Připravit se na překonání průlivu!" # todo: NEW TRANSLATION
  denmark_expansion_event.13.t: "[FROM.GetNameDefCap] požaduje [SWE.GetNameDef]" # todo: NEW TRANSLATION
  denmark_expansion_event.13.desc: "Dnes ráno jsme obdrželi požadavek od [DEN.GetAdjective] vlády, ve kterém žádají, abychom předali [SWE.GetNameDef] pod jejich kontrolu. Máme loajalitu vůči [DEN.GetNameDef] kvůli rodinným vazbám mezi našimi monarchiemi, nicméně musíme zvážit, že odmítnutí může vést k válce s [DEN.GetNameDef] bez ohledu na příbuzenské vztahy." # todo: NEW TRANSLATION
  denmark_expansion_event.13.a: "Nepokoušejme je rozzlobit." # todo: NEW TRANSLATION
  denmark_expansion_event.13.b: "[SWE.GetNameDefCap] je pod naší ochranou!" # todo: NEW TRANSLATION
  denmark_expansion_event.14.t: "[FROM.GetNameDefCap] přijal naše požadavky na [SWE.GetNameDef]" # todo: NEW TRANSLATION
  denmark_expansion_event.14.desc: "[NOR.GetAdjective] viděli rozum a podřídili se našim požadavkům. [SWE.GetNameDefCap] je naše a jejich zdroje nyní mohou být využity k financování naší nové armády." # todo: NEW TRANSLATION
  denmark_expansion_event.14.a: "[SWE.GetAdjective] kov pro [DEN.GetAdjective] hutě." # todo: NEW TRANSLATION
  denmark_expansion_event.15.t: "[FROM.GetNameDefCap] odmítl naše požadavky na [SWE.GetNameDef]" # todo: NEW TRANSLATION
  denmark_expansion_event.15.desc: "[NOR.GetNameDefCap] se rozhodl odmítnout naše požadavky na anexi [SWE.GetAdjective]. Je to velké zklamání, ale nesmíme se nechat odradit od právoplatného nároku na tyto zdroje." # todo: NEW TRANSLATION
  denmark_expansion_event.15.a: "Válka to bude." # todo: NEW TRANSLATION
  denmark_expansion_event.20.desc: "Ponuré zprávy z jihu: [DEN.GetNameDef] žádá podrobení [NOR.GetNameDefCap] a nás, abychom znovu podstoupili [DEN.GetAdjective] nadvládu poprvé od roku 1814. Mohli jsme se s obtížemi vybojovat nezávislost od Švédů, ale jsme skutečně připraveni postavit se a bojovat proti Dánům?" # todo: NEW TRANSLATION
  denmark_expansion_event.20.a: "Nemáme jinou volbu než se poklonit." # todo: NEW TRANSLATION
  denmark_expansion_event.20.b: "Už nikdy nebudeme vládnuti jiným národem!" # todo: NEW TRANSLATION
  denmark_expansion_event.21.desc: "[NOR.GetNameDefCap] moudře přijal náš návrh být obsazen našimi silami. S územím na severu zajištěným se nyní můžeme soustředit na rozšiřování hranic jinde." # todo: NEW TRANSLATION
  denmark_expansion_event.21.a: "Severní fronta je zajištěna." # todo: NEW TRANSLATION
  denmark_expansion_event.22.desc: "[NOR.GetAdjective] odmítli naši nabídku anexe pod záminkou ochrany své suverenity. Toto nás nezastaví." # todo: NEW TRANSLATION
  denmark_expansion_event.22.a: "[NOR.GetNameDefCap] bude znovu [DEN.GetAdjective]!" # todo: NEW TRANSLATION
  denmark_expansion_event.23.t: "[FROM.GetNameDefCap] požaduje [NOR.GetNameDef]" # todo: NEW TRANSLATION
  denmark_expansion_event.23.desc: "Jako současní okupanti [NOR.GetNameDef] bylo jen otázkou času, než k nám [DEN.GetNameDef] přijde s požadavky na tato území. Tvrdí, že [NOR.GetNameDef] je technicky [DEN.GetAdjective] území. Máme na výběr: Nechat Dány mít [NOR.GetNameDef] nebo odmítnout jejich požadavky a připravit se na možnost války." # todo: NEW TRANSLATION
  denmark_expansion_event.23.a: "Nemáme spor s [DEN.GetNameDef]. Nechme je mít to." # todo: NEW TRANSLATION
  denmark_expansion_event.23.b: "[NOR.GetNameDefCap] patří nám!" # todo: NEW TRANSLATION
  denmark_expansion_event.24.t: "[FROM.GetNameDefCap] přijal naše požadavky na [NOR.GetNameDef]" # todo: NEW TRANSLATION
  denmark_expansion_event.24.desc: "Zdá se, že [SWE.GetAdjective] vláda má rozum! Souhlasili předat vlastnictví [NOR.GetNameDef] nám. Jsme rádi, že nás také považují za právoplatné vládce těchto zemí." # todo: NEW TRANSLATION
  denmark_expansion_event.24.a: "Vynikající." # todo: NEW TRANSLATION
  denmark_expansion_event.25.t: "[FROM.GetNameDefCap] odmítl naše požadavky na [NOR.GetNameDef]" # todo: NEW TRANSLATION
  denmark_expansion_event.25.desc: "Bohužel [SWE.GetNameDef] odmítl ustoupit našim požadavkům na vlastnictví [NOR.GetNameDef]. Je to velké zklamání, zejména protože jsme jim dříve zemi předali. Doufali jsme, že nám to oplatí." # todo: NEW TRANSLATION
  denmark_expansion_event.25.a: "Budiž, válka to bude." # todo: NEW TRANSLATION
  denmark_expansion_event.100.t: "[FROM.GetNameDefCap] zahájil proces integrace" # todo: NEW TRANSLATION
  denmark_expansion_event.100.desc: "[DEN.GetLeader] dal najevo, že zahájil proces skutečné integrace naší země do širšího [DEN.GetAdjective] království." # todo: NEW TRANSLATION
  denmark_expansion_event.100.a: "Nemáme jinou volbu, musíme to dovolit." # todo: NEW TRANSLATION
  denmark_expansion_event.200.t: "[FROM.GetNameDefCap] požaduje naše [ICE.GetAdjective] majetky" # todo: NEW TRANSLATION
  denmark_expansion_event.200.desc: "[DEN.GetNameDefCap] se zdá být přesvědčen, že má historické nároky na naše [ICE.GetAdjective] území. Pokud jim podlehneme, riskujeme ztrátu země kvůli dánskému expanzionismu. Pokud odmítneme, bude to znamenat válku." # todo: NEW TRANSLATION
  denmark_expansion_event.200.a: "Musíme se podřídit jejich požadavkům..." # todo: NEW TRANSLATION
  denmark_expansion_event.200.b: "[ROOT.GetNameDefCap] se nikdy nedá Dánům!" # todo: NEW TRANSLATION
  denmark_expansion_event.201.t: "[FROM.GetNameDefCap] přijímá naše [ICE.GetAdjective] nároky" # todo: NEW TRANSLATION
  denmark_expansion_event.201.desc: "[FROM.GetNameDefCap] učinil moudré rozhodnutí přijmout náš právoplatný nárok na jejich území. Chytrý krok jejich vlády." # todo: NEW TRANSLATION
  denmark_expansion_event.201.a: "Vyjednávání bylo krátké." # todo: NEW TRANSLATION
  denmark_expansion_event.202.t: "[FROM.GetNameDefCap] odmítá naše [ICE.GetAdjective] nároky" # todo: NEW TRANSLATION
  denmark_expansion_event.202.desc: "Bohužel pro ně [FROM.GetAdjective] vláda naše nároky odmítla. Zdá se, že nemáme jinou volbu než přivést válku k jejich prahu, abychom zajistili to, co je právoplatně [DEN.GetAdjective]." # todo: NEW TRANSLATION
  denmark_expansion_event.202.a: "Možná je agrese učiní přívětivějšími." # todo: NEW TRANSLATION
  denmark_expansion_event.210.t: "[FROM.GetNameDefCap] požaduje naše [SWE.GetAdjective] majetky" # todo: NEW TRANSLATION
  denmark_expansion_event.210.desc: "[DEN.GetNameDefCap] se zdá být přesvědčen o historických nárocích na naše [SWE.GetAdjective] území. Pokud jim podlehneme, riskujeme ztrátu země kvůli dánskému expanzionismu. Pokud odmítneme, bude to znamenat válku." # todo: NEW TRANSLATION
