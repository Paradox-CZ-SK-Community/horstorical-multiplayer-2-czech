  NORDIC_promote_nordic_unity_desc: "Měli bychom připomenout našim sousedům naši společnou historii a tradici vzájemné pomoci, i když byla poněkud nesourodá." # todo: NEW TRANSLATION
  NORDIC_strenghten_ties_decision: "Posílit vazby s [FROM.GetName]" # todo: NEW TRANSLATION
  NORDIC_strenghten_ties_decision_desc: "Ať chceme nebo ne, historie svázala [ROOT.GetName] a [FROM.GetName]. Můžeme se navzájem učit tím, že posílíme tyto vazby." # todo: NEW TRANSLATION
  NORDIC_strenghtening_ties_flag: "Posilujeme naše vazby s jinou nordickou zemí." # todo: NEW TRANSLATION
  NORDIC_strengthen_ties_TT: "Odemkne rozhodnutí: §YPosílit vazby s Nordickem§!, které přiblíží jinou nordickou zemi diplomacii a politicky k [ROOT.GetName]." # todo: NEW TRANSLATION
  NORDIC_invest_in_nordic: "Investovat do [FROM.GetName]" # todo: NEW TRANSLATION
  NORDIC_invest_in_nordic_desc: "Pokud investujeme do [FROM.GetName], můžeme sklízet výhody souseda a zároveň mu dát slušnou dohodu." # todo: NEW TRANSLATION
  NORDIC_ask_for_investment_to_nordic: "Požádat [FROM.GetName] o investice do nás" # todo: NEW TRANSLATION
  NORDIC_ask_for_investment_to_nordic_desc: "Je jasné, že nám chybí kapitál potřebný k investicím pro náš rozvoj a vzestup. Můžeme požádat našeho nordického souseda, [FROM.GetName], aby do nás vložil část svého kapitálu. Samozřejmě za jejich podporu budou odměněni." # todo: NEW TRANSLATION
  NORDIC_ongoing_investment: "Již investuje do ekonomiky nordické země." # todo: NEW TRANSLATION
  NORDIC_economic_cooperation_decisions: "Usilovat o ekonomickou spolupráci s [FROM.GetName]" # todo: NEW TRANSLATION
  NORDIC_economic_cooperation_decisions_desc: "[ROOT.GetName] a [FROM.GetName] sdílejí století historie. Někdy jako nepřátelé, jindy jako spojenci a přátelští sousedé. V těchto nejistých časech bychom se jako Nordici měli držet spolu a spolupracovat vzájemně výhodným způsobem, jako rovný s rovným." # todo: NEW TRANSLATION
  NORDIC_ongoing_negotiations: "Probíhající jednání" # todo: NEW TRANSLATION
  NORDIC_court_foreign_power: "Ulanit [FROM.GetNameDef]" # todo: NEW TRANSLATION
  NORDIC_court_foreign_power_desc: "Chceme-li dosáhnout dominance, potřebujeme podporu zahraniční moci jako [FROM.GetName]. Připojení k jejich alianci nám dá výhodu, kterou potřebujeme, abychom přinesli změnu na sever." # todo: NEW TRANSLATION
  NORDIC_send_weapons: "Poslat zbraně do [FROM.GetName]" # todo: NEW TRANSLATION
  NORDIC_send_weapons_desc: " TODO_NORDIC" # todo: NEW TRANSLATION
  NORDIC_send_volunteers: "Poslat dobrovolníky na frontu [FROM.GetAdjective]" # todo: NEW TRANSLATION
  NORDIC_send_volunteers_desc: "TODO_NORDIC" # todo: NEW TRANSLATION
  NORDIC_expand_volunteer_program: "Podporovat dobrovolnictví pro frontu [FROM.GetAdjective]" # todo: NEW TRANSLATION
  NORDIC_expand_volunteer_program_desc: " TODO_NORDIC " # todo: NEW TRANSLATION
  NORDIC_defend_nordic_country: "Připojit se k válce za obranu [FROM.GetName]" # todo: NEW TRANSLATION
  NORDIC_defend_nordic_country_desc: "TODO_NORDIC" # todo: NEW TRANSLATION
  NORDIC_decision_no_war_participation: "$NORDIC_no_war_participation$" # todo: NEW TRANSLATION
  NORDIC_decision_no_war_participation_desc: " TODO_NORDIC" # todo: NEW TRANSLATION
  NORDIC_decision_limited_war_participation: "$NORDIC_limited_war_participation$" # todo: NEW TRANSLATION
