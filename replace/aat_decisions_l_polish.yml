  SWE_train_the_sheltered_tt: "Odemkne rozhodnutí k výcviku exilových nordických vojáků. Tato síla je přidána do samostatné zásoby mobilizace, která bude časem růst až do kapacity. Pokud budeme napadeni, tato zásoba se přidá k naší vlastní mobilizaci.\nMůžeme utratit zdroje pro další zvýšení této kapacity.\nPo vypuknutí války tento fond přestane růst" # todo: NEW TRANSLATION
