l_polish:
  ICE_drilling_for_oil_off_shore: "Těžit ropu a zemní plyn u pobřeží" # todo: NEW TRANSLATION
  ICE_drilling_for_oil_off_shore_repeat_tt: "Toto rozhodnutí lze znovu učinit až po §Y180§! dnech" # todo: NEW TRANSLATION
  no_more_oil_tt: "§RVíce nelze najít žádnou ropu§!" # todo: NEW TRANSLATION
  no_more_oil_flag: "Pole ropy jsou vyčerpána" # todo: NEW TRANSLATION
  ICE_improve_the_viking_spirit: "Uctívání našich předků" # todo: NEW TRANSLATION
  ICE_already_improving_the_viking_spirit_flag: "Již zlepšujeme vikingského ducha" # todo: NEW TRANSLATION
  ICE_a_new_yggdrasill: "Moderní Yggdrasil" # todo: NEW TRANSLATION
  ICE_a_new_yggdrasill_desc: "Teď, když lidé znají svůj velký rodokmen, bychom se měli snažit postavit velké projekty a vylepšit ostrov Island, aby mohl dorovnat Miðgarður a Yggdrasil z legend!" # todo: NEW TRANSLATION
  ICE_has_best_spirit_idea: "Plně jsme uctili naše předky" # todo: NEW TRANSLATION
  ICE_the_wisdom_of_odin: "Moudrost Óðinna" # todo: NEW TRANSLATION
  ICE_the_wisdom_of_odin_desc: "Óðinn je bůh spojený se vším od moudrosti, léčení, smrti, královské moci, šibenice, poznání, války, boje, vítězství, čarodějnictví, poezie a šílenství až po runovou abecedu. Získal obrovskou moudrost, když obětoval své oko a napil se z Mímisbrunnru, což mu propůjčilo schopnost nekonečného poznání přítomnosti, budoucnosti i minulosti. Měli bychom se snažit ztělesnit jeho ducha a nést jeho odkaz do budoucna!" # todo: NEW TRANSLATION
  ICE_the_might_of_thor: "Síla Þóra" # todo: NEW TRANSLATION
  ICE_the_might_of_thor_desc: "Þór je bůh hromu, síly a ochránce lidstva. Svojí kladivem Mjölnirem udeřil do mraků, aby rozpoutal bouři, a naše armáda musí vnést stejný hrom a strach do protivníků!" # todo: NEW TRANSLATION
  ICE_the_guidance_of_aegir_and_ran: "Vedení Ægira a Rán" # todo: NEW TRANSLATION
  ICE_the_guidance_of_aegir_and_ran_desc: "Pod vedením Rán a Ægira, personifikace moře a jejího jötunn manžela, naše lodě dosáhnou nadvlády nad severními moři." # todo: NEW TRANSLATION
  ICE_the_ferocity_of_the_fenrir: "Zuřivost Fenrisúlfa" # todo: NEW TRANSLATION
  ICE_the_ferocity_of_the_fenrir_desc: "Fenrisúlfr je spolu s Hel a Světovým hadem dítětem Lokího a obří Arnbody (Angrboða). Během Ragnaröku měl zabít Óðinna, avšak selhal, navzdory své veliké síle a zuřivosti. Naši vojáci musí na bojišti ztělesnit jeho podstatu, aby porazili nepřítele jak na poli, tak v mysli." # todo: NEW TRANSLATION
  ICE_the_fertility_of_freya: "Plodnost Freyji" # todo: NEW TRANSLATION
  ICE_the_fertility_of_freya_desc: "Freyja je mimo jiné bohyní lásky, krásy a plodnosti. Měli bychom vzývat její jméno, aby náš lid měl děti, které se jednou mohou stát velkými bojovníky." # todo: NEW TRANSLATION
  ICE_a_monument_to_leif: "Vztyčit památník Leifuru Eiríkssonovi" # todo: NEW TRANSLATION
  ICE_a_monument_to_leif_desc: "Navzdory rozšířenému mýtu od jižanů, že Kryštof Kolumbus byl prvním Evropanem, který objevil Ameriku, náš velký předek Leifur Eiríksson byl nepochybně skutečně prvním, kdo tak učinil. Na jeho počest bychom měli vystavět památník věnovaný jemu ve Vinlandu, jak dobýváme tyto země pro sebe." # todo: NEW TRANSLATION
  ICE_infiltrate_the_british_isles_category: "Infiltrace Britských ostrovů" # todo: NEW TRANSLATION
  ICE_infiltrate_the_british_isles_category_desc: "Revoluce dělníků se musí rozšířit. Ideálním výchozím bodem jsou utlačovaní dělníci na Britských ostrovech. Antikoloniální a antikapitalistické nálady by měly být využity naplno." # todo: NEW TRANSLATION
  ICE_incite_communist_uprising_scotland: "Podnítit povstání ve Skotsku" # todo: NEW TRANSLATION
  ICE_incite_communist_uprising_scotland_desc: "S malou pomocí bychom měli být schopni přimět skotské dělníky povstat v [121.GetCapitalVictoryPointName] a vyhlásit nezávislost na vládě v [121.owner.capital.GetCapitalVictoryPointName]." # todo: NEW TRANSLATION
  ICE_uprising_scotland_tt: "§Y[121.owner.GetName]§!: Více než [?ICE.communism_support_needed|%Y0] podpory pro [121.owner.GetCommunistParty]" # todo: NEW TRANSLATION
  ICE_incite_communist_uprising_scotland_tt: "§Y[SCO.GetName]§! zahajuje Válku za nezávislost proti §Y[121.owner.GetName]§! v [121.GetName]" # todo: NEW TRANSLATION
  ICE_incite_communist_uprising_wales: "Podnítit povstání v Walesu" # todo: NEW TRANSLATION
  ICE_incite_communist_uprising_wales_desc: "S malou pomocí bychom měli být schopni přimět waleské dělníky povstat v [122.GetCapitalVictoryPointName] a vyhlásit nezávislost na vládě v [122.owner.capital.GetCapitalVictoryPointName]." # todo: NEW TRANSLATION
  ICE_uprising_wales_tt: "§Y[122.owner.GetName]§!: Více než [?ICE.communism_support_needed|%Y0] podpory pro [122.owner.GetCommunistParty]" # todo: NEW TRANSLATION
  ICE_incite_communist_uprising_wales_tt: "§Y[WLS.GetName]§! zahajuje Válku za nezávislost proti §Y[122.owner.GetName]§! v [122.GetName]" # todo: NEW TRANSLATION
  ICE_incite_communist_uprising_ni: "Podnítit povstání v Severním Irsku" # todo: NEW TRANSLATION
  ICE_incite_communist_uprising_ni_desc: "S malou pomocí bychom měli být schopni přimět dělníky Severního Irska povstat v [119.GetCapitalVictoryPointName] a vyhlásit nezávislost na vládě v [119.owner.capital.GetCapitalVictoryPointName]." # todo: NEW TRANSLATION
  ICE_uprising_ni_tt: "§Y[119.owner.GetName]§!: Více než [?ICE.communism_support_needed|%Y0] podpory pro [119.owner.GetCommunistParty]" # todo: NEW TRANSLATION
  ICE_incite_communist_uprising_ni_tt: "§Y[WLS.GetName]§! zahajuje Válku za nezávislost proti §Y[119.owner.GetName]§! v [119.GetName]" # todo: NEW TRANSLATION
  NOR_democratic_preparation_decisions_category: "Budování naší země" # todo: NEW TRANSLATION
  NOR_democratic_preparation_decisions_category_desc: "Naše mladá země má hodně co dohánět, pokud chceme konkurovat zbytku světa. Desítky let zanedbávání a roky Velké deprese zanechaly náš průmysl v žalostném stavu, který vyžaduje soustředěné úsilí k nápravě.\n\nBohužel to bude na úkor naší vojenské připravenosti a obranných schopností, ale spoléháme se na naši politiku absolutní a neozbrojené neutrality, že prokáže naši dobrou vůli a případní nepřátelé bezpečně přehlédnou naše území. \n\n\n[NOR.GetName]'s Total Development: [?NOR.NOR_country_preparedness]/30" # todo: NEW TRANSLATION
  NOR_historical_deploy_prep_decisions_category: "Připravujeme se na bouři" # todo: NEW TRANSLATION
  NOR_historical_deploy_prep_decisions_category_desc: "Navzdory našemu nejlepšímu úsilí dorazila válka na naše pobřeží. Doposud jsme soustředili energii na rozvoj průmyslu, ekonomiky a infrastruktury naší země, ale nyní je nezbytné najít způsoby, jak toho využít pro obranu [NOR.GetNameDef].\n\n\n[NOR.GetName]'s Potential Preparedness: [?NOR.NOR_country_preparedness]/30" # todo: NEW TRANSLATION
  NOR_allied_democratic_preparation_decisions_category: "Připravujeme Norsko na válku" # todo: NEW TRANSLATION
  NOR_allied_democratic_preparation_decisions_category_desc: "Tato vláda je přesvědčena, že naši nepřátelé udeří každou chvíli. Musíme být odhodlaní vyzbrojit obyvatelstvo [NOR.GetName], abychom zabránili invazi. I kdyby to znamenalo útok preventivní. Svolejme naši zemi a vezměme si moc, kterou potřebujeme k rozhodnému vítězství nad nepřáteli.\n\nNárodní připravenost: [?NOR.NOR_country_preparedness]/30" # todo: NEW TRANSLATION
  NOR_allied_democratic_deploy_prep_decisions_category: "Nasazení našich válečných příprav" # todo: NEW TRANSLATION
  NOR_allied_democratic_deploy_prep_decisions_category_desc: "Jak jsme očekávali, válka je konečně tady, ale není čeho se bát. Posledních několik let jsme věnovali všechny úsilí tomu, aby byl [ROOT.GetName] připraven na cokoliv, co nám nepřátelé přinesou. Ukážeme jim, z čeho jsme ušiti.\n\nNárodní připravenost: [?NOR.NOR_country_preparedness]/30" # todo: NEW TRANSLATION
  NOR_prepare_state_alt_dem: "Připravit [FROM.GetName] na válku" # todo: NEW TRANSLATION
  NOR_prepare_state_alt_dem_desc: "Jsme zoufale nepřipraveni na to, co přijde. Musíme podniknout vhodná opatření, aby [FROM.GetName] mohl přispět k válečnému úsilí, jakmile vypukne válka. Někteří lidé tomu neporozumí, ale rozhodli jsme se. Není cesty zpět." # todo: NEW TRANSLATION
  NOR_alt_dem_naval_expansion: "Rozšíření námořnictva" # todo: NEW TRANSLATION
  NOR_alt_dem_naval_expansion_desc: "Rozvoj námořnictva je zásadní, nejen proto, že budeme bránit naše rozsáhlé pobřeží proti vetřelcům, ale protože může sloužit jako odrazový můstek k tomu, abychom boj přenesli na jejich domovské břehy." # todo: NEW TRANSLATION
  NOR_alt_dem_military_industry_expansion: "Rozšířit vojenský průmysl" # todo: NEW TRANSLATION
  NOR_alt_dem_military_industry_expansion_desc: "Nemůžeme spoléhat na jiné země, že nám budou dodávat vybavení; vojenští obchodníci dneška mohou být zítra naši nepřátelé. Musíme rozšířit průmyslovou kapacitu k výrobě materiálu, který potřebujeme k boji." # todo: NEW TRANSLATION
  NOR_alt_dem_economic_relief_measures: "Hospodářská úleva" # todo: NEW TRANSLATION
  NOR_alt_dem_economic_relief_measures_desc: "Populace je unavena naší vojenskou mobilizací. Nemusejí vidět to, co my, a nemusí chápat, že jejich oběť je nutná, aby náš válečný stroj pokračoval v tažení za vítězstvím. To nic, teď je uklidníme." # todo: NEW TRANSLATION
  NOR_alt_dem_expedite_training: "Urychlit výcvik" # todo: NEW TRANSLATION
  NOR_alt_dem_expedite_training_desc: "Ocitáme se v kritické situaci. Pokud brzy nezačneme vycvičovat nové vojáky, můžeme být všichni ztraceni." # todo: NEW TRANSLATION
  NOR_alt_dem_prioritize_production: "Upřednostnit výrobu" # todo: NEW TRANSLATION
  NOR_alt_dem_prioritize_production_desc: "Náš válečný stroj potřebuje vybavení a potřebuje ho teď! Nechme továrny běžet nepřetržitě, aby naši stateční vojáci měli prostředky k poražení nepřátel, ať to stojí, co to stojí." # todo: NEW TRANSLATION
  NOR_alt_dem_offensive_push: "Ofenzivní nápor" # todo: NEW TRANSLATION
  NOR_alt_dem_offensive_push_desc: "Všechno ostatní stranou, je čas zaútočit. Postupme vpřed a rozdrťme nepřátele dřív, než poznají, co je zasáhlo." # todo: NEW TRANSLATION
  NOR_alt_dem_focus_on_defense: "Zaměřit se na obranu" # todo: NEW TRANSLATION
  NOR_alt_dem_focus_on_defense_desc: "Až donedávna bylo [NOR.GetName] mírumilovnou a odšťavněnou zemí, natáhli jsme se hodně. Musíme se teď zaměřit na obranu toho, co máme." # todo: NEW TRANSLATION
  NOR_alt_dem_modernize_armed_forces_decision: "$NOR_modernize_armed_forces_decision$" # todo: NEW TRANSLATION
  NOR_alt_dem_modernize_armed_forces_decision_desc: "$NOR_modernize_armed_forces_decision_desc$" # todo: NEW TRANSLATION
  NOR_fascist_preparation_decisions_category: "Číhání ve stínech" # todo: NEW TRANSLATION
  NOR_fascist_preparation_decisions_category_desc: "Strana Nasjonal Samling historicky měla v [NOR.GetAdjective] společnosti velmi omezenou podporu, proto je důležité šířit její učení po celé zemi a vybudovat základnu podpory.\n\nZasadíme semínka fašismu, až přijde vhodná příležitost sklidíme plody našeho plánování a převezmeme kontrolu nad [ROOT.GetName].\n\n\n[NOR.GetName]'s total support for Nasjonal Samling: [?NOR.NOR_country_preparedness]/30" # todo: NEW TRANSLATION
  NOR_fascist_deploy_prep_decisions_category: "Vystoupat ze stínů" # todo: NEW TRANSLATION
  NOR_fascist_deploy_prep_decisions_category_desc: "Čas na schovávání skončil, nasbírali jsme dost podpory k zahájení převzetí [NOR.GetName]. Nyní musíme nasadit naše přípravy v každém území našeho Otčiny.\n\nBudovali jsme podporu zdola a zasadili buňky, které jsou připraveny převzít svá území na rozkaz našeho velkého Fører a proti zbabělým silám demokracie." # todo: NEW TRANSLATION
  NOR_communist_preparation_decisions_category: "Bouření proletariátu" # todo: NEW TRANSLATION
  NOR_communist_preparation_decisions_category_desc: "[GetRousingProletariatDesc]" # todo: NEW TRANSLATION
  NOR_communist_preparation_decisions_category_desc_stalinist: "Lidé z [ROOT.GetName] měli dlouho zavřené oči, je čas, aby konečně poslechli volání našich bratrů a sester v [SOU.GetNameDef].\n\nPoužijme je jako příklad toho, čeho může [ROOT.GetName] dosáhnout, když uchvátí výrobní prostředky a sjednotí se pod jednou vlajkou a jedním vůdcem, který je povede k boji proti tyranii Osla.$NOR_revolution_support_counter$" # todo: NEW TRANSLATION
  NOR_communist_preparation_decisions_category_desc_trostkyist: "Je čas, aby lidé [NOR.GetName] vyslechli učení Marxe a Troskije a připravili se na nevyhnutelný střet, který promění naši zemi v předvoj komunismu ve Skandinávii.\n\nPřijměme oheň a síru Permanentní revoluce a sjednoťme zemi proti silám kapitalismu v Oslu.$NOR_revolution_support_counter$" # todo: NEW TRANSLATION
  NOR_communist_preparation_decisions_category_desc_other: "Revoluce musí přijít zdola nahoru, od mas, které dřou na panského či průmyslníka.\n\nMnozí z našich proletářských bratří a sester neznají moc, kterou drží, takže musíme vyrazit a rozvášnit proletariát, aby se sjednotil proti Oslu a svrhl řetězy kapitalismu, jeden stát po druhém.$NOR_revolution_support_counter$" # todo: NEW TRANSLATION
  NOR_revolution_support_counter: "\n\n\nCelková podpora naší revoluce:  [?NOR.NOR_country_preparedness]/[?NOR.NOR_comm_prep_max_preparedness]" # todo: NEW TRANSLATION
  NOR_monarchist_preparation_decisions_category: "Ukažme králi Haakonovi naši podporu jeho vládě" # todo: NEW TRANSLATION
  NOR_monarchist_preparation_decisions_category_desc: "Ještě před svým nástupem na trůn náš pokorný král Haakon VII svěřil své pravomoci Stortingu a jeho orgánům. To bylo v té době rozumné, ale musíme mu ukázat, že ho podporujeme v tom, aby převzal přímou kontrolu nad [ROOT.GetName], dřív než nebude co ovládat.\n\n\nCelková podpora monarchii:  [?NOR.NOR_country_preparedness]/30" # todo: NEW TRANSLATION
  NOR_prepare_state_historical: "Rozvíjet [?FROM.GetName]" # todo: NEW TRANSLATION
  NOR_prepare_state_historical_desc: "Naše průmyslová základna je v troskách, ale jsme ochotni vynaložit potřebné úsilí, abychom zlepšili situaci pro lidi v [ROOT.GetName] a naše šance na přežití, pokud by nastalo nejhorší." # todo: NEW TRANSLATION
  NOR_prepare_historical_unlock_TT: "Odemkne rozhodnutí §YRozvíjet stát§!, která umožňují zrychlit §GCivilní výstavbu§!, ale dávají tresty k §Rvojenské výstavbě a obraně§!." # todo: NEW TRANSLATION
  NOR_prepare_fascist_unlock_TT: "Odemkne rozhodnutí §YBudovat podporu ve státě§!, která §GPZvyšují podporu fašismu§! a dávají §GTerritorium a výhody§! při začátku občanské války, ale dávají tresty k §Rcivilnímu průmyslu§!." # todo: NEW TRANSLATION
  NOR_prepare_communist_unlock_TT: "Odemkne §YRozviň proletariát ve státě§!, které dávají §GTerritorium a jednotky§! při začátku komunistické revoluce, ale §Rpoškodí budovy§! ve státě." # todo: NEW TRANSLATION
  NOR_deploy_state_preparation_historical: "[get_deploy_prep_decision_name]" # todo: NEW TRANSLATION
  NOR_decision_defend_state_title: "Bránit [FROM.GetName]" # todo: NEW TRANSLATION
  NOR_decision_emergency_production_title: "Nouzová výroba v [FROM.GetName]" # todo: NEW TRANSLATION
  NOR_decision_deploy_emergency_militias_title: "Nasadit milice v [FROM.GetName]" # todo: NEW TRANSLATION
  NOR_dem_his_integrate_militias: "Integrovat milice" # todo: NEW TRANSLATION
  NOR_dem_his_integrate_militias_desc: "Teď, když muži, kteří tvořili naše milice, prokázali svou hodnotu, můžeme je lépe integrovat do armády, do běžných praporů a divizí." # todo: NEW TRANSLATION
  NOR_alt_dem_integrate_militias: "$NOR_dem_his_integrate_militias$" # todo: NEW TRANSLATION
  NOR_alt_dem_integrate_militias_desc: "$NOR_dem_his_integrate_militias_desc$" # todo: NEW TRANSLATION
  NOR_prepare_exile: "Připravit exil" # todo: NEW TRANSLATION
  NOR_prepare_exile_desc: "Realita je nepopiratelná. Naše země se neubrání nepřátelům navěky, ale můžeme bránit dost dlouho na to, abychom dostali co nejvíce z země a bojovali jindy." # todo: NEW TRANSLATION
  NOR_focus_on_training: "Zaměřit se na výcvik" # todo: NEW TRANSLATION
  NOR_focus_on_training_desc: "Musíme vložit veškeré úsilí do proměny našich rezerv a nováčků ve vojáky a rychle je posílat na frontu, protože fronta nemusí dlouho vydržet." # todo: NEW TRANSLATION
  NOR_modernize_armed_forces_decision: "Modernizovat ozbrojené síly" # todo: NEW TRANSLATION
  NOR_modernize_armed_forces_decision_desc: "Armáda [ROOT.GetAdjective] byla dlouho zanedbávána, naše ozbrojené síly vypadají spíše jako do muzea než pro bitevní pole." # todo: NEW TRANSLATION
  NOR_move_government_headquarters_decision: "Přesunout vládu do [FROM.GetName]" # todo: NEW TRANSLATION
  NOR_move_government_headquarters_decision_desc: "Pokud by naše vláda padla rukou nepřítele, znamenalo by to naši i královu a princovu zkázu. Jediná možnost je zůstat v pohybu a vyhýbat se nevyhnutelnému co nejdéle." # todo: NEW TRANSLATION
  NOR_expedite_training: "Urychlit výcvik" # todo: NEW TRANSLATION
  NOR_expedite_training_desc: "Nejlépe vycvičit naše jednotky je zásadní pro přežití, ale bude to marné, pokud dokončí výcvik a nebude již co bránit. Musíme tlačit co nejrychleji, než budeme vyhnáni z naší země." # todo: NEW TRANSLATION
  NOR_public_investment_drive: "Veřejné investiční tažení" # todo: NEW TRANSLATION
  NOR_public_investment_drive_desc: "V [ROOT.GetName] je mnoho práce, která se nezdaří bez přímých veřejných investic. Zaplavme zemi infrastrukturou a stavebními projekty." # todo: NEW TRANSLATION
  NOR_naval_expanion: "Rozšíření námořnictva" # todo: NEW TRANSLATION
  NOR_naval_expanion_desc: "Chceme-li přežít, musíme chránit naše pobřeží a k tomu potřebujeme lodě. Udělejme z každého fjordu loděnici." # todo: NEW TRANSLATION
  NOR_prepare_state_fascist: "Budovat podporu v [FROM.GetName]" # todo: NEW TRANSLATION
  NOR_deploy_state_preparation_fascist: "[get_deploy_prep_decision_name_fascist]" # todo: NEW TRANSLATION
  NOR_invite_fascist_to_invade: "Pozvat [GER.GetNameDef] aby vpadl do [NOR.GetNonIdeologyName]" # todo: NEW TRANSLATION
  NOR_decision_take_over_state_title: "Převzít kontrolu v [FROM.GetName]" # todo: NEW TRANSLATION
  NOR_decision_industrial_takeover_title: "Průmyslové převzetí v [FROM.GetName]" # todo: NEW TRANSLATION
  NOR_decision_military_takeover_title: "Vojenské převzetí v [FROM.GetName]" # todo: NEW TRANSLATION
  NOR_prepare_state_communist: "Rozvášnit proletariát v [FROM.GetName]" # todo: NEW TRANSLATION
  NOR_prepare_state_communist_desc: "Lidé z [FROM.GetName] byli příliš dlouho vykořisťováni ve spánku. Zasadíme semínka bouřlivé revoluce." # todo: NEW TRANSLATION
  NOR_communist_propaganda_campaign: "Komunistická propagandistická kampaň" # todo: NEW TRANSLATION
  NOR_prepare_state_monarchist: "Monarchistická demonstrace v [FROM.GetName]" # todo: NEW TRANSLATION
  NOR_prepare_state_monarchist_desc: "Lidé z [FROM.GetName] potřebují připomenout volby z roku 1905 a proč do funkce zvolili svého krále. Brzy budou vyžadovat přímý zásah krále." # todo: NEW TRANSLATION
  NOR_prop_up_the_economy: "Podpořit ekonomiku" # todo: NEW TRANSLATION
  NOR_prop_up_the_economy_desc: "Nedosáhneme svých politických cílů, pokud budou lidé hladovět. Musíme přerušit naši monarchistickou kampaň, abychom se postarali o naše poddané a jejich potřeby." # todo: NEW TRANSLATION
  NOR_make_assurances_to_the_people: "Ujistit lidi [NOR.GetNonIdeologyName]" # todo: NEW TRANSLATION
  NOR_make_assurances_to_the_people_desc: "V [NOR.GetName] jsou to děsivé časy, takže musíme přes média ubezpečit, že to přečkáme, a až to skončí, náš vlídný král povede tažení za naše přežití." # todo: NEW TRANSLATION
  NOR_promote_the_armed_defense_of_the_country: "Prosazovat ozbrojenou obranu [NOR.GetName]" # todo: NEW TRANSLATION
  NOR_promote_the_armed_defense_of_the_country_desc: "Lidé z [NOR.GetName] si musí připomenout, co se stane, pokud nebudou bránit naši zemi. Každý musí sehrát svou roli v nastávajícím konfliktu." # todo: NEW TRANSLATION
  NOR_exile_decisions_category: "Exilová vláda [ROOT.GetName]" # todo: NEW TRANSLATION
  NOR_exile_decisions_category_desc: "Ocitli jsme se v nejhorší situaci. Po ztrátě našeho území nepříteli nemáme jinou možnost než žít v exilu. Můžeme být alespoň vděčni našemu velkorysému hostiteli a doufat, že jednoho dne s jejich pomocí budeme opět ve své milované [NOR.GetNonIdeologyName]." # todo: NEW TRANSLATION
  NOR_request_reinstatement: "Žádat [FROM.GetNameDef] o obnovení vlády" # todo: NEW TRANSLATION
  NOR_request_reinstatement_desc: "Náš nepřítel ztrácí půdu v [NOR.GetName] a myslíme, že je čas obnovit naši vládu na jejím právoplatném místě." # todo: NEW TRANSLATION
  NOR_lobby_for_parliamentary_support: "Lobovat za podporu v [FROM.GetAdjective] vládě" # todo: NEW TRANSLATION
  NOR_lobby_for_parliamentary_support_desc: "Naši hostitelé byli zatím velmi štědří, ale možná je třeba jim připomenout, čím naši lidé procházejí, aby nikdy nezapomněli, o co pro nás jde." # todo: NEW TRANSLATION
  NOR_bring_soldiers_from_norway: "Dovézt vojáky z [NOR.GetNonIdeologyName]" # todo: NEW TRANSLATION
  NOR_bring_soldiers_from_norway_desc: "Mnozí, kteří bojovali za obranu naší země, zůstali uvězněni v domovině. Můžeme se snažit přivézt některé z nich a další, kteří možná ještě nebojovali, ale chtějí se vrátit a dobýt svou zemi zpět." # todo: NEW TRANSLATION
  NOR_weapons_for_the_resistance: "Získat a rozdělit zbraně" # todo: NEW TRANSLATION
  NOR_weapons_for_the_resistance_desc: "Můžeme využít naše obrovské obchodní loďstvo k získávání zbraní jak pro naše úsilí zde, tak pro odboj v naší vlasti. Zbraně tam oslabí úchop nepřítele nad [NOR.GetNonIdeologyName] a zbraně zde zasadí rozhodující úder tyranii." # todo: NEW TRANSLATION
  NOR_unity_parade: "Jednotný průvod v [FROM.Capital.GetCapitalVictoryPointName]" # todo: NEW TRANSLATION
  NOR_unity_parade_desc: "Zaplníme ulice [FROM.Capital.GetCapitalVictoryPointName] našimi hlasy, abychom připomněli lidem tohoto velkého města, že náš boj a jejich boj jsou jedno a totéž." # todo: NEW TRANSLATION
  NOR_joint_training_exercise: "Společné cvičení s [FROM.GetNameDef]" # todo: NEW TRANSLATION
  NOR_joint_training_exercise_desc: "Pokud doufáme v vítězství, naše síly musí být s [FROM.GetNameDef] jednotné. To lze dosáhnout jen cvičením a hlubokou spoluprací s našimi spojenci." # todo: NEW TRANSLATION
  NOR_expand_industrial_capacity: "Investovat do průmyslové kapacity" # todo: NEW TRANSLATION
  NOR_expand_industrial_capacity_desc: "I když jsme v exilu, nejsme bezmocní. Máme jedno z největších obchodních loďstev na světě k dispozici a můžeme ho využít k získání průmyslové kapacity potřebné k financování našeho úsilí o návrat domů." # todo: NEW TRANSLATION
  NOR_foment_resistance_in_state: "Podněcovat odpor v [FROM.GetName]" # todo: NEW TRANSLATION
  NOR_foment_resistance_in_state_desc: "Lidé v [FROM.GetName] mají ducha odporu a bojují proti našemu nepříteli! Potřebují jen malý impuls, aby to bylo rozhodující." # todo: NEW TRANSLATION
  NOR_support_rebellion: "Podpořit povstání v [FROM.GetName]" # todo: NEW TRANSLATION
  NOR_support_rebellion_desc: "Naše snahy o odboj v [FROM.GetName] se vyplatily. Lidé jsou připraveni vystoupit proti svým utlačovatelům. Nechme je zahájit boj a jakmile začnou, budeme připraveni vrátit se a bojovat." # todo: NEW TRANSLATION
