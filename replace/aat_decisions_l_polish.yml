  DEN_balance_of_power_category: "$DEN_balance_of_power$" # todo: NEW TRANSLATION
  DEN_short_reset_time_tt: "Tuto akci lze opakovat za §Y[?DEN_short_reset_time]§! dní" # todo: NEW TRANSLATION
  DEN_medium_reset_time_tt: "Tuto akci lze opakovat za §Y[?DEN_medium_reset_time]§! dní" # todo: NEW TRANSLATION
  DEN_long_reset_time_tt: "Tuto akci lze opakovat za §Y[?DEN_long_reset_time]§! dní" # todo: NEW TRANSLATION
  DEN_very_long_reset_time_tt: "Tuto akci lze opakovat za §Y[?DEN_very_long_reset_time]§! dní" # todo: NEW TRANSLATION
  DEN_bop_defend_our_chosen_path: "Bránit naši zvolenou cestu" # todo: NEW TRANSLATION
  DEN_hurt_military_ability_tt: "Tato akce uškodí vojenské schopnosti o" # todo: NEW TRANSLATION
  DEN_bop_exile_royal_family: "Vysídlit královskou rodinu" # todo: NEW TRANSLATION
  DEN_bop_ban_elections: "Zákaz voleb" # todo: NEW TRANSLATION
  DEN_bop_motion_of_no_confidence: "Návrh na vyslovení nedůvěry" # todo: NEW TRANSLATION
  DEN_bop_motion_of_no_confidence_desc: "Současná vláda se zdá být neschopná jakéhokoli rozumného kroku k záchraně [DEN.GetNameDef] a jeho lidí. Je potřeba nové rozhodné vedení! Rigsdagen musí podat „hlasování o nedůvěře“ vůči vedení [DEN.GetLeader]." # todo: NEW TRANSLATION
  DEN_bop_criticize_the_country_leader: "Kritizovat [DEN.GetLeader]" # todo: NEW TRANSLATION
  DEN_bop_criticize_the_country_leader_desc: "Členové Rigsdagen zpochybňují vedení [ROOT.GetLeader] za zavřenými dveřmi, ale nikdo se neodváží to udělat navenek. Někdo musí otevřeně kritizovat a svolat většinu Rigsdagen, aby připravil cestu pro návrh na nedůvěru!" # todo: NEW TRANSLATION
  DEN_has_criticized_country_leader_flag: "Kritika [DEN.GetLeader] proběhla" # todo: NEW TRANSLATION
  DEN_bop_defend_our_chosen_path_neutrality: "£BoP_left_texticon Bránit naši zvolenou cestu" # todo: NEW TRANSLATION
  DEN_bop_defend_our_chosen_path_neutrality_desc: "Dobře či špatně, vydali jsme se na cestu, od které by bylo velmi nerozumné odbočit. Musíme věřit rozhodnutím, která nás sem přivedla, a doufat, že je to správná cesta." # todo: NEW TRANSLATION
  DEN_bop_ban_all_political_uniforms: "£BoP_left_texticon Zákaz všech politických uniforem" # todo: NEW TRANSLATION
  DEN_bop_ban_all_political_uniforms_desc: "Po celé Evropě pochodují politické uniformy v řadách, jako by to byla vojenská přehlídka. A po celé Evropě kráčí politické nepokoje a nestabilita, vnášející kontinent do chaosu. Musíme zabránit tomu, aby tento vývoj zasáhl [ROOT.GetNameDef] dřív, než bude pozdě." # todo: NEW TRANSLATION
  DEN_bop_unban_oppositions_uniforms: "£BoP_left_texticon Povolit opozici nosit politické uniformy" # todo: NEW TRANSLATION
  DEN_bop_unban_oppositions_uniforms_desc: "Nemůžeme zakazovat používání politických uniforem jiné strany, pokud naši stoupenci pochodují ulicemi jako účastníci vojenské přehlídky. Musíme toto cenzurní opatření zrušit." # todo: NEW TRANSLATION
  DEN_bop_defend_the_policy_of_neutrality: "£BoP_left_texticon Bránit politiku neutrality" # todo: NEW TRANSLATION
  DEN_bop_defend_the_policy_of_neutrality_desc: "Neutralita nám sloužila dobře, zejména během Velké války, kdy boje zuřily po celé Evropě. Ale ne zde, ne v Dánsku. Byli jsme ušetřeni. Neutralita nám skutečně dobře sloužila." # todo: NEW TRANSLATION
  DEN_bop_speak_out_in_favor_of_disarmament: "£BoP_left_texticon Vyjádřit se ve prospěch odzbrojení" # todo: NEW TRANSLATION
  DEN_bop_speak_out_in_favor_of_disarmament_desc: "Jako malý národ obklopený velmocemi nemáme naději odrazit invazi, tak proč utrácet peníze za obranu, která nám nikdy nepomůže, ale mohla by potenciálně rozhněvat naše mnohem větší sousedy?" # todo: NEW TRANSLATION
  DEN_bop_speak_out_against_warfare: "£BoP_left_texticon Mluvit proti zbrojení" # todo: NEW TRANSLATION
  DEN_bop_speak_out_against_warfare_desc: "Přezbrojení nyní by mohlo být vnímáno jako provokace ze strany okolních velmocí. Nemůžeme riskovat rozhněvání většího souseda, protože nemáme prostředky, jak se bránit proti silnější armádě." # todo: NEW TRANSLATION
  DEN_bop_expand_the_welfare: "£BoP_left_texticon Rozšířit systém sociální péče" # todo: NEW TRANSLATION
  DEN_bop_expand_the_welfare_desc: "Místo válečného šílenství a plýtvání penězi na obranu, která nemůže odolat útoku žádné z velmocí v okolí, bychom měli zvýšit výdaje na náš rozvíjející se sociální systém!" # todo: NEW TRANSLATION
  DEN_bop_unban_all_political_uniforms: "£BoP_right_texticon Povolit všechny politické uniformy" # todo: NEW TRANSLATION
  DEN_bop_unban_all_political_uniforms_desc: "Nemůžeme nechat zákaz politických uniforem v platnosti, protože omezuje práva lidu!" # todo: NEW TRANSLATION
  DEN_bop_ban_oppositions_uniforms: "£BoP_right_texticon Zákaz politických uniforem opozice" # todo: NEW TRANSLATION
  DEN_bop_ban_oppositions_uniforms_desc: "Nemůžeme dovolit, aby naši političtí oponenti pochodovali ve svých uniformách a předváděli se. To jen šíří nespokojenost a rozkol. Měli bychom zakázat všechny politické uniformy - kromě těch u moci samozřejmě." # todo: NEW TRANSLATION
  DEN_bop_defend_our_chosen_path_rearmament: "£BoP_right_texticon Bránit naši zvolenou cestu" # todo: NEW TRANSLATION
  DEN_bop_defend_our_chosen_path_rearmament_desc: "$DEN_bop_defend_our_chosen_path_neutrality_desc$" # todo: NEW TRANSLATION
  DEN_bop_criticize_our_preparedness: "£BoP_right_texticon Kritizovat naši připravenost" # todo: NEW TRANSLATION
  DEN_bop_criticize_our_preparedness_desc: "Nad Evropou se opět stahují tmavé mraky a my nejsme připraveni na příchozí bouři! Musíme začít s přípravami co nejdříve, chceme-li tuto bouři přečkat." # todo: NEW TRANSLATION
  DEN_bop_question_our_defenses: "£BoP_right_texticon Zpochybnit naše obrany" # todo: NEW TRANSLATION
  DEN_bop_question_our_defenses_desc: "Dlouho udržovaná politika neutrality nás zbavila obrany! Kdyby nás napadl cizí moc, nic by je nezastavilo v postupu přímo do Kodaně. Musíme zajistit obranu, chceme-li přežít jako národ!" # todo: NEW TRANSLATION
  DEN_bop_speak_out_against_welfare: "£BoP_right_texticon Mluvit proti systému sociální péče" # todo: NEW TRANSLATION
  DEN_bop_speak_out_against_welfare_desc: "Nejdřív je třeba zajistit obranu a nezávislost, teprve potom můžeme utrácet na cokoli jiného. Bez dánského národa nejsou Dánové, na které by se dávky utrácely." # todo: NEW TRANSLATION
  DEN_bop_speak_out_in_favor_of_rearmament: "£BoP_right_texticon Mluvit ve prospěch přezbrojení" # todo: NEW TRANSLATION
  DEN_bop_speak_out_in_favor_of_rearmament_desc: "Nemůžeme sedět se založenýma rukama, když Evropa vstupuje do závodu ve zbrojení a nejisté časy nás čekají. Musíme připravit obranu a zahájit přezbrojení co nejdříve, ideálně včera!" # todo: NEW TRANSLATION
  DEN_bop_landstorm: "£BoP_right_texticon Obnovit Landstorm" # todo: NEW TRANSLATION
  DEN_bop_landstorm_desc: "S narůstajícím nepokojem je nejvyšší čas znovu zavést Landstorm k obraně našeho území. I když nejsou vysoce kvalitní, tyto jednotky mohou být poslední linií obrany." # todo: NEW TRANSLATION
  DEN_bop_hold_a_military_parade: "£BoP_right_texticon Uspořádat vojenskou přehlídku" # todo: NEW TRANSLATION
  DEN_bop_hold_a_military_parade_desc: "Uspořádáním vojenské přehlídky posílíme víru lidu v naši schopnost bránit [ROOT.GetNameDef]. Určitě to posílí morálku a odhodlání vidět nasazení našich jednotek." # todo: NEW TRANSLATION
  DEN_bop_occupation_criticize_collaboration: "£BoP_right_texticon Kritizovat kolaborační politiku" # todo: NEW TRANSLATION
  DEN_bop_occupation_criticize_collaboration_desc: "Tato hanebná kapitulace a nečistá kolaborace mezi [ROOT.GetNameDef] a [?DEN.DEN_overlord_nation.GetNameDef] nestojí za papír, na kterém je podepsána!" # todo: NEW TRANSLATION
  DEN_bop_occupation_strikes: "£BoP_right_texticon Tajně koordinovat stávky" # todo: NEW TRANSLATION
  DEN_bop_occupation_strikes_decs: "Nejlepší, co můžeme nyní udělat, je pasivně protestovat proti [?DEN.DEN_overlord_nation.GetAdjective] okupaci koordinováním celonárodních stávek." # todo: NEW TRANSLATION
  DEN_bop_occupation_resistance_coordination: "£BoP_right_texticon Koordinovat odboj" # todo: NEW TRANSLATION
  DEN_bop_occupation_resistance_coordination_desc: "Chceme-li získat svobodu zpět, musíme se sjednotit do společného odbojového hnutí a bojovat za osvobození [ROOT.GetNameDef]." # todo: NEW TRANSLATION
  DEN_bop_occupation_underground_factories: "£BoP_right_texticon Podzemní zbrojní továrny" # todo: NEW TRANSLATION
  DEN_bop_occupation_underground_factories_desc: "Abychom měli větší šanci na znovuvybudování svrchovanosti, potřebujeme zásoby zbraní. Musíme postavit tajné zbrojní továrny, aby se lid mohl ozbrojit, až přijde den, kdy budeme muset bojovat o svobodu." # todo: NEW TRANSLATION
  DEN_bop_occupation_raid_depots: "£BoP_right_texticon Přepadnout zásobníky zbraní" # todo: NEW TRANSLATION
  DEN_bop_occupation_raid_depots_desc: "Naše domácí zbrojní továrny vyrábějí a napomáhají [?DEN.DEN_overlord_nation.GetNameDef] se zbraněmi používanými v jejich válkách. Přepadení zásobníků zbraní sníží jejich zásoby a posílí náš odboj zároveň." # todo: NEW TRANSLATION
  DEN_bop_occupation_sabotage_civ_industry: "£BoP_right_texticon Sabotovat civilní průmysl" # todo: NEW TRANSLATION
  DEN_bop_occupation_sabotage_civ_industry_desc: "Naše domácí továrny jsou nuceny vyrábět a pomáhat [?DEN.DEN_overlord_nation.GetNameDef] s materiálem pro jejich válečné úsilí. Sabotáž těchto továren sníží zásoby materiálu, což poškodí německé válečné úsilí." # todo: NEW TRANSLATION
  DEN_bop_occupation_sabotage_mil_industry: "£BoP_right_texticon Sabotovat vojenský průmysl" # todo: NEW TRANSLATION
  DEN_bop_occupation_sabotage_mil_industry_desc: "Naše domácí zbrojní továrny pomáhají [?DEN.DEN_overlord_nation.GetNameDef] s výrobou zbraní. Sabotáž těchto továren sníží zásoby zbraní, poškodí německé válečné úsilí a pomůže našim potenciálním spojencům." # todo: NEW TRANSLATION
  DEN_bop_occupation_funnel_resources_danish_brigade: "£BoP_right_texticon Přesměrovat zdroje na dánské brigády" # todo: NEW TRANSLATION
  DEN_bop_occupation_funnel_resources_danish_brigade_desc: "[?DEN.hosts_danish_brigades.GetNameDefCap] laskavě přijala a trénuje dánské jednotky, které mohou pomoci osvobodit [ROOT.GetNameDef], až nastane čas. Aby měly co nejlepší šanci na úspěch, musíme je podpořit penězi a materiálem." # todo: NEW TRANSLATION
  DEN_bop_occupation_switch_ideology: "Přijmout [?DEN.DEN_overlord_nation.GetRulingIdeologyNoun]" # todo: NEW TRANSLATION
  DEN_bop_occupation_switch_ideology_desc: "Chceme-li se skutečně sblížit s [?DEN.DEN_overlord_nation.GetNameDef] a získat jejich podporu, musíme přijmout jejich ideologii a přesvědčení." # todo: NEW TRANSLATION
  DEN_bop_occupation_ban_elections: "£BoP_left_texticon Zákaz voleb" # todo: NEW TRANSLATION
  DEN_bop_occupation_ban_elections_desc: "Musíme uspokojit naše [?DEN.DEN_overlord_nation.GetAdjective] pány zákazem svobodných voleb" # todo: NEW TRANSLATION
  DEN_bop_occupation_defend_collaboration: "£BoP_left_texticon Bránit kolaborační politiku" # todo: NEW TRANSLATION
  DEN_bop_occupation_defend_collaboration_desc: "Kapitulace a kolaborace s [?DEN.DEN_overlord_nation.GetNameDef] byla jediné správné rozhodnutí! Ušetřila nám hrůzy a zkázu, kterou si ani nedokážeme představit." # todo: NEW TRANSLATION
  DEN_bop_occupation_censor_the_media: "£BoP_left_texticon Cenzurovat média" # todo: NEW TRANSLATION
  DEN_bop_occupation_censor_the_media_desc: "V této prekérní situaci nemůžeme dovolit médiím otevřeně kritizovat [?DEN.DEN_overlord_nation.GetAdjective] okupaci. Musíme je omezit v tom, co mohou publikovat, aby se nezatížily naše poslední zbytky svobody." # todo: NEW TRANSLATION
  DEN_bop_occupation_remove_political_agitator: "£BoP_left_texticon Odstranit politické agitátory" # todo: NEW TRANSLATION
  DEN_bop_occupation_remove_political_agitator_desc: "Někteří prominentní politici se neostýchají kritizovat naše [?DEN.DEN_overlord_nation.GetAdjective] pány, což zvyšuje napětí mezi našimi zeměmi. Musíme tyto troublemakery odstranit z jejich postů dřív, než nás [?DEN.DEN_overlord_nation.GetNameDef] donutí." # todo: NEW TRANSLATION
  DEN_bop_occupation_ban_communism: "£BoP_left_texticon Zákaz komunismu" # todo: NEW TRANSLATION
  DEN_bop_occupation_ban_communism_desc: "Naši [?DEN.DEN_overlord_nation.GetAdjective] pánové vidí sami sebe ve válce s komunistickou ideologií a ocenili by naši spolupráci, kdybychom zakázali všechny komunistické organizace v naší zemi." # todo: NEW TRANSLATION
  DEN_bop_occupation_allow_communism: "£BoP_left_texticon Povolit komunismus" # todo: NEW TRANSLATION
  DEN_bop_occupation_allow_communism_desc: "Naši komunističtí páni nemají rádi, že jsme jejich ideologii zakázali v [ROOT.GetNameDef]. Bylo by v našem nejlepším zájmu znovu povolit komunismus." # todo: NEW TRANSLATION
  DEN_bop_occupation_ban_fascism: "£BoP_left_texticon Zákaz fašismu" # todo: NEW TRANSLATION
  DEN_bop_occupation_ban_fascism_desc: "Naši [?DEN.DEN_overlord_nation.GetAdjective] pánové vidí fašismus jako nepřítele a ocenili by naši spolupráci, kdybychom zakázali všechny fašistické organizace v zemi." # todo: NEW TRANSLATION
  DEN_bop_occupation_allow_fascism: "£BoP_left_texticon Povolit fašismus" # todo: NEW TRANSLATION
  DEN_bop_occupation_allow_fascism_desc: "Naši fašističtí pánové nejsou nadšeni tím, že jsme jejich ideologii zakázali v [ROOT.GetNameDef]. Bylo by v našem nejlepším zájmu povolit fašismus znovu." # todo: NEW TRANSLATION
  DEN_bop_occupation_allow_democratism: "£BoP_left_texticon Povolit demokratické strany" # todo: NEW TRANSLATION
  DEN_bop_occupation_allow_democratism_desc: "Opakované volby jsou znakem vzájemné důvěry mezi občany a silou státu. Neumožnit demokratické volby je ostuda pro náš národ." # todo: NEW TRANSLATION
  DEN_resistance_category: "Dánské odbojové hnutí" # todo: NEW TRANSLATION
  DEN_resistance_category_desc: "Musíme se postavit okupující mocnosti a znovu získat naši svobodu! To lze dosáhnout pouze společným úsilím a vytrvalou prací směrem ke společnému cíli osvobozeného [ROOT.GetNameDef]." # todo: NEW TRANSLATION
  DEN_seek_foreign_support_decision: "Žádat o podporu od [FROM.GetNameDef]" # todo: NEW TRANSLATION
  DEN_ask_for_weapons_decision: "Žádat o dodávky zbraní" # todo: NEW TRANSLATION
  DEN_buy_allied_weapons_decision: "Nákup spojeneckých zbraní" # todo: NEW TRANSLATION
  DEN_seek_danish_brigades_host: "Hledat hostitelskou zemi pro dánské brigády" # todo: NEW TRANSLATION
  DEN_buy_foreign_destroyers: "Koupit zahraniční torpédoborce" # todo: NEW TRANSLATION
  DEN_overlord_category: "Protektorát Dánska" # todo: NEW TRANSLATION
  DEN_overlord_category_desc: "Dovolili jsme Dánsku udržet určitou autonomii jako zvláštní protektorát. Musíme je však mít pod dohledem, protože naše ochrana nese i určité povinnosti." # todo: NEW TRANSLATION
  DEN_annex_denmark: "Anexovat [DEN.GetNameDef]" # todo: NEW TRANSLATION
