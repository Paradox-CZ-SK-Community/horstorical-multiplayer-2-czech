  FIN_finnish_resistance_category_desc: "Jako součást tajné vojenské operace bylo velké množství zbraní a vybavení [ROOT.GetAdjective] armády ukryto ve skrýších po Finsku s cílem pomoci odbojovým prvkům v pokračování boje proti našim jednotkám." # todo: NEW TRANSLATION
