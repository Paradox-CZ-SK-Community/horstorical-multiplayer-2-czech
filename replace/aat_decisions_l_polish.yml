  FIN_hold_leningrad_mission_desc: "[195.GetName] mohl být dobyt našimi silami, ale abychom vynutili své požadavky, musíme region držet, dokud nejsou [SOV.GetAdjective] síly dostatečně demoralizovány." # todo: NEW TRANSLATION
