  FIN_motion_of_no_confidence_against_leader: "Návrh na vyslovení nedůvěry vůči [ROOT.GetLeader]" # todo: NEW TRANSLATION
  FIN_motion_of_no_confidence_against_leader_desc: "[ROOT.GetLeader] neudělal dost pro vyřešení problémů naší země, a je jasné, že se to nezmění. Je čas hlasovat o nedůvěře a zbavit se tohoto nekompetentního vůdce." # todo: NEW TRANSLATION
  FIN_resignation_of_kallio: "Rezignace $FIN_kyosti_kallio$" # todo: NEW TRANSLATION
  FIN_resignation_of_kallio_desc: "$FIN_kyosti_kallio$ nebyl velkým státníkem a jeho nedávné neúspěchy ukazují, že nemůže správně vést zemi. S rostoucím napětím ve světě a jeho zdravotním stavem je lepší, když rezignuje." # todo: NEW TRANSLATION
  FIN_form_a_military_government: "Ustanovit vojenskou vládu" # todo: NEW TRANSLATION
  FIN_form_a_military_government_desc: "Současná civilní vláda projevila slabost tváří v tvář nepřátelství a potíží. $FIN_carl_mannerheim$ dříve sloužil naší zemi dobře a opět to učiní. Musí vytvořit vojenskou vládu, aby nás ochránila." # todo: NEW TRANSLATION
  FIN_resignation_of_mannerheim: "Rezignace $FIN_carl_mannerheim$" # todo: NEW TRANSLATION
  FIN_resignation_of_mannerheim_desc: "$FIN_carl_mannerheim$ necítí potřebu vládnout navěky a přání oznámit svou rezignaci z postu prezidenta, prohlašujíc, že už není potřeba, protože splnil povinnosti, které slíbil při nástupu do úřadu." # todo: NEW TRANSLATION
  FIN_organize_the_opposition: "Organizovat opozici" # todo: NEW TRANSLATION
  FIN_organize_the_opposition_desc: "Vláda neuspěla v naplnění slibů a musí být adekvátně potrestána. Je čas sjednotit opozici a organizovat akce k získání podpory a zdiskreditování [ROOT.GetLeader]." # todo: NEW TRANSLATION
  FIN_appeal_to_the_finnish_spirit: "Oslovit finského ducha" # todo: NEW TRANSLATION
  FIN_appeal_to_the_finnish_spirit_desc: "Musíme apelovat na mimořádné odhodlání, houževnatost a odolnost Finnů tváří v tvář obtížím. Finský lid musí pracovat společně, aby zvítězil. Naše sisu nás činí silnými!" # todo: NEW TRANSLATION
  FIN_entice_the_masses: "Nalákat masy" # todo: NEW TRANSLATION
  FIN_entice_the_masses_desc: "Masy jsou snadno ovlivnitelné. Sliby řešení drobných, blízkých problémů mohou učinit vládu přitažlivější pro průměrného Fina." # todo: NEW TRANSLATION
  FIN_organize_the_opposition_cost_increase_tt: "\nNáklady na rozhodnutí §Y$FIN_organize_the_opposition$§! budou §Rnásobeny§! číslem §Y[?FIN_bop_decision_cost_multiplier]§!.\n" # todo: NEW TRANSLATION
  FIN_appeal_to_the_finnish_spirit_cost_increase_tt: "\nNáklady na rozhodnutí §Y$FIN_appeal_to_the_finnish_spirit$§! budou §Rnásobeny§! číslem §Y[?FIN_bop_decision_cost_multiplier]§!.\n" # todo: NEW TRANSLATION
  FIN_entice_the_masses_cost_increase_tt: "\nNáklady na rozhodnutí §Y$FIN_entice_the_masses$§! budou §Rnásobeny§! číslem §Y[?FIN_bop_decision_cost_multiplier]§!.\n" # todo: NEW TRANSLATION
  FIN_the_path_to_socialism: "Cesta ke socialismu" # todo: NEW TRANSLATION
  FIN_the_path_to_socialism_desc: "Za pár let, díky kolektivnímu úsilí lidu, dosáhneme pravého socialismu, ačkoli cesta k němu může být trnitá a obtížná. Musíme v ní pokračovat bez ohledu na náklady." # todo: NEW TRANSLATION
  FIN_gather_popular_support: "Získat lidovou podporu" # todo: NEW TRANSLATION
  FIN_gather_popular_support_desc: "Lid je pro každou revoluci či vládu rozhodující, a měli bychom udělat vše pro získání co nejvíce podpory." # todo: NEW TRANSLATION
  FIN_gather_popular_support_dec_tt: "Naše strana získá §G+10%§! z celkového území a vojenských jednotek. \nBudou vytvořeny dodatečné komunistické §YMilice§! divize." # todo: NEW TRANSLATION
