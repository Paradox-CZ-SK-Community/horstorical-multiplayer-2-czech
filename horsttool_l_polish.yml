  horsthelp.2.t: "Nápověda k Horst Tool" # todo: NEW TRANSLATION
  horsthelp.2.d: "Systém Horst Tool je vytvořen pro hostitele, aby měli snadnější správu svých her a neztráceli čas s hotjoiny, a aby se hry neskončily v případě, že Německo špatně prozkoumá svoje bonusy apod. Horst Tool má několik funkcí: \n\n 1. Změna hranic \nHorst Tool může anektovat země, převádět státy a přidávat nároky (cores). Chcete-li anektovat zemi, označte jeden z jejích států, potom klikněte na zemi, do které ji chcete anektovat, a klikněte na tlačítko Anexovat. Chcete-li převést státy/přidat nároky, označte stát a pak klikněte na přijímající zemi a klikněte na Převést státy/Přidat nároky. \n\n2. Přidávání technologických bonusů.\n Pro to klikněte na cílovou zemi, klikněte na bonus, který ji chcete přidat, a klikněte na tlačítko 'Cheat' s ikonou výzkumu.\n\n3. Posílání hráčů do pozorovatele. \nPro to klikněte na zemi, kterou hráč hraje, a klikněte na tlačítko Pozorovatel. \n\n4. Whitepeace země. \nChcete-li udělat whitepeace s nějakou zemí, klikněte na cílovou zemi a klikněte na tlačítko Whitepeace." # todo: NEW TRANSLATION
  horsthelp.2.a: "Díky Horst, fakt skvělé!" # todo: NEW TRANSLATION
