  RAJ_Joint_Indo_Soviet_Railways: "Společné indo-sovětské železnice"
  RAJ_Joint_Indo_Soviet_Railways_desc: "Ve duchu mezinárodní spolupráce se [RAJ.GetNameDef] a [SOV.GetNameDef] spojí a pustí se do společného železničního projektu. Tento projekt bude rozsáhlé a dlouhodobé dílo, vytvářející síť železničních systémů spojujících obě země a podporující ekonomický růst a rozvoj. Tato společná snaha dále posílí dlouhodobý a vzájemně prospěšný vztah mezi našimi dvěma zeměmi a přiblíží nás k našemu sdílenému cíli jasnější budoucnosti pro všechny. Jedinou překážkou na cestě k vzájemnému blahobytu je politická situace v [AFG.GetNameDef], ale diplomatický tlak jistě tento problém vyřeší."
