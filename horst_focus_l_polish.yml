  raj_legislative_situation: "Legislativní situace" # todo: NEW TRANSLATION
  raj_legislative_situation_desc: "Jestliže má naše správa něco prosadit zákonem, musíme čelit Imperiální legislativní radě, která má směs volených a jmenovaných členů a různých zájmových skupin. Musíme pečlivě vyvažovat jejich potřeby, pokud chceme po skončení veškeré politické práce skončit se stabilním státem.\n\n[RAJ.Current_Act][RAJ.Legislative_Status]" # todo: NEW TRANSLATION
  finalize_the_vote: "Dokončit hlasování" # todo: NEW TRANSLATION
  legislative_status: "\n\tAktuální názor hinduistů na zákon: [RAJ.ind_support_loc]\n\tAktuální názor muslimů na zákon: [RAJ.pak_support_loc]\n" # todo: NEW TRANSLATION
  FOCUS_FILTER_RAJ_PROVINCIAL_ELECTIONS: "Provincální volby" # todo: NEW TRANSLATION
  legislative_railway: "V nejvyšších komorách vlády probíhá ostrá debata o Zákoně o rozšíření železnic. Jeho cíle jsou vytyčeny jako výstavba znárodněných, neziskových železničních spojů k podpoře našich průmyslových cílů." # todo: NEW TRANSLATION
  legislative_agriculture: "V nejvyšších komorách vlády probíhá ostrá debata o Zákoně o stabilizaci zemědělství. Naší nejdůležitější prioritou je zlepšení místního zavlažování a řízená produkce obilí a dovozů." # todo: NEW TRANSLATION
  legislative_education: "V nejvyšších komorách vlády probíhá ostrá debata o Zákoně o reformě vzdělávání. Jeho nejdůležitější cíle jsme nastavili takto: zabránit odlivu indických intelektuálů na anglické univerzity a zlepšit venkovské vzdělání pro zvýšení průmyslové a zemědělské odbornosti." # todo: NEW TRANSLATION
  legislative_insurance: "V nejvyšších komorách vlády probíhá ostrá debata o Zákoně o pojištění. Jeho nejoddanější zastánci uvádějí špatný stav indických investic jako hlavní problém, který se snaží řešit. Chtějí ho napravit konečnou regulací obchodu s pojištěním." # todo: NEW TRANSLATION
  legislative_war: "V nejvyšších komorách vlády probíhá ostrá debata o Zákoně o válečných pravomocích. Viceroy zdůraznil, že není čas na debaty, Indie je ve válce a Výkonná moc musí mít pravomoc tuto válku vést. Jakékoli zdržení tohoto zákona podpoří válečné úsilí nepřítele!" # todo: NEW TRANSLATION
  legislative_idle: "Sály Imperiální legislativní rady zůstávají nečinné, v současnosti se o žádném zákonu nejedná." # todo: NEW TRANSLATION
  raj_sov_nuclear_name: "Dohoda o nových technologiích pro národní obranu" # todo: NEW TRANSLATION
  raj_sov_nuclear_desc: "Atomová éra nastala a socialistické země světa si nemohou dovolit zaostávat za kapitalistickými státy s jejich jadernými programy. Sdílení našich atomových poznatků se sovětským lidem a naopak bude velkým přínosem pro bezpečnost obou států." # todo: NEW TRANSLATION
