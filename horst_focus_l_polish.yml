  SIA_France_restore_order_in_indochina: "Obnovit pořádek" # todo: NEW TRANSLATION
  SIA_France_restore_order_in_indochina_desc: "V Indočíně propuklo rozsáhlé komunistické povstání usilující o vyhnání francouzské správy. Jsou dobře vyzbrojeni a mají podporu Siamu. Je nezbytné znovu získat kontrolu nad našimi koloniemi." # todo: NEW TRANSLATION
  SIA_revolutionnary_women: "Revoluční ženy" # todo: NEW TRANSLATION
  SIA_revolutionnary_women_desc: "Konec kapitalismu musí také znamenat konec marginalizace žen. Ženy musí být uvedeny na rovnou úroveň s muži doma, v továrnách i v armádě." # todo: NEW TRANSLATION
