  HUN_hmp_heavy_fighter_effort_desc: "Potřebujeme stíhací letadla k získání lokální vzdušné nadvlády nad našimi silami a k zachycování jakýchkoli nepřátelských letadel ohrožujících náš národ." # todo: NEW TRANSLATION
