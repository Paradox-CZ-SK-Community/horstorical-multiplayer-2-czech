  RAJ_Princely_States: "Panevstátní státy"
  RAJ_Princely_States_desc: "I když správa Britského Ráje může sídlit v Dillí, ne veškeré jeho území je kontrolováno z hlavního města. Místní princové si zajistili značnou autonomii spojením s Brity. Zasažené státy jsou:\n\n§YGujarat, Radžastán, Indore, Hydarabad, Mysore, Kašmír, Balúčistán§!"
  RAJ_Princely_States_tt: "Místní rychlost výstavby [?RAJ.prince_state_build_speed|%0=+] v §YPanovníkových státech§!.\nMístní mobilizace ve státě [?RAJ.prince_state_manpower|%0=+] v §YPanovníkových státech§!.\nMístní zdroje ve státě [?RAJ.prince_state_resources|%0=+] v §YPanovníkových státech§!.\n"
  RAJ_Princely_States_speed_tt: "Modifikuje §YPanovníkový stát§! státní modifikátor o:\n Rychlost výstavby ve státě §G+43%§!."
  RAJ_Princely_States_manpower_tt: "Modifikuje §YPanovníkový stát§! státní modifikátor o:\n Místní mobilizace ve státě §G+48%§!."
  conscript_unlock_idea_tt: "Odemkne zákon o branné povinnosti:"
  raj_prince_military_practice: "Odemkne rozhodnutí pro donucovací anexi panovníkových států."
  nam_intro_tt: "Vhodné země budou pozvány, aby se připojily k našemu novému, neangažovanému mocenskému bloku."
