  SIA_small_depression_effects: "Přetrvávající účinky deprese" # todo: NEW TRANSLATION
  SIA_small_depression_effects_desc: "Velká hospodářská krize silně zasáhla ekonomiku Siamu, zejména pokud jde o exporty po znehodnocení britské libry, což zdražilo naši rýži na trhu. Po mnoha hospodářských reformách jsme dokázali zmírnit mnoho jejích dopadů, ale některé jsou stále viditelné a vyžadují závěrečný zásah státu, aby se jich definitivně zbavili." # todo: NEW TRANSLATION
