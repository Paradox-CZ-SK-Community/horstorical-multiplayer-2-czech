  SOV_shattered_retreat_desc: "Počáteční německé útoky naši armádu zcela zdecimovaly! Musíme se stáhnout a znovu se reorganizovat!" # todo: NEW TRANSLATION
  SOV_regroup: "Zorganizovat obranu" # todo: NEW TRANSLATION
  SOV_regroup_desc: "Přežili jsme to nejhorší, nyní musíme znovu seskupit armádu a zahájit protiútok!" # todo: NEW TRANSLATION
  SOV_directive_three: "Direktiva tři" # todo: NEW TRANSLATION
  SOV_directive_three_desc: "Soudruh Stalin chce, abychom nyní zahájili protiútok! Musíme zatlačit obránce a získat tolik času a prostoru, kolik jen můžeme!" # todo: NEW TRANSLATION
  SOV_operational_space: "Operační prostor" # todo: NEW TRANSLATION
  SOV_operational_space_desc: "Ať už lze tento protiútok považovat za úspěšný nebo ne... podařilo se nám získat dostatek prostoru pro zahájení několika manévrů podél fronty!" # todo: NEW TRANSLATION
  SOV_stockpile_for_the_next_attack: "Naskladnit pro jarní ofenzívu" # todo: NEW TRANSLATION
  SOV_stockpile_for_the_next_attack_desc: "Naskladníme, co můžeme, pro toto zimní období a připravíme se na příští kampaň!" # todo: NEW TRANSLATION
  SOV_winter_offensive: "Zimní ofenzíva" # todo: NEW TRANSLATION
  SOV_winter_offensive_desc: "Němci sníh zřejmě nikdy neviděli! Můžeme je zde a nyní porazit!" # todo: NEW TRANSLATION
  SOV_operational_space_tt: "Pokud byl protiútok úspěšný, získáte následující na 120 dní; \n\n£organization_texticon Organizace divize: §G+%10.0§!\n£army_morale_texticon Rychlost obnovy divize: §G+%10.0§! \n\nPři neúspěchu dostanete stejné modifikátory, ale s penalizací HP: \n\n£organization_texticon Organizace divize: §G+%10.0§!\n£army_morale_texticon Rychlost obnovy divize: §G+%10.0§!\n£strenght_texticon  HP: §R-%10.0§!" # todo: NEW TRANSLATION
