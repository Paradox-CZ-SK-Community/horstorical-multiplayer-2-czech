  JAP_move_by_trucks: "Pohyb nákladními vozy" # todo: NEW TRANSLATION
  JAP_move_by_trucks_EXPL: "Stále máme §HObdobí výrazného ekonomického růstu§! národní duch, proto tento fokus bude mít také následující §GEfekty§!:\n" # todo: NEW TRANSLATION
