  JAP_USA_the_masters_of_pacific: "Pánové Pacifiku" # todo: NEW TRANSLATION
  JAP_USA_the_masters_of_pacific_desc: "" # todo: NEW TRANSLATION
  JAP_USA_use_the_last_reserves: "Využít poslední rezervy" # todo: NEW TRANSLATION
  JAP_USA_use_the_last_reserves_desc: "Hrajeme o čas v konfliktu se Spojenými státy. Proto musíte obětovat všechno, pokud chceme uspět. Každé obchodní plavidlo, každý poslední litr paliva musí být nasazen." # todo: NEW TRANSLATION
  JAP_USA_march_through_canada: "Pochod skrz Kanadu" # todo: NEW TRANSLATION
  JAP_USA_march_through_canada_desc: "" # todo: NEW TRANSLATION
  JAP_USA_rapid_naval_armaments_supplement_programme: "Program rychlého doplnění námořního zbrojení" # todo: NEW TRANSLATION
  JAP_USA_rapid_naval_armaments_supplement_programme_EXPL: "   Zvýšit svůj §HVýstup loděnic§!.\n" # todo: NEW TRANSLATION
  JAP_USA_rapid_naval_armaments_supplement_programme_desc: "" # todo: NEW TRANSLATION
  JAP_USA_declare_war_on_the_usa: "Vyhlásit válku USA" # todo: NEW TRANSLATION
  JAP_USA_declare_war_on_the_usa_desc: "" # todo: NEW TRANSLATION
  JAP_USA_pre_emptive_strike_on_fleet_in_pearl_harbor: "Preemptivní útok na loďstvo v Pearl Harboru" # todo: NEW TRANSLATION
  JAP_USA_pre_emptive_strike_on_fleet_in_pearl_harbor_EXPL: "Zaútočíme až §HTřikrát§! na [USA.GetFlag]§H[USA.GetName]§! a jejich základnu v §HPearl Harbor§!. Útoky budou mít následující §GEfekty§!:\n   Zničit až §H4§! bitevních lodí.\n   Poškodit jejich §HInfrastrukturu§! a §Hnámořní základny§!.\n   Získat §H12§! zkušených divizí na §HHavaji§!.\n   Omezit americké §HNámořní schopnosti§! v Tichomoří.\nProhlásíme §Rválku§! [USA.GetFlag]§H[USA.GetName]§!.\n[USA.GetFlag]§H[USA.GetName]§! získá významné §RBonusy§! k jejich §HPodpoře války§!, §HPočtu branné povinnosti§! a §HSíle útoku§! proti nám, podle počtu útoků, které podnikneme." # todo: NEW TRANSLATION
  JAP_USA_pre_emptive_strike_on_fleet_in_pearl_harbor_desc: "" # todo: NEW TRANSLATION
  JAP_USA_force_them_to_surrender: "Přinutit je k kapitulaci" # todo: NEW TRANSLATION
  JAP_USA_force_them_to_surrender_TRIG: "My nebo naši loutky kontrolujeme každý §Hostrov§! v Tichomoří." # todo: NEW TRANSLATION
  JAP_USA_force_them_to_surrender_EXPL1: "Pokud jejich §HStabilita§! klesne pod §R35%§!, spustí se §HCivilní válka§!.\n" # todo: NEW TRANSLATION
  JAP_USA_force_them_to_surrender_EXPL2: "[USA.GetFlag]§H[USA.GetName]§! nebude schopno §Hzasáhnout§! v Asii.\n" # todo: NEW TRANSLATION
  JAP_USA_force_them_to_surrender_desc: "" # todo: NEW TRANSLATION
  JAP_USA_establish_japanese_pacific_states: "Zřídit japonské tichomořské státy" # todo: NEW TRANSLATION
  JAP_USA_establish_japanese_pacific_states_desc: "" # todo: NEW TRANSLATION
  JAP_USA_shinjuwan_pacific_naval_base: "Tichomořská námořní základna Shinjuwan" # todo: NEW TRANSLATION
  JAP_USA_shinjuwan_pacific_naval_base_desc: "Shinjuwana, kdysi americký námořní symbol, nyní ukazuje námořní nadvládu Japonska. Vzpomínajíc na minulé střety, tato základna zajišťuje naší tichomořskou převahu. Naše přítomnost zde deklaruje japonské velení nad těmito vodami." # todo: NEW TRANSLATION
  JAP_CHI_build_upon_the_tanggu_truce: "Navázat na tangguské příměří" # todo: NEW TRANSLATION
  JAP_CHI_build_upon_the_tanggu_truce_desc: "Tanggu příměří bylo příměří podepsané mezi Republikou Čína a Japonskou říší v obvodu Tanggu, Tchien-ťin dne 31. května 1933. Formálně ukončilo japonskou invazi do Mandžuska, která započala dva roky dříve. V očích Číňanů je vnímáno jako ponižující porážka. Mají pravdu a my jim to připomeneme." # todo: NEW TRANSLATION
  JAP_CHI_expand_the_western_roads: "Rozšířit západní cesty" # todo: NEW TRANSLATION
  JAP_CHI_expand_the_western_roads_desc: "" # todo: NEW TRANSLATION
  JAP_CHI_prepare_the_southern_invasion_plan: "Připravit plán jižní invaze" # todo: NEW TRANSLATION
  JAP_CHI_prepare_the_southern_invasion_plan_desc: "Naše invaze do Číny musí být naplánována dokonale. Naše armáda, letectvo a námořnictvo zkoordinují útoky v jednom obrovském úderu, který zničí čínskou obranu během několika měsíců. Všemu tomu bude šéfovat Gunji Sangiin, Nejvyšší válčený výbor." # todo: NEW TRANSLATION
  JAP_CHI_expand_mengkukuoan_cavalry_army: "Rozšířit kavalerii Mengkukuo" # todo: NEW TRANSLATION
  JAP_CHI_expand_mengkukuoan_cavalry_army_EXPL: "Získat §H4§! kavalerijní divize.\n" # todo: NEW TRANSLATION
  JAP_CHI_expand_mengkukuoan_cavalry_army_desc: "Náš loutkový režim založený v Ča-charu a vnější Mongolii má pro nás jen malý užitek, pokud se nedokáže bránit. Naštěstí mají místní lidé dlouhou tradici válčení z koňského sedla, kterou využijeme. Koneckonců, náklaďáky nemohou tiše vklouznout do hor na jihu." # todo: NEW TRANSLATION
  JAP_CHI_execute_the_grand_invasion_of_china_plan: "Provedení velkého plánu invaze do Číny" # todo: NEW TRANSLATION
  JAP_CHI_execute_the_grand_invasion_of_china_plan_desc: "" # todo: NEW TRANSLATION
  JAP_CHI_marco_polo_bridge_incident: "Incident na mostě Marca Pola" # todo: NEW TRANSLATION
  JAP_CHI_marco_polo_bridge_incident_EXPL1: "   Naše jednotky v §HVýchodním Che-peji§! zahájí §HRozhraniční válku§! proti [CHI.GetFlag]§H[CHI.GetName]§!. Střet dále §REskalujte§!.\n   Naše kontrola nad §HRozhraniční válkou§! bude §ROmezena§! podle úrovně §HNeovladatelných militaristů§! národního ducha.\n" # todo: NEW TRANSLATION
  JAP_CHI_marco_polo_bridge_incident_EXPL2: "[PRC.GetFlag]§H[PRC.GetName]§! bude moci částečně zasáhnout do §HRozhraniční války§! a §RSnížit§! naši šanci, že konflikt dále §REskaluje§!.\n" # todo: NEW TRANSLATION
  JAP_CHI_marco_polo_bridge_incident_desc: "" # todo: NEW TRANSLATION
  JAP_CHI_reorganize_military_advance_in_china: "Reorganizovat vojenský postup v Číně" # todo: NEW TRANSLATION
  JAP_CHI_reorganize_military_advance_in_china_desc: "" # todo: NEW TRANSLATION
  JAP_CHI_find_a_common_way_out: "Najít společné východisko" # todo: NEW TRANSLATION
  JAP_CHI_find_a_common_way_out_EXPL: "   Vznést malé, střední nebo velké §HPožadavky§! na [CHI.GetFlag]§H[CHI.GetName]§! k ukončení sino‑japonské války.\n\nToto je §CReaktivní fokus§!. Pokud [CHI.GetFlag]§H[CHI.GetName]§! má větší §HPostup kapitulace§!, rozsah §HPožadavků§! bude §VGREATER§!.\n" # todo: NEW TRANSLATION
  JAP_CHI_find_a_common_way_out_desc: "" # todo: NEW TRANSLATION
  JAP_CHI_establish_reorganized_government_of_china: "Zřídit reorganizovanou vládu Číny" # todo: NEW TRANSLATION
  JAP_CHI_establish_reorganized_government_of_china_EXPL1: "Režim pod §HWang Jingwei§! zahájí §HCivilní válku§! v [CHI.GetFlag]§H[CHI.GetName]§! s §HNankingem§! jako jeho hlavním městem. Každý stát kontrolovaný námi v §HČíně§! bude jim předán.\n" # todo: NEW TRANSLATION
  JAP_CHI_establish_reorganized_government_of_china_EXPL2: "   Vzít přímou kontrolu nad §H[608.GetName]§!, §H[614.GetName]§!, §H[597.GetName]§!, §H[743.GetName]§! a §H[598.GetName]§!.\n   Poskytnout §HVybavení§! armádě §HWang Jingwei§!.\n" # todo: NEW TRANSLATION
  JAP_CHI_establish_reorganized_government_of_china_desc: "" # todo: NEW TRANSLATION
  JAP_CHI_ichi_go_sakusen: "Ichi‑Gō Sakusen" # todo: NEW TRANSLATION
  JAP_CHI_ichi_go_sakusen_EXPL: "   K úspěšnému §GDokončení§! této mise budete muset buď §HDonutit k kapitulaci§! [CHI.GetFlag]§H[CHI.GetName]§!, nebo kontrolovat všechny jejich pobřežní státy a všechny státy [GXC.GetFlag]§H[GXC.GetName]§!.\n" # todo: NEW TRANSLATION
  JAP_CHI_ichi_go_sakusen_desc: "Operace Ichi‑Go, nebo 'Operace číslo jedna', je největší japonskou vojenskou operací v dějinách. Dva hlavní cíle Ichi‑go jsou otevřít pozemní cestu do Francouzské Indočíny a obsadit letecké základny v jihovýchodní Číně, odkud americké bombardéry útočily na japonskou domovinu a lodní dopravu." # todo: NEW TRANSLATION
  JAP_CHI_retool_chinese_industry: "Přestavět čínský průmysl" # todo: NEW TRANSLATION
  JAP_CHI_retool_chinese_industry_EXPL: "Odstranit §H1 civilní továrnu§! v každém pobřežním státě v Číně, který ji má k dispozici.\nPřidat §G1§! stavební slot, §H1 vojenskou továrnu§! a §H1 loděnici§! v každém dotčeném státě." # todo: NEW TRANSLATION
  JAP_CHI_retool_chinese_industry_desc: "" # todo: NEW TRANSLATION
  JAP_CHI_exploit_chinese_wealth: "Využít čínské bohatství" # todo: NEW TRANSLATION
  JAP_CHI_exploit_chinese_wealth_desc: "" # todo: NEW TRANSLATION
  JAP_hokushin_ron_doctrine: "Hokushin-ron\nDoktrína" # todo: NEW TRANSLATION
  JAP_hokushin_ron_doctrine_EXPL1: "\n§HHokushin-ron§! doktrína je §CProsazována§! frakcí §HKōdōha§!. Postoupit na stranu frakce §HTōseiha§! a následovat tuto doktrínu by také mělo následující §REfekty§!:\n" # todo: NEW TRANSLATION
  JAP_hokushin_ron_doctrine_EXPL2: "\nSložili jste se se §HTōseiha§! frakcí, která prosazuje §HNanshin-ron§! doktrínu. Proto výběr tohoto dříve než dokončení Nanshin-ron bude mít následující §REfekty§!:\n" # todo: NEW TRANSLATION
  JAP_hokushin_ron_doctrine_desc: "„Doktrína severní expanze“ je vojenská a politická doktrína, která tvrdí, že Mandžusko a Sibiř jsou japonskou sférou zájmu a že potenciální hodnota pro Japonsko pro ekonomickou a územní expanzi v těchto oblastech byla větší než jinde." # todo: NEW TRANSLATION
  JAP_CHI_ishiwaras_east_asian_league_dream: "Ishiwaraův sen o Východoasijské lize" # todo: NEW TRANSLATION
  JAP_CHI_ishiwaras_east_asian_league_dream_desc: "" # todo: NEW TRANSLATION
  JAP_CHI_concessions_to_china: "Ústupky Číně" # todo: NEW TRANSLATION
  JAP_CHI_concessions_to_china_desc: "Mengjiangská dohoda, která definitivně vytvořila náš loutkový stát v vnější Mongolii, opět zhoršila naše vztahy s nacionalistickou Čínou, které se nečekaně zlepšovaly od roku 1935. Přestože byla tato operace konečným vítězstvím našich sil, musíme se vzdát našich úspěchů a nabídnout Vnější Mongolsko zpět nacionalistům. To by snad znovu zajistilo jejich náklonnost." # todo: NEW TRANSLATION
  JAP_CHI_get_rid_of_chiang_kai_shek: "Zbavit se Chiang Kai‑Sheka" # todo: NEW TRANSLATION
  JAP_CHI_get_rid_of_chiang_kai_shek_EXPL: "Pokud jejich §RStabilita§! klesne pod §R50%§!, tento fokus bude mít také následující §REfekty§!:\n" # todo: NEW TRANSLATION
  JAP_CHI_get_rid_of_chiang_kai_shek_desc: "Vláda Chiang Kai‑Sheka se téměř dá považovat za diktaturu, ačkoli je dlouho napadán pružnějším Wang Jingweiem. Pokud se nám podaří přesvědčit Číňany zorganizovat Chiangovi „malou nehodu“, Wang by mohl převzít jeho pozici jako prezident Číny. To by jistě usnadnilo naši budoucí spolupráci." # todo: NEW TRANSLATION
  JAP_CHI_non_aggression_pact_with_china: "Pakt o neútočení s Čínou" # todo: NEW TRANSLATION
  JAP_CHI_non_aggression_pact_with_china_desc: "" # todo: NEW TRANSLATION
  JAP_CHI_pact_of_silk: "Pakt hedvábí" # todo: NEW TRANSLATION
  JAP_CHI_pact_of_silk_EXPL1: "Získat §H24§! milicových divizí.\n" # todo: NEW TRANSLATION
  JAP_CHI_pact_of_silk_desc: "" # todo: NEW TRANSLATION
  JAP_CHI_expand_zaibatsus_influence_in_china: "Rozšířit vliv zaibatsu v Číně" # todo: NEW TRANSLATION
  JAP_CHI_expand_zaibatsus_influence_in_china_desc: "" # todo: NEW TRANSLATION
  JAP_CHI_sino_japanese_military_mission: "Sino‑japonská vojenská mise" # todo: NEW TRANSLATION
  JAP_CHI_sino_japanese_military_mission_desc: "" # todo: NEW TRANSLATION
  JAP_CHI_kick_up_chinese_shipbuilding_industry: "Podpořit čínský loděnicový průmysl" # todo: NEW TRANSLATION
  JAP_CHI_kick_up_chinese_shipbuilding_industry_desc: "Nyní, když sdílíme společnou krev s Číňany, musíme zajistit, aby jejich námořnictvo bylo alespoň schopné chránit vlastní pobřeží. A naše námořní zkušenosti budou nepochybně užitečné." # todo: NEW TRANSLATION
  JAP_CHI_embrace_the_unification_campaign: "Přijmout kampaň sjednocení" # todo: NEW TRANSLATION
  JAP_CHI_embrace_the_unification_campaign_desc: "" # todo: NEW TRANSLATION
  JAP_prepare_the_kantokuen: "Připravit Kantokuen" # todo: NEW TRANSLATION
  JAP_prepare_the_kantokuen_desc: "'Kantokuen' je operační plán vytvořený generálním štábem císařské japonské armády pro invazi a okupaci dalekovýchodního regionu Sovětského svazu. Zapojených bude sedm japonských armád i velká část námořních a leteckých sil impéria; bude to největší kombinovaná operace v japonských dějinách a jedna z největších vůbec." # todo: NEW TRANSLATION
  JAP_bases_and_supply_lines_alongside_amur_river: "Základny a zásobovací linky podél řeky Amur" # todo: NEW TRANSLATION
  JAP_bases_and_supply_lines_alongside_amur_river_desc: "Jak se připravujeme na postup do sovětského Dálného východu, musíme vyvíjet naše základny v pohraničních provinciích podél řeky Amur. Železnice, silnice, letiště, nemocnice, muniční sklady – vše musí být připraveno, až zapískáme na válku." # todo: NEW TRANSLATION
  JAP_RFA_use_the_anti_soviets: "Využít antisovětů" # todo: NEW TRANSLATION
  JAP_RFA_use_the_anti_soviets_EXPL: "\nToto je §CReaktivní fokus§!. Pokud jsme dokončili '§HZlepšit imperiální mandžuskou armádu§!' fokus, tento fokus místo toho vykáže následující §GEfekty§!:\n" # todo: NEW TRANSLATION
  JAP_RFA_use_the_anti_soviets_desc: "Stále existuje velké množství lidí, kteří buď Rusko opustili kvůli sovětské revoluci, nebo tam stále jsou, ale potichu odporují novému režimu. Všichni tito mohou být při naší operaci na dobytí Dálného východu velmi užiteční." # todo: NEW TRANSLATION
  JAP_RFA_genrikh_lyushkovs_far_east_informations: "Genrikh Lyushkovovy informace o Dálném východě" # todo: NEW TRANSLATION
  JAP_RFA_genrikh_lyushkovs_far_east_informations_desc: "Genrikh Samoilovič Lyushkov je sovětský důstojník a člen NKVD.\nVzhledem k posledním událostem je ochoten dezertovat ze své země a přejít hranici do Mandžuska s důležitými informacemi o sovětské armádě v regionu Dálného východu. To by nám mohlo poskytnout obrovskou výhodu, pokud se rozhodneme jej přijmout." # todo: NEW TRANSLATION
  JAP_RFA_mobilize_the_white_russians: "Mobilizovat bělorusy" # todo: NEW TRANSLATION
  JAP_RFA_mobilize_the_white_russians_EXPL1: "\nToto je §CReaktivní fokus§!. Pokud jsme dokončili '§HZlepšit imperiální mandžuskou armádu§!' fokus, tento fokus místo toho vykáže následující §GEfekty§!:\n" # todo: NEW TRANSLATION
  JAP_RFA_mobilize_the_white_russians_EXPL2: "Získat §H4§! Asano celorusky‑ruské divize.\n" # todo: NEW TRANSLATION
  JAP_RFA_mobilize_the_white_russians_desc: "" # todo: NEW TRANSLATION
  JAP_RFA_form_provisional_far_eastern_government: "Zformovat prozatímní dalekovýchodní vládu" # todo: NEW TRANSLATION
  JAP_RFA_form_provisional_far_eastern_government_EXPL: "\nDokončením tohoto fokusu se dohodneme poskytnout §HBílým Rusům§! určitý stupeň §HAutonomie§! ve jejich státě na Dálném východě, po našem úspěšném dobytí [SOV.GetFlag]§H[SOV.GetName]§!." # todo: NEW TRANSLATION
  JAP_RFA_form_provisional_far_eastern_government_desc: "" # todo: NEW TRANSLATION
