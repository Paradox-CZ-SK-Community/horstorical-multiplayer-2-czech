  ENG_no_asia_idea_desc: "Tento národní duch je přidán Spojenému království, aby pomohl udělat Spojence podobnými spojencům ve startovním datu 'The Gathering Storm' co do schopností." # todo: NEW TRANSLATION
  ENG_no_asia_idea2: "Cesta k válce" # todo: NEW TRANSLATION
  ENG_no_asia_idea2_desc: "Byla vám dána volba mezi válkou a hanbou. Vy jste zvolili hanbu a budete mít válku. -Winston Churchill" # todo: NEW TRANSLATION
  ENG_no_asia_idea3: "Válka" # todo: NEW TRANSLATION
  ENG_no_asia_idea3_desc: "…budeme bojovat na plážích, budeme bojovat na přistávacích plochách, budeme bojovat na polích a v ulicích, budeme bojovat v kopcích; nikdy se nevzdáme… -Winston Churchill" # todo: NEW TRANSLATION
  I_HATE_ASIA_NAME: "Válka na Západě" # todo: NEW TRANSLATION
  I_HATE_ASIA_DESC: "Druhá světová válka, bez války na Dálném východě.\n\nSpojenci/Komintern: Spojené království, Francie, Kanada, Jižní Afrika, Norsko, Polsko, Řecko a Sovětský svaz.\n\nOsa: Německo, Itálie, Rumunsko, Maďarsko, Finsko, Vichistická Francie, Italská východní Afrika, Chorvatsko, Slovensko a Bulharsko." # todo: NEW TRANSLATION
  ENG_overlord_states: "Operace Overlord" # todo: NEW TRANSLATION
  ENG_overlord_states_desc: "Evropa je pevností, takže musíme pečlivě naplánovat náš útok na ni." # todo: NEW TRANSLATION
