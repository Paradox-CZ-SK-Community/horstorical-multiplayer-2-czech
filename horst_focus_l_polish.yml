  MAN_pacify_the_countrysidex: "Uklidnit venkov" # todo: NEW TRANSLATION
  MAN_pacify_the_countrysidex_desc: "Od doby, kdy jsme přišli k moci, se bandité a povstalci snaží zpochybňovat naši vládu v odlehlejších oblastech země. Pokud chceme být bráni vážně jako vláda, musíme tyto teroristy vykořenit a ukázat obyvatelstvu, že dokážeme vymáhat svou moc." # todo: NEW TRANSLATION
  MAN_law_universityx: "Právnická univerzita" # todo: NEW TRANSLATION
  MAN_law_universityx_desc: "Naše země je stále mladá. Máme skutečnou příležitost vytvořit zcela nový právní systém založený na nejmodernějším pojetí vlády. K tomu bychom měli vytvořit specializované zařízení, které shromáždí některé z nejbystřejších myslí v Asii." # todo: NEW TRANSLATION
  MAN_research_and_education_departmentx: "Oddělení výzkumu a vzdělávání" # todo: NEW TRANSLATION
  MAN_research_and_education_departmentx_desc: "S růstem našeho národa musíme zajistit, aby naše vzdělávací a výzkumné instituce rostly s ním. Musíme více směřovat naši výzkumnou činnost tam, kde je to nejvíce potřeba." # todo: NEW TRANSLATION
  MAN_trade_delegationx: "Obchodní delegace" # todo: NEW TRANSLATION
  MAN_trade_delegationx_desc: "Zbytek světa je v průmyslových metodách dále než my. Měli bychom vyslat delegaci, aby prostudovala jejich techniky a našla způsoby, jak zlepšit ty naše." # todo: NEW TRANSLATION
  MAN_expand_the_textile_industryx: "Rozšířit textilní průmysl" # todo: NEW TRANSLATION
  MAN_expand_the_textile_industryx_desc: "Naše textilky dlouho tvořily pilíř našeho průmyslu a budou nejjednodušším způsobem, jak získat více zahraničního kapitálu pro rozšíření našeho průmyslového základu." # todo: NEW TRANSLATION
  MAN_obediencex: "Poslušnost" # todo: NEW TRANSLATION
  MAN_obediencex_desc: "Někteří nás označují jen za loutku Japonska, ale naprosto nepochopili náš blízký a rovnocenný vztah. Jít proti našim dobrodincům by bylo totéž jako dítě jdoucí proti svým rodičům." # todo: NEW TRANSLATION
  MAN_mukden_military_academy_idea: "Vojenská akademie Mukden" # todo: NEW TRANSLATION
  MAN_mukden_military_academyx_desc: "" # todo: NEW TRANSLATION
  MAN_army_modernizationx: "Modernizace armády" # todo: NEW TRANSLATION
  IRQ_retool_the_army: "Přezbrojit armádu" # todo: NEW TRANSLATION
  IRQ_retool_the_army_desc: "Armáda není vyzbrojena správným vybavením, musí být učiněna naléhavá opatření k nápravě situace." # todo: NEW TRANSLATION
  MAN_five_people_armiesx: "Armády pěti lidí" # todo: NEW TRANSLATION
  MAN_five_people_armiesx_desc: "Jestliže je každý občan roven, pak musí být každý občan stejně připraven a ochoten bránit jej proti zahraničním utlačovatelům." # todo: NEW TRANSLATION
  MAN_showa_steel_desc: "S pomocí Japonska můžeme dále rozvinout naši ocelárnu v Liao‑tonu v největší východoasijskou ocelárnu." # todo: NEW TRANSLATION
  IRQ_revolution3: "Krev nad monarchií" # todo: NEW TRANSLATION
  IRQ_revolution4: "Vrátit muftího" # todo: NEW TRANSLATION
  IRQ_revolution5: "Naše příbuzní znovu sjednoceni" # todo: NEW TRANSLATION
  IRQ_revolution6: "Integrace starodávných zemí" # todo: NEW TRANSLATION
  IRQ_revolution7: "Prohlásit císařství" # todo: NEW TRANSLATION
  ALB_TO_IRQ_fascism: "Golden Square Iraq" # todo: NEW TRANSLATION
  IRQ_revolution: "Útok na RAF Habbaniya" # todo: NEW TRANSLATION
  IRQ_revolution_desc: "" # todo: NEW TRANSLATION
  IRQ_ita_revolution: "Meč islámu postupuje na východ" # todo: NEW TRANSLATION
  IRQ_ita_revolution_desc: "" # todo: NEW TRANSLATION
  IRQ_eco1: "Znationalizovat britské investice" # todo: NEW TRANSLATION
  IRQ_eco1_desc: "Kompenzujeme desetiletí drancování Brity zabavením jejich majetku." # todo: NEW TRANSLATION
  IRQ_eco3_desc: "Kompenzujeme desetiletí drancování Brity zabavením jejich majetku." # todo: NEW TRANSLATION
  IRQ_the_golden_square_coup: "Puč Zlatého čtverce" # todo: NEW TRANSLATION
  IRQ_the_golden_square_coup_desc: "Dlouho nás Anglosasové okupovali, vysávali náš drahocenný olej a uváděli nás do poddanství svých korporací. Naše zkažená monarchie je slabá a neodráží naši zemi dobře. Měli bychom svrhnout tohoto výmluvu vůdce a ustanovit silného muže, založeného na fašistických principech, aby vedl náš národ ke slávě!" # todo: NEW TRANSLATION
  IRQ_army_doctrine5: "Svolat lid" # todo: NEW TRANSLATION
  IRQ_army_doctrine5_desc: "Svoláme náš národ proti anglospolečenské hrozbě!" # todo: NEW TRANSLATION
  IRQ_eco2: "Pozemková reforma" # todo: NEW TRANSLATION
  IRQ_army_doctrine4: "Mládež Al‑Futuwwa" # todo: NEW TRANSLATION
  IRQ_army_doctrine4_desc: "Vyndoktrinujeme naši mládež našimi ideály fašismu a panarabismu." # todo: NEW TRANSLATION
  IRQ_army_doctrine: "Nová vojenská doktrína" # todo: NEW TRANSLATION
  IRQ_army_doctrine2: "Urychlit vývoj doktrín" # todo: NEW TRANSLATION
  IRQ_army_doctrine2_desc: "Válka je nejlepší učitel." # todo: NEW TRANSLATION
  IRQ_army_doctrine3: "Republikánská garda" # todo: NEW TRANSLATION
  IRQ_army_doctrine3_desc: "To nejlepší z nejlepších, přímo v naší metropoli." # todo: NEW TRANSLATION
  IRQ_army_doctrine_desc: "Nemáme dobré vojenské teoretiky a lpíme na zastaralých taktikách z Velké války. Musíme najmout cizince, aby nás vyučil ve válečném umění." # todo: NEW TRANSLATION
  ITA_align_iraq: "Podporovat irácký nacionalismus" # todo: NEW TRANSLATION
  ITA_align_iraq_desc: "Musíme se postavit jako „osvoboditelé“ pro místní pro‑osiříckou iráckou vládu, abychom mohli naverbovat jejich síly pro naši věc." # todo: NEW TRANSLATION
  RAJ_hyderabad_rails: "Hyderabádské železnice" # todo: NEW TRANSLATION
  RAJ_hyderabad_rails_desc: "Vybudujeme železnice v centrální Indii." # todo: NEW TRANSLATION
  RAJ_pakistani_rails: "Zpevnit cesty do Střední Asie" # todo: NEW TRANSLATION
  RAJ_pakistani_rails_desc: "Rozvineme infrastrukturu směřující do Afghánistánu a Íránu." # todo: NEW TRANSLATION
  RAJ_gujarat_rails: "Rozvinout gudžarátské přístavy" # todo: NEW TRANSLATION
  RAJ_gujarat_rails_desc: "Způsobíme, aby Bombaj byl hlavním přístavem, kam budou proudit všechny naše zboží." # todo: NEW TRANSLATION
  BUL_sign_salonika_agreement: "Podepsat soluňskou dohodu" # todo: NEW TRANSLATION
  BUL_ignore_treaty_neuilly_sur_seine: "Ignorovat smlouvu z Neuilly‑sur‑Seine" # todo: NEW TRANSLATION
  BUL_vmz_sopot: "VMZ Sopot" # todo: NEW TRANSLATION
  ETH_army_reform: "Reformy koloniální armády" # todo: NEW TRANSLATION
  ETH_army_reform_desc: "Naše vojsko zoufale potřebuje shora řízené reformy velení a organizace divizí." # todo: NEW TRANSLATION
  BUL_krali_marko_line: "Linie Krali Marko" # todo: NEW TRANSLATION
  BUL_prosveta_publishing_house: "Vydavatelství Prosveta" # todo: NEW TRANSLATION
  FIN_prepare_for_war: "Připravit se na válku" # todo: NEW TRANSLATION
  FIN_prepare_for_war_desc: "Nemůžeme si dovolit být překvapeni v případě zahraniční invaze. Je lepší vyrobit vojenské vybavení, které nikdy nepoužijeme, než jej postrádat, když bude nejvíce potřeba." # todo: NEW TRANSLATION
  FIN_develop_the_war_machine: "Rozvíjet Maavoimat" # todo: NEW TRANSLATION
  FIN_develop_the_war_machine_desc: "Zvýšená výroba vojenské techniky pomůže ochránit naši suverenitu. Někteří dokonce začali jednat o agresivnějším postoji." # todo: NEW TRANSLATION
  BUL_girdap: "Girdap" # todo: NEW TRANSLATION
  BUL_local_antitank_innovation: "Místní protitankové inovace" # todo: NEW TRANSLATION
  BUL_interventionism: "Intervencionismus" # todo: NEW TRANSLATION
  BUL_dedication_to_the_axis_desc: "Naše oddanost Ose se ukazuje být plodná, protože naše země se zdá být více nakloněna fašismu. Hristo Lukov by byl moudrou volbou při volbě našeho vůdce." # todo: NEW TRANSLATION
  BUL_the_wrong_axis_desc: "Zdá se, že jsme zvolili špatné spojenectví. Osa není dost silná, aby nás ochránila, a my udržujeme sovětské diplomaty. Je čas toho využít." # todo: NEW TRANSLATION
  BUL_negotiate_with_the_soviets_desc: "Je načase začít vyjednávat se Sověty o našem možném vstupu do Kominterny. Měli bychom si zajistit vlastní přežití před Němci a Sověti nám s tím mohou pomoci." # todo: NEW TRANSLATION
  BUL_align_with_the_west_desc: "Tváří v tvář bezprostředním hrozbám v Evropě je naším jediným bezpečným prostorem aliance s Východním světem, pod ochranou západní Evropy." # todo: NEW TRANSLATION
  BUL_appease_the_allies_desc: "Spojenci dali najevo, že podporují Nikolu Mushanova jako předsedu vlády s jeho Demokratickou stranou. Instalace Mushanova režimu by velmi pomohla naší věci." # todo: NEW TRANSLATION
  BUL_deal_with_the_allies_desc: "Žádné více pochybných zadních dveří; svět se může dozvědět, že Bulharsko je nyní formálním členem Spojenců, pro všechno dobré." # todo: NEW TRANSLATION
  BUL_balkan_alignment_desc: "Abychom posunuli naši agendu, měli bychom provést jisté změny zarovnání. Buď se sladíme s Balkánem, nebo se sladíme, Balkán." # todo: NEW TRANSLATION
  BUL_befriend_greece_desc: "Naše desetiletí trvající rivalita s Řeckem by měla skončit. Bylo to zábavné, ale teď je čas spojit se." # todo: NEW TRANSLATION
  BUL_befriend_romania_desc: "Náš severní soused Rumunsko nás příliš nemá rád. Je čas to změnit, aby balkánské státy stály pohromadě a nebyly rozebrány jednu po druhé." # todo: NEW TRANSLATION
  BUL_formalise_the_balkan_entente_desc: "Být součástí systému Ententy je dobré, ale měli bychom zvážit jeho potvrzení, abychom mohli čelit těm, kteří se nás snaží napadnout." # todo: NEW TRANSLATION
  BUL_alliance_with_the_entente_desc: "Nyní, když jsme uklidnili Jugoslávii, Rumunsko a Řecko, měli bychom zvážit připojení k Balkánské ententě. Balkánská ententa nás udrží silné." # todo: NEW TRANSLATION
  BUL_albanian_inheritance_desc: "Albánie není jen slovanská, kdysi byla součástí velkých bulharských říší. Je čas to napravit a připomenout jim, že jejich nezávislost závisí na našem milosrdenství." # todo: NEW TRANSLATION
  BUL_local_armour_acquirements_desc: "Místo spolehání se na externí zdroje pro naše obrněné vybavení, měli bychom vytvořit a vyrábět vlastní. Tak budeme vždy bezpeční." # todo: NEW TRANSLATION
  BUL_over_the_balkans_desc: "Horská divize je v Balkánu velmi užitečná. Výzkum a nasazení těchto jednotek nám dlouhodobě výrazně pomůže." # todo: NEW TRANSLATION
  BUL_protect_the_balkans_desc: "Abychom ochránili Balkán, musíme vybudovat neproniknutelnou linii pevností a zajistit je naší armádou." # todo: NEW TRANSLATION
  BUL_girdap_desc: "Měli bychom zajistit prostředky z banky Girdap v Bulharsku; mohou financovat mnoho vládních projektů a podpořit nás tam, kde nejméně ochotně pomáháme." # todo: NEW TRANSLATION
  BUL_across_the_land_desc: "Měli bychom zlepšit infrastrukturu po celé zemi. Naše silnice nejsou nejlepší a k podpoře budoucích vojenských přesunů je to dobrý začátek." # todo: NEW TRANSLATION
  BUL_bulgarian_electronics_desc: "Výzkum elektroniky je krok do budoucnosti. Měli bychom realizovat plány k vstupu do této budoucnosti." # todo: NEW TRANSLATION
  BUL_steel_exports_desc: "Ač Bulharsko nemá velké zásoby oceli, je to dost na pokrytí našich potřeb a i na minimální vývoz." # todo: NEW TRANSLATION
  BUL_global_detection_desc: "Dalším krokem modernizace je radar; rozsáhlé vysílání posune Bulharsko do budoucnosti, počínaje vybudováním velkého vysílače ve Vakarelu." # todo: NEW TRANSLATION
  BUL_institute_for_nuclear_research_desc: "Pokud má Bulharsko postupovat s dobou, je nejvyšší čas zahájit vlastní výzkum jaderné energie." # todo: NEW TRANSLATION
  BUL_jet_fighters_desc: "Zatímco naše staré stíhačky vyhovují armádě, nebude tomu tak navždy; jak lépe pokročit než kvantovým skokem?" # todo: NEW TRANSLATION
  BUL_derhavna_samoletna_fabrika_desc: "Derhavna Samoletna Fabrika je polská továrna založená v Bulharsku za účelem lokální výroby několika polských stíhaček pro bulharskou armádu." # todo: NEW TRANSLATION
  BUL_retake_thrace_desc: "Thrákie nám náleží! Před druhou balkánskou válkou byla Thrákie jádrem bulharského území a ti špinaví Řekové nám ji ukradli! Musíme ji za každou cenu získat zpět!" # todo: NEW TRANSLATION
  BUL_soviet_t_34_desc: "Pokud máme získat sovětskou technologii, měli bychom usilovat o T‑34, jejich hlavní tank. Budeme se snažit tento tank získat." # todo: NEW TRANSLATION
  BUL_bulgarian_dars_desc: "Bulharská společnost DAR v minulosti vyrobila mnoho cvičných letounů. Možná bychom tyto cvičné stroje využili pro naše piloty, aby získávali při letu zkušenosti." # todo: NEW TRANSLATION
  BUL_dismantle_the_government_desc: "Vláda zradila cara Borise! Musíme eliminovat opozici dříve, než se pokusí o puč!" # todo: NEW TRANSLATION
  BUL_depose_the_king_desc: "Je čas konečně odstranit falešného krále. Už si nezaslouží vést Bulharsko." # todo: NEW TRANSLATION
  BUL_local_antitank_innovation_desc: "Jako země Bulharsko neumí vyrábět tanky dostatečně, abychom čelili jiným státům, proto musíme hledat jiné metody boje proti tankům." # todo: NEW TRANSLATION
  BUL_interventionism_desc: "Je náš čas učinit svět bezpečným. Po mnoha porážkách v minulosti máme šanci vykoupit se." # todo: NEW TRANSLATION
  BUL_vrazhdebna_airfield_desc: "Naše letectvo potřebuje letiště, a k tomu musíme vyvlastnit půdu pro jeho výstavbu. Vládním dekretem bude postaveno." # todo: NEW TRANSLATION
  BUL_bulgarian_revanchism_desc: "Musíme jednat ohledně našich ztrát z Velké války a znovu zajistit bulharskou cestu ke slávě." # todo: NEW TRANSLATION
  BUL_demand_dobrudja_desc: "Dobrudža nám právem náleží a Rumunsko ji nespravedlivě vzalo v důsledku Velké války a balkánských válek." # todo: NEW TRANSLATION
  BUL_our_brothers_in_macedonia_desc: "Vardar‐Makedonie se právem řadí k Bulharsku a můžeme je povzbudit k boji proti jugoslávské vládě." # todo: NEW TRANSLATION
  BUL_deal_with_germany_desc: "Říká se, že Němci plánují invazi do Jugoslávie, což nám dává ideální pozici získat Makedonii od Německa." # todo: NEW TRANSLATION
  BUL_yugoslavia_for_ourselves_desc: "Nebudeme Jugoslávii sdílet, jsou slovanská a měla by být sjednocena s Bulharskem." # todo: NEW TRANSLATION
  BUL_return_to_the_aegan_desc: "Egejské moře bylo dříve v naší sféře vlivu, znovu si jej zabezpečíme pro Velké Bulharsko." # todo: NEW TRANSLATION
  BUL_enemy_of_my_enemy_desc: "Italové nám mohou pomoci zajistit Thrákii od Řecka. Jakmile Itálie vpadne, můžeme požádat o kontrolu nad Thrákií a krok za krokem obnovit naše bývalé impérium." # todo: NEW TRANSLATION
  BUL_fleet_of_the_aegan_desc: "Abychom zajistili kontrolu nad Středozemím a měli větší vliv na moři, musíme začít budovat flotilu ve Středomoří." # todo: NEW TRANSLATION
  BUL_anti_air_defence_of_sofia_desc: "Abychom zabránili potenciálně smrtícím bombardováním hlavního města, musíme v Sofii instalovat protiletadlovou obranu." # todo: NEW TRANSLATION
  BUL_befriend_turkey_desc: "Ve snaze získat si Ententu bychom se měli spřátelit s Tureckem." # todo: NEW TRANSLATION
  BUL_cut_ties_with_germany_desc: "Spojenci řekli, že nám pomohou, pokud se úplně odřízneme od Německa; čas, aby Bulharsko stálo na vlastních nohách." # todo: NEW TRANSLATION
  BUL_protect_bulgaria_desc: "Abychom se bránili, měla by být postavena linie pevností podél hranic." # todo: NEW TRANSLATION
  BUL_agrarian_utopia_desc: "Bulharsko se skládá převážně z rolníků a zemědělců; můžeme toho využít ve snaze o komunismus." # todo: NEW TRANSLATION
  BUL_slavic_confederation_desc: "Místo vstupu k sovětům bychom mohli nejlépe uplatnit náš vliv na Balkáně spojením sousedů a ukázáním správné cesty." # todo: NEW TRANSLATION
  BUL_macedonian_literary_circle_desc: "Komunisté v naší vládě zřídili údajný makedonský literární kruh, abychom podpořili Makedonce; nyní ho použijeme pro širší pokrok." # todo: NEW TRANSLATION
  BUL_support_urbanisation_desc: "Nemáme už dost místa pro výstavbu, měli bychom uvolnit nějaký prostor." # todo: NEW TRANSLATION
  BUL_synthetic_experiments_desc: "Bohužel se nemůžeme navždy spoléhat na vnější svět pro obchod, zvláště v případě války. Měli bychom se pokusit vyrobit syntetické zdroje." # todo: NEW TRANSLATION
  BUL_better_excavation_equipment_desc: "Naše těžební zařízení je zastaralé; můžeme a měli bychom je zlepšit!" # todo: NEW TRANSLATION
  BUL_buy_from_britain_desc: "Možná nám Britové dovolí nakupovat vybavení od nich a dalších spojenců. Pokud můžeme nakupovat od více zdrojů, máme přístup k více technice, že?" # todo: NEW TRANSLATION
  BUL_support_macedonian_industry_desc: "Náš makedonský loutkový stát potřebuje průmyslovou podporu; měli bychom mu pomoci, a nakonec nám budou užitečnější." # todo: NEW TRANSLATION
  BUL_the_macedonian_question_desc: "Makedonci obecně jsou v Bulharsku problém a měli bychom jej nějak vyřešit." # todo: NEW TRANSLATION
  BUL_mechanised_effort_desc: "Dlouho jsme operovali pouze motorově; musíme přejít na další stupeň — mechanizaci!" # todo: NEW TRANSLATION
  BUL_local_factories_desc: "Pokud chceme vyrábět místní produkty, neměli bychom mít továrny, které to zajistí? Vláda může vyklidit některé staré budovy a z nich udělat továrny." # todo: NEW TRANSLATION
  BUL_support_equipment_desc: "Bulharská armáda potřebuje podpůrné vybavení! Pouhé zbraně nezvítězí v tom, co přijde." # todo: NEW TRANSLATION
  BUL_may_provoke_aggression: "§RToto může vyprovokovat makedonskou agresi.§!" # todo: NEW TRANSLATION
  bogdan_filov_leader: "Bogdan Filov byl zvolen do úřadu" # todo: NEW TRANSLATION
  boris_iii_leader: "Boris III byl jmenován nejvyšším vůdcem" # todo: NEW TRANSLATION
  BUL_permit_german_access_tt: "Povolit německým jednotkám přístup do Bulharska." # todo: NEW TRANSLATION
  NOR_sjoforsvaret: "Sjøforsvaret" # todo: NEW TRANSLATION
  NOR_sjoforsvaret_desc: "Norges marinförsvar, norské námořnictvo je naší první linií obrany" # todo: NEW TRANSLATION
  NOR_norwegian_shipping: "Norská lodní doprava" # todo: NEW TRANSLATION
  NOR_norwegian_shipping_desc: "Norské loděnice jsou světově špičkové" # todo: NEW TRANSLATION
  NOR_merchant_marine_protection: "Eskorty obchodní flotily" # todo: NEW TRANSLATION
  NOR_merchant_marine_protection_desc: "Musíme chránit naši mocnou obchodní flotilu" # todo: NEW TRANSLATION
  NOR_support_the_shipbuilding_industry: "Podpořit loděnice" # todo: NEW TRANSLATION
  NOR_support_the_shipbuilding_industry_desc: "Loděnice budou opět fungovat" # todo: NEW TRANSLATION
  NOR_naval_modernisation: "Modernizace námořnictva" # todo: NEW TRANSLATION
  NOR_naval_modernisation_desc: "Klíčem k naší námořní nadvládě ve fjordech" # todo: NEW TRANSLATION
  NOR_aquire_the_stord_class_destroyers: "Torpédoborce třídy Stord" # todo: NEW TRANSLATION
  NOR_aquire_the_stord_class_destroyers_desc: "Získat torpédoborce třídy Stord" # todo: NEW TRANSLATION
