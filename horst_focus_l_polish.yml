  fin_soviet_threat: "Bolševická hrozba" # todo: NEW TRANSLATION
  fin_soviet_threat_desc: "Sověti neznají hranice – to, že Rudí prohráli v občanské válce, neznamená, že je Finsko v bezpečí před komunismem. Tento mír je jen přestávkou ve válce." # todo: NEW TRANSLATION
  fin_karelianism: "Suur-Suomi" # todo: NEW TRANSLATION
  fin_karelianism_desc: "Finsko není jen národem pro Finy, ale pro všechny finské národy, a je naším právem i povinností je znovu sjednotit s jejich příbuznými." # todo: NEW TRANSLATION
