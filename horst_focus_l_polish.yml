  RAJ_provincial_election_countdown: "Konec provinčních voleb"
  RAJ_provincial_election_countdown_desc: "Brzy skončí provinční volby a Indové z nich nebudou o nic moudřejší. Volby nedávají domorodým stranám skutečnou moc v odporu vůči vicekráli. Tento znepokojivý fakt může radikální část populace přivést k povstání. Musíme se po těchto vodách pohybovat opatrně."
  english_departure: "§YIndická vlajka§! je vztyčena nad Rudou pevností a §YIndie je svobodná§!."
  india.intro.t: "Začínají indické provinční volby"
  india.intro.desc: "Před rokem přijala Imperial Legislative Council významný krok k restrukturalizaci administrace Britského Ráje. Mimo jiné stanovila první všeobecné volby v Indii. I když jsou volební práva stále omezená a pozemkoví vlastníci si uchovávají mimořádnou moc, jsou to první kroky k demokracii. Politické spektrum, které se chystá zúčastnit této první ukázky demokratických práv v Indii, je nesmírně různorodé, takže indický občan není ochuzen o možnosti. Jaký bude výsledek tohoto politického spektáklu? Konsolidují Britové svou vládní pozici? Povedou radikálové Indii k nezávislosti? To ukáže čas."
  india.intro.a: "Britská nadvláda není předmětem jednání."
  india.intro.b: "Toto podrobení trvá příliš dlouho!"
  india.intro.c: "Volby jsou zbytečné tváří v tvář imperialismu."
  india.1.t: "Velká Británie přebírá kontrolu nad Adenem"
  india.1.desc: "Přístav Aden je jedním z nejdůležitějších v obchodu mezi Indií, Evropou a Dálným východem. Government of India Act 1935 zahrnoval převod kontroly nad tímto přístavem přímo vládě v Londýně, zatímco dříve byl spravován jako provincie šéfa komise. Britská vláda nyní oficiálně převzala kontrolu nad přístavem a zřídila ho jako samostatnou kolonii."
  india.1.a: "Jak bylo plánováno"
  india.4.t: "Závěr provinčních voleb 1937"
  india.4.desc: "Po roce kampaní se objevily tři hlavní strany, které se statečně snažily zajistit svůj vliv v budoucnosti Indie, ale pouze jedna získala širokou podporu v dostatečném počtu provincií, aby získala většinu. Bude její povinností postarat se o budoucnost Indie a chránit její občany před tím, co přijde."
  india.4.a: "Indický národní kongres vyhrál volby!"
  india.4.b: "Unionistická strana vyhrála volby!"
  india.4.c: "Nezávislá labouristická strana vyhrála volby!"
  r56_raj.5.t: "Vyhlášena svobodná Indie"
  r56_raj.5.d: "Subhas Chandra Bose už dlouho budoval podporu, zejména v oblasti Bengálska, pro militantní odtržení od Britského impéria a nyní tyto napětí vyvrcholily a Azad Hind se ocitl ve válečném stavu s Britským Rájem. Indická populace reaguje smíšeně: někteří kritizují autoritářský charakter jeho vlády, jiní ho chválí za posun směrem k indické nezávislosti.\n\nBritský Ráj nyní spěchá, aby sestavil řádnou obranu proti povstání, ačkoliv se už očekává, že akce sabotáže budou sužovat administrativu. [ENG.GetLeader] již jednostranně vyjádřil podporu Britskému Ráji při potlačení tohoto povstání."
  r56_raj.5.a: "Konečně svobodná Indie."
  r56_raj.5.b: "Drobné blouznění."
  r56_raj.5.c: "Rána Britskému impériu."
  r56_raj.6.t: "Rozsáhlé protesty kvůli procesům INA"
  r56_raj.6.d: "Po de facto porážce Indické národní armády bojující za nelegitimní 'Svobodnou Indii' jsou jejich činitelé souzeni za velezradu a válečné zločiny. To je samozřejmě přirozený důsledek takového infantilního povstání lpějícího na drobných ideálech samosprávy nebo 'Swaraj'. Odezva indické populace však není v náš prospěch. Ve všech velkých městech se konaly protesty, zejména organizované Indickým národním kongresem, jehož členové se také postavili na obhajobu válečných zločinců, a protesty se rozšířily po celé zemi, čímž značně destabilizovaly Britský Ráj."
  r56_raj.6.a: "Potlačme tyto nepokoje."
  r56_raj.7.t: "Volání po sebestačnosti Barmy"
  r56_raj.7.d: "Boje v pálivých barmských džunglích byly kruté a mnoho místních vojáků statečně položilo své životy. Jejich přeživší krajané zesílili volání po tom, aby se Barma stala státem odděleným od Indie, avšak spojeným se Svobodnou Indií. Odpovíme na jejich volání?"
  r56_raj.7.a: "Současná situace nám vyhovuje."
  r56_raj.7.b: "Bude potřeba loutkové vlády."
  r56_raj.7.c: "Postavíme skutečně svobodnou Barmu."
  india.2.t: "Provinční volby v Indii 1937"
  india.2.desc: "Politické strany účastnící se všeobecných voleb jsou rozprostřeny po celém politickém spektru a budoucnost Indie je v sázce.\n\nKdo získá možnost vládnout, má obtížný úkol navigovat rozdělený subkontinent."
  india.2.a: "Indický národní kongres posune naši zemi vpřed."
  india.2.b: "Unionistická strana nás povede k dominionství."
  india.2.c: "Potřebujeme Nezávislou labouristickou stranu, aby nás osvobodila od vykořisťování."
  raj_election_start: "Odemkne rozhodnutí §YZvýšit místní vliv§!, pomocí nichž musí být získány většiny v §Yprovincích§!.\n\n§YPolitická strana§! s největším počtem ovládaných provincií §Zdostane možnost§! §Gutvořit vládu§!."
  india.5.t: "Provinční volby v Indii skončily"
  india.5.d: "Tento týden byly oznámeny výsledky dlouho očekávaných prvních indických voleb [RAJ.GetLeader]. Mnoho stran a hnutí se účastnilo politického boje, ale pouze jedna zvítězila.\n[RAJ.GetElectionNews]"
  india.5.a: "Důležitý krok k nezávislosti."
  india.5.b: "Marné úsilí."
  india.5.c: "Hodně štěstí, soudruzi."
  india.5.e: "Demokracie v akci."
  india.5.f: "Zajímavé."
  india.6.t: "Indie získává nezávislost"
  india.6.d: "Když poslední britský konvoj odplouvá a naloží všechny zbylé zásoby na odplouvající královský válečný koráb 'Georgic', Indie si oddychne. Její dny jako Perla v koruně krále jsou pryč, domorodí Indové nyní začínají budovat na zničených popelech Britského Ráje.\n\nA kolik práce mají před sebou, je jasné s ohledem na četné náboženské, jazykové a kulturní menšiny subkontinentu. Nicméně Indie tyto rány nepochybně zahojí a s jistotou vykročí do budoucnosti."
  india.6.d.alt: "Když poslední britský konvoj odplouvá a naloží zbylé zásoby na odplouvající válečnou loď, zanechává indický subkontinent nestabilní, rozdělený a, někteří by řekli, v troskách.\n\nMuslimští separatisté si zabezpečili svůj stát, populační přesuny podněcují násilí a možná největší uprchlickou krizi v dějinách. Ať budoucnost přinese cokoli, subkontinent to bude řešit odděleně."
  india.6.a: "Tři dlouhá století..."
  india.6.b: "Možná dny Impéria jsou sečtené."
  india.6.c: "Jaká tragédie."
  india.6.e: "Zajímavé."
  india.290.t: "Bombajská konference"
  india.290.desc: "S nedávnými úspěchy v politice se Nezávislá labouristická strana zdá být v příznivé pozici přinést socialismus do Indie. Podpora dalších komunistických organizací v Indii je zásadní k udržení stabilní a fungující Indie po zavedení socialistické ekonomiky. Abychom získali některé tvrdé stoupence ke spolupráci, možná budeme muset nabídnout ústupky. \n\nInternacionalisté z CPI požadují náš vstup do Kominterny po nezávislosti, zatímco jejich oponenti, národní komunisté, požadují přerušení spojení s Moskvou. All India Trade Union Congress požaduje zastoupení odborů ve vládě. Ženské osvobozenecké sdružení požaduje úplnou genderovou rovnost."
  india.290.a: "Musíme pečlivě proplout touto sítí"
  india.300.t: "INC získalo popularitu mezi venkovskými hinduisty"
  india.300.desc: "Naše kampaň zaznamenala Nehruovy nedávné úspěchy v získávání klíčové voličské skupiny venkovských severních hinduistů; může být těžké je překonat, ale zahájení proti-kampaně by mohlo pomoci omezit jejich vliv."
  india.300.a: "Naše kampaň je už natolik napjatá."
  india.300.b: "Důležitá příležitost."
  india.301.t: "Unionistická strana získává průmyslovou podporu."
  india.301.desc: "Malá, ale vlivná skupina indické buržoazie většinou podpořila Unionistickou stranu, jako hlavní důvod uvádějí sliby stability. S trochou přesvědčení se mohou podívat jinam."
  india.301.a: "Nemůžeme zradit indické dělníky."
  india.301.b: "Příležitost, kterou si nemůžeme dovolit propásnout."
  india.301.c: "Pragmatické řešení, nic víc."
  india.302.t: "Mezinárodní podpora Nezávislé labouristické strany."
  india.302.desc: "To, co bylo popsáno jako jediná strana pracující pro svobodu všech Indů, získává zahraniční prostředky a řečníky, což nepřiměřeně posiluje jejich kampaň. Jak s tím naložíme?"
  india.302.a: "Jejich pokrytectví je zničí."
  india.302.b: "Brzděme je co nejvíce."
  inc_victory_news: "Indický národní kongres pod vedením Jawaharlala Nehrua vyhrál volby poté, co usilovně pracoval po celém rozděleném subkontinentu a nějakým způsobem ho spojil dohromady. Jejich největší politickou překážkou v dosažení nezávislosti bude All-India Muslim League, která usiluje o vyhlášení samostatného muslimského státu."
  up_victory_news: "Unionistická strana zvítězila díky široké podpoře v nábožensky různorodých provinciích, zdůrazňujíc důležitost unity a bratrství. Významný blok podpory přišel od průmyslníků, kteří obecně preferují konzervativnější sociální politiky. [RAJ.GetAIMLUP]"
  ilp_victory_news: "Nezávislá labouristická strana převzala odpovědnost za vládu. Jejich radikální vize budoucnosti znepokojila průmyslovou a koloniální bázi národa. Uvidíme, zda budou schopni prosadit své politiky; pokud ano, může to znamenat dřívější konec britské vlády v Indii. Nejistá je i budoucnost kastovního systému, široce odmítaného chudšími vrstvami společnosti."
  RAJ_1936_naval_legacy: "Indifikované královské námořnictvo"
  RAJ_1936_naval_legacy_mtg: "Indifikované královské námořnictvo"
  raj_disable_focus_tree: "§RTímto deaktivujete svůj strom fokusu§!"
  the_bombay_uprising: "Bombajské povstání"
  the_bombay_uprising_desc: "Nově nalezená svoboda lidu v bengálské oblasti je atraktivní a zejména pražák jménem Bombaj vypadá, že je připraven vybouchnout, potřebuje jen malou jiskru."
  RAJ_SPR_arms_smuggling: "Propašovat zbraně do [FROM.GetNameDef]"
  RAJ_agrarian_economy: "Agrární ekonomika"
  RAJ_agrarian_economy_desc: "Indie, kdysi výrobní srdce světa, utrpěla pod britskou politikou. Ta zahrnovala rychlou deindustrializaci, rozšířenou těžbu surovin a vykořisťující zdanění. Náprava těchto ekonomických problémů bude úkol daleko přesahující naši blízkou budoucnost. Krok za krokem musí být prioritou zajištění potravinové bezpečnosti."
