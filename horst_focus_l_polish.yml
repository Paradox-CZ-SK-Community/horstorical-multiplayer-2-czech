  ENG_dieppe: "Výsadek v Dieppe" # todo: NEW TRANSLATION
  ENG_dieppe_desc: "Budeme se snažit zjistit více o německých obranných pozicích na evropském pobřeží provedením malé invaze na město Dieppe." # todo: NEW TRANSLATION
  NOR_navy_3: "Rychlé námořnictvo" # todo: NEW TRANSLATION
