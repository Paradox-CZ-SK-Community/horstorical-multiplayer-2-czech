  post_election_struggle: "Boj za nezávislost"
  post_election_struggle_desc: "Pokud chceme dosáhnout §Ynezávislosti§! bez krveprolití, musíme vyvíjet tlak na §YBrity§!. Musíme také získat více vlivu než konkurenční §YAll-India Muslim League§!, která chce vyříznout Pákistán z našich hranic.\n\n\t[RAJ.GetFlag]Aktuální §Y[Root.GetReigningGovernmentColor]§! vliv je [?Root.ind_influence]\n\t[PAK.GetFlag]Aktuální vliv §YAll-India Muslim League§! je [?Root.pak_influence]\n\nV současnosti získáváme denně §Y[?Root.ind_influence_daily] vlivu§!, zatímco AIML získává §Y[?Root.pak_influence_daily] vlivu§!.\n\nPro dosažení §Ynezávislosti§! musíme vyvinout 100 vlivu, ale pokud má §YAIML§! více než 50% našeho §Yvlivu§!, Britové uvolní Pákistán jako samostatný stát. Pokud má §YAIML§! více než 66% našeho vlivu, získá také Kašmír."
