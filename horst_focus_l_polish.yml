  EFR_devalue_the_franc: "Devalvace franku" # todo: NEW TRANSLATION
  FIN_armor_effort_desc: "Aplikací toho, co jsme se naučili mechanizací naší pěchoty, můžeme zlepšit i naše obrněné vozidla." # todo: NEW TRANSLATION
  EFR_devalue_the_franc_desc: "Zatímco jiné země dovolily svým měnám ztratit na hodnotě, aby pomohly svým ekonomikám, my jsme to rozhodně odmítali. Výsledkem je, že naše ekonomika zaostává za ostatními. Pokud chceme být konkurenceschopnější a přečkat blížící se bouři, nesmíme devalvaci naší měny odmítnout hned z gruntu, i kdyby to byla nepopulární opatření." # todo: NEW TRANSLATION
  EFR_autoroutes: "Dálnice" # todo: NEW TRANSLATION
  EFR_autoroutes_desc: "Němci ohromili svět svým konceptem rychlostních silnic s omezeným přístupem spojujících různé části jejich země. Můžeme ukázat světu, že to zvládneme stejně dobře." # todo: NEW TRANSLATION
  EFR_invest_in_the_metropole: "Rozvíjet metropoli" # todo: NEW TRANSLATION
  EFR_invest_in_the_metropole_desc: "Prvním krokem při obnově našich průmyslů musí být zlepšení našeho průmyslového základu v našich kontinentálních držbách." # todo: NEW TRANSLATION
  EFR_invest_in_the_colonies: "Rozvíjet kolonie" # todo: NEW TRANSLATION
  EFR_invest_in_the_colonies_desc: "Naše průmyslová srdce v Evropě nemají populaci a zdroje, aby udržela velké průmyslové rozšíření. Pokud má naše ekonomika být konkurenceschopná s ostatním světem, musíme využít naše kolonie." # todo: NEW TRANSLATION
  EFR_colonial_industry_effect_tt: "Přidá dvě §Ycivilní továrny§! do každého koloniálního státu, do kterého bylo dříve investováno.\n" # todo: NEW TRANSLATION
  EFR_industrial_expansion_effect_tt: "Přidá dvě §Ycivilní továrny§! do metropolitních států, do kterých bylo dříve investováno.\n" # todo: NEW TRANSLATION
  EFR_military_factories_effect_tt: "Přidá dvě §Yvojenské továrny§! do každého státu, do kterého bylo dříve investováno.\n" # todo: NEW TRANSLATION
  EFR_invest_in_west_africa: "Investovat do západní Afriky" # todo: NEW TRANSLATION
  EFR_invest_in_west_africa_desc: "Obrovské zásoby pracovníků a zdrojů v západní Africe z ní činí ideální kandidáta pro investice." # todo: NEW TRANSLATION
  EFR_invest_in_indochina: "Investovat do Indočíny" # todo: NEW TRANSLATION
  EFR_invest_in_indochina_desc: "Velká vzdálenost mezi našimi držbami v Indočíně a naší domovinou se může zdát nevýhodou, ale také chrání průmysl tam před nepřátelskými útoky." # todo: NEW TRANSLATION
  EFR_invest_in_syria: "Investovat do Sýrie" # todo: NEW TRANSLATION
  EFR_invest_in_syria_desc: "Sýrie je ideálně umístěna, aby nás zásobovala v případě války v Evropě nebo Africe. Zvýšení jejího průmyslového potenciálu podpoří i naši pozici v oblasti." # todo: NEW TRANSLATION
  EFR_global_integration: "Globální integrace" # todo: NEW TRANSLATION
  EFR_global_integration_desc: "Britské impérium je dokonale vyladěný systém vzájemně se podporujících částí. Nic neříká, že bychom to nemohli zvládnout stejně dobře se svými koloniemi." # todo: NEW TRANSLATION
  EFR_begin_rearmament: "Zahájit přezbrojování" # todo: NEW TRANSLATION
  EFR_begin_rearmament_desc: "20leté příměří, které v roce 1919 předpověděl maršál Foch, se rychle chýlí ke konci a svět se stále více zdá být na pokraji vypuknutí války v příštích několika letech. Musíme být připraveni." # todo: NEW TRANSLATION
  EFR_firepower_kills: "Palebná síla zabíjí" # todo: NEW TRANSLATION
  EFR_firepower_kills_desc: "Lekce Velké války byly stejně jednoduché jako kruté: dny, kdy se muži navzájem střetávali na otevřeném výhledu, jsou pryč. Dnes se zabíjí v masovém měřítku s nejmodernějšími zbraněmi na velkou vzdálenost." # todo: NEW TRANSLATION
  EFR_methodical_battle: "Metodická bitva" # todo: NEW TRANSLATION
  EFR_methodical_battle_desc: "Někteří tvrdí, že bitva je chaos, ale jsou to blázni. Bitva není nic než metodické použití správných nástrojů na základě celkového plánu. Plánujte dobře a nepřátelské záměry se stanou historickou poznámkou pod čarou." # todo: NEW TRANSLATION
  EFR_division_cuirassee: "Division Cuirassée" # todo: NEW TRANSLATION
  EFR_division_cuirassee_desc: "Podnikavý důstojník jménem de Gaulle navrhl nový typ divize, kombinující těžké pancéřování s pěchotou a středními tanky pro společný boj." # todo: NEW TRANSLATION
  EFR_infantry_tanks: "Infantry Tanks" # todo: NEW TRANSLATION
  EFR_infantry_tanks_desc: "Cokoliv jiného, první a poslední úkol tanků je umožnit pěchotě obsadit a udržet území. Proto musíme vždy vybavit naše pěší jednotky moderními, schopnými tanky." # todo: NEW TRANSLATION
  EFR_special_forces: "Speciální síly" # todo: NEW TRANSLATION
  EFR_special_forces_desc: "V budoucnu se válka bude stále častěji svádět v oblastech, kde běžný pěšák narazí na své limity. Musíme vytvořit nové a schopnější formace, které v těchto podmínkách obstojí." # todo: NEW TRANSLATION
  EFR_fusiliers_marine: "Fusiliers Marins" # todo: NEW TRANSLATION
  EFR_fusiliers_marine_desc: "Dny pobřeží jako neproniknutelných obranných linií jsou pryč. V budoucnu musíme být schopni přenést boj k nepříteli kdekoli a zajistit přistávací prostor proti jakémukoli odporu." # todo: NEW TRANSLATION
  EFR_battle_of_maneuver: "Bitva manévru" # todo: NEW TRANSLATION
  EFR_battle_of_maneuver_desc: "Starý pojem bojiště jako malého území, kde se armády střetávají, je mrtvý. S masovou motorizací, letadly a rychlou radiokomunikací se bitvy přesouvají rychle na stovky kilometrů. Čím dříve se na to připravíme, tím lépe." # todo: NEW TRANSLATION
  EFR_air_dominance_desc: "Vývoj letadla vytvořil armádě třetí křídlo, o které se musí starat. Musíme tento bok zajistit, jinak hrozí katastrofa." # todo: NEW TRANSLATION
  EFR_air_ground_cooperation: "Spolupráce vzduch‑země" # todo: NEW TRANSLATION
  EFR_air_ground_cooperation_desc: "Boje ve vzduchu přinášejí skutečný vojenský výsledek jen tehdy, jsou‑li vedeny ve prospěch cíle na zemi. Čím lépe integrujeme letecký a pozemní boj, tím efektivnější budeme." # todo: NEW TRANSLATION
  EFR_flying_artillery_desc: "V rychle se pohybujících bitvách dneška nemusí pomalá dělostřelectva na zemi stačit držet krok. Letadla nesoucí pumy mohou převzít jejich roli." # todo: NEW TRANSLATION
  EFR_form_the_popular_front: "Vytvořit lidový front" # todo: NEW TRANSLATION
  EFR_form_the_popular_front_desc: "S růstem fašismu v Německu a Itálii je jasné, že vnitřní spory na levici musí ustát, pokud má naše věc přežít. Široký lidový front složený ze všech levicových stran bude mít mandát lidu konečně řešit ekonomické podmínky, které fašismus živí." # todo: NEW TRANSLATION
  EFR_ban_communism_desc: "Zatímco je nepředstavitelné, že by někdo vážně chtěl přivést chaos a krev komunistické revoluce na svou vlast, zdá se, že někteří z nás by to udělali. Nemůžeme jim dovolovat dál spiklovat se proti státu. Je třeba přijmout nejtvrdší opatření." # todo: NEW TRANSLATION
  EFR_invite_communist_ministers: "Pozvat komunistické ministry" # todo: NEW TRANSLATION
  EFR_invite_communist_ministers_desc: "Strach z odvetné reakce radikální pravice zabránil zapojení komunistů do skutečné vlády. Ale strach je špatný rádce. Pokud má dojít ke střetu, ať přijdou." # todo: NEW TRANSLATION
  EFR_strengthen_the_unions: "Posílit odbory" # todo: NEW TRANSLATION
  EFR_strengthen_the_unions_desc: "Příliš dlouho bylo právo dělníka spojovat se se spolupracovníky za účelem kolektivního vyjednávání otevřeno útokům. Už nikdy více." # todo: NEW TRANSLATION
  EFR_celebrate_the_commune: "Oslavit Komunu" # todo: NEW TRANSLATION
  EFR_celebrate_the_commune_desc: "I když krátce trvající, Pařížská komuna byla prvním pokusem vytvořit komunistickou společnost na francouzské půdě." # todo: NEW TRANSLATION
  EFR_womens_suffrage_desc: "Je to stejně absurdní jako ostudné, že pracovité ženy Francie, které mnohokrát bojovaly na barikádách za svá práva, nejsou oprávněny volit. Zlikvidujeme tuto nespravedlnost." # todo: NEW TRANSLATION
  EFR_legal_equality: "Právní rovnost" # todo: NEW TRANSLATION
  EFR_legal_equality_desc: "Ve všech podstatných ohledech jsou ženy stále považovány za občanky druhé kategorie, vždy podřízené vůli muže. Tento nesmysl končí nyní." # todo: NEW TRANSLATION
  EFR_industrial_collectivization: "Průmyslová kolektivizace" # todo: NEW TRANSLATION
  EFR_industrial_collectivization_desc: "Francouzská ekonomika dnes sestává z drobných podniků s málo zaměstnanci, navždy v konkurenčním boji a vysávající zdroje v neefektivní malovýrobě. Spojíme tyto malé podniky, abychom konečně vytvořili společnosti, které mohou konkurovat na světové úrovni." # todo: NEW TRANSLATION
  EFR_agricultural_collectivization_desc: "To, co platí pro průmysl, platí stejně pro farmáře po celé Francii. Malé farmy si nemohou dovolit moderní vybavení a většinou pracují jako za časů pradědečků. Spojením do zemědělských výrobních jednotek zvýšíme efektivitu a produkci." # todo: NEW TRANSLATION
  EFR_force_the_issue: "Vynutit rozhodnutí" # todo: NEW TRANSLATION
  EFR_force_the_issue_desc: "Od doby, kdy jsme vytvořili Lidový front, jsme ušli dlouhou cestu. Nemůžeme však nechat naši práci nedokončenou. Je čas, aby se každý na levici rozhodl a zaujal stanovisko - buď s revolucí, nebo proti ní." # todo: NEW TRANSLATION
  EFR_force_the_issue_tt: "Trest za stabilitu závisí na popularitě §YDemocratic§! stran.\n" # todo: NEW TRANSLATION
  EFR_reconciliation: "Usmíření" # todo: NEW TRANSLATION
  EFR_reconciliation_desc: "V minulosti házely francouzské revoluce zemi příliš často do nekonečných záchvatů revolučního a protirevolučního teroru. Možná je čas vybudovat republiku, v níž má každý své místo, ať už revoluci podporoval, nebo ne." # todo: NEW TRANSLATION
  EFR_constitutional_convention: "Ústavní konvent" # todo: NEW TRANSLATION
  EFR_constitutional_convention_desc: "Zásadní změna povahy naší republiky nemůže být uskutečněna přes noc, a nemůže být uskutečněna bez vyjednávání nové ústavy." # todo: NEW TRANSLATION
  EFR_anti_fascist_coalition: "Antifašistická koalice" # todo: NEW TRANSLATION
  EFR_anti_fascist_coalition_desc: "Největší hrozbou postupu pokroku je šíření reakčního fašismu. Musíme stát při každé zemi, která je ochotna s touto hrozbou bojovat, jinak pro nikoho z nás nebude žádné zítřky." # todo: NEW TRANSLATION
  EFR_invite_anti_fascist_emigrants: "Pozvat antifašistické emigranty" # todo: NEW TRANSLATION
  EFR_invite_anti_fascist_emigrants_desc: "Prvním krokem každého fašistického režimu je vypovědět jeho kritiky a lidi, kteří by mohli nabídnout alternativní vizi uspořádání země. Tito lidé jsou však také dokonale schopni vytvořit exilovou vládu, aby se připravili na den, kdy bude jejich země osvobozena." # todo: NEW TRANSLATION
  EFR_reconnect_to_the_balkans: "Znovu navázat spojení s Balkánem" # todo: NEW TRANSLATION
  EFR_reconnect_to_the_balkans_desc: "Francie dlouho usilovala o vyvážení sil střední Evropy tím, že oslovovala balkánské země. Toto spojení tu stále je, i když bylo v poslední době poněkud zanedbáno." # todo: NEW TRANSLATION
  EFR_pre_empt_the_fascist_attack: "Předběhnout fašistický útok" # todo: NEW TRANSLATION
  EFR_pre_empt_the_fascist_attack_desc: "Proč bychom měli nechat nepřítele připravovat se v klidu a vybrat si okamžik, kdy nevyhnutelný útok nejlépe vyhovuje jemu? Zaútočíme první a zlomíme tuto hrozbu dříve, než se stihne připravit." # todo: NEW TRANSLATION
  EFR_loyalty_to_moscow: "Věrnost Moskvě" # todo: NEW TRANSLATION
  EFR_loyalty_to_moscow_desc: "Model socialismu praktikovaný v Sovětském svazu možná není dokonalý, ale je nad rozumnou pochybnost, že Sovětský svaz dosáhl nejvyšší míry uskutečnění socialistických idejí. Byli bychom blázni, kdybychom se snažili hledat vlastní cestu." # todo: NEW TRANSLATION
  EFR_league_of_french_bolshevist_volunteers_desc: "Když je jedna socialistická země ohrožena cizím nepřítelem, jsou všechny socialistické země ohroženy. Nemůžeme jen tak sedět a přihlížet, zatímco naši soudruzi bojují o život." # todo: NEW TRANSLATION
  EFR_host_the_german_exiles: "Přijmout německé exulanty" # todo: NEW TRANSLATION
  EFR_host_the_german_exiles_desc: "Německo, domov Marxe a Engelse, bylo kdysi v čele komunistického myšlení a praxe. Mnoho německých komunistů uprchlo, když se k moci dostali nacisté. Pokud jim dáme domov, mohou nám pomoci organizovat efektivnější vládu osvobozených území." # todo: NEW TRANSLATION
  EFR_revolution_to_the_utmost: "Revoluce do krajnosti" # todo: NEW TRANSLATION
  EFR_revolution_to_the_utmost_desc: "Polovičatá revoluce není revolucí vůbec. Nesmíme přestat, dokud není práce dokonána a nový politický systém bezpečně zajištěn. Ať to stojí, co to stojí." # todo: NEW TRANSLATION
  EFR_destroy_the_counter_revolution: "Zničit kontrarevoluci" # todo: NEW TRANSLATION
  EFR_destroy_the_counter_revolution_desc: "I teď se někteří lidé ve Francii připravují bodnout dýku do zad vlastního lidu, když projeví i jen vteřinu slabosti. Nedovolíme jim to a udeříme první." # todo: NEW TRANSLATION
  EFR_appeal_to_the_french_nation: "Oslovení francouzského národa" # todo: NEW TRANSLATION
  EFR_appeal_to_the_french_nation_desc: "Francie mohla prohrát bitvu, ale ne válku. Je povinností každého vlasteneckého Francouze vzdorovat." # todo: NEW TRANSLATION
  EFR_appeal_to_overseas_territories: "Oslovení zámořských území" # todo: NEW TRANSLATION
  EFR_appeal_to_overseas_territories_desc: "Zatímco metropolitní oblasti Francie mohly padnout nepříteli, velká část jejího impéria zůstává svobodná. Pokud je dokážeme získat k naší pomoci, můžeme znovu přenést boj k nepříteli." # todo: NEW TRANSLATION
  EFR_appeal_to_overseas_territories_tt: "Koloniální území v různých částech světa mají šanci přejít na naši stranu." # todo: NEW TRANSLATION
  EFR_intervention_in_north_africa: "Intervence v Severní Africe" # todo: NEW TRANSLATION
  EFR_intervention_in_north_africa_desc: "Severní Afrika představuje nejlepší možné odrazové místo pro invazi za účelem znovudobytí vlasti. Získat ji na naši stranu je zásadní pro naši kampaň osvobození." # todo: NEW TRANSLATION
  EFR_intervention_in_west_africa: "Intervence v Západní Africe" # todo: NEW TRANSLATION
  EFR_intervention_in_west_africa_desc: "Západní Afrika skrývá nesčetné miliony obyvatel, kteří mohou být naverbováni do nové armády, aby znovu dobila naši vlast." # todo: NEW TRANSLATION
  EFR_intervention_in_syria: "Intervence v Sýrii" # todo: NEW TRANSLATION
  EFR_intervention_in_syria_desc: "Odepření nepříteli strategických území v Sýrii chrání Suezský průplav a dramaticky zlepšuje naši situaci ve východním Středomoří." # todo: NEW TRANSLATION
  EFR_intervention_in_indochina: "Intervence v Indočíně" # todo: NEW TRANSLATION
  EFR_intervention_in_indochina_desc: "Daleko od bojišť v Evropě jsou naše kolonie v Indočíně ideální oblastí, která nám pomůže bránit naše zájmy v regionu." # todo: NEW TRANSLATION
  EFR_intervention_in_central_africa: "Intervence ve Střední Africe" # todo: NEW TRANSLATION
  EFR_intervention_in_central_africa_desc: "Střední Afrika má zásadní význam pro spojenecké válečné úsilí a mohla by být uchvácena jako významný propagační úspěch pro nás." # todo: NEW TRANSLATION
  EFR_intervention_in_madagascar: "Intervence na Madagaskaru" # todo: NEW TRANSLATION
  EFR_intervention_in_madagascar_desc: "Kdybychom nepříteli dovolili obsadit a opevnit Madagaskar, čelili bychom katastrofě v Indickém oceánu. Rychlá a rozhodná akce by mohla zajistit, že ostrov zůstane na naší straně." # todo: NEW TRANSLATION
  EFR_form_the_national_committee: "Založit národní výbor" # todo: NEW TRANSLATION
  EFR_form_the_national_committee_desc: "Málokdo by věřil, že naše věc může uspět. Ale nyní jsme konečně dost silní na to, abychom prohlásili vznik plně funkční vlády v exilu, připravené převzít kontrolu nad jakýmkoli francouzským územím osvobozeným od nepřítele." # todo: NEW TRANSLATION
  EFR_form_the_provisional_government_of_the_republic: "Zformovat Prozatímní vládu" # todo: NEW TRANSLATION
  EFR_form_the_provisional_government_of_the_republic_desc: "S osvobozením Paříže už nejsme vládou v exilu. Je čas začít obtížnou práci obnovy naší země." # todo: NEW TRANSLATION
  EFR_continue_the_fight: "Pokračovat v boji" # todo: NEW TRANSLATION
  EFR_continue_the_fight_desc: "Dosud se k nám přihlásilo jen málo vojáků, ale ty, které máme, musíme vyzbrojit a vybavit." # todo: NEW TRANSLATION
  EFR_the_free_french_navy: "Svobodné francouzské námořnictvo" # todo: NEW TRANSLATION
  EFR_the_free_french_navy_desc: "Naši spojenci vedou zoufalý boj o přežití, pro který jsou námořní trasy životně důležité. Musíme přispět svojí částí." # todo: NEW TRANSLATION
  EFR_colonial_recruitment_desc: "S domovskou zemí neschopnou náboru se musíme obrátit na naše kolonie. Mnozí z našich poddaných jsou ochotni chopit se zbraní a bojovat za nás." # todo: NEW TRANSLATION
  EFR_the_regiment_normandie: "Pluk Normandie" # todo: NEW TRANSLATION
  EFR_the_regiment_normandie_desc: "Je zásadní, aby bylo vidět, že Francouzi bojují na všech frontách. Se sověty nyní zapojenými do bojů proti našemu společnému nepříteli bychom jim mohli poslat malou skupinu stíhacích pilotů, aby jim pomohli." # todo: NEW TRANSLATION
  EFR_refus_absurde: "Refus Absurde" # todo: NEW TRANSLATION
  EFR_refus_absurde_desc: "I v hodině porážky zůstává vůle vzdoru silná v některých srdcích. Ti vytvoří základ odporu na okupovaných územích." # todo: NEW TRANSLATION
  EFR_the_maquis: "Maquis" # todo: NEW TRANSLATION
  EFR_the_maquis_desc: "Vesnické oblasti Francie poskytují úkryt každému, kdo chce uniknout okupantovi nebo jeho kolaborantským pomocníkům. Měli bychom podporovat lidi, kteří odepřou svou práci nepříteli jako akt odporu, aby se z těchto oblastí časem stala střediska odboje." # todo: NEW TRANSLATION
  EFR_reach_out_to_trade_unions: "Obrátit se na odbory" # todo: NEW TRANSLATION
  EFR_reach_out_to_trade_unions_desc: "Pokud chceme udeřit na odvětví, která byla nyní přinucena sloužit nepříteli, mít dobré spojení s dělníky v těchto podnicích se zdá být nejlepší cestou. Mohou zdržet nebo sabotováním jakoukoli výrobu daleko efektivněji než jakákoli vnější síla." # todo: NEW TRANSLATION
  EFR_cooperation_with_the_communists: "Spolupráce s komunisty" # todo: NEW TRANSLATION
  EFR_cooperation_with_the_communists_desc: "V našem společném boji nesmíme odmítnout žádného spojence, i když by se mohl nazývat soudruhem." # todo: NEW TRANSLATION
  EFR_connections_to_industrialists: "Spojení s průmyslníky" # todo: NEW TRANSLATION
  EFR_connections_to_industrialists_desc: "Zatímco spolupráce s dělníky v válečném průmyslu pomáhá, spolupráce s lidmi, kteří řídí továrny, má sama o sobě výhody." # todo: NEW TRANSLATION
  EFR_the_civil_and_military_organization: "Civilní a vojenská organizace" # todo: NEW TRANSLATION
  EFR_the_civil_and_military_organization_desc: "Mnoho malých skupin, které provádějí akty odporu, se sdružuje do větší organizace. Měli bychom tomu dát náš souhlas." # todo: NEW TRANSLATION
  EFR_national_council_of_the_resistance_desc: "Odboj sílí ve Francii a stal se natolik mocným, že potřebuje nový řídicí výbor pro koordinaci svých aktivit." # todo: NEW TRANSLATION
  EFR_national_uprising_desc: "Hodina nadešla. Teď je čas chopit se zbraní a vystoupit ze stínů, které vás po tolika letech skrývaly!" # todo: NEW TRANSLATION
  EFR_french_forces_of_the_interior: "Francouzské vnitřní síly" # todo: NEW TRANSLATION
  EFR_french_forces_of_the_interior_desc: "Odboj má tisíce mužů pod zbraní po celé Francii. Jak my a naši spojenci postupujeme zemí, mobilizujeme je a přeměníme je v vojáky v naší armádě." # todo: NEW TRANSLATION
  EFR_french_forces_of_the_interior_tt: "Vytvoří slabé pěší jednotky v každém osvobozeném jádrovém státě." # todo: NEW TRANSLATION
  EFR_naval_rearmament: "Námořní přezbrojení" # todo: NEW TRANSLATION
  EFR_naval_rearmament_desc: "Náš loděnický průmysl byl zanedbán, zatímco jsme se soustředili na držení kroku s vývojem v jiných oblastech. Výsledkem je, že nyní hrozí, že nám soupeři v Středomoří a Atlantském oceánu utečou. Musíme víc investovat, abychom dohnali ztracený čas." # todo: NEW TRANSLATION
  EFR_colonial_naval_bases: "Koloniální námořní základny" # todo: NEW TRANSLATION
  EFR_colonial_naval_bases_desc: "Klíčem k projekci globální moci je schopnost udržovat flotilu daleko od domácích vod. Máme již rozsáhlá koloniální državy, nyní je třeba je rozvinout jako překladiště paliva a opravárenské základny pro naši flotilu." # todo: NEW TRANSLATION
  EFR_develop_colonial_dockyards: "Rozvíjet koloniální loděnice" # todo: NEW TRANSLATION
  EFR_develop_colonial_dockyards_desc: "S rozšířenými a modernizovanými námořními základnami v různých částech našeho impéria můžeme usadit potřebný těžký průmysl a postavit velké doky nezbytné pro stavbu lodí zámoří." # todo: NEW TRANSLATION
  EFR_the_old_school: "Stará škola" # todo: NEW TRANSLATION
  EFR_the_old_school_desc: "Navzdory všem pokrokům v námořní technice je klíčovým prvkem námořní síly stále kapitální loď, podporovaná ostatními jednotkami flotily. Ať už je touto kapitální lodí bitevní loď nebo nová letadlová loď, musíme dále zvětšovat naši loděnickou kapacitu, abychom udrželi krok s ostatními námořními mocnostmi." # todo: NEW TRANSLATION
  EFR_carrier_planes: "Letadla pro letadlové lodě" # todo: NEW TRANSLATION
  EFR_carrier_planes_desc: "Letadlová loď je tak dobrá, jak dobrá jsou její letadla. Bez moderních strojů je každá letadlová loď promarněná investice." # todo: NEW TRANSLATION
  EFR_rush_the_richelieus: "Urychlit Richelieu" # todo: NEW TRANSLATION
  EFR_rush_the_richelieus_desc: "S vývojem situace v Evropě stále zoufalejším nemáme čas budovat nové povrchové jednotky konvenčními prostředky. Musíme prioritizovat materiály, aby se naše nové bitevní lodě dostaly co nejdříve do služby." # todo: NEW TRANSLATION
  EFR_prioritize_the_joffre: "Upřednostnit Joffre" # todo: NEW TRANSLATION
  EFR_prioritize_the_joffre_desc: "Naše současná letadlová flotila je zoufale zastaralá a v jakémkoli konfliktu by byla přemožena. Musíme zajistit, aby nový projekt letadlové lodě měl nejvyšší prioritu." # todo: NEW TRANSLATION
  EFR_the_young_school: "Nová škola" # todo: NEW TRANSLATION
  EFR_the_young_school_desc: "Pokroky v letectví, ponorkách a torpédech učinily kapitální loď zastaralou. S omezeným námořním průmyslem si nemůžeme dovolit plýtvat časem a penězi na stavbu obrovských plovoucích pevností, které jsou bezmocné proti hrozbám moderního námořního bojiště. Měli bychom se místo toho soustředit na zvýšení efektivity, abychom mohli stavět více menších plavidel." # todo: NEW TRANSLATION
  EFR_undersea_combat: "Podmořský boj" # todo: NEW TRANSLATION
  EFR_undersea_combat_desc: "Ponorka dozrála v posledním desetiletí. Nyní představuje smrtící hrozbu pro všechny povrchové lodě a je čím dál obtížnější ji odhalit a zničit." # todo: NEW TRANSLATION
  EFR_surface_combat: "Povrchový boj" # todo: NEW TRANSLATION
  EFR_surface_combat_desc: "S pokroky v dělostřelectvu je téměř nemožné postavit loď, která by přežila prodloužený souboj s jinou kapitální jednotkou. Je lepší mít flotilu moderních torpédoborců a torpédových člunů, které nepřítele přemohou hromadnými torpédovými salvy." # todo: NEW TRANSLATION
  EFR_prioritize_the_joffre_tt: "Přidá moderní §YCarrier§! do výrobní fronty na 40% dokončení." # todo: NEW TRANSLATION
  EFR_revolutionary_zeal_desc: "Francouzský lid vždy choval zvláštní horlivost pro vykořenění starého řádu a vyzdvižení nového. To by nemělo být potlačováno." # todo: NEW TRANSLATION
  EFR_loyalty_to_the_cause: "Věrnost věci" # todo: NEW TRANSLATION
  EFR_loyalty_to_the_cause_desc: "Jiné země mohou formulovat své vlastní vize komunismu, ale není důvod, abychom v té naší ustupovali. Mohli skončit na půli cesty, sužováni pochybami, zda cíl ospravedlňuje prostředky. My ne." # todo: NEW TRANSLATION
  EFR_carry_the_revolution_north: "Nést revoluci na sever" # todo: NEW TRANSLATION
  EFR_carry_the_revolution_north_desc: "Na druhé straně Lamanše leží kolébka průmyslové revoluce a s ní i domov moderního kapitalismu. Nemůžeme dovolit, aby se toto místo stalo odrazovým můstkem pro protirevolučního nepřítele." # todo: NEW TRANSLATION
  EFR_carry_the_revolution_west: "Nést revoluci na západ" # todo: NEW TRANSLATION
  EFR_carry_the_revolution_west_desc: "Režimy na Pyrenejském poloostrově visí na nitce a jsou připraveny být smeteny lidovou revolucí. Přetneme tu nit." # todo: NEW TRANSLATION
  EFR_carry_the_revolution_east: "Nést revoluci na východ" # todo: NEW TRANSLATION
  EFR_carry_the_revolution_east_desc: "Na naší východní hranici leží největší hrozba pro náš nový řád. Reakční síly shromážděné tam udeří, když si to nebudeme moci dovolit - ale jen pokud jim dáme čas se připravit." # todo: NEW TRANSLATION
  EFR_carry_the_revolution_south: "Nést revoluci na jih" # todo: NEW TRANSLATION
  EFR_carry_the_revolution_south_desc: "První zemí, která podlehla fašismu, bylo Itálie. Ideologie je tam pevně zakořeněna. Naše světonázory nemohou pokojně koexistovat. Oni to vědí stejně jako my a nepochybně se připraví jednat. My musíme udělat totéž." # todo: NEW TRANSLATION
  EFR_egalite_liberte_solidarite_desc: "První francouzská revoluce smetla režimy, které trvaly tisíciletí, a navždy změnila tvář Evropy. Dokončíme, co začali." # todo: NEW TRANSLATION
  EFR_reform_the_labour_laws: "Reformovat pracovní zákony" # todo: NEW TRANSLATION
  EFR_reform_the_labour_laws_desc: "Dělníci ve Francii pracují v tvrdých podmínkách, s nízkými platy a málo výhodami. Je čas zavést komplexní balík reforem k zlepšení jejich postavení." # todo: NEW TRANSLATION
  EFR_nationalize_key_industry: "Znárodnit klíčová odvětví" # todo: NEW TRANSLATION
  EFR_nationalize_key_industry_desc: "V současné situaci se nemůžeme bát radikálně restrukturalizovat naši ekonomiku, aby čelila hrozbě. Čas je krátký - nemůžeme čekat, až to vyřeší volný trh." # todo: NEW TRANSLATION
  EFR_reorganize_the_aviation_industry: "Přestavět letecký průmysl" # todo: NEW TRANSLATION
  EFR_reorganize_the_aviation_industry_desc: "Rozdělen do desítek drobných společností, náš letecký průmysl je desítky let pozadu za průmyslem v Německu a USA. Je potřeba radikální restrukturalizace." # todo: NEW TRANSLATION
  EFR_form_the_state_arsenals: "Zřídit státní arsenály" # todo: NEW TRANSLATION
  EFR_form_the_state_arsenals_desc: "Abychom zásobovali naši armádu moderními zbraněmi, nemůžeme čekat, až soukromé firmy vybudují potřebné výrobní kapacity." # todo: NEW TRANSLATION
  EFR_general_work_council: "Všeobecná pracovní rada" # todo: NEW TRANSLATION
  EFR_general_work_council_desc: "Vytvoříme národní agenturu pro řešení sporů mezi zaměstnavateli a zaměstnanci a pro zajištění, že naši dělníci budou zaměstnáváni co nejefektivněji." # todo: NEW TRANSLATION
  EFR_national_champions: "Národní šampioni" # todo: NEW TRANSLATION
  EFR_national_champions_desc: "Vybráním několika společností s potenciálem konkurovat na globální úrovni a jejich maximální podporou můžeme vytvořit moderní ekonomiku rovnající se jakékoli jiné." # todo: NEW TRANSLATION
  EFR_dirigisme_desc: "Zatímco plně plánovaná ekonomika sovětského modelu je zjevně příliš extrémní, určitá míra plánování a řízení je potřeba k optimalizaci naší ekonomiky." # todo: NEW TRANSLATION
  EFR_ban_the_leagues: "Zákaz lig" # todo: NEW TRANSLATION
  EFR_ban_the_leagues_desc: "Extrémně pravicovým ligám bylo dovoleno organizovat se bez kontroly. I když jsou momentálně příliš slabé na pokus o puč, nikdo neví, co by mohly v budoucnu dokázat. Nejlepší je jejich rozpuštění hned." # todo: NEW TRANSLATION
  EFR_the_blum_viollette_proposal: "Návrh Blum-Viollette" # todo: NEW TRANSLATION
  EFR_the_blum_viollette_proposal_desc: "Občanství Francouzské republiky by mělo být otevřené každému, kdo splňuje podmínky. Mnozí naši loajální poddaní v Alžírsku by se rádi stali plnohodnotnými občany, ale zatím jim to není dovoleno. Tím, že je udělíme, bychom Alžírsko pevněji svázali s Francií." # todo: NEW TRANSLATION
  EFR_expand_the_citizenship: "Rozšířit občanství" # todo: NEW TRANSLATION
  EFR_expand_the_citizenship_desc: "Je nesnesitelné, že by republici někteří lidé žijící na jejím území nebyli dovoleni stát se jejími občany, přesto takový stav u nás trvá. Musíme to okamžitě napravit." # todo: NEW TRANSLATION
  EFR_france_undividable_desc: "Francie musí být formována do jediné jednoty pod jednou vlajkou. Je čas to otevřeně přiznat, byť jen aby se uklidnily obavy z rozdělení." # todo: NEW TRANSLATION
  EFR_french_union: "Francouzská unie" # todo: NEW TRANSLATION
  EFR_french_union_desc: "Je čas vyhlásit novou Francii, Francii, která se rozprostírá po celém světě, v níž jsou všechny části našeho panství sjednoceny. Uskutečníme referenda v každé části, abychom potvrdili vůli lidu stát se součástí této nové, větší Francie." # todo: NEW TRANSLATION
  EFR_french_union_tt: "Referenda v různých částech našeho koloniálního impéria budou pořádána. Některé části se mohou rozhodnout stát se plně nezávislými." # todo: NEW TRANSLATION
  EFR_encourage_immigration: "Podporovat imigraci" # todo: NEW TRANSLATION
  EFR_encourage_immigration_desc: "Naše vlast zoufale potřebuje pracovníky, aby vyrovnala ztráty vzniklé ve Velké válce. Usnadněním usazování ve Francii můžeme přilákat kvalifikované imigranty, kteří zaplní tuto mezeru." # todo: NEW TRANSLATION
  EFR_review_foreign_policy: "Přehodnotit zahraniční politiku" # todo: NEW TRANSLATION
  EFR_review_foreign_policy_desc: "Kontinentální řád ustanovený v roce 1919 vypadá, že je stále více ohrožen. Je čas přezkoumat naše zahraničněpolitické možnosti a zajistit nová spojenectví, která nám pomohou přečkat nadcházející bouři." # todo: NEW TRANSLATION
  EFR_intervention_in_spain: "Intervence ve Španělsku" # todo: NEW TRANSLATION
  EFR_intervention_in_spain_desc: "Občanská válka ve Španělsku přinesla střet ideologií až na naše prahy. Musíme postupovat opatrně, aby konflikt nepřetekl i do naší země." # todo: NEW TRANSLATION
  EFR_support_the_finns: "Podpořit Finy" # todo: NEW TRANSLATION
  EFR_support_the_finns_desc: "Finové bojují o své životy. Musíme jim pomoci." # todo: NEW TRANSLATION
  EFR_confirm_eastern_commitments: "Potvrdit závazky vůči východu" # todo: NEW TRANSLATION
  EFR_confirm_eastern_commitments_desc: "Po Velké válce jsme zřídili síť aliancí ve východní Evropě jako protizávaž k znovuzrozenému Německu a expanzivnímu Sovětskému svazu. Naši spojenci v regionu teď pochybují, zda bychom jim skutečně přišli na pomoc, kdyby to bylo potřeba. Měli bychom je ujistit dřív, než se rozhodnou hledat pomoc jinde." # todo: NEW TRANSLATION
  EFR_strengthen_the_little_entente: "Posílit Malou ententu" # todo: NEW TRANSLATION
  EFR_strengthen_the_little_entente_desc: "Malá ententa nás zavazuje přijít na pomoc spojencům ve východní Evropě a na Balkáně. Nechali jsme tuto alianci upadnout, ale teď je potřeba víc než kdy jindy. Je čas ji oživit." # todo: NEW TRANSLATION
  EFR_invest_in_our_weaker_allies: "Investovat do slabších spojenců" # todo: NEW TRANSLATION
  EFR_invest_in_our_weaker_allies_desc: "Aby naši spojenci byli schopní v případě války, musíme jim umožnit vyhovět svým vlastním vojenským potřebám. Program mírných investic do jejich průmyslu jim umožní vyrábět munici lokálně." # todo: NEW TRANSLATION
  EFR_invest_in_our_weaker_allies_trigger_tt: "Má méně vojenských továren než my" # todo: NEW TRANSLATION
  EFR_coordinate_rearmament: "Koordinovat přezbrojení" # todo: NEW TRANSLATION
  EFR_coordinate_rearmament_desc: "Abychom se vyrovnali sjednocenému rozvoji Němců a našich dalších protivníků, musíme také koordinovat naše úsilí se spojenci." # todo: NEW TRANSLATION
  EFR_foreign_guest_workers: "Zahraniční hostující dělníci" # todo: NEW TRANSLATION
  EFR_foreign_guest_workers_desc: "Nedostatek pracovníků je hlavní překážkou rozšiřování našeho průmyslu a zvětšování ozbrojených sil. Pozváním kvalifikovaných pracovníků ze spojeneckých zemí do našich továren uvolníme lidi, které můžeme poslat do armády." # todo: NEW TRANSLATION
  EFR_join_the_ententes: "Připojit se k ententám" # todo: NEW TRANSLATION
  EFR_join_the_ententes_desc: "Francie nemůže současně udržet dvě závazky vzájemné obrany. Pokud nedokážeme donutit Brity, aby také respektovali naše závazky, budeme si muset vybrat. Sloučením našich odlišných sítí spojenectví do jednoho celku zvýšíme odstrašující faktor našich aliancí o řád." # todo: NEW TRANSLATION
  EFR_revive_the_franco_polish_alliance: "Oživit francouzsko-polské spojenectví" # todo: NEW TRANSLATION
  EFR_revive_the_franco_polish_alliance_desc: "Francie vždy podporovala nezávislé Polsko. V posledních letech ochladly vztahy mezi našimi zeměmi. S hrozbou Německa na obzoru je čas znovu oživit náš pakt." # todo: NEW TRANSLATION
  EFR_revive_the_franco_polish_alliance_tt: "\nPolsko by bylo pozváno do naší frakce, pokud bychom byli lídry vlastní frakce." # todo: NEW TRANSLATION
  EFR_buy_time: "Koupit čas" # todo: NEW TRANSLATION
  FRA_autoroutes_tt: "Čím dříve tento cíl splníme, tím lepší bude náš rozvoj infrastruktury, ale Francie také získá extra stavební sloty v Gabonu, pokud tento cíl dokončíme před rokem 1939. Získá šest extra slotů, pokud bude dokončen před rokem 1938, a tři extra sloty, pokud bude dokončen mezi lety 1938 a 1939, a žádné poté.\n\n" # todo: NEW TRANSLATION
  EFR_buy_time_desc: "Nejsme připraveni postavit se Němcům na bojišti. Naši spojenci jsou slabí, naše armáda zastaralá. Možná budeme muset učinit oběti, pokud chceme přežít." # todo: NEW TRANSLATION
  EFR_arms_purchases_in_the_us: "Nákup zbraní v USA" # todo: NEW TRANSLATION
  EFR_arms_purchases_in_the_us_desc: "Náš vojenský průmysl prostě nedokáže dodat našim silám potřebné moderní zbraně. USA však mají výrobní kapacity navíc. Pokud se nevrátí k izolacionismu, zdá se, že by je šlo přesvědčit, aby nám prodaly zbraně, které potřebujeme." # todo: NEW TRANSLATION
  EFR_france_leads: "Francie vede" # todo: NEW TRANSLATION
  EFR_france_leads_desc: "Národ s hrdou historií jako Francie nemůže nechat jiné země diktovat její zahraniční politiku. Budeme si dělat vlastní rozhodnutí, vedeni vlastními zájmy." # todo: NEW TRANSLATION
  EFR_concessions_to_italy: "Ústupky Itálii" # todo: NEW TRANSLATION
  EFR_concessions_to_italy_desc: "Itálie stále sní o impériu v Africe. Pokud bychom jí nabídli nějaké ústupky - a schválili její dobytí Etiopie - mohli bychom zabránit vytvoření osy mezi Římem a Berlínem." # todo: NEW TRANSLATION
  EFR_ratify_the_stresa_front: "Ratifikovat Streskou frontu" # todo: NEW TRANSLATION
  EFR_ratify_the_stresa_front_desc: "Itálie naznačila, že by se připojila k naší frakci výměnou za území v Africe. Je čas to podepsat a ratifikovat potřebné smlouvy." # todo: NEW TRANSLATION
  EFR_franco_soviet_treaty: "Franco-[SOV.GetAdjective] smlouva" # todo: NEW TRANSLATION
  EFR_franco_soviet_treaty_desc: "[SOV.GetAdjective] jsou stejně znepokojeni vzestupem fašismu v Evropě jako my. Možná bychom je mohli přesvědčit, aby nás podpořili, až nastane čas." # todo: NEW TRANSLATION
  EFR_revive_the_national_bloc: "Oživit národní blok" # todo: NEW TRANSLATION
  EFR_revive_the_national_bloc_desc: "Politické prostředí se den za dnem radikalizuje. Levice šeptá o společném postupu s komunisty. Teď je potřeba silné, stabilní vedení." # todo: NEW TRANSLATION
  EFR_laissez_faire: "Laissez-Faire" # todo: NEW TRANSLATION
  EFR_laissez_faire_desc: "Komunisté otevřeně mluví o radikální přestavbě naší ekonomické struktury, o zbavení poctivého muže jeho vlastnických práv. Proti tomu postavíme jednoduchý pojem svobody. Dynamická ekonomika vždy překoná levicový noční můru škrcení v červené byrokracii." # todo: NEW TRANSLATION
  EFR_protect_the_rights_of_man: "Chránit práva člověka" # todo: NEW TRANSLATION
  EFR_protect_the_rights_of_man_desc: "Možná to nikdy neřeknou nahlas, ale je zřejmé každému, kdo má oči: omezení práva na vlastnictví je jen prvním krokem k eliminaci všech práv, za která naši hrdí předci tak tvrdě bojovali. To nedovolíme!" # todo: NEW TRANSLATION
  EFR_freedom_front: "Fronta svobody" # todo: NEW TRANSLATION
  EFR_freedom_front_desc: "Když čelíme chaosu a zvratům, které komunisté slibují, je třeba být ochoten spojit se i s politickými stranami, které považujeme osobně za odpudivé." # todo: NEW TRANSLATION
  EFR_stimulate_the_dynamic_market: "Stimulovat dynamický trh" # todo: NEW TRANSLATION
  EFR_stimulate_the_dynamic_market_desc: "Dynamický trh se osvědčil jako nejefektivnější forma ekonomické organizace. Ale stále je řízen lidmi a ti někdy potřebují ujištění, že jejich namáhavá práce nebude marná. Zrušením některých omezení a poskytnutím záruk pomůžeme investorům překonat obavy a podpoříme ekonomiku." # todo: NEW TRANSLATION
  EFR_agricultural_protectionism_desc: "Světová ekonomika se stává stále nepřátelštější našim tradičním způsobům výroby. Pokud nepřijmeme opatření na ochranu našich farmářů, brzy čelíme krizi, protože naši zemědělci nebudou schopni konkurovat masově vyráběným potravinám dováženým ze zámoří." # todo: NEW TRANSLATION
  EFR_economic_devolution: "Ekonomická decentralizace" # todo: NEW TRANSLATION
  EFR_economic_devolution_desc: "Je absurdní myslet si, že nějaký byrokrat v Paříži ví nejlíp, co potřebuje firma v Bordeaux. Musíme důvěřovat našim podnikatelům a zmocnit je k vytváření vlastních řešení." # todo: NEW TRANSLATION
  EFR_promote_entrepeneurship: "Podporovat podnikání" # todo: NEW TRANSLATION
  EFR_promote_entrepeneurship_desc: "Bije srdce dynamického trhu - jednotlivci, který při spatření příležitosti rychle jedná. V posledních letech byl tento duch udušen zbytečnými regulacemi. Měli bychom je zrušit." # todo: NEW TRANSLATION
  EFR_utilize_the_leagues: "Využít lig" # todo: NEW TRANSLATION
  EFR_utilize_the_leagues_desc: "Je smutná skutečnost, že politické násilí se ve Francii stalo běžným. Pokud chce země přežít hrozbu komunistické revoluce, nesmíme se ostýchat využít pomoc lidí, kteří dokážou a budou potírat komunistické rváče na ulici, když to bude zapotřebí." # todo: NEW TRANSLATION
  EFR_national_regeneration: "Národní obnova" # todo: NEW TRANSLATION
  EFR_national_regeneration_desc: "Přebytek demokracie a špatně vedený republicanismus otrávily naši zemi a rozdělily národ. Bude trvat dlouho, než se tyto rány zahojí, ale první kroky již byly učiněny." # todo: NEW TRANSLATION
  EFR_national_regeneration_trigger_tt: "Kombinovaný součet podpory Nezarazených a Fašistů přesahuje 50%" # todo: NEW TRANSLATION
  EFR_destroy_decadence: "Zničit dekadenci" # todo: NEW TRANSLATION
  EFR_destroy_decadence_desc: "Žádná země nebyla velká, pokud si dovolila debatovat i tu nejmenší otázku měsíce. Některé země, ukryté za oceány a podporované globálními impérii, si mohou dovolit tento luxus. My ne." # todo: NEW TRANSLATION
  EFR_integralism: "Integralismus" # todo: NEW TRANSLATION
  EFR_integralism_desc: "Ideologie integralismu říká, že všechny aspekty společnosti musí být součástí a pracovat jako kousíček většího celku. Tato společnost musí být dobře uspořádaná, aby všechny části pracovaly v harmonii." # todo: NEW TRANSLATION
  EFR_work: "Práce" # todo: NEW TRANSLATION
  EFR_work_desc: "Řemeslník je nejdůležitější složkou ekonomiky. Pod vedením správných lidí není ušlechtilejší povolání než dát svou práci do služby vlasti." # todo: NEW TRANSLATION
  EFR_family: "Rodina" # todo: NEW TRANSLATION
  EFR_industrial_expansion_tt: "Pokud bude tento cíl dokončen před rokem 1938, obdržíme tři civilní továrny po příměří pro každý stát označený v předchozích dvou cílech. Pokud bude dokončen mezi lety 1938 a 1939, bude to dvě továrny na označený stát a po roce 1939, ale před příměřím, to bude pouze jedna na stát. Francie obdrží polovinu počtu civilních továren při dokončení tohoto cíle v Gabonu.\n\n" # todo: NEW TRANSLATION
  EFR_military_factories_tt: "Pokud bude tento cíl dokončen před rokem 1938, obdržíme čtyři vojenské továrny po příměří pro každý stát označený v předchozích dvou cílech. Pokud bude dokončen mezi lety 1938 a 1939, bude to tři na označený stát a po roce 1939, ale před příměřím, to budou pouze dvě na stát. Francie obdrží dostatek vybavení k vyzbrojení dvou až tří pěších divizí na každou slíbenou vojenskou továrnu.\n\n" # todo: NEW TRANSLATION
  EFR_family_desc: "Nejmenší jednotkou ve společnosti není jedinec - je to rodina. Popírání této prosté a zřejmé skutečnosti byla největší chyba staré republiky." # todo: NEW TRANSLATION
  EFR_fatherland: "Vlast" # todo: NEW TRANSLATION
  EFR_fatherland_desc: "Země stojí nade vším ostatním. O tom není pochyb." # todo: NEW TRANSLATION
  EFR_political_unity: "Politická jednota" # todo: NEW TRANSLATION
  EFR_political_unity_desc: "Dějiny Francie od pádu absolutismu jsou příběhem politických vnitřních sporů. Když byla jednota - Francie vítězila. Když byl vnitřní svár - Francie byla poražena. Proto nemůžeme dovolit, aby ambice několika poškodily živobytí mnoha." # todo: NEW TRANSLATION
  EFR_diplomatic_freedom: "Diplomatická svoboda" # todo: NEW TRANSLATION
  EFR_diplomatic_freedom_desc: "Republikánské vlády se přivázaly k umělým konstrukcím ve východní Evropě, které padnou v okamžiku, kdy stáhneme naši pomoc. Jsou to závazky, ne aktiva, a tak se jich zbavíme." # todo: NEW TRANSLATION
  EFR_latin_entente: "Latinská ententa" # todo: NEW TRANSLATION
  EFR_latin_entente_desc: "Bratrství, které existuje mezi nástupnickými státy Římské říše, je nepopiratelné. Germánské národy Evropy vládly kontinentu příliš dlouho. Je čas, abychom znovu získali naše národní rodné právo." # todo: NEW TRANSLATION
  EFR_reach_out_to_spain: "Obrátit se na Španělsko" # todo: NEW TRANSLATION
  EFR_reach_out_to_spain_desc: "Čerstvě vyčerpané z občanské války je Španělsko naším přirozeným spojencem v pokusu o přetvoření kontinentu." # todo: NEW TRANSLATION
  EFR_invite_portugal: "Pozvat Portugalsko" # todo: NEW TRANSLATION
  EFR_invite_portugal_desc: "I když její koloniální impérium bylo výrazně zmenšeno, plamen objevování a dobývání stále hoří v srdci každého Portugalce." # todo: NEW TRANSLATION
  EFR_compensate_italy: "Kompenzovat Itálii" # todo: NEW TRANSLATION
  EFR_compensate_italy_desc: "V minulosti konflikty o pár úseků pouště přivedly naše národy do konfliktu. Takový nesmysl lze snadno zastavit a rychle najít vzájemně přijatelné řešení." # todo: NEW TRANSLATION
  EFR_intervention_in_greece: "Intervence v Řecku" # todo: NEW TRANSLATION
  EFR_intervention_in_greece_desc: "Řecko ovládá některá z nejcennějších území ve Středomoří. Nemůžeme dovolit, aby je ovládala nepřátelská vláda, proto musíme zasáhnout jako první." # todo: NEW TRANSLATION
  EFR_the_congress_of_paris: "Pařížský kongres" # todo: NEW TRANSLATION
  EFR_the_congress_of_paris_desc: "Na Berlínském kongresu byly formovány hranice Afriky. Dnešní mapa vypadá jako skládačka. Je čas překreslit mapu a tak vytvořit základ pro nové koloniální impérium." # todo: NEW TRANSLATION
  EFR_the_natural_borders_of_france: "Přirozené hranice Francie" # todo: NEW TRANSLATION
  EFR_the_natural_borders_of_france_desc: "Je přirozené, že země hledí nejprve na své vlastní zájmy. Nemůžeme pokojně koexistovat s Němci v našem zápase, a tak musíme zajistit naše přirozené hranice, abychom ochránili naše srdce země." # todo: NEW TRANSLATION
  EFR_towards_a_new_europe: "Směřem k nové Evropě" # todo: NEW TRANSLATION
  EFR_towards_a_new_europe_desc: "Francie stojí na rozcestí. Můžeme se připoutat ke starému řádu, nebo přivítat nový. S Němci připravenými přetvořit kontinent by bylo prospěšné být na jejich dobré straně." # todo: NEW TRANSLATION
  EFR_establish_spheres_of_influence: "Zřídit sféry vlivu" # todo: NEW TRANSLATION
  EFR_establish_spheres_of_influence_desc: "Po staletí naši lidé žili v přesvědčení, že jsme smrtelní, dědiční nepřátelé. Toto přesvědčení bylo založeno na myšlence, že naše zájmy jsou neslučitelné. Ale jistě bychom se mohli dohodnout, kdybychom definovali naše sféry vlivu a důkladně se zdrželi zasahování." # todo: NEW TRANSLATION
  EFR_split_belgium: "Rozdělit Belgii" # todo: NEW TRANSLATION
  EFR_split_belgium_desc: "S Belgií nyní v naší sféře vlivu je čas přivolat frankofonní části domů. Zbytek bude vytvořen do nového státu." # todo: NEW TRANSLATION
  EFR_align_belgium: "Sblížit Belgii" # todo: NEW TRANSLATION
  EFR_align_belgium_desc: "Belgičané dluží svou existenci nám, a nemůžeme jim to nechat zapomenout. Pokud jim dovolíme zůstat nezávislými, alespoň zajistíme, že bude instalována přátelská vláda." # todo: NEW TRANSLATION
  EFR_grow_the_empire: "Rozšířit impérium" # todo: NEW TRANSLATION
  EFR_grow_the_empire_desc: "Je absurdní, že země velikosti Belgie by si měla ponechat kolonii mnohonásobně větší. My jsme mnohem lépe způsobilí takové území spravovat." # todo: NEW TRANSLATION
  EFR_bring_home_quebec: "Přivést Québec domů" # todo: NEW TRANSLATION
  EFR_bring_home_quebec_desc: "Provincie ztracená dávno se časem opět stane naší. Všichni frankofonní lidé na světě budou nakonec znovu sjednoceni s otčinou." # todo: NEW TRANSLATION
  EFR_expand_to_the_suez: "Rozšířit na Suezu" # todo: NEW TRANSLATION
  EFR_expand_to_the_suez_desc: "Dělení kontroly mezi námi a Británií na Levantě je neudržitelný kompromis, kterého se nyní naštěstí už nemusíme držet." # todo: NEW TRANSLATION
  EFR_dominate_the_middle_east: "Dominovat Blízkému východu" # todo: NEW TRANSLATION
  EFR_dominate_the_middle_east_desc: "Země Blízkého východu jsou umělé konstrukty, vytesané z mrtvého těla Osmanské říše. Nejsou suverénnější než průměrná francouzská vesnice a je čas jim to připomenout." # todo: NEW TRANSLATION
  EFR_the_council_of_rambouillet: "Rambouilletská rada" # todo: NEW TRANSLATION
  EFR_the_council_of_rambouillet_desc: "S zemí v zmatku hledají lidé silného vůdce. Je jasné, že republicanismus selhal francouzskému lidu a je čas, aby se vrátili přirození vládcové Francie. Než však dojde k obnovení monarchie, musí se položit základy." # todo: NEW TRANSLATION
  EFR_revise_the_constitution: "Přepracovat ústavu" # todo: NEW TRANSLATION
  EFR_revise_the_constitution_desc: "Republikánská ústava byla vždy zamýšlena jako dočasné řešení, které bylo ponecháno příliš dlouho. Nyní ji přepíšeme, aby umožňovala návrat monarchy." # todo: NEW TRANSLATION
  EFR_repeal_the_law_of_exile: "Zrušit zákon o vyhnanství" # todo: NEW TRANSLATION
  EFR_repeal_the_law_of_exile_desc: "Žádný hlava francouzské královské rodiny ani jejich dědic nesmějí vstoupit na francouzskou půdu bez výslovného povolení. Než může triumfální návrat monarchie nastat, musíme se tohoto otravného omezení zbavit." # todo: NEW TRANSLATION
  EFR_orleanist_restoration: "Orléánská restaurace" # todo: NEW TRANSLATION
  EFR_orleanist_restoration_desc: "Dům Orléans má mezi royalisty ve Francii značnou podporu. Zatímco někteří odpůrci by dali přednost jinému kandidátovi, není pochyb, že orleánský dědic má nejlepší šance mírumilovně sjednotit zemi." # todo: NEW TRANSLATION
  EFR_guarantee_the_constitution: "Zaručit ústavu" # todo: NEW TRANSLATION
  EFR_guarantee_the_constitution_desc: "Než může republikánský tisk spustit své nepodložené kampaně proti legitimnosti královské moci, musíme podlomit jejich postavení tím, že dáme železné záruky respektovat individuální práva lidu." # todo: NEW TRANSLATION
  EFR_the_first_citizen_of_the_state: "První občan státu" # todo: NEW TRANSLATION
  EFR_the_first_citizen_of_the_state_desc: "Král, ačkoli obdařen značnou mocí, musí být nikdy neviděn jako tyran nebo absolutistický vládce starého typu. Místo toho musí moderní monarcha respektovat zákon a být první linií obrany proti těm, kteří by si chtěli moc nelegálně přisvojit." # todo: NEW TRANSLATION
  EFR_counter_action_desc: "Action Française byla dlouho nejsilnějším hlasem pro návrat monarchie. Bohužel, jejich názory na jiné otázky jsou hůře stravitelné. Je čas jim sdělit, že splnili svůj účel, a zbavit se jich." # todo: NEW TRANSLATION
  EFR_no_further_humiliations: "Žádná další ponížení" # todo: NEW TRANSLATION
  EFR_no_further_humiliations_desc: "Po léta nechaly postupné republikánské vlády Němce bezohledně porušovat mezinárodní smlouvy, některé z nich byly troufale porušeny dřív, než inkoust zaschl. To končí nyní." # todo: NEW TRANSLATION
  EFR_slum_clearing: "Čištění chudinských čtvrtí" # todo: NEW TRANSLATION
  EFR_slum_clearing_desc: "Přes to, že jsme jedna z velmocí světa, obyčejný francouzský dělník často žije v odporných podmínkách. Žádný král hoden svého titulu nesnese své poddané žijící v takovém stavu." # todo: NEW TRANSLATION
  EFR_public_welfare: "Veřejná péče" # todo: NEW TRANSLATION
  EFR_public_welfare_desc: "Král, který nepracuje pro nejmenší ze svých poddaných, není králem vůbec." # todo: NEW TRANSLATION
  EFR_the_legitimate_heir: "Legitimní dědic" # todo: NEW TRANSLATION
  EFR_the_legitimate_heir_desc: "Legitimisté považují karlistickou linii za legitimní dědice trůnu Francie. Jmenování jejich kandidáta otevírá lákavou možnost vládnout Španělsku i Francii v duální monarchii." # todo: NEW TRANSLATION
  EFR_secure_the_crown_of_spain: "Zajistit španělskou korunu" # todo: NEW TRANSLATION
  EFR_secure_the_crown_of_spain_desc: "Prvním krokem k získání královských práv je zabezpečit Španělsko před různými pretendentními vládami, které vzešly. Jejich malicherné hádky jednou už hodily zemi do krveprolití - nesmíme jim dovolit to znovu." # todo: NEW TRANSLATION
  EFR_unite_the_crowns: "Sjednotit koruny" # todo: NEW TRANSLATION
  EFR_unite_the_crowns_desc: "Když bude Španělsko zajištěno, můžeme sjednotit koruny a vytvořit nové království, Království Franco-Španělska." # todo: NEW TRANSLATION
  EFR_two_countries_two_crowns: "Dvě země, dvě koruny" # todo: NEW TRANSLATION
  EFR_two_countries_two_crowns_desc: "Neexistuje proveditelný způsob, jak sjednotit země, aniž by se jedna považovala za subjekt druhé. Místo toho poradíme králi, aby vládl oběma osobní, nikoli právní, unií." # todo: NEW TRANSLATION
  EFR_proclaim_the_third_empire: "Vyhlásit Třetí říši" # todo: NEW TRANSLATION
  EFR_proclaim_the_third_empire_desc: "Bonapartisté mohou být považováni za outsidery v boji o trůn, ale nesou s sebou sen o době, kdy se celá Evropa skláněla před císařem Francouzů." # todo: NEW TRANSLATION
  EFR_avenge_waterloo: "Pomstít Waterloo" # todo: NEW TRANSLATION
  EFR_avenge_waterloo_desc: "Dějiny Napoleona I. budou navždy definovány jeho největší porážkou. Pokud chceme uspět, musíme ukázat, že dokážeme vyhrát tam, kde on prohrál." # todo: NEW TRANSLATION
  EFR_reorganize_the_dutch: "Přeskupit Nizozemsko" # todo: NEW TRANSLATION
  EFR_reorganize_the_dutch_desc: "Nizozemci také kdysi byli součástí Francouzského impéria. Nyní, když byli poraženi, je čas vrátit je do tohoto přirozeného stavu." # todo: NEW TRANSLATION
  EFR_retribution_for_sedan: "Odplata za Sedan" # todo: NEW TRANSLATION
  EFR_retribution_for_sedan_desc: "Po více než půl století Němci oslavovali bitvu u Sedanu a svůj triumf nad Napoleonem III. V budoucnu se každý Němec naučí to místo proklínat." # todo: NEW TRANSLATION
  EFR_disunite_germany: "Rozdělit Německo" # todo: NEW TRANSLATION
  EFR_disunite_germany_desc: "Triumf nad Francií umožnil Prusku sjednotit menší německé státy pod svým praporem. Nyní je správné tento proces zvrátit, když byli Němci poraženi." # todo: NEW TRANSLATION
  EFR_return_to_borodino: "Návrat k Borodinu" # todo: NEW TRANSLATION
  EFR_return_to_borodino_desc: "U Borodina se Napoleon nejvíc přiblížil dosažení svého vítězství v Evropě. Ruská armáda byla téměř zničena a kdyby byl byl o trochu rychlejší, mohl by donutit Rusy k ústupkům. Ukážeme světu, že to lze provést." # todo: NEW TRANSLATION
  EFR_je_suis_la_deluge: "Je Suis Le Déluge" # todo: NEW TRANSLATION
  EFR_je_suis_la_deluge_desc: "Francouzská revoluce byla příval, který smetl staré a slabé režimy, jež dlouho ovládaly Evropu. Nyní přichází nová povodeň." # todo: NEW TRANSLATION
  EFR_coordinate_rearmament_tt: "Snižuje cenu výrobních licencí pro členy naší frakce." # todo: NEW TRANSLATION
  EFR_metropolitan_france: "Investovat v metropolitní Francii" # todo: NEW TRANSLATION
  EFR_metropolitan_france_tt: "Nedostatek stavebních slotů pro §YInfrastructure§! v metropolitní Francii" # todo: NEW TRANSLATION
  EFR_metropolitan_france_desc: "La Métropole by měla být vždy na prvním místě. Můžeme začít zlepšením infrastruktury, abychom vytvořili pracovní místa a umožnili rychlejší přesuny jednotek." # todo: NEW TRANSLATION
  EFR_algerie_france: "Investovat v alžírské Francii" # todo: NEW TRANSLATION
  EFR_algerie_france_tt: "Nedostatek stavebních slotů pro §YInfrastructure§! v koloniální Francii" # todo: NEW TRANSLATION
  EFR_algerie_france_desc: "Evropa čelí nebezpečným časům. Měli bychom se soustředit na zlepšení našich jižních území a zajistit, že vždy můžeme podpořit pevninu." # todo: NEW TRANSLATION
  EFR_industrial_expansion: "Průmyslová expanze" # todo: NEW TRANSLATION
  EFR_industrial_expansion_desc: "Potřebujeme silnější průmyslovou základnu doma. Máme dost pracovních sil, ale chybí více výrobních linek." # todo: NEW TRANSLATION
  EFR_colonial_industry: "Koloniální průmysl" # todo: NEW TRANSLATION
  EFR_colonial_industry_tt: "Nedostatek stavebních slotů pro §YCivilian Factories§! v koloniální Francii" # todo: NEW TRANSLATION
  EFR_colonial_industry_desc: "Měli bychom se soustředit na průmysl v našich koloniích. Pokud by se napětí v Evropě zvýšilo, stále budeme mít průmyslovou kapacitu mimo dosah nepřátelských bombardérů." # todo: NEW TRANSLATION
  EFR_military_factories: "Vojenské továrny" # todo: NEW TRANSLATION
  EFR_military_factories_desc: "Náš válečný stroj zaostává v kapacitě. Musíme se zaměřit na produkci vojenského vybavení na domácí půdě, aby naše síly byly nepřetržitě zásobovány novým vybavením." # todo: NEW TRANSLATION
  EFR_colonial_military_factories: "Koloniální vojenské továrny" # todo: NEW TRANSLATION
  EFR_colonial_military_factories_tt: "Nedostatek stavebních slotů pro §YMilitary Factory§! v koloniální Francii" # todo: NEW TRANSLATION
  EFR_colonial_military_factories_desc: "Umístění naší vojenské výroby mimo Evropu zajistí, že i když nepřítel získá kontrolu nad naším vzdušným prostorem, udržíme stálý přísun vybavení na frontu." # todo: NEW TRANSLATION
  EFR_extra_research_slot: "Podpořit Grandes Écoles" # todo: NEW TRANSLATION
  EFR_extra_research_slot_desc: "Nadějné mladé mozky se objevují všude. Musíme jim zajistit zařízení pro výzkum. Pokrok v technologiích nám může dát náskok tam, kde ho nejvíc potřebujeme." # todo: NEW TRANSLATION
  EFR_nuclear_effort: "Nukleární úsilí" # todo: NEW TRANSLATION
  EFR_nuclear_effort_desc: "Počáteční testy v jaderné vědě ukázaly slibné výsledky. Ovládnutí její síly nám může dát zbraň jako žádná jiná v dějinách lidstva." # todo: NEW TRANSLATION
  EFR_jet_effort: "Proudové úsilí" # todo: NEW TRANSLATION
  EFR_jet_effort_desc: "Vzdušný boj je o mobilitě. Proudový motor je takový pokrok, že se nepřátelští piloti budou zdát stát na místě, zatímco je strháváme ze vzduchu." # todo: NEW TRANSLATION
  EFR_extra_research_slot_2: "Založit Národní výzkumné centrum" # todo: NEW TRANSLATION
  EFR_extra_research_slot_2_desc: "Nadějné mladé mozky se objevují všude. Musíme jim zajistit zařízení pro výzkum. Pokrok v technologiích nám může dát náskok tam, kde ho nejvíc potřebujeme." # todo: NEW TRANSLATION
  EFR_defensive_focus: "Defenzivní zaměření" # todo: NEW TRANSLATION
  EFR_defensive_focus_desc: "V těchto časech je nejlepší posílit naše obrany. Pokud jsou hrozby, ať přijdou k nám, abychom se s nimi mohli vypořádat na vlastní půdě. Máme ideálního kandidáta vést naši armádu, vše, co potřebujeme, je váš souhlas." # todo: NEW TRANSLATION
  EFR_aggressive_focus: "Agresivní zaměření" # todo: NEW TRANSLATION
  EFR_aggressive_focus_desc: "Nemůžeme nečinně přihlížet, jak nepřátelé obsazují naše hranice. A nemůžeme opustit spojence v případě války. Připravme naši armádu! Gamelin je ten správný muž pro práci." # todo: NEW TRANSLATION
  EFR_fortification_focus: "Zaměření na opevnění" # todo: NEW TRANSLATION
  EFR_fortification_focus_desc: "Ačkoli naše pevnosti byly zásadní, musíme najít způsoby, jak je stavět efektivněji. Maginotova linie byla silným odstrašujícím prvkem proti nepřátelským silám; mohli bychom využít bezpečí více takových obranných prvků." # todo: NEW TRANSLATION
  EFR_alpine_forts: "Alpská opevnění" # todo: NEW TRANSLATION
  EFR_alpine_forts_desc: "Italové neprojdou hranicí tak snadno, jakmile dokončíme pokrytí Alp naším nově plánovaným obranným pásem. Budeme mít čas reagovat a posílit naše pozice." # todo: NEW TRANSLATION
  EFR_extend_the_maginot_line: "Prodloužit Maginotovu linii" # todo: NEW TRANSLATION
  EFR_extend_the_maginot_line_desc: "Nemůžeme spoléhat na to, že Belgie udrží své pozice; pokud propustí nepřátelské armády, můžeme mít problémy. Prodloužení Maginotovy linie je klíčové k udržení nežádoucích armád mimo Francii!" # todo: NEW TRANSLATION
  EFR_infantry_focus: "Levée en masse" # todo: NEW TRANSLATION
  EFR_infantry_focus_desc: "Všichni muži i ženy, kteří mohou bojovat, to udělají. Hromadná výroba zbraní sníží jejich cenu. Dáme pušku do ruky každému." # todo: NEW TRANSLATION
  EFR_artillery_focus: "Grande Batterie" # todo: NEW TRANSLATION
  EFR_artillery_focus_desc: "Naše dělostřelectvo vytvoří jeden silný celek k soustředění palby na konkrétní body. Jedna salva po druhé oslabí nepřátelskou linii a prorazíme, pokud bude třeba!" # todo: NEW TRANSLATION
  EFR_heavy_armor_focus: "Char de Bataille" # todo: NEW TRANSLATION
  EFR_heavy_armor_focus_desc: "Bojové tanky jsou cestou vpřed pro francouzskou armádu. Chceme ovládat bojiště a k tomu budeme potřebovat nové silné tanky!" # todo: NEW TRANSLATION
  EFR_motorized_focus: "Zaměření na motorizaci" # todo: NEW TRANSLATION
  EFR_motorized_focus_desc: "Nalezení lepších způsobů výstavby našich vozidel pro pěchotu zlepší naši schopnost podporovat a posilovat frontové linie." # todo: NEW TRANSLATION
  EFR_mechanized_focus: "Mechanizované zaměření" # todo: NEW TRANSLATION
  EFR_mechanized_focus_desc: "Opláštěná vozidla hrají čím dál důležitější roli ve válce. I když jsou mírně méně děsivá než průměrný tank, dávají nám výhodu v komunikaci, velení, transportu a městských bojích." # todo: NEW TRANSLATION
  EFR_light_medium_armor: "Automitrailleuses" # todo: NEW TRANSLATION
  EFR_light_medium_armor_desc: "Zákonem velí pěchota nad všemi tankovými silami. Lehčí, rychlejší 'vozidla' jízdy nebo automitrailleuses jsou lépe přizpůsobeny cestování a stále mohou způsobit určitou škodu svými namontovanými zbraněmi." # todo: NEW TRANSLATION
  EFR_army_reform: "Reforma armády" # todo: NEW TRANSLATION
  EFR_army_reform_desc: "Žádná pěší jednotka ani samostatný vyspělý tank nás válku nevyhraje. Musíme investovat úsilí do rozvoje taktických i strategických schopností. S těmi správnými lidmi se můžeme jako armáda vyvinout." # todo: NEW TRANSLATION
  EFR_navy_focus: "Zaměření na námořnictvo" # todo: NEW TRANSLATION
  EFR_navy_focus_tt: "Nedostatek stavebních slotů pro §YNaval Base§!" # todo: NEW TRANSLATION
  EFR_navy_focus_desc: "Pokud plánujeme rozšířit naše námořnictvo, prvním krokem je zlepšení a rozšíření námořních základen. Naše jedinečné lodě vyžadují neustálou péči, aby byly bojově připravené." # todo: NEW TRANSLATION
  EFR_improved_screen_ships: "Vylepšené eskortní lodě" # todo: NEW TRANSLATION
  EFR_improved_screen_ships_desc: "Torpédoborce a lehčí křižníky hrají klíčovou roli v obraně našich těžších bitevních lodí nebo letadlových lodí. Pokud ztratíme obrannou linii na moři, riskujeme všechny lodě a muže. Musíme se ujistit, že naše lodě budou postaveny s nejnovější technologií." # todo: NEW TRANSLATION
  EFR_capital_ship_focus: "Zaměření na kapitální lodě" # todo: NEW TRANSLATION
  EFR_capital_ship_focus_desc: "Zlepšení konstrukce našich bitevních lodí by přineslo velké taktické výhody. S jejich dosahem a neomezenou silou nikdo neutekne před jejich děly." # todo: NEW TRANSLATION
  EFR_carrier_focus: "Zaměření na letadlové lodě" # todo: NEW TRANSLATION
  EFR_carrier_focus_desc: "Námořní teoretikové nás upozornili na naše zastaralé letadlové lodě. Mají návrhy, jak by letadlové lodě mohly být dále využity, pokud bude podpořen jejich vývoj. Skutečný pokrok nelze učinit bez naší plné podpory." # todo: NEW TRANSLATION
  EFR_initiate_government_reform: "Vládní reforma" # todo: NEW TRANSLATION
  EFR_initiate_government_reform_desc: "Svět se stal nebezpečnějším. Už nemůžeme být svázáni vlastními malichernými hádkami. Je čas zmocnit naše politiky a pokročit pro dobro Francie." # todo: NEW TRANSLATION
  EFR_support_the_left: "Podpořit levici" # todo: NEW TRANSLATION
  EFR_support_the_left_desc: "Komintern sílí. Je čas ukázat, že naše zájmy se mohou shodovat, a podpořit naše komunistické organizace." # todo: NEW TRANSLATION
  EFR_leftist_rhetoric: "Levicová rétorika" # todo: NEW TRANSLATION
  EFR_leftist_rhetoric_desc: "Cíl je jasný. Rovnost pro všechny. Nechceme kapitalistické zájmy ve francouzské politice. Je nezbytné dát optimální podmínky pro rozkvět našich komunistických organizací." # todo: NEW TRANSLATION
  EFR_scw_intervention_republicans: "Republikánská intervence" # todo: NEW TRANSLATION
  EFR_scw_intervention_republicans_desc: "Republikánskému Španělsku naše pomoc chybí!\nKdokoli ochotný bojovat za věc by měl mít povoleno. Nemůžeme dovolit, aby další fašistický režim získal na síle." # todo: NEW TRANSLATION
  EFR_national_mobilization: "Národní mobilizace" # todo: NEW TRANSLATION
  EFR_national_mobilization_desc: "Máme konečně vládu schopnou jednat. Nyní je čas posílit naši armádu a být připraveni bojovat za Francii." # todo: NEW TRANSLATION
  EFR_humanite_unie: "Humanité Unie" # todo: NEW TRANSLATION
  EFR_humanite_unie_desc: "Tuční bankéři a mocichtivé demagogové si utužují své krvavé spáry na světě. S každým dnem vidíme, jak jsou svobodní lidé zotročováni a svět vržen do větší krize, vytvořené chamtivostí jednotlivců. Francouzské ideály jsou potřeba více než kdy dříve! Lidstvo nás potřebuje a my musíme sjednotit lidstvo!" # todo: NEW TRANSLATION
  EFR_join_comintern: "Připojit se ke Kominterně" # todo: NEW TRANSLATION
  EFR_join_comintern_desc: "S nepřáteli všude kolem nás musíme posílit svou pozici silnými spojenci. Naše vazby s Kominternou zesílily a je čas se jim plně věnovat." # todo: NEW TRANSLATION
  EFR_support_status_quo: "Podporovat status quo" # todo: NEW TRANSLATION
  EFR_support_status_quo_desc: "Francie je kolébkou a ochránkyní svobody a měla by jím zůstat. Pokud někdy chceme znovu dosáhnout jednoty, musíme stabilizovat naši demokracii dříve, než upadne." # todo: NEW TRANSLATION
  EFR_little_entente: "Malá dohoda" # todo: NEW TRANSLATION
  EFR_little_entente_desc: "Malá dohoda, spojenectví vytvořené po Velké válce, aby zabránila agresi Rakouska a Maďarska vůči jejich sousedům, byla podporována Francií, ale nyní se začíná rozpadat. Místo zajišťování vazeb s Británií bychom měli převzít iniciativu k obnově a konsolidaci této skupiny, začínaje jejími zakladateli v Československu." # todo: NEW TRANSLATION
  EFR_go_with_britain: "Spojit se s Británií" # todo: NEW TRANSLATION
  EFR_go_with_britain_desc: "S Ruskem navždy změněným zbývají z původní Trojdohody pouze Francie a Británie. Pokud se dějiny chystají se opakovat, musíme zajistit, aby tyto dvě země, bastiony demokracie a svobody v Evropě, zůstaly spojenci." # todo: NEW TRANSLATION
  EFR_strengthen_government_support: "Posílit vládu" # todo: NEW TRANSLATION
  EFR_strengthen_government_support_desc: "Máme plány na následující rok, které uspokojí přání lidí ve všech částech Francie. Ukažme jim, že jsme schopni jednat a hodni vládnutí, abychom se opět sjednotili." # todo: NEW TRANSLATION
  EFR_defensive_strategems: "Obranné strategie" # todo: NEW TRANSLATION
  EFR_defensive_strategems_desc: "Pokud chceme, aby lidé Francie bojovali za nás ve válce, je důležitější než kdy dříve, abychom měli jasný směr. Musíme přestat bojovat mezi sebou a bojovat za Francii a 'Liberté, égalité, fraternité'." # todo: NEW TRANSLATION
  EFR_invite_yugoslavia: "Pozvat Jugoslávii" # todo: NEW TRANSLATION
  EFR_invite_yugoslavia_desc: "Jugoslávie má dost starostí bez obav z expanzivních sousedů. Znovuzískání Jugoslávie do Malé dohody by bylo velkou službou jim i nám." # todo: NEW TRANSLATION
  EFR_invite_romania: "Pozvat Rumunsko" # todo: NEW TRANSLATION
  EFR_invite_romania_desc: "Rumunská demokracie je křehká, mezi vnitřními fašistickými frakcemi a sovětským komunismem. Přijetí Rumunska do Malé dohody jim umožní udržet stabilitu s naší podporou." # todo: NEW TRANSLATION
  EFR_polish_guarantee: "Záruka pro Polsko" # todo: NEW TRANSLATION
  EFR_polish_guarantee_desc: "Polští diplomaté vyjádřili obavy o napětí na svých hranicích. Záruka od naší mocné země by měla odradit každého, kdo plánuje invazi." # todo: NEW TRANSLATION
  EFR_czech_guarantee: "Záruka pro Čechy" # todo: NEW TRANSLATION
  EFR_czech_guarantee_desc: "Napětí na českých hranicích roste. Nemůžeme dovolit expanzivním státům převzít svobodný a demokratický národ. Češi musí zůstat svobodným národem. S naší zárukou si každý plánující invazi dvakrát rozmyslí." # todo: NEW TRANSLATION
  EFR_revise_versailles: "Přehodnotit Versailles" # todo: NEW TRANSLATION
  EFR_revise_versailles_desc: "Němci už ignorují reparace stanovené versailleskou smlouvou, což ukazuje, že Francie už nevzbuzuje respekt. Máme právo požadovat více za oběti Velké války, ale spravedlivá smlouva bude vyžadovat silnou Francii, novou Francii, aby ji vynutila." # todo: NEW TRANSLATION
  EFR_support_the_right: "Podpořit pravici" # todo: NEW TRANSLATION
  EFR_support_the_right_desc: "Francie byla vždy silným a hrdým národem, ale nedostatek vládních kroků rozdělil lidi. Musíme sjednotit Francii a prosadit naši nadřazenost a sílu, abychom se vyhnuli úpadku." # todo: NEW TRANSLATION
  EFR_right_wing_rhetoric: "Pravicová rétorika" # todo: NEW TRANSLATION
  EFR_right_wing_rhetoric_desc: "Musíme se zaměřit na oslovení každého Francouze a pozvednout jejich národní ducha. Ukažme jim, že můžeme být mocní vůdci, které potřebují, a oni se stanou pyšnými občany naší slávy." # todo: NEW TRANSLATION
  EFR_scw_intervention_nationalists: "Nacionalistická intervence" # todo: NEW TRANSLATION
  EFR_scw_intervention_nationalists_desc: "Nacionalisté konečně získávají půdu ve Španělsku. Jejich věc je spravedlivá a každý, kdo je ochoten pro ně bojovat, by měl být podpořen." # todo: NEW TRANSLATION
  EFR_army_of_aggression: "Armáda agrese" # todo: NEW TRANSLATION
  EFR_army_of_aggression_desc: "Nemůžeme dál sedět za zastaralou zdí, zatímco naši nepřátelé běhají Evropou. Je čas posílit armádu a posunout naše hranice, aby Francie zůstala velkým národem." # todo: NEW TRANSLATION
  EFR_france_first: "Francie především" # todo: NEW TRANSLATION
  EFR_france_first_desc: "Jsme Francie! Vítězové Velké války! Spasitelé Evropy! Jsme domov největších myslitelů, jaké svět kdy viděl. Příliš mnoho národů se snaží vrhnout svět do chaosu. Jsme potřeba a vezmeme otěže, odoláme bouři a navedeme lidstvo k bezpečí pod naší vládou!" # todo: NEW TRANSLATION
  EFR_woo_italy: "Získat Itálii" # todo: NEW TRANSLATION
  EFR_woo_italy_desc: "Itálie má potenciál stát se mocnou zemí. Díky silnému vedení Mussoliniho jsou lidé sjednoceni a připraveni bojovat za správnou věc. Ať je tou věcí naše." # todo: NEW TRANSLATION
  EFR_dismantle_the_democracies: "Rozložit demokracie" # todo: NEW TRANSLATION
  EFR_dismantle_the_democracies_desc: "Nové [GER.GetAdjective] demokratické spojenectví ve střední Evropě ohrožuje naši nově nabytou pozici. Musíme jednat nyní, než zesílí." # todo: NEW TRANSLATION
  EFR_join_germany: "Připojit se k Německu" # todo: NEW TRANSLATION
  EFR_join_germany_desc: "Německá říše se stává silou, se kterou je třeba počítat. Jejich vize lepší budoucnosti může být v souladu s našimi zájmy. Měli bychom je podpořit a jakmile se prach usadí, Francie získá svou zaslouženou část Evropy." # todo: NEW TRANSLATION
  EFR_naval_doctrine: "Námořní doktrína" # todo: NEW TRANSLATION
  EFR_naval_doctrine_desc: "Nedávný pokrok v konstrukci lodí otevřel nové taktické a strategické možnosti. Než začneme riskovat s těmito teoriemi, musíme je řádně otestovat a plán zpečnit." # todo: NEW TRANSLATION
  EFR_air_focus: "Zaměření na letectvo" # todo: NEW TRANSLATION
  EFR_air_focus_desc: "Nastal čas rozšířit naše letectvo! Již byly připraveny plány na výstavbu nových leteckých základen pro podporu velkého nárůstu personálu a letadel." # todo: NEW TRANSLATION
  EFR_cas_focus: "Zaměření na CAS" # todo: NEW TRANSLATION
  EFR_cas_focus_desc: "Letadla, která poskytují podporu našim pozemním silám a lodím, se ukázala jako velmi efektivní investice s relativně malými náklady. Tato letadla mají nyní několik navrhovaných vylepšení. Naši inženýři mohou vyvinout další generaci podpůrných letadel." # todo: NEW TRANSLATION
  EFR_fighter_focus: "Zaměření na stíhače" # todo: NEW TRANSLATION
  EFR_fighter_focus_desc: "Některé revoluční civilní inženýrské poznatky lze aplikovat na naše stíhače pro zlepšení jejich rychlosti, dosa hu a maximální výšky. Musíme se na to soustředit, pokud chceme držet krok s pokrokem jiných." # todo: NEW TRANSLATION
  EFR_bomber_focus: "Zaměření na bombardéry" # todo: NEW TRANSLATION
  EFR_bomber_focus_desc: "Letectvo je důležitou součástí našich obranných i útočných schopností. Pokud se zaměříme na vývoj rychlých, obratných a přesných bombardérů, udržíme si převahu v pozemních bitvách." # todo: NEW TRANSLATION
  EFR_heavy_fighter_focus: "Zaměření na těžké stíhače" # todo: NEW TRANSLATION
  EFR_heavy_fighter_focus_desc: "Naše těžké stíhače musí být schopné podporovat křehčí bombardéry. To vyžaduje těžší výzbroj a delší dosah za cenu určité rychlosti." # todo: NEW TRANSLATION
  EFR_air_doctrine: "Letecká doktrína" # todo: NEW TRANSLATION
  EFR_air_doctrine_desc: "Získali jsme dostatek zkušeností, abychom rychleji testovali nové teorie v leteckém boji. To nám umožní prozkoumat nové taktické a strategické možnosti. Letecký boj je klíč v moderní válce." # todo: NEW TRANSLATION
  EFR_heavy_bomber_focus: "Zaměření na těžké bombardéry" # todo: NEW TRANSLATION
  EFR_heavy_bomber_focus_desc: "Moderní těžké bombardéry budou vyzbrojeny tak, aby dokázaly zvládat menší letecké střety samy. Pokud dovolíme našim inženýrům soustředit se na nejnovější technologie, budeme mít lepší šanci zničit nepřátelské výrobní kapacity." # todo: NEW TRANSLATION
  EFR_naval_bomber_focus: "Zaměření na námořní bombardéry" # todo: NEW TRANSLATION
  EFR_naval_bomber_focus_desc: "Lodě se ukázaly být obzvlášť zranitelné vůči letadlům. Měli bychom pokračovat ve zlepšování jejich technologie, abychom zůstali před případnými protiopatřeními." # todo: NEW TRANSLATION
  ETH_research_slot: "Výzkumný slot" # todo: NEW TRANSLATION
  ETH_research_slot_desc: "Výzkum je klíčem k vítězství v každé válce!" # todo: NEW TRANSLATION
  ETH_imperial_road: "Vybudovat imperiální silnice" # todo: NEW TRANSLATION
  ETH_imperial_road_desc: "Musíme propojit naši metropoli s našimi přístavy!" # todo: NEW TRANSLATION
  ETH_equipment_effortb: "Vývoj dělostřelectva po Velké válce" # todo: NEW TRANSLATION
  ETH_equipment_effortb_desc: "Musíme studovat nedávné pokroky v dělostřelecké technice." # todo: NEW TRANSLATION
  ETH_equipment_effort_2b: "Dělostřelecké úsilí" # todo: NEW TRANSLATION
  ETH_equipment_effort_2b_desc: "Musíme modernizovat naše pěší divize kvalitními dělostřeleckými brigádami." # todo: NEW TRANSLATION
  ETH_equipment_effort_3b: "Dělostřelecké úsilí II" # todo: NEW TRANSLATION
  ETH_equipment_effort_3b_desc: "Musíme modernizovat naše pěší divize kvalitními dělostřeleckými brigádami." # todo: NEW TRANSLATION
  ETH_red_sea: "Strážce Rudého moře" # todo: NEW TRANSLATION
  ETH_red_sea_desc: "Musíme vybudovat silné námořnictvo, abychom získali nadmořskou převahu v Rudém moři nad našimi nepřáteli." # todo: NEW TRANSLATION
  ETH_air_innovation: "Linea dell'Impero" # todo: NEW TRANSLATION
  ETH_air_innovation_desc: "Moderní války nelze vyhrát bez ovládnutí oblohy. Musíme udělat všechno pro rozvoj letectva!" # todo: NEW TRANSLATION
  ETH_force_labor: "Domorodí dělníci" # todo: NEW TRANSLATION
  ETH_force_labor_desc: "Abychom posílili průmysl, měli bychom najmout domorodé obyvatelstvo do továren vyrábějících zbraně." # todo: NEW TRANSLATION
  ETH_force_labor2: "Rozšířit koloniální průmysl" # todo: NEW TRANSLATION
  ETH_force_labor2_desc: "Rozšíříme programy zahrnující domorodé pracovníky." # todo: NEW TRANSLATION
  ETH_puntland: "Přihlásit britské a francouzské Somalilandy" # todo: NEW TRANSLATION
  ETH_puntland_desc: "" # todo: NEW TRANSLATION
  ETH_sudan_north: "Požadovat Chartúm" # todo: NEW TRANSLATION
  ETH_sudan_north_desc: "" # todo: NEW TRANSLATION
  ETH_sudan_south: "Požadovat Súdán" # todo: NEW TRANSLATION
  ETH_sudan_south_desc: "" # todo: NEW TRANSLATION
  ETH_kenya: "Požadovat Britskou Východní Afriku" # todo: NEW TRANSLATION
  ETH_kenya_desc: "" # todo: NEW TRANSLATION
  ETH_uganda: "Požadovat Ugandu" # todo: NEW TRANSLATION
  ETH_uganda_desc: "" # todo: NEW TRANSLATION
