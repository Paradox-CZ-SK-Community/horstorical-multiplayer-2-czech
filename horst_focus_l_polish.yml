  ilp_concessions: "Sociální ústupky"
  ilp_concessions_desc: "Indická levice je rozdělena a sleduje různé cíle. \nNáš důraz na kastovní systém nám dává dost příležitostí k spolupráci a kompromisu s různými dalšími skupinami, které mohou mít konfliktní požadavky. Pokud však vyvážíme naše společné zájmy, výrazně to pomůže naší volební strategii."
  invade_pak_or_placate_muslims: "Pokud je §YPákistán§! nezávislý stát, získáme proti němu §Yválečný cíl§!. Pokud ne, uklidníme §Ymuslimy§! v jejich jádrových státech."
