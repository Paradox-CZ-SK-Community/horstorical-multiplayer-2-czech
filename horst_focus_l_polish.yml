  NOR_navy_4: "Rychlá torpéda" # todo: NEW TRANSLATION
  NOR_navy_4_desc: "Za cenu delší doby přebíjení a výbušného náboje můžeme naše torpéda přetížit pohonnou látkou, což jim umožní dosahovat vysokých rychlostí a udržet je na dlouhé vzdálenosti, což snáze obchází obranné obrazovky." # todo: NEW TRANSLATION
  NOR_upgrade_from_the_norge_class_desc: "Potřebujeme nové kapitální lodě. Pobřežní obranné lodě budou našim potřebám vyhovovat." # todo: NEW TRANSLATION
  NOR_naval_drills: "Námořní cvičení" # todo: NEW TRANSLATION
