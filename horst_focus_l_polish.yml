  SOV_docking_desc: "S Rudým námořnictvem rozmístěným v Leningradu nemůžeme poskytnout lodě na ochranu obchodu a zásob v Arktidě. Musíme umožnit britskému Královskému námořnictvu základnu v Murmansku, aby to usnadnilo." # todo: NEW TRANSLATION
