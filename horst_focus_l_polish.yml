  SIA_generic_electronics_concern: "International Engineering Public Company Limited" # todo: NEW TRANSLATION
  SIA_generic_light_aircraft_manufacturer: "Letecké dílny letectva" # todo: NEW TRANSLATION
  SIA_generic_motorized_equipment_manufacturer: "Chaiseri" # todo: NEW TRANSLATION
  SIA_fascism_party: "Khana Ratsadon (M‑R)" # todo: NEW TRANSLATION
  SIA_fascism_party_long: "Khana Ratsadon (vojenské radikály)" # todo: NEW TRANSLATION
  SIA_neutrality_party: "Khana Ratsadon (M)" # todo: NEW TRANSLATION
  SIA_neutrality_party_long: "Khana Ratsadon (vojenské)" # todo: NEW TRANSLATION
  SIA_democratic_party: "Khana Ratsadon (C)" # todo: NEW TRANSLATION
  SIA_democratic_party_long: "Khana Ratsadon (civilní)" # todo: NEW TRANSLATION
  SIA_communism_party: "KPC" # todo: NEW TRANSLATION
  SIA_communism_party_long: "Komunistická strana Siamu" # todo: NEW TRANSLATION
  SIA_peaceful_pan_thaiism_category: "Pokojné pan‑thajství" # todo: NEW TRANSLATION
  SIA_peaceful_pan_thaiism_category_desc: "Různí thajské národy, rozptýlené mezi státy Siam, Laos a Kambodža, byly odděleny po koloniálních válkách. Nyní, když každý ze tří států znovu získal určitý druh nezávislosti, musí být vynaloženo velké úsilí přesvědčit populaci, že sjednocení našich tří národů je nezbytné pro dobro našeho lidu.\n\nPopularita pan‑thajství v Laosu: §Y[?SIA.laos_pan_thai_popularity]%§!\n\nPopularita pan‑thajství v Kambodži: §Y[?SIA.cambodia_pan_thai_popularity]%§!" # todo: NEW TRANSLATION
  SIA_hold_a_pan_thai_exposition: "Uspořádat pan‑thajskou výstavu §G+7% pro všechny" # todo: NEW TRANSLATION
  SIA_glorify_thai_culture: "Oslavit thajskou kulturu §G+5% pro všechny" # todo: NEW TRANSLATION
  SIA_support_pan_thaiists_in_laos: "Podpořit pan‑thajisty v Laosu §G+5%§! v Laosu" # todo: NEW TRANSLATION
  SIA_support_pan_thaiists_in_cambodia: "Podpořit pan‑thajisty v Kambodži §G+5%§! v Kambodži" # todo: NEW TRANSLATION
  SIA_treaty_of_vientiane: "Smlouva z Vientiane" # todo: NEW TRANSLATION
  hundred_percent_in_all_thai_nations: "§R100% popularity pro pan‑thajství v Laosu a Kambodži§!" # todo: NEW TRANSLATION
  SIA_tooltip_treaty_of_vientiane: "§YAnexujete všechny tři thajské národy a získáte nároky na jejich území§!" # todo: NEW TRANSLATION
  SIA_cruisers: "Modernizace křižníků" # todo: NEW TRANSLATION
  SIA_battleship: "Fokus bitevních lodí" # todo: NEW TRANSLATION
  SIA_naval_guns: "Větší děla" # todo: NEW TRANSLATION
  SIA_convoy_tactics: "Eskortní flotila" # todo: NEW TRANSLATION
  SIA_thai_empire_lands: "Získáme Francouzskou Indočínu výměnou za pomoc našemu japonskému senpai, a získáme více nároků! (Singapur a Francouzská Indočína)" # todo: NEW TRANSLATION
  SIA_disturbing_indochina_decision: "Rozruch v Indočíně" # todo: NEW TRANSLATION
  SIA_disturbing_indochina_decision_desc: "Naši indochinští souputníci stále trpí pod jhem francouzských kolonialistů. Potřebují naši pomoc a my jim jsme k dispozici! Jakmile budou dostatečně připraveni, můžeme zahájit konečné povstání, které osvobodí Indočínu od imperialistické nadvlády!\n\nAgitace ve Vietnamu: §Y[?SIA.vietnam_agitation]%§!\n\nAgitace v Laosu: §Y[?SIA.laos_agitation]%§!\n\nAgitace v Kambodži: §Y[?SIA.cambodia_agitation]%§!" # todo: NEW TRANSLATION
  SIA_smuggle_weapons_in_vietnam: "Propašovat zbraně do Vietnamu:\n§R+10% agitace ve Vietnamu§!" # todo: NEW TRANSLATION
  SIA_smuggle_weapons_in_laos: "Propašovat zbraně do Laosu:\n§R+10% agitace v Laosu§!" # todo: NEW TRANSLATION
  SIA_smuggle_weapons_in_cambodia: "Propašovat zbraně do Kambodže:\n§R+10% agitace v Kambodži§!" # todo: NEW TRANSLATION
  SIA_launch_the_insurrection: "Zahájit insurrekci!" # todo: NEW TRANSLATION
  SIA_sabotage_campaign: "Sabotážní kampaň:\n§R+8% agitace všude§!" # todo: NEW TRANSLATION
  SIA_ask_for_soviet_help: "Požádat o sovětskou pomoc:\n§RZávisí na jejich odpovědi§!" # todo: NEW TRANSLATION
  SIA_invade_indochina: "Vtrhnout do Indočíny:\n§RHrozí válka s Francií!§!" # todo: NEW TRANSLATION
  SIA_join_the_allies: "Připojit se ke Spojencům" # todo: NEW TRANSLATION
  SIA_join_the_allies_desc: "Británie je jedna z dominantních mocností světa a během minulosti jsme vedli mnoho válek o hlavně barmská území. Ale s novými hrozbami, jako je Japonské impérium, by bylo v našem zájmu vyhledat vojenské spojenectví s nimi, alespoň dokud nová nebezpečí, jako fašismus, nebudou překonána." # todo: NEW TRANSLATION
  SIA_woo_australia: "Zaujmout Austrálii" # todo: NEW TRANSLATION
  SIA_woo_australia_desc: "Austrálie, která nedávno získala nezávislost na Spojeném království, založila vlastní vojenské spojenectví zaměřené na Tichý oceán k zadržení japonské hrozby. Podepsání dohod o alianci s nimi by nás mohlo ochránit." # todo: NEW TRANSLATION
  SIA_treaty_with_japan: "Smlouva s Japonskem" # todo: NEW TRANSLATION
  SIA_treaty_with_japan_desc: "V Japonsku nastala nová vláda, demokratická a proti expanzionismu. Protože již nepředstavují hrozbu, měli bychom s nimi podepsat alianci k vzájemné ochraně před novými hrozbami." # todo: NEW TRANSLATION
  SIA_alliance_with_china: "Aliance s Čínou" # todo: NEW TRANSLATION
  SIA_alliance_with_china_desc: "Čínská vláda, která nedávno porazila Japonské impérium, vytvořila vlastní alianci zaměřenou na Asii. Bylo by v našem zájmu spojit se s touto rostoucí mocností." # todo: NEW TRANSLATION
  SIA_ally_with_the_united_states: "Spřátelit se se Spojenými státy" # todo: NEW TRANSLATION
  SIA_ally_with_the_united_states_desc: "Spojené státy jsou hlavním obráncem ideálů svobody a demokracie a rozhodly se vytvořit vlastní politickou alianci. Jsou nejlépe postaveny k odražení japonského imperialismu, takže by bylo moudré vyjednat vstup do jejich aliance." # todo: NEW TRANSLATION
  SIA_help_france: "Pomoci Francii" # todo: NEW TRANSLATION
  SIA_help_france_desc: "Je pravda, že Francie byla jedním z hlavních rozdělovatelů našich území během koloniální nadvlády v Indočíně. Ale dnes jsou na obzoru vážnější nebezpečí. Rozdíly v území vyřešíme později; teď je čas bránit naše národy." # todo: NEW TRANSLATION
  SIA_join_the_axis: "Připojit se k Ose" # todo: NEW TRANSLATION
  SIA_join_the_axis_desc: "Německo se znovu vyzbrojilo a zdá se být připraveno bojovat bývalé ententní mocnosti. Naše cíle jsou společné, proto by bylo v našem zájmu spojit se s nimi." # todo: NEW TRANSLATION
  SIA_treaty_with_italy: "Smlouva s Itálií" # todo: NEW TRANSLATION
  SIA_treaty_with_italy_desc: "Itálie, kolébka fašismu, je vzorem, podle nějž budujeme nový národ. Itálie založila vlastní vojenskou alianci; bylo by zajímavé usilovat o integraci s ní." # todo: NEW TRANSLATION
  SIA_alliance_with_japan: "Aliance s Japonskem" # todo: NEW TRANSLATION
  SIA_alliance_with_japan_desc: "Japonsko je hlavní mocností v Asii a zdá se odhodláno postavit se západním imperialistům. Naše cíle jsou stejné — měli bychom spojit síly." # todo: NEW TRANSLATION
  SIA_alliance_with_japan_monarchist: "Požadovat japonskou ochranu" # todo: NEW TRANSLATION
  SIA_alliance_with_japan_monarchist_desc: "Japonské impérium pokračuje v rozšiřování vlivu po Asii a zdá se odhodláno napadnout náš stát. Pokud nechceme skončit pod ich jhem, bude lepší podepsat alianci s Japonskem." # todo: NEW TRANSLATION
  SIA_alliance_with_britain_monarchist: "Aliance se Spojeným královstvím" # todo: NEW TRANSLATION
  SIA_alliance_with_britain_monarchist_desc: "Je jasné, že Japonské impérium usiluje o dominanci v Asii a jednou může zaútočit na náš národ. Jediný způsob, jak tomu uniknout, je spojit se se Spojeným královstvím a doufat, že jej porazíme." # todo: NEW TRANSLATION
  SIA_join_the_communist_faction: "Připojit se k [FROM.getFactionName]" # todo: NEW TRANSLATION
  SIA_join_the_communist_faction_desc: "[FROM.getNameDefCap] je považován za jednu z hlavních komunistických mocností ve světě. Pokud chceme, aby revoluce převládla, musíme stát jednotně." # todo: NEW TRANSLATION
  SIA_reintegrate_cambodia: "Reintegrovat Kambodžu" # todo: NEW TRANSLATION
  SIA_reintegrate_cambodia_desc: "Po staletí byla kambodžská oblast pod naší kontrolou a naši dva lidé sdílejí mnoho kořenů. Nyní, když máme tuto oblast zpět, je čas reorganizovat její správu, aby se stala provincií našeho státu." # todo: NEW TRANSLATION
  SIA_reintegrate_laos: "Reintegrovat Laos" # todo: NEW TRANSLATION
  SIA_reintegrate_laos_desc: "Laos je nyní zpět pod naší kontrolou. Lao lidé sdílejí stejný thajský původ jako náš lid a je čas je plně integrovat do našeho národa." # todo: NEW TRANSLATION
  siam.1.t: "Nonthaburská promluva" # todo: NEW TRANSLATION
  siam.1.d: "Pridi Banomyong, člen civilní křídla Khana Ratsadon známý svými radikálními myšlenkami, někdy blízko marxisu, o pozemkových reformách, dnes pronesl projev ve městě Nonthaburi.\n\"Drazí obyvatelé Siamu, naše slavná revoluce, která nás přenesla z dekadentního a zastaralého politického systému k systému, kde lid konečně má hlas, dnes prochází zkouškou. Sám jsem si všiml, že ve stejné straně, z níž pocházím, někteří prvky by rády ustavili vlastní formu tyranie, s rozdílem, že by být nahrazeni generály a vojáky. Ale věřím thajskému lidu, který nikdy takovému vývoji nedovolí. Porazili jsme tyranii jednou; porazíme ji znovu.\"\nMnozí se domnívají, že tento projev byl namířen proti Phraya Phahonphonphayuhasenovi, který se stal premiérem po převratu proti bývalému premiérovi Phraya Manopakorn Nititada, s nímž byl Pridi spojen, ale který byl obviněn z komunismu kvůli svým návrhům reforem. Nikdo neví, zda bude tento projev mít vliv, ale budeme muset Pridiho sledovat." # todo: NEW TRANSLATION
  siam.1.a: "Jaké škody by mohl způsobit prostý učitel?" # todo: NEW TRANSLATION
  siam.2.t: "Radio Seriphaph" # todo: NEW TRANSLATION
  siam.2.d: "Zdá se, že Svobodní Thajci získali kontrolu rozhlasové stanice na severu země, kde mají největší vliv. Používají ji ke vysílání vlastního rádia, Radio Seriphaph, což znamená 'Radio Svoboda', s prudkými útoky proti režimu a voláním po připojení vždy. Některá jejich vysílání se také vážou k debatě o tom, jak by měl být Siam reorganizován, až bude vláda poražena, kde je viditelný rozkol mezi Liberály a Komunisty, kteří se zdají být rovnocenní co do počtu členů mezi povstalci." # todo: NEW TRANSLATION
  siam.2.a: "Musíme to vypnout!" # todo: NEW TRANSLATION
  siam.3.t: "Pozvání Ho‑Či‑Mina" # todo: NEW TRANSLATION
  siam.3.d: "Od počátku procesu vytváření nové ústavy pro Siam někteří členové dočasné vlády vyjádřili obdiv k osobě Ho‑Či‑Mina, slavného vietnamského revolucionáře, jehož boj za nezávislost Vietnamu byl mnohokrát přirovnáván k boji proti Khana Ratsadon. Mnozí vyjádřili přání být jím raděni.\nAvšak umírněnější členové vyjádřili nedůvěru, upozorňujíc na Hoovo spojení s komunismem a obávajíc se, že jeho návštěva by vedla velkou část vlády a populace k adopci revoluce modelované podle bolševiků." # todo: NEW TRANSLATION
  siam.3.a: "Vítej, strýčku Ho!" # todo: NEW TRANSLATION
  siam.3.b: "Nemůžeme riskovat jeho přítomnost" # todo: NEW TRANSLATION
  siam.4.t: "Červený pochod" # todo: NEW TRANSLATION
  siam.4.d: "Zdá se, že pouhý přechod na parlamentní systém nestačil. Co mělo být pouze další pondělí, Komunistická strana Siamu spustila obrovské volání k povstání proti kapitalismu, povzbuzujíc obyvatele, aby si sami vzali výrobní prostředky. Pridi Phonmayong, který se mezitím stal hlavním myslitelem Komunistické strany, přednesl hlavní projev a prohlásil, že Siam nyní patří dělníkům.\nSeni Pramoj, vidouc rozsah protestů a odmítající následovat komunistický systém, byl nucen rezignovat a prý odletěl s rodinou do Spojených států. Phonmayong prohlásil Komunistickou stranu Siamu jedinou stranou a oznámil založení nového politického systému „lépe laděného s naší revolucí“" # todo: NEW TRANSLATION
  siam.4.a: "Ať žije revoluce!" # todo: NEW TRANSLATION
  siam.5.t: "Deklarace republiky" # todo: NEW TRANSLATION
  siam.5.d: "Direk Jayanama, hlava Prozatímní vlády, dnes vystoupil před davem v Bangkoku při svém prvním projevu jako hlavy vlády.\n\"Lidé Siamu, krev mnoha vašich bratří musela téct, aby ostatní mohli žít v míru a svobodě. Pro svobodu bojovali a obětovali se; pro tyto hodnoty je budeme ctít. Lidé Siamu, svoboda zvítězila nad tmou tyranie a jsem hrd prohlásit, že vybudujeme republiku založenou na našich hodnotách, pro které jsme dokázali svou odvahu.\"\n" # todo: NEW TRANSLATION
  siam.5.a: "Ať žije republika!" # todo: NEW TRANSLATION
  siam.6.t: "Sklad zbraní vyrabován!" # todo: NEW TRANSLATION
  siam.6.d: "Během noci byl jeden z našich hlavních skladů zbraní poblíž Bangkoku napaden povstalci identifikovanými jako Svobodní Thajci. Zdá se, že většina strážných byla diskrétně zabita, protože alarm nebyl spuštěn, což také naznačuje, že mezi strážemi musel být spojenec. Sklad byl kompletně vyloupen; odnesli pušky a munici." # todo: NEW TRANSLATION
  siam.6.a: "To není dobré znamení..." # todo: NEW TRANSLATION
  siam.7.t: "Dopis od Pridiho" # todo: NEW TRANSLATION
  siam.7.d: "Jeden z generálů armády šel za premiérem Phot Phahonyothinem, aby mu sdělil své obavy z možného proniknutí protivládních revolucionářů do armády. Tvrdí, že našel v jedné z ubytoven zprávu psanou Pridim Banomyongem. Tato zpráva povzbuzovala vojáky k pokojné rezistenci proti vládě a deklarovala jejich odmítnutí být řízeni tím, co nazývají 'adaptací fašismu'.\nGenerál navrhl použít tento dopis jako záminku k zatčení Pridiho Banomyonga za podněcování nepořádku a pokus zabránit šíření myšlenek vzpoury." # todo: NEW TRANSLATION
  siam.7.a: "Ukažeme mu, co děláme pseudo‑revolucionářům" # todo: NEW TRANSLATION
  siam.8.t: "Incident Sakhrai" # todo: NEW TRANSLATION
  siam.8.d: "Minulou noc byla policejní stanice ve vesnici v severovýchodním distriktu Sakhrai napadena gangem deseti ozbrojených mužů. Dva policejní důstojníci přítomní prý zmizeli, zabiti nebo unášeni, a útočníci po několika minutách odešli, podle svědka, který nebyl spatřen. Tvrdí, že slyšel jednoho z mužů stěžovat si na nedostatek oficiální rozhlasové stanice.\nZpráva o tomto útoku vyvolala mnoho reakcí ve vládě; někteří se domnívají, že byli inspirováni Pridiho výzvou k odporu, kterou úřady stále hledají, ale která zůstává nevyřešena. Šíří se pověsti, že se buduje rozsáhlá odbojová síť, a Phraya Phahonphonphayuhasena oznámil svůj záměr zvýšit počet policistů v regionu." # todo: NEW TRANSLATION
  siam.8.a: "Doufejme, že to byl jen izolovaný akt" # todo: NEW TRANSLATION
  siam.9.t: "Svobodní Thajci" # todo: NEW TRANSLATION
  siam.9.d: "Zatímco to mělo být jen další odpoledne jako každé jiné, na vojenském rozhlase bylo slyšet velmi zvláštní poselství:\n\"Jsme hnutí Svobodných Thajců. Vojáci Khana Ratsadon jsou vlastizrádci, kteří využili revoluce k nastolení vlastní tyranie místo té královy. Chceme přinést spravedlnost a demokracii naší zemi a nebudeme váhat, abychom konečně dali thajskému lidu svobodu. Pokud jste spojencem vlády, jste naším nepřítelem. Pokud jste proti ní, jste naším spojencem. Nechceme ubližovat nevinným lidem; chceme zabránit, aby se naše krásná země stala obětí fašismu. Viděli jsme, co se stalo v Itálii, Německu nebo Maďarsku. Teror, nenávist, fanatismus a zoufalství panují. Chceme tomuto osudu vyhnout naší krásné zemi a vybudovat novou vládu, která bude jednat k naplnění potřeb lidu, neboť my jsme lid.\"\nHlasem byl nikdo jiný než Direk Jayanama, další bývalý člen civilního křídla Khana Ratsadon, který se stal jedním z hlavních kritiků honu na Pridiho. Zdá se, že se rozhodl přidat k němu v pokusu svrhnout vládu masovým povstáním. Momentálně nevíme, kolik jich je; zdá se, že se hlavně skrývají na severovýchodě země, což ztěžuje jejich vystopování." # todo: NEW TRANSLATION
  siam.9.a: "Tak s nimi vyhlásíme válku!" # todo: NEW TRANSLATION
  siam.10.t: "Dibabhovo povstání" # todo: NEW TRANSLATION
  siam.10.d: "Co mělo být jednoduchou vzpourou, se změnilo v opravdové povstání. Princ Aditya Dibabha, který jako regent vystupoval jménem Rámy VIII., prohlásil, že našel dopis od premiéra adresovaný některým členům Khana Ratsadon naznačující jeho ambice zrušit monarchii v následujících měsících, a učinil velké volání k povstání 'všem stále věrným králi'. Mnozí očekávali, že bude potlačeno stejně jako princovo povstání Boworadet roku 1933, které selhalo, protože garnizóny v Bangkoku odmítly prince podpořit.\nTentokrát to nebyl případ. Garnizon se okamžitě přidal k povstalcům a ti dokázali během několika hodin převzít kontrolu nad Bangkokem.\nHlavní členové bývalé vlády, zejména Phraya Phahonphonphayuhasena, premiér, a Plaek Phibunsongkhram byli zatčeni a čekají na soud; princ vyhlásil zrušení ústavy z roku 1932 a úmysl opět nastolit Rámu VII. jako krále, prohlašujíc jeho abdikaci za neplatnou kvůli vojenskému nátlaku." # todo: NEW TRANSLATION
  siam.10.a: "Korupční vláda byla poražena!" # todo: NEW TRANSLATION
  SIA_provisional_monarchist_governement_party: "Prozatímní monarchistická vláda" # todo: NEW TRANSLATION
  SIA_provisional_monarchist_governement_party_long: "Prozatímní monarchistická vláda" # todo: NEW TRANSLATION
  siam.11.t: "Bitva o Bangkok" # todo: NEW TRANSLATION
  siam.11.d: "Zahajena je konečná bitva proti režimu. Po 'Deklaraci povstání' vydané Pridi Banomyongem všem Svobodným Thajcům z Radio Seriphaph se většina povstalců shromáždila v Bangkoku s cílem převzít kontrolu nad vládními úřady. Dvě třetiny milicí zaútočily na město ze severu, zatímco zbytek přicházel z východu; malá skupina se pokusila zaútočit z přístavů pomocí člunů získaných v důsledku vzpoury v námořnictvu. Mezitím prorežimní armáda vedená Plaekem Phibunsongkhramem rozmístila síly ve městě, kde byl vyhlášen noční výjimečný stav. Osud Siamu bude rozhodnut v nadcházejících dnech..." # todo: NEW TRANSLATION
  siam.11.a: "Ukončeme to!" # todo: NEW TRANSLATION
  siam.12.t: "Návrat Rámy VII." # todo: NEW TRANSLATION
  siam.12.d: "Ráma VII., který byl stále v exilu v Evropě, souhlasil vrátit se do Siamu a znovu nastolit svůj trůn. Když přistál na bangkokském letišti, čekal ho obrovský dav křičící hesla na počest krále a monarchie. Princ Aditya Dibabha, hlava Prozatímní vlády, byl přítomen a doprovázel Rámu VII. až ke korunovační ceremonii několik hodin poté.\nRáma VII. je tedy opět králem Siamu a oznámil úmysl znovu implementovat reformy, které zavedl před pučem v roce 1932, zejména Nejvyšší radu, a plán decentralizovat správu." # todo: NEW TRANSLATION
  siam.12.a: "Ať žije Ráma VII!" # todo: NEW TRANSLATION
  SIA_monarchy_party: "Dynastie Chakri" # todo: NEW TRANSLATION
  SIA_monarchy_party_long: "Dynastie Chakri" # todo: NEW TRANSLATION
  siam.13.t: "Otázka monarchie" # todo: NEW TRANSLATION
  siam.13.d: "Oficiálně je Siam od puče v roce 1932 konstituční monarchií a král si nadále zachovává určitou moc nad vládou. Ale od abdikace Prajadhipoka (Ráma VII.) po neshodách s vojenskými složkami, které se staly hlavní politickou silou, se Siam ocitl bez krále. Jeho nástupce, Ananda Mahidol (Ráma VIII.), je pouze dítě studující ve Švýcarsku a jeho regenti mají jen velmi omezený vliv. Někteří členové vlády se však obávají, že nový král by mohl v delším horizontu znovu omezit moc armády, a proto navrhli zrušení monarchie. Avšak zrušení instituce tak významné jako monarchie by nemělo být činěno lehkovážně..." # todo: NEW TRANSLATION
  siam.13.a: "Pro blaho země musí zůstat" # todo: NEW TRANSLATION
  siam.13.b: "Už jej nepotřebujeme" # todo: NEW TRANSLATION
  siam.14.t: "Ústavní návrat Rámy VII." # todo: NEW TRANSLATION
  siam.14.d: "Po referendu, v němž více než polovina lidí rozhodla obnovit Rámu VII. na trůně, dorazil do Bangkoku o dva dny později, přijat premiérem Seni Pramojem. O několik hodin později proběhla korunovace a král přísahal respektovat limity stanovené novou siamou ústavou." # todo: NEW TRANSLATION
  siam.14.a: "Ať žije král! Ať žije ústava!" # todo: NEW TRANSLATION
  siam.15.t: "Vítězství povstalců!" # todo: NEW TRANSLATION
  siam.15.d: "Bitva o Bangkok zuřila dny s nepřetržitou střelbou, vojáci a povstalci bojovali čtvrtí od čtvrti. Po obsazení budovy Národního shromáždění poslední vládní jednotky souhlasily složit zbraně. Podle některých vojáků si Plaek Phibunsongkhram, který velel protirevolučním silám, vybral sebevraždu místo toho, aby byl svědkem porážky vlastních jednotek. Phraya Phahonphonphayuhasena, bývalý premiér, prý se mu podařilo ujet lodí do Kambodže. Pridi Banomyong, vůdce revoluce, promluvil v rozhlase:\n\"Drazí lidé Siamu, vojenská tyranie je za námi. Lidé ukázali, že navzdory veškerému útlaku a bojům dokážou udržet odhodlání a porazit utlačovatele. Od nynějška bude moc předána lidu — rolníkům, dělníkům; konečně budou osvobozeni. Jsme na úsvitu nové éry; kráčíme vstříc jasné a nadějné budoucnosti.\"\n" # todo: NEW TRANSLATION
  siam.15.a: "Ať žije revoluce!" # todo: NEW TRANSLATION
  siam.16.t: "Vznik Socialistické republiky Siam" # todo: NEW TRANSLATION
  siam.16.d: "Nyní je čas oficiálně vyhlásit Siam republikou, která bude následovat socialistické myšlení. Co Lenin dokázal v Rusku, my dosáhneme zde v Siamu; vybudujeme nový národ osvobozený od řetězů kapitalismu." # todo: NEW TRANSLATION
  siam.16.a: "Červená hvězda vstává nad Siamem" # todo: NEW TRANSLATION
  siam.18.t: "Plaek Phibunsongkhram zvolen premiérem" # todo: NEW TRANSLATION
  siam.18.d: "Zdá se, že Phraya Phahonphonphayuhasena již není schopný vést zemi. Uhodila ho aféra: prý prodával královské zboží důstojníkům za mnohem nižší ceny než obvyklé. Navíc jeho zastánci se ocitli v menšině v Lidovém shromáždění po prvních přímých volbách. Jeho kabinet nebyl schopen prosadit rozpočtovou reformu a zkolaboval. Proběhly nové volby a Plaek Phibunsongkhram byl zvolen, aby vedl zemi." # todo: NEW TRANSLATION
  siam.18.a: "Muž s velkými ambicemi" # todo: NEW TRANSLATION
  siam.19.t: "Povstalci obsadili Isan" # todo: NEW TRANSLATION
  siam.19.d: "Povstalci Svobodných Thajců zahájili velkou ofenzívu v Isanu a obsadili důležité město Nakhon Ratchasima, největší v regionu. Nyní hraničící s Laosem, mnozí se obávají, že povstalci navážou styky s Pathet Lao nebo dokonce s Việt Minhem.\nPlaek Phibunsongkhram, ministr obrany, navrhl použít průzkum k lokalizaci jejich hlavních základen a poté je bombardovat ze vzduchu, aby se narušila jejich morálka, ale taková akce na našem vlastním území by mohla mít velmi silné následky..." # todo: NEW TRANSLATION
  siam.19.a: "Zničit ty lesy! Zabít je do posledního!" # todo: NEW TRANSLATION
  siam.19.b: "Stáhnout se na jih!" # todo: NEW TRANSLATION
  SIA_kill_pridi_tooltip: "Toto odemkne demokratickou cestu" # todo: NEW TRANSLATION
  SIA_dont_kill_pridi_tooltip: "Toto odemkne komunistickou cestu" # todo: NEW TRANSLATION
  siam.20.t: "Pridi Banomyong zabit při leteckých náletech" # todo: NEW TRANSLATION
  siam.20.d: "Naše letecké nálety nad Isanem poškodily dvě z povstaleckých výcvikových táborů, ale i to, co se zdálo být jejich velitelstvím. Dnes ráno na Radio Seriphaph Direk Jayanama oznámil, že Pridi Banomyong byl zabit při náletech, a že je nyní na něm 'dokončit úkol, který nám tento velký muž zajistí z nebe'. Ztráta vůdce povstalců nezdá se snížila jejich morálku; naopak, prý se mnoho rolníků přidalo k nim po ztrátě úrody při požárech způsobených nálety." # todo: NEW TRANSLATION
  siam.20.a: "Usekli jsme jednu hlavu a dvě vyrostou!" # todo: NEW TRANSLATION
  siam.21.t: "Povstání v Indočíně!" # todo: NEW TRANSLATION
  siam.21.d: "Komunistické skupiny povstalců zajaly velkou část měst v Indočíně! Pravděpodobně jim pomohl Siamův komunistický soused; snaží se svrhnout francouzskou koloniální správu. Je čas obnovit pořádek..." # todo: NEW TRANSLATION
  siam.21.a: "En Avant!" # todo: NEW TRANSLATION
  siam.22.t: "Bitva o Bangkok" # todo: NEW TRANSLATION
  siam.22.d: "Konečná bitva proti režimu je zahájena. Po 'Deklaraci povstání' vydané Direkem Jayanamou všem Svobodným Thajcům z Radio Seriphaph se většina povstalců koncentrovala v Bangkoku v naději převzít kontrolu nad státní správou. Dvě třetiny milicí zaútočily na město ze severu, zatímco zbytek přišel z východu; malá skupina se pokusila zaútočit z přístavů pomocí člunů získaných díky vzpouře v námořnictvu. Mezitím prorežimní armáda vedená Plaekem Phibunsongkhramem rozmístila síly ve městě, kde byl vyhlášen zákaz vycházení do odvolání, a letadla se chystají vzlétnout, aby poskytla průzkumnou podporu. Osud Siamu bude rozhodnut v následujících dnech..." # todo: NEW TRANSLATION
  siam.22.a: "Ukončeme to!" # todo: NEW TRANSLATION
  siam.23.t: "Vítězství povstalců!" # todo: NEW TRANSLATION
  siam.23.d: "Bitva o Bangkok zuřila dny v kuse, zbraně a pušky nepřestávaly střílet, vojáci a rebelové bojovali čtvrť po čtvrti. Po převzetí budovy Národního shromáždění poslední vládní síly souhlasily se složením zbraní. Podle některých vojáků se Plaek Phibunsongkhram, který velel protirevolučním jednotkám, rozhodl spáchat sebevraždu, než aby byl svědkem porážky vlastních sil. Phraya Phahonphonphayuhasena, bývalý předseda vlády, se údajně podařilo nasednout na loď a uprchnout do Kambodže. Direk Jayanama, vůdce revolucionářů, pronesl řeč v rozhlase.\n\"Drazí obyvatelé Siamu, vojenská tyranie je nyní za námi. Lid ukázal, že navzdory veškerému utlačování a bojům si dokáže udržet odhodlání a porazit utlačovatele. Od nynějška bude moc předána lidu, rolníkům, dělníkům, ti budou konečně osvobozeni. Stojíme na prahu nové éry, kráčíme ke světlé a nadějné budoucnosti\"" # todo: NEW TRANSLATION
  siam.23.a: "Ať žije revoluce!" # todo: NEW TRANSLATION
  siam.24.t: "Den voleb" # todo: NEW TRANSLATION
  siam.24.d: "Dnes je den všeobecných voleb, které určí první vládu nové republiky. Mezi nejpravděpodobnějšími kandidáty jsou dva. Direk Jayanama, vůdce Seri Thais po smrti Pridiho, zakladatel \"Lidové radikální strany\", inspirující se francouzským radikalismem i politikou Franklina Delana Roosevelta, který chce nastolit státní intervenci do ekonomiky, aby zajistil blahobyt lidu. Na druhé straně seni Pramoj, další člen Seri Thais, založil konzervativní \"Demokratickou stranu\", sám Seni pocházející z královského rodu, by rád obnovil monarchii, přičemž by ji omezil mnohem více než co udělali první revolucionáři v roce 1932. Hospodářsky je mnohem blíže britským toryům a věří, že neintervenční ekonomická politika by byla pro národ a lid prospěšná." # todo: NEW TRANSLATION
  siam.24.a: "Lidová radikální strana" # todo: NEW TRANSLATION
  siam.24.b: "Demokratická strana" # todo: NEW TRANSLATION
  siam.25.t: "Siam žádá o pomoc" # todo: NEW TRANSLATION
  siam.25.d: "Velvyslanec Siamu přinesl velmi zvláštní dopis, určený výhradně pro [SOV.GetLeader]. Tento dopis vysvětloval plán siamské vlády podporovat komunistické hnutí bojující proti francouzské kolonizaci Indočíny.\nDopis končí výzvou o pomoc ze Siamu, vysvětluje, že vzhledem k nízké průmyslové kapacitě ve srovnání s námi je přeprava zbraní a vybavení pomalá a velmi drahá, a doufají, že jim zašleme vybavení k šíření komunistických ideálů v Indočíně." # todo: NEW TRANSLATION
  siam.25.a: "Boj proti imperialismu má naši plnou podporu" # todo: NEW TRANSLATION
  siam.25.b: "Blíží se válka, ale nemůžeme je nechat napospas." # todo: NEW TRANSLATION
  siam.25.c: "Nemůžeme si dovolit opustit pušku pro ztracenou věc" # todo: NEW TRANSLATION
  siam.26.t: "Sovětský svaz souhlasí s posláním pomoci" # todo: NEW TRANSLATION
  siam.26.d: "Sovětský svaz souhlasil, že nám pošle velké množství pušek a jiného vojenského vybavení, aby nám pomohl v boji proti kolonizaci Indočíny.\nZískání pokročilého vojenského vybavení, jako mají oni, výrazně zvýší sílu naší odbojové sítě!" # todo: NEW TRANSLATION
  siam.26.a: "Výborně!" # todo: NEW TRANSLATION
  SIA_soviet_union_sends_many_guns: "§R+25% Agitace všude§!" # todo: NEW TRANSLATION
  siam.27.t: "Sovětský svaz souhlasí s malou pomocí" # todo: NEW TRANSLATION
  siam.27.d: "Sovětský svaz souhlasil, že nám pošle malé množství vojenského vybavení, avšak uvedl, že plná pomoc nemůže být v tuto chvíli poskytnuta kvůli nebezpečné situaci, ve které se SSSR nachází.\nPřijetí dalšího vojenského vybavení nám přesto umožní zlepšit naši odbojovou síť." # todo: NEW TRANSLATION
  siam.27.a: "Lepší než nic, asi" # todo: NEW TRANSLATION
  SIA_soviet_union_sends_some_guns: "§R+10% Agitace všude§!" # todo: NEW TRANSLATION
  siam.28.t: "Sovětský svaz odmítá poslat vybavení" # todo: NEW TRANSLATION
  siam.28.d: "Sovětský svaz uvedl, že vzhledem ke své současné situaci si v tuto chvíli nemůže dovolit uvolnit žádné vojenské vybavení, a omezil se jen na popřání úspěchu v našem povstání.\nJe jasné, že v tom budeme sami." # todo: NEW TRANSLATION
  siam.28.a: "Alespoň drží kurs \"socialismu v jedné zemi\"" # todo: NEW TRANSLATION
  siam.29.t: "Proces s Phraya Phahonphonphayuhasenou" # todo: NEW TRANSLATION
  siam.29.d: "Prvním členem Khana Ratsadon, který bude souzen, je Phraya Phahonphonphayuhasena, bývalý předseda vlády obviněný z republikánských názorů a z pokusu využít svou pozici hlavy vlády k zrušení monarchie.\nTakový čin by byl považován za velezradu nejen proti králi, ale proti celému království Siamu, a trest smrti se jeví jako logická volba.\nNesmíme ale zapomenout, že je také velmi schopný vojevůdce a mohl by se ukázat jako důležitý pro budoucnost s ohledem na blížící se potenciální konflikty..." # todo: NEW TRANSLATION
  siam.29.a: "Zaslouží si jen smrt" # todo: NEW TRANSLATION
  siam.29.b: "Ještě ho potřebujeme" # todo: NEW TRANSLATION
  siam.30.t: "Proces s Plaek Phibunsongkhramem" # todo: NEW TRANSLATION
  siam.30.d: "Plaek Phibunsongkhram je druhým členem Khana Ratsadon, který bude souzen, zejména za svou roli při potlačení rebelie prince Bowodareta, první pokus o obnovu královské autority, a za jeho účast v obraně města Bangkok během rebelie prince Dibabha. Je tedy vinný z obrany vlády Khana Ratsadon, čin, který lze považovat za zradu vůči monarchii. Ale lze se ptát, zda jen neplnil rozkazy tehdejší vlády, a tudíž by s námi nemusel mít morální problémy..." # todo: NEW TRANSLATION
  siam.30.a: "Kdyby nám chtěl pomoci, přidal by se k nám od začátku!" # todo: NEW TRANSLATION
  siam.30.b: "Nemůžeme se rozloučit s tak schopným mužem" # todo: NEW TRANSLATION
  siam.31.t: "Smlouva z Vientiane" # todo: NEW TRANSLATION
  siam.31.d: "Po dlouhých jednáních s francouzskou vládou ta souhlasila s konáním referenda v Kambodži a Siamu, aby určily, zda chtějí znovu připojení k Siamu. Hlasování ANO vyhrálo více než 80 % hlasů a suverenita nad těmito územími bude převedena na nás. Vláda Francii ujistila tím, že jí zaručí ekonomické výhody v regionu." # todo: NEW TRANSLATION
  siam.31.a: "Opět sjednoceni s našimi bratry!" # todo: NEW TRANSLATION
  siam.32.t: "Porážka v Indočíně" # todo: NEW TRANSLATION
  siam.32.d: "Po neúspěchu v potlačení povstání v Indočíně se zdá, že jakákoli naděje na opětovné ovládnutí těchto území pro nás zmizela. Podepsali jsme mírovou smlouvu se čtyřmi indočínskými státy, která ukončuje nepřátelství mezi našimi národy a končí několika dekádami francouzské přítomnosti v regionu." # todo: NEW TRANSLATION
  siam.32.a: "Naše jediná výnosná kolonie..." # todo: NEW TRANSLATION
  siam.33.t: "Porážka v Indočíně" # todo: NEW TRANSLATION
  siam.33.d: "Po neúspěchu v porážce povstání v Indočíně se zdá, že jakákoli naděje na opětovné ovládnutí těchto území pro nás zmizela. Podepsali jsme mírovou smlouvu se čtyřmi indočínskými národy, aby se zastavilo nepřátelství, čímž skončilo několik dekád francouzské přítomnosti v regionu." # todo: NEW TRANSLATION
  siam.33.a: "Naše nejziskovější kolonie..." # todo: NEW TRANSLATION
  siam.34.t: "Siam požaduje referendum v Laosu a Kambodži" # todo: NEW TRANSLATION
  siam.34.d: "Různé nedávné snahy siamské vlády propagovat pokojný pan-thajismus nyní vyvrcholily ve velmi konkrétní žádost: konání referend v Laosu a Kambodži o jejich přistoupení k Siamu. Siamský velvyslanec slíbil, že francouzské ekonomické zájmy budou v regionu zachovány, a slíbil, že v případě úspěšného referenda budou uzavřeny smlouvy, které Francii poskytnou určitou ekonomickou výhodu v regionu." # todo: NEW TRANSLATION
  siam.34.a: "Uskutečníme referendum" # todo: NEW TRANSLATION
  siam.34.b: "Odmítáme" # todo: NEW TRANSLATION
  siam.35.t: "Francie odmítá referendum" # todo: NEW TRANSLATION
  siam.35.d: "Navzdory našim mnoha snahám propagovat pan-thajismus, který by prospěl jak Francii, tak Siamu, byla odpověď Francie kladná směrem ke konání referenda." # todo: NEW TRANSLATION
  siam.35.a: "Přinejmenším jsme to zkusili" # todo: NEW TRANSLATION
  siam.36.t: "[SIA.GetNameDefCap] požaduje konec kolonialismu v Indočíně" # todo: NEW TRANSLATION
  siam.36.d: "[SIA.GetNameDefCap] požaduje konec kolonialismu v Indočíně" # todo: NEW TRANSLATION
  siam.36.a: "Tak tedy nezávislost a svoboda!" # todo: NEW TRANSLATION
  siam.36.b: "Dovedeme je ke svobodě." # todo: NEW TRANSLATION
  SIA_fascist_sympathies_in_the_army: "Fašistické sympatie v armádě" # todo: NEW TRANSLATION
  SIA_fascist_sympathies_in_the_army_desc: "Pod vlivem Plaeka Phibunsongkhrama získaly fašistické ideály v armádě značný prostor, posílené již existující autoritářskou politikou. Je velmi pravděpodobné, že tato armáda, která již má velkou část politické moci, bude tlačit Siam k přiblížení se mocnostem sdílejícím tuto ideologii." # todo: NEW TRANSLATION
  SIA_civilian_wing_opposition: "Opozice civilní frakce" # todo: NEW TRANSLATION
  SIA_civilian_wing_opposition_desc: "Od revoluce v roce 1932 byl Khana Ratsadon, 'Lidová strana', rozdělen na dvě hlavní křídla: jedno civilní, ve prospěch demokracie a sociálních reforem, a druhé vojenské, ve prospěch rozšíření státu a militarizace společnosti. Demokraté neustále kritizovali a odporovali našemu rozšiřování vojenských kapacit; bude třeba něco udělat, pokud chceme dokončit realizaci našich plánů." # todo: NEW TRANSLATION
  SIA_democratic_opposition: "Demokratická opozice" # todo: NEW TRANSLATION
  SIA_cultural_revolution_idea_1: "Kulturní revoluce" # todo: NEW TRANSLATION
  SIA_cultural_revolution_idea_2: "Kulturní revoluce" # todo: NEW TRANSLATION
