  SLO_mechanization: "Slovenská pancéřová pěchota" # todo: NEW TRANSLATION
  SLO_mechanization_desc: "" # todo: NEW TRANSLATION
  SLO_improved_mechanization: "Další snahy o mechanizaci" # todo: NEW TRANSLATION
