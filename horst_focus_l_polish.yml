  NOR_convoy_effort: "Obnovit obchodní loďstvo" # todo: NEW TRANSLATION
  NOR_convoy_effort_desc: "Všechny války jsou bojovány, vyhrávány a prohrávány logistikou. Naši zkušení stavitelé lodí mohou rychle postavit konvojové lodě pro spojence." # todo: NEW TRANSLATION
  NOR_escort_effort_desc: "Potřebujeme protiponorkové a eskortní torpédoborce. Musíme v tom pomoci našim spojencům." # todo: NEW TRANSLATION
  NOR_naval_drills_desc: "Řádná příprava nás naučí cenné lekce" # todo: NEW TRANSLATION
