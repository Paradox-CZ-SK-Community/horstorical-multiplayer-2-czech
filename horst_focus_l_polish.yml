  BUL_GER_subject: "Království Bulharsko" # todo: NEW TRANSLATION
  YUG_ITA_subject: "Nezávislý stát Chorvatsko" # todo: NEW TRANSLATION
  SER_GER_subject: "Království Srbsko" # todo: NEW TRANSLATION
  CZE_GER_subject: "Slovensko" # todo: NEW TRANSLATION
  BRA_establish_desc: "Měli bychom založit Národní bezpečnostní tribunál, Tribunal de Segurança Nacional. Po Intentona Communista máme mnoho 'komunistů', kteří musí být stíháni. Chtěli jsme nechat Nejvyšší vojenský soud, aby se tím zabýval, ale to by trvalo příliš dlouho. Proto zakládáme tribunál pod Nejvyšším vojenským soudem, který může fungovat rychleji." # todo: NEW TRANSLATION
  BRA_general: "Povýšit João Baptista Mascarenhas de Morais" # todo: NEW TRANSLATION
  BRA_general_desc: "Mascarenhas de Morais se osvědčil jako loajální důstojník novému režimu Vargase. Jeho boj proti komunistům během neúspěšného puče mu přinesl určitou reputaci v Riu nad všemi ostatními puči, které pomáhal potlačit. Měli bychom mu dát příležitost dalšího rozvoje kariéry. Má velký potenciál." # todo: NEW TRANSLATION
  BRA_estadonovo2: "Estado Novo" # todo: NEW TRANSLATION
  BRA_estadonovo2_desc: "Nový stát se zrodil. Třetí brazilská republika je faktem. Zvolil jste, jak radikálně reformován tento nový stát bude. Náš veliký vůdce Vargas má úžasné plány týkající se průmyslu, vzdělání a obecného rozvoje země. Nastal nový úsvit. Teď je čas na boj, oslavy a hrdost! Ordem e Progresso!" # todo: NEW TRANSLATION
  BRA_second: "República dos Estados Unidos do Brasil" # todo: NEW TRANSLATION
  BRA_usa: "Importy americké oceli" # todo: NEW TRANSLATION
  BRA_usa_desc: "Americký průmysl v současnosti exploduje. Nová brazilská armáda bude potřebovat hodně oceli, pokud chceme následovat moderní cestu. Industrializace Brazílie se stále vyvíjí. Přesto má náš geograficky přirozený spojenec, největší moc v Americe, USA, nekonečné množství oceli k prodeji. Určitě bychom měli část této oceli importovat, abychom zajistili naše zásoby." # todo: NEW TRANSLATION
  BRA_milpolice: "Polícia Militar" # todo: NEW TRANSLATION
  BRA_milpolice_desc: "Před Vargasovým režimem byla vojenská policie hrozbou pro zemi. Guvernéři z různých autonomních států používali jednotky policie v každém státě jako své soukromé armády. Během centralizace moci v roce 1932 zajistila federální armáda, že tyto útvary byly znovu loajální. Rio, ne jednotlivé státy. Měli bychom je nyní modernizovat." # todo: NEW TRANSLATION
  BRA_wagon: "Průvody pro karneval" # todo: NEW TRANSLATION
  BRA_wagon_desc: "Karneval je známý pro rozsáhlé používání ozdobených vozidel. Od nynějška se stát také zaměří na výrobu těchto 'ozdobených' vozidel, budou mít jen trochu více 'praktického' využití než současné průvody." # todo: NEW TRANSLATION
  BRA_copacabana: "Ohňostroje na Copacabaně" # todo: NEW TRANSLATION
  BRA_copacabana_desc: "Copacabana v Rio de Janeiru může být nejslavnější pláží na světě. Její umístění v krásné městské zátoce s Kristem Spasitelem hlídajícím návštěvníky je skutečně nádherný pohled. Brzy nebudou ohňostroje jedinou světelnou show, kterou turisté a Brazilci uvidí na této pláži. Nedaleké cvičení našich katjuší povede k pozoruhodnému 'ohnivému' představení na pláži." # todo: NEW TRANSLATION
  BRA_authority: "Pravomoc nad soukromými společnostmi" # todo: NEW TRANSLATION
  BRA_authority_desc: "Privatizace společností byla chybou. Naše země bude více profitovat ze semi-státně plánované ekonomiky. Získáme větší podíl na výnosech těchto společností, který investujeme do kolektivních projektů. Nyní máme také možnost požadovat po společnostech zvýšení produkce tam, kde existují nedostatky, abychom snížili jejich zisky způsobené těmito nedostatky." # todo: NEW TRANSLATION
  BRA_coronelismo: "Osvobodit se od coronelismu" # todo: NEW TRANSLATION
  BRA_coronelismo_desc: "Coronelismo, neboli vláda kolonelů, musí zmizet. Tito místní oligarchové, kteří často produkují kávu, mají na venkově příliš velkou moc. Dýmou růst městského ekonomického vývoje. Ekonomické jádro musí přejít do měst. Musíme se jich zbavit, a přitom chránit místní agro-exportní zájmy. Věrnost nebo smrt." # todo: NEW TRANSLATION
  BRA_snake1: "Brazilská expediční síla" # todo: NEW TRANSLATION
  BRA_snake1extra: "Brazilská expediční síla" # todo: NEW TRANSLATION
  BRA_snake1_desc: "Naše vojenské úsilí konečně začíná přinášet ovoce. V těchto chaotických dobách je mladá a životaschopná dobře vyzbrojená brazilská armáda připravena udeřit kdekoliv bude potřeba. Brazílie nyní disponuje obrovskou silou. Měli bychom ukázat naše svaly, zničit síly Osy a významně přispět k světovému míru. Nechť naši nepřátelé okusí zuřivost rozhněvané Brazílie!" # todo: NEW TRANSLATION
  BRA_snake1extra_desc: "Naše vojenské úsilí konečně začíná přinášet ovoce. V těchto chaotických dobách je mladá a životaschopná dobře vyzbrojená brazilská armáda připravena udeřit kdekoliv bude potřeba. Brazílie nyní disponuje obrovskou silou. Měli bychom ukázat naše svaly, zničit síly Osy a významně přispět k světovému míru. Nechť naši nepřátelé okusí zuřivost rozhněvané Brazílie!" # todo: NEW TRANSLATION
  BRA_nav2: "Přepracovat Minas Gerais" # todo: NEW TRANSLATION
  BRA_nav2_desc: "Kdysi byl Minas Gerais předmětem závisti světa, dreadnought, který mohl vystřelit salvu v objemu nepřekonaném zbytkem světa. Stále je to vysoce prestižní loď a Brazílie je na ni nesmírně hrdá. Proto by měla zažít druhý život. Loď je ve fázi, kdy už nestačí pro moderní námořní válku. Poslat ji do doků na rozsáhlou modernizaci by bylo skvělé. Její sláva bude pokračovat." # todo: NEW TRANSLATION
  BRA_disband: "Rozpustit všechny politické strany" # todo: NEW TRANSLATION
  BRA_disband_desc: "Politické strany jsou hrozbou pro brazilské obyvatelstvo. Snaží se zasahovat do naší vnitřní politiky a destabilizovat národ. Od fašistů po komunisty, všichni budou poslouchat Rio. Korporativismus bude novým normálem. Žádné více politické zastoupení, jen odborné zastoupení." # todo: NEW TRANSLATION
  BRA_latifundios: "Koncesionovat latifundia" # todo: NEW TRANSLATION
  BRA_latifundios_desc: "Velkostatkáři, latifundia, vždy měli ve státě značný vliv. Dáme jim autonomii a oni zajistí, že relativně opuštěné regiony zůstanou stabilní a ekonomicky významné. Aby Vargas zůstal u moci a aby se zbavili komunistů, není špatné uvažovat o 'dohodách' s nimi a jejich integralistickými příznivci." # todo: NEW TRANSLATION
  BRA_cometobrazil: "Přijeďte do Brazílie!" # todo: NEW TRANSLATION
  BRA_cometobrazil_desc: "Brazílie je nejkrásnější země na zemi. Jsme pokryti nádhernou přírodou, jak daleko oko dohlédne. Kulturně jsme poměrně blízko Západu kvůli koloniální minulosti. Mluvíme rodným jazykem, který je příbuzný. Naše pobřeží patří mezi nejmodernější oblasti na světě! A co je nejdůležitější, je daleko od západních domovů. Perfektní místo na odpočinek. Přijeďte do Brazílie!" # todo: NEW TRANSLATION
  BRA_martial: "Vést §RVýjimečný stav§!" # todo: NEW TRANSLATION
  BRA_martial_desc: "Naše země je v troskách. Korupce je každodenním zvykem. Nic nefunguje efektivně. Pokud to necháme pokračovat, Brazílie se vrátí zpět. Vargas musí uchopit úplnou moc a v případě potřeby zavést výjimečný stav. To je jediný způsob, jak násilně vrátit zemi zpět na správnou cestu." # todo: NEW TRANSLATION
  BRA_blackmail: "Vydírat Británii" # todo: NEW TRANSLATION
  BRA_blackmail_desc: "Díky ideologické shodě udržujeme značný obchod s zeměmi Osy. Jak napětí ve světě roste, Spojenci po nás žádají, abychom snížili obchod s těmito státy. Místo toho bychom měli hrozit vstupem do Osy. Pokud chce Británie, abychom se nepřipojili k Ose A současně snížili obchod, můžeme požadovat slušné dotace prostřednictvím nenápadného vydírání." # todo: NEW TRANSLATION
  BRA_goodneighbor: "Politika dobrého souseda" # todo: NEW TRANSLATION
  BRA_goodneighbor_desc: "USA se snaží zaujmout dobré postoje vůči státům Latinské Ameriky. Jako ekonomicky největší země v regionu hraje Brazílie zásadní roli v této politice dobrého souseda. Obě strany by značně profitovaly, pokud by se zvýšila spolupráce našich zemí. Carmen Miranda bude náš symbolický vyslanec, je slavná tanečnice na Západě. Narodila se v Portugalsku, vyrostla v Brazílii!" # todo: NEW TRANSLATION
  BRA_nav1: "Zabít vlky" # todo: NEW TRANSLATION
  BRA_nav1_desc: "Napětí v Evropě roste a nevyhnutelně se zvyšuje i inovace vojenského zboží. Námořní válka nevyjímaje. Nový typ plavidla, ponorka, se plně prosazuje. Tyto lodě by mohly ohrozit náš obchod s Evropou a zbytkem Ameriky. Měli bychom silně investovat do boje proti těmto ponorkám. Náš obchod musí být za každou cenu chráněn naším námořnictvem." # todo: NEW TRANSLATION
  BRA_amazons: "Domov Amazoněk" # todo: NEW TRANSLATION
  BRA_amazons_desc: "V roce 1542 potkal Gaspar de Carvajal, španělský kronikář, kmen, který považoval za pravé Amazonky z příběhů Homéra a Hérodota. Popisoval je: 'velmi bílé a vysoké, s velmi dlouhými vlasy spletenými a obtočenými kolem hlav. Jsou velmi robustní, chodí nahé s pohlavními orgány zakrytými, a s luky a šípy v rukou, bojují jako deset indiánských mužů.'" # todo: NEW TRANSLATION
  BRA_centralize: "Centralizovat moc v Riu" # todo: NEW TRANSLATION
  BRA_centralize_desc: "Abychom čelili místním oligarchům a udrželi moc nad venkovskými oblastmi, je nezbytné zahájit pevné centralizační kroky. Vytvoříme efektivní byrokracii odolnou vůči velké korupci, což zvýší centrální velení a moc Vargase. Centralizací a učiněním Ria hlavním obchodním centrem přitáhneme potřebné průmysly. Rio de Janeiro se stane megapolis!" # todo: NEW TRANSLATION
  BRA_dops: "Departamento de Ordem Política e Social" # todo: NEW TRANSLATION
  BRA_dops_desc: "Oddělení politického a sociálního pořádku výrazně posílí moc policie v naší snaze zajistit stabilitu a prosperitu státu. DOPS bude mocná politická policie a tajná služba, která nám pomůže zbavit se jakýchkoli 'nestabilních faktorů' ve státě. Někdy je lepší nechat někoho zmizet bez nudného dlouhého procesu." # todo: NEW TRANSLATION
  BRA_tradeunion: "§GUtáhnout odbory§!" # todo: NEW TRANSLATION
  BRA_tradeunion_desc: "Nyní, když Velká hospodářská krize končí, odbory ztrácejí vliv. Způsobily mnoho nestability a korupce svými stávkami. Nastal čas zatáhnout je na uzdu. Jejich aktivita způsobuje příliš mnoho nestability, kterou nepotřebujeme! Nehodí se do Estado Novo." # todo: NEW TRANSLATION
  BRA_tsn: "§OAutonomní TSN§!" # todo: NEW TRANSLATION
  BRA_tsn_desc: "Tribunal de Segurança Nacional byl už založen, aby soudit ty, kdo přinášejí nestabilitu státu, převážně komunisty a politické odpůrce. Procesy nepostupují dostatečně rychle, nekonečné právní postupy jsou normou. Máme prostor pro radikální reformy. Měli bychom znemožnit odvolání. Musíme osvobodit TSN z ostatního právního systému." # todo: NEW TRANSLATION
  BRA_constitution: "§HÚstava z roku 1937§!" # todo: NEW TRANSLATION
  BRA_constitution_desc: "Vargasevo čtyřleté prezidentské období se téměř chýlí ke konci. Náš stát je relativně nestabilní. Korupce nás srazí, pokud uspořádáme svobodné volby. Je čas prosadit radikální reformu s naším plánem Cohen. Nová ústava bude institucionalizována. Vargas si udrží moc. Komunisté za to zaplatí." # todo: NEW TRANSLATION
  BRA_surdo: "Nový Surdo" # todo: NEW TRANSLATION
  BRA_surdo_desc: "Surdo, tradiční brazilský basový buben. Silný nástroj navržený, aby dal karnevalu 'pocit', ránu. Brzy nebudou jen surda třást ulice Brazílie. Naše nově navržené dělostřelecké kusy budou otřásat celými městy. Tyto slavné rány přinesou Brazílii prestiž!" # todo: NEW TRANSLATION
  BRA_prestes: "Prestesovi následovníci" # todo: NEW TRANSLATION
  BRA_prestes_desc: "Mladí důstojníci školení v Evropě, Tenentes, mají ve vojsku značný vliv a považují se za nadřazené staré gardě. Touží po radikálních reformách. Jejich bývalý vůdce, Prestes, vyšel jako komunista, který dokonce spustil Intentona Communista! Měli bychom udržet tradiční způsoby ve vojsku a pročistit všechny nebezpečné mladé důstojníky, kteří následovali komunistu!" # todo: NEW TRANSLATION
  BRA_second_desc: "Revoluce z roku 1930 ukončila První republiku. Vzhledem k chaotickému zrodu je Druhá republika v současné podobě na pokraji kolapsu. Silný vůdce je nezbytný v boji proti korupci. Někdo musí Brazílii radikálně reformovat, jinak zahyneme v tomto měnícím se světě." # todo: NEW TRANSLATION
  BRA_gunimport: "Americké dovozy zbraní" # todo: NEW TRANSLATION
  BRA_gunimport_desc: "Snažíme se vytvořit respektuhodnou armádu, potřebujeme muže. Naštěstí jich máme dost. Jediné, co nám krátkodobě chybí, jsou zbraně, granáty, dělostřelectvo a náboje. Naštěstí máme průmyslového obra poblíž, Spojené státy. Pokud chceme dosáhnout cílů naší vojenské politiky, musíme si od strýčka Sama objednat zbraně." # todo: NEW TRANSLATION
  BRA_snake2: "Brazilský obrněný prapor" # todo: NEW TRANSLATION
  BRA_snake2extra: "Brazilský obrněný prapor" # todo: NEW TRANSLATION
  BRA_snake2_desc: "Naše vojenské úsilí konečně začíná přinášet ovoce. V těchto chaotických dobách je mladá a hypermoderní brazilská armáda připravena udeřit kdekoliv bude potřeba. Brazílie nepotřebuje masivní síly, v Americe není přímá vojenská hrozba. Místo toho bychom měli občas ukázat svaly, pomáhat spojencům a významně přispět k světovému míru. Nechť naši nepřátelé okusí zuřivost brazilského obrněného ocelového valení!" # todo: NEW TRANSLATION
  BRA_alliedtrade: "Obchodní dohody se Spojenci" # todo: NEW TRANSLATION
  BRA_alliedtrade_desc: "Brazílie je geograficky nesmírně závislá na obchodu se Spojenci. Ideologicky má Brazílie bližší vztahy k zemím Osy, ale stát se příliš závislým na Ose by nás učinilo ekonomicky zranitelnými. To bychom neměli dopustit." # todo: NEW TRANSLATION
  BRA_axistrade_desc: "Státy Osy, zvláště Itálie, jsou ideologicky velmi blízké naší vlastní ideologii v Brazílii. Měli bychom zvýšit spolupráci se státy Osy. Nezklameme naše bratry v vytváření nového řádu!" # todo: NEW TRANSLATION
  BRA_axistrade: "Obchodní dohody s Osy" # todo: NEW TRANSLATION
  BRA_estadonovo: "Éra Vargase" # todo: NEW TRANSLATION
  BRA_estadonovo_desc: "Getúlio Vargas, náš velký vůdce, by měl obdržet větší pravomoci k řešení stále napjatější politické situace v Brazílii. Je čas vybudovat novou Brazílii, nový stát, 'O Estado Novo'. Komunistická hrozba je vždy přítomna. Vždy." # todo: NEW TRANSLATION
  BRA_communist: "Následky 'Intentona Communista'" # todo: NEW TRANSLATION
  BRA_communist_desc: "Minulý listopad se otravní komunisté pod Prestesem snažili uchvátit moc pokusem o puč v 'komunistickém pokusu'! Směšné! Naštěstí selhalo. Měli bychom začít zakazovat a čistit komunismus jednou provždy. Je také nutné dát Vargasu více moci v této záležitosti; záleží to silně na stabilitě národa." # todo: NEW TRANSLATION
  HOL_request_allied_favors2: "Bankéř odboje" # todo: NEW TRANSLATION
  HOL_request_allied_favors2_desc: "Walraven van Hall je absolutní hrdina. Spoluprací s Němci dokáže provádět rozsáhlé bankovní podvody, aby financoval odboj na pevnině. Měli bychom mu být velmi vděční." # todo: NEW TRANSLATION
  HOL_devour_desc: "Máme historii s Japonskem, vždy jsme měli přátelské vztahy s Jeho Veličenstvem a obchodovali s nimi na ostrově Dejima po dlouhá léta. Teď, když se obrátili proti nám, známe jejich slabiny. Nizozemský lev polkne Východící slunce. Je to nevyhnutelné." # todo: NEW TRANSLATION
  HOL_empire_desc: "Jediným důvodem, proč naše impérium stále existuje, je naše prominentní námořní pozice. Musíme udržet naši flotilu a více investovat do námořních sil, pokud chceme udržet kolonie a naši významnou pozici na světové scéně." # todo: NEW TRANSLATION
  HOL_doorman: "Doormanův pohled" # todo: NEW TRANSLATION
  HOL_suriname: "Rozvíjet Surinam" # todo: NEW TRANSLATION
  HOL_propaganda: "§OAKTIVUJE NIZOZEMSKÉ VÁLEČNÉ PROPAGANDNÍ KAMPANĚ.§!" # todo: NEW TRANSLATION
  NED: "Království Nizozemsko" # todo: NEW TRANSLATION
  HOL_curacao: "Rozvíjet Curaçao" # todo: NEW TRANSLATION
  HOL_invest: "Investovat na Západě" # todo: NEW TRANSLATION
  HOL_the_east_indies_war_machine2: "Bitva o Nizozemské Východní Indie" # todo: NEW TRANSLATION
  HOL_the_east_indies_war_machine2_desc: "Čas nastal, musíme bránit náš druhý domov do posledního muže, ať královna nás chrání a zahání Japonce. Doorman ochrání naše největší města naší respektovanou flotilou. Budeme však potřebovat více vybavení k obraně tohoto obrovského území." # todo: NEW TRANSLATION
  HOL_doorman_desc: "Měli bychom jít s námořním přístupem našeho admirála Karela Doormana. Flotila je páteří našeho impéria a jen námořnictvo na vysokém moři udrží naši páteř silnou. Vstaň znovu, nizozemské námořnictvo, rozevři svá křídla a udržuj impérium za každou cenu!" # todo: NEW TRANSLATION
  HOL_helfrich_desc: "'Malé, levné, ale vysoce efektivní' — takový je přístup admirála Conrada Helfricha. Ponorky poskytnou cenově dostupný způsob, jak udržet naše impérium v bezpečí. Nizozemské námořnictvo nebylo nikdy o velkých dělech; často to byla chytrá a efektivní flotila, pokračujme touto cestou." # todo: NEW TRANSLATION
  HOL_helfrich: "Helfrichův přístup" # todo: NEW TRANSLATION
  HOL_dewitt: "De Wittův přístup" # todo: NEW TRANSLATION
  HOL_dewitt_desc: "Johan de Witt vládl nad republikou během jejího ekonomického a kulturního vrcholu; upřednostnění námořnictva přineslo ohromné bohatství díky zvýšenému a lépe chráněnému obchodu. Jeho flotila chránila zemi, její bohatství a bohatou kulturu. Teď hrozí suverenitě a obchodu Japonci, Italové a Němci. Nechť okusí naše námořní dědictví..." # todo: NEW TRANSLATION
  HOL_ship_a_day_sinking_quotas2: "Mauritsův přístup" # todo: NEW TRANSLATION
  HOL_ship_a_day_sinking_quotas2_desc: "Maurits, člen rodu Orange, (spoluvládce) našeho státu po dlouhou dobu. Podle něj je důležité upřednostnit armádu, aby měla pevný vliv v pevninské Evropě. Námořnictvo má být účinné, ale ne velké ani drahé. To se zdá být správný přístup, protože musíme zastavit monstrum na souši." # todo: NEW TRANSLATION
  HOL_fokker2: "Upřednostnit Fokker" # todo: NEW TRANSLATION
  HOL_fokker2_desc: "Nastala doba, kdy Fokker potřebujeme nejvíce; bez jejich letadel nemáme šanci vyhrát tuto válku. Měli bychom Fokkeru dočasně poskytnout obrovské dotace, aby pomohl budovat náš válečný stroj. Nemáme jinou možnost." # todo: NEW TRANSLATION
  HOL_eendracht: "Concordia Res Parvae Crescunt" # todo: NEW TRANSLATION
  HOL_eendracht_desc: "Jednota činí sílu. Admirál De Ruyter je nejlepším příkladem této pravdy. V roce 1665, když jsme vedli válku proti mocnému královskému námořnictvu, dokázal úžasné věci díky odhodlanému národu stojícímu za ním. Vlastnil vše potřebné, což vedlo k porážce Královského námořnictva." # todo: NEW TRANSLATION
  HOL_shell: "Royal Dutch Shell" # todo: NEW TRANSLATION
  HOL_shell_desc: "Shell je jednou z našich největších státních společností a jednou z největších ropných společností na světě. Poptávka po ropě roste do nebes, což výrazně prospěje Shellu a tudíž i státu. Shell má velkou budoucnost před sebou." # todo: NEW TRANSLATION
  HOL_hoogoven: "Královské pece v Ijmuidenu" # todo: NEW TRANSLATION
  HOL_hoogoven_desc: "Naše průmyslová hrdost, Královské pece v Ijmuidenu. Je to jedna z největších oceláren v Evropě a má nesmírný význam pro vládu. Měli bychom rozšířit huť, aby vytvořila více pracovních míst v této ekonomické zkáze. Pokud budeme pokračovat v rozšiřování a stimulovat huť, vydrží desetiletí a bude pýchou národa." # todo: NEW TRANSLATION
  HOL_NS: "Nizozemské dráhy" # todo: NEW TRANSLATION
  HOL_NS_idea: "Nederlandse Spoorwegen" # todo: NEW TRANSLATION
  railway_company2: "Železniční společnost" # todo: NEW TRANSLATION
  FIN_salla: "Osvobodit Sallu!" # todo: NEW TRANSLATION
  FIN_salla_desc: "Finové ze Sally budou osvobozeni od sovětské okupace!" # todo: NEW TRANSLATION
  FIN_karelia: "Osvobodit Karjalа!" # todo: NEW TRANSLATION
  FIN_karelia_desc: "Finové z Karjalа budou osvobozeni od sovětské okupace!" # todo: NEW TRANSLATION
  HOL_NS_desc: "Měli bychom sloučit státní železniční společnosti do jedné jasné firmy. Nizozemské dráhy. Rozšíříme železniční sítě, abychom vytvořili více pracovních míst a zvýšili výrobu v naší oživující ekonomice; pokud dobře organizujeme tuto státní společnost, bude sloužit Nizozemcům po desetiletí. Každý bude moci využít naši sofistikovanou a dobře organizovanou železniční síť." # todo: NEW TRANSLATION
  ITA_messe_desc: "Po Messeho návratu z Etiopie trval na rozsáhlých armádních reformách. Dejme mu prostor uvést jeho plány v pohyb. První reforma: motorizace; naše armáda je stále silně založena na jízdě a ta rychle vychází z módy." # todo: NEW TRANSLATION
  ITA_messe: "Armádní reformy Messeho" # todo: NEW TRANSLATION
  ITA_naval_air_effort2: "Bombardéry Savoia-Marchetti" # todo: NEW TRANSLATION
  ITA_naval_air_effort2_desc: "Námořní bombardéry se staly nezbytnou součástí námořního boje; pokud chceme soupeřit s britskou silou ve Středomoří, potřebujeme tyto bombardéry." # todo: NEW TRANSLATION
  ITA_fascismo: "Per L'Ideologia Fascista" # todo: NEW TRANSLATION
  ITA_fascismo_desc: "Italii těmto demokratům nikdy nevzdáme, per l'ideologia fascista! (pro fašistickou ideologii!)" # todo: NEW TRANSLATION
  ITA_liberatori: "Ecco I 'Liberatori'" # todo: NEW TRANSLATION
  ITA_italian_highways2: "Aspoň jezdí včas!" # todo: NEW TRANSLATION
  ITA_italian_highways2_desc: "Sám Mussolini se postará o jízdní řád vlaků! Fašismus možná není řešení všeho, ale věci dělá! Jako třeba nechávat vlaky jezdit včas, úžasné!" # todo: NEW TRANSLATION
  ITA_liberatori_desc: "Poté, co jsme ztratili Čtvrté pobřeží, se hlavní cíl spojenců přesunul na italské pevniny. Bombardování italského území bude v budoucnu častější. Musíme se bránit proti leteckým útokům těch, kteří se nazývají 'liberatori'."
  ITA_bomber_effort2: "Bombardéry Filippo Zappata"
  ITA_bomber_effort2_desc: "Abychom konkurovali průmyslové síle spojenců, potřebujeme bombardéry, které co nejvíce naruší jejich průmyslovou převahu."
  ITA_jet_engine_effort2_desc: "Válka žene vojenský vývoj do extrému, přichází nová generace letadel."
  ITA_africa_campaign1: "Britannia Annhilianda"
  ITA_africa_campaign3: "Le Vedova di Italia"
  ITA_africa_campaign3_desc: "Dlouho jsme bojovali za fašistické ideály v této zapomenuté válce smáčené krví našich mladých mužů. Nemůžeme dovolit, aby spojenecké síly získaly zpět zemi, pro kterou jsme prolili tolik krve. Kdybychom ztratili naše území, bylo by to nevysvětlitelné pro všechny italské vdovy, které zadržovaly slzy tím, že našly klid v ideologické oběti svých manželů..."
  ITA_jet_engine_effort2: "Reggiane proudová letadla"
  ITA_defense_italia_desc: "Válka není nutně v prospěch Itálie, ale stále máme čas zvrátit situaci. Fortezza Italia je tady! Pokud chceme, aby to fungovalo, musíme co nejlépe střežit náš vzdušný prostor."
  ITA_africa_campaign1_desc: "Ještě jednou pochodujeme k úrodným zemím Egypta. Tentokrát tam nejsou kemetští obyvatelé Egypta, kteří čekají na dobytí. Tentokrát je to mnohem větší nepřítel, nepřítel, který překonává velikostí i Římskou říši — impérium Británie. Británie, která musí být zničena. Brittania Annihilanda."
  ITA_africa_campaign2: "Mare Nostrum"
  ITA_africa_campaign2_desc: "Novum nostrum Imperium Romanum nunc capiendum est, Imperator vivat, super nos regnet et regnent naves nostra nostra maria! (Naše Nová římská říše musí být nyní získána, ať císař žije, ať nad námi vládne a ať naše lodě vládnou našim mořím!)"
  ITA_steal_canada_mech_manufacturing_plan: "Ukrást kanadské mechanizované plány"
  ITA_steal_canada_mech_manufacturing_plan_desc: "Byli jsme informováni, že Kanaďané mají v držení levnější a stejně dobrý mechanizovaný návrh. Měli bychom poslat „velvyslance“, který kromě svých oficiálních povinností provede i jiné „vedlejší“ aktivity."
  ITA_learn_germany: "Poučit se od Panzerů"
  ITA_learn_germany_desc: "Naše tanky a obrněná taktika nejsou nejlepší na světě, zjistili jsme to během etiopské války, ale německé tanky a obrněná taktika jsou zdaleka nejvíce inovativní na světě; možná by nám někteří němečtí odborníci mohli přeletět z Berlína do Říma a pomoci... "
  ITA_modernized_artillery_at2: "Cannone da 47/32"
  ITA_modernized_artillery_at2_desc: "Naše protitankové modely jsou zastaralé a nebudou dostatečné k čelení moderním pancéřovým vozidlům."
  ITA_Expand_Roma: "Rozšířit Řím"
  ITA_Expand_Roma_desc: "Il Duce v posledních letech v mnoha ohledech výrazně zlepšil naše hlavní město. Řím je hrdostí, hlavním městem a brzy jedním z hlavních průmyslových center naší země!"
  ITA_armored_effort2: "Italské obrněné síly" # todo: NEW TRANSLATION
  ITA_armored_effort2_desc: "V Etiopii Messe zjistil, že obrněná technika bude budoucností pozemního boje. Poslechněme našeho nejuznávanějšího generála." # todo: NEW TRANSLATION
  ITA_Littorio_Classe: "Classe Littorio" # todo: NEW TRANSLATION
  ITA_Littorio_Classe_desc: "Třída Littorio je pojmenována podle líktora; líktor byl vysoko postavený služebník v římské říši, pověřený ochranou vyšších magistrátů a tedy ochráncem státu. RN Littorio, RN Vittorio Veneto, RN Roma a RN Impero jsou téměř hotové a také budou strážci státu. Tyto krásky se stanou Imperatores Marium (velitelé/císaři moří)." # todo: NEW TRANSLATION
  ITA_Aquila_Classe: "Classe Aquila" # todo: NEW TRANSLATION
  ITA_Aquila_Classe_desc: "Aquila byla po tisíciletí ikonou Říma. Tento letadlový křižník Aquila bude střežit naše moře stejně jako Aquila střežila Řím." # todo: NEW TRANSLATION
  ITA_blow_away: "Rozprášit je" # todo: NEW TRANSLATION
  ITA_blow_away_desc: "Dělostřelectvo nabývá na významu v moderních armádách; modernizace našeho dělostřelectva a vývoj bombardovacích taktik bude moudrým krokem." # todo: NEW TRANSLATION
  ITA_WW1_strategy: "Vybudovat na taktikách z 1. světové války" # todo: NEW TRANSLATION
  ITA_WW1_strategy_desc: "Rakousko-uherské bojiště z 1. světové války nebylo nejflexibilnější, ale aspoň bylo stabilní. Pokud tyto taktiky dále rozvineme, zajistíme, že fronty na italské straně se nezhroutí a možná se v budoucnu objeví prostor k postupu o pár metrů." # todo: NEW TRANSLATION
  ITA_equipment_modernization: "MAB-38" # todo: NEW TRANSLATION
  ITA_equipment_modernization_desc: "Moschetto Automatico Beretta Modello 1938 je nově navržený výkonný samopal vyvinutý našimi vojenskými výrobci. Zbraň je šestým smyslem vojáka. Pokud bude náš šestý smysl lepší než u nepřítele, získáme na bojišti výraznou výhodu." # todo: NEW TRANSLATION
  ITA_modernized_artillery2: "Cannone da 149/40 Modello 35" # todo: NEW TRANSLATION
  ITA_modernized_artillery2_desc: "Nový Cannone da 149/40 modello 35 bude jádrem italské armády a vzbudí strach v srdcích našich nepřátel." # todo: NEW TRANSLATION
  ITA_cheap_artillery: "Státní slevy u Breda" # todo: NEW TRANSLATION
  ITA_cheap_artillery_desc: "Breda, náš návrhář dělostřelectva, nám 'spontánně' poskytl výrobní slevy, jak příhodné!" # todo: NEW TRANSLATION
  ITA_strong_artillery: "Sofistikované rafinování oceli" # todo: NEW TRANSLATION
  ITA_strong_artillery_desc: "Objevili jsme nové způsoby rafinace oceli, které nám umožní vyrábět nové vysoce přesné dělostřelecké kusy. To nám výrazně pomůže v boji." # todo: NEW TRANSLATION
  ITA_cheap_equipment: "Hromadné rozmístění" # todo: NEW TRANSLATION
  ITA_cheap_equipment_desc: "Jemnou úpravou designu našich zbraní je můžeme vyrábět mnohem rychleji a efektivněji; nehody se ale mohou dít častěji — to vojákům neřekneme." # todo: NEW TRANSLATION
  ITA_superior_tactics: "Vývoj pokročilých taktik z 1. světové války" # todo: NEW TRANSLATION
  ITA_superior_tactics_desc: "Dlouho jsme studovali taktiky z 1. světové války a zlepšili je do použitelné podoby pro moderní válku." # todo: NEW TRANSLATION
  ITA_special_forcess: "Učit se od Arditi" # todo: NEW TRANSLATION
  ITA_special_forcess_desc: "Arditi (Odvážní) byli ve 1. světové válce obávané italské elitní speciální jednotky. Prokázali extrémní výdrž na bojišti a byli pýchou národa. Převzíme a zdokonalíme jejich taktiky, aby se z nich mohla učit i naše moderní speciální vojska." # todo: NEW TRANSLATION
  ITA_commence_mare: "Zahájit Mare Nostrum" # todo: NEW TRANSLATION
  ITA_commence_mare_desc: "Připravili jsme velký plán na dobytí všech středomořských ostrovů. Toto je první krok k Mare Nostrum!" # todo: NEW TRANSLATION
  ITA_arditi: "Obnovení Arditi" # todo: NEW TRANSLATION
  ITA_arditi_desc: "Přišla doba pro znovuzrození nejstrašnějších italských pozemních sil. Arditi budou v těchto temných časech vzkvétat, jak naznačuje jejich logo a dokládají jejich minulá vítězství. Modleme se za jejich vítězství..." # todo: NEW TRANSLATION
  ITA_improved_infantry_weapons: "MAB-38" # todo: NEW TRANSLATION
  ITA_soldati_classe: "Classe Camicia Nera" # todo: NEW TRANSLATION
  ITA_soldati_classe_desc: "Třída Soldati je lépe známá jako třída Camicia Nera, pojmenovaná po italské polovojenské organizaci Černých košil (Camicia Nera). Stejně jako při pochodu na Řím v roce 1922 budou Černé košile děsit masou, tentokrát v zuřivých námořních bitvách." # todo: NEW TRANSLATION
  ITA_condottieri_classe: "Classe Condottieri" # todo: NEW TRANSLATION
  ITA_condottieri_classe_desc: "Condottieri byli kapitáni obrovského množství žoldnéřských vojsk, které naše země měla před staletími. Condottieri tvořili most mezi generály a vojáky. Naše křižníky budou na námořním bojišti plnit stejnou roli." # todo: NEW TRANSLATION
  ITA_regia_marina: "Cantieri Ruiniti dell'Adriatico" # todo: NEW TRANSLATION
  ITA_regia_marina_desc: "Cantieri Ruiniti dell'Adriatico bude naším královským námořním výrobcem pro znovuzrozené fašistické Regia Marina. Bude páteří našeho středomořského těla!" # todo: NEW TRANSLATION
  ITA_yamato: "Campioniho mise do Japonska" # todo: NEW TRANSLATION
  ITA_yamato_desc: "Japonci postavili největší bitevní loď, jakou lidstvo kdy vidělo. Musíme poslat Campioniho k Yamamotovi za účelem námořní technologické výměny. Pro Regia Marina je nezbytné naučit se stavět bitevní lodě tak efektivně jako Japonci — naše přežití na tom závisí..." # todo: NEW TRANSLATION
  ITA_Rule_Supreme: "Brittania Caedetur" # todo: NEW TRANSLATION
  ITA_Rule_Supreme_desc: "Královské námořnictvo, říkáte? Dnes už pohádka pro děti. Brittania caedetur! (Británie bude zmasakrována!)" # todo: NEW TRANSLATION
  ITA_san_marco_brigade: "Brigata Marina San Marco" # todo: NEW TRANSLATION
  ITA_san_marco_brigade_desc: "Brigata Marina San Marco, vzniklá v roce 1550, je jedním z nejstarších námořních sborů na světě. Dlouhé tradice v kombinaci s modernizací vytvoří jednu z nejstrašidelnějších speciálních jednotek na světě." # todo: NEW TRANSLATION
  ITA_marconi_classe: "Classe Marconi" # todo: NEW TRANSLATION
  ITA_marconi_classe_desc: "Guglielmo Marconi byl velký italský vědec. On přivedl rádio na svět. Revoluční! Jeho známý vynález jistě pomůže naší nové ničivé řadě ponorek při útocích na konvoje." # todo: NEW TRANSLATION
  ITA_Challenge_The_Royal_Navy: "Itálie vs. Británie" # todo: NEW TRANSLATION
  ITA_Challenge_The_Royal_Navy_desc: "Italia turrita, ochránkyně našeho národa, vyzvala paní Brittanii, aby konečně vyřešila středomořské otázky. Proto hledá naši podporu, zuřivost a věrnost při dokončení tohoto italského společného cíle." # todo: NEW TRANSLATION
  Roman_Empire_fascism: "Novum Imperium Romanum" # todo: NEW TRANSLATION
  Roman_Empire_fascism_DEF: "Novum Imperium Romanum" # todo: NEW TRANSLATION
  ITA_form_rome: "Reformate Imperium Romanum" # todo: NEW TRANSLATION
  Imperator_Romanorum: "Imperator Romanorum" # todo: NEW TRANSLATION
  ITA_annex_syria: "Anexovat Sýrii" # todo: NEW TRANSLATION
  ITA_Italian_Development: "Soustředit se na Itálii" # todo: NEW TRANSLATION
  ITA_Italian_Development_desc: "Mít kolonie je fajn, ale Itálie je páteří našeho impéria, pojďme dále budovat naši domovinu." # todo: NEW TRANSLATION
  ITA_National_Projects: "Národní projekty"
  ITA_National_Projects_desc: "Nové národní stavební projekty v neoklasicistním stylu oživily italského stavebního ducha minulosti. Stavět! Stavět! Stavět!"
  ENG_tfv: "Společně za vítězstvím!"
  ENG_tfv_desc: "Pouze díky společnému potu a krvi můžeme porazit Němce."
  ENG_dresden: "Bombardování oblasti"
  ENG_dresden_desc: "'Pokud Rusko dokáže zadržet Německo na zemi, pochybuji, zda Německo vydrží 12 nebo 18 měsíců nepřetržitého, intenzivního a zvýšeného bombardování, které musí ovlivnit její válečnou výrobu, sílu odolnosti, průmysl a vůli vzdorovat (čímž myslím morálku).' - Sir John Edward Singleton"
  CRO_ivan_orsanic: "Ivan Orsanic"
  CRO_milan_budak: "Milan Budak"
  CRO_vladimir_nazor: "Vladimir Nazor"
  CRO_bozidar_magovac: "Božidar Magovac"
  CRO_andrija_hebrang: "Andrija Hebrang" # todo: NEW TRANSLATION
  CRO_august_kosutic: "August Košutić" # todo: NEW TRANSLATION
  CRO_mladen_lorkovic: "Mladen Lorković" # todo: NEW TRANSLATION
  CRO_ante_vokic: "Ante Vokić" # todo: NEW TRANSLATION
  CRO_vladko_macek: "Vladko Maček" # todo: NEW TRANSLATION
  CRO_vjekoslav_vrancic: "Vjekoslav Vrančić" # todo: NEW TRANSLATION
  HOL_marines: "Korps Mariniers" # todo: NEW TRANSLATION
  HOL_marines_desc: "Náš námořní sbor byl založen v roce 1665, v době našeho Zlatého věku. Okamžitě provedli nájezd na Medway a proslavili se po celé Evropě. Nechť tentýž strach udeří na Ose znovu." # todo: NEW TRANSLATION
  HOL_secret_staff_talks2: "Jednotné velení Beneluxu" # todo: NEW TRANSLATION
  HOL_secret_staff_talks2_desc: "Světové napětí stoupá děsivě vysoko. Těsná vojenská spolupráce s našimi nejbližšími spojenci, Belgií a Lucemburskem, bude nutná, pokud chceme čelit stále rostoucí Ose." # todo: NEW TRANSLATION
  HOL_light_tanks_for_the_colonies2: "Nizozemský Blitzkrieg" # todo: NEW TRANSLATION
  HOL_light_tanks_for_the_colonies2_desc: "Naši východní sousedé, Němci, vyvinuli díky inteligentnímu využití obrněné techniky vysoce děsivou, ale moderní pozemní armádu. Měli bychom je trochu napodobit, víte, germánští bratři a tak. Pouze naše vlastní železná vlna může zastavit tu jejich. Obrněná technika by byla také velmi užitečná pro rozlehlé území naší východní kolonie." # todo: NEW TRANSLATION
  HOL_lessons_from_the_low_countries2: "Polderové partyzánství" # todo: NEW TRANSLATION
  HOL_lessons_from_the_low_countries2_desc: "Naše pobřežní a močálovité oblasti byly v průběhu staletí prokletím i požehnáním. Někdy nás moře zradilo, jindy nás ochránilo. Přímořská linie nás několikrát ochránila. Naše zkušenosti s tímto terénem by měly být v našem prospěchu při boji proti cizí hrozbě." # todo: NEW TRANSLATION
  HOL_liberation2: "Bevrijding!" # todo: NEW TRANSLATION
  HOL_liberation2_desc: "God zegene het Vaderland." # todo: NEW TRANSLATION
  HOL_hussars: "Koninklijke Huzaren" # todo: NEW TRANSLATION
  HOL_hussars_desc: "Pluk Huzaren Boreel je považován za jednu z nejelitnějších husarských jednotek na světě. V těchto nejistých časech potřebujeme naše dobře vycvičené elitní husary víc než kdy dřív." # todo: NEW TRANSLATION
  HOL_anti_tank_guns_for_the_continent2: "Zastavte železnou vlnu" # todo: NEW TRANSLATION
  HOL_anti_tank_guns_for_the_continent2_desc: "Nebudeme schopni postavit vysoce moderní obrněnou armádu za pár měsíců; tento proces by trval roky. Nemáme ten čas. Když Říše klepe na naše východní hranice, měli bychom investovat do protitankových děl — jsou levná, efektivní a nevyžadují roky dalšího vývoje, než budou použitelná." # todo: NEW TRANSLATION
  HOL_production_under_license2: "Uplatnit dluh z obchodu se zbraněmi z 1770" # todo: NEW TRANSLATION
  HOL_production_under_license2_desc: "Během americké revoluce naše země rebelům hodně pomohla dodáním vojenského materiálu. Bylo by skvělé, kdyby nám USA nyní pomohly dodáním vojenského materiálu. Jeden z našich nejstarších spojenců by snad s tím souhlasil." # todo: NEW TRANSLATION
  HOL_appoint_new_supreme_commander2: "Investice do KNIL" # todo: NEW TRANSLATION
  HOL_appoint_new_supreme_commander2_desc: "KNIL, Královská armáda Nizozemské východní Indie, by potřebovala investice. Agresivní chování Vycházejícího slunce může být potenciální hrozbou pro naše impérium, což se nám samozřejmě nelíbí. Pokud Vycházející slunce plánuje ohrožující kroky v budoucnu, musíme být schopni okamžitě protiútočit a rozdrtit je pod našimi botami." # todo: NEW TRANSLATION
  HOL_modernize_our_infantry_equipment2: "Modernizovat nizozemskou Mannlicherku" # todo: NEW TRANSLATION
  HOL_modernize_our_infantry_equipment2_desc: "Víme, že naše výzbroj není v současném stavu konkurenceschopná vůči modernizovaným armádám Evropy. Měli bychom vylepšit vojenské vybavení, zejména pěchotní zbraně — německé pušky z 1. světové války. Nebude to dlouho trvat, je to relativně levné a vysoce účinné. Měli bychom být schopni přeměnit naši pěchotu relativně rychle na moderní pozemní síly." # todo: NEW TRANSLATION
  HOL_krijgsmacht: "Nederlandsche Krijgsmacht" # todo: NEW TRANSLATION
  HOL_krijgsmacht_desc: "De Koninklijke Marine, Landmacht a Luchtmacht — to jsou oficiální složky našich národních ozbrojených sil. Se stoupajícím světovým napětím bychom měli po desetiletích zanedbávání opět více investovat do našich ozbrojených sil. Naše přežití na tom závisí." # todo: NEW TRANSLATION
  HOL_zevenprovincien: "Zeven Provinciën" # todo: NEW TRANSLATION
  HOL_zevenprovincien_desc: "'Sijn tot noch toe door Godes genadigen zegen met de gewenschte successen heerlijck gecroont,' napsal Cornelis de Witt poté, co on a admirál De Ruyter obsadili Royal Charles v Chathamu při pověstné operaci na palubě Zeven Provinciën; od té doby je Zeven Provinciën věčnou pýchou flotily. Nechme tomu tak." # todo: NEW TRANSLATION
  HOL_fokker1: "Přidělit Fokkerovi" # todo: NEW TRANSLATION
  HOL_fokker1_desc: "Fokker je naše nejúspěšnější letecká společnost díky vysoce kvalitním masovým prodejům v 1. světové válce jako neutrální strana. Jejich vojenská letadla byla používána po celém světě, i když občas zapomínají na své kořeny. Utáhněme naše vazby s Fokkerem." # todo: NEW TRANSLATION
  JAP_strike_on_the_northern_resource_area: "Útok na severní oblast surovin" # todo: NEW TRANSLATION
  JAP_strike_on_the_northern_resource_area_desc: "Naše plány byly úspěšné. Získané zdroje ale nestačí na udržení válečného průmyslu. Musíme následovat doktrínu, kterou armáda upřednostňuje, a udeřit na sever do Sovětského svazu." # todo: NEW TRANSLATION
  CRO_tomislav_II: "Tomislav II" # todo: NEW TRANSLATION
  CRO_tomislav_II_desc: "Princ Aimone ze Savojských, bratranec italského krále Viktora Emanuela III., přijal chorvatskou korunu. Aby toto událost označil jako obnovení chorvatské monarchie, zvolil si jméno Tomislav II., nástupce Tomislava, zakladatele Chorvatska." # todo: NEW TRANSLATION
  JAP_armored_divisions2: "Tanky Chi-Ri" # todo: NEW TRANSLATION
  JAP_armored_divisions2_desc: "Zahájíme výzkum moderních středních tanků." # todo: NEW TRANSLATION
  cro_diplomacy_focus: "Chorvatská diplomacie" # todo: NEW TRANSLATION
  CRO_officer_training: "Výcvik důstojníků" # todo: NEW TRANSLATION
  CRO_officer_training_desc: "Přes rostoucí možnosti vzdušného a námořního boje zůstává pozemní boj klíčem v budoucích válkách. Přípravou se vyhneme znovuprožití pekla zákopů." # todo: NEW TRANSLATION
  CRO_improve_conscripts_equipment: "Zlepšit výzbroj branců" # todo: NEW TRANSLATION
  CRO_improve_conscripts_equipment_desc: "Limity toho, co může pěchota nést, se neustále posouvají. Budeme se soustředit na to, aby naše jednotky měly nejlepší dostupné vybavení." # todo: NEW TRANSLATION
  CRO_motorization_effort: "Motorová podpora" # todo: NEW TRANSLATION
  CRO_motorization_effort_desc: "Mobilita a ochrana jsou zásadní, aby se pěchota mohla bezpečně dostat do boje a z něj ven. Zaměření na tento vývoj nám umožní jednat rychle." # todo: NEW TRANSLATION
  CRO_army_maneuvers: "Armádní manévry" # todo: NEW TRANSLATION
  CRO_army_maneuvers_desc: "Abychom dostali naši armádu do formy, musí proběhnout nové manévry. Zkušenosti nepochybně přinesou nové poznatky o moderním válčení." # todo: NEW TRANSLATION
  CRO_supremacy_of_offense: "Nadvláda útoku" # todo: NEW TRANSLATION
  CRO_supremacy_of_offense_desc: "Útočná činnost je klíčem k vítězství a proto musí určovat naši celkovou strategii a vývoj nových doktrín." # todo: NEW TRANSLATION
  CRO_supremacy_of_defense: "Nadvláda obrany" # todo: NEW TRANSLATION
  CRO_supremacy_of_defense_desc: "Obklopeni nepřáteli ze všech stran musíme vydržet dost dlouho, aby nás spojenci odlehčili. Vývoj nových vojenských doktrín musí být zaměřen na obranu naší vlasti." # todo: NEW TRANSLATION
  CRO_artillery_regiments: "Dělostřelecké pluky" # todo: NEW TRANSLATION
  CRO_artillery_regiments_desc: "Zavedením silných dělostřeleckých pluků do našich divizí se jejich celková bojová síla výrazně zvýší." # todo: NEW TRANSLATION
  CRO_domestic_artillery_production: "Domácí výroba dělostřelectva" # todo: NEW TRANSLATION
  CRO_domestic_artillery_production_desc: "Podpořením vývoje moderních domácích dělostřeleckých modelů můžeme zajistit, že naše síly budou mít nejlepší palebnou podporu, kterou jim můžeme poskytnout." # todo: NEW TRANSLATION
  CRO_anti_tank_defenses: "Protitanková obrana" # todo: NEW TRANSLATION
  CRO_anti_tank_defenses_desc: "Jak tanky zaujaly centrální roli v moderním boji, jsou zapotřebí nové vývoje v oblasti protitankových děl, které umožní naší pěchotě zlikvidovat tyto obrněné behemoty." # todo: NEW TRANSLATION
  CRO_mountain_brigades: "Horské brigády" # todo: NEW TRANSLATION
  CRO_mountain_brigades_desc: "Velké části naší země jsou hornaté, což vyžaduje vytvoření speciálních brigád specializovaných na boj v tomto terénu." # todo: NEW TRANSLATION
  CRO_tank_conversions: "Přestavby tanků" # todo: NEW TRANSLATION
  CRO_tank_conversions_desc: "I když nyní můžeme potřebovat tanky, příští měsíc můžeme potřebovat samohybné dělostřelectvo nebo tankové niče na stejném podvozku. Naše obrněné vybavení musí zůstat flexibilní a přizpůsobivé našim aktuálním potřebám." # todo: NEW TRANSLATION
  CRO_modern_tanks: "Moderní tanky" # todo: NEW TRANSLATION
  CRO_modern_tanks_desc: "Díky přidání hlavní výzbroje velkého kalibru se obrněná technologie vyvinula daleko za hranice pouhého bezpečného přesunu sil z bodu A do bodu B. Musíme vyvinout vlastní verzi moderních tanků, abychom mohli konkurovat sousedům." # todo: NEW TRANSLATION
  CRO_Science: "Věda" # todo: NEW TRANSLATION
  CRO_Science_desc: "Musíme investovat do výzkumu" # todo: NEW TRANSLATION
  CRO_small_arms: "Nahradit M95" # todo: NEW TRANSLATION
  CRO_small_arms_desc: "Musíme nahradit naši zastaralou pěchotní pušku." # todo: NEW TRANSLATION
  CRO_armored_cavalry: "Mechanizovaná podpora" # todo: NEW TRANSLATION
  CRO_armored_cavalry_desc: "Pokud obrníme naše motorované formace, můžeme snížit účinky palby ručních zbraní." # todo: NEW TRANSLATION
  CRO_equipment_effort_2: "Snaha o vybavení II" # todo: NEW TRANSLATION
  CRO_equipment_effort_2_desc: "Budeme pokračovat v našem úsilí zajistit, aby naše pěchota a podpůrné jednotky měly nejlepší možné vybavení své doby." # todo: NEW TRANSLATION
  CRO_mechanization_effort: "Snahy o mechanizaci" # todo: NEW TRANSLATION
  CRO_mechanization_effort_desc: "Přehodnocením možností motorizované pěchoty můžeme posunout hranice toho, jaká vozidla lze dnes postavit." # todo: NEW TRANSLATION
  CRO_doctrine_effort_2: "Snaha o doktrínu II" # todo: NEW TRANSLATION
  CRO_doctrine_effort_2_desc: "Bojiště se změnilo nejen v meziválečných letech, ale v průběhu nedávných konfliktů. Musíme neustále přehodnocovat naše doktríny, aby tomu odpovídaly." # todo: NEW TRANSLATION
  CRO_equipment_effort_3: "Snaha o vybavení III" # todo: NEW TRANSLATION
  CRO_equipment_effort_3_desc: "Místo napodobování nebo nákupu zahraničního vybavení bychom měli usilovat o to stát se světově vedoucími ve výzbroji pěchoty." # todo: NEW TRANSLATION
  CRO_armor_effort: "Snahy o obrněnictví" # todo: NEW TRANSLATION
  CRO_armor_effort_desc: "Uplatněním toho, co jsme se naučili mechanizací pěchoty, můžeme zlepšit i naše obrněné vozidlo." # todo: NEW TRANSLATION
  CRO_special_forces: "Speciální jednotky" # todo: NEW TRANSLATION
  CRO_special_forces_desc: "Potřebujeme elitní síly; horské jednotky a úderné jednotky by měly být naší prioritou." # todo: NEW TRANSLATION
  CRO_aviation_effort: "Snahy v letectví" # todo: NEW TRANSLATION
  CRO_aviation_effort_tt: "Nedostatek stavebních slotů pro §Yleteckou základnu§!" # todo: NEW TRANSLATION
  CRO_aviation_effort_desc: "Nikde nejsou technologické pokroky rychlejší než v leteckém boji. Letecké síly jsou oblastí, kterou musí každá moderní země ovládnout." # todo: NEW TRANSLATION
  CRO_fighter_focus: "Zaměření na stíhače" # todo: NEW TRANSLATION
  CRO_fighter_focus_desc: "Ještě jsme neviděli konec vzdušných soubojů z Velké války. Držení náskoku ve vývoji stíhacích letounů nám poskytne výhodu v budoucnu." # todo: NEW TRANSLATION
  CRO_bomber_focus: "Zaměření na bombardéry" # todo: NEW TRANSLATION
  CRO_bomber_focus_desc: "Až lidé budoucnosti budou mluvit o hrůzách dnešních válek, bude prominentní déšť ohně z nebe. Uděláme vše, aby tyto příběhy vyprávěli naši nepřátelé." # todo: NEW TRANSLATION
  CRO_aviation_effort_2: "Snahy v letectví II" # todo: NEW TRANSLATION
  CRO_aviation_effort_2_desc: "Další pokroky v letectví budou nezbytné pro dobrou integraci našeho letectva s ostatními složkami ozbrojených sil." # todo: NEW TRANSLATION
  CRO_CAS_effort: "Úsilí o blízkou leteckou podporu" # todo: NEW TRANSLATION
  CRO_CAS_effort_desc: "Moderní armáda potřebuje podporu vozidel nejen na zemi, ale i ve vzduchu." # todo: NEW TRANSLATION
  CRO_rocket_effort: "Úsilí o rakety" # todo: NEW TRANSLATION
  CRO_rocket_effort_desc: "Raketové a proudové motory umožňují bezprecedentní rychlosti jak u bezpilotních, tak pilotovaných plavidel. Průkopnictví v těchto technologiích nám umožní překvapit nepřítele." # todo: NEW TRANSLATION
  CRO_NAV_effort: "Úsilí v námořnictvu" # todo: NEW TRANSLATION
  CRO_NAV_effort_desc: "Stejně jako se nová námořní válka částečně odehrává pod hladinou, část probíhá i ve vzduchu nad vodami." # todo: NEW TRANSLATION
  CRO_naval_effort: "Úsilí o námořnictvo" # todo: NEW TRANSLATION
  CRO_naval_effort_tt: "Nedostatek stavebních slotů pro §Ynámořní loděnice§!" # todo: NEW TRANSLATION
  CRO_naval_effort_desc: "Rozšíření našeho námořnictva by mělo být naší první prioritou. Přidělte všechny dostupné zdroje do nových loděnic a výzkumu lehkých hladinových plavidel." # todo: NEW TRANSLATION
  CRO_flexible_navy: "Flexibilní námořnictvo" # todo: NEW TRANSLATION
  CRO_flexible_navy_desc: "Převrat v námořní válce s ohledem na pokrok v ponorkové technologii nám umožní účinně útočit na nepřátelské konvoje." # todo: NEW TRANSLATION
  CRO_large_navy: "Velké námořnictvo" # todo: NEW TRANSLATION
  CRO_large_navy_desc: "Přizpůsobení naší námořní doktríny pro velká plavidla a zajištění bezpečí obchodních konvojů nás naučí mnoho o tom, jaké lodě potřebujeme." # todo: NEW TRANSLATION
  CRO_submarine_effort: "Úsilí o ponorky" # todo: NEW TRANSLATION
  CRO_submarine_effort_desc: "Ponorková válka je nejzajímavějším námořním vývojem od vynálezu torpédového člunu. Měli bychom nejen chránit před ponorkami, ale i používat je proti nepřátelskému obchodnímu loďstvu." # todo: NEW TRANSLATION
  CRO_cruiser_effort: "Úsilí o křižníky" # todo: NEW TRANSLATION
  CRO_cruiser_effort_desc: "Než se pustíme do pokročilého výzkumu bitevních lodí, menší křižníky je nutné nahradit." # todo: NEW TRANSLATION
  CRO_destroyer_effort: "Úsilí o torpédoborce" # todo: NEW TRANSLATION
  CRO_destroyer_effort_desc: "Studiem konstrukce a strategického využití ponorek jsme se naučili, jak těmto strategiím čelit. Torpédoborce budou pro to klíčové." # todo: NEW TRANSLATION
  CRO_capital_ships_effort: "Úsilí o hlavní plavidla" # todo: NEW TRANSLATION
  CRO_capital_ships_effort_desc: "Národ s největším počtem bitevních lodí bude vládnout oceánům. Bitevní lodě a letadlové lodě představují staré a nové v námořní převaze." # todo: NEW TRANSLATION
  CRO_industrial_effort: "Průmyslové úsilí" # todo: NEW TRANSLATION
  CRO_industrial_effort_desc: "Soustřeďme veškeré politické úsilí na budování civilního průmyslu v rámci velkého skoku vpřed." # todo: NEW TRANSLATION
  CRO_industrial_effort_2: "Průmyslové úsilí II" # todo: NEW TRANSLATION
  CRO_industrial_effort_2_desc: "S železnou vůlí a neúprosnou pracovitostí můžeme mobilizovat lidi do dalšího velkého průmyslového úsilí." # todo: NEW TRANSLATION
  CRO_construction_effort_tt: "Nedostatek stavebních slotů pro §Ycivilní továrny§!" # todo: NEW TRANSLATION
  CRO_construction_effort: "Úsilí o výstavbu" # todo: NEW TRANSLATION
  CRO_construction_effort_desc: "Úsilí o výstavbu" # todo: NEW TRANSLATION
  CRO_production_effort: "Výrobní úsilí" # todo: NEW TRANSLATION
  CRO_production_effort_tt: "Nedostatek stavebních slotů pro §Yvojenské továrny§!" # todo: NEW TRANSLATION
  CRO_production_effort_desc: "Pokud dokážeš postavit traktory, dokážeš postavit tanky! Nesmíme dovolit, aby naše vojenská výrobní kapacita zaostávala." # todo: NEW TRANSLATION
  CRO_construction_effort_2: "Úsilí o výstavbu" # todo: NEW TRANSLATION
  CRO_construction_effort_2_desc: "Pokračující rozšiřování našich továren nám umožní urychlit výrobu zboží pro obchod a další stavební snahy." # todo: NEW TRANSLATION
  CRO_production_effort_2: "Podpora těžkého vozidlového průmyslu" # todo: NEW TRANSLATION
  CRO_production_effort_2_desc: "Jako jeden z hlavních evropských přístavů jsou Antverpy ve výhodné pozici pro rozvoj průmyslu orientovaného na export." # todo: NEW TRANSLATION
  CRO_production_effort_3: "Podpora výrobců obrněné techniky" # todo: NEW TRANSLATION
  CRO_production_effort_3_desc: "Pokračující snahy o rozšíření našich vojenských továren jsou nezbytné pro uspokojení poptávky po novém vybavení." # todo: NEW TRANSLATION
  CRO_infrastructure_effort: "Úsilí o infrastrukturu" # todo: NEW TRANSLATION
  CRO_infrastructure_effort_desc: "Země bez řádné infrastruktury nemůže uskutečňovat náročné projekty nebo stavby." # todo: NEW TRANSLATION
  CRO_infrastructure_effort_tt: "Nedostatek stavebních slotů pro §Yinfrastrukturu§!" # todo: NEW TRANSLATION
  CRO_coal_mines: "Plně vytěžit uhelné doly v Limburgu" # todo: NEW TRANSLATION
  CRO_coal_mines_desc: "Uhlí je naším hlavním zdrojem a musíme maximalizovat jeho těžbu." # todo: NEW TRANSLATION
  CRO_synth_oil_effort_tt: "Nedostatek stavebních slotů pro §Ysintetickou rafinerii§!" # todo: NEW TRANSLATION
  CRO_infrastructure_effort_2: "Úsilí o infrastrukturu II" # todo: NEW TRANSLATION
  CRO_infrastructure_effort_2_desc: "Další rozšíření infrastruktury umožní dopravu a komunikace potřebné pro vysoce technologické tajné projekty." # todo: NEW TRANSLATION
  CRO_construction_effort_3: "Průmyslové úsilí III" # todo: NEW TRANSLATION
  CRO_construction_effort_3_desc: "Rozšíření naší infrastrukturní sítě významně zlepšilo naši kapacitu pro výstavbu." # todo: NEW TRANSLATION
  CRO_rockets: "Německé rakety" # todo: NEW TRANSLATION
  CRO_rockets_desc: "pozvat německé výzkumníky" # todo: NEW TRANSLATION
  CRO_extra_tech_slot: "Extra výzkumné místo" # todo: NEW TRANSLATION
  CRO_extra_tech_slot_desc: "Náš průmyslový rozvoj a další nedávné pokroky nám mohou umožnit vést více výzkumu současně." # todo: NEW TRANSLATION
  CRO_extra_tech_slot_2: "Extra výzkumné místo II" # todo: NEW TRANSLATION
  CRO_extra_tech_slot_2_desc: "Rychlá industrializace naší země otevřela nové příležitosti ve výzkumu a vývoji, které bychom měli využít." # todo: NEW TRANSLATION
  CRO_technology_sharing: "Sdílení technologií" # todo: NEW TRANSLATION
  CRO_technology_sharing_desc: "Sdílením technologických pokroků s našimi spojenci bude celá naše frakce schopna provádět válečný výzkum efektivněji." # todo: NEW TRANSLATION
  CRO_secret_weapons: "Tajné zbraně" # todo: NEW TRANSLATION
  CRO_secret_weapons_desc: "Je lákavé vložit veškeré volné zdroje do vývoje tanků a letadel, ale tajemství vítězství ve válce leží v zcela nových oblastech vědy: elektronice, raketové technice a jaderném výzkumu." # todo: NEW TRANSLATION
  CRO_political_effort: "Náš čas udeřit" # todo: NEW TRANSLATION
  CRO_political_effort_desc: "VSTÁVEJTE!" # todo: NEW TRANSLATION
  CRO_collectivist_ethos: "Posílit syndikáty" # todo: NEW TRANSLATION
  CRO_collectivist_ethos_desc: "Naši nepřátelé mohou dělit a ovládat menší národy, ale náš lid zůstane jednotný. Všichni za jednoho a jeden za všechny." # todo: NEW TRANSLATION
  CRO_liberty_ethos: "Demokratický konsenzus" # todo: NEW TRANSLATION
  CRO_liberty_ethos_desc: "V době ideologických fanatiků, kteří se snaží udušit lidského ducha, budeme chránit individuální svobody a svobodu." # todo: NEW TRANSLATION
  CRO_militarism_desc: "Ti, kdo považují armádu za nutné zlo, jsou odsouzeni k váhání před válkou. Vryjeme militarismus do naší kultury, abychom se stali národem vojáků." # todo: NEW TRANSLATION
  CRO_political_correctness: "Politická korektnost" # todo: NEW TRANSLATION
  CRO_political_correctness_desc: "Lidé s mírně kontroverzními či jinak trapnými názory se zdají mít obavy, že proti nim existuje rozsáhlé spiknutí. To se zdá být výborný nápad." # todo: NEW TRANSLATION
  CRO_neutrality_focus: "Zaměření na neutralitu" # todo: NEW TRANSLATION
  CRO_neutrality_focus_desc: "Zatímco jiní mohou tvrdit, že rozhodnout se na straně vyžaduje statečnost a moudrost, my víme, že větší odvahu vyžaduje odmítnout." # todo: NEW TRANSLATION
  CRO_interventionism_focus: "Zaměření na intervencionismus" # todo: NEW TRANSLATION
  CRO_interventionism_focus_desc: "Ceníme si svobody všech lidí, nejen našich vlastních občanů. Pokud zabránění tyranii znamená válku, ať tak je." # todo: NEW TRANSLATION
  CRO_military_youth: "Ustaška Mladež" # todo: NEW TRANSLATION
  CRO_military_youth_desc: "Organizace pro podporu disciplíny a politického vzdělávání mládeže v naší zemi podpoří včasnou loajalitu a obětavost." # todo: NEW TRANSLATION
  CRO_deterrence: "Odstrašení" # todo: NEW TRANSLATION
  CRO_deterrence_desc: "Samostatně stojící armáda z války zřídka těží. Naštěstí víme, že nejlepší obranou je ta, kterou je všem natolik známa, že ji nemusíme použít." # todo: NEW TRANSLATION
  CRO_volunteer_corps: "Dobrovolnický sbor" # todo: NEW TRANSLATION
  CRO_volunteer_corps_desc: "Nutit náš lid umírat za ideály svobody by byla ironie, ale vytvořit prostředky pro ty, kdo chtějí pomáhat v zahraničí, nikoliv." # todo: NEW TRANSLATION
  CRO_paramilitarism: "Paramilitarismus" # todo: NEW TRANSLATION
  CRO_paramilitarism_desc: "Vojenské principy mají uplatnění i mimo armádu. Vytvořením semivojenských jednotek jako doplněk ozbrojených sil získá více lidí vojenské školení." # todo: NEW TRANSLATION
  CRO_indoctrination_focus: "Indoktrinace" # todo: NEW TRANSLATION
  CRO_indoctrination_focus_desc: "Jakmile ustanovíme naši ideologii jako založenou na pravdě, může být vyučována jako pravda. Školství a média musí tuto lekci odrážet." # todo: NEW TRANSLATION
  CRO_foreign_expeditions: "Zahraniční expedice" # todo: NEW TRANSLATION
  CRO_foreign_expeditions_desc: "Když jsou naši nepřátelé připraveni zasahovat v dalekých konfliktech ve jménu svých ideálů, musíme být připraveni totéž udělat pro ty naše." # todo: NEW TRANSLATION
  CRO_why_we_fight: "Proč bojujeme" # todo: NEW TRANSLATION
  CRO_why_we_fight_effect: "Pokud nebudeme mít ducha §Yneutralní zahraniční politiky§!, budeme schopni vytvářet frakce.\n" # todo: NEW TRANSLATION
  CRO_why_we_fight_desc: "Svět se stává čím dál nebezpečnějším. Náš lid musí vidět zvěrstva páchána těmi, kdo touží po moci. Je čas svolat lidi k naší věci a zajistit, aby byli všichni připraveni bojovat za naši svobodu." # todo: NEW TRANSLATION
  CRO_political_commissars: "Politickí komisaři" # todo: NEW TRANSLATION
  CRO_political_commissars_desc: "Abychom zajistili, že naše politiky budou dodržovány v praxi, zavedeme politicky jmenované úředníky do vojenských řad." # todo: NEW TRANSLATION
  CRO_internationalism_focus: "Zaměření na internacionalismus" # todo: NEW TRANSLATION
  CRO_internationalism_focus_desc: "Ideologie nezná hranice. Jiný národ se může nazývat suverénním, ale naše přesvědčení stojí nad takovými tvrzeními." # todo: NEW TRANSLATION
  CRO_nationalism_focus: "Národní znovuzrození" # todo: NEW TRANSLATION
  CRO_clergy: "Integrovat duchovenstvo" # todo: NEW TRANSLATION
  CRO_clergy_desc: "Legitimizujeme naše vládnutí začleněním katolické církve do vlády." # todo: NEW TRANSLATION
  CRO_enforce_pavelic_rule: "Prosadit vládu Paveliće" # todo: NEW TRANSLATION
  CRO_enforce_pavelic_rule_desc: "Nyní, když Ustaše konečně převzala moc, můžeme zajistit, aby byl náš drahý vůdce, podlavník Ante Pavelić, uznán za právoplatného vládce naší země všemi věrnými [CRO.GetAdjective]y." # todo: NEW TRANSLATION
  CRO_militarism: "Zřídit domobranu" # todo: NEW TRANSLATION
  CRO_nationalism_focus_desc: "Náš národ je jedinečný a naše politické úspěchy se mohly stát jen zde. Musíme za ně bojovat za každou cenu." # todo: NEW TRANSLATION
  CRO_ideological_fanaticism_communism: "Ideologický fanatismus" # todo: NEW TRANSLATION
  CRO_ideological_fanaticism_ustasha: "Ideologický fanatismus" # todo: NEW TRANSLATION
  CRO_ideological_fanaticism_desc: "Naše politicky ustanovené hodnoty a cíle jsou stejně hodné obětování života jako jakákoli starodávná víra. Každý následovník by měl být připraven čelit smrti, a ti, kdo se odchýlí, ať se připraví na smrt." # todo: NEW TRANSLATION
  CRO_catholic_dominance_focus: "Chorvatský nacionalismus" # todo: NEW TRANSLATION
  CRO_catholic_dominance_focus_desc: "Chorvatský nacionalismus." # todo: NEW TRANSLATION
  CRO_secularism_focus: "Sekularismus" # todo: NEW TRANSLATION
  CRO_secularism_focus_desc: "Sekularismus." # todo: NEW TRANSLATION
  CRO_integrate_muslim_croats_focus: "Zvýšit domobranu" # todo: NEW TRANSLATION
  CRO_integrate_muslim_croats_focus_desc: "Založíme naši první národní milici – Chorvatskou domobranu." # todo: NEW TRANSLATION
  CRO_integrate_orthodox_croats_focus: "Integrovat ortodoxní Chorvaty" # todo: NEW TRANSLATION
  CRO_integrate_orthodox_croats_focus_desc: "I když jsme s ortodoxními Chorvaty zacházeli špatně, musíme uznat, že i když dobří Chorvaté jsou členy římskokatolické církve, Chorvati, kteří přešli k náboženství Srbů, jsou přece jen Chorvaté a musí být integrováni do národní komunity." # todo: NEW TRANSLATION
  CRO_integrate_religious_minorities_focus: "Integrovat náboženské menšiny" # todo: NEW TRANSLATION
  CRO_integrate_religious_minorities_focus_desc: "Naše země je domovem náboženských menšin a jejich zvláštnosti by měly být respektovány." # todo: NEW TRANSLATION
  CRO_war_economy: "Válečná ekonomika" # todo: NEW TRANSLATION
  CRO_war_economy_desc: "Musíme podpořit naši válečnou ekonomiku" # todo: NEW TRANSLATION
  CRO_proffesional_army: "Profesionální armáda" # todo: NEW TRANSLATION
  CRO_proffesional_army_desc: "Naše armáda musí být připravena na válku za všech okolností!" # todo: NEW TRANSLATION
  CRO_develop_tanks: "Vyvinout tanky" # todo: NEW TRANSLATION
  CRO_develop_tanks_desc: "Stačí jen investovat." # todo: NEW TRANSLATION
  CRO_prepare_for_war: "Připravit se na válku" # todo: NEW TRANSLATION
  CRO_prepare_for_war_desc: "Musíme se připravit na válku" # todo: NEW TRANSLATION
  CRO_invite_serbian_officers: "Pozvat srbské důstojníky" # todo: NEW TRANSLATION
  CRO_invite_serbian_officers_desc: "Měli bychom pozvat zkušené srbské důstojníky, kteří sloužili v jugoslávské armádě" # todo: NEW TRANSLATION
  CRO_a_king_for_our_people_focus: "Král pro náš lid" # todo: NEW TRANSLATION
  CRO_a_king_for_our_people_focus_desc: "Abychom obnovili velikost svobodného chorvatského království minulosti, musíme vybrat krále, který povede regenerovaný chorvatský lid." # todo: NEW TRANSLATION
  CRO_italian_influence_focus: "Italský vliv" # todo: NEW TRANSLATION
  CRO_italian_influence_desc: "Nyní, když je na chorvatském trůnu Ital, má naše země s Itálií bližší vazby než kdy dřív.." # todo: NEW TRANSLATION
  CRO_italo_croat_legion: "Italsko-chorvatská legie" # todo: NEW TRANSLATION
  CRO_italo_croat_legion_desc: "Italsko-chorvatská legie" # todo: NEW TRANSLATION
  CRO_dalmatian_question_focus: "Dalmatinská otázka" # todo: NEW TRANSLATION
  CRO_dalmatian_question_focus_desc: "Zatímco mnozí by očekávali, že volba italského krále ulehčí vztahy s Itálií, Tomislav II. italský vliv nad svým královstvím nepřivítal. Nový král zpochybnil možnost, že by se dalmatské pobřeží italianizovalo. Zdá se, že hodlá donutit Itálii vzdát se nároku na region a ovládnout celé pobřeží." # todo: NEW TRANSLATION
  FIN_prepare_for_winter: "Připravit se na zimu" # todo: NEW TRANSLATION
  FIN_stockpile_rations: "Naskladnit příděly" # todo: NEW TRANSLATION
  FIN_stockpile_rations_desc: "Přísná zima znamená méně jídla pro náš lid a možná ještě důležitěji, pro naše jednotky. Pokud mají muži bránit naši slavnou zemi, musíme zlepšit naši infrastrukturu." # todo: NEW TRANSLATION
  FIN_imitate_sweden: "Hledat spojence" # todo: NEW TRANSLATION
  FIN_prepare_for_winter_desc: "Před námi jsou bezpochyby těžké časy. S bývalými nepřáteli na východě, rostoucím napětím na jihu a přesmořskými hrozbami našemu způsobu života, naše vláda musí rychle rozhodnout, jak nejlépe ochránit finský lid." # todo: NEW TRANSLATION
  FIN_invest_in_the_private_sector: "Investovat do soukromého sektoru" # todo: NEW TRANSLATION
  FIN_invest_in_the_private_sector_desc: "Dobrá ekonomika není k zahození. Ať už se vydáme jakoukoli cestou, budeme potřebovat silný soukromý sektor, který nám pomůže vybudovat budoucnost, kterou chceme." # todo: NEW TRANSLATION
  FIN_expand_the_mines: "Rozšířit doly" # todo: NEW TRANSLATION
  FIN_expand_the_mines_desc: "Severní doly jsou plné surovin. Pokud se rozhodneme do nich investovat, můžeme získat více surovin buď na export, nebo pro domácí použití." # todo: NEW TRANSLATION
  FIN_nokia: "Vícejazyčné vzdělávání" # todo: NEW TRANSLATION
  FIN_nokia_desc: "Měnící se demografie způsobuje problémy mnoha studentům, kteří nemluví finsky. Zavedením švédštiny a ruštiny jako oficiálních jazyků můžeme zajistit lepší vzdělání pro naše obyvatelstvo." # todo: NEW TRANSLATION
  FIN_the_red_wall: "Druhá Mannerheimova linie" # todo: NEW TRANSLATION
  FIN_the_red_wall_desc: "Mannerheimova linie byla obranná linie na Karelské šíji postavená Finy proti Sovětskému svazu. Může být rozumné investovat do podobné struktury pevností a bunkrů na východní frontě, abychom připravili silnou obranu." # todo: NEW TRANSLATION
  FIN_frantic_planning: "Motti taktika" # todo: NEW TRANSLATION
  FIN_frantic_planning_desc: "Motti je finský vojenský slang pro zcela obklíčenou nepřátelskou jednotku. Motitus je dvoukřídlý manévr využívající schopnost lehkých jednotek pohybovat se po těžkém terénu k obklíčení nepřátel na silnici. Taktika je obzvlášť užitečná pro početně slabší, ale mobilní síly, zvláště v zasněženém klimatu Finska." # todo: NEW TRANSLATION
  FIN_eastern_defense: "Východní obrana" # todo: NEW TRANSLATION
  FIN_eastern_defense_desc: "Východní fronta je rozlehlá a těžko bránitelná. Měli bychom se zaměřit na budování více obranných struktur, pokud má obstát ve válce se Sovětským svazem." # todo: NEW TRANSLATION
  FIN_democratic_support: "Podpora demokracie" # todo: NEW TRANSLATION
  FIN_democratic_support_desc: "Uvolněním některých zákonů a legislativní ochranou lidských práv bychom mohli získat mocné spojence u sousedů a najít přátele v zahraničí." # todo: NEW TRANSLATION
  FIN_nationalist_support: "Podpora nacionalistů" # todo: NEW TRANSLATION
  FIN_nationalist_support_desc: "Finové jsou právem hrdý národ. Musíme upevnit naši nadřazenost v Evropě a spojit se s národy, které sdílejí naše nacionalistické vidění." # todo: NEW TRANSLATION
  FIN_expansionism: "Expanzionismus" # todo: NEW TRANSLATION
  FIN_expansionism_desc: "S nedávnými politickými změnami roste podpora rozšíření našich hranic." # todo: NEW TRANSLATION
  FIN_invite_norway: "Pozvat Norsko" # todo: NEW TRANSLATION
  FIN_invite_norway_desc: "Norsko má s námi a zbytkem Skandinávie dobré vztahy. Mají také pobřeží strategického významu a jejich severní hranice by mohly sloužit jako nárazníková zóna. Bylo by nerozumné nezvážit jejich začlenění do nové Kalmar Union." # todo: NEW TRANSLATION
  FIN_invite_denmark: "Pozvat Dánsko" # todo: NEW TRANSLATION
  FIN_invite_denmark_desc: "Dánsko má silné kulturní a ideologické vazby se zbytkem Skandinávie. Jejich poloha na jihu na pevnině Evropy je nesmírně cenným aktivem. Naši poradci doporučují pozvat je do Druhé Kalmar Uniony." # todo: NEW TRANSLATION
  FIN_promote_sisu: "Rozšířit Bílou gardu" # todo: NEW TRANSLATION
  FIN_promote_sisu_desc: "V zimní válce byla Bílá garda zodpovědná za provedení mobilizace. Čtvrtina lidské síly polní armády tvořili členové gardy. Tento přínos byl důležitý, protože členové gardy byli nejlépe vycvičení a vybavení v armádě, které chyběly i základní zásoby." # todo: NEW TRANSLATION
  FIN_civilian_kitchens: "Civilní polní kuchyně" # todo: NEW TRANSLATION
  FIN_civilian_kitchens_desc: "Finsku výrazně chyběly stany, kamna a další vybavení, ale mnoho úmrtí se podařilo zabránit díky civilním dobrovolníkům, kteří zřizovali kuchyně a zásobovali vojáky v poli." # todo: NEW TRANSLATION
  FIN_ski_infantry: "Lyžařská infanterie" # todo: NEW TRANSLATION
  FIN_ski_infantry_desc: "Lyžařské jednotky sehrály klíčovou roli v úspěších finského válečného úsilí proti Sovětskému svazu během Zimní války v roce 1939. Lesnatý, venkovský terén bez silnic byl pro finské lyžaře ideální proti postupujícím mechanizovaným sovětským silám." # todo: NEW TRANSLATION
  FIN_molotov_cocktails: "Molotovovy koktejly" # todo: NEW TRANSLATION
  FIN_molotov_cocktails_desc: "Finové vylepšili konstrukci a taktické použití benzínové bomby. Dále byly přidány nehořlavé zápalky nebo ampule s chemikálií, která se při rozbití vznítí, čímž odpadla nutnost předzápalu, a zjištěno bylo, že láhev naplněná zhruba z jedné třetiny má větší pravděpodobnost rozbití." # todo: NEW TRANSLATION
  FIN_wolf_divisions: "Vlčí divize" # todo: NEW TRANSLATION
  FIN_wolf_divisions_desc: "Jak naše armáda roste v počtu i síle, měli bychom se začít soustředit na agresivnější taktiky. Naše jednotky už nejsou pouze silou pro obranu." # todo: NEW TRANSLATION
  FIN_the_winter_war: "Zřídit Velké Finsko" # todo: NEW TRANSLATION
  FIN_the_winter_war_desc: "Velké Finsko je irredentistická a nacionalistická myšlenka, která zdůrazňovala teritoriální expanzi Finska. Nejčastější koncepce Velkého Finska byla definována přírodními hranicemi zahrnujícími území obývaná Finy a Karelany, od Bílého moře po Oněžské jezero a podél řek Svir a Něvy včetně Ingrie a Kolského poloostrova." # todo: NEW TRANSLATION
  FIN_southern_foothold: "Jižní opěrný bod" # todo: NEW TRANSLATION
  FIN_southern_foothold_desc: "Pokud chceme expandovat, budeme potřebovat lepší možnosti než zmrzlé klima západu a východu. Estonsko nebude soupeř pro naši armádu a jejich území nám poskytne strategický opěrný bod přes moře." # todo: NEW TRANSLATION
  FIN_german_support: "Přidat se k Ose" # todo: NEW TRANSLATION
  FIN_german_support_desc: "Mocné Německé říše jsou ochotny nám pomoci proti moci chtivému kominternu na východě a naivním západním demokraciím, které by odsuzovaly naši hrdost. Podpora Osy je v naší zemi smíšená, ale většina se shoduje, že si nemůžeme dovolit odmítnout tak mocného spojence." # todo: NEW TRANSLATION
  FIN_independent_revolution: "Nezávislá revoluce" # todo: NEW TRANSLATION
  FIN_independent_revolution_desc: "Naše slavná revoluce může uspět i bez pomoci korumpovaného Kominternu. Nejlépe vytvoříme pravý komunistický stát podle vlastních principů." # todo: NEW TRANSLATION
  FIN_propaganda_machine: "Propaganda" # todo: NEW TRANSLATION
  FIN_propaganda_machine_desc: "Inspirační plakáty, filmy a projevy povzbudily náš lid. Jsou připraveni nás podporovat, ať se stane cokoli." # todo: NEW TRANSLATION
  FIN_the_lotta_svard: "Lotta Svärd" # todo: NEW TRANSLATION
  FIN_the_lotta_svard_desc: "Během Zimní války bylo asi 100 000 mužů, jejichž práce převzaly 'Lottas', uvolněno pro vojenskou službu. Lottas pracovaly v nemocnicích, na hlásných stanovištích protiletného poplachu a vykonávaly další pomocné úkoly ve spolupráci s ozbrojenými silami. Lottas ovšem byly oficiálně neozbrojené. Výjimkou byla dobrovolná protiletadlová baterie v Helsinkách složená z členek Lotta Svärd." # todo: NEW TRANSLATION
  FIN_pacifist_sentiment: "Pacifistické smýšlení" # todo: NEW TRANSLATION
  FIN_pacifist_sentiment_desc: "Náš lid je jednotný v přesvědčení o světovém míru. Také chápou, že někdy je nutné uzavírat aliance, byť jen jako odstrašující prostředek proti těm, kdo by jinak ohrožovali mír." # todo: NEW TRANSLATION
  FIN_found_valpo: "Založit ValPo" # todo: NEW TRANSLATION
  FIN_found_valpo_desc: "Historicky založená v roce 1937, Valtiollinen poliisi, zkráceně ValPo a znamenající 'státní policie', byla předchůdcem Finského bezpečnostního zpravodajství. Špiónům této organizace se připisuje mimo jiné údajné vyfocení Heinrichova Himmlerova kufříku při jeho návštěvě Finska." # todo: NEW TRANSLATION
  FIN_deterrence: "Odstrašení" # todo: NEW TRANSLATION
  FIN_deterrence_desc: "Bohužel ne všichni sdílejí naši vizi míru. Proto bychom měli investovat do naší obrany — tak se nebudeme jevit jako snadný cíl pro válečné expanzionisty." # todo: NEW TRANSLATION
  FIN_military_necessity: "Vojenská nezbytnost" # todo: NEW TRANSLATION
  FIN_military_necessity_desc: "Finský národ ví, jak cenná je inovativní mysl v době války. Musíme povzbuzovat vědce, aby pokračovali ve svém úsilí a přicházeli s novými průlomy, chceme-li zajistit naši krátkodobou i dlouhodobou budoucnost." # todo: NEW TRANSLATION
  FIN_secret_weapons: "Tajné zbraně" # todo: NEW TRANSLATION
  FIN_secret_weapons_desc: "Kdo ví, co si některé státy schovávají. Nespočet vynálezů je dlouho utajováno, neboť prvek překvapení může být ve válce nejcennější." # todo: NEW TRANSLATION
  FIN_cautious_politics: "Opatrná politika" # todo: NEW TRANSLATION
  FIN_cautious_politics_desc: "Pokud chceme z této rostoucí bouře vyjít s minimálními ztrátami, nejlépe nebude volit strany. Není důvod si nakreslit cíl na vlastní záda." # todo: NEW TRANSLATION
  FIN_limited_motorization: "Omezená motorizace" # todo: NEW TRANSLATION
  FIN_limited_motorization_desc: "Finové dlouho dávali přednost jezdeckým plukům před motorizovanou pěchotou. Koně mohli běžet hlubokým sněhem, který zastavil sovětské síly, což zpomalilo motorizaci finské armády." # todo: NEW TRANSLATION
  FIN_tuli_isku: "Tuli-Isku" # todo: NEW TRANSLATION
  FIN_tuli_isku_desc: "'Tuli-Isku' znamená 'Úder ohně' ve finštině. Dělostřelectvo pro podporu bylo ve Finsku hojně využíváno jak ve Zimní válce, tak v Pokračovací válce." # todo: NEW TRANSLATION
  FIN_study_foreign_vehicles: "Studovat cizí vozidla" # todo: NEW TRANSLATION
  FIN_study_foreign_vehicles_desc: "Většina finských vozidel byla i po Zimní válce značně zastaralá. Nejlépe uděláme, když budeme studovat osvědčené dovážené vozy místo pokračování v produkci našich současných modelů." # todo: NEW TRANSLATION
  FIN_import_tanks: "Importovat tanky" # todo: NEW TRANSLATION
  FIN_import_tanks_desc: "Můžeme dramaticky urychlit výzkum a nasazení nových tanků dovozem většího množství. Tak by battaliony mohly používat modernější modely dříve, než je plně rozložíme a začneme reverzní inženýrství." # todo: NEW TRANSLATION
  FIN_theft_and_learning: "Krádež a učení" # todo: NEW TRANSLATION
  FIN_theft_and_learning_desc: "Díky předchozím válečným úspěchům stále vlastníme mnoho zajatých tanků. Zaměřením na tyto 'půjčené' tanky můžeme celý výzkumný projekt učinit levnějším a rychlejším!" # todo: NEW TRANSLATION
  FIN_aviation_effort: "Letecké úsilí" # todo: NEW TRANSLATION
  FIN_aviation_effort_tt: "Není dost stavebních míst pro §Yleteckou základnu§!" # todo: NEW TRANSLATION
  FIN_aviation_effort_desc: "Technologický pokrok je v leteckém boji nejrychlejší. Letectví je obor, který musí ovládat každá moderní země." # todo: NEW TRANSLATION
  FIN_fighter_focus: "Zaměření na stíhače" # todo: NEW TRANSLATION
  FIN_fighter_focus_desc: "Ještě jsme neviděli konec leteckých soubojů z Velké války. Držet krok ve vývoji stíhacích letounů nám dá v budoucnu výhodu." # todo: NEW TRANSLATION
  FIN_bomber_focus: "Zaměření na bombardéry" # todo: NEW TRANSLATION
  FIN_bomber_focus_desc: "Když budou budoucí generace mluvit o hrůzách dnešních válek, déšť ohně ze vzduchu bude dominantní. Uděláme vše, abychom zajistili, že tyto příběhy budou vyprávěny našimi nepřáteli." # todo: NEW TRANSLATION
  FIN_aviation_effort_2: "Letecké úsilí II" # todo: NEW TRANSLATION
  FIN_aviation_effort_2_desc: "Další pokroky v letectví budou nutné k dobré integraci našeho letectva s ostatními složkami armády." # todo: NEW TRANSLATION
  FIN_CAS_effort: "Úsilí CAS" # todo: NEW TRANSLATION
  FIN_CAS_effort_desc: "Moderní armáda potřebuje podporu vozidel nejen na zemi, ale i ve vzduchu." # todo: NEW TRANSLATION
  FIN_rocket_effort: "Raketové úsilí" # todo: NEW TRANSLATION
  FIN_rocket_effort_desc: "Raketové a proudové pohony umožňují bezprecedentní rychlosti jak bezpilotních, tak pilotovaných strojů. Průkopnictví v těchto technologiích nám umožní přepadnout nepřítele překvapením." # todo: NEW TRANSLATION
  FIN_nav_effort: "Námořně‑letecké úsilí" # todo: NEW TRANSLATION
  FIN_nav_effort_desc: "Stejně jako se nový námořní boj odehrává částečně pod hladinou, část se odehrává i ve vzduchu nad vodami." # todo: NEW TRANSLATION
  FIN_naval_effort: "Námořní úsilí" # todo: NEW TRANSLATION
  FIN_naval_effort_tt: "Není dost stavebních míst pro §YNámořní loděnice§!" # todo: NEW TRANSLATION
  FIN_naval_effort_desc: "Rozšíření našeho námořnictva by mělo být naší první prioritou. Přidělte všechny dostupné zdroje na nové loděnice a výzkum lehkých povrchových lodí." # todo: NEW TRANSLATION
  FIN_flexible_navy: "Flexibilní flotila" # todo: NEW TRANSLATION
  FIN_flexible_navy_desc: "Přetvoření námořního boje s ohledem na pokroky v technologii ponorek nám umožní účinně útočit na nepřátelské konvoje." # todo: NEW TRANSLATION
  FIN_large_navy: "Studovat cizí konstrukce lodí" # todo: NEW TRANSLATION
  FIN_large_navy_desc: "Přizpůsobení naší námořní doktríny velkým lodím a zajištění bezpečnosti obchodních konvojů nás naučí, jaké typy lodí potřebujeme." # todo: NEW TRANSLATION
  FIN_submarine_effort: "Úsilí o ponorky" # todo: NEW TRANSLATION
  FIN_submarine_effort_desc: "Ponorkový boj je nejzajímavějším námořním vývojem od vynálezu torpédové člunu. Měli bychom se nejen bránit proti ponorkám, ale i je používat proti nepřátelskému námořnímu obchodu." # todo: NEW TRANSLATION
  FIN_cruiser_effort: "Úsilí o křižníky" # todo: NEW TRANSLATION
  FIN_cruiser_effort_desc: "Než se pustíme do výzkumu pokročilých bitevních lodí, je třeba nahradit menší křižníky." # todo: NEW TRANSLATION
  FIN_destroyer_effort: "Úsilí o torpédoborce" # todo: NEW TRANSLATION
  FIN_destroyer_effort_desc: "Studovali jsme konstrukci a strategické použití ponorek a zároveň se naučili, jak jim čelit. Torpédoborce budou pro to klíčové." # todo: NEW TRANSLATION
  FIN_capital_ships_effort: "Úsilí o plavidla hlavní třídy" # todo: NEW TRANSLATION
  FIN_capital_ships_effort_desc: "Národ s nejvíce bitevními loděmi bude vládnout oceánům. Bitevní lodě a letadlové lodě představují staré i nové v námořní nadvládě." # todo: NEW TRANSLATION
  FIN_further_artillery_support: "Další dělostřelecká podpora" # todo: NEW TRANSLATION
  FIN_further_artillery_support_desc: "Dělostřelecká podpora se ukázala být neocenitelná pro naše armády. Mělo by být prioritou pokračovat v zlepšování a nasazování nových technologií, aby se zachránilo více životů našich krajanů." # todo: NEW TRANSLATION
  FIN_fortress_aland: "Pevnost Åland" # todo: NEW TRANSLATION
  FIN_fortress_aland_desc: "Opevněním ostrova ho můžeme proměnit v silnou námořní základnu. Rozšíření loděnic nám také poskytne prostředky k vytvoření a udržení nadvlády." # todo: NEW TRANSLATION
  FIN_marines_and_landing_craft: "Brigáda San Marco" # todo: NEW TRANSLATION
  FIN_marines_and_landing_craft_desc: "Války se nevyhrávají pouze námořní mocí; musíme také umět přepravovat naše armády přes vlny a bezpečně je vylodit..." # todo: NEW TRANSLATION
  FIN_paratroopers_and_air_bases: "Výsadkáři a letecké základny" # todo: NEW TRANSLATION
  FIN_paratroopers_and_air_bases_desc: "Války se nevyhrávají pouze letadly; musíme také umět přepravovat naše armády vzduchem a bezpečně je umístit za nepřátelské linie..." # todo: NEW TRANSLATION
  FIN_flying_lottas: "Létající Lottas" # todo: NEW TRANSLATION
  FIN_flying_lottas_desc: "Zatímco jinde v zemi jsou hovory o organizaci 'Lotta Svärd' jako pomocné síle, letectvo také začalo diskutovat o zapojení žen. Finské dámy prokázaly odhodlání a většina vedení je ochotna přijmout do řad pilotek." # todo: NEW TRANSLATION
  finland.17.t: "Pozvání do Druhé Kalmar Uniony" # todo: NEW TRANSLATION
  finland.17.d: "Ve snaze posílit sever a zadržet možný návrat agresivního expanzionismu z východu a jihu, Finsko nás požádalo, abychom se k nim připojili v alianci usilující o sjednocení těchto národů." # todo: NEW TRANSLATION
  finland.17.a: "Rádi. Kalmar Union musí být obnovena." # todo: NEW TRANSLATION
  finland.17.b: "[Root.GetName] kráčí vlastní cestou." # todo: NEW TRANSLATION
  finland.18.t: "[From.GetName] se připojuje k Druhé Kalmar Unioně" # todo: NEW TRANSLATION
  finland.18.d: "Náš plán vytvořit skandinávskou unii uspěl. [From.GetLeader] schvaluje naše úsilí a přijal naše pozvání do aliance." # todo: NEW TRANSLATION
  finland.18.a: "Jsme o krok blíž k obnově Kalmar Union." # todo: NEW TRANSLATION
  finland.19.t: "[From.GetName] odmítá Druhou Kalmar Union" # todo: NEW TRANSLATION
  finland.19.d: "Navzdory našim nejlepším snahám nabídnout podporu Druhé Kalmar Unioně, náš poslední pokus oslovit jednu z těchto zemí narazil na skepsi. [From.GetLeader] odmítl vstoupit do aliance, možná pochybuje o našich motivech, nebo se obává, že příliš úzké spojení by je učinilo cílem." # todo: NEW TRANSLATION
  finland.19.a: "Mohou už být cílem — kdo ví!" # todo: NEW TRANSLATION
  finland.29.t: "Británie přijala žádost o spojenectví" # todo: NEW TRANSLATION
  finland.29.d: "'Historie ukázala, kolik lze dokázat, když velké národy stojí bok po boku. Jsme hrdí, že vás vítáme nejen jako přátele, ale jako spojence. Společně budeme zářivým majákem svobody ve světě ohroženém temnotou útlaku!'\n\nNaše žádost o spojenecké spojenectví s Británií byla přijata. Můžeme počítat s jejich plnou podporou v neklidných časech před námi." # todo: NEW TRANSLATION
  finland.29.a: "Společně udržíme linii!" # todo: NEW TRANSLATION
  finland.30.t: "Británie zamítla žádost o spojenectví" # todo: NEW TRANSLATION
  finland.30.d: "'I když jsme v minulosti udržovali dobré vztahy, nemůžeme riskovat eskalaci konfliktů přes kanál. Německo si vysloužilo naši důvěru v naplnění našeho námořního paktu a nemáme důvod naštvat Sovětský svaz. Budeme se bránit, pokud se oheň rozšíří, ale nebudeme riskovat jeho podněcování. Míru musí vždy usilovat každá demokratická země.'\n\nNaše žádost o spojení s Británií byla zamítnuta. Britská vláda nechce dále provokovat Německo nebo Sovětský svaz a nebude ohrožovat současný křehký pokoj." # todo: NEW TRANSLATION
  finland.30.a: "Ještě jedna země zapomněla na Finsko. Ukážeme jim to!" # todo: NEW TRANSLATION
  finland.25.t: "Finsko chce vstoupit do Spojenců" # todo: NEW TRANSLATION
  finland.25.d: "Svět se stává stále nebezpečnějším. Británie a Finsko zůstávají baštami demokracie a svobody v Evropě a Finsko nyní navrhuje, aby se připojili ke Spojencům.\nJak bychom měli odpovědět?" # todo: NEW TRANSLATION
  finland.25.a: "Ano" # todo: NEW TRANSLATION
  finland.25.b: "Ne" # todo: NEW TRANSLATION
  finland.31.t: "Německo přijalo žádost o spojenectví" # todo: NEW TRANSLATION
  finland.31.d: "‚Historie ukázala, kolik lze dokázat, když velké národy stojí bok po boku. Jsme hrdí, že vás vítáme nejen jako přátele, ale jako členy aliance Osy. Společně přineseme pořádek do světa ohroženého temnotou komunismu a slabostí spojenců!‘\n\nNaše žádost o vstup k Německu jako členům Osy byla přijata. Můžeme počítat s jejich plnou podporou v neklidných časech před námi." # todo: NEW TRANSLATION
  finland.31.a: "Stojíme spolu." # todo: NEW TRANSLATION
  finland.32.t: "Německo zamítlo žádost o spojenectví" # todo: NEW TRANSLATION
  finland.32.d: "‚I když si vážíme vaší žádosti o vstup do naší slavné frakce, nemáme důvod rozhněvat Sovětský svaz a dále provokovat spojence kvůli jednomu nevýznamnému státu.‘\n\nNaše žádost o vstup do Osy byla zamítnuta. Německá vláda nechce dále antagonizovat Sovětský svaz nebo jakoukoli další velkou frakci a nebude ohrožovat současný mír." # todo: NEW TRANSLATION
  finland.32.a: "Ještě jedna země zapomněla na Finsko. Ukážeme jim to!" # todo: NEW TRANSLATION
  finland.333.t: "Finsko chce vstoupit do Osy" # todo: NEW TRANSLATION
  finland.333.d: "Svět se stává stále nebezpečnějším. Německo a Finsko zůstávají baštami národní hrdosti a vojenské síly v Evropě a Finsko nyní navrhuje, aby se připojili k Ose.\nJak odpovíme?" # todo: NEW TRANSLATION
  finland.333.a: "Ano" # todo: NEW TRANSLATION
  finland.333.b: "Ne" # todo: NEW TRANSLATION
  finland.355.t: "Finsko chce vstoupit do Kominternu" # todo: NEW TRANSLATION
  finland.355.d: "Svět se stává stále nebezpečnějším. Sovětský svaz a Finsko zůstávají jedněmi z mála bašt proletářské moci na tomto světě. Finsko nyní navrhuje, aby se připojili ke Kominternu a naše karelské území výměnou za Karjalu.\nJak odpovíme?" # todo: NEW TRANSLATION
  finland.355.a: "Ano" # todo: NEW TRANSLATION
  finland.355.b: "Ne" # todo: NEW TRANSLATION
  finland.33.t: "Sovětský svaz přijímá žádost o spojenectví" # todo: NEW TRANSLATION
  finland.33.d: "'Historie ukázala, kolik ztrácíme, když naše země odmítají spolupracovat. Jsme hrdí, že vás vítáme nejen jako přátele, ale jako soudruhy. Společně přineseme rovnost a spravedlnost proti temnotě kapitalismu a fašistických nálad!'\n\nNaše žádost o vstup do SSSR jako člen Kominternu byla přijata. Můžeme počítat s jejich plnou podporou v neklidných časech před námi." # todo: NEW TRANSLATION
  finland.33.a: "Společně pomůžeme revoluci!" # todo: NEW TRANSLATION
  finland.34.t: "Sovětský svaz zamítá žádost o spojenectví" # todo: NEW TRANSLATION
  finland.34.d: "'I když si vážíme vaší žádosti připojit se k naší slavné revoluci, nemáme důvod zvyšovat napětí a ohrozit naše vztahy s ostatními velmocemi kvůli jednomu nevýznamnému státu.‘\n\nNaše žádost o vstup do Kominternu byla zamítnuta. Sovětská vláda nechce dále antagonizovat spojence ani riskovat provokaci jiných frakcí a nebude ohrožovat současný mír." # todo: NEW TRANSLATION
  finland.34.a: "Ještě jedna země zapomněla na Finsko. Ukážeme jim to!" # todo: NEW TRANSLATION
  finland.920.t: "Británie přijímá finské spojenectví" # todo: NEW TRANSLATION
  finland.920.d: "Finsko požádalo o formální alianci s Británií s odkazem na nevysvětlené hrozby proti stabilitě Evropy.\n\nDnes jejich žádost schválil Britský parlament a Finsko se připojilo k [ENG.GetFactionName]." # todo: NEW TRANSLATION
  finland.920.a: "Stojíme spolu." # todo: NEW TRANSLATION
  finland.920.b: "Připravují se na nejhorší." # todo: NEW TRANSLATION
  finland.920.c: "Shromažďují se jako ohrožení krysy." # todo: NEW TRANSLATION
  finland.920.e: "Británie se rozhodla." # todo: NEW TRANSLATION
  finland.921.t: "Británie odmítá alianci s Finskem" # todo: NEW TRANSLATION
  finland.921.d: "V překvapivém vývoji dnes Britský parlament odmítl žádost [FIN.GetName] o formální alianci mezi oběma státy. Důvodem bylo zabránit rozhýbání již křehké rovnováhy na evropském kontinentě.\n\nFinská vláda to odsoudila jako politický tah, obětující finskou bezpečnost britským zájmům." # todo: NEW TRANSLATION
  finland.921.a: "Měli se zeptat hezčeji." # todo: NEW TRANSLATION
  finland.921.b: "Demokratické blázny rozděluje vlastní hloupost." # todo: NEW TRANSLATION
  finland.921.c: "Temný den pro Finsko." # todo: NEW TRANSLATION
  finland.922.t: "Druhá Kalmar Union" # todo: NEW TRANSLATION
  finland.922.d: "Ve snaze vytvořit jednotný front proti společným nepřátelům se [From.GetName] obrátil na Švédsko s nabídkou obnovit 'Kalmar Union', aby se spojili proti společným nepřátelům. Ačkoli byla nabídnuta místa v obranném paktu, britský premiér jasně uvedl, že Británie alianci nepovažuje za 'prospěšnou pro ochranu evropské svobody'.\n\nPřesto Finsko navázalo diplomatické vztahy s jinými národy, které se mohou cítit ohroženy, a povzbuzuje jednotu kvůli udržení diplomatické rovnováhy ve Skandinávii a předcházení budoucím konfliktům. Čas ukáže, zda uspějí." # todo: NEW TRANSLATION
  finland.922.a: "Ať potom nebrečí u nás!" # todo: NEW TRANSLATION
  finland.922.b: "Länge leve Kalmarunionen!" # todo: NEW TRANSLATION
  finland.922.c: "Nikdy nesmíme dovolit, aby Skandinávie představovala hrozbu." # todo: NEW TRANSLATION
  finland.922.e: "Skandinávie se musí sjednotit proti fašistickým a komunistickým agresorům!" # todo: NEW TRANSLATION
  finland.922.f: "Znamení rostoucích evropských napětí." # todo: NEW TRANSLATION
  finland.928.t: "Německo přijímá Finsko do Osy" # todo: NEW TRANSLATION
  finland.928.d: "Finsko požádalo o formální alianci s Německem s odkazem na nevysvětlené hrozby proti stabilitě Evropy a jejich vlastní bezpečnosti.\n\nDnes jejich žádost schválil německý kancléř a Finsko se připojilo k [GER.GetFactionName]." # todo: NEW TRANSLATION
  finland.928.a: "Stojíme spolu." # todo: NEW TRANSLATION
  finland.928.b: "Připravují se na nejhorší." # todo: NEW TRANSLATION
  finland.928.c: "Shromažďují se jako ohrožení krysy." # todo: NEW TRANSLATION
  finland.928.e: "Německo se rozhodlo." # todo: NEW TRANSLATION
  finland.929.t: "Německo odmítá alianci s Finskem" # todo: NEW TRANSLATION
  finland.929.d: "V překvapivém vývoji dnes německý kancléř odmítl žádost [FIN.GetName] o formální alianci mezi oběma státy. Důvodem bylo zabránit rozhýbání již křehké rovnováhy na evropském kontinentě.\n\nFinská vláda to odsoudila jako politický tah, obětující finskou bezpečnost německým zájmům." # todo: NEW TRANSLATION
  finland.929.a: "Měli se zeptat hezčeji." # todo: NEW TRANSLATION
  finland.929.b: "Demokratické blázny rozděluje vlastní hloupost." # todo: NEW TRANSLATION
  finland.929.c: "Temný den pro Finsko." # todo: NEW TRANSLATION
  finland.998.t: "Karjalská dohoda" # todo: NEW TRANSLATION
  finland.998.d: "Ve snaze smířit obě země Finsko požádalo o formální alianci se Sovětským svazem s odkazem na nevysvětlené hrozby proti stabilitě Evropy a jejich vlastní bezpečnosti. Aby se ulehčilo napětí, Finsko souhlasilo postoupit Karjalu Sovětskému svazu výměnou za státy Murmansk a Onega, kde žije velká finská menšina.\n\nDnes dohodu schválil sovětský premiér a Finsko se připojilo k [SOV.GetFactionName]." # todo: NEW TRANSLATION
  finland.998.a: "Stojíme spolu." # todo: NEW TRANSLATION
  finland.998.b: "Připravují se na nejhorší." # todo: NEW TRANSLATION
  finland.998.c: "Shromažďují se jako ohrožení krysy." # todo: NEW TRANSLATION
  finland.998.e: "SSSR se rozhodl." # todo: NEW TRANSLATION
  finland.999.t: "Sovětský svaz odmítá Karjalskou dohodu" # todo: NEW TRANSLATION
  finland.999.d: "V překvapivém obratu sovětský premiér odmítl žádost [FIN.GetName] o formální alianci mezi oběma zeměmi. Důvodem bylo, že Karjalová dohoda nebyla považována za vzájemně výhodnou, ale spíše jako způsob rozšíření hranic Finska." # todo: NEW TRANSLATION
  finland.999.a: "Měli se zeptat hezčeji." # todo: NEW TRANSLATION
  finland.999.b: "Komunističtí blázni stojí rozděleni." # todo: NEW TRANSLATION
  finland.999.c: "Temný den pro revoluci." # todo: NEW TRANSLATION
  finland.952.t: "Finsko oznamuje nároky na estonské území" # todo: NEW TRANSLATION
  finland.952.d: "Projevem finským obyvatelům podél baltského pobřeží [From.GetLeader] oznámil, že [From.GetName] považuje území hovořící finsky v [EST.GetName] za právoplatnou součást [From.GetName]. [From.GetLeader] také citoval strategický význam estonského regionu a tvrdí, že sjednocením obou zemí pod finskou nadvládou může být více lidí chráněno před většími hrozbami v zahraničí. \n\nOficiální prohlášení podpořilo nároky a jasně uvedlo, že [From.GetName] je připraven toto území získat silou, pokud bude nutné." # todo: NEW TRANSLATION
  finland.952.a: "To jsou estonské země, ne finské!" # todo: NEW TRANSLATION
  finland.952.b: "Rozbíjejí již tak křehkou rovnováhu v regionu." # todo: NEW TRANSLATION
  finland.952.c: "Ta území vypadají víc finsky než estonsky." # todo: NEW TRANSLATION
