  rocket_stuff_tt: "Zahájíme náš raketový program, Vergeltungswaffen.\n\nZahájíme výzkum §C'Experimentálních raket'§!\n\n" # todo: NEW TRANSLATION
  RAJ_expand_air_bases2: "Rozšířit východní letecké základny" # todo: NEW TRANSLATION
  RAJ_expand_air_bases2_desc: "Barma je na frontě s Japonskem - potřebujeme pro ni letiště." # todo: NEW TRANSLATION
