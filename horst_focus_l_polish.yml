  NZL_open_ties_with_washington_desc: "Američané jsou příliš důležití na to, abychom je ignorovali; otevření vztahů by bylo užitečné." # todo: NEW TRANSLATION
  NZL_supply_food_stuffs: "Dodávat potraviny za vybavení" # todo: NEW TRANSLATION
  NZL_supply_food_stuffs_desc: "I když nemůžeme přidělit mnoho vojáků nebo odeslat vybavení, můžeme poslat potravinovou pomoc, možná i výměnou za vybavení." # todo: NEW TRANSLATION
  NZL_dedicate_men: "Poslat muže do válečného úsilí" # todo: NEW TRANSLATION
  NZL_australian_nzl_agreement: "Smlouva ANZAC" # todo: NEW TRANSLATION
  NZL_australian_nzl_agreement_desc: "Aby byly naše zájmy v Pacifiku zajištěny, měli bychom spolupracovat s našimi sousedy pro udržení míru v oblasti." # todo: NEW TRANSLATION
  NZL_national_party_triumphant: "Národní strana triumfuje" # todo: NEW TRANSLATION
  NZL_national_party_triumphant_desc: "Labour Party slibovala plány; Národní strana může skutečně vykonat změny a napravit chyby Labour." # todo: NEW TRANSLATION
  NZL_appeal_rural_communities: "Oslovit venkovské komunity" # todo: NEW TRANSLATION
  NZL_appeal_rural_communities_desc: "Základna naší strany leží ve venkovských městech; musíme je udržet spokojené, abychom si udrželi pozici." # todo: NEW TRANSLATION
  NZL_condem_intervention: "Odsoudit vládní zásahy" # todo: NEW TRANSLATION
  NZL_condem_intervention_desc: "Vláda by se neměla vměšovat do soukromých podniků ani do ekonomiky." # todo: NEW TRANSLATION
  NZL_absorb_conservative_remains: "Přijmout zbytky konzervativců" # todo: NEW TRANSLATION
  NZL_absorb_conservative_remains_desc: "Někteří členové Labour mají sympatie k našim politikám; můžeme využít jejich schopnosti." # todo: NEW TRANSLATION
  NZL_equality_conscription: "Rovnost skrze brannou povinnost" # todo: NEW TRANSLATION
  NZL_equality_conscription_desc: "Domorodci musí být také bráni do branné služby; jejich status je nechrání před povinností k zemi." # todo: NEW TRANSLATION
  NZL_fight_militant_worker_union: "Bojovat proti militantním odborům" # todo: NEW TRANSLATION
  NZL_fight_militant_worker_union_desc: "Některé odbory se nenechají uklidnit vyššími mzdami; pokud je třeba, můžeme je zatknout." # todo: NEW TRANSLATION
  NZL_tackle_inflation: "Zabránit inflaci" # todo: NEW TRANSLATION
  NZL_tackle_inflation_desc: "Musíme podniknout kroky proti inflaci dříve, než se stane problémem." # todo: NEW TRANSLATION
  NZL_war_council: "Poradní válečná rada" # todo: NEW TRANSLATION
  NZL_war_council_desc: "Vytvoření válečné rady mezi všemi stranami by mohlo zlepšit výkonnost naší armády." # todo: NEW TRANSLATION
  NZL_open_up_to_free_market: "Otevřít se volnému trhu" # todo: NEW TRANSLATION
  NZL_open_up_to_free_market_desc: "Otevření se volnému trhu je hlavním cílem naší strany; po volebním úspěchu to konečně můžeme uskutečnit." # todo: NEW TRANSLATION
  NZL_combined_intelligence_centre: "Sdružené zpravodajské centrum" # todo: NEW TRANSLATION
  NZL_combined_intelligence_centre_desc: "Musíme s U.K. zabezpečit a rozluštit šifrované zprávy." # todo: NEW TRANSLATION
  NZL_construct_shore_fortification: "Vybudovat pobřežní opevnění" # todo: NEW TRANSLATION
  NZL_construct_shore_fortification_desc: "Musíme připravit pobřeží proti útočníkům a zajistit naši bezpečnost." # todo: NEW TRANSLATION
  NZL_emerge_from_the_caves: "Sjednotit komunistické hnutí" # todo: NEW TRANSLATION
  NZL_emerge_from_the_caves_desc: "Komunistické hnutí na Novém Zélandu je rozdrobené; pokud chceme získat moc, musíme se sjednotit v jednu stranu." # todo: NEW TRANSLATION
  NZL_lobby_soviet: "Lobovat v Sovětském svazu" # todo: NEW TRANSLATION
  NZL_lobby_soviet_desc: "Sovětský svaz bude klíčovým investorem, pokud získáme moc; zajištění jejich podpory je potřeba." # todo: NEW TRANSLATION
  NZL_the_peoples_voice: "Hlas lidu" # todo: NEW TRANSLATION
  NZL_the_peoples_voice_desc: "Hlas lidu je naším nejsilnějším nástrojem k šíření ideálů mezi masy. Ujistěme se, že tisk bude pokračovat." # todo: NEW TRANSLATION
  NZL_invite_radical_labour_exiles: "Pozvat radikální exil Labour" # todo: NEW TRANSLATION
  NZL_invite_radical_labour_exiles_desc: "John A. Lee a Bill Barnard mohou mít sympatie k našemu cíli; jejich dovednosti a vliv nesmíme přehlédnout." # todo: NEW TRANSLATION
  NZL_new_wave_of_feminism: "Nová vlna feminismu" # todo: NEW TRANSLATION
  NZL_new_wave_of_feminism_desc: "V našem novém státě musí být všichni rovni před zákonem, včetně obou pohlaví." # todo: NEW TRANSLATION
  NZL_maori_equality: "Úplná rovnost Maorů" # todo: NEW TRANSLATION
  NZL_maori_equality_desc: "Maorové byli příliš dlouho utlačováni; zaslouží si stejná práva jako ostatní občané." # todo: NEW TRANSLATION
  NZL_nationalize_bank: "Znationalizovat Banku Nového Zélandu" # todo: NEW TRANSLATION
  NZL_nationalize_bank_desc: "Banka Nového Zélandu musí být znárodněna, aby se zajistil pokračující ekonomický růst." # todo: NEW TRANSLATION
  NZL_public_housing: "Prioritizovat veřejné bydlení" # todo: NEW TRANSLATION
  NZL_public_housing_desc: "Zajištění základních životních potřeb pro občany, kteří si je nemohou dovolit, ukáže progresivitu našeho státu." # todo: NEW TRANSLATION
  NZL_encourage_selfless_citizens: "Podporovat obětavé občany" # todo: NEW TRANSLATION
  NZL_encourage_selfless_citizens_desc: "Obětavost a ctnost jsou vlastnosti, které musí mít všichni obyvatelé, pokud chceme přežít. Nemáme místo pro zbabělce." # todo: NEW TRANSLATION
  NZL_join_sov: "Aliance s Unií" # todo: NEW TRANSLATION
  NZL_join_sov_desc: "Jsme přemáháni a obklíčeni nepřátelskými sousedy; pro zajištění přežití se musíme spojit s šampiony komunismu." # todo: NEW TRANSLATION
  NZL_neutral: "Stabilizovat vnitřní záležitosti" # todo: NEW TRANSLATION
  NZL_neutral_desc: "Utvrzení naší moci v zemi je důležitější než zasahování do zahraničí." # todo: NEW TRANSLATION
  NZL_legion_ideals: "Oživit idee Legionu" # todo: NEW TRANSLATION
  NZL_legion_ideals_desc: "Legion existoval už dlouho; jejich ideály jsou stále relevantní. Musíme posílit ty, kteří z nich zbyli." # todo: NEW TRANSLATION
  NZL_party_funding: "Získat financování strany" # todo: NEW TRANSLATION
  NZL_party_funding_desc: "Legion trpěl kvůli nedostatku financí; nesmíme udělat stejnou chybu." # todo: NEW TRANSLATION
  NZL_unite_party: "Sjednotit Legion" # todo: NEW TRANSLATION
  NZL_unite_party_desc: "Legion je roztříštěná strana; k převzetí moci je třeba sjednotit všechny skupiny." # todo: NEW TRANSLATION
  NZL_the_individual: "Vůdčí myšlenka individualismu" # todo: NEW TRANSLATION
  NZL_the_individual_desc: "Jedinec je největším zdrojem národa; přijetí osobní svobody je hlavním bodem naší doktríny." # todo: NEW TRANSLATION
  NZL_insulationsim: "Izolacionismus v ekonomice" # todo: NEW TRANSLATION
  NZL_insulationsim_desc: "Konzervativnější přístup k ekonomice může posílit kontrolu nad Novým Zélandem." # todo: NEW TRANSLATION
  NZL_minimalize_government_spending: "Minimalizovat vládní výdaje" # todo: NEW TRANSLATION
  NZL_minimalize_government_spending_desc: "Role vlády není zasahovat do trhu; jen brzdí růst a prosperitu." # todo: NEW TRANSLATION
  NZL_maori_assimilation: "Asimilace Maorů" # todo: NEW TRANSLATION
  NZL_maori_assimilation_desc: "Maorové se musí naučit asimilovat do společnosti místo pokračování v protestech." # todo: NEW TRANSLATION
  NZL_ban_poarties: "Zakázat politické strany" # todo: NEW TRANSLATION
  NZL_ban_poarties_desc: "Politické strany pouze rozdělují národ; musíme být sjednoceni jako jedna země." # todo: NEW TRANSLATION
  NZL_join_jap: "Připojit se ke Sféře prosperity" # todo: NEW TRANSLATION
  NZL_join_jap_desc: "Japonci jsou rostoucí silou v Asii; připojení k nim je nutné i k naší ochraně." # todo: NEW TRANSLATION
  NZL_home_defence: "Založit domobranu" # todo: NEW TRANSLATION
  NZL_home_defence_desc: "Musíme vytvořit civilní obrannou sílu z potenciálních vojáků, kteří nejsou v nejlepším věku nebo kondici, k obraně ostrovů." # todo: NEW TRANSLATION
  NZL_increased_defense_spending: "Zvýšené výdaje na obranu" # todo: NEW TRANSLATION
  NZL_increased_defense_spending_desc: "Válka vyžaduje moderní vybavení; nemůžeme spoléhat jen na pomoc spojenců." # todo: NEW TRANSLATION
  NZL_central_research_planning: "Centrální plánování výzkumu" # todo: NEW TRANSLATION
  NZL_central_research_planning_desc: "Plánování ekonomiky zahrnuje i směřování vědců k technologiím, které stát bude potřebovat, jako by veliká mysl viděla budoucnost a vybírala nejlepší možnosti." # todo: NEW TRANSLATION
  NZL_national_research_grants: "Národní výzkumné granty" # todo: NEW TRANSLATION
  NZL_national_research_grants_desc: "Musíme spoléhat na naše inovace, které jsou často lepší než zahraniční; tak se ostrované vypořádali s nebezpečnými ptáky, místo aby jimi byli poraženi." # todo: NEW TRANSLATION
  NZL_corporate_innovations: "Korporátní inovace" # todo: NEW TRANSLATION
  NZL_corporate_innovations_desc: "Soukromý sektor umí vyvíjet nové technologie a konkurence odhalí to nejlepší z naší země." # todo: NEW TRANSLATION
  NZL_naval_equipment: "Námořní vybavení" # todo: NEW TRANSLATION
  NZL_naval_equipment_desc: "Moderní trup nic neznamená bez moderního vybavení." # todo: NEW TRANSLATION
  NZL_a_poor_army: "Nedostatečně vybavená armáda" # todo: NEW TRANSLATION
  NZL_a_poor_army_desc: "Naše ekonomika nedokáže podporovat armádu tak velkou a efektivní jako Británie nebo Francie, což nechává naše síly v stínu silnějších států." # todo: NEW TRANSLATION
  NZL_destruction_of_the_lee_afair: "Zničení aféry Lee" # todo: NEW TRANSLATION
  NZL_destruction_of_the_lee_afair_desc: "John A. Lee byl známý politik s radikálnějším názorem. Kvůli jeho kritice Labour byl degradován z mocných pozic." # todo: NEW TRANSLATION
  NZL_upset_maori_population: "Nespokojené domorodé obyvatelstvo" # todo: NEW TRANSLATION
  NZL_upset_maori_population_desc: "Domorodci bouří v ulicích kvůli autonomii a zabírání půdy. Možná je čas najít řešení." # todo: NEW TRANSLATION
  NZL_organizing_communists: "Organizující komunisti" # todo: NEW TRANSLATION
  NZL_stiff_opposition: "Tvrdý odpor" # todo: NEW TRANSLATION
  NZL_unemployment_benefit: "Podpora v nezaměstnanosti" # todo: NEW TRANSLATION
  NZL_the_engineer_corp: "Dělostřelecký pluk" # todo: NEW TRANSLATION
  NZL_create_a_satnding_navy: "Vytvořit stálé námořnictvo" # todo: NEW TRANSLATION
  NZL_lessons_of_the_great_war: "Ponaučení z Velké války" # todo: NEW TRANSLATION
  NZL_pilot_recruitment_drive: "Nábor pilotů" # todo: NEW TRANSLATION
  socialist_finance_minister: "Sociálně demokratický ministr financí" # todo: NEW TRANSLATION
  socialist_follower: "Zastánce Lee" # todo: NEW TRANSLATION
  labour_party_remnant: "Zbytek Labour Party" # todo: NEW TRANSLATION
  NZL_obtain_funding: "Získat financování strany" # todo: NEW TRANSLATION
  NZL_prioritize_house: "Veřejné bydlení" # todo: NEW TRANSLATION
  NZL_fight_for_authority_over_our_troops: "Zavést brannou povinnost" # todo: NEW TRANSLATION
  NZL_commie_tt: "Dokončení tohoto záměru odemkne komunistickou cestu v volbách" # todo: NEW TRANSLATION
  NZL_legion_tt: "Dokončení tohoto záměru odemkne fašistickou cestu v volbách" # todo: NEW TRANSLATION
  new_zealand.1.t: "Michael Savage onemocní, bude jmenován nový premiér" # todo: NEW TRANSLATION
  new_zealand.1.d: "S rostoucím napětím a rozdrobeným stavem Labour Party musíme vybrat nástupce stále slabnoucího Michaela Josepha Savage. Peter Fraser se ukázal jako více než schopný vůdce a byl silně podpořen jak Walterem Nashem, tak premiérem Savage. To však nezastavilo Savageovu opozici vedenou Gervanem McMillanem, kterou vedou snahy prosadit jejich agendu. McMillan, kontroverznější volba, vyjádřil sympatie k vyhoštěnému členu Labour Johnu A. Leemu, což ho činí velmi nepopulárním." # todo: NEW TRANSLATION
  new_zealand.1.a: "Peter Fraser je nejlepší řešení pro problémy Labour." # todo: NEW TRANSLATION
  new_zealand.1.b: "Gervan McMillanova umírněnost sjednotí Labour Party." # todo: NEW TRANSLATION
  new_zealand.1.c: "Strana je příliš rozdělená na to, abychom volili; potřebujeme více času." # todo: NEW TRANSLATION
  new_zealand.2.t: "Michael Joseph Savage zemřel" # todo: NEW TRANSLATION
  new_zealand.2.d: "Dnes zemřel premiér Michael Savage, který prohlásil, že Nový Zéland bude stát po boku Británie. Hrdina a velký vůdce, nebojácný kritik toho, co považoval za nesprávné, bude postrádán. Labour Party nyní musí upravit svůj směr po jeho smrti a připravit se převzít vedení země." # todo: NEW TRANSLATION
  new_zealand.2.a: "Odpočívej v pokoji." # todo: NEW TRANSLATION
  new_zealand.2.b: "Nechme straně, ať si zařídí své záležitosti; nyní je čas na novou budoucnost." # todo: NEW TRANSLATION
  new_zealand.3.t: "Všeobecné volby 1938" # todo: NEW TRANSLATION
  new_zealand.3.d: "Hlavní dvě strany v těchto volbách nabídly voličům stále lákavější nabídky. Labour Party vládne už nějakou dobu a slíbila schválit Zákon o sociálním zabezpečení, který poskytne důchody a podporu v nezaměstnanosti. To se ukázalo jako silný argument proti Národní straně, která otevřeně kritizuje Labour. Národní strana, ač nová, získává na popularitě a využívá slabiny Labour vlády. I když jsou volby s největší pravděpodobností ve prospěch Labour, existuje šance, že Národní strana může překvapit." # todo: NEW TRANSLATION
  new_zealand.3.a: "Labour musí dostát svým slibům." # todo: NEW TRANSLATION
  new_zealand.3.b: "Labour měl svou dobu, země potřebuje potřebné změny." # todo: NEW TRANSLATION
  new_zealand.3.c: "Nový Zéland si vytváří svou vlastní budoucnost, budoucnost lidu." # todo: NEW TRANSLATION
  new_zealand.3.e: "Legion dovede Nový Zéland ke slávě." # todo: NEW TRANSLATION
  new_zealand.4.t: "Zbytky Legionu donutí Labour ke složení funkcí" # todo: NEW TRANSLATION
  new_zealand.4.d: "Po smrti premiéra Savage začali podporovatelé Legionu vedení Johnem Ormondem požadovat rezignace významných představitelů Labour, jako jsou Peter Fraser a Walter Nash. Labour vláda, nyní oslabená ztrátou vůdce a bez jasného náhradníka, se zdá Ormondovým požadavkům podřizovat s malým odporem. Čas ukáže, zda se Legion dokáže stát významnou stranou v budoucnosti Nového Zélandu." # todo: NEW TRANSLATION
  new_zealand.4.a: "Legion je nejlepší nadějí pro budoucnost Nového Zélandu." # todo: NEW TRANSLATION
  new_zealand.5.t: "Komunistické letáky se šíří po zemi" # todo: NEW TRANSLATION
  new_zealand.5.d: "Podivné noviny se začaly šířit ve velkých městech, obhajují nový systém přímo proti Legionu a Labour. Zdroj těchto novin není znám; věří se, že pocházejí z venkova. Někteří lidé se radikalizují a propukly nepokoje po celé zemi s požadavky na odstranění vládních představitelů a konec Legionu a jeho vůdce Ormonda. Beznadějná Labour strana se zdá být skloněna se podřídit, ale Ormond hrozí potlačením povstání vlastními stoupenci." # todo: NEW TRANSLATION
  new_zealand.5.a: "Vzdejte se, komunisté nás převyšují." # todo: NEW TRANSLATION
  new_zealand.5.b: "Okamžitě potlačit tyto nepokoje, situaci to jen zhorší." # todo: NEW TRANSLATION
  new_zealand.6.t: "Guvernér generál svolává loajalisty" # todo: NEW TRANSLATION
  new_zealand.6.d: "S nejistým postavením Nového Zélandu jako dominia a návratem monarchie v Británii mnohé strany navrhují nezávislost. Silné loajalistické hnutí vedené guvernérem generálem Georgem Monckton-Arundellem se snaží upevnit kontrolu v zemi. Toto hnutí již vyvolalo otevřené boje mezi radikálními stranami v ulicích Wellingtonu, což vede k otázkám o bezpečnosti státu." # todo: NEW TRANSLATION
  new_zealand.6.a: "Nechme guvernéra prosazovat své požadavky; Nový Zéland stojí s Británií." # todo: NEW TRANSLATION
  new_zealand.6.b: "Potlačit všechna loajalistická hnutí; představují hrozbu pro naši bezpečnost." # todo: NEW TRANSLATION
  new_zealand.9.t: "Komunisté svrhnou Labour a Legion" # todo: NEW TRANSLATION
  new_zealand.9.d: "S rostoucí popularitou komunistické strany propukly nepokoje proti nově oživenému Legionu, zvláště po zhroucení Labour vlády. Převládnuv, pan Ormond odstoupil a budoucnost Nového Zélandu se ocitá v rukou Komunistické strany." # todo: NEW TRANSLATION
  new_zealand.10.t: "Sidney Holland přebírá kontrolu" # todo: NEW TRANSLATION
  new_zealand.10.d: "Adam Hamilton odstoupil z vedení Národní strany a z premiérského úřadu, čímž uvolnil místo Sidneyovi Hollandovi. Holland se ukázal jako hoden nástupce a prohlásil, že bude pokračovat v programu Národní strany." # todo: NEW TRANSLATION
  new_zealand.10.a: "Holland slibuje velké naděje." # todo: NEW TRANSLATION
