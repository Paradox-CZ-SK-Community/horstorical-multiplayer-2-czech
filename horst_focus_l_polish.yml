  pacifistic_activist: "Pacifistický aktivista za nezávislost"
  RAJ_subhas_chanda_bose_desc: "Indický národní kongres zklamal Indii v otázce nezávislosti. Je čas vzít boj přímo do rukou Britů."
  RAJ_Krishna_Pillai: "P. Krishna Pillai"
