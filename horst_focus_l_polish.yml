  JAP_request_international_weaponry_supply: "Požádat o mezinárodní dodávku zbraní" # todo: NEW TRANSLATION
  JAP_request_international_weaponry_supply_EXPL: "Získat také jednu z následujících možností:\n" # todo: NEW TRANSLATION
  JAP_request_international_weaponry_supply_desc: "Stojíme sami proti sovětské moci. Ale s pomocí jiných zemí můžeme udeřit první a jednou provždy tuto hrozbu eliminovat!" # todo: NEW TRANSLATION
