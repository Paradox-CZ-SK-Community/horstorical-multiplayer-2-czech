  SLO_medium_tt: "Získat divizi §Ystředních tanků§! s 15 prapory" # todo: NEW TRANSLATION
  SLO_continue_production: "Zaměřit se na výrobu tanků" # todo: NEW TRANSLATION
  SLO_continue_production_desc: "Pokračováním ve výrobě lehkých tanků, které již známe, můžeme snadno maximalizovat výkon našich továren." # todo: NEW TRANSLATION
  SLO_light_tank: "CKD" # todo: NEW TRANSLATION
  SLO_light_tank_desc: "CKD byla jednou z největších strojírenských společností v bývalém Československu. Nejznámějšími produkty firmy byly lehké tanky vlastního návrhu – Panzer 38(t) – a Jagdpanzer 38(t)." # todo: NEW TRANSLATION
  SLO_light_tank_modernization: "Nové lehké tanky" # todo: NEW TRANSLATION
