  ind07: "[RAJ.GetFlag]§YIndický§! denní §Yvliv§! se zvýší o 0.07"
  indian_provincial_election: "Indické provinční volby"
  indian_provincial_election_desc: "Indické provinční volby jsou za rohem a hlavní politická hnutí soupeří o vliv v provinciích. Výsledky těchto voleb, stanovené v Government of India Act, rozhodnou o budoucnosti subkontinentu.\n\n§YIndický národní kongres§! má nyní vliv v §Y[?inc_control]§!% provincií.\n§YUnionistická strana§! má nyní vliv v §Y[?upa_control]§!% provincií.\n§YNezávislá labouristická strana§! má nyní vliv v §Y[?ifb_control]§!% provincií.\n§Y[?neutral_control]§!% provincií je kontrolováno §gmenšinovými stranami§! nebo je ve slepé uličce.\n\nČím více provincií vyhrávající strana ovládá, tím snazší bude dosažení nezávislosti pokojnou cestou."
  indian_provincial_election_map: "Můžeme zvýšit vliv našich stran v těchto státech"
  indian_provincial_enemy_election: "Kampaň opoziční strany"
  indian_provincial_enemy_election_desc: "Nelze popsat, kolik různých politických stran a organizací se účastní provinčních voleb, a zatímco naše kampaně byly působivé, opozice nespí. Pravidelně pořádají shromáždění a diskuse po celé Indii."
  indian_provincial_election_enemy_map: "Opoziční strana zvyšuje svůj vliv v tomto státě"
  congress_majority: "Majorita Indického národního kongresu"
  congress_majority_desc: "§O[From.GetName]§! §Jje v současnosti pod vlivem §CIndického národního kongresu§!\n§CIndický národní kongres§! má vliv §G[?From.inc]§!\n§CUnionistická strana§! má vliv §G[?From.upa]§!\n§CNezávislá labouristická strana§! má vliv §G[?From.ifb]§!\n§gMenší strany§! mají vliv §G[?From.neutral]§!\n"
  united_party_majority: "Majorita Unionistické strany"
  united_party_majority_desc: "§O[From.GetName]§! §Jje v současnosti pod vlivem §CUnionistické strany§!\n§CIndický národní kongres§! má vliv §G[?From.inc]§!\n§CUnionistická strana§! má vliv §G[?From.upa]§!\n§CNezávislá labouristická strana§! má vliv §G[?From.ifb]§!\n§gMenší strany§! mají vliv §G[?From.neutral]§!\n"
  all_india_forward_bloc_majority: "Majorita Nezávislé labouristické strany"
  all_india_forward_bloc_majority_desc: "§O[From.GetName]§! §Jje v současnosti pod vlivem §CNezávislé labouristické strany§!\n§CIndický národní kongres§! má vliv §G[?From.inc]§!\n§CUnionistická strana§! má vliv §G[?From.upa]§!\n§CNezávislá labouristická strana§! má vliv §G[?From.ifb]§!\n§gMenší strany§! mají vliv §G[?From.neutral]§!\n"
  neutral_stalemate: "Kontrola menšin / Patová situace"
  neutral_stalemate_desc: "§O[From.GetName]§! §Jje v současnosti ve slepé uličce nebo kontrolováno §gmenšinovými stranami§!\n§CIndický národní kongres§! má vliv §G[?From.inc]§!\n§CUnionistická strana§! má vliv §G[?From.upa]§!\n§CNezávislá labouristická strana§! má vliv §G[?From.ifb]§!\n§gMenší strany§! mají vliv §G[?From.neutral]§!\n"
  invite_george_orwell_to_speak: "Pozvat George Orwella, aby promluvil"
  invite_george_orwell_to_speak_desc: "George Orwell, známý spisovatel a autor knih jako Burmese Days, je dlouho hlasitou součástí Britské nezávislé labouristické strany a umožnit tak zkušenému muži vystoupit může jen pomoci našim myšlenkám."
  princely_state_mod: "Panovníkový stát"
  princely_state_mod_desc: "Panovníkový stát je feudální vazal Britského Ráje fungující s určitým stupněm autonomie a monarchickým zřízením. Stále je součástí Britského Ráje, neúčastní se voleb a může se postavit proti možné unifikaci Indie."
  princely_state_independence_mod: "Nezávislý panovníkový stát"
  princely_state_independence_mod_desc: "Panovníkové státy byly vazaly Britského Ráje. Ale nyní, když britská správa a indická vláda uvalily na prince nepřiměřené požadavky, vzali si nezávislost a zřídili své vlastní samostatné říše."
  marginalized_muslims: "Marginalizovaní muslimové"
  marginalized_muslims_0: "Utlačovaní muslimové"
  marginalized_muslims_1: "Marginalizovaní muslimové"
  marginalized_muslims_2: "Opomíjení muslimové"
  marginalized_muslims_3: "Chránění muslimové"
  marginalized_muslims_4: "Zmocnění muslimové"
  marginalized_muslims_desc: "Vztahy mezi jihovýchodními hinduisty a muslimy žijícími ve stejném státním uspořádání byly vždy napjaté. S převažující hinduistickou většinou v Indii je třeba pečlivě vyvažovat zájmy většiny a menšin."
  slight_religious_minority: "Náboženské menšiny"
  placated_muslims: "Uspokojení muslimové" # todo: NEW TRANSLATION
  placated_muslims_desc: "Úspěšně jsme napravil vztahy s muslimy v Sindhu, Pandžábu a Bengálsku a nyní jsou mnohem ochotnější spolupracovat."
  enraged_muslims: "Rozzuření muslimové"
  enraged_muslims_desc: "Nedávné akty naší správy rozezlily muslimskou populaci a trvale zhoršily naše vztahy s nimi."
  princely_state_policing_action: "[From.GetOperationName]"
  princely_state_policing_action_default: "Policejní akce v [From.GetName]"
  princely_state_policing_action_desc: "Šibalství [From.GetPrinceName] již nelze dál přehlížet! Musíme jeho středověkému panství učinit rychlý konec."
  operation_or_cooldown: "Je nebo nedávno neprovedl policejní akci."
  integrated_princely_states: "Integrované panovníkovy státy"
  prince_state_force: "Odemkne §YRozhodnutí§! vzít zbývající §YPanovníkové státy§! vojenskou silou."
  raj_lin_investment_running: "Právě hledáme investice"
  RAJ_Jinnahs_Kingdom_compliance: "Integrace našich muslimských soudruhů"
  india.411.t: "Velmi úspěšná operace"
  india.411.desc: "Nově vzniklé indické vojsko nemělo problém prorazit slabou obranu postavenou [?current_prince_state.GetPrinceName] z [?current_prince_state.GetName] s minimálními ztrátami. Jeho ubohý výtvor země je nyní znovu indický."
  india.411.a: "Co naše armáda nezvládne."
  india.412.t: "Úspěšná operace"
  india.412.desc: "Nově vzniklé indické vojsko provedlo profesionální, taktickou invazi na území [?current_prince_state.GetName]. Síly [?current_prince_state.GetPrinceName] byly přemoženy a ztráty byly nízké."
  india.412.a: "Dobrá práce, chlapi."
  india.413.t: "Hrozná operace"
  india.413.desc: "Nově vzniklé, dezorganizované indické vojsko mělo značné potíže prorazit působivou obranu postavenou [?current_prince_state.GetPrinceName] z [?current_prince_state.GetName]. Po tolika ztracených životech Indů je čas na usmíření a obnovení místní administrace."
  india.413.a: "Musíme rozšířit výcvik."
  india.414.t: "Katastrofická operace"
  india.414.desc: "Indická veřejnost je rozhořčena poslední zprávou o ztrátách. To, co mělo být malou policejní akcí, se proměnilo v nákladnou bitvu s četnými indickými mrtvými na okrajích [?current_prince_state.GetName]. Mezinárodní pozorovatelé žasnou nad vojenskou silou, kterou [?current_prince_state.GetPrinceName] sesbíral. Ačkoliv se [?current_prince_state.GetName] nakonec zlomil, za jakou cenu?"
  india.414.a: "Přiveďte mi generála."
  india.415.t: "Odchod Britů"
  india.415.desc: "Po britském stažení z kontinentu, hrdě po třech stoletích podrobení, byla indická tříbarevná vlajka vztyčena nad parlamentem v Novém Dillí. Britové jsou pryč a Indie se probouzí, nyní odhodlána vykročit do budoucnosti a utvářet svůj osud."
  india.415.a: "Světlý den."
  india.416.t: "Odchod Britů"
  india.416.desc: "Po britském stažení z kontinentu byla indická vlajka vztyčena nad parlamentem v Novém Dillí. Ale na severozápadě Indie to byla úplně jiná story. Nad budovou shromáždění Sindhu vlála islámská hvězda na tmavě zeleném pozadí, jasně neindická vlajka. Přestože naše snahy o nezávislost jsou monumentální, All-India Muslim League získala příliš mnoho vlivu, než abychom si udrželi naše západní a bengálské provincie. Sen o jednotné Indii leží v troskách, pojďme hledět k budoucnosti."
  india.416.a: "Indie, už není jednotná."
  india.416.b: "Ušlechtilý způsob, jak chránit menšiny."
  india.417.t: "Začala dvaapadesátá schůze Kongresu"
  india.417.desc: "Bylo to konstruktivních pět let pro Indický národní kongres pod vedením Jawaharlala Nehrua, ale mnoho v kongresu touží po novém vedení po dlouhé politické dominanci Nehrua. Konečné hlasy přicházejí a..."
  india.417.a: "...Nehru si zajistí dalších pět let!"
  india.417.b: "...Prasad vystřelí do úřadu!"
  india.418.t: "Otázka vedení"
  india.418.desc: "Sikander Hayat Khan bohužel zemřel a už nemůže nést tíhu vedení Indie, Unionistická strana je v rozkladu, protože strana byla centralizována kolem tohoto státníka. Musíme však pohlédnout do budoucnosti a zajistit účinné vedení na několik příštích let."
  india.418.a: "Prezident Khizar Tiwana!"
  india.419.t: "Bhopalský kongres"
  india.419.desc: "Když Ambedkar slyšel zvěsti o široké voličské podpoře Komunistické strany Indie, nyní když byl jeho hlavní cíl zrušení kastovního systému do značné míry dosažen, zamyslel se, zda jeho účel již nebyl naplněn a zda nové vedení nepomůže řešit problémy, které mohl přehlédnout. Byl si jistý, že na Bhopalském kongresu musí veřejně oznámit své rozhodnutí."
  india.419.a: "Ještě pět let!"
  india.419.b: "Možná nové vedení by Indii lépe sloužilo."
  india.420.t: "Zpráva CBI - Hydarabad"
  india.420.desc: "Ústřední vyšetřovací úřad právě potvrdil, že řada velkých mocností vystoupí ve prospěch Hydarabadovy nezávislosti, čímž legitimizují jejich ubohou výmluvu pro stát. Musíme jednat rychle, než zřídí trvalé diplomatické mise!"
  india.420.a: "Jaká hloupost."
  india.421.t: "Indický zásah"
  india.421.desc: "I když jsme stáhli naši administrativu, lodě a jednotky z indického subkontinentu, rozhodli jsme se alespoň chránit indickou a pákistánskou suverenitu během přechodného období. Většina poradců inklinuje k úplnému politickému odtržení, ale zajištění, že Indie nepadne do cizích rukou, může být také prospěšné."
  india.421.a: "Informujte velvyslance."
  india.421.b: "Situace se vyvíjí perfektně."
  india.422.t: "Světová scéna"
  india.422.desc: "Po zajištění naší vnitřní pozice může nyní nastat čas zajistit naši mezinárodní pozici. Naše strana a země se rozdělily, zda se zapojit do mezinárodních aliancí, ale s odhodlaným vedením bylo rozhodnutí prosazeno. Nyní mnoho našich špičkových diplomatů čeká na naše pokyny, kam směřovat."
  india.422.descalt: "To, co se zdá být nejlogičtějším nebo nejpraktičtějším řešením, se může ukázat jako past. Vyjednávání neprobíhala dobře a možná je rozumnější hledat jinde."
  india.422.c: "Pojedeme do Nankingu."
  india.422.j: "Pojedeme do Tokia."
  india.422.s: "Pojedeme do Bangkoku."
  india.422.i: "Pojedeme do Teheránu."
  india.422.e: "Pojedeme do Addis Abeby."
  india.422.p: "Pojedeme do Karáčí."
  india.422.r: "Pojedeme do Moskvy."
  india.422.it: "Pojedeme do Říma."
  india.422.tu: "Pojedeme do Ankary."
  india.422.f: "Pojedeme do Paříže."
  india.422.sp: "Pojedeme do Madridu."
  india.423.t: "Indie žádá o vstup do [Root.GetFactionName]"
  india.423.desc: "Po třech staletích britské nadvlády se Indie osvobodila z okovů kolonialismu a nyní kráčí novou cestou. Zřídila demokratickou vládu a zajistila svou vnitřní politiku, poté se zamyslela nad svým místem na mezinárodní scéně. Zdá se, že došla k závěru, že by jí nejlépe prospěl spojenectví s námi. Můžeme totéž říci my?"
  india.423.a: "Samozřejmě, že můžeme!"
  india.423.b: "Příležitostný úlovek vlivu."
  india.424.t: "Převzetí [RAJ.GetReigningGovernment]"
  india.424.d: "S ohromnou podporou lidu bylo nevyhnutelné, že se [RAJ.GetReigningGovernment] ustanoví jako správná vládnoucí strana Indie"
  india.424.a: "Prezident Nehru"
  india.424.b: "Prezident Hayat Khan"
  india.424.c: "Prezident Ambedkar"
  india.425.t: "Ztráta dominiového statusu"
  india.425.d: "Kvůli nedávným politickým událostem náš status jako [Root.GetName] již není platný a nezávislost bude dosažena bez dalšího varování."
  india.425.a: "Vpřed."
  RAJ_AFG_Railway_Alignment: "Železnice Punjab-Taškent"
  RAJ_AFG_Railway_Alignment_desc: "Naše nové spojenectví s Moskvou vyžaduje přepravu zboží, vojáků a informací mezi našimi dvěma domovinami. V rámci Velké hry stojí Afghánistán v cestě. Jeho nasměrování k našim zájmům posílí naše pouto se Sověty."
  raj_first_five_year_plan: "První etapa pětiletého plánu"
  RAJ_full_speed_ahead: "Pětiletý plán"
  RAJ_failed_five_year_plan: "Selhání pětiletého plánu"
  RAJ_reformed_airforce_command: "Centralizované velení letectva"
  RAJ_deterrence: "Odstrašení"
  india.426.t: "Nabídka od [RAJ.GetFaction]"
  india.426.d: "S aliancí mezi Indií a Sovětským svazem jsme se obávali společného zásahu ke spojení jejich ekonomik a armád. S aktuálním indickým návrhem na stole [ROOT.GetLeader] tyto obavy zasáhly Afghánistán. Výstavba železnice spojující Punjab s středoasijskými republikami SSSR by byla zcela financována oběma mocnostmi s dodatečnými ekonomickými pobídkami pro naši ekonomiku. Nevýhodou by byla zvýšená kontrola Dillí a Moskvy nad námi.\n\nStále rostoucí [AFG.GetCommunistParty] jasně požaduje, aby vláda [AFG.GetRulingParty] návrh přijala."
  india.426.a: "Podvolit se tlaku."
  india.426.b: "Sověty náš koridor nedostanou."
  india.427.t: "Cíle pro pětiletý plán"
  india.427.d: "Na stole [RAJ_Leader_Description] [RAJ.GetLeader] leží dva návrhy pro provedení našeho prvního pětiletého plánu. První plán, byť méně ambiciózní, zajišťuje větší stavební kapacity pro infrastrukturní projekty a výrobu zbraní. Mnozí v naší vládě preferují druhý plán, ve kterém má nejvyšší prioritu ekonomický růst těžkého průmyslu. Tvrdí se, že v současnosti nemáme průmyslovou sílu podpírat části ekonomiky upřednostněné v prvním návrhu."
  india.427.a: "Diversifikovat naše cíle."
  india.427.b: "Posunout průmyslovou výrobu vpřed."
  india.428.t: "Směřování fondů"
  india.428.d: "Bývalé panovníkové státy si musí najít rovné místo v Indii vedle bývalých provincií jako státy unie. Zatímco naše iniciativa se snaží toho dosáhnout, ekonomičtí poradci doporučili hlubší investice do jednoho ze dvou určitých států. Zdá se, že volba záleží na vyznání poradce."
  india.428.a: "Investovat do západního státu."
  india.428.b: "Investovat do centrálního státu."
  raj_five_year_goal_tt: "Během příštího roku se od nás očekává, že rozšíříme průmysl na více než §G[?projected_factories_calc]§! §YCivilních továren§!.\n\nPokud úspěšné, uděluje po §Y1460§! dnech:\n"
  RAJ_industrial_mismanagement: "Průmyslové špatné řízení"
  RAJ_industrial_mismanagement_desc: "Po úplném neplnění pětiletého plánu bylo propuštěno mnoho byrokratů a Ekonomická plánovací komise se může dlouho zotavovat."
  india.440.t: "Šepoty o hladomoru"
  india.440.desc: "Země Bengálska v poslední době stagnují v zemědělské produkci, přestože populace roste a práce je žádaná. Tato stagnace je často připisována odcizení farmářů od půdy a dravému uchopení moci pozemkovými vlastníky. Tato situace je napjatá už delší dobu, ale selhávající monzunové deště mohou znamenat osud mnohem horší — hladomor. Je jasné, že Indie nedokáže dodat úrodu potřebnou k nasycení populace Bengálska, takže naším jediným nadějí je dovoz zahraničních zásob. Musíme svět co nejjasněji informovat o naší zoufalé situaci, jinak můžeme přijít o miliony nevinných životů."
  india.440.a: "Medvěd má hodně k rozdělení."
  india.440.b: "Yankee nás pokryjí."
  india.440.c: "Britové mají na srdci naše nejlepší zájmy."
  india.440.d: "Nevyprovdané zvěsti."
  india.441.t: "Hladomor v Indii"
  india.441.desc: "Kvůli selhávajícím monzunům se Indie, konkrétně Bengálsko, blíží k hladomoru a administrativa volá po naší pomoci a zásobách. Pokud vyhovíme této výzvě, indická vláda a populace budou pravděpodobně nakloněny naší zemi. Kromě toho je dodání potravin morální volbou a někteří by řekli i naší morální povinností. Ale zda jsou zdroje k dispozici, už není otázkou morálky."
  india.441.sov.desc: "Kvůli nedbalé britské koloniální správě se Indie blíží k hladomoru a mnoho jejích domorodých politiků volá o pomoc k našemu prosperujícímu svazu. Někteří experti se shodují, že miliony životů mohou být v ohrožení, pokud Indie neobdrží externí zásoby k nasycení své chudobou sužované populace. Kromě morální otázky odmítnutí této žádosti by to mohlo také probudit indický lid vůči zanedbávání a útlaku, kterému čelil po tři století. Generální tajemníku, volba je na vás."
  india.441.a: "Dodáme našim soudruhům v Indii!"
  india.441.b: "Pošlete zboží, pošlete s tím trochu demokracie."
  india.441.c: "Cokoli pro perlu."
  india.441.d: "Chybí nám zdroje."
  india.442.t: "Odezva [From.GetAdjective]"
  india.442.desc: "Zdá se, že [From.GetLeader] pečlivě zvážil svou odpověď a ke štěstí milionů životů se rozhodl pro dodávky potravin na úkor vlastní ekonomiky."
  india.442.a: "Bengálsko si oddechne"
  india.443.t: "Odezva [From.GetAdjective]"
  india.443.desc: "Obdrželi jsme zbabělé vyjádření od [From.GetLeader], který uvedl údajný nedostatek zdrojů jako ospravedlnění, proč nechá miliony zemřít zbytečně. Indie mu to nezapomene."
  india.443.a: "Peklo je na nás."
  colony_of_burma: "Kolonie Barma"
  colony_of_burma_desc: "V roce 1937 byla Kolonie Barma oddělena od Britského Ráje a již není pod jeho administrací."
  india.444.t: "Zahájení imperiální konference"
  india.444.desc: "Po jejich korunovaci král Jiří VI. a jeho manželka královna Alžběta svolali další imperiální konferenci, aby projednali záležitosti impéria v těchto těžkých časech. Očekává se, že se budou jednat o více sjednocené ekonomické a vojenské politice."
  india.444.a: "Lákavá nabídka."
  india.445.t: "Pozvání do SAARC"
  india.445.d: "Nově založený [RAJ.GetNameDef] začal pracovat na ekonomickém společenství nazvaném: \"Sdružení pro regionální spolupráci v jižní Asii\", zkráceně SAARC, aby čelilo rozmáhajícímu se imperialismu a zaostalosti v regionu. Byli jsme pozváni, abychom se připojili k tomuto novému ekonomickému bloku."
  india.445.a: "Lákavá nabídka."
  india.445.b: "Nevyměníme jednoho vykořisťovatele za druhého."
  india.446.t: "Návštěva [PRC.GetNameDef]"
  india.446.desc: "V našich nedávných snahách zabránit asijskému kolonialismu jsme se zaměřili na naše utlačované bratry přímo okupované evropskými mocnostmi. Ale je chybnou slabinou ignorovat například Čínu, jejíž lidé byli sužováni západním vlivem, slabou vládou a špatnými životními podmínkami. Až dostali alternativu v Maoově komunistickém hnutí. V čínské vlasti musíme rozhodnout, jakou pomoc by čínský lid mohl potřebovat."
  india.446.a: "Ruční zbraně k ochraně a osvobození Číny!"
  india.446.b: "Politická podpora ke konsolidaci ČLR."
  india.446.c: "Průmyslová podpora k povýšení jejich dělníků."
  india.447.t: "[RAJ.GetAdjective] podpora dorazila!"
  india.447.desc: "Nově demokratická, nezávislá, socialistická Indie nám poskytla neocenitelnou podporu, na kterou čínský lid nikdy nezapomene."
  india.447.a: "Tyto indické zbraně zmaří utlačovatele."
  india.447.b: "Tato politická podpora značně pomůže KPC."
  india.447.c: "Tento nový průmysl podpoří čínské dělníky."
