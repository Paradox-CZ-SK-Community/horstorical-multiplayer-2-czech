  GER_weserubung2: "Unternehmen Weserübung (Norsko)" # todo: NEW TRANSLATION
  GER_weserubung2_desc: "S Dánskem zajištěným může naše armáda nyní bezpečně invadovat a obsadit Norsko." # todo: NEW TRANSLATION
  lower_air_purge_tt: "Naše penalizace pro účinnost leteckých misí za vyčistění klesne o 5%" # todo: NEW TRANSLATION
