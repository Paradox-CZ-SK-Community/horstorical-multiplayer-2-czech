  JAP_PHI_dominate_the_philippines: "Dominovat Filipínám" # todo: NEW TRANSLATION
  JAP_PHI_dominate_the_philippines_EXPL1: "\nToto je §CReaktivní fokus§!. Pokud [PHI.GetFlag]§H[PHI.GetName]§! není §HPuppet§! nebo pokud jejich Overlord má méně než §H50% Stability§! nebo je ve §HCivilní válce§!, tento fokus místo toho vykáže následující §GEfekty§!:\n" # todo: NEW TRANSLATION
  JAP_PHI_dominate_the_philippines_EXPL2: "[USA.GetFlag]§H[USA.GetName]§! bude schopen okamžitě podniknout §RAkci§! jako odpověď!" # todo: NEW TRANSLATION
