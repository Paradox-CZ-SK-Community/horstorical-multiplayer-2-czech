  SLO_moto_mech_idea: "Zaměření na mechanizaci" # todo: NEW TRANSLATION
  SLO_special_forces: "Centrum výcviku komandos" # todo: NEW TRANSLATION
  SLO_special_forces_desc: "Úspěchy německých výsadkových jednotek v prvních letech WWII byly impulzem pro mnohé středo‑evropské země vybudovat si vlastní letecké výsadkové síly. V prvních měsících roku 1942 se Slovenský štát, spojenec Německa, rozhodl vytvořit výsadkové výcvikové centrum." # todo: NEW TRANSLATION
