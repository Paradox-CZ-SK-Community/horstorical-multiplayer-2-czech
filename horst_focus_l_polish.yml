  SLO_mass_assault: "Masový útok" # todo: NEW TRANSLATION
  SLO_mass_assault_desc: "" # todo: NEW TRANSLATION
  SLO_tank_focus: "Rychlá skupina 'Kalinčiak'" # todo: NEW TRANSLATION
  SLO_tank_focus_desc: "Rychlá divize byla slovenskou tankovou divizí bojující na východní frontě po boku okupačních vojsk. Rychlá divize vznikla 23. července 1941 po několika reorganizacích Rychlé brigády, dříve Rychlé skupiny. Později, po stažení z Kavkazu, byla divize přejmenována na 1. pěší nebo 1. technickou." # todo: NEW TRANSLATION
  SLO_motorized_focus: "Slovenské mobilní velení" # todo: NEW TRANSLATION
  SLO_motorized_focus_desc: "Slovenské mobilní velení bylo přiděleno k německé 17. armádě a krátce poté předáno do přímého německého velení. Tato jednotka bojovala s 17. armádou až do července 1941, včetně bitev u Umanu a Lypovce." # todo: NEW TRANSLATION
  SLO_prepare_production: "Nový typ tanků" # todo: NEW TRANSLATION
  SLO_prepare_production_desc: "Musíme zajistit, aby naše výrobní linky byly připraveny na náročnější typ tanku." # todo: NEW TRANSLATION
  SLO_daimler_benz: "Daimler‑Benz" # todo: NEW TRANSLATION
  SLO_daimler_benz_desc: "" # todo: NEW TRANSLATION
