  SLO_commando_tt: "Bude k najmutí k dispozici §YCommando (Expert)§! za §Gzdarma§!" # todo: NEW TRANSLATION
  gdansk2_tt: "\n§GZačneme utahovat kontrolu nad Gdaňskem, nakonec přivedeme jeho celé obyvatelstvo a průmysl pod naši přímou kontrolu.§!" # todo: NEW TRANSLATION
  gdansk_tt: "\n§GPlně zvýšíme naši kontrolu nad průmyslem a obyvatelstvem Gdaňsku.§!" # todo: NEW TRANSLATION
  no_dutch_player: "Válečný stroj Nizozemských Východních Indii" # todo: NEW TRANSLATION
