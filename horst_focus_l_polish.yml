  RAJ_Governor_Genral_Lord_Mountbatten: "Louis Mountbatten"
  RAJ_Governor_General_Archibald_Wavell: "Archibald Wavell" # todo: NEW TRANSLATION
  india.279.t: "Postavení žen"
  india.279.desc: "Již jsme řešili mnoho politik a křivd přenesených z předchozí správy, ale jednu věc jsme zcela opomněli: genderovou rovnost. Existuje mnoho odlišných názorů na tuto záležitost, které je třeba uspokojit, a je v našem nejlepším zájmu tuto otázku rychle řešit."
  india.279.a: "Nesetrvávejme v zaostalosti."
  india.279.b: "Nechme to zatím být."
  india.279.c: "Některé tradice je lepší zachovat."
  india.280.t: "Vicekrál začíná mít obavy"
  india.280.desc: "Ačkoli by úřad vicekrále měl být vzdálen provinčním volbám, šíří se zvěsti o pokusech sabotovat naši kampaň. Samozřejmě nemohly být příliš úspěšné, jinak bychom tu nebyli. Zdá se však, že vicekrál zvažuje, zda nepoužít svou pozici k zvrácení politik, které považuje za nevhodné, a sabotovat naše hnutí. Musíme jít opatrně, abychom se vyhnuli hněvu generálního guvernéra."
  india.280.a: "Ať jde do pekla."
  india.281.t: "Zásahy do naší politiky"
  india.281.desc: "Mocichtivé, kolonialistické prsty vicekrále využily příležitosti po našem záběru soukromých železnic a obecné infrastruktury, vrátily změny zpět a nechaly distribuci Indie ladem, jako vždy, a to vše pro jakýsi malý, nevýznamný politický zisk. I když byl tento krok široce kritizován indickou populací, rozhodnutí vicekrále se mu spektakulárně vymstilo a několik domorodců, kteří věřili britské dobré vůli, je konečně začalo vidět takové, jaké jsou: vykořisťovatelskými, nafoukanými imperialisty."
  india.282.desc: "Mocichtivé, kolonialistické prsty vicekrále využily příležitosti po našem záběru soukromých továren a podniků pro zaměstnance, vrátily změny zpět a nechaly indickou ekonomiku ladem, jako vždy, a to vše pro malý politický zisk. Ačkoliv byl tento krok široce kritizován, rozhodnutí vicekrále se mu vymstilo a ti, kteří doposud věřili britské dobré vůli, je začali vidět jako vykořisťovatele."
  india.283.desc: "Mocichtivé, kolonialistické prsty vicekrále využily příležitosti po našem záběru bankovních institucí, vrátily změny zpět a nechaly indickou distribuční síť ladem, jako vždy, a to vše pro malý politický zisk. Ačkoliv byl tento krok široce kritizován, rozhodnutí vicekrále se mu vymstilo a několik domorodců, kteří věřili britské dobré vůli, je začali vidět jako vykořisťovatele."
  india.291.t: "Srílanská delegace nabízí bílý mír"
  india.291.d: "Srílanské delegace se setkaly s našimi v Madurai za důležitý krok směrem k míru a prosperitě pro obě naše země."
  india.292.t: "Nepálská delegace nabízí bílý mír"
  india.292.d: "Nepálské delegace se setkaly s našimi v Dillí za důležitý krok směrem k míru a prosperitě pro obě naše země."
  india.293.t: "Bhútánská delegace nabízí bílý mír"
  india.293.d: "Bhútánské delegace se setkaly s našimi v Kalkatě za důležitý krok směrem k míru a prosperitě pro obě naše země."
  india.294.t: "Skupiny za práva žen vymáhají své požadavky."
  india.294.d: "Během voleb jsme několika skupinám za práva žen slíbili naprostou rovnost. Díky tomu jsme získali mnoho hlasů a možná i vyhráli volby. Nyní, když jsme porušili ten slib, znovu nám zatlačily na ruku."
  india.294.a: "To nebyl zrovna dobrý nápad."
  india.2940.t: "Skupiny za práva žen žádají odpovědi."
  india.2940.d: "Během voleb jsme žádali o pomoc různé ženské organizace po celé zemi a slíbili jim, že jsme jediní ochotní zajít dost daleko pro ženská práva. Náš slib zůstal nesplněn, což vyvolalo otázky v našich řadách."
  india.2940.a: "Do toho se jednou pustíme."
  women_rights_demands_tt: "Bylo by moudré prosadit úplnou rovnost dříve, než nám to bude vnuceno."
  india.291.a: "Konečně mír"
  india.291.b: "Bez kapitulace, pro dobro impéria"
  RAJ_Immediate_Famine_Response: "Okamžitá reakce na hladomor"
  RAJ_Further_Recovery_Efforts: "Další úsilí o zotavení z hladomoru"
  grant_concessions_to_the_british: "Udělit Britům ústupky"
  grant_concessions_to_the_british_desc: "Udělením malých ústupků v surovinách Britům je učiníme ochotnějšími nás pustit."
  grant_concessions_to_the_british_2: "Udělit Britům další ustupky"
  grant_concessions_to_the_british_2_desc: "Udělením větších surovinových ústupků Britům je učiníme ochotnějšími nás pustit."
  organize_large_scale_strikes: "Organizovat rozsáhlé stávky"
  organize_large_scale_strikes_desc: "Vykořisťování dělníků není jen dílem Britů; zbavení se jich by byl první krok osvobození. Zapojíme se do rozsáhlých stávek, které donutí Brity jednat."
  instigate_communal_violence: "Podnítit komunitální násilí"
  instigate_communal_violence_desc: "Jiné metody nátlaku na naše koloniální nadvlády selhaly. Naší poslední možností se zdá být podněcování napětí v etnicky různorodých městech v naději, že Britové zareagují."
  promote_ethnic_harmony: "Podporovat etnickou harmonii"
  promote_ethnic_harmony_desc: "Zatímco Jinnah a jeho Muslimská liga hlásají oddělení menšin, my musíme zaujmout opačný postoj—stát za trvalou etnickou, kulturní a náboženskou harmonií."
  utilize_more_extrem_factions: "Využít extrémnější frakce"
  utilize_more_extrem_factions_desc: "Zatímco naše hlavní kampaň jde dobře, tajná podpora extremistů by nám mohla dát výhodu v jednání."
  concede_to_capitalists: "Ustoupit kapitalistům"
  concede_to_capitalists_desc: "Podporou bohatých průmyslníků si zajistíme jejich podporu proti britským delegacím."
  hinder_pak_influence: "Zabránit vlivu AIML"
  hinder_pak_influence_desc: "Musíme sabotovat úsilí pákistánských delegací, aby zajistily naše území."
  appeal_for_international_support: "Žádat o mezinárodní podporu"
  appeal_for_international_support_desc: "Ačkoliv se naši diplomaté snaží vyvíjet tlak na Brity, bylo by účinnější mít za zády cizí vládu."
  india.10.t: "[?RAJBACKER.GetName] požaduje svobodnou Indii."
  india.10.e: "Vláda [?RAJBACKER.GetAdjective] oficiálně vyjádřila diplomatickou podporu §Yindickým§! delegacím usilujícím o nezávislost. Dovolit jim mluvit může zjednodušit jejich odpor proti naší koloniální vládě."
  india.10.a: "Dejme jim alespoň možnost promluvit."
  india.10.b: "Nedovolíme, aby nám [?RAJBACKER.GetNameDef] diktoval politiku."
  indinfluence15: "§YIndické delegace§! budou mít snazší čas vyvíjet tlak na §Yindickou nezávislost§!"
  increase_both_influence: "Spolupráce s AIML"
  increase_both_influence_desc: "Spojením našich snah budeme efektivněji tlačit na Brity, aby dříve uvolnili subkontinent z kolonialismu, za cenu možnosti, že náš velký národ bude rozdělen."
