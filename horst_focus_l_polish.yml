  r56_RAJ_towards_a_post_colonial_economy_desc: "Ekonomické reformy a uvolnění indického potenciálu přinesou vzestup indických podniků." # todo: NEW TRANSLATION
  r56_RAJ_modernization_program: "Program modernizace" # todo: NEW TRANSLATION
  r56_RAJ_modernization_program_desc: "S odstraněním koloniálních monopolů lze vybudovat novou ekonomiku. Do roku 2020 budeme velmocí!" # todo: NEW TRANSLATION
  r56_RAJ_indian_education: "Indické vzdělání" # todo: NEW TRANSLATION
  r56_RAJ_indian_education_desc: "Kolonizátoři nás naučili být poslušní a podřízení... Musíme tyto nástroje nadvlády odhodit a využít vědění k osvobození Indie!" # todo: NEW TRANSLATION
  r56_RAJ_establish_a_general_staff: "Zřídit [ROOT.GetAdjective] generální štáb" # todo: NEW TRANSLATION
  r56_RAJ_establish_a_general_staff_desc: "Naše armáda postrádá správné taktiky a organizaci. Zřízení pravého generálního štábu konsoliduje oslabené vojenské uspořádání." # todo: NEW TRANSLATION
  r56_RAJ_army_reform: "Reforma armády" # todo: NEW TRANSLATION
  r56_RAJ_army_reform_desc: "Přeorganizování armády je dlouhý proces. Náš nový generální štáb naznačuje potřebu vojenských manévrů, výcviku vojáků a vzdělávání důstojníků." # todo: NEW TRANSLATION
  r56_RAJ_doctrine_effort: "Úsilí o doktríny" # todo: NEW TRANSLATION
  r56_RAJ_equipment_effort: "Úsilí o vybavení" # todo: NEW TRANSLATION
  r56_RAJ_equipment_effort_desc: "Limity toho, co pěchota může nést, se neustále posouvají. Zaměříme se na to, abychom našim jednotkám dali nejlepší dostupné nástroje." # todo: NEW TRANSLATION
  r56_RAJ_equipment_effort_2: "Modernizovat naše ruční zbraně" # todo: NEW TRANSLATION
  r56_RAJ_equipment_effort_2_desc: "Budeme pokračovat v úsilí zajistit, aby naše pěchota a podpůrné jednotky byly vybaveny co nejlepším možným vybavením své doby." # todo: NEW TRANSLATION
  r56_RAJ_mechanization_effort: "Úsilí o mechanizaci" # todo: NEW TRANSLATION
  r56_RAJ_mechanization_effort_desc: "Přehodnocením možností motorizované pěchoty můžeme posunout hranice toho, jaká vozidla dnes dokážeme vyrobit." # todo: NEW TRANSLATION
  r56_RAJ_doctrine_effort_2: "Válečná cvičení" # todo: NEW TRANSLATION
  r56_RAJ_doctrine_effort_2_desc: "Bojiště se od první světové války změnilo i v nedávných konfliktech. Musíme neustále přehodnocovat doktríny, aby odrážely tyto změny." # todo: NEW TRANSLATION
  r56_RAJ_establish_a_military_academy: "Zřídit vojenskou akademii" # todo: NEW TRANSLATION
  r56_RAJ_establish_a_military_academy_desc: "Studium doktrín a výměna vojenských znalostí mohou být usnadněny v prostorách nově založené vojenské akademie." # todo: NEW TRANSLATION
  r56_RAJ_equipment_effort_3: "Výzkum dělostřelectva" # todo: NEW TRANSLATION
  r56_RAJ_equipment_effort_3_desc: "Místo napodobování nebo nákupu cizího vybavení se musíme stát světovými vůdci v pěchotních zbraních." # todo: NEW TRANSLATION
  r56_RAJ_doctrine_effort_desc: "Vojenské doktríny, které definovaly pozemní boj v první světové válce, jsou zastaralé. Musíme přizvat naše nejlepší hlavy, aby formovaly vojenskou myšlenku zítřka." # todo: NEW TRANSLATION
  r56_RAJ_army_modernization: "Modernizace armády" # todo: NEW TRANSLATION
  r56_RAJ_army_modernization_desc: "Aby naši vojáci vydrželi nejnáročnější manévry a výcviky, potřebují správné oblečení, vybavení a nástroje." # todo: NEW TRANSLATION
  r56_RAJ_motorization_effort: "Úsilí o motorizaci" # todo: NEW TRANSLATION
  r56_RAJ_motorization_effort_desc: "Pohyblivost a ochrana jsou klíčové k bezpečnému přesunu pěchoty na bojiště a z něj. Zaměření na tyto oblasti nám umožní jednat rychle." # todo: NEW TRANSLATION
  r56_RAJ_establish_a_armor_corp: "Zřídit tankovou korporu" # todo: NEW TRANSLATION
  r56_RAJ_establish_a_armor_corp_desc: "Nedávno nakoupené zahraniční vojenské vybavení inspirovalo místní inženýry k vývoji nového typu obrněného vozidla, které vypadá rychlejší, odolnější a silnější, než jsme si dovedli představit." # todo: NEW TRANSLATION
  r56_RAJ_field_hospitals: "Zlepšit polní nemocnice" # todo: NEW TRANSLATION
  r56_RAJ_field_hospitals_desc: "Ztráta talentovaných a zkušených vojáků v boji je v současných okolnostech nepřijatelným luxusem." # todo: NEW TRANSLATION
  r56_RAJ_special_forces: "Speciální jednotky" # todo: NEW TRANSLATION
  r56_RAJ_special_forces_desc: "Potřebujeme elitní jednotky; horská vojska a výsadkáři by měli být naší prioritou." # todo: NEW TRANSLATION
  r56_RAJ_signal_companies: "Signalizační roty" # todo: NEW TRANSLATION
  r56_RAJ_signal_companies_desc: "Koordinace úderů a vojenských operací bude výrazně efektivnější, pokud vyhradíme další personál vybavený komunikačními zařízeními." # todo: NEW TRANSLATION
  r56_RAJ_modern_logistics: "Moderní logistika" # todo: NEW TRANSLATION
  r56_RAJ_modern_logistics_desc: "Vojenská loajalita je založena na schopnosti bojovat za naši věc. Pokud armádě nebudeme schopni dodávat potřebné vybavení, můžeme čelit vzpourám a masivním dezerterstvím." # todo: NEW TRANSLATION
  r56_RAJ_expand_mazagon_dock: "Rozšířit Mazagon Dock" # todo: NEW TRANSLATION
  r56_RAJ_expand_mazagon_dock_desc: "Mazagon Dock v Bombaji je náš nejdůležitější loděnice na západním pobřeží. Potřebuje větší kapacitu v této světové krizi." # todo: NEW TRANSLATION
  r56_RAJ_found_scindia_shipyard: "Založit loděnici Scindia" # todo: NEW TRANSLATION
  r56_RAJ_found_scindia_shipyard_desc: "Potřebujeme dok na východním pobřeží země, takže zřízení Scindia Shipyard ve Visakhapatnamu dává smysl pro naši námořní budoucnost." # todo: NEW TRANSLATION
  r56_RAJ_royal_indian_navy: "Královské indické námořnictvo" # todo: NEW TRANSLATION
  r56_RAJ_royal_indian_navy_desc: "Královské indické námořnictvo bude potřeba rychle rozšířit. Nové taktiky a nové lodě by měly být prioritou." # todo: NEW TRANSLATION
  r56_RAJ_screening_effort: "Úsilí o eskortu" # todo: NEW TRANSLATION
  r56_RAJ_screening_effort_desc: "Indie hraje klíčovou roli v obraně jižní cesty ke Suezskému průplavu. Maskovací a eskortní mise pomohou zajistit, že nezbytné zásoby a vojáci se dostanou do evropských a afrických divadel." # todo: NEW TRANSLATION
  r56_RAJ_cruiser_effort: "Úsilí o křižníky" # todo: NEW TRANSLATION
  r56_RAJ_cruiser_effort_desc: "Křižníky budou prozatím dostačující pro rozvoj a rozšíření indické námořní moci." # todo: NEW TRANSLATION
  r56_RAJ_submarine_effort: "Úsilí o ponorky" # todo: NEW TRANSLATION
  r56_RAJ_submarine_effort_desc: "S rostoucí japonskou povrchovou námořní silou v Asii může mít smysl zaměřit se na činnost pod hladinou a udeřit ponorkami." # todo: NEW TRANSLATION
  r56_RAJ_capital_ship_effort: "Úsilí o hlavní lodě" # todo: NEW TRANSLATION
  r56_RAJ_capital_ship_effort_desc: "Jako britská základna viděla Indie sílu hlavních lodí v ovládání moří. Měli bychom stavět vlastní těžké křižníky a bitevní lodě." # todo: NEW TRANSLATION
  r56_RAJ_modernizing_navy: "Modernizace námořnictva" # todo: NEW TRANSLATION
  r56_RAJ_modernizing_navy_desc: "Lepší motory, více místa pro posádku, vyšší rychlost a větší děla. Indické námořnictvo bude brzy patřit k nejlepším na kontinentu." # todo: NEW TRANSLATION
  r56_RAJ_naval_equipment: "Revidovat námořní vybavení" # todo: NEW TRANSLATION
  r56_RAJ_naval_equipment_desc: "Různé prvky na palubě našich lodí lze a měly by být modernizovány." # todo: NEW TRANSLATION
  r56_RAJ_military_technologies: "Vojenské technologie" # todo: NEW TRANSLATION
  r56_RAJ_military_technologies_desc: "Musíme využít naše modernizační úsilí a investovat do nových technologií." # todo: NEW TRANSLATION
  r56_RAJ_aviation_effort: "Osvobodit indické letectvo" # todo: NEW TRANSLATION
  r56_RAJ_aviation_effort_desc: "Musíme osvobodit nejen naši zemi, ale i naše nebe!" # todo: NEW TRANSLATION
  r56_RAJ_fighter_focus: "Vyvíjet stíhače" # todo: NEW TRANSLATION
  r56_RAJ_fighter_focus_desc: "Obratnost a rychlost jsou klíčem k vzdušné převaze." # todo: NEW TRANSLATION
  r56_RAJ_bomber_focus: "Vyvíjet bombardéry" # todo: NEW TRANSLATION
  r56_RAJ_bomber_focus_desc: "Útočné schopnosti a dostřel jsou nejlepší způsoby, jak zničit naše nepřátele." # todo: NEW TRANSLATION
  r56_RAJ_torpedo_bombers: "Námořní útočná letadla" # todo: NEW TRANSLATION
  r56_RAJ_torpedo_bombers_desc: "Schopnost letadel zasáhnout loď torpédy bude zásadní k neutralizaci britského námořnictva." # todo: NEW TRANSLATION
  r56_RAJ_aviation_effort_2: "Pokročilé letecké taktiky" # todo: NEW TRANSLATION
  r56_RAJ_aviation_effort_2_desc: "Nové letecké taktiky musí být navrženy tak, aby maximalizovaly efektivitu každého letadla a omezily ztráty pilotů." # todo: NEW TRANSLATION
  r56_RAJ_rocket_effort: "Tryskové motory" # todo: NEW TRANSLATION
  r56_RAJ_rocket_effort_desc: "Raketonové motory jsou budoucností letectví!" # todo: NEW TRANSLATION
  r56_RAJ_revolt_against_the_oppressors_showcase: "Povstaňte proti utlačovatelům" # todo: NEW TRANSLATION
  r56_RAJ_revolt_against_the_oppressors_showcase_desc: "Byli jsme dlouho odepřeni našemu právoplatnému dědictví a místu pod pálícím sluncem. Nastal čas. Ke zbraním, bratři a sestry! Ke zbraním, dělníci a rolníci! Každý muž v každé vesnici, městě i městysu musí bojovat proti kolonizátorům!" # todo: NEW TRANSLATION
  RAJ_ignore_and_then_support_hazad_hind_to_trigger_the_civil_war: "Pro odemčení této cesty ignorujte hrozbu Azad Hind a použijte rozhodnutí k posílení jejich přítomnosti." # todo: NEW TRANSLATION
  r56_indian_revolt_focus: "Strom fokusů povstání Azad Hind" # todo: NEW TRANSLATION
  r56_india_generic: "Obecný indický strom fokusů" # todo: NEW TRANSLATION
  india.500.t: "Integrace Indie" # todo: NEW TRANSLATION
  india.500.desc: "Britové nevládli indickému subkontinentu sami, naopak velké množství území je stále vlastněno dynastiemi starých vládců. Jejich osobní bohatství je důležitější než dobro jejich lidí, proto bude obtížné je integrovat bez kompromisů nebo krveprolití. Musíme zajistit úplnou integraci těchto statků ve prospěch našeho lidu." # todo: NEW TRANSLATION
  india.500.a: "Vpřed." # todo: NEW TRANSLATION
  india.501.t: "Nejslabší knížata souhlasí." # todo: NEW TRANSLATION
  india.501.desc: "Mnoho knížat vládl jen nad malým územím a okamžitě souhlasili odevzdat svou zemi Indii. Bylo zřejmé většině poradců, že monarchové, kteří vládnou jen několika náměstím, nechtějí čelit indickým ozbrojeným silám, ale nikdy si nemůžete být jisti." # todo: NEW TRANSLATION
  india.501.a: "Samozřejmě souhlasí." # todo: NEW TRANSLATION
  india.4270.t: "Asaf Jah odmítá integraci do Indie" # todo: NEW TRANSLATION
  india.4270.desc: "Asaf Jah VII striktně odmítl integraci do nové indické vlády. Dynastie Nizámů je muslimská, ale s hinduistickou většinou, a použili své náboženství jako hlavní argument proti integraci." # todo: NEW TRANSLATION
  india.4270.a: "Pozůstatek mizejícího světa." # todo: NEW TRANSLATION
  india.4271.t: "Hyderabad se integruje do Indie" # todo: NEW TRANSLATION
  india.4271.desc: "Asaf Jah VII dnes ráno přijal podepsat instrument přistoupení a tím se připojil k Indii." # todo: NEW TRANSLATION
  india.4271.a: "Vítězství pro Indii." # todo: NEW TRANSLATION
  india.4410.t: "Jammu a Kašmír odmítá integraci do Indie" # todo: NEW TRANSLATION
  india.4410.desc: "Bylo hlášeno, že Hari Singh veřejně prohlásil, že za současných okolností nesouhlasí s integrací do Indie." # todo: NEW TRANSLATION
  india.4410.a: "Zaplatí za to v pravý čas." # todo: NEW TRANSLATION
  india.4411.t: "Jammu a Kašmír se ochotně integruje do Indie" # todo: NEW TRANSLATION
  india.4411.desc: "Včera večer v paláci Hari Singh konečně podepsal instrument přistoupení a souhlasil postoupit Jammu a Kašmír nové indické vládě." # todo: NEW TRANSLATION
  india.4411.a: "Naše severní hranice zajištěna." # todo: NEW TRANSLATION
  india.4250.t: "Mysore odmítá připojení k Indické unii" # todo: NEW TRANSLATION
  india.4250.desc: "25. maharadža Mysore potřeboval více času než jiní, aby nalezl osud svého království, ale nakonec učinil pošetilé rozhodnutí odmítnout integraci do Indie." # todo: NEW TRANSLATION
  india.4250.a: "Je to příliš důležité na to, abychom to pustili." # todo: NEW TRANSLATION
  india.4251.t: "Království Mysore se připojuje k Indii" # todo: NEW TRANSLATION
  india.4251.desc: "25. maharadža Mysore potřeboval více času než jiní, aby nalezl osud svého království, ale nakonec pochopil, že jeho budoucnost leží s Indií." # todo: NEW TRANSLATION
  india.4251.a: "Životně důležitá část Indie!" # todo: NEW TRANSLATION
  india.4440.t: "Balúčistán se ukazuje odolným" # todo: NEW TRANSLATION
  india.4440.desc: "Současný chán z Kalat dnes učinil unáhlené a mylné rozhodnutí nechat svá odtržená území pro sebe, uzamčená od indického lidu." # todo: NEW TRANSLATION
  india.4440.a: "Musíme zajistit západ." # todo: NEW TRANSLATION
  india.4441.t: "Balúčistán se připojuje k Indii" # todo: NEW TRANSLATION
  india.4441.desc: "Současný chán z Kalat dnes učinil informované a racionální rozhodnutí o účasti svého a svého území v Indické unii." # todo: NEW TRANSLATION
  india.4441.a: "Západní hranice zajištěna." # todo: NEW TRANSLATION
  india.4370.t: "Stát Gwalior odmítá sjednocení" # todo: NEW TRANSLATION
  india.4370.desc: "Jivajirao Sindhia ze státu Gwalior zablokoval jakoukoli myšlenku integrace do Indie. To hodně destabilizovalo jeho říši, protože většina jeho občanů chce sjednocení s Indií." # todo: NEW TRANSLATION
  india.4370.a: "Jednou je osvobodíme." # todo: NEW TRANSLATION
  india.4371.t: "Stát Gwalior vítá sjednocení" # todo: NEW TRANSLATION
  india.4371.desc: "Jivajirao Sindhia dlouho přemýšlel o budoucnosti své říše a díky našim dobrým úmyslům se rozhodl integrovat do Indie." # todo: NEW TRANSLATION
  india.4371.a: "Slavný den." # todo: NEW TRANSLATION
  india.4330.t: "Stát Jaipur odmítá integraci" # todo: NEW TRANSLATION
  india.4330.desc: "17. maharadža Jaipur, Man Singh II., bohužel rozhodl zachovat úplnou kontrolu nad státem Jaipur, zatímco lid na ulicích protestuje proti tomuto sobeckému rozhodnutí." # todo: NEW TRANSLATION
  india.4330.a: "To je škoda." # todo: NEW TRANSLATION
  india.4331.t: "Stát Jaipur přijímá integraci" # todo: NEW TRANSLATION
  india.4331.desc: "17. maharadža Jaipur, intelektuál v srdci, si všiml nacionalistických výzev k sjednocení Indie a uznal, že je jeho morální povinností podřídit se sjednocení." # todo: NEW TRANSLATION
  india.4331.a: "Opravdu chytrý krok." # todo: NEW TRANSLATION
  india.4280.t: "Stát Limbdi odmítá začlenění" # todo: NEW TRANSLATION
  india.4280.desc: "Daulatsinhji Jashwantsinhji ze státu Limbdi je tradiční člen dynastie Jhala, je tvrdým konzervativcem a jeho říše je převážně venkovská. Není překvapením, že se přidržel svých staromódních názorů a rozhodl se proti sjednocení." # todo: NEW TRANSLATION
  india.4280.a: "Smutná realita." # todo: NEW TRANSLATION
  india.4281.t: "Stát Limbdi přijímá připojení" # todo: NEW TRANSLATION
  india.4281.desc: "I když princ státu Limbdi může být tvrdým tradicionalistou, uvědomil si geopolitické následky nesprávného rozhodnutí a podepsal instrument přistoupení, čímž zachránil svůj lid." # todo: NEW TRANSLATION
  india.4281.a: "Moudré rozhodnutí." # todo: NEW TRANSLATION
  SIA_resist_the_governement: "Odpor Khana Ratsadon" # todo: NEW TRANSLATION
  SIA_resist_the_governement_desc: "Vláda Khana Ratsadon se den za dnem přibližuje k autoritářství a nacionalistické rétorice. Siam nikdy nebude fašistickým národem, a nejlepší způsob, jak tomu zabránit, je zbavit se jich!" # todo: NEW TRANSLATION
  SIA_the_democratic_cause: "Demokratická věc" # todo: NEW TRANSLATION
  SIA_the_democratic_cause_desc: "Problém první revoluce byl, že armáda v ní měla příliš velký vliv. Usilováním o vytvoření více civilní vlády dosáhneme svobody a demokracie, kterou naši lidé tak dlouho čekali." # todo: NEW TRANSLATION
  SIA_the_monarchist_cause: "Monarchistická věc" # todo: NEW TRANSLATION
  SIA_the_monarchist_cause_desc: "Revoluce, ústava... To vše naší zemi nevyhovuje. Snažit se změnit systém, který fungoval, byla chyba, ale stále je čas její důsledky zvrátit, začít obnovením trůnu Ramy VII., legitimního krále Siamu, který byl donucen opustit zemi kvůli vojenskému převratu." # todo: NEW TRANSLATION
  SIA_write_a_new_constitution: "Napsat novou ústavu" # todo: NEW TRANSLATION
  SIA_write_a_new_constitution_desc: "Bude napsána nová ústava, která zajistí mnohem větší civilní kontrolu nad vládou, aby se armáda už nikdy nepřevzala legislativu." # todo: NEW TRANSLATION
  SIA_restore_rama_vii: "Obnovit Ramu VII" # todo: NEW TRANSLATION
  SIA_restore_rama_vii_desc: "Rama VII. se oficiálně vrátil do Siamu a připravuje korunovací, kde mu bude vrácen trůn a zrušena ústava z roku 1932." # todo: NEW TRANSLATION
  SIA_closer_to_the_west: "Blíže k Západu" # todo: NEW TRANSLATION
  SIA_closer_to_the_west_desc: "Chceme‑li bránit naše nabyté hodnoty svobody, budeme potřebovat spojence schopné nám pomoci bránit se expanzivním hrozbám, jako je Japonské císařství." # todo: NEW TRANSLATION
  SIA_opening_the_economy: "Otevřít pro podnikání!" # todo: NEW TRANSLATION
  SIA_opening_the_economy_desc: "Přijetím ekonomického modelu podobného mnoha liberálním demokraciím po světě můžeme ukázat, že Siam může být také zemí investic." # todo: NEW TRANSLATION
  SIA_the_yellow_cover_dossier: "Dossier Žluté obálky" # todo: NEW TRANSLATION
  SIA_the_yellow_cover_dossier_desc: "Již v roce 1933 se Pridi Banomyong pokusil prosadit „Žlutý spis“, ekonomický reformní plán založený na socialistickém modelu k boji proti dopadům Velké hospodářské krize, ale král a armáda mu byli proti a dokonce uskutečnili nový převrat, aby oslabili civilní křídlo Khana Ratsadon loajální Pridimu. Nyní, když má plnou kontrolu republiky, je schopen reformy prosadit a upravit ekonomiku ve prospěch siamského lidu." # todo: NEW TRANSLATION
  SIA_monitor_the_army: "Monitorovat armádu" # todo: NEW TRANSLATION
  SIA_monitor_the_army_desc: "Aby armáda nikdy znovu nepřevzala moc, provedeme rozsáhlé reformy, zejména aby vojáci poslouchali vládu před svými generály, čímž snížíme vliv těchto posledních." # todo: NEW TRANSLATION
  SIA_a_model_democracy: "Vzorná demokracie" # todo: NEW TRANSLATION
  SIA_a_model_democracy_desc: "Po mnoha letech autokratických režimů se Siam vzpamatoval ze svých chyb a nyní je jednou z nejdemokratičtějších zemí v Asii!" # todo: NEW TRANSLATION
  SIA_denounce_fascism: "Odsoudit fašismus" # todo: NEW TRANSLATION
  SIA_denounce_fascism_desc: "Fašismus je ideologie navržená k utlačování a rozdělování národů. Mnoho lidí v Khana Ratsadon sympatizovalo s těmito hnutími a je naší povinností postavit se každé vládě, která chce způsobit lidem stejné utrpení." # todo: NEW TRANSLATION
  SIA_negociations_with_france: "Jednání s Francií" # todo: NEW TRANSLATION
  SIA_negociations_with_france_desc: "Je pravda, že Francie byla národem, který nám nejvíce odporoval a zároveň nás ponížil, zejména tím, že jsme ztratili Kambodžu nebo Laosk. Ale to bylo v době naší absolutní monarchie. Změnili jsme se a jsme připraveni přistoupit k Francii v míru. Výměnou možná získáme právo znovu sjednotit naše laoského a kambodžského bratry?" # todo: NEW TRANSLATION
  SIA_boom_in_foreign_investments: "Nárůst zahraničních investic" # todo: NEW TRANSLATION
  SIA_boom_in_foreign_investments_desc: "Naše diplomatické manévry se vyplácejí, protože investice, které obdržíme, výrazně vzrostly, podpořeny novou stabilitou našeho režimu. Jsme na prahu nové éry pro naši ekonomiku!" # todo: NEW TRANSLATION
  SIA_the_british_military_mission: "Britská vojenská mise" # todo: NEW TRANSLATION
  SIA_the_british_military_mission_desc: "Podařilo se nám vyjednat odeslání vojenské delegace z Velké Británie. Mít lidi, kteří viděli bojiště po celém světě jako učitele pro naše vojáky, bude velkým přínosem." # todo: NEW TRANSLATION
  SIA_a_westernised_nation: "Západně orientovaný národ" # todo: NEW TRANSLATION
  SIA_a_westernised_nation_desc: "Dosáhli jsme úrovně ekonomického, vojenského a vládního vývoje srovnatelné s mnoha západními zeměmi. Získali jsme místo mezi důležitými národy světa." # todo: NEW TRANSLATION
  SIA_the_oligarchic_governement: "Oligarchická vláda" # todo: NEW TRANSLATION
  SIA_the_oligarchic_governement_desc: "WIP" # todo: NEW TRANSLATION
  SIA_supreme_council: "Nejvyšší rada státu Siam" # todo: NEW TRANSLATION
  SIA_supreme_council_desc: "Nejvyšší rada státu Siam byla zákonodárným sborem, který tehdy tvořili princové dynastie Chakri k asistenci Ramovi VII. Přeobsazení by nám umožnilo obklopit se kompetentními a důležitými úředníky v těchto neklidných časech." # todo: NEW TRANSLATION
  SIA_municipalism: "Municipalismus" # todo: NEW TRANSLATION
  SIA_municipalism_desc: "Prachaphiban, nebo municipalismus, je koncept, který Rama VII. rozvíjí již několik let. Obcím bude dovoleno vybírat vlastní daně a spravovat vlastní rozpočty." # todo: NEW TRANSLATION
  SIA_consolidate_Khana_Ratsadon: "Konsolidovat Khana Ratsadon" # todo: NEW TRANSLATION
  SIA_consolidate_Khana_Ratsadon_desc: "Navzdory mnoha opozicím se vládě Phraya Phahonphonphayuhasena podařilo konsolidovat kontrolu nad Siamem. Se svou militaristickou a jednopartijní politikou se Siam pomalu klouže směrem k vlastní adaptaci evropského fašismu nebo japonského militarismu." # todo: NEW TRANSLATION
  SIA_increase_the_artistic_propaganda: "Zintenzivnit uměleckou propagandu" # todo: NEW TRANSLATION
  SIA_increase_the_artistic_propaganda_desc: "Již několik let se na kulturní úrovni vyvíjejí velké snahy rozvinout nacionalistického ducha mezi lidem. Filmy, divadelní hry, vše je nastaveno, aby thajský lid rozvinul válečnického ducha, a díky tomu můžeme zvýšit počet rekrutů." # todo: NEW TRANSLATION
  SIA_weaken_the_civilian_wing: "Oslabit civilní křídlo" # todo: NEW TRANSLATION
  SIA_weaken_the_civilian_wing_desc: "Civilní křídlo strany bylo pouze dalším překážkou na naší cestě, kritizovalo silnou vojenskou přítomnost a přálo si mírnější zahraniční politiku. Je jasné, že je nutná reorganizace strany, aby se zabránilo rozštěpení." # todo: NEW TRANSLATION
  SIA_fate_of_the_monarchy: "Osud monarchie" # todo: NEW TRANSLATION
  SIA_fate_of_the_monarchy_desc: "Mnozí si pamatují Rama VII. a jeho protesty proti vládě, které ho nakonec přivedly do exilu. Několik hlasů volá po úplném zrušení monarchistických institucí, ale jiní se obávají, že vznik republiky by mohl podnítit demokratické nebo komunistické hnutí." # todo: NEW TRANSLATION
  SIA_phibun_ascension: "Vzestup Phibuna" # todo: NEW TRANSLATION
  SIA_phibun_ascension_desc: "Maršál Plaek Phibunsongkhram, bývalý ministr obrany a tedy číslo dvě ve vládě, se zdá být dobře postaven k vedení naší země. Jeho ideály mohou být podobné některým evropským fašistickým hnutím jako v Itálii nebo Německu. Phibun je v podstatě velký vlastenec, toužící po znovuzrození thajského lidu proti evropským imperialistům, kteří tuto zemi neustále rozdělovali a rozdělili." # todo: NEW TRANSLATION
  SIA_anti_chinese_rethoric: "Antichiná rétorika" # todo: NEW TRANSLATION
  SIA_pan_thai_propaganda: "Maha Anachak Thai" # todo: NEW TRANSLATION
  SIA_pan_thai_propaganda_desc: "Maha Anachak Thai, znamenající 'Velké thajské impérium', je koncept vyvinutý převážně Luangem Wichitwathakanem, věrným spojencem Phibuna, nacionalistickým a irredentistickým ideologem. Chceme‑li, aby thajský lid měl své místo mezi velmocemi, musíme začít znovu sjednocením našeho národa, nespravedlivě rozděleného západními imperialisty." # todo: NEW TRANSLATION
  SIA_economic_nationalism: "Ekonomický nacionalismus" # todo: NEW TRANSLATION
  SIA_economic_nationalism_desc: "Musíme dosáhnout ekonomické soběstačnosti a zbavit se čínského kapitálu, který je známkou závislosti na cizím lidu. Daně z obchodních zisků budou zvýšeny a zavedeny státní podniky, zvláště ty související se zbrojením." # todo: NEW TRANSLATION
  SIA_dictatorial_control: "Diktátorská kontrola" # todo: NEW TRANSLATION
  SIA_dictatorial_control_desc: "Nyní, když většina našich rivalů byla zatčena nebo vyhnána, bude mít Phibun možnost vytvořit Thajsko podle svých představ bez rizika ohrožení své moci." # todo: NEW TRANSLATION
  SIA_prepare_for_the_reconquest: "Připravit se na reconquest" # todo: NEW TRANSLATION
  SIA_prepare_for_the_reconquest_desc: "Velké úsilí bude muset vynaložit vláda i thajský lid k přípravě na znovudobytí našich území, která jsme před desetiletími ztratili. Rozsáhlá propaganda pro práci v obranném průmyslu a vojenskou kariéru bude nasazena, aby zajistila naši připravenost jít do války." # todo: NEW TRANSLATION
  SIA_choosing_a_side: "Sdílení našich průmyslových tajemství" # todo: NEW TRANSLATION
  SIA_choosing_a_side_desc: "Abychom porazili imperialistické mocnosti, budeme potřebovat spojence se stejnými cíli. Na východě je Japonsko, které má tu výhodu, že je blízko a má flotilu schopnou soupeřit s Británií; s jejich pomocí můžeme získat lepší zbraně k dosažení našich cílů." # todo: NEW TRANSLATION
  SIA_increase_the_military_budget: "Zvýšit vojenský rozpočet" # todo: NEW TRANSLATION
  SIA_increase_the_military_budget_desc: "Všechny naše ekonomické snahy budou muset být investovány do výstavby vojenského arzenálu, který vybaví naše vojáky dostatečně pokročilou technikou, aby obstáli proti našim protivníkům." # todo: NEW TRANSLATION
  SIA_retake_our_lands: "Vrátit naše země" # todo: NEW TRANSLATION
  SIA_retake_our_lands_desc: "Je čas setřít skvrnu v naší historii, kterou byla kolonizace mnoha našich bývalých území Evropany. Brzy shromáždíme všechny thajské národy a potvrdíme svůj status mocnosti v Asii i ve světě!" # todo: NEW TRANSLATION
  SIA_winds_of_the_revolution: "Větry revoluce" # todo: NEW TRANSLATION
  SIA_winds_of_the_revolution_desc: "Komunistická hnutí získávají v Asii den za dnem stále větší podporu. Pokud chceme opravdu osvobodit náš lid, musíme také porazit kapitalismus, který nikdy nepřestal utlačovat národy prostřednictvím koloniálních impérií." # todo: NEW TRANSLATION
  SIA_massive_land_reforms: "Masivní pozemkové reformy" # todo: NEW TRANSLATION
  SIA_massive_land_reforms_desc: "Po staletí rolníci trpěli feudálními systémy, kde půda, kterou obdělávali, jim ani nepatřila. Opravíme tuto nespravedlnost znárodněním půdy a její spravedlivou redistribucí těm, kdo ji obdělávají." # todo: NEW TRANSLATION
  SIA_finding_allies: "Najít spojence" # todo: NEW TRANSLATION
  SIA_finding_allies_desc: "Abychom dokončili revoluci v Asii a poté ve světě, musíme hledat podporu dalších komunistických států, zejména Sovětského svazu, dlouho vnímaného jako rodiště a bašta revoluce." # todo: NEW TRANSLATION
  SIA_the_socialist_secret_police: "Sovětská tajná policie" # todo: NEW TRANSLATION
  SIA_the_socialist_secret_police_desc: "Abychom ochránili náš stát před potenciálně kontrarevolučními elementy, zřídíme policii věnovanou kontrarozvědce a sledování osob považovaných za nebezpečné." # todo: NEW TRANSLATION
  SIA_remove_the_monarchist_system: "Zrušit monarchický systém" # todo: NEW TRANSLATION
  SIA_remove_the_monarchist_system_desc: "Zkažený monarchistický systém je symbolem útlaku siamského lidu, který dlouho musel splňovat očekávání vůdce, jehož jediné zásluhy jsou narození do královské rodiny. Naše nová revoluce to očistí a nahradí skutečnou meritokracií." # todo: NEW TRANSLATION
  SIA_defending_the_revolution: "Bránit revoluci" # todo: NEW TRANSLATION
  SIA_guerilla_units: "Partyzaánské jednotky" # todo: NEW TRANSLATION
  SIA_guerilla_units_desc: "Náš lid se musí naučit bojovat a odolávat kapitalistickým silám, které se pokusí zastavit naši slavnou revoluci. Náš lid musí být ozbrojen, aby každý mohl splnit svou vlasteneckou povinnost bránit revoluci!" # todo: NEW TRANSLATION
  SIA_housing_program: "Program bydlení" # todo: NEW TRANSLATION
  SIA_establish_a_new_bureaucracy: "Zřídit novou byrokracii" # todo: NEW TRANSLATION
  SIA_revolutionnary_education: "Revoluční vzdělávání" # todo: NEW TRANSLATION
  SIA_revolutionnary_education_desc: "" # todo: NEW TRANSLATION
  SIA_crush_the_remaining_capitalists: "Zničit zbývající kapitalisty" # todo: NEW TRANSLATION
  SIA_crush_the_remaining_capitalists_desc: "Skoro jsme se zbavili posledních kapitalistických elementů, které naši zemi otrávily. Banky budou znárodněny, stejně jako továrny a konečně i farmy." # todo: NEW TRANSLATION
  SIA_army_purge: "Čištění armády" # todo: NEW TRANSLATION
  SIA_army_purge_desc: "Armáda může stále obsahovat elementy loajální monarchii nebo Khana Ratsadon. Pro dobro revoluce je nezbytné provést čistky, aby se zabránilo kontrapuči." # todo: NEW TRANSLATION
  SIA_disturb_indochina: "Pobouřit Indočínu" # todo: NEW TRANSLATION
  SIA_disturb_indochina_desc: "Naši indočínští soudruzi bojují roky proti francouzské kolonizaci regionu. Poskytneme‑li jim oficiální podporu, politickou nebo vojenskou, můžeme vyvolat povstání v celé oblasti a zbavit Indočínu francouzské přítomnosti." # todo: NEW TRANSLATION
  SIA_exporting_the_revolution: "SIA_exporting_the_revolution" # todo: NEW TRANSLATION
  SIA_bring_the_revolution_to_asia: "Přinést revoluci do Asie" # todo: NEW TRANSLATION
  SIA_bring_the_revolution_to_asia_desc: "Mnoho národů nadále trpí kvůli koloniálním impériím, která rozdělila Asii. Tito lidé potřebují naši pomoc, a my jim ji dáme! Asijští dělníci, spojte se!" # todo: NEW TRANSLATION
  SIA_a_new_bastion_of_communism: "Nová bašta komunismu" # todo: NEW TRANSLATION
  SIA_a_new_bastion_of_communism_desc: "Naše revoluce je nyní pevně zakořeněna v myslích siamského lidu. Podařilo se nám dokázat světu, že komunistická revoluce může fungovat i v zemích jako ta naše." # todo: NEW TRANSLATION
  SIA_the_siamese_leap_forward: "Siamský skok vpřed" # todo: NEW TRANSLATION
  SIA_the_siamese_leap_forward_desc: "Je čas zahájit plán na modernizaci celé naší společnosti a státu, aby v dlouhodobém horizontu dosáhli co největší rovnosti a spravedlivější společnosti." # todo: NEW TRANSLATION
  SIA_begin_industrialisation_projects: "Zahájit průmyslové projekty" # todo: NEW TRANSLATION
  SIA_end_the_depression: "Ukončit depresi" # todo: NEW TRANSLATION
  SIA_end_the_depression_desc: "Velká hospodářská krize silně zasáhla naše exporty, zejména rýže, a způsobila prudký růst inflace. Díky různým ekonomickým reformám a změně exportních partnerů se nám podařilo vrátit ekonomiku na úroveň před krizí." # todo: NEW TRANSLATION
  SIA_begin_industrialisation_plans: "Plán rozvoje industrializace" # todo: NEW TRANSLATION
  SIA_begin_industrialisation_plans_desc: "Vytvoření průmyslového komplexu je nezbytné, pokud chceme zůstat ekonomicky konkurenceschopní. Budoucnost není jen v polích, ale i v továrnách." # todo: NEW TRANSLATION
  SIA_increase_the_education_budget: "Zvýšit rozpočet na vzdělání" # todo: NEW TRANSLATION
  SIA_increase_the_education_budget_desc: "Po desetiletí se snažíme zajistit větší přístup populace ke vzdělání. Zvýšením rozpočtu pro veřejné vzdělávání zajistíme nárůst absolventů ročně." # todo: NEW TRANSLATION
  SIA_improve_our_roads: "Plán rozvoje silnic" # todo: NEW TRANSLATION
  SIA_improve_our_roads_desc: "V některých regionech je infrastruktura stále relativně nedostatečná, což výrazně zpomaluje jejich ekonomický potenciál. Zahájením projektu zlepšení silnic zajistíme lepší kontrolu vlády nad těmito oblastmi." # todo: NEW TRANSLATION
  SIA_improve_the_rubber: "SIA_zlepšit_kaučuk" # todo: NEW TRANSLATION
  SIA_improve_the_rubber_extraction: "Zlepšit těžbu kaučuku" # todo: NEW TRANSLATION
  SIA_develop_rubber_extraction: "Rozvíjet těžbu kaučuku" # todo: NEW TRANSLATION
  SIA_develop_rubber_extraction_desc: "Kaučuk je v Siamu hojně dostupný. Mnoho zařízení pro jeho sběr již existuje, ale výnosy lze výrazně zlepšit." # todo: NEW TRANSLATION
  SIA_electronic_research: "Výzkum elektroniky" # todo: NEW TRANSLATION
  SIA_electronic_research_desc: "Elektronika se vyvíjí vysokým tempem a může sehrát důležitou roli v příští válce. Globalizace v této oblasti by mohla být velmi užitečná..." # todo: NEW TRANSLATION
  SIA_abandon_the_gold_standard: "Opustit zlatý standard" # todo: NEW TRANSLATION
  SIA_attract_investments: "Přitáhnout investice" # todo: NEW TRANSLATION
  SIA_attract_investments_desc: "Prokázáním ochoty modernizovat zemi a nabídkou politiky příznivé zahraničním investicím bychom mohli začít budovat průmyslový arzenál." # todo: NEW TRANSLATION
  SIA_state_sponsored_civilian_construction: "Státem podporovaná civilní výstavba" # todo: NEW TRANSLATION
  SIA_state_sponsored_civilian_construction_desc: "Je rolí vlády budovat továrny pro civilní výrobu i zlepšování staveb." # todo: NEW TRANSLATION
  SIA_dig_for_tungsten: "Hrabat po wolframu" # todo: NEW TRANSLATION
  SIA_dig_for_tungsten_desc: "Naše podloží je plné kovů, zejména wolframu, materiálu nezbytného pro výrobu vojenské techniky. Těžba by nám umožnila být méně závislí na světovém obchodě při výrobě dělostřelectva či jiných kusů vyžadujících tento materiál." # todo: NEW TRANSLATION
  SIA_electrification_effort: "Dokončit elektrifikaci" # todo: NEW TRANSLATION
  SIA_electrification_effort_desc: "Elektrická energie je v nejvenkovanějších oblastech stále relativně nedostupná. Rozvojem výroby a distribuce energie bychom mohli vybudovat továrny i v jiných oblastech." # todo: NEW TRANSLATION
  SIA_urbanisation_effort: "Podporovat urbanizaci" # todo: NEW TRANSLATION
  SIA_urbanisation_effort_desc: "Velká část populace je stále tvořena rolníky, což je dělá nedostupné pro naše továrny. Vytvořením programu výstavby bydlení ve velkých městech a podporou přesunu lidí zvýšíme pracovní sílu pro naše továrny." # todo: NEW TRANSLATION
  SIA_open_new_universities: "Otevřít nové univerzity" # todo: NEW TRANSLATION
  SIA_open_new_universities_desc: "Nárůst městské populace vedl k větší poptávce po univerzitních místech. Je naší povinností postavit nové univerzity, aby všichni, kdo chtějí studovat, měli možnost." # todo: NEW TRANSLATION
  SIA_artillery_factories: "Továrny na dělostřelectvo" # todo: NEW TRANSLATION
  SIA_artillery_factories_desc: "Máme zdroje potřebné pro výrobu dělostřelectva; bylo by moudré využít tuto příležitost k vybudování továren na jejich výrobu." # todo: NEW TRANSLATION
  SIA_armament_effort: "SIA_armament_effort" # todo: NEW TRANSLATION
  SIA_establish_military_factories: "Zřídit vojenské továrny" # todo: NEW TRANSLATION
  SIA_establish_military_factories_desc: "Vybudování skutečného průmyslového komplexu schopného dodávat veškeré vybavení našim jednotkám je nezbytné, pokud chceme přežít další válku." # todo: NEW TRANSLATION
  SIA_second_siamese_revolution: "Druhá siamská revoluce" # todo: NEW TRANSLATION
  SIA_second_siamese_revolution_desc: "Khana Ratsadon využil konec absolutní monarchie k uvalení vlastní tyranie na siamský lid. Zdá se, že je potřeba nová revoluce, aby Siam očistil od tyranů." # todo: NEW TRANSLATION
  SIA_naval_developement_plan: "Plán rozvoje námořnictva" # todo: NEW TRANSLATION
  SIA_naval_developement_plan_desc: "Námořní válka zůstává zásadním prvkem boje, posílená naší polohou zranitelnou vůči potenciálním námořním průnikům. Vybudování námořnictva schopného čelit nepříteli je nezbytné." # todo: NEW TRANSLATION
  SIA_reform_our_tactics: "Reformovat naše taktiky" # todo: NEW TRANSLATION
  SIA_reform_our_tactics_desc: "Bez ohledu na dobu platí, že vítězství v námořní bitvě patří tomu, kdo vlastní největší a nejsilnější lodě. Zaměřením se na kvalitu je budeme lépe hájit." # todo: NEW TRANSLATION
  SIA_adopt_new_tactics: "Přijmout nové taktiky" # todo: NEW TRANSLATION
  SIA_adopt_new_tactics_desc: "Technologický vývoj posledních let zcela změnil podobu námořních bitev. Podvodní válka, radar, miny — pokud chceme uspět, musíme se přizpůsobit novým technologiím." # todo: NEW TRANSLATION
  SIA_quality_over_quantity: "Kvalita před kvantitou" # todo: NEW TRANSLATION
  SIA_quality_over_quantity_desc: "Vítězství spočívá ve stavbě lodí, které vydrží každé jiné. Modernizace bitevních lodí je nutná." # todo: NEW TRANSLATION
  SIA_develop_naval_fortifications: "Vyvinout námořní opevnění" # todo: NEW TRANSLATION
  SIA_develop_naval_fortifications_desc: "Kdyby nepřítel potopil naši flotilu, musíme být připraveni bránit přístavy a odrazit potenciální námořní invazi!" # todo: NEW TRANSLATION
  SIA_modernise_our_battleships: "Modernizovat naše bitevní lodě" # todo: NEW TRANSLATION
  SIA_modernise_our_battleships_desc: "Bitevní lodě jsou to, co naše námořnictvo potřebuje. Výkonné, odolné — s nimi se nemůžeme mýlit." # todo: NEW TRANSLATION
  SIA_study_submarines: "Studovat ponorky" # todo: NEW TRANSLATION
  SIA_study_submarines_desc: "Podvodní válka nám umožní narušit nebo dokonce přerušit zásobovací linky nepřítele a diskrétně útočit na jeho největší lodě." # todo: NEW TRANSLATION
  SIA_naval_mass_production: "Masová výroba pro námořnictvo" # todo: NEW TRANSLATION
  SIA_naval_mass_production_desc: "Úspěch námořnictva spočívá v jeho schopnosti vždy se postavit a efektivně obtěžovat nepřítele. Zaměřením se na masovou výrobu udržíme stálou námořní přítomnost." # todo: NEW TRANSLATION
  SIA_develop_cruisers: "Vyvíjet křižníky" # todo: NEW TRANSLATION
  SIA_develop_cruisers_desc: "Vývoj křižníků je nutný k podpoře naší ponorkové flotily." # todo: NEW TRANSLATION
  SIA_destroyers_effort: "Úsilí o torpédoborce" # todo: NEW TRANSLATION
  SIA_destroyers_effort_desc: "Abychom se bránili před nepřátelskými ponorkami, budeme vyvíjet lodě určené speciálně k jejich vyhledávání a likvidaci." # todo: NEW TRANSLATION
  SIA_establish_a_naval_college: "Zřídit námořní školu" # todo: NEW TRANSLATION
  SIA_establish_a_naval_college_desc: "Abychom nezůstali bez kvalifikovaných námořníků, založíme novou námořní školu." # todo: NEW TRANSLATION
  SIA_naval_fortifications: "Námořní opevnění" # todo: NEW TRANSLATION
  SIA_naval_fortifications_desc: "V případě, že naše námořnictvo nebude funkční, musíme postavit opevnění v přístavech, aby se zabránilo námořním invazím." # todo: NEW TRANSLATION
  SIA_increase_the_naval_production: "Zvýšit námořní výrobu" # todo: NEW TRANSLATION
  SIA_increase_the_naval_production_desc: "Naše výrobní kapacity co se týče plavidel jsou jasně nedostatečné. Organizací stavby nových loděnic zajistíme nárůst produkce." # todo: NEW TRANSLATION
  SIA_increase_navy_fundings: "Zvýšit financování námořnictva" # todo: NEW TRANSLATION
  SIA_increase_navy_fundings_desc: "Musíme přidělit větší část rozpočtu na modernizaci námořnictva, aby mělo všechny potřebné prostředky." # todo: NEW TRANSLATION
  SIA_army_reform_plan: "Plán reformy armády" # todo: NEW TRANSLATION
  SIA_army_reform_plan_desc: "Naše armáda neviděla žádné nové konflikty od Velké války, a proto je zastaralá oproti armádám v regionu. Přijetí moderního vybavení a použití nových technologií jako tanky je nezbytné." # todo: NEW TRANSLATION
  SIA_new_rifles: "Nové pušky" # todo: NEW TRANSLATION
  SIA_new_rifles_desc: "Puška byla vždy zbraní vojáka. Nemůžeme si dovolit používat zastaralé pušky — musíme vyvíjet nové modely." # todo: NEW TRANSLATION
  SIA_listen_to_new_officers: "Naslouchat novým důstojníkům" # todo: NEW TRANSLATION
  SIA_listen_to_new_officers_desc: "Válka se neustále mění, vynalézají se nové taktiky a některé musí být opuštěny. Dáváním většího významu nápadům nových důstojníků se vyhneme používání taktik, které jsou již zbytečné." # todo: NEW TRANSLATION
  SIA_jungle_training: "Výcvik v džungli" # todo: NEW TRANSLATION
  SIA_jungle_training_desc: "Speciální výcvik pro boj v džungli nám umožní lépe se bránit v prostředí, které dobře známe." # todo: NEW TRANSLATION
  SIA_improve_logistics: "Zlepšit logistiku" # todo: NEW TRANSLATION
  SIA_improve_logistics_desc: "Schopnost správně přesunout naše jednotky a jejich vybavení je v pozemní válce zásadní. Vývoj technologií jako rádio nám pomůže lépe koordinovat armádu." # todo: NEW TRANSLATION
  SIA_artillery_developement: "Vývoj dělostřelectva" # todo: NEW TRANSLATION
  SIA_artillery_developement_desc: "Přidání dělostřeleckých regimentů naší armádě by jí dalo mnohem lepší schopnost prorazit, což zoufale potřebujeme." # todo: NEW TRANSLATION
  SIA_anti_tank_research: "Výzkum protitankových zbraní" # todo: NEW TRANSLATION
  SIA_anti_tank_research_desc: "Bude pro nás velmi obtížné odolat tankům jen s puškami, proto musíme vyvinout nový typ dělostřelectva schopný prorazit pancíř." # todo: NEW TRANSLATION
  SIA_tanks_research: "Výzkum tanků" # todo: NEW TRANSLATION
  SIA_study_tanks: "Studovat tanky" # todo: NEW TRANSLATION
  SIA_study_tanks_desc: "Tanky jsou drahou technologií, ale jejich účinnost je nepopiratelná. Vývoj vlastních modelů by měl být prioritou." # todo: NEW TRANSLATION
  SIA_improved_r_d: "Zlepšené R&D" # todo: NEW TRANSLATION
  SIA_improved_r_d_desc: "S postupem času se technologický pokrok stává důležitějším pro vítězství ve válkách. Zvýšením investic do výzkumu a vývoje zvýšíme naše výzkumné kapacity." # todo: NEW TRANSLATION
  SIA_doctrines_improvement: "Zlepšení doktrín" # todo: NEW TRANSLATION
  SIA_doctrines_improvement_desc: "Potřebujeme definovat jasnou strategii pro naši armádu a poté soustředit veškeré úsilí na její zlepšení." # todo: NEW TRANSLATION
  SIA_national_mobilisation: "Národní mobilizace" # todo: NEW TRANSLATION
  SIA_national_mobilisation_desc: "Musíme zavést přísnější brannou povinnost, abychom neměli nedostatek záloh." # todo: NEW TRANSLATION
  SIA_ready_for_war: "Připraveno na válku" # todo: NEW TRANSLATION
  SIA_ready_for_war_desc: "Naše armáda je konečně připravena čelit nadcházejícím konfliktům. Naši nepřátelé se budou třást při vidění našich vojáků!" # todo: NEW TRANSLATION
  SIA_the_siamese_air_force: "Siamské letectvo" # todo: NEW TRANSLATION
  SIA_the_siamese_air_force_desc: "Aviace byla skutečnou revolucí, civilně i vojensky, s letadly schopnými průzkumu či bombardování. Je nezbytné vybudovat skutečné letectvo, které bude stát proti nepřátelům!" # todo: NEW TRANSLATION
  SIA_build_new_airports: "Postavit nové letiště" # todo: NEW TRANSLATION
  SIA_build_new_airports_desc: "Než začneme vyrábět vlastní letadla, musíme postavit základny, odkud je pošleme." # todo: NEW TRANSLATION
  SIA_rule_the_skies: "Ovládnout nebe" # todo: NEW TRANSLATION
  SIA_rule_the_skies_desc: "Především musíme myslet na obranu našich jednotek a infrastruktury, vyvíjet stále rychlejší letadla schopná útočit na bombardéry nepřítele." # todo: NEW TRANSLATION
  SIA_death_from_the_skies: "Smrt z nebe" # todo: NEW TRANSLATION
  SIA_death_from_the_skies_desc: "Vyvíjením silnějších bombardérů můžeme poškodit nepřátelskou infrastrukturu a narušit jeho průmysl a zásobování." # todo: NEW TRANSLATION
  SIA_establish_aviation_school: "Zřídit leteckou školu" # todo: NEW TRANSLATION
  SIA_establish_aviation_school_desc: "Škola pro výcvik budoucích pilotů je nezbytná, aby ti, kdo budou ovládat stroje, byli co nejkvalifikovanější." # todo: NEW TRANSLATION
  SIA_anti_air_protection: "Protivzdušná ochrana" # todo: NEW TRANSLATION
  SIA_anti_air_protection_desc: "Nemusíme být schopni sestřelit všechna nepřátelská letadla vlastním letectvem. Proto postavíme pozemní děla, která jim pomohou." # todo: NEW TRANSLATION
  SIA_long_range_fighters: "Dálkové stíhače" # todo: NEW TRANSLATION
  SIA_long_range_fighters_desc: "Potřebujeme rychlejší stíhače! Silnější! A s větším dosahem!" # todo: NEW TRANSLATION
  SIA_troops_destruction: "Ničení vojsk" # todo: NEW TRANSLATION
  SIA_troops_destruction_desc: "Můžeme způsobit velké škody nepřátelským jednotkám útoky z výšky, což usnadní pozemní boje." # todo: NEW TRANSLATION
  SIA_a_new_bureaucracy: "Nová byrokracie" # todo: NEW TRANSLATION
  SIA_ensure_loyalty_in_the_army: "Zajistit loajalitu v armádě" # todo: NEW TRANSLATION
  SIA_ensure_loyalty_in_the_army_desc: "Armáda stála za pučem v roce 1932, což dokazuje, že v jejích řadách existuje neochota k věrnosti. Po soudu s hlavními aktéry prvního puče musíme zajistit, že v armádě nezůstali žádní zrádci." # todo: NEW TRANSLATION
  SIA_a_new_bureaucracy_desc: "Byrokracie vytvořená vojskem není vhodná pro potřeby království. Budeme muset přepsat fungování mnoha jurisdikcí." # todo: NEW TRANSLATION
  SIA_the_devoted_king: "Oddaný král" # todo: NEW TRANSLATION
  SIA_the_devoted_king_desc: "Rama VII. je dobrý král, který přeje svému lidu jen to nejlepší. Čte petice a naslouchá lidem. To buduje důvěru v monarchii, kterou v těchto těžkých časech tolik potřebujeme." # todo: NEW TRANSLATION
  SIA_stay_on_guard: "Zůstat ve střehu" # todo: NEW TRANSLATION
  SIA_stay_on_guard_desc: "V těchto nejistých časech může každý spojenec padnout a kdokoli se stát naším nepřítelem. Udržením pragmatické zahraniční politiky se přizpůsobíme geopolitickým změnám a možná přežijeme další válku." # todo: NEW TRANSLATION
  SIA_the_royal_cult: "Královský kult" # todo: NEW TRANSLATION
  SIA_the_royal_cult_desc: "Rama VII. je dobrotivý král, který přeje svému lidu jen to nejlepší. Čte petice a naslouchá lidem. To posiluje důvěru v monarchii, kterou nyní zoufale potřebujeme." # todo: NEW TRANSLATION
  SIA_surpass_the_nobility: "Převýšit šlechtu" # todo: NEW TRANSLATION
  SIA_surpass_the_nobility_desc: "Nemůžeme zapomínat na kontrolu šlechty a zabránit jí získat příliš velký vliv ve vládě. Koneckonců oni musí odpovídat králi a pouze jemu." # todo: NEW TRANSLATION
  SIA_royal_youth_leagues: "Královské mládežnické ligy" # todo: NEW TRANSLATION
  SIA_the_royal_research_foundation: "Královská výzkumná nadace" # todo: NEW TRANSLATION
  SIA_the_royal_research_foundation_desc: "Zřízení nové výzkumné organizace přímo reagující na královy požadavky na vojenský a technologický pokrok by zlepšilo náš obraz mezi intelektuály národa." # todo: NEW TRANSLATION
  SIA_a_better_kingdom: "Lepší království" # todo: NEW TRANSLATION
  SIA_a_better_kingdom_desc: "Díky reformám a rozhodnutím Rama VII. pokračoval v tradici svých předků a učinil Siam modernějším a spravedlivějším státem. Jsme na prahu nové éry!" # todo: NEW TRANSLATION
  SIA_cement_sector_improvement: "Cementový sektor" # todo: NEW TRANSLATION
  SIA_cement_sector_improvement_desc: "Cement je jedním z hlavních neagrárních vývozů. Finanční podporou společnostem vyrábějícím cement zajistíme, že tento sektor bude vytvářet stále více pracovních míst." # todo: NEW TRANSLATION
  SIA_ammunitions_production: "Výroba munice" # todo: NEW TRANSLATION
  SIA_ammunitions_production_desc: "Naše kapacity pro výrobu munice nejsou již dostačující; je nezbytné vytvořit nové továrny věnované jejich výrobě, aby naši vojáci neměli nedostatek." # todo: NEW TRANSLATION
  SIA_mechanization_of_agriculture: "Mechanizace zemědělství" # todo: NEW TRANSLATION
  SIA_mechanization_of_agriculture_desc: "Většina našich občanů jsou rolníci. Je naší povinností jim pomoci usnadnit práci zavedením nových technologií jako traktory." # todo: NEW TRANSLATION
  SIA_wellfare_program: "Sociální program" # todo: NEW TRANSLATION
  SIA_wellfare_program_desc: "Povinností státu a zvolených zástupců je zlepšit životní podmínky lidu. Prosadíme reformy, aby vzdělání a zdravotní pojištění byly zdarma pro ty nejpotřebnější." # todo: NEW TRANSLATION
  SIA_the_war_has_changed: "Válka se změnila" # todo: NEW TRANSLATION
  SIA_the_war_has_changed_desc: "V posledních letech se objevily technologie, které nám byly v době Velké války neznámé. Výzkum těchto novinek je nutný." # todo: NEW TRANSLATION
  SIA_import_foreign_tanks: "Importovat zahraniční tanky" # todo: NEW TRANSLATION
  SIA_import_foreign_tanks_desc: "Měli bychom se pokusit vyjednat dohodu se zahraničními mocnostmi o získání tanků, studovat je a snažit se vyvinout vlastní modely." # todo: NEW TRANSLATION
  SIA_terrain_analysis: "Analýza terénu" # todo: NEW TRANSLATION
  SIA_terrain_analysis_desc: "Terénní studie jsou nezbytné, pokud se válka přibližuje k našim hranicím. Musíme být připraveni využít každé výhody terénu proti nepříteli, který ji nezná." # todo: NEW TRANSLATION
  SIA_support_our_troops: "Podpora našich jednotek" # todo: NEW TRANSLATION
  SIA_support_our_troops_desc: "Podpůrné společnosti, které pomáhají našim vojskům rekognoskací, opevněním nebo zásobováním, umožní našim vojákům podávat nejlepší výkony." # todo: NEW TRANSLATION
  SIA_royal_thai_marines: "Královští thajští mariňáci" # todo: NEW TRANSLATION
  SIA_royal_thai_marines_desc: "Obklopeni vodou musíme využít tuto výhodu a vytvořit jednotky věnované boji v námořním prostředí." # todo: NEW TRANSLATION
  SIA_a_faster_army: "Rychlejší armáda" # todo: NEW TRANSLATION
  SIA_a_faster_army_desc: "Použití motorizované pěchoty může být výhodné v situacích, kde je rychlost rozhodujícím faktorem vítězství, například v rovinatém Malajském terénu." # todo: NEW TRANSLATION
  SIA_remembering_the_great_war: "Vzpomínka na Velkou válku" # todo: NEW TRANSLATION
  SIA_remembering_the_great_war_desc: "Poslali jsme expediční sbor bojovat v Evropě během Velké války a přinesl mnoho zkušeností s taktikami velmocí. Měli bychom tyto znalosti znovu využít při modernizaci armády." # todo: NEW TRANSLATION
  SIA_a_cannon_on_a_car: "Dělostřelectvo na autě" # todo: NEW TRANSLATION
  SIA_a_canon_on_a_car: "Dělostřelectvo na autě" # todo: NEW TRANSLATION
  SIA_a_canon_on_a_car_desc: "Motorizovaná pěchota by mohla být mnohem efektivnější, pokud bychom ji vybavili silnějším vybavením, jako jsou rakety." # todo: NEW TRANSLATION
  SIA_adapt_to_the_new_conflicts: "SIA_adapt_to_the_new_conflicts" # todo: NEW TRANSLATION
  SIA_adapt_to_everything: "Přizpůsobit se všemu" # todo: NEW TRANSLATION
  SIA_adapt_to_everything_desc: "Musíme se neustále přizpůsobovat protivným taktikám, aby nás nepřekvapily." # todo: NEW TRANSLATION
  SIA_negotiations_with_france: "Jednání s Francií" # todo: NEW TRANSLATION
  SIA_negotiations_with_france_desc: "Je pravda, že Francie byla národem, který nám nejvíce odporoval a zároveň nás ponížil, zejména tím, že jsme ztratili Kambodžu nebo Laosk. Ale to bylo v době naší absolutní monarchie. Změnili jsme se a jsme připraveni přistoupit k Francii v míru. Výměnou možná získáme právo znovu sjednotit naše laoského a kambodžského bratry?" # todo: NEW TRANSLATION
  SIA_welfare_program: "Sociální program" # todo: NEW TRANSLATION
  SIA_welfare_program_desc: "Povinností státu a zvolených zástupců je zlepšit životní podmínky lidu. Prosadíme reformy, aby vzdělání a zdravotní pojištění byly zdarma pro ty nejpotřebnější." # todo: NEW TRANSLATION
  SIA_cultural_revolution: "Kulturní revoluce" # todo: NEW TRANSLATION
  SIA_cultural_revolution_desc: "Bude zavedena řada nařízení zaměřených na obnovu a modernizaci thajské kultury. Země bude přejmenována na „Thailand“, což znamená „Země Thajců“, obyvatelé budou nuceni mluvit thajsky místo lokálních jazyků a oděvní kodex bude modernizován blíže evropskému stylu... To ukáže, že thajský národ je civilizovaný a vyspělý." # todo: NEW TRANSLATION
  SIA_the_cult_of_the_marshall: "Kult maršála" # todo: NEW TRANSLATION
  SIA_the_cult_of_the_marshall_desc: "Phibun se stal vzorem ctnosti, odvahy a oddanosti národu. Svými inspirativními projevy, sliby a činy při obraně ústavnosti se stal duchovním vůdcem, stojícím nad samotným králem." # todo: NEW TRANSLATION
  SIA_eliminate_songsuradet: "Vyhostit Songsuradeta" # todo: NEW TRANSLATION
  SIA_eliminate_songsuradet_desc: "Phraya Songsuradet, ač se stáhl z politického života, má stále významné postavení v armádě. Abychom předešli spiknutí proti vládě, budou mu odebrány všechny vojenské funkce a bude vyhoštěn ze země. Blízcí mu lidé, jako princ Rangsit Prayurasakdi, budou zatčeni a postaveni před soud." # todo: NEW TRANSLATION
  SIA_replace_the_national_hymn: "Nahradit národní hymnu" # todo: NEW TRANSLATION
  SIA_replace_the_national_hymn_desc: "Nová národní hymna, jednoduše nazvaná „Thajská národní hymna“, napsaná Pra Chenduriyangem a Luangem Saranupraphanem, která zdůrazní militarismus a oběť thajské rasy, bude zavedena a postupně nahradí starou královskou hymnu. Patrotickou písní dodáme našim jednotkám veškerou motivaci k obnovení slávy našeho národa." # todo: NEW TRANSLATION
  SIA_replace_the_national_anthem: "Nahradit národní hymnu" # todo: NEW TRANSLATION
  SIA_replace_the_national_anthem_desc: "Nová národní hymna, jednoduše nazvaná „Thajská národní hymna“, napsaná Pra Chenduriyangem a Luangem Saranupraphanem, která zdůrazní militarismus a oběť thajské rasy, bude zavedena a postupně nahradí starou královskou hymnu. Patrotickou písní dodáme našim jednotkám veškerou motivaci k obnovení slávy našeho národa." # todo: NEW TRANSLATION
  SIA_spiritual_mobilisation: "Mobilizovat Yuwachon Thahan" # todo: NEW TRANSLATION
  SIA_spiritual_mobilisation_desc: "Yuwachon Thahan je vojenská mládežnická organizace založená Phibunem v roce 1934. Nyní, když je válka blízko, je musíme mobilizovat a poslat na frontu." # todo: NEW TRANSLATION
  SIA_the_cult_of_the_marshal: "Kult maršála" # todo: NEW TRANSLATION
  SIA_the_cult_of_the_marshal_desc: "Phibun se stal vzorem ctnosti, odvahy a oddanosti národu. Svými inspirativními projevy, sliby a činy při obraně ústavnosti se stal duchovním vůdcem, stojícím nad samotným králem." # todo: NEW TRANSLATION
  SIA_our_own_democracy: "Naše vlastní „demokracie“" # todo: NEW TRANSLATION
  SIA_our_own_democracy_desc: "Rama VII. ví, jak nastavit systém demokracie, který by fungoval pro zemi jako Siam. Reformy jako „všeobecné volební právo“ jsou zbytečné a mohou způsobit více škody než užitku." # todo: NEW TRANSLATION
  SIA_the_only_true_guide: "Jediný pravý průvodce" # todo: NEW TRANSLATION
  SIA_the_only_true_guide_desc: "Požadavky jako „všeobecné volební právo“ dávají naší zemi málo smyslu. Král a šlechta mají všechny potřebné schopnosti, aby pochopili, jaké reformy je třeba zavést." # todo: NEW TRANSLATION
  SIA_a_new_era: "Nová éra" # todo: NEW TRANSLATION
  SIA_a_new_era_desc: "Stojíme na prahu nové éry pro Siam. Svoboda a demokracie zvítězily nad totalitarismem. Už nikdy nespadneme do temnoty fašismu." # todo: NEW TRANSLATION
  SIA_a_liberal_governement: "Liberální vláda" # todo: NEW TRANSLATION
  SIA_a_liberal_governement_desc: "People's Radical Party vedená Direkem Jayanamou vyhrála volby. Na platformě sociálního pokroku chce strana rozšířit individuální práva a určitý ekonomický zásah státu." # todo: NEW TRANSLATION
  SIA_a_conservative_governement: "Konzervativní vláda" # todo: NEW TRANSLATION
  SIA_conservatism_and_democracy: "Konzervatismus a demokracie" # todo: NEW TRANSLATION
  SIA_conservatism_and_democracy_desc: "Demokratická strana Seniho Pramoje vyhrála volby. Přeje si zachovat thajské tradice při podpoře demokratického systému; jedním z jejích hlavních rozhodnutí bylo obnovení monarchie v čistě ústavní formě, kde by královská rodina byla zbavena veškeré moci." # todo: NEW TRANSLATION
  SIA_a_constitutional_monarchy: "Ústavní monarchie" # todo: NEW TRANSLATION
  SIA_a_constitutional_monarchy_desc: "Republikánský systém není pro Siam vhodný. Jsme národ hrdý na své tradice a monarchie je jejich součástí. Je čas obnovit Ramu VII. na trůně." # todo: NEW TRANSLATION
  SIA_state_invervention: "Zásah státu" # todo: NEW TRANSLATION
  SIA_state_invervention_desc: "Zásah státu v ekonomice je nezbytný, aby se zabránilo vykořisťování nejslabších nejsilnějšími. Budou zavedeny zákony chránící dělníky." # todo: NEW TRANSLATION
  SIA_the_freer_the_market: "Čím svobodnější trh" # todo: NEW TRANSLATION
  SIA_the_freer_the_market_desc: "Prvním krokem k větší svobodě občanů je zabránit zasahování státu do ekonomiky a nechat firmy regulovat se samy." # todo: NEW TRANSLATION
  SIA_follow_the_soviet_model: "Následovat sovětský model" # todo: NEW TRANSLATION
  SIA_follow_the_soviet_model_desc: "Sovětský svaz je komunistickým příkladem, kterého bychom se měli držet. Během pár let bolševici proměnili Rusko z agrární země na plně industrializovaný a moderní stát, a my se pokusíme o totéž!" # todo: NEW TRANSLATION
  SIA_peasant_communism_desc: "Nejsme Rusko a nemůžeme si dovolit kompletně změnit způsob života našich občanů tím, že je vezmeme z polí do měst, ale nemůžeme je nechat v systému, který je zneužívá. Vybudujeme socialismus přizpůsobený našim rolníkům, kde bude každý farmář roven a bude mít slušný život." # todo: NEW TRANSLATION
  SIA_peasant_communism: "Rolnický komunismus" # todo: NEW TRANSLATION
  SIA_healthcare_for_the_people: "Zdravotnictví pro lid" # todo: NEW TRANSLATION
  SIA_healthcare_for_the_people_desc: "Přístup ke zdravotní péči může být pro nejslabší a nejchudší obtížný, a právě pro ně bojujeme. Veřejné kliniky budou otevřeny všude, zejména v nejvenkovanějších oblastech, aby se zlepšil celkový zdravotní stav populace." # todo: NEW TRANSLATION
  SIA_a_gun_in_every_home: "Zbraň v každém domě" # todo: NEW TRANSLATION
  SIA_a_gun_in_every_home_desc: "Chceme‑li, aby se náš lid mohl bránit proti kapitalistům, musíme zajistit, aby měl dostatek zbraní. Každý občan, který o to požádá, bude oprávněn mít střelnou zbraň doma." # todo: NEW TRANSLATION
  SIA_centralised_production: "Centralizovaná výroba" # todo: NEW TRANSLATION
  SIA_centralised_production_desc: "Centralizací řízení ekonomiky zajistíme, že zdroje budou správně přidělovány ve prospěch národa." # todo: NEW TRANSLATION
  SIA_state_atheism: "Státní ateismus" # todo: NEW TRANSLATION
  SIA_state_atheism_desc: "Náboženství nemůže mít roli v nové zemi, kterou budujeme. Musíme se zbavit vlivu buddhismu a osvobodit lidi od dalšího pouta." # todo: NEW TRANSLATION
  SIA_negotiate_indochinese_freedom: "Vyjednat svobodu Indočíny" # todo: NEW TRANSLATION
  SIA_negotiate_indochinese_freedom_desc: "Přítomnost kolonialismu ve východní Asii i přes francouzské přijetí komunismu vytváří ideologickou rozpor, který je nutné vyřešit." # todo: NEW TRANSLATION
  SIA_communist_victory: "Vyhlásili jsme Socialistickou republiku Siam" # todo: NEW TRANSLATION
  SIA_democratic_victory: "Vyhlásili jsme Republiku Siam" # todo: NEW TRANSLATION
