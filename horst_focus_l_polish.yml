  SLO_security_tt: "Získat čtyři §Ybezpečnostní divize§! jednotky s 15 prapory každá" # todo: NEW TRANSLATION
  SLO_security_divisions: "Bezpečnostní divize" # todo: NEW TRANSLATION
  SLO_security_divisions_desc: "Bezpečnostní pěší divize se používala hlavně při bezpečnostních a protigerilových operacích v zadních oblastech německých linií. Původně byla nasazena k likvidaci kapes sovětského odporu, které Němci obcházeli při postupu na východ. Později byla slovenská bezpečnostní divize používána v protigerilových operacích v regionu Žitomír." # todo: NEW TRANSLATION
  SLO_soviet_war: "Na Kavkaz!" # todo: NEW TRANSLATION
  SLO_soviet_war_desc: "2. října 1941 byla Rychlá divize součástí 1. Panzer‑Armee bojující na východním břehu Dněpru v oblasti Pereshchina. Do té doby divize ztratila téměř všechny své tanky. Divize se začátkem roku 1942 podílela na německém postupu do oblasti Kavkazu, kde sehrála klíčovou roli při útoku a dobytí Rostova." # todo: NEW TRANSLATION
  SLO_hlinka_chad: "Hlinkova garda" # todo: NEW TRANSLATION
  SLO_hlinka_chad_desc: "Hlinkova garda byla milicí udržovanou Slovenskou ľudovou stranou v období 1938–1945. Byla pojmenována po Andreji Hlinkovi, slovenském katolickém knězi a veřejném činiteli." # todo: NEW TRANSLATION
  SLO_hlinka_youth: "Hlinkova mládež" # todo: NEW TRANSLATION
  SLO_hlinka_youth_desc: "Podobně jako Hlinkova garda byla i Hlinkova mládež organizací podřízenou HSĽS. Byla vytvořena jako jednotná celonárodní organizace po rozpuštění a přetvoření mládežnických sdružení v roce 1938. Symbolicky byl nejvyšším velitelem Jozef Tiso, ale hlavním velitelem mezi lety 1940 a 1945 byl Alojz Macek." # todo: NEW TRANSLATION
  SLO_na_straz: "Na stráž" # todo: NEW TRANSLATION
  SLO_na_straz_desc: "„Na stráž“ je česká a slovenská fráze spojená s krajně pravicovou politikou na Slovensku. Byla popsána jako „slovenská verze Heil Hitler“. V éře Slovenského štátu se fráze neformálně používala jako pozdrav členy Hlinkovy gardy." # todo: NEW TRANSLATION
  SLO_expand_hlinka_youth: "Rozšířit Hlinkovu mládež" # todo: NEW TRANSLATION
  SLO_expand_hlinka_youth_desc: "Zpočátku byla Hlinkova mládež organizací pouze pro chlapce, později byla založena i dívčí odnož." # todo: NEW TRANSLATION
  ger_mechanised_infantry: "Základní německé polopásové transportéry" # todo: NEW TRANSLATION
  SLO_southern_slovakia_tt: "If First Vienna Award hasn't happened:\n§YJižní Slovensko:§!\n   Přidat §Y2 civilní továrny§!\n§YRýšské Německo§! politická moc §G+100§!" # todo: NEW TRANSLATION
  SLO_spawn_mot: "Motorizované divize" # todo: NEW TRANSLATION
  SLO_hitlers_demands: "Splnit Hitlerovy požadavky" # todo: NEW TRANSLATION
  SLO_hitlers_demands_desc: "S neustále narůstajícími požadavky na pracovní sílu v tomto gigantickém boji vydal Hitler rozkaz naverbovat každého muže, kterého máme k dispozici." # todo: NEW TRANSLATION
