  SLO_aa_defense: "Chránit naši válečnou ekonomiku" # todo: NEW TRANSLATION
  SLO_aa_defense_desc: "Nic v naší zemi během druhé světové války nepoškodilo ekonomicky více než nálety bombardérů. Jejich hlavním cílem byla rafinérie Apollo, jeden z hlavních dodavatelů syntetického benzínu pro Německo." # todo: NEW TRANSLATION
  SLO_prepare_our_airforce: "Připravit naše letectvo" # todo: NEW TRANSLATION
  SLO_prepare_our_airforce_desc: "" # todo: NEW TRANSLATION
  SLO_invasion_of_poland: "Připravit se na Fall Weiss" # todo: NEW TRANSLATION
  SLO_invasion_of_poland_desc: "1. září 1939 vstoupily německé jednotky na území Polska a začala druhá světová válka. Pro Slovensko, v zahraničí vnímané jako satelit Třetí říše, a pro účast jeho armády na nacistické invazi do Polska, to znamenalo otevřené potvrzení této pozice a okamžité přerušení diplomatických vztahů se západními mocnostmi." # todo: NEW TRANSLATION
  SLO_munition_factory: "Výrobny munice" # todo: NEW TRANSLATION
  SLO_munition_factory_desc: "Zbrojní závody v Dubnici a Považské Bystrici byly součástí jednoho z nejdůležitějších výrobců válečné techniky." # todo: NEW TRANSLATION
  SLO_mobile_warfare: "Mobilní válka" # todo: NEW TRANSLATION
