  JAP_harsh_condition_army_training_EXPL1: "Přidat §HZimního specialistu§! rys §H2§! náhodným generálům.\n" # todo: NEW TRANSLATION
  JAP_harsh_condition_army_training_EXPL2: "   Použít své §HInfantry Equipment§! k vycvičení svých generálů a poskytnout jim §G1§! dodatečnou logistickou dovednost a §HZimního specialistu§! rys.\n" # todo: NEW TRANSLATION
  JAP_harsh_condition_army_training_desc: "" # todo: NEW TRANSLATION
