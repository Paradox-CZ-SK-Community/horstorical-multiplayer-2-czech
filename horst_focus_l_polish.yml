  ENG_bomber_harris: "Vítězství leteckou mocí" # todo: NEW TRANSLATION
  IRQ_eco4: "Šípy Babylonu" # todo: NEW TRANSLATION
  IRQ_eco3: "Znacionalizovat francouzské investice" # todo: NEW TRANSLATION
  IRQ_eco4_desc: "Naše šípy prorazí jakékoli létající vozidlo nepřítele." # todo: NEW TRANSLATION
  ITA_sword_of_islam_desc: "Musíme se spojit s Araby severní Afriky proti britskému a francouzskému imperialismu. Postavíme se do role ochránce islámu, abychom získali přízeň Arabů ve Středomoří." # todo: NEW TRANSLATION
  MAN_the_two_emperorsx: "Dva císaři" # todo: NEW TRANSLATION
  MAN_the_two_emperorsx_desc: "Nastal čas zbavit se absurdní představy, že nejsme plnohodnotní a rovnocenní partneři Japonců. Naši dva císaři jsou jako bratři!" # todo: NEW TRANSLATION
  MAN_chinese_leadershipx: "Čínské vedení" # todo: NEW TRANSLATION
  MAN_chinese_leadershipx_desc: "Čínský národ potřebuje čínského vůdce. Měli bychom veřejně prohlásit, že si klademe za cíl ničem méně než úplné obnovení císařské vlády nad celou Čínou." # todo: NEW TRANSLATION
  MAN_vassalize_mengukuox: "Vassalizovat Mengkukuo" # todo: NEW TRANSLATION
  MAN_vassalize_mengukuox_desc: "Následník Mengkukuo není způsobilý stát po boku císaře Mandžukuo. Je čas ukončit tento směšný experiment a dát mu jeho místo." # todo: NEW TRANSLATION
  MAN_national_cooperation_governmentx: "Vláda národní spolupráce" # todo: NEW TRANSLATION
  MAN_national_cooperation_governmentx_desc: "Dostávají se k nám znepokojivé zvěsti, že Japonci uvažují o jiných čínských politicích - obyčejných lidech - k vytvoření kolaborační vlády. To je nepřijatelné. Musíme zajistit, aby jakékoliv čínské území obsazené našimi společnými silami bylo spravováno námi." # todo: NEW TRANSLATION
  MAN_alliance_with_the_kwantung_armyx: "Aliance s Kwantungskou armádou" # todo: NEW TRANSLATION
  MAN_alliance_with_the_kwantung_armyx_desc: "Japonské jednotky v zemi často nesouhlasí s našimi představami. Měli bychom s nimi navázat bližší spojení, aby naše spolupráce probíhala s co nejmenším konfliktem." # todo: NEW TRANSLATION
  MAN_national_defense_state: "Stát národní obrany" # todo: NEW TRANSLATION
  MAN_national_defense_state_desc: "Dokud válka neskončí a nevrátíme se k vládě nad celou Čínou, musíme vynaložit veškeré úsilí, být ochotni k největším obětem a využít všechny dostupné prostředky k vedení války." # todo: NEW TRANSLATION
  MAN_social_research_unitx: "Oddělení sociálního výzkumu" # todo: NEW TRANSLATION
  MAN_social_research_unitx_desc: "Měli bychom zřídit speciální jednotku pro výzkum zvyků a způsobu života našeho lidu, aby je bylo možné lépe vést k tomu, aby se stali produktivními občany státu." # todo: NEW TRANSLATION
  MAN_invite_japanese_investorsx: "Pozvat japonské investory" # todo: NEW TRANSLATION
  MAN_invite_japanese_investorsx_desc: "Rozvoj naší země bude vyžadovat zahraniční pomoc. Několik společností v Japonsku projevilo ochotu investovat v naší zemi." # todo: NEW TRANSLATION
  MAN_hoankyokux: "Hoankyoku" # todo: NEW TRANSLATION
  MAN_hoankyokux_desc: "Naše vláda je nejlepší nadějí Číny na jasnou budoucnost. Zjevně mnoho lidí má zájem na její zničení. Musíme mít organizaci, která tyto lidi vystopuje a ochrání náš stát." # todo: NEW TRANSLATION
  jap_nav_2: "Budeme zkoumat námořní bombardéry z roku 1940.\n\n" # todo: NEW TRANSLATION
  jap_nav_3: "Budeme zkoumat námořní bombardéry z roku 1944.\n\n" # todo: NEW TRANSLATION
  SLO_diet_of_the_slovak_land: "Zemský sněm Slovenské krajiny" # todo: NEW TRANSLATION
  SLO_diet_of_the_slovak_land_desc: "13. března 1939 Hitler pozval Jozefa Tisa do Berlína a pobídl ho, aby vyhlásil nezávislost Slovenska. Tiso odmítl rozhodnout sám, po čemž mu Hitler dovolil svolat zasedání slovenského parlamentu, které schválilo nezávislost Slovenska." # todo: NEW TRANSLATION
  SLO_telegram_to_berlin: "Telegram do Berlína" # todo: NEW TRANSLATION
  SLO_telegram_to_berlin_desc: "S narozením našeho vlastního suverénního slovenského státu nyní můžeme splnit příslib, který Tiso dal Hitlerovi, a připojit se k Ose." # todo: NEW TRANSLATION
  SLO_zone_of_protection: "Smlouva o ochraně" # todo: NEW TRANSLATION
  SLO_zone_of_protection_desc: "Od počátku byl slovenský stát pod vlivem Německa. Smlouva o ochraně podepsaná 23. března 1939 částečně podřizovala jeho zahraniční, vojenskou a hospodářskou politiku Německu." # todo: NEW TRANSLATION
  SLO_appoint_competent_economists: "Jmenovat kompetentní ekonomy" # todo: NEW TRANSLATION
  SLO_appoint_competent_economists_desc: "Na vysokých postech můžeme zmírnit paralyzující účinek německého řízení na naši ekonomiku." # todo: NEW TRANSLATION
  SLO_industrial_enterprises: "Německá kontrola nad slovenským průmyslem" # todo: NEW TRANSLATION
  SLO_industrial_enterprises_desc: "Během prvního roku existence našeho nového státu Němci využili své obrovské finanční zdroje k ovládnutí velkých domácích průmyslových podniků. To je samozřejmě třeba napravit jmenováním kompetentních ekonomů, kteří zajistí integritu našeho národa a neprodají naše národní majetky Němcům." # todo: NEW TRANSLATION
  SLO_currency: "Silná měna" # todo: NEW TRANSLATION
  SLO_currency_desc: "Směnný kurz německé měny vůči slovenské koruně byl na úrovni 1 říšské marky za 11 slovenských korun." # todo: NEW TRANSLATION
  SLO_factories: "Postavit nové továrny" # todo: NEW TRANSLATION
  SLO_factories_desc: "Během existence Slovenského štátu bylo založeno více než 200 průmyslových podniků." # todo: NEW TRANSLATION
  SLO_infrastructure: "Vybudovat novou infrastrukturu" # todo: NEW TRANSLATION
  SLO_infrastructure_desc: "Během existence Slovenského štátu bylo postaveno více než 100 km nových železnic a 287 km silnic." # todo: NEW TRANSLATION
  SLO_hungarian_invasion: "Maďarská invaze" # todo: NEW TRANSLATION
  SLO_hungarian_invasion_desc: "Za úsvitu 23. března 1939 Maďarsko náhle napadlo Slovensko z Podkarpatské Rusi s instrukcemi „postupovat co nejvíce na západ“[citation needed]. Maďarsko zaútočilo bez vyhlášení války a zastihlo slovenskou armádu nepřipravenou, protože mnoho slovenských vojáků bylo na přesunu z českého území a ještě nedorazilo ke svým slovenským jednotkám." # todo: NEW TRANSLATION
  SLO_seasonal_works_in_germany: "Sezónní dělníci v Německu" # todo: NEW TRANSLATION
  SLO_seasonal_works_in_germany_desc: "Každý rok 40 000 pracovníků odjíždělo do Německa na sezónní práci a část produktivního obyvatelstva byla vyslána na frontu." # todo: NEW TRANSLATION
  SLO_salzburger_diktat: "Salzburská konference" # todo: NEW TRANSLATION
  SLO_salzburger_diktat_desc: "27. až 28. července 1940 v Salzburgu němečtí úředníci nařídili Tisovi změnu vlády. Kontroverzní slovenský politik Vojtech Tuka byl jmenován předsedou vlády a veliteľ Hlinkových gárd Alexander Mach se stal ministrem vnitřních věcí. Začíná nová etapa při formování režimu slovenského státu, ve které se prvky národního socialismu prosazují do všech oblastí života." # todo: NEW TRANSLATION
  SLO_evacuation: "Krize v jižním Slovensku" # todo: NEW TRANSLATION
  SLO_evacuation_desc: "V nově připojené části Maďarska se slovenské obyvatelstvo, které zůstalo ve svých domovech, téměř ihned stává obětí pronásledování, ponižování, násilí nebo otevřeného perzekuování. Stát může evakuovat a poskytnout nové útočiště 50 000 Slováků." # todo: NEW TRANSLATION
  SLO_radical_wing: "Radikální křídlo" # todo: NEW TRANSLATION
  SLO_radical_wing_desc: "Radikální křídlo HSĽS vedené Vojtechem Tukou a Alexanderem Machem usilovalo o napodobení německého režimu." # todo: NEW TRANSLATION
  SLO_moderate_wing: "Mírné křídlo" # todo: NEW TRANSLATION
  SLO_moderate_wing_desc: "Jozef Tiso byl jedním z vůdců mírného křídla, pro‑pražské směřování představoval především generální sekretář Martin Sokol a Jozef Buday." # todo: NEW TRANSLATION
  SLO_fate_in_german_hands: "Osud Slovenska v německých rukou" # todo: NEW TRANSLATION
  SLO_fate_in_german_hands_desc: "Během návštěvy u Hitlera Tuka otevřeně deklaruje.\"Můj vůdce, svěřuji osud svého národa do vašich rukou. Můj národ očekává od vás osvobození.\"" # todo: NEW TRANSLATION
  SLO_detention_camp: "Vybudovat detenční tábor" # todo: NEW TRANSLATION
  SLO_detention_camp_desc: "Brzy po založení nezávislého státu vláda vydala nařízení o zadržování nepřátel slovenského státu. Nepřáteli jsou všichni ti, kteří by podle režimu mohli být překážkou při budování nového státu." # todo: NEW TRANSLATION
  SLO_mobilize_slovak_army: "Mobilizovat slovenské ozbrojené síly" # todo: NEW TRANSLATION
  SLO_mobilize_slovak_army_desc: "Hitler v dubnu 1939 vydal rozkaz vypracovat plán vojenské kampaně proti Polsku, jehož území chtěl připojit k Německé říši. Koncem srpna začala mobilizace slovenské armády." # todo: NEW TRANSLATION
  SLO_president_of_slovak_republic: "První prezident Slovenské republiky" # todo: NEW TRANSLATION
  SLO_president_of_slovak_republic_desc: "Ústava z července 1939 definuje rozsáhlé pravomoci prezidenta, kterého slovenská republika dosud neměla. 26. října 1939 se Jozef Tiso stal prezidentem Slovenské republiky." # todo: NEW TRANSLATION
  SLO_life_in_new_slovakia: "Nové Slovensko" # todo: NEW TRANSLATION
  SLO_life_in_new_slovakia_desc: "Propaganda využívá kontrolovaná média k šíření obrazu Slovenska jako klidné a prosperující země. Ve srovnání s Protektorátem nebo dokonce s Polskem je přímý vliv Třetí říše na Slovensku mnohem méně patrný." # todo: NEW TRANSLATION
  SLO_lomnicky_manifest: "Lomnický manifest" # todo: NEW TRANSLATION
  SLO_lomnicky_manifest_desc: "Ani výtvarné umění se nevyhnulo důsledkům politických změn, které proběhly na Slovensku. V říjnu 1939 přestala existovat progresivní škola umění a řemesel a nahradit ji má Katedra kresby a malby na Slovenské technické univerzitě v Bratislavě." # todo: NEW TRANSLATION
  SLO_german_advisors: "Němečtí poradci" # todo: NEW TRANSLATION
  SLO_german_advisors_desc: "Do klíčových slovenských ministerstev a úřadů, stejně jako do mocenských struktur režimu po Salzburgu, přichází více německých poradců. Jejich úlohou je dohlížet na fungování těchto institucí a zajistit loajalitu vůči Německu a plnění povinností z dohodnuté ochrany." # todo: NEW TRANSLATION
  SLO_economic_loan: "Půjčka na hospodářské oživení" # todo: NEW TRANSLATION
  SLO_economic_loan_desc: "Připojením jihu země k Maďarsku Slovensko ztratilo zemědělsky důležitou oblast s řadou center těžby, kožedělného a knihtiskárenského průmyslu. Byla narušena dopravní a telekomunikační síť i elektrické vedení. V únoru 1939 vláda oznámila půjčku na hospodářské oživení Slovenska, aby situaci zlepšila." # todo: NEW TRANSLATION
  SLO_propaganda_campaings: "Propagační kampaně" # todo: NEW TRANSLATION
  SLO_propaganda_campaings_desc: "Druhou stranou ekonomického oživení je částečně zastřeno propagačními kampaněmi jako „Usmívající se Slovensko“ nebo „Radost z práce“." # todo: NEW TRANSLATION
  SLO_bata: "Baťovy závody" # todo: NEW TRANSLATION
  SLO_bata_desc: "Baťovy závody v Partizánském byly založeny v roce 1939. Partizánske bylo jedním z míst, kde proslulý podnikatel Tomáš Baťa rozvíjel svou činnost. Cílem bylo vytvořit město, kde lidé najdou práci, bydlení a volný čas. Ve fabrikách byl soustředěn provoz na obuvnictví, které tam přetrvává dodnes." # todo: NEW TRANSLATION
  SLO_universities: "Otevřít nové univerzity" # todo: NEW TRANSLATION
  SLO_universities_desc: "V roce 1942 byla založena Slovenská akadémia vied a umenia, která zahájila činnost o rok později. V této oblasti se relativně příznivé období odrazilo i ve zvýšení celkového počtu publikovaných děl různých druhů." # todo: NEW TRANSLATION
  SLO_expand_mines: "Rozšířit doly" # todo: NEW TRANSLATION
  SLO_expand_mines_desc: "Jelikož je země důležitým zdrojem surovin, zemědělských produktů a strategické výroby zbraní pro Německo, a používání její komunikační sítě pokračuje, projevuje zájem o jejich rozvoj v určitých oblastech." # todo: NEW TRANSLATION
  SLO_apollo: "Apollo" # todo: NEW TRANSLATION
  SLO_apollo_desc: "V roce 1895 bylo rozhodnuto vybudovat rafinérii v Bratislavě v Budapešti. Rafinerie Apollo byla uvedena do provozu v roce 1896. Tento nový a moderní závod byl jednou z druhých největších rafinérií minerálních olejů v monarchii. Produkoval benzín, petrolej, parafín, svíčky, vazelínu, asfalt, dokonce i umělý led. Během období Slovenské republiky byl závod vlastněn Dynamit Nobel AG Bratislava a IG Farben." # todo: NEW TRANSLATION
  SLO_hitlers_protection: ""Pod Hitlerovou ochranou"" # todo: NEW TRANSLATION
  SLO_hitlers_protection_desc: "Slovensko má jít příkladem zemím jihovýchodní Evropy a ukázat, že pod Hitlerovou „ochranou“ může národ žít v míru." # todo: NEW TRANSLATION
  SLO_demand_southern_slovakia: "Jedna národnost, jedna strana, jeden vůdce" # todo: NEW TRANSLATION
  SLO_demand_southern_slovakia_desc: "V nově připojené části Maďarska se slovenské obyvatelstvo téměř okamžitě stalo obětí pronásledování, ponižování a násilí. Okupační území ekonomicky poškodila nerealistická konverze pengő na československou korunu. Proto Slovenská republika s pádem mnoha slovenských vojáků ve válce za Velké Německo požaduje znovusjednocení s jižním Slovenskem." # todo: NEW TRANSLATION
  SLO_dynamitka: "Dynamitka" # todo: NEW TRANSLATION
  SLO_dynamitka_desc: "V roce 1941 dosáhl základní kapitál hodnoty 150 milionů korun, což z ní učinilo největší akciovou společnost na Slovensku. Výroba výbušnin byla jedním z nejziskovějších podniků během války a rozhodujícím dílem přispěla k čistému zisku 19 milionů korun za rok 1941." # todo: NEW TRANSLATION
  industrial_research_tt: "Zisky" # todo: NEW TRANSLATION
  SLO_nehera: "Nehera" # todo: NEW TRANSLATION
  SLO_nehera_desc: "Po úspěšném ustavení v české části Československa byl vybudován nový závod i na Slovensku. V roce 1939 se v Trenčíně otevřela Nehera Clothing Service, která zpočátku vyráběla 200 kalhot denně. S nárůstem počtu zaměstnanců se rozšířil i sortiment, který zahrnoval sportovní obleky a pánská saka." # todo: NEW TRANSLATION
  SLO_anti_social: "Antisociální oddělení" # todo: NEW TRANSLATION
  SLO_anti_social_desc: "V roce 1941 začala být vytvářena pracovní oddělení pro tzv. antisociální skupiny, včetně „cikánů bez zaměstnání“. Zpočátku byla sezónní, od roku 1942 se staly trvalými." # todo: NEW TRANSLATION
  SLO_slovak_airforce: "Slovenské vzdušné zbraně" # todo: NEW TRANSLATION
  SLO_slovak_airforce_desc: "Slovenské vzdušné zbraně vznikly na základě československého leteckého pluku 3 „Generál‑letce Milan Rastislav Štefánik“, který byl jako jediný ze šesti československých leteckých pluků umístěn na Slovensku. Po vzniku Slovenské republiky v březnu 1939 nově vzniklé vzdušné zbraně převzaly jeho letecké vybavení a organizační strukturu." # todo: NEW TRANSLATION
  SLO_lessons: "Lekce z „Malé války“" # todo: NEW TRANSLATION
  SLO_lessons_desc: "Křest ohněm zvládly slovenské vzdušné zbraně v březnu 1939, když maďarská armáda vtrhla na území východního Slovenska po obsazení Podkarpatské Rusi. Proti maďarskému letectvu byly nasazeny 45. a 49. stíhací perutě s dvaceti letouny B.534 a 12. a 13. pozorovací perutě vyzbrojené asi dvaceti letouny Š.328." # todo: NEW TRANSLATION
