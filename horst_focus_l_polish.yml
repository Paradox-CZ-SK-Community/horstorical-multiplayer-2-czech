  JAP_RAJ_support_the_anti_british_resistance: "Podpořit protibritský odpor" # todo: NEW TRANSLATION
  JAP_RAJ_support_the_anti_british_resistance_EXPL1: "   Poslat další §HVybavení§! do [RAJ.GetFlag]§H[RAJ.GetName]§!.\n   Poslat vybrané §HGenerály§! jako §HVojenské atašé§! do [RAJ.GetFlag]§H[RAJ.GetName]§!.\n" # todo: NEW TRANSLATION
  JAP_RAJ_support_the_anti_british_resistance_EXPL2: "   Poslat další §HVybavení§! do [RAJ.GetFlag]§HFree India§!.\n   Poslat vybrané §HGenerály§! jako §HVojenské atašé§! do [RAJ.GetFlag]§HFree India§!.\n" # todo: NEW TRANSLATION
  JAP_RAJ_support_the_anti_british_resistance_desc: "" # todo: NEW TRANSLATION
  JAP_RAJ_establish_closer_economic_cooperation: "Zřídit bližší ekonomickou spolupráci" # todo: NEW TRANSLATION
  JAP_RAJ_establish_closer_economic_cooperation_desc: "Indie disponuje obrovským množstvím přírodních zdrojů, které může naše vyspělá průmyslová síla využít. To lze dosáhnout navázáním obchodních vztahů s Indií." # todo: NEW TRANSLATION
  JAP_RAJ_raw_resourcess_extension_program: "Program rozšíření surovin" # todo: NEW TRANSLATION
  JAP_RAJ_raw_resourcess_extension_program_desc: "Indie má velké ložiska přírodních zdrojů, které lze s využitím odpovídající technologie vytěžit k jejich i našemu užitku." # todo: NEW TRANSLATION
