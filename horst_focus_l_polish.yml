  india.100.t: "Naše správa se rozdělila."
  india.100.desc: "Britská vláda právě oznámila vznik Kolonie Aden a Kolonie Barma, čímž významně zmenšila rozsah naší správy."
  RAJ_Tariff_Income: "Příjem z tarifů"
  RAJ_Increased_Trade_Volume: "Zvýšený objem obchodu"
  ENG_split_up_the_British_Raj: "Rozdělit Britský Ráj"
  ENG_split_up_the_British_Raj_desc: "Zřídíme samostatné kolonie v Barma a Adenu, aby byla naše koloniální správa efektivnější."
  raj_port_operation: "Pracujeme na získání přístavu."
  india.295.t: "Indie nás zve do Kominterny"
  india.295.desc: "Po vstupu Indie do Kominterny poté, co vyhnala imperialistické kolonizátory Evropy, rozšířila svůj vliv v jižní Asii a nyní se ptá, zda přijmeme vstup do globálního proletářského svazu."
  india.295.a: "Dělníci světa, spojte se!"
  india.295.b: "Raději se odkloníme od moskevského směru."
  india.296.t: "Indie nás zve do [RAJ.GetFactionName]"
  india.296.desc: "Po založení [RAJ.GetFactionName] Indie po vyhnání evropských kolonizátorů rozšířila svůj vliv v jižní Asii a nyní se ptá, zda přijmeme vstup do jihoasijské proletářské aliance."
  india.296.a: "Dělníci světa, spojte se!"
  india.296.b: "Raději se odkloníme od Dillí."
  india.400.t: "Šepoty v Goa"
  india.400.desc: "V koloniálním městě Goa se šíří šepoty o nadcházející invazi. I když si každý může takový scénář vymyslet, naše vrchní velení zaznamenalo subtilní přesuny vojenských divizí. Invaze by mohla mít katastrofální následky pro místní obyvatelstvo, loajální Portugalsku po 450 let. Mezinárodní společenství nás pravděpodobně podpoří, pokud budeme stát pevně, ale dokáže mezinárodní podpora odrazit indické jednotky? Jsou naše ozbrojené síly schopny toho úkolu? Snadné je klást otázky, těžké je na ně odpovědět."
  india.400.a: "Não passarão!"
  india.400.b: "Raději nebudeme prolévat krev."
  india.401.t: "Indie úspěšně obsadila Goa"
  india.401.desc: "Jeden z posledních pozůstatků evropského kolonialismu v jižní Asii padl k nově vzniklému [RAJ.GetNameDef]. Portugalské impérium se zdá být na ústupu."
  india.401.a: "Preč s kolonizátory!"
  india.401.b: "Smutný den pro Portugalsko."
  india.402.t: "Indie se nezdařila obsadit Goa"
  india.402.desc: "Portugalci statečně odrazili indickou útočnou armádu a uchovali malou část Portugalského impéria."
  india.402.a: "Ať jde peklo s těmi kolonizátory."
  india.402.b: "Naše impérium žije dál."
  india.403.t: "Indie prosazuje referendum v [320.GetName]"
  india.403.desc: "V naší kolonii Francouzská Indie vzniklo masové protestní hnutí, zřejmě za tím stojí nově ustavená indická vláda. Většina koloniálních poradců navrhuje se těch několika přístavů a měst vzdát, protože nepřinášejí skutečný ekonomický prospěch. Můžeme se však také pokusit hnutí potlačit. Pokud tak učiníme, je vhodné se připravit na nečekané následky."
  india.403.a: "Přiveďte mi guvernéra."
  india.403.b: "Nechme demokracii zahrát si."
  india.404.t: "Problém Francouzské Indie."
  india.404.descre: "Protesty se nadále šíří, protože naše místní policejní síly unavené potlačováním. Zpočátku se zdálo, že jejich uklidnění je nemožné. Bez váhání jsme se rozhodli posílit naši imperiální správu. Toto rozhodnutí sice nebylo příliš populární mezi ostrovními administrátory, kteří ustoupili místním požadavkům a postoupili provincie Indii."
  india.404.desc: "Referendum nečekaně dopadlo ve prospěch sjednocení s Indií a jsme bezmocní zastavit převod. Místní [Root.GetAdjective] jednotky budou staženy, administrátoři přesunuti, [Root.GetAdjective] vlajka spuštěna a nakonec vztyčena indická vlajka."
  india.404.a: "To si ještě rozmyslíme."
  india.404.b: "Spíše anticlimax po tom, čím jsme prošli."
  india.405.t: "Otázka Barmy"
  india.405.desc: "Dlouho jsme uvažovali o oddělení Barmy od Indie a někteří diplomaté už připravují plány administrace. [Raj.GetNameDef] nás žádalo, abychom subkontinent udrželi rozdělený z ekonomických i administrativních důvodů. Opuštění těchto plánů uvolní naše diplomaty pro jiné oblasti."
  india.405.a: "Máme důležitější věci na práci."
  india.405.b: "Naši diplomaté budou pokračovat."
  india.406.t: "Britové přijali naši žádost."
  india.406.desc: "Britští diplomaté vypracovávající plány pro samostatnou barmskou administraci byli přesunuti na jiné úkoly a naše správa zůstává nedotčena."
  india.406.a: "Moudré rozhodnutí."
  india.407.t: "Britové naši žádost zamítli."
  india.407.desc: "Britská vláda jasně zamítla náš návrh udržet Indii jednotnou a jejich diplomaté pokračují ve plánech na Kolonii Barma."
  india.407.a: "Načerte Angličany."
  india.408.t: "Otázka Cejlonu"
  india.408.desc: "Náš nově rovnoprávný spojenec Indie vyvíjí stále větší tlak ohledně svých údajně spojenců v Srí Lance. Zatímco jejich volání po nezávislosti je v posledních měsících slyšitelnější, měli bychom se opravdu vzdát této životně důležité části impéria?"
  india.408.a: "Udělíme jim status dominium."
  india.408.b: "Nebudou diktovat naši domácí politiku."
  india.409.t: "Britové přijali naši žádost."
  india.409.desc: "Britská vláda udělila bývalé korunové kolonii Cejlon status dominium pod novým jménem [SRL.GetNameDef]. To je velké vítězství pro domorodé obyvatele Asie."
  india.409.a: "Okamžitě ustanovíme velvyslanectví."
  india.410.t: "Britové naši žádost zamítli."
  india.410.desc: "Britové odpověděli, že nemají v úmyslu se vzdát kolonie Cejlon. To je výrazný zásah proti domorodým obyvatelům Asie."
  india.410.a: "Načerte Angličany."
  burma_separate: "Kolonie Barma byla založena"
  plead_against_seperation: "Lobovat proti založení Kolonie Barma"
  plead_against_seperation_desc: "Britové již dlouho připravují plány na samostatnou barmskou kolonii vytěženou z naší správy. Měli bychom Britům dát najevo náš názor na toto téma."
  raj_prevent_state_modifier: "Zabrání, aby se §YBarma§! stala samostatnou kolonií a aby jsme §Rztratili§! §Yvětšinu jejich zdrojů§!."
  RAJ_port_of_yanoan: "Operace Koel"
  RAJ_port_of_yanoan_desc: "Slibem místnímu obyvatelstvu referenda o sjednocení s Indií nebudou Francouzi moci zamítnout naši žádost."
  RAJ_port_of_goa: "Operace Vriksha Deep"
  RAJ_port_of_goa_desc: "Jedna z posledních zlých manifestací evropského kolonialismu musí být vrácena svým právoplatným vlastníkům, je-li třeba, i silou."
  GOA_border_incident_notification: "Hrozící hraniční válka"
  RAJ_border_incident_forgotten: "Hraniční válka zapomenuta."
  RAJ_escalate_incident_to_border_conflict_GOA: "Vyostřit hraniční válku o Goa."
  south_asian_liberation: "Osvobození jižní Asie"
  south_asian_liberation_desc: "Abychom zasadili kořeny povstání v jižní Asii, musíme poslat vojenskou a politickou pomoc utlačovaným zemím.\n\nPo dokončení jakéhokoli fókusu týkajícího se povstání bude politická podpora a zbraně odeslány, aby se bránily proti jakémukoli odvetnému zásahu.\n\n[RAJ.GetSalVariable]"
  raj_sal_variable: "[SRL.GetFlag] §YSrílanští§! zbraně §Rpro povstání§! jsou: §Y[?SRL_arms]§!.\n[SRL.GetFlag] §YLanka Sama Samaja Party§! podpora §Rpro povstání§! je §Y[?SRL_pol]§!.\n\n[NEP.GetFlag] §YNepálští§! zbraně §Rpro povstání§! jsou: §Y[?NEP_arms]§!.\n[NEP.GetFlag] §YKomunistická strana Nepálu§! podpora §Rpro povstání§! je §Y[?NEP_pol]§!.\n\n[SRL.GetFlag] §YBhútánci§! zbraně §Rpro povstání§! jsou: §Y[?BHU_arms]§!.\n[BHU.GetFlag] §YBhútánská komunistická strana§! podpora §Rpro povstání§! je §Y[?BHU_pol]§!."
