  NOR_cold_navy: "Námořnictvo chladných vod" # todo: NEW TRANSLATION
  NOR_cold_navy_desc: "Jako arktická země jsou naši námořníci dobře vycvičeni v námořním boji v chladných vodách, což jim dává výhodu nad Osou." # todo: NEW TRANSLATION
  NOR_naval_radar: "Námořní radar" # todo: NEW TRANSLATION
  NOR_naval_radar_desc: "Radar nabízí lákavé možnosti zbavit nepřítele ochrany noci a odhalit je i za špatného počasí." # todo: NEW TRANSLATION
  NOR_ASW_desc: "Spojené království udělalo velký pokrok v boji proti nepřátelským ponorkám. Můžeme s nimi spolupracovat na vylepšení naší vlastní doktríny." # todo: NEW TRANSLATION
