  RAJ_demands_to_london_tt: "Učiníme požadavky indického lidu jasnými vládě v Londýně. §RWIP§!" # todo: NEW TRANSLATION
  RAJ_Demands_to_London: "Požadavky Londýnu" # todo: NEW TRANSLATION
  RAJ_Demands_to_London_desc: "Po neuvěřitelných obětech, které obyvatelstvo [RAJ.GetNameDef] přineslo ve jménu krále, se jejich myšlenky obracejí k otázce odškodnění. Jistě by životy ztracené v obou světových válkách, ve kterých indický lid stál bok po boku s Británií, měly být laskavě opláceny ukončením kolonialismu, který desetiletí dominoval subkontinentu." # todo: NEW TRANSLATION
