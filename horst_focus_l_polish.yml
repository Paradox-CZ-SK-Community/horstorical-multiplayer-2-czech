  efr_production_effort_2: "Úsilí o zbrojení II"
  efr_production_effort_2_desc: "Přizpůsobování civilních továren pro výrobu vojenského vybavení je neefektivní. Měli bychom se nyní zaměřit na přípravu vojenské výroby."
  efr_production_effort_3: "Úsilí o zbrojení III"
  efr_production_effort_3_desc: "Pokračující snahy o rozšíření našich vojenských továren jsou nutné k naplnění požadavků na nové vybavení."
  efr_infrastructure_effort: "Úsilí o infrastrukturu"
  efr_infrastructure_effort_desc: "Země bez řádné infrastruktury nemůže realizovat pokročilé projekty či stavby."
  efr_infrastructure_effort_tt: "Nedostatek stavebních slotů pro §YInfrastrukturu§!"
  efr_infrastructure_effort_2: "Úsilí o infrastrukturu II"
  efr_infrastructure_effort_2_desc: "Další rozšíření naší infrastruktury umožní přepravy a komunikace potřebné pro vysoce technologické tajné projekty."
  efr_political_effort: "Politické úsilí"
  efr_political_effort_desc: "Abychom přinesli změnu ve světě, musíme být schopni přinést změnu v naší vlastní zemi. Posílení naší politické pozice by mělo být na prvním místě."
  order227_set: "Rozkaz 227 byl proveden automaticky"
  SOV_southern_thrust_tt: "Koordinujeme rychlou invazi do Persie ve spojení s divizemi Commonwealthu. Tím rozdělíme Persii mezi sovětskou a anglickou sféru vlivu.  \n \n"
  the_plan_tt: "§RPOZNÁMKA: ZÁKLADNÍ CÍL PLATÍ POUZE PRO KANADSKY VYROBENÁ LETADLA, NE PRO AMERICKÁ/BRITSKÁ§!"
  efr_army_effort: "Úsilí armády"
  efr_army_effort_desc: "Navzdory rostoucím možnostem vzdušného a námořního boje zůstává pozemní boj klíčový ve válkách budoucnosti. S přípravou se můžeme vyhnout znovuprožívání pekla zákopů."
  efr_equipment_effort: "Úsilí o vybavení"
  efr_equipment_effort_desc: "Hranice toho, jaké vybavení může pěchota nést, jsou neustále posouvány. Zaměříme se na to, aby naše jednotky měly nejlepší dostupné nástroje."
  efr_motorization_effort: "Úsilí o motorizaci"
  efr_motorization_effort_desc: "Mobilita a ochrana jsou rozhodující pro bezpečný vstup a odchod pěchoty z bojiště. Zaměření na tyto oblasti nám umožní jednat rychle."
  efr_doctrine_effort: "Úsilí o doktrínu"
  efr_doctrine_effort_desc: "Vojenské doktríny, které formovaly pozemní boj ve Velké válce, jsou zastaralé. Musíme přidělit naše nejlepší mozky k utváření vojenského myšlení zítřka."
  efr_equipment_effort_2: "Úsilí o vybavení II"
  efr_equipment_effort_2_desc: "Budeme pokračovat v úsilí zajistit, aby naše pěchota a podpůrné jednotky byly vyzbrojeny nejlepším možným vybavením své doby."
  efr_mechanization_effort: "Úsilí o mechanizaci"
  efr_mechanization_effort_desc: "Přehodnocením možností motorizované pěchoty můžeme posunout hranice toho, jaké vozidla lze dnes vyrobit."
  efr_doctrine_effort_2: "Úsilí o doktrínu II"
  efr_doctrine_effort_2_desc: "Bojiště se změnilo nejen v meziválečných letech, ale v průběhu nedávných konfliktů. Musíme průběžně přehodnocovat naše doktríny, aby to odrážely."
  efr_equipment_effort_3: "Úsilí o vybavení III"
  efr_equipment_effort_3_desc: "Místo napodobování nebo nákupu zahraničního vybavení bychom se měli snažit stát světovou jedničkou ve výzbroji pěchoty."
  efr_armor_effort: "Úsilí o obrněné síly"
  efr_armor_effort_desc: "Uplatněním toho, co jsme se naučili při mechanizaci pěchoty, můžeme zlepšit i naše obrněné vozidla."
  efr_special_forces: "Zvláštní jednotky"
  efr_special_forces_desc: "Potřebujeme elitní síly; horská vojska a výsadkáři by měli být naší prioritou."
  efr_aviation_effort: "Úsilí o letectvo"
  efr_aviation_effort_tt: "Nedostatek stavebních slotů pro §YLeteckou základnu§!"
  SOV_cold_snap: "Zima 1941–1942"
  SOV_cold_snap_idea: "Generál Mráz"
  SOV_cold_snap_desc: "Zima 1941–1942 tvrdě zasáhla jak sovětské, tak německé armády, z nichž žádná nebyla řádně připravena tomu čelit, byť mnohem méně byl připraven ten druhý."
  SOV_winter_equipment_1: "Zimní vybavení"
  SOV_wartime_industry: "Válečný průmysl"
  SOV_wartime_industry_idea: "Válečný průmysl"
  SOV_partisans: "Stalinovi partyzáni"
  SOV_partisans_desc: "Mezi proudem německé pěchoty a tanků se skrývají praví sovětští vlastenci rozptýlení za nepřátelskými liniemi. Tito partyzáni útočí zezadu a způsobují zmatek v fašistickém válečném stroji."
  SOV_partisans_idea: "Sovětská partyzánská povstání"
  SOV_partisans_idea_desc: "Železniční tratě jsou sabotovány, mosty vyhozeny do povětří a pěchota obtěžována bolševickými teroristy."
  SOV_partisans_idea2: "Sicherungs-Divisionen"
  SOV_partisans_idea2_desc: "Naše bezpečnostní divize jsou speciálně školeny pro protiteroristické operace, potlačující partyzánské aktivity."
  GER_volunteers_tt: "§R\nVálečné vyčerpání se zvýší o 0,5 %§!"
  GER_sd: "Bezpečnostní divize"
  GER_sd_desc: "Aktivita sovětských partyzánů se ukázala být výrazně vyšší, než se očekávalo"
  SOV_tankograd: "Tankograd"
  SOV_tankograd_idea: "Tankograd"
  SOV_strafbat: "Štrafbaty"
  SOV_strafbat_desc: "Zbabělci dostávají ty nejhorší pozice na frontě v Rudé armádě."
  SOV_strafbat_idea: "Štrafbaty"
  tech_military_police_sov: "Štrafbaty"
  GER_totaler_krieg: "Vyhlásit totální válku"
  GER_totaler_krieg_idea: "Totální válka"
  GER_totaler_krieg_idea2: "Totální válka - Nejkratší válka!"
  GER_amerikabomber: "Amerikabomber"
  GER_amerikabomber_desc: "Bombardováním průmyslového srdce USA můžeme přesměrovat americký civilní a vojenský průmysl k ochraně vlasti, izolovat Británii pro druhý vzdušný souboj."
  GER_maus: "Smlouva s Porschem"
  GER_maus_designer: "Projekt Maus"
  GER_maus_designer_desc: "Zimní tanky"
  GER_maus_desc: "Zadáme Ferdinandu Porschemu stavbu jeho návrhu supertěžkého tanku, Panzerkampfwagen VIII Maus"
  GER_e100: "Objednávka pro Henschel"
  GER_e100_designer: "Projekt E-100"
  GER_e100_desc: "Zadáme Henschelu stavbu jejich návrhu supertěžkého tanku, Panzerkampfwagen E-100"
  GER_lowe: "Zakázka pro Krupp"
  GER_lowe_designer: "Projekt Löwe"
  GER_lowe_desc: "Zadáme Kruppovi stavbu jejich návrhu supertěžkého tanku, Panzerkampfwagen VII Löwe"
  GER_project_riese: "Projekt Riese"
  GER_project_riese_desc: "Musíme postavit nové rafinerie a zbrojní továrny bezpečně pod zemí, mimo dosah britských bombardérů."
  GER_strafbat: "Zformovat trestné prapory"
  GER_strafbat_desc: "Vyčerpávající personální potřeby války hrozí snížením výrobních kapacit zbraní. To můžeme oddálit vytvořením strafbataillonu z trestanců, válečných zajatců a neposlušných vojáků. Tyto jednotky mohou sloužit také jako frontové stavební prapory pro nebezpečné manuální práce."
  GER_strafbat_idea: "Strafbataillon"
  ITA_balkan_war_goal: "Dominance na Balkáně"
  ITA_balkan_war_goal_desc: "Jaké Římské impérium obnovujeme, když nezahrneme Balkán? Měl by být snadným cílem..."
  ITA_defense_italia: "Fortezza Italia"
  GER_volunteers: "Zahraniční dobrovolníci a odvedenci"
  GER_volunteers_desc: "Heinrich Himmler nás oslovil ohledně vytvoření ne-německých polovojenských jednotek z cizích dobrovolníků a odvedenců z dobytých zemí. Tyto teoretické divize by byly pod jeho velením, mimo kontrolu Heer, což téměř jistě rozčílí vrchní německý generální štáb. Přesto Německo potřebuje více mužů na bojišti."
  GER_volunteers_idea: "Zahraniční dobrovolníci a odvedenci"
  GER_totaler_krieg_idea2_desc: "§RNěmečtí vojáci jsou svoláni k vítězství, ale pokud se válka příliš protáhne a stabilita či válečná podpora našeho národa klesne příliš nízko (<50 %), ztratíme iniciativu!§!"
  GER_speers_miracle_idea: "Zázrak zbrojení"
  GER_speers_miracle_idea_desc: ""
  SOV_resurgent_red_army: "Velká vlastenecká válka"
  GER_war_exhaustion: "Válečné vyčerpání"
  HORST_ENABLE_MODDED_BARB: "Povolit Horstkrieg"
  stalin_command_tt: "§CSoudruh Stalin se zotaví ze své nepřítomnosti a začne vydávat rozkazy.§!"
  SOV_shaposhnikov1: "Znovu jmenovat Shaposhnikova náčelníkem generálního štábu"
  SOV_barb2: "Vytvořit Výbor státní obrany"
  SOV_barb2_idea: "Výbor státní obrany"
  stalin_barb_leader_trait: "Generalissimus"
  SOV_barb2_desc: "Když se soudruh Stalin zotaví ze svého šoku, můžeme se nyní soustředit na organizaci odpovědi Unie na Německo. Začneme založením výboru, který bude mít nejvyšší moc a dohled nad Unií, zřízeného Prezidiem Nejvyššího sovětu SSSR."
  SOV_shaposhnikov1_desc: "Nyní více než kdy jindy potřebujeme Borise Shaposhnikova jako náčelníka generálního štábu."
  SOV_icebreaker: "Operace Ledoborec"
  SOV_icebreaker_desc: "Rudá armáda se dostatečně mobilizovala a připravila k úderu na fašistického tvora a k zahájení osvobozování dělníků Evropy. Ukážeme jim sílu Sovětského svazu!"
  SOV_icebreaker2: "Operace Ledoborec"
  SOV_icebreaker2_desc: "Rudá armáda se dostatečně mobilizovala a připravila k úderu na fašistického tvora a k zahájení osvobozování dělníků Evropy. Ukážeme jim sílu Sovětského svazu!"
  horst_modded_barb: "Modifikovaná Barbarossa"
  GER_blau: "Fall Blau"
  GER_blau_start: "Německo zahájilo Fall Blau"
  USA_intervention_in_europe2: "Intervence v Asii"
  GER_barb_buff_tt: "§R\nNaše útočné plány vyprší po 22. listopadu 1941§!\n\n"
  GER_ot: "Rozšířit Organisation Todt"
  GER_ot_desc: "Naše potřeby pracovních sil netrpí nedostatkem dobrovolníků"
  GER_ot_idea: "Organisation Todt"
  SOV_270: "Rozkaz 270" # todo: NEW TRANSLATION
  SOV_order270: "Rozkaz 270"
  SOV_wartime_research: "Válečný výzkum"
  SOV_wartime_research_desc: "Válka podněcuje velké inovace v našich odděleních výzkumu a vývoje."
  cold_train_tt: "§CVšichni naši generálové se přizpůsobí podmínkám studeného počasí!§!"
  SOV_cold_train: "Výcvik pro arktický boj"
  SOV_cold_train_desc: "Naši generálové se naučí, jak bojovat s generálem Mrázem, místo proti němu."
  SOV_son: "Požehnaní vojáci"
  SOV_father: "Požehnané zbraně"
  SOV_holy_spirit: "Požehnané obrany"
  SOV_plowshares_into_swords: "[Root.GetSovMilCivName]"
  SOV_church_masses: "Mše za Unii"
  SOV_church_masses_desc: "Kněží naší Unie nyní hlásají protifašistický boj spolu se svým náboženským blábolením, povzbuzujíc rolníky a dělnickou třídu, aby snášeli oběti potřebné k vítězství v našem vlasteneckém boji."
  SOV_priests_integrated: "Integrovat kněze do vojenských operací"
  SOV_priests_integrated_desc: "Důkladně využijeme Ruskou pravoslavnou církev při podpoře bojových operací zlepšením morálky vojáků."
  SOV_plowshares: "Z pluhů meče"
  HMP_oppose_mills_tt: "§CPadesát zbrojních továren bude přidáno do Sibiře§!"
  fp_attache_idea: "Přidělenec odeslán"
  fp_attache: "Poslat přidělence"
  HMP_neutral_mills_tt: "§CRozšíříme náš zbrojní průmysl§!"
  SOV_stalinsmills: "Arzenál socialismu"
  SOV_neutralmills: "Rozšíření vojenského průmyslu"
  SOV_oppose_the_church: "Unie, Stalin a socialismus"
  no_depression_tt: "Úplně jsme se zotavili z ničivých následků §OVeliké hospodářské krize§!"
  GER_army_innovation_3: "Vojenské inovace III"
  GER_speers_miracle: "Speerův zázrak zbrojení"
  GER_speers_miracle_desc: "Albert Speer odvážně tvrdí, že dokáže masivně zvýšit výrobu zbrojení reorganizací našeho vojenského průmyslu a pracovní síly. Měli bychom mu dát tuto příležitost, protože potřebujeme zvýšit výrobu zbraní, abychom čelili spojencům a sovětským silám."
  GER_army_innovation_3_desc: "Kampaň ve Francii a Polsku nás naučila význam variant tanků a také potřebu různých typů tankových modelů."
  GER_jag_tt: "§CZískáme dočasné posílení rychlosti obnovy armády a rychlosti posil. Také změníme naši ekonomickou zákonodárnou na §YTotální mobilizaci§!§!\n\n40 civilních továren bude okamžitě přeměněno na 40 vojenských továren.\n\n§RKurzester Krieg bude zrušen, pokud naše válečná podpora klesne pod 50 %!§!\n\n§RBudeme měsíčně ztrácet 2,0 % válečné podpory§!§!\n\n"
  ITA_sword_tt: "\nObdržíme bonus k §CStabilitě§! a §CVálečné podpoře§! na základě kontroly arabských/muslimských států v severní Africe a na Blízkém východě."
  ITA_Skillful_Workers_tt: "Kromě bonusu k §CStabilitě§! a §CVálečné podpoře§! z kontroly arabských/muslimských států v severní Africe a na Blízkém východě obdržíme bonus k §CVýstupu továren§! a §CVýstupu loděnic§! roven polovině stability/válečné podpory získané z kontroly států v severní Africe a na Blízkém východě.§!\n\n§YMaximální možná hodnota je 14,5 % stability a 7,75 % výstupu továren/loděnic§!"
  SOV_oppose_the_church_desc: "Socialismus teď, socialismus zítra, socialismus navždy!"
  SOV_barb3_idea: "Velká vlastenecká válka"
  SOV_brest: "Lekce z Brestské pevnosti"
  HOL_knil2: "Odvedenci KNIL"
  HOL_curacao_desc: "Měli bychom rozvíjet Curacao na západě, je to dokonalé místo na oslavu dovolené a má spoustu ropy a legrační barevné domy, které postavíme!"
  HOL_invest_desc: "Měli bychom se také zaměřit na naše západní panství. Jsou sice malé, ale poměrně bohaté na zdroje. Zdroje se vždy hodí. To by také zvýšilo náš zámořský obchod, což je vždy dobré, naše flotila by prosperovala!"
  HOL_suriname_desc: "Surinam má poměrně velkou populaci a docela zásoby surovin, dále jej rozvíjet by nebyla vůbec špatná volba."
  HOL_knil2_desc: "Domovina padla, jen naše kolonie nám mohou pomoci v boji. Kdybychom dokázali shromáždit domorodce za naši věc, mohli bychom vytvořit armádu stejně velkou jako ta čínská!"
  stalin_barb_leader_trait2: "Generalissimus Sovětského svazu"
  mrp_was_done: "Podepsali jsme pakt Molotov–Ribbentrop"
  SOV_at: "Modernizovaná protitanková válka"
  SOV_at_desc: "Obrovské množství a kvalita německých tankových divizí nás nutí rychle modernizovat naše protitankové zbraně."
  SOV_order270_desc: "Obklíčené jednotky a formace mají bezvýhradně bojovat až do posledního, chránit materiál jako oko v hlavě, prorazit ze zad nepřátelských vojsk a porazit fašistické psy.\n\nPředseda Výboru státní obrany - J. STALIN"
  SOV_man_of_steel: "Muž z oceli"
  SOV_man_of_steel_desc: "Generalisimus Stalin řídil každý krok... učinil každé rozhodnutí... Je největším a nejmoudřejším vojenským géniem, jaký kdy žil... - Georgij Žukov"
  SOV_invade_Japan: "Operace Srpnová bouře"
  SOV_invade_Japan_desc: "Hraniční konflikt s Japonskem trvá dost dlouho. Pokud nemůžeme důvěřovat japonské vládě, že bude respektovat uznanou hranici, budeme ji muset nahradit."
  SOV_china_prc: "Podpořit Čínskou lidovou republiku"
  SOV_china_prc_desc: "Zavážeme se k osvobození a sjednocení Číny pod socialistickou vládou."
  SOV_wtf: "Nervózní Stalin"
  SOV_wtf_desc: "Náhlá invaze fašistů krátce paralyzovala soudruha Stalina."
  SOV_barb1: "Přivést Stalina z jeho dachi"
  SOV_barb1_desc: "Celé naše velení je paralyzované bez rozkazů soudruha Stalina. Potřebujeme, aby se vrátil do normálu, abychom mohli bojovat!"
  rasputitsa: "Rasputica"
  rasputitsa_tt: "Síla sovětského období bláta sestoupí na všechny armády bojující v Sovětském svazu! Po celý §Ybřezen a duben§! A také §Yříjen a listopad§! bude každá divize ovlivněna následujícími modifikátory: §R-20% rychlost divize§!, §R-20% rychlost obrněné divize (40% celkem)§!, §R+10% ztrát§!, a §R-30% rychlost obnovy§!.\n\nTato přírodní síla se bude vyskytovat dvakrát ročně až do poloviny roku 1945."
  GER_zwangsarbeit: "Povinná pracovní služba"
  GER_zwangsarbeit_desc: ""
  GER_zwangsarbeit_idea: "Zwangsarbeit"
  GER_winter_equipment: "Přizpůsobit naše vybavení pro zimu"
  GER_winter_equipment_desc: "Pokud máme bojovat přes zimu, musíme naše vybavení upravit pro zimní podmínky – a rychle."
  GER_blau_desc: "Musíme vyhrát, a rychle - Joseph Goebbels"
  GER_barbarossa_others_text: "§C\nI naši spojenci budou mít prospěch z útočných plánů.§!"
  GER_blau_text: "§R\nNaše útočné plány vyprší po 23. listopadu 1942!§!"
  GER_jag_desc: "Německo je obleženo mezinárodním bolševickým spiknutím proti němu. Spojené hospodářství spojenců a Sovětů je monstrózní, ale dá se překonat plnou mobilizací německého lidu v totální válce. Válce tak totální, že je radikálnější, než kdo si dokáže představit."
  GER_totaler_krieg_tt: "§RPokud válku rychle neukončíme, bude to mít katastrofální následky pro Německo!§!\n\n"
  GER_jet_focus: "Projekt Messerschmitt"
  GER_jet_focus_desc: "Messerschmitt pracuje na typu letadla poháněného proudovým motorem. Toto letadlo, Me 262, nám pomůže zvítězit ve vzdušném boji."
  GER_uralabomber: "Uralbomber"
  GER_uralabomber_desc: "Sovětský průmysl byl přemístěn do Sibiře, mimo dosah našich bombardérů. Potřebujeme vyvinout větší a dálkové bombardéry, abychom dosáhli na tyto továrny."
  amerika_bomber: "Program Amerikabomber"
  amerika_bomber_desc: "Pokud donutíme USA, aby soustředily protiletadlovou dělostřelbu a stíhačky na ochranu vlasti, budeme mít volnou ruku k bezohlednému bombardování Británie!"
  uk_africa_focus: "Rozvinout Súdán"
  uk_africa_focus_desc: "Měli bychom rozvinout silniční síť a námořní základny v oblasti Súdánu pro případ, že se Středozemní moře stane neprůjezdným pro naše konvoje a budeme muset vést zásoby touto cestou."
  uk_levant_focus: "Ochrana Levantu"
  uk_levant_focus_desc: "Východní Středomoří lze bránit pouze sítí leteckých základen blízko pobřeží. Pokud ztratíme kontrolu nad Východním Středomořím, ztratíme jistě kontrolu nad Egyptem."
  uk_sumeria_focus: "Základny na Blízkém východě"
  uk_sumeria_focus_desc: "Rozvoj vojenské infrastruktury na Blízkém východě je klíčový pro zásobování našich jednotek v Levantu, pokud ztratíme kontrolu nad Východním Středomořím."
  uk_africa_last_defense: "Připravit obranu v Súdánu"
  uk_africa_last_defense_desc: "Suez je ztracen! Musíme zastavit Ose od zbytku Afriky!"
  CHI_french_drillx: "Italský výcvik"
  CHI_french_drillx_desc: "Italské zkušenosti z Velké války vytvořily armádu vynikající v obraně. Přijetím jejich výcvikových metod a standardů můžeme zlepšit naše obranné schopnosti."
  CHI_reach_out_to_francex: "Oslovit Itálii"
  CHI_reach_out_to_francex_desc: "I když nás Italové opakovaně ponížili a vynutili si nové ústupky, v současné situaci se může stát, že jejich pomoc budeme potřebovat."
  GER_mech_3_focus: "Sd.Kfz. 251"
  GER_mech_3_focus_desc: "Pokud na naše Hanomagy namontujeme infračervené reflektory, můžeme lépe bojovat v noci a zvýšit tak povědomí o boji."
  eth_give_tanks: "Itálie nám poskytne §Y1.20K§! §Yvylepšených lehkých tanků§!"
