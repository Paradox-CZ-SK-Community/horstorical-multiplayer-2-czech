  NOR_carriers: "Eskortní letadlové lodě" # todo: NEW TRANSLATION
  NOR_carriers_desc: "Stavba malých letadlových lodí k doprovodu obchodní flotily proti ponorkám a menším námořním skupinám je pro nás realizovatelnější než plnohodnotné nosiče letadel." # todo: NEW TRANSLATION
  TIB_anti_meme33: "Osvobozování Londýna od Japonska" # todo: NEW TRANSLATION
  GER_the_great_turn: "Konečné vítězství" # todo: NEW TRANSLATION
  GER_the_great_turn_desc: "Vítězství proti mezinárodní bolševické konspiraci je nevyhnutelné! Německý národ je předurčen obrátit válku v náš prospěch a zvítězit, porážka je nemožná!" # todo: NEW TRANSLATION
  TIB_anti_meme: "Návrat k 1.4 Soft Attack" # todo: NEW TRANSLATION
  endsieg_tt: "§HNaše§! §CÚtok divizí na území jádra§! §Aa§! §CObrana divizí na území jádra§! §Hbude zvýšena o§! §C10%§! \n\n§HTaké nasadíme §G72 40w pěchotních divizí§! k udržení linie.§!\n\n§HVýstup našich továren se zvýší v závislosti na počtu států, které ztratíme. \n\nVýpočet výstupu továren začíná po 22.6.1942§!" # todo: NEW TRANSLATION
  ITA_fort_milan: "Pevnost Milán" # todo: NEW TRANSLATION
  ITA_fort_milan_desc: "Budeme bojovat do posledního Itala! Uděláme z Milána Stalingrad Itálie!" # todo: NEW TRANSLATION
  ITA_The_Riches_Of_The_North: "Bohatství severu" # todo: NEW TRANSLATION
  ITA_The_Riches_Of_The_North_desc: "Severní část pevniny je ekonomickým srdcem našeho impéria, posilme toto srdce pro stabilnější ekonomiku." # todo: NEW TRANSLATION
  ITA_Dont_Forget_The_Colonies: "Zbytek impéria" # todo: NEW TRANSLATION
  ITA_Dont_Forget_The_Colonies_desc: "Musíme přinést civilizaci a bohatství do celého našeho impéria, nejen do Italie. Musíme rozšířit náš systém v kolonii Libye, integrovat Araby do Národní fašistické strany a vybudovat tisíce kilometrů nových silnic. Jen tak budeme v budoucnu silní!" # todo: NEW TRANSLATION
  ITA_Create_Jobs_In_The_Poor_Parts_Of_The_Empire: "Vytváření pracovních míst v chudých oblastech" # todo: NEW TRANSLATION
  ITA_Create_Jobs_In_The_Poor_Parts_Of_The_Empire_desc: "Musíme vytvořit bohatství pro chudé v našich nezcivilizovaných regionech, jak se ptáte? Vytvoříme pracovní místa, která přispějí k rostoucí militarizaci naší země. Je to situace výhra-výhra." # todo: NEW TRANSLATION
  ITA_Skillful_Workers: "Plné žaludky" # todo: NEW TRANSLATION
  ITA_Skillful_Workers_desc: "Chudí se nyní díky zkušenostem a hlavně plným žaludkům naučili docela zručné výrobě zbraní v nových zbrojních komplexech, které jsme pro ně postavili. Pracovní místa vytvářejí peníze pro chudé a peníze poskytují jídlo pro rodinu. Tato strategie plných žaludků se vyplácí v našich výrobních číslech." # todo: NEW TRANSLATION
  ITA_Our_Finest_Hour: "Naše nejlepší hodina" # todo: NEW TRANSLATION
  ITA_Our_Finest_Hour_desc: "Naše průmyslová transformace byla dokončena, jsme připraveni na temnější časy, které na nás brzy přijdou, toto bude naše největší chvíle." # todo: NEW TRANSLATION
  GER_standardpanzer: "Standardní tank" # todo: NEW TRANSLATION
  GER_standardpanzer_desc: "Zavedením konečné standardizované řady tanků. Tato řada bude sahat od menšího E-10, E-50 Standardpanzer (střední tank), přes E-75 standardní těžký tank až po E-100 supertěžký tank. Díky těmto standardizovaným, i když uspěchaným návrhům, budeme schopni vyrábět tanky za výrazně nižší cenu. To pomůže vytvořit přebytky tanků, které nám pomohou dosáhnout konečného vítězství." # todo: NEW TRANSLATION
  MAN_resources: "Rozvíjet těžební a ropný průmysl" # todo: NEW TRANSLATION
  MAN_resources_desc: "Naše země jsou bohaté na hliník, ocel a ropu, ale byly dlouho zanedbávány. Rozvoj těchto zdrojů je cesta vpřed." # todo: NEW TRANSLATION
