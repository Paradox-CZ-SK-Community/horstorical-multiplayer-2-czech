  USA_continue_the_new_deal1_desc: "Politiky New Dealu se ukázaly jako účinné. Teď nesmíme ztratit směr." # todo: NEW TRANSLATION
  USA_the_new_american_generations: "Tichá generace" # todo: NEW TRANSLATION
  USA_the_new_american_generations_desc: "Generace lidí narozených přibližně 1928–1945, následující po Greatest Generation a před poválečným populačním boomem; byli vůdci hnutí za občanská práva." # todo: NEW TRANSLATION
  USA_landon_deal: "Landonův New Deal" # todo: NEW TRANSLATION
  USA_landon_deal_desc: "§RAlfred Mossman Landon (9. září 1887 – 12. října 1987)§! - byl americký ropný magnát a politik, který sloužil jako 26. guvernér Kansasu v letech 1933–1937. Člen Republikánské strany, byl jejím nominantem v prezidentských volbách 1936 a byl drtivě poražen úřadujícím prezidentem Franklinem D. Rooseveltem. - §RDoporučeno Ganked§!" # todo: NEW TRANSLATION
  USA_reaffirm_the_gold_standart: "Znovu potvrdit zlatý standard" # todo: NEW TRANSLATION
  USA_reaffirm_the_gold_standart_desc: "Musíme znovu potvrdit zlatý standard, abychom udrželi inflaci pod kontrolou a zabránili zahraničním vládám v zahlcení systému vykupováním dolarů za zlato." # todo: NEW TRANSLATION
  USA_cash_and_carry: "Cash and Carry" # todo: NEW TRANSLATION
  USA_cash_and_carry_desc: "§RCash and Carry§! - byla politika prezidenta Franklina Delana Roosevelta oznámená na společném zasedání Kongresu 21. září 1939 po vypuknutí války v Evropě. Nahradila zákon o neutralitě z roku 1937." # todo: NEW TRANSLATION
  USA_national_defence_research_committee: "Výbor pro výzkum národní obrany" # todo: NEW TRANSLATION
  USA_national_defence_research_committee_desc: "§RThe National Defense Research Committee (NDRC)§! - byl výbor Rady národní obrany Spojených států zřízený ke koordinaci, dohledu a provádění výzkumu problémů souvisejících s vývojem, výrobou a použitím mechanismů a zařízení ozbrojeného boje, a existoval od 27. června 1940 do 28. června 1941." # todo: NEW TRANSLATION
  USA_urban_electrification_act: "Zákon o městské elektrifikaci" # todo: NEW TRANSLATION
  USA_urban_electrification_act_desc: "§RThe Urban Electrification Act of 1936§!, přijatý 20. května 1936, poskytoval federální půjčky na instalaci elektrických distribučních systémů pro městské oblasti Spojených států." # todo: NEW TRANSLATION
  USA_extraction_of_rare_metals: "Těžba vzácných kovů" # todo: NEW TRANSLATION
  USA_extraction_of_rare_metals_desc: "Těžba vzácných kovů nám pomůže vyrábět nové zbraně, lodě a tanky, podpořit naši ekonomiku i rozvoj vědy." # todo: NEW TRANSLATION
  USA_farm_secutity_administartion: "Správa pro zemědělskou bezpečnost" # todo: NEW TRANSLATION
  USA_farm_secutity_administartion_desc: "§RThe Farm Security Administration (FSA)§! - byla agentura New Dealu založená v roce 1937 k boji proti chudobě na venkově během Velké hospodářské krize v USA. Nástupce Resettlement Administration (1935–1937)." # todo: NEW TRANSLATION
  USA_support_local_businnes: "Podporovat místní podniky" # todo: NEW TRANSLATION
  USA_support_local_businnes_desc: "Jak ukazuje zkušenost vyspělých zemí, malé a střední podniky hrají v ekonomice velmi důležitou roli; jejich rozvoj ovlivňuje hospodářský růst, urychlení vědecko-technického pokroku, zásobení trhu zbožím požadované kvality a vytváření nových pracovních míst." # todo: NEW TRANSLATION
  USA_naval_act_of_1938: "Námořní zákon z roku 1938" # todo: NEW TRANSLATION
  USA_naval_act_of_1938_desc: "§RNaval Act of 1938§! - zákon o stanovení složení námořnictva Spojených států, o autorizaci stavby určitých námořních plavidel a o dalších záležitostech." # todo: NEW TRANSLATION
  USA_keynesian_economist: "Keynesiánská ekonomie" # todo: NEW TRANSLATION
  USA_keynesian_economist_desc: "Během Velké hospodářské krize 30. let existující ekonomická teorie nedokázala vysvětlit příčiny těžkého celosvětového kolapsu ani nabídnout adekvátní hospodářskou politiku k nastartování výroby a zaměstnanosti." # todo: NEW TRANSLATION
  USA_cut_the_taxes: "Snížit daně" # todo: NEW TRANSLATION
  USA_cut_the_taxes_desc: "Prezident se pokusí přesvědčit Kongres, aby prosadil 100% daň z příjmů nad 25 000 $." # todo: NEW TRANSLATION
  focus_on_europe: "Zaměřit se na Evropu" # todo: NEW TRANSLATION
  focus_on_europe_desc: "Soustředěním se na Evropu budeme moci shromáždit většinu našich pozemních sil a námořnictva k operacím proti Itálii a Německu." # todo: NEW TRANSLATION
  USA_improve_our_building_plans: "Zákon o obnovení národního průmyslu" # todo: NEW TRANSLATION
  USA_improve_our_building_plans_desc: "§RNational Industry Recovery Act§! - zákon, formálně zamýšlený k oživení ekonomiky během Velké hospodářské krize, umožnil prezidentu Franklinu Rooseveltovi regulovat mzdy i ceny průmyslově vyráběného zboží." # todo: NEW TRANSLATION
