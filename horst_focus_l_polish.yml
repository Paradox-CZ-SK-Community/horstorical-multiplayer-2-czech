  RAJ_Reinvigorated_Imperial_Shipping: "Oživená imperiální doprava"
  RAJ_Expanding_the_Indian_Air_Force: "Rozšíření IAF"
  RAJ_Expanding_the_Indian_Air_Force_desc: "Indické letectvo v současnosti zvyšuje výcvik pilotů a výrobu letadel, aby vyčistilo vzduch nad subkontinentem."
  RAJ_Caste_Debuff_4: "Segregační kastovní systém"
  RAJ_Caste_Debuff_4_desc: "Gamer Moment"
  RAJ_Caste_Debuff_3: "Kastovní systém"
  RAJ_Caste_Debuff_3_desc: "Některé formy kastovních systémů existují od starověké Indie, ale časem se proměnily, aby lépe vyhovovaly současnému císaři Indie a Britský Ráj není výjimkou. Naopak, kastovní systém byl jasně definován a široce používán britskou administrativou. Prostupuje všechny aspekty indické společnosti, od omezení přístupu na univerzity až po přísně rozvrženou a omezující armádu. Někteří jej považují za nemorální zlo, jiní za logickou organizaci společnosti."
  RAJ_Caste_Debuff_3_mit: "Zmírněný kastovní systém"
  RAJ_Caste_Debuff_3_mit_desc: "Nejhorší excesy kastovního systému byly omezeny, přesto nerovnosti mezi komunitami a sociálními třídami stále přetrvávají."
  RAJ_Caste_Debuff_2: "Reformovaný kastovní systém"
  RAJ_Caste_Debuff_2_desc: "Rozmontování kastovního systému v takto tradicionalistické společnosti je těžký úkol, ale stálý pokrok směrem k vyrovnání nevyhnutelně povede k lepšímu cíli."
  RAJ_Caste_Debuff_1: "Právně zrušený kastovní systém"
  RAJ_Caste_Debuff_1_desc: "Přes veškerý odpor, všechny protesty jsme konečně dosáhli plné právní rovnosti a budeme ji vymáhat se všemi potřebnými prostředky."
  RAJ_Caste_Buff: "Úplně rozbitý kastovní systém"
  RAJ_Caste_Buff_desc: "Právní rovnost je fajn, ale kvůli stovkám let diskriminace jsou mnohá sousedství stále chudá a budou mít obtíže se z toho dostat. Proto je pozitivní diskriminace vůči těmto komunitám jedinou morální volbou."
  RAJ_Establishing_National_Government: "Právě sestavujeme ústavu a s ní, poprvé v historii, budujeme domácí demokratickou vládu přes celý subkontinent připravenou čelit jakýmkoli obtížím."
  RAJ_Establishing_National_Government: "Právě sestavujeme ústavu a s ní, poprvé v historii, budujeme domácí demokratickou vládu přes celý subkontinent připravenou čelit jakýmkoli obtížím."
