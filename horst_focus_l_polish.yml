  BUL_steel_exports2: "Makedonské tungstenové doly" # todo: NEW TRANSLATION
  ENG_bomber_harris_desc: "'Chcete, abych přiznal, že to, co jsme udělali v Hamburku, bylo hrozné? Správně. Bylo to hrozně strašné. Je vám teď líp? Když mi nenavrátíte lepší cíle, které by rychleji vyhrály válku, mlčte! Vraťte se ke svému svědomí a nechte mě dělat válku. Dobře?' - Harris v reakci na protestujícího reverenda" # todo: NEW TRANSLATION
  BUL_steel_exports2_desc: "S německými investicemi můžeme rozvíjet dlouho zanedbávané tungstenové doly na našem západě." # todo: NEW TRANSLATION
  BUL_war_games: "Tajné vojenské cvičení" # todo: NEW TRANSLATION
  efr_secret_weapons: "Tajné zbraně" # todo: NEW TRANSLATION
  ITA_modernized_artillery_at: "Modernizovaná protitanková děla" # todo: NEW TRANSLATION
  ITA_modernized_artillery_at_desc: "Naše protitankové zbraně jsou vážně zastaralé a potřebují zlepšení." # todo: NEW TRANSLATION
  SOV_great_purge_NEW: "Velká čistka" # todo: NEW TRANSLATION
  ENG_compass: "Operace Compass" # todo: NEW TRANSLATION
  ENG_operation_compass: "Operace Compass" # todo: NEW TRANSLATION
  ENG_compass_desc: "Spustit ofenzívu v severní Africe." # todo: NEW TRANSLATION
  SOV_great_purge_NEW_desc: "Mezi důstojníky se vaří nebezpečný trockistický spiknutí; i v nejvyšších řadách. Ačkoliv Trotského osobní zapojení zůstává nejasné, hrozba je velká. SSSR by mohl být vtažen do další občanské války... pokud nejsme připraveni rozbit některá vejce." # todo: NEW TRANSLATION
  EFR_torch_declared: "Torch byla vyhlášena" # todo: NEW TRANSLATION
  BUL_war_games_desc: "Proveďme válečné hry v utajení, abychom připravili naši armádu na budoucí konflikt." # todo: NEW TRANSLATION
  BUL_restore_the_bulgarian_army: "Obnovit bulharskou armádu" # todo: NEW TRANSLATION
