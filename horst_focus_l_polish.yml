  ROM_national_christian_party_ii: "Sláva Octavianovi!" # todo: NEW TRANSLATION
  ROM_national_christian_party_ii_desc: "PNC pod vedením Octaviana Gogy konečně uskuteční vůli rumunského venkova." # todo: NEW TRANSLATION
  CRO_italian_influence_focus_desc: "Máme těsnější vazby s Itálií než kdy dříve." # todo: NEW TRANSLATION
  CRO_recovery_teams: "Týmy pro obnovu" # todo: NEW TRANSLATION
  CRO_recovery_teams_desc: "Abychom dále snížili ztráty vybavení, musíme zorganizovat týmy, které na bojištích sbírají zbraně a vozidla." # todo: NEW TRANSLATION
  CRO_prospect_for_resources: "Průzkum zdrojů" # todo: NEW TRANSLATION
  CRO_prospect_for_resources_desc: "Naše půda skrývá suroviny, které budou užitečné v boji naší doby. Musíme je co nejdříve osvobodit a co nejlépe využít." # todo: NEW TRANSLATION
  CRO_industrial_planning: "Průmyslové plánování" # todo: NEW TRANSLATION
  CRO_industrial_planning_desc: "Abychom pokračovali v průmyslovém rozvoji, musíme vytvořit dlouhodobé strategie a hledat vhodné oblasti." # todo: NEW TRANSLATION
  CRO_secret_preparations: "Tajně zformovat ustašské milice" # todo: NEW TRANSLATION
  CRO_secret_preparations_desc: "Tajně kontaktujeme německého velvyslance a dáme najevo, že lid Chorvatska chce vystoupit z Jugoslávie. Doufáme, že nám Německo s tímto úsilím pomůže." # todo: NEW TRANSLATION
  FIN_petsamo: "Osvobodit Petsamo!" # todo: NEW TRANSLATION
