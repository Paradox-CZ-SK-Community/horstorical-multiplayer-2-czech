  GER_guns1_desc: "Naši výrobci zbraní prozkoumali možnost nového standardního zbraně pro vojáky. Tato nová zbraň by měla z každého rekruta udělat okamžitě kulometníka. S těmito novými samopaly, které používají náboje puškového ráže, získáme převahu nad nepřítelem." # todo: NEW TRANSLATION
