  ENG_rearmament_program_desc: "Program zbrojení Spojeného království začal v polovině 30. let 20. století jako reakce na rostoucí hrozbu nacistického Německa a dalších militaristických mocností" # todo: NEW TRANSLATION
  ENG_raw_materials_allocation_plan_desc: "Plány přesunu surovin Spojeného království během druhé světové války byly zásadní pro udržení válečného úsilí. Jak válka sílila, Británie čelila těžkým nedostatkům klíčových zdrojů jako ocel, pryž a ropa. Aby tomu čelila, vláda zavedla přísnou kontrolu a přídělový systém, upřednostňující vojenské potřeby před civilní spotřebou." # todo: NEW TRANSLATION
  ENG_national_defence_contribution_act_desc: "Zákon o příspěvku na národní obranu zavedla britská vláda v roce 1937 jako součást svých rearmamentových snah. Uvalil daň na podniky s vysokými zisky s cílem pomoci financovat vojenské rozšiřování země v očekávání možného konfliktu." # todo: NEW TRANSLATION
  ENG_battle_of_britain_desc: "Bitva o Británii (10. července – 31. října 1940) byla rozsáhlá letecká kampaň mezi RAF a německou Luftwaffe. Po pádu Francie se Hitler snažil donutit Británii k kapitulaci získáním nadvlády ve vzduchu v přípravě na invazi." # todo: NEW TRANSLATION
  ENG_expansion_of_steel_mills_desc: "Jak poptávka po oceli rostla pro výrobu zbraní, lodí a letadel, stávající hutě byly rozšiřovány a budovány nové závody. Vláda upřednostnila výrobu oceli a přidělovala zdroje a pracovní sílu, aby zajistila stálé zásobování." # todo: NEW TRANSLATION
  ENG_highlands_mining_act_desc: "Během druhé světové války došlo ve Skotských Vysočinách ke zvýšení těžební činnosti jako součást britského úsilí o zvýšení domácí produkce zdrojů. Region, známý ložisky olova, zinku a barytu, se stal strategičtějším s rostoucí válečnou poptávkou po těchto materiálech." # todo: NEW TRANSLATION
  ENG_expand_aluminum_trade_desc: "Obchod s hliníkem byl pro Spojené království během druhé světové války životně důležitý, protože hliník byl nezbytný pro výrobu letadel. Zpočátku Británie silně spoléhala na dovoz, zejména z Kanady, která se stala hlavním dodavatelem díky svým hojným zdrojům." # todo: NEW TRANSLATION
  ENG_synthetic_rubber_desc: "Vyvinout syntetickou pryž ke snížení závislosti na dovozech." # todo: NEW TRANSLATION
  ENG_colonial_defence_desc: "Koloniální obrana Spojeného království během druhé světové války zahrnovala ochranu britských území a kolonií po celém světě před mocnostmi Osy. To zahrnovalo obranu strategických míst jako Gibraltar, Suezský průplav a různé koloniální oblasti v Africe a Asii." # todo: NEW TRANSLATION
  ENG_african_campaign_desc: "Africká kampaň, známá především jako severoafrická kampaň (1940–1943), zahrnovala britské a dominiové síly bojující proti mocnostem Osy, zejména Německu a Itálii, o nadvládu v severní Africe. Klíčové bitvy zahrnovaly obléhání Tobruku, druhou bitvu u El Alameinu a operaci Torch." # todo: NEW TRANSLATION
  ENG_egypt_fortification_desc: "Zpevnění Egypta během druhé světové války bylo klíčové pro kontrolu Suezského průplavu, důležité námořní trasy. Spojené království se soustředilo na posílení obrany v Egyptě, aby ochránilo tento životně důležitý spoj mezi Středozemním a Rudým mořem. Hlavní práce zahrnovaly stavbu obranných pozic, bunkrů a protitankových překážek v klíčových místech jako Západní poušť a okolí Káhiry." # todo: NEW TRANSLATION
  ENG_asyut_fortification_desc: "Asjút, město ve středním Egyptě, bylo pro Spojené království během druhé světové války důležité díky strategické poloze. Sloužilo jako klíčový tranzitní bod pro zásoby a jednotky přesouvající se na frontu v Západní poušti a ke Suezskému průplavu." # todo: NEW TRANSLATION
  ENG_khartoum_fortification_desc: "Chartúm, hlavní město Súdánu, byl během druhé světové války strategicky důležitý pro Spojené království. Ležící u soutoku Modré a Bílé Nilu sloužil jako logistické a administrativní centrum pro britské operace v Severní Africe a na Středním východě." # todo: NEW TRANSLATION
  ENG_asian_campaign_desc: "Asijská kampaň Spojeného království během druhé světové války zahrnovala významné operace v jihovýchodní Asii a Tichomoří. Britské síly spolu s dominiovými a místními jednotkami se zapojily do klíčových bitev, jako byla obrana Malajsie a Singapuru proti japonské invazi, která skončila významnou porážkou spojenců. V Barmě bojovaly britské a indické jednotky za podpory čínských a amerických spojenců." # todo: NEW TRANSLATION
  ENG_singapore_strategy_desc: "Singapurská strategie, vyvinutá Brity ve 20. a 30. letech 20. století, se soustředila na obranu zájmů Britského impéria v Asijsko-pacifickém regionu. Centrem byla Singapur jako klíčová námořní základna a pevnost, určená k ochraně námořních tras a odstrašení japonské expanze. Strategie spoléhala na silné námořní obrany Singapuru a jeho roli jako hlavní základny britské flotily na Východě." # todo: NEW TRANSLATION
  ENG_hong_kong_gamble_desc: "Hongkong byl britskou kolonií a klíčovým strategickým místem během druhé světové války. V prosinci 1941, krátce po útoku na Pearl Harbor, spustily japonské síly invazi na Hongkong. Přes houževnatou obranu britských, kanadských, indických a místních čínských jednotek kolonie padla 25. prosince 1941." # todo: NEW TRANSLATION
  ENG_ceylon_strategy_desc: "Během druhé světové války byla Cejlon (dnešní Srí Lanka) strategickým bodem v Indickém oceánu, důležitým pro operace spojenců. Britové využívali Cejlon jako základnu pro námořní a letecké operace na ochranu námořních tras a zásobovacích linek, zejména těch spojujících Střední východ a Austrálii." # todo: NEW TRANSLATION
  ENG_general_rearmament_desc: "Britská vláda zahájila komplexní program modernizace a rozšíření svých ozbrojených sil jako reakci na rostoucí hrozbu nacistického Německa. Tento program zahrnoval zvýšení výroby zbraní, letadel a námořních plavidel a modernizaci existujícího vojenského vybavení." # todo: NEW TRANSLATION
  ENG_war_production_council_desc: "Tyto resorty dohlížely na vývoj a výrobu zbraní, vozidel a dalších nezbytných zásob a hrály klíčovou roli v udržení britského válečného úsilí. Navíc vznikla řada výrobních rad a výborů k řešení specifických potřeb a zefektivnění válečné produkce v různých sektorech." # todo: NEW TRANSLATION
  ENG_dig_for_victory_desc: "\"Zasaď pro vítězství\" byla britská válečná kampaň spuštěná v roce 1940, která povzbuzovala občany k pěstování vlastního jídla. Vláda propagovala pěstování zeleniny na soukromých i veřejných prostranstvích kvůli nedostatkům a hrozbě přerušení zásob." # todo: NEW TRANSLATION
  ENG_bevin_boys_desc: "Bevin Boys byli povoláni do britského uhelného průmyslu během druhé světové války, pojmenováni podle Ernesta Bevina, ministra práce, který schéma zavedl. Od roku 1943 do 1948 byli tisíce mladých mužů vybráni losem a přesměrováni z vojenské služby do práce v dolech." # todo: NEW TRANSLATION
  ENG_imperial_policy_desc: "Přezkoumat a upravit naše politiky vůči impériu." # todo: NEW TRANSLATION
  ENG_canadian_investments_desc: "Těmito investicemi se naše imperiální vazby s našimi koloniemi posílí." # todo: NEW TRANSLATION
  ENG_embezzle_canadian_funds_desc: "S válkou se blížící musíme financovat naše vojenské průmysly za každou cenu!" # todo: NEW TRANSLATION
  ENG_south_african_investments_desc: "Těmito investicemi se naše imperiální vazby s našimi koloniemi posílí." # todo: NEW TRANSLATION
  ENG_embezzle_south_african_funds_desc: "S válkou se blížící musíme financovat naše vojenské průmysly za každou cenu!" # todo: NEW TRANSLATION
  ENG_australian_investments_desc: "Těmito investicemi se naše imperiální vazby s našimi koloniemi posílí." # todo: NEW TRANSLATION
  ENG_embezzle_australian_funds_desc: "S válkou se blížící musíme financovat naše vojenské průmysly za každou cenu!" # todo: NEW TRANSLATION
  ENG_indian_investments_desc: "Těmito investicemi se naše imperiální vazby s našimi koloniemi posílí." # todo: NEW TRANSLATION
  ENG_embezzle_indian_funds_desc: "S válkou se blížící musíme financovat naše vojenské průmysly za každou cenu!" # todo: NEW TRANSLATION
  ENG_create_defence_requirements_committee_desc: "Výbor pro potřeby obrany (DRSC) byl britský válečný orgán zřízený k upřednostnění a koordinaci přidělování zdrojů a výroby pro vojenské potřeby během druhé světové války. Byl založen v roce 1940 jako součást širší struktury ministerstva zásob a odpovídal za posuzování a určování požadavků různých složek ozbrojených sil." # todo: NEW TRANSLATION
  ENG_create_bef_desc: "Britská expediční síla (BEF) byla vytvořena v roce 1939 jako hlavní britská vojenská síla vyslaná na pevninu Evropy na počátku druhé světové války. Jejím hlavním úkolem byla podpora Francie a Belgie proti německé agresi." # todo: NEW TRANSLATION
  ENG_lobby_for_funds_desc: "Během druhé světové války britská armáda lobbovala za zvýšení financí na podporu svého rozšíření a modernizace. To zahrnovalo žádosti o více finančních prostředků na vybavení a výcvik jednotek, vývoj nových zbraní a budování nezbytné infrastruktury. Požadavky armády byly poháněny potřebou reagovat na rostoucí hrozbu mocností Osy a udržet prodloužené vojenské operace." # todo: NEW TRANSLATION
  ENG_request_for_more_reserves_desc: "Před druhou světovou válkou čelila britská armáda problémům s rozšířením svých sil, aby čelila rostoucí hrozbě nacistického Německa a dalších potenciálních soupeřů. Armáda požadovala více záloh k posílení své síly a připravenosti. To zahrnovalo tlak na zvýšení počtu vycvičených rezervních osob, další nábor a rozšířené výcvikové programy." # todo: NEW TRANSLATION
  ENG_partial_funds_desc: "\"Postrčení armády\" odkazuje na situaci, kdy byla britská armáda v určitých obdobích upozaďována ve prospěch jiných složek nebo aspektů vojenské a národní strategie. Před druhou světovou válkou k tomu docházelo, když se politické a ekonomické zaměření přesouvalo směrem k politikám urovnávání a rozpočtovým omezením, což vedlo ke sníženému důrazu na rozšiřování nebo modernizaci armády." # todo: NEW TRANSLATION
  ENG_blank_cheque_for_raf_desc: "Na konci 30. let, když narůstalo napětí s nacistickým Německem, vláda věnovala RAF značné finanční a materiální prostředky, což jí umožnilo rychle rozšířit a modernizovat svůj letecký park. Toto rozhodnutí bylo motivováno vírou ve strategický význam letectva, zejména s ohledem na vzrůstající letecké hrozby." # todo: NEW TRANSLATION
  ENG_radar_research_desc: "Výzkum radaru v Británii během druhé světové války byl klíčový pro posílení protivzdušné obrany a bezpečnosti vojenských operací. Od 30. let vědci a inženýři, zejména v Telecommunications Research Establishment (TRE), vyvíjeli a zdokonalovali radarové technologie. Tento výzkum vedl k vytvoření systémů včasného varování, které byly zásadní pro detekci nepřátelských letadel a koordinaci obranných reakcí." # todo: NEW TRANSLATION
  ENG_british_commonwealth_air_training_plan1_desc: "Britský plán výcviku letectva Commonwealthu (BCATP), založený v roce 1939, byl rozsáhlou válečnou iniciativou pro výcvik posádek pro spojenecké síly. Plán byl spoluprací mezi Spojeným královstvím, Kanadou, Austrálií, Novým Zélandem a Jižní Afrikou. Zahrnoval zřízení výcvikových zařízení napříč těmito zeměmi, přičemž Kanada sloužila jako hlavní výcvikové centrum díky svému rozsahu a příznivým podmínkám." # todo: NEW TRANSLATION
  ENG_full_funding_desc: "Výraz „plně financovaná RAF“ odkazuje na významné finanční závazky britské vlády vůči Royal Air Force během druhé světové války. Vláda uznala rostoucí význam letectva, zejména s ohledem na hrozbu nacistického Německa, a přidělila značné prostředky k rozšíření a modernizaci RAF." # todo: NEW TRANSLATION
  ENG_demands_from_the_royal_navy_desc: "Před druhou světovou válkou si Royal Navy kladla několik požadavků, aby si udržela globální dominanci a čelila vznikajícím hrozbám. Tyto požadavky zahrnovaly zvýšení financí pro modernizaci a rozšíření plavidel, zejména výstavbu nových bitevních lodí, letadlových lodí a ponorek." # todo: NEW TRANSLATION
  ENG_two_power_standart_desc: "„Standard dvou mocností“ byla britská námořní politika přijatá na přelomu 19. a 20. století. Jejím cílem bylo udržet převahu Royal Navy nad kombinovanými flotami dvou nejsilnějších námořních mocností. Politika byla motivována potřebou chránit globální zájmy Britského impéria a zajistit námořní nadvládu." # todo: NEW TRANSLATION
  ENG_commission_for_more_ships_desc: "V letech před válkou dalo Royal Navy prioritu pověřování novými loděmi pro zvýšení námořní síly a připravenosti. To zahrnovalo dokončení stavby, vybavení a vyzbrojení válečných lodí, včetně bitevních lodí, letadlových lodí a torpédoborců. Cílem bylo zajistit, že flotila bude schopná čelit vznikající hrozbě a udržet námořní převahu." # todo: NEW TRANSLATION
  ENG_rule_the_waves_desc: "\"Rule the Waves\" odkazuje na strategický cíl udržet námořní převahu a dominanci nad ostatními národy. Pro Britské impérium to bylo zásadní vzhledem k závislosti na námořním obchodu a globální přítomnosti. Dosáhnout této dominance znamenalo budovat a udržovat mocné a technologicky vyspělé námořnictvo schopné projekce síly a ochrany britských zájmů po celém světě." # todo: NEW TRANSLATION
  ENG_gather_the_rearmament_plans_desc: "Neville Chamberlain, jako britský premiér v letech 1937–1940, se soustředil na zbrojení v reakci na rostoucí hrozby nacistického Německa. Jeho vláda shromáždila a koordinovala plány zbrojení, upřednostňující rozšíření a modernizaci britských ozbrojených sil. To zahrnovalo zvýšení výdajů na obranu a posílení armády a námořnictva." # todo: NEW TRANSLATION
  ENG_army_demands_desc: "Armáda žádá financování na modernizaci." # todo: NEW TRANSLATION
  ENG_establish_royal_tank_regiment_desc: "Royal Tank Regiment (RTR) je jedním z nejstarších a nejuznávanějších obrněných pluků v britské armádě, jehož kořeny sahají do roku 1916 během první světové války. Byl založen k obsluze tanků, nové technologie té doby, a sehrál klíčovou roli ve vývoji a evoluci tankového boje." # todo: NEW TRANSLATION
  ENG_expansion_of_tank_regiment_desc: "S postupem války RTR zaznamenal zvýšený nábor a vznik dalších tankových praporů. Toto rozšíření zahrnovalo pořízení nových typů tanků, jako byly Matilda, Sherman a Churchill, a rozvoj nových taktik a výcvikových programů. Růst pluku byl zásadní pro podporu hlavních kampaní." # todo: NEW TRANSLATION
  ENG_universal_tanks_desc: "Prvním britským hlavním bojovým tankem byl Churchill, vyvinutý během druhé světové války. Představený v roce 1941, byl navržen tak, aby poskytoval těžké pancéřování a palebnou sílu pro různé bojové role. Churchill měl silné pancéřování, výkonný 75mm kanón a pro svou dobu dobrou mobilitu, což ho činilo účinným v ofenzivních i defenzivních operacích." # todo: NEW TRANSLATION
  ENG_special_air_service1_desc: "Special Air Service (SAS) je renomovaný speciální pluk britské armády, založený v roce 1941 Davidem Stirlingem během druhé světové války. Původně určen pro vzdušné průzkumy a nájezdy za nepřátelské linie, SAS proslul svými odvážnými operacemi v Severní Africe, včetně nájezdů na německá letiště a zásobovací linky." # todo: NEW TRANSLATION
  ENG_long_range_desert_group_desc: "Long Range Desert Group (LRDG) byl britský speciální útvar vytvořený v roce 1940, specializovaný na průzkum a nájezdy v severní Africe během druhé světové války. Založený majorou Ralphem Bagnoldem, LRDG byl známý svou odborností v orientaci v poušti a používáním upravených vozidel pro dlouhodobé mise." # todo: NEW TRANSLATION
  ENG_commandos_desc: "Britští commandos byli elitní vojenské jednotky vytvořené během druhé světové války pro provádění specializovaných operací, včetně nájezdů, průzkumu a přímých útoků za nepřátelskými liniemi. Založeni v roce 1940 pod vedením viceadmirála Louise Mountbattena, byli tyto jednotky určeny k vedení nekonvenční války a amfibiálních útoků." # todo: NEW TRANSLATION
  ENG_full_funding_for_the_army_desc: "S plným financováním armády nyní můžeme hovořit o širších plánech pro dlouhodobou válku proti fašistům!" # todo: NEW TRANSLATION
  ENG_raf_demand_desc: "V plánech zbrojení před druhou světovou válkou kladla Royal Air Force důraz na potřebu významných investic k rozšíření a modernizaci svých schopností. RAF požadovala zvýšené financování na pořízení nových a pokročilých letadel, nahrazení zastaralých modelů a zlepšení technologií jako radar a komunikační systémy." # todo: NEW TRANSLATION
  ENG_air_ministry_specifications_desc: "Specifikace Air Ministry byly podrobné požadavky stanovené britským Air Ministry pro návrh a výrobu letadel. Tyto specifikace určovaly nutné výkonnostní, operační a technické standardy, které musela letadla splňovat." # todo: NEW TRANSLATION
  ENG_defence_scheme_desc: "Obranný plán Air Ministry během druhé světové války zahrnoval komplexní strategii k ochraně Spojeného království před leteckými útoky a zajištění vzdušné převahy." # todo: NEW TRANSLATION
  ENG_more_specifications_desc: "Air Ministry mělo během války stále více požadavků, aby drželo krok s technologickým závodem ve vzduchu." # todo: NEW TRANSLATION
  ENG_bomber_development_program_desc: "Plán rozvoje bombardérů byl strategickou iniciativou britské vlády ke zlepšení a rozšíření bombardovacího letectva během druhé světové války. Plán se soustředil na vývoj a výrobu řady pokročilých bombardérů, aby vyhověl rostoucím požadavkům letecké války." # todo: NEW TRANSLATION
  ENG_air_production_and_supply_program_desc: "Program výroby a zásobování letectva byl komplexním úsilím během druhé světové války k uspokojení rostoucí poptávky po letadlech a souvisejícím vybavení. Převážně ho řídilo Air Ministry ve spolupráci s průmyslem." # todo: NEW TRANSLATION
  ENG_air_staff_reports_desc: "Naše letecké štáby nám poskytují cenné analýzy o tom, jak udržet tuto leteckou válku co nejefektivněji!" # todo: NEW TRANSLATION
  ENG_full_plans_achieved_desc: "S takovou podporou jistě dokážeme sestřelit fašisty z nebe!" # todo: NEW TRANSLATION
  ENG_navy_demands_desc: "Royal Navy potřebuje nové lodě k vládnutí vlnám." # todo: NEW TRANSLATION
  ENG_battleship_programs_desc: "Investovat do kapitálních lodí." # todo: NEW TRANSLATION
  ENG_carrier_programs_desc: "Investovat do letadlových lodí." # todo: NEW TRANSLATION
  ENG_submarine_projects_desc: "Projekty ponorek během druhé světové války se zaměřovaly na zlepšení návrhu, výroby a schopností ponorek pro efektivní zásahy do nepřátelské dopravy a podporu námořních operací." # todo: NEW TRANSLATION
  ENG_cruiser_programs_desc: "Stavět více křižníků pro ochranu obchodu." # todo: NEW TRANSLATION
  ENG_destroyer_programs_desc: "Stavět torpédoborce pro boj proti ponorkám." # todo: NEW TRANSLATION
  ENG_two_standarts_achieved_desc: "Zajistit, aby naše námořnictvo bylo větší než příští dvě největší společně." # todo: NEW TRANSLATION
