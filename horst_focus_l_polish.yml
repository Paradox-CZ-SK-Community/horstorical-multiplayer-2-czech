  fourth_shore_tt: "§GVšechna Libye se stane naším jádrovým územím§!" # todo: NEW TRANSLATION
  ITA_fourth_shore: "Čtvrté pobřeží" # todo: NEW TRANSLATION
  ITA_sword: "Meč islámu" # todo: NEW TRANSLATION
  ITA_sword_desc: "Jako dědic osmanské autority v Libyi můžeme spravedlivě tvrdit, že jsme ochránci islámu." # todo: NEW TRANSLATION
  ITA_fourth_shore_desc: "Italští muslimové jsou čtvrtým pobřežím Itálie - nedílnou součástí italského národa. Budováním koránských škol, obnovou mešit a budováním škol islámské kultury můžeme integrovat Libyi do Itálie. Zaručíme mír, spravedlnost, blahobyt a respekt k zákonům Proroka." # todo: NEW TRANSLATION
  MAN_found_the_northeast_transport_committeex_desc: "Pokud se máme stát ekonomickou mocností Asie, musíme se osvobodit od vlivu japonských zaibutsu a Jižní mandžuské železnice. Vytvořením mandžuských železnic vlastněných a provozovaných Mandžusky můžeme řídit rozvoj tak, aby nejprve prospíval Mandžukuovi." # todo: NEW TRANSLATION
  MAN_five_year_plan_new_desc: "Rychlá industrializace Sovětského svazu je důkazem, že k rozvoji naší ekonomiky nepotřebujeme kapitalismus - můžeme to udělat čistou vůlí a odhodláním. Císař Puyiův plán učiní Mandžukuo průmyslovou mocností." # todo: NEW TRANSLATION
  MAN_railways_opener_desc: "Systematické rozšíření a rozvoj Jižní mandžuské železnice je naší vstupenkou k silné ekonomice." # todo: NEW TRANSLATION
  MAN_anshan_steelworks_desc: "Založení ocelárny umožní rozvoj zbytku našeho těžkého průmyslu" # todo: NEW TRANSLATION
  MAN_railways_extend_to_port_arthur_desc: "Měli bychom rozšířit železnici do Dalianu, aby se zlepšil obchod s Japonskem" # todo: NEW TRANSLATION
  MAN_railways_expand_to_east_hebei_desc: "Měli bychom rozšířit železnici do Východního Hebei (autonomní správy) pro zlepšení obchodu s Japonskem" # todo: NEW TRANSLATION
  MAN_railways_extend_to_pyongyang_desc: "Měli bychom rozšířit železniční síť do Koreje, aby se zlepšil obchod s Japonskem" # todo: NEW TRANSLATION
  MAN_railways_japanese_imports_desc: "Jako součást japonského rozvojového programu máme snadný přístup k japonskému průmyslovému zboží." # todo: NEW TRANSLATION
  SOV_shbb_tt: "\nPřidá téměř dokončenou supertěžkou bitevní loď třídy Sovyetsky Soyuz do výroby.\n\n" # todo: NEW TRANSLATION
  SOV_expand_red_fleet2: "Vyzvat Kriegsmarine" # todo: NEW TRANSLATION
  SOV_expand_red_fleet2_desc: "Program námořní přezbrojení Kriegsmarine rychle vytvořil hrozbu na našich baltských pobřežích. Musíme postavit nové vlajkové lodě, abychom vyzvali Německo o kontrolu Dánských úžin a zabezpečili naše moře proti fašistické nadvládě." # todo: NEW TRANSLATION
