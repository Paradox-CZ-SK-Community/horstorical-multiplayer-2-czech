  ilp_srl_uprising: "§YLanka Sama Samaja Party§! povstane proti koloniální vládě Cejlonu a odolá hněvu §Ybritského imperialismu§!"
  ilp_nep_uprising: "§YKomunistická strana Nepálu§! svrhne dynastii Rana a nastolí §YSocialismus§!."
  RAJ_eastern_forts: "Postaví §Y2 pozemní pevnosti§! podél snadno bránitelných východních pozic v Barma."
  raj_push_even_further: "Posunout se ještě dál"
  raj_push_even_further_desc: "Občanská práva nikdy nemohou jít příliš daleko, musíme zajistit, aby každá křivda spáchaná Indií v minulosti byla napravena, aby naše společnost mohla klidně spát."
