  wtt_news.44.t: "Pchu-i si nárokuje Mandát nebes" # todo: NEW TRANSLATION
  wtt_news.44.desc: "Oblečen v bohatě zdobené roucho hodné čínského císaře, Aisin Gioro Pchu-i, Syn nebes, Vládce desetitisíciletí, císař Velké dynastie Qing, usedl na dračí trůn v neobvyklém druhém korunovačním ceremoniálu a nyní sídlí v Zakázaném městě, jak to dělali jeho předkové. Vzal si zpět své předchozí regální jméno a opět je prohlášen císařem Xuantongem. Odkazujíc na staré zvyky, císař Xuantong tvrdí, že vítězství jeho sil v čínské občanské válce dokazuje, že má mandát od nebes k vládnutí Číně.\n\nZda má v úmyslu rozšířit svou vládu až do „Vše pod nebem“, jak tvrdili předchozí císaři, zůstává nejasné." # todo: NEW TRANSLATION
