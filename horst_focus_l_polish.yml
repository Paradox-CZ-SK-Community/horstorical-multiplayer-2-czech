  RAJ_Reinforce_the_Government_of_India_Act: "Prosadit Government of India Act" # todo: NEW TRANSLATION
  RAJ_Reinforce_the_Government_of_India_Act_desc: "Government of India Act z roku 1935 byl milníkem v strukturálním obnovení Ráje a my ho budeme takto prosazovat." # todo: NEW TRANSLATION
  RAJ_Linlithgows_Reign: "Linlithgowská vláda" # todo: NEW TRANSLATION
  RAJ_Linlithgows_Reign_desc: "Úřad indického guvernéra-generála byl pět let obsazen lordem Willingdonem a britská správa se rozhodla jmenovat lorda Linlithgowa a poslat Willingdona do důchodu. Opoziční strany Ráje to považují za stagnaci a čím dál více odmítají spolupráci. Pokud v tom budeme pokračovat příliš dlouho, indický lid může přistoupit k násilí. Zahrávání si s opozičními stranami může dát nám určitou převahu." # todo: NEW TRANSLATION
  RAJ_Provincial_Elections: "Provincální volby" # todo: NEW TRANSLATION
  RAJ_Provincial_Elections_desc: "S nástupem prvních indických všeobecných voleb stojí před všemi zúčastněnými stranami mnoho měsíců tvrdého volebního boje." # todo: NEW TRANSLATION
  RAJ_Independent_Labour_Party: "Nezávislá labouristická strana" # todo: NEW TRANSLATION
  RAJ_Independent_Labour_Party_desc: "Naší prioritou číslo jedna musí být přinést Indii spravedlnost a zničit kastovní systém." # todo: NEW TRANSLATION
  RAJ_Indian_National_Congress: "Indický národní kongres" # todo: NEW TRANSLATION
  RAJ_Indian_National_Congress_desc: "Musíme se sjednotit, abychom se osvobodili od britské nadvlády." # todo: NEW TRANSLATION
  RAJ_Unionist_Party: "Unionistická strana" # todo: NEW TRANSLATION
  RAJ_Unionist_Party_desc: "Jen s pečlivými a promyšlenými politickými akcemi můžeme udržet Indii stabilní." # todo: NEW TRANSLATION
  RAJ_Prepare_the_Lucknow_Session: "Připravit zasedání v Lucknow" # todo: NEW TRANSLATION
  RAJ_Prepare_the_Lucknow_Session_desc: "Musíme svolat všechny členy Kongresu, abychom prodiskutovali výzvy, které před námi stojí." # todo: NEW TRANSLATION
  RAJ_Secure_Rural_Hindus: "Zajistit venkovské Hindy" # todo: NEW TRANSLATION
  RAJ_Secure_Rural_Hindus_desc: "Venkovští Hindové jsou od počátku klíčovými stoupenci Kongresu." # todo: NEW TRANSLATION
  RAJ_Broaden_our_Coalition: "Rozšířit naši koalici" # todo: NEW TRANSLATION
  RAJ_Broaden_our_Coalition_desc: "Pouze přivedením nových tváří do Kongresu můžeme zajistit vítězství." # todo: NEW TRANSLATION
  RAJ_Nehrus_Campaign: "Nehruova kampaň" # todo: NEW TRANSLATION
  RAJ_Nehrus_Campaign_desc: "Musíme shromáždit prostředky na podporu Nehruovy operace." # todo: NEW TRANSLATION
  RAJ_An_Offer_for_Rajagopalachari: "Nabídka pro Manohara" # todo: NEW TRANSLATION
  RAJ_An_Offer_for_Rajagopalachari_desc: "Jistě můžeme získat podporu, pokud mu nabídneme pozici v kabinetu, až volby skončí." # todo: NEW TRANSLATION
  RAJ_Azads_Support: "Raismanova podpora" # todo: NEW TRANSLATION
  RAJ_Azads_Support_desc: "Ačkoliv je Raisman loajalista k Ráji a věrně mu sloužil, jistě by neměl problém sloužit nezávislé Indii a přinést své schopnosti do nové subkontinentální správy." # todo: NEW TRANSLATION
  RAJ_Nehrus_Candidacy: "Nehruova kandidatura" # todo: NEW TRANSLATION
  RAJ_Nehrus_Candidacy_desc: "Široce oblíbený Jawaharlal Nehru bude muset vést Indický národní kongres, chceme‑li spatřit vítězné tváře." # todo: NEW TRANSLATION
  RAJ_New_Leadership: "Odsát z CSP" # todo: NEW TRANSLATION
  RAJ_New_Leadership_desc: "Kongresová socialistická strana je považována za 'radikální' křídlo Indického národního kongresu, obsahující mnoho socialistů, kteří se zdají stát na straně oportunismu a připojili se ke straně tvořené drobnou buržoazií našich zemí. Zesílením naší rétoriky vůči nim rozhodně přesvědčíme mnoho jejich členů, aby se postavili na stranu spravedlnosti." # todo: NEW TRANSLATION
  RAJ_Appeal_to_the_Lower_Castes: "Oslovit nižší kasty" # todo: NEW TRANSLATION
  RAJ_Appeal_to_the_Lower_Castes_desc: "Ačkoliv jsou volební práva pro nižší kasty omezená, je stále klíčové získat většinu jejich hlasů." # todo: NEW TRANSLATION
  RAJ_Subvert_Stalinist_Influence: "Oslovit dělníky" # todo: NEW TRANSLATION
  RAJ_Subvert_Stalinist_Influence_desc: "Naším hlavním cílem voleb je rozložit kastovní systém, ale samozřejmě to není jediný utlačovatelský systém v hinduistické společnosti. Vztah proletariátu a buržoazie, zaměstnavatele a zaměstnance, je hluboce vykořisťovatelský a musí být zrušen." # todo: NEW TRANSLATION
  RAJ_Pillais_Influence: "Vl iv Pillai" # todo: NEW TRANSLATION
  RAJ_Pillais_Influence_desc: "P. Krishna Pillai je cenným členem Komunistické strany Indie a s jeho vhledy přijde lepší strategie do budoucna." # todo: NEW TRANSLATION
  RAJ_Danges_Influence: "Dangesův vliv" # todo: NEW TRANSLATION
  RAJ_Danges_Influence_desc: "Shripad Amrit Dange, spoluzakladatel Komunistické strany Indie, má zkušenosti, které má jen málokdo, a může být pro náš cíl zásadní." # todo: NEW TRANSLATION
  RAJ_Local_Organization: "Spolupráce s IIM" # todo: NEW TRANSLATION
  RAJ_Local_Organization_desc: "Všechny poctivé indické strany pracují na nevyhnutelném cíli indické nezávislosti a bylo by hloupé zapomenout na britskou exploataci Indů. Jako sjednocený blok může Indie dosáhnout samosprávy mnohem rychleji." # todo: NEW TRANSLATION
  RAJ_Centralize_the_Party: "Revoluční duch" # todo: NEW TRANSLATION
  RAJ_Centralize_the_Party_desc: "Pokud dáme drobným buržoazním stranám indického subkontinentu legitimitu rovnoprávného spojence v boji proti nespravedlnosti a neponeseme dál náš revoluční marxistický duch, škodíme našemu konečnému cíli — socialistické společnosti osvobozené od vykořisťování." # todo: NEW TRANSLATION
  RAJ_Organize_a_Conference: "Bombajská konference" # todo: NEW TRANSLATION
  RAJ_Organize_a_Conference_desc: "Existuje mnoho indických levicových organizací, ale nikdy neměly šanci spolupracovat na jednom tématu — náš úspěch však sjednotí cíle všech v Indii, kteří touží po rovnosti." # todo: NEW TRANSLATION
  RAJ_A_Society_of_All_Classes: "Indie neoddělitelná" # todo: NEW TRANSLATION
  RAJ_A_Society_of_All_Classes_desc: "Indie, jakožto rozmanitý subkontinent, nemůže být řízena těmi, kdo zastupují pouze hinduisty, muslimy nebo dokonce jen vyšší třídu. Musí být kolektivně řízena koalicí všech kultur, jazyků, etnik a kast." # todo: NEW TRANSLATION
  RAJ_Democracy_and_Socialism: "Vítězná demokracie" # todo: NEW TRANSLATION
  RAJ_Democracy_and_Socialism_desc: "Zakládající vize sjednocené Indie může být naplněna jen vícestranným federálním politickým systémem, který klade důraz na svobodu." # todo: NEW TRANSLATION
  RAJ_Assemble_the_Constitutional_Assembly: "Svolat ústavodárné shromáždění" # todo: NEW TRANSLATION
  RAJ_Assemble_the_Constitutional_Assembly_desc: "S britským Rájem konečně minulostí máme příležitost a povinnost vybudovat nový indický stát." # todo: NEW TRANSLATION
  RAJ_Strengthen_Liberal_Elements: "Posílit liberální prvky" # todo: NEW TRANSLATION
  RAJ_Strengthen_Liberal_Elements_desc: "Ačkoliv Indický národní kongres a jeho socialistické sklony přispěly k Indii na cestě k nezávislosti, jejich ekonomické politiky jsou pro národ zotavující se ze sta let kolonialismu neudržitelné." # todo: NEW TRANSLATION
  RAJ_Nehrus_Vision_for_India: "Nehruova vize Indie" # todo: NEW TRANSLATION
  RAJ_Nehrus_Vision_for_India_desc: "Jawaharlal Nehru a jeho stoupenci v Indickém národním kongresu bojovali dlouho proti britské nadvládě a vyšli vítězně. Nyní na něm přirozeně spočine vedení Indie v postkoloniálním světě." # todo: NEW TRANSLATION
  RAJ_Cut_down_on_Tariffs: "Snížit cla" # todo: NEW TRANSLATION
  RAJ_Cut_down_on_Tariffs_desc: "Indická ekonomika byla dlouho udržována agrární britským pánem, proto jsme byli většinou vyloučeni z globálního trhu, kromě vývozu juta a čaje. Nyní se znovu reintegrovat do globální ekonomiky tím, že zjednodušíme obchod s Indií." # todo: NEW TRANSLATION
  RAJ_Relieve_the_Administrative_Burden: "Ulehčit administrativní břemeno" # todo: NEW TRANSLATION
  RAJ_Relieve_the_Administrative_Burden_desc: "Díky jednáním Britů s místními knížaty a jejich obecné strategii 'rozděl a panuj' se struktura Britského Ráje extrémně zkomplikovala. Přeorganizovanou administrativou budeme lépe připraveni vykročit do budoucnosti." # todo: NEW TRANSLATION
  RAJ_Thorough_Corruption_Audits: "Důkladné audity korupce" # todo: NEW TRANSLATION
  RAJ_Thorough_Corruption_Audits_desc: "Korupce byla také velmi rozšířena za britské vlády v Indii. Mnozí byrokraté často vytvářeli umělé překážky pro podnikání, aby se obohatili. Prohrabeme se záznamy a najdeme nejhorší viníky." # todo: NEW TRANSLATION
  RAJ_Reconect_broken_up_Industries: "Znovu propojit rozdělené průmysly" # todo: NEW TRANSLATION
  RAJ_Reconect_broken_up_Industries_desc: "Rozdělení Indie opravdu nebylo příjemné a mezi pákistánským a indickým obyvatelstvem stále panuje zášť. To nás však nemůže zastavit v úsilí o zlepšení osudu obou národů. Mnohé dodavatelské řetězce byly přerušené, když hranice byla tak bezstarostně vytyčena. Usnadnění obchodu napříč hranicí by mohlo zmírnit utrpení průmyslů zničených partition." # todo: NEW TRANSLATION
  RAJ_Loosen_Rupee_Exchange: "Uvolnit kurz rupií" # todo: NEW TRANSLATION
  RAJ_Loosen_Rupee_Exchange_desc: "Indická rupie je nyní pevně vázána na britskou libru, což je faktor finanční stability, ale těžce omezuje schopnost indické vlády si půjčovat cizí peníze, které zoufale potřebujeme, protože máme značný obchodní deficit. Předáním kontroly trhu nad rupií vykročíme k liberalizaci a novým výšinám prosperity." # todo: NEW TRANSLATION
  RAJ_Reproachment_with_the_West: "Přiblížení k Západu" # todo: NEW TRANSLATION
  RAJ_Reproachment_with_the_West_desc: "Naše minulé vztahy s Evropou nebyly příliš příjemné, ale fakt zůstává, že ekonomické výhody spolupráce převažují nad zbývajícími záštěmi v naší současné vládě." # todo: NEW TRANSLATION
  RAJ_Extensive_Agricultural_Subsidies: "Rozsáhlé zemědělské dotace" # todo: NEW TRANSLATION
  RAJ_Extensive_Agricultural_Subsidies_desc: "Obyčejný rolník je páteří Indie a i když je naším cílem přejít k průmyslové ekonomice, zemědělské pracovníky budeme nadále podporovat v jejich hospodářských aktivitách." # todo: NEW TRANSLATION
  RAJ_Ties_Across_Asia: "Vztahy napříč Asií" # todo: NEW TRANSLATION
  RAJ_Ties_Across_Asia_desc: "Společný zážitek evropského kolonialismu je sdílen většinou asijských národů. Tato společná zkušenost nám poslouží k prohloubení vojenské, ekonomické a politické spolupráce." # todo: NEW TRANSLATION
  RAJ_Indo_Soviet_Friendship_Treaty: "Indo-[SOV.GetAdjective] smlouva o přátelství" # todo: NEW TRANSLATION
  RAJ_Indo_Soviet_Friendship_Treaty_desc: "[RAJ_Indo_Soviet_Treaty_Pakistan]Přátelské vztahy s [SOV.GetNameDef] budou značně prospěšné nejen pro mezinárodní postavení, ale i pro užší ekonomická pouta s jednou z největších ekonomik na světě." # todo: NEW TRANSLATION
  RAJ_Want_Peace_Prepare_for_War: "Kdo chce mír, připravuje se na válku" # todo: NEW TRANSLATION
  RAJ_Want_Peace_Prepare_for_War_desc: "Svět se stává čím dál násilnějším, a pokud chceme zajistit mír a prosperitu našeho národa, musíme být připraveni jej bránit. To znamená posílit armádu, budovat aliance s dalšími zeměmi a bdít proti hrozbám naší bezpečnosti. Pouze přípravou na válku můžeme doufat v mír." # todo: NEW TRANSLATION
  RAJ_war_preparation: "Příprava na válku" # todo: NEW TRANSLATION
  RAJ_Foster_Mining_Jobs: "Podporovat pracovní místa v těžbě" # todo: NEW TRANSLATION
  RAJ_Foster_Mining_Jobs_desc: "Abychom přinesli rozvoj do venkovských společenství Indie, podpoříme několik těžebních odvětví po celém venkově, abychom přinesli prosperitu tam, kde jí dlouho chybělo." # todo: NEW TRANSLATION
  RAJ_Indo_Soviet_Friendship_Treaty_pakistan: "S ohledem na stále méně jisté vyrovnání Pákistánu musíme být připraveni zajistit mezinárodní podporu, která posílí naši pozici na subkontinentu." # todo: NEW TRANSLATION
  RAJ_Federalize_Education: "Federalizovat vzdělávání" # todo: NEW TRANSLATION
  RAJ_Federalize_Education_desc: "Zavedením společného učebního plánu pro všechny indické školy zajistíme, že každý Ind bez ohledu na etnicitu, náboženství či jazyk bude sdílet společné porozumění světu." # todo: NEW TRANSLATION
  RAJ_Reform_the_Rupee: "Reformovat rupii" # todo: NEW TRANSLATION
  RAJ_Reform_the_Rupee_desc: "Bojovali jsme jedno století za nezávislost od Británie, přesto je indická rupie stále přímo vázána na britskou libru. Místo toho kurz připoutáme k vznikajícím globálním měnám jako jen, dolar a rubl." # todo: NEW TRANSLATION
  RAJ_Constitutional_Minority_Protections: "Ústavní ochrana menšin" # todo: NEW TRANSLATION
  RAJ_Constitutional_Minority_Protections_desc: "Indie, pravděpodobně nejrozmanitější a nejživější subkontinent, je zemí, kde má každý region významné jazykové, náboženské a etnické menšiny. Zajištění jejich bezpečí a prosperity zabezpečí prosperitu celé Indie." # todo: NEW TRANSLATION
  RAJ_Crackdown_on_Radicalism: "Ztihnout radikalismus" # todo: NEW TRANSLATION
  RAJ_Crackdown_on_Radicalism_desc: "Boj skončil, Indie je nezávislá. Někteří si to možná ještě neuvědomili, protože pořád existují desítky revolučních organizací s miliony následovníků. Vrátíme tyto lidi zpět do našeho společného demokratického fóra a společně vybudujeme budoucnost." # todo: NEW TRANSLATION
  RAJ_India_United_under_Britain: "Indie sjednocená pod Británií" # todo: NEW TRANSLATION
  RAJ_India_United_under_Britain_desc: "Jsme v opozici vůči jiným politickým stranám, které usilují o nejradikálnější a utopické společnosti; my zvolíme vyváženou a klidnou strategii k posunu Indie vpřed." # todo: NEW TRANSLATION
  RAJ_Ally_with_the_Muslim_League: "Spojit se s Muslimskou ligou" # todo: NEW TRANSLATION
  RAJ_Ally_with_the_Muslim_League_desc: "Slibem samostatného Pákistánu si můžeme získat podporu AIML a společně bojovat proti socialistům." # todo: NEW TRANSLATION
  RAJ_Fight_the_Muslim_League: "Bojovat proti Muslimské lize" # todo: NEW TRANSLATION
  RAJ_Fight_the_Muslim_League_desc: "Myšlenka Muslimské ligy na samostatný muslimský stát musí být vymazána z myslí lidí." # todo: NEW TRANSLATION
  RAJ_Siphon_Congress_Ministers: "Odsát podporu Kongresu" # todo: NEW TRANSLATION
  RAJ_Siphon_Congress_Ministers_desc: "V Kongresu je mnoho těch, kdo cítí, že socialistické politiky jdou příliš daleko, a možná jejich loajalitu změníme jen malou kampaní." # todo: NEW TRANSLATION
  RAJ_Appeal_to_Anglo_Indians: "Oslovit anglo-Indy" # todo: NEW TRANSLATION
  RAJ_Appeal_to_Anglo_Indians_desc: "Anglo-indiáni na subkontinentu byli dlouho zanedbávanou menšinou jak indickými, tak britskými politiky; můžeme toho využít k získání jejich hlasů." # todo: NEW TRANSLATION
  RAJ_Content_for_British_Rule: "Spokojenost s britskou vládou" # todo: NEW TRANSLATION
  RAJ_Content_for_British_Rule_desc: "Stabilní Indii nelze budovat s radikálním vedením, které by mohlo být nepředvídatelné a zničilo by jádro Indie." # todo: NEW TRANSLATION
  RAJ_Establish_a_Precense_in_Sindh: "Založit přítomnost v Sindhu" # todo: NEW TRANSLATION
  RAJ_Establish_a_Precense_in_Sindh_desc: "Jih od zakládající provincie naší velké strany leží zanedbaná, etnicky různorodá provincie, které bychom měli věnovat více pozornosti." # todo: NEW TRANSLATION
  RAJ_National_Unity: "Národní jednota" # todo: NEW TRANSLATION
  RAJ_National_Unity_desc: "Musíme sjednotit všechny v naší zemi — hinduisty, sikhy, buddhisty i muslimy. Teprve pak může být mír." # todo: NEW TRANSLATION
  RAJ_Appeal_to_the_Peasentry: "Oslovit rolnictvo" # todo: NEW TRANSLATION
  RAJ_Appeal_to_the_Peasentry_desc: "Rolnictvo je nejdůležitější částí Indie a kdo je ignoruje, prohraje volby." # todo: NEW TRANSLATION
  RAJ_Implement_Equal_Education: "Zavést rovné vzdělávání" # todo: NEW TRANSLATION
  RAJ_Implement_Equal_Education_desc: "Ve všech třídně rozdělených společnostech je kvalitní vzdělání rezervováno pro vyšší třídy; Indie má zvlášť špatný vzdělávací systém pro nižší vrstvy. Naším úkolem je konečně vyrovnat vzdělání, aby se nadané mozky ze všech vrstev společnosti mohly prosadit." # todo: NEW TRANSLATION
  RAJ_Dismantle_the_Judicial_System: "Rozmontovat soudní systém" # todo: NEW TRANSLATION
  RAJ_Dismantle_the_Judicial_System_desc: "Hinduistický soudní systém je komplikovaný, chaotický a preferuje vyšší třídu, zanedbává většinu. Spravedlnost pro Indii lze dosáhnout pouze tehdy, budou-li naše soudy sdílet vizi naší revoluční společnosti." # todo: NEW TRANSLATION
  RAJ_Abolish_the_Reservation_System: "Zrušit systém rezervací" # todo: NEW TRANSLATION
  RAJ_Abolish_the_Reservation_System_desc: "Vyšší kasty často dostávají přednost při náborech do veřejného sektoru. Někdy jsou určité pozice dokonce otevřené jen pro ně. To vedlo k poklesu efektivity byrokracie." # todo: NEW TRANSLATION
  RAJ_Seize_Influence_from_Upper_Castes: "Odebrat vliv vyšším kastám" # todo: NEW TRANSLATION
  RAJ_Seize_Influence_from_Upper_Castes_desc: "Vyšší třída držela moc železnou rukou i za britské vlády. Toto nemůže přetrvat v socialistické společnosti osvobozené od vykořisťování. Násilně jim odebereme vliv ve prospěch široké většiny." # todo: NEW TRANSLATION
  RAJ_Expand_Healthcare_Facilities: "Rozšíření univerzit" # todo: NEW TRANSLATION
  RAJ_Expand_Healthcare_Facilities_desc: "Po reformě primárního a sekundárního vzdělávání se nyní zaměříme na terciární systém." # todo: NEW TRANSLATION
  RAJ_Establish_The_Revolutionary_Guard: "Zřídit revoluční gardu" # todo: NEW TRANSLATION
  RAJ_Establish_The_Revolutionary_Guard_desc: "Revoluci je třeba za každou cenu chránit před kontrarevolučními hnutími! Zaměříme se na vybudování armády podobné Rudé armádě." # todo: NEW TRANSLATION
  RAJ_Invite_Soviet_Planners: "Pozvat sovětské plánovače" # todo: NEW TRANSLATION
  RAJ_Invite_Soviet_Planners_desc: "\"Stát je orgán třídní nadvlády, orgán pro utlačování jedné třídy druhou; vytváří řád, který legalizuje a upevňuje toto utlačování tím, že zmírňuje střet tříd.\"\n—Vladimir Lenin" # todo: NEW TRANSLATION
  RAJ_Invite_International_Theorists: "Pozvat mezinárodní teoretiky" # todo: NEW TRANSLATION
  RAJ_Invite_International_Theorists_desc: "\"Svoboda jen pro členy vlády, jen pro členy strany — i když jich je docela mnoho — není svobodou vůbec. Svoboda je vždy svobodou odpůrců.\"\n—Rosa Luxemburg" # todo: NEW TRANSLATION
  RAJ_Agricultural_Collectivisation: "Zemědělská kolektivizace" # todo: NEW TRANSLATION
  RAJ_Agricultural_Collectivisation_desc: "Naším hlavním cílem je samozřejmě rozšíření indického proletariátu, ale kdo je bude krmit? Aktuální systém soukromého zemědělství je zastaralý a neefektivní, musíme usilovat o sjednocení malých rolnických statků do větších 'kolektivních farem'." # todo: NEW TRANSLATION
  RAJ_Expand_Soviet_Aid: "Rozšířit sovětskou pomoc" # todo: NEW TRANSLATION
  RAJ_Expand_Soviet_Aid_desc: "Sověti jsou štědří lidé, pomáhají agrárním ekonomikám vybudovat silný průmysl, jaký mají oni. Musíme požádat o více pomoci, aby se rychlost naší industrializace prudce zvýšila." # todo: NEW TRANSLATION
  RAJ_Rethink_Resource_Policy: "Přehodnotit politiku zdrojů" # todo: NEW TRANSLATION
  RAJ_Rethink_Resource_Policy_desc: "Starý koloniální režim se soustředil na těžbu zdrojů pro vývoz ziskových produktů a téměř zcela ignoroval industrializaci a s ní důležité zdroje jako ocel a uhlí. Musíme to radikálně změnit, aby podpořilo náš rostoucí proletariát." # todo: NEW TRANSLATION
  RAJ_Combat_Institutional_Corruption: "Boj proti institucionální korupci" # todo: NEW TRANSLATION
  RAJ_Combat_Institutional_Corruption_desc: "Korupce pronikla do všech indických institucí. Hnízdila se za britského Ráje a bude pokračovat, pokud s tím nepřestaneme." # todo: NEW TRANSLATION
  RAJ_Establish_a_Central_Committee: "Zřídit ústřední výbor" # todo: NEW TRANSLATION
  RAJ_Establish_a_Central_Committee_desc: "Tím, že nařídíme centrálně plánované průmyslové cíle našim továrnám, sklidíme plody efektivity matematiky, ale omezíme svobodu našich dělníků." # todo: NEW TRANSLATION
  RAJ_Incentivize_Workplace_Democracy: "Prosadit podnikové demokracii" # todo: NEW TRANSLATION
  RAJ_Incentivize_Workplace_Democracy_desc: "Zaměřením se na lokální socialismus dáme dělníkům více svobody, při obětování našich širších průmyslových cílů." # todo: NEW TRANSLATION
  RAJ_The_Liberation_of_South_Asia: "Osvobození jižní Asie" # todo: NEW TRANSLATION
  RAJ_The_Liberation_of_South_Asia_desc: "Ačkoliv indický proletariát možná získal volby a zvolenou vládu, části jižní Asie tak štěstí neměly. Subtilně podpoříme jejich dělnická hnutí různými prostředky, včetně zásobování zbraněmi, vojenských intervencí a politické subverze.\nVishv ke karmachaaree ekajut ho gae!" # todo: NEW TRANSLATION
  RAJ_Seize_the_Means: "Seize the Means..." # todo: NEW TRANSLATION
  RAJ_Seize_the_Means_desc: "Prvním krokem k nastolení socialismu musí být zmocnění se výrobních, distribučních a výměnných prostředků. I když to může některé části země rozrušit, musíme být opatrní." # todo: NEW TRANSLATION
  RAJ_of_Production: "...výroby" # todo: NEW TRANSLATION
  RAJ_of_Production_desc: "Buržoazie má podíl lva příliš dlouho. Je čas, aby dělníci ochutnali plody své vlastní práce." # todo: NEW TRANSLATION
  RAJ_of_Distribution: "...distribuce" # todo: NEW TRANSLATION
  RAJ_of_Distribution_desc: "Továrna nic neznamená bez způsobu, jak distribuovat své výrobky. Musíme zabavit soukromé železnice ve prospěch indického lidu." # todo: NEW TRANSLATION
  RAJ_of_Exchange: "...výměny" # todo: NEW TRANSLATION
  RAJ_of_Exchange_desc: "Abychom koordinovali národní rozpočet, potřebujeme veřejně vlastněnou banku, která bude regulovat naši měnu a kontrolní mechanismy." # todo: NEW TRANSLATION
  RAJ_Connect_the_Rural_Areas: "Propojit venkovské oblasti" # todo: NEW TRANSLATION
  RAJ_Connect_the_Rural_Areas_desc: "Britové se starali jen o stavbu železnic z našich přístavů k přírodním zdrojům a většinu země nechali nedotčenou. Nyní je naší povinností tyto britské chyby opravit." # todo: NEW TRANSLATION
  RAJ_The_Ceylon_Emergency: "Krize na Cejlonu" # todo: NEW TRANSLATION
  RAJ_The_Ceylon_Emergency_desc: "Se všemi zbraněmi a politickou podporou, které Sinhálci obdrželi, jsou nyní připraveni začít povstání proti Britům a jen čekají na naše slovo." # todo: NEW TRANSLATION
  RAJ_Overthrow_the_Rana_dynasty: "Nepálské povstání" # todo: NEW TRANSLATION
  RAJ_Overthrow_the_Rana_dynasty_desc: "Nepálský lid se dlouho organizuje a nadešel čas udeřit proti utlačovatelskému režimu Rána." # todo: NEW TRANSLATION
  RAJ_The_Bhutanese_Revolt: "Bhútánské povstání" # todo: NEW TRANSLATION
  RAJ_The_Bhutanese_Revolt_desc: "Wangchukova dynastie, ať už milovaná jakkoli, selhala v pomoci nejchudším prvkům země a lid je připraven ji odporovat." # todo: NEW TRANSLATION
  RAJ_The_Remaining_Ports: "Zbývající přístavy" # todo: NEW TRANSLATION
  RAJ_The_Remaining_Ports_desc: "Na subkontinentu stále rostou nepekné výhonky kolonialismu, které je třeba vzít, pokojně nebo i násilím." # todo: NEW TRANSLATION
  RAJ_Jinnahs_Kingdom: "Naši muslimští soudruzi" # todo: NEW TRANSLATION
  RAJ_Jinnahs_Kingdom_desc: "Všechny náboženské, jazykové a kulturní skupiny subkontinentu jsou propojeny a závislé jedna na druhé. Vytržení jedné z nich by Indii vážně oslabilo. Dlouho přehlíženou, ale velmi důležitou částí tohoto národa jsou muslimové obývající Sindh, Paňdžáb a Bengálsko." # todo: NEW TRANSLATION
  RAJ_A_New_Movement: "Nové hnutí" # todo: NEW TRANSLATION
  RAJ_A_New_Movement_desc: "Stalinovo Rusko selhalo ve vytvoření spravedlivé socialistické společnosti a musíme se od něj distancovat a zapálit nové hnutí kupředu." # todo: NEW TRANSLATION
  RAJ_The_Third_International: "Třetí internacionála" # todo: NEW TRANSLATION
  RAJ_The_Third_International_desc: "Stalinovo Rusko ušlo dlouhou cestu a přežilo mnoho let; musíme se s nimi spojit, chceme‑li přežít další dny." # todo: NEW TRANSLATION
  RAJ_Asian_Anti_Colonialism: "Asijský antikolonialismus" # todo: NEW TRANSLATION
  RAJ_Asian_Anti_Colonialism_desc: "Musíme po tolika letech konečně vypudit Evropany z asijského kontinentu, abychom zajistili naši budoucnost." # todo: NEW TRANSLATION
  RAJ_Bind_South_Asia_Closer: "Sblížit jižní Asii" # todo: NEW TRANSLATION
  RAJ_Bind_South_Asia_Closer_desc: "Zavedli jsme socialismus v Jižní Asii a konečně je třeba je vojensky sladit." # todo: NEW TRANSLATION
  RAJ_Socialist_Science: "Sociální věda" # todo: NEW TRANSLATION
  RAJ_Socialist_Science_desc: "Sovětský lid dosáhl velkého pokroku ve vědě a má spoustu technologií žádoucích pro nový indický dělnický stát. Výměnné programy by mohly obě společnosti obohatit." # todo: NEW TRANSLATION
  RAJ_Military_Cooperation: "Vojenská spolupráce" # todo: NEW TRANSLATION
  RAJ_Military_Cooperation_desc: "S našimi novými spojenci budeme koordinovat obrannou strategii a sdílet vojenská tajemství." # todo: NEW TRANSLATION
  RAJ_Technological_Cooperation: "Technologická spolupráce" # todo: NEW TRANSLATION
  RAJ_Technological_Cooperation_desc: "Musíme posílit nejen naši akademii, ale i akademie našich spojenců." # todo: NEW TRANSLATION
  RAJ_Establish_a_National_Government: "Zřídit národní vládu" # todo: NEW TRANSLATION
  RAJ_Establish_a_National_Government_desc: "Po vítězství ve volbách zřídíme centralizovanou vládu a sestavíme kabinet." # todo: NEW TRANSLATION
  RAJ_Battle_the_Untouchables: "Boj proti nedotknutelnosti" # todo: NEW TRANSLATION
  RAJ_Battle_the_Untouchables_desc: "Nejslabší kasty zoufale potřebují pomoc a demokratická Indie musí zlepšit jejich postavení." # todo: NEW TRANSLATION
  RAJ_Encourage_Rural_Education: "Podporovat venkovské vzdělání" # todo: NEW TRANSLATION
  RAJ_Encourage_Rural_Education_desc: "Chceme‑li se stát industrializovanou mocností, musíme podporovat vzdělání napříč všemi vrstvami společnosti." # todo: NEW TRANSLATION
  RAJ_Expand_Delhi_University: "Rozšířit univerzitu v Dillí" # todo: NEW TRANSLATION
  RAJ_Expand_Delhi_University_desc: "S rostoucí poptávkou po vyšším vzdělání bychom měli rozšířit naši největší univerzitu, Univerzitu Dillí." # todo: NEW TRANSLATION
  RAJ_Economic_Restructuring: "Ekonomická restrukturalizace" # todo: NEW TRANSLATION
  RAJ_Economic_Restructuring_desc: "V současném stavu naše ekonomika není připravena na budoucnost a musíme rychle jednat, nebo zůstaneme agrární společností." # todo: NEW TRANSLATION
  RAJ_Expand_the_Public_Sector: "Rozšířit veřejný sektor" # todo: NEW TRANSLATION
  RAJ_Expand_the_Public_Sector_desc: "Nejlepší způsob, jak rozšířit průmyslové schopnosti, je přímá intervence vlády, což může odcizit některé konzervativnější členy." # todo: NEW TRANSLATION
  RAJ_Soviet_Assistance: "Sovětská pomoc" # todo: NEW TRANSLATION
  RAJ_Soviet_Assistance_desc: "V současném geopolitickém klimatu má Sovětský svaz zájem budovat Indii jako protiváhu západním mocnostem." # todo: NEW TRANSLATION
  RAJ_Establish_the_Planning_Commission: "Zřídit plánovací komisi" # todo: NEW TRANSLATION
  RAJ_Establish_the_Planning_Commission_desc: "Koloniální ekonomika byla nastavená tak, aby vykořisťovala obyvatelstvo pro vlastní prospěch. Je čas provést reformy, které budou upřednostňovat potřeby a blaho všech Indů a vybudovat udržitelnou a spravedlivou ekonomiku. Naším prvním krokem bude založení národní plánovací komise pro řádný rozvoj ekonomiky a zajištění spravedlivých mezd a pracovních podmínek." # todo: NEW TRANSLATION
  RAJ_Agricultural_Investments: "Zemědělské investice" # todo: NEW TRANSLATION
  RAJ_Agricultural_Investments_desc: "Zlepšením zemědělské produkce podpoříme venkovská společenství, přesun pracovníků do jiných sektorů a zlepšíme životní úroveň průměrného Inda." # todo: NEW TRANSLATION
  RAJ_Expell_the_Socialists: "Vyhostit socialisty" # todo: NEW TRANSLATION
  RAJ_Expell_the_Socialists_desc: "Naše strana byla dlouho širokým hnutím, ale nyní, když je hlavní cíl dosažen, vyloučíme extrémní prvky naší organizace." # todo: NEW TRANSLATION
  RAJ_Unify_the_Courts: "Sjednotit soudy" # todo: NEW TRANSLATION
  RAJ_Unify_the_Courts_desc: "Náš soudní systém je zbytečně komplikovaný a stovky let starý. Sjednotíme ho pro větší efektivitu." # todo: NEW TRANSLATION
  RAJ_Concessions_to_Princes: "Ústupky knížatům" # todo: NEW TRANSLATION
  RAJ_Concessions_to_Princes_desc: "Knížata sice zcela nesouhlasí s naší vládou, ale ideologické rozdíly by nám neměly bránit v pragmatismu." # todo: NEW TRANSLATION
  RAJ_No_Compromises: "Žádné kompromisy" # todo: NEW TRANSLATION
  RAJ_No_Compromises_desc: "Staletá utlačující instituce knížectví nejsou spolehlivým elementem v našem moderním státě. Kompromisy s těmito relikty feudalismu jsou nepřijatelné." # todo: NEW TRANSLATION
  RAJ_Integrate_the_Princely_States: "Integrovat knížectví" # todo: NEW TRANSLATION
  RAJ_Integrate_the_Princely_States_desc: "S postupem k nezávislosti budou knížectví integrována, chtějí‑li nebo ne." # todo: NEW TRANSLATION
  RAJ_Democratize_our_Institutions: "Demokratizovat naše instituce" # todo: NEW TRANSLATION
  RAJ_Democratize_our_Institutions_desc: "Naše instituce sužuje korupce pocházející ze systémů zavedených před staletími; musíme je restrukturalizovat a reformovat pro stabilitu." # todo: NEW TRANSLATION
  RAJ_Central_Bureau_of_Investigation: "Ústřední vyšetřovací úřad" # todo: NEW TRANSLATION
  RAJ_Central_Bureau_of_Investigation_desc: "Naše nově budované instituce musí být chráněny proti všem hrozbám, kterým mohou čelit. Je čas na naši odpověď na Abwehr, MI6 a CIA." # todo: NEW TRANSLATION
  RAJ_Reform_our_Police_Force: "Reformovat naši policii" # todo: NEW TRANSLATION
  RAJ_Reform_our_Police_Force_desc: "Indická imperiální policie je v naší zemi hluboce nenáviděná a naše vláda bude stejná, pokud budeme pokračovat v jejich systému. Je čas zrušit britský policejní systém a založit výrazně indický." # todo: NEW TRANSLATION
  RAJ_Revise_Taxation_Policies: "Revidovat daňové politiky" # todo: NEW TRANSLATION
  RAJ_Revise_Taxation_Policies_desc: "Britský Ráj těžce zdanil naši indickou populaci často nespravedlivými metodami. Pro udržitelnou ekonomiku a společnost máme nahradit britský daňový systém jasně indickým." # todo: NEW TRANSLATION
  RAJ_Reestablish_our_Armed_Forces: "Znovu vybudovat ozbrojené síly" # todo: NEW TRANSLATION
  RAJ_Reestablish_our_Armed_Forces_desc: "Britská indická armáda byla velkou institucí s hlavním účelem zabezpečit britskou nadvládu. Musíme uvolnit místo pro novou armádu sloužící Indii." # todo: NEW TRANSLATION
  RAJ_No_Resentments: "Bez záští" # todo: NEW TRANSLATION
  RAJ_No_Resentments_desc: "Naše historie s Brity není klidná, ale současné geopolitické okolnosti vyžadují sblížení se západními mocnostmi. Rány koloniální doby stále pálí, ale musíme stát spolu jako rovnocenní partneři." # todo: NEW TRANSLATION
  RAJ_Protect_the_Arabian_Sea: "Chránit Arabské moře" # todo: NEW TRANSLATION
  RAJ_Protect_the_Arabian_Sea_desc: "Mezi námi a britskou osou globální obrany, Suezem, leží široké a vystavené Arabské moře. V něm si piráti a nepřátelské ponorky našli mnoho příležitostí zasahovat do našich zásilek na Blízký východ a dál. Zřízení koordinovaných radarových stanic a leteckých základen nám velmi pomůže v navrácení kontroly nad Indickým oceánem."
  RAJ_Equal_Partners: "Rovnocenní partneři"
  RAJ_Equal_Partners_desc: "Nyní, když se vztah kolonie a vrchnosti změnil na vztah rovnocenných partnerů, budeme zastávat větší roli v mezinárodní politice k ochraně svobody tam, kam britská ruka nedosáhne."
  RAJ_A_New_Way_Forward: "Nová cesta vpřed"
  RAJ_A_New_Way_Forward_desc: "Indie nemá co získat zapojením se do války, a i kdybychom v našem úsilí zastavili jednu válku, zachránili bychom tisíce životů."
  RAJ_Mutual_Investments: "Vzájemné investice"
  RAJ_Mutual_Investments_desc: "Ačkoli jsou Evropané mnohem industrializovanější než my, tyto investice budou přesto vzájemně prospěšné."
  RAJ_The_Non_Aligned_Movement: "Pohyb hnutí nezúčastněných"
  RAJ_The_Non_Aligned_Movement_desc: "Budeme podporovat globální společenství nezávislé na velmocích naší doby a společně bojovat za mír ve světě."
  RAJ_Bring_Democracy_to_South_Asia: "Přinést demokracii do jižní Asie"
  RAJ_Bring_Democracy_to_South_Asia_desc: "Zatímco se Indie stala zářícím bastionem demokracie, stále obýváme kontinent bez demokracie a plný tyranie."
  RAJ_South_Asian_Economic_Integration: "Hospodářská integrace jižní Asie"
  RAJ_South_Asian_Economic_Integration_desc: "Indický subkontinent má společné cíle, mimo jiné, na světovém trhu. Pokud máme konsolidovat a integrovat naše ekonomiky, prosperita dosáhne všech. Navíc budou jednání s mezinárodními obchodními partnery mnohem účinnější."
  RAJ_Pressure_the_British_about_Ceylon: "Vyvíjet tlak na Brity ohledně Ceylonu"
  RAJ_Pressure_the_British_about_Ceylon_desc: "Ceylónský lid dlouho organizoval hnutí za nezávislost v naději, že indická nezávislost znamená i jejich svobodu od britského vykořisťování. I když tomu tak možná nebylo, nyní můžeme hnutí pomoci získat hlas."
  RAJ_Armed_Neutrality: "Ozbrojená neutralita"
  RAJ_Armed_Neutrality_desc: "Nikdo nechce válku, vůdcům jde jen o kořist, a učinit tuto kořist co nejobtížněji dosažitelnou musí být cílem každého neutrálního, avšak suverénního státu. Zlepšíme morálku v armádě a posílíme náš zbrojní průmysl."
  RAJ_Expand_its_Competences: "Rozšířit jeho kompetence"
  RAJ_Expand_its_Competences_desc: "Možná pokud tuto organizaci rozšíříme a sjednotíme, naše slova budou mít větší podporu a budeme efektivnější v ochraně práv menších zemí."
  RAJ_Emphasise_Anti_Colonialist_Sentiment: "Zdůraznit antikolonialistické nálady"
  RAJ_Emphasise_Anti_Colonialist_Sentiment_desc: "Kolonialismus je ošklivá, zastaralá a nepopulární instituce a její čas už dávno přestal. Toto poselství musí být šířeno po celém světě, jinak dekády zbytečného utrpení budou muset snášet kolonizovaní lidé této planety."
  RAJ_Take_back_the_Ports: "Získat přístavy zpět"
  RAJ_Take_back_the_Ports_desc: "Evropské přístavy, ošklivá připomínka naší koloniální minulosti. Zatímco samozřejmě doufáme v mírové vyřešení tohoto problému, nemůžeme spoléhat jen na slova."
  RAJ_Launch_The_Quit_India_Movement: "Spustit Hnutí Odejděte z Indie"
  RAJ_Launch_The_Quit_India_Movement_desc: "Momentálně používáme veškerá opatření k vyhnání Britů, ale třeba usmíření s našimi politickými nepřáteli a zahájení celonárodního stávkového hnutí zvýší tlak."
  RAJ_Intervention_in_Pakistan: "Zásah v Pákistánu"
  RAJ_Intervention_in_Pakistan_desc: "Překroucená záminka džinnovské demokracie padla a diktátorské vlády byly vnuteny muslimům, sikhům a hinduistům žijícím v Pandžábu, Sindhu a Bengálsku. Dovolit existenci tak extrémního režimu je pozvánkou cizích mocností usilujících o kontrolu nad indickým subkontinentem. Indické ozbrojené síly musí zasáhnout dříve, než bude pozdě."
  RAJ_Offer_the_British_Concessions: "Britské ústupky"
  RAJ_Offer_the_British_Concessions_desc: "Britské ostrovy si drží Indii z mnoha důvodů, mezi hlavní patří obrovské přírodní bohatství indického subkontinentu. Jednání půjdou mnohem hladčeji, pokud slíbíme sdílet některé naše zdroje. "
  RAJ_Mutual_Security: "Vzájemná bezpečnost"
  RAJ_Mutual_Security_desc: "V naší nové alianci budeme koordinovat vojenskou strategii, aby posílila naši bezpečnost."
  RAJ_The_Remains_of_South_Asia: "Zbytky jižní Asie"
  RAJ_The_Remains_of_South_Asia_desc: "Jižní Asie je stále plná despocických režimů utlačujících své lidi. S britskou pomocí zavedeme demokracii u těchto autoritářských režimů."
  RAJ_Outwards_to_the_World: "Ven k světu"
  RAJ_Outwards_to_the_World_desc: "Musíme hledat vnější aliance, aby byla zajištěna pozice Indie."
  RAJ_The_Womens_Status: "Postavení žen"
  RAJ_The_Womens_Status_desc: "Ženy byly v naší společnosti dlouho utlačovány. Různé barbarské, zastaralé praktiky jsou stále uplatňovány na ženy. A i když k nápravě nestačí jen legislativa, je to první krok k vytvoření spravedlivé Indie."
  RAJ_Caste_Reform: "Reforma kast"
  RAJ_Caste_Reform_desc: "Kastovní systém diskriminace dlouho visel nad Indií a stále dominuje mnoha jejím částem. V hinduistické společnosti kategorizuje lidi do rigidních sociálních skupin, přičemž nižší kasty jsou pravidelně vykořisťovány."
  RAJ_Develop_the_Defense_Industry: "Rozvinout obranný průmysl"
  RAJ_Develop_the_Defense_Industry_desc: "Po našich nedávných ekonomických reformách národňování je nyní čas posílit národní obranný průmysl, aby pomohl jak naší ekonomice, tak ozbrojeným silám."
  RAJ_Establishing_A_Indian_Navy: "Zřízení indického námořnictva"
  RAJ_Establishing_A_Indian_Navy_desc: "Indický oceán je velký a nebezpečný a hlídkování v něm vyžaduje velkou povrchovou flotilu, kterou momentálně nevlastníme. Je zásadní zvýšit námořní produkci."
  RAJ_Unity_in_India: "Jednota v Indii"
  RAJ_Unity_in_India_desc: "Muslimové v Indii byli dlouho marginalizováni, ale žádná svobodná, demokratická a spravedlivá společnost nemůže takové zlo tolerovat. Musíme ustoupit jejich požadavkům a sjednotit národ."
  RAJ_The_Ones_Who_Got_Away: "Ti, kteří unikli"
  RAJ_The_Ones_Who_Got_Away_desc: "Zatímco jsme byli poměrně přísní ve svém požadavku na integraci do Indie, několik knížat uniklo našim rukám. Nyní je čas zajistit subkontinent."
  RAJ_Industrial_Expertise: "Průmyslová odbornost" # todo: NEW TRANSLATION
  RAJ_Industrial_Expertise_desc: "Kombinací vzdělání, zahraniční pomoci a domácího rozvoje má indická průmyslová pracovní síla úroveň odbornosti nevídanou v této části světa." # todo: NEW TRANSLATION
  RAJ_Mechanized_Agriculture: "Mechanizované zemědělství" # todo: NEW TRANSLATION
  RAJ_Mechanized_Agriculture_desc: "Zavedeme mechanické pluhy a další zemědělské stroje na největší farmy, aby se výrazně zvýšila naše zemědělská produkce." # todo: NEW TRANSLATION
  RAJ_Minimum_Wage_Legislation: "Zákon o minimální mzdě" # todo: NEW TRANSLATION
  RAJ_Minimum_Wage_Legislation_desc: "Vstupujeme do nové éry Indie a průmyslový pokrok se šíří po národě; je zásadní chránit práva a mzdy naší dělnické třídy. Zavedení legislativy o minimální mzdě zajistí, že všichni zaměstnanci budou spravedlivě odměňováni za svou práci a pomůže zmírnit chudobu a nerovnost ve společnosti." # todo: NEW TRANSLATION
  RAJ_Relieve_Indias_Struggling_Food_Supply: "Ulevit bojujícímu zásobování potravin v Indii"
  RAJ_Relieve_Indias_Struggling_Food_Supply_desc: "Zásoby potravin v Indii jsou velmi závislé na klimatu. Pokud monzunová sezóna nedosáhne kvóty, bude nutné dovézt obilí, aby se uspokojila poptávka. Pokud zlepšíme zavlažování a zemědělské metody, můžeme předejít budoucím hladomorům."
  RAJ_Placate_the_Nobles: "Uklidnit šlechtu"
  RAJ_Placate_the_Nobles_desc: "Šlechta prosperovala za britské vlády a není příliš nadšená z naší nezávislosti. Můžeme to změnit, pokud jim udělíme některé ústupky."
  RAJ_Military_Research_Department: "Oddělení vojenského výzkumu"
  RAJ_Military_Research_Department_desc: "Musíme rozšířit naše vojenské schopnosti, nikoli surovou kvantitou, jak navrhuje mnoho našich generálů, ale skutečnou technologickou převahou."
  RAJ_Sit_Down_with_the_Farmers: "Dialog s farmáři"
  RAJ_Sit_Down_with_the_Farmers_desc: "Samostatný farmář, pracující na vlastní půdě, je životní silou naší země a jeho potřeby si zaslouží větší pozornost, než jakou mu koloniální vláda poskytla."
  RAJ_Token_Social_Reform: "Symbolická reforma kast"
  RAJ_Token_Social_Reform_desc: "Kastovní systém vždy Indii dobře sloužil při zachování pořádku a stability, a i když odchod Britů zanechal mnoho pozic vyžadujících vysokou kompetenci prázdných, bez lidí z vyšších kast je těžké je obsadit. Uvolněním některých předpisů si můžeme udržet efektivitu z koloniálních časů."
  RAJ_Expand_our_Ordance_Industry: "Rozšířit zbrojní průmysl"
  RAJ_Expand_our_Ordance_Industry_desc: "V narůstajících konfliktech světa musí být [RAJ.GetNameDef] připravena bránit své občany a téměř stejně důležitá svoboda všech."
  RAJ_Answer_The_Call: "Odpovědět na výzvu"
  RAJ_Answer_The_Call_desc: "Britské ostrovy jsou současně zapojeny do války, kterou si nemohou dovolit prohrát; jakákoli forma kapitulace může poslat miliony do tyranie a temnoty. Je naší morální povinností bojovat za svobodu, kdekoliv je ohrožena, a nyní je čas odpovědět na výzvu."
  RAJ_Institute_The_Draft: "Zavést brannou povinnost"
  RAJ_Institute_The_Draft_desc: "Ačkoli je naše účast v této válce morální povinností, ne každý občan si uvědomuje vážnost naší situace. Bohužel musíme naverbovat muže, kteří nejsou ochotni dobrovolně sloužit, aby osvobodili lidi po celém světě."
  RAJ_Cross_Country_Railways: "Přescelostátní železnice" # todo: NEW TRANSLATION
  RAJ_Cross_Country_Railways_desc: "Propojení rozsáhlých a různorodých regionů Indie sítí přescelostátních železnic výrazně zlepší dopravu a komunikaci mezi našimi městy a městečky. Umožní to efektivnější tok zboží a lidí, což povede k hospodářskému růstu a rozvoji. Navíc výstavba a údržba těchto železnic vytvoří pracovní místa a povzbudí ekonomiku. Investice do přescelostátních železnic jsou zásadním krokem k modernizaci a sjednocení naší země." # todo: NEW TRANSLATION
  RAJ_Industrial_Investments: "Průmyslové investice"
  RAJ_Industrial_Investments_desc: "Musíme silně investovat do továren po celé zemi, aby naše ekonomika rostla a rozkvétala."
  RAJ_Aquire_War_Material: "Získat válečný materiál"
  RAJ_Aquire_War_Material_desc: "Pokud chceme čelit možným budoucím nepřátelům, musíme být připraveni s nově vyvinutou a dobře vyrobenou výzbrojí, která doprovodí naše statečné vojáky."
  RAJ_Internal_Security_Act: "Zákon o vnitřní bezpečnosti"
  RAJ_Internal_Security_Act_desc: "Nemůžeme dovolit extremistickým frakcím v této zemi, aby ji zničily. Budeme pokračovat v britské politice zatýkání těch, kteří touží zničit tento velký národ Indie."
  RAJ_Placate_the_British: "Uklidnit Brity"
  RAJ_Placate_the_British_desc: "Ačkoliv je naše nezávislost zajištěna, stále silně spoléháme na britské investice, aby udržely naši ekonomiku nad vodou. Můžeme do Indie přilákat více investic, pokud jen uklidníme Angličany."
  RAJ_Federalisation: "Veřejná gramotnost"
  RAJ_Federalisation_desc: "Musíme dramaticky zvýšit míru gramotnosti rozšířením sektoru vzdělávání. Indie na tom závisí!"
  RAJ_A_Truly_Indian_Navy: "Opravdové indické námořnictvo"
  RAJ_A_Truly_Indian_Navy_desc: "Indický oceán je velký a nebezpečný a hlídkování vyžaduje rozsáhlou povrchovou flotilu, kterou momentálně nevlastníme. Je zásadní zvýšit námořní produkci."
  RAJ_Fighting_Tyranny_whereever_it_may_be: "Boj proti tyranii kdekoli"
  RAJ_Fighting_Tyranny_whereever_it_may_be_desc: "Naše ozbrojené síly byly používány především k ochraně indických zájmů v jižní Asii, ale neviděli jsme širší obraz. Musíme pomáhat svobodě po celém světě a vzít boj k těm, kteří ji chtějí proměnit v popel."
  RAJ_Assemble_our_Cabinet: "Svolat naši vládu"
  RAJ_Assemble_our_Cabinet_desc: "S každým novým vicekrálem přichází nová vláda, podporující jeho snahy v Indii. Ačkoli Viceroy's Executive Council kdysi byl pouze poradním sborem, získal v průběhu času větší vliv, a proto musíme najít kompetentní ministry."
  RAJ_Meet_with_the_Legislative: "Setkat se s legislativou"
  RAJ_Meet_with_the_Legislative_desc: "Ačkoli zástupce koruny drží velkou moc nad zákonodárným sborem, na rozdíl od domova, musíme se stále ujistit, že budou hlasovat naším směrem."
  RAJ_Meet_with_the_Judiciary: "Setkat se s justicí"
  RAJ_Meet_with_the_Judiciary_desc: "Ačkoliv se v Indii do značné míry uplatnilo anglické common law, soudní systém je vystavěn podle místních vzorů. Zajistit, aby nám nekladli odpor, nám ušetří budoucí potíže." # todo: NEW TRANSLATION
  RAJ_Attend_the_Imperial_Conference: "Zúčastnit se císařské konference" # todo: NEW TRANSLATION
  RAJ_Attend_the_Imperial_Conference_desc: "Císařské konference se konají pravidelně, jen tato má zvláštní význam. Po královské, řekněme, kontroverzi, byla většina dominíí v rozkladu a cílem Londýna je znovu posílit své vazby na Říši." # todo: NEW TRANSLATION
  RAJ_Common_Economic_Policy: "Společná hospodářská politika" # todo: NEW TRANSLATION
  RAJ_Common_Economic_Policy_desc: "Jak bylo nastíněno na Císařské konferenci, hospodářské politiky částí Říše budou sladěny tak, aby podporovaly meziříšský hospodářský růst." # todo: NEW TRANSLATION
  RAJ_Reinvigorate_Imperial_Shipping: "Oživit císařské námořní spojení" # todo: NEW TRANSLATION
  RAJ_Reinvigorate_Imperial_Shipping_desc: "Plavební trasy přes Indický oceán se poněkud vyprázdnily na úkor pokladen Britského Rádže. Musíme prosazovat pokračující investice do císařské námořní dopravy." # todo: NEW TRANSLATION
  RAJ_Common_Defence_Policy: "Společná obranná politika" # todo: NEW TRANSLATION
  RAJ_Common_Defence_Policy_desc: "Rostoucí napětí po celém světě neuniklo britské administrativě. Navrhli, že dominia, ostrovy a Indie by měly lépe koordinovat své ozbrojené síly, aby zabezpečily Říši." # todo: NEW TRANSLATION
  RAJ_The_Indian_Merchant_Navy: "Indické obchodní loďstvo" # todo: NEW TRANSLATION
  RAJ_The_Indian_Merchant_Navy_desc: "Ačkoliv Indie historicky nebyla nejnámořnější národem, jsme silně závislí na obchodu, který nám poskytuje Říše, a abychom lépe využili naše zdroje, je nutné začít rozšiřovat kompetence naší námořní síly k hlídkování Indického oceánu." # todo: NEW TRANSLATION
  RAJ_An_Army_serving_the_Empire: "Armáda sloužící říši" # todo: NEW TRANSLATION
  RAJ_An_Army_serving_the_Empire_desc: "Ačkoliv byla naše armáda primárně nasazována v jižní Asii a sekundárně v Africe, Domovské ostrovy navrhují více mezinárodních operací pro indické vojáky." # todo: NEW TRANSLATION
  RAJ_Assist_in_the_Singapore_Strategy: "Pomoci u strategie Singapuru" # todo: NEW TRANSLATION
  RAJ_Assist_in_the_Singapore_Strategy_desc: "Japonská říše již dlouho míří na evropské državy v Asii a Británie na to reagovala vypracováním plánů, které soustředí asijskou obranu kolem Singapuru." # todo: NEW TRANSLATION
  RAJ_Indianise_the_Royal_Indian_Navy: "Indizovat Královské indické námořnictvo" # todo: NEW TRANSLATION
  RAJ_Indianise_the_Royal_Indian_Navy_desc: "Královské indické námořnictvo je podsoudně považováno za pomocné k opravdovému Královskému námořnictvu, protože je převážně obsazeno Brity. Větším pověřením Indů do vyšších pozic mu můžeme dát vlastní smysl existence." # todo: NEW TRANSLATION
  RAJ_Expand_the_Indian_Air_Force: "Rozšířit indické letectvo" # todo: NEW TRANSLATION
  RAJ_Study_British_Armour: "Studovat britská obrněná vozidla" # todo: NEW TRANSLATION
  RAJ_Study_British_Armour_desc: "Naše pěchotně orientovaná armáda postrádá obrněná vozidla; je důležité studovat zahraniční konstrukce, abychom modernizovali armádu a ochránili se před cizími hrozbami." # todo: NEW TRANSLATION
  RAJ_Expand_the_Indian_Air_Force_desc: "Válka se změnila. Mnozí z našich generálů stále žijí vítězstvím Velké války. Moderní válka se však neodehrává jen na zemi, ale i na obloze. Zmiňované bojiště jsme dlouho zanedbávali. Nyní je čas toto smutné zjištění změnit." # todo: NEW TRANSLATION
  RAJ_British_Arms_Shipments: "Britské dodávky zbraní" # todo: NEW TRANSLATION
  RAJ_British_Arms_Shipments_desc: "I když máme mnoho oddaných mužů připravených položit život za Říši, ne všichni mohou být vyzbrojeni námi a posily z Ostrovů výrazně zlepší naši efektivitu." # todo: NEW TRANSLATION
  RAJ_British_Investments: "Britské investice" # todo: NEW TRANSLATION
  RAJ_British_Investments_desc: "Indie není známá jako průmyslový gigant a nejspíš se to brzy nezmění, ale investice britských společností nám mohou pomoci na naší cestě." # todo: NEW TRANSLATION
  RAJ_Our_First_Order_of_Business: "Naše první záležitost" # todo: NEW TRANSLATION
  RAJ_Our_First_Order_of_Business_desc: "Po setkání se všemi ostatními složkami vlády máme nyní příležitost předložit první zákon pod Linlithgowem do Císařské legislativní rady, aby byl o něm hlasováno." # todo: NEW TRANSLATION
  RAJ_New_Excavation_Companies: "Nové těžební společnosti" # todo: NEW TRANSLATION
  RAJ_New_Excavation_Companies_desc: "S nově rozšířenou infrastrukturou se do indického území mohou nyní přesouvat nové společnosti, aby sklidily bohatství indické země." # todo: NEW TRANSLATION
  RAJ_New_Industrial_Centers: "Nová průmyslová centra" # todo: NEW TRANSLATION
  RAJ_New_Industrial_Centers_desc: "Naše rozšířené železnice nám zároveň poskytly příležitost stavět továrny po celé zemi a vytvořit novou indickou dělnickou třídu." # todo: NEW TRANSLATION
  RAJ_Expand_Urban_Centers: "Rozšířit městská centra" # todo: NEW TRANSLATION
  RAJ_Expand_Urban_Centers_desc: "S indickou potravinovou bezpečností nyní více či méně zajištěnou, můžeme rozšířit městská centra a vytvořit nové příležitosti pro dříve chudé venkovské masy." # todo: NEW TRANSLATION
  Railway_Expansion_Act_init: "Zahájili práce na Zákonu o rozšíření železnic" # todo: NEW TRANSLATION
  Railway_Expansion_Act_passed: "Schválen Zákon o rozšíření železnic" # todo: NEW TRANSLATION
  Railway_Expansion_Act_failed: "Nepodařilo se schválit Zákon o rozšíření železnic" # todo: NEW TRANSLATION
  RAJ_Railway_Expansion_Act: "§WAdd§! Zákon o rozšíření železnic" # todo: NEW TRANSLATION
  RAJ_Railway_Expansion_Act_desc: "Infrastruktura naší země v mnoha částech výrazně zaostává. Dosud jsme se starali jen o stavbu železnic podél ziskových tratí, ale to se musí změnit, pokud chceme někdy konkurovat v globální ekonomice." # todo: NEW TRANSLATION
  Agricultural_Stabilisation_Act_init: "Zahájili práce na Zákonu o stabilizaci zemědělství" # todo: NEW TRANSLATION
  Agricultural_Stabilisation_Act_passed: "Schválen Zákon o stabilizaci zemědělství" # todo: NEW TRANSLATION
  Agricultural_Stabilisation_Act_failed: "Nepodařilo se schválit Zákon o stabilizaci zemědělství" # todo: NEW TRANSLATION
  RAJ_Agricultural_Stabilisation_Act: "§WAdd§! Zákon o stabilizaci zemědělství" # todo: NEW TRANSLATION
  RAJ_Agricultural_Stabilisation_Act_desc: "Indie byla vždy zemědělskou společností, ale častá sucha narušovala indické zásoby potravin. Vzhledem k tomu, že vnější pomoc je často odepřena, je v našem vlastním zájmu zajistit produkci obilí sami." # todo: NEW TRANSLATION
  Educational_Reform_Act_init: "Zahájili práce na Zákonu o vzdělávací reformě" # todo: NEW TRANSLATION
  Educational_Reform_Act_passed: "Schválen Zákon o vzdělávací reformě" # todo: NEW TRANSLATION
  Educational_Reform_Act_failed: "Nepodařilo se schválit Zákon o vzdělávací reformě" # todo: NEW TRANSLATION
  RAJ_Educational_Reform_Act: "Zákon o vzdělávací reformě" # todo: NEW TRANSLATION
  RAJ_Educational_Reform_Act_desc: "Nejlepší indičtí intelektuálové vždy emigrovali na Domovské ostrovy pro nejlepší vzdělání pod korunou krále. Pokud však rozšíříme naše místní univerzity, mohli bychom udržet více světlých hlav v Indii." # todo: NEW TRANSLATION
  Insurance_Act_init: "Zahájili práce na Zákonu o pojištění" # todo: NEW TRANSLATION
  Insurance_Act_passed: "Schválen Zákon o pojištění" # todo: NEW TRANSLATION
  Insurance_Act_failed: "Nepodařilo se schválit Zákon o pojištění" # todo: NEW TRANSLATION
  RAJ_Insurance_Act: "Zákon o pojištění" # todo: NEW TRANSLATION
  RAJ_Insurance_Act_desc: "Oblast pojišťovnictví byla v Indii dlouho zanedbávána, protože zde chybí právní rámec nebo motivace. Jediným odvětvím, kde se udrželo, je námořní průmysl; s tímto zákonem to snad změníme." # todo: NEW TRANSLATION
  War_Powers_Act_init: "Zahájili práce na Zákonu o válečných pravomocích" # todo: NEW TRANSLATION
  War_Powers_Act_passed: "Schválen Zákon o válečných pravomocích" # todo: NEW TRANSLATION
  War_Powers_Act_failed: "Nepodařilo se schválit Zákon o válečných pravomocích" # todo: NEW TRANSLATION
  RAJ_War_Powers_Act: "Zákon o válečných pravomocích" # todo: NEW TRANSLATION
  RAJ_War_Powers_Act_desc: "Ačkoliv Indové nemuseli mít žádný vliv na rozhodnutí vstoupit do války, jistě podpoří naše ušlechtilé cíle porazit ohavné choutky fašismu, které rostou po celém světě." # todo: NEW TRANSLATION
  RAJ_His_Majesties_University: "Univerzita Jeho Veličenstva" # todo: NEW TRANSLATION
  RAJ_His_Majesties_University_desc: "Univerzita v Dillí je dlouho etablovaná, ale nedostatečně naplňuje potřeby indických intelektuálů, kteří stále studují v Londýně. Pomocí zajištění učitelského talentu můžeme výrazně zlepšit naše vzdělávání." # todo: NEW TRANSLATION
  RAJ_Department_of_War_Studies: "Ústav válečných studií" # todo: NEW TRANSLATION
  RAJ_Department_of_War_Studies_desc: "Ačkoliv samozřejmě existuje mnoho oblastí studia, žádné nejsou tak důležité jako vojenské obory, které pomáhají naší zemi bránit její hranice." # todo: NEW TRANSLATION
  RAJ_Open_for_Business: "Otevřeno pro podnikání" # todo: NEW TRANSLATION
  RAJ_Open_for_Business_desc: "S novými právními rámci a pojišťovnami mohou mezinárodní podnikatelé považovat Indii za výnosný trh k prozkoumání. To může jenom pomoci zápasící indické ekonomice." # todo: NEW TRANSLATION
  RAJ_Healthcare_Investments: "Investice do zdravotnictví" # todo: NEW TRANSLATION
  RAJ_Healthcare_Investments_desc: "Nelze popřít, že náš zdravotnický systém je v žalostném stavu. Většina domorodých Indů si nemůže dovolit navštívit lékaře, což poškozuje společnost i ekonomiku jako celek; vláda lidu nemůže nechat tento smutný stav pokračovat. Musíme jednat!" # todo: NEW TRANSLATION
  RAJ_Civil_Aviation_Expansion: "Sjednotit železnice" # todo: NEW TRANSLATION
  RAJ_Civil_Aviation_Expansion_desc: "Naše železnice jsou místy roztříštěné a neefektivně postavené; je čas opravit díry v síti a zlepšit naše nákladní a zásobovací systémy." # todo: NEW TRANSLATION
  RAJ_Wheat_Exports: "Vývoz pšenice" # todo: NEW TRANSLATION
  RAJ_Wheat_Exports_desc: "Nyní, když jsme poněkud stabilizovali indické zásoby potravin, určitě neuškodí vyvézt nějaké obilí.\nPravda?" # todo: NEW TRANSLATION
  RAJ_Primary_Education: "Základní vzdělání" # todo: NEW TRANSLATION
  RAJ_Primary_Education_desc: "Většina venkovských Indů je negramotná, z prostého důvodu nedostatečného rozvoje systému základních a středních škol. Pokud investujeme nově přidělené prostředky chytře, můžeme zlepšit kvalifikaci naší obecné pracovní síly." # todo: NEW TRANSLATION
  RAJ_Drought_Prevention_Measures: "Opatření proti suchu" # todo: NEW TRANSLATION
  RAJ_Drought_Prevention_Measures_desc: "Indie během monzunového období patří mezi nejúrodnější oblasti světa. Problémem je však nepředvídatelnost sezónního vzoru způsobující potravinovou nejistotu. Pokud rozšíříme zavlažovací opatření, můžeme snížit naši závislost na ročních srážkách." # todo: NEW TRANSLATION
  RAJ_Bolster_our_Security_Forces: "Posílit naše bezpečnostní složky" # todo: NEW TRANSLATION
  RAJ_Bolster_our_Security_Forces_desc: "Aby podnikání správně fungovalo, musíme chránit nové podnikatele před lstivými podvodníky a zloději. Neschopnost zajistit ochranu mohla být největší překážkou zahraničních investic. Alespoň doposud." # todo: NEW TRANSLATION
  RAJ_Gather_Industrial_Funds: "Shromáždit průmyslové fondy" # todo: NEW TRANSLATION
  RAJ_Gather_Industrial_Funds_desc: "Indický národní kongres, náš hlavní soupeř v těchto volbách, má širokou podporu obyčejných lidí. To můžeme vyrovnat rozsáhlými sliby majitelům pozemků a kapitalistům Indie. Jejich pokladny jsou zdánlivě bezedné a politická budoucnost Indie je hodná investice." # todo: NEW TRANSLATION
  RAJ_Arms_Industry_Expansion: "Rozšíření zbrojního průmyslu" # todo: NEW TRANSLATION
  RAJ_Arms_Industry_Expansion_desc: "Indická armáda se stala největší dobrovolnickou armádou v historii, ale mnoha nově naverbovaným mužům chybí správné vybavení pro podporu jejich boje. Zatímco jsme se dříve spolehli na britské dodávky zbraní, nyní je čas podpořit obranný průmysl v srdci jižní Asie." # todo: NEW TRANSLATION
  RAJ_Implement_Conscription: "Zavést brannou povinnost" # todo: NEW TRANSLATION
  RAJ_Implement_Conscription_desc: "Naše dobrovolnická armáda je velká, někteří řeknou mimořádně velká, zejména v kontextu koloniální vlády. Ale Londýn vyžaduje více mužů k vítězství v této válce a pokud máme cokoli, pak jsou to muži. Tento krok nemusí být populární u naší populace, ale stojí za to." # todo: NEW TRANSLATION
  RAJ_The_August_Offer: "Srpnová nabídka" # todo: NEW TRANSLATION
  RAJ_The_August_Offer_desc: "Naše vztahy s domorodci na subkontinentu byly v nejlepším případě trnité; nemůžeme je navždy vyloučit z vlády. Zejména v době války, kdy Indové trpí miliony, musíme zajistit, aby Rádž nespadl do násilného povstání. Nabídka několika ústupků by měla uspokojit jejich hlad po reformách." # todo: NEW TRANSLATION
  RAJ_Expand_Tata_Steel: "Rozšířit Tata Steel" # todo: NEW TRANSLATION
  RAJ_Expand_Tata_Steel_desc: "Tata Steel je již třicet let pilířem indické industrializace. Abychom drželi krok s rychlými změnami v globální ekonomice, je nezbytné pokračovat v investicích do rozšíření a modernizace Tata Steel. To nejen upevní naši pozici jako předního výrobce oceli, ale také vytvoří nová pracovní místa a podpoří hospodářský růst po celé zemi." # todo: NEW TRANSLATION
  RAJ_Expand_the_Burma_Road: "Rozšířit Barmskou cestu" # todo: NEW TRANSLATION
  RAJ_Expand_the_Burma_Road_desc: "Čína je přirozeným spojencem v boji proti Japonské říši a musíme zvýšit naši pomoc přes Barmskou cestu, abychom osvobodili Asii od tyranie jingoismu." # todo: NEW TRANSLATION
  RAJ_Border_Fortifications: "Pohraniční opevnění" # todo: NEW TRANSLATION
  RAJ_Border_Fortifications_desc: "V Asii existuje mnoho expanzivních říší a zajištění našeho východního frontu musí být naší prioritou číslo jedna. Můžeme vybudovat opevnění podél východních barmských hor a řek." # todo: NEW TRANSLATION
  raj_diverse_investments_tt: "Umožní soukromým subjektům investovat do §Yvojenských továren§! a §Yhliníkových hutí§!." # todo: NEW TRANSLATION
  raj_invest_relations_10_tt: "Zvyšuje §Yvztahy s investory§! o §G10§!." # todo: NEW TRANSLATION
  raj_invest_relations_15_tt: "Zvyšuje §Yvztahy s investory§! o §G15§!." # todo: NEW TRANSLATION
  RAJ_Establish_the_Planning_Commission: "Zřídit plánovací komisi" # todo: NEW TRANSLATION
  RAJ_Establish_the_Planning_Commission_desc: "Koloniální ekonomika byla nastavená tak, aby vykořisťovala obyvatelstvo pro vlastní prospěch. Je čas provést reformy, které budou upřednostňovat potřeby a blaho všech Indů a vybudovat udržitelnou a spravedlivou ekonomiku. Naším prvním krokem bude založení národní plánovací komise pro řádný rozvoj ekonomiky a zajištění spravedlivých mezd a pracovních podmínek." # todo: NEW TRANSLATION
  RAJ_Common_Economic_Policy: "Společná hospodářská politika" # todo: NEW TRANSLATION
  RAJ_Common_Economic_Policy_desc: "Jak bylo nastíněno na Císařské konferenci, hospodářské politiky částí Říše budou sladěny tak, aby podporovaly meziříšský hospodářský růst." # todo: NEW TRANSLATION
  RAJ_Foster_Private_Investment: "Podporovat soukromé investice" # todo: NEW TRANSLATION
  RAJ_Foster_Private_Investment_desc: "Pro podporu hospodářského růstu a rozvoje v Indii je důležité povzbudit soukromé investice jak domácí, tak zahraniční. Toho lze dosáhnout prostřednictvím daňových pobídek, zjednodušení podnikatelských předpisů a vytvořením příznivého investičního klimatu. Podporou soukromých investic můžeme stimulovat ekonomiku a podpořit inovace v různých sektorech." # todo: NEW TRANSLATION
  RAJ_Reform_the_Colonial_Economy: "Reformovat koloniální ekonomiku" # todo: NEW TRANSLATION
  RAJ_Reform_the_Colonial_Economy_desc: "V minulosti hospodářské plánování v [RAJ.GetNameDef] opomíjelo potřeby indického obyvatelstva ve prospěch maximalizace těžby zdrojů a zisku. Pokud chceme udržet nadvládu nad Indií v těchto zkouškách, musí se to změnit." # todo: NEW TRANSLATION
  RAJ_Initiate_Land_Reform: "Zahájit pozemkovou reformu" # todo: NEW TRANSLATION
  RAJ_Initiate_Land_Reform_desc: "Současné vlastnictví a rozdělení půdy v Indii je hluboce vadné a neúměrně nahrává bohatým a vlivným. Zahájením pozemkové reformy můžeme usilovat o spravedlivější rozdělení půdy a zajistit práva malých zemědělců a marginalizovaných komunit. To nejenže prospěje těmto skupinám, ale také pomůže stimulovat hospodářský růst a rozvoj celé země." # todo: NEW TRANSLATION
  RAJ_Centralise_the_Courts: "Centralizovat soudy" # todo: NEW TRANSLATION
  RAJ_Centralise_the_Courts_desc: "Soudní systém Indie je, částečně kvůli předkoloniálním královstvím, ale také kvůli britskému zása­hu, zbytečně složitou sítí jurisdikcí. To ztěžuje podnikání více, než je nutné." # todo: NEW TRANSLATION
  RAJ_Open_our_Markets: "Otevřít naše trhy" # todo: NEW TRANSLATION
  RAJ_Open_our_Markets_desc: "Zahraniční investice do Indie z jiných zdrojů než z Británie byly řídké kvůli uzavřené povaze subkontinentu. Tato nová administrativa proto musí světu oznámit, že Indie vítá obchod a investice s otevřenou náručí." # todo: NEW TRANSLATION
  RAJ_Rural_Education: "Venkovské vzdělávání" # todo: NEW TRANSLATION
  RAJ_Rural_Education_desc: "Rozšíření vesnických škol by velmi pomohlo venkovskému obyvatelstvu najít lepší pracovní příležitosti a přispět k rozvoji jejich komunit. Lepší vzdělání povede k růstu ekonomiky a zlepšení byrokracie v regionech. Zvýšený přístup ke vzdělání by také mohl pomoci snížit chudobu a nerovnost a vybudovat lepší Indii." # todo: NEW TRANSLATION
  RAJ_Cross_Country_Railways: "Přescelostátní železnice" # todo: NEW TRANSLATION
  RAJ_Cross_Country_Railways_desc: "Propojení rozsáhlých a různorodých regionů Indie sítí přescelostátních železnic výrazně zlepší dopravu a komunikaci mezi našimi městy a městečky. Umožní to efektivnější tok zboží a lidí, což povede k hospodářskému růstu a rozvoji. Navíc výstavba a údržba těchto železnic vytvoří pracovní místa a povzbudí ekonomiku. Investice do přescelostátních železnic jsou zásadním krokem k modernizaci a sjednocení naší země." # todo: NEW TRANSLATION
  RAJ_Electrify_the_Network: "Elektrifikovat síť" # todo: NEW TRANSLATION
  RAJ_Electrify_the_Network_desc: "Železniční systém je páteří naší dopravy a klíčovým prvkem hospodářského rozvoje. Elektrifikací železniční sítě můžeme zvýšit efektivitu a rychlost vlaků, snížit závislost na zahraničních fosilních palivech a tím výrazně posílit domácí ekonomiku." # todo: NEW TRANSLATION
  RAJ_Cooperation_with_the_Princes: "Spolupráce s knížaty" # todo: NEW TRANSLATION
  RAJ_Cooperation_with_the_Princes_desc: "Pro efektivní vládnutí v Indii je nutné navázat silné vztahy s místními knížaty a jejich teritorii. Prací společně můžeme zajistit stabilitu a prosperitu pro všechny regiony země. To může zahrnovat sdílení zdrojů, koordinaci politik a spolupráci na projektech ve prospěch lidu Indie." # todo: NEW TRANSLATION
  RAJ_Expand_Tata_Steel: "Rozšířit Tata Steel" # todo: NEW TRANSLATION
  RAJ_Expand_Tata_Steel_desc: "Tata Steel je již třicet let pilířem indické industrializace. Abychom drželi krok s rychlými změnami v globální ekonomice, je nezbytné pokračovat v investicích do rozšíření a modernizace Tata Steel. To nejen upevní naši pozici jako předního výrobce oceli, ale také vytvoří nová pracovní místa a podpoří hospodářský růst po celé zemi." # todo: NEW TRANSLATION
  RAJ_Rewrite_Business_Law: "Diverzifikovat soukromé investice" # todo: NEW TRANSLATION
  RAJ_Rewrite_Business_Law_desc: "Při přechodu do nové éry nezávislosti je nezbytné diverzifikovat naše soukromé investice, aby byla zajištěna stabilita a růst národa. Rozprostřením investic přes různé sektory a odvětví se můžeme chránit před riziky, která by mohla postihnout jedinou oblast. Tato strategie nám umožní sebevědomě budovat silnou a prosperující budoucnost pro Indii." # todo: NEW TRANSLATION
  RAJ_Sideline_the_Unions: "Omezit vliv odborů" # todo: NEW TRANSLATION
  RAJ_Sideline_the_Unions_desc: "Odbory v Indii často představovaly zdroj narušení a překážek v postupu. Odstrčením jejich vlivu a nalezením alternativních způsobů, jak řešit obavy dělníků, se můžeme soustředit na modernizaci a posílení národa. To rovněž pomůže zlepšit vztahy mezi vedením a prací, což povede k efektivnější a produktivnější pracovní síle." # todo: NEW TRANSLATION
  RAJ_Commercial_Port_Expansion: "Rozšíření obchodních přístavů" # todo: NEW TRANSLATION
  RAJ_Commercial_Port_Expansion_desc: "Jak se ekonomika [RAJ.GetNameDef] rozrůstá a industrializuje, je nezbytné rozšířit a zlepšit naše obchodní přístavy. Zvýšením kapacity a efektivity těchto přístavů lépe usnadníme obchod s ostatními zeměmi a podpoříme rostoucí potřeby našich průmyslových odvětví. Toto rozšíření nejenže prospěje ekonomice, ale také vytvoří nová pracovní místa pro lidi v Indii." # todo: NEW TRANSLATION
  RAJ_Irrigation_Infrastructure: "Zavlažovací infrastruktura" # todo: NEW TRANSLATION
  RAJ_Irrigation_Infrastructure_desc: "Jak Indie roste a rozvíjí se, je nezbytné investovat do moderní zavlažovací infrastruktury. Výstavbou kanálů a přehrad zajistíme spolehlivý zdroj vody pro naše plodiny i v dobách sucha. To prospěje nejen zemědělcům a jejich živobytí, ale také pozitivně ovlivní celkovou ekonomiku národa." # todo: NEW TRANSLATION
  RAJ_Foundations_for_the_First_Five_Year_Plan: "Základy prvního pětiletého plánu" # todo: NEW TRANSLATION
  RAJ_Foundations_for_the_First_Five_Year_Plan_desc: "Nově ustavená plánovací komise vypracovala plány hospodářského růstu, které v dlouhodobém horizontu výrazně posílí indickou ekonomiku. Selhání v ich provedení by mohlo vést k hospodářskému útlumu." # todo: NEW TRANSLATION
  RAJ_Seek_Trading_Partners: "Udělovat pozemkové granty" # todo: NEW TRANSLATION
  RAJ_Seek_Trading_Partners_desc: "Budeme rozdávat povolení k rozvoji, akvizice půdy a pozemkové granty v rozsahu, který subkontinent dosud nepoznal. To výrazně pohání rozvoj indické ekonomiky." # todo: NEW TRANSLATION
  RAJ_Invite_Mining_Companies: "Pozvat těžební společnosti" # todo: NEW TRANSLATION
  RAJ_Invite_Mining_Companies_desc: "Přírodní zdroje Indie jsou rozlehlé a nevyužité. Pozváním těžebních společností, aby si uplatnily naše území, můžeme nejen vytvořit pracovní místa, ale také přivést potřebný kapitál pro rozvoj národa. Tyto společnosti přinesou technologie a odborné znalosti, které nám pomohou těžit a využívat naše zdroje naplno." # todo: NEW TRANSLATION
  RAJ_Development_funds_for_the_States: "Rozvojové fondy pro státy" # todo: NEW TRANSLATION
  RAJ_Development_funds_for_the_States_desc: "Pomoc převážně malým a podrozvinutým knížecím státům při výstavbě infrastruktury a průmyslu výrazně posílí indickou průmyslovou bázi." # todo: NEW TRANSLATION
  RAJ_Bastions_of_Stablity: "Pevnosti stability" # todo: NEW TRANSLATION
  RAJ_Bastions_of_Stablity_desc: "V době politických otřesů a nejistoty je zásadní spoléhat se na stabilitu a řád, které knížecí státy poskytují. Tyto státy mají dlouhou historii vlády a prokázaly se jako spolehliví partneři při udržování míru a prosperity ve svých hranicích i mimo ně." # todo: NEW TRANSLATION
  RAJ_Industrial_Expertise: "Průmyslová odbornost" # todo: NEW TRANSLATION
  RAJ_Industrial_Expertise_desc: "Kombinací vzdělání, zahraniční pomoci a domácího rozvoje má indická průmyslová pracovní síla úroveň odbornosti nevídanou v této části světa." # todo: NEW TRANSLATION
  RAJ_Mechanized_Agriculture: "Mechanizované zemědělství" # todo: NEW TRANSLATION
  RAJ_Mechanized_Agriculture_desc: "Zavedeme mechanické pluhy a další zemědělské stroje na největší farmy, aby se výrazně zvýšila naše zemědělská produkce." # todo: NEW TRANSLATION
  RAJ_Minimum_Wage_Legislation: "Zákon o minimální mzdě" # todo: NEW TRANSLATION
  RAJ_Minimum_Wage_Legislation_desc: "Vstupujeme do nové éry Indie a průmyslový pokrok se šíří po národě; je zásadní chránit práva a mzdy naší dělnické třídy. Zavedení legislativy o minimální mzdě zajistí, že všichni zaměstnanci budou spravedlivě odměňováni za svou práci a pomůže zmírnit chudobu a nerovnost ve společnosti." # todo: NEW TRANSLATION
  RAJ_Protectionist_Tariffs: "Ochranná cla" # todo: NEW TRANSLATION
  RAJ_Protectionist_Tariffs_desc: "Zavedení vyšších tarifů by bylo jasným přínosem pro indické podniky, protože by jim umožnilo soutěžit na vyrovnanějším poli s mezinárodními firmami a poskytlo by jim větší ochranu před vnějšími ekonomickými tlaky. Může to také poskytnout potřebnou podporu indickým podnikům a pomoci vytvářet pracovní místa a podpořit hospodářský růst." # todo: NEW TRANSLATION
  RAJ_Integrate_Princely_Economies: "Integrovat ekonomiky knížectví" # todo: NEW TRANSLATION
  RAJ_Integrate_Princely_Economies_desc: "Dříve Britský rádž dovolil různým knížecím státům udržovat vlastní ekonomiky, což vedlo k mozaice různých systémů a praktik. Je čas tato ekonomiky sjednotit a integrovat je do koherentního celku. To umožní efektivnější obchod a hospodářský růst i větší pocit jednoty v rámci národa." # todo: NEW TRANSLATION
  RAJ_Solidify_Control_over_the_Banks: "Upevnit kontrolu nad bankami" # todo: NEW TRANSLATION
  RAJ_Solidify_Control_over_the_Banks_desc: "Indické banky byly dlouho ovládány zahraničními zájmy, které nechápaly problémy obyvatel. Nyní je čas převzít kontrolu a využít je k podpoře rozvoje a růstu naší země. Musíme zajistit, aby banky pracovaly v nejlepším zájmu lidu a ne pouze pro vybranou skupinu." # todo: NEW TRANSLATION
  RAJ_Broad_Union_Support: "Masové znárodňování" # todo: NEW TRANSLATION
  RAJ_Broad_Union_Support_desc: "Jako nově nezávislý národ je důležité, abychom převzali kontrolu nad vlastními zdroji a průmyslem. Masové znárodnění klíčových sektorů, jako je energetika, doprava a výroba, nám umožní lépe utvářet naši budoucnost a zajistit, že zisky z těchto odvětví budou reinvestovány zpět do naší země." # todo: NEW TRANSLATION
  RAJ_Ease_Agricultural_Regulations: "Uvolnit zemědělské regulace" # todo: NEW TRANSLATION
  RAJ_Ease_Agricultural_Regulations_desc: "Zemědělské předpisy dlouho zatěžovaly zemědělce a bránily jejich schopnosti produkovat a prodávat své produkty. Uvolněním těchto regulací jim umožníme větší svobodu v provozu a podpoříme jejich rozkvět, což povede k silnějšímu zemědělskému sektoru v Indii." # todo: NEW TRANSLATION
  RAJ_Rural_Development: "Venkovský rozvoj" # todo: NEW TRANSLATION
  RAJ_Rural_Development_desc: "Abychom přinesli tolik potřebné změny na venkově, musíme se zaměřit na zlepšení infrastruktury, přístupu ke vzdělání a zdravotní péči a podporu hospodářského rozvoje. Investováním do těchto oblastí můžeme vytáhnout komunity z chudoby a výrazně posílit naši ekonomiku." # todo: NEW TRANSLATION
  RAJ_Excavation_Investments: "Investice do těžby" # todo: NEW TRANSLATION
  RAJ_Excavation_Investments_desc: "Investicemi do těžebních projektů po celé Indii můžeme přinést nové příležitosti pro hospodářský růst a rozvoj země. Tyto investice mohou pomoci odhalit cenné zdroje a vytvořit nová pracovní místa v těžebním sektoru." # todo: NEW TRANSLATION
  RAJ_Large_Scale_Privitizations: "Velkoplošné privatizace" # todo: NEW TRANSLATION
  RAJ_Large_Scale_Privitizations_desc: "Abychom podpořili hospodářský růst a zvýšili efektivitu, plánujeme provést rozsáhlé privatizace státních podniků. To umožní soukromým investorům vstoupit do řízení a přinést nové nápady a inovace do těchto odvětví. Úspěch této politiky přinese velké výhody lidu Indie, protože povede k tvorbě pracovních míst a zvýšení konkurenceschopnosti na světovém trhu." # todo: NEW TRANSLATION
  RAJ_Electrification_of_India: "Elektrifikace Indie" # todo: NEW TRANSLATION
  RAJ_Electrification_of_India_desc: "Ve snaze modernizovat a zlepšit životní úroveň občanů po celé zemi zavádíme plán přinést elektřinu do našich průmyslových center. To zahrnuje výstavbu nových elektráren, rozšíření přenosových vedení a zajištění stabilního přístupu pro průmyslový sektor." # todo: NEW TRANSLATION
  RAJ_Manufacturing_Plants: "Výrobní závody" # todo: NEW TRANSLATION
  RAJ_Manufacturing_Plants_desc: "Abychom podpořili hospodářský růst a vytvořili pracovní místa, musíme se zaměřit na zřizování a rozšiřování výrobních závodů po celé Indii. Tato zařízení budou produkovat různé produkty, od spotřebního zboží po průmyslové stroje, čímž pomohou diverzifikovat naši ekonomiku a vytvořit příležitosti pro obyvatele celé země." # todo: NEW TRANSLATION
  RAJ_Arms_Foundries: "Zbrojní slévárny" # todo: NEW TRANSLATION
  RAJ_Arms_Foundries_desc: "Abychom uspokojili rostoucí poptávku po zbraních a vybavení pro naši rostoucí armádu, musíme založit zbrojní slévárny po celé zemi. Tyto slévárny nejenže dodají potřebné vybavení pro naše vojáky, ale také zvýší poptávku po naší oceli, uhlí a síře." # todo: NEW TRANSLATION
  RAJ_Import_Industrial_Machinery: "Import průmyslových strojů" # todo: NEW TRANSLATION
  RAJ_Import_Industrial_Machinery_desc: "Abychom drželi krok s našimi radikálními hospodářskými cíli, je nezbytné dovážet nejnovější a nejefektivnější průmyslové stroje z průmyslových velmocí. Zahraničním vybavením zvýšíme produktivitu a konkurenceschopnost v různých odvětvích, což povede k hospodářskému růstu a prosperitě země." # todo: NEW TRANSLATION
  RAJ_Solidify_Business_Ties: "Upevnit obchodní vazby" # todo: NEW TRANSLATION
  RAJ_Solidify_Business_Ties_desc: "Optimismus investorů začíná vyprchat, jak realita investování do zaostalé ekonomiky dohání jejich očekávání. Řada schůzek, kde budou vyslechnuty jejich obavy, by je měla uklidnit." # todo: NEW TRANSLATION
  RAJ_International_Division_of_Labour: "Mezinárodní dělba práce" # todo: NEW TRANSLATION
  RAJ_International_Division_of_Labour_desc: "Mezinárodní dělba práce odkazuje na způsob, jakým se různé země specializují na výrobu určitých statků nebo služeb na základě svých výhod a zdrojů. To umožňuje efektivnější a nákladově výhodnější výrobu, protože si země mohou vyměňovat produkty a služby, které potřebují. Přijetím mezinárodní dělby práce může Indie využít své silné stránky a zdroje k podpoře hospodářského růstu a prosperity." # todo: NEW TRANSLATION
  RAJ_Soviet_Economic_Assistance: "Sovětská ekonomická pomoc" # todo: NEW TRANSLATION
  RAJ_Soviet_Economic_Assistance_desc: "Abychom podpořili ekonomiku a přinesli Indii prosperitu, vyhledáme pomoc Sovětského svazu ve formě ekonomické pomoci a rozvojových projektů. To poskytne potřebné zdroje a posílí naše politické a hospodářské vazby se Sovětským svazem." # todo: NEW TRANSLATION
  RAJ_Further_British_Investments: "Další britské investice" # todo: NEW TRANSLATION
  RAJ_Further_British_Investments_desc: "Jak se [RAJ.GetNameDef] nadále rozvíjí a modernizuje, je důležité udržet silné vztahy s naším koloniálním pánem, Británií. Investice z Domovských ostrovů nejen posílí naše hospodářské vazby, ale také přinesou nové technologie a odbornost do našich průmyslových odvětví. To prospěje jak indickému subkontinentu, tak Britským ostrovům, když společně budujeme lepší budoucnost pro Říši." # todo: NEW TRANSLATION
  RAJ_Machinery_for_Textiles: "Stroje pro textil" # todo: NEW TRANSLATION
  RAJ_Machinery_for_Textiles_desc: "Indický textilní průmysl byl vždy rozsáhlý, ale s příchodem tkalcovských stavů a podobných strojů vzrostla jeho produktivita a je třeba najít trhy pro odbyti. Tyto trhy nalezneme v socialistických ekonomikách světa, z nichž mnohé vyvinuly průmyslová centra, odkud budeme dovážet stroje potřebné k napájení našeho průmyslového rozvoje." # todo: NEW TRANSLATION
  RAJ_Raw_Material_Imports: "Importy surovin" # todo: NEW TRANSLATION
  RAJ_Raw_Material_Imports_desc: "Indie je rozsáhlý subkontinent bohatý na zdroje, ale mnoho z nich je těžko dostupných a chybí nám jejich rozmanitost. Obracíme se na naše bratrské země pro dovoz těchto surovin, které chybí v našem výrobním řetězci." # todo: NEW TRANSLATION
  RAJ_Exchange_of_Luxury_Goods: "Směna luxusního zboží" # todo: NEW TRANSLATION
  RAJ_Exchange_of_Luxury_Goods_desc: "Zatímco Indie má přebytky cukru a kávy, východoevropské ekonomiky mají nadbytky dobytka a lnu. Usnadnění obchodu nepotravinářského zboží výrazně zvýší životní úroveň obou národů." # todo: NEW TRANSLATION
  RAJ_Resources_for_the_Home_Isles: "Zdroje pro Britské ostrovy" # todo: NEW TRANSLATION
  RAJ_Resources_for_the_Home_Isles_desc: "Hrozby pro bezpečnost Británie rostou a je úkolem Říše poskytnout suroviny potřebné pro britskou výrobu." # todo: NEW TRANSLATION
  RAJ_Agricultural_Subsidies: "Zemědělské dotace" # todo: NEW TRANSLATION
  RAJ_Agricultural_Subsidies_desc: "Zemědělský sektor Indie je páteří naší ekonomiky, poskytuje zaměstnání a obživu milionům občanů. Je však také silně ovlivněn počasím a kolísáním trhu. Zavedením zemědělských dotací můžeme poskytnout farmářům potřebnou podporu a zajistit pokračující růst a úspěch tohoto klíčového sektoru." # todo: NEW TRANSLATION
  RAJ_Continued_Expansion_of_the_Ordnance_Foundries: "Pokračující rozšíření zbrojních sléváren" # todo: NEW TRANSLATION
  RAJ_Continued_Expansion_of_the_Ordnance_Foundries_desc: "Zbrojní slévárny v Indii jsou klíčové pro výrobu zbraní a munice pro naše ozbrojené síly. Pokračujícím rozšiřováním a modernizací těchto sléváren zajistíme, že naši vojáci budou mít nejlepší možné vybavení k obraně země." # todo: NEW TRANSLATION
  RAJ_Contributions_to_the_War_Effort: "Příspěvky k válečnému úsilí" # todo: NEW TRANSLATION
  RAJ_Contributions_to_the_War_Effort_desc: "Během Velké války výrazně pomohla podpora knížectví a při další velké válce na obzoru se na jejich podporu můžeme spolehnout znovu." # todo: NEW TRANSLATION
  RAJ_Connect_the_Remote_Provinces: "Rozvíjet odlehlé provincie" # todo: NEW TRANSLATION
  RAJ_Connect_the_Remote_Provinces_desc: "Venkovské a izolované populace Indie byly často zanedbávány ve prospěch obytných center subkontinentu. Rozvoj těchto opomíjených částí Rádže, kde zemědělství produkuje jen malý přebytek, pomůže v národních zásobách potravin." # todo: NEW TRANSLATION
  RAJ_Expand_the_Diplomatic_Corps: "Rozšířit diplomatický sbor" # todo: NEW TRANSLATION
  RAJ_Expand_the_Diplomatic_Corps_desc: "Indie má ambiciózní zahraničněpolitickou agendu a rozšíření diplomatického sboru jí pomůže dosáhnout cílů. Nová diplomatická přítomnost nám umožní lépe jednat s důležitými partnery, převzít větší iniciativu v globálních záležitostech a výrazně pomoci v hledání bezpečnostní smlouvy zaručující bezpečnost Indie." # todo: NEW TRANSLATION
