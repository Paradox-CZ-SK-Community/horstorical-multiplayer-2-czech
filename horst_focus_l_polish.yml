  r56_raj.1.t: "Jmenování lorda Linlithgowa" # todo: NEW TRANSLATION
  r56_raj.1.d: "22. viceroy a generální guvernér Indie, Freeman Freeman‑Thomas Willingdon, byl nahrazen nově jmenovaným Victorem Hopem Linlithgowem, který brzy převezme pozici 23. viceroya Indie. Je popisován svými současníky jako ambiciózní politik, zdědivší politický zápal po svém otci, prvním generálním guvernérovi Austrálie. Svět se dívá na Indii a čeká, jak jeho správa ovlivní subkontinent." # todo: NEW TRANSLATION
  r56_raj.1.a: "Rozumím." # todo: NEW TRANSLATION
  r56_raj.2.t: "Poslední hodiny viceroye" # todo: NEW TRANSLATION
  r56_raj.2.desc: "Posledních pět let bylo pro guvernéra‑generála vyčerpávajících. Byly to časy občanských nepokojů, s nimiž Lord Willingdon byl obeznámen z dob, kdy byl guvernérem Bombaje; získal těžké zkušenosti s jejich řešením. Rozkazy z vyšších míst stanovily cílem spolupráci, ale jen s těmi, kteří fungují v rámci právního rámce Raj. Po tomto úkolu zahájil vlnu zatýkání, což mu dodnes snižuje popularitu. Přesto se na své působení v Indii dívá jako na kladné ve své bilanci. Každé předchozí viceroyovo období musí skončit — a stejné platí i zde." # todo: NEW TRANSLATION
  r56_raj.2.a: "Hodně štěstí nástupci, bude se mu hodit." # todo: NEW TRANSLATION
  r56_raj.3.t: "Jmenování Archibalda Wavella" # todo: NEW TRANSLATION
  r56_raj.3.d: "Lord Linlithgow nedostal snadný úkol jmenováním do pozice viceroye, neboť populární nepokoje rostly a mohly být dočasně uhašeny jen několika politickými ústupky vyvrcholivšími v provincálních volbách 1937. Po vysoké indické účasti byli mnoho z nejefektivnějších politiků pozváni do kabinetu a poprvé v historii převýšili britské úředníky. Stejně jako období Lorda Willingdona muselo skončit i toto." # todo: NEW TRANSLATION
  r56_raj.3.a: "Seznamte se s novým šéfem..." # todo: NEW TRANSLATION
  r56_raj.4.t: "Jmenování Louise Mountbattena" # todo: NEW TRANSLATION
  r56_raj.4.d: "Wavellovy snahy byly většinou indických politiků považovány za ušlechtilé, ale omezené Londýnem. Krátce po příjezdu do viceroyovy rezidence v Dillí se snažil zmírnit potíže s potravinami v Bengálsku. Byl také prvním viceroyem, který jednal o samosprávě s prominentními indickými vůdci, a k nelibosti mnohých byly tyto snahy podkopány Londýnem, který si hodlá Indii udržet za každou cenu." # todo: NEW TRANSLATION
  r56_raj.4.i: "Wavellovy snahy byly mnohými indickými politiky považovány za ušlechtilé, ale omezené Londýnem. Krátce po příjezdu do bývalého viceroyova sídla v Dillí se snažil částečně zmírnit potravinovou krizi v Bengálsku. Byl jak velmi spolupracující s indickou vládou, tak loajálním zástupcem monarchie v Londýně. Avšak, jak téměř vždy v říši, bude nahrazen Louisem Mountbattenem." # todo: NEW TRANSLATION
  r56_raj.4.a: "...stejný jako starý šéf" # todo: NEW TRANSLATION
  r56_raj.101.t: "Provincální volby končí" # todo: NEW TRANSLATION
  r56_raj.101.desc: "Byl to den, kterého se viceroy obával už dlouho, když se Impérium legislativní rada přeskupila a nově zvolení, reprezentativní a opoziční členové nyní dominují našemu zákonodárnému sboru, což nám ztěžuje prosazování naší vůle v těchto komorách." # todo: NEW TRANSLATION
  r56_raj.101.a: "Nový úsvit pro Indii." # todo: NEW TRANSLATION
  r56_raj.102.t: "Zákon o rozšíření železnic projde" # todo: NEW TRANSLATION
  r56_raj.102.d: "Po měsících únavných debat v síních vlády v Dillí viceroy s hrdostí oznamuje, že budou vyčleněny velké prostředky na výstavbu slavnostních, moderních a efektivních železnic táhnoucích se celým subkontinentem." # todo: NEW TRANSLATION
  r56_raj.102.a: "Hned si koupím jízdenku!" # todo: NEW TRANSLATION
  r56_raj.103.t: "Zákon o rozšíření železnic neprojde" # todo: NEW TRANSLATION
  r56_raj.103.d: "Viceroy dlouho bojoval, aby tento prokletý zákon prosadil, ale bohužel mu se mu nepodařilo získat podporu v Impériu legislativní radě. Očekává se, že pronese projev, v němž s nevolí přizná selhání." # todo: NEW TRANSLATION
  r56_raj.103.a: "Asi si budu muset počkat s koupí lístku." # todo: NEW TRANSLATION
  r56_raj.104.t: "Zákon o stabilizaci zemědělství projde" # todo: NEW TRANSLATION
  r56_raj.104.d: "Zákon byl chválen jako hřebíček do rakve častých hladomorů v Indii a viceroy zdůraznil jeho výhody. Díky tomu byla podpora mezi hinduistickými a muslimskými zákonodárci ohromná a zákon prošel poměrně snadno." # todo: NEW TRANSLATION
  r56_raj.104.a: "Indie si může oddechnout." # todo: NEW TRANSLATION
  r56_raj.105.t: "Zákon o stabilizaci zemědělství neprojde" # todo: NEW TRANSLATION
  r56_raj.105.d: "I když byl tento zákon vnímán jako revoluční opatření k zabránění hladomorům, k nelibosti většiny Indů, nezískal v komorách Impéria dostatečnou podporu k přijetí.\nPlány ke zlepšení prevence škrtů byly již připraveny, ale nyní byly zrušeny." # todo: NEW TRANSLATION
  r56_raj.105.a: "Smutný stav věcí." # todo: NEW TRANSLATION
  r56_raj.106.t: "Zákon o reformě školství projde" # todo: NEW TRANSLATION
  r56_raj.106.d: "Nejjasnější a nejšikovnější z Indie dlouho migrovali do Britských ostrovů pro nejlepší vzdělání, zatímco opouštěli svou domovinu. Viceroy dlouho zdůrazňoval důležitost vybudování společnosti, v níž mohou intelektuálové skutečně vzkvétat; reforma našeho školského a univerzitního systému je logickým prvním krokem k tomuto cíli." # todo: NEW TRANSLATION
  r56_raj.106.a: "Před námi leží zářivá budoucnost." # todo: NEW TRANSLATION
  r56_raj.107.t: "Zákon o reformě školství neprojde" # todo: NEW TRANSLATION
  r56_raj.107.d: "Není jasné, co vedlo k bolestivé porážce zákona o reformě školství, když tolik sliboval. Ale jedno je jasné: Viceroyovy ruce budou v otázce vzdělávání svázány. Indie se ptá, co mohlo být." # todo: NEW TRANSLATION
  r56_raj.107.a: "Tak pojedu tedy do Londýna." # todo: NEW TRANSLATION
  r56_raj.108.t: "Zákon o pojištění projde" # todo: NEW TRANSLATION
  r56_raj.108.d: "Indie je často používána jako srovnání s mnoha jinými agrárními, zaostalými ekonomikami. To je do značné míry závislé na střední podpoře urbanizace a industrializace. Avšak zahraniční investice do našeho trhu mohou urychlit růst naší ekonomiky. Díky tomu podpořila mnoho opozičních členů tento průlomový návrh zákona." # todo: NEW TRANSLATION
  r56_raj.108.a: "Jsme otevřeni podnikání." # todo: NEW TRANSLATION
  r56_raj.109.t: "Zákon o pojištění neprojde" # todo: NEW TRANSLATION
  r56_raj.109.d: "To, co mělo být průlomový zákon umožňující další globální investice do agrárního subkontinentu, spektakulárně neprošlo. Viceroy do návrhu investoval mnoho času a úsilí, ale nepodařilo se mu přesvědčit většinu opozičních členů o jeho výhodách. Zahraniční investoři, kteří chtěli investovat, nyní stáhli krok zpět a raději investují do stabilnějších trhů." # todo: NEW TRANSLATION
  r56_raj.109.a: "Můj podnik si bude muset počkat." # todo: NEW TRANSLATION
  r56_raj.110.t: "Zákon o válečných pravomocích projde" # todo: NEW TRANSLATION
  r56_raj.110.d: "Jak Bf 110 přinášely zkázu v britském venkově, bylo jasné, že co Britské ostrovy potřebují, je jejich impérium. Zdá se, že impérium odpovědělo díky nejnovějšímu úspěchu zákona o válečných pravomocích v naší ctihodné legislativní radě. Indická správa nyní bude mít povoleno nasadit mnohem větší prostředky do druhé světové války." # todo: NEW TRANSLATION
  r56_raj.110.a: "Hurá do války!" # todo: NEW TRANSLATION
  r56_raj.111.t: "Zákon o válečných pravomocích neprojde" # todo: NEW TRANSLATION
  r56_raj.111.d: "Zákon byl těžko prodejný pro mnoho Indů, hindů i muslimů. Byli vtaženi do této války bez konzultace nebo ohledu; bylo předvídatelné, že Impérium legislativní rada, nyní převážně volená, hlasovala proti rozšíření exekutivních pravomocí v době války." # todo: NEW TRANSLATION
  r56_raj.111.a: "Co si o tom pomyslí Londýn?" # todo: NEW TRANSLATION
  r56_raj.112.t: "Setkání s legislativou" # todo: NEW TRANSLATION
  r56_raj.112.d: "Ač většina členů Impéria legislativní rady je jmenovaná, jejich loajalita nesměřuje jen vůči viceroyovi, ale také k jejich osobním zájmům a těm, kdo financují jejich kampaně. Setkání s radou bylo nicméně plodné; diskutovali jsme o mnoha budoucích plánech správy a zajistili jsme určitou podporu. Přestože to není slib, budeme potřebovat tyto hlasy, pokud chce správa Linlithgow být produktivní." # todo: NEW TRANSLATION
  r56_raj.112.a: "Jednou tu většinu vyřídíme." # todo: NEW TRANSLATION
  r56_raj.113.t: "Setkání s justicí" # todo: NEW TRANSLATION
  r56_raj.113.d: "Právní systém v Indii byl vždy složitý pro cizince s mnoha místními odvolacími soudy. Snad snadný první kontakt je Privy Council v Londýně. Má poslední slovo ve všech otázkách, ale málokdy zasahuje do indických záležitostí. Naším druhotným cílem bude setkání s místními vysokými soudy, které mají velkou moc v provinciích. Cokoliv uděláme pro zajištění jejich loajality, bude mít nejvyšší prioritu." # todo: NEW TRANSLATION
  r56_raj.113.a: "Propletená síť." # todo: NEW TRANSLATION
  r56_raj.114.t: "Naše první priorita" # todo: NEW TRANSLATION
  r56_raj.114.d: "S našimi kontakty v legislativě a justici je nyní na nás, kde začneme. Náš kabinet navrhl možnost rozšíření železnic nebo stabilizace zásob potravin; co zvolíme jako první, bude důležité." # todo: NEW TRANSLATION
  r56_raj.114.a: "Doprava zoufale potřebuje reformu." # todo: NEW TRANSLATION
  r56_raj.114.b: "Naše zemědělská situace je kritická." # todo: NEW TRANSLATION
  r56_raj.114.c: "Musíme se místo toho soustředit na válku!" # todo: NEW TRANSLATION
  r56_raj.115.t: "Ministerstvo průmyslu a práce" # todo: NEW TRANSLATION
  r56_raj.115.d: "Někdo může říci, že ministr průmyslu je jedním z nejmocnějších členů kabinetu v jakékoli správě, proto musíme pečlivě zvážit, kdo se ujme této role." # todo: NEW TRANSLATION
  r56_raj.115.a: "Půjdeme opatrně." # todo: NEW TRANSLATION
  r56_raj.115.b: "Najděme nejlepší ekonomy v zemi." # todo: NEW TRANSLATION
  r56_raj.116.t: "Ministerstvo obrany a válečných zásob" # todo: NEW TRANSLATION
  r56_raj.116.d: "S napětím na světě na vysoké úrovni může válka vypuknout kdykoli; musíme mít ministra obrany, který tomu bude čelit." # todo: NEW TRANSLATION
  r56_raj.116.a: "S pozemňákem posílíme mobilizaci." # todo: NEW TRANSLATION
  r56_raj.116.b: "Potřebujeme průmyslníka, který postaví válečný stroj." # todo: NEW TRANSLATION
  r56_raj.117.t: "Ministerstvo zdravotnictví, školství a zemědělství" # todo: NEW TRANSLATION
  r56_raj.117.d: "Zatímco ostatní ministerstva řeší průmyslový rozvoj a počty mobilizovaných, sociální resorty jsou srdcem Indie a musí být takto ošetřeny." # todo: NEW TRANSLATION
  r56_raj.117.a: "Konzervativní volba." # todo: NEW TRANSLATION
  r56_raj.117.b: "Progresivní volba." # todo: NEW TRANSLATION
  RAJ_agricultural_shipments: "Zásilky zemědělských produktů" # todo: NEW TRANSLATION
  RAJ_agricultural_shipments_desc: "V těchto velmi těžkých časech jsme vykonali svou povinnost a zajistili Indii dodávky potravin. Zachráněné duše jsou pravděpodobně v milionech a pokud nic jiného, přineslo nám to značnou prestiž mezi ostatními národy." # todo: NEW TRANSLATION
  raised_support_railway: "Budeme se soustředit na prosazení §YZákona o rozšíření železnic§!\n\n§YZákon o stabilizaci zemědělství§! bude uzamčen, dokud nedokončíme §YOtevřeno pro podnikání§!." # todo: NEW TRANSLATION
  raised_support_agri: "Budeme se soustředit na prosazení §YZákona o stabilizaci zemědělství§!\n\n§YZákon o rozšíření železnic§! bude uzamčen, dokud nedokončíme §YMinisterstvo válečných studií§!." # todo: NEW TRANSLATION
  raised_support_war: "Bude §Ymírně§! zvýšena podpora pro §YZákon o válečných pravomocích§!" # todo: NEW TRANSLATION
