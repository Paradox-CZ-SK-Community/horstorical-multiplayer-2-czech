  JAP_ventures_in_indonesia: "Zásahy v Nizozemské Východní Indii" # todo: NEW TRANSLATION
  JAP_occupied_timor: "Okupovaný Timor" # todo: NEW TRANSLATION
  JAP_transferred_timor: "Převedený Timor" # todo: NEW TRANSLATION
  JAP_USA_pre_emptive_strike_on_fleet_in_pearl_harbor_tt: "Pokud bude tento cíl dokončen před §YStrike on the Southern Resource Area§!, pak se při vyhlášení války proti [ENG.GetFactionName] stane následující:\n\n" # todo: NEW TRANSLATION
  JAP_the_southern_colonies: "Jižní kolonie" # todo: NEW TRANSLATION
  JAP_the_southern_colonies_desc: "Navzdory našemu odchodu ze Společnosti národů stále udržujeme kontrolu nad mandátem Jižního moře. Pro naše tichomořské zájmy je zásadní, aby všechny naše jižní ostrovy byly řádně rozvinuty a aby jejich obyvatelé znali své místo v Impériu." # todo: NEW TRANSLATION
  JAP_develop_the_south: "Rozvoj Jižních moří" # todo: NEW TRANSLATION
  JAP_develop_the_south_desc: "Zatímco Tchaj-wan a mandát jsou finančně soběstačné, je stále mnoho práce. Prostřednictvím našich osadníků a správy můžeme podpořit rozvoj infrastruktury a podnikání." # todo: NEW TRANSLATION
  JAP_stengthen_taiwan: "Posílit Tchaj-wan" # todo: NEW TRANSLATION
  JAP_stengthen_taiwan_desc: "Tchaj-wan byl první kolonií v našem impériu a nyní je jedním z nejdůležitějších. Bude odrazovým můstkem pro jakýkoli útok na jih. Proto jeho průmyslový rozvoj posílíme, aby podporoval naše síly." # todo: NEW TRANSLATION
  JAP_island_industry: "Podpořit ostrovní průmysl" # todo: NEW TRANSLATION
  JAP_island_industry_desc: "Investice do Jižních moří umožnily dramatický nárůst jejich produktivity. Vhodná podpora místního průmyslu by výrazně zvýšila produkci z regionu." # todo: NEW TRANSLATION
  JAP_ease_native_restrictions: "Uvolnit restrikce vůči domorodcům" # todo: NEW TRANSLATION
  JAP_ease_native_restrictions_desc: "Omezení uložená naší nadvládou vyvolala nelibost mezi domorodým obyvatelstvem ostrovů. Uvolněním těchto omezení můžeme vytvořit příznivější obraz toho, co znamená být poddaným Impéria." # todo: NEW TRANSLATION
  JAP_island_fortifications: "Ostrovní opevnění" # todo: NEW TRANSLATION
  JAP_island_fortifications_desc: "Ostrovy mandátu jsou našimi nejobtížněji chránitelnými držbami. I když podmínky naší kontroly zakazují jejich opevňování, bylo by nerozumné nevyužít tyto nespotopitelné letadlové lodě." # todo: NEW TRANSLATION
  JAP_improve_ssdc: "Podpořit Nanyo Kohatsu" # todo: NEW TRANSLATION
  JAP_improve_ssdc_desc: "S evidentním úspěchem Nanyo Kohatsu se Námořnictvo rozhodlo firmu dále financovat. Tato dohoda usnadní naše ekonomické a rozvojové cíle v Jižním Pacifiku." # todo: NEW TRANSLATION
  JAP_upgrade_nanyo_kohatsu_tt: "Upravit průmyslového designéra §Y$south_seas_development$§! o: Spotřební továrny: §Y-2.0%§! \n§YRychlost výstavby §Yletové základny§!: §G+5.00%§! \n§YRychlost výstavby §YNámořní základny§!: §G+5.00%§! \n§YRychlost výstavby §YAni- Air§!: §G+5.00%§! \n\n" # todo: NEW TRANSLATION
  JAP_foothold_in_timor: "Základna v Timoru" # todo: NEW TRANSLATION
  JAP_foothold_in_timor_desc: "Námořnictvo vypracovalo plán, jak zlomit holandský monopol na obchod z Timoru. S využitím společnosti Nanyo Kohatsu můžeme dále prosazovat strategické cíle v regionu založením společných podniků s domorodými obyvateli." # todo: NEW TRANSLATION
  JAP_continue_truk_fortifications: "Pokračovat v opevňování Truku" # todo: NEW TRANSLATION
  JAP_continue_truk_fortifications_desc: "Laguna Truk je hlavním opěrným bodem japonského císařského námořnictva v Jižním Pacifiku. Zvýšení jejích opevnění a zařízení výrazně zajistí naši dominanci v regionu." # todo: NEW TRANSLATION
  GER_bob: "Bitva o Británii" # todo: NEW TRANSLATION
  GER_bob_desc: "Musíme vzít boj do Spojeného království a bombardováním je přinutit k podřízenosti. Pouze silná letecká kampaň může přesvědčit Británii podepsat mírovou smlouvu." # todo: NEW TRANSLATION
  HUN_arrow_cross_deal_2: "Zmocnit Szálasiho" # todo: NEW TRANSLATION
  HUN_arrow_cross_deal_2_desc: "Se sjednocením a konsolidací všech fašistických stran je čas naposledy přejmenovat stranu: Strana šípového kříže. Ferenc Szálasi převzal plnou kontrolu nad všemi aspekty strany a za pár týdnů oficiálně stane vůdcem Maďarska. Šípový kříž je starodávným symbolem kmenového Maďarska, stejně jako znamením našeho záměru zrušit Trianonskou smlouvu a rozšířit naše hranice." # todo: NEW TRANSLATION
  HUN_fascism_warning_tt: "\nMaďarsko zůstane neangažované, pokud nebude před dokončením tohoto cíle provedeno §HStrengthen Fascists§! nebo §HElect a Fascist King§!." # todo: NEW TRANSLATION
  HUN_enforce_corporatism_1: "Uplatnit korporativismus" # todo: NEW TRANSLATION
  HUN_enforce_corporatism_1_desc: "Naše nová společnost může fungovat pouze, pokud má každý schopný jedinec svůj úkol. Italové mají velmi dobrý systém zvaný korporativismus, který dělí společnost na různé korporátní skupiny podle společných zájmů. Uplatněním tohoto systému můžeme maximalizovat výrobu v továrnách a přestavět společnost podle svých představ." # todo: NEW TRANSLATION
  HUN_consolidate_horthys_power_1: "Centralizovat moc" # todo: NEW TRANSLATION
  HUN_consolidate_horthys_power_1_desc: "Maďarsko je už více než desetiletí královstvím bez krále. Politické napětí, které to způsobilo, dosahuje bodu varu, a pokud nebudeme jednat rychle, může to vést ke zhroucení systému, jak ho známe. Musíme zajistit, aby [ROOT.GetLeader] nejen udržel, ale rozšířil své pravomoci, aby udržel kontrolu pevnou rukou v těchto obtížných časech." # todo: NEW TRANSLATION
  HUN_szalasi_ferenc: "Ferenc Szálasi" # todo: NEW TRANSLATION
  HUN_call_for_a_revisionist_king: "Nová dynastie" # todo: NEW TRANSLATION
  HUN_call_for_a_revisionist_king_desc: "Národ volá po návratu k naší staré slávě. Habsburkové měli svou šanci a zklamali. Je čas hledat krále jinde. Měli bychom nabídnout našemu současnému regentovi Miklósi Horthymu titul vzhledem k jeho hrdinskému postavení v očích populace." # todo: NEW TRANSLATION
  HUN_ban_arrow_cross: "Uvést Szálasiho do vězení" # todo: NEW TRANSLATION
  HUN_ban_arrow_cross_desc: "Ferenc Szálasi způsobil v zemi příliš mnoho problémů, aby mohl zůstat na svobodě ještě den. Od doby, kdy byla jeho první strana NAP zakázána, čelil desítkám žalob. Nedostatek důkazů způsobil, že tyto soudy byly dlouho odkládány, a konečně nastal čas vynést konkrétní verdikt: Vinen." # todo: NEW TRANSLATION
  HUN_strengthen_the_regency_1: "Posílit regentství" # todo: NEW TRANSLATION
  HUN_strengthen_the_regency_1_desc: "Miklós Horthy všem dokázal, že je plně způsobilý vést národ i bez oficiálního královského titulu. Nevidíme důvod, proč by se Maďarsko mělo vracet ke monarchii, pokud Horthyho vláda zcela postačuje. Tím, že nebude ani králem, ani diktátorem, může opatrně řídit nadcházející politický chaos v Evropě, aniž by se musel plně přiklonit k jakékoli straně." # todo: NEW TRANSLATION
  HUN_arrow_cross_deal_1: "Domluvit se s fašisty" # todo: NEW TRANSLATION
  HUN_arrow_cross_deal_1_desc: "Přijmeme fašistickou platformu Ference Szálasiho a začneme s nimi pracovat na obnově ztracených maďarských území. Už nebudeme Stranu šípového kříže potlačovat ani bojovat proti ní." # todo: NEW TRANSLATION
  HUN_calvinist_tt: "Pokud Horthy nepřestoupí na katolicismus před korunovací, rozhněvá to obyvatelstvo a šlechtu!\n\n" # todo: NEW TRANSLATION
  HUN_coopt_fascists_tt: "\nPokud s fašistickými prvky ve společnosti aktivně nespolupracujeme a je nekointegujeme, budeme se muset vypořádat s nepřátelským podzemním fašistickým hnutím!\n\n" # todo: NEW TRANSLATION
  HUN_crown_king_1: "Korunovat Horthyho" # todo: NEW TRANSLATION
  HUN_crown_king_1_desc: "Miklós Horthy, náš současný regent, admirál rakousko-uherské flotily, válečný hrdina a oblíbená osobnost národa, bude novým králem Maďarska. S ním bude konečně země mít maďarského krále po stovkách let cizích panovníků. On je ten, kdo povede náš národ ke slávě." # todo: NEW TRANSLATION
  HUN_convert_horthy: "Horthy konvertuje" # todo: NEW TRANSLATION
  HUN_convert_horthy_desc: "Rodina Horthyů pochází z dlouhé řady kalvinistů. Pokud má Horthy založit novou královskou a autenticky maďarskou dynastii, musí se nejprve přestoupit k náboženství svého lidu, ke katolicismu." # todo: NEW TRANSLATION
  USA_fire_king: "Odvolat Ernesta Kinga" # todo: NEW TRANSLATION
  USA_fire_king_desc: "Anglofobie Ernesta Kinga omezuje naše vztahy s spojenci a vede nás k podpoře projektů, které jsou neefektivní, jako torpédo Mark 14." # todo: NEW TRANSLATION
  FRA_operation_dragoon: "Operace Dragoon" # todo: NEW TRANSLATION
  FRA_operation_dragoon_desc: "Amfibické vylodění v jižní Francii může odvést německé jednotky od Atlantického valu a umožnit vážnější invazi v severní Francii." # todo: NEW TRANSLATION
  RAJ_indian_labor: "Indičtí dělníci" # todo: NEW TRANSLATION
  RAJ_indian_labor_desc: "Britské impérium je obrovské a zoufale potřebuje pracovní sílu k budování silnic, opevnění a železnic pro válečné úsilí." # todo: NEW TRANSLATION
  CAN_ford_general_motors: "Ford Canada" # todo: NEW TRANSLATION
  CAN_ford_general_motors_desc: "Rozšíření operací americké automobilky 'Ford Motor Company' zvýší naši produkci nákladních vozidel a polopásových vozidel." # todo: NEW TRANSLATION
  CAN_ford_general_motors_idea: "Ford Canada" # todo: NEW TRANSLATION
  SOV_rehabilitated_military_buffs_tt: "§YNa výběr:§!\nPřidat §YMoscow Strategic Offensive Operation§!, která dává (£attack_texticon  Útok divize: §G+20.0%§!) na §Y60§! dní.\n\n" # todo: NEW TRANSLATION
  ROM_modern_at_guns_2: "Protitankový kanón 75 mm Resita model 1943" # todo: NEW TRANSLATION
  ROM_modern_at_guns_2_desc: "75 mm Resita model 1943 je ohromující inovací v protitankovém designu." # todo: NEW TRANSLATION
  HUN_hussar_doctrine: "Husarská doktrína" # todo: NEW TRANSLATION
  HUN_hussar_doctrine_desc: "Rychlost a manévrování jsou doktrínou Husara, a stejně tak bude doktrínou naší armády." # todo: NEW TRANSLATION
  HUN_mechanized_hussars: "Moderní husarové" # todo: NEW TRANSLATION
  HUN_mechanized_hussars_desc: "Mechanizace je budoucností mobilní pěchoty." # todo: NEW TRANSLATION
  HUN_arpad_line: "Postavit Árpádovu linii" # todo: NEW TRANSLATION
  HUN_arpad_line_desc: "Postavíme síť lehkých opevnění modelovaných podle Mannerheimovy linie v Karpatech podle teorie generála Hárosyho 'flexibilní obrany'." # todo: NEW TRANSLATION
  HUN_arpad_line_tt: "Odemkneme rozhodnutí pro stavbu obranné linie přes pohoří Karpaty.\n\n" # todo: NEW TRANSLATION
  HUN_theory_of_flexible_defence: "Teorie flexibilní obrany" # todo: NEW TRANSLATION
  HUN_theory_of_flexible_defence_desc: "Generál Teofil Hárosy vyvinul novou teorii obranného boje. Flexibilní obrana uzavírala jen možné zásobovací linie, takže nepřítel mohl opevněnou linii obejít, ale každá bitevní skupina bez doplňování zásob rychle vyčerpala střelivo a potraviny." # todo: NEW TRANSLATION
  HUN_study_rocket_designs: "Studium německých raketových návrhů" # todo: NEW TRANSLATION
  HUN_study_rocket_designs_desc: "Pokroky v raketové technice u Němců je třeba pečlivě studovat, aby je bylo možné naučit se a reverzně inženýrsky přetvořit v raketovou dělostřelbu." # todo: NEW TRANSLATION
  poglavnik: "Poglavnik" # todo: NEW TRANSLATION
  HUN_militarize_the_levente: "Zmílitární Levente" # todo: NEW TRANSLATION
  HUN_militarize_the_levente_desc: "Levente sdružení jsou naším prostředkem, jak obejít Trianonskou smlouvu tím, že stovky tisíc naší mládeže umístíme pod vedení a výcvik vojenských veteránů, aniž bychom formálně zvyšovali velikost ozbrojených sil. Militarizace hnutí by výrazně posílila naši pracovní sílu." # todo: NEW TRANSLATION
  HUN_increase_metal_processing_capacity: "Zvýšit kapacitu zpracování kovů" # todo: NEW TRANSLATION
  HUN_increase_metal_processing_capacity_desc: "Čím více rudy vytěžíme, tím více kovů musíme zpracovat." # todo: NEW TRANSLATION
  HUN_invest_in_north_transylvanian_mining: "Investovat do těžby v severním Sedmihradsku" # todo: NEW TRANSLATION
  HUN_invest_in_north_transylvanian_mining_desc: "Sedmihradsko má silnou těžební historii sahající stoletími zpět. I když nerosty nepřinesou přímo suroviny využitelné pro válečné továrny, těžené minerály budou stále významně přispívat k ekonomice." # todo: NEW TRANSLATION
  HUN_support_urbanization_2: "Rozvíjet Budapešť" # todo: NEW TRANSLATION
  HUN_support_urbanization_2_desc: "Měli bychom soustředit naše rozvojové úsilí na to, aby se z Budapešti stalo světové město." # todo: NEW TRANSLATION
  HUN_mountain_artillery: "Horská dělostřelba" # todo: NEW TRANSLATION
  HUN_mountain_artillery_desc: "Naše hranice se Sovětským svazem jsou poseté horami a kopci — musíme se naučit, jak tam obsluhovat dělostřelectvo, pokud chceme Maďarsko bránit." # todo: NEW TRANSLATION
  CRO_nuclear_effort: "Tomislavova síla" # todo: NEW TRANSLATION
