  JAP_INS_deal_with_the_pdri: "Vyřešit PDRI" # todo: NEW TRANSLATION
  JAP_INS_deal_with_the_pdri_EXPL1: "§H[INS.GetFascistParty]§! bude shromažďovat §GPodporu§! a §GSabotáže§! protivníků v Indonésii. Pokud bude úspěšné, spustí se plnohodnotná §HCivilní válka§!.\n" # todo: NEW TRANSLATION
  JAP_INS_deal_with_the_pdri_EXPL2: "\nToto je §CReaktivní fokus§!. Pokud [INS.GetFlag]§H[INS.GetName]§! není §HPuppet§!, tento fokus místo toho vykáže následující §GEfekty§!:\n" # todo: NEW TRANSLATION
