  RAJ_british_departure: "Odchod Britů" # todo: NEW TRANSLATION
  RAJ_british_departure_desc: "Jak britská autorita rychle padá, je čas chopit se dne a zorganizovat náš politický systém." # todo: NEW TRANSLATION
  RAJ_assemble_the_congress: "Svolat Kongres" # todo: NEW TRANSLATION
  RAJ_assemble_the_congress_desc: "S naší svobodou od Britů musí Kongres projednat reformy." # todo: NEW TRANSLATION
  RAJ_concessions_to_the_untouchables: "Ústupky nedotknutelným" # todo: NEW TRANSLATION
  RAJ_concessions_to_the_untouchables_desc: "Jako nejnižší kasta jsou nedotknutelní pohrdáni celou společností, ale představují populární sílu, kterou je třeba uznat. Hnutí vedené Bhimrao Ramji Ambedkarem by mohlo narušit tkáň společnosti, pokud ho neuznáme. Je jasné, že praktické ústupky se snáze realizují než sledovat jejich konverzi k islámu, křesťanství nebo dokonce k ateistickému komunismu." # todo: NEW TRANSLATION
  RAJ_modernization_program: "Program modernizace" # todo: NEW TRANSLATION
  RAJ_modernization_program_desc: "S odstraněním koloniálních monopolů lze vybudovat novou ekonomiku. Do roku 2020 budeme velmocí!" # todo: NEW TRANSLATION
  RAJ_a_new_indian_elite_focus: "Nová indická elita" # todo: NEW TRANSLATION
  RAJ_a_new_indian_elite_focus_desc: "Indičtí průmyslníci byli aktivní již za kolonialismu, ale museli fungovat v rámci koloniálních omezení. S odchodem britských vládců nastane vzestup indické elity." # todo: NEW TRANSLATION
  RAJ_towards_a_post_colonial_economy: "K postkoloniální ekonomice" # todo: NEW TRANSLATION
  RAJ_towards_a_post_colonial_economy_desc: "Ekonomické reformy a uvolnění indického potenciálu přinesou vzestup indických podniků." # todo: NEW TRANSLATION
  RAJ_influence_of_the_radicals: "Vliv radikálů" # todo: NEW TRANSLATION
  RAJ_influence_of_the_radicals_desc: "Radikálové z All India Forward Bloc jsou stále aktivnější a zpochybňují nenásilné učení Kongresu." # todo: NEW TRANSLATION
  RAJ_indian_socialism: "Indický socialismus" # todo: NEW TRANSLATION
  RAJ_indian_socialism_desc: "Cílem vybudování společné indické společnosti, kde náboženství a kasty nás nerozdělí, je jasná a světlá budoucnost." # todo: NEW TRANSLATION
  RAJ_religious_equality: "Náboženská rovnost" # todo: NEW TRANSLATION
  RAJ_religious_equality_desc: "Ačkoliv marxismus prosazuje zrušení náboženství, víme, že to nyní nelze zavést, ale můžeme alespoň odstranit náboženství jako faktor rozdělení společnosti." # todo: NEW TRANSLATION
  RAJ_popular_mobilization: "Populární mobilizace" # todo: NEW TRANSLATION
  RAJ_popular_mobilization_desc: "S marginalizovanými masami dalitů, chudými rolníky a vykořisťovanými dělníky jsou nyní politicky probuzeni pro své vysvobození prací pro dobro revoluce. Je čas vybudovat armádu připravenou bránit novou Indii." # todo: NEW TRANSLATION
  RAJ_collectivism: "Kolektivismus" # todo: NEW TRANSLATION
