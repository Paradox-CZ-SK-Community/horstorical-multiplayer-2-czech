  JAP_colonize_siberian_territories_desc: "" # todo: NEW TRANSLATION
  JAP_expand_resource_deposits_in_transamur: "Rozšířit ložiska zdrojů v Transamuru" # todo: NEW TRANSLATION
  JAP_expand_resource_deposits_in_transamur_desc: "" # todo: NEW TRANSLATION
  JAP_coal_gold_and_silver_of_siberia: "Uhlí, zlato a stříbro\nSibiře" # todo: NEW TRANSLATION
  JAP_coal_gold_and_silver_of_siberia_desc: "" # todo: NEW TRANSLATION
  JAP_expand_resource_deposits_in_irkutsk: "Rozšířit ložiska v Irkutsku" # todo: NEW TRANSLATION
  JAP_expand_resource_deposits_in_irkutsk_desc: "" # todo: NEW TRANSLATION
  ROM_lessons_of_war: "Lekce války" # todo: NEW TRANSLATION
  ROM_lessons_of_war_desc: "Po nějaké době bojů jsme se mnoho naučili. Můžeme toho využít a zlepšit naše generály a důstojníky." # todo: NEW TRANSLATION
  ROM_romanian_rearmament: "Začít přezbrojování" # todo: NEW TRANSLATION
  ROM_romanian_rearmament_desc: "Vzestup Hitlera v Německu, kombinovaný se Stalinovými ambicemi ve východní Evropě, je znepokojující. Rumunské ozbrojené síly se musí připravit na budoucí konflikt a především musí být připraveny bránit suverenitu Rumunska." # todo: NEW TRANSLATION
  staunch_traditionalist: "Zarytý traditionalista" # todo: NEW TRANSLATION
  ROM_this_will_stop_terrorist_attacks_tt: "Dokončením tohoto fokusu zastavíte probíhající §Yteroristické útoky Železné gardy§! proti národu." # todo: NEW TRANSLATION
  ROM_deploy_reserve_divisions_tt: "Tento §YFokus§! nasadí §Y5§! záložních divizí k posílení naší současné armády." # todo: NEW TRANSLATION
  ROM_secured_our_territorial_integrity_tt: "\nDíky naší nedávné adopci ideologie nacismu jsme se diplomaticky přiblížili k §Y[GER.GETNAME]§! a tím si zajistili pozici, kde perspektiva většího Rumunska zůstane zachována.\n" # todo: NEW TRANSLATION
  trait_industrial_concern: "Průmyslová starost" # todo: NEW TRANSLATION
  ROM_for_the_preservation_of_greater_romania: "Pro zachování Velkého Rumunska" # todo: NEW TRANSLATION
  ROM_for_the_preservation_of_greater_romania_desc: "Dokončili jsme úkol našich předků, vybudovat navždy to, co Michael Veliký dokázal jen na okamžik — totiž rumunské sjednocení na obou svazích Karpat. Je naší povinností zajistit, aby nám žádný faktor toto dílo nikdy neodebral." # todo: NEW TRANSLATION
  ROM_honoring_the_crusade_against_atheism: "Vzdát hold křížové výpravě proti ateismu" # todo: NEW TRANSLATION
  ROM_honoring_the_crusade_against_atheism_desc: "Jakýkoli člověk bez víry nelze nikdy věřit. Naší povinností je odstranit myšlenku „ateismu“ z Rumunska." # todo: NEW TRANSLATION
  ROM_reject_french_containment_strategies: "Odmítnout francouzské strategie zadržování" # todo: NEW TRANSLATION
  ROM_reject_french_containment_strategies_desc: "Německo se zbavilo okovů Versailleské smlouvy; Francie se ukázala být nerozhodná a slabá v její prosazování. Možná je čas se od Francouzů distancovat a začít mluvit s národy blíže k nám, možná i s Německem." # todo: NEW TRANSLATION
  ROM_the_decay_of_democracy: "Rozklad demokracie" # todo: NEW TRANSLATION
  ROM_the_decay_of_democracy_desc: "Demokratické strany jsou mačkány mezi konflikty s Železnou gardou a autoritářskými tendencemi krále Karola II. Je pochybná délka, jak dlouho dokážeme udržet takové zmatené politické prostředí." # todo: NEW TRANSLATION
  ROM_elections_of_1937: "Poslední kapka" # todo: NEW TRANSLATION
  ROM_elections_of_1937_desc: "Naše země už nemůže snášet veškeré to politické zmatky. Buď musí být králi Karolovi II. dána volná ruka, aby učinil rozhodná opatření, nebo konečně musíme povolit Železné gardě naplnit rumunské ambice." # todo: NEW TRANSLATION
  ROM_institute_a_royal_dictatorship: "Královská diktatura" # todo: NEW TRANSLATION
  ROM_institute_a_royal_dictatorship_desc: "Násilná volební kampaň hrozí vrhnout národ do občanské války. Král Karol II. vyhlásí výjimečný stav a pozastaví občanská práva. Zajistí obnovení stability v naší veliké zemi." # todo: NEW TRANSLATION
  ROM_imprison_the_iron_guard: "Noc upírů" # todo: NEW TRANSLATION
  ROM_imprison_the_iron_guard_desc: "Založením Securitate, zcela nové státní bezpečnostní síly, můžeme konečně organizovat útok na Železnou gardu terorizující národ. Noc upírů bude organizována k současnému a rychlému potlačení Železné gardy." # todo: NEW TRANSLATION
  ROM_form_the_front_of_national_rebirth: "Založit Frontu národního znovuzrození" # todo: NEW TRANSLATION
  ROM_form_the_front_of_national_rebirth_desc: "Musíme čelit alarmujícímu vlivu Železné gardy. Vytvoříme Frontul Renașterii Naționale, aby ji vyvážila a posílila a chránila zájmy krále." # todo: NEW TRANSLATION
  ROM_fascist_economics: "Fašistická ekonomika" # todo: NEW TRANSLATION
  ROM_fascist_economics_desc: "My i zbytek světa jsme byli svědky rychlého ekonomického oživení v Německu. Je čas přijmout některé z jejich politik k rozvoji naší ekonomiky." # todo: NEW TRANSLATION
  ROM_operetta_fascism: "Operetní fašismus" # todo: NEW TRANSLATION
  ROM_operetta_fascism_desc: "Musíme přijmout symboly, uniformy a saluty, abychom utvrdili NRF jako jedinečnou stranu, ne jen kopii NSDAP nebo PNF." # todo: NEW TRANSLATION
  ROM_sentinels_of_the_motherland: "Strážci vlasti" # todo: NEW TRANSLATION
  ROM_sentinels_of_the_motherland_desc: "Frontul Renașterii Naționale bude formovat mládež naší země v vzorové občany a zároveň plnit sekundární roli proti rostoucímu vlivu Železné gardy nad rumunskou mládeží." # todo: NEW TRANSLATION
  ROM_pressure_antonescu_into_becoming_prime_minister: "Conducător" # todo: NEW TRANSLATION
  ROM_pressure_antonescu_into_becoming_prime_minister_desc: "Ion Antonescu se stal ve společnosti stále populárnějším. Při masovém neklidu v zemi je jedním z mála, kdo může obnovit pořádek v Rumunsku." # todo: NEW TRANSLATION
  ROM_arrest_general_antonescu: "Zatknout generála Antonesca" # todo: NEW TRANSLATION
  ROM_arrest_general_antonescu_desc: "Antonescuův postoj proti králi je problematický. Je nezbytné, podle králových instrukcí, aby byl zadržen kvůli zajištění stability a zabránění napjaté atmosféře v zemi." # todo: NEW TRANSLATION
  ROM_antonescus_coup_detat: "Antonescův státní převrat" # todo: NEW TRANSLATION
  ROM_antonescus_coup_detat_desc: "Král Karol II. je pro celou zemi trapný. Neměl ani slušnost odstoupit; nastal čas, aby generál Antonescu převzal moc a dal zemi správu do pořádku." # todo: NEW TRANSLATION
  ROM_ask_codreanue_to_form_government: "Podvolit se Železné gardě" # todo: NEW TRANSLATION
  ROM_ask_codreanue_to_form_government_desc: "Železná garda postupně nabývá na popularitě. Mnoho mladší rumunské inteligence, zvláště vysokoškolských studentů, je přitahováno glorifikací 'rumunského génia' a jeho vůdců, kteří se chlubí, že jsou hrdi mluvit rumunsky proti francofilské elitě; možná je čas, aby měli větší podíl na vládě." # todo: NEW TRANSLATION
  ROM_national_legionary_state: "Národní legiový stát" # todo: NEW TRANSLATION
  ROM_national_legionary_state_desc: "Musíme zmocnit vládu, aby zajistila větší stabilitu v Rumunsku. K tomu přetvoříme stát na fašistický jednopartijní totalitní diarchický režim." # todo: NEW TRANSLATION
  ROM_dismantle_the_monarchy: "Rozmontovat monarchii" # todo: NEW TRANSLATION
  ROM_dismantle_the_monarchy_desc: "Král Karol II., se svou hrubou neschopností a přehnaným způsobem života, se ukázal být neschopným vládcem. Musí být odstraněn a aby nikdo jako on nikdy více neohrozil národ, musí být systém monarchie rozmontován." # todo: NEW TRANSLATION
  ROM_integrate_the_iron_guard_into_the_army: "Integrovat Železnou gardu do armády" # todo: NEW TRANSLATION
  ROM_integrate_the_iron_guard_into_the_army_desc: "Železná garda je vysoce ozbrojená polovojenská síla disponující vše od revolverů po kulomety a vlastními nákladními vozy. Naše ozbrojené síly budou značně profitovat z přílivu nových mužů z Železné gardy." # todo: NEW TRANSLATION
  ROM_secure_our_territorial_integrity: "Zajistit naši územní integritu" # todo: NEW TRANSLATION
  ROM_secure_our_territorial_integrity_desc: "Dnes stojíme ve Velkém Rumunsku; máme velké území k administrování. Musíme mít politické a fyzické prostředky zajistit jeho integritu." # todo: NEW TRANSLATION
  ROM_abandon_the_ententes: "Opustit všechny naše bývalé aliance" # todo: NEW TRANSLATION
  ROM_abandon_the_ententes_desc: "Francouzi se ukázali být příliš slabí přinutit Německo odpovědět za porušení Versailleské smlouvy; možná je nejlepší a v zájmu našeho národa opustit naše staré přátelství a navázat nové." # todo: NEW TRANSLATION
  ROM_co_conducator: "Spoluvůdce" # todo: NEW TRANSLATION
  ROM_co_conducator_desc: "Generál Antonescu se ukázal být populární osobností a projevil sympatie k naší věci. Abychom zvýšili naši popularitu, musíme najít způsob, jak jej začlenit do režimu." # todo: NEW TRANSLATION
  ROM_order_of_the_dragon: "Řád dračího" # todo: NEW TRANSLATION
  ROM_order_of_the_dragon_desc: "Řád draka nebo Societas Draconistarum byl monarchickým rytířským řádem pro vybranou vyšší šlechtu a panovníky. Byl formován podle vojenských řádů křižáků, vyžadoval, aby jeho iniciovaní bránili kříž a bojovali proti nepřátelům křesťanství. Dnes zahrne i letecké rytíře Rumunska, kteří budou bránit svou vlast jako jejich předchůdci." # todo: NEW TRANSLATION
  ROM_romanian_aircraft_purchasing_commission: "Komise pro nákup letadel" # todo: NEW TRANSLATION
  ROM_romanian_aircraft_purchasing_commission_desc: "Naše domácí průmyslová a technologická odbornost je značně pozadu za hlavními evropskými zeměmi. Zřídíme komisi, která přezkoumá a případně zakoupí zahraniční letadla a jejich konstrukce." # todo: NEW TRANSLATION
  ROM_light_metal_production: "Domácí výroba materiálu" # todo: NEW TRANSLATION
  ROM_light_metal_production_desc: "Naše země má značné suroviny, které pokud jsou těženy a zpracovány správně, mohou poskytnout našemu začínajícímu leteckému průmyslu stálý a spolehlivý zdroj." # todo: NEW TRANSLATION
  ROM_invite_german_air_companies: "Pozvat německé letecké společnosti" # todo: NEW TRANSLATION
  ROM_invite_german_air_companies_desc: "Německé letectvo — Luftwaffe se ukázalo být extrémně mocné; letectvo je ale jen tolik dobré jako jeho letadla. Měli bychom pozvat některé z jejich leteckých společností do naší země." # todo: NEW TRANSLATION
  ROM_copy_succesful_german_fighters: "Kopírovat úspěšné německé stíhačky" # todo: NEW TRANSLATION
  ROM_copy_succesful_german_fighters_desc: "Němci vyvinuli a používají některá z nejlepších letadel současnosti; možná můžeme 'některé' nápady z jejich konstrukcí převzít, abychom posílili naše vlastní návrhy a vyráběli moderní letadla." # todo: NEW TRANSLATION
  ROM_prioritize_aircraft_industry: "Prioritizovat práci pro letecký průmysl" # todo: NEW TRANSLATION
  ROM_prioritize_aircraft_industry_desc: "Letadla jsou vrcholem lidského inženýrství. Potřebujeme precizní pracovní sílu k výrobě těchto složitých strojů, proto bude letecký průmysl upřednostněn a naše nejlepší pracovní síly budou alokovány k výrobě těchto létajících strojů." # todo: NEW TRANSLATION
  ROM_expand_the_army: "Rozšířit armádu" # todo: NEW TRANSLATION
  ROM_expand_the_army_desc: "Armáda je nástroj, jímž národ naplňuje své ambice. Musíme zavést brannou povinnost, zvýšit výcvik a zavést nové zbraně, abychom armádu rozšířili a posílili." # todo: NEW TRANSLATION
  ROM_expand_small_arms_manufacturing: "Výroba malých zbraní" # todo: NEW TRANSLATION
  ROM_expand_small_arms_manufacturing_desc: "Armáda je jen tak dobrá, jak dobré jsou zbraně, které používá. Proto zahájíme výrobu pušek dobré kvality v dostatečném množství pro armádu." # todo: NEW TRANSLATION
  ROM_deploy_reserve_divisions: "Nasadit záložní divize" # todo: NEW TRANSLATION
  ROM_deploy_reserve_divisions_desc: "V rámci našeho většího programu rozšíření armády svoláme naše záložní divize a nasadíme je k posílení síly fronty." # todo: NEW TRANSLATION
  ROM_grand_army: "Velká armáda" # todo: NEW TRANSLATION
  ROM_grand_army_desc: "Úspěšně jsme zavedli několik politik k rozšíření armády. Tyto politiky nyní konečně přetvářejí naši dříve žalostnou armádu ve 'Velkou armádu'." # todo: NEW TRANSLATION
  ROM_import_and_convert_antique_artillery: "Konvertovat staré dělostřelectvo" # todo: NEW TRANSLATION
  ROM_import_and_convert_antique_artillery_desc: "Nedávné studie našich hlavních důstojníků zjistily, že náš současný kalibr děla, úsťové rychlosti a mobilita nejsou vhodné pro moderní bojiště. Zahájíme program na přestavbu většiny našich zastaralých děl." # todo: NEW TRANSLATION
  ROM_organizing_logistics: "Organizace logistiky" # todo: NEW TRANSLATION
  ROM_organizing_logistics_desc: "Armáda nemůže bojovat na prázdné žaludky. Zřízení procedur pro řízení našich logistických linek může mít velký význam, aby frontový rumunský voják nikdy nemusel bojovat na prázdný žaludek." # todo: NEW TRANSLATION
  ROM_modernize_the_army: "Modernizace armády" # todo: NEW TRANSLATION
  ROM_modernize_the_army_desc: "Pouhá čísla nezaručí vítězství. Některé naše polní divize jsou stále vyzbrojeny zastaralými zbraněmi z velké války. Musíme přesměrovat financování k vybavení rumunské armády moderními zbraněmi na úrovni našich sousedů." # todo: NEW TRANSLATION
  ROM_focus_on_support_tanks: "Zaměřit se na podpůrné tanky" # todo: NEW TRANSLATION
  ROM_focus_on_support_tanks_desc: "Výroba tanku je nákladná a složitá; můžeme vytvořit alternativy ve formě 'lashupů' nebo dedikovaných samohybných děl navržených od základu, které i přes nízké náklady mohou poskytnout rumunskému pěšímu vojáku nezbytnou palebnou podporu." # todo: NEW TRANSLATION
  ROM_the_R_series: "Střední tank R‑Series" # todo: NEW TRANSLATION
  ROM_the_R_series_desc: "Češi vyvinuli LT‑35 a Francouzi R35. Naše blízké vztahy s těmito zeměmi nám mohou umožnit tyto tanky nakoupit za relativně nízké ceny. Tato vozidla a jejich deriváty mohou být okamžitě nasazeny v rumunské službě jako R‑Serie." # todo: NEW TRANSLATION
  ROM_the_magpie_scheme: "Zachraňte všechno!" # todo: NEW TRANSLATION
  ROM_the_magpie_scheme_desc: "S nevyhovujícím stavem našich obrněných schopností, žádný pancíř není k ničemu; musíme seškrabat a zrezivět odkudkoli, aby vyhověl potřebám rumunské armády." # todo: NEW TRANSLATION
  ROM_invite_axis_motor_companies: "Pozvat osové automobilové společnosti" # todo: NEW TRANSLATION
  ROM_invite_axis_motor_companies_desc: "Několik předních společností sídlí v osových zemích, zvláště v Německu. S žalostným stavem našeho motorového průmyslu bychom je měli pozvat do Rumunska, aby nám pomohly vyvinout vlastní schopnosti v této oblasti." # todo: NEW TRANSLATION
  ROM_mechanized_soldiers: "Mechanizace našich vojáků" # todo: NEW TRANSLATION
  ROM_mechanized_soldiers_desc: "Tempo války se stále zvyšuje; větší rychlost znamená větší útočnou schopnost. Rumunská armáda musí být vybavena vozidly, která dokážou rychle dopravit vojáka na frontu a poskytnout mu dostatečnou ochranu." # todo: NEW TRANSLATION
  ROM_haide_haide_haide: "Haide! Haide! Haide!" # todo: NEW TRANSLATION
  ROM_haide_haide_haide_desc: "Vyšlo zbraňové moderní vybavení a technologie pro rumunskou armádu. Vše musí být úzce integrováno, aby Rumunská armáda získala nutný útočný náboj. HAIDE! HAIDE! HAIDE!" # todo: NEW TRANSLATION
  ROM_national_recovery: "Obnova po Velké depresi" # todo: NEW TRANSLATION
  ROM_national_recovery_desc: "S Velkou depresí klesly světové ceny obilí a Rumunsko bylo vrženo do agrární krize. Maloodběratelé se dostali do prodlení, vláda zavedla podpory cen a uvalila moratorium na zemědělské dluhy, aby zmírnila jejich situaci. Nyní, když se začínáme zotavovat, využijeme domácí kapitál k financování nových průmyslů, včetně výroby zbraní, aby nás vytáhl z agrárního poklesu." # todo: NEW TRANSLATION
  ROM_encourage_trade_with_germany: "Nové obchodní dohody s Německem" # todo: NEW TRANSLATION
  ROM_encourage_trade_with_germany_desc: "Německo může být cenným spojencem v dlouhodobém horizontu; měli bychom s Říší podepsat dohodu. Poskytneme dodávky různých rumunských produktů do Německa v oblasti zemědělství, dřeva a ropy výměnou za technické know‑how a vojenské vybavení. Dohoda rovněž poskytne obchodní výhody německým společnostem v Rumunsku ve formě zón volného obchodu." # todo: NEW TRANSLATION
  ROM_carpathian_network: "Karpatická infrastrukturní síť" # todo: NEW TRANSLATION
  ROM_carpathian_network_desc: "Karpaty ztěžují dostupnost velké části naší země. Okamžitě zahájíme nový program stavby nových silnic a rozšíření existujících, aby se zlepšila dostupnost odlehlých oblastí Karpat." # todo: NEW TRANSLATION
  ROM_oil_for_armaments: "Ropa za zbroj" # todo: NEW TRANSLATION
  ROM_oil_for_armaments_desc: "Německo vyvinulo některé z nejlepších zbraní ve své kategorii. V rámci obchodní dohody s nimi jim dodáme ropu, které zoufale postrádají, výměnou za zbroj." # todo: NEW TRANSLATION
  ROM_nationalize_the_oil: "Znacionalizovat ropu" # todo: NEW TRANSLATION
  ROM_nationalize_the_oil_desc: "Nejcennějším aktivem naší země je ropa; nemůžeme důvěřovat rozmarným soukromým majitelům, aby přispívali v zájmu národa. Převedeme kontrolu nad ropnými poli od soukromých osob na stát, abychom je lépe využili." # todo: NEW TRANSLATION
  ROM_reichswerke_subsidiary: "Vliv Reichswerke nad Rumunskem" # todo: NEW TRANSLATION
  ROM_reichswerke_subsidiary_desc: "Reichswerke získalo několik rumunských aktiv; téměř veškerá uhelná a ocelářská kapacita země byla převzata přátelskými dohodami a umístěna pod společnou německo‑rumunskou kontrolu. Zvláštní péče byla věnována naší největší loděnici v Galați. Německá odbornost velmi pomůže rozvoji našeho národa, i když, pokud bude vliv ponechán bez kontroly, může to mít následky pro naši suverenitu." # todo: NEW TRANSLATION
  ROM_improve_cross_country_railways: "Zlepšit mezistátní železnice" # todo: NEW TRANSLATION
  ROM_improve_cross_country_railways_desc: "Můžeme zvýšit rychlost těžby zdrojů, zejména naší cenné ropy, zkrácením doby přepravy ze zdroje do zpracovatelského centra. To lze snadno dosáhnout zlepšením naší železniční sítě." # todo: NEW TRANSLATION
  ROM_autarky: "Rozšířit těžbu ropy" # todo: NEW TRANSLATION
  ROM_autarky_desc: "Moderní národ jede na ropě. Ropa, která není vytěžena, je ztracená; zvýšíme těžbu ropy zlepšením stávajících zařízení." # todo: NEW TRANSLATION
  ROM_bucharest_technical_institute: "Technické školy" # todo: NEW TRANSLATION
  ROM_bucharest_technical_institute_desc: "Rumunsko potřebuje velké množství technických odborníků k zvýšení produktivity národa. Přehodnotíme osnovy stávajících technických škol a zřídíme nové školy, abychom zvýšili kvantitu i kvalitu." # todo: NEW TRANSLATION
  ROM_reduce_reliance_on_foreign_imports: "Zlepšit těžební vybavení" # todo: NEW TRANSLATION
  ROM_reduce_reliance_on_foreign_imports_desc: "Zavedeme některé z posledních inovací v těžebním nářadí, aby naše těžba a ropné průmysly výrazně zvýšily svou efektivitu." # todo: NEW TRANSLATION
  ROM_more_efficient_agricultural_procurement: "Zefektivnit zemědělství" # todo: NEW TRANSLATION
  ROM_more_efficient_agricultural_procurement_desc: "Rumunsko má velký podíl populace zaměstnaný v zemědělství. Můžeme zavést nové metody a nástroje k výraznému zvýšení efektivity a zároveň uvolnit pracovní sílu pro náš rychle se rozvíjející průmysl." # todo: NEW TRANSLATION
  ROM_expand_the_axis_oil_trade: "Rozšířit obchod s ropou pro Osu" # todo: NEW TRANSLATION
  ROM_expand_the_axis_oil_trade_desc: "Rostoucí armády Evropy se rozšiřují — roste počet tanků a letadel — žádná evropská země (kromě SSSR, ale kdo s nimi obchoduje) nemá potřebnou ropu. Můžeme velice profitovat prodejem naší ropy ostatním evropským zemím." # todo: NEW TRANSLATION
  ROM_expand_fuel_stockpiles: "Připravit naše zásoby paliva" # todo: NEW TRANSLATION
  ROM_expand_fuel_stockpiles_desc: "Ať už budeme na kterékoliv straně, naše ropa nás činí strategicky důležitou oblastí pro spojence i nepřátele, kteří pravděpodobně zaútočí na naše ropné pole. Měli bychom vytvořit velké zásoby paliva pro případ, že by těžba byla narušena." # todo: NEW TRANSLATION
  ROM_expand_the_war_industry: "Postavit nové továrny na zbraně" # todo: NEW TRANSLATION
  ROM_expand_the_war_industry_desc: "Musíme postavit více zbrojních továren k výrobě nových zbraní v dostatečném množství, abychom posílili rumunskou armádu." # todo: NEW TRANSLATION
  ROM_the_duty_to_work: "Vyhovět vysoké poptávce" # todo: NEW TRANSLATION
  ROM_the_stabilization_plan: "Stabilizační plán" # todo: NEW TRANSLATION
  ROM_the_stabilization_plan_desc: "S nestabilní povahou naší ekonomiky a nedávnými politickými otřesy je lid Rumunska zmaten. Musíme začít stabilizovat ekonomické a politické klima, pokud má Rumunsko prospívat." # todo: NEW TRANSLATION
  ROM_malaxa_focus: "Alternativní průmysl k ropě" # todo: NEW TRANSLATION
  ROM_malaxa_focus_desc: "Naše ekonomika je značně závislá na ropě; musíme začít hledat jiné alternativy, které přispějí do našeho hospodářství." # todo: NEW TRANSLATION
  ROM_reduce_reliance_on_oil: "Snížit naši závislost na ropě" # todo: NEW TRANSLATION
  ROM_reduce_reliance_on_oil_desc: "Obchod s ropou vedl k tomu, že nás ostatní země vnímají jen podle ropy. Abychom Rumunsko rozvinuli a vytvořili silnější obraz země, musíme se začít vzdělávat od ropy." # todo: NEW TRANSLATION
  ROM_improve_living_standards: "Zlepšit životní úroveň" # todo: NEW TRANSLATION
  ROM_improve_living_standards_desc: "Další způsob, jak zlepšit náš průmysl a armádu, je zvýšit platy, více dovolené, čistší města atd. To vytvoří spokojenější populaci, která bude ochotna pracovat tvrději a lépe pro stát, který jim zajistil lepší život." # todo: NEW TRANSLATION
  ROM_domestic_industrial_developments: "Domácí průmyslový rozvoj" # todo: NEW TRANSLATION
  ROM_domestic_industrial_development_desc: "Rumunsko potřebuje větší a lepší průmyslovou základnu. Musíme těžce investovat do našeho průmyslového sektoru, protože nám to může dlouhodobě velmi pomoci." # todo: NEW TRANSLATION
  ROM_the_romanian_miracle: "Zvednout kletbu zdrojů" # todo: NEW TRANSLATION
  ROM_the_romanian_miracle_desc: "" # todo: NEW TRANSLATION
  ROM_force_the_king_to_abdicate: "Donutit krále k abdikaci" # todo: NEW TRANSLATION
  ROM_force_the_king_to_abdicate_desc: "Rumunsko bylo nuceno postoupit Besarábii a severní Bukovinu Sovětskému svazu, Severní Transylvánii Maďarsku a Jižní Dobruju Bulharsku. Po těchto územních ztrátách se král Karol II. stal ještě větší potupou pro Rumunsko než předtím. Musí abdikovat, pokud chce Rumunsko znovu obnovit svou pozici." # todo: NEW TRANSLATION
  ROM_axis_friendly_government: "Režim přátelský Ose" # todo: NEW TRANSLATION
  ROM_axis_friendly_government_desc: "Francie je poražena a zdrcená, Britové nejsou ani na kontinentu. Německo zůstalo jedinou velmocí v Evropě; musíme začít sladit naše zájmy s Německem, pokud chceme přežít v této nejisté budoucnosti." # todo: NEW TRANSLATION
  ROM_wargoal_on_bulgaria: "Zajistit Bulharsko" # todo: NEW TRANSLATION
  ROM_wargoal_on_bulgaria_desc: "Bulharsko spolu s Maďarskem má s námi hranice i hraniční spory. Musíme začít řešit záležitost Jižní Dobruje k ochraně našeho jižního hranice." # todo: NEW TRANSLATION
  ROM_wargoal_on_hungary: "Zajistit Maďarsko" # todo: NEW TRANSLATION
  ROM_wargoal_on_hungary_desc: "Maďarsko spolu s Bulharskem má s námi hranice i hraniční spory. Musíme začít řešit otázku Severní Transylvánie, abychom ochránili naši severní hranici." # todo: NEW TRANSLATION
  ROM_integrate_hungary: "Integrovat Maďarsko" # todo: NEW TRANSLATION
  ROM_integrate_bulgaria: "Integrovat Bulharsko" # todo: NEW TRANSLATION
  ROM_federation_of_the_danube: "Zničit Království Jugoslávie" # todo: NEW TRANSLATION
  ROM_federation_of_the_danube_desc: "Jugoslávii všeobecně nenávidí všechny balkánské země; má hranice spory s mnoha z nich. Můžeme si najmout pomoc těchto 'spojenců' k zničení Království Jugoslávie." # todo: NEW TRANSLATION
  ROM_legionnaires_rebellion: "Povstání legií" # todo: NEW TRANSLATION
  ROM_legionnaires_rebellion_desc: "Kvůli postupnému omezení privilegií polovojenské organizace Železná garda Conducător Ion Antonescu, její členové, zvaní Legionáři, povstali. Železná garda zahájila povstání proti vládě a také spustila pogrom proti Židům v Bukurešti." # todo: NEW TRANSLATION
  ROM_ensure_agricultural_self_sufficiency: "Zajistit zemědělskou soběstačnost" # todo: NEW TRANSLATION
  ROM_ensure_agricultural_self_sufficiency_desc: "Můžeme se spolehnout na Německo pro technologickou odbornost, ale s potravinami si nemůžeme dovolit spoléhat na jiný národ; je třeba věnovat zvláštní pozornost našemu zemědělskému sektoru, abychom dosáhli soběstačnosti." # todo: NEW TRANSLATION
  ROM_support_the_war_industry: "Podpořit válečný průmysl" # todo: NEW TRANSLATION
  ROM_support_the_war_industry_desc: "Každý občan musí pochopit svou roli během války; je to vlastenecký povinností přispívat k válečnému úsilí nákupem válečných dluhopisů, tvrdou prací, aby se střely vyrobené doma dostaly na frontu včas. Je čas, aby všichni podpořili válečný průmysl." # todo: NEW TRANSLATION
