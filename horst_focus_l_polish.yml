  JAP_claim_the_kyokuto: "Požadovat Kyokutō" # todo: NEW TRANSLATION
  JAP_claim_the_kyokuto_TRIG1: "§HMy§! nebo naše §HLoutky§! kontrolujeme všechny státy od §HTannu Tuva§!, §HBratsk§! a §HKirensk§! na východ." # todo: NEW TRANSLATION
  JAP_claim_the_kyokuto_EXPL1: "Získat veškeré bývalé území [SOV.GetFlag]§H[SOV.GetName]§! v Západním Mandžusku." # todo: NEW TRANSLATION
  JAP_claim_the_kyokuto_EXPL2: "Získat veškeré bývalé území [SOV.GetFlag]§H[SOV.GetName]§! v Mongolsku a Tannu Tuva." # todo: NEW TRANSLATION
  JAP_claim_the_kyokuto_EXPL3: "Získat veškeré bývalé území [SOV.GetFlag]§H[SOV.GetName]§! v Sibiři." # todo: NEW TRANSLATION
  JAP_claim_the_kyokuto_EXPL4: "Získat veškeré bývalé území [SOV.GetFlag]§H[SOV.GetName]§! na Dálném východě." # todo: NEW TRANSLATION
  JAP_claim_the_kyokuto_desc: "Vzestupné slunce osvětluje Sibiř, značí osud Kyokutō s Japonskem. Kdysi carská hranice, nyní zní duchem Nipponu. Postup našich vojáků upevní naši správu nad touto východní říší. Dědictví Japonska se nyní prolíná s rozsáhlými plání Sibiře." # todo: NEW TRANSLATION
  JAP_the_northern_resource_area: "Severní oblast zdrojů" # todo: NEW TRANSLATION
