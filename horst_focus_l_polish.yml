  SOV_baltic_security_tt: "Toto zaměření bude dokončeno 12. června 1940, 285 dní po zaměření \"Danzig or War\". \n\nPo dokončení přenese všechny pobaltské státy k vám a přidá jádra v nich." # todo: NEW TRANSLATION
