  SAF_party_split_elections_tt: "§RNáhlé volby se budou konat během týdne.§!\n"
  SAFR_elections_held: "Volby proběhly.\n"
  fra_needs_approval: "§RFrancie musí schválit dohodu před předáním Madagaskaru. Budou mnohem ochotnější souhlasit, pokud budou mít pod kontrolou svá severoafrická území.§!\n"
  SAF_african_commanders_tt: "Získejte dva nové velitele.\n"
  SAFR_civil_war_tt: "§RZačne občanská válka§! mezi §Yunionistickými silami§! v Kapském Městě a Jihozápadní Africe a §Ykomunistickými revolucionáři§! v zbytku země.\n"
  procure_expertise_tt: "§RMůžeme oslovit pouze jednu zemi pro její projektové a stavební zkušenosti, proto vybírejme opatrně.§!\n"
  SAFR_create_unit_boer_commandos_tt: "Získáte dvě jednotky elitních §YBoer Kommandos§! ve Transvaalu.\n"
  SAFR_create_unit_greyshirts_tt: "Získejte jednotku §YGreyshirts Militia§! v Kapsku.\n"
  SAFR_create_unit_stormjaers_tt: "Po získání podpory jak Ossewabrandwag, tak Greyshirts můžeme povolat jednotky §YStormjaers a Greyshirts Militia§! v Jihozápadní Africe.\n"
  SAFR_making_new_friends: "§RToto nám umožní ovlivnit je tak, aby byli otevřeni vstupu do aliance s námi.§!\n"
  SAF_force_parliament_debate: "Vynutit debatu v parlamentu"
  SAF_force_parliament_debate_desc: "Je nyní jasné, že se téměř jistě blížíme k další velké válce; už si nemůžeme dovolit váhat. Musíme se rozhodnout pro závazek k Británii a začít se připravovat. Smuts má podporu většiny strany a může prosadit hlasování o této věci."
  SAF_begin_rearmament: "Začít přezbrojovat"
  SAF_begin_rearmament_desc: "Nyní když jsme se zavázali, musíme přijmout politiku rozšíření našich zbrojních kapacit, pokud chceme plně vybavit naši armádu."
  SAF_relax_worker_restrictions: "Uvolnit omezení pro dělníky"
  SAF_relax_worker_restrictions_desc: "Máme mnoho zdatných mužů, kteří jsou ochotni pracovat, a pokud jsou ochotni tak činit, měli by jim být tato práva umožněna, bez ohledu na barvu pleti." # todo: NEW TRANSLATION
  SAF_split_in_the_party: "Rozkol v straně" # todo: NEW TRANSLATION
  SAF_split_in_the_party_desc: "Sloučení Hertzogovy Národní strany a Smutsovy Jihoafrické strany k vytvoření Unie strany je pevně rozděleno v otázce podpory Británie v případné válce. Je tu také záležitost rasové segregace, přičemž Hertzog silně podporuje segregaci a Smuts zaujímá umírněnější přístup. Možná je čas ukončit koalici." # todo: NEW TRANSLATION
  SAF_focus_europe: "Inženýři do Indie" # todo: NEW TRANSLATION
  SAF_focus_europe_desc: "Vítězství ve válce v Evropě je klíčem k ukončení této války, proto bychom měli soustředit naše úsilí na přípravu armády na tvrdé boje, které přijdou." # todo: NEW TRANSLATION
  SAF_focus_asia: "Inženýři do Outbacku" # todo: NEW TRANSLATION
  SAF_focus_asia_desc: "Situace v Asii se stává zoufalou, spojenci jsou roztaženi příliš tence, a proto musíme připravit naše jednotky na obtížné podmínky tam." # todo: NEW TRANSLATION
  SAF_an_iron_grip: "Železný stisk" # todo: NEW TRANSLATION
  SAF_an_iron_grip_desc: "Vláda je zajištěna a budoucnost země je nyní v našich rukou, abychom ji formovali, jak uznáme za vhodné." # todo: NEW TRANSLATION
  SAF_strategic_reach: "Strategický dosah" # todo: NEW TRANSLATION
  SAF_strategic_reach_desc: "Jižní Afrika je vzdálená a izolovaná od mnoha částí světa. Pokud chceme plně dosáhnout svého potenciálu a pomáhat našim spojencům, musíme být schopni dosáhnout jakékoli části planety podle potřeby." # todo: NEW TRANSLATION
  SAF_support_appeasement: "Pokračovat v podpoře politiky appeasementu" # todo: NEW TRANSLATION
  SAF_support_appeasement_desc: "Německo má legitimní stížnosti a Dominiony velmi trpěly v minulé válce. Měli bychom využít každou příležitost k míru v naší době." # todo: NEW TRANSLATION
  SAF_civil_investment: "Investice do civilního průmyslu" # todo: NEW TRANSLATION
  SAF_civil_investment_desc: "Pokud Německo zůstane urovnáno, můžeme se soustředit na vnitřní záležitosti. Můžeme začít investicemi do našeho průmyslu, abychom podpořili ekonomiku." # todo: NEW TRANSLATION
  SAF_propose_joint_exercises: "Přeorganizovat okrskové síly" # todo: NEW TRANSLATION
  SAF_propose_joint_exercises_desc: "Naše armáda není ve stavu připravenosti na válku. Nedávné škrty ve výdajích kvůli Velké depresi ochromily naše bojové schopnosti. Měli bychom zahájit plán rozšíření a výcviku, abychom muže připravili na další velkou válku." # todo: NEW TRANSLATION
  SAF_yield_to_smuts: "Ustoupit Smutsovi" # todo: NEW TRANSLATION
  SAF_yield_to_smuts_desc: "S válkou zřejmě na obzoru vyhrála v parlamentní debatě o připojení se na stranu Británie Jan Smuts. Bez dalších možností Hertzog vzal své příznivce strany a hledá sloučení s Malanovým PNP." # todo: NEW TRANSLATION
  SAF_support_the_afrikaner_broederbond_np: "Podpořit Afrikaner Broederbond" # todo: NEW TRANSLATION
  SAF_support_the_afrikaner_broederbond_np_desc: "Afrikaner Broederbond usiluje o větší hlas pro afrikanerský lid a silnější oddělení ras. Paměť na britskou politiku během búrské války je stále silná a Broederbond může pomoci vytvořit novou Jižní Afriku." # todo: NEW TRANSLATION
  SAF_republic_agenda: "Směřování k republice" # todo: NEW TRANSLATION
  SAF_republic_agenda_desc: "Získání naší nezávislosti na Británii by mělo být naší nejvyšší prioritou. Prosadíme každou politiku, schválíme každý zákon, který je potřeba, abychom tuto nevyhnutelnost uskutečnili." # todo: NEW TRANSLATION
  SAF_malans_plan: "Malanovo vize" # todo: NEW TRANSLATION
  SAF_malans_plan_desc: "Malanovým prvním cílem bude nezávislost a nová jihoafrická republika. Nadto to může být rozšíření našeho vlivu v regionu, nebo možná něco odvážnějšího." # todo: NEW TRANSLATION
  SAF_pirow_havenga_mission: "Mise do Berlína" # todo: NEW TRANSLATION
  SAF_pirow_havenga_mission_desc: "Posláním Havengy a Pirowa na diplomatickou misi do Německa můžeme dát najevo naši přítomnost a dát Němcům najevo, že jsme otevřeni novým možnostem." # todo: NEW TRANSLATION
  SAF_ref_republic: "Referendum o republice" # todo: NEW TRANSLATION
  SAF_ref_republic_desc: "Je čas, aby Jižní Afrika vykročila vlastní cestou nezávislou na Britském impériu a jeho loutkách. Uspořádáme referendum o tom, zda se stát republikou a opustit Commonwealth." # todo: NEW TRANSLATION
  SAF_rearm_udf: "Přejbrojit UDF" # todo: NEW TRANSLATION
  SAF_rearm_udf_desc: "UDF je v žalostném stavu. Potřebuje nové vybavení a výcvik, aby byla efektivní bojovou silou země." # todo: NEW TRANSLATION
  SAF_focus_saaf: "Priorita: letectvo" # todo: NEW TRANSLATION
  SAF_focus_saaf_desc: "K čemu jsou pozemní vojska, pokud je nepřítel může jednoduše bombardovat ze vzduchu? Ochrana našich obloh je mnohem důležitější než pár nových pušek." # todo: NEW TRANSLATION
  SAF_focus_army: "Priorita: armáda" # todo: NEW TRANSLATION
  SAF_focus_army_desc: "K čemu jsou nějaká letadla, pokud nemáme muže, kteří by zajistili zemi? Nejlepší zbraně a vybavení pro naše pěší vojáky jsou prioritou." # todo: NEW TRANSLATION
  SAF_prepare_for_third_boer_war: "Připravit se na třetí búrskou válku" # todo: NEW TRANSLATION
  SAF_prepare_for_third_boer_war_desc: "Tentokrát budeme připraveni." # todo: NEW TRANSLATION
  SAF_pirows_new_order: "Pirowův Nový řád" # todo: NEW TRANSLATION
  SAF_pirows_new_order_desc: "Pirow upřednostňuje radikální jednopartijní stát modelovaný podle německé NSDAP. Co udělá, pokud dosáhne svého cíle, je věcí dohadů." # todo: NEW TRANSLATION
  SAF_promte_urbanisation: "Podporovat urbanizaci" # todo: NEW TRANSLATION
  SAF_promte_urbanisation_desc: "Přitahováním dělníků do měst je můžeme využít k rozšíření existujících průmyslových oblastí a poskytnout více práce lidem." # todo: NEW TRANSLATION
  SAF_recruitment_drive: "Venkovská náborová kampaň" # todo: NEW TRANSLATION
  SAF_recruitment_drive_desc: "Máme mnoho nezaměstnaných mužů ve venkovských oblastech, kteří by mohli skočit po příležitosti sloužit. Zřídíme místní náborová stanoviště v těchto oblastech, abychom je lépe oslovili." # todo: NEW TRANSLATION
  SAF_hofmeyrs_reforms: "Hofmeyrovy reformy" # todo: NEW TRANSLATION
  SAF_hofmeyrs_reforms_desc: "Hofmeyr byl osamělým hlasem ve vládě, který obhajoval práva všech lidí v Jižní Africe bez ohledu na rasu. Je čas umožnit mu moc provést jeho reformy a vést nás na cestě k nové Jižní Africe." # todo: NEW TRANSLATION
  SAF_repeal_job_reservation_act: "Zrušit zákon o rezervaci pracovních míst" # todo: NEW TRANSLATION
  SAF_repeal_job_reservation_act_desc: "Zákon o rezervaci pracovních míst byl jedním ze základních kamenů, na kterých byl postaven tento systém rasové nerovnosti. Je čas se jej zbavit a odsoudit ho do minulosti." # todo: NEW TRANSLATION
  SAF_wartime_worker_laws: "Válečné zákony pro pracovníky" # todo: NEW TRANSLATION
  SAF_wartime_worker_laws_desc: "V době války musíme upřednostnit zásobování našich jednotek před jakýmikoli preferenčními pracovními příležitostmi." # todo: NEW TRANSLATION
  SAF_equal_worker_pay: "Srovnat plat pracovních" # todo: NEW TRANSLATION
  SAF_equal_worker_pay_desc: "Pokud očekáváme, že lidé budou vykonávat stejnou práci, měli by být placeni stejně jako jejich kolegové." # todo: NEW TRANSLATION
  SAF_economic_boom: "Ekonomický vzestup" # todo: NEW TRANSLATION
  SAF_economic_boom_desc: "Naše reformy vedly k masivnímu nárůstu produktivity a umožní nám využít naši novou pracovní sílu k rozšíření průmyslu." # todo: NEW TRANSLATION
  SAF_expand_gold_mining_operations: "Rozšířit těžbu zlata a diamantů" # todo: NEW TRANSLATION
  SAF_expand_gold_mining_operations_desc: "Oppenheimer chce zvýšit těžební operace otevřením nových šachet a prohloubením stávajících. Můžeme financovat jeho snahy." # todo: NEW TRANSLATION
  SAF_vanderbijlpark_expansion_project: "Projekt rozvoje Vanderbijlpark" # todo: NEW TRANSLATION
  SAF_vanderbijlpark_expansion_project_desc: "Vanderbijlpark je průmyslovým srdcem severu a je tu ještě více prostoru k rozvoji oblasti a zvýšení jejího potenciálu." # todo: NEW TRANSLATION
  SAF_open_engineering_schools: "Zřídit inženýrské školy" # todo: NEW TRANSLATION
  SAF_open_engineering_schools_desc: "Oppenheimer má plány otevřít nové inženýrské školy a katedry na univerzitách. To jistě prospěje budoucím generacím a podpoří více inženýrských inovací v zemi." # todo: NEW TRANSLATION
  SAF_battlefield_medical_advancements: "Pokroky v polní medicíně" # todo: NEW TRANSLATION
  SAF_battlefield_medical_advancements_desc: "Němečtí armádní lékaři udělali řadu zlepšení v polní medicíně. S omezeným počtem mužů, ze kterých lze brát, bychom měli zajistit, aby naše jednotky dostaly nejlepší lékařskou péči, aby se co nejdříve vrátili do boje." # todo: NEW TRANSLATION
  SAF_remove_segregation_shared: "Zrušit omezení služby" # todo: NEW TRANSLATION
  SAF_remove_segregation_shared_desc: "Pokud je muž ochoten a schopný bojovat za svou zemi, měl by mu být umožněn vstup bez ohledu na barvu pleti, navzdory názorům některých. To by také mělo povzbudit nezaměstnané muže z venkova, aby se přihlásili do služby." # todo: NEW TRANSLATION
  SAF_offer_protection_of_madagascar: "Nabídnout ochranu Madagaskaru" # todo: NEW TRANSLATION
  SAF_offer_protection_of_madagascar_desc: "Nyní, když jsme úspěšně znovu převzali kontrolu nad Madagaskarem, můžeme požádat o jeho přidělení Unii, protože jsme lépe postaveni k jeho ochraně." # todo: NEW TRANSLATION
  SAF_native_representation_act: "Zákon o zastoupení domorodců" # todo: NEW TRANSLATION
  SAF_native_representation_act_desc: "Odebráním afrických voličů z obecného seznamu v Kapsku můžeme posílit naši pozici ve vládě do budoucna." # todo: NEW TRANSLATION
  SAF_directorate_war_supplies: "Direktorát válečných zásob" # todo: NEW TRANSLATION
  SAF_directorate_war_supplies_desc: "Není jen naše vlastní armáda, která postrádá vybavení, ale i síly Commonwealthu potřebují bojové vybavení. Musíme udělat vše pro to, abychom zásobili státy Commonwealthu zbraněmi a municí." # todo: NEW TRANSLATION
  SAF_peace_expansion_scheme: "Plán rozšíření v době míru" # todo: NEW TRANSLATION
  SAF_peace_expansion_scheme_desc: "Pierre van Ryneveld vypracoval plán na rozšíření našeho letectva nákupy letadel od britských výrobců. To je něco, čemu se máme věnovat, dokud si náš vlastní letecký průmysl nedohoní zpoždění." # todo: NEW TRANSLATION
  SAF_tanks_lend_lease: "Shermany a Fireflies" # todo: NEW TRANSLATION
  SAF_tanks_lend_lease_desc: "Američané a Britové souhlasili, že nám poskytnou na půjčku některé pokročilé tanky a protitankové stíhače pro naše obrněné divize." # todo: NEW TRANSLATION
  SAF_create_unit_boer_commandos_tt: "Získá dvě jednotky elitních búrských kommand v Transvaalu.\n" # todo: NEW TRANSLATION
  SAF_military_research_bureau: "Vojenské výzkumné oddělení" # todo: NEW TRANSLATION
  SAF_military_research_bureau_desc: "Pokročilé zbraně a vybavení jsou klíčem k vítězství v jakékoli válce, takže naše výzkumné úsilí bude od nynějška zaměřeno v této oblasti." # todo: NEW TRANSLATION
  SAF_fight_against_communism: "Hrozba komunismu" # todo: NEW TRANSLATION
  SAF_fight_against_communism_desc: "Zatímco Britové jsou obtížní, skutečnou hrozbou je rostoucí skvrna komunismu po celém světě. Musíme udělat vše, co je v našich silách, abychom tomu učinili přítrž." # todo: NEW TRANSLATION
  SAF_the_anti_revolution: "Protirevoluce" # todo: NEW TRANSLATION
  SAF_the_anti_revolution_desc: "Nastal čas ukončit tuto „revoluci“. Uderme nyní." # todo: NEW TRANSLATION
  SAF_deal_with_liberia: "Atlantický stupínek" # todo: NEW TRANSLATION
  SAF_deal_with_liberia_desc: "Libérie je strategicky užitečný stupínek do Severního Atlantiku a má i plantáže kaučuku, které můžeme jistě rozšířit. Budou snadnou kořistí." # todo: NEW TRANSLATION
  SAF_deal_with_oman: "Vstupní brána do Asie" # todo: NEW TRANSLATION
  SAF_deal_with_oman_desc: "Nedávný průzkum odhalil nevyužité ropné rezervy v regionu Fahud. Potřebujeme ropu k pohonu našeho válečného stroje, a také to otevírá nové cesty k expanzi do bohatství Asie." # todo: NEW TRANSLATION
  SAF_riches_of_india: "Bohatství Indie" # todo: NEW TRANSLATION
  SAF_riches_of_india_desc: "Indie má všechny zdroje, které potřebujeme, zejména ty, které nám chybí lokálně. Vezmeme si jejich bohatství přírodních zdrojů pro sebe." # todo: NEW TRANSLATION
  SAF_split_portugal: "Obsadit portugalské kolonie" # todo: NEW TRANSLATION
  SAF_split_portugal_desc: "Portugalské kolonie jsou slabě střežené a daleko od Portugalska. Můžeme je rychle obsadit dříve, než Portugalsko stihne zareagovat." # todo: NEW TRANSLATION
  SAF_appeal_to_greyshirts: "Oslovit Šedé košile" # todo: NEW TRANSLATION
  SAF_appeal_to_greyshirts_desc: "SANP bojuje tuhle bitvu samostatně. Měli bychom se s nimi spojit a koordinovat naše snahy, abychom přinesli novou éru pro Jižní Afriku." # todo: NEW TRANSLATION
  SAF_equip_stormjaers: "Vypravit Stormjaers" # todo: NEW TRANSLATION
  SAF_equip_stormjaers_desc: "Stormjaers přitahují více a více rekrutů den co den. Pokud dokážeme vyzbrojit tyto nové rekruty, budeme mít loajální vojáky, na které můžeme volat, když bude potřeba." # todo: NEW TRANSLATION
  SAF_equip_greyshemde: "Vypravit Šedé košile" # todo: NEW TRANSLATION
  SAF_equip_greyshemde_desc: "Šedé košile mají muže, ale ne náboje. Máme prostředky jim dodat zbraně a organizovat je v opravdovou bojovou sílu." # todo: NEW TRANSLATION
  SAF_reactivate_kommandos: "Znovuaktivovat kommando" # todo: NEW TRANSLATION
  SAF_reactivate_kommandos_desc: "Systém Kommando byl nedílnou součástí obrany naší země více než 200 let. A i když byly po poslední búrské válce rozpuštěny, zůstaly jako neformální skupiny, a není lepší čas než nyní je formálně znovu aktivovat." # todo: NEW TRANSLATION
  SAF_armor_mech_bonus: "Přijmout Guderianovy teorie" # todo: NEW TRANSLATION
  SAF_armor_mech_bonus_desc: "Heinz Guderian je průkopníkem v užití tanků v moderním boji; bylo by hloupé se nepoučit z jeho nápadů." # todo: NEW TRANSLATION
  SAF_seawolf_bonus: "Přijmout Dönitzovy taktiky" # todo: NEW TRANSLATION
  SAF_seawolf_bonus_desc: "Dönitz má unikátní představy o použití ponorek ve velkých lovících skupinách, 'wolfpack'. Měli bychom přijmout tuto novou praxi." # todo: NEW TRANSLATION
  SAF_mobile_warfare_exercises: "Cvičení mobilní války" # todo: NEW TRANSLATION
  SAF_mobile_warfare_exercises_desc: "Mnoho se můžeme naučit od Wehrmachtu. Navrhneme společné výcvikové operace, abychom mohli efektivně koordinovat naše tanky a mobilní pěchotu." # todo: NEW TRANSLATION
  SAF_wolfpack_exercises: "Cvičení vlčí smečky" # todo: NEW TRANSLATION
  SAF_wolfpack_exercises_desc: "Zatímco německé U‑boaty budou zakotveny v našich přístavech, můžeme využít příležitosti trénovat s nimi a učit se od jejich velitelského a námořnického personálu." # todo: NEW TRANSLATION
  SAF_invite_ig_farben: "Pozvat IG Farben" # todo: NEW TRANSLATION
  SAF_invite_ig_farben_desc: "IG Farben je světovým lídrem v technikách syntetického paliva. Máme uhlí, pouze potřebujeme odborné znalosti, jak je využít. Měli bychom je požádat o pomoc při zřízení vlastní místní společnosti na liquefakci paliv." # todo: NEW TRANSLATION
  SAF_empower_trade_unions: "Posílit odbory" # todo: NEW TRANSLATION
  SAF_empower_trade_unions_desc: "Současná vláda hodně spoléhá na práci afrických dělníků, přičemž jim platí uboze. Můžeme shromáždit odbory a organizovat stávky a manifestace, dokud jejich hlasy neuslyšíme." # todo: NEW TRANSLATION
  SAF_expand_industrial_zones: "Rozšířit průmyslové zóny" # todo: NEW TRANSLATION
  SAF_expand_industrial_zones_desc: "Jedna věc, které v Jižní Africe nemáme nedostatek, je prostor. Některé z těchto pozemků je třeba vyčlenit pro velké průmyslové zóny." # todo: NEW TRANSLATION
  SAF_support_indian_independence: "Podpořit nezávislost Indie" # todo: NEW TRANSLATION
  SAF_support_indian_independence_desc: "Úspěšně jsme svrhnuli koloniální jho, tak pomozme Indii udělat totéž." # todo: NEW TRANSLATION
  SAF_economic_technical_exchange: "Ekonomická a technická výměna" # todo: NEW TRANSLATION
  SAF_economic_technical_exchange_desc: "Indie a Jižní Afrika jsou ideálně umístěny, aby si vzájemně pomohly vyrůst v moderní industrializované státy. Začněme investicemi do navzájem svých ekonomik a infrastruktury. Můžeme jim také pomoci zřídit vlastní výzkumný ústav." # todo: NEW TRANSLATION
  SAF_workers_for_engineers: "Dělníci za inženýry" # todo: NEW TRANSLATION
  SAF_workers_for_engineers_desc: "Indie má velký zábor pracovníků hledajících příležitosti a my máme mnohaleté zkušenosti a odbornost v těžbě. Měli bychom podpořit imigraci indických dělníků výměnou za některé naše nejzkušenější inženýry." # todo: NEW TRANSLATION
  SAF_safeguard_our_oceans: "Zabezpečit naše oceány" # todo: NEW TRANSLATION
  SAF_safeguard_our_oceans_desc: "V případě války je nezbytné, abychom mohli ovládat Indický oceán, abychom zabránili izolaci našich území." # todo: NEW TRANSLATION
  SAF_research_institute: "Strategické výzkumné oddělení" # todo: NEW TRANSLATION
  SAF_research_institute_desc: "Zaostáváme za mnoha západními zeměmi v technologickém pokroku, proto zřídíme nový výzkumný ústav, který shromáždí naše nejbystřejší hlavy a podpoří technologické inovace." # todo: NEW TRANSLATION
  SAF_research_area_priority: "Směrnice SRD" # todo: NEW TRANSLATION
  SAF_research_area_priority_desc: "Bez řádného vedení kdo ví, co naši vědci vytvoří. Tím, že jim dáme roční směrnice, můžeme zaměřit jejich výzkum do oblastí, které nejvíce potřebujeme." # todo: NEW TRANSLATION
  SAF_the_darkest_hour: "Nejtemnější hodina" # todo: NEW TRANSLATION
  SAF_the_darkest_hour_desc: "Mnoho našich spojenců padlo a s přímým pozemním spojením s mocnostmi Osy určitě pocítíme plnou sílu jejich válečného stroje na našich hranicích. Musíme se připravit bojovat do hořkého konce a nedávat milost." # todo: NEW TRANSLATION
  SAF_ask_for_soviet_aid: "Požádat o sovětskou pomoc" # todo: NEW TRANSLATION
  SAF_ask_for_soviet_aid_desc: "Někteří z našich předních členů Komunistické strany v posledních letech studovali v Sovětském svazu a můžeme využít jejich kontaktů a vlivu k zajištění sovětské pomoci pro nadcházející revoluci." # todo: NEW TRANSLATION
  SAF_secure_peoples_state: "Zajistit lidový stát" # todo: NEW TRANSLATION
  SAF_secure_peoples_state_desc: "Revoluce byla dosažena, ale stále existují někteří kdo odolávají. Zničíme veškerý zbývající odpor a zajistíme naše postavení v zemi." # todo: NEW TRANSLATION
  SAF_encourage_soviet_investment: "Podpořit sovětské investice" # todo: NEW TRANSLATION
  SAF_encourage_soviet_investment_desc: "Poskytněme pobídky a příležitosti pro sovětské investice do naší ekonomiky." # todo: NEW TRANSLATION
  SAF_institute_planned_economy: "Zřídit plánované hospodářství" # todo: NEW TRANSLATION
  SAF_institute_planned_economy_desc: "V naší nové africké dělnické utopii není místo pro kapitalistické volnotržní politiky. Vláda bude dohlížet na průmyslovou a ekonomickou expanzi národa." # todo: NEW TRANSLATION
  SAF_seize_means_of_production: "Seizovat prostředky výroby" # todo: NEW TRANSLATION
  SAF_seize_means_of_production_desc: "Příliš mnoho společností je v rukou bohatých kapitalistů. Osvobodíme je od břemene jejich bohatství a použijeme ho pro naše cíle." # todo: NEW TRANSLATION
  SAF_exploit_mineral_wealth: "Využít minerální bohatství" # todo: NEW TRANSLATION
  SAF_exploit_mineral_wealth_desc: "Zdroje naší země jsou rozsáhlé a většinou nevyužité, jako nové tungstenové žíly, které jsme našli v Namaqualandu. Nikoho to nebaví ležet v zemi, proto je dáme do užití." # todo: NEW TRANSLATION
  SAF_national_rationing_recycling_program: "Ustanovit program přídělování a recyklace" # todo: NEW TRANSLATION
  SAF_national_rationing_recycling_program_desc: "Náš lid nepotřebuje tolik luxusního zboží, proto je povzbudíme k recyklaci, aby bylo možné tyto materiály použít na výrobu zbraní místo toho." # todo: NEW TRANSLATION
  SAF_the_revolution: "Začít revoluci" # todo: NEW TRANSLATION
  SAF_the_revolution_desc: "Máme za sebou lid; není lepší čas než nyní začít revoluci." # todo: NEW TRANSLATION
  SAF_peoples_army: "Lidová armáda" # todo: NEW TRANSLATION
  SAF_peoples_army_desc: "Naše země potřebuje vojáky, pokud chceme přežít. Povzbuďme náš lid, aby za nás bojoval." # todo: NEW TRANSLATION
  SAF_african_utopia: "Africká utopie" # todo: NEW TRANSLATION
  SAF_african_utopia_desc: "Dělníci z Afriky začali vnímat Jižní Afriku jako ideální místo pro zajištění své budoucnosti, a tak přicházejí ze všech částí kontinentu, aby se podělili o naše bohatství." # todo: NEW TRANSLATION
  SAF_liberate_spanish: "Osvobodit španělské kolonie" # todo: NEW TRANSLATION
  SAF_liberate_spanish_desc: "Více kolonialistů, více utlačování dělníků. To bude další kapitola v příběhu osvobození afrického dělníka." # todo: NEW TRANSLATION
  SAF_liberate_italian: "Osvobodit italské kolonie" # todo: NEW TRANSLATION
  SAF_liberate_italian_desc: "Italové přišli pozdě na koloniální ples. Zajistíme, aby odešli brzy." # todo: NEW TRANSLATION
  SAF_an_african_peoples_republic: "Africká lidová republika" # todo: NEW TRANSLATION
  SAF_an_african_peoples_republic_desc: "Afrika byla poprvé v historii sjednocena jako kontinent. Oznámíme se světu a dáme najevo, že jsme nová síla, se kterou se musí počítat." # todo: NEW TRANSLATION
  SAF_asymmetric_warfare: "Asymetrická válka" # todo: NEW TRANSLATION
  SAF_asymmetric_warfare_desc: "Díky našim zkušenostem z búrských válek a boje v německých koloniích v první světové válce jsme získali jedinečné porozumění vedení nekonvenčních válek v náročném terénu. Musíme tyto znalosti a zkušenosti předat novým důstojníkům a vojákům." # todo: NEW TRANSLATION
  SAF_sa_engineer_medical_corps: "SA inženýrský a zdravotnický sbor" # todo: NEW TRANSLATION
  SAF_sa_engineer_medical_corps_desc: "Jihoafrický lékařský sbor potřebuje moderní vybavení a výcvik, aby udržel naše vojáky na bojišti." # todo: NEW TRANSLATION
  SAF_improve_infantry: "Modernizovat pěchotu" # todo: NEW TRANSLATION
  SAF_improve_infantry_desc: "Pěší vojáci jsou páteří naší armády. Potřebují nejlepší vybavení a zdroje, aby měli výhodu v boji." # todo: NEW TRANSLATION
  SAF_retool_pretoria_mint: "Přestavět pretorianskou mincovnu" # todo: NEW TRANSLATION
  SAF_retool_pretoria_mint_desc: "Pretorianská mincovna s troškou přestavby může být použita k výrobě zbraní a vybavení pro armádu." # todo: NEW TRANSLATION
  SAF_pretoria_metal_pressings: "Zakázat Pretoria Metal Pressings" # todo: NEW TRANSLATION
  SAF_pretoria_metal_pressings_desc: "Pretoria Metal Pressings vyrábí munici i výbušniny již nějakou dobu. Rozšíříme jejich kapacity, aby mohli poskytovat ještě více vybavení pro nás." # todo: NEW TRANSLATION
  SAF_mechanize_army: "Mechanizovat armádu" # todo: NEW TRANSLATION
  SAF_mechanize_army_desc: "Válčení se začíná drasticky měnit, zajistíme, abychom drželi krok se změnami a poskytli našim vojákům moderní, mobilní bojové vozidla." # todo: NEW TRANSLATION
  SAF_the_sarc_mki: "SARC MK I" # todo: NEW TRANSLATION
  SAF_the_sarc_mki_desc: "Spojili jsme všechny naše zkušenosti a odbornost, abychom vytvořili nový obrněný vůz pro naši armádu. Využijme toho a investujme do ještě lepších vozidel." # todo: NEW TRANSLATION
  SAF_expand_artillery_aircraft_depot: "Rozšířit depo dělostřelectva a letadel" # todo: NEW TRANSLATION
  SAF_expand_artillery_aircraft_depot_desc: "Depo dělostřelectva a letadel na Roberts Heights vyrábělo licencovaně Hawker Hartbees pro letectvo. Pokud rozšíříme zařízení, mohou vyrábět více a lepších letadel pro nás." # todo: NEW TRANSLATION
  SAF_protect_the_trade_2: "Modernizovat obchodní loďstvo" # todo: NEW TRANSLATION
  SAF_protect_the_trade_2_desc: "Naše přestavěné obchodní lodě a velrybářské lodě odvedly obdivuhodnou práci při honu na ponorky a při odminování, ale vždy by jim prospělo novější vybavení." # todo: NEW TRANSLATION
  SAF_disrupt_the_trade_2: "Vylepšit torpéda" # todo: NEW TRANSLATION
  SAF_disrupt_the_trade_2_desc: "Protitorpédová opatření se stávají čím dál efektivnějšími, takže bychom měli být napřed a vyvíjet nová torpéda." # todo: NEW TRANSLATION
  SAF_expand_repair_facilities: "Rozšířit opravárenská zařízení" # todo: NEW TRANSLATION
  SAF_expand_repair_facilities_desc: "Suché doky v Kapském Městě a Durbanu byly klíčovými přístavy pro opravy a přestavbu lodí cestujících po Africe. Protože může být nedostatek prostoru, měli bychom místo toho postavit velké plovoucí loděnice." # todo: NEW TRANSLATION
  SAF_saaf_coastal_command: "Pobřežní velení SAAF" # todo: NEW TRANSLATION
  SAF_saaf_coastal_command_desc: "Zřízení dedikovaného Pobřežního velení k monitorování vod kolem Jižní Afriky zajistí, že udržíme plavební trasy bezpečné." # todo: NEW TRANSLATION
  SAF_flexible_airforce: "Flexibilní letectvo" # todo: NEW TRANSLATION
  SAF_flexible_airforce_desc: "Taktické bombardéry mohou plnit více rolí uspokojivě. Není třeba mít více typů letadel, když jeden může dělat všechny potřebné úkoly." # todo: NEW TRANSLATION
  SAF_specialised_airforce: "Specializované letectvo" # todo: NEW TRANSLATION
  SAF_specialised_airforce_desc: "Naše letectvo musí být schopné plnit všechny své role co nejefektivněji, proto mu musíme zajistit specializované typy letadel." # todo: NEW TRANSLATION
  SAF_flying_tanks: "Létající tanky" # todo: NEW TRANSLATION
  SAF_flying_tanks_desc: "Potřebujeme novější modely CAS, aby naplnily své jméno." # todo: NEW TRANSLATION
  SAF_protect_cape_sea_route: "Chránit námořní trasu kolem Mysu" # todo: NEW TRANSLATION
  SAF_protect_cape_sea_route_desc: "Ochrana námořní trasy kolem Mysu je pro válečné úsilí klíčová. Další rozšíření posádky podél pobřeží nám umožní udržet kontrolu nad plavebními trasami." # todo: NEW TRANSLATION
  SAF_sa_airforce_college: "Kolej jihoafrického letectva" # todo: NEW TRANSLATION
  SAF_sa_airforce_college_desc: "Kolej jihoafrického letectva dosud byla součástí Vojenské koleje. Zřídíme samostatnou instituci, která lépe poslouží našim pilotům." # todo: NEW TRANSLATION
  SAF_sa_naval_college: "Jihoafrická námořní kolej" # todo: NEW TRANSLATION
  SAF_sa_naval_college_desc: "Jihoafrická námořní kolej je v porovnání s některými našimi spojenci malá. Investujme do lepších zařízení a výcviku pro nové námořní rekruty, abychom z nich získali maximum." # todo: NEW TRANSLATION
  SAF_hulamin_aluminium_plant: "Hut Hulamin – závod na hliník" # todo: NEW TRANSLATION
  SAF_hulamin_aluminium_plant_desc: "Náš průmysl potřebuje hliník, proto investujme do výroby vlastních zdrojů. Nový závod v Richards Bay je ideální lokalita." # todo: NEW TRANSLATION
  SAF_sasol_non_aligned: "Založit Sasol" # todo: NEW TRANSLATION
  SAF_sasol_non_aligned_desc: "Jižní Afrika nemůže vždy spoléhat na dovozy ropy a kaučuku, musíme usilovat o soběstačnost. Máme dostatek zásob uhlí, které můžeme použít k výrobě syntetických paliv." # todo: NEW TRANSLATION
  SAF_electronics_bonus: "Investovat do elektroniky" # todo: NEW TRANSLATION
  SAF_electronics_bonus_desc: "Oblast elektroniky rychle postupuje. Musíme držet krok." # todo: NEW TRANSLATION
  SAF_hulamin_aluminium_plant_ii: "Rozšířit hliníkové závody" # todo: NEW TRANSLATION
  SAF_hulamin_aluminium_plant_ii_desc: "Vždy budeme potřebovat více hliníku, tak investujme do větších kapacit." # todo: NEW TRANSLATION
  SAF_iscor_expansion_ii: "Nový závod Iscor" # todo: NEW TRANSLATION
  SAF_iscor_expansion_ii_desc: "Nová plně integrovaná ocelárna ve Vanderbijlparku nám umožní uspokojit potřeby našeho průmyslu." # todo: NEW TRANSLATION
  SAF_invite_german_settlers: "Pozvat německé osadníky" # todo: NEW TRANSLATION
  SAF_invite_german_settlers_desc: "Afrika má spoustu prostoru pro podnikavé jedince, aby si vydělali jmění. Podpoříme německé přesídlování do Jihozápadní Afriky a jinde." # todo: NEW TRANSLATION
  SAF_expand_cape_franchise: "Rozšířit volební právo v Kapsku" # todo: NEW TRANSLATION
  SAF_expand_cape_franchise_desc: "Každý muž a žena způsobilí k hlasování by měl mít právo volit o své vlastní budoucnosti. Rozšířením volebního práva napříč všemi rasami v zemi můžeme začít dosahovat skutečného pokroku směrem k nové Jižní Africe." # todo: NEW TRANSLATION
  SAF_free_elections: "Uspořádat svobodné volby" # todo: NEW TRANSLATION
  SAF_free_elections_desc: "Nastal čas uspořádat první svobodné volby v zemi. Mnozí očekávají, že bude jen jeden jasný vítěz." # todo: NEW TRANSLATION
  SAF_reconciliation: "Politika smíření" # todo: NEW TRANSLATION
  SAF_reconciliation_desc: "V této nové Jižní Africe se musíme snažit o inkluzi a smíření, abychom se jako národ mohli posunout vpřed pokojně." # todo: NEW TRANSLATION
  SAF_namibian_freedom: "Svoboda Namibie" # todo: NEW TRANSLATION
  SAF_namibian_freedom_desc: "Jaký příklad bychom dali Africe, kdybychom pokračovali ve starých koloniálních praktikách? Předáme Namibii jejím lidem a nasměrujeme je k úplné nezávislosti." # todo: NEW TRANSLATION
  SAFR.1.t: "Nabídka ochrany pro Madagaskar" # todo: NEW TRANSLATION
  SAFR.1.d: "Jižní Afrika požádala, aby převzala kontrolu nad Madagaskarem, alespoň pro předvídatelnou budoucnost, údajně aby ochránila spojenecké zájmy v oblasti. Jak máme reagovat?" # todo: NEW TRANSLATION
  SAFR.1.a: "Dobře, mohou jej mít zatím." # todo: NEW TRANSLATION
  SAFR.1.b: "Nikdy! Chtějí jen rozšířit své hranice." # todo: NEW TRANSLATION
  SAFR.2.t: "Francie souhlasí s naším návrhem" # todo: NEW TRANSLATION
  SAFR.2.d: "Francouzská vláda moudře uznala, že jsme v lepší pozici udržet kontrolu spojenců a zájmy v jižním Indickém oceánu a souhlasila předat kontrolu nad Madagaskarem." # todo: NEW TRANSLATION
  SAFR.2.a: "Postaráme se o něj." # todo: NEW TRANSLATION
  SAFR.3.t: "Francie odmítá naši nabídku" # todo: NEW TRANSLATION
  SAFR.3.d: "V ohromujícím projevu krátkozrakosti a nerozumu francouzská vláda odmítla naši nabídku převzít kontrolu nad Madagaskarem. Tvrdí, že máme zájem jen rozšířit svůj vliv na jejich „správné“ území." # todo: NEW TRANSLATION
  SAFR.3.a: "Blázni" # todo: NEW TRANSLATION
  SAFR.7.t: "Jižní Afrika žádá zbraně pro revoluci" # todo: NEW TRANSLATION
  SAFR.7.d: "Jižní Afrika si žádá naši pomoc v potenciální revoluci, která ve státě vře." # todo: NEW TRANSLATION
  SAFR.7.a: "Velmi dobře" # todo: NEW TRANSLATION
  SAFR.7.b: "Ne, potřebujeme je" # todo: NEW TRANSLATION
  SAFR.8.t: "Sověti přijímají" # todo: NEW TRANSLATION
  SAFR.8.d: "Sověti souhlasili poslat nám několik pušek, aby pomohli v našem svržení vlády. Měly by dorazit někdy poté, co revoluce začne." # todo: NEW TRANSLATION
  SAFR.8.a: "Skvělé" # todo: NEW TRANSLATION
  SAFR.9.t: "Sověti odmítají" # todo: NEW TRANSLATION
  SAFR.9.d: "Sověti odmítli poskytnout nám jakoukoli pomoc, říkajíc, že si budeme muset vystačit s tím, co máme." # todo: NEW TRANSLATION
  SAFR.9.a: "Zrádci kauzy!" # todo: NEW TRANSLATION
  SAFR.10.t: "Sovětské zbraně dorazily" # todo: NEW TRANSLATION
  SAFR.10.d: "Sověti dodrželi slovo a úspěšně doručili zbraně k vyzbrojení naší revoluční milice. Muži, kteří pomohli získat zbraně, se také rozhodli zůstat a pomoci naší věci proti kolonialismu a kapitalismu." # todo: NEW TRANSLATION
  SAFR.10.a: "Dobře je využijeme." # todo: NEW TRANSLATION
  SAFR.15.t: "Občanská válka" # todo: NEW TRANSLATION
  SAFR.15.d: "Nastal čas zahájit revoluci a vyhnat Brity z Indie jednou provždy." # todo: NEW TRANSLATION
  SAFR.15.a: "Ano!" # todo: NEW TRANSLATION
  SAFR.16.t: "Nová směrnice SRD dostupná" # todo: NEW TRANSLATION
  SAFR.16.d: "Naši vědci hlásí, že dokončili své předchozí zadání a čekají na nové směrnice pro rok." # todo: NEW TRANSLATION
  SAFR.16.a: "Dobře" # todo: NEW TRANSLATION
  SAFR.17.t: "Koup strany" # todo: NEW TRANSLATION
  SAFR.17.d: "Hertzog se vrátil k Národní straně a prosazoval usmíření mezi afrikanery a britskými Jihoafričany, což většina členů strany odmítla; v důsledku toho se rozhodl odstoupit a odejít z politiky. Před volbami bude třeba zvolit nového vůdce strany. Malanovy záměry jsou jasné — republika a nezávislost pro Jižní Afriku. Pirowova vize se zdá mnohem extrémnější než pouhá svoboda." # todo: NEW TRANSLATION
  SAFR.17.b: "Podpořit Pirowa." # todo: NEW TRANSLATION
  SAFR.17.a: "Podpořit Malana." # todo: NEW TRANSLATION
  SAFR.18.t: "Malan vítězí" # todo: NEW TRANSLATION
  SAFR.18.d: "V těsně soutěženém hlasování získala Malanova Sjednocená národní strana podporu lidu a nyní povede novou vládu. Nezávislost na Británii se zdá být hlavním programem nové vlády, ale musíme počkat a uvidíme, co přijde dál." # todo: NEW TRANSLATION
  SAFR.18.a: "Vynikající" # todo: NEW TRANSLATION
  SAFR.19.t: "Pirow vítězí" # todo: NEW TRANSLATION
  SAFR.19.d: "Po úzkém vítězství zvítězila Sjednocená národní strana a Pirow převezme post premiéra. Pirowovy přesné politiky jsou mnohým ve straně nejasné; někteří podezřívají, že může jít o velmi radikální opatření." # todo: NEW TRANSLATION
  SAFR.19.a: "Vynikající" # todo: NEW TRANSLATION
  SAFR.21.t: "Havenga a Pirow v Berlíně" # todo: NEW TRANSLATION
  SAFR.21.d: "Zdá se, že naše schůzky v Berlíně byly německou vládou příznivě přijaty. Na stole máme dvě nabídky, ačkoliv reálně můžeme pokračovat jen v jedné. Havenga dokázal vyjednat vzájemně výhodnou obchodní dohodu, zatímco Pirowovy předchozí schůzky s Hitlerem a vysokými německými úředníky a jeho plynulá němčina nám umožní poslat naše nejlepší generály a důstojníky do Německa ke školení a cvičením s Wehrmachtem." # todo: NEW TRANSLATION
  SAFR.21.a: "Havengova dohoda" # todo: NEW TRANSLATION
  SAFR.21.b: "Pirowova dohoda" # todo: NEW TRANSLATION
  SAFR.22.t: "Jižní Afrika žádá nadvládu nad našimi koloniemi." # todo: NEW TRANSLATION
  SAFR.22.d: "Jižní Afrika tvrdí, že může lépe chránit naše jižní africké kolonie a říká, že jim dá omezenou samosprávu. Máme to povolit?" # todo: NEW TRANSLATION
  SAFR.22.a: "Přijímáme." # todo: NEW TRANSLATION
  SAFR.22.b: "Ne." # todo: NEW TRANSLATION
  SAFR.23.t: "Británie souhlasí s naším návrhem" # todo: NEW TRANSLATION
  SAFR.23.d: "Británie souhlasila předat své jižní africké kolonie. Okamžitě zajistíme, aby jim byla poskytnuta nějaká forma autonomie, než jim plně předáme kontrolu." # todo: NEW TRANSLATION
  SAFR.23.a: "Vynikající." # todo: NEW TRANSLATION
  SAFR.24.t: "Británie náš návrh odmítá" # todo: NEW TRANSLATION
  SAFR.24.d: "Británie naši nabídku odmítla. Zdá se, že jejich zastaralé koloniální politiky se nemění." # todo: NEW TRANSLATION
  SAFR.24.a: "Škoda." # todo: NEW TRANSLATION
  SAFR.25.t: "Británie nabízí kompromis" # todo: NEW TRANSLATION
  SAFR.25.d: "Británie nám nabídla kompromis. Souhlasili předat Bechuanaland a Rhodésii, ale ponechají si své kolonie na severu." # todo: NEW TRANSLATION
  SAFR.25.a: "Je to začátek." # todo: NEW TRANSLATION
  JAP_nanshin_ron_doctrine: "Nanshin-ron\nDoktrína" # todo: NEW TRANSLATION
  JAP_nanshin_ron_doctrine_EXPL1: "\n§HNanshin-ron§! doktrína je §CProsazována§! frakcí §HTōseiha§!. Postoupit na stranu frakce §HKōdōha§! a následovat tuto doktrínu by také mělo následující §REfekty§!:\n" # todo: NEW TRANSLATION
  JAP_nanshin_ron_doctrine_EXPL2: "\nSložili jste se se §HKōdōha§! frakcí, která prosazuje §HHokushin-ron§! doktrínu. Proto výběr tohoto dříve než dokončení Hokushin-ron bude mít následující §REfekty§!:\n" # todo: NEW TRANSLATION
  JAP_nanshin_ron_doctrine_desc: "„Doktrína jižní expanze“ je vojenská a politická doktrína v Japonské říši, která tvrdí, že jihovýchodní Asie a ostrovy Tichomoří jsou japonskou sférou zájmu a že potenciální hodnota pro japonské impérium pro ekonomickou a územní expanzi v těchto oblastech byla větší než jinde." # todo: NEW TRANSLATION
  JAP_expand_the_hosaku_kenkyu_kai: "Rozšířit\nHosaku Kenkyu-kai" # todo: NEW TRANSLATION
  JAP_expand_the_hosaku_kenkyu_kai_desc: "'Hosaku Kenkyu-kai', tedy politika vůči jižním mořím, je vytvořená skupina pro zkoumání vojenských a ekonomických strategií na jih, která rovněž spolupracuje s ministerstvem koloniálních záležitostí (Takumu-sho) a zdůrazňuje vojenskou roli Tchaj-wanu a Mikronésie jako pokročilých základen pro další jižní expanzi." # todo: NEW TRANSLATION
  JAP_move_to_indochina: "Přesunout se do Indočíny" # todo: NEW TRANSLATION
  JAP_move_to_indochina_desc: "" # todo: NEW TRANSLATION
  JAP_f_kikan: "F Kikan" # todo: NEW TRANSLATION
  JAP_f_kikan_desc: "Fujiwara Kikan, pojmenovaný po svém vůdci majoru Fujiwara Iwaichim, je vojenská rozvědná operace, kterou ustaví velitelství. Jeho úkolem bude kontaktovat indické hnutí za nezávislost, přistěhovalé Číňany v zámoří a malajské sultány s cílem povzbudit přátelství a spolupráci s Japonskem." # todo: NEW TRANSLATION
  JAP_SIA_anti_western_cooperation_with_siam: "Protizápadní spolupráce se Siamem" # todo: NEW TRANSLATION
  JAP_SIA_anti_western_cooperation_with_siam_desc: "" # todo: NEW TRANSLATION
