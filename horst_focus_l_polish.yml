  fin_secret_weapons_desc: "Lákavé je investovat všechny zdroje do tanků a letadel, ale tajemství vítězství spočívá v úplně nových oblastech vědy; elektronice, raketách a jaderném výzkumu." # todo: NEW TRANSLATION
  fin_political_effort: "Politické úsilí" # todo: NEW TRANSLATION
  fin_political_effort_desc: "Chceme‑li přinést změnu ve světě, musíme nejdříve přinést změnu v naší zemi. Posílení naší politické pozice by mělo být první." # todo: NEW TRANSLATION
  fin_collectivist_ethos: "Kolektivistický étos" # todo: NEW TRANSLATION
  fin_collectivist_ethos_desc: "Naši nepřátelé mohou dělit a vláčet menší národy, ale náš lid zůstane jednotný. Všichni za jednoho, jeden za všechny." # todo: NEW TRANSLATION
  fin_why_we_fight: "Proč bojujeme" # todo: NEW TRANSLATION
  fin_why_we_fight_effect: "Pokud nemáme §Yduch neutrální zahraniční politiky§!, budeme schopni vytvořit frakce.\n" # todo: NEW TRANSLATION
  fin_why_we_fight_desc: "Svět se stává stále nebezpečnějším. Náš lid musí vidět zvěrstva páchaná těmi, kdo touží po moci. Je čas svolat lid k naší věci a zajistit, že všichni budou připraveni bojovat za naši svobodu." # todo: NEW TRANSLATION
  fin_political_commissars: "Politické komisaře" # todo: NEW TRANSLATION
  fin_political_commissars_desc: "Abychom zajistili dodržování našich politik v armádní praxi, zavedeme politicky jmenované úředníky do vojenských řad." # todo: NEW TRANSLATION
  fin_internationalism_focus: "Zaměření na internacionalismus" # todo: NEW TRANSLATION
  fin_internationalism_focus_desc: "Ideologie nezná hranice. Jiný národ se může nazývat suverénním, ale naše přesvědčení jsou nad takovými nároky." # todo: NEW TRANSLATION
  fin_nationalism_focus: "Zaměření na nacionalismus" # todo: NEW TRANSLATION
  fin_nationalism_focus_desc: "Náš národ je jedinečný a naše politické úspěchy se mohly stát jen zde. Musíme za něj bojovat za jakoukoli cenu." # todo: NEW TRANSLATION
  fin_ideological_fanaticism: "Ideologický fanatismus" # todo: NEW TRANSLATION
  fin_ideological_fanaticism_desc: "Naše politicky stanovené hodnoty a cíle stojí za to zemřít stejně jako každá stará víra. Každý stoupenec musí být připraven čelit smrti, a ti, kdo zbloudí, lépe buď očekávají smrt." # todo: NEW TRANSLATION
  GRE_metaxas: "Jiří II. a Metaxas" # todo: NEW TRANSLATION
  GRE_metaxas_desc: "S pomocí našeho milovaného krále Jiřího II. se Metaxasovi podařilo chopit moci pozastavením parlamentu. Nyní konečně máme příležitost nastolit konzervativní režim s silným totalitním vůdcem, aby lid Řecka měl konečně někoho, na koho se může obrátit." # todo: NEW TRANSLATION
  GRE_the_backbone_of_our_army2: "Řecké zbraně" # todo: NEW TRANSLATION
  GRE_the_backbone_of_our_army2_desc: "Naše vybavení je žalostně zastaralé; je čas modernizovat naše vybavení (francouzskými) řeckými zbraněmi!" # todo: NEW TRANSLATION
  nor_drill_exile_army: "Cvičit exilovou armádu" # todo: NEW TRANSLATION
  nor_drill_exile_army_desc: "Denní cvičení a přednášky o operační strategii, taktikách jednotek a střelbě vyrovnají náš výcvik s Wehrmachtem." # todo: NEW TRANSLATION
  nor_operation_crofter: "Operace Crofter" # todo: NEW TRANSLATION
  nor_operation_crofter_desc: "Je čas podniknout jednorázovou cestu zpět do Norska. Osvobodíme svou vlast před německou hrozbou nebo zemřeme při pokusu!" # todo: NEW TRANSLATION
  nor_train_with_sas: "Společný výcvik se SAS" # todo: NEW TRANSLATION
  nor_train_with_sas_desc: "Společným výcvikem s našimi britskými protějšky můžeme vycvičit některé z nejnebezpečnějších vojáků na světě." # todo: NEW TRANSLATION
  nor_fleischers_plan: "Fleischerův plán" # todo: NEW TRANSLATION
  GRE_new_weapons_old_tricks2: "Graeko‑turecká válka" # todo: NEW TRANSLATION
  GRE_new_weapons_old_tricks2_desc: "Měli jsme poměrně dost zkušeností s obsluhou děl a vedením průzkumu během Graeko‑turecké války 1919–22. Technologie se možná změnila, ale taktiky rozhodně ne, takže modernizace výzbroje je cesta." # todo: NEW TRANSLATION
  GRE_rejuvenating_athens2: "Podporovat turismus" # todo: NEW TRANSLATION
  GRE_rejuvenating_athens2_desc: "Řecko má díky své bohaté historii impozantní památky, které ukážou krásu lidské civilizace. Lidé ale často zapomínají na naše zázračné geografické postavení. Země obsahuje mnoho přírodních krás. Využijme naše výhodné postavení." # todo: NEW TRANSLATION
  GRE_thema_nautikon2: "Dlouhá amfibiální tradice" # todo: NEW TRANSLATION
  GRE_thema_nautikon2_desc: "Naše země se skládá z pevniny a velkého souostroví. Jako jedna z prvních civilizací světa máme zkušenosti s bojem na těchto ostrovních oblastech; poučme se z minulosti." # todo: NEW TRANSLATION
  GRE_a_modern_navy2: "Objevitelé řeckého ohně" # todo: NEW TRANSLATION
  GRE_a_modern_navy2_desc: "Naši předkové, dobře vzpomínaní Byzantinci, byli vynálezci revolučního řeckého ohně na malých smrtících galérách. Díky řeckému ohni jsme po staletí dominovali námořním oblastem kolem Konstantinopole. Nechť se tato námořní inovativnost znovu probudí!" # todo: NEW TRANSLATION
  GRE_a_land_of_mountains2: "Dědictví Leonidase" # todo: NEW TRANSLATION
  GRE_academy_of_athens2: "Místo zrození filosofie" # todo: NEW TRANSLATION
  GRE_academy_of_athens2_desc: "Řecko je rodištěm filosofie a vidělo velké vědce a filozofy; Aristoteles, Platón, Sokrates, Hippokratés, Zénón, Pythagoras, Anaxagoras, Demokritos, abychom jmenovali několik." # todo: NEW TRANSLATION
  GRE_a_legacy_of_war2: "Dědictví Alexandra" # todo: NEW TRANSLATION
  GRE_a_legacy_of_war2_desc: "Mégas Aléxandros, Basileús Makedónón, Strategos Autokrator Hellados, Férón Aigyptou, Basileús Pérsón, Kyrios tés Asias, největší všech dob." # todo: NEW TRANSLATION
  GRE_a_long_and_proud_tradition2: "Dědictví Themistokla" # todo: NEW TRANSLATION
  GRE_atlantis: "Ztracené království Atlantida" # todo: NEW TRANSLATION
  GRE_atlantis_desc: "Staří Atlantové byli naši dávní kulturní předkové. Musíme se vrátit k bezpečí Atlantidy, zatímco je naše vlast okupována." # todo: NEW TRANSLATION
  GRE_an_orthodox_state2_desc: "Řecko je domovem pravoslavné církve; naši předkové, Byzantinci, zavedli naši velkou víru v roce 1054 po východním schizmu. Ukažme znovu našemu lidu, že pravoslaví je spjato s naší národní identitou. Pravoslaví bude naším vodítkem v těchto zoufalých časech!" # todo: NEW TRANSLATION
  GRE_an_orthodox_state2: "Řecké pravoslaví" # todo: NEW TRANSLATION
  GRE_island: "[GetAtlantisFocusName]" # todo: NEW TRANSLATION
  GRE_island_desc: "[GetAtlantisFocusDesc]" # todo: NEW TRANSLATION
  AtlantisHidden: "Tajemná mlha..." # todo: NEW TRANSLATION
  AtlantisHiddenDesc: "Oblast Atlantiku západně od Azor je ponořená do tajemné mlhy. Vody zůstávají málo zmapované kvůli drsnému počasí a odlehlosti místa, ale možná se to jednou zlepší?" # todo: NEW TRANSLATION
  AtlantisSpotted: "Tajemný ostrov..." # todo: NEW TRANSLATION
  AtlantisSpottedDesc: "V Atlantiku byl objeven nový ostrov. Měli bychom poslat archeology, aby zjistili více o tomto zvláštním místě..." # todo: NEW TRANSLATION
  gre_island_spotted: "Počasí se změnilo a umožnilo další průzkum..." # todo: NEW TRANSLATION
  GRE_island_tt: "\n§RUjistěte se, že vyberete tento fokus dříve, než Itálie dokončí 'Balkan Dominance', jinak vaše hra skončí!!!§!" # todo: NEW TRANSLATION
  GRE_reviving_the_spartan_warrior_spirit2: "Athéna & Árész" # todo: NEW TRANSLATION
  GRE_reviving_the_spartan_warrior_spirit2_desc: "V těchto temných časech potřebujeme každou pomoc, chceme‑li někdy znovu dobyti naši milovanou vlast. Budeme se modlit k našim starověkým válečným bohům, Athéně a Árészovi, aby jejich duch v nás opět ožil." # todo: NEW TRANSLATION
  GRE_a_long_and_proud_tradition2_desc: "Tentokrát Themistoklés odpověděl rozsáhle a s hněvem namířeným proti Adeimantovi a Korinťanům; prohlásil, že Athéňané mají skutečně větší město a zemi než oni, pokud budou mít 200 vlastních lodí, plně obsazených, neboť žádný z Hellenů je nemůže odrazit, pokud zaútočí. Herodotos, Historíai, rozhodující o athénském vedení v bitvě u Salamíny." # todo: NEW TRANSLATION
  nor_fleischers_plan_desc: "Malá vysoce vycvičená elitní síla je to, co Norsko potřebuje k osvobození naší vlasti." # todo: NEW TRANSLATION
  nor_ruges_plan: "Rugeův plán" # todo: NEW TRANSLATION
  nor_ruges_plan_desc: "Velká, profesionálně vycvičená konvenční armáda nám umožní současně napadnout více regionů v Norsku a přemoci nepřítele." # todo: NEW TRANSLATION
  nor_winter_mountain_training: "Arktický výcvik" # todo: NEW TRANSLATION
  nor_winter_mountain_training_desc: "Norsko je převážně chladné a hornaté — stateční muži Svobodných norských sil se musí aklimatizovat na naše domovské terény. Naštěstí to můžeme udělat ve Skotsku." # todo: NEW TRANSLATION
  nor_norway_in_exile: "Svobodné královské norské síly" # todo: NEW TRANSLATION
  nor_norway_in_exile_desc: "Alt for Norge!" # todo: NEW TRANSLATION
  nor_norway_in_exile_navy: "Svobodné královské norské námořnictvo" # todo: NEW TRANSLATION
  nor_norway_in_exile_navy_desc: "Alt for Norge!" # todo: NEW TRANSLATION
  nor_prepare_operation_crofter: "Příprava operace Crofter" # todo: NEW TRANSLATION
  nor_prepare_operation_crofter_desc: "Musíme pečlivě naplánovat osvobození — jakmile lodě vyplují, nebude cesty zpět." # todo: NEW TRANSLATION
  nor_civillian_effort: "Bohaté vodní elektrárny" # todo: NEW TRANSLATION
  nor_ski_inf: "Lyžařská pěchota" # todo: NEW TRANSLATION
  nor_ski_inf_desc: "Lesnatý, venkovský terén bez silnic je v zimě těžký pro pěchotu, ale ne pro lyžaře." # todo: NEW TRANSLATION
  nor_civillian_effort_desc: "Naše četné přehrady po celé zemi nám umožňují levně elektrifikovat národ a umožnit větší ekonomický rozvoj." # todo: NEW TRANSLATION
  nor_military_effort: "Rozšířit Kongsberg Gruppen" # todo: NEW TRANSLATION
  nor_military_effort_desc: "Kongsberg Gruppen, jeden z našich největších vojenských průmyslů, musí být rozšířen pro případ invaze." # todo: NEW TRANSLATION
  nor_fullindustrial_effort: "Shromáždit ekonomické rezervy" # todo: NEW TRANSLATION
  nor_fullindustrial_effort_desc: "Občané Norska, pokud nebude každý, kdo není zaměstnán v jiných záležitostech, v továrně, náš národ jistě padne!" # todo: NEW TRANSLATION
  nor_army_effort: "Norská armáda" # todo: NEW TRANSLATION
  nor_army_effort_desc: "Navzdory rostoucím možnostem letecké a námořní války je pozemní boj stále klíčový v bitvách budoucnosti. S přípravou se můžeme vyhnout znovuprožití pekla zákopů." # todo: NEW TRANSLATION
  nor_equipment_effort: "Zlepšit Krag‑Jørgensen" # todo: NEW TRANSLATION
  nor_equipment_effort_desc: "Limity toho, co může pěchota nést, se neustále posouvají. Zaměříme se na to, aby naši vojáci měli ty nejlepší dostupné nástroje." # todo: NEW TRANSLATION
  nor_motorization_effort: "Vývoj dělostřelectva po Velké válce" # todo: NEW TRANSLATION
  nor_motorization_effort_desc: "Musíme studovat nedávné pokroky v dělostřelecké technice." # todo: NEW TRANSLATION
  nor_doctrine_effort: "Studovat moderní doktríny" # todo: NEW TRANSLATION
  nor_doctrine_effort_desc: "Vojenské doktríny definující pozemní boj ve Velké válce jsou zastaralé. Musíme dát naše nejlepší mozky, aby formovaly vojenské myšlení zítřka." # todo: NEW TRANSLATION
  nor_equipment_effort_2: "Fokus podpory" # todo: NEW TRANSLATION
  nor_equipment_effort_2_desc: "Budeme pokračovat v úsilí zajistit, že naše pěchota je vybavena nejlepšími podpůrnými brigádami své doby." # todo: NEW TRANSLATION
  nor_mechanization_effort: "Protitankové úsilí" # todo: NEW TRANSLATION
  nor_mechanization_effort_desc: "Musíme ochránit naše pěší divize před tanky všemi prostředky." # todo: NEW TRANSLATION
  nor_doctrine_effort_2: "Taktické pokroky" # todo: NEW TRANSLATION
  nor_doctrine_effort_2_desc: "Bojiště se změnilo nejen během meziválečných let, ale i v průběhu nedávných konfliktů. Musíme neustále přehodnocovat naše doktríny." # todo: NEW TRANSLATION
  nor_equipment_effort_3: "Norský Sturmgewehr" # todo: NEW TRANSLATION
  nor_equipment_effort_3_desc: "Místo napodobování nebo nákupu cizí techniky bychom měli usilovat stát se světovými lídry v pěchotních zbraních." # todo: NEW TRANSLATION
  nor_armor_effort: "Protiletadlové úsilí" # todo: NEW TRANSLATION
  nor_armor_effort_desc: "Musíme ochránit naše pěší divize kvalitními protiletadlovými brigádami." # todo: NEW TRANSLATION
  nor_tank_forces: "Rozšířit naše tankové síly" # todo: NEW TRANSLATION
  nor_tank_forces_desc: "V dnešní době nemůže armáda sestávat pouze z nemotorných a slabých pěších vojáků. Musíme mechanizovat a chránit naši pěchotu vhodným pancéřováním." # todo: NEW TRANSLATION
  nor_special_forces: "Rozšířit Forsvarets Spesialkommando" # todo: NEW TRANSLATION
  nor_special_forces_desc: "Potřebujeme elitní jednotky; horské oddíly a výsadkáře by měly být prioritou." # todo: NEW TRANSLATION
  nor_fighter_focus: "Zaměření na stíhače" # todo: NEW TRANSLATION
  nor_fighter_focus_desc: "Nepřestali jsme vidět letecké souboje jako za Velké války. Držením se v čele vývoje stíhacích letounů získáme výhodu v budoucnu." # todo: NEW TRANSLATION
  nor_bomber_focus: "Zaměření na bombardéry" # todo: NEW TRANSLATION
  nor_bomber_focus_desc: "Až budou lidé budoucnosti mluvit o hrůzách dnešních válek, bude v příbězích výrazně figurovat oheň padající z nebe. Uděláme vše, aby tyto příběhy vyprávěli naši nepřátelé." # todo: NEW TRANSLATION
  nor_aviation_effort_2: "Letecké úsilí II" # todo: NEW TRANSLATION
  nor_aviation_effort_2_desc: "Další pokroky v letectví budou nutné, aby se naše letectvo dobře integrovalo s ostatními složkami armády." # todo: NEW TRANSLATION
  nor_CAS_effort: "Úsilí v blízké letecké podpoře" # todo: NEW TRANSLATION
  nor_CAS_effort_desc: "Moderní armáda potřebuje podporu vozidel nejen na zemi, ale i ve vzduchu." # todo: NEW TRANSLATION
  nor_rocket_effort: "Raketové úsilí" # todo: NEW TRANSLATION
  nor_rocket_effort_desc: "Raketové a proudové motory umožňují bezprecedentní rychlosti jak bezpilotním, tak i pilotovaným plavidlům. Průkopnictví v těchto technologiích nám umožní nepřítele zaskočit." # todo: NEW TRANSLATION
  nor_NAV_effort: "Námořní úsilí" # todo: NEW TRANSLATION
  nor_NAV_effort_desc: "Stejně jako nová námořní válka se částečně odehrává pod hladinou, část se odehrává i ve vzduchu nad vodami." # todo: NEW TRANSLATION
  nor_naval_effort: "Námořní úsilí" # todo: NEW TRANSLATION
  nor_naval_effort_tt: "Nedostatek stavebních polí pro §YNámořní loděnice§!" # todo: NEW TRANSLATION
  nor_naval_effort_desc: "Rozšíření našeho námořnictva by mělo být naší nejvyšší prioritou. Přidělte veškeré dostupné zdroje na nové loděnice a výzkum lehkých povrchových plavidel." # todo: NEW TRANSLATION
  nor_flexible_navy: "Flexibilní námořnictvo" # todo: NEW TRANSLATION
  nor_flexible_navy_desc: "Převrat v námořním boji s ohledem na pokrok v ponorkové technologii nám umožní účinně útočit na nepřátelské konvoje." # todo: NEW TRANSLATION
  nor_large_navy: "Velké námořnictvo" # todo: NEW TRANSLATION
  nor_large_navy_desc: "Přizpůsobení naší námořní doktríny pro velká plavidla a zajištění bezpečnosti obchodních konvojů nás naučí mnoho o tom, jaké typy lodí potřebujeme." # todo: NEW TRANSLATION
  nor_submarine_effort: "Ponorkové úsilí" # todo: NEW TRANSLATION
  nor_submarine_effort_desc: "Ponorková válka je nejzajímavějším námořním vývojem od vynálezu torpédového člunu. Měli bychom se nejen bránit proti ponorkám, ale také je používat proti nepřátelské plavbě." # todo: NEW TRANSLATION
  nor_cruiser_effort: "Křižníkové úsilí" # todo: NEW TRANSLATION
  nor_cruiser_effort_desc: "Než se pustíme do pokročilého výzkumu bitevních lodí, menší křižníky je třeba nahradit." # todo: NEW TRANSLATION
  nor_destroyer_effort: "Torpédoborcové úsilí" # todo: NEW TRANSLATION
  nor_destroyer_effort_desc: "Studiem konstrukce a strategického využití ponorek jsme se také naučili, jak těmto strategiím čelit. Torpédoborce budou v tom nezbytné." # todo: NEW TRANSLATION
  nor_capital_ships_effort: "Úsilí o hlavní válečné lodě" # todo: NEW TRANSLATION
  nor_capital_ships_effort_desc: "Národ s největším počtem bitevních lodí bude vládnout oceánům. Bitevní lodě a letadlové lodě představují staré i nové prvky námořní nadvlády." # todo: NEW TRANSLATION
  nor_industrial_effort: "Průmyslové úsilí" # todo: NEW TRANSLATION
  nor_industrial_effort_desc: "Soustřeďme veškeré politické úsilí na vybudování civilního průmyslu v rámci velkého skoku kupředu." # todo: NEW TRANSLATION
  nor_industrial_effort_2: "Průmyslové úsilí II" # todo: NEW TRANSLATION
  nor_industrial_effort_2_desc: "S železnou vůlí a neúnavným pracovním nasazením můžeme mobilizovat lid v dalším velkém průmyslovém úsilí." # todo: NEW TRANSLATION
  nor_construction_effort: "Stavební úsilí" # todo: NEW TRANSLATION
  nor_construction_effort_tt: "Nedostatek stavebních polí pro §YCivilní továrny§!" # todo: NEW TRANSLATION
  nor_construction_effort_desc: "Kapacita civilního průmyslu se nesmí podceňovat ani když nad světem visí hrozba války." # todo: NEW TRANSLATION
  nor_production_effort: "Zbrojní úsilí" # todo: NEW TRANSLATION
  nor_production_effort_tt: "Nedostatek stavebních polí pro §YVojenskou továrnu§!" # todo: NEW TRANSLATION
  nor_production_effort_desc: "Pokud dokážeme vyrábět traktory, dokážeme vyrábět tanky! Nesmíme dovolit, aby naše vojenská výrobní kapacita zaostávala." # todo: NEW TRANSLATION
  nor_construction_effort_2: "Stavební úsilí II" # todo: NEW TRANSLATION
  nor_construction_effort_2_desc: "Pokračující rozšiřování našich továren nám umožní urychlit výrobu zboží pro obchod i další stavební projekty." # todo: NEW TRANSLATION
  nor_production_effort_2: "Zbrojní úsilí II" # todo: NEW TRANSLATION
  nor_production_effort_2_desc: "Snažit se přizpůsobit civilní továrny pro výrobu vojenské techniky je neefektivní. Měli bychom se nyní soustředit na přípravu vojenské výroby." # todo: NEW TRANSLATION
  nor_production_effort_3: "Zbrojní úsilí III" # todo: NEW TRANSLATION
  nor_production_effort_3_desc: "Pokračující úsilí o rozšíření našich vojenských továren je nezbytné k uspokojení poptávky po novém vybavení." # todo: NEW TRANSLATION
  nor_infrastructure_effort: "Infrastrukturní úsilí" # todo: NEW TRANSLATION
  nor_infrastructure_effort_desc: "Země bez řádné infrastruktury nemůže realizovat pokročilé projekty ani stavby." # todo: NEW TRANSLATION
  nor_infrastructure_effort_tt: "Nedostatek stavebních polí pro §YInfrastrukturu§!" # todo: NEW TRANSLATION
  nor_infrastructure_effort_2: "Infrastrukturní úsilí II" # todo: NEW TRANSLATION
  nor_infrastructure_effort_2_desc: "Další rozšíření infrastruktury umožní dopravu a komunikace nezbytné pro vysoce technologické utajované projekty." # todo: NEW TRANSLATION
  nor_construction_effort_3: "Stavební úsilí III" # todo: NEW TRANSLATION
  nor_construction_effort_3_desc: "Rozšíření naší infrastrukturní sítě výrazně zlepšilo naši kapacitu pro stavby." # todo: NEW TRANSLATION
  nor_nuclear_effort: "Jaderné úsilí" # todo: NEW TRANSLATION
  nor_nuclear_effort_desc: "Stojíme na pokraji objevu, který může změnit svět; nesmíme dovolit, aby jiní zapálili oheň, který by jednoho dne mohl pohlcovat Zemi." # todo: NEW TRANSLATION
  nor_extra_tech_slot: "Další výzkumný slot" # todo: NEW TRANSLATION
  nor_extra_tech_slot_desc: "Naše průmyslové rozšíření a další nedávné pokroky nám mohou umožnit provádět více výzkumu a vývoje paralelně." # todo: NEW TRANSLATION
  nor_extra_tech_slot_2: "Další výzkumný slot II" # todo: NEW TRANSLATION
  nor_extra_tech_slot_2_desc: "Rychlá industrializace naší země otevřela nové možnosti ve výzkumu a vývoji, které bychom měli využít." # todo: NEW TRANSLATION
  nor_technology_sharing: "Norská škola ekonomie" # todo: NEW TRANSLATION
  nor_technology_sharing_desc: "Po mnohém lobbování a tvrdé práci, zejména od Kristoffera Lehmkuhla, byla NHH konečně otevřena králem Haakonem VII. v pondělí 7. září 1936." # todo: NEW TRANSLATION
  nor_secret_weapons: "Vývoj elektroniky" # todo: NEW TRANSLATION
  nor_secret_weapons_desc: "Je lákavé vložit veškeré volné zdroje do vývoje tanků a letadel, ale tajemství vítězství ve válkách spočívá v zcela nových oborech vědy; elektronice, raketnictví a jaderném výzkumu." # todo: NEW TRANSLATION
  nor_political_effort: "Posílit Nygaardsvoldovu vládu" # todo: NEW TRANSLATION
  nor_political_effort_desc: "Abychom dosáhli změny ve světě, musíme být schopni přivést ke změně i vlastní zemi. Posílení naší politické pozice by mělo být na prvním místě." # todo: NEW TRANSLATION
  nor_collectivist_ethos: "Kolektivistický étos" # todo: NEW TRANSLATION
  nor_collectivist_ethos_desc: "Naši nepřátelé mohou rozdělovat a podmaňovat menší národy, ale náš lid zůstane jednotný. Všichni za jednoho a jeden za všechny." # todo: NEW TRANSLATION
  nor_liberty_ethos: "Étos svobody" # todo: NEW TRANSLATION
  nor_liberty_ethos_desc: "V době ideologických fanatiků, kteří se snaží udusit lidského ducha, budeme chránit individuální svobody a svobodu." # todo: NEW TRANSLATION
  nor_militarism: "Militarismus" # todo: NEW TRANSLATION
  nor_militarism_desc: "Ti, kteří považují armádu za nezbytné zlo, budou v čase války váhat. Vryjeme militarismus do naší kultury, abychom se stali národem vojáků." # todo: NEW TRANSLATION
  nor_political_correctness: "Politická korektnost" # todo: NEW TRANSLATION
  nor_political_correctness_desc: "Lidé, kteří zastávají mírně kontroverzní nebo jinak trapné názory, se zdají obávat, že proti nim existuje rozsáhlé spiknutí. To se zdá být vynikajícím nápadem." # todo: NEW TRANSLATION
  nor_neutrality_focus: "Prohlásit přísnou neutralitu" # todo: NEW TRANSLATION
  nor_neutrality_focus_desc: "Zatímco jiní tvrdí, že je třeba odvahy a moudrosti se postavit na jednu stranu v globálním konfliktu, my víme, že k odmítnutí je potřeba více." # todo: NEW TRANSLATION
  nor_interventionism_focus: "Důraz na intervencionismus" # todo: NEW TRANSLATION
  nor_interventionism_focus_desc: "Ceníme si svobody všech lidí, nejen našich vlastních občanů. Pokud zabránění tyranii znamená válku, ať tak bude." # todo: NEW TRANSLATION
  nor_military_youth: "Vojenská mládež" # todo: NEW TRANSLATION
  nor_military_youth_desc: "Organizace podporující disciplínu a politické vzdělávání mládeže v naší zemi budou brzy pěstovat loajalitu a obětavost." # todo: NEW TRANSLATION
  nor_deterrence: "Odstrašení" # todo: NEW TRANSLATION
  nor_deterrence_desc: "Stát osamoceně z války málokdy těžíme. Naštěstí víme, že nejlepší obranou je tak dobře známá síla, že ji nikdy nemusíte použít." # todo: NEW TRANSLATION
  nor_volunteer_corps: "Dobrovolnický sbor" # todo: NEW TRANSLATION
  nor_volunteer_corps_desc: "Nutit náš lid zemřít za ideály svobody by byla ironie, ale vytvoření prostředků pro ty, kteří chtějí pomáhat lidem v zahraničí, není." # todo: NEW TRANSLATION
  nor_paramilitarism: "Paramilitarismus" # todo: NEW TRANSLATION
  nor_paramilitarism_desc: "Vojenské principy mají uplatnění i mimo armádu. S rozvojem polomilitarizovaných jednotek doplňujících naše ozbrojené síly získá více lidí vojenský výcvik." # todo: NEW TRANSLATION
  nor_indoctrination_focus: "Indoktrinace" # todo: NEW TRANSLATION
  nor_indoctrination_focus_desc: "Poté, co naši ideologii ustavíme jako založenou na pravdě, může být učena jako pravda. Vzdělávání a média musí toto poselství odrážet." # todo: NEW TRANSLATION
  nor_foreign_expeditions: "Zahraniční výpravy" # todo: NEW TRANSLATION
  nor_foreign_expeditions_desc: "Jelikož jsou naši nepřátelé připraveni zasahovat v dalekých konfliktech kvůli svým ideálům, musíme být připraveni udělat totéž kvůli těm našim." # todo: NEW TRANSLATION
  nor_why_we_fight: "Proč bojujeme" # todo: NEW TRANSLATION
  nor_why_we_fight_effect: "Pokud nebudeme mít ducha §YNeutralní zahraniční politiky§!, budeme schopni vytvořit frakce.\n" # todo: NEW TRANSLATION
  nor_why_we_fight_desc: "Svět se stává stále nebezpečnějším. Náš lid musí vidět zvěrstva páchána těmi, kteří touží po moci. Je čas svolat lid k naší věci a zajistit, aby byli všichni připraveni bojovat za naši svobodu." # todo: NEW TRANSLATION
  nor_political_commissars: "Politické komisaři" # todo: NEW TRANSLATION
  nor_political_commissars_desc: "Abychom zajistili dodržování našich politik v vojenské praxi, zavedeme do vojenských řad politicky jmenované úředníky." # todo: NEW TRANSLATION
  nor_internationalism_focus: "Zaměření na internacionalismus" # todo: NEW TRANSLATION
  nor_internationalism_focus_desc: "Ideologie nezná hranice. Jiný národ se může nazývat suverénním, ale naše přesvědčení stojí nad takovými nároky." # todo: NEW TRANSLATION
  nor_nationalism_focus: "Zaměření na nacionalismus" # todo: NEW TRANSLATION
  nor_nationalism_focus_desc: "Náš národ je jedinečný a naše politická dosažení se mohla stát pouze zde. Musíme za ně bojovat za každou cenu." # todo: NEW TRANSLATION
  nor_ideological_fanaticism: "Ideologický fanatismus" # todo: NEW TRANSLATION
  nor_ideological_fanaticism_desc: "Naše politicky ustavené hodnoty a cíle stojí za to zemřít stejně jako jakékoli starodávné vyznání. Každý stoupenec by měl být připraven čelit smrti a ti, kdo zbloudí, by měli být připraveni čelit smrti." # todo: NEW TRANSLATION
  nor_narvik: "Přístav Narvik" # todo: NEW TRANSLATION
  nor_narvik_desc: "Severní přístav Narvik je životně důležitým bodem pro obchod na severu; můžeme z něj udělat výsadbový bod k znovudobytí naší země." # todo: NEW TRANSLATION
  nor_coastal_forts: "Posílit Oslo" # todo: NEW TRANSLATION
  nor_coastal_forts_desc: "Musíme být připraveni, pokud Osa bude chtít napadnout naše hlavní město podruhé." # todo: NEW TRANSLATION
  nor_combine_training: "Kombinovaný výcvik" # todo: NEW TRANSLATION
  nor_combine_training_desc: "Můžeme se naučit nové způsoby boje od Britů a oni se mohou učit od nás." # todo: NEW TRANSLATION
  nor_king_speech: "Statečný král" # todo: NEW TRANSLATION
  nor_king_speech_desc: "Náš statečný král Haakon odmítl kapitulovat a inspiruje Nory k odporu a boji." # todo: NEW TRANSLATION
  nor_lower_recruitment_standars: "Snížit náborové standardy" # todo: NEW TRANSLATION
  nor_lower_recruitment_standars_desc: "Musíme rozšířit brannou povinnost, abychom postavili dostatečně velkou armádu k osvobození vlasti, ale naši zbývající kandidáti jsou buď příliš staří, nebo fyzicky nezpůsobilí pro službu. Snížením standardů můžeme rozšířit armádu za cenu snížení kvality." # todo: NEW TRANSLATION
  nor_greenland: "Obsadit Grónsko" # todo: NEW TRANSLATION
  nor_greenland_desc: "Musíme sjednotit naše severské bratry z Grónska, aby bojovali proti Němcům." # todo: NEW TRANSLATION
  nor_iceland: "Obsadit Island" # todo: NEW TRANSLATION
