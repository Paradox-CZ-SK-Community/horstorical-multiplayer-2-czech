  JAP_move_on_horses_EXPL1: "Přidat §HOficíra kavalerie§! rys §H2§! náhodným generálům.\n" # todo: NEW TRANSLATION
  JAP_move_on_horses_EXPL2: "Umožní §HSpecialní kavalerijní výcvik§!:\n§HKavalerie§!\n   Organizace: §G+5§!\n   Míra zotavení: §G+0.15§!\n   Maximální rychlost: §G+5%§!" # todo: NEW TRANSLATION
