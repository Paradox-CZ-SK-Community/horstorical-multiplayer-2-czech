  RAJ_collectivism_desc: "Stále trpíme následky let kolonialismu, ale nyní, když je budoucnost v našich rukou, společné využití zdrojů umožní rychlejší modernizaci společnosti." # todo: NEW TRANSLATION
  RAJ_support_anti_imperialism_in_china: "Podpora Číny" # todo: NEW TRANSLATION
