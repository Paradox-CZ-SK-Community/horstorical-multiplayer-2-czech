  ENG_tank_focus3_desc: "Nasadíme to nejlepší z Královského tankového sboru" # todo: NEW TRANSLATION
  YUG_yugoslavian_rail_network_desc: "Měli bychom rozšířit národní železniční sítě ve všech částech země rovnoměrně. Žádná část našeho národa není důležitější než ostatní." # todo: NEW TRANSLATION
  YUG_bosnian_poverty_system: "Zlepšit lehký průmysl" # todo: NEW TRANSLATION
  GER_army_innovation_tt: "§C\nNasadíme armádu 48 plně vybavených 40w pěších.§!" # todo: NEW TRANSLATION
  YUG_bosnian_poverty_system_desc: "Už máme vnitřní nepokoje, a proto by nebylo vhodné, aby lehký průmysl zaostával a připravil lid o základní potřeby pro každodenní život." # todo: NEW TRANSLATION
  ENG_home_defence_tt: "\nPostavíme Generální hlavní linku - linii pevností úrovně 6 v jižní Anglii k obraně proti invazi.\n\n" # todo: NEW TRANSLATION
  ENG_fall_back_to_ireland: "Ustoupit do Irska" # todo: NEW TRANSLATION
  ENG_fall_back_to_ireland_desc: "Musíme připravit ústupovou linii v Irsku, pokud by domovské ostrovy padly." # todo: NEW TRANSLATION
  ENG_fall_back_to_ireland_tt: "\n§YOdstraníme 5 vojenských továren§! z §Ykaždého státu, který kontrolujeme na pevninské Anglii§!, avšak za to obdržíme pouze §Y75 mils§! kvůli omezením v naší logistice.\n\n" # todo: NEW TRANSLATION
  ENG_fall_back_to_ireland_tt1: "Tento cíl také posílí §YNorthern Ireland a Faerské ostrovy§! a také §Yodstraní Allied Hesistance!§!" # todo: NEW TRANSLATION
  ENG_fall_back_to_canada: "Ustoupit do Kanady" # todo: NEW TRANSLATION
  ENG_fall_back_to_canada_desc: "Pokud Británie padne, Impérium musí přežít z Kanady." # todo: NEW TRANSLATION
  ENG_fall_back_to_canada_tt: "Tento cíl ti dá §Y50 více vojenských továren§! sponzorovaných §YHorstorical Main Modder Cheeseus.§!" # todo: NEW TRANSLATION
  ENG_fall_back_to_canada_tt1: "Tento cíl také posílí §YNewfoundland a Island.§!" # todo: NEW TRANSLATION
  FIN_red_soil_government_tt: "Tento cíl se automaticky dokončí po konání voleb\n\n" # todo: NEW TRANSLATION
  USA_social_security_act: "Zákon o sociálním zabezpečení" # todo: NEW TRANSLATION
  USA_social_security_act_desc: "Starší občané našeho národa žijí většinou v chudobě bez snadného východu. Vytvoření federálního sociálního programu pro naše seniory drasticky zlepší jejich blahobyt. Současně můžeme řešit chudobu z dočasné nezaměstnanosti podobným, ale krátkodobějším programem." # todo: NEW TRANSLATION
  ENG_dresden_idea: "Oblastní bombardování" # todo: NEW TRANSLATION
  HOL_empire: "Nizozemské impérium" # todo: NEW TRANSLATION
  HOL_huygens: "Duch Huygense" # todo: NEW TRANSLATION
  HOL_huygens_desc: "Huygens, brilantní matematik, fyzik, vynálezce a astronom nizozemského původu. Tento muž byl poháněn vědou a byl jednou z vedoucích postav vědecké revoluce 17. století. Nevěřil v hranice. Věda je všude vždy. Věda nemá hranice. Měli bychom sdílet všechny naše technologie s našimi spojenci pro společnou věc." # todo: NEW TRANSLATION
  HOL_reinforce_sumatra: "Posílit Sumatru" # todo: NEW TRANSLATION
  HOL_reinforce_sumatra_desc: "Sumatra je náš druhý nejdůležitější ostrov ve Východní Indii hned po Javě. Držení tohoto ostrova je klíčové pro obranu Jávy. Pokud Sumatra nepadne, Jáva nepadne." # todo: NEW TRANSLATION
  HOL_binnenlands: "Binnenlandse Strijdkrachten" # todo: NEW TRANSLATION
  HOL_binnenlands_desc: "Odboj konečně zakořenil na pevnině. Po dlouhou dobu spolupráce se náš lid probudil od chvíle, kdy začal nacistický teror. Odboj je nyní organizován a může být zkoncentrován do oficiálních ozbrojených sil naším vlastním dobrodružným princem; princem Bernhardem von Lippe-Biesterfeld." # todo: NEW TRANSLATION
  HOL_devour: "Lev polyká slunce" # todo: NEW TRANSLATION
  BRA_tenentes: "Udržet Tenentes" # todo: NEW TRANSLATION
  BRA_tenentes_desc: "Mladí důstojníci vycvičení v Evropě, Tenentes, mají ve vojsku slušný vliv a považují se za lepší než stará garda. Ačkoliv mnozí z nich mají socialistické sklony a zázemí, mají velmi inovativní a pokrokový přístup k vedení nové brazilské armády. Musíme je za každou cenu udržet na naší straně." # todo: NEW TRANSLATION
  BRA_mobilise: "Mobilizovat integralisty" # todo: NEW TRANSLATION
  BRA_mobilise_desc: "Abychom naplnili Vargasev ideál Estado Novo, potřebuje získat dostatečnou podporu k centralizaci moci. Protože marxisté jsou hrozbou pro stabilitu Brazílie, musíme navázat kontakt s ideologickými sympatizanty. Integralistické křídlo přináší militaristicko-nacionální náladu, kterou potřebujeme k dalšímu budování Vargasova ráje." # todo: NEW TRANSLATION
  BRA_establish: "Založit TSN" # todo: NEW TRANSLATION
