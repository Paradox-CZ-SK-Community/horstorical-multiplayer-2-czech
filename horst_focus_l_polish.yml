  USA_reinforce_the_islands: "Posílit ostrovy" # todo: NEW TRANSLATION
  USA_reinforce_the_islands_desc: "" # todo: NEW TRANSLATION
  USA_reinforce_the_islands_tt: "Budeme schopni vybudovat §Vyvětší ostrovy§!, které §Yobsadíme§! v §YTichomoří.§!" # todo: NEW TRANSLATION
  USA_station_in_pearl_harbor: "Modernizovat v Pearl Harbor" # todo: NEW TRANSLATION
  USA_station_in_pearl_harbor_desc: "Dejte pozor na osu Pizza-Sushi." # todo: NEW TRANSLATION
  USA_station_in_pearl_harbor_tt: "Začneme modernizovat naše §Ystarší začínající lodě§! v §YPearl Harbor.§! \n\nMůžeme modernizovat až; §Y\n3 letadlové lodě \n15 bitevních lodí§! \n\nNaši admirálové však mají obavu, že flotila bude §Ynáchylná k překvapivým útokům!§! \n\n(Lodě musí zůstat na Havaji, aby byly modernizovány, Neumisťujte více než uvedená čísla.) \n\n(Některé bitevní lodě budou zachráněny i když budou zničeny, avšak jejich modernizace potrvá déle než obvykle.)" # todo: NEW TRANSLATION
  CAN_wartime_industries_control_board: "Řídící rada válečného průmyslu" # todo: NEW TRANSLATION
  CAN_wartime_industries_control_board_desc: "Je třeba vytvořit centralizovaný orgán, který bude dohlížet na výrobu, rozdělovat zdroje a koordinovat průmysl pro válečné úsilí." # todo: NEW TRANSLATION
  CAN_dominion_housing_act: "Zákon o bydlení Dominia" # todo: NEW TRANSLATION
  CAN_dominion_housing_act_desc: "Modernizující dominie musí mít standardizovaná pravidla bydlení napříč celou zemí. Musíme zlepšit životní podmínky všech Kanaďanů." # todo: NEW TRANSLATION
  CAN_expand_national_housing: "Rozšířit národní bydlení" # todo: NEW TRANSLATION
  CAN_expand_national_housing_desc: "Po úspěchu Dominion Housing Act by se měla rozšířit tato politika k řešení nedostatku bydlení a k podpoře národní jednoty v těchto obtížných časech." # todo: NEW TRANSLATION
  CAN_national_employment_commission: "Národní komise pro zaměstnanost" # todo: NEW TRANSLATION
  CAN_national_employment_commission_desc: "Koordinací nabídky a poptávky práce napříč sektory zjednodušuje Národní komise zaměstnanosti zaměstnávání, maximalizuje produktivitu a urychluje hospodářský růst." # todo: NEW TRANSLATION
  CAN_public_works_construction: "Stavba veřejných prací" # todo: NEW TRANSLATION
  CAN_public_works_construction_desc: "Pro boj s nezaměstnaností a oživení ekonomiky vláda zahájí velkoplošné veřejné práce - stavbu silnic, mostů a infrastruktury, aby vrátila Kanaďany do práce." # todo: NEW TRANSLATION
  CAN_dustbowl_recovery_fund: "Fond obnovy po Dustbowl" # todo: NEW TRANSLATION
  CAN_dustbowl_recovery_fund_desc: "Suchu postižené oblasti Alberty a Saskatchewanu potřebují federální pomoc. Navazujeme na pokrok v pobřežní infrastruktuře a nyní se zaměříme na obnovu prérií a modernizaci jejich klíčových systémů." # todo: NEW TRANSLATION
  CAN_DOSCO: "DOSCO" # todo: NEW TRANSLATION
  CAN_DOSCO_desc: "Založení Dominion Steel and Coal Corporation znamená novou éru průmyslové síly, využívající kanadské přírodní zdroje k podpoře hospodářského růstu a budoucnosti země." # todo: NEW TRANSLATION
  CAN_king_or_chaos: "King nebo chaos" # todo: NEW TRANSLATION
  CAN_king_or_chaos_desc: "Bennettova neschopnost vést v krizi hrozí zatáhnout zemi do chaosu. Musíme vložit důvěru do Mackenzie Kinga, jehož zkušenosti nabízejí stabilní vedení, které Kanada potřebuje v těchto bouřlivých časech." # todo: NEW TRANSLATION
  CAN_federal_unemployment_act: "Federální zákon o nezaměstnanosti" # todo: NEW TRANSLATION
  CAN_federal_unemployment_act_desc: "Podle doporučení komise Rowell-Sirois zavede Federální zákon o nezaměstnanosti národní rámec pro poskytování pomoci a podpory nezaměstnaným." # todo: NEW TRANSLATION
  CAN_st_lawrence_seaway_development: "Rozvoj Suezského průlivu St. Lawrence" # todo: NEW TRANSLATION
  CAN_st_lawrence_seaway_development_desc: "Systém St. Lawrence Seaway promění klíčová města podél své trasy, podpoří obchod, průmysl a městský růst. Tento projekt doplňuje probíhající výstavbu hydroelektrických hrází, které napájí hospodářskou expanzi v regionu." # todo: NEW TRANSLATION
  CAN_government_of_national_unity: "Vláda národní jednoty" # todo: NEW TRANSLATION
  CAN_government_of_national_unity_desc: "Jak se národ potýká s obrovskými válkami výzvami, kanadští političtí vůdci se musí spojit v koaliční vládě pod Mackenzie Kingem, aby zajistili stabilní vedení a uchovali národní stabilitu v nejistých dobách." # todo: NEW TRANSLATION
  CAN_intervene_in_quebec_elections: "Zasáhnout do voleb v Québecu" # todo: NEW TRANSLATION
  CAN_intervene_in_quebec_elections_desc: "Nemůžeme dovolit, aby Duplessisova anti-válečná a separatistická kampaň oslabovala jednotu Kanady. Zásahem do voleb v Québecu 1939 podpoříme federalistické síly a zajistíme národní stabilitu v těchto nebezpečných časech." # todo: NEW TRANSLATION
  CAN_back_the_quebec_liberals: "Podpořit liberály v Québecu" # todo: NEW TRANSLATION
  CAN_back_the_quebec_liberals_desc: "Liberální strana dlouhodobě získává důvěru obyvatel Québecu a nabízí pevnou ruku v nejistých časech. Podporou jejich vedení zajistíme pokračující spolupráci provincie pro národní válečné úsilí." # todo: NEW TRANSLATION
  CAN_dissolve_the_parliament: "Rozpustit parlament" # todo: NEW TRANSLATION
  CAN_dissolve_the_parliament_desc: "Politická slepá ulička po zásahu je šokující a hluboce znepokojivá, zejména v době války. Musíme rozpustit tento neúčinný parlament a jmenovat nové ministry schopné vést národ v obdobích válečné správy." # todo: NEW TRANSLATION
  CAN_british_north_america_act: "Zákon Britského Severního Ameriky" # todo: NEW TRANSLATION
  CAN_british_north_america_act_desc: "Nová ústava přijatá podle British North America Act uděluje federální vládě větší pravomoci a zajišťuje silnější kontrolu při zvládání rostoucích nestabilit vyplývajících z války." # todo: NEW TRANSLATION
  CAN_bank_of_canada: "Banka Kanady" # todo: NEW TRANSLATION
  CAN_bank_of_canada_desc: "Chaos Velké hospodářské krize odhalil nebezpečí neregulovaného finančního systému. Centrální banka je nyní nezbytná k obnovení důvěry, stabilizaci měny a vedení hospodářského oživení." # todo: NEW TRANSLATION
  CAN_canadian_broadcasting_corporation: "Kanadská rozhlasová korporace" # todo: NEW TRANSLATION
  CAN_canadian_broadcasting_corporation_desc: "CBC bude sloužit jako zásadní národní vysílatel, spojující Kanaďany od pobřeží ke pobřeží informativním programováním, které odráží naše sdílené hodnoty a rozmanité komunity." # todo: NEW TRANSLATION
  CAN_bennett_new_deal: "Bennettův New Deal" # todo: NEW TRANSLATION
  CAN_bennett_new_deal_desc: "Bennettova pevná ruka nasměrovala Kanadu na cestu oživení. Abychom uchovali tento křehký pokrok, musíme pokračovat v jeho politikách a zabránit zemi sklouznout zpět do nestability." # todo: NEW TRANSLATION
  CAN_disallow_the_padlock_act: "Zrušit zákon Padlock Act" # todo: NEW TRANSLATION
  CAN_disallow_the_padlock_act_desc: "Nemůžeme dovolit, aby provinční legislativa šlapala po občanských svobodách. Kanada musí dodržovat právní stát a chránit demokratická práva v celé zemi. Padlock Act musí být zrušen." # todo: NEW TRANSLATION
  CAN_challenge_the_courts: "Napadnout soudy" # todo: NEW TRANSLATION
  CAN_challenge_the_courts_desc: "Soudy mohou nazvat náš New Deal ústavně neplatným, ale tyto reformy jsou nezbytné k vyvedení Kanaďanů z chudoby, obnovení zaměstnanosti a vybudování spravedlivější společnosti. Vláda napadne rozhodnutí - kvůli budoucnosti národa." # todo: NEW TRANSLATION
  CAN_censur_duplessis: "Censure Duplessis" # todo: NEW TRANSLATION
  CAN_censur_duplessis_desc: "Používání Padlock Act premiérem Duplessisem a odpor vůči reformám New Deal ohrožují demokracii a národní obnovu. Vláda musí formálně vyjádřit cenzuru proti jeho taktikám." # todo: NEW TRANSLATION
  CAN_invoke_the_war_measures_act: "Vyhlásit War Measures Act" # todo: NEW TRANSLATION
  CAN_invoke_the_war_measures_act_desc: "V těchto mimořádných časech boje jsou potřeba mimořádná opatření; vyhlášení War Measures Act umožní rychlé schválení zásadních zákonů, které pomohou vyvést národ z Velké hospodářské krize." # todo: NEW TRANSLATION
  CAN_amend_the_constitution: "Změnit ústavu" # todo: NEW TRANSLATION
  CAN_amend_the_constitution_desc: "Navazujíc na pravomoci získané prostřednictvím War Measures Act usilujeme o změnu ústavy, aby federální vláda získala kontrolu nad zdravotnictvím a penzemi, čímž zajistí koordinované sociální programy zásadní pro národní blahobyt." # todo: NEW TRANSLATION
  CAN_imperial_economic_cooperation: "Imperiální ekonomická spolupráce" # todo: NEW TRANSLATION
  CAN_imperial_economic_cooperation_desc: "S hrozbou války blížící se je těsnější ekonomické propojení v rámci Britského impéria nezbytné. Koordinované průmyslové úsilí posílí naši kolektivní obranu a připraví kanadskou ekonomiku na mobilizaci." # todo: NEW TRANSLATION
  CAN_royal_tour_of_canada: "Královská návštěva Kanady" # todo: NEW TRANSLATION
  CAN_royal_tour_of_canada_desc: "Nadcházející návštěva krále Jiřího VI. a královny Alžběty je historickým okamžikem, posilujícím vazby mezi Kanadou a korunou, zvyšujícím národní hrdost a sjednocujícím Kanaďany na prahu globálního konfliktu." # todo: NEW TRANSLATION
