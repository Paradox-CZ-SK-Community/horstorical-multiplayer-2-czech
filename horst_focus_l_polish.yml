  civilian_kitchens_idea: "Civilní polní kuchyně" # todo: NEW TRANSLATION
  civilian_kitchens_idea_desc: "Finsku výrazně chyběly stany, kamna a další vybavení, ale mnoho úmrtí se podařilo zabránit díky civilním dobrovolníkům, kteří zřizovali kuchyně a zásobovali vojáky v poli." # todo: NEW TRANSLATION
  FIN_motitus_tactics: "Motti taktika" # todo: NEW TRANSLATION
  FIN_motitus_tactics_desc: "Motti je finský vojenský slang pro zcela obklíčenou nepřátelskou jednotku. Motitus je dvoukřídlý manévr využívající schopnost lehkých jednotek pohybovat se po těžkém terénu k obklíčení nepřátel na silnici. Taktika je obzvláště užitečná pro početně slabší, ale mobilní síly, zvláště v zasněženém klimatu Finska." # todo: NEW TRANSLATION
  FIN_white_guard_idea: "Bílá garda" # todo: NEW TRANSLATION
  FIN_white_guard_idea_desc: "V zimní válce byla Bílá garda zodpovědná za provedení mobilizace. Čtvrtina lidské síly polní armády tvořili členové gardy. Tento přínos byl důležitý, protože členové gardy byli nejlépe vycvičení a vybavení v armádě, které chyběly i základní zásoby." # todo: NEW TRANSLATION
  FIN_mannerheim_legacy_idea: "Mannerheimovo dědictví" # todo: NEW TRANSLATION
  FIN_mannerheim_legacy_idea_desc: "Mannerheimova iniciativa budovat pevnosti na sovětské hranici zanechala Finsku mnoho zkušených vojenských inženýrů. Neměli bychom nechat jejich znalosti zahálet." # todo: NEW TRANSLATION
  FIN_stolentanks: "Krádež a učení" # todo: NEW TRANSLATION
  FIN_communism_banned: "Zákaz komunismu" # todo: NEW TRANSLATION
  FIN_communism_banned_desc: "Vzestup radikálních pravicových stran ve Finsku a rostoucí napětí se SSSR vedly k zákazu mnoha finských komunistických stran, zejména SKP přátelského Kominternu." # todo: NEW TRANSLATION
