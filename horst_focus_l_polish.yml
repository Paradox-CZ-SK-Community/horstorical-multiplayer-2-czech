  princely_state_independence: "Integrace Indie"
  princely_state_independence_desc: "Indie se brzy blíží nezávislosti a otázka centralizované vlády znepokojuje mnoho princů vládnoucích územím, které si nárokuje Indie.\nMůžeme kdykoli požadovat, aby si vybrali stranu, ale pokud budeme jednat příliš brzy, pravděpodobně se rozhodnou proti sjednocení.[RAJ.GetVariableEnable]"
  princely_state_independence_variable: "\n\n§g[428.GetPrinceName]§! z §g[428.GetName]§! má §Y[?428.voting_chance]%§! šanci rozhodnout ve prospěch.\n§g[433.GetPrinceName]§! z §g[433.GetName]§! má §Y[?433.voting_chance]%§! šanci rozhodnout ve prospěch.\n§g[437.GetPrinceName]§! z §g[437.GetName]§! má §Y[?437.voting_chance]%§! šanci rozhodnout ve prospěch.\n§g[427.GetPrinceName]§! z §g[427.GetName]§! má §Y[?427.voting_chance]%§! šanci rozhodnout ve prospěch.\n§g[425.GetPrinceName]§! z §g[425.GetName]§! má §Y[?425.voting_chance]%§! šanci rozhodnout ve prospěch.\n[RAJ.PakistanOwned]"
