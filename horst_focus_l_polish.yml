  GER_improvedtracks: "Ostketten"
  GER_improvedtracks_desc: "Široké pásy vyrobené pro lepší zvládání podmínek na východní frontě"
  GER_winterequipement: "Zimní výstroj"
  GER_winterequipement_desc: ""
  GER_reorganizecivilianindustries: "Válečná výroba"
  GER_reorganizecivilianindustries_desc: ""
  GER_apointalbertspeer: "Speerovy reformy"
  GER_apointalbertspeer_desc: ""
  GER_festungdesdeutschenvaterland: "Opevnit vlast"
  GER_festungdesdeutschenvaterland_desc: ""
  GER_festungberlin: "Poslední odpor Berlína"
  GER_festungberlin_desc: ""
  GER_steinercounteroffensive: "Steinerova protiofenzíva"
  GER_steinercounteroffensive_desc: "S ohromným výběžkem vytvořeným Žukovovou 1. běloruskou armádou má 9. armáda zatlačit na jih od výběžku, mezitím Obergruppenführer Felix Steiner spolu se svým nově obnoveným oddílem zatlačí severovýchodně od Berlína a obklíčí Žukovovu armádu a poté je zatlačí zpět na hranice z roku 1941. To jsou rozkazy Führera, a v něj věříme.  "
  stg_tt: "§RZískáme 5 000 zbraní 3 (Pokud to nemáte vyzkoumáno, nedostanete nic.)§!"
  mech_tt: "§RZískáme 400 mechanizovaných jednotek 2 (Pokud to nemáte vyzkoumáno, nedostanete nic.) NEZAPOMEŇTE NA ŠABLONU!!!§!"
  ssbat_tt: "§RZískáme 48 pěších divizí vybavených na 60 %§!"
  GER_rocketry_desc: ""
  GER_rocketry: "Raketová dělostřelba"
  steiner_tt: "§RSteiner zorganizuje armádu 8 pancéřových divizí ve vašem hlavním státě§!"
  USA_reorganization_act: "Zákon o reorganizaci"
  USA_reorganization_act_desc: "§RZákon o reorganizaci§! - Jedná se o poměrně složitý postup, který zahrnuje úplnou nebo částečnou změnu vlastnictví podnikových práv, změnu organizačně-právní formy podniku, likvidaci jednotlivých útvarů nebo vytvoření na základě jednoho z více či uzavření podniku."
  USA_roosevelt_deal: "Rooseveltův New Deal"
  USA_roosevelt_deal_desc: "§RRooseveltův New Deal§! - Ekonomický a sociální program realizovaný administrativou prezidenta USA F. Roosevelta v letech 1933 až 1939, který měl za cíl překonat důsledky Velké hospodářské krize a provést strukturální reformy v průmyslu, zemědělství, financích, energetice a pracovních vztazích."
  USA_invest_in_north_east: "Investovat na severovýchod"
  USA_invest_in_north_east_desc: "Investováním na severovýchodě budeme schopni rozvíjet ložiska oceli, která budeme v budoucnu potřebovat "
  USA_the_bank_of_america: "Bank of America"
  USA_the_bank_of_america_desc: "§RBank of America§! - Bude schopna uchovávat zlaté rezervy našich spojenců a poskytovat nám i jim půjčky na válku."
  USA_invest_in_midvest: "Investovat na Středozápad"
  USA_invest_in_midvest_desc: "Investováním do hlavní průmyslové základny USA ji můžeme učinit ještě silnější"
  USA_national_labour_act: "Zákon o národních pracovních vztazích"
  USA_national_labour_act_desc: "§RNational Labor Relations Act§! - Toto je základní zákon v oblasti pracovního práva USA. Zaručuje právo zaměstnanců v soukromém sektoru se sdružovat v odborech, kolektivně vyjednávat a podnikat kolektivní akce, jako jsou stávky. "
  USA_office_of_scientific_research_and_developmentx: "Úřad pro vědecký výzkum a vývoj"
  USA_office_of_scientific_research_and_developmentx_desc: "S hrozící válkou musíme zaměřit naše vědecké snahy, abychom nebyli převálcováni žádným možným protivníkem."
  USA_increase_defence_budget: "Zvýšit obranný rozpočet"
  USA_increase_defence_budget_desc: "Zvýšením našeho obranného rozpočtu můžeme přilákat více zdrojů a lidí k obraně naší země"
  USA_vinsons_naval_act: "Vinsonův námořní zákon"
  USA_vinsons_naval_act_desc: "§RVinsonův námořní zákon§! - Zákon o stanovení složení Námořnictva Spojených států, o povolení výstavby určitých námořních plavidel a o dalších opatřeních."
  focus_on_asia: "Zaměřit se na Asii"
  focus_on_asia_desc: "Zaměřením se na Asii můžeme zabránit Japonsku v obsazování ostrovů."
  ROM_anti_air_modernization: "Vyvinout Burileanu II"
  ROM_anti_air_modernization_desc: "Naše armáda má nebezpečnou závislost na zahraničních protiletadlových návrzích a výrobě. Musíme vytvořit nástupce slavného protiletadlového kanónu Burileanu z minulé války."
  ROM_protect_ploesti: "Chránit ropná pole Ploiești"
  ROM_protect_ploesti_desc: "Okamžitě zahájíme výstavbu moderní sítě protiletadlových baterií kolem ropných polí Ploiești."
  ROM_siebel: "Siebelův přívoz"
  ROM_siebel_desc: "Obdržíme improvizované přívozy vyrobené Wehrmachtem pro Operaci Sea Lion"
  BUL_peace_tt: "\n§RZůstaneme neutrální vůči Sovětskému svazu!§R"
  pick_trotsky_tt: "If we complete the focus §HThe Permanent Revolution§! we will release the following political advisors:"
  pick_soviet_tt: "\nIf we complete the focus §HEmpower the Soviets§! and §HSocialist Humanism§! we will release the following political advisors:"
  pick_soviet2_tt: "\nIf we complete the focus §HEmpower the Soviets§! and §HBack to the NEP§! we will release the following political advisors:"
  permanent_revolution_tt: "\n§RWe will break off diplomatic relations with all non-communist states, preventing us from licensing foreign technology, receiving Allied lend-lease!, and trading with the Allies§!"
  SOV_release_innocents: "Release the Innocent"
  SOV_release_innocents_desc: "Too many of our comrades have been exiled or imprisoned by Stalin. We must release them and welcome them back to the motherland."
  ENG_mince: "Operation Mincemeat"
  ENG_mince_desc: "Pro úspěšné provedení invaze do Evropy musíme skrýt naše pohyby a plány. Umístění falešných plánů na ztuhlém těle bezdomovce oblečeného jako armádní kapitán by Němce mohlo ošálit."
  HUN_convert_horthy_ii: "Proclaim the Apostolic Kingdom"
  HUN_convert_horthy_ii_desc: "Podařilo se nám vyrůst do obrovské moci, vše díky svaté koruně. Nyní máme právo vyhlásit apoštolské království, nebeskou zemi na zemi, která je spojnicí mezi zemí a nebem a představuje boží moc na zemi. Jsme obránci křesťanství a svaté církve a budeme jimi až do konce času.  " # todo: NEW TRANSLATION
  HUN_mission_to_germany_1: "Diplomatická mise do Německa" # todo: NEW TRANSLATION
  HUN_mission_to_germany_1_desc: "Je jasné, že jediná cesta vpřed pro Maďarsko je společně s Německem pod německou šlechtou. Měli bychom vyslat delegaci do Německa, aby projednala budoucnost našich dvou zemí a ujistila je, že jsme jejich přátelé. Nabízejí nám pomoc s naší revizí a jsou ochotni kupovat naše produkty, proto je logické jim ukázat, že si jejich pomoci vážíme." # todo: NEW TRANSLATION
  HUN_the_kings_guard_1: "Královská garda" # todo: NEW TRANSLATION
  HUN_the_kings_guard_1_desc: "Během stovek let měli všichni maďarští králové svou vlastní královskou gardu, a tento trend lze najít i mimo Maďarsko, téměř po celém světě. Zřídíme Královskou gardu, paramilitární organizaci zaměřenou na ochranu našeho krále, složenou z pravého elitního jádra Honvédu." # todo: NEW TRANSLATION
