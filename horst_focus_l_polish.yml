  GER_guns2: "Panzerfaust" # todo: NEW TRANSLATION
  GER_guns2_desc: "Každý muž odvedený do armády bude vyzbrojen naším nejúčinnějším a nejmodernějším zabijákem tanků. Panzerfaust. Vyzbrojení každého muže těmito děsivými a přitom levnými zbraněmi přinutí nepřátelské obrněnce zpomalit postup, aby vyčkal na své pěchotní krytí, nebo riskovat totální zničení." # todo: NEW TRANSLATION
