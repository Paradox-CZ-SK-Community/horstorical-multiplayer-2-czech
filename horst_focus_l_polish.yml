  ALLIES_commonwealth_of_nations: "[ENG.GetFactionName]"
  ALLIES_commonwealth_of_nations_desc: "[ENG.GetFactionName] budou stát spolu!"
  ALLIES_joint_training_program: "Společný tréninkový program"
  ALLIES_joint_training_program_desc: "Prostřednictvím společně prováděných válečných her a cvičení můžeme zdokonalit naše vojenské dovednosti."
  ALLIES_continue_the_fight: "Pokračovat v boji"
  ALLIES_continue_the_fight_desc: "Budeme bojovat na plážích, budeme bojovat na přistávacích plochách, budeme bojovat na polích i na ulicích, budeme bojovat na kopcích; nikdy se nevzdáme!"
  ALLIES_continue_the_fight_navy: "Svobodné [ROOT.GetAdjective] námořnictvo"
  ALLIES_continue_the_fight_navy_desc: "Jako exilová země se zaměříme na vytvoření a udržení flotily, která pomůže [ENG.GetFactionName] proti Ose."
  ALLIES_continue_the_fight_navy_seamen: "Hledat zdatné námořníky"
  ALLIES_continue_the_fight_navy_seamen_desc: "Složíme malou flotilu se základnou v přístavu spojenců."
  ALLIES_continue_the_fight_navy_convoy: "Lodě svobody"
  ALLIES_continue_the_fight_navy_convoy_desc: "Výroba konvojů je nezbytná pro válečné úsilí. V tom můžeme snadno pomoci."
  ALLIES_continue_the_fight_navy_marine: "Svobodný [ROOT.GetAdjective] sbor námořní pěchoty"
  ALLIES_continue_the_fight_navy_marine_desc: "Zřídíme sbor námořní pěchoty, který bude přiřazen k našemu námořnictvu."
  ALLIES_continue_the_fight_army: "Svobodné [ROOT.GetAdjective] síly"
  ALLIES_continue_the_fight_army_desc: "Boj nekončí naší kapitulací - je to jen začátek nové kapitoly této války!"
  ALLIES_continue_the_fight_army_spawn: "Mobilizovat exilové veterány"
  ALLIES_continue_the_fight_army_spawn_desc: "Všichni [ROOT.GetAdjective], kterým se podařilo uniknout pádu [Root.GetName], budou spojeni do jedné armády."
  ALLIES_continue_the_fight_army_sabotage: "Sabotovat zajaté továrny"
  ALLIES_continue_the_fight_army_sabotage_desc: "Operativci odboje budou sabotovat průmysl, který jsme opustili, aby oslabila válečné úsilí našeho nepřítele."
  ALLIES_continue_the_fight_army_volunteers: "Nabrat dobrovolníky"
  ALLIES_continue_the_fight_army_volunteers_desc: "Najdeme naše emigranty a naverbujeme je do naší armády."
  ALLIES_eng_patron: "Požádat o britské odborné znalosti"
  ALLIES_eng_patron_desc: "Získáme britské zkušenosti s bojem na poušti a vojenským plánováním a zároveň prostudujeme britské průmyslové konstrukce."
  ALLIES_usa_patron: "Učit se od Američanů"
  ALLIES_usa_patron_desc: "Využijeme americké zkušenosti s bojem v džungli a vojenským plánováním a prostudujeme americké průmyslové návrhy."
  ALLIES_usa_dock: "Námořní válka"
  ALLIES_usa_dock_desc: "Budeme studovat, jak plánovat a zahajovat námořní invaze."
  ALLIES_eng_operations: "Ponaučení z Velké války"
  ALLIES_eng_operations_desc: "Prostudujeme britské vojenské plánování z Velké války."
  ALLIES_eng_spec: "Pouštní taktika"
  ALLIES_eng_spec_desc: "Naučíme se, jak bojovat v pouštích."
  ALLIES_usa_spec: "Taktika rangerů"
  ALLIES_usa_spec_desc: "Naučíme se, jak bojovat v džunglích."
  desert_tactics_allies_effect: "Umožňuje §HPouštní výcvik§!\n§HTanky, obrněná vozidla a pěchota\n    Poušť a hluboká poušť§!\nObrana: §G+10%§!"
  jungle_tactics_allies_effect: "Umožňuje §HVýcvik rangerů§!\n§HTanky, obrněná vozidla a pěchota\n    Džungle a les§!\nÚtok: §G+5%§!"
  GER_luftwaffe_expansion: "Rozšíření Luftwaffe"
  GER_luftwaffe_expansion_desc: "Moderní války nelze vyhrát bez ovládnutí nebe. Musíme udělat vše, co je v našich silách, abychom rozvinuli letectvo!"
  GER_air_shield: "Flaktowery"
  GER_air_shield_desc: "Flaktowery, obrovské betonové věže naložené protiletadlovou dělostřeleckou výzbrojí Flak."
  GER_trust_in_the_luftwaffe: "Důvěra v Luftwaffe"
  GER_trust_in_the_luftwaffe_desc: "Naši stateční esa a profesionální týmy mechaniků obdrží dodatečnou podporu a zvýší svou spolupráci s našimi výzkumnými konglomeráty, aby naše taktiky a vybavení byly moderní. Vložíme plnou důvěru do Goeringovy Luftwaffe."
  GER_volkssturmm: "Zformovat divize Volkssturm"
  GER_volkssturmm_desc: "Zformování všeobecného národního milice (levée en masse) nám umožní obrátit průběh války proti Sovětům a Spojencům."
  GER_ss_focus: "Schutzstaffel"
  GER_prepare: "Připravit se na nevyhnutelné"
  GER_jag: "Totaler Krieg!"
  GER_riga: "Bitva u Pskova"
  GER_riga_desc: "Pokud zahájíme útok ze severu, budeme schopni odříznout Sovětský svaz od Baltského moře a otevřít cestu k útoku na Leningrad."
  GER_kiev_desc: "Pokud zahájíme ofenzívu ze jihu, budeme schopni obsadit důležité námořní základny v Černém moři, stejně jako významné průmyslové oblasti v Donbasu, což podlomí vojenskou ekonomiku Sovětského svazu"
  GER_kiev: "Bitva u Kyjeva"
  GER_vitebsk: "Bitva u Smolenska"
  GER_vitebsk_desc: "Zahájením útoku na Moskvu podkopeme morálku sovětské armády a budeme moci dále rozvíjet naši ofenzívu buď na sever, nebo na jih."
  GER_prepare_desc: "Dlouho jsem váhal, zda začít na západě nebo na východě. Ale Wehrmacht jsem nevytvořil proto, aby neútočil. Vždy ve mně byla vnitřní připravenost k válce."
  GER_ss_focus_desc: "Schutzstaffel, zkráceně „SS“, je polo-vojenská organizace, která přímo slouží Adolfu Hitlerovi a nacistické straně. To, co začalo jako jednoduchá bezpečnostní jednotka pro schůze NSDAP, se pod vedením Heinricha Himmlera rozrostlo v mocný a obávaný nástroj Hitlerova totalitního režimu."
  GER_winter: "§BZima§! 1941–42"
  GER_winter_desc: "Kvůli velmi silným mrazům a nedostatku zimního oblečení trpí naši vojáci velkými ztrátami, což ovlivňuje průběh operace."
  GER_continuetheoffence: "Pokračovat v ofenzívě!"
  GER_continuetheoffence_desc: "Jakmile doplníme zásoby, budeme opět schopni vést útočné operace."
  GER_halttheoffence: "Zastavit ofenzívu!"
  GER_halttheoffence_desc: "Zastavením ofenzívy můžeme doplnit zásoby a dát našim mužům odpočinek, aby mohli znovu udeřit."
  GER_entrenching: "Stupňovaná obrana"
  GER_entrenching_desc: "Výstavbou opevnění a vedením stupňované obrany nedovolíme nepříteli proniknout do našeho týlu"
  GER_typhoon_desc: "Zkusíme znovu prorazit k Moskvě, tentokrát lépe připraveni"
  GER_typhoon: "Operace §WTyphoon§!"
  GER_fallblau: "Operace §RBlau§!"
  GER_Leningrad: "Unternehmen Nordlicht"
  GER_Leningrad_desc: "Obsazením Leningradu můžeme uvolnit stovky tisíc vojáků pro jiné útočné operace."
  GER_Moscow: "Obsadit Moskvu"
  GER_Moscow_desc: ""
  GER_appointottoskorzeny: "Otto Skorzeny"
  GER_appointottoskorzeny_desc: ""
  GER_Stalingrad: "Unternehmen Fischreiher"
  GER_Stalingrad_desc: "Musíme zabezpečit jižní povodí řeky Volhy."
  GER_fallblau_desc: "Ofenzíva v této operaci by měla být organizována tak, aby síly útočící po proudu Donu spojily v oblasti Stalingradu s těmi, které postupují z oblastí Taganrog, Artemovsk mezi dolním během Donu a Voroshilovgradem přes řeku Doněc na východ. Tyto síly se pak musí spojit s tankovou armádou postupující na Stalingrad."
  GER_citadel: "Operace §RCitadel§!"
  GER_citadel_desc: "Obrátit se na jih a postupovat jižním směrem musí být provedeno více než jednou divizí. Ofenzíva na severovýchodě (směr Prochorovka - pozn. překl.) je nyní stále možná, ale později bude nemožná, protože nepřítel v této oblasti soustředil nové tankové síly (v oblasti Prochorovky - pozn. překl.). Pokud se útok Z-té tankové jednotky ukáže jako neúspěšný, měla by přejít do obrany a její jednotky na pravém křídle (4. TD - pozn. překl.) nebo severně od Obojanu mohou být využity k rozvoji ofenzívy směrem na západ."
  GER_france_gg: "§gPád Francie§!"
  GER_france_gg_desc: "Po pádu Francie můžeme věnovat své síly tvorbě jednotek Volkssturm a praporů SS"
  GER_deployhitlerjugend: "Nabrat Hitlerjugend"
  GER_deployhitlerjugend_desc: "Náborem v Hitlerjugend můžeme doplnit chybějící divize novou pracovní silou."
  GER_ardennesoffensive: "Ardenská ofenzíva"
  GER_ardennesoffensive_desc: "Po porážce spojenců v Ardenách je můžeme zatlačit zpět k moři a poté se soustředit na východní frontu"
  GER_festungosteuropa: "Festung Ost-Europa"
