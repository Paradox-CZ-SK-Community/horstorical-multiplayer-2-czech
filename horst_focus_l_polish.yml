  SPR_AZUL_tt: "Bude naverbováno deset §Hdivizí veteránů§! z §HŠpanělské občanské války§! s (silnou) medailí na uznání jejich zkušeností a odvahy během války." # todo: NEW TRANSLATION
  ROM_iron_guard_ii: "Obnova Velkého Rumunska" # todo: NEW TRANSLATION
  ROM_iron_guard_ii_desc: "Sovětská okupace Bukoviny a Besarábie byla národní ponížením, které musí být odčiněno." # todo: NEW TRANSLATION
  ROM_iron_guard_iii: "Nároky na Oděsu" # todo: NEW TRANSLATION
  ROM_iron_guard_iii_desc: "Jako odměnu za pomoc v Operaci Barbarossa nám Německá říše slíbila sovětské území na hranici našich hranic." # todo: NEW TRANSLATION
  ITA_reinforce_the_gustav_line_tt: "Okamžitě vytvoříme §Húroveň 7§! pevnostní linii podél front v Itálii\n\n" # todo: NEW TRANSLATION
  ITA_strengthen_the_blackshirts_spawn_divs2_tt: "Vytvořit §Y30 Camicie Nere§! divizí v §Y[THIS.GetName]§!." # todo: NEW TRANSLATION
  NOR_norsk_hydro_focus_desc: "Norsk Hydro je hlavním dodavatelem hliníku a bauxitu, ale také pro jaderné vědy díky výrobě těžké vody." # todo: NEW TRANSLATION
  SOV_approach_germany_molotov_tt: "§GVyacheslav Molotov§! je náš §Ylidový komisař zahraničí§!" # todo: NEW TRANSLATION
  axis_minor_railways_tt: "\n§CNáš menší spojenci budou připojeni k našemu hlavnímu městu úrovní 3 železnice.§! \n\n§CZískáme %20 extra obchodu při jednání s našimi spojeneckými menšími státy.§!" # todo: NEW TRANSLATION
  italian_railways_tt: "\n§CKaždá železnice v Itálii bude povýšena o 1 úroveň.§!" # todo: NEW TRANSLATION
  ENG_tonks_tt: "\nNasadíme 4 zkušené střední tanky a obdržíme jejich zásoby na podporu." # todo: NEW TRANSLATION
  TIB_nothing335: "Zahájení Horstova třetího pětiměsíčního plánu" # todo: NEW TRANSLATION
