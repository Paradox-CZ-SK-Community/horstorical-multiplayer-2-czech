  SLO_deep_battle: "Hluboká bitva" # todo: NEW TRANSLATION
  SLO_deep_battle_desc: "" # todo: NEW TRANSLATION
  SLO_purchase_guns: "Zakoupit vybavení z Německa" # todo: NEW TRANSLATION
  SLO_purchase_guns_desc: "Slovenské ministerstvo obrany požádalo Německo o pomoc při výsadkovém výcviku slovenských výsadkářů a dodávku výsadkové výzbroje." # todo: NEW TRANSLATION
  SLO_cavalry_focus: "Modernizovat jezdectvo" # todo: NEW TRANSLATION
  SLO_cavalry_focus_desc: "Slovenské jízdní oddíly prošly během prvního roku existence Slovenského štátu několika modernizacemi." # todo: NEW TRANSLATION
  SLO_purchase_transports: "Transportní letadla" # todo: NEW TRANSLATION
  SLO_purchase_transports_desc: "První seskok z He‑111 proběhl 15. listopadu 1943. Zajímavým okamžikem byl 30. listopad 1943 – první hromadná ukázka seskoků u Žiliny (20 parašutistů seskočilo z 2 He‑111)." # todo: NEW TRANSLATION
  SLO_commando: "Komando" # todo: NEW TRANSLATION
  SLO_commando_desc: "První skupina dobrovolníků vstoupila do výsadkového centra v říjnu 1942. Juraj Mesko byl jmenován velitelem této skupiny – jádra budoucí slovenské výsadkové jednotky." # todo: NEW TRANSLATION
