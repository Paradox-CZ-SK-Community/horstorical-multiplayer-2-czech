  JAP_RAJ_accept_the_netaji: "Přijmout Netajiho" # todo: NEW TRANSLATION
  JAP_RAJ_accept_the_netaji_EXPL1: "\nToto je §CReaktivní fokus§!. Pokud [RAJ.GetFlag]§H[RAJ.GetName]§! není §HPuppet§!, tento fokus místo toho vykáže následující §GEfekty§!:\n" # todo: NEW TRANSLATION
  JAP_RAJ_accept_the_netaji_EXPL2: "\nToto je §CReaktivní fokus§!. Pokud [RAJ.GetFlag]§H[RAJ.GetName]§! ne §RExistuje§!, tento fokus místo toho vykáže následující §GEfekty§!:\n" # todo: NEW TRANSLATION
