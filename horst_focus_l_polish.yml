  ETH_doctrine_effort: "Úsilí o doktrínu" # todo: NEW TRANSLATION
  ETH_doctrine_effort_desc: "Vojenské doktríny definující pozemní boj ve Velké válce jsou zastaralé. Musíme dát naše nejlepší mozky, aby formovaly vojenské myšlení zítřka." # todo: NEW TRANSLATION
  ETH_equipment_effort_2: "Modernizované pušky" # todo: NEW TRANSLATION
  ETH_equipment_effort_2_desc: "Budeme pokračovat v úsilí zajistit, že naše pěchota je vyzbrojena těmi nejlepšími možnými zbraněmi své doby." # todo: NEW TRANSLATION
  ETH_mechanization_effort: "Úsilí o mechanizaci" # todo: NEW TRANSLATION
  ETH_mechanization_effort_desc: "Přehodnocením možností motorizované pěchoty můžeme posunout hranice toho, jaká vozidla lze dnes konstruovat." # todo: NEW TRANSLATION
  ETH_doctrine_effort_2: "Úsilí o doktrínu II" # todo: NEW TRANSLATION
  ETH_doctrine_effort_2_desc: "Bojiště se změnilo nejen během meziválečných let, ale také v průběhu nedávných konfliktů. Musíme neustále přehodnocovat naše doktríny." # todo: NEW TRANSLATION
  ETH_doctrine_effort_3: "Úsilí o doktrínu III" # todo: NEW TRANSLATION
