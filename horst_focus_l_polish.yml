  RAJ_nep_gurkhas: "§HOsm§! horských divizí bude naverbováno v §HKathmandu§! pod naším velením." # todo: NEW TRANSLATION
  RAJ_viceroy: "Vicekrálovství Indie" # todo: NEW TRANSLATION
  RAJ_viceroy_desc: "Vicekrál Indie je zástupcem Koruny a má plnou pravomoc činit rozhodnutí jejím jménem. Nazýván také 'guvernér-generál Indie', pozice vicekrále byla zpochybněna radikály z Indického národního kongresu." # todo: NEW TRANSLATION
  RAJ_guided_by_britain: "Posílit svazky Commonwealthu" # todo: NEW TRANSLATION
  RAJ_guided_by_britain_desc: "Pokud zůstaneme blízko a loajální k britské koruně, můžeme nejlépe vést Britský Rádž k lepší budoucnosti." # todo: NEW TRANSLATION
  RAJ_ban_the_quit_india_movement: "Zákaz hnutí Quit India" # todo: NEW TRANSLATION
  RAJ_ban_the_quit_india_movement_desc: "Gandhiho kampaň za nezávislost Indie dosáhla vrcholu výzvou, aby Britové opustili Indii. Takové výzvy proti impériu nesmí být tolerovány!" # todo: NEW TRANSLATION
  RAJ_the_x_force: "Síla X" # todo: NEW TRANSLATION
  RAJ_the_x_force_desc: "Pravidelné čínské jednotky u Barmy mají možnost ustoupit na naše území. Pokud je přijmeme, dostanou se pod kontrolu našich polních velitelů." # todo: NEW TRANSLATION
  RAJ_nepalese_gurkhas: "Nepálští gurkhové" # todo: NEW TRANSLATION
