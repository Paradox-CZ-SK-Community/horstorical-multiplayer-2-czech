  GetBraCentDefCon: "With our current §Y(Medium)§! corruption reform,  §YConstitution of 1937§!, we will instead receive:\n§YRio de Janeiro§!:\n   Add §G4§! §HMilitary Factory§!.\n   Add §G4§! Building Slots.\n\nIf we pass the §OHigh§! corruption reform, §OAn Autonomous TSN§!, we will instead receive:\n§YRio de Janeiro§!:\n   Add §G5§! §HMilitary Factory§!.\n   Add §G5§! Building Slots." # todo: NEW TRANSLATION
