  GetBraComeDefCon: "With our current §Y(Medium)§! corruption reform, §YThe Constitution of 1937§!,\n §Y-30% trade cost with the USA§!\n\nIf we pass the §OHigh§! corruption reform, §OAn Autonomous TSN§!, we will instead receive\n §O-40% trade cost with the USA§!\n\n" # todo: NEW TRANSLATION
