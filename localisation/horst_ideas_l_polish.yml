  BRA_secondrepublic: "If our opening focus was Vargas Era:\n Add §HSocial-Economical Emphasis§!, which grants (£consumer_goods_texticon Consumer Goods Factories: §H-5.0%§!).\n\nIf our opening focus was Mobilise the Integralists:\nAdd §HMilitary Emphasis§!, which grants (£increase_texticon  Army Organization Regain: §G+10.00%§!, £construction_speed_texticon  §YMilitary Factory§! construction speed: §G+10.00%§!).\n\n" # todo: NEW TRANSLATION
  BRA_armor: "Based on how much corruption reforms we have passed, we will receive a combat bonus for our §YArmored Core§!\nIf we have passed the §GLow§! corruption reform, we will receive:\n  §CArmor:§!\n     §GSoft Attack§! factor: §Y+5.0%§!\n     §GHard Attack§! factor: §Y+5.0%§!\n §CMechanized Chassis:§!\n     §GDefense§! factor: §Y+10.0%§!\n     §GBreakthrough§! factor: §Y+5.0%§!\n §CMotorized Rocket Artillery:§!\n     §GSoft Attack§! factor: §Y+5.0%§!\n     §GBreakthrough§! factor: §Y+10.0%§!\nIf we have passed the §OHigh§! corruption reform, we will receive:\n  §CArmor:§!\n     §OSoft Attack§! factor: §Y+7.5%§!\n     §OHard Attack§! factor: §Y+7.5%§!\n §CMechanized Chassis:§!\n     §ODefense§! factor: §Y+5.0%§!\n     §OBreakthrough§! factor: §Y+10.0%§!\n §CMotorized Rocket Artillery:§!\n     §OSoft Attack§! factor: §Y+15.0%§!\n     §OBreakthrough§! factor: §Y+10.0%§!" # todo: NEW TRANSLATION
