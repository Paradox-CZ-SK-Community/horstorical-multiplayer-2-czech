  GetBraComeDef: "If we pass the §GLow§! corruption reform, §GRein in the Trade Unions§!,\n §G-20% trade cost with the USA§!\n\nIf we pass the §YMedium§! corruption reform, §YThe Constitution of 1937§!, we will instead receive\n §Y-30% trade cost with the USA§!\n\nIf we have passed the §OHigh§! corruption reform, §OAn Autonomous TSN§!, we will instead receive\n §O-40% trade cost with the USA§!\n\n" # todo: NEW TRANSLATION
