  GetBraEstado2Con: "With our current §H(Medium)§! Corruption Reform, §HThe Constitution of 1937§!:\n Add §HEstado Novo§!, which grants (£stability_texticon  Stability: §G+10.00%§!, £construction_speed_texticon Construction Speed: §G+10.00%§!, £prod_eff_capProduction Efficiency Cap: §G+10.00%§!, £efficiency_growth_texticonProduction Efficiency Growth: §G+10.00%§!).\n\nHowever, with the §OHigh§! Corruption Reform, §OAn Autonomous TSN§!:\nAdd §HEstado Novo§!, which grants (£stability_texticon  Stability: §G+15.00%§!, £construction_speed_texticon Construction Speed: §G+12.50%§!, £prod_eff_capProduction Efficiency Cap: §G+12.50%§!, £efficiency_growth_texticonProduction Efficiency Growth: §G+12.50%§!).\n\n" # todo: NEW TRANSLATION
