  SWE_nordic_centralized_army: "Centralizovaná severská armáda" # todo: NEW TRANSLATION
  SWE_nordic_centralized_army_desc: "Severská armáda byla centralizována pod [?SWE.GetAdjective] kontrolu. V důsledku toho jsou naše vlastní schopnosti bránit hranice značně omezené a očekáváme, že za nás hranice bude bránit severská armáda." # todo: NEW TRANSLATION
  SWE_nordic_protection_complex_idea: "Severský obranný komplex" # todo: NEW TRANSLATION
  SWE_gateway_to_peace: "Brána k míru" # todo: NEW TRANSLATION
  SWE_gateway_to_peace_instant_desc: "Jediný představitelný způsob, jak dosáhnout vítězství proti Rudé armádě, je zasadit tak rozhodující a rychlý úder, že budou nuceni se vzdát.\nZískání kontroly nad §YLeningradem§! by takový úder znamenalo a možná i přineslo mír." # todo: NEW TRANSLATION
