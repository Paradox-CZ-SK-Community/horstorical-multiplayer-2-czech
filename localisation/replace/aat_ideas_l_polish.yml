  DEN_development_projects_state_modifier: "Projekty průmyslového rozvoje" # todo: NEW TRANSLATION
  DEN_development_projects_state_modifier_desc: "Průmyslový sektor potřebuje růst a vyvíjet efektivnější procesy a produkty. Investovali jsme prostředky, aby průmysl prosperoval a pomáhal růstu ekonomiky státu." # todo: NEW TRANSLATION
