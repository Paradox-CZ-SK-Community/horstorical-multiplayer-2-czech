  SWE_paid_holidays_idea_desc: "Po letech rostoucího napětí mezi zaměstnavateli a zaměstnanci zasáhl stát, aby zajistil minimální množství placené dovolené ročně. Reforma je populární mezi zaměstnanci, zaměstnavatelé jsou nespokojeni s nuceným snížením produktivity." # todo: NEW TRANSLATION
