  SWE_universal_basic_income_idea: "$SWE_universal_basic_income$" # todo: NEW TRANSLATION
  SWE_sami_support_tech_tt: "\n§YPodpůrná společnost průzkumu:§!\n§YSníh§! a §Y$forest$§!: Pohyb §G+10%§!\n§Y$hills$§! a §Y$mountain$§!: Pohyb: §G+5%§!" # todo: NEW TRANSLATION
  SWE_full_capacity_furnaces: "Pec na plný výkon" # todo: NEW TRANSLATION
  SWE_full_capacity_furnaces_desc: "Po uvalení embarga na našeho protivníka nyní máme přetok surovin. Těžký průmysl, který byl dříve omezen kvótami surovin, má nyní vše, co potřebuje, aby mohl pracovat dnem i nocí. Přesto se naše zásoby rychle plní a měli bychom zajistit, aby světový trh věděl, že jsme ochotni dodat suroviny potřebné k boji." # todo: NEW TRANSLATION
  SWE_nordic_defense_council_military_overhead: "Vojenské režijní náklady" # todo: NEW TRANSLATION
  SWE_nordic_defense_council_group_name: "Severská výměna výzkumu" # todo: NEW TRANSLATION
  SWE_nordic_defense_council_group_desc: "Je přirozené, že jako spojenci sdílíme naše průlomy a inovace mezi sebou." # todo: NEW TRANSLATION
  SWE_economic_strain: "Ekonomické napětí" # todo: NEW TRANSLATION
  SWE_economic_strain_desc: "Výstavba bitevní lodi Nordljus způsobila vážné ekonomické napětí v civilní ekonomice." # todo: NEW TRANSLATION
  SWE_rationing_policies: "Politika přídělování" # todo: NEW TRANSLATION
  SWE_gateway_to_peace_decision: "Obrana Finska" # todo: NEW TRANSLATION
  SWE_gateway_to_peace_decision_tt: "\nZískání kontroly nad §YLeningradem§! donutí [SOV.GetName] nám a [FIN.GetName] udělit bílý mír nebo čelit hrozným následkům." # todo: NEW TRANSLATION
  SWE_escaping_the_mainland: "Únik z pevniny" # todo: NEW TRANSLATION
  SWE_hedgehog_of_the_baltic: "Ježek Baltu" # todo: NEW TRANSLATION
  ICE_the_icelandic_economy_modifier: "Islandská ekonomika" # todo: NEW TRANSLATION
  ICE_the_icelandic_economy_modifier_desc: "Naše ekonomika velmi utrpěla během Velké války, když bylo Island izolované od zbytku světa. Pak přišla krize a i když pevninská Evropa mírně ožila, islandská ekonomika nadále trpí. Možná se však jednou světu div vyrovnáme..." # todo: NEW TRANSLATION
  ICE_the_icelandic_economy_modifier_tt: "Upravuje §Y$ICE_the_icelandic_economy_modifier$§!:" # todo: NEW TRANSLATION
  ICE_christian_x: "Christian X" # todo: NEW TRANSLATION
  ICE_christian_x_desc: "Christian X je společný král Dánska a Islandu. Poslední pouto mezi oběma zeměmi." # todo: NEW TRANSLATION
  ICE_dissent_in_the_working_class: "Nespokojenost dělnické třídy" # todo: NEW TRANSLATION
  ICE_travel_guide: "$ICE_bjorn_olafsson$" # todo: NEW TRANSLATION
