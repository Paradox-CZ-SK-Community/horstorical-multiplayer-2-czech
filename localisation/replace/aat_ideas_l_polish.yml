  SWE_vattenfall: "Kungliga Vattenfallstyrelsen" # todo: NEW TRANSLATION
  SWE_vattenfall_upgrade: "Vattenfall" # todo: NEW TRANSLATION
  SWE_vattenfall_upgrade_tt: "\nAutomaticky upgradovat tuto společnost pokud je celkový součet §YInfrastruktury§! v §Y[666.GetName]§!, §Y[918.GetName]§! a §Y[38.GetName]§! více než §Y11 infrastruktury§!\nCo uděluje:\n$industry_research$: §G+15%§!\n$electronics_research$: §G+15%§!" # todo: NEW TRANSLATION
  SWE_ericsson: "Ericsson" # todo: NEW TRANSLATION
  SWE_gustaf_v_idea: "Král Gustaf V" # todo: NEW TRANSLATION
  SWE_gustaf_v_idea_desc: "Když Gustaf V nastoupil na trůn, stále měl velkou autoritu nad švédskou politikou. V průběhu let byla jeho moc eroziována vznikem parlamentní demokracie. Ačkoliv formálně podporuje uspořádání, třenice mezi Riksfagem a králem se objevují pravidelně." # todo: NEW TRANSLATION
  SWE_gustaf_v_idea_upgraded: "$SWE_gustaf_v_idea$" # todo: NEW TRANSLATION
