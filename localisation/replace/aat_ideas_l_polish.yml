  DEN_military_projects_state_modifier: "Projekty vojenského rozvoje" # todo: NEW TRANSLATION
  DEN_military_projects_state_modifier_desc: "Toto bylo shledáno nezbytným státním opatřením k ochraně a vybudování vojenských schopností pro zajištění bezpečnosti národa." # todo: NEW TRANSLATION
  DEN_home_guard_state_modifier: "Hjemmeværnet" # todo: NEW TRANSLATION
  DEN_home_guard_state_modifier_desc: "Domobrana je aktivní v tomto státě a zpomaluje postup nepřítele." # todo: NEW TRANSLATION
  DEN_pan_scandinavianism_modifier: "Duch panscandinávství" # todo: NEW TRANSLATION
  DEN_pan_scandinavianism_modifier_desc: "Vzplanutí panscandinávství obklopilo tento stát, posiluje odhodlání a oddanost obyvatelstva." # todo: NEW TRANSLATION
  NORDIC_to_arms_against_tyranny_ns: "K zbrani proti tyranii" # todo: NEW TRANSLATION
  NORDIC_to_arms_against_tyranny_ns_desc: "Jak drápy Tyranie ohrožují nezávislost našich severských sousedů, musíme být připraveni je bránit, jinak se staneme dalším cílem tyrana." # todo: NEW TRANSLATION
  NORDIC_the_nordic_march_ns: "Severský pochod" # todo: NEW TRANSLATION
  NORDIC_the_nordic_march_ns_desc: "Národy kolem nás to ještě nevidí, ale to, co oni nazývají tyranií, není nic jiného než vítr změny, a až zničí vše na své cestě, z popela povstane nový severský řád, a my budeme v pozici uchopit ten moc." # todo: NEW TRANSLATION
