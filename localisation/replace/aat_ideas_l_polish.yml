  ICE_compensation_purchase_idea: "Vyrovnání plateb" # todo: NEW TRANSLATION
  ICE_compensation_sale_idea: "Vyrovnání plateb" # todo: NEW TRANSLATION
  ICE_esso: "Esso" # todo: NEW TRANSLATION
  ICE_eimskip: "Eimskip" # todo: NEW TRANSLATION
  ICE_vifilfell: "Vífilfell" # todo: NEW TRANSLATION
  ICE_siemens: "Siemens Iceland" # todo: NEW TRANSLATION
  ICE_transformation_of_nature_state_modifier: "Efektivní výroba energie" # todo: NEW TRANSLATION
  ICE_landsvirkjun: "Landsvirkjun" # todo: NEW TRANSLATION
  ICE_greyshirts: "Šedé košile" # todo: NEW TRANSLATION
  ICE_greyshirts_desc: "Dobře ozbrojená milice vychovávaná od mládí může být užitečným nástrojem pro formování mladých a přizpůsobení je našemu novému světu. Navíc polovenkovní vojenský výcvik posiluje schopnosti ozbrojených sil, což se může hodit při obnově toho, co je naše." # todo: NEW TRANSLATION
  ICE_viking_spirit: "Ásatrú" # todo: NEW TRANSLATION
  ICE_viking_spirit_desc: "Bez strachu a smrtící byli vikingové dávných časů. Překonávali oceány nevěda, co je za nimi, a přežili jen ti nejsilnější. Beze strachu a odvážní musí být i dnešní Islanďané, neboť jen odvahou a statečností země znovu získá to, co kdysi byla, a bude vládnout Severnímu moři znovu." # todo: NEW TRANSLATION
  ICE_fascist_tech_sharing_group_name: "Islandská výzkumná organizace" # todo: NEW TRANSLATION
  ICE_fascist_tech_sharing_group_desc: "Islandský stát zorganizoval program výzkumné spolupráce mezi sebou a ideologicky příbuznými státy ve snaze dále rozvíjet technologie." # todo: NEW TRANSLATION
  ICE_hosting_american_soldiers: "Umístění amerických vojáků" # todo: NEW TRANSLATION
  ICE_hosting_american_soldiers_desc: "Ubytování amerických vojáků na našem ostrově nám umožňuje přilákat je ke vstupu do našeho národa a přinést schopné muže ochotné bojovat za naši společnou věc." # todo: NEW TRANSLATION
  ICE_conscription_idea: "Herþjónustu" # todo: NEW TRANSLATION
  ICE_conscription_idea_desc: "Každý mladý dospělý na Islandu je povinen vykonat čtyřleté vojenské služby mezi 18. a 22. rokem, aby ochránil suverenitu své země." # todo: NEW TRANSLATION
  ICE_professional_army_idea: "Víkingasveitin" # todo: NEW TRANSLATION
  ICE_professional_army_idea_desc: "Islandská armáda se skládá z nejstatečnějších a nejodvážnějších mužů a je připravena bránit islandský národ za každou cenu." # todo: NEW TRANSLATION
  ICE_civil_defence_organization: "Organizace civilní obrany" # todo: NEW TRANSLATION
  ICE_civil_defence_organization_desc: "Každý islandský občan je připraven kdykoli učinit vše potřebné k ochraně své země, pomoci jejím lidem nebo zachránit její infrastrukturu." # todo: NEW TRANSLATION
  DEN_aalborg_portland: "Aalborg Portland" # todo: NEW TRANSLATION
  DEN_danske_stalvalsevaerket_ns: "Det Danske Stålvalseværket" # todo: NEW TRANSLATION
  DEN_designer_can_be_improved_tt: "Tento návrhář lze vylepšit dokončením fokusu §Y$DEN_aalborg_portland_cement_plant$§!" # todo: NEW TRANSLATION
  DEN_improved_designer_tt: "Tento návrhář byl vylepšen" # todo: NEW TRANSLATION
  DEN_industrial_capability_dynamic_modifier: "Dánské průmyslové schopnosti" # todo: NEW TRANSLATION
  DEN_light_market_regulation_research_bonus: "$DEN_industrial_capability_dynamic_modifier$" # todo: NEW TRANSLATION
  DEN_industrial_capability_dynamic_modifier_light_regulation: "$DEN_industrial_capability_dynamic_modifier$" # todo: NEW TRANSLATION
  DEN_industrial_capability_dynamic_modifier_desc: "Dánsko bylo tradičně agrární společností a producentem, ale jeho průmysl nabral na důležitosti a ekonomickém významu. Musíme industrializovat a modernizovat, abychom drželi krok s rychlým vývojem moderní doby." # todo: NEW TRANSLATION
  DEN_industrial_capability_dynamic_modifier_light_regulation_desc: "$DEN_industrial_capability_dynamic_modifier_desc$" # todo: NEW TRANSLATION
  DEN_industrial_capability_dynamic_modifier_improved: "$DEN_industrial_capability_dynamic_modifier$" # todo: NEW TRANSLATION
  DEN_industrial_capability_dynamic_modifier_light_regulation_improved: "$DEN_industrial_capability_dynamic_modifier$" # todo: NEW TRANSLATION
  DEN_industrial_capability_dynamic_modifier_improved_desc: "Dánsko bylo tradičně agrární společností, ale jeho průmysl nabral na významu. Udělali jsme první kroky k modernizaci a rozvoji našich odvětví, čímž jsme se stali konkurenceschopnějšími a produktivnějšími." # todo: NEW TRANSLATION
  DEN_industrial_capability_dynamic_modifier_light_regulation_improved_desc: "$DEN_industrial_capability_dynamic_modifier_improved_desc$" # todo: NEW TRANSLATION
  DEN_industrial_capability_dynamic_modifier_max_improved: "$DEN_industrial_capability_dynamic_modifier$" # todo: NEW TRANSLATION
  DEN_industrial_capability_dynamic_modifier_light_regulation_max_improved: "$DEN_industrial_capability_dynamic_modifier$" # todo: NEW TRANSLATION
  DEN_industrial_capability_dynamic_modifier_max_improved_desc: "Dánsko bylo tradičně agrární společností, ale jeho průmysl nabral na důležitosti. Naše průmyslové odvětví jsou plně modernizované a fungují na plné kapacitě dnem i nocí." # todo: NEW TRANSLATION
  DEN_industrial_capability_dynamic_modifier_light_regulation_max_improved_desc: "$DEN_industrial_capability_dynamic_modifier_max_improved_desc$" # todo: NEW TRANSLATION
  DEN_economic_crisis_dynamic_modifier: "Ekonomická krize" # todo: NEW TRANSLATION
  DEN_economic_crisis_dynamic_modifier_desc: "Velká hospodářská krize nás tvrdě zasáhla. Pokles poptávky po zemědělských produktech znamenal dluhy a zabavení pro mnoho farmářů a prudký nárůst nezaměstnanosti se stal živnou půdou pro extremistické hnutí na politickém okraji." # todo: NEW TRANSLATION
  DEN_neglected_military_dynamic_modifier: "Opomíjené ozbrojené síly" # todo: NEW TRANSLATION
  DEN_neglected_military_dynamic_modifier_desc: "Dlouho jsme prosazovali politiku odzbrojené neutrality, abychom Němce neprovokovali. Vojenské síly jsou sotva symbolickou silou k ochraně naší suverenity. Ozbrojené síly utrpěly neustálé škrty — zůstaly zcela nepřipravené pro případné konflikty." # todo: NEW TRANSLATION
  DEN_danish_produce: "Dánské produkty" # todo: NEW TRANSLATION
  DEN_danish_produce_desc: "Slanina a mléčné výrobky byly základem dánského exportu natolik, že během Velké války vznikl pojem ‚Goulash Barons‘, odkazující na ty, kdo profitovali z obchodování s Velkou Británií a Německem." # todo: NEW TRANSLATION
  DEN_sahnefront: "Máslová fronta" # todo: NEW TRANSLATION
  DEN_sahnefront_desc: "Dánsko je úrodná země s bohatou zemědělskou tradicí, a jako naši poddaní z toho sklidíme výhody. Držení Dánska posílí naše vojenské síly a schopnosti." # todo: NEW TRANSLATION
  DEN_improved_logistics: "Zlepšená logistika" # todo: NEW TRANSLATION
  DEN_improved_logistics_desc: "Dánsko je bohaté a úrodné, a využitím těchto zdrojů zajistíme jídlo pro naše jednotky a posílíme naše vojenské schopnosti." # todo: NEW TRANSLATION
  DEN_danish_licensing_ns: "Obchodní dohoda" # todo: NEW TRANSLATION
  DEN_danish_licensing_ns_desc: "V světě, kde jsou transakce a obchod nezbytné mezi zeměmi, je dobré mít blízké obchodní partnery. Tato dohoda prospěje oběma zemím a posílí pouto mezi námi." # todo: NEW TRANSLATION
  DEN_danish_licensing_ns_no_DOD_desc: "$DEN_danish_licensing_ns_desc$" # todo: NEW TRANSLATION
  DEN_overlord_licensing_ns_desc: "$DEN_danish_licensing_ns_desc$" # todo: NEW TRANSLATION
  DEN_overlord_licensing_ns_no_DOD_desc: "$DEN_danish_licensing_ns_desc$" # todo: NEW TRANSLATION
  DEN_war_preparations_dynamic_modifier: "Přípravy na válku" # todo: NEW TRANSLATION
  DEN_war_preparations_dynamic_modifier_desc: "Pouze připraveností můžeme přečkat bouři. Musíme budovat zásoby surovin a dalších zásob, které budou potřeba, a připravit naše průmysly na pomoc válečnému úsilí." # todo: NEW TRANSLATION
  DEN_rule_the_north_sea: "Panovat nad Severním mořem" # todo: NEW TRANSLATION
  DEN_rule_the_north_sea_desc: "Abychom naplnili naše ambice na Severním moři, musíme vytvořit Velkou flotilu s vrcholnou palebnou silou, aby zabezpečila naše državy a odradila ostatní národy." # todo: NEW TRANSLATION
  DEN_fromandskorpset_ns: "$DEN_fromandskorpset$" # todo: NEW TRANSLATION
  DEN_fromandskorpset_ns_desc: "S naší speciální amfibickou silou jsme připraveni projektovat naše vojenské síly daleko a široce — přes vody až na cizí pobřeží." # todo: NEW TRANSLATION
  DEN_declaration_of_neutrality: "Prohlášení neutrality" # todo: NEW TRANSLATION
  DEN_declaration_of_neutrality_desc: "Dánsko dokázalo zůstávat mimo války desítky let a to bylo možné díky naší politice neutrality. Služilo nám to dobře a bude tomu tak i nadále." # todo: NEW TRANSLATION
  DEN_denmark_becomes_a_puppet_tt: "[DEN.GetFlag]§Y[DEN.GetNameDefCap]§! dostane možnost pokusit se stát se loutkou, pokud silnější blízká země napadne, přičemž si ponechá současnou vládní formu\n\n" # todo: NEW TRANSLATION
  DEN_neutrality_flag: "[DEN.GetFlag]§Y[DEN.GetNameDefCap]§! je nezávislé a není ve válce" # todo: NEW TRANSLATION
  DEN_political_edicts_dynamic_modifier: "Politické edikty" # todo: NEW TRANSLATION
  DEN_political_edicts_dynamic_modifier_desc: "Každý Dán musí vědět, co se od něj v těchto zkoušených časech očekává a požaduje. Musíme být bdělí vůči nepřátelským akcím proti naší zemi a spojit se k dosažení společného cíle." # todo: NEW TRANSLATION
  DEN_resistance_dynamic_modifier: "Modstandsbevægelsen" # todo: NEW TRANSLATION
  DEN_resistance_dynamic_modifier_desc: "Pouze sjednocením a odoláváním okupantům [?DEN.DEN_overlord_nation.GetAdjective] můžeme doufat, že jednou znovu uvidíme svobodné [DEN.GetNameDef]. Hnutí odporu je v centru toho a bude klíčové pro obnovu naší svobody." # todo: NEW TRANSLATION
  DEN_resistance_dynamic_modifier_improved: "$DEN_resistance_dynamic_modifier$" # todo: NEW TRANSLATION
  DEN_resistance_dynamic_modifier_improved_desc: "$DEN_resistance_dynamic_modifier_desc$" # todo: NEW TRANSLATION
  DEN_occupation_laws_dynamic_modifier: "Okupační zákony" # todo: NEW TRANSLATION
  DEN_occupation_laws_dynamic_modifier_desc: "Naši [?DEN.DEN_overlord_nation.GetAdjective] páni nás pověřili, abychom jim pomáhali ve válce a uložili několik zákonů, které zajistí naši spolupráci." # todo: NEW TRANSLATION
  DEN_securing_sweden_ns: "Zajištění [SWE.GetNameDef]" # todo: NEW TRANSLATION
  DEN_securing_sweden_ns_desc: "Švédové byli kdysi součástí Kalmaru a pod dánskou nadvládou. Nadešel čas znovu začlenit Švédsko do našeho království. Naše ozbrojené síly se na ten den připravily a pilně cvičily, aby bojovaly a zničily jakékoli nepřátelské švédské síly." # todo: NEW TRANSLATION
  DEN_securing_norway_ns: "Zajištění [NOR.GetNameDef]" # todo: NEW TRANSLATION
  DEN_securing_norway_ns_desc: "Norové byli součástí našeho království stovky let. Nadešel čas opět začlenit Norsko do [DEN.GetNameDef] jednou provždy. Naše vojsko je připravené a intenzivně vycvičené, aby bojovalo a zničilo jakékoli nepřátelské norské síly." # todo: NEW TRANSLATION
  DEN_securing_finland_ns: "Zajištění [FIN.GetNameDef]" # todo: NEW TRANSLATION
  DEN_securing_finland_ns_desc: "Ač jsme nad nimi nikdy přímo nevykonávali moc, Finové nám v Kalmaru občas podléhali. Nyní je čas dát Finsko pod přímou dánskou vládu. Naše ozbrojené síly jsou připravené a dobře vycvičené, aby bojovaly a zničily jakékoli nepřátelské finské síly." # todo: NEW TRANSLATION
  DEN_foreign_influence_ns: "Vliv zahraniční veřejné opinie" # todo: NEW TRANSLATION
  DEN_fascist_propaganda_ns: "Fašistická propaganda" # todo: NEW TRANSLATION
  DEN_fascist_propaganda_ns_desc: "Lživí a klamaví fašisté šíří škodlivé pomluvy o naší vládě ve snaze podkopat naši vládu." # todo: NEW TRANSLATION
  DEN_communist_propaganda_ns: "Komunistická propaganda" # todo: NEW TRANSLATION
  DEN_communist_propaganda_ns_desc: "Lživí a klamaví komunisté šíří škodlivé pomluvy o naší vládě ve snaze podkopat naši vládu." # todo: NEW TRANSLATION
  DEN_monarchist_discontent_ns: "Nespokojenost monarchistů" # todo: NEW TRANSLATION
  DEN_monarchist_discontent_ns_desc: "Vytvořilo se vlastenecké hnutí, které se shromáždilo za zastaralým symbolem krále. Jsou nespokojeni s naší vládou lidu a raději by viděli krále nastoupit k moci." # todo: NEW TRANSLATION
  DEN_haeren_dynamic_modifier: "Hæren" # todo: NEW TRANSLATION
  DEN_haeren_dynamic_modifier_desc: "Dánsko vládlo Skandinávii v minulosti a bylo převládající mocí v regionu. Naše armády pochodovaly přes baltský region bez překážek. Armáda je stínem své bývalé slávy, ale můžeme znovu vybudovat její sílu a vojenskou moc, abychom ochránili naše hranice a lidi." # todo: NEW TRANSLATION
  DEN_haeren_dynamic_modifier_improved: "$DEN_haeren_dynamic_modifier$" # todo: NEW TRANSLATION
  DEN_haeren_dynamic_modifier_improved_desc: "Dánsko vládlo Skandinávii v minulosti a bylo převládající mocí. Naše armády se vrátily do částečné síly a udělali jsme první kroky k obnovení její bývalé slávy." # todo: NEW TRANSLATION
  DEN_haeren_dynamic_modifier_max_improved: "$DEN_haeren_dynamic_modifier$" # todo: NEW TRANSLATION
  DEN_haeren_dynamic_modifier_max_improved_desc: "Dánsko vládlo Skandinávii v minulosti a bylo převládající mocí. Naše armády opět vzbuzují úctu a strach! Dokázali jsme obnovit sílu a jsme připraveni na vše, co přijde." # todo: NEW TRANSLATION
  DEN_sovaernet_dynamic_modifier: "Søværnet" # todo: NEW TRANSLATION
  DEN_sovaernet_dynamic_modifier_desc: "Dánsko bývalo velmocí na Baltském moři a dominovalo vlnám našimi mocnými flotilami — ale máme dlouhou historii námořnictví ještě před tím. Vikingové pluli daleko a široko, aby šířili strach a dobývali země. S houževnatostí můžeme znovu vybudovat naši flotilu, aby vládla mořím." # todo: NEW TRANSLATION
  DEN_sovaernet_dynamic_modifier_improved: "$DEN_sovaernet_dynamic_modifier$" # todo: NEW TRANSLATION
  DEN_sovaernet_dynamic_modifier_improved_desc: "Dánsko bývalo velmocí na Baltském moři, dominovalo vlnám svými flotilami. Ačkoli je před námi stále mnoho práce, námořnictvo získalo velkou část své bývalé slávy a síly zpět." # todo: NEW TRANSLATION
  DEN_sovaernet_dynamic_modifier_max_improved: "$DEN_sovaernet_dynamic_modifier$" # todo: NEW TRANSLATION
  DEN_sovaernet_dynamic_modifier_max_improved_desc: "Dánsko bývalo velmocí na Baltském moři a dominovalo vlnám mající mocné flotily. Vybudovali jsme naši námořní sílu a jsme připraveni opět vyplout a vládnout mořím." # todo: NEW TRANSLATION
  DEN_flyvevabnet_dynamic_modifier: "Flyvevåbnet" # todo: NEW TRANSLATION
  DEN_flyvevabnet_dynamic_modifier_desc: "Vzdušné boje jsou nejnovějším způsobem vedení války a měřítkem moderní armády. Založením nejnovější složky dánské armády, Flyvevåbnet, jsme nyní opravdu moderní silou, se kterou je třeba počítat." # todo: NEW TRANSLATION
  DEN_flyvevabnet_dynamic_modifier_improved: "$DEN_flyvevabnet_dynamic_modifier$" # todo: NEW TRANSLATION
  DEN_flyvevabnet_dynamic_modifier_improved_desc: "$DEN_flyvevabnet_dynamic_modifier_desc$" # todo: NEW TRANSLATION
