  NORDIC_investing_in_neighbor_ns_desc: "Co je lepší způsob investování kapitálu než do sousedů. Nejenže jsou blízko, ale s našimi dlouholetými vazbami a společným dědictvím si můžeme být jisti, že se nám to později vrátí." # todo: NEW TRANSLATION
  NORDIC_economic_cooperation_ns: "Hospodářská spolupráce" # todo: NEW TRANSLATION
  NORDIC_economic_cooperation_ns_desc: "V takových časech nesmíme podlehnout odloučení a nepřátelství vůči našim sousedům. Proto investujeme do našeho souseda, aby vzrostly všechny naše lodě. A přitom uděláme slušný zisk." # todo: NEW TRANSLATION
