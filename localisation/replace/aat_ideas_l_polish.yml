l_polish:
  can_not_access_market_closed_economy: "má §Yuzavřenou ekonomiku§!" # todo: NEW TRANSLATION
  FIN_outokumpu: "Outokumpu" # todo: NEW TRANSLATION
  FIN_tampella: "Tampella" # todo: NEW TRANSLATION
  FIN_pohjolan_voima: "Pohjolan Voima" # todo: NEW TRANSLATION
  FIN_nokia: "Nokia" # todo: NEW TRANSLATION
  FIN_valtionrautatiet: "Valtionrautatiet" # todo: NEW TRANSLATION
  FIN_finnish_army: "Finská armáda" # todo: NEW TRANSLATION
  FIN_finnish_army_desc: "Jako produkt své hrdé a nezávislé tradice stojí Finská armáda jako mocná síla, otužená léty boje proti vnějšímu útisku. Se silnou odhodlaností bránit svou vlast jsou finští vojáci zruční střelci a odolní bojovníci, připravení vzdorovat i těm nejobávanějším protivníkům. Navzdory omezeným zdrojům představuje Finská armáda houževnatého a nepoddajného ducha, který se jen těžko zlomí." # todo: NEW TRANSLATION
  FIN_finnish_navy: "Finské námořnictvo" # todo: NEW TRANSLATION
  FIN_finnish_navy_desc: "Finské námořnictvo je malé, ale hrdé společenství, připravené bránit svou vlast proti všem hrozbám. Se zaměřením na pobřežní obranu a ochranu námořních cest je symbolem finské nezávislosti a klíčovým prvkem obranné strategie země. I když může čelit nepříznivým poměrům, námořníci Finska jsou odhodláni bojovat s veškerou odvahou a houževnatostí svých pozemních protějšků." # todo: NEW TRANSLATION
  FIN_finnish_airforce: "Finské letectvo" # todo: NEW TRANSLATION
  FIN_finnish_airforce_desc: "Navzdory své malé velikosti a omezeným prostředkům se Finské letectvo může pyšnit skupinou zručných pilotů a inovativních konstruktérů, kteří zdokonalovali své umění roky experimentování a improvizace. Díky pevné vůli a ochotě přizpůsobit se měnícím se podmínkám si Finské letectvo vybudovalo pověst síly, s níž je třeba počítat, a která bude bránit svou vlast s odvahou a houževnatostí pozemních jednotek." # todo: NEW TRANSLATION
  FIN_national_industry_expand: "$BUL_national_industry_01$" # todo: NEW TRANSLATION
  FIN_national_industry_expand_desc: "$SWI_expand_arms_industry_desc$" # todo: NEW TRANSLATION
  FIN_sami_pathfinders: "Sámští stopaři" # todo: NEW TRANSLATION
  FIN_sami_pathfinders_desc: "Zkušení stopaři a vůdci v divočině, Sámi se snadno orientují v drsné krajině finského severu a poskytují cenné zpravodajské informace finským silám. Ať už v horku boje nebo v tiché hlubině lesa, sámští stopaři jsou nyní klíčovým prvkem Finské armády a trvalým symbolem hrdého dědictví země." # todo: NEW TRANSLATION
  FIN_fortification_effort: "Úsilí o zpevnění opevnění" # todo: NEW TRANSLATION
  FIN_fortification_effort_desc: "$FIN_defense_in_depth_desc$" # todo: NEW TRANSLATION
  FIN_coastal_batteries_effort: "Úsilí o pobřežní baterie" # todo: NEW TRANSLATION
  FIN_coastal_batteries_effort_desc: "$FIN_coastal_defense_desc$" # todo: NEW TRANSLATION
  FIN_mannerheim_line_expansion_modifier: "Rozšíření Mannerheimovy linie" # todo: NEW TRANSLATION
  FIN_mannerheim_line_expansion_modifier_desc: "Posílením a rozšířením Mannerheimovy linie pošleme jasný signál, že se Finsko nebude brát na lehkou váhu a že Finové jsou připraveni bránit svou nezávislost všemi prostředky, které mají k dispozici." # todo: NEW TRANSLATION
  FIN_bank_of_aland_ns: "$FIN_bank_of_aland$" # todo: NEW TRANSLATION
  FIN_bank_of_aland_ns_desc: "$FIN_bank_of_aland_desc$" # todo: NEW TRANSLATION
  FIN_infrastructure_effort: "Úsilí o infrastrukturu" # todo: NEW TRANSLATION
  FIN_infrastructure_effort_desc: "$FIN_industrial_development_desc$" # todo: NEW TRANSLATION
  FIN_hydro_electric_expansion: "Rozšíření vodní energetiky" # todo: NEW TRANSLATION
  FIN_hydro_electric_expansion_desc: "Využitím přírodních zdrojů bohatých řek [ROOT.GetName] probíhá významné rozšíření naší vodní energetické infrastruktury. Investice do výstavby nových vodních elektráren poskytnou prostředky pro výrazné rozšíření průmyslové kapacity a podpoří růst naší země." # todo: NEW TRANSLATION
  FIN_motti_tactics_modifier: "Motti taktika" # todo: NEW TRANSLATION
  FIN_motti_tactics_modifier_desc: "Finské jednotky uplatňují motti taktiku v tomto státě — obkličují a izolují nepřátelské jednotky s cílem paralyzovat jejich zásobovací a komunikační trasy." # todo: NEW TRANSLATION
  FIN_weapon_caches_modifier: "Zásoby zbraní" # todo: NEW TRANSLATION
  FIN_weapon_caches_modifier_desc: "Po tajné vojenské operaci bylo velké množství zbraní a výstroje Finské armády ukryto do zásob rozmístěných po celém státě, aby finské odbojové prvky mohly pokračovat v boji proti vetřelcům." # todo: NEW TRANSLATION
  FIN_public_opposition_to_the_winter_war: "Veřejné odmítání Zimní války" # todo: NEW TRANSLATION
  FIN_public_opposition_to_the_winter_war_desc: "Lidé začali pochybovat o nezbytnosti našeho konfliktu proti [FIN.GetNonIdeologyName]. To, co bylo dříve okrajovým názorem, drženým v mezích našich bezpečnostních služeb, se rozšířilo do hlavního proudu mimo naší kontrolu." # todo: NEW TRANSLATION
  FIN_we_are_the_white_death_idea: "Jsme Bílá smrt" # todo: NEW TRANSLATION
  FIN_we_are_the_white_death_idea_desc: "Náš proslulý odstřelovač Simo Häyhä zvýšil morálku našich ozbrojených sil svými statečnými činy na bojišti. Vojáci se nyní sdružují kolem kolektivního jména ‚Bílá smrt‘. Mrazivé jméno vystihující jejich neústupné odhodlání zničit všechny nepřátele, kteří by si troufli napadnout naši zemi." # todo: NEW TRANSLATION
  FIN_embraced_by_the_white_death: "Obětí Bílé smrti" # todo: NEW TRANSLATION
  FIN_embraced_by_the_white_death_desc: "Simo Häyhä, navzdory mnoha smrtelným zraněním, nadále rozsévá chladné objetí smrti a strachu mezi našimi nepřáteli." # todo: NEW TRANSLATION
  FIN_the_lapland_war: "Zapletení do Laplandské války" # todo: NEW TRANSLATION
  FIN_compensation_for_side_switch_good: "Kompenzace od Finska" # todo: NEW TRANSLATION
  FIN_compensation_for_side_switch_bad: "Válečné reparace" # todo: NEW TRANSLATION
  FIN_sami_pathfinders_recon_bonus_tt: "§YPrůzkum a $long_range_patrol_support$:§! Průzkum: §G+100.0%§!, §Y$snow$§!: Pohyb: §G+10%§!, §Y$forest$§!, §Y$hills$§!, §Y$mountain$§!, §Y$marsh$§!, §Y$plains$§! a §Y$river$§!: Pohyb: §G+5%§!" # todo: NEW TRANSLATION
  FIN_finnish_army_dynamic_modifier_tt: "[GetMolotovCocktailsTooltip]" # todo: NEW TRANSLATION
