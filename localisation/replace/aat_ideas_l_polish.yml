  FIN_finnish_airforce_dynamic_modifier_tt: "[GetCasOrFighterDesignsTooltip][GetNavalAirforceTooltip]" # todo: NEW TRANSLATION
  FIN_support_for_ground_forces_dynamic_modifier_tt: "§YVšechny $cas_bomber$§!: $production_cost_tt$ §G-5.00%§!\n" # todo: NEW TRANSLATION
  FIN_dominate_the_skies_dynamic_modifier_tt: "§YVšechny $light_fighter$§!: $production_cost_tt$ §G-5.00%§!\n" # todo: NEW TRANSLATION
  FIN_naval_airforce_dynamic_modifier_tt: "§YVšechny $naval_bomber$§!: $production_cost_tt$ §G-5.00%§!\n" # todo: NEW TRANSLATION
  FIN_support_for_ground_forces_improved_dynamic_modifier_tt: "§YVšechny $cas_bomber$§!: $production_cost_tt$ §G-10.00%§!\n" # todo: NEW TRANSLATION
  FIN_dominate_the_skies_improved_dynamic_modifier_tt: "§YVšechny $light_fighter$§!: $production_cost_tt$ §G-10.00%§!\n" # todo: NEW TRANSLATION
  FIN_naval_airforce_improved_dynamic_modifier_tt: "§YVšechny $naval_bomber$§!: $production_cost_tt$ §G-10.00%§!\n" # todo: NEW TRANSLATION
  FIN_finnish_navy_dynamic_modifier_tt: "[GetConvoyTooltip][GetConversionTooltip]" # todo: NEW TRANSLATION
  FIN_the_merchant_fleet_dynamic_modifier_tt: "§Y$convoy$§! $production_cost_tt$ §G-10.00%§!\n" # todo: NEW TRANSLATION
  FIN_conversion_of_civilian_vessels_dynamic_modifier_tt: "§Y$screen_ship$§! a §Y$ship_hull_cruiser_coastal_defense_ship$§!: $production_cost_tt$ §G-10.00%§!\n" # todo: NEW TRANSLATION
  FIN_conversion_of_civilian_vessels_dynamic_modifier_no_mtg_tt: "§Y$screen_ship$§!: $production_cost_tt$ §G-10.00%§!\n" # todo: NEW TRANSLATION
  FIN_repurposed_small_industries: "Převedené malé průmysly" # todo: NEW TRANSLATION
  FIN_repurposed_small_industries_desc: "Převzetím malých průmyslových podniků a jejich přeorientováním pro potřeby válečného úsilí může finská vláda nyní mobilizovat své zdroje a plně nasadit ekonomiku pro civilní i vojenské potřeby." # todo: NEW TRANSLATION
  FIN_lotta_svard: "Lotta Svärd" # todo: NEW TRANSLATION
  FIN_lotta_svard_desc: "Lotta Svärd po mnoho let podporovaly naše ozbrojené síly v pomocné funkci. Vzhledem k vážné situaci v zemi jsme jejich roli rozšířili, ozbrojili je a dovolili členkám zastávat aktivnější frontovou roli při obraně vlasti." # todo: NEW TRANSLATION
  FIN_lotta_svard_support_battalions_bonus_tt: "§Y$category_support_battalions$:§! Organizační hodnota: §G+10§!, HP: §G+5§!" # todo: NEW TRANSLATION
  FIN_international_volunteers: "Mezinárodní dobrovolníci" # todo: NEW TRANSLATION
  FIN_international_volunteers_desc: "Dobrovolníci z celého světa přijíždějí do Finska, aby se připojili k našim silám. Finové nebudou bojovat tuto válku sami!" # todo: NEW TRANSLATION
  FIN_militarized_society_requirement_tt: "§RBude dočasně odstraněno§! pokud nebude v platnosti §Y$all_adults_serve$§! nebo §Y$scraping_the_barrel$§! zákon o branné povinnosti." # todo: NEW TRANSLATION
  FIN_the_lone_wolf_tt: "§RNelze vytvořit ani se připojit k frakci§!" # todo: NEW TRANSLATION
  FIN_popular_support_for_the_revolution: "Veřejná podpora revoluce" # todo: NEW TRANSLATION
  FIN_popular_support_for_the_revolution_desc: "Proletariát [FIN.GetAdjective] konečně povstal a strhl pouta bürgerowské útlaku. Společně naše hnutí otřese základy imperialismu nejen v [FIN.GetNonIdeologyName], ale po celém světě!" # todo: NEW TRANSLATION
  FIN_imprisoned_right_wing_leaders: "Uvěznění vůdci pravice" # todo: NEW TRANSLATION
  FIN_imprisoned_right_wing_leaders_desc: "Vůdci různých pravicových frakcí, jako politici a podnikatelé, byli preventivně uvězněni, aby se zabránilo jejich kontrarevoluční činnosti." # todo: NEW TRANSLATION
  FIN_low_army_morale: "Nízká morálka armády" # todo: NEW TRANSLATION
  FIN_low_army_morale_desc: "Naše ozbrojené síly nejsou příliš nadšené z vyhlídky bojovat znovu občanskou válku, tak brzy po poslední. Morálka zvláště utrpěla od vypuknutí nepokojů." # todo: NEW TRANSLATION
  FIN_commitment_from_construction_workers: "Závazek stavebních dělníků" # todo: NEW TRANSLATION
  FIN_commitment_from_construction_workers_desc: "Stavební dělníci nejsou cizinci krutostem kapitalistické exploatace. Mnozí se proto stali zapálenými příznivci naší revoluční hnutí. Někteří vstoupili do ozbrojených sil, mnoho dalších se zavázalo využít své odbornosti v jakýchkoli stavebních operacích, které stát bude potřebovat při vedení války." # todo: NEW TRANSLATION
  FIN_commitment_from_the_trade_unions: "Závazek odborů" # todo: NEW TRANSLATION
  FIN_commitment_from_the_trade_unions_desc: "Odbory po desetiletí tvrdě bojovaly proti nespravedlnostem kapitalistického útlaku na pracovišti a byly klíčové ve zvyšování třídního povědomí mezi lidmi. Nyní se plně zapojují do našeho revolučního hnutí, aby jednou provždy ukončily kapitalismus." # todo: NEW TRANSLATION
  FIN_infiltrated_assets: "Infiltrované aktiva" # todo: NEW TRANSLATION
  FIN_infiltrated_assets_desc: "S našimi nově navázanými obchodními dohodami s jinými národy jsme získali také příležitost infiltrovat naše partnery. To by mělo přinést lepší pochopení jejich motivů a cílů, což nám umožní lépe chránit vlastní zájmy." # todo: NEW TRANSLATION
  FIN_baltic_sea_focus: "Zaměření na Baltské moře" # todo: NEW TRANSLATION
  FIN_baltic_sea_focus_desc: "Baltské moře je hlavní otázkou pro obranu národa. Musíme naší flotile poskytnout výcvik a zdroje, které potřebuje, aby v regionu plnila své úkoly co nejefektivněji." # todo: NEW TRANSLATION
  FIN_finnish_goods: "Finské zboží" # todo: NEW TRANSLATION
  FIN_finnish_goods_desc: "Prozíravým tahem jsme uzavřeli robustní obchodní dohodu s Kuusinovou [FIN.GetName], což nám zajišťuje privilegovaný přístup k jejich cennému zboží a velmi příznivé podmínky k jeho získávání." # todo: NEW TRANSLATION
  FIN_fascist_regime: "Fašistický režim" # todo: NEW TRANSLATION
  FIN_fascist_regime_desc: "$FIN_a_fascist_regime$" # todo: NEW TRANSLATION
  FIN_patriotic_peoples_movement_ns_1: "$FIN_patriotic_peoples_movement$" # todo: NEW TRANSLATION
  FIN_academic_karelian_society_ns_1: "$FIN_academic_karelian_society$" # todo: NEW TRANSLATION
  FIN_suojeluskunta_ns_1: "Suojeluskunta" # todo: NEW TRANSLATION
  FIN_anti_soviet_sentiment: "Proti‑sovětské nálady" # todo: NEW TRANSLATION
  FIN_anti_soviet_sentiment_desc: "Obyvatelé tohoto státu chovají hlubokou zášť vůči [SOU.GetNameDef], považují ji za nic víc než přepracované Ruské impérium nebo za hrozbu jejich tradičním hodnotám." # todo: NEW TRANSLATION
  FIN_confederation_of_finno_russian_republics_dm: "Konfederace finsko-ruských republik" # todo: NEW TRANSLATION
  FIN_confederation_of_finno_russian_republics_dm_desc: "$FIN_confederated_finno_russian_republics$" # todo: NEW TRANSLATION
  NOR_complacent_cabinet_ns: "Sebejistý kabinet" # todo: NEW TRANSLATION
  NOR_complacent_cabinet_ns_desc: "Fakt, že Johan Nygaardsvold dokázal sestavit stabilní vládu, není maličkost. On a jeho kabinet si myslí, že to byl poslední překážka, ale ještě netuší, že to byl jen první z mnoha." # todo: NEW TRANSLATION
  NOR_obsolete_armed_forces_ns_1: "Zastaralé ozbrojené síly" # todo: NEW TRANSLATION
  NOR_obsolete_armed_forces_ns_1_desc: "Norsko se o své ozbrojené síly dlouho nestaralo, a nyní by se více hodily v muzeu než v boji." # todo: NEW TRANSLATION
  NOR_the_hard_thirties_ns: "Tvrdá třicátá léta" # todo: NEW TRANSLATION
  NOR_the_hard_thirties_ns_desc: "Velká hospodářská krize z roku 1929 je stále cítit v každé domácnosti a podniku napříč Norskem. Možná bude potřeba zázrak, abychom toto desetiletí přečkali." # todo: NEW TRANSLATION
  NOR_anti_communist_sentiment_ns: "Antikomunistické nálady" # todo: NEW TRANSLATION
  NOR_anti_communist_sentiment_ns_desc: "[SOU.GetNameDefCap] a komunisté v zahraničí zaseli strach u mnoha [NOR.GetAdjective]ů do té míry, že fašismus není v porovnání s nimi opravdovou hrozbou, pokud se vypořádají s rudým nebezpečím." # todo: NEW TRANSLATION
  NOR_disjointed_cabinet_conscription_law_TT: "§RNelze zvýšit zákon o branné povinnosti§!" # todo: NEW TRANSLATION
  NOR_broken_gun_ns: "Zlomená zbraň" # todo: NEW TRANSLATION
  NOR_broken_gun_ns_desc: "Naše politika ‚Zlomené zbraně‘ zajistí, že mír a prosperita se rozšíří po [NOR.GetName] a dál. Můžeme tyto prostředky použít na zlepšení životů našich občanů a ukázat sousedům, že nemáme zlé úmysly." # todo: NEW TRANSLATION
  NOR_printing_money_ns: "Tisk peněz" # todo: NEW TRANSLATION
  NOR_printing_money_ns_desc: "Jestli chceme vyjít z Tvrých třicátých dříve, než desetiletí skončí, bude potřeba peněz, a hodně!" # todo: NEW TRANSLATION
  NOR_defensive_rearmament_ns: "Obranné zbrojení" # todo: NEW TRANSLATION
  NOR_defensive_rearmament_ns_desc: "Nemůžeme dovolit, aby si zbytek světa myslel, že jsme válečníci a zaútočili na nás preventivně. Každé úsilí o přezbrojení by mělo mít jasný obranný účel." # todo: NEW TRANSLATION
  NOR_coordinating_committee: "Koordinační výbor" # todo: NEW TRANSLATION
  NOR_coordinating_committee_desc: "V centru úsilí občanského odporu stojí Koordinasjonskomiteen, které má propojit exilovou vládu s různými prvky občanského odporu v [NOR.GetName]." # todo: NEW TRANSLATION
  NOR_kretsen_ns: "Kretsen" # todo: NEW TRANSLATION
  NOR_kretsen_ns_desc: "Tato skupina, hluboko vložená v útrobách našich okupantů a konající tajné schůzky na statku Grimelund, má za úkol vést občanský odpor jakkoli to půjde, zvenčí či zevnitř fašistické okupace." # todo: NEW TRANSLATION
  NOR_sivorg_ns: "Sivorg" # todo: NEW TRANSLATION
  NOR_sivorg_ns_desc: "Seskupení občanských odbojových skupin, včetně Koordinačního výboru a Kretsen. Jsou to muži a ženy domovské fronty, kteří musí udržet naději, že porazíme fašismus a navrátíme svobodu [NOR.GetName]." # todo: NEW TRANSLATION
  NOR_ketsen_plus_KK_fake_ns: "$NOR_kretsen_ns$ §Wa§! $NOR_coordinating_committee$" # todo: NEW TRANSLATION
  NOR_efficient_production_ns: "Efektivní výroba" # todo: NEW TRANSLATION
  NOR_efficient_production_ns_desc: "Žádné zlepšení účinnosti nelze přehlížet. Musíme zajistit, že ze toho, co máme, vytěžíme co nejvíce, jinak riskujeme být převažováni." # todo: NEW TRANSLATION
  NOR_new_haeren_ns_1: "Nová Hæren" # todo: NEW TRANSLATION
  NOR_new_haeren_ns_1_desc: "Armáda [NOR.GetAdjective] z minulosti nestačila pro tyto nebezpečné časy. Toto je moderní armáda pro moderní válku." # todo: NEW TRANSLATION
  NOR_new_haeren_ns_2_desc: "$NOR_new_haeren_ns_1_desc$" # todo: NEW TRANSLATION
  NOR_kungens_garde_ns: "Hans Majestet Kongens Garde" # todo: NEW TRANSLATION
  NOR_kungens_garde_ns_desc: "Král může mít tři miliony ochránců, ale pouze jedinou sílu — elitu [NOR.GetAdjective] armády, která je schopna stát se tváří v tvář našim nepřátelům." # todo: NEW TRANSLATION
  NOR_expanded_conscription_ns: "Rozšířená branná povinnost" # todo: NEW TRANSLATION
  NOR_expanded_conscription_ns_desc: "Jako řídce osídlená země v těžkých časech si žádný [NOR.GetAdjective] nemůže dovolit sedět bez práce. Každý, kdo splňuje minimální požadavky, musí být povolán, chceme‑li dosáhnout našich cílů." # todo: NEW TRANSLATION
  NOR_XU_ns: "XU" # todo: NEW TRANSLATION
  NOR_XU_ns_desc: "Mnoho Norů, kteří odolávají fašistické okupaci, chce udělat vše, co může pro ztížení života svým utlačovatelům. XU může organizovat všechny tyto prvky pod svým deštníkem a podporovat jejich špionážní, zpomalovací a nakonec vyhnací snahy." # todo: NEW TRANSLATION
  NOR_communist_education_centers_ns_1: "Komunistická výchovná centra" # todo: NEW TRANSLATION
  NOR_communist_education_centers_ns_1_desc: "Tato centra byla založena našimi soudruhy ze zahraničí a jsou v čele našich snah připravit [NOR.GetAdjective] na nový [NOR.GetNonIdeologyName], který má přijít." # todo: NEW TRANSLATION
  NOR_crumbling_fortifications_ns: "Rozpadávající se opevnění" # todo: NEW TRANSLATION
  NOR_crumbling_fortifications_ns_desc: "V některých případech by bylo velkorysé nazvat je opevnění. Nejsou jen odstavená, ale vůbec nejsou připravena na moderní boj." # todo: NEW TRANSLATION
  NOR_reduced_workers_rights_ns: "Omezená práva dělníků" # todo: NEW TRANSLATION
  NOR_reduced_workers_rights_ns_desc: "S odůvodněním bezprostřední války a pohromy jsme si prozatím obětovali omezení práv našich dělníků. Doufejme, že to pochopí po skončení války." # todo: NEW TRANSLATION
  NOR_investing_in_norway_ns: "Investování v Norsku" # todo: NEW TRANSLATION
  NOR_investing_in_norway_ns_desc: "Investování části našeho kapitálu do [NOR.GetName] nás nejen sblíží, ale také posílí spojence v případě, že budeme v budoucnu potřebovat jejich pomoc." # todo: NEW TRANSLATION
  NOR_improved_training_ns: "Zlepšený výcvik" # todo: NEW TRANSLATION
  NOR_improved_training_ns_desc: "Náš nový výcvikový program nám umožní rychleji přivést muže na frontu a zároveň je naučit vše, co potřebují k přežití a k zničení našich nepřátel a dalším dovednostem." # todo: NEW TRANSLATION
  NOR_flexible_officers_academy_spirit: "Flexibilní důstojníci" # todo: NEW TRANSLATION
  NOR_flexible_officers_academy_spirit_desc: "Nová generace důstojníků povede [NOR.GetAdjective] armády k vítězství, protože se mohou učit z více než jen prašných knih a staromódních profesorských lekcí mírových časů." # todo: NEW TRANSLATION
  NOR_contested_leadership_ns: "Spor o vedení" # todo: NEW TRANSLATION
  NOR_contested_leadership_ns_desc: "[get_NOR_contested_leadership_ns_desc]" # todo: NEW TRANSLATION
  NOR_contested_leadership_ns_desc_ger: "Bez ohledu na to, čeho se Quisling snažil dosáhnout svým převratem, [GER.GetNameDef] měla vlastní plány pro vládu, která měla být nainstalována, když bude [NOR.GetNonIdeologyName] dobyto. Pravdou je, že v Říši jen málo lidí považuje Quislinga za vhodného pro tu roli, kromě samotného Hitlera, který se zdá být podivně nakloněn tomuto malému [NOR.GetAdjective] tyranovi." # todo: NEW TRANSLATION
  NOR_contested_leadership_ns_desc_generic: "Navzdory tomu, že Quisling uskutečnil svůj převrat, pravdou je, že hierarchie moci je velmi zmatená, protože ne každý v ozbrojených silách, ani dokonce v jeho vlastní administrativě, schvaluje jeho převzetí moci." # todo: NEW TRANSLATION
  NOR_abandoning_nynorsk_ns: "$NOR_abandoning_nynorsk$" # todo: NEW TRANSLATION
  NOR_abandoning_nynorsk_ns_desc: "Vůdci Nasjonal Samling rozhodli, že Nynorsk nebude tolerován a každý občan musí používat verzi norštiny Bokmål." # todo: NEW TRANSLATION
  NOR_oppressed_civilians_dmod: "Utlačovaní civilisté" # todo: NEW TRANSLATION
  NOR_oppressed_civilians_dmod_desc: "Obyvatelé Norska zažívají široké spektrum opatření k potlačení jakéhokoli nesouhlasu s fašistickým režimem uloženým Nasjonal Samling za cizí tyrany." # todo: NEW TRANSLATION
  NOR_ulfhedhnar_ns: "$NOR_ulfhedhnar_wolf_coats$" # todo: NEW TRANSLATION
  NOR_ulfhedhnar_ns_desc: "Oživili jsme naše tradiční vikingské berserkery, Wolfcoats. Tito muži dychtí po boji a jsou připraveni vést naše výboje po celém světě." # todo: NEW TRANSLATION
  NOR_permanent_revolution_ns: "Trvalá revoluce" # todo: NEW TRANSLATION
  NOR_permanent_revolution_ns_desc: "Jak nás učil Lev Trockij, revoluce neskončí, dokud nebude každý dělník na světě osvobozen a znovu spojen s plody své práce. Hranice pro dělnickou třídu nemají význam." # todo: NEW TRANSLATION
  NOR_attack_sweden_ns: "Útok na Švédsko" # todo: NEW TRANSLATION
  NOR_attack_sweden_ns_desc: "[SWE.GetNonIdeologyName] je příliš důležitý cíl, než abychom ho nechali neobsazený. Pokud nejdříve nezískáme jejich zdroje, mohly by padnout do rukou nepřítele nebo - co hůř - do rukou [SWE.GetAdjective] válečných šmejdů." # todo: NEW TRANSLATION
  NOR_attack_denmark_ns: "Útok na Dánsko" # todo: NEW TRANSLATION
  NOR_attack_denmark_ns_desc: "[DEN.GetNonIdeologyName] je naše brána do zbytku Evropy. Bohužel to také znamená, že se může stát odpalovacím padákem našeho nepřítele do Skandinávie. Nesmíme ho nechat nehlídané." # todo: NEW TRANSLATION
  NOR_crush_stalin_ns: "Zničit Stalina" # todo: NEW TRANSLATION
  NOR_crush_stalin_ns_desc: "Stalin a jeho takzvaný [SOU.GetName] jsou chápáni jako měřítko toho, čemu komunismus odpovídá. Nemůžeme to nechat pokračovat — tento tlouštíkův režim je nic víc než staré Ruské impérium natřené rudou barvou." # todo: NEW TRANSLATION
  NOR_crush_hitler_ns: "Zničit Hitlera" # todo: NEW TRANSLATION
  NOR_crush_hitler_ns_desc: "Jen málo režimů je tak brutálních a nelidských jako Hitlerův. Nemůžeme nechat tohoto maniaka řádit. Vyřiďme mu to rychle a rozhodně spolu s jeho nacistickým [GER.GetNonIdeologyName]." # todo: NEW TRANSLATION
  NOR_liberate_finland_ns: "Osvobodit Finsko" # todo: NEW TRANSLATION
  NOR_liberate_finland_ns_desc: "Dělníci [FIN.GetName] jsou zjevně v potřebě osvobození. Dřou ne pro sebe ani své finské spolubojovníky, ale pro své pozemkové pány a průmyslníky. Pomozme našim soudruhům osvobodit tuto zemi, aby mohla být zapojena do revoluce." # todo: NEW TRANSLATION
  NOR_king_haakon_vii_ns: "Král Haakon VII" # todo: NEW TRANSLATION
  NOR_king_haakon_vii_ns_desc: "Jako první [NOR.GetAdjective] monarcha od 13. století je král Haakon VII vzorem demokracie. Teprve po referendu přijal korunu a svěřil vládu [NOR.GetName] svým poradcům a jiným vysokým šlechticům." # todo: NEW TRANSLATION
  NOR_new_high_king: "Nový vysoký král" # todo: NEW TRANSLATION
  NOR_new_high_king_desc: "Regent Peder Anker Wedel-Jarlsberg se prohlásil novým Vysokým králem Norska, ustanovil se vládcem, aniž by přímo převzal titul krále Haakona. Tento krok je však široce nepopulární mezi sousedními zeměmi." # todo: NEW TRANSLATION
  NOR_norwegian_regency: "Norská regentura" # todo: NEW TRANSLATION
  NOR_norwegian_regency_desc: "Regent Peder Anker Wedel-Jarlsberg prohlásil, že má v úmyslu vykonávat pouze vůli a rozkazy svého krále Haakona VII. Usiluje proto o sblížení se sousedními skandinávskými monarchiemi." # todo: NEW TRANSLATION
  NOR_second_north_sea_empire: "Druhé impérium Severního moře" # todo: NEW TRANSLATION
  NOR_second_north_sea_empire_desc: "Regent Peder Anker Wedel-Jarlsberg prohlásil, že hodlá obnovit Norsko do jeho bývalé slávy a že je pouze otázkou času, než opět povstane nové norské impérium." # todo: NEW TRANSLATION
  NOR_independent_norway_dmod: "Nezávislé Norsko" # todo: NEW TRANSLATION
  NOR_independent_norway_dmod_desc: "Jsme nezávislí na Švédsku od roku 1905 a ujeli jsme dlouhou cestu. Nyní je na nás vytvořit [NOR.GetNonIdeologyName], o kterém snili naši předkové." # todo: NEW TRANSLATION
  NOR_army_air_force_dmod: "Hærens Flyvevaaben" # todo: NEW TRANSLATION
  NOR_army_air_force_dmod_desc: "Prozatím bude úkolem našeho vznikajícího letectva podporovat pozemní armády, kamkoli půjdou, takže zatím není nutná samostatná hierarchie." # todo: NEW TRANSLATION
  NOR_royal_air_force_dmod: "Luftforsvaret" # todo: NEW TRANSLATION
  NOR_royal_air_force_dmod_desc: "Naše letectvo se rozvinulo do bodu, kdy je možno je považovat nejen za pány [NOR.GetAdjective] oblohy, ale i vlastního osudu." # todo: NEW TRANSLATION
  NOR_royal_navy_dmod: "Sjøforsvaret" # todo: NEW TRANSLATION
  NOR_royal_navy_dmod_desc: "Naše hrdé námořnictvo bude plout po mořích kolem [NOR.GetName] a dál. Koneckonců nejširší dálnice do naší země je Severní moře samotné." # todo: NEW TRANSLATION
  NOR_administrative_council_dmod: "Administrativní rada" # todo: NEW TRANSLATION
  NOR_administrative_council_dmod_desc: "Zatímco je naše země okupována, tito muži a ženy budou skupinou pověřenou menšími záležitostmi, zatímco velká rozhodnutí budou učiněna daleko našimi fašistickými pány." # todo: NEW TRANSLATION
  NOR_kingdom_of_norway_dmod: "$NOR_the_kingdom_of_norway$" # todo: NEW TRANSLATION
  NOR_kingdom_of_norway_dmod_desc: "Jaký smysl má ta fasáda demokracie? Nyní, když je Storting konečně rozpuštěn, může naše království vzkvétat pod dobrotivou rukou našeho krále a spravedlivou pěstí našeho pana regenta Pedera Ankera Wedel-Jarlsberga." # todo: NEW TRANSLATION
  NOR_prep_his_dmod_1: "Vyvíjející se" # todo: NEW TRANSLATION
  NOR_prep_his_dmod_1_desc: "Pracujeme na přeměně tohoto státu z periferie na místo s malým civilním průmyslem." # todo: NEW TRANSLATION
  NOR_prep_his_dmod_2: "Rozvinutý" # todo: NEW TRANSLATION
  NOR_prep_his_dmod_2_desc: "#Tento stát je rozumně rozvinutý, ale stále má dlouhou cestu k tomu, aby byl považován za průmyslovou velmoc." # todo: NEW TRANSLATION
  NOR_prep_his_dmod_3: "Vysoce rozvinutý" # todo: NEW TRANSLATION
  NOR_prep_his_dmod_3_desc: "Tento stát je plně oddán záležitostem civilního průmyslu v Norsku." # todo: NEW TRANSLATION
  NOR_prep_resistance_dmod: "Zasaděný odpor" # todo: NEW TRANSLATION
  NOR_prep_resistance_dmod_desc: "Nezáleží na tom, co si naši okupanti o nás myslí, lidé [NOR.GetNonIdeologyName] se tak snadno nevzdají. Vysadili jsme lidi, ukryli nástroje a rozmístili zásoby, které jim umožní lépe odolávat těmto strašlivým okupantům." # todo: NEW TRANSLATION
  NOR_defend_state_dmod: "Bránit stát" # todo: NEW TRANSLATION
  NOR_defend_state_dmod_desc: "Budeme bránit, co je naše, veškerými silami. Okupanti musí zemřít." # todo: NEW TRANSLATION
  NOR_prep_fasc_dmod_1: "Fašističtí stoupenci" # todo: NEW TRANSLATION
  NOR_prep_fasc_dmod_2: "$NOR_prep_fasc_dmod_1$" # todo: NEW TRANSLATION
  NOR_prep_fasc_dmod_3: "$NOR_prep_fasc_dmod_1$" # todo: NEW TRANSLATION
  NOR_royal_defenses: "Královské obrany" # todo: NEW TRANSLATION
  NOR_royal_defenses_desc: "Na příkaz královského paláce se tento stát zaměří na vybudování obranných struktur nezbytných k ochraně království." # todo: NEW TRANSLATION
  NOR_aat_norsk_hydro: "$NOR_norsk_hydro$" # todo: NEW TRANSLATION
  NOR_folks_hydro: "Folks Hydro" # todo: NEW TRANSLATION
  SWE_army_rearnament_value: "Přezbrojení armády: [SWE_rearmament_status_text_army] ([?SWE.folkhemmet_army_part]/[?SWE.folkhemmet_max_constituent_parts])" # todo: NEW TRANSLATION
  SWE_navy_rearnament_value: "Přezbrojení námořnictva: [SWE_rearmament_status_text_navy] [?SWE.folkhemmet_navy_part]/[?SWE.folkhemmet_max_constituent_parts]" # todo: NEW TRANSLATION
  SWE_air_rearnament_value: "Přezbrojení letectva: [SWE_rearmament_status_text_air] [?SWE.folkhemmet_air_part]/[?SWE.folkhemmet_max_constituent_parts]" # todo: NEW TRANSLATION
  SWE_folkhemmet_intactness_value: "§YStav Folkhemmet:§! [SWE_folkhemmet_status_text] ([?SWE.folkhemmet_intactness]/[?SWE.folkhemmet_max_intactness])" # todo: NEW TRANSLATION
  SWE_folkhemmet_system_desc: "Jak se svět pomalu blíží ke globálnímu konfliktu, Švédsko stojí před volbou, zda se přeozbrojit na úkor svého sociálního systému, nebo ho udržet nepoškozený a riskovat nepřipravenost na budoucí konflikt." # todo: NEW TRANSLATION
  SWE_folkhemmet_intactness_intact: "§GNeporušené§!" # todo: NEW TRANSLATION
  SWE_folkhemmet_intactness_eroding: "§YZhoršující se§!" # todo: NEW TRANSLATION
  SWE_folkhemmet_intactness_gone: "§RZničené§!" # todo: NEW TRANSLATION
  SWE_folkhemmet_army_status_text: "[SWE_rearmament_status_text_army]" # todo: NEW TRANSLATION
  SWE_rearmament_3_text: "§UPlné financování§!" # todo: NEW TRANSLATION
  SWE_rearmament_2_text: "§YStřední financování§!" # todo: NEW TRANSLATION
  SWE_rearmament_1_text: "§YNízké financování§!" # todo: NEW TRANSLATION
  SWE_rearmament_0_text: "§ZŽádné financování§!" # todo: NEW TRANSLATION
  SWE_folkhemmet_pdx_tooltip: "Každý rok můžeme nastavit politiky pro přezbrojení nebo odzbrojení [SWE.GetnameDef]. Čím více společnost přemístíme směrem k přezbrojení, tím silnější budou bonusy k rychlosti stavby §YPodpory války§!, §YVojenských továren§! a §YDokeři§!, zatímco §YStabilita§! a rychlost stavby §YCivilních továren§! bude slabší.\n§YFolkhemmet§! s 0 §YNeporušeností§! je svou vlastní inverzí, kde jsou civilní bonusy §Rnegativní§! a vojenské bonusy §Gpsitivní§!.\n\nKdyž se sejde výbor pro přezbrojení, budeme mít dobu, kdy lze politiky volně měnit, ale jakmile výbor skončí, budou tyto volby zamčeny až do příštího roku." # todo: NEW TRANSLATION
  SWE_hungershield: "Hungersköld" # todo: NEW TRANSLATION
  SWE_hungershield_instant_desc: "Švédsko hrozí stávkami nebo nepokoji, pokud je stabilita pod §Y68%§!. §YBude odstraněno pokud platí alespoň jedno z následujících:§!\nMá více než §Y45§! civilních továren včetně obchodu \nPostavilo více než §Y14§! civilních továren bez obchodu\nZískáte §G120§! §Ypolitické moci§! při odstranění" # todo: NEW TRANSLATION
  SWE_severe_lack_of_ammunition: "Vážný nedostatek munice" # todo: NEW TRANSLATION
  SWE_severe_lack_of_ammunition_desc: "Naše vojsko trpí vážným nedostatkem munice pro naše zbraně, stejně jako směs různých malorážních zbraní vyrobených a zakoupených z různých zahraničních zemí. Mělo by to být co nejdříve řešeno." # todo: NEW TRANSLATION
  SWE_folkhemmet: "Folkhemmet" # todo: NEW TRANSLATION
  SWE_folkhemmet_desc: "$SWE_per_albin_hansson$ a Sociálně demokratická strana zavedli v průběhu let vlnu reforem známých jako ‚Folkhemmet‘ neboli ‚lidový domov‘. Reformy vytvořily sociální síť, lepší bydlení a širší přístup ke vzdělání pro masy, na úkor vojenského rozpočtu. Zatímco mnozí si tyto reformy cení, ti s bohatším či militarističtějším postojem na ně pohlížejí s opovržením." # todo: NEW TRANSLATION
  SWE_folkhemmet_communism: "$SWE_folkhemmet$" # todo: NEW TRANSLATION
  SWE_folkhemmet_communism_desc: "Sociální demokracie zavedla v průběhu let vlnu reforem zvaných ‚Folkhemmet‘ nebo ‚lidový domov‘. Reformy vytvořily sociální síť, lepší bydlení a větší přístup ke vzdělání pro masy, na úkor vojenského rozpočtu. S nastolením diktatury dělníků máme příležitost tuto politiku rozšířit." # todo: NEW TRANSLATION
