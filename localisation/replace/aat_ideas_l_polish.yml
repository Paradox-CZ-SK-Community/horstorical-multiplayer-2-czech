  SWE_ger_defense: "Udržet vojenskou nezávislost" # todo: NEW TRANSLATION
  SWE_fascist_counter_revolution_0: "Šepoty proti‑revoluce" # todo: NEW TRANSLATION
  SWE_fascist_counter_revolution_0_desc: "Konečně jsme u moci, ale stále jsou tu šeptající hlasy nespokojených pravicových totalitářů. Ztratí se to v ozvěně, nebo z toho vyroste řev, který začne lavinu?" # todo: NEW TRANSLATION
  SWE_fascist_counter_revolution_1: "Vojenský nesouhlas" # todo: NEW TRANSLATION
  SWE_fascist_counter_revolution_1_desc: "Více než jeden z našich vojenských vůdců vyjádřil nesouhlas s naším vedením, dokonce i král promluvil. Tito reliktní muži by měli vědět, jakou hrají roli ve společnosti a zůstat tam. Přesto tyto hlasy sílí každým dnem..." # todo: NEW TRANSLATION
  SWE_fascist_counter_revolution_2: "Velkoplošná neposlušnost" # todo: NEW TRANSLATION
