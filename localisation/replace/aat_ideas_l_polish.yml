  SWE_economic_deregulation_idea: "Ekonomická deregulace" # todo: NEW TRANSLATION
  SWE_economic_deregulation_idea_desc: "Vláda se rozhodla co nejméně zasahovat do ekonomiky a ponechat ji spíše vůli volného trhu." # todo: NEW TRANSLATION
  SWE_aland_agreement_fin: "Smlouva o Ålandech" # todo: NEW TRANSLATION
