  JUNO_army_modernization_initiative: "Iniciativa modernizace armády" # todo: NEW TRANSLATION
  JUNO_armor_modernization_initiative: "Iniciativa modernizace obrněných jednotek" # todo: NEW TRANSLATION
  JUNO_naval_academy_random_admirals_tt: "Až §Ytři§! náhodně vybraní námořní velitelé získají §G+1§! dovednost koordinace" # todo: NEW TRANSLATION
  CHL_expand_mining_prospection_tt: "Přidá produkci §Y4£resources_strip|5 §Y$state_resource_steel$§!, £resources_strip|6 §Y$state_resource_chromium$§!, £resources_strip|4 §Y$state_resource_tungsten$§! nebo £resources_strip|2 §Y$state_resource_aluminium$§! §! v každém základním státě, který již poskytuje jeden z těchto nerostů. \nAktuální efekty:" # todo: NEW TRANSLATION
  CHL_skip_one_line_tt: " \n" # todo: NEW TRANSLATION
  chilean_trade_deals_opinion_modifier: "Příznivé obchodní dohody" # todo: NEW TRANSLATION
  CHL_high_quality_nitrate: "Vysokokvalitní dusičnan" # todo: NEW TRANSLATION
  CHL_high_quality_nitrate_desc: "I když náš průmysl nemusí být zatím nejsilnější, existuje něco, co nás odlišuje — naše hojná zásoba dusičnanů; velká část světové produkce leží v našich hranicích. Můžeme zajistit, že pouze my získáme přístup k nejkvalitnějšímu materiálu, zatímco méně rafinovaný dusičnan budeme prodávat." # todo: NEW TRANSLATION
  CHL_contract_efe: "Smlouva EFE" # todo: NEW TRANSLATION
  CHL_contract_efe_desc: "Empresa de los Ferrocarriles del Estado momentálně spravuje naše železniční systémy, a tím, že zajistíme větší přímou kontrolu nad nimi a jejich omezení, můžeme zajistit, že jejich zdroje a priority budou rozmístěny tam, kde je potřebujeme." # todo: NEW TRANSLATION
  CHL_public_works: "Veřejné stavební projekty" # todo: NEW TRANSLATION
  CHL_public_works_desc: "Od doby, kdy velká krize nastala kvůli uzavření hranic USA a ukončení jejich exportu, byla naše ekonomika zdevastována a lidé rozptýleni. Abychom se z této katastrofy zotavili co nejefektivněji, měli bychom podpořit rozsáhlé programy veřejných staveb, podobné americkému New Dealu, aby lidé opět našli práci a ekonomika se znovu rozběhla." # todo: NEW TRANSLATION
  CHL_dissolve_covensa: "Rozpustit COVENSA" # todo: NEW TRANSLATION
  CHL_dissolve_covensa_desc: "Vytvoření vnitrostátní společnosti pro distribuci zdrojů COVENSA byla chyba, a to všichni víme. Jediný skutečný způsob, jak vyřešit naše ekonomické problémy, je obnovit naše rozsáhlé exporty, a k tomu musíme organizaci zlikvidovat a reformovat ji tak, aby více připomínala jejího předchůdce COSACH." # todo: NEW TRANSLATION
  CHL_issue_bonds: "Podpořit nákup státních dluhopisů" # todo: NEW TRANSLATION
  CHL_issue_bonds_desc: "Vzpomínky na nedávný hospodářský kolaps nechaly naše obyvatele velmi zdrženlivé při investování svých peněz, což brzdí ekonomický růst. Podpoříme-li nákup státních dluhopisů s příslibem reinvestovat peníze zpět do země, můžeme rychleji vybudovat silnější [CHL.GetName]." # todo: NEW TRANSLATION
  CHL_expand_the_forestry: "Rozšířit lesnictví" # todo: NEW TRANSLATION
  CHL_expand_the_forestry_desc: "Centrální regiony naší země, zejména Araucanía, jsou bohaté na dřevo. I když existují tací, kteří jsou proti rozšíření průmyslu v těchto oblastech, je to nutné, pokud chceme, aby náš stát zažil ekonomickou jistotu; získávání dřeva a odlesňování jsou nejrychlejší cestou k tomu." # todo: NEW TRANSLATION
  CHL_expand_the_forestry_decision_tt: "Odemyká rozhodnutí §YRozšířit lesnictví§! v §Y[950.GetName]§! a §Y[279.GetName]§!. \n" # todo: NEW TRANSLATION
  CHL_government_mandated_contracts: "Vládou dotované kontrakty" # todo: NEW TRANSLATION
  CHL_government_mandated_contracts_desc: "Aby více lidí získalo práci a přispělo svým dílem, měli bychom zvážit dotování průmyslových zakázek a částečné hrazení mezd ze strany státu. Tímto způsobem si více společností troufne najímat více zaměstnanců a více lidí bude mít peníze na utrácení, které se vrátí do ekonomiky." # todo: NEW TRANSLATION
  CHL_we_must_dig_deeper: "Musíme kopat hlouběji" # todo: NEW TRANSLATION
  CHL_we_must_dig_deeper_desc: "Neexistuje hranice, jak hluboko kopat, i kdybychom tunelovali pod vlastním městy a trochu poškodil jejich základy. Pokud chceme obnovit ekonomiku prostřednictvím exportů, musíme riskovat a jednat rychle, abychom z našich dolů vytěžili co nejvíce." # todo: NEW TRANSLATION
  CHL_establish_trade_relationships: "Navázat výhodné obchodní vztahy" # todo: NEW TRANSLATION
  CHL_establish_trade_relationships_desc: "Pro úspěšný obchod je zapotřebí víc než jen mít žádané zdroje. Potřebujeme obchodní partnery, kterým můžeme důvěřovat, a smlouvy, které neprodávají naši práci a přírodní zdroje za příliš nízké ceny. Měli bychom se proto obrátit na naše bratry a sestry v Americe, abychom zajistili, že známe ty, s nimiž obchodujeme." # todo: NEW TRANSLATION
  CHL_international_loans: "Mezinárodní půjčky" # todo: NEW TRANSLATION
  CHL_international_loans_desc: "Náš bývalý prezident Carlos Ibáñez del Campo se pokusil vyřešit hospodářskou krizi pomocí půjček od cizích mocností a investováním peněz do státu v naději, že z toho později vytvoříme dostatečnou hodnotu na splacení. Tato strategie byla do jisté míry úspěšná. Měli bychom se pokusit jít v jeho stopách a učinit totéž znovu." # todo: NEW TRANSLATION
  CHL_CHL_international_loans_tt: "Odemyká rozhodnutí §YZískat půjčky§! od cizích mocností za účelem zlepšení ekonomiky" # todo: NEW TRANSLATION
  CHL_connect_the_northern_railways: "Propojit severní železnice" # todo: NEW TRANSLATION
  CHL_connect_the_northern_railways_desc: "Železnice a silnice na severu, zejména v Arice, jsou špatně propojeny se zbytkem naší infrastruktury, a proto je třeba vyvinout úsilí na zlepšení obecné infrastruktury nejsevernějších regionů." # todo: NEW TRANSLATION
  CHL_expand_southern_infrastructure: "Rozšířit jižní infrastrukturu" # todo: NEW TRANSLATION
  CHL_expand_southern_infrastructure_desc: "V dalekém jihu Chile prakticky neexistuje infrastruktura a nejsou tam žádné železniční tratě. Musíme proto vynaložit velké úsilí na propojení jižních přístavních měst Punta Arenas a Punta Delgada s našimi železničními tratěmi." # todo: NEW TRANSLATION
  CHL_devalue_the_peso: "[CHL_devalue_the_peso_key]" # todo: NEW TRANSLATION
  CHL_devalue_the_peso_desc: "[CHL_devalue_the_peso_key_desc_key]" # todo: NEW TRANSLATION
  CHL_devalue_the_peso_peso: "Devalvovat peso" # todo: NEW TRANSLATION
  CHL_devalue_the_peso_peso_desc: "Zatímco jiné země nechaly své měny ztratit hodnotu, aby pomohly svým ekonomikám, my to dosud neučinili. V důsledku toho zaostáváme. Pokud chceme dohnat ztrátu, nesmíme čekat s devalvací naší měny, i když by to bylo nepopulární opatření." # todo: NEW TRANSLATION
  CHL_devalue_the_peso_franc: "Devalvovat frank" # todo: NEW TRANSLATION
  CHL_devalue_the_peso_franc_desc: "Zatímco jiné země nechaly své měny ztratit hodnotu, aby pomohly svým ekonomikám, my to dosud neučinili. V důsledku toho zaostáváme. Pokud chceme dohnat ztrátu, nesmíme čekat s devalvací našeho franku, i když by to bylo nepopulární opatření." # todo: NEW TRANSLATION
  CHL_utlilize_famae: "Využít FAMAE" # todo: NEW TRANSLATION
  CHL_utlilize_famae_desc: "Náš zbrojní průmysl je v současnosti závislý na mezinárodních nákupech a občasné domácí výrobě pušek. Pokud chceme zvýšit vojenskou produkci, musíme zajistit, že máme státem ovládaného výrobce zbraní, jako jsou stoletími staré Fábricas y Maestranzas del Ejército, které je třeba rychle modernizovat." # todo: NEW TRANSLATION
  CHL_they_shall_not_pass: "Nepustíme je" # todo: NEW TRANSLATION
  CHL_they_shall_not_pass_desc: "Naše země je ohrožena nejen našimi starými nepřáteli z Války v Pacifiku, ale také naším velkým sousedem Argentinou, s níž sdílíme obrovskou hranici. Pokud chceme mít alespoň nepatrnou šanci v obraně proti nim, musíme je zadržet v horách. Nepustíme je a nikdy se nevzdáme!" # todo: NEW TRANSLATION
  CHL_domestic_production_of_the_willys_mb: "Domácí výroba Willys MB" # todo: NEW TRANSLATION
  CHL_domestic_production_of_the_willys_mb_desc: "Jsme schopni vyrábět množství malých zbraní a munice doma, ale postrádáme know-how pro výrobu motorových a obrněných vozidel. Abychom tento problém zmírnili, měli bychom nakupovat automobily od kohokoli, kdo je ochoten je prodat, a kopírovat jejich konstrukce." # todo: NEW TRANSLATION
  CHL_strengthen_the_central_bank: "Posílit centrální banku" # todo: NEW TRANSLATION
  CHL_strengthen_the_central_bank_desc: "Aby se naše ekonomika zlepšila víc než jen na papíře, měli bychom usilovat o posílení Banco Central de Chile, založené prezidentem Arturem Alessandrim. Dáme jim více pravomocí dělat, co uznají za vhodné, s cílem, aby nám v dlouhodobém horizontu pomohli." # todo: NEW TRANSLATION
  CHL_expand_the_naval_arsenal: "Rozšířit námořní arzenál" # todo: NEW TRANSLATION
  CHL_expand_the_naval_arsenal_desc: "Arsenales de Marina jsou naším důvěryhodným výrobcem lodí a také nám pomáhají udržet flotilu v takovém stavu, jakého jsme dosáhli v posledních letech, což mnohonásobně převyšuje úroveň údržby, které dosáhla kterákoliv jiná jihoamerická země. Nyní bychom měli zvýšit jejich financování, abychom je připravili na válku." # todo: NEW TRANSLATION
  CHL_fortify_the_coastlines: "Opevnit pobřeží" # todo: NEW TRANSLATION
  CHL_fortify_the_coastlines_desc: "Naše pobřeží jsou rozsáhlá, a v poměru k velikosti státu pravděpodobně nejdelší na světě. Kdybychom tedy nějak ztratili námořní válku, celá naše země by byla odkrytá a zranitelná vůči útokům z moře. Musíme proto vybudovat rozsáhlé komplexy schopné odrazit jakékoli námořní vylodění!" # todo: NEW TRANSLATION
  CHL_invest_in_shipping: "Investovat do námořní dopravy" # todo: NEW TRANSLATION
  CHL_invest_in_shipping_desc: "Moře nejsou užitečná jen pro armádu. Jako země do značné míry závislá na obchodu, a navíc s přeshraničními oblastmi jako Rapa Nui, bychom měli rozšířit obchodní loďstvo a investovat do rozvoje lodního průmyslu." # todo: NEW TRANSLATION
  CHL_advancements_in_telecommunications: "Pokroky v telekomunikacích" # todo: NEW TRANSLATION
  CHL_advancements_in_telecommunications_desc: "Naši vědci v oddělení výzkumu a vývoje začali vyvíjet lepší techniky pro využití nejen rozhlasů, ale také rozšíření možného použití televizí; díky tomu můžeme snáze dostat obecné informace k obyvatelstvu a lépe komunikovat zjištění mezi vzdálenými odděleními vědeckých laboratoří v zemi." # todo: NEW TRANSLATION
  CHL_protect_the_easter_island_tt: "Získáme §Yloutkové válečné oprávnění§! proti §Y[JAP.GetName]§!, §Y[NZL.GetName]§! nebo §Y[AST.GetName]§!, pokud jsou §YFascist§! nebo §YNon-Aligned§!" # todo: NEW TRANSLATION
  CHL_upgrade_central_bank_tt: "Aktualizuje §YBanco Central de Chile§! o: \n $MODIFIER_CONSUMER_GOODS_FACTOR$: §Y-10%§!" # todo: NEW TRANSLATION
  right_wing_tt: "Do moci nastupuje §Ypravicový§! prezident" # todo: NEW TRANSLATION
  left_wing_tt: "Do moci nastupuje §Ylevicový§! prezident" # todo: NEW TRANSLATION
  propping_up_gustavo_ross_tt: "Když se §YGustavo Ross§! stane prezidentem Chile, získejte §G+75§! politické moci, §G+5%§! stability a dejte mu rys §YOblíbený mezi lidmi§!, který poskytuje: §G+2%§! faktor rychlosti růstu souhlasu, §G+25%§! obranu proti posunu ideologie a §G+10%§! stability." # todo: NEW TRANSLATION
  CHL_has_idea_near_anarchy: "Dosud zcela neodstraněn národní duch §Y$idea_CHL_near_anarchic_society$§!" # todo: NEW TRANSLATION
  CHL_not_has_idea_near_anarchy: "Národní duch §Y$idea_CHL_near_anarchic_society$§! byl zcela odstraněn." # todo: NEW TRANSLATION
  CHL_found_national_steelworks_tt: "Odemyká rozhodnutí §Y$CHL_expand_araucanian_steelworks_decision$§! získat více §Yoceli§! v §Y[950.GetName]§!" # todo: NEW TRANSLATION
  denounced_catholicism: "Odsouzení katolicismu" # todo: NEW TRANSLATION
  embraced_catholicism: "Přijatý katolicismus" # todo: NEW TRANSLATION
  CHL_dispute_over_tierra_del_fuego_tt: "Toto může vést k §Rválce§! s vlastníkem Tierra del Fuego" # todo: NEW TRANSLATION
  CHL_reapproach_america_tt: "Odemyká rozhodnutí §YKoupit zbraně§! od §YSpojené státy americké§!" # todo: NEW TRANSLATION
  CHL_mapuche_reconcilliation_campaigns_tt: "Odemyká rozhodnutí §GZmírnit§! a §GVyřešit§! konflikt §YMapuche§!" # todo: NEW TRANSLATION
  CHL_use_the_fascist_movement_tt: "Nacistické povstání povede k malé §RCivilní válce§!" # todo: NEW TRANSLATION
  CHL_suppress_the_nacistas_tt: "Povstání Nacista bude §Goslabené§!" # todo: NEW TRANSLATION
  CHL_endorse_the_constitution: "Podpořit ústavu z roku 1925" # todo: NEW TRANSLATION
  CHL_endorse_the_constitution_desc: "Ve 20. letech jsme měli vážnou sociální a ekonomickou krizi, která vedla ke ztrátě prestiže staré vládnoucí třídy a k nástupu vlády vedené Arturo Alessandrim. V roce 1924 byl svržen v puči, ale v roce 1925 byl znovu povolán a během svého prezidentství sepsal novou ústavu, která nahrazovala Ústavu z roku 1833. Měli bychom se snažit řídit jeho slovy jako zakladatele nového Chile." # todo: NEW TRANSLATION
  CHL_cooperation_with_the_falange: "Spolupráce s Národní Falangou" # todo: NEW TRANSLATION
  CHL_cooperation_with_the_falange_desc: "Národní Falanga je křesťansko-demokratická strana založená v roce 1935, která se skládá převážně z progresivních a reformních katolíků. Vzhledem k tomu, že mnoho jejich politik je velmi podobných těm našim, nemělo by být těžké je pozvat do naší vlády." # todo: NEW TRANSLATION
  CHL_denounce_the_anarchy: "Odsoudit stav blízký anarchii" # todo: NEW TRANSLATION
  CHL_denounce_the_anarchy_desc: "To, že anarchie, která začala po krachu na Wall Street, dosud nebyla vyřešena, je jasným ukazatelem velké slabosti současné vlády a její pasivní liberální ideologie. Musíme se proti tomu veřejně postavit a ujistit lid, že budoucnost je jejich, pokud se k nám přidají." # todo: NEW TRANSLATION
  CHL_look_to_tradition: "Obraťme se k tradici" # todo: NEW TRANSLATION
  CHL_look_to_tradition_desc: "Arturo Alessandri měl svůj čas ve světlech reflektorů, ale dosud nevyřešil žádné z palčivých problémů, které nad národem visí. Musíme se proto odklonit od liberalismu a vrátit se k těm starým dobrým hodnotám, na které jsme se dříve spolehli." # todo: NEW TRANSLATION
  CHL_impose_new_taxes: "Uvalit nové daně" # todo: NEW TRANSLATION
  CHL_impose_new_taxes_desc: "Naše pokladny se vyprázdnily po mnoha snahách obnovit zemi do jejího bývalého stavu, a aby se to zmírnilo, bylo by dobré uvalit nové daně z příjmu na naše obyvatele. Nejspíš je zpočátku nebudou mít rádi, ale dejte tomu čas a zklidní se, zatímco my budeme mít mnohem více peněz na utracení." # todo: NEW TRANSLATION
  CHL_1938_chilean_presidential_election: "Elección Presidencial de Chile de 1938" # todo: NEW TRANSLATION
  CHL_1938_chilean_presidential_election_desc: "Prezidentské volby v roce 1938 jsou před námi a země musí vybrat svého vůdce z čtyř hlavních kandidátů. Na levici máme Pedra Aguirre Cerdu a lidový front, na pravici Carlosa Ibáñeze del Campo a Alianci lidové svobody, uprostřed Gustava Rosse a liberály a ještě dál vlevo Eliáse Lafertte Gaviña a komunisty. Kdo zvítězí?" # todo: NEW TRANSLATION
  CHL_1938_chilean_presidential_election_tt: "Když §Yprezidentské volby§! proběhnou koncem §Yříjna 1938§!, tento cíl bude automaticky dokončen" # todo: NEW TRANSLATION
  CHL_construct_new_hydroelectric_stations: "Postavit nové vodní elektrárny" # todo: NEW TRANSLATION
  CHL_construct_new_hydroelectric_stations_desc: "Ačkoliv to může být nepopulární krok u domorodých Mapuche, region Araucanía je bohatý na různé přírodní zdroje, mezi nimiž jsou i jezera a vodopády. Mohli bychom toho využít k výstavbě vodních elektráren, i když to může rozrušit místní obyvatele." # todo: NEW TRANSLATION
  CHL_policies_of_arturo_alessandri: "Politiky Artura Alessandriho" # todo: NEW TRANSLATION
  CHL_policies_of_arturo_alessandri_desc: "The policies of Alessandri are many, and his final term is not even over yet. He has helped the nation immensely, and still has the power to help it more. He truly is the father of the latest incarnation of Chile." # todo: NEW TRANSLATION
  CHL_suppress_the_nacistas: "Suppress the Nacistas" # todo: NEW TRANSLATION
  CHL_suppress_the_nacistas_desc: "The Movimiento Nacional-Socialista has been on a move as of late, and it is quite clear that they will try something in the near future. We must remain vigilant, and crack down on any dissidence wherever it may appear." # todo: NEW TRANSLATION
  CHL_use_the_fascist_movement: "Use the Fascist Movement" # todo: NEW TRANSLATION
  CHL_use_the_fascist_movement_desc: "Though it is quite clear that the fascists are scheming something, it should be considered that they have many high profile members who may be of use to our government. We should thus approach some of them in secrecy, and hope to utilize their strengths, at least until they decide to try something." # todo: NEW TRANSLATION
  CHL_reestablish_the_republican_guard: "Reestablish the Republican Guard" # todo: NEW TRANSLATION
  CHL_reestablish_the_republican_guard_desc: "Now that we are once again under attack, the Republican Guard must be reassembled in order to fight of the high-level threat that has decided to hunt after us. To arms men, fight for your republic!" # todo: NEW TRANSLATION
  CHL_volunteers_to_the_republicans: "Volunteers to the Republicans" # todo: NEW TRANSLATION
  CHL_volunteers_to_the_republicans_desc: "Our brothers in Spain are currently engaged in a struggle against the military who wishes to overthrow their democratic regime. Though it is maybe not necessarily that popular of a thought in Chile to intervene, it could showcase our strength and readiness to defend democracy." # todo: NEW TRANSLATION
  CHL_volunteers_to_the_republicans_tt: "@SPR Republican Spain Exist" # todo: NEW TRANSLATION
  CHL_volunteers_to_the_republicans_tt_2: "@SPR Republican Spain has not completed §Y$SPR_regional_defense_council_of_aragon$§!" # todo: NEW TRANSLATION
  CHL_prop_up_gustavo_ross: "Prop Up Gustavo Ross" # todo: NEW TRANSLATION
  CHL_prop_up_gustavo_ross_desc: "Gustavo Ross is Arturo Alessandri's foremost disciple, and his favorite to win the coming presidential election. Alessandri should therefore make sure to make this known to the public, and attempt to build Ross up as his spiritual successor using vast quantities of propaganda." # todo: NEW TRANSLATION
  CHL_inflation_control_by_the_central_bank: "Inflation Control by the Banco Central de Chile" # todo: NEW TRANSLATION
  CHL_inflation_control_by_the_central_bank_desc: "The Banco Central de Chile was founded by president Arturo Alessandri in 1925. We should task them with controlling inflation to support Chile's long-term economic development and prevent spiraling prices causing economic and political damage." # todo: NEW TRANSLATION
  CHL_construct_the_estadio_nacional: "Construct the Estadio Nacional" # todo: NEW TRANSLATION
  CHL_construct_the_estadio_nacional_desc: "Alessandri's biggest effort to restore the economy and trust of the people has been through public works, and his magnum opus is the Estadio Nacional, a grandiose national stadium for sports games, which is a great showcase of his ability to lead the nation." # todo: NEW TRANSLATION
  CHL_establish_corfo: "Establish CORFO" # todo: NEW TRANSLATION
  CHL_establish_corfo_desc: "We should attempt to establish an organization that can be responsible for industrial development, resource distribution, and reconstruction efforts. It can be called Corporación de Fomento de la Producción de Chile." # todo: NEW TRANSLATION
  CHL_work_towards_laissex_faire: "Work Towards Laissez-Faire" # todo: NEW TRANSLATION
  CHL_work_towards_laissex_faire_desc: "The ultimate goal of the liberal government is to achieve Laissez-Faire economics, and as such everything in our power must be done to achieve this." # todo: NEW TRANSLATION
  CHL_align_the_marxists: "Align the Marxists" # todo: NEW TRANSLATION
  CHL_align_the_marxists_desc: "There are many in our nation who see the current government structure as weak, but many of them can quite easily be convinced to support the government should a left-leaning president reach out to them." # todo: NEW TRANSLATION
  CHL_low_cost_housing: "Low-Cost Housing" # todo: NEW TRANSLATION
  CHL_low_cost_housing_desc: "There are many in our country who are either displaced or poor, and we should do our utmost to support these unfortunate souls, who are still people of our nation. Therefore, we should establish national housing organizations, as well as make it government policy to construct social nets that can catch any unfortunate enough to fall." # todo: NEW TRANSLATION
  CHL_align_the_police: "Align the Investigations Police" # todo: NEW TRANSLATION
  CHL_align_the_police_desc: "$CHL_expand_the_investigations_police_desc$" # todo: NEW TRANSLATION
  CHL_privatize_national_industries: "Privatize National Industries" # todo: NEW TRANSLATION
  CHL_privatize_national_industries_desc: "The national industries are currently weak and ineffective, and we should strive to get them in the hands of private groups who can better manage each and every local industrial complex." # todo: NEW TRANSLATION
  CHL_strengthen_instituto_nacional: "Strengthen the Instituto Nacional" # todo: NEW TRANSLATION
  CHL_strengthen_instituto_nacional_desc: "Though founded as early on as during the Patria Vieja, the Instituto Nacional should be expanded and strengthened to ensure that the people of our nation can read that which they need, and that we can progress at a rate which is beneficial to us." # todo: NEW TRANSLATION
  CHL_enact_universal_suffrage: "Enact Universal Suffrage" # todo: NEW TRANSLATION
  CHL_enact_universal_suffrage_desc: "The right to vote is the basis of any democratic society, and it is a great shame that not all in our country can vote with the same rights as another. We should strive for equality, and grant the women of Chile the opportunity to vote as soon as possible." # todo: NEW TRANSLATION
  CHL_host_spanish_refugees: "Host Spanish Refugees" # todo: NEW TRANSLATION
  CHL_host_spanish_refugees_desc: "Our brothers in Spain have fought their friends and families and are shattered spiritually. Now with their civil war being over, many seek to flee their current regime, and as a Spanish brother, we are a prime candidate to take in refugees." # todo: NEW TRANSLATION
  CHL_expand_the_investigations_police: "The Investigations Police of Chile" # todo: NEW TRANSLATION
  CHL_expand_the_investigations_police_desc: "The Investigations Police of Chile were founded in 1933, and it is one of two Chilean police bodies, along with the law enforcement police: the Carabineros de Chile. The Investigative Police divides its investigation areas according to the crime investigated, counting with it several specialized units of police investigation, which have Detectives specialists." # todo: NEW TRANSLATION
  CHL_increase_presidential_powers: "Increase Presidential Powers" # todo: NEW TRANSLATION
  CHL_increase_presidential_powers_desc: "The president is the only one needed to lead the country, as a strongman is better than a fractured and weak parliament. The president is the parliament, and there is no need for their political participation." # todo: NEW TRANSLATION
  CHL_reapproach_america: "Reapproach America" # todo: NEW TRANSLATION
  CHL_reapproach_america_desc: "The USA cut off many of it's relations with us when the Great Depression started, and our relations are not as of yet completely solved. The President and Congress should therefore make a joint effort to restore relations with them promptly." # todo: NEW TRANSLATION
  CHL_return_to_the_parliamentary_era: "Return to the Parliamentary Era" # todo: NEW TRANSLATION
  CHL_return_to_the_parliamentary_era_desc: "There is only one universal truth, and it is that power corrupts, and absolute power corrupts absolutely. We must therefore make sure that the parliament has as big a say as possible so that an insane president cannot direct the entire future of out nation." # todo: NEW TRANSLATION
  CHL_development_inwards: "Development Inwards" # todo: NEW TRANSLATION
  CHL_development_inwards_desc: "It should be our policy to keep out of world affairs and develop the country internally, without yet again relying too heavily on exports." # todo: NEW TRANSLATION
  CHL_kickstart_the_arsenal_of_democracy: "Kickstart the Arsenal of Democracy" # todo: NEW TRANSLATION
  CHL_kickstart_the_arsenal_of_democracy_desc: "It seems likely that we may be drawn into a great conflict in the near future, and to make sure that we do not get obliterated in such a situation, we should rapidly expand our military industrial organizations." # todo: NEW TRANSLATION
  CHL_chilean_anti_communist_action: "Acción Chilena Anticomunista" # todo: NEW TRANSLATION
  CHL_chilean_anti_communist_action_desc: "The communists are as great a threat to our nation as any other, and we must do all in our power to make sure that they do not ever get the chance to bring the revolution that they so desire." # todo: NEW TRANSLATION
  CHL_chilean_anti_communist_action_dem_version: "Chilean Anti-Communist Action" # todo: NEW TRANSLATION
  CHL_chilean_anti_communist_action_dem_version_desc: "$CHL_chilean_anti_communist_action_desc$" # todo: NEW TRANSLATION
  CHL_organize_patriotic_leagues: "Organize Patriotic Leagues" # todo: NEW TRANSLATION
  CHL_organize_patriotic_leagues_desc: "The patriotic leagues were fascist mafia syndicates that once roamed the streets of Santiago and Buenos Aires, and we should make an effort to reestablish them, whilst also making sure that they stay loyal to our government, instead of working independently as they once did." # todo: NEW TRANSLATION
  CHL_preemtively_strike_foreign_revolutionaries: "Preemptively Strike Foreign Revolutionaries" # todo: NEW TRANSLATION
  CHL_preemtively_strike_foreign_revolutionaries_desc: "We may have secured our nation against internal communist threats, but there are still external ones present. We must preemptively strike them down before they can bring their revolution to us." # todo: NEW TRANSLATION
  CHL_preemtively_strike_foreign_revolutionaries_tt: "Gain puppet §Ywargoal§! against all §Ycommunist§! nations in South America" # todo: NEW TRANSLATION
  CHL_law_of_permanent_defense_of_democracy: "The Law of Permanent Defense of Democracy" # todo: NEW TRANSLATION
  CHL_law_of_permanent_defense_of_democracy_desc: "The communist threat looms over not only us, but over all of the world. If we are to survive during the cold war that will surely ensue, we must make sure that there is no way that the communists can overthrow our regime and threaten our people." # todo: NEW TRANSLATION
  CHL_law_of_permanent_defense: "Permanent Defense" # todo: NEW TRANSLATION
  CHL_law_of_permanent_defense_desc: "$CHL_law_of_permanent_defense_of_democracy_desc$" # todo: NEW TRANSLATION
  CHL_promote_immigration_to_chile: "$BRA_promote_immigration_to_brazil$" # todo: NEW TRANSLATION
  CHL_promote_immigration_to_chile_desc: "[CHL.GetName] is a diverse nation with people whose ancestry stretches across the globe. With our economy growing once more and an abundance of resources waiting to be tapped, it's time we encourage more people to move here and call themselves [CHL.GetAdjective] too." # todo: NEW TRANSLATION
  CHL_socialist_youth: "A Socialist Youth Organization" # todo: NEW TRANSLATION
  CHL_socialist_youth_desc: "There are many in the youth who have been radicalized towards the left and right. The socialists in particular are quite vocal and passionate about protecting their values, and are thus willing to fight against any who threaten our great state." # todo: NEW TRANSLATION
  CHL_counter_operation_bolivar: "Work to Counter Operation Bolivar" # todo: NEW TRANSLATION
  CHL_counter_operation_bolivar_desc: "Germany is attempting to influence the South American nations using espionage and sabotage in their vile Operation Bolivar. We should do all in our power to counteract their efforts." # todo: NEW TRANSLATION
  CHL_strike_down_south_american_fascism: "Strike Down South American Fascism" # todo: NEW TRANSLATION
  CHL_strike_down_south_american_fascism_desc: "There are many in South America who are attracted to fascism, and we need to make sure that there are none in our region who threaten our security, which makes it difficult to coexist with them. We must thus strike them down before they can ever even think of doing us any harm." # todo: NEW TRANSLATION
  CHL_land_reforms: "Land Reforms" # todo: NEW TRANSLATION
  CHL_land_reforms_desc: "The Hacienda - Inquilinaje System is heavily outdated, and is causing great division between the social classes in our society. We must strive to redistribute the Hacendados' land, and end this brutish system of serfdom once and for all!" # todo: NEW TRANSLATION
  CHL_support_the_democracies: "Support the Democracies" # todo: NEW TRANSLATION
  CHL_support_the_democracies_desc: "The democracies in Europe and America are in trouble, and it is our duty as a fellow democratic nation to help them in their situation, by any means possible. We must therefore send Chileans to secure the interests of our fellow democracies." # todo: NEW TRANSLATION
  CHL_mapuche_reconcilliation_campaigns: "Mapuche Reconciliation Campaigns" # todo: NEW TRANSLATION
  CHL_mapuche_reconcilliation_campaigns_desc: "The Mapuche have been heavily mistreated by our governments ever since the conquest of Araucanía in the 19th century. We must make great strides towards improving their situation, and making sure that they can live in peace alongside their fellow Chilean citizens." # todo: NEW TRANSLATION
  CHL_an_attempt_to_maintain_our_neutrality: "An Attempt to Maintain Our Neutrality" # todo: NEW TRANSLATION
  CHL_an_attempt_to_maintain_our_neutrality_desc: "The many different nations engaged in world conflict wish to pull us into a war made from their meaningless squabbles. We must do everything in our power to keep out of their conflict and not stick our noses around in a conflict that we shouldn't be a part of." # todo: NEW TRANSLATION
  CHL_embargo_strategies: "Embargo Strategies" # todo: NEW TRANSLATION
  CHL_embargo_strategies_desc: "There are more ways to supporting our fellow democracies than just sending soldiers to fight, and time has proven that economic measures can be just as powerful. That is why we should embargo the enemies of our friends, so that we can starve them of the copper and nitrate they need to wage their wars." # todo: NEW TRANSLATION
  CHL_embargo_strategies_tt: "We will §YEmbargo§! all nations at war with with the major §YDemocratic§! nations of the world." # todo: NEW TRANSLATION
  CHL_enact_stricter_labor_laws: "Enact Stricter Labor Laws" # todo: NEW TRANSLATION
  CHL_enact_stricter_labor_laws_desc: "The labor laws are currently far too lax for a proper democratic society, and we should make sure that the corporations and capitalists cannot take advantage of the poor working class of Chile. For a more equal future!" # todo: NEW TRANSLATION
  CHL_found_national_steelworks: "Found National Steelworks" # todo: NEW TRANSLATION
  CHL_found_national_steelworks_desc: "The country is in dire need of steel, and our surveyors have found that the lush region of Araucanía has just that. We should therefore endeavor to found new steelworks so that we can make use of the national resources available to us." # todo: NEW TRANSLATION
  CHL_found_the_contraloria_general_de_la_republica: "Found the Contraloría General de la República" # todo: NEW TRANSLATION
  CHL_found_the_contraloria_general_de_la_republica_desc: "The Comptroller General of Chile will be a constitutionally autonomous body of the Government of Chile. It will be in charge of the control of the legal aspects, management, preaudit and postaudit functions of all the activities of the centralized and decentralized civil service, whatever its forms of organization may be, as well as of other powers granted by law." # todo: NEW TRANSLATION
  CHL_establish_the_ministry_of_mining: "Establish the Ministry of Mining" # todo: NEW TRANSLATION
  CHL_establish_the_ministry_of_mining_desc: "We should also found a national ministry that is responsible for the mining operations of our country, so that we can centrally control where mines are created, and how they are run." # todo: NEW TRANSLATION
  CHL_the_nationalization_of_copper: "The Nationalization of Copper" # todo: NEW TRANSLATION
  CHL_the_nationalization_of_copper_desc: "The vast swathes of copper in our nation are currently in control of private mining corporations, and we should make sure that the deposits fall into the more sensible hands of our government and the ministry of mining." # todo: NEW TRANSLATION
  CHL_enforce_stricter_secularism: "Enforce Stricter Secularism" # todo: NEW TRANSLATION
  CHL_enforce_stricter_secularism_desc: "We have already established secularism in the liberal constitution, but the church still holds a lot of power over both the people, as well as select politicians. We should therefore demand taking distance from religion when in politics, from any who wish to participate in it." # todo: NEW TRANSLATION
  CHL_repeal_the_separation_of_church_an_state: "Repeal the Separation of Church and State" # todo: NEW TRANSLATION
  CHL_repeal_the_separation_of_church_an_state_desc: "The split between the church and the state was a grave mistake, and must be undone as soon as possible. The church is our ally, as we all know very well." # todo: NEW TRANSLATION
  CHL_a_joint_application_to_the_allies: "A Joint Application to the Allies" # todo: NEW TRANSLATION
  CHL_a_joint_application_to_the_allies_desc: "Us and Argentina have always had good enough relations with the Allies of old, and it is finally time to join up with them and work together for a brighter future." # todo: NEW TRANSLATION
  CHL_dispute_over_tierra_del_fuego: "Dispute Over Tierra del Fuego" # todo: NEW TRANSLATION
  CHL_dispute_over_tierra_del_fuego_desc: "The Argentine government still claims the eastern half of Tierra del Fuego as their own, despite having no land connection to it, and us clearly having the older and more legitimate claim to the territory. We must move to secure it immediately." # todo: NEW TRANSLATION
  CHL_protect_the_easter_island: "Protect Easter Island" # todo: NEW TRANSLATION
  CHL_protect_the_easter_island_desc: "The Easter Island, also known as Rapa Nui to the locals, is constantly threatened by the fascists to the west. We must move to not only fortify the island and build up it's harbors, but also preemptively strike any who would lay claim to the Pacific Ocean." # todo: NEW TRANSLATION
  form_country_south_america_required_states_tt: "§Y[ROOT.GetName]§! Controls all §YMainland States§! in §YSouth America§!" # todo: NEW TRANSLATION
  CHL_joint_research_initiatives_tt: "§YChile§!, and every country in a faction with us, will join a §YTech Sharing Group§!" # todo: NEW TRANSLATION
  CHL_the_future_of_Chile: "The Future of [CHL.GetName]" # todo: NEW TRANSLATION
  CHL_the_future_of_Chile_desc: "The Communist party must convene with the purpose of deciding the path to take in the coming years, seeing as the current big tent coalition is not able to entirely agree on all points. It currently stands between the Marxist Elias Lafertte Gavino, the Socialist Marmaduke Grove Vallejo, the Stalinist Carlos Contreras Labarca and the Trotskyist Manuel Hidalgo Plaza." # todo: NEW TRANSLATION
  CHL_support_for_the_international_revolution: "Support for the International Revolution" # todo: NEW TRANSLATION
  CHL_support_for_the_international_revolution_desc: "There are many out there who have to fight against not only foreign nations invading their homes, but also corrupt governments and industries taking their livelihoods. We must do all we can to make sure that the people of the world can feel safe and protected from evil." # todo: NEW TRANSLATION
  CHL_sponsor_american_revolutions: "Sponsor American Revolutionaries" # todo: NEW TRANSLATION
  CHL_sponsor_american_revolutions_desc: "There are many people who have the potential to succeed with revolution if they tried, but who don't have the funds or the weapons to make the means meet the end. Therefore we should make sure to sponsor such revolutionaries, and kick capitalism out of South America." # todo: NEW TRANSLATION
  CHL_sponsor_american_revolutions_tt: "Unlocks decisions to §YSponsor Ideology Rallies§! in other §YSouth and North American§! Countries" # todo: NEW TRANSLATION
  CHL_union_of_hispanic_republics: "The Union of Hispanic Republics" # todo: NEW TRANSLATION
  CHL_union_of_hispanic_republics_desc: "Now that all Hispanic people are united under one banner, it is high time that we show the world what we are capable of, and that we intend to liberate any of our people left under foreign imperialist rule." # todo: NEW TRANSLATION
  CHL_propose_closer_cooperation: "Navrhnout bližší spolupráci" # todo: NEW TRANSLATION
  CHL_propose_closer_cooperation_desc: "Komunistické státy v našem okolí mohou sdílet naši ideologii, ale jsou strategicky rozptýlené a bez koordinace. Měli bychom je přivést pod naše křídla a pomoci jim lépe se řídit." # todo: NEW TRANSLATION
  CHL_nationalize_foreign_industries: "Znacionalizovat zahraniční průmysl" # todo: NEW TRANSLATION
  CHL_nationalize_foreign_industries_desc: "Kapitalisté, kteří v naší zemi zůstali, musí být v šoku, protože tuší, co bude náš další krok. Musíme jim zabavit veškerý majetek a přerozdělit jej lidem." # todo: NEW TRANSLATION
  CHL_align_with_the_russian_soviet: "Sblížit se s [SOU.GetNameDef]" # todo: NEW TRANSLATION
  CHL_align_with_the_russian_soviet_desc: "[SOU.GetNameDefCap] jsou blízcí ideologičtí soudruzi. Měli bychom je oslovit s nabídkou vzájemné pomoci výměnou za vstup do [SOU.GetFactionName]." # todo: NEW TRANSLATION
  CHL_hub_of_the_world_revolution: "Centrum světové revoluce" # todo: NEW TRANSLATION
  CHL_hub_of_the_world_revolution_desc: "Existuje mnoho revolucionářů nespokojených se stavem světa, a co je důležitější, kteří mohou být zklamáni stavem Sovětského svazu. Měli bychom usilovat o větší svět společně!" # todo: NEW TRANSLATION
  CHL_hub_of_the_world_revolution_tt: "Komunističtí poradci z jiných zemí se přemístí do [CHL.GetName] v závislosti na politické situaci jejich domovské země. V současnosti se tito poradci přemístí do [CHL.GetName]:" # todo: NEW TRANSLATION
  CHL_joint_development_programs: "Společné programy rozvoje" # todo: NEW TRANSLATION
  CHL_joint_development_programs_desc: "Nyní, když jsme spojenci, bychom se měli snažit vzájemně budovat nové továrny, abychom lépe rozvinuli každou z našich zemí." # todo: NEW TRANSLATION
  CHL_joint_research_initiatives: "Společné výzkumné iniciativy" # todo: NEW TRANSLATION
  CHL_joint_research_initiatives_desc: "Nyní, když jsme spojenci, bychom měli vzájemně zakládat laboratoře a programy výzkumné spolupráce, abychom posunuli vývoj zbraní za hranice toho, co kapitalisté a imperialisté světa dokážou." # todo: NEW TRANSLATION
  CHL_one_more_fascist_focus_done_tt: "§Zmenšuje§! negativní efekty převratu:\nPodpora ve válce: §Z+5%§!\nStabilita: §Z+5%§!" # todo: NEW TRANSLATION
  CHL_commence_the_counter_revolution_negative_tt: "Ztráta podpory ve válce a stability podle počtu dříve přijatých §YPřípravních fokusů§!" # todo: NEW TRANSLATION
  CHL_propose_closer_cooperation_tt: "Odesílá událost všem §Ykomunistickým státům§! v §YJižní a Střední Americe§!, požadujíc, aby se jim podrobily" # todo: NEW TRANSLATION
  CHL_sway_ariosto_hererra_tt: "§YAriosto Hererra§! a jeho muži se k nám přidají při našem státním převratu" # todo: NEW TRANSLATION
  CHL_proliferate_national_populism_tt: "Po dokončení fokusu §YCommence the Counter-Revolution§!:\nPolitický vliv §Z+75§!." # todo: NEW TRANSLATION
  CHL_more_funds_or_the_propaganda_department_tt: "Po dokončení fokusu §YCommence the Counter-Revolution§!:\nManpower §Z+5000§!." # todo: NEW TRANSLATION
  CHL_recruit_young_officers_tt: "Někteří mladí důstojníci budou povýšeni na §Ygenerály§!" # todo: NEW TRANSLATION
  CHL_enforce_the_chilean_identity_tt: "Když se národní duch §Y$CHL_ancestral_mapuche_resistance$§! odstraní, znovuzískat jádro na [950.GetName]." # todo: NEW TRANSLATION
  CHL_expand_the_department_of_provinces_change_tt: "Mění dříve získaný §YNárodní duch§! s mírně odlišnými efekty v závislosti na tom, který §YDepartament§! byl dříve posílen." # todo: NEW TRANSLATION
  CHL_expand_the_department_of_provinces_coring_tt: "Odemkne rozhodnutí §YIntegrovat státy§! vyhlášené chilskými irredentisty" # todo: NEW TRANSLATION
  CHL_abide_by_the_francoist_model_tt: "Už §Rnebude možné vstoupit do frakcí§!" # todo: NEW TRANSLATION
  CHL_hipanic_alliance_faction: "Hispánské spojenectví" # todo: NEW TRANSLATION
  CHL_undo_colonialist_occupations_tt: "Odemkne rozhodnutí k §YObsazení Belize a Panamského průplavu§!" # todo: NEW TRANSLATION
  CHL_press_our_demands_tt: "Odesílá požadavky na nelegální okupanty Guian §YProsazujeme naše vlastnictví§! států" # todo: NEW TRANSLATION
  CHL_the_latin_american_alliance_tt: "Zveme §Yne-hispánské latinskoamerické§! státy do naší frakce" # todo: NEW TRANSLATION
  CHL_sponsor_anti_colonialist_rebellions_tt: "Odemkne rozhodnutí pro zvýšení odporu v koloniálních státech v §YJižní a Střední Americe§!" # todo: NEW TRANSLATION
  CHL_empower_the_preparation_department: "Zmocnit Přípravné oddělení" # todo: NEW TRANSLATION
  CHL_empower_the_preparation_department_desc: "Aby náš převrat proběhl co nejplynuleji, musíme zajistit nejen podporu veřejnosti, ale také mít lidi, plány a logistiku připravené pro den, který nakonec přijde." # todo: NEW TRANSLATION
  CHL_sway_ariosto_hererra: "Oslovit Ariosta Herreru" # todo: NEW TRANSLATION
  CHL_sway_ariosto_hererra_desc: "Generál Ariosto Herrera projevil silné antisocialistické sympatie, ale není nám nutně loajální. Bylo by moudré si zajistit jeho podporu a podporu jeho nejvěrnějších mužů, protože podobní lidé se nám budou hodit." # todo: NEW TRANSLATION
  CHL_inflitrate_the_carabinieros: "Infiltrovat Carabineros" # todo: NEW TRANSLATION
  CHL_inflitrate_the_carabinieros_desc: "Carabineros de Chile jsou odpovědni za ochranu země proti povstalcům, mezi něž patříme i my. Pokud se s nimi střetneme, byla by to masakr, ale pokud získáme jejich loajalitu, stanou se velmi užitečnou figurkou." # todo: NEW TRANSLATION
  CHL_unify_the_fascist_movements: "Sjednotit fašistická hnutí" # todo: NEW TRANSLATION
  CHL_unify_the_fascist_movements_desc: "Ačkoliv Jorge González von Marées pevně kontroluje Movimiento Nacional-Socialista de Chile, existují další skupiny se podobnými myšlenkami, které ho nenásledují. Měl by vést vanguardní deštníkové hnutí chilských fašistů, aby převrat mohl uspět." # todo: NEW TRANSLATION
  CHL_proliferate_national_populism: "Šířit národní populismus" # todo: NEW TRANSLATION
  CHL_proliferate_national_populism_desc: "Civilní populace je stejně důležitá jako cokoliv jiného, zvláště pokud chceme stabilizovat stát po převratu. Musíme získat jejich podporu, i podlými prostředky, pokud bude třeba!" # todo: NEW TRANSLATION
  CHL_more_funds_or_the_propaganda_department: "Více prostředků pro propagandní oddělení" # todo: NEW TRANSLATION
  CHL_more_funds_or_the_propaganda_department_desc: "Naše propagandistické oddělení přetěžuje, aby přesvědčilo lidi, že jsme jejich spasitelé, ale bez financí nemůže udržet efektivitu. Musíme prát peníze přes zkorumpované politiky, abychom se připravili na převrat." # todo: NEW TRANSLATION
  CHL_request_foreign_support: "Požádat o zahraniční podporu" # todo: NEW TRANSLATION
  CHL_request_foreign_support_desc: "Existuje mnoho zemí již řízených lidmi s podobnými ideologickými sklony a může být rozumné být na jejich přízni. Můžeme je požádat o zbraně a vojáky, aby nám pomohli provést státní převrat." # todo: NEW TRANSLATION
  CHL_the_popular_freedom_alliance: "Aliance lidové svobody" # todo: NEW TRANSLATION
  CHL_the_popular_freedom_alliance_desc: "Někteří v zemi sdílejí naše ideály, ale neodváží se je veřejně prohlásit. Měli bychom přesvědčit generála Carlose Ibáñeze del Campo, aby vedl novou koalici Alianza Popular Libertadora, která osloví konzervativní hodnoty, ale tajně nás posílí." # todo: NEW TRANSLATION
  CHL_rally_the_people: "Povzbudit lidi" # todo: NEW TRANSLATION
  CHL_rally_the_people_desc: "Převrat je připraven. Stačí pobouřit lidi a dát najevo liberální vládě, že jejich čas se chýlí ke konci. Je čas ukončit tento bídný stav!" # todo: NEW TRANSLATION
  CHL_commence_the_counter_revolution: "Zahájit kontrarevoluci" # todo: NEW TRANSLATION
  CHL_commence_the_counter_revolution_desc: "Naše jednotky jsou připraveny a dychtivě čekají na rozkazy, připraveny obsadit každou hlavní pozici v Santiagu i radnice v jiných městech. Stačí provést plán a uvidíme, kolik podpory veřejnost skutečně poskytne." # todo: NEW TRANSLATION
  CHL_promote_broad_anti_americansim: "Prosazovat široký antiamerikanismus" # todo: NEW TRANSLATION
  CHL_promote_broad_anti_americansim_desc: "Američané jsou samí hajzlové, vyždímali nás do běla, vzali nám vše, jako by jim to právem patřilo, a my nic nedostali na oplátku - co nám Američané kdy dali? Opakuji, co nám Američané kdy dali!?" # todo: NEW TRANSLATION
  CHL_ban_liberalism: "Zakázat liberalismus" # todo: NEW TRANSLATION
  CHL_ban_liberalism_desc: "I když jsme sundali liberály z vlády, přetrvávají, jako nekonečné zrníčka písku. Musíme jejich skupiny potlačit a zajistit, že nikdy nezískají sílu ohrozit naši vládu." # todo: NEW TRANSLATION
  CHL_recruit_young_officers: "Náběr mladých důstojníků" # todo: NEW TRANSLATION
  CHL_recruit_young_officers_desc: "Mnoho generálů na vysokých postech mělo více levicové sympatie a nyní, když jsme převzali kontrolu, mnozí rezignovali. Měli bychom povýšit některé vlastenecké a fanatické mladé důstojníky z nižších řad a nahradit jimi jejich dekadentní nadřízené." # todo: NEW TRANSLATION
  CHL_enforce_the_chilean_identity: "Utvořit novou chilskou identitu" # todo: NEW TRANSLATION
  CHL_enforce_the_chilean_identity_desc: "Chilejci jsou momentálně rozděleni a musíme udělat něco, aby se sjednotili pod naší vlajkou. Španělština, Mapuche, Chilejec - nejsou odlišní, všichni jsou našimi občany a stejní. Někteří mohou naše poselství odmítnout, ale nová chilská identita by většině měla vyhovovat." # todo: NEW TRANSLATION
  CHL_cooperate_with_operation_bolivar: "Spolupracovat s operací Bolívar" # todo: NEW TRANSLATION
  CHL_cooperate_with_operation_bolivar_desc: "Němci nám však hodně pomohli. Když jsme to nejvíce potřebovali, němečtí osadníci kolonizovali Araucanii a nyní potřebují pomoc proti Američanům. Je naší povinností jim pomoci a splatit dluh, který jim dlužíme." # todo: NEW TRANSLATION
  CHL_abide_by_the_francoist_model: "Řídit se frankistickým modelem" # todo: NEW TRANSLATION
  CHL_abide_by_the_francoist_model_desc: "Ačkoliv Němci mohou mít velký vliv, naše hnutí by se mělo dívat na myšlenky středomořských myslitelů jako Mussolini a Franco. Jejich model bychom měli následovat a jejich ideály si přivlastnit." # todo: NEW TRANSLATION
  CHL_host_german_intelligence: "Hostit německé zpravodajství" # todo: NEW TRANSLATION
  CHL_host_german_intelligence_desc: "V rámci Operace Bolívar se Němci snaží špehovat Američany z jihu a můžeme jim poskytnout spoustu zajímavých informací, pokud rozmístí špiony a nechají Abwehr úzce spolupracovat s naší vládou." # todo: NEW TRANSLATION
  CHL_militarize_the_state: "Zmílit stát" # todo: NEW TRANSLATION
  CHL_militarize_the_state_desc: "Ač jsme vyhráli velké války dříve, naše země není připravena na další velký konflikt. Musíme proto nejprve zmilitarizovat stát, pokud chceme, aby naše síly opět byly připravené k boji." # todo: NEW TRANSLATION
  CHL_the_spirit_of_the_war_of_the_pacific: "Duch války z Pacifiku" # todo: NEW TRANSLATION
  CHL_the_spirit_of_the_war_of_the_pacific_desc: "Pokud chceme, aby naše jednotky byly zmobilizované, měli bychom jim připomenout naše velké úspěchy během války na Pacifiku proti Peru a Bolívii. Můžeme také využít příležitost znovu potvrdit naše nároky na určité oblasti, které nám mohou být ochotni přidělit němečtí spojenci." # todo: NEW TRANSLATION
  CHL_syndicalize_the_production_sector: "Syndikalizovat výrobní sektor" # todo: NEW TRANSLATION
  CHL_syndicalize_the_production_sector_desc: "Výrobní sektor je nyní sužován neefektivitou a krutými hacendados, kteří myslí jen na svůj zisk. Měli bychom průmysl syndikalizovat a zavést pravý falangistický korporátní průmyslový model." # todo: NEW TRANSLATION
  CHL_expand_the_mountain_regiments: "Rozšířit horské pluky" # todo: NEW TRANSLATION
  CHL_expand_the_mountain_regiments_desc: "Nejelitnějšími jednotkami jsou naše specializované horské pluky, vhodné pro brutální boj kdekoli v zemi. Měli bychom nařídit generálům, aby se s těmito jednotkami střídavě školili a zajistili jim speciální vybavení." # todo: NEW TRANSLATION
  CHL_departemento_de_las_tropas_nacistas_de_asalto: "Departamento de las Tropas de Asalto" # todo: NEW TRANSLATION
  CHL_departemento_de_las_tropas_nacistas_de_asalto_desc: "Naše oddělení Nacista Assault jednotek by mělo být posíleno a povzneseno. Musíme zajistit, aby naplňovaly ducha šokových jednotek Velké války a byly patřičně vybaveny." # todo: NEW TRANSLATION
  CHL_departamento_de_la_juventad_nacista: "Departamento de la Juventud Nacista" # todo: NEW TRANSLATION
  CHL_departamento_de_la_juventad_nacista_desc: "Jiné země jako Německo uspěly militarizací své mládeže, a my bychom neměli být výjimkou; potřebujeme více mužů na frontu a potřebujeme je nyní." # todo: NEW TRANSLATION
  CHL_expand_the_department_of_provinces: "Zvětšit Departament provincií" # todo: NEW TRANSLATION
  CHL_expand_the_department_of_provinces_desc: "Departament provincií pracuje přesčas, aby zajistil kontrolu nad všemi regiony Chile, ale pokud jej plně podpoříme a rozšíříme, mohli bychom jej využít k lepší správě i cizích území." # todo: NEW TRANSLATION
  CHL_revoke_the_treaty_of_lima: "Zrušit smlouvu z Limy" # todo: NEW TRANSLATION
  CHL_revoke_the_treaty_of_lima_desc: "Smlouva z Limy z roku 1929, která vrátila region Tacna Peru, byla bez legitimity a jediným vysvětlením je, že jsme byli v tlaku. Je čas to napravit a požadovat návrat území." # todo: NEW TRANSLATION
  CHL_demand_the_fireland: "Žádat o Zemi Ohně" # todo: NEW TRANSLATION
  CHL_demand_the_fireland_desc: "Tierra del Fuego je právem naše a Argentina nemůže tvrdit legitimitu vlastnictví, jelikož k ní ani není připojena. Musíme ujistit veřejnost, že nechceme škodit, a vytrhnout region z argentinských drápů." # todo: NEW TRANSLATION
  CHL_escalate_the_laguna_del_desierto_issue: "Zesílit spor o Laguna del Desierto" # todo: NEW TRANSLATION
  CHL_escalate_the_laguna_del_desierto_issue_desc: "Vymezení okolo Laguna del Desierto je velmi nejasné a zaujaté ve prospěch Argentinců. Měli bychom se pohnout a obsadit tu část regionu, která nám právem patří, a možná i trochu dál." # todo: NEW TRANSLATION
  CHL_demand_demilitarization_of_patagonia: "Požadovat demilitarizaci Patagonie" # todo: NEW TRANSLATION
  CHL_demand_demilitarization_of_patagonia_desc: "Argentinci nadále ohrožují náš lid svou stálou vojenskou přítomností v Patagonii. Je na čase požádat je, aby nás nechali na pokoji, a slíbili, že stáhnou jednotky z regionu." # todo: NEW TRANSLATION
  CHL_enter_patagonia: "Vstoupit do Patagonie" # todo: NEW TRANSLATION
  CHL_enter_patagonia_desc: "Pokud nám Argentinci věří ani na vteřinu, je to důkaz, že jsme je zmátli a vyděsili. Je čas, aby naše jednotky vstoupily do Patagonie a udeřily tvrdě dříve, než budou vědět, co je zasáhlo." # todo: NEW TRANSLATION
  CHL_controlled_education: "Přísně kontrolované vzdělávání" # todo: NEW TRANSLATION
  CHL_controlled_education_desc: "Pokud mají děti vyrůstat správně a myslet tak, jak chceme, musíme zajistit, aby jejich vzdělávání odpovídalo normám a pravidlům, které máme, aby se staly modelovými občany." # todo: NEW TRANSLATION
  CHL_promote_pan_hispanic_rhetoric: "Prosazovat panhispánskou rétoriku" # todo: NEW TRANSLATION
  CHL_promote_pan_hispanic_rhetoric_desc: "Jsme jednotlivci, ale jsme sjednoceni duchem a krví jako hispánský lid, a je načase nárokovat si naše dědictví a svrhnout imperialisty, kteří se snaží náš lid rozdělit." # todo: NEW TRANSLATION
  CHL_military_excercises: "Vojenská cvičení" # todo: NEW TRANSLATION
  CHL_military_excercises_desc: "Armáda ještě není plně připravena pro boj a musí být důkladně cvičena, než bude užitečná v den hispánského sjednocení." # todo: NEW TRANSLATION
  CHL_cultivate_fanaticism: "Pěstovat fanatismus" # todo: NEW TRANSLATION
  CHL_cultivate_fanaticism_desc: "Bez sjednocení nemají lidé Jižní a Střední Ameriky budoucnost, a to musí být všem jasné. Pokud se nyní nestavíme proti Američanům, padneme do jejich manipulativních imperialistických spárů. Čest dělá Hispánce a zuřivost potká každého, kdo nám bude stát v cestě." # todo: NEW TRANSLATION
  CHL_the_path_to_conquest: "Sjednocení vojenskou silou" # todo: NEW TRANSLATION
  CHL_the_path_to_conquest_desc: "Slavný čin dobývání, jako kdysi conquistadoři, sjednotí náš lid, protože jsou pod kontrolou egocentrických a malicherných nacionalistických vlád, které nevidí větší obraz. Musíme osvobodit hispánský lid silou!" # todo: NEW TRANSLATION
  CHL_hispanic_supremacy_pact_faction: "Liga hispánské nadřazenosti" # todo: NEW TRANSLATION
  CHL_the_hispanic_alliance: "Hispánské spojenectví" # todo: NEW TRANSLATION
  CHL_the_hispanic_alliance_desc: "Náš lid by měl být sjednocen, ne státem, ale přátelstvím a spoluprací, a pouze prostřednictvím aliance může existovat panhispánská unie. Měli bychom oslovit každého, kdo sdílí naše ideály, a zajistit jejich loajalitu věci." # todo: NEW TRANSLATION
  CHL_the_latin_american_alliance: "Latinskoamerická aliance" # todo: NEW TRANSLATION
  CHL_the_latin_american_alliance_desc: "I když usilujeme o panhispánství, na našem kontinentu jsou i ti, kteří se k nám chtějí připojit v boji proti imperialistickému utlačování, i když jsou pouze latinské. Měli bychom je pozvat, protože jako Latinské národy jsme silní." # todo: NEW TRANSLATION
  CHL_sponsor_anti_colonialist_rebellions: "Sponzorovat antikoloniální povstání" # todo: NEW TRANSLATION
  CHL_sponsor_anti_colonialist_rebellions_desc: "Jsou lidé, kteří myslí jako my, ale nemají sebeurčení řídit vlastní osud. Musíme je osvobodit z drápů koloniálních mocností." # todo: NEW TRANSLATION
  CHL_joint_development_and_research: "Společný rozvoj a výzkum" # todo: NEW TRANSLATION
  CHL_joint_development_and_research_desc: "Nyní, když spolupracujeme úžeji, můžeme investovat do sebe navzájem a hostit laboratoře, které přivítají výzkumníky ze všech členských států." # todo: NEW TRANSLATION
  CHL_push_past_the_darien_gap: "Přes Darien Gap" # todo: NEW TRANSLATION
  CHL_push_past_the_darien_gap_desc: "Darien gap mezi Kolumbií a Panamou může být těžké překonat, ale je to nutné, pokud chceme dosáhnout hranic USA a nakonec osvobodit naše bratry tam." # todo: NEW TRANSLATION
  CHL_the_might_to_defend_our_homes: "Síla bránit naše domovy" # todo: NEW TRANSLATION
  CHL_the_might_to_defend_our_homes_desc: "Naše životy jsou neustále ohrožovány velmocemi a nelze podcenit důležitost toho, aby se náš lid cítil chráněn vládou. Měli bychom posílit naše síly, aby války nikdy nedorazily k našim dveřím." # todo: NEW TRANSLATION
  CHL_undo_colonialist_occupations: "Zrušit kolonialistické okupace" # todo: NEW TRANSLATION
  CHL_undo_colonialist_occupations_desc: "Koloniální mocnosti příliš dlouho okupují části hispánské Ameriky a je čas ukázat jim, že si s námi nebudou zahrávat. Pošlete armádu!" # todo: NEW TRANSLATION
  CHL_unite_hispanic_america: "Sjednotit hispánskou Ameriku" # todo: NEW TRANSLATION
  CHL_unite_hispanic_america_desc: "Nastal čas! Svědčíme dějinám, protože velká část hispánské Ameriky je znovu sjednocena, tentokrát pod naší vládou místo španělského impéria. Radujme se, přichází nová éra pro kontinent!" # todo: NEW TRANSLATION
  CHL_the_true_enemy: "Pravý nepřítel" # todo: NEW TRANSLATION
  CHL_the_true_enemy_desc: "Amerika je pravým nepřítelem našeho lidu a příliš dlouho utlačovala hispánské obyvatelstvo na jihu. Nyní, když jsme připraveni na finální úder, musíme udělat ten poslední krok." # todo: NEW TRANSLATION
  CHL_demand_the_guayanas: "Požadovat Guiany" # todo: NEW TRANSLATION
  CHL_demand_the_guayanas_desc: "Guiany jsou příliš dlouho obsazeny jinými silami. Region, o kterém se kdysi tvrdilo, že drží El Dorado, sice možná zlato nemá, ale má jiné bohatství, po kterém zoufale toužíme." # todo: NEW TRANSLATION
  CHL_liberate_the_caribbean: "Osvobodit Karibik" # todo: NEW TRANSLATION
  CHL_liberate_the_caribbean_desc: "Karibik nemusí být kompletně hispánský ani latinskoamerický, ale měl by spadat do naší sféry vlivu a musíme udělat vše pro zabezpečení ostrovů pro sebe." # todo: NEW TRANSLATION
  CHL_press_our_demands: "Prosazovat naše požadavky" # todo: NEW TRANSLATION
  CHL_press_our_demands_desc: "Nyní, když držíme všechny Guiany, můžeme prosadit naše požadavky a vytrhnout je z rukou imperialistů a snažit se dosáhnout míru s bývalými okupanty regionu." # todo: NEW TRANSLATION
  CHL_defense_of_the_hemisphere: "Obrana hemisféry" # todo: NEW TRANSLATION
  CHL_defense_of_the_hemisphere_desc: "Mnoho národů na naší polokouli by profitovalo z ochrany proti USA a to je přesně to, co jim my a Němci můžeme nabídnout." # todo: NEW TRANSLATION
  CHL_support_the_colonial_plan: "Podpořit koloniální plán" # todo: NEW TRANSLATION
  CHL_support_the_colonial_plan_desc: "Německý koloniální úřad jednou vytvořil plán na rychlé převzetí státního aparátu v Uruguayi a instalaci koloniální loutkové vlády. Nyní máme moc to zkusit uskutečnit a měli bychom požadovat, aby Uruguay podrobila se naší alianci a vybrala si správnou stranu dějin." # todo: NEW TRANSLATION
  CHL_unite_with_our_brothers_in_hispania: "Znovusjednotit se s bratry v Hispanii" # todo: NEW TRANSLATION
  CHL_unite_with_our_brothers_in_hispania_desc: "Naši dávno ztracení bratři v staré Hispanii jsou ideologicky s námi spjati, ale váhají zapojit se na německé straně ve válkách. Můžeme jim dát impuls, který potřebují, aby se stali součástí německé frakce." # todo: NEW TRANSLATION
  CHL_restore_the_old_kingdom: "Obnovit staré království" # todo: NEW TRANSLATION
  CHL_restore_the_old_kingdom_desc: "Nyní ovládáme všechna území nárokovaná irredentistickou oblastí Království Chile, dříve součástí Virreinaltu Peru, můžeme usilovat o integraci těchto území a možná jít i za historické hranice." # todo: NEW TRANSLATION
  CHL_an_empire_on_the_pacific: "Impérium na Pacifiku" # todo: NEW TRANSLATION
  CHL_an_empire_on_the_pacific_desc: "Nyní, když naše zlatá éra opravdu začala, je čas rozšířit obzory a pohlédnout na západ. Založíme velké impérium táhnoucí se přes celý Tichý oceán!" # todo: NEW TRANSLATION
  CHL_modern_conquistadors: "Conquistadores de Pedro de Valdivia" # todo: NEW TRANSLATION
  CHL_modern_conquistadors_desc: "Nyní, když bylo staré Království Chile obnoveno, je čas opravdu uctít naše předky a převzít odkaz našeho prvního guvernéra, conquistadora Pedra de Valdivia. Kupředu do neznáma!" # todo: NEW TRANSLATION
  CHL_no_more_advisors_tt: "Většina našich momentálně dostupných §Yporadců§! se stane §Rnedostupná§!" # todo: NEW TRANSLATION
  CHL_indigenous_union: "Unie amerických domorodých národů" # todo: NEW TRANSLATION
  CHL_carabineros_secured_by_opposition: "Carabineros byly zajištěny opozicí" # todo: NEW TRANSLATION
  CHL_annex_and_core_all_american_subjects: "§YAnektuje§! a získá §Yjádra§! na všech §Yamerindských a polynéských státech-satelitech§!" # todo: NEW TRANSLATION
  CHL_unified_in_spirit_tt: "Všechny §Yamerindské a polynéské státy-sateliti§! také získají tento Národní duch" # todo: NEW TRANSLATION
  CHL_avenge_the_pacification_tt: "Různé antimapuchské prvky v zemi budou následovat §YCarlosa Ibáñeze del Campo§! v §RCivilní válce§! proti nám!" # todo: NEW TRANSLATION
  CHL_undermine_the_carabineros_de_chile_tt: "Zabraňuje Ibáñezově straně získat §YDodatečné Carabineros De Chile§! divize při vypuknutí §YCivilní války§!" # todo: NEW TRANSLATION
  CHL_crusade_against_imperialism_tt: "Odemkne rozhodnutí §YOsvobodit Amerindské§! a §YPolynéské státy§! od imperialistického utlačování" # todo: NEW TRANSLATION
  CHL_undermine_the_carabineros_de_chile_bonuses_tt: "§YKdyž začne Válka za nezávislost Mapuche§!:\nZkušenosti armády: §Z+25§!.\nZákladní podpora ve válce: §Z+5.00%§!." # todo: NEW TRANSLATION
  CHL_ibanezs_coup: "Ibáñezův puč" # todo: NEW TRANSLATION
  CHL_ibanezs_coup_desc: "Bývalý prezident a generál Carlos Ibáñez del Campo touží znovu získat ztracené prezidentství a je ochoten dělat špinavé kšefty, aby toho dosáhl. Byl by ochoten podpořit společný puč konzervativců a fašistů, pokud mu slíbuje vedení státu." # todo: NEW TRANSLATION
  CHL_address_the_mapuche_conflict: "Řešit konflikt s Mapuche" # todo: NEW TRANSLATION
  CHL_address_the_mapuche_conflict_desc: "Země je destabilizována, ale situace se Mapuche pod Ibáñezem nezlepší, a proto musíme jednat rychle. Domorodý aktivista a politik Manuel Manquilef začal shromažďovat a sjednocovat mnoho rozdrobených organizací Mapuche, aby svrhl chilský stát jednou provždy." # todo: NEW TRANSLATION
  CHL_undermine_the_carabineros_de_chile: "Podkopat Carabineros de Chile" # todo: NEW TRANSLATION
  CHL_undermine_the_carabineros_de_chile_desc: "Carabineros de Chile založil prezident Carlos Ibáñez del Campo a jsou mu stále velmi loajální. Kdybychom se pokusili vytvořit stát vedený námi, jistě by přešli na jeho stranu a postavili se nám do cesty. Musíme proto udělat vše pro to, aby v budoucnu měli co nejméně moci." # todo: NEW TRANSLATION
  CHL_la_corporacion_araucania: "La Corporación Araucana" # todo: NEW TRANSLATION
  CHL_la_corporacion_araucania_desc: "Araucanian Corporation vedená konzervativním a korporativistickým Venancio Coñuepán Huenchualem, vnukem slavného válečného náčelníka Abajino, by mohla být užitečným spojencem při povstání proti chilskému státu." # todo: NEW TRANSLATION
  CHL_la_federacion_araucania: "La Federación Araucana" # todo: NEW TRANSLATION
  CHL_la_federacion_araucania_desc: "Araucanian Federation vedená mapuchským tradicionalistou Manuelem Aburto Panguilefem je silně proti spolupráci s moderní chilskou společností a bylo by snadné jej začlenit do našeho hnutí za nezávislost." # todo: NEW TRANSLATION
  CHL_sociedad_caupolican_defensora_de_la_araucania: "Sociedad Caupolicán de la Araucanía" # todo: NEW TRANSLATION
  CHL_sociedad_caupolican_defensora_de_la_araucania_desc: "Caupolicán Defender of Araucanía Society vedená Manuelem Manquilefem je jednou z největších mapuchských organizací a základem úspěšné revoluce. Získání podpory členů skupiny by mělo být prioritou." # todo: NEW TRANSLATION
  CHL_union_araucana: "Unión Araucana" # todo: NEW TRANSLATION
  CHL_union_araucana_desc: "Unión Araucana je jednou z nejstarších mapuchských organizací v Chile. Díky úzkým vazbám na kapucínské otce v Araucanii prosazovali agendu katolické evangelizace a integrace do chilské společnosti, ale pokud budou správně přesvědčeni, podpoří naše způsoby." # todo: NEW TRANSLATION
  CHL_la_moderna_araucania: "La Moderna Araucanía" # todo: NEW TRANSLATION
  CHL_la_moderna_araucania_desc: "La Moderna Araucanía byla jednou z prvních mapuchských organizací založených v Chile s důrazem na vzdělání a pokrok. Měli bychom se snažit je integrovat do našeho hnutí a co nejlépe využít jejich dovednosti." # todo: NEW TRANSLATION
  CHL_electing_a_toqui: "Volba Toqui" # todo: NEW TRANSLATION
  CHL_electing_a_toqui_desc: "V souladu s mapuchskou tradicí je Toqui volen jako vůdce v době války shromážděním Loncos, kteří vedou své Rehues a Aillarehues. Tito Toqui drželi nejvyšší roli v mapuchské společnosti a vedli bojovníky a Loncos během války; je čas zvolit nového Toqui, který povede naši antikoloniální křížovou výpravu!" # todo: NEW TRANSLATION
  CHL_electing_a_toqui_tt: "Budeme moci zvolit vůdce s unikátní vlastností" # todo: NEW TRANSLATION
  CHL_convene_the_araucanian_congress: "Svolat araucanský kongres" # todo: NEW TRANSLATION
  CHL_convene_the_araucanian_congress_desc: "Nastal čas zahájit naši válku za nezávislost, ale v naší organizaci je vnitřní rozkol. Někteří tvrdí, že komunisté by byli užitečnými spojenci, protože sdílí podobné cíle, zatímco jiní tvrdí, že by jen způsobili frakcionismus a zradili nás v rozhodujícím okamžiku. Komu věřit?" # todo: NEW TRANSLATION
  CHL_avenge_the_pacification_of_araucania: "Pomstít pacifikaci Araucanii" # todo: NEW TRANSLATION
  CHL_avenge_the_pacification_of_araucania_desc: "Chilská okupace Araucanii v letech 1861–1883 byla temným obdobím mapuchské historie a je čas pomstít nespravedlnosti a války, které nám Chile přineslo. Do zbraně, stateční válečníci! Získejte zpět, co bylo dříve vaše! Cti odkaz Quilapána a Caupolicána!" # todo: NEW TRANSLATION
  CHL_revise_the_social_classes: "Přepracovat sociální třídy" # todo: NEW TRANSLATION
  CHL_revise_the_social_classes_desc: "Nyní, když máme znovu vlastní společnost, je na čase restrukturalizovat sociální třídy tak, aby lépe odpovídaly našim názorům a ideálům. Éra Evropanů brzy skončí!" # todo: NEW TRANSLATION
  CHL_adopt_mapundungun: "Přijmout Mapudungun" # todo: NEW TRANSLATION
  CHL_adopt_mapundungun_desc: "Velkým krokem k obnovení řádného mapuchského státu by bylo přijetí Mapudungun jako úředního jazyka, alespoň pro soudy. Musíme také začít vzdělávat obyvatele našeho státu, aby se náš jazyk naučili." # todo: NEW TRANSLATION
  CHL_embrace_indigenous_corporatism: "Přijmout domorodý korporativismus" # todo: NEW TRANSLATION
  CHL_embrace_indigenous_corporatism_desc: "Myšlenky Venancia Coñuepána Huenchuala na korporativismus založený na starých domorodých řemeslech a stavebnictví by měly být přijaty a změněny na oficiální státní politiku pro průmysl v naší zemi." # todo: NEW TRANSLATION
  CHL_expand_the_agricultural_field: "Rozšířit zemědělství" # todo: NEW TRANSLATION
  CHL_expand_the_agricultural_field_desc: "Navzdory moderním idejím Venancia Coñuepána Huenchuala mnoho lidí touží po návratu k zemědělské společnosti, tentokrát však s větším státním zásahem pro ty, kteří se sami neuživí. Musíme následovat přání populace, abychom zvýšili národní stabilitu." # todo: NEW TRANSLATION
  CHL_focus_on_cattle_and_wool: "Zaměřit se na dobytek a vlnu" # todo: NEW TRANSLATION
  CHL_focus_on_cattle_and_wool_desc: "Dvě nejrozšířenější odvětví chovu v zemi jsou krávy a ovce, a nebylo by moudré to měnit. Měli bychom naopak podporovat nákup těchto zvířat zemědělci po celé zemi." # todo: NEW TRANSLATION
  CHL_enlarge_the_textile_industries: "Zvětšit textilní průmysl" # todo: NEW TRANSLATION
  CHL_enlarge_the_textile_industries_desc: "Textil byl vždy široce vyráběn po celé zemi a nemělo by to být jinak ani dnes. Stát by měl dotovat otevírání nových textilních závodů a snažit se navázat obchodní trasy s podobně smýšlejícími zeměmi." # todo: NEW TRANSLATION
  CHL_silverworking: "Stříbrařství" # todo: NEW TRANSLATION
  CHL_silverworking_desc: "Stříbrařství bylo jedním z tradičních řemesel Mapuche a bylo by snadné vyvážet drahé stříbrné ozdoby, navíc máme velké naleziště přírodního stříbra, zejména až získáme Puelmapu od Argentine." # todo: NEW TRANSLATION
  CHL_incorporate_machi_into_the_army: "Začlenit Machi do armády" # todo: NEW TRANSLATION
  CHL_incorporate_machi_into_the_army_desc: "Machi jsou tradiční léčitelé a náboženští vůdci v naší víře a jsou známí svými tradičními léčebnými postupy. Měli bychom zajistit, aby každá divize měla alespoň jednoho, aby byla zajištěna zdravotní péče našich jednotek v boji." # todo: NEW TRANSLATION
  CHL_the_patagonian_giants: "Patagonscí obři" # todo: NEW TRANSLATION
  CHL_the_patagonian_giants_desc: "Patagones nebo patagonští obři byli rasou obřích lidí údajně žijících v Patagonii a popsaných v raných evropských záznamech, údajně přesahovali dvojnásobek normální výšky. I když jsou tyto pověsti nepravdivé, měli bychom se snažit, aby naše ozbrojené síly vzbuzovaly obraz těchto obrů a šířily strach v očích našich nepřátel." # todo: NEW TRANSLATION
  CHL_taking_back_patagonia: "[CHL_taking_back_patagonia_key]" # todo: NEW TRANSLATION
  CHL_taking_back_patagonia_desc: "[CHL_taking_back_patagonia_desc_key]" # todo: NEW TRANSLATION
  CHL_honor_the_legacy_of_caupolican: "Uctít odkaz Caupolicána" # todo: NEW TRANSLATION
  CHL_honor_the_legacy_of_caupolican_desc: "Caupolicán byl Toqui, který vedl odpor svého lidu proti španělským conquistadorům v 16. století. Měli bychom se snažit žít podle jmen jako Caupolicán a Lautaro, pokud chceme zbavit náš kontinent evropských imperialistů." # todo: NEW TRANSLATION
  CHL_union_of_american_indigenous_peoples: "Unie amerických domorodých národů" # todo: NEW TRANSLATION
  CHL_union_of_american_indigenous_peoples_desc: "Mnoho národů po světě bylo násilně podrobeno a trýzněno evropským imperialismem. Je čas sjednotit amerindské, inuitní a polynéské národy pod jednou vlajkou, abychom se postavili těmto nemorálním vetřelcům!" # todo: NEW TRANSLATION
  CHL_union_of_american_indigenous_peoples_tt: "Odemkne §YQuintína Lame§! jako §Ygenerála§!" # todo: NEW TRANSLATION
  CHL_crusade_against_imperialism: "Křížová výprava proti imperialismu" # todo: NEW TRANSLATION
  CHL_crusade_against_imperialism_desc: "Nastal čas, kdy jsme připraveni postavit se širému světu ve jménu spravedlnosti! Je čas ukázat dekadentním Evropanům, že se jim již nepodvolíme. Do zbraně muži, tentokrát přineseme boj k nim!" # todo: NEW TRANSLATION
  CHL_unified_by_will: "Sjednoceni vůlí" # todo: NEW TRANSLATION
  CHL_unified_by_will_desc: "Amerindští a polynéscí lidé jsou nyní sjednoceni naším antikoloniálním úsilím, ale to nestačí. Pokud chceme odrazit invaze Evropanů na staletí, musíme se spojit a vytvořit jeden národ, pro všechny naše lidi, sjednocení vůlí mít stát neřízený Evropany." # todo: NEW TRANSLATION
  CHL_unified_in_spirit: "Sjednoceni v duchu" # todo: NEW TRANSLATION
  CHL_unified_in_spirit_desc: "Jelikož sdílíme společný cíl, můžeme dobře spolupracovat jako dobře namazaný mechanismus. Neměli bychom, i když nespojujeme naše národy do jednoho, přestat usilovat o společné armády a lepší koordinaci. Lidé Ameriky a Tichomoří jsou sjednoceni v duchu a vždy budou stát bok po boku!" # todo: NEW TRANSLATION
  CHL_taking_back_patagonia_kingdom: "Znovu sjednotit království" # todo: NEW TRANSLATION
  CHL_taking_back_patagonia_kingdom_desc: "Ač jsme si vyhlásili nové Království Araucanie a Patagonie, stále nám chybí velká část království, konkrétně Patagonie. Měli bychom usilovat o znovusjednocení říše co nejdříve, abychom neztratili zbývající legitimitu." # todo: NEW TRANSLATION
  CHL_taking_back_patagonia_mapuche: "Získat zpět Puelmapu" # todo: NEW TRANSLATION
  CHL_taking_back_patagonia_mapuche_desc: "Starý mapuchský region Puelmapu, velké části dnešní argentinské Patagonie, jsou stále pod cizím útlakem a nemůžeme osvobodit žádné jiné amerindské národy, dokud nejprve nezvládneme osvobodit vlastní. Tudíž zbývá jediná cesta - válka...." # todo: NEW TRANSLATION
  CHL_ibanez_as_prime_minister_tt: "Najímá §YCarlosa Ibáñeze del Campo§! jako poradce" # todo: NEW TRANSLATION
  CHL_return_to_the_parliamentary_era_tt: "Najímá §YMiguela Cruchaga Tocornal§! jako poradce" # todo: NEW TRANSLATION
  CHL_je_suis_le_deluge_tt: "§YAntoine III§! získává vlastnost §YSkutečný císař Francie a Amerik§!" # todo: NEW TRANSLATION
  CHL_the_straight_line_tt: "The Línea Recta svrhne §YAntoine III§! a předá království §YCarlosu Ibáñez del Campo§!" # todo: NEW TRANSLATION
  CHL_satellite_kingdoms_tt: "Odemkne rozhodnutí §YZaložit satelitní království§!, které budou mít možnost vytvořit jako loutky §Y[INC.GetNameDef]§!, §Y[SUR.GetName]§! nebo §Y[HAI.GetName]§!, pokud ovládáme jejich historická území." # todo: NEW TRANSLATION
  CHL_rule_by_decree: "Vládnout výnosem" # todo: NEW TRANSLATION
  CHL_rule_by_decree_desc: "Během svého prvního prezidentství v letech 1927–1931 Ibáñez vládnul výnosy a vykonával diktátorské pravomoci. Nyní musí učinit totéž, aby nasměroval zemi správným směrem." # todo: NEW TRANSLATION
  CHL_strengthen_the_carabinieros: "Posílit Carabineros de Chile" # todo: NEW TRANSLATION
  CHL_strengthen_the_carabinieros_desc: "Carabineros de Chile byly založeny v roce 1927 nikým jiným než Ibáñezem a velké části organizace jsou mu stále velmi loajální. Může proto být rozumné zajistit, že právě loajální členové budou mít moc v organizaci." # todo: NEW TRANSLATION
  CHL_seek_foreign_investments: "Usilovat o zahraniční investice" # todo: NEW TRANSLATION
  CHL_seek_foreign_investments_desc: "Je to osvědčená metoda pro Ibáñeze použít půjčené fondy ze zahraničí k obnově národního průmyslu a tentokrát tomu nebude jinak." # todo: NEW TRANSLATION
  CHL_increase_spending_on_public_works: "Zvýšit výdaje na veřejné práce" # todo: NEW TRANSLATION
  CHL_increase_spending_on_public_works_desc: "Co Alessandri během svého prezidentského období dokázal, bylo to, že veřejné práce jsou skvělý způsob, jak oživit ekonomiku." # todo: NEW TRANSLATION
  CHL_alianza_popular_libertadora_as_a_vanguard: "Alianza Popular Libertadora" # todo: NEW TRANSLATION
  CHL_alianza_popular_libertadora_as_a_vanguard_desc: "Protože je obtížné vládnout výhradně vlastní silou, bylo by moudré vytvořit koaliční vládu s poradci z různých pravicových stran, aby přinesli své názory do kabinetu." # todo: NEW TRANSLATION
  CHL_utilize_national_populism: "Využít národní populismus" # todo: NEW TRANSLATION
  CHL_utilize_national_populism_desc: "Lidé jsou důvěřiví a cokoli, co jim slibuje půdu, bohatství nebo slávu, byť prázdné, je získá na svoji stranu, byť jejich podpora bude vratká." # todo: NEW TRANSLATION
  CHL_outlaw_socialism: "Prohlásit socialismus za nezákonný" # todo: NEW TRANSLATION
  CHL_outlaw_socialism_desc: "Mnozí se staví proti Ibáñezově diktatuře, ale nejsilnějším odporem jsou socialisté. Musíme se jich zbavit dříve než později." # todo: NEW TRANSLATION
  CHL_sell_arica_to_peru: "Prodat Aricu Peru" # todo: NEW TRANSLATION
  CHL_sell_arica_to_peru_desc: "Jedním ze způsobů, jak získat velký příliv prostředků na řešení ekonomických problémů, je prodat části území získaného od Peru a Bolívie během Války o Pacifik zpět Peru." # todo: NEW TRANSLATION
  CHL_sell_arica_to_peru_civil_war_tt: "§RDokončení tohoto fokusu a kterékoli z $CHL_outlaw_socialism$ nebo $CHL_utilize_national_populism$ povede k občanské válce.§!" # todo: NEW TRANSLATION
  CHL_sell_arica_to_peru_civil_war_tt_2: "§RDokončení tohoto fokusu a $CHL_sell_arica_to_peru$ povede k občanské válce§!" # todo: NEW TRANSLATION
  CHL_crown_antoine_as_sovereign_king: "KORUNOVAT Antoinea jako svrchovaného krále" # todo: NEW TRANSLATION
  CHL_crown_antoine_as_sovereign_king_desc: "Jacques Antoine Bernard se vrátil z Francie s pomocí pro naši vládu během občanské války výměnou za to, že mu dáme moc a titul Svrchovaného krále Araucanie a Patagonie. Co by se mohlo pokazit?" # todo: NEW TRANSLATION
  CHL_strike_a_deal_with_the_mapuche: "Uzavřít dohodu s Mapuche" # todo: NEW TRANSLATION
  CHL_strike_a_deal_with_the_mapuche_desc: "Právě Mapuche kdysi umožnili Orélie-Antoinovi I. stát se prvním králem Araucanie a Patagonie, a právě díky našim svazkům s nimi můžeme získat nové mapuchské organizace na naši stranu." # todo: NEW TRANSLATION
  CHL_request_assistance_in_the_war: "Požádat o pomoc ve válce" # todo: NEW TRANSLATION
  CHL_request_assistance_in_the_war_desc: "Existuje více zemí, které by profitovaly z další vlády přátelské Evropě. Měli bychom hledat jejich podporu při porážce nepřátel naší vlády." # todo: NEW TRANSLATION
  CHL_request_assistance_in_the_war_tt: "Pokud je přijata, země nám bude schopna poslat dobrovolníky během občanské války a bude ochotnější tak učinit." # todo: NEW TRANSLATION
  CHL_mobilize_the_veteran_legionaries: "Mobilizovat veteránské legionáře" # todo: NEW TRANSLATION
  CHL_mobilize_the_veteran_legionaries_desc: "Francouzští cizinečtí legionáři, které král Antoine III přivedl k výcviku a mobilizaci nových jednotek, jsou nyní zoufale potřeba na frontě a jejich začlenění do běžné armády by mělo být zváženo." # todo: NEW TRANSLATION
  CHL_establish_a_royal_guard: "Zřídit královskou gardu" # todo: NEW TRANSLATION
  CHL_establish_a_royal_guard_desc: "Žádný král není kompletní bez své hradné stráže a sloužících, a bohužel pro Antoinea III jim chybí. Mělo by být nejvyšší prioritou rychle založit jednotku královské gardy." # todo: NEW TRANSLATION
  CHL_attract_additional_french_investments: "Přitáhnout další francouzské investice" # todo: NEW TRANSLATION
  CHL_attract_additional_french_investments_desc: "Francouzští obchodníci a průmyslníci, kteří viděli v Antoineově výpravě velkou příležitost, jsou nyní ohromeni jeho činy a snadno přesvědčeni poskytnout více pomoci výměnou za budoucí půdu." # todo: NEW TRANSLATION
  CHL_invite_french_aristocracy: "Pozvat francouzskou aristokracii" # todo: NEW TRANSLATION
  CHL_invite_french_aristocracy_desc: "Abychom potlačili domácí problémy ohledně systému Hacienda a Inquilinaje, měli bychom přivést novou francouzskou aristokracii a přepracovat, jak šlechta v zemi funguje." # todo: NEW TRANSLATION
  CHL_ibanez_as_prime_minister: "Ibáñez jako předseda vlády" # todo: NEW TRANSLATION
  CHL_ibanez_as_prime_minister_desc: "Není pochyb, že Antoine III nemůže vládnout zcela sám, postrádá státnické schopnosti a znalosti, které má Ibáñez. Monarchie by proto měla být ústavní." # todo: NEW TRANSLATION
  CHL_no_deluges_tt: "Tímto se vám §Rzablokuje§! možnost později vzít fokus §YJe Suis Le Deluge§! v rámci stromu" # todo: NEW TRANSLATION
  CHL_an_absolute_monarchy: "Absolutní monarchie" # todo: NEW TRANSLATION
  CHL_an_absolute_monarchy_desc: "Je mnoho věcí k vykonání a jediný, kdo je schopen převzít kontrolu a nasměrovat zemi, je král. Proto je nezbytné sdělit kabinetu, že mohou jít domů, protože nejsou potřeba." # todo: NEW TRANSLATION
  CHL_an_absolute_monarchy_tt: "Tímto se vám §Rzablokuje§! možnost později vzít fokus §YTreading the Straight Line§! v rámci stromu" # todo: NEW TRANSLATION
  CHL_approach_the_moderates: "Oslovit středové" # todo: NEW TRANSLATION
  CHL_approach_the_moderates_desc: "I přes jejich nechuť k monarchii je mnoho lidí v zemi, kteří by Ibáñeze následovali, pokud jim to nařídí, a to bude muset udělat." # todo: NEW TRANSLATION
  CHL_introduce_the_franc: "Zavést frank" # todo: NEW TRANSLATION
  CHL_introduce_the_franc_desc: "Chilské peso je slabé, spojeno se starým státem. Měli bychom zavést frank jako náhradu měny pro dobro národa." # todo: NEW TRANSLATION
  CHL_strengthen_control: "Posílit kontrolu" # todo: NEW TRANSLATION
  CHL_strengthen_control_desc: "Musíme znovu převzít kontrolu nad provinciemi od slabomyslných rebelů, kteří nevidí realitu a bojují proti skvělému režimu Antoinea." # todo: NEW TRANSLATION
  CHL_invite_carlist_refugees: "Pozvat karlistické uprchlíky" # todo: NEW TRANSLATION
  CHL_invite_carlist_refugees_desc: "Karelité ve Španělsku jsou nám blízcí jako příznivci monarchie. Vzhledem k tomu, že byli vyhnáni, můžeme získat jejich přízeň tím, že jim nabídneme útočiště." # todo: NEW TRANSLATION
  CHL_expand_the_officer_corps: "Rozšířit důstojnický sbor" # todo: NEW TRANSLATION
  CHL_expand_the_officer_corps_desc: "Mnoho důstojníků loajálních fašistickým nebo socialistickým příčinám opustilo službu. Měli bychom rozšířit sbor a vychovat mladé důstojníky, abychom překonali tento nedostatek." # todo: NEW TRANSLATION
  CHL_the_scouts_monarchist_youth_organization: "Královské skauty" # todo: NEW TRANSLATION
  CHL_the_scouts_monarchist_youth_organization_desc: "Měli bychom založit paramilitární organizaci, která naučí mládež plnit válečné povinnosti, a která může učit lidi způsoby přežití a boje." # todo: NEW TRANSLATION
  CHL_state_catholicism: "Státní katolicismus" # todo: NEW TRANSLATION
  CHL_state_catholicism_desc: "Stará liberální vláda oddělila katolickou církev od státu, což nyní považujeme za veliký hřích. Musíme tuto chybu napravit!" # todo: NEW TRANSLATION
  CHL_invite_french_academia: "Pozvat francouzskou akademii" # todo: NEW TRANSLATION
  CHL_invite_french_academia_desc: "Aby se lidé v naší zemi učili a dosahovali velkých věcí a abychom dosáhli průlomů potřebných pro konkurování na globální úrovni, musíme přizvat francouzskou akademii z pevniny, aby pomohla vzdělávat a organizovat." # todo: NEW TRANSLATION
  CHL_a_new_araucanian_noble_class: "Nová araucanská šlechta" # todo: NEW TRANSLATION
  CHL_a_new_araucanian_noble_class_desc: "I když máme velké množství aristokracie, měli bychom vytvořit programy, které umožní lidem stát se šlechtici výměnou za investice do státu nebo službu ve jménu krále." # todo: NEW TRANSLATION
  CHL_establish_the_royal_mountaineers: "Zřídit královské horské jednotky" # todo: NEW TRANSLATION
  CHL_establish_the_royal_mountaineers_desc: "Jižní Andy jsou definující rys země a horské jednotky jsou elitou, na které stát stojí. Měli bychom tuto organizaci rozšířit a zajistit jim veškeré potřebné vybavení." # todo: NEW TRANSLATION
  CHL_an_imperial_capital: "Impériální hlavní město" # todo: NEW TRANSLATION
  CHL_an_imperial_capital_desc: "Momentálně je naše hlavní město Santiago, stejné jako u starého státu Chile. Mělo by se zvážit, zda není lepší změnit hlavní město na jiné místo." # todo: NEW TRANSLATION
  CHL_an_imperial_capital_tt: "Dostaneme možnost ponechat si §YSantiago§! jako hlavní město a přidat §G2§! stavební sloty nebo přesunout hlavní město do §YTemuco§! a přidat §G4§! stavební sloty." # todo: NEW TRANSLATION
  CHL_satellite_kingdoms: "Satelitní království" # todo: NEW TRANSLATION
  CHL_satellite_kingdoms_desc: "Napoleon Veliký je pro Antoinea velkou inspirací a jeho doktríny inspirovaly státníky po celém světě. Měli bychom tak činit i my a vytvořit menší buffer státy, které umožní místní populaci méně se zabývat svými novými pány." # todo: NEW TRANSLATION
  CHL_secure_the_brazilian_border: "Zajistit hranici s Brazílií" # todo: NEW TRANSLATION
  CHL_secure_the_brazilian_border_desc: "Stát Brazílie je jedním z mála na kontinentu schopných nám stát v cestě. Měli bychom zabezpečit naši hranici s nimi, aby invaze mohla být snadná, až přijde čas." # todo: NEW TRANSLATION
  CHL_a_new_empire_of_brazil: "Nové impérium Brazílie" # todo: NEW TRANSLATION
  CHL_a_new_empire_of_brazil_desc: "Položíme Brazílii pod naši nadvládu a vytvoříme nové Impérium Brazílie, vládnuté novým králem neportugalského původu!" # todo: NEW TRANSLATION
  CHL_ruler_of_the_inca: "Vládce Inky" # todo: NEW TRANSLATION
  CHL_ruler_of_the_inca_desc: "Staré Inkské impérium bylo velké a táhlo se přes velké části And. Měli bychom ho znovu vytvořit, ale pod novým vedením — naším vedením." # todo: NEW TRANSLATION
  CHL_a_french_alliance: "Sjednotit francouzsko mluvící" # todo: NEW TRANSLATION
  CHL_a_french_alliance_desc: "S našimi monarchistickými přáteli ve Francii u moci by bylo moudré hledat s nimi alianci, neboť sdílíme stejné cíle, dědictví a jazyk. Společně jsme neporazitelní." # todo: NEW TRANSLATION
  CHL_return_to_the_continent: "Návrat na kontinent" # todo: NEW TRANSLATION
  CHL_return_to_the_continent_desc: "Ve francouzském systému je slabina, a my ji hodláme využít. Je čas opět se vrátit na kontinent a znovu si nárokovat naše rodiště!" # todo: NEW TRANSLATION
  CHL_joint_invasion_of_mexico: "Společná invaze do Mexika" # todo: NEW TRANSLATION
  CHL_joint_invasion_of_mexico_desc: "Nyní, když máme zajištěnou alianci s novým francouzským impériem, je čas zopakovat to, co se nám kdysi nepodařilo. Impérium Mexika musí znovu vzniknout, jinak podlehneme síle Američanů!" # todo: NEW TRANSLATION
  CHL_claim_the_mexican_throne: "Nárokovat mexický trůn" # todo: NEW TRANSLATION
  CHL_claim_the_mexican_throne_desc: "Mexický trůn kdysi patřil francouzskému císaři, byť jen krátce. Měli bychom toho využít a tvrdit, že jsme jejich potomci připravení převzít zemi na povel." # todo: NEW TRANSLATION
  CHL_the_straight_line: "Kráčet přímou cestou" # todo: NEW TRANSLATION
  CHL_the_straight_line_desc: "Šílenec Antoine III měl svůj čas ve světle reflektorů. Je čas, aby The Straight Line znovu obnovila řád v otčíně a korunovala Ibáñeze novým králem Velkého státu Chile." # todo: NEW TRANSLATION
  CHL_je_suis_le_deluge: "Je Suis Le Deluge" # todo: NEW TRANSLATION
  CHL_je_suis_le_deluge_desc: "Kdysi se říkalo, že jednou přijde potopa, a ten den je nyní. Jsme povodeň, ti, kdo zničí dekadentní světový řád a přinesou novou éru!" # todo: NEW TRANSLATION
  CHL_offer_to_protect_pitcairn: "Nabídnout ochranu ostrovu Pitcairn" # todo: NEW TRANSLATION
  CHL_offer_to_protect_pitcairn_desc: "Současná obrana [270.GetName] je slabší, než bychom chtěli, a otevírá možnost, že naši nepřátelé ostrov obsadí a použijí jako předsunutou základnu k invazi na Velikonoční ostrov a nakonec i do našich vnitřních území. Měli bychom nabídnout ochranu ostrova pro naše bezpečí." # todo: NEW TRANSLATION
  CHL_a_grand_armada: "Velká armáda" # todo: NEW TRANSLATION
  CHL_a_grand_armada_desc: "Stejně jako Velké španělské impérium, z něhož pocházíme, Carlos Ibáñez del Campo touží po velké armádě, dost silné, aby čelila britskému královskému námořnictvu, Američanům i německé vysokomořské flotě najednou — a ať se tak stane!" # todo: NEW TRANSLATION
  CHL_reclaiming_quebec: "Obnovení Québecu" # todo: NEW TRANSLATION
  CHL_reclaiming_quebec_desc: "Naši frankofonní bratři v Québecu musí být osvobozeni z drápů cizího útlaku a měli by být opečováváni jako naši bratři v boji proti anglofonní hegemonii ve světě. Musíme je osvobodit nyní!" # todo: NEW TRANSLATION
  CHL_reclaiming_quebec_tt: "Odemkne rozhodnutí: §YIntegrovat Québec§!" # todo: NEW TRANSLATION
  CHL_work_on_the_pan_american_highway: "Pracovat na Panamerické dálnici" # todo: NEW TRANSLATION
  CHL_work_on_the_pan_american_highway_desc: "Během různých panamerických konferencí v posledních letech jsme se dohodli spolupracovat s našimi bratry v Severní a Jižní Americe na propojení obou amerických kontinentů a dokončení projektu Panamerické dálnice." # todo: NEW TRANSLATION
  working_on_the_pan_american_highway: "Pracuje se na Panamerické dálnici" # todo: NEW TRANSLATION
  BRA_defense_spending: "Zvýšit obranné výdaje" # todo: NEW TRANSLATION
  BRA_defense_spending_desc: "Svět je v plamenech a žádná země se už nemůže cítit bezpečně. Proto bychom měli zvýšit výdaje na obranu národa. Ať už na továrny vyrábějící zbraně, nebo stavbu nových pevností, zajistíme brazilskou suverenitu i kdyby to bylo naše poslední dílo!" # todo: NEW TRANSLATION
  BRA_natal_naval_base: "Zkonstruovat letiště Parnamirim" # todo: NEW TRANSLATION
  BRA_natal_naval_base_desc: "Díky naší nové spolupráci s USA nám nabídli vybudovat letecké základny v naší zemi převážně za jejich finance, výměnou za možnost využití letiště americkým námořnictvem, armádou a RAF pro lety mezi Jižní Amerikou a západní Afrikou." # todo: NEW TRANSLATION
  natal_airbase_modifier: "Umožnit nám používat letiště Parnamirim" # todo: NEW TRANSLATION
  BRA_no_fascism_in_south_america: "Žádný fašismus v Jižní Americe" # todo: NEW TRANSLATION
  BRA_no_fascism_in_south_america_desc: "Jelikož jsme se otevřeně postavili proti fašismu, je na čase jednat proti současným nebezpečím a zabezpečit náš kontinent před tou odpornou ideologií. Ne, [BRA.GetNameDef] není vaše kolonie!" # todo: NEW TRANSLATION
  BRA_no_fascism_in_south_america_tt: "Získat §Y$puppet_wargoal_focus$§! válečný cíl proti všem §Yfašistickým§! státům v §YJižní Americe§!" # todo: NEW TRANSLATION
  BRA_no_communism_in_south_america_tt: "Získat §Y$puppet_wargoal_focus$§! válečný cíl proti všem §Ykomunistickým§! státům v §YJižní Americe§!" # todo: NEW TRANSLATION
  BRA_anti_democracy_in_south_america_tt: "Získat §Y$puppet_wargoal_focus$§! válečný cíl proti všem §Ydemokratickým a nezúčastněným§! státům v §YJižní Americe§!" # todo: NEW TRANSLATION
  BRA_tribunal_de_seguranca_nacional: "Tribunal de Segurança Nacional" # todo: NEW TRANSLATION
  BRA_tribunal_de_seguranca_nacional_desc: "I když Národní osvobozenecké aliance selhal ve svržení naší vlády, její členové dál pochodují po ulicích, plánují a verbují další příležitosti k podkopání státu. Takoví zločinci budou souzeni a trestáni efektivněji zřízením vojenských soudů po dobu stavu nouze." # todo: NEW TRANSLATION
  BRA_ensure_continued_military_support: "Zajistit pokračující vojenskou podporu" # todo: NEW TRANSLATION
  BRA_ensure_continued_military_support_desc: "Udržení podpory armády je životně důležité pro dlouhověkost našeho režimu. Několika sliby mezi státem a vedoucími důstojníky je jistě přesvědčí k naší věci." # todo: NEW TRANSLATION
  BRA_work_with_the_integralists: "Spolupracovat s integralisty" # todo: NEW TRANSLATION
  BRA_work_with_the_integralists_desc: "Cíle integralistického hnutí jsou do velké míry v souladu s našimi, proto může být moudré získat jejich podporu k posílení našeho režimu proti dalším komunistickým povstáním. S jejich paramilitárními silami a hlubokým nacionalismem budou předvojem kontrarevoluce." # todo: NEW TRANSLATION
  BRA_estado_moderno: "Estado Moderno" # todo: NEW TRANSLATION
  BRA_estado_novo_desc: "Po letech na pokraji občanské války můžeme konečně prolomit léta politického patu a postavit nový stát založený na míru, spravedlnosti a práci. Mezitím budeme pokračovat v vymýcení těch, kdo nový řád ohrožují." # todo: NEW TRANSLATION
  BRA_estado_moderno_tt: "§Y$BRA_getulio_vargas$§! se stává lídrem §Y$BRA_fascism_party_long$§!" # todo: NEW TRANSLATION
  BRA_estado_moderno_tt_desc: "" # todo: NEW TRANSLATION
  BRA_estado_novo: "Estado Novo" # todo: NEW TRANSLATION
  BRA_estado_moderno_desc: "S rozprášenými a poraženými domácími nepřáteli nastal čas setřít staré politické uspořádání a vyhlásit moderní stát schopný zajistit dlouhodobý mír a stabilitu pro [BRA.GetName]." # todo: NEW TRANSLATION
  BRA_cohen_plan: "Plán Cohena" # todo: NEW TRANSLATION
  BRA_cohen_plan_desc: "S blížícími se volbami a klesající podporou mezi voliči musíme zajistit pokračování našeho režimu jinými prostředky. Tím, že sestrojíme plán na další komunistický převrat, můžeme oživit podporu a zároveň pozastavit volby kvůli národní bezpečnosti." # todo: NEW TRANSLATION
  BRA_cohen_plan_tt: "Odemkne misi §Y$BRA_execute_the_cohen_plan$§!, kterou je třeba dokončit do 100 dnů od dokončení tohoto fokusu. Dokonění mise vyžaduje dokončení fokusu §Y$BRA_estado_novo$§! nebo §Y$BRA_estado_moderno$§!. §RNedokončení mise povede k puči!§!" # todo: NEW TRANSLATION
  BRA_the_polaca: "Polaca" # todo: NEW TRANSLATION
  BRA_the_polaca_desc: "I když už zbývá jen málo těch, kteří by mohli představovat vážnou hrozbu pro náš režim, zvýší naši legitimitu sepsání nové ústavy vymezující pravomoci prezidenta. Můžeme čerpat inspiraci z nedávno schválené polské ústavy." # todo: NEW TRANSLATION
  BRA_anaue: "Anauê!" # todo: NEW TRANSLATION
  BRA_anaue_desc: "Naše hnutí přijalo frázi Tupi 'Anauê' jako válečný pokřik. Fráze ztělesňuje bratrství členů a jejich neochvějnou loajalitu k ochraně národa. Anauê!" # todo: NEW TRANSLATION
  BRA_anaue_tt: "Odemkne rozhodnutí k verbování integralistických milicí v státech po dokončení tamních shromáždění. \nNaverbuje nového generála s vlastností §Y$militias_officer$§!: \n Milice Obrana §Z+5%§! \n Rychlost Milic §Z+5%§! \n Organizace Milic §Z+5%§!" # todo: NEW TRANSLATION
  BRA_autarky: "Brazilská autarkie" # todo: NEW TRANSLATION
  BRA_autarky_desc: "Ekonomické otřesy po krachu na Wall Street zasáhly naši ekonomiku a zničily ji. Od spotřeby kávy po výrobu oceli musíme být soběstační ve všem a izolovat se od budoucích zahraničních krizí." # todo: NEW TRANSLATION
  BRA_corporatism: "Přijmout korporativismus" # todo: NEW TRANSLATION
  BRA_corporatism_desc: "Spor mezi prací a kapitalisty poškozoval [BRA.GetAdjective] ekonomiku příliš dlouho. Abychom tomu čelili, uvedeme nový ekonomický model založený na korporativistických politikách, jaké vidíme v mnoha úspěšných evropských zemích." # todo: NEW TRANSLATION
  BRA_departamendo_de_propaganda: "Departamento de Propaganda" # todo: NEW TRANSLATION
  BRA_departamendo_de_propaganda_desc: "Poslední dekáda politického zmatku ukázala, co se stane, když vláda a lidé nejsou v souladu. Abychom zabránili dalším nepokojům, založíme oddělení propagandy, které lid nasměruje k našim politikám." # todo: NEW TRANSLATION
  BRA_departamento_de_ordem_politica_e_social: "Departamento de Ordem Política e Social" # todo: NEW TRANSLATION
  BRA_departamento_de_ordem_politica_e_social_desc: "Propaganda a nátlak nestačí odradit nejoddanější radikály nebo zahraniční agenty od aktivit škodlivých státu. Potřebujeme novou tajnou policii k vyšetřování takových hrozeb." # todo: NEW TRANSLATION
  BRA_collective_bargaining: "Kolektivní vyjednávání" # todo: NEW TRANSLATION
  BRA_collective_bargaining_desc: "" # todo: NEW TRANSLATION
  BRA_cooperation_in_the_americas: "Politika dobrého souseda" # todo: NEW TRANSLATION
  BRA_cooperation_in_the_americas_desc: "Rooseveltova 'politika dobrého souseda' zůstává vlivná na západní polokouli. Měli bychom tuto politiku přijmout a usilovat o spolupráci s americkými národy místo vzájemného vměšování se do záležitostí." # todo: NEW TRANSLATION
  BRA_tech_slot_1: "Universidade de São Paulo" # todo: NEW TRANSLATION
  BRA_tech_slot_1_desc: "Universidade de São Paulo byla zřízena teprve nedávno, ale její přínosy jsou již cítit v celé [BRA.GetAdjective] ekonomice. Měli bychom do této rostoucí instituce více investovat." # todo: NEW TRANSLATION
  BRA_reject_cosmopolitanism: "Odmítnout kosmopolitismus" # todo: NEW TRANSLATION
  BRA_reject_cosmopolitanism_desc: "Nedávný trend kosmopolitismu není nic jiného než trojský kůň pro komunistický vliv v naší velké zemi. Jsme [BRA.GetAdjective] a musíme bránit naši kulturu a ideály, než budou zničeny." # todo: NEW TRANSLATION
  BRA_ban_political_parties: "Zakázat politické strany" # todo: NEW TRANSLATION
  BRA_ban_political_parties_desc: "Politické strany se ukázaly být nástrojem rozdělení a neklidu. Zakázáním a zrušením jich můžeme omezit schopnost radikálů organizovat se proti nám." # todo: NEW TRANSLATION
  BRA_decree_no_37: "Výnos číslo 37" # todo: NEW TRANSLATION
  BRA_decree_no_37_desc: "Předchozí režim byl prolezlý korupcí a vnitřními hádkami kvůli tomu, že některé státy měly nepřiměřený vliv na národní politiku. Musíme potlačit regionalismus a soustředit moc v národní vládě." # todo: NEW TRANSLATION
  BRA_establish_psad: "Zřídit DASP" # todo: NEW TRANSLATION
  BRA_establish_psad_desc: "Státní stroj, který umožňuje provádět vládní politiky, je zastaralý. Zřídíme Departamento Administrativo do Serviço Público (DASP), aby nám pomohl efektivněji spravovat stát a udržovat ekonomickou efektivnost." # todo: NEW TRANSLATION
  BRA_federal_employment_plan: "Federální plán zaměstnanosti" # todo: NEW TRANSLATION
  BRA_federal_employment_plan_desc: "Masová nezaměstnanost povede k pokračujícímu radikalismu a násilí. Abychom tomu zabránili, rozšíříme příležitosti zaměstnání vytvořením státem řízených průmyslů a nových infrastrukturních projektů." # todo: NEW TRANSLATION
  BRA_secure_our_borders: "Zabezpečit naše hranice" # todo: NEW TRANSLATION
  BRA_secure_our_borders_desc: "Jsme obklopeni nepřáteli za hranicemi, kteří chtějí izolovat a zničit naši velkou zemi. S domácí situací pod kontrolou je čas obrátit pozornost k zahraničí a provést manévry k zajištění naší národní bezpečnosti." # todo: NEW TRANSLATION
  BRA_ethical_internationalism: "Etický internacionalismus" # todo: NEW TRANSLATION
  BRA_ethical_internationalism_desc: "Ani nejsilnější národ nemůže vytvořit a dodat vše svému lidu. Abychom zajistili mír a prosperitu, měli bychom budovat zahraniční politiku na vzájemně prospěšných ekonomických partnerstvích s podobně smýšlejícími státy." # todo: NEW TRANSLATION
  BRA_brazil_integral: "Brazil Integral" # todo: NEW TRANSLATION
  BRA_brazil_integral_desc: "Trvalo to roky, ale konečně jsme upevnili naši kontrolu nad národem a odstranili poslední pozůstatky rozvratného starého republikánského pořádku." # todo: NEW TRANSLATION
  BRA_in_vargas_we_trust: "Věříme Vargasovi" # todo: NEW TRANSLATION
  BRA_in_vargas_we_trust_desc: "$BRA_getulio_vargas$ se ukázal jako schopný politik, který dokáže ustát bouře vedení. Dále se ukázal jako moudrý vůdce přijetím našich stranických politik. Mnozí v straně nyní věří, že je předurčen pozvednout národ na věčné výšiny." # todo: NEW TRANSLATION
  BRA_departamento_feminino: "Departamento Feminino" # todo: NEW TRANSLATION
  BRA_departamento_feminino_desc: "Je nespočet žen, které jsou stejně vlastenecké a věrné jako jejich manželé a otcové. Měli bychom jim dát příležitost podílet se na našem hnutí a společně pracovat na obnovení [BRA.GetAdjective] velikosti." # todo: NEW TRANSLATION
  BRA_integrity_of_the_fatherland: "Pro vlast" # todo: NEW TRANSLATION
  BRA_integrity_of_the_fatherland_desc: "$BRA_getulio_vargas$ byl užitečným politickým spojencem, ale zajímá ho pouze moc a není pravým integralistou. S naší širokou podporou napříč národem bychom měli učinit krok a sesadit prezidenta a dosadit skutečného věřícího, jako je $BRA_plinio_salgado$." # todo: NEW TRANSLATION
  BRA_no_communism_in_south_america: "Žádný komunismus v Jižní Americe" # todo: NEW TRANSLATION
  BRA_no_communism_in_south_america_desc: "Komunistům nelze věřit, jak jsme se přesvědčili při pokusu o revoluci v roce 1935, kterou jsme spravedlivě potlačili. Abychom zajistili budoucnost národa, musíme se postarat o blízké zahraniční subverzivní prvky co nejdříve!" # todo: NEW TRANSLATION
  BRA_defense_of_the_fatherland: "Obrana vlasti" # todo: NEW TRANSLATION
  BRA_defense_of_the_fatherland_desc: "Naše ambice dalece přesahují současné hranice, ale musíme zajistit, že nikdo nemůže ohrozit naše domovské území. Viva o Brasil!" # todo: NEW TRANSLATION
  BRA_german_subs: "Program vývoje německých ponorek" # todo: NEW TRANSLATION
  BRA_german_subs_desc: "Sblížení s Němci nám umožnilo využít jejich technologie v oblastech, kde jsme se dosud nedařilo modernizovat, a jednou z těchto oblastí je ponorková válka. Využijeme našich nových spojenců a ovládneme rovinu Kapverdy!" # todo: NEW TRANSLATION
  BRA_german_sub_initiative: "Výměna informací o německých ponorkách" # todo: NEW TRANSLATION
  BRA_german_tanks: "Získat německé tanky" # todo: NEW TRANSLATION
  BRA_german_tanks_desc: "Díky spojení s Němci můžeme snadněji získat nejen plány a detaily k výzkumu a výrobě tanků podobných panzerům, ale také je od nich snadno nakoupit. Fumující kobry budou šířit strach v srdcích našich nepřátel!" # todo: NEW TRANSLATION
  BRA_german_tanks_tt: "Získat §Y200§! [GER.GetAdjective] §YPanzer IV Ausf. A - Střední tanky§!" # todo: NEW TRANSLATION
  BRA_German_tank_exchange: "Výměna informací o německých tancích" # todo: NEW TRANSLATION
  BRA_italian_trucks: "Společný italský motorový vývoj" # todo: NEW TRANSLATION
  BRA_italian_trucks_desc: "Měli bychom usilovat nejen o získání italské odbornosti na vývoj a výrobu moderních motorových vozidel, ale také zadat objednávku a požádat o okamžité dodání italských nákladních vozů." # todo: NEW TRANSLATION
  BRA_italian_trucks_mio_tt: "Odemkne §Y$ITA_fiat_organization$§! Vojensko-průmyslovou organizaci." # todo: NEW TRANSLATION
  BRA_italian_air_mio_tt: "Odemkne §Y$ITA_fiat_aviazione_organization$§! Vojensko-průmyslovou organizaci." # todo: NEW TRANSLATION
  BRA_ford_mio_tt: "Odemkne §Y$USA_ford_motor_company_organization$§! Vojensko-průmyslovou organizaci." # todo: NEW TRANSLATION
  BRA_italian_truck_exchange: "Italská výměna informací o nákladních vozech" # todo: NEW TRANSLATION
  BRA_italian_aircraft: "Italský program vývoje letadel" # todo: NEW TRANSLATION
  BRA_italian_aircraft_desc: "Spolupráce s Italy nám umožnila využít jejich technologie v oblastech, kde jsme měli potíže s modernizací, jednou z těchto oblastí je letadlový průmysl. S italskou technologií ovládneme nebe Jižní Ameriky!" # todo: NEW TRANSLATION
  BRA_Italian_plane_exchange: "Italská výměna informací o letadlech" # todo: NEW TRANSLATION
  BRA_support_rural_folk: "Otec chudých" # todo: NEW TRANSLATION
  BRA_support_rural_folk_desc: "[BRA.GetAdjective] žijící na venkově byli dekády politiky opomíjeni. Investicí do těchto oblastí zvýšíme zaměstnanost a infrastrukturu a zároveň získáme podporu velké demografické skupiny." # todo: NEW TRANSLATION
  BRA_support_the_landowners: "Podpořit vlastníky plantáží" # todo: NEW TRANSLATION
  BRA_support_the_landowners_desc: "Globální poptávka po cukru dlouhodobě rostla, což vedlo k vrstvě bohatých půdních vlastníků v [ROOT.GetNonIdeologyName], známých jako 'Sugar Barons'. Měli bychom se je snažit získat zastavením výzev k zemědělské reformě mezi rolníky." # todo: NEW TRANSLATION
  BRA_washington_accords: "Dohody [USA.Capital.GetCapitalVictoryPointName]" # todo: NEW TRANSLATION
  BRA_washington_accords_desc: "Výměnou za americká vojenská záruky nasměrujeme naši ekonomiku na výrobu válečného materiálu, abychom je podpořili v obraně našich společných hodnot." # todo: NEW TRANSLATION
  BRA_washington_accords_tt: "Pokud [USA.GetNameDef] souhlasí s dohodami:" # todo: NEW TRANSLATION
  BRA_disrupt_operation_bolivar: "Narušit operaci Bolívar" # todo: NEW TRANSLATION
  BRA_disrupt_operation_bolivar_desc: "Národy starého světa dlouho zasahovaly do záležitostí Jižní Ameriky. Kde dříve posílaly vojáky a bitevní lodě, nyní posílají zpravodajské agenty. Nemůžeme už nad tím přejít a musíme tyto operace v našich hranicích vystopovat." # todo: NEW TRANSLATION
  BRA_potenji_river_conference: "Konference u řeky Potenji" # todo: NEW TRANSLATION
  BRA_potenji_river_conference_desc: "Přípravy ekonomiky na válku stály mnoho úsilí, ale nastal čas připojit se k našim [USA.GetAdjective] spojencům a plně se zapojit do obrany západní polokoule, i když to bude vyžadovat řešení hrozeb po celém světě." # todo: NEW TRANSLATION
  BRA_potenji_river_conference_tt: "§Y[ROOT.GetFlag][ROOT.GetNameDefCap] se připojí do stejné frakce jako [USA.GetFlag][USA.GetNameDef]§! §R\nTo nás také donutí vyhlásit válku jakýmkoli současným [USA.Getflag][USA.GetAdjective] nepřátelům!§!" # todo: NEW TRANSLATION
  BRA_smoking_cobras: "Cobras Fumantes" # todo: NEW TRANSLATION
  BRA_smoking_cobras_desc: "Mnozí říkali, že je pravděpodobnější, že had zapálí dýmku, než že se naše síly dostanou na frontu. Nyní naši nepřátelé bojí houževnatost a dovednosti vojáků, kteří si přivlastnili tento název jako znak cti." # todo: NEW TRANSLATION
  BRA_senta_a_pua: "Senta a Púa!" # todo: NEW TRANSLATION
  BRA_senta_a_pua_desc: "Naši piloti si údajně vyvinuli bojový pokřik, který jim umožňuje soustředit nemilosrdnou zuřivost a oddanost vítězství do jediné fráze. Senta a Púa!" # todo: NEW TRANSLATION
  BRA_reach_out_to_our_neighbors: "Oslovit sousedy" # todo: NEW TRANSLATION
  BRA_org_american_states_faction: "Organizace amerických států" # todo: NEW TRANSLATION
  BRA_reach_out_to_our_neighbors_desc: "Dlouho jsme byli izolováni od sousedů, protože jsme jediná portugalsky mluvící země na kontinentu. Možná je čas se k nim přiblížit a navázat lepší vztahy místo podezřívavosti." # todo: NEW TRANSLATION
  BRA_rio_conference: "Rio protokol" # todo: NEW TRANSLATION
  BRA_rio_conference_desc: "Nedávné konflikty zhoršily dlouhodobé hraniční spory v našem regionu. Než se spory dál vyostří, měly by se jihoamerické státy sejít a vyřešit je diplomaticky." # todo: NEW TRANSLATION
  BRA_organization_of_american_unity: "Organizace americké jednoty" # todo: NEW TRANSLATION
  BRA_organization_of_american_unity_desc: "Naše domácí politika byla v posledních letech úspěšná, nyní je čas obrátit pozornost k zahraničí a podpořit spolupráci přes hemisféru prostřednictvím Organizace americké jednoty." # todo: NEW TRANSLATION
  BRA_organization_of_american_unity_tt: "Odemkne rozhodnutí §YZvést pozvánky do Organizace amerických států§! k pozvání jiných zemí do nadnárodní organizace." # todo: NEW TRANSLATION
  BRA_org_american_unity_warning_tt: "§RČlenské státy organizace budou vyzvány k obraně každého člena, který je napaden. Neposkytnutí pomoci, nebo vyhlášení války členu, povede k vyloučení z organizace!§!" # todo: NEW TRANSLATION
  BRA_financial_stimulation_tt: "Rozhodnutí umožňují zvýšit §Ylokální rychlost výstavby§!, §Ymax továrny§! a §Ylokální dostupné zdroje§! na venkovských státech o §Z20%§!" # todo: NEW TRANSLATION
  BRA_coffee_crisis_aftermath: "Následky kávové krize" # todo: NEW TRANSLATION
  BRA_coffee_crisis_aftermath_desc: "Velká hospodářská krize zdevastovala brazilskou ekonomiku kvůli nadměrné závislosti na vývozu, hlavně kávy. Ačkoli byly učiněny kroky k nápravě, je na nás to dokončit. Oživíme průmysl a staneme se ekonomickou silou kontinentu." # todo: NEW TRANSLATION
  BRA_radio_nacional: "Radio Nacional" # todo: NEW TRANSLATION
  BRA_radio_nacional_desc: "Mnoho států zakládá národní vysílací instituce, aby poskytly faktický obsah a zábavu masám. Nechceme zaostávat a založíme naše vlastní Radio Nacional." # todo: NEW TRANSLATION
  BRA_desenvolvimentismo: "Desenvolvimento" # todo: NEW TRANSLATION
  BRA_desenvolvimentismo_desc: "Chceme-li lidi opět zaměstnat a zvýšit exporty, musíme naštartovat růst ekonomiky. Uděláme to vytvořením nových odvětví a umožněním lepšího přístupu k finančním službám." # todo: NEW TRANSLATION
  BRA_promote_resource_extraction: "Podpořit těžbu zdrojů" # todo: NEW TRANSLATION
  BRA_promote_resource_extraction_desc: "Náš národ je požehnán bohatými přírodními zdroji. Abychom podpořili ekonomický růst a nezávislost, investujeme do moderní těžební techniky." # todo: NEW TRANSLATION
  BRA_companhia_siderurgica_nacional: "Companhia Siderúrgica Nacional" # todo: NEW TRANSLATION
  BRA_companhia_siderurgica_nacional_desc: "Ocel je klíčová surovina v mnoha odvětvích, ale naše domácí produkce nestačí. Založíme státní národní ocelářskou společnost s moderními technologiemi místo dovozu ze zahraničí." # todo: NEW TRANSLATION
  BRA_stimulate_the_civilian_economy: "Stimulovat civilní ekonomiku" # todo: NEW TRANSLATION
  BRA_stimulate_the_civilian_economy_desc: "Domácí výroba zboží je nedostatečná, což vede k odlivu peněz za dovoz. Musíme to omezit rozšířením vlastního průmyslu." # todo: NEW TRANSLATION
  BRA_domestic_arms_industry: "Domácí zbrojní průmysl" # todo: NEW TRANSLATION
  BRA_domestic_arms_industry_desc: "Mezinárodní situace je napjatá a hlavní zbrojní země omezují export. Rychle vyvineme vlastní zbrojní průmysl, abychom udrželi armádu plně zásobenou." # todo: NEW TRANSLATION
  BRA_war_production: "Válečná výroba" # todo: NEW TRANSLATION
  BRA_war_production_desc: "Plameny války se šíří. Pokud dorazí sem, musíme umět rychle přepnout továrny z výroby aut a toustovačů na tanky a bomby." # todo: NEW TRANSLATION
  BRA_deal_with_the_cangaceiro: "Postavit se Cangaçu" # todo: NEW TRANSLATION
  BRA_establish_trade_relationships: "$CHL_establish_trade_relationships$" # todo: NEW TRANSLATION
  BRA_establish_trade_relationships_desc: "$CHL_establish_trade_relationships_desc$" # todo: NEW TRANSLATION
  BRA_reach_out_to_the_great_powers: "$ARG_reach_out_to_the_great_powers$" # todo: NEW TRANSLATION
  BRA_reach_out_to_the_great_powers_desc: "$ARG_reach_out_to_the_great_powers_desc$" # todo: NEW TRANSLATION
  BRA_deal_with_the_cangaceiro_desc: "Cangaço jsou nic než bandité, kteří nám dlouho byli trnem v oku. Je čas odstraniti tento trn z severu jednou provždy." # todo: NEW TRANSLATION
  BRA_deal_with_the_cangaceiro_tt: "Odemknout rozhodnutí §Y$BRA_deal_with_the_cangaceiro$§! k eliminaci Cangaço ve zasažených státech." # todo: NEW TRANSLATION
  BRA_consolidation_of_labor_laws: "Konsolidace pracovního práva" # todo: NEW TRANSLATION
  BRA_consolidation_of_labor_laws_desc: "Naše pracovní zákony nabízejí malou ochranu dělníkům, což vede ke sporům a stávkám. V tak nebezpečné době si nemůžeme dovolit stávky nebo riziko bolševického vniknutí. Konsolidujeme zákony a najdeme rovnováhu mezi dělníky a kapitalisty." # todo: NEW TRANSLATION
  BRA_consolidation_of_labor_laws_fallback_tt: "V závislosti na dřívějších volbách fokusů upraví buď §Y$BRA_estado_novo_modifier$§! nebo §Y$BRA_estado_moderno_modifier$§! národní duch takto:" # todo: NEW TRANSLATION
  BRA_promote_immigration_to_brazil: "Podporovat imigraci" # todo: NEW TRANSLATION
  BRA_promote_immigration_to_brazil_desc: "[BRA.GetName] je rozmanitý národ s obyvatelstvem z celého světa. S rostoucí ekonomikou a bohatými zdroji je čas vyzvat více lidí, aby sem přišli a stali se [BRA.GetAdjective]." # todo: NEW TRANSLATION
  BRA_promote_immigration_to_brazil_tt: "Odemkne rozhodnutí §Y$JUNO_promote_immigration_cat$§! pro zlepšení států." # todo: NEW TRANSLATION
  BRA_pact_of_silence: "Pakt ticha" # todo: NEW TRANSLATION
  BRA_pact_of_silence_desc: "Národy vznikají a zanikají. S pádem mnoha z nich je přebytek odborníků hledajících bezpečnější pobřeží. Možná pomineme jejich původ, pokud budeme mít prospěch z jejich odbornosti." # todo: NEW TRANSLATION
  BRA_national_petroleum_council: "Národní rada pro ropu" # todo: NEW TRANSLATION
  BRA_national_petroleum_council_desc: "Od traktorů na polích po bitevní lodě je ropa životní silou moderních strojů. Závislost na tomto zdroji ohrožuje národní bezpečnost. Zřídíme národní radu pro dohled nad objevováním a těžbou domácí ropy." # todo: NEW TRANSLATION
  BRA_batalha_do_borracha: "Bitva o kaučuk" # todo: NEW TRANSLATION
  BRA_batalha_do_borracha_desc: "[BRA.GetNameDefCap] kdysi dominovalo globální nabídce kaučuku, dokud [ENG.GetAdjective] nevytvořili rozsáhlé plantáže ve svém impériu. S ohroženými zásobovacími cestami svět opět hledí na nás jako na dodavatele tohoto cenného zdroje." # todo: NEW TRANSLATION
  BRA_invest_in_road_infrastructure: "Investovat do silniční infrastruktury" # todo: NEW TRANSLATION
  BRA_invest_in_road_infrastructure_desc: "Automobily a nákladní vozy jsou stále důležitější pro ekonomický rozvoj. Naše silniční sítě však nejsou dostatečně rozvinuté pro masové používání vozidel. Musíme investovat do masivního programu výstavby dálnic dříve, než ekonomika ucítí škrt." # todo: NEW TRANSLATION
  BRA_invest_in_railways: "Investovat do železnic" # todo: NEW TRANSLATION
  BRA_invest_in_railways_desc: "Vlaky zůstávají nejhospodárnějším způsobem hromadné přepravy osob a zboží na velké vzdálenosti. Měli bychom investovat do rozšíření a modernizace sítě a vyvíjet vlastní vlaky." # todo: NEW TRANSLATION
  BRA_invest_in_ports: "Investovat do přístavů" # todo: NEW TRANSLATION
  BRA_invest_in_ports_desc: "Učinili jsme velké pokroky ve vnitrostátní zásobování ekonomiky a můžeme se opět obrátit k exportu jako zdroji růstu. K tomu musíme investovat do hlavních národních přístavů." # todo: NEW TRANSLATION
  BRA_fabrica_nacional_de_motores: "Fábrica Nacional de Motores" # todo: NEW TRANSLATION
  BRA_fabrica_nacional_de_motores_desc: "Automobilová průmysl je komplexní a dovoz vozidel je drahý. Nejlepší prevencí je vyvinout vlastní domácí výrobu motorových vozidel." # todo: NEW TRANSLATION
  BRA_expand_fordlandia: "Rozšířit Fordlandia" # todo: NEW TRANSLATION
  BRA_expand_fordlandia_desc: "Ford Motor Company investovala do osady v Amazonii, která měla sloužit jako průmyslová základna pro výrobu kaučuku. Projekt uvadl, ale může být čas projekt znovu nastartovat." # todo: NEW TRANSLATION
  BRA_fordlandia_name: "Fordlandia" # todo: NEW TRANSLATION
  BRA_banco_do_brasil: "Banco do Brasil" # todo: NEW TRANSLATION
  BRA_banco_do_brasil_desc: "Výhody centrální banky, která emituje a kontroluje měnovou nabídku, jsou po velké depresi zřejmé. Banco do Brasil fungoval jako taková instituce dlouho, ale je čas to formalizovat." # todo: NEW TRANSLATION
  BRA_federal_development: "[BRA_federal_development_key]" # todo: NEW TRANSLATION
  BRA_imperial_development_key: "Imperiální rozvoj" # todo: NEW TRANSLATION
  BRA_wealth_redistribution_key: "Přerozdělení bohatství" # todo: NEW TRANSLATION
  BRA_land_reform_key: "Zemědělská reforma" # todo: NEW TRANSLATION
  BRA_federal_development_key: "Federální rozvoj" # todo: NEW TRANSLATION
  BRA_federal_development_desc: "Ekonomický rozvoj musí být rozložen po celé zemi, aby všichni mohli sklízet plody své práce. Potřebujeme diverzifikovat nejen komodity, ale i jejich lokace." # todo: NEW TRANSLATION
  BRA_centralize_development: "Založit nové hlavní město" # todo: NEW TRANSLATION
  BRA_centralize_development_desc: "Naše současné hlavní město je příliš vzdálené od odlehlých regionů, což vede k nespokojenosti a separatismu. Abychom měli obě výhody, založíme nové hlavní město v srdci národa, přístupnější všem." # todo: NEW TRANSLATION
  BRA_new_capital: "Brasília" # todo: NEW TRANSLATION
  BRA_centralize_development_tt: "Nové hlavní město se bude jmenovat §Y'$BRA_new_capital$'§!" # todo: NEW TRANSLATION
  BRA_financial_stimulation: "Finanční stimulace" # todo: NEW TRANSLATION
  BRA_financial_stimulation_desc: "Položili jsme základy silné ekonomiky vytvořením průmyslů a infrastrukturních projektů. Abychom udrželi růst, stačí zatáhnout za páky centrální banky a národních podniků." # todo: NEW TRANSLATION
  BRA_resource_extraction_bonus: "Bonus těžby surovin" # todo: NEW TRANSLATION
  BRA_oil_industry_bonus: "Bonus ropného průmyslu" # todo: NEW TRANSLATION
  BRA_industry_bonus: "Bonus stimulace ekonomiky" # todo: NEW TRANSLATION
  BRA_electronics_bonus: "Bonus elektroniky" # todo: NEW TRANSLATION
  BRA_invest_in_railways_bonus: "Bonus železnic" # todo: NEW TRANSLATION
  BRA_nacional_de_motores_bonus: "Bonus Nacional de Motores" # todo: NEW TRANSLATION
  BRA_boost_integralist_support_tt: "Odemkne rozhodnutí §YIntegralist Rally§! k posílení podpory fašismu ve větších městech." # todo: NEW TRANSLATION
  BRA_domination_of_the_americas: "Dominance Amerik" # todo: NEW TRANSLATION
  BRA_domination_of_the_americas_desc: "Nikdy nebudeme zcela bezpeční s tolika nepřáteli po našem boku. Jediná cesta ke [BRA.GetAdjective] spáse je stát se nepopiratelnou mocí regionu." # todo: NEW TRANSLATION
  BRA_berlin_accords: "Zřídit Berlínské dohody" # todo: NEW TRANSLATION
  BRA_berlin_accords_desc: "[USA.GetNameDefCap] dlouho zasahoval do záležitostí Amerik. Sblížením s [GER.GetNameDef] získáme strategický odstrašující prostředek proti budoucímu [USA.GetAdjective] vměšování do našich záležitostí." # todo: NEW TRANSLATION
  BRA_accords_tt: "Pokud souhlasí ke spolupráci:" # todo: NEW TRANSLATION
  faction_name_bra_ger: "Berlín-Rio pakt" # todo: NEW TRANSLATION
  faction_name_bra_ita: "Řím-Rio pakt" # todo: NEW TRANSLATION
  BRA_expand_operation_bolivar: "Rozšířit operaci Bolívar" # todo: NEW TRANSLATION
  BRA_expand_operation_bolivar_desc: "Němci provádějí rozsáhlou zpravodajskou operaci v Jižní Americe, sledují ekonomickou a politickou aktivitu. Byli jsme požádáni, abychom jim pomohli operaci rozšířit výměnou za zvýšenou inteligentní spolupráci." # todo: NEW TRANSLATION
  BRA_guyana_crisis: "Krize v Guyaně" # todo: NEW TRANSLATION
  BRA_guyana_crisis_desc: "S pozorností evropských velmocí jinde ve světě máme příležitost donutit je, aby přenesly svá území v Guianách na nás, nebo čelit dalšímu bojišti." # todo: NEW TRANSLATION
  BRA_provoke_argentina: "Provokovat Argentinu" # todo: NEW TRANSLATION
  BRA_provoke_argentina_desc: "Je jasné, že [ARG.GetName] chce nás izolovat a zničit, ale pokud budeme jednat příliš unáhleně, můžeme si získat hněv [USA.GetName]. Místo toho vyprovokujeme [ARG.GetAdjective] k prvnímu výstřelu a konečně se pomstíme za válku Cisalpinu!" # todo: NEW TRANSLATION
  BRA_form_mercosul: "Vytvořit Mercosul" # todo: NEW TRANSLATION
  BRA_faction_mercosul_name: "Mercosul" # todo: NEW TRANSLATION
  BRA_form_mercosul_desc: "Jižní Amerika byla dlouho pod vlivem vnějších mocností jako [USA.GetName] či evropská impéria. Ale pokud se státy kontinentu spojí do jednoho ekonomického a politického bloku, nikdo si tu nebude troufat zasahovat." # todo: NEW TRANSLATION
  BRA_form_mercosul_focus_tt: "Odemkne rozhodnutí pozvat ostatní jihoamerické státy do Mercosul" # todo: NEW TRANSLATION
  BRA_uruguay_ultimatum: "Uruguayský ultimátum" # todo: NEW TRANSLATION
  BRA_uruguay_ultimatum_desc: "[URG.GetNameDefCap] mělo být začleněno do [BRA.GetName] dávno, ale naši předkové to neudělali. Je čas napravit tuto historickou chybu a sjednotit náš lid za společnou věc." # todo: NEW TRANSLATION
  BRA_paraguay_intervention: "Zásah v Paraguayi" # todo: NEW TRANSLATION
  BRA_paraguay_intervention_desc: "[PAR.GetNameDefCap] se stalo příliš nestabilním a nepředvídatelným. Pro naši národní bezpečnost musíme zasáhnout a stabilizovat jejich vládu." # todo: NEW TRANSLATION
  BRA_rome_accords: "Zřídit římské dohody" # todo: NEW TRANSLATION
  BRA_rome_accords_desc: "Máme dlouhé silné vazby s [ITA.GetName] vzhledem k historické migraci z tamté země do [BRA.GetName]. Jak se svět mění a vlády se sblížily, je rozumné formalizovat partnerství." # todo: NEW TRANSLATION
  BRA_italian_car_industry: "Spolupráce s italským automobilovým průmyslem" # todo: NEW TRANSLATION
  BRA_italian_car_industry_desc: "Náš automobilový průmysl je v plenkách, zatímco přátelé v [ITA.GetName] mají velký a úspěšný automobilový průmysl. Možná je čas je požádat o radu, jak zlepšit naše začínající firmy." # todo: NEW TRANSLATION
  BRA_penal_battalions: "Batalhões de Presos" # todo: NEW TRANSLATION
  BRA_penal_battalions_desc: "Mnozí v ozbrojených silách nejsou nadšeni bojovat za monarchii, která byla v exilu desetiletí. Využitím zákonů národní bezpečnosti jsme vytvořili přebytek vězňů, které můžeme nasadit do trestních praporů, čímž posílíme naše demoralizované konvenční síly." # todo: NEW TRANSLATION
  BRA_penal_battalions_tt: "Vytvoří šablonu divize známou jako §YBatalhões de Presos§!, která využívá trestní prapory. Také získáte §Y6 jednotek§! v §Y[ROOT.Capital.GetCapitalVictoryPointName]§!." # todo: NEW TRANSLATION
  BRA_end_the_state_of_emergency: "Ukončit stav nouze" # todo: NEW TRANSLATION
  BRA_end_the_state_of_emergency_desc: "Kdysi hrdinný [BRA.GetLeader] je nyní největší hrozbou pro [BRA.GetAdjective] demokracii. Jeho touha po moci a oportunismus prakticky suspendovaly práva, která jsme si vybojovali. Kdo si cení svobody, musí proti tomuto nebezpečnému stavu vystoupit." # todo: NEW TRANSLATION
  BRA_repeal_the_national_security_law: "Zrušit zákony o národní bezpečnosti" # todo: NEW TRANSLATION
  BRA_repeal_the_national_security_law_desc: "Hrozba další oportunistické prezidentovy moci bude přítomna, pokud nezrušíme zákony o národní bezpečnosti, které $BRA_getulio_vargas$ využil během stavu nouze." # todo: NEW TRANSLATION
  BRA_greater_federalism: "Větší federalismus" # todo: NEW TRANSLATION
  BRA_greater_federalism_desc: "Centralizace politické moci je neslučitelná s našimi demokratickými hodnotami. Musíme zlomit sevření politické elity v [ROOT.Capital.GetCapitalVictoryPointName] a vrátit moc státům republiky." # todo: NEW TRANSLATION
  BRA_democratic_socialism: "Demokratický socialismus" # todo: NEW TRANSLATION
  BRA_democratic_socialism_desc: "Neúspěšná Intentona Comunista z roku 1935 a následující stav nouze donutil mnoho levicových politiků a aktivistů uprchnout nebo jít do podzemí. S pevnou demokracií mají demokratickí socialisté konečně šanci vrátit se domů." # todo: NEW TRANSLATION
  BRA_continue_centralization: "Prosazovat centralizaci" # todo: NEW TRANSLATION
  BRA_continue_centralization_desc: "[ROOT.GetNameDefCap] je národ mnoha kultur rozprostřených na obrovském území. Pokud nezlepšíme jednotu, riskujeme fragmentaci nebo vojenské zásahy sousedů. Jen silná centrální vláda může ochránit náš lid a demokracii." # todo: NEW TRANSLATION
  BRA_court_the_military: "Oslovit vojenské establišment" # todo: NEW TRANSLATION
  BRA_court_the_military_desc: "Je příliš idealistické sledovat kurs, který vojenství nespokojí nebo oslabí. Naše naděje je najít společné základy a spolupracovat s nimi pro dobro národa. Pokud selžeme, znovu přijde zánik práv." # todo: NEW TRANSLATION
  BRA_implement_a_national_guard: "Zavést Národní gardu" # todo: NEW TRANSLATION
  BRA_implement_a_national_guard_tt: "Vytvoří šablonu divize známou jako §YGuarda Nacional§! a naverbuje §Y6 jednotek§! v §Y[ROOT.Capital.GetCapitalVictoryPointName]§!." # todo: NEW TRANSLATION
  BRA_implement_a_national_guard_desc: "Vojenské složky stále vrhají stín nad politikou a hrozí zlikvidovat demokracii. Abychom omezili jejich vliv, zavedeme novou národní gardu loajální k Národnímu kongresu." # todo: NEW TRANSLATION
  BRA_nationalize_the_banks: "Znacionalizovat banky" # todo: NEW TRANSLATION
  BRA_nationalize_the_banks_desc: "Naše ekonomika se dosud nevzpamatovala z Velké deprese a mnozí občané žijí v bídě. Je načase přenést břemeno oživení ekonomiky z obětí deprese na její původce - banky." # todo: NEW TRANSLATION
  BRA_establish_the_brazilian_investment_bank: "Podnikatelské daňové výhody" # todo: NEW TRANSLATION
  BRA_establish_the_brazilian_investment_bank_desc: "Nechybí mezinárodní korporace, které by měly zájem platit méně daní. Nastavením výhodných daňových podmínek je můžeme přilákat do [ROOT.GetNameDef], což prospěje naší ekonomice." # todo: NEW TRANSLATION
  BRA_church: "Spolupracovat s církví" # todo: NEW TRANSLATION
  BRA_church_desc: "Katolická církev si zachovává rozsáhlý vliv v naší politice i přes oddělení církve od státu. To vyplývá z velkého počtu zbožných katolíků, kteří tvoří většinu voličů. Pokud získáme přízeň církve, můžeme získat masovou podporu pro naše politiky." # todo: NEW TRANSLATION
  BRA_implement_article_138: "Uplatnit článek 138" # todo: NEW TRANSLATION
  BRA_implement_article_138_desc: "Článek 138 ústavy z roku 1934 stanovil, že vláda by měla pomáhat mnohačetným rodinám. Aplikováním tohoto článku by vznikly značné náklady, ale zavedením základních sociálních systémů pro takové rodiny bychom mohli za jednu generaci vytáhnout miliony z chudoby." # todo: NEW TRANSLATION
  BRA_tech_slot_2: "Federální univerzita [ROOT.Capital.GetCapitalVictoryPointName]" # todo: NEW TRANSLATION
  BRA_tech_slot_2_desc: "Technologie rychle mění způsob, jak žijeme — od práce až po vedení válek. Je naprosto zásadní pro pokračující prosperitu a bezpečnost našeho státu, abychom investovali do výzkumu a vývoje nových technologií." # todo: NEW TRANSLATION
  BRA_ban_the_communist_party: "Zákaz komunistické strany" # todo: NEW TRANSLATION
  BRA_ban_the_communist_party_desc: "Komunistické hnutí, navzdory neúspěšnému pokusu o vzpouru v roce 1935, nadále znepokojuje armádu a podnikatele v zemi. Možná že tvrdší zásah vůči hnutí nám přinese větší podporu armády pro naše vlastní politiky." # todo: NEW TRANSLATION
  BRA_ban_the_communist_party_dynamic_tt: "§RPokles stability bude škálovat s popularitou komunistické strany!§!" # todo: NEW TRANSLATION
  BRA_posts_for_generals: "Ministerská křesla pro generály" # todo: NEW TRANSLATION
  BRA_posts_for_generals_desc: "Tím, že nabídneme vlivným vojenským důstojníkům pozice v Radě ministrů, můžeme zmírnit jejich obavy z rozhodnutí vlády tím, že jim umožníme se na nich podílet. To by mělo snížit jejich podezření z našich motivů a zabránit dalšímu krveprolití." # todo: NEW TRANSLATION
  BRA_posts_for_generals_tt: "Odemkne §Y$BRA_eurico_gaspar_dutra$§! jako politického poradce: \n Recruitable Population: §Y2%§! \n War Support: §G+10%§! \n Division Defense on Core Territory: §G+5%§! \n acceptance of Democratic Diplomacy: §R-25§!" # todo: NEW TRANSLATION
  BRA_end_military_interference: "Ukončit zásahy armády" # todo: NEW TRANSLATION
  BRA_end_military_interference_tt: "Změna popularity Neutrálních: §G-§![?.Root.party_popularity@neutrality|%0G].\n" # todo: NEW TRANSLATION
  BRA_end_military_interference_desc: "Se vznikem naší národní gardy máme konečně schopnost omezit vliv vojenského etablování a přivést naše ozbrojené síly pod dohled civilní vlády." # todo: NEW TRANSLATION
  BRA_free_speech: "Otevřít politický diskurz" # todo: NEW TRANSLATION
  BRA_free_speech_desc: "S omezeným vlivem vojenské establishmentu na Národní kongres se potenciál další diktatury zmenšil. Nyní je čas zakotvit lepší ochranu svobody slova a podpořit větší politickou účast občanů." # todo: NEW TRANSLATION
  BRA_free_speech_tt: "Následující se stanou dostupnými jako politickí poradci: \n" # todo: NEW TRANSLATION
  BRA_the_international_crisis: "Mezinárodní krize" # todo: NEW TRANSLATION
  BRA_the_international_crisis_desc: "Svět je stále nestabilnější, jak narůstají napětí mezi velmocemi a staré hranicové spory znovu vstupují do popředí zahraniční politiky. Musíme jednat opatrně, ale také navázat kontakt s ostatními demokratickými státy v regionu pro vzájemnou bezpečnost." # todo: NEW TRANSLATION
  BRA_third_republic: "Pořádek a pokrok" # todo: NEW TRANSLATION
  BRA_third_republic_desc: "Jakmile je zemi konečně navrácena stabilita a hrozba vojenského převratu je menší, máme příležitost přijmout robustnější ústavu, která umožní silné kontroly a vyrovnání, ale umožní Radě ministrů jednat rozhodně, když to bude nutné." # todo: NEW TRANSLATION
  BRA_united_states_of_brazil: "Spojené státy Brazílie" # todo: NEW TRANSLATION
  BRA_united_states_of_brazil_desc: "Ačkoliv jsme v rámci ústavy z roku 1934 učinili mnoho opatření k podpoře politické a ekonomické rovnosti, zůstáváme omezeni mnoha jejími ustanoveními. Nyní je v zájmu národa zbavit se této mdlé ústavy ve prospěch takové, která připomíná naše přátele ve Spojených státech amerických." # todo: NEW TRANSLATION
  BRA_united_states_of_south_america: "Spojené státy Jižní Ameriky" # todo: NEW TRANSLATION
  BRA_united_states_of_south_america_desc: "Náš stát se stal majákem svobody, lákajíc všechny, kdo sdílejí naše hodnoty, v naději na nový začátek. Měli bychom tuto rozmanitost přijmout a dát jasně najevo naše aspirace na budoucnost tím, že se ustanovíme jako Spojené státy Jižní Ameriky." # todo: NEW TRANSLATION
  BRA_united_states_of_south_america_tt: "Odemkne §Y$BRA_us_of_south_america_cat$§! rozhodnutí k pozvání členů frakcí §YDemocratic§! nebo §YNon-Aligned§! v Jižní Americe k §Ysjednocení§! s [ROOT.GetNameDef]." # todo: NEW TRANSLATION
  BRA_bonus_tech_slot: "Národní technologický fond" # todo: NEW TRANSLATION
  BRA_bonus_tech_slot_desc: "Ačkoliv se náš průmysl a armáda v posledních letech značně rozšířily, stále je těžší udržet technologickou paritu s našimi zahraničními protivníky. Abychom tomu čelili, zřídíme národní fond pro investice do vznikajících technologií." # todo: NEW TRANSLATION
  BRA_address_labor_disputes: "Řešit pracovní spory" # todo: NEW TRANSLATION
  BRA_address_labor_disputes_desc: "Předchozí vláda byla oprávněně znepokojena hrozbou komunismu, ale málo udělala pro řešení základních problémů, které lidi dovedly k radikalismu. My to zopakovat nehodláme a přistoupíme aktivněji k řešení pracovních sporů." # todo: NEW TRANSLATION
  BRA_address_labor_disputes_tt_1: "§YUdálost umožní volbu mezi: §!" # todo: NEW TRANSLATION
  BRA_address_labor_disputes_tt_2: "§YNebo:§!" # todo: NEW TRANSLATION
  BRA_combat_separatism: "Bojovat proti separatismu" # todo: NEW TRANSLATION
  BRA_combat_separatism_desc: "Kdykoli země čelí politickému zmatku, lidé s výhradami mimo hlavní město začínají prosazovat separatistické agendy, které hrozí roztrháním [ROOT.GetNonIdeologyName]. Musíme víc podporovat sdílenou [ROOT.GetAdjective] identitu po celé zemi." # todo: NEW TRANSLATION
  BRA_war_bonds: "Válečné dluhopisy" # todo: NEW TRANSLATION
  BRA_war_bonds_desc: "Nelze vyloučit, že budeme zataženi do konfliktu vojensky nebo podporou jiných zemí ekonomicky, a proto bysme měli zahájit program prodeje válečných dluhopisů, aby se financovala naše zbrojení." # todo: NEW TRANSLATION
  BRA_invite_foreign_companies: "Pozvat zahraniční korporace" # todo: NEW TRANSLATION
  BRA_invite_foreign_companies_desc: "Nastal čas otevřít dveře zahraničnímu kapitálu. Uděláme to vytvořením pobídek pro zahraniční společnosti, aby zřídily provozy v [BRA.GetNonIdeologyName], což sníží nezaměstnanost a zvýší daňové příjmy." # todo: NEW TRANSLATION
  BRA_invite_foreign_companies_tt: "Odemkne §Y$BRA_invite_foreign_companies_cat$§! rozhodnutí, které nám umožní pozvat §YMilitary Industrial Organizations§! do [BRA.GetNonIdeologyName] z §Y[ENG.GetFlag][ENG.GetName]§!, §Y[USA.GetFlag][USA.GetName]§!, §Y[FRA.GetFlag][FRA.GetName]§! nebo §Y[SWE.GetFlag][SWE.GetName]§! \n§GZískat 1 vojenskou továrnu nebo loděnici za každý MIO pozvaný do [BRA.GetNonIdeologyName].§! \n§RBudeme moci pozvat pouze 1 MIO z každé země!§! \n\n§GVýběr 4 z následujícího:§!" # todo: NEW TRANSLATION
  BRA_pro_labor_agreement: "Propracé propracovní politiky" # todo: NEW TRANSLATION
  BRA_romanticize_the_old_empire: "Romantizovat imperiální historii" # todo: NEW TRANSLATION
  BRA_romanticize_the_old_empire_desc: "Neschází nám nespokojení politici, podnikatelé ani občané, kteří z různých důvodů touží po konci této selhané republiky. Možná že sjednocením kolem naší imperiální historie a bývalé slávy je dokážeme spojit do jednoho soudržného hnutí." # todo: NEW TRANSLATION
  BRA_vassouras_line: "Podpořit nárok Pedra Henrique" # todo: NEW TRANSLATION
  BRA_vassouras_line_desc: "Naše snahy vytvořit hnutí, které by narušilo politický status quo, vyústily v výzvy po vzniku obnovy naší imperiální minulosti návratem císařské královské rodiny. Mnozí se nyní shromažďují kolem hlavy exilového císařského rodu Brazílie, Pedra Henrique, jako legitimního vládce národa." # todo: NEW TRANSLATION
  BRA_petropolis_line: "Podpořit nárok Pedra de Alcântara" # todo: NEW TRANSLATION
  BRA_petropolis_line_desc: "Pedro de Alcântara byl kdysi hlavou exilového císařského rodu Brazílie, než se vzdal nároků na trůn, aby si mohl vzít hraběnku Elisabeth Dobržensk. S narůstajícím hnutím obnovy nyní tvrdí, že jeho vzdání bylo nelegitimní a že je právoplatným dědicem trůnu." # todo: NEW TRANSLATION
  BRA_monarch_choice_1_tt: "§YPedro de Alcântara§! se stane vůdcem Císařského rodu. \n§RPokud [ROOT.GetNonIdeologyName] dokončí fokus $BRA_constitutional_monarchy$, bude přidán následující národní duch§!:" # todo: NEW TRANSLATION
  BRA_monarch_choice_2_tt: "§YPedro Henrique§! se stane vůdcem Císařského rodu. \n§RPokud [ROOT.GetNonIdeologyName] dokončí fokus $BRA_constitutional_monarchy$, bude přidán následující národní duch§!:" # todo: NEW TRANSLATION
  BRA_restore_the_coffee_barons: "Káva a mléko politika" # todo: NEW TRANSLATION
  BRA_restore_the_coffee_barons_desc: "Kdysi mocní kávoví baroni, kteří po desetiletí ovládali [ROOT.GetAdjective] politiku, byli v roce 1930 svrhnuti. Mnozí stále disponují značným ekonomickým vlivem a mohli by být přemluveni, aby podpořili naše hnutí obnovy monarchie výměnou za politické ústupky." # todo: NEW TRANSLATION
  BRA_constitutional_monarchy: "Kompromis: konstituční monarchie" # todo: NEW TRANSLATION
  BRA_constitutional_monarchy_desc: "S narůstajícím vlivem hnutí za obnovu monarchie a klesající podporou současného režimu se zvyšují výzvy po kompromisním řešení stabilizace země. Nejvýraznějším návrhem je ustavit figurální konstituční monarchii a ponechat politickou moc v Národním kongresu." # todo: NEW TRANSLATION
  BRA_constitutional_monarchy_tt: "V závislosti na předchozí volbě mezi §Y$BRA_petropolis_line$§! a §Y$BRA_vassouras_line$§! bude aktivován jeden z následujících národních duchů:" # todo: NEW TRANSLATION
  BRA_constitutional_monarchy_tt_2: "§YNebo§!" # todo: NEW TRANSLATION
  BRA_united_kingdom_of_brazil_and_portugal: "Spojené království Brazílie a Portugalska" # todo: NEW TRANSLATION
  BRA_united_kingdom_of_brazil_and_portugal_desc: "Obnova císařského rodu Brazílie probudila monarchistické nálady i v Portugalsku. Možná bychom toho měli využít a znovu sjednotit naše národy pod jedním monarchou. Koneckonců obě země by si mohly vzájemně prospět ze sdílených zdrojů a odbornosti." # todo: NEW TRANSLATION
  BRA_united_kingdom_of_brazil_and_portugal_tt: "Požádat o sjednocení §Y[POR.GetFlag][POR.GetNonIdeologyName]§! a §Y[BRA.GetFlag][BRA.GetNonIdeologyName]§!. Pokud §Y[POR.GetFlag][POR.GetNonIdeologyName]§! přijme, stanou se vazaly Brazílie. Mohou však nabídnout alternativu nebo návrh odmítnout." # todo: NEW TRANSLATION
  BRA_undermine_democracy: "Podkopat Národní kongres" # todo: NEW TRANSLATION
  BRA_undermine_democracy_desc: "Naši nejvlivnější podporovatelé nejsou spokojení s kompromisem konstituční monarchie. Ztrácejí trpělivost a chtějí, aby monarcha využil své nové vlivy k přehlasování Národního kongresu jmenováním nové Rady ministrů." # todo: NEW TRANSLATION
  BRA_use_the_national_security_law: "Využít zákon o národní bezpečnosti" # todo: NEW TRANSLATION
  BRA_use_the_national_security_law_desc: "Navzdory slabému odporu členů Národního kongresu se naše nová Rada ministrů úspěšně etablovala jako legitimní vláda státu. Nyní využije zákonů o národní bezpečnosti, přijatých režimem $BRA_getulio_vargas$, aby si vynutila absolutní autoritu nad politickými záležitostmi." # todo: NEW TRANSLATION
  BRA_amazonian_settlement: "Obnova kolonizace Amazonie" # todo: NEW TRANSLATION
  BRA_amazonian_settlement_desc: "Amazonie je bohatá na zdroje a půdu vhodnou k využití. Abychom stimulovali ekonomiku a nabídli motivaci našim vojákům bojovat, měli bychom těm, kteří vstoupí do armády, nabídnout možnost získat takové pozemky po odpovídající době služby." # todo: NEW TRANSLATION
  BRA_amazonian_settlement_tt: "Odemkne §YRozhodnutí o Vojenských osadách v Amazonii§! k rozvoji amazonských států." # todo: NEW TRANSLATION
  BRA_empire_of_brazil: "Znovuzřízení Impéria Brazílie" # todo: NEW TRANSLATION
  BRA_empire_of_brazil_desc: "S mocí pevně v rukou monarcha a jeho jmenovaných ministrů je čas obnovit národ do bývalé slávy. Prvním krokem bude obnovení Impéria Brazílie a návrat k tradičním hodnotám, na kterých bylo vybudováno." # todo: NEW TRANSLATION
  BRA_reclaim_territory_in_south_america: "Revanš za Cisplatinu" # todo: NEW TRANSLATION
  BRA_reclaim_territory_in_south_america_desc: "Hanba z Cisplatinské války visí nad císařským rodem i sto let po skončení nákladné války. Znovu uplatnit nárok na území Uruguaye by posílilo hrdost mezi našimi poddanými a připomnělo světu, že nejsme již rozpadlá země, jakou bývala." # todo: NEW TRANSLATION
  BRA_demand_portugese_territory: "Požadovat portugalské kolonie" # todo: NEW TRANSLATION
  BRA_demand_portugese_territory_desc: "Moderní stát [POR.GetNonIdeologyName] je pouhou schránkou kdysi velkého impéria. Zatímco se svět jinde topí v chaosu, měli bychom využít kanónové diplomacie a přesvědčit [POR.GetAdjective] vládu, aby nám postoupila své zámořské teritorium." # todo: NEW TRANSLATION
  BRA_demand_portugese_submission: "Požadovat totální portugalské podřízení" # todo: NEW TRANSLATION
  BRA_demand_portugese_submission_desc: "Země [POR.GetNonIdeologyName] jsou řízeny nelegitimními mocemi, neboť pouze náš císař má bohem dané právo nad nimi vládnout. Budeme požadovat jejich kapitulaci, nebo je vezmeme silou, pokud bude nutné." # todo: NEW TRANSLATION
  BRA_restoration_of_honor: "Obnovení brazilské cti" # todo: NEW TRANSLATION
  BRA_restoration_of_honor_desc: "Ačkoliv mnozí naši poddaní byli skeptičtí k návratu monarchie, většina je nyní spokojena s výsledky. S rozšířenými hranicemi, uzdravenou ekonomikou a obnovenou přirozenou hierarchií společnosti můžeme konečně prohlásit, že čest [ROOT.GetAdjective] byla obnovena." # todo: NEW TRANSLATION
  BRA_spirit_of_acre_war: "Znovu rozdmýchat válku o Acre" # todo: NEW TRANSLATION
  BRA_spirit_of_acre_war_desc: "Ačkoli je region Acre nyní pod naší kontrolou, mohli bychom využít historické hranicové konflikty jako záminku k rozparcelování Bolívie. To by nám mohlo otevřít přístup k bohatým nevyužitým zdrojům, zásobujícím náš průmysl desetiletí." # todo: NEW TRANSLATION
  BRA_expand_colonial_empire: "Rozšířit koloniální impérium" # todo: NEW TRANSLATION
  BRA_expand_colonial_empire_desc: "S nedávným zaměřením se zámoří máme základnu, odkud můžeme rozšířit naši dominanci do Afriky. Ačkoliv většina kontinentu stále patří evropským velmocím, existují mnohé regiony bohaté na zdroje, vhodné k převzetí." # todo: NEW TRANSLATION
  BRA_invest_in_the_armed_forces: "Uplatit armádu" # todo: NEW TRANSLATION
  BRA_invest_in_the_armed_forces_desc: "Vojenská elita je vrtkavá ve své věrnosti a paranoidní pokud jde o hrozbu komunismu, doma i v zahraničí. Využijeme toho v náš prospěch tím, že je podplatíme zvýšeným vojenským rozpočtem výměnou za podporu našeho panování." # todo: NEW TRANSLATION
  BRA_royal_colleges: "Založit královskou kolej v [ROOT.Capital.GetCapitalVictoryPointName]" # todo: NEW TRANSLATION
  BRA_royal_colleges_desc: "Císař nedávno projevil zájem o akademický status naší země a dekretoval založení nové Královské koleje v hlavním městě k podpoře větší domácí technologické inovace." # todo: NEW TRANSLATION
  BRA_issue_lordships: "Vydat královské tituly" # todo: NEW TRANSLATION
  BRA_issue_lordships_desc: "Jak začínáme znovu ovládat naše právoplatné domény, stává se břemenem řízení rozmanitých regionů pro našeho drahého monarchu. Proto vyhlásil, že nová pozemková královská titula budou vydána důvěryhodným osobám, aby pomáhaly při vládě království." # todo: NEW TRANSLATION
  BRA_promote_agriculture: "Obnovit kávové barony" # todo: NEW TRANSLATION
  BRA_promote_agriculture_desc: "Takzvaní ‚kávoví baroni‘ byli klíčoví v získání podpory pro obnovení monarchie. Nyní je odměníme zapojením do vlády, aby dohlíželi na rekonstrukci ekonomiky." # todo: NEW TRANSLATION
  BRA_promote_agriculture_tt: "§YOdemknout poradce:§!" # todo: NEW TRANSLATION
  BRA_acceptance_tt: "Pokud přijmou: \n" # todo: NEW TRANSLATION
  BRA_prepare_for_second_intentona: "Druhá Intentona Comunista" # todo: NEW TRANSLATION
  BRA_prepare_for_second_intentona_desc: "Náš první pokus o svržení buržoazního státu $BRA_getulio_vargas$ selhal. Pokud se rychle nezotavíme, jakákoli šance na druhý revoluční pokus bude uhašena v nové vlně protilevikového zákonodárství, které právě prosazuje. Musíme znovu zapálit plamen revoluce dříve, než k tomu dojde." # todo: NEW TRANSLATION
  BRA_seek_soviet_support: "Požádat o [SOV.GetAdjective] podporu" # todo: NEW TRANSLATION
  BRA_seek_soviet_support_desc: "Abychom uspěli a proměnili naši zemi v komunistickou společnost, kterou si lid zaslouží, budeme potřebovat vnější podporu. [SOV.GetNameDefCap] nám dříve pomáhal – zdá se logické, abychom je znovu požádali o podporu k zajištění našeho úspěchu." # todo: NEW TRANSLATION
  BRA_radicalize_the_proletariat: "Radikalizovat proletariát" # todo: NEW TRANSLATION
  BRA_radicalize_the_proletariat_desc: "Náš poslední pokus o uchopení moci selhal částečně proto, že jsme neměli dostatek koordinované podpory dělníků. Musíme šířit naše poselství mezi nimi a zajistit jejich naprostou loajalitu." # todo: NEW TRANSLATION
  BRA_launch_the_revolution: "Začít revoluci" # todo: NEW TRANSLATION
  BRA_launch_the_revolution_desc: "Nastal čas. Učiníme to, co jsme v roce 1935 během Intentony Comunisty nezvládli. Musíme povstat proti [BRA.GetLeader] a jeho utlačující vládě." # todo: NEW TRANSLATION
  BRA_launch_the_revolution_tt: "Spustí §YKomunistickou revoluci§! v [BRA.GetNameDef]. Počet divizí, které získáme, závisí na tom, jak vysoká je podpora §Y[BRA.GetCommunistParty]§!. \n§RToto povede ke Komunistické občanské válce proti Demokratické straně!§!" # todo: NEW TRANSLATION
  BRA_tech_slot_3: "Lidová univerzita [BRA.GetNonIdeologyName]" # todo: NEW TRANSLATION
  BRA_tech_slot_3_desc: "Pro vybudování silné země potřebujeme vyspělý vzdělávací systém, který nám dává snadný přístup k nejlepším a nejbystřejším myslím v [BRA.GetName]. Zapojení se v rané fázi zajistí vliv na kontrolu oborů na instituci. Věnování univerzity lidu je způsob, jak zajistit, že v nadcházejících letech tito intelektuálové zůstanou a ochotně pomohou naší věci." # todo: NEW TRANSLATION
  BRA_international_brigades: "Mezinárodní brigády" # todo: NEW TRANSLATION
  BRA_international_brigades_desc: "Války zuří ve světě kolem nás a i když v nich nejsme aktivně zapojeni, jako věrní soudruzi máme povinnost poslat pomoc tam, kde je to v našich silách. Není rozumné do válek vstupovat bez rozmyslu, zatím bychom měli posílat dobrovolníky." # todo: NEW TRANSLATION
  BRA_soviet_economic_aid: "Sovětská ekonomická pomoc" # todo: NEW TRANSLATION
  BRA_soviet_economic_aid_desc: "Po letech správy našich záležitostí vůdci s odlišnými představami není naše ekonomika tam, kde bychom chtěli. Abychom proces obnovy urychlili, měli bychom zvážit hledání pomoci u zemí se stejným smýšlením." # todo: NEW TRANSLATION
  BRA_license_soviet_designs: "Licenční dohody s [SOV.GetNameDef]" # todo: NEW TRANSLATION
  BRA_license_soviet_designs_desc: "Náš výzkum zaostává za hlavními velmocemi. Vybavení kapacit pro dohnání bude trvat dlouho, ale mezitím bychom se mohli snažit získat povolení vyrábět vybavení od [SOV.GetNameDef] v [BRA.GetNameDef]. Vzhledem k nákladům takové dohody bychom se měli snažit vyjednat slevu." # todo: NEW TRANSLATION
  BRA_license_soviet_designs_tt: "([SOV.GetFlag]§Y[SOV.GetName]§!) Dostane událost '§Y[BRA.GetNameDefCap] hledá licenční dohodu o výrobě§!' \n \n Pravděpodobněji přijmou, pokud mají §Yvysoký názor na nás!§!" # todo: NEW TRANSLATION
  BRA_purchase_soviet_equipment: "Koupit sovětské vybavení" # todo: NEW TRANSLATION
  BRA_purchase_soviet_equipment_desc: "Naše armáda momentálně velmi potřebuje vybavení. Abychom armádu zvětšili, chtěli bychom mít možnost koupit vybavení za výhodnou cenu od důvěryhodného spojence. Nějakým vyjednáváním bychom měli zajistit dohodu s [SOV.GetNameDef]." # todo: NEW TRANSLATION
  BRA_infilitrate_the_military: "Infiltrovat armádu" # todo: NEW TRANSLATION
  BRA_infilitrate_the_military_desc: "Ačkoli vyšší důstojníci armády zůstávají odpůrci naší ideologie, mnozí níže postavení důstojníci se těší na příležitost svrhnout své nadřízené. Pokud bychom jejich řady infiltrovali, mohli bychom je převést na naši stranu." # todo: NEW TRANSLATION
  BRA_infilitrate_the_military_tt: "Vyšší podíl §Yvojenských§! se přidá ke komunistům během nadcházející §Robčanské války§!, pokud je tento fokus vybrán." # todo: NEW TRANSLATION
  BRA_seek_international_support: "Hledat mezinárodní podporu" # todo: NEW TRANSLATION
  BRA_seek_international_support_desc: "Ačkoliv byly vynaloženy velké úsilí na obnovu komunistického hnutí, stále jsme slabí v porovnání se silami, které musíme překonat. Musíme proto získat podporu stejně smýšlejících jednotlivců a vlád po celém světě." # todo: NEW TRANSLATION
  BRA_join_the_comintern: "Připojit se ke Kominterně" # todo: NEW TRANSLATION
  BRA_join_the_comintern_desc: "Příliš dlouho stálo [BRA.GetNameDef] mimo Kominternu, přitom spoléhalo na její podporu. Je nejvyšší čas, abychom o vstup řádně požádali!" # todo: NEW TRANSLATION
  BRA_create_faction: "Latinskoamerická socialistická kooperativa" # todo: NEW TRANSLATION
  BRA_create_faction_desc: "Existuje mnoho dalších, kteří sdílejí naše představy o tom, jak by měla vypadat komunistická společnost. Je načase otevřít možnost spolupráce s těmito státy, abychom společně stáli za naší věcí!" # todo: NEW TRANSLATION
  BRA_free_prestes: "Osvobodit Prestese z vězení" # todo: NEW TRANSLATION
  BRA_free_prestes_desc: "$BRA_luis_carlos_prestes$ byl po léta v čele radikální [ROOT.GetAdjective] politiky. Po neúspěchu první intentony comunisty však byl zatčen spolu s vedením hnutí. Pokud chceme věřit v naději na vítězství, musíme naše vůdce osvobodit z kleští $BRA_getulio_vargas$." # todo: NEW TRANSLATION
  BRA_free_prestes_tt: "Po úspěšném svržení současné vlády se stanou dostupnými poradci přízniví §YPartido Communista§!." # todo: NEW TRANSLATION
  BRA_revive_the_anl: "Oživit Aliança Nacional Libertadora" # todo: NEW TRANSLATION
  BRA_revive_the_anl_desc: "Ačkoliv Aliança Nacional Libertadora nedokázala svrhout autoritářský režim $BRA_getulio_vargas$, stále má vliv na miliony [BRA.GetAdjective]ů, kteří doufají ve skutečnou změnu. Musíme hnutí znovu oživit dříve, než je naděje úplně udušena." # todo: NEW TRANSLATION
  BRA_revive_the_anl_tt: "Během nadcházející komunistické revoluce obdržíte §G2§! extra divize §Ykomunistické milice.§!" # todo: NEW TRANSLATION
  BRA_revive_the_anl_tt_2: "Po úspěšném svržení současné vlády budou dostupní poradci spříznění s §YAliança Nacional Libertadora§!." # todo: NEW TRANSLATION
  BRA_align_with_moscow: "Sblížit se s [SOU.Capital.GetCapitalVictoryPointName]" # todo: NEW TRANSLATION
  BRA_align_with_moscow_desc: "Několik členů naší strany mělo privilegium navštívit [SOU.Capital.GetCapitalVictoryPointName]. Po návratu k nám mluvili v superlativech o [SOU.GetAdjective] způsobu řízení státu. Měli bychom zvážit bližší sblížení s [SOU.GetNameDef]." # todo: NEW TRANSLATION
  BRA_oust_prestes: "Zabránit kultu osobnosti" # todo: NEW TRANSLATION
  BRA_oust_prestes_desc: "Komunistická společnost by neměla být řízena několika jednotlivci. I když některé státy to dokážou, obáváme se, že časem se stanou pouhým kultem osobnosti. Abychom tomu zabránili, měl by ANL výbor převzít kontrolu nad politickými záležitostmi země." # todo: NEW TRANSLATION
  BRA_soviet_arms_industry: "Pozvat sovětský zbrojní průmysl" # todo: NEW TRANSLATION
  BRA_soviet_arms_industry_desc: "Máme silný vojenský průmysl v [BRA.GetNameDef], ale nedávno hledáme způsoby, jak jej dále posílit. Některé [SOV.GetAdjective] Military Industrial Organizations projevily zájem zřídit provozy v [BRA.GetNameDef], měli bychom o pozvání uvažovat." # todo: NEW TRANSLATION
  BRA_spread_the_revolution: "Rozšířit revoluci" # todo: NEW TRANSLATION
  BRA_spread_the_revolution_desc: "Revoluce, kterou jsme přinesli do [BRA.GetNameDef], byla našimi lidmi velmi oceněna. Nyní, když jsme stabilizovali vnitřní záležitosti, je čas myslet větší a dívat se za naše hranice." # todo: NEW TRANSLATION
  BRA_smash_fascism: "Zničit jihoamerický fašismus" # todo: NEW TRANSLATION
  BRA_smash_fascism_desc: "Existují státy na jihoamerickém kontinentu, které revoluce dosud nezasáhla. Proletariát v některých z těchto zemí je stále utlačován fašistickými vládci. To nesmíme tolerovat — musíme osvobodit naše dělnické bratry!" # todo: NEW TRANSLATION
  BRA_anti_imperialism: "Vyhnat impéria" # todo: NEW TRANSLATION
  BRA_anti_imperialism_desc: "Některé státy v naší blízkosti ještě nebyly osvobozeny a nadále existují Impéria, která si nárokují kontrolu nad těmito teritorii. Kolonialismus a imperialismus patří minulosti a je na čase to těm Impériím jasně dát najevo." # todo: NEW TRANSLATION
  BRA_anti_imperialism_tt: "Odemkne §YRozhodnutí o jihoamerickém antikolonialismu§! k osvobození kolonií v Jižní Americe." # todo: NEW TRANSLATION
  BRA_jaguar_diplomacy: "Diplomacie jaguára" # todo: NEW TRANSLATION
  BRA_jaguar_diplomacy_desc: "[CHI.GetName] nedávno použila jedno ze svých domácích zvířat jako diplomatický dar. Navzdory ideologickým rozdílům se zdá, že to je úspěšný způsob, jak zmírnit napjaté vztahy se zahraničními vládami. Možná bychom mohli použít stejnou techniku, abychom odradili velmoci od vměšování se do našich záležitostí." # todo: NEW TRANSLATION
  BRA_jaguar_diplomacy_tt: "Odemkne §Y$BRA_jaguar_diplomacy_cat$§! rozhodnutí, jak uklidnit velmoci, které jsou v Jižní Americe proti komunismu, prostřednictvím navázání paktů o neútočení." # todo: NEW TRANSLATION
  BRA_sway_the_neighbors: "Ovlivnit sousedy" # todo: NEW TRANSLATION
  BRA_sway_the_neighbors_desc: "Musíme využít veškerých dostupných prostředků k zvýšení třídního uvědomění mezi našimi sousedy a podpořit je v svržení okovů buržoazní nadvlády." # todo: NEW TRANSLATION
  BRA_sway_the_neighbors_tt: "Odemkne §Y$BRA_sway_the_neighbors_cat$§! rozhodnutí k prosazování komunismu v jihoamerických státech." # todo: NEW TRANSLATION
  BRA_julieta_soria: "Julieta Soria" # todo: NEW TRANSLATION
  BRA_union_of_latin_american_socialist_republics: "Založit ULASR" # todo: NEW TRANSLATION
  BRA_union_of_latin_american_socialist_republics_desc: "Naše revoluční hnutí pokračuje v erozi struktur buržoazní společnosti napříč kontinentem. Je jasné, že již nejsme hnutí jen [ROOT.GetAdjective]ů, jsme hnutí Jihoameričanů a je čas, aby naše politické struktury lépe odrážely tuto změnu." # todo: NEW TRANSLATION
  BRA_smash_democracy: "Zničit jihoamerický kapitalismus" # todo: NEW TRANSLATION
  BRA_smash_democracy_desc: "Buržoazní demokracie a kapitalismus nadále erodují práva a životní podmínky mnoha jihoameričanů. Musíme udělat vše, co je v našich silách, abychom osvobodili naše soudruhy po celém kontinentu od jejich utlačovatelů." # todo: NEW TRANSLATION
  BRA_kgbrazil: "[BRA_kgbrazil_key]" # todo: NEW TRANSLATION
  BRA_create_kgbrazil_with_agents: "Zformovat EICI" # todo: NEW TRANSLATION
  BRA_kgbrazil_just_add_operatives: "[SOU.GetAdjective] zpravodajská spolupráce" # todo: NEW TRANSLATION
  BRA_kgbrazil_no_lar: "Posílení informační fronty" # todo: NEW TRANSLATION
  BRA_kgbrazil_cangaco: "Rede Coiteiros" # todo: NEW TRANSLATION
  BRA_kgbrazil_desc: "[BRA_kgbrazil_desc_key]" # todo: NEW TRANSLATION
  BRA_create_kgbrazil_with_agents_desc: "Zpravodajství a informace o našich nepřátelích jsou kritickou součástí naší schopnosti bránit zemi a naše zájmy, když to bude potřeba. Vytvoření silné agentury může nějakou dobu trvat, ale máme podporu zahraničních ideologicky příbuzných agentur, které nám v tom mohou pomoci." # todo: NEW TRANSLATION
  BRA_kgbrazil_just_add_operatives_desc: "Zpravodajství a informace o našich nepřátelích jsou kritickou součástí naší schopnosti bránit zemi a naše zájmy, když to bude potřeba. Naše agentura v poslední době odvedla velký kus práce, ale mohla by se ještě zlepšit, kdybychom k nám přibrali zkušené sovětské operativce." # todo: NEW TRANSLATION
  BRA_kgbrazil_no_lar_desc: "Zpravodajství a informace o našich nepřátelích jsou kritickou součástí naší schopnosti bránit zemi a naše zájmy, když to bude potřeba. Měli bychom upřednostnit udržování technologických potřeb jak pro sběr zpravodajských informací o nepříteli, tak pro ochranu našich citlivých informací." # todo: NEW TRANSLATION
  BRA_robert_ivanov: "Robert Ivanov" # todo: NEW TRANSLATION
  BRA_nadiya_morozova: "Nadiya Morozova" # todo: NEW TRANSLATION
  BRA_collectivization_of_transport: "Kolektivizace dopravy" # todo: NEW TRANSLATION
  BRA_collectivization_of_transport_desc: "Náš dopravní systém má za sebou lepší časy a nutně potřebuje reorganizaci, abychom jej mohli efektivněji využívat. Kolektivizace dopravního systému by dala dělníkům moc zavést potřebné reformy tak, jak je považují za nejlepší." # todo: NEW TRANSLATION
  BRA_nationalization_of_industry: "Nacionalizace průmyslu" # todo: NEW TRANSLATION
  BRA_nationalization_of_industry_desc: "Náš civilní průmysl dosud nebyl znárodněn. V rukou soukromých vlastníků, kteří upřednostňují zisk před naplněním potřeb našich lidí a země, trpí efektivita. V zájmu všech lidí v [BRA.GetNameDef] musíme znárodnit a rozšířit průmysl." # todo: NEW TRANSLATION
  BRA_rapid_industrialization: "Rychlá industrializace" # todo: NEW TRANSLATION
  BRA_rapid_industrialization_desc: "Investice, které jsme vložili do civilního průmyslu, se ukázaly jako velmi přínosné pro naše dělníky i zemi. Možná bychom měli zvážit podobné investice do domácího vojenského průmyslu." # todo: NEW TRANSLATION
  BRA_collectivization_of_agriculture: "Kolektivizace zemědělství" # todo: NEW TRANSLATION
  BRA_collectivization_of_agriculture_desc: "Náš zemědělský průmysl je poměrně roztříštěný a nefunguje tak efektivně, jak by mohl. Kolektivizací průmyslu a předáním dělníkům, aby kolektivně provedli potřebné reformy, bychom mohli tento problém a mnoho dalších vyřešit." # todo: NEW TRANSLATION
  BRA_allow_the_church_to_operate: "Přivítat sociálně orientované teology" # todo: NEW TRANSLATION
  BRA_allow_the_church_to_operate_desc: "Nové hnutí ve štětci kněží začíná v Jižní Americe. Duchovní prosazují socialisticky laděné politiky, které by trvale zvedly nejpotřebnější našeho lidu z chudoby. Možná bychom měli tyto radikální teology přijmout, místo abychom rozhněvali věřící proletariát, který je podporuje." # todo: NEW TRANSLATION
  BRA_state_atheism: "Ateistický stát" # todo: NEW TRANSLATION
  BRA_state_atheism_desc: "Abychom zajistili, že mysli našich lidí nebudou naplňovány nežádoucími myšlenkami, musíme zajistit, aby se taková propaganda nikde nešířila. Staromódní způsoby [BRA.GetAdjective] teologů a jejich kázání jsou v ostrém kontrastu s tím, co od lidí očekáváme. Už to nesmíme umožňovat!" # todo: NEW TRANSLATION
  BRA_support_industrialists: "Podporovat industrialisty" # todo: NEW TRANSLATION
  BRA_support_industrialists_desc: "I když mezi naším obyvatelstvem je více dělníků než kapitalistů, ti druzí kontrolují výrazně více bohatství a zdrojů. Měli bychom zavést politiky omezující práva dělníků a umožnit industrialistům fungovat efektivněji pro zlepšení ekonomiky jako celku." # todo: NEW TRANSLATION
  BRA_reward_army_loyalty: "Odměnit loajalitu armády" # todo: NEW TRANSLATION
  BRA_reward_army_loyalty_desc: "Armáda byla nepostradatelná nejen při našem nástupu k moci, ale i při udržení našeho držení moci. Je čas odměnit naše spojence za jejich loajalitu zvýšením alokace zdrojů na infrastrukturu armády." # todo: NEW TRANSLATION
  BRA_reinvigorate_the_navy: "Oživit námořnictvo" # todo: NEW TRANSLATION
  BRA_reinvigorate_the_navy_desc: "Důstojníci námořnictva dlouho podporovali integralistické hnutí i když to mezi veřejností nebylo populární. Za jejich dlouhodobou podporu zvýšíme financování, aby mohli zahájit proces oživení stárnoucí flotily." # todo: NEW TRANSLATION
  BRA_establish_caloi: "Založit továrnu Caloi" # todo: NEW TRANSLATION
  BRA_establish_caloi_desc: "Narůstající napětí ve světě ztížilo dovoz jízdních kol a dílů z Evropy a Severní Ameriky. S naším bohatým přístupem k pryži a oceli bychom mohli založit vlastní továrnu na jízdní kola a začlenit jejich používání i do armády." # todo: NEW TRANSLATION
  BRA_us_brazil_technology_exchange: "[USA.GetAdjective]-[ROOT.GetAdjective] technologická výměna" # todo: NEW TRANSLATION
  BRA_us_brazil_technology_exchange_desc: "V posledních letech jsme značně zlepšili technologickou odbornost národa, nicméně máme co se učit od našich přátel v [USA.GetNameDef]. Možná je přimějeme sdílet své poznatky výměnou za naše vlastní." # todo: NEW TRANSLATION
  BRA_us_brazil_technology_exchange_tt: "Pokud [USA.GetFlag]§Y[USA.GetNameDef]§! souhlasí s návrhem:" # todo: NEW TRANSLATION
  BRA_depose_vargas: "Svrhnout [ROOT.GetLeader]" # todo: NEW TRANSLATION
  BRA_depose_vargas_desc: "[ROOT.GetLeader] se stal břemenem. Ač je zručným politikem, lidé od jednoho muže nevydrží příliš mlčet. Pokud chceme zabránit návratu do bídného stavu, musíme ho svrhnout a nahradit přijatel­nějším vůdcem z armády." # todo: NEW TRANSLATION
  BRA_equality_for_women: "Proletářská rovnost" # todo: NEW TRANSLATION
  BRA_equality_for_women_desc: "Starý buržoazní řád musí být stržen. Ženy a menšiny v Brazílii byly stát­em dlouho opomíjeny a je čas jejich historické křivdy napravit. Musíme je také povzbudit, aby uplatnily své schopnosti pro rozvoj naší proletářské republiky." # todo: NEW TRANSLATION
  BRA_equality_for_women_tt: "Odemkne §Y$BRA_olga_benario_prestes$§! jako velitelku jednotky" # todo: NEW TRANSLATION
  BRA_italian_cooperation: "[ITA.GetAdjective]-[ROOT.GetAdjective] rozparcelování Afriky" # todo: NEW TRANSLATION
  BRA_italian_cooperation_desc: "Jak stará impéria upadají, znovu propuká boj o Afriku. Díky našemu zvláštnímu vztahu s [ITA.GetNameDef] máme příležitost vyříznout si kus kontinentu pro sebe." # todo: NEW TRANSLATION
  BRA_german_cooperation: "Dominance nad jihozápadním Atlantikem" # todo: NEW TRANSLATION
  BRA_german_cooperation_desc: "Příliš dlouho Atlantický oceán dominovaly americké a britské námořnictvo. Díky naší spolupráci s [GER.GetNameDef] jsme připraveni je vytlačit a převzít kontrolu nad Atlantikem." # todo: NEW TRANSLATION
  BRA_german_cooperation_tt: "Získat §Ynároky§! na ostrovech v §YJihozápadním Atlantiku§!, které nevlastní [ROOT.GetNonIdeologyName] ani [GER.GetNonIdeologyName]" # todo: NEW TRANSLATION
  BRA_german_cooperation_tt_2: "Získat §Y10§! [GER.GetAdjective] §YTyp IIA Rané ponorky.§!" # todo: NEW TRANSLATION
  BRA_attack_bolivia: "Zajištění Amazonie" # todo: NEW TRANSLATION
  BRA_attack_bolivia_desc: "Amazonský prales je neoddělitelně [BRA.GetAdjective]. Skutečnost, že části okupuje [BOL.GetNameDef], již nelze tolerovat." # todo: NEW TRANSLATION
  BRA_attack_chile: "Preemptivní úder" # todo: NEW TRANSLATION
  BRA_attack_chile_desc: "Zatímco [CHL.GetAdjective] zůstávají ukryti za svými horami, naše západní křídlo nikdy nebude plně bezpečné. Musíme proto zlikvidovat [CHL.GetAdjective] stát a integrovat jeho území do našeho." # todo: NEW TRANSLATION
  BRA_panama_push: "Panamský tlak" # todo: NEW TRANSLATION
  BRA_panama_push_desc: "Pokud máme zabezpečit kontinent pro sebe, musíme jednat rychle a přemoci nepřátele dřív, než budou schopni reagovat." # todo: NEW TRANSLATION
  BRA_unify_south_america: "América do Sul" # todo: NEW TRANSLATION
  BRA_unify_south_america_desc: "Jižní Amerika padla pod naši dominanci díky síle a odvaze našeho lidu. Nyní musíme začít obtížný úkol sjednocení kontinentu pod naší vládou a kulturou." # todo: NEW TRANSLATION
  BRA_unify_south_america_tt: "Odemkne rozhodnutí k získání §Yjaderných§! nároků na vlastněném území v §YJižní Americe§!" # todo: NEW TRANSLATION
  BRA_sway_the_cangaco: "Získat Cangaço pro naši věc" # todo: NEW TRANSLATION
  BRA_sway_the_cangaco_desc: "Cangaço bojovali roky proti různým režimům, které ovládaly zemi. Ačkoli nejsou marxisté, tito bandité mají silnou podporu venkovského lidu pro přerozdělování místního bohatství. Možná je dokážeme přivést a jejich zkušenosti využít v naší revoluční kampani?" # todo: NEW TRANSLATION
  BRA_sway_the_cangaco_tt: "§ROdstranit§! §Y$BRA_cangaceiro_decision_cat$§! §Rrozhodnutí, bránící nám v tvrdém zásahu proti Cangaço v postižených státech!§! \n\nZískat §G3§! jednotky Cangaço milice, když bude spuštěna občanská válka nebo vláda se stane §YKomunistická§!" # todo: NEW TRANSLATION
  BRA_cangaco_coup: "Cangaço převrat" # todo: NEW TRANSLATION
  BRA_cangaco_coup_desc: "Navzdory slibům revoluce je vedení hnutí nerozhodné a ztraceno v dogmatických debatách o správné doktríně. S větší podporou než kdy dříve je čas, aby Cangaço převzali velení země a jednou provždy prosekali korupci v jejím srdci." # todo: NEW TRANSLATION
  BRA_south_american_defense_cooperation: "Společná jihoamerická vojenská cvičení" # todo: NEW TRANSLATION
  BRA_south_american_defense_cooperation_desc: "Náš kontinent je rozmanitý jak lidmi, tak krajinou. Prováděním společných vojenských cvičení se naši lidé mohou dozvědět nejen to, jak ostatní bojují, ale i jak žijí." # todo: NEW TRANSLATION
  BRA_south_american_defense_cooperation_tt: "Každý §Yvelitel armády§! každého §Yčlena frakce§! bude mít §G50%§! šanci získat náhodný §Yterénní rys§!." # todo: NEW TRANSLATION
  BRA_foreign_legion: "Legião Estrangeira" # todo: NEW TRANSLATION
  BRA_foreign_legion_desc: "[ROOT.GetName] se stal útočištěm pro cizince v těchto rozbouřených časech. Mezi nimi není nouze o muže, kteří by byli ochotni položit život v obraně našich společných hodnot. Měli bychom jim dát příležitost tím, že je naverbujeme do cizí legie." # todo: NEW TRANSLATION
  BRA_foreign_legion_tt: "Vytvořit šablonu §YLegião Estrangeira§! a nasadit §G3§! jednotky do [ROOT.Capital.GetCapitalVictoryPointName]. \n\nOdemknout §Y$BRA_foreign_legion_cat$§! rozhodnutí k naverbování více divizí §YLegião Estrangeira§!." # todo: NEW TRANSLATION
  BRA_legion_name: "Legião Estrangeira" # todo: NEW TRANSLATION
  BRA_south_american_research_cooperation: "Latinskoamerická rada pro výzkum" # todo: NEW TRANSLATION
  BRA_south_american_research_cooperation_desc: "Není tajemstvím, že naše průmysly a univerzity po celé Latinské Americe nemají přístup k úrovni financování, jako mnozí naši rivalové. Spoluprací přes společný výzkumný institut však můžeme zabránit duplicitě úsilí a zlepšit tempo inovací v celém regionu." # todo: NEW TRANSLATION
  BRA_south_american_tech_sharing_group_tt: "Pokud členové frakce v Jižní Americe souhlasí s připojením:" # todo: NEW TRANSLATION
  ARG_preparation_for_the_elections: "Příprava na volby" # todo: NEW TRANSLATION
  ARG_preparation_for_the_elections_desc: "Mandát Agustína Pedra Justa se blíží konci a [ARG.GetName] je připravena na nového prezidenta. Zatímco oficiálním vládním kandidátem je Roberto María Ortiz, opoziční strana vedená Marcelem T. de Alvearem má stále šanci bojovat za demokratičtější [ARG.GetName]. Předehra pro volby je nastavena a nyní zbývá jen sledovat, jak dopadnou." # todo: NEW TRANSLATION
  ARG_roberto_maria_ortiz: "Roberto María Ortiz" # todo: NEW TRANSLATION
  ARG_roberto_maria_ortiz_desc: "Roberto María Ortiz vyhrál volby jasnou většinou, což znamená, že koalice Concordancia pokračuje ve vládnutí [ARG.GetName]. Ve svém přijetí zdůraznil svou víru v demokracii a slíbil respekt k svobodám a zárukám, které ústava uděluje [ARG.GetAdjective]mu lidu." # todo: NEW TRANSLATION
  ARG_roberto_maria_ortiz_tt: "§Y$ARG_roberto_maria_ortiz$§! se stává vůdcem §Y$ARG_neutrality_party_long$§!" # todo: NEW TRANSLATION
  ARG_coup_imminent_tt: "§RVybrání tohoto fokusu spustí načasované mise Vojenského nespokojení.§!" # todo: NEW TRANSLATION
  ARG_defense_and_democracy: "El Manifiesto Concordancia" # todo: NEW TRANSLATION
  ARG_defense_and_democracy_desc: "Obrana a demokracie jsou primárním cílem Ortizovy vlády; prezident chce přestavět [ARG.GetName] na více demokratický stát pod vedením Concordancie. To také znamená zvýšení vojenských výdajů, aby [ARG.GetName] mohl řádně bránit samu sebe." # todo: NEW TRANSLATION
  ARG_crack_down_on_corruption: "Razie na korupci" # todo: NEW TRANSLATION
  ARG_crack_down_on_corruption_desc: "Navzdory tomu, že byl zvolen v jedněch z nejpodvodnějších voleb v historii [ARG.GetAdjective], Ortiz má v úmyslu tvrdošíjně zasáhnout proti korupci na vládní úrovni. I přes ironii to může jen posílit [ARG.GetName]." # todo: NEW TRANSLATION
  ARG_british_cooperation: "Britská ekonomika" # todo: NEW TRANSLATION
  ARG_british_cooperation_desc: "Blízká spolupráce s [ENG.GetName] pomůže našemu hospodářství, zvláště vzhledem k vlivu, který měli během posledních voleb. Zlepšení vztahů s [ENG.GetAdjective]mi znamená lepší obchodní dohody v budoucnu." # todo: NEW TRANSLATION
  ARG_the_castillo_cabinet: "Kabineta Castillo" # todo: NEW TRANSLATION
  ARG_the_castillo_cabinet_desc: "Bohužel kvůli rostoucí nemoci se Prezident Ortiz připravil podat rezignaci. Místo něj vstupuje bývalý viceprezident Ramón Castillo. S rostoucím napětím mezi vojenskými frakcemi bude muset Castillo opatrně hrát své karty, aby zajistil svou prezidentskou pozici." # todo: NEW TRANSLATION
  ARG_the_castillo_cabinet_tt: "§Y$ARG_ramon_castillo$§! se stává vůdcem §Y$ARG_neutrality_party_long$§!" # todo: NEW TRANSLATION
  ARG_import_substitution: "Náhrada dovozu" # todo: NEW TRANSLATION
  ARG_import_substitution_desc: "Jak napětí roste po světě, dovoz z Evropy byl výrazně omezen. Ač máme úzké obchodní vazby s [ENG.GetAdjective], [ARG.GetAdjective] ekonomika bude muset začít nahrazovat dovoz zvýšenou industrializací." # todo: NEW TRANSLATION
  ARG_emphasis_on_public_works: "Důraz na veřejné práce" # todo: NEW TRANSLATION
  ARG_emphasis_on_public_works_desc: "Abychom obnovili naši zemi z trosk Velké deprese, musíme více investovat do veřejných stavebních projektů. Pokud nasměrujeme více peněz do místní infrastruktury, pomůže to nejen ekonomice, ale i životům [ARG.GetAdjective] občanů." # todo: NEW TRANSLATION
  ARG_towards_a_greater_argentina: "Ke větší [ARG.GetName]" # todo: NEW TRANSLATION
  ARG_towards_a_greater_argentina_desc: "Díky soustředěným snahám o zvýšení průmyslové kapacity a investice do veřejných prací jsme vytvořili základnu pro [ARG.GetName], aby skutečně povstala z popela Velké deprese jako vznikající mocnost v Jižní Americe!" # todo: NEW TRANSLATION
  ARG_universidad_de_buenos_aires: "Universidad de Buenos Aires" # todo: NEW TRANSLATION
  ARG_universidad_de_buenos_aires_desc: "Od univerzitních reforem z roku 1918 si Universidad de Buenos Aires udržela spoluřízené, demokraticky volené instituce a autority. Jako největší univerzita v [ARG.GetName] bude investice do jejího rozvoje nadále produkovat vysoce vzdělané jedince, připravené vést zemi do budoucnosti." # todo: NEW TRANSLATION
  ARG_consolidating_power: "Konsolidace moci" # todo: NEW TRANSLATION
  ARG_consolidating_power_desc: "Ramón Castillo nastupuje do prezidentského úřadu s autoritářštějším přístupem než jeho předchůdci. Cílem je konsolidovat moc přes Národní demokratickou stranu a postupně rozložit Concordancii. To neuniklo pozornosti politických a vojenských rivalů." # todo: NEW TRANSLATION
  ARG_maintain_the_status_quo: "Udržet status quo" # todo: NEW TRANSLATION
  ARG_maintain_the_status_quo_desc: "Stabilně. Není důvod hned otřásat lodí po právě nastolené vládě. Pokud chce Castillo zůstat u moci, bude muset opatrně zvládat rostoucí nespokojenost rivalních frakcí." # todo: NEW TRANSLATION
  ARG_march_to_la_casa_rosada: "Pochod na Casa Rosada" # todo: NEW TRANSLATION
  ARG_march_to_la_casa_rosada_desc: "Castillova vláda překročila hranici. Nespokojenost v armádě vyvrcholila, když prezident odvolal ministra války Pedra Pablo Ramíreze za jednání s opoziční stranou UCR. Vojenské vedení mobilizuje své stoupence a připravuje pochod na La Casa Rosada." # todo: NEW TRANSLATION
  ARG_march_to_la_casa_rosada_tt: "§Y$ARG_pedro_pablo_ramirez$§! se stává vůdcem §Y$ARG_militarist_party_long$§!" # todo: NEW TRANSLATION
  ARG_military_coup_happens_tt: "Ukončí 'Misi hrozícího vojenského převratu' tím, že umožní armádě převzít vládu." # todo: NEW TRANSLATION
  ARG_intervenciones_federales: "Intervenciones Federales" # todo: NEW TRANSLATION
  ARG_intervenciones_federales_desc: "Jak hrozba vojenského převratu roste, musíme rozhodnout o vykonání Intervenciones Federales. Přijetím tohoto zákona ve státě může být [ARG.GetName] lépe připravena čelit povstáním." # todo: NEW TRANSLATION
  ARG_balancing_act: "Balancování" # todo: NEW TRANSLATION
  ARG_balancing_act_desc: "S armádou nyní u moci můžeme ohlédnout k bouři v Evropě. Jelikož jak Spojenci, tak Osa mají vztahy s [ARG.GetName], musíme být opatrní, abychom neodcizili žádnou stranu." # todo: NEW TRANSLATION
  ARG_subdue_dissension: "Potlačit neshody" # todo: NEW TRANSLATION
  ARG_subdue_dissension_desc: "Dost bylo dost. Vojenské povstání se vymklo kontrole a musíme jej pevně potlačit dřív, než se rozvine. Může to na chvíli zbrzdit náš vojenský růst, ale stojí to za to, abychom měli věrnou armádu." # todo: NEW TRANSLATION
  ARG_subdue_dissension_tt: "Musíte alespoň 3× provést Intervenciones Federales, aby se tento fokus odemkl!" # todo: NEW TRANSLATION
  ARG_the_american_push: "Americký tlak" # todo: NEW TRANSLATION
  ARG_the_american_push_desc: "Naše snaha vyvážit vztahy mezi spojenci a Osy neunikla [USA.GetName]. Jasně dali najevo nespokojenost s našimi umírněnými postoji a mohou nás požádat, abychom jednou provždy přerušili vazby s Osa." # todo: NEW TRANSLATION
  ARG_juan_peron_elected: "Juan Perón" # todo: NEW TRANSLATION
  ARG_juan_peron_elected_desc: "Po období politického otřesu je načase, aby [ARG.GetNameDef] měl populárního a oblíbeného vůdce. Juan Perón se stal jasnou volbou na prezidenta na základě slibů, které evokují hrdost a bezpečí pro argentinské lidi. S jeho milovanou manželkou Evou po boku je konečně čas posílit [ARG.GetNameDef] proti bouři." # todo: NEW TRANSLATION
  ARG_peronism: "Peronismus" # todo: NEW TRANSLATION
  ARG_peronism_desc: "Když Perón nastoupil k moci, vzniklo hnutí založené na jeho myšlenkách a vlivu. Peronismus, také známý jako justicialismus, je sporný mezi oponenty Peróna — někteří jej přirovnávají k fašismu, jiní ho popisují jako neurčitý mix nacionalismu, laboralismu a populismu." # todo: NEW TRANSLATION
  ARG_help_the_allies: "Pomoci spojencům" # todo: NEW TRANSLATION
  ARG_help_the_allies_desc: "Jak se válka ještě více rozšiřuje, roste tlak ze strany [USA.GetName], abychom opustili neutralitu a formálně se připojili ke Spojencům. Pokud se tak rozhodneme, staneme se oficiálním aktérem v tomto globálním konfliktu." # todo: NEW TRANSLATION
  ARG_maintain_neutrality: "Zachovat neutralitu" # todo: NEW TRANSLATION
  ARG_maintain_neutrality_desc: "Navzdory tlaku spojenců není v našem zájmu se jejich války účastnit. Máme dost vlastních starostí na kontinentu bez starostí o konflikt v Evropě. Pokud to riskuje embargo ze strany [USA.GetName], tak ať je to tak." # todo: NEW TRANSLATION
  ARG_accept_german_advisors: "Přijmout německé poradce" # todo: NEW TRANSLATION
  ARG_accept_german_advisors_desc: "Vždy jsme udržovali blízké vazby s [GER.GetName] a můžeme mít prospěch z pozvání jejich talentovaných odborníků do [ARG.GetName], aby nám pomohli rozvíjet naše cíle." # todo: NEW TRANSLATION
  ARG_our_own_path: "Naše vlastní cesta" # todo: NEW TRANSLATION
  ARG_our_own_path_desc: "V posledních letech jsme se soustředili na sebe, vyhnuli se světovému konfliktu, který pustoší jiné země. [ARG.GetName] stojí na vlastních nohou a uděláme si vlastní rozhodnutí, kam se vydáme — zda budeme pokračovat v prosperitě a ekonomickém růstu, nebo se pustíme do expanze." # todo: NEW TRANSLATION
  ARG_change_of_course: "Změna kurzu" # todo: NEW TRANSLATION
  ARG_align_with_the_monroe_doctrine: "Sblížit se s Monroeovou doktrínou" # todo: NEW TRANSLATION
  ARG_align_with_the_monroe_doctrine_desc: "Po léta byla Monroeova doktrína politikou bránící evropskému vměšování na západní polokouli. Ačkoliv nyní spolupracujeme s evropskými mocnostmi, měli bychom se plně sladit s touto doktrínou a bránit invaze do Ameriky." # todo: NEW TRANSLATION
  ARG_envoy_to_london: "Poslat vyslance do Londýna" # todo: NEW TRANSLATION
  ARG_envoy_to_london_desc: "[ENG.GetName] je již léta jedním z našich nejbližších spojenců, a nyní, když stojíme po jejich boku proti jejich nepřátelům, bylo by rozumné poslat [ARG.GetAdjective]ho vyslance do Londýna, aby se posílily vazby s [ENG.GetAdjective] vládou." # todo: NEW TRANSLATION
  ARG_study_the_battle_of_the_river_plate: "Studovat bitvu u River Plate" # todo: NEW TRANSLATION
  ARG_study_the_battle_of_the_river_plate_desc: "Bitva u River Plate byla první námořní bitvou této války a odehrála se na jihoamerickém území. Měli bychom udělat vše pro to, abychom tuto bitvu studovali a poučili se, jak zlepšit naše námořní schopnosti." # todo: NEW TRANSLATION
  ARG_islas_del_atlantico_sur: "Islas del Atlántico Sur" # todo: NEW TRANSLATION
  ARG_islas_del_atlantico_sur_desc: "Falklandy a Jižní Georgie jsou suverénním územím [ENG.GetName] a jsou jimi již dlouhá léta. Navzdory našim nárokům na ostrovy, které leží tak blízko [ARG.GetName], zůstávají pod [ENG.GetAdjective] vládou. S naší novou aliancí s [ENG.GetName] je možná, že vyjednáme převod ostrovů do naší kontroly. Koneckonců je lépe ochráníme v této válce." # todo: NEW TRANSLATION
  ARG_improving_the_islands: "Zlepšit ostrovy" # todo: NEW TRANSLATION
  ARG_improving_the_islands_desc: "Jakmile máme vlastnictví Falkland a Jižní Georgie, měli bychom se soustředit na zlepšení jejich vojenské infrastruktury, aby zůstaly pod naší kontrolou." # todo: NEW TRANSLATION
  ARG_firmes_volamos: "Firmes Volamos" # todo: NEW TRANSLATION
  ARG_firmes_volamos_desc: "Komunita [ENG.GetAdjective] žijící v [ARG.GetName] nabídla zaplatit darovací perut za Královské letectvo. Posláním této perutě do [ENG.GetName] můžeme těsněji spolupracovat s RAF a zlepšit naše letecké schopnosti." # todo: NEW TRANSLATION
  ARG_extinguish_south_american_fascism: "Zlikvidovat jihoamerický fašismus" # todo: NEW TRANSLATION
  ARG_extinguish_south_american_fascism_desc: "Skvrna, kterou fašismus zanechal ve světě, se rozšířila do Jižní Ameriky. Nemůžeme stát stranou a dovolit, aby to pokračovalo. Musíme povstat a vypořádat se s těmi zeměmi, které zrušily demokracii ve prospěch autoritářství, dřív než se to rozšíří po kontinentu." # todo: NEW TRANSLATION
  ARG_no_fascism_in_south_america_tt: "Získat §Y$puppet_wargoal_focus$§! válečný cíl na všechny §YFašistické§! státy v §YJižní Americe§!" # todo: NEW TRANSLATION
  ARG_american_allyship: "Americké spojenectví" # todo: NEW TRANSLATION
  ARG_american_allyship_desc: "Jeden z našich nejsilnějších spojenců je nyní probuzený obr severně od nás. Ve jménu panamerické jednoty bychom měli poslat [ARG.GetAdjective]ho vyslance do Washingtonu D.C., abychom prohloubili vztahy s [USA.GetAdjective] vládou." # todo: NEW TRANSLATION
  ARG_us_marine_program: "Program amerických mariňáků" # todo: NEW TRANSLATION
  ARG_us_marine_program_desc: "US Marines jsou elitní jednotky a symbol [USA.GetAdjective] vojenské moci. Můžeme se od nich hodně naučit, a nyní, když spolupracujeme blíže s [USA.GetName], máme příležitost to udělat." # todo: NEW TRANSLATION
  ARG_us_marine_program_doctrine: "Výcvik amerických mariňáků" # todo: NEW TRANSLATION
  ARG_encourage_the_red_scare: "Červený strach" # todo: NEW TRANSLATION
  ARG_encourage_the_red_scare_desc: "Zdá se, že fašismus není jediné, čeho bychom se měli bát. Rostoucí moc [SOV.GetName] je stejně naléhavá. Komunismus je dalším protivníkem demokracie a měli bychom se mít na pozoru před jeho šířením." # todo: NEW TRANSLATION
  ARG_counter_intelligence_program: "Program kontrarozvědky" # todo: NEW TRANSLATION
  ARG_counter_intelligence_program_desc: "Zdá se, že špionáž hraje v této válce významnou roli a zaostáváme ve vlastním zpravodajství. S radami o [GER.GetAdjective] operacích v [ARG.GetName] a dalších jihoamerických státech bychom se měli připravit jim čelit co nejdříve." # todo: NEW TRANSLATION
  ARG_end_operation_bolivar: "Ukončit operaci Bolívar" # todo: NEW TRANSLATION
  ARG_end_operation_bolivar_desc: "Objevili jsme trvalý proud špionážních misí, které do země přicházejí z [GER.GetName]. S humorem tomu říkali 'Operace Bolívar'. To je nepřijatelné a musíme okamžitě zastavit veškeré [GER.GetAdjectives] operace v [ARG.GetName]." # todo: NEW TRANSLATION
  ARG_extinguish_south_american_communism: "Zlikvidovat jihoamerický komunismus" # todo: NEW TRANSLATION
  ARG_extinguish_south_american_communism_desc: "Červené nebezpečí není jen strašák pro děti. Komunismus se rozšířil do Jižní Ameriky a rychle ohrožuje [ARG.GetName]. Ve jménu demokracie a svobody se musíme mobilizovat, abychom tuto rudou obnovu potlačili dřív, než se rozšíří po kontinentu." # todo: NEW TRANSLATION
  ARG_no_communism_in_south_america_tt: "Získat §Y$puppet_wargoal_focus$§! válečný cíl na všechny §YKomunistické§! státy v §YJižní Americe§!" # todo: NEW TRANSLATION
  ARG_banco_central_de_la_republica_argentina: "Banco Central de la República Argentina" # todo: NEW TRANSLATION
  ARG_banco_central_de_la_republica_argentina_desc: "Založená šesti zákony Kongresu v roce 1935, Banco Central de la República Argentina nahradila měnovou radu [ARG.GetName]. Jeho prezident Ernesto Bosch usiluje o rozvoj banky a pomoci nastartovat ekonomiku, aby se konečně zotavila po Velké depresi." # todo: NEW TRANSLATION
  ARG_reach_out_to_the_great_powers: "Oslovit velmoci" # todo: NEW TRANSLATION
  ARG_reach_out_to_the_great_powers_desc: "Jednou z možností, jak zlepšit naši ekonomickou situaci, je oslovit velmoci a vzít si půjčky, které urychlí obnovu. Musíme však být opatrní, nechceme skončit v ještě větším dluhu." # todo: NEW TRANSLATION
  ARG_industrial_expansion: "Průmyslové rozšíření" # todo: NEW TRANSLATION
  ARG_industrial_expansion_desc: "Silný průmysl je páteří každé ekonomiky. Měli bychom se zaměřit na výzkum k rozvoji možností pro průmyslovou expanzi." # todo: NEW TRANSLATION
  ARG_industrial_expansion_bonus: "Průmyslový technologický bonus" # todo: NEW TRANSLATION
  ARG_production_initiative: "Iniciativa výroby" # todo: NEW TRANSLATION
  ARG_production_initiative_desc: "Naše výrobní nástroje jsou zastaralé a potřebují modernizaci. Měli bychom nasměrovat peníze do vývoje výrobních technologií, aby se zrychlila produkce potřebných komponent pro armádu." # todo: NEW TRANSLATION
  ARG_tech_initiative_bonus: "Technologická iniciativa" # todo: NEW TRANSLATION
  ARG_economic_tax_reforms: "Daňové reformy" # todo: NEW TRANSLATION
  ARG_economic_tax_reforms_desc: "Naše venkovská infrastruktura je silně podrozvinutá. Pokud bychom přijali reformy daňové politiky, mohli bychom více zaměřit prostředky na rozvoj našich zemědělských oblastí." # todo: NEW TRANSLATION
  ARG_economic_reactivation_act: "Zákon o ekonomické reaktivaci" # todo: NEW TRANSLATION
  ARG_economic_reactivation_act_desc: "Zákon o ekonomické reaktivaci bude upřednostňovat rozvoj civilní infrastruktury a zvýší rychlost výstavby nových továren ve městech." # todo: NEW TRANSLATION
  ARG_immigration_wave: "Vlna imigrace" # todo: NEW TRANSLATION
  ARG_immigration_wave_desc: "[ARG.GetName] je země vybudovaná na imigraci. I když většina populace má původ ve Španělsku, máme i značnou německou a velšskou komunitu. Můžeme posílit ekonomiku podporou migrace z těchto zemí do [ARG.GetName]." # todo: NEW TRANSLATION
  ARG_develop_civilian_economy: "Rozvíjet civilní ekonomiku" # todo: NEW TRANSLATION
  ARG_develop_civilian_economy_desc: "Jak se více soustředíme na naše města, je důležité zajistit vybavení, které lidé v [ARG.GetName] potřebují. Pokud udržíme lidi spokojené, pouze tím posílíme. Investice do bezprostředního rozvoje továren je cesta vpřed." # todo: NEW TRANSLATION
  ARG_the_argentinian_metropole: "Argentinská metropole" # todo: NEW TRANSLATION
  ARG_the_argentinian_metropole_desc: "Buenos Aires bude symbolem skutečného metropolitního života v [ARG.GetName]. Rozvoj našich měst pomohl povzbudit obyvatele k produktivnímu životu. Díky tomu nyní zažíváme populační boom a vyšší úroveň vzdělání napříč zemí." # todo: NEW TRANSLATION
  ARG_invest_in_the_roads: "Investovat do silnic" # todo: NEW TRANSLATION
  ARG_invest_in_the_roads_desc: "Infrastruktura v [ARG.GetName] zoufale potřebuje rekonstrukci. Pokud vložíme prostředky do silnic, pomůže to s místní propojeností mezi provinciemi." # todo: NEW TRANSLATION
  ARG_invest_in_the_railways: "Investovat do železnic" # todo: NEW TRANSLATION
  ARG_invest_in_the_railways_desc: "S historií železničního rozvoje od [ENG.GetName] dává smysl pokračovat v modernizaci železnic. To pomůže spojit celou zemi jednou sítí a učiní [ARG.GetName] jednotnějším státem." # todo: NEW TRANSLATION
  ARG_expand_steel_extraction: "Rozšířit těžbu oceli" # todo: NEW TRANSLATION
  ARG_expand_steel_extraction_desc: "Těžba byla hlavním průmyslem [ARG.GetName] od jeho vzniku jako země stříbra. Nyní je však naším cílem rozšířit těžbu oceli v našich hornatých oblastech." # todo: NEW TRANSLATION
  ARG_expand_aluminum_extraction: "Rozšířit těžbu hliníku" # todo: NEW TRANSLATION
  ARG_expand_aluminum_extraction_desc: "Hliník je důležitý pro vývoj našich sil vozidel. Měli bychom rozvinout naše těžební operace a zvýšit produkci tohoto drahocenného kovu." # todo: NEW TRANSLATION
  ARG_yacimientos_petroliferos_fiscales: "Yacimientos Petrolíferos Fiscales" # todo: NEW TRANSLATION
  ARG_yacimientos_petroliferos_fiscales_desc: "Yacimientos Petrolíferos Fiscales je státní [ARG.GetAdjective] energetická společnost zabývající se průzkumem, těžbou, rafinací a obchodováním s ropou. Měli bychom do společnosti více investovat, abychom lépe kontrolovali naši produkci ropy." # todo: NEW TRANSLATION
  ARG_yacimientos_petroliferos_fiscales_tt: "Odemkne rozhodnutí: §YVyužít la Vaca Muerta§!" # todo: NEW TRANSLATION
  ARG_rapid_urbanization: "Rychlá urbanizace" # todo: NEW TRANSLATION
  ARG_rapid_urbanization_desc: "Velká část [ARG.GetName] zůstává venkovská, ale cesta 20. století vede přes urbanizaci. Rozvojem měst můžeme přesvědčit více lidí k přestěhování, čímž získáme významný nárůst pracovní síly pro naše průmyslová centra." # todo: NEW TRANSLATION
  ARG_agricultural_improvements: "Zemědělská vylepšení" # todo: NEW TRANSLATION
  ARG_agricultural_improvements_desc: "Zemědělství bylo po léta klíčové pro rozvoj [ARG.GetName] a mnozí tímto způsobem živí své rodiny. To je skvělá příležitost pro zlepšení zemědělské infrastruktury v našich venkovských komunitách." # todo: NEW TRANSLATION
  ARG_military_production_lines: "Vojenské výrobní linky" # todo: NEW TRANSLATION
  ARG_military_production_lines_desc: "S rostoucí krizí ve světě by bylo moudré investovat do budoucnosti naší vojenské výroby. Pokud vybudujeme více komplexů zaměřených na vojenské vybavení, připravíme sebe co nejlépe na blížící se bouři." # todo: NEW TRANSLATION
  ARG_capitalize_the_beef_industry: "Využít průmysl hovězího" # todo: NEW TRANSLATION
  ARG_capitalize_the_beef_industry_desc: "[ARG.GetAdjective]ské hovězí je jedním z našich hlavních vývozů, zejména do [ENG.GetNameDef]. Měli bychom toho využít, rozšířit chovy a zajistit, aby naše lahodné maso bylo známo po celém světě!" # todo: NEW TRANSLATION
  ARG_revisit_the_roca_runciman_treaty: "Přehodnotit smlouvu Roca-Runciman" # todo: NEW TRANSLATION
  ARG_revisit_the_roca_runciman_treaty_desc: "Smlouva Roca-Runciman zaručuje od roku 1933 naše vývozy hovězího do [ENG.GetName]. Nicméně s nedávnými ekonomickými změnami může být načase vyjednat novou smlouvu s [ENG.GetAdjective] a získat výhodnější obchodní podmínky." # todo: NEW TRANSLATION
  ARG_a_new_trading_partner: "Revidovat smlouvu Roca-Runciman" # todo: NEW TRANSLATION
  ARG_a_new_trading_partner_desc: "Smlouva Roca-Runciman platí od roku 1933 a zaručuje naše vývozy hovězího do [ENG.GetName]. S ohledem na současné světové události by bylo moudré tuto smlouvu přepsat a navázat výhodnější vztahy s našimi novými spojenci." # todo: NEW TRANSLATION
  ARG_develop_the_electricity_sector: "Rozvíjet odvětví elektřiny" # todo: NEW TRANSLATION
  ARG_develop_the_electricity_sector_desc: "Náš sektor elektřiny potřebuje modernizaci, a proto je rozumné zaměřit zdroje do výzkumu technologií pro elektrický rozvoj." # todo: NEW TRANSLATION
  ARG_invest_in_construction_guilds: "Investovat do stavebních cechů" # todo: NEW TRANSLATION
  ARG_invest_in_construction_guilds_desc: "Stavební cechy jsou páteří městského rozvoje. Naším dalším úkolem je směřovat financování do cechů v [ARG.GetName], aby naše stavební technologie držely krok se světem." # todo: NEW TRANSLATION
  ARG_technical_schools: "Technické školy" # todo: NEW TRANSLATION
  ARG_technical_schools_desc: "Rozvojem technických škol můžeme aktivně zvýšit počet technických poradců, které můžeme zaměstnat ve vládě. Podpora tohoto typu vzdělávání jen pomůže zvýšit naši ekonomickou sílu." # todo: NEW TRANSLATION
  ARG_work_with_the_nationalists: "Spolupracovat s nacionalisty" # todo: NEW TRANSLATION
  ARG_work_with_the_nationalists_desc: "Možná je čas zvolit jiný přístup k vládnutí. Růst korupce, který dlouhodobě sužuje naše volby, jasně ukazuje potřebu změny. Pokud budeme spolupracovat s nacionalistickými skupinami, můžeme mít lepší šanci obnovit pořádek v [ARG.GetNameDef]." # todo: NEW TRANSLATION
  ARG_end_the_coup_tt: "§VVybrání tohoto fokusu ukončí mise Vojenského převratu.§!" # todo: NEW TRANSLATION
  ARG_cut_ties_with_britain: "Přerušit vazby s Británií" # todo: NEW TRANSLATION
  ARG_cut_ties_with_britain_desc: "Ačkoliv ostrovní stát [ENG.GetNameDef] byl naším nejbližším obchodním partnerem, jejich smlouva na naše hovězí nás omezuje. Měli bychom podnítit antisrbské nálady mezi obyvatelstvem a dokázat světu, že se můžeme postavit na vlastní nohy bez koloniálních mocností Evropy." # todo: NEW TRANSLATION
  ARG_support_radical_nationalism: "Podpořit radikální nacionalismus" # todo: NEW TRANSLATION
  ARG_support_radical_nationalism_desc: "Od doby, kdy jsme se osvobodili od španělského impéria, usilujeme o definici [ARG.GetAdjective] identity. Prosperovali jsme a přežili a ukázali, že tato země je naše. Posílme [ARG.GetAdjective] identitu a připomeňme všem, kdo je skutečnou silou Jižní Ameriky." # todo: NEW TRANSLATION
  ARG_corporatism: "Korporatismus" # todo: NEW TRANSLATION
  ARG_corporatism_desc: "Korporatismus je základní myšlenkou fašismu a měli bychom jej zavést co nejdříve. K tomu bychom se museli opřít o místní elity a otevřít cestu k postupu v nové fašistické hierarchii [ARG.GetNameDef]. Tím povedeme naši zemi k budoucnosti loajality a efektivity." # todo: NEW TRANSLATION
  ARG_reestablish_ligas_patrioticas: "Znovuobnovit Ligas Patrióticas" # todo: NEW TRANSLATION
  ARG_reestablish_ligas_patrioticas_desc: "Ligas Patrióticas byla krajně pravicová paramilitární organizace, která působila v [ARG.GetNameDef] během 20. let. Od té doby se rozpadla. Možná je čas ji znovu oživit, aby nám pomohla nastolit pořádek během rozsáhlé korupce." # todo: NEW TRANSLATION
  ARG_fascist_researchers: "Fašističtí výzkumníci" # todo: NEW TRANSLATION
  ARG_fascist_researchers_desc: "Jak se naše země pomalu blíží cestě k fašismu, bylo by moudré investovat do rozšíření národního výzkumu. Pořádek a loajalita v [ARG.GetNameDef] jsou pouze začátek. Pokud vše půjde podle plánu, budeme potřebovat mnohem silnější vojenské technologie než nyní." # todo: NEW TRANSLATION
  ARG_support_the_spanish_coup: "Podpořit španělský převrat" # todo: NEW TRANSLATION
  ARG_support_the_spanish_coup_desc: "Naši bratři ve Španělsku vedou krvavou občanskou válku o budoucnost své země. Myšlenky Franca na vojensky řízenou vládu se velmi prolínají s našemi. Měli bychom okamžitě poslat pomoc a ukázat světu falešnost demokracie." # todo: NEW TRANSLATION
  ARG_demand_spanish_compensation: "Požadovat kompenzace od Španělska" # todo: NEW TRANSLATION
  ARG_demand_spanish_compensation_desc: "Naši španělští bratři úspěšně vrátili moc, která jim náležela. Nyní bychom jim měli připomenout, že jsme sehráli roli v jejich úspěchu a že je čas, aby nám to zaplatili!" # todo: NEW TRANSLATION
  ARG_demand_spanish_compensation_tt: "Pošle událost §Y[SPA.GetNameDef]§! požadující, aby nám dali §YRovníkovou Guineu§!. Pravděpodobněji přijmou, pokud mají §GVysoký§! názor na nás!" # todo: NEW TRANSLATION
  ARG_argentinian_volunteers_in_spain_flag: "§Y[ARG.GetName]§! poslal dobrovolníky do §Y[SPA.GetName]§!" # todo: NEW TRANSLATION
  ARG_invite_spanish_nationalists: "Pozvat španělské nacionalisty" # todo: NEW TRANSLATION
  ARG_invite_spanish_nationalists_desc: "Bohužel Francoův převrat byl potlačen a občanská válka skončila. Tisíce španělských nacionalistů nyní hledají nový domov, který by lépe odpovídal jejich ideologii. Vzhledem k historickému spojení mezi našimi národy bychom jim měli otevřít dveře, aby pomohli růstu nacionalistického hnutí v [ARG.GetNameDef]." # todo: NEW TRANSLATION
  ARG_encourage_german_investments: "Podporovat německé investice" # todo: NEW TRANSLATION
  ARG_encourage_german_investments_desc: "Přestože je považován mnohými za paria Evropy, [GER.GetNameDef] se stal průmyslovou a vojenskou velmocí. Vždy jsme byli relativně přátelští k [GER.GetAdjective]m kvůli značné [GER.GetAdjective] populaci v [ARG.GetNameDef]. Měli bychom je oslovit a zjistit, zda jsou ochotni investovat do našeho národního hnutí." # todo: NEW TRANSLATION
  ARG_german_investments_bonus: "Německé investice" # todo: NEW TRANSLATION
  ARG_encourage_italian_argentine_diplomacy: "Italsko-argentinská diplomacie" # todo: NEW TRANSLATION
  ARG_encourage_italian_argentine_diplomacy_desc: "[ITA.GetAdjective] fašismus byl vzorem, podle kterého hlavní nacionalistická strana v [ARG.GetNameDef] formovala svou politiku. Měli bychom poslat vyslance do [ITA.capital.GetCapitalVictoryPointName] a otevřít nový diplomatický kanál mezi našimi zeměmi. Byla by to skvělá příležitost k navázání výzkumné dohody pro oboustranný technologický pokrok." # todo: NEW TRANSLATION
  ARG_guardia_nacional: "Guardia Nacional" # todo: NEW TRANSLATION
  ARG_guardia_nacional_desc: "Nastal čas rozbít Concordancii a místo ní přivést [ARG.GetNameDef] pod ochranu vojenské vlády. Guardia Nacional bojovala za naši suverenitu během argentinské války za nezávislost a nyní, pod vedením Pedra Pablo Ramíreze, povede [ARG.GetNameDef] do nové éry prosperity." # todo: NEW TRANSLATION
  ARG_union_nacional_fascista: "Unión Nacional Fascista" # todo: NEW TRANSLATION
  ARG_union_nacional_fascista_desc: "V nekonečné korupci a vnitřních bojích je jasné, že vedení Concordancie je neschopné. Je čas na radikální změnu v [ARG.GetAdjective] politice. Nimio de Anquín získal dost popularity jako vůdce Unión Nacional Fascista a je připraven vést zemi a vrátit národní hrdost [ARG.GetNameDef]." # todo: NEW TRANSLATION
  ARG_rapid_militirization: "Rychlá militarizace" # todo: NEW TRANSLATION
  ARG_rapid_militirization_desc: "Nyní, když máme pevnou vojenskou vládu u moci, můžeme se soustředit na expanzivní cíle. Je čas rozšířit náš vojensko-průmyslový model a zvýšit produkci zbraní a vojsk. Svět se musí připravit čelit síle [ARG.GetNameDef]!" # todo: NEW TRANSLATION
  ARG_argentine_nationalism: "Argentinský nacionalismus" # todo: NEW TRANSLATION
  ARG_argentine_nationalism_desc: "Duch dobyvatelů proudí našimi žilami a bylo by moudré jejich jméno uctít v podobě dobývání Ameriky. Shromážděme ty, kteří chtějí bojovat a zemřít za svou vlast, a připravme naše průmysly na hromadnou výrobu zbraní a strojů. [ARG.GetNameDefCap] se připravuje na válku!" # todo: NEW TRANSLATION
  ARG_war_division: "Válečná divize" # todo: NEW TRANSLATION
  ARG_war_division_desc: "Všechny války stojí na dobré přípravě. Jak budujeme kabinet a vyrábíme náš válečný stroj, každý den se přibližujeme k našim expanzivním cílům." # todo: NEW TRANSLATION
  ARG_argentina_first: "Argentina především" # todo: NEW TRANSLATION
  ARG_argentina_first_desc: "Po pečlivém zvažování jsme rozhodli, že nejlepší kurz pro budoucnost [ARG.GetNameDef] je zůstat stranou od evropského konfliktu a soustředit se místo toho na růst a stabilitu [ARG.GetNameDef]. Vytvořme vlastní frakci a postavme se světu sami." # todo: NEW TRANSLATION
  ARG_join_the_axis: "Připojit se k Ose" # todo: NEW TRANSLATION
  ARG_join_the_axis_desc: "Dlužíme Osním mocnostem za to, že nám pomohly umístit [ARG.GetNameDef] pod silné a stabilní vedení. Měli bychom je tedy oslovit a požádat o přijetí do jejich války, pomoci šířit fašismus po světě!" # todo: NEW TRANSLATION
  ARG_dominate_the_south: "Dominovat jihu" # todo: NEW TRANSLATION
  ARG_dominate_the_south_desc: "S tolika protivníky obklopujícími nás na kontinentu je klíčové ukázat železnou pěstí a zničit potenciální hrozby dřív, než vzniknou. Ukážeme jim, kdo je nejdominantnější mocí v Jižní Americe." # todo: NEW TRANSLATION
  ARG_preparations_for_war: "Přípravy na válku" # todo: NEW TRANSLATION
  ARG_preparations_for_war_desc: "I když bychom teoreticky mohli jít do války hned, zásobovací situace na našich hranicích ukazuje opak. Zlepšením zásobovacích linií zajistíme rychlé poražení našich protivníků." # todo: NEW TRANSLATION
  ARG_conquer_paraguay: "Dobýt [PAR.GetNameDefCap]" # todo: NEW TRANSLATION
  ARG_conquer_paraguay_desc: "Není místo pro jednání. Země [PAR.GetNameDef] nám stojí v cestě k dominanci v Jižní Americe. Místo ultimáta je lepší popadnout býka za rohy a vyhlásit válku sousedovi." # todo: NEW TRANSLATION
  ARG_paraguayan_ultimatum: "[PAR.GetAdjective] ultimátum" # todo: NEW TRANSLATION
  ARG_paraguayan_ultimatum_desc: "[PAR.GetNameDefCap] je strategické území, které bude zásadní pro naše válečné cíle proti zbytku kontinentu. Mohou se podřídit nebo budou vojensky podrobeni. Volba je na nich. Poslat ultimátum." # todo: NEW TRANSLATION
  ARG_uraguayan_ultimatum.tt: "([URG.GetFlag]§Y[URG.GetNameDefCap]§!) Dostane událost '§Y$ARG_political_events.19.t$§!', která je bude žádat, aby se stali naším §Yloutkovým státem§!. Pravděpodobněji přijmou, pokud mají §YVysoký názor na nás§!" # todo: NEW TRANSLATION
  ARG_paraguayan_ultimatum.tt: "([PAR.GetFlag]§Y[PAR.GetNameDefCap]§!) Dostane událost '§Y$ARG_political_events.19.t$§!', která je bude žádat, aby se stali naším §Yloutkovým státem§!. Pravděpodobněji přijmou, pokud mají §YVysoký názor na nás§!" # todo: NEW TRANSLATION
  ARG_chilean_ultimatum.tt: "([CHL.GetFlag]§Y[CHL.GetNameDefCap]§!) Dostane událost '§Y$ARG_political_events.19.t$§!', která je bude žádat, aby se stali naším §Yloutkovým státem§!. Pravděpodobněji přijmou, pokud mají §YVysoký názor na nás§!" # todo: NEW TRANSLATION
  ARG_revive_the_colonial_plan: "Oživit koloniální plán" # todo: NEW TRANSLATION
  ARG_revive_the_colonial_plan_desc: "Aby získal oporu v Jižní Americe, [GER.GetNameDef] spustil plán na zřízení kolonie v [URG.GetNameDef]. Plán však nikdy nebyl realizován. Měli bychom se ujmout iniciativy a oživit ho, a zprovoznit [URG.GetNameDef] jako loutku pro naše fašistické přátele." # todo: NEW TRANSLATION
  ARG_conquer_uruguay: "Získání výchozího bodu" # todo: NEW TRANSLATION
  ARG_conquer_uruguay_desc: "Zatímco náš nový režim upevňuje svou moc, musíme rozhodnout, jak postupovat vůči menším sousedům. [URG.GetNameDefCap] byla vždy sporným teritoriem; její obsazení ukáže světu, že nás nelze podceňovat." # todo: NEW TRANSLATION
  ARG_reach_out_to_chile: "Oslovit [CHL.GetNameDefCap]" # todo: NEW TRANSLATION
  ARG_reach_out_to_chile_desc: "[CHL.GetNameDefCap] je oproti ostatním sousedům větší a mocnější. Bylo by moudré je oslovit a nabídnout jim spojenectví. Možná, pokud jim ustoupíme a vrátíme některá jejich území, budou ochotni se připojit." # todo: NEW TRANSLATION
  ARG_reach_out_to_chile_tt: "Pravděpodobněji přijmou, pokud mají §YVysoký názor na nás§! a jsou buď §YFašističtí§! nebo §YNeutrální§!" # todo: NEW TRANSLATION
  ARG_reach_out_to_chile_2_tt: "Pokud §Ypřijmou§!, dáme jim §Y[954.GetName]§! a §Y[953.GetName]§!." # todo: NEW TRANSLATION
  ARG_chilean_ultimatum: "[CHL.GetAdjective] ultimátum" # todo: NEW TRANSLATION
  ARG_chilean_ultimatum_desc: "Příliš dlouho jsme měli hraniční napětí s [CHL.GetNameDef]. Pokud se opravdu chceme stát dominantní mocností v Jižní Americe, musíme je neutralizovat co nejdříve. Mohou se k nám přidat pokojně, nebo pochodujeme na jejich území a vezmeme si, co je naše." # todo: NEW TRANSLATION
  ARG_the_old_enemy: "Starý nepřítel" # todo: NEW TRANSLATION
  ARG_the_old_enemy_desc: "Konečně přišel čas obrátit pozornost na sever, kde nad námi visí stín našeho nejstaršího rivala. [BRA.GetNameDefCap] vždy byla naším největším nepřítelem na tomto kontinentu. Je čas znovu probudit ducha Cisplatinské války a vytyčit cestu dobytí směrem k [BRA.capital.GetCapitalVictoryPointName]." # todo: NEW TRANSLATION
  ARG_south_american_unity: "Jižní americké sjednocení" # todo: NEW TRANSLATION
  ARG_south_american_unity_desc: "Jakmile jsme získali území po kontinentu, je čas přijmout nové jméno symbolizující, že nejsme jen [ARG.GetNameDef], ale Jižní Amerika jako celek. Nakonec jsme sjednotili tyto hádající se státy pod jedním mocným praporem." # todo: NEW TRANSLATION
  ARG_integrate_operation_bolivar: "Integrovat operaci Bolívar" # todo: NEW TRANSLATION
  ARG_integrate_operation_bolivar_desc: "Již nějakou dobu [GER.GetNameDef] provozuje několik špionážních misí po celé Jižní Americe. Tento program, něžně nazvaný 'Operace Bolívar', působil i v [ARG.GetNameDef]. Nyní, když jsme v dobrých vztazích s [GER.GetAdjective]mi, mohli bychom program integrovat a podpořit jeho rozšíření napříč kontinentem." # todo: NEW TRANSLATION
  ARG_release_hellmuth: "Propustit Hellmutha" # todo: NEW TRANSLATION
  ARG_release_hellmuth_desc: "Osmar Hellmuth je [ARG.GetAdjective] s německým původem, který byl za staré vlády zatčen jako kolaborant s fašistickým režimem v [GER.GetNameDef]. Měli bychom ho okamžitě propustit a zaměstnat jej v naší zpravodajské agentuře." # todo: NEW TRANSLATION
  ARG_anti_american_propaganda: "Protiamerická propaganda" # todo: NEW TRANSLATION
  ARG_anti_american_propaganda_desc: "[USA.GetNameDefCap] je bašta demokracie v Americe a přirozeně stojí proti všemu, co usilujeme. Pokud s nimi chceme jednat, musíme nejprve sjednotit populace proti nim. K tomu můžeme podnítit protiamerické nálady. S tímto duchem boje si budeme moci ospravedlnit útok na severního obra." # todo: NEW TRANSLATION
  ARG_the_war_machine: "Válečný stroj" # todo: NEW TRANSLATION
  ARG_the_war_machine_desc: "S růstem naší vlády v moci potřebujeme vojenskou sílu, která tomu odpovídá. Je klíčové investovat do budování více vojensko-průmyslových komplexů po celé zemi, nejen v [ARG.capital.GetCapitalVictoryPointName]. Nechme [ARG.GetAdjective] válečný stroj povstat!" # todo: NEW TRANSLATION
  ARG_secure_the_borders: "Zabezpečit hranice" # todo: NEW TRANSLATION
  ARG_secure_the_borders_desc: "Bylo by moudré zajistit, aby naše hranice byly bezpečné proti nejnebezpečnějším rivalům. Musíme instalovat obranné linie na sdílených hranicích s [CHL.GetNameDef] a [BRA.GetNameDef] a zároveň trénovat naše vojenské vůdce v boji v lesích a horách na severu. Ochrana je prvořadá!" # todo: NEW TRANSLATION
  ARG_argentine_island_sovereignty: "Argentinská suverenita ostrovů" # todo: NEW TRANSLATION
  ARG_argentine_island_sovereignty_desc: "Příliš dlouho držela Británie Jihoatlantské ostrovy, ačkoliv jsou jasně v sféře vlivu [ARG.GetNameDef]. Měli bychom povstat a nárokovat si, co je nám právem, i kdyby to znamenalo vyhlášení války [ENG.GetNameDef]. Tyto ostrovy budou [ARG.GetAdjective] jakýmikoli prostředky!" # todo: NEW TRANSLATION
  ARG_argentine_island_sovereignty.tt: "Pokud zrovna nejsme ve válce s ([ENG.GetFlag]§Y[ENG.GetNameDefCap]§!), získáme §YYakobou§! válečný cíl proti nim." # todo: NEW TRANSLATION
  ARG_a_call_to_reform: "Volání po reformě" # todo: NEW TRANSLATION
  ARG_a_call_to_reform_desc: "Poslední desetiletí ukázalo, že politika v [ARG.GetNameDef] je chaotická. Demokracie zeslábla s Hipólitem Yrigoyenem a přinesla chaos a korupci. Je čas zahájit rychlou a nutnou reformu, která vrátí zemi na správnou cestu." # todo: NEW TRANSLATION
  ARG_invite_ghioldi_back_to_argentina: "Pozvat Ghioldiho zpět do Argentiny" # todo: NEW TRANSLATION
  ARG_invite_ghioldi_back_to_argentina_desc: "Rodolfo Ghioldi byl prominentní komunistou v [ARG.GetNameDef], který bohužel musel uprchnout kvůli pronásledování ze strany vlády. Jak se nálada v [ARG.GetNameDef] posouvá doleva, možná je čas mu udělit milost a pozvat ho zpět do vlasti." # todo: NEW TRANSLATION
  ARG_invite_ghioldi_back_tt: "§YRodolfo Ghioldi§! se vrátí do [ARG.GetFlag]§Y[ARG.GetNameDef]§! a bude dostupný jako §Yporadce§!. Jako významný aktér argentinského komunismu bude schopný vést jakoukoli budoucí §Yrevoluci§!." # todo: NEW TRANSLATION
  ARG_ghioldi_returns: "Rodolfo Ghioldi se vrátil do [ARG.GetNameDef]" # todo: NEW TRANSLATION
  ARG_support_the_spanish_republicans: "Podpořit španělské republikány" # todo: NEW TRANSLATION
  ARG_support_the_spanish_republicans_desc: "Naši bratři ve Španělsku bojují v krvavém konfliktu, bránící zemi před fašistickým převratem. Nechceme, aby Španělsko padlo k fašismu; měli bychom udělat vše pro podporu našeho kulturního spojence v Evropě." # todo: NEW TRANSLATION
  ARG_legitimize_the_PCA: "Legalizovat PCA" # todo: NEW TRANSLATION
  ARG_legitimize_the_PCA_desc: "Partido Comunista de la Argentina je hlavní komunistickou stranou v [ARG.GetNameDef]. Od svého vzniku se strana drží v souladu s Komunistickou stranou SSSR, často vyvolávaje třenice s ostatní levicí. Nyní, když potřebujeme zásadní změnu, možná je čas tuto stranu legalizovat v [ARG.GetAdjective] vládě." # todo: NEW TRANSLATION
  ARG_reach_out_to_the_soviet_union: "Oslovit [SOV.GetNameDef]" # todo: NEW TRANSLATION
  ARG_reach_out_to_the_soviet_union_desc: "Není tajemstvím, že potřebujeme opustit náš starý způsob vlády a zavést rychlé změny formující budoucnost [ARG.GetNameDef]. Protože to může mít násilné následky, měli bychom oslovit zemi, která si tím prošla. Navázání kontaktu s [SOV.GetNameDef] může zajistit pomoc v případě, že naše povstání bude vyžadovat násilí." # todo: NEW TRANSLATION
  ARG_reach_out_to_the_soviet_union_tt: "Vybrání tohoto fokusu odemkne šablonu divizí §YVanguardia Socialista§! když vypukne §Yobčanská válka§! a najme §Ypět§! jednotek Vanguardia Socialista v §Y[955.GetName]§!." # todo: NEW TRANSLATION
  ARG_unite_the_workers_of_argentina: "Sjednotit argentinské dělníky" # todo: NEW TRANSLATION
  ARG_unite_the_workers_of_argentina_desc: "Pokud chceme změnit [ARG.GetNameDef] k lepšímu, musíme přesvědčit proletariát, že jsou nutné radikální změny, aby skončilo jejich utrpení. Sjednoťme dělníky napříč profesemi a ukažme vládě, že status quo musí skončit!" # todo: NEW TRANSLATION
  ARG_viva_la_revolucion: "Viva La Revolución" # todo: NEW TRANSLATION
  ARG_viva_la_revolucion_desc: "Nastal čas poslat vládě ultimátum a přinést větry změny, které promění náš stát v pravý socialistický stát. Pokud vše půjde dobře, proběhne to mírně a moc se změní snadno. Vždy však existuje možnost, že se nebudou vzdávat bez boje." # todo: NEW TRANSLATION
  ARG_communist_civil_war_tt: "§RSpustí občanskou válku v§! §Y[ROOT.GetFlag][ROOT.GetName]§! §Rmezi komunisty a současnou vládou!§!" # todo: NEW TRANSLATION
  ARG_forge_our_own_future: "Kovat naši vlastní budoucnost" # todo: NEW TRANSLATION
  ARG_forge_our_own_future_desc: "Po velkém úspěchu revoluce je čas rozhodnout, jak chceme tvarovat budoucnost [ARG.GetNameDef]. Soudružka Fanny Edelman byla dlouho stoupenkyní PCA a bojovala za práva žen v [ARG.GetNameDef]. Mnozí ji považují za vhodnou vůdkyni, která dovede naši zemi do nové éry prosperity." # todo: NEW TRANSLATION
  ARG_women_in_industry: "Ženy v průmyslu" # todo: NEW TRANSLATION
  ARG_women_in_industry_desc: "Příliš dlouho se od žen očekávalo, že zůstanou doma a postarají se o rodinu. Pokud může žena vést naši zemi, je jen spravedlivé umožnit jim pracovat i v jiných odvětvích. To jen posílí ekonomickou budoucnost [ARG.GetNameDef], protože výrazně rozšíří pracovní sílu." # todo: NEW TRANSLATION
  ARG_support_the_farmers: "Podporovat farmáře" # todo: NEW TRANSLATION
  ARG_support_the_farmers_desc: "[ARG.GetNameDefCap] má vždy silné zemědělství a naše hovězí je oblíbené po celém světě. Za staré vlády byly tyto zemědělské komunity opomíjeny. Je čas zavést změny, zvýšit financování zemědělství a podpořit proletariát na venkově." # todo: NEW TRANSLATION
  ARG_socialist_volunteers: "Socialističtí dobrovolníci" # todo: NEW TRANSLATION
  ARG_socialist_volunteers_desc: "Existuje mnoho dalších socialistických hnutí po světě, která zápasí o vlastní revoluční sny. Pokud bude potřeba, musíme nabídnout naší sílu těm zemím, které chtějí následovat naši rudou cestu. Izolace neznamená ignorovat mezinárodní soudruhy." # todo: NEW TRANSLATION
  ARG_the_buenos_aires_conference: "Konference v Buenos Aires" # todo: NEW TRANSLATION
  ARG_the_buenos_aires_conference_desc: "Teď, když jsme začali stabilizovat zemi, musíme dbát, aby naše vedení neupadlo do pasti téměř-diktatury, do které spadla předchozí vláda. Byla svolána socialistická konference v Buenos Aires s cílem projednat a zvolit příštího vůdce [ARG.GetNameDef]." # todo: NEW TRANSLATION
  ARG_the_buenos_aires_conference_1_tt: "Dostane událost '§YKonference v Buenos Aires začíná§!', která nás vyzve buď ponechat §YFanny Edelman§! u moci, nebo přepnout na §YAntonio Soto§!." # todo: NEW TRANSLATION
  ARG_the_buenos_aires_conference_2_tt: "Zůstat s §YFanny Edelman§! odemkne větve fokusu §YSjednotit kontinent§! a §YOsvobodit kontinent§!. Volba §YAntonio Soto§! odemkne větev fokusu §YZlepšit Patagonii§!." # todo: NEW TRANSLATION
  ARG_align_with_the_soviets: "Sblížit se se Sověty" # todo: NEW TRANSLATION
  ARG_align_with_the_soviets_desc: "S revolucí po úspěšném dokončení je čas rozhodnout, jak chceme tvarovat budoucnost [ARG.GetNameDef]. Soudruh Rodolfo Ghioldi vedl revoluci a je vhodným kandidátem k vedení [ARG.GetNameDef]. Ghioldi zamýšlí blízké vazby s [SOU.GetNameDef] a věří, že náš nový socialistický stát poroste po vzoru Sovětů." # todo: NEW TRANSLATION
  ARG_soviet_industrial_model: "Sovětský průmyslový model" # todo: NEW TRANSLATION
  ARG_soviet_industrial_model_desc: "Po revoluci v Rusku udělal [SOU.GetNameDef] velký pokrok v modernizaci svého vojensko-průmyslového komplexu. Měli bychom se inspirovat a následovat jejich kroky, zvýšit počet továren zaměřených na vojenskou výrobu v zemi." # todo: NEW TRANSLATION
  ARG_committee_of_state_security: "Výbor státní bezpečnosti" # todo: NEW TRANSLATION
  ARG_committee_of_state_security_desc: "S rostoucím napětím ve světě se objevuje stále více nepřátel naší ideologie. Abychom si udrželi moc, je nezbytné vytvořit zpravodajskou agenturu, která bude prosazovat naše hodnoty v [ARG.GetNameDef] i mezinárodně." # todo: NEW TRANSLATION
  ARG_russian_manufacturers: "[SOU.GetAdjective] výrobci" # todo: NEW TRANSLATION
  ARG_russian_manufacturers_desc: "Abychom zvýšili svůj průmyslový potenciál a vynikli proti ostatním zemím kontinentu, měli bychom oslovit [SOU.GetNameDef] a pozvat některé jejich výrobce do [ARG.GetNameDef]. Sdílíme ideologii, takže dává smysl sdílet i vojenské technologie." # todo: NEW TRANSLATION
  ARG_centralize_power: "Centralizovat moc" # todo: NEW TRANSLATION
  ARG_centralize_power_desc: "Rodolfo Ghioldi nás zatím dobře vedl v poválečné fázi. Mnozí v jeho vládě věří, že centralizace moci do rukou premiéra pomůže udržet náš vznikající sovětský stát v bezpečí před vnitřními i vnějšími hrozbami. Nakonec jde o bezpečnost a ochranu [ARG.GetNameDef]." # todo: NEW TRANSLATION
  ARG_workers_rights: "Práva dělníků" # todo: NEW TRANSLATION
  ARG_workers_rights_desc: "Jedním ze základních principů naší socialistické revoluce bylo zlepšit kvalitu života proletariátu v [ARG.GetNameDef]. Po uchopení výrobních prostředků bychom měli zajistit, že špatné pracovní podmínky již nebudou sužovat naše pole a továrny." # todo: NEW TRANSLATION
  ARG_reform_our_industry: "Reformovat náš průmysl" # todo: NEW TRANSLATION
  ARG_reform_our_industry_desc: "Příliš dlouho naše průmyslová inovace zaostávala za jinými státy. Je čas rozšířit [ARG.GetNameDef] průmysl a přivést jej na moderní úroveň. Můžeme začít stavbou nových továren a okamžitým uvedením do provozu." # todo: NEW TRANSLATION
  ARG_empower_the_fjc: "Posílit FJC" # todo: NEW TRANSLATION
  ARG_empower_the_fjc_desc: "Federación Juvenil Comunista je mládežnická a revoluční organizace založená k šíření PCA politiky mezi [ARG.GetAdjective] mládeží. Abychom zajistili náš socialistický ideál po celé zemi, bylo by moudré zapojit děti našeho státu co nejdříve." # todo: NEW TRANSLATION
  ARG_state_atheism: "Státní ateismus" # todo: NEW TRANSLATION
  ARG_state_atheism_desc: "[ARG.GetNameDefCap] je dlouho katolickou zemí a náboženství hrálo velkou roli v každodenním životě mnoha občanů. Můžeme však uplatnit státní ateismus, protože náboženství nemá místo v socialistické revoluci. Musíme mít na paměti, že to může vyvolat nevole mezi masami, které s náboženstvím žily celý život." # todo: NEW TRANSLATION
  ARG_liberation_theology: "Teologie osvobození" # todo: NEW TRANSLATION
  ARG_liberation_theology_desc: "Vzhledem k dlouhé historii katolicismu v [ARG.GetNameDef] a jeho důležitosti v životech občanů začali někteří kněží přijímat formu křesťanství známou jako teologie osvobození jako reakci na ideologický posun v zemi. Vzhledem k tomu, že myšlenky teologie osvobození ladí s naším revolučním hnutím, bylo by moudré tento proud církve přijmout jako státní náboženství." # todo: NEW TRANSLATION
  ARG_socialist_researchers: "Socialističtí výzkumníci" # todo: NEW TRANSLATION
  ARG_socialist_researchers_desc: "Jak naše země roste jako socialistický stát, bylo by moudré investovat do rozšíření národního výzkumu. Modernizace a zdokonalení technologie je zásadní pro růst našeho státu." # todo: NEW TRANSLATION
  ARG_a_red_south_america: "Ocaso Escarlata" # todo: NEW TRANSLATION
  ARG_a_red_south_america_desc: "Konečně jsme dostali Jižní Ameriku pod jednu komunistickou vlajku. Jak rudá vlna splývá přes kontinent, utlačované dělnické třídy se konečně mohou osvobodit a žít soběstačně pod naším vedením. Proč bychom však měli přestat zde? Je čas spustit Operaci Ocaso Escarlata a přinést konečný rudý západ komukoli, kdo se postaví proti globální revoluci." # todo: NEW TRANSLATION
  ARG_conquer_south_america: "Osvobodit kontinent" # todo: NEW TRANSLATION
  ARG_conquer_south_america_desc: "Pro Jižní Ameriku není místo pro jiné světové ideologie — představují hrozbu pro náš socialistický stát. Pokud se nepřipojí, musíme co nejrychleji osvobodit jejich lidi a přivést je pod ochranné prapory [ARG.GetNameDef]." # todo: NEW TRANSLATION
  ARG_more_communism_in_south_america_tt: "Získat §Y$annex_everything$§! válečný cíl na všechny §YNekomunistické§! státy v §YJižní Americe§!" # todo: NEW TRANSLATION
  ARG_unify_south_america: "Sjednotit kontinent" # todo: NEW TRANSLATION
  ARG_unify_south_america_desc: "Na kontinentu existuje několik zemí, které provedly vlastní revoluce a zabezpečily komunistické vlády. Pokud chceme zůstat silní, musíme se spojit. Je čas oslovit tyto státy a požádat je, aby se připojily k našemu mezinárodnímu společenství." # todo: NEW TRANSLATION
  ARG_unify_the_continent_tt: "Vybrání tohoto fokusu pošle nabídku každé §Ykomunistické§! zemi v §YJižní Americe§!, aby se připojila k naší §Yfrakci§!." # todo: NEW TRANSLATION
  ARG_integrate_the_motherland: "Integrovat Ameriky" # todo: NEW TRANSLATION
  ARG_integrate_the_motherland_desc: "Vládnoucí třídy v územích, která jsme osvobodili od kapitalistické a fašistické zkázy, mohou pokračovat v rebelii, pokud nepodnikneme kroky k jejich začlenění do naší rostoucí koalice." # todo: NEW TRANSLATION
  ARG_eliminate_american_imperialism: "Zničit americký imperialismus" # todo: NEW TRANSLATION
  ARG_eliminate_american_imperialism_desc: "Obr severně od nás dlouho stál jako bašta korporátní chamtivosti a korupce. Jak jsme se stali vlastní velmocí, je jen otázkou času, než kapitalističtí psi z Washingtonu rozhodnou, že jsme hrozba. To nesmíme dovolit. Je čas spustit Operaci Ocaso Escarlata a přinést konečný rudý západ nad [USA.GetNameDef]." # todo: NEW TRANSLATION
  ARG_improve_patagonia: "Zlepšit Patagonii" # todo: NEW TRANSLATION
  ARG_improve_patagonia_desc: "S anarcho-syndikalisty pod Antonio Sotovou kontrolou je nutné, aby jejich domovská oblast Patagonie dostala pozornost, kterou roky postrádala." # todo: NEW TRANSLATION
  ARG_establish_the_free_association: "Ustanovit Svobodné sdružení" # todo: NEW TRANSLATION
  ARG_establish_the_free_association_desc: "Svobodné sdružení je vztah mezi jednotlivci bez státu, sociálních tříd, hierarchie nebo soukromého vlastnictví výrobních prostředků. Je to dlouhodobý cíl anarcho-syndikalistů a je načase začít bourat hranice a vytvořit společnost, kde je každý svobodný k naplnění svých individuálních potřeb." # todo: NEW TRANSLATION
  ARG_no_gods_no_masters: "Žádní bohové, žádní pánové" # todo: NEW TRANSLATION
  ARG_no_gods_no_masters_desc: "Nikdo by neměl být ovládán těmi, kteří mu chtějí škodit. I když naši sousedé nemusí rozumět naší ideologii, můžeme je osvobodit od válčících národů, které chtějí chamtivě rozšířit svou sféru vlivu." # todo: NEW TRANSLATION
  ARG_in_memory_of_yrigoyen: "Na památku Yrigoyena" # todo: NEW TRANSLATION
  ARG_in_memory_of_yrigoyen_desc: "[ARG.GetNameDefCap] již dříve prošla obdobím podobným tomuto. I když jeho vláda nebyla bez chyb, Hipólito Yrigoyen provedl nezbytné reformy, které zemi dodnes prospívají. Potřebujeme někoho, kdo zvedne toto dědictví a přivede nás zpět na cestu demokracie." # todo: NEW TRANSLATION
  ARG_in_memory_of_yrigoyen_tt: "§YMarcelo T. De Alvear§! se stává vůdcem §Y$ARG_democratic_party_long$§! a vládnoucí strana se změní na §YDemocratic§!" # todo: NEW TRANSLATION
  ARG_promote_urbanization: "Podporovat urbanizaci" # todo: NEW TRANSLATION
  ARG_promote_urbanization_desc: "Zatímco svět se průmyslově měnil a urbanizoval, [ARG.GetNameDef] zůstala většinou stejná. To nás činí závislými na jiných zemích pro udržení ekonomiky. Přiznat to a zahájit tlak na urbanizaci ukončí tyto závislosti." # todo: NEW TRANSLATION
  ARG_secure_the_opposition: "Zajistit opozici" # todo: NEW TRANSLATION
  ARG_secure_the_opposition_desc: "Určitá úroveň opozice je dobrá pro naše demokratické hodnoty. Současná opozice je docela silná, ale hlavní problém je, že nehrává fér. Nemůžeme jim dovolit nastavovat nebezpečný precedent; politickou opozici musíme regulovat pro bezpečí všech." # todo: NEW TRANSLATION
  ARG_the_clean_election: "Čisté volby" # todo: NEW TRANSLATION
  ARG_the_clean_election_desc: "Po desetiletích korupce a podvodů v politice [ARG.GetNameDef] si Unión Cívica Radical vybojovala vítězství po energické kampani zaměřené na odhalení falšování hlasovacích lístků, které bylo v Concordancii běžné. Diskuse o tom, kdo povede stranu dál, již probíhají." # todo: NEW TRANSLATION
  ARG_anti_corruption_policies: "Protikoruponí politiky" # todo: NEW TRANSLATION
  ARG_anti_corruption_policies_desc: "Musíme zajistit, aby se politická korupce, která znečistila naši zemi, nikdy nevrátila do vládních voleb. Zavedením nových politik zaměřených na vykořenění kultury úplatků, zpronevěr a nepotismu v státních institucích." # todo: NEW TRANSLATION
  ARG_a_true_democracy: "Skutečná demokracie" # todo: NEW TRANSLATION
  ARG_a_true_democracy_desc: "[ARG.GetNameDefCap] byla považována za demokracii od roku 1861, ale v poslední době stav našeho politického systému přináší ostudu pojmu svobodné demokratické republiky. Nyní můžeme konečně postupovat jako skutečná demokracie, která cení stabilitu a zlepšení [ARG.GetAdjective] ekonomiky." # todo: NEW TRANSLATION
  ARG_argentina_for_all: "Argentina pro všechny" # todo: NEW TRANSLATION
  ARG_argentina_for_all_desc: "Jako bývalá kolonie je [ARG.GetNameDef] domovem mnoha lidí z celého světa. V naší vizi budoucí země chceme, aby každý, kdo zde žije, mohl hrdě nazývat sebe [ARG.GetAdjective]. Musíme zajistit, že [ARG.GetNameDef] bude pro všechny, kteří se rozhodnou zde žít." # todo: NEW TRANSLATION
  ARG_reinforce_the_education_system: "Posílit školský systém" # todo: NEW TRANSLATION
  ARG_reinforce_the_education_system_desc: "Vzdělání je základem demokratického státu. Každý, kdo žije v [ARG.GetNameDef], by měl mít svobodu navštěvovat školu a rozvíjet se jako poctivý, pracovitý občan. Měli bychom nyní zaměřit financování na konkrétní profese s cílem rozvíjet technické a ekonomické pokroky." # todo: NEW TRANSLATION
  ARG_education_electronics_bonus: "Zaměření na elektronické vzdělávání" # todo: NEW TRANSLATION
  ARG_education_industrial_bonus: "Zaměření na průmyslové vzdělávání" # todo: NEW TRANSLATION
  ARG_education_synthetics_bonus: "Zaměření na syntetické vzdělávání" # todo: NEW TRANSLATION
  ARG_university_reforms: "Univerzitní reformy" # todo: NEW TRANSLATION
  ARG_university_reforms_desc: "S posíleným vzdělávacím systémem je to skvělá příležitost reformovat naše univerzity. Pokrok ve vyšším vzdělávání nám umožní více využít výzkumných oddělení univerzit." # todo: NEW TRANSLATION
  ARG_seek_american_support: "Hledat americkou podporu" # todo: NEW TRANSLATION
  ARG_seek_american_support_desc: "Jak se stín války šíří světem, musíme být připraveni čelit jakémukoli konfliktu, který by ohrožoval naše hranice. [USA.GetNameDefCap] může být probuzený obr na severu, ale jako další demokratická země může mít co nabídnout v oblasti zahraniční politiky a civilní obrany. Měli bychom s nimi navázat vztahy." # todo: NEW TRANSLATION
  ARG_us_army_training: "Výcvik armádou USA" # todo: NEW TRANSLATION
  ARG_us_army_training_desc: "[USA.GetNameDefCap] laskavě nabídla zaslat nám svůj vojenský výcvikový program, abychom připravili vlastní síly pro možnost války. To nejen vytvoří zkušenější a odolnější armádu, ale můžeme to využít i k vylepšení programu speciálních sil." # todo: NEW TRANSLATION
  ARG_us_army_training_bonus: "$ARG_us_army_training$" # todo: NEW TRANSLATION
  ARG_american_defense_investments: "Americké investice do obrany" # todo: NEW TRANSLATION
  ARG_american_defense_investments_desc: "Ač je dobré mít silné jednotky s dobrým výcvikem, často se říká, že pevná obrana je stejně dobrá jako silný útok. Náš styk s [USA.GetNameDef] nám pomohl zlepšit obranné schopnosti v našich nejzranitelnějších regionech, zejména proti leteckým útokům. Džungle a hory nás chrání na zemi a tyto věže brání naše nebe." # todo: NEW TRANSLATION
  ARG_joint_military_exercises: "Společná vojenská cvičení" # todo: NEW TRANSLATION
  ARG_joint_military_exercises_desc: "Jako projev dobré vůle vůči [USA.GetAdjective]m bychom měli nabídnout společná vojenská cvičení v [ARG.GetNameDef]. Spoluprací můžeme zlepšit výcvik a schopnosti naší flotily a letectva." # todo: NEW TRANSLATION
  ARG_join_the_allies: "Připojit se ke Spojencům" # todo: NEW TRANSLATION
  ARG_join_the_allies_desc: "Nastal čas si vybrat stranu v tomto konfliktu. Jako stát usilující o ochranu svrchovanosti demokracie je nutné oslovit Spojence a zajistit si své místo ve frakci. Musíme pomoci chránit svět před těmi, kteří se jej snaží podřídit." # todo: NEW TRANSLATION
  ARG_bastion_of_democracy: "Pevnost míru" # todo: NEW TRANSLATION
  ARG_bastion_of_democracy_desc: "Učinili jsme velké kroky v obhajobě demokratických ideálů a ušli jsme dlouhou cestu od nebezpečně korupčních voleb. Jak se válka blíží, musíme stát jako pevnost míru a přísahat chránit menší národy kontinentu." # todo: NEW TRANSLATION
  ARG_regulated_national_salaries: "Regulované národní mzdy" # todo: NEW TRANSLATION
  ARG_regulated_national_salaries_desc: "Všimli jsme si znepokojivého trendu, kdy domácí korporace a firmy podceňují své zaměstnance. Nehodláme kontrolovat jejich rozpočty, ale postaráme se o to, aby všichni občané dostávali spravedlivou mzdu. Nastavení minimální mzdy pomůže všem." # todo: NEW TRANSLATION
  ARG_social_welfare_fund: "Fond sociálního zabezpečení" # todo: NEW TRANSLATION
  ARG_social_welfare_fund_desc: "Náš rozpočet na sociální výdaje byl tradičně velmi nízký. Nicméně když se zamyslíme nad potenciálními přínosy vyššího rozpočtu, začínáme věřit, že to stojí za to. Zřízení fondu pro sociální zabezpečení může být přínosné." # todo: NEW TRANSLATION
  ARG_british_gaurantee: "Přiblížené vazby s Británií" # todo: NEW TRANSLATION
  ARG_british_gaurantee_desc: "Historicky jsme měli blízké vztahy s Británií, která do naší země hodně investovala. Měli bychom se snažit tyto vztahy oživit a posílit pouto; mohlo by nám to přinést značný užitek!" # todo: NEW TRANSLATION
  ARG_royal_airforce_influence: "Vl" # todo: NEW TRANSLATION
  ARG_royal_airforce_influence_desc: "S našimi vazbami na Británii bychom měli zkoumat, zda se od nich můžeme něco naučit i v oblasti vojenských podniků. Královské letectvo má vynikající reputaci a studium jejich operací bude pravděpodobně přínosné. Měli bychom také zvážit získání podobných letadel." # todo: NEW TRANSLATION
  ARG_royal_airforce_influence_bonus: "$ARG_royal_airforce_influence$" # todo: NEW TRANSLATION
  ARG_royal_navy_influence: "Vliv Královského námořnictva" # todo: NEW TRANSLATION
  ARG_royal_navy_influence_desc: "S našimi vazbami na Británii bychom měli zkoumat, zda se od nich můžeme něco naučit v námořnictví. Královské námořnictvo má široce uznávanou reputaci a studium jejich operací nám může prospět. Můžeme také zvážit výzkum podobných lodí." # todo: NEW TRANSLATION
  ARG_royal_navy_influence_bonus: "$ARG_royal_navy_influence$" # todo: NEW TRANSLATION
  ARG_reinforced_alliance: "Posílení spolupráce" # todo: NEW TRANSLATION
  ARG_reinforced_alliance_desc: "Náš bližší vztah s Británií se ukazuje jako velmi prospěšný, ale čím více studujeme jejich armádu, tím jasněji vidíme, že nejsme připraveni na konflikt, jak bychom mohli být. Měli bychom požádat o jejich explicitnější podporu formou záruk a paktu o neútočení." # todo: NEW TRANSLATION
  ARG_reinforced_alliance.tt: "([ENG.GetFlag]§Y[ENG.GetNameDefCap]§!) Dostane událost '§Y$ARG_political_events.73.t$§!' nabízející §Ypakt o neútočení§! a §Ygarantovanou nezávislost§! mezi našimi zeměmi. Pravděpodobněji přijetí je, pokud mají §Yvysoký názor na nás§!" # todo: NEW TRANSLATION
  ARG_internal_focus: "Vnitřní fokus" # todo: NEW TRANSLATION
  ARG_internal_focus_desc: "Možnost oslovit velké demokratické mocnosti je tu, ale mnozí ve vládě považují za moudré soustředit se nejprve na [ARG.GetNameDef] interně namísto rozšiřování zdrojů. Pro nyní omezit obchod se světem, aby měl [ARG.GetNameDef] to, co potřebuje k odolání válce." # todo: NEW TRANSLATION
  ARG_alvears_democracy: "Alvearova demokracie" # todo: NEW TRANSLATION
  ARG_alvears_democracy_desc: "Mnozí považují [ARG.GetLeader] za přísného muže s tvrdými politikami, ale čase ukázal, že měl na srdci nejlepší zájmy [ARG.GetNameDef]. Opravdu pokračoval v odkazu Hipólita Yrigoyena a měl by být považován za Otce argentinské demokracie." # todo: NEW TRANSLATION
  ARG_south_american_alliance: "Panamerická spolupráce" # todo: NEW TRANSLATION
  ARG_south_american_alliance_desc: "S naší novou frakcí věnovanou udržení míru v Jižní Americe bychom měli oslovit ostatní demokratické státy a požádat je, aby se k nám připojily ve slibu míru a svobody. Společně jsme silnější a méně ohroženi pádem." # todo: NEW TRANSLATION
  ARG_bolstering_the_army: "Náborná kampaň" # todo: NEW TRANSLATION
  ARG_bolstering_the_army_desc: "Válka se stále rozhořívá a musíme být připraveni odpovědět. Po celé [ARG.GetNameDef] jsou muži a ženy ochotní postavit se a bojovat za svobodu. Musíme zahájit náborovou kampaň a povzbudit lidi, aby se připravili bránit své domovy." # todo: NEW TRANSLATION
  ARG_the_second_argentine_republic: "Druhá argentinská republika" # todo: NEW TRANSLATION
  ARG_the_second_argentine_republic_desc: "Po letech korupce a podvodů vynořili jsme se z popela a stali se novým majákem demokracie na západní polokouli. Od tohoto dne, abychom se odlišili od chyb minulosti, budeme znáni jako Druhá argentinská republika. En unión y libertad!" # todo: NEW TRANSLATION
  ARG_the_second_argentine_republic_tt: "([ARG.GetFlag]§Y[ARG.GetNameDefCap]§!) poskytne §Ygarance§! všem demokratickým zemím v §YJižní Americe§!" # todo: NEW TRANSLATION
  ARG_hitler_1: "Čtvrtý pokus, snad úspěch" # todo: NEW TRANSLATION
  ARG_hitler_1_desc: "S naším novým prezidentem ve vládě dochází k okamžitému tlaku na radikální změny v [ARG.GetNameDef], aby napodobil dávnou moc, kterou [GER.GetNameDef] kdysi měl. Señor Hilter je rozhodnut vytvořit Čtvrtou říši v Jižní Americe. Co by se mohlo pokazit tentokrát?" # todo: NEW TRANSLATION
  ARG_hitler_2: "Guerra Relámpago" # todo: NEW TRANSLATION
  ARG_hitler_2_desc: "Guerra Relámpago - také známé jako 'Blesková válka' - je způsob, jakým můžeme využít přesily mechanizované palebné síly k překonání nepřátel. Náš prezident chce rychle expandovat, tvrdíc, že 'doplácíme ztracený čas'. Z nějakého důvodu se plány vztahují i na stará území [GER.GetNameDef]." # todo: NEW TRANSLATION
  ARG_hitler_2_tt: "Získat §Y$annex_everything$§! válečný cíl proti všem §Ynon-fascist§! státům v §YJižní Americe§!" # todo: NEW TRANSLATION
  ARG_hitler_2_core_tt: "Získat §Yjádrá§! na všech bývalých §YNěmeckých§! státech." # todo: NEW TRANSLATION
  ARG_hitler_3: "Arma Maravillosa" # todo: NEW TRANSLATION
  ARG_hitler_3_desc: "Arma Maravillosa - také 'Zázračné zbraně' - je program, v němž se pokusíme vyvinout silnější rakety a zbraně, které by mohly změnit průběh války. Prezident nám dal sérii ve vodě poškozených dokumentů s nápady, které můžeme okamžitě realizovat." # todo: NEW TRANSLATION
  ARG_arma_maravillosa_bonus: "Arma Maravillosa" # todo: NEW TRANSLATION
  ARG_worst_timeline_flag: "§YSeñor Hilter§! je vůdcem §Y[ARG.GetNameDef]§!" # todo: NEW TRANSLATION
  ARG_hitler_4: "Získat loď zpět" # todo: NEW TRANSLATION
  ARG_hitler_4_desc: "Podle Señor Hiltera je naprosto nezbytné zvednout vrak Graf Spee, první [GER.GetAdjective] bitevní lodě potopené během války. Když se dotazovali, mumlal něco o 'důstojnosti' a 'neptejte se mě' ve zlomené španělštině. Každopádně, zvedneme Graf Spee!" # todo: NEW TRANSLATION
  ARG_ligas_patrioticas_tt: "Odemkne šablonu divize Ligas Patrióticas a naverbuje §Ypět§! jednotek v §Y[ROOT.capital.GetCapitalVictoryPointName]§!" # todo: NEW TRANSLATION
  ARG_guardia_nacional_tt: "§Y$ARG_pedro_pablo_ramirez$§! se stává lídrem §Y$ARG_gen_nazism_party_long$§! a vládnoucí strana se přepne na §YFašismus§!" # todo: NEW TRANSLATION
  ARG_union_nacional_fascista_tt: "§YNimio de Anquín§! se stává lídrem §Y$ARG_fascism_party_long$§! a vládnoucí strana se přepne na §YFašismus§!" # todo: NEW TRANSLATION
  ARG_nationalist_faction: "Confederación Fascista" # todo: NEW TRANSLATION
  ARG_communist_faction: "Internacional Sudamericana" # todo: NEW TRANSLATION
  ARG_democratic_faction: "The Monroe Alliance" # todo: NEW TRANSLATION
  GUAY_disperse_military_power: "Rozptýlit vojenskou moc" # todo: NEW TRANSLATION
  GUAY_disperse_military_power_desc: "Abychom zajistili budoucnost kabinetu, musíme zajistit, že armáda nemůže sama uchvátit moc." # todo: NEW TRANSLATION
  GUAY_nationalize_foreign_owned_companies: "Znacionalizovat zahraničně vlastněné společnosti" # todo: NEW TRANSLATION
  GUAY_nationalize_foreign_owned_companies_desc: "Příliš dlouho zahraniční společnosti vykořisťovaly naše zdroje pro svůj prospěch. Dost!" # todo: NEW TRANSLATION
  GUAY_urbanization: "Urbanizace" # todo: NEW TRANSLATION
  GUAY_urbanization_desc: "Abychom vyvedli občany z chudoby, přeneseme je do velkých měst, kde je větší přístup k bohatství a vzdělání." # todo: NEW TRANSLATION
  GUAY_abolish_low_level_income_tax: "Zrušit daně z nízkých příjmů" # todo: NEW TRANSLATION
  GUAY_abolish_low_level_income_tax_desc: "Zdanění nejchudších v naší společnosti nedává smysl; to musí skončit." # todo: NEW TRANSLATION
  GUAY_free_seconday_schools: "Bezplatné střední školy" # todo: NEW TRANSLATION
  GUAY_free_seconday_schools_desc: "Vzdělání je základem dobře fungující ekonomiky. Investujeme do toho pro budoucí generace." # todo: NEW TRANSLATION
  GUAY_the_stuff_of_legends: "Z věcí legend" # todo: NEW TRANSLATION
  GUAY_the_stuff_of_legends_cores_tt_arg: "Ovládá všechna výchozí §Yargentinská§! jádra" # todo: NEW TRANSLATION
  GUAY_the_stuff_of_legends_cores_tt_bra: "Ovládá všechna výchozí §Ybrazilská§! jádra" # todo: NEW TRANSLATION
  GUAY_the_stuff_of_legends_cores_tt_bol: "Ovládá všechna výchozí §Ybolivijská§! jádra" # todo: NEW TRANSLATION
  GUAY_the_stuff_of_legends_cores_tt_urg: "Ovládá všechna výchozí §Yuruguayská§! jádra" # todo: NEW TRANSLATION
  GUAY_the_stuff_of_legends_cores_tt_par: "Ovládá všechna výchozí §Yparaguayská§! jádra" # todo: NEW TRANSLATION
  GUAY_the_stuff_of_legends_desc: "Co začalo jako sen se stalo realitou. Pod naším vedením jsme získali pevné uchopení nad kontinentem a vytvořili jedinečnou identitu. To se zapíše do dějin jako věci legend." # todo: NEW TRANSLATION
  GUAY_meet_with_the_old_powers: "Setkat se se starými mocnostmi" # todo: NEW TRANSLATION
  GUAY_meet_with_the_old_powers_tt: "Odemkne rozhodnutí sblížit se s jednou velmocí starého světa, čímž získáte výběr jednoho bonusu dle vybrané mocnosti." # todo: NEW TRANSLATION
  GUAY_meet_with_the_old_powers_desc: "Naše země je malá, ale má velké ambice; potřebujeme know-how od velké mocnosti, jak získat převahu nad sousedy." # todo: NEW TRANSLATION
  GUAY_dam_construction: "Stavba přehrady" # todo: NEW TRANSLATION
  GUAY_dam_construction_desc: "Naše země má mnoho možností pro vodní elektrárny, ale nemá dost prostředků na tak drahé projekty. Možná by nám partner půjčil?" # todo: NEW TRANSLATION
  GUAY_dam_construction_desc_tt: "Očekává se, že splátky vrátíme za §Y720 dní§!. Splatnost bude zrušena, pokud vyhlásíme válku zemi před datem splacení." # todo: NEW TRANSLATION
  GUAY_not_at_war_with_old_power: "Nejsme ve válce s vybranou starou mocností" # todo: NEW TRANSLATION
  GUAY_has_picked_old_power: "Vybral si starou mocnost pro sblížení" # todo: NEW TRANSLATION
  GUAY_old_world_power_faction: "Stará světová moc je ve frakci nebo je vůdcem frakce" # todo: NEW TRANSLATION
  GUAY_old_world_power_scope: "§YPartner staré světové mocnosti§!:" # todo: NEW TRANSLATION
  GUAY_tag_the_economic_miracle: "Jižníamerické ekonomické zázraky" # todo: NEW TRANSLATION
  GUAY_beef_and_hide_industry: "Průmysl masa a kůží" # todo: NEW TRANSLATION
  GUAY_beef_and_hide_industry_desc: "Hlavní ekonomikou naší země je hovězí a kůže; dává smysl ji rozšířit." # todo: NEW TRANSLATION
  GUAY_protect_domestic_industries_beef: "Dokončení $GUAY_beef_and_hide_industry$ přidá:\nPřidat: §G1§! §YCivilní továrnu.§!\nPřidat: §G1§! stavební slot." # todo: NEW TRANSLATION
  GUAY_protect_domestic_industries_agricultural: "Dokončení $GUAY_agricultural_colonization$ přidá:\nPřidat: §G1§! §YCivilní továrnu.§!\nPřidat: §G1§! stavební slot." # todo: NEW TRANSLATION
  GUAY_protect_domestic_industries_cash_crop: "Dokončení $GUAY_cash_crop_exports$ přidá:\nPřidat: §G1§! §YCivilní továrnu.§!\nPřidat: §G1§! stavební slot." # todo: NEW TRANSLATION
  GUAY_protect_domestic_industries_wool_makers: "Dokončení $GUAY_wool_makers$ přidá:\nPřidat: §G1§! §YCivilní továrnu.§!\nPřidat: §G1§! stavební slot." # todo: NEW TRANSLATION
  GUAY_cash_crop_exports: "Vývoz plodin na trh" # todo: NEW TRANSLATION
  GUAY_cash_crop_exports_desc: "Naše země má ideální podmínky k prodeji velkého množství plodin do zahraničí. Export přinese zvýšené bohatství." # todo: NEW TRANSLATION
  GUAY_export_focus: "Exportní fokus" # todo: NEW TRANSLATION
  GUAY_export_focus_desc: "Musíme zajistit, aby o naší zemi věděli všichni daleko i blízko, čímž zvýšíme poptávku po turismu i vývozu masa. Dejte jim vědět o [FROM.GetNameDefCap]!" # todo: NEW TRANSLATION
  GUAY_agricultural_colonization: "Zemědělská kolonizace" # todo: NEW TRANSLATION
  GUAY_agricultural_colonization_desc: "Zemědělství vždy hrálo velkou roli v naší ekonomice. Jeho rozšíření skrze odlesnění přinese další zisky." # todo: NEW TRANSLATION
  GUAY_wool_makers: "Výroba vlny" # todo: NEW TRANSLATION
  GUAY_wool_makers_desc: "Vlna je důležitou komoditou a máme ideální podmínky ji zajistit. Koneckonců, každý se musí v zimě zahřát." # todo: NEW TRANSLATION
  GUAY_form_ties_with_the_military: "Navázat vztahy s armádou" # todo: NEW TRANSLATION
  GUAY_form_ties_with_the_military_desc: "Současná vláda nedokázala zajistit stabilitu. Využijeme armádu k rozhodnému postupu a sesazení tohoto neúspěšného režimu." # todo: NEW TRANSLATION
  GUAY_place_opposition_leaders_in_house_arrest: "Dát opoziční vůdce do domácího vězení" # todo: NEW TRANSLATION
  GUAY_place_opposition_leaders_in_house_arrest_desc: "Musíme jednat rychle, abychom upevnili kontrolu nad zemí. Opoziční vůdce dáme do domácího vězení až do dokončení převratu." # todo: NEW TRANSLATION
  GUAY_enact_martial_law: "Vyhlásit válečný stav" # todo: NEW TRANSLATION
  GUAY_enact_martial_law_desc: "Nastává nárůst neklidu. Musíme kontrolovat narativ a držet lidi v šachu, abychom zabránili zbytečnému krveprolití, které by situaci mohlo zhatit." # todo: NEW TRANSLATION
  GUAY_coup_detat: "Následky státního převratu" # todo: NEW TRANSLATION
  GUAY_coup_detat_desc: "Starý režim padl! Získali jsme kontrolu nad institucemi navzdory krátkému střetu s vládními silami. Byly odzbrojeny bez obětí a jejich zbraně přidány do našeho skladu." # todo: NEW TRANSLATION
  GUAY_cult_of_personality: "Kult osobnosti" # todo: NEW TRANSLATION
  GUAY_cult_of_personality_desc: "Abychom posílili národ, vystavíme našeho drahého vůdce a vytvoříme kult osobnosti. Postava, za kterou se budou obyčejní lidé rally a zemřít." # todo: NEW TRANSLATION
  GUAY_appease_the_generals: "Uklidnit generály" # todo: NEW TRANSLATION
  GUAY_appease_the_generals_tt: "Generálové získají dodatečné statistiky a jedno náhodně přiřazené vlastnosti." # todo: NEW TRANSLATION
  GUAY_appease_the_generals_desc: "Generálové, kteří umožnili náš převrat, očekávají, že jim to vrátíme. Raději neotálet, nebo se proti nám mohou postavit." # todo: NEW TRANSLATION
  GUAY_appease_the_generals_eq_trigger_tt: "Více než §Y2500§! pěchotního vybavení v armádě" # todo: NEW TRANSLATION
  GUAY_a_domestic_arms_factory: "Domácí zbrojní továrna" # todo: NEW TRANSLATION
  GUAY_a_domestic_arms_factory_desc: "Ač naše ekonomika nedokáže konkurovat evropským mocnostem, nemůžeme se spoléhat pouze na zahraniční zásobování. Spustíme proces domácí výroby zbraní pro případ izolace." # todo: NEW TRANSLATION
  GUAY_penal_battalions: "Trestné prapory" # todo: NEW TRANSLATION
  GUAY_penal_battalions_tt: "Přidá §Y6 trestných praporů§! s plným počtem mužů. Odemkněte §YTrestné prapory§!" # todo: NEW TRANSLATION
  GUAY_penal_battalions_desc: "Naše armáda je v zoufalém stavu s málo dobrovolníky. Nábor z věznic by mohl být řešením." # todo: NEW TRANSLATION
  GUAY_rekindle_old_gripes: "[GUAY_rekindle_old_gripes]" # todo: NEW TRANSLATION
  GUAY_rekindle_old_gripes_desc: "[GUAY_rekindle_old_gripes_desc]" # todo: NEW TRANSLATION
  GUAY_rekindle_old_gripes_URG: "Znovu rozdmýchat staré křivdy" # todo: NEW TRANSLATION
  GUAY_rekindle_old_gripes_URG_desc: "Argentinské a brazilské elity nás historicky využívaly pro své cíle s katastrofálními následky pro náš lid. Musíme expandovat, abychom zabránili nepřátelské síle dostat se blízko Montevidea." # todo: NEW TRANSLATION
  GUAY_rekindle_old_gripes_PAR: "Ve stínu Trojalianční války" # todo: NEW TRANSLATION
  GUAY_rekindle_old_gripes_PAR_desc: "60 % populace zahynulo během války Trojalianční aliance a naše země se nikdy nezotavila. Pouze expanze může přinést stabilitu a prosperitu; už nebudeme žít ve stínu této prokleté aliance." # todo: NEW TRANSLATION
  GUAY_rekindle_old_gripes_ARG_PAR_tt: "Pokud ovládáme §Y[957.GetName]§! do §Y365 dnů§! od vypuknutí války, [ARG.GetName] bude muset požádat o bílý mír nebo čelit katastrofálnímu poklesu morálky." # todo: NEW TRANSLATION
  GUAY_rekindle_old_gripes_BRA_PAR_tt: "Pokud ovládáme §Y[504.GetName]§! do §Y365 dnů§! od vypuknutí války, [BRA.GetNameDef] bude muset požádat o bílý mír nebo čelit katastrofálnímu poklesu morálky." # todo: NEW TRANSLATION
  GUAY_rekindle_old_gripes_ARG_URG_tt: "Pokud ovládáme §Y[510.GetName]§! do §Y365 dnů§! od vypuknutí války, [ARG.GetName] bude muset požádat o bílý mír nebo čelit katastrofálnímu poklesu morálky." # todo: NEW TRANSLATION
  GUAY_rekindle_old_gripes_BRA_URG_tt: "Pokud ovládáme §Y[502.GetName]§! do §Y365 dnů§! od vypuknutí války, [BRA.GetNameDef] bude muset požádat o bílý mír nebo čelit katastrofálnímu poklesu morálky." # todo: NEW TRANSLATION
  GUAY_mobalize_the_economy: "Mobilizovat ekonomiku" # todo: NEW TRANSLATION
  GUAY_mobalize_the_economy_desc: "Musíme zahájit mobilizaci ekonomiky, abychom byli připraveni na jakoukoli eventualitu. Lidé si možná budou stěžovat, ale musí vědět, že slouží vyššímu cíli." # todo: NEW TRANSLATION
  GUAY_adopt_minority_languages: "Přijmout menšinové jazyky" # todo: NEW TRANSLATION
  GUAY_adopt_minority_languages_desc: "Abychom posílili morálku a snížili riziko chyb vojenského rozvědčování, zavede se náš vlastní jazyk v celém vojsku." # todo: NEW TRANSLATION
  GUAY_mythologize_the_father_of_the_nation: "Mytizovat otce národa" # todo: NEW TRANSLATION
  GUAY_mythologize_the_father_of_the_nation_desc: "[GUAY_mythologize_the_father_of_the_nation_desc]" # todo: NEW TRANSLATION
  GUAY_mythologize_the_father_of_the_nation_urg: "José Artigas je vnímán jako otec naší země, který bojoval za nezávislost proti nepřátelským sousedům a evropským mocnostem. Jeho odkaz a ideály budou institucionalizovány a stanou se součástí identity Uruguaye." # todo: NEW TRANSLATION
  GUAY_mythologize_the_father_of_the_nation_par: "Francisco López vedl zemi proti Trojalianční alianci a odmítl ustoupit, i když čelil náporu tří národů. Taková odhodlanost a vůle budou zakotveny v každém vojákovi." # todo: NEW TRANSLATION
  GUAY_the_permanent_leader: "Trvalý vůdce" # todo: NEW TRANSLATION
  GUAY_the_permanent_leader_desc: "[ROOT.GetLeader] je symbolem země, a proto ho postavíme na piedestal, aby se stal trvalým vůdcem země." # todo: NEW TRANSLATION
  GUAY_long_term_contracts: "Dlouhodobé smlouvy na zbraně" # todo: NEW TRANSLATION
  GUAY_long_term_contracts_desc: "Nemůžeme konkurovat sousedům v špičkové výrobě zbraní. Dlouhodobé licenční smlouvy s velkými mocnostmi nám umožní vyrábět za výhodnější ceny." # todo: NEW TRANSLATION
  GUAY_clamp_down_on_new_territories: "Utlačit nové území" # todo: NEW TRANSLATION
  GUAY_clamp_down_on_new_territories_desc: "Nemůžeme dovolit anarchii v nových územích. Musíme potlačit odpor a potrestat nepřátele státu." # todo: NEW TRANSLATION
  GUAY_develop_new_territories: "Rozvíjet nová území" # todo: NEW TRANSLATION
  GUAY_develop_new_territories_desc: "Nejlepší způsob, jak zjemnit přesuny území, je poskytovat lidem lepší životní úroveň než měli dříve. To bude naše politika." # todo: NEW TRANSLATION
  GUAY_a_deal_with_devil: "Dohoda s ďáblem" # todo: NEW TRANSLATION
  GUAY_a_deal_with_devil_desc: "Je jasné, že bez spojenců nepřežijeme v nejistém světě. Budeme hledat těsnější vazbu s naším starším partnerem; doufejme, že nás nepovede do záhuby." # todo: NEW TRANSLATION
  GUAY_no_second_american_colonization: "Žádná druhá americká kolonizace" # todo: NEW TRANSLATION
  GUAY_no_second_american_colonization_desc: "Náš kontinent kývá mezi Osy a Spojenci a zatímco naši sousedé vidí jen své poute. Jižní Amerika si zaslouží lepší osud bez starých mocností, aby formovala vlastní osud bez dědictví kolonizace — a pokud musíme přejít po těch s menší vizí, ať tak je." # todo: NEW TRANSLATION
  GUAY_demand_a_seat_at_the_high_table: "Žádat místo u vrcholného stolu" # todo: NEW TRANSLATION
  GUAY_demand_a_seat_at_the_high_table_desc: "Stále nás velké mocnosti považují za druhořadou alianci navzdory našemu přínosu. Požádáme, aby nás nechali sedět u stejného stolu a stát se správci jihu v novém světovém řádu." # todo: NEW TRANSLATION
  GUAY_laissez_faire: "Laissez-Faire" # todo: NEW TRANSLATION
  GUAY_laissez_faire_desc: "Vláda nemá důvod zasahovat do ekonomiky mimo výjimečné okolnosti. Volný trh zvítězí!" # todo: NEW TRANSLATION
  GUAY_laissez_faire_tt: "Velkostatkáři začnou stavět budovy v naší zemi." # todo: NEW TRANSLATION
  GUAY_land_reforms: "Zemědělské reformy" # todo: NEW TRANSLATION
  GUAY_land_reforms_desc: "Musíme zlepšit infrastrukturu v naší zemi; to je první krok moderní společnosti." # todo: NEW TRANSLATION
  GUAY_empower_the_land_owners: "Zmocnit vlastníky půdy" # todo: NEW TRANSLATION
  GUAY_empower_the_land_owners_desc: "Vlastníci půdy jsou nejsilnější klikou v zemi. Zmocníme je více půdou a na oplátku získáme jejich podporu." # todo: NEW TRANSLATION
  GUAY_empower_the_land_owners_desc_tt: "Vlastníci půdy budou více ochotni stavět hodnotné budovy jako §YCivilní továrny§!, §Yvojenské továrny§!, §Yloděnice§! a §Yextra stavební sloty§!" # todo: NEW TRANSLATION
  GUAY_river_trade: "Říční obchod" # todo: NEW TRANSLATION
  GUAY_river_trade_desc: "Naše země je zemí řek. Přesun trajektů po těchto řekách byl vždy důležitý. Má smysl tento obchod rozšířit, pokud budou sousedé ochotni." # todo: NEW TRANSLATION
  GUAY_river_trade_tt: "Přidat: §G+1§! §YCivilní továrnu§! pokud je vztah s [THIS.GetNameDef] nad §Y49§!." # todo: NEW TRANSLATION
  GUAY_the_tag_economic_miracle: "Ekonomický zázrak [THIS.GetAdjective]" # todo: NEW TRANSLATION
  GUAY_the_tag_economic_miracle_desc: "Naše země zažívá, co někteří analytici nazývají ekonomickým zázrakem. Rychlý růst v posledních letech nám umožnil rychle se industrializovat; investoři z celého světa se hrnou investovat a tento růst dál podporují." # todo: NEW TRANSLATION
  GUAY_heavy_industry: "Těžký průmysl" # todo: NEW TRANSLATION
  GUAY_heavy_industry_desc: "I když je naše ekonomika závislá na základních komoditách, nemůžeme opomíjet těžké průmysly. Přílišná závislost na zahraničních výrobcích nás činí zranitelnými při narušení obchodních cest." # todo: NEW TRANSLATION
  GUAY_exploit_mineral_wealth: "Vydolovat minerální bohatství" # todo: NEW TRANSLATION
  GUAY_exploit_mineral_wealth_desc: "Nemáme moc minerálního bohatství, ale to málo, co máme, použijeme naplno." # todo: NEW TRANSLATION
  GUAY_protect_domestic_industries: "Chránit domácí průmysl" # todo: NEW TRANSLATION
  GUAY_protect_domestic_industries_desc: "Při obchodování se zahraničím musíme být opatrní, abychom nepřekonali domácí průmysly levným dovozem. Zavedeme balíček dovozních cel k ochraně domácí ekonomiky." # todo: NEW TRANSLATION
  GUAY_national_academy_of_sciences: "Národní akademie věd" # todo: NEW TRANSLATION
  GUAY_national_academy_of_sciences_desc: "Další investice do výzkumu nám umožní rychleji vyvíjet nové zbraně a dohnat velmoci." # todo: NEW TRANSLATION
  GUAY_national_academy_of_sciences_2: "[THIS.GetAdjective] mechanická univerzita" # todo: NEW TRANSLATION
  GUAY_national_academy_of_sciences_2_desc: "Budoucnost válčení leží ve vysoce technologickém boji. Potřebujeme přesunout lidi z farem do vojenského inženýrství." # todo: NEW TRANSLATION
  GUAY_national_academy_of_sciences_3: "Jižníamerická vyšší univerzita" # todo: NEW TRANSLATION
  GUAY_national_academy_of_sciences_3_desc: "Každý Jihoameričan si zaslouží vyšší vzdělání. Kontrolujeme kontinent a máme prostředky dát každému muži a ženě vzdělání." # todo: NEW TRANSLATION
  GUAY_cooperation_in_the_americas: "$BRA_cooperation_in_the_americas$" # todo: NEW TRANSLATION
  GUAY_cooperation_in_the_americas_desc: "$BRA_cooperation_in_the_americas_desc$" # todo: NEW TRANSLATION
  GUAY_defense_force: "[THIS.GetAdjective] obranné síly" # todo: NEW TRANSLATION
  GUAY_defense_force_desc: "Abychom ochránili občany, musíme vytvořit obranné síly, které odradí potenciální agresi od sousedů." # todo: NEW TRANSLATION
  GUAY_specialized_terrain_training: "Specializovaný výcvik terénu" # todo: NEW TRANSLATION
  GUAY_specialized_terrain_training_desc: "Naše armáda je malá, ale co jí chybí na počtu, může dohánět kvalitou. Specializované divize mohou přebít svou váhu a působit jako odstrašující prostředek." # todo: NEW TRANSLATION
  GUAY_volunteers: "[THIS.GetAdjective] dobrovolníci" # todo: NEW TRANSLATION
  GUAY_volunteers_desc: "Můžeme se vyhnout přímému konfliktu a potenciální zkáze posíláním dobrovolníků místo přímého zapojení. Možná to může rozhodnout výsledky." # todo: NEW TRANSLATION
  GUAY_mass_drafts: "Hromadné branné povinnosti" # todo: NEW TRANSLATION
  GUAY_mass_drafts_desc: "Jasné je, že hranice nelze hlídat malou silou. Jak se svět stává nejistějším, musíme být připraveni hájit své božsky dané hranice." # todo: NEW TRANSLATION
  PAR_mass_drafts: "$GUAY_mass_drafts$" # todo: NEW TRANSLATION
  PAR_mass_drafts_desc: "$GUAY_mass_drafts_desc$" # todo: NEW TRANSLATION
  GUAY_workers_rights: "Práva pracovníků" # todo: NEW TRANSLATION
  GUAY_workers_rights_desc: "Pracovníci, kteří žijí déle a jsou šťastnější, také pracují lépe. Je to výhra pro zdraví národa i ekonomiku zavést práva pracovníků." # todo: NEW TRANSLATION
  GUAY_military_licenses: "Vojenské licence" # todo: NEW TRANSLATION
  GUAY_military_licenses_desc: "Musíme navázat vazby s vojensky vyspělými státy a licencovat jejich zbraně. Nemůžeme se spoléhat pouze na domácí výrobu." # todo: NEW TRANSLATION
  one_of_the_options_tt: "Ve které jedné z možností události bude mít následující efekt:" # todo: NEW TRANSLATION
  PAR_reach_out_to_european_contacts: "Oslovit [USA.GetAdjective] kontakty o pomoc" # todo: NEW TRANSLATION
  PAR_reach_out_to_european_contacts_desc: "Armáda je příliš silná ve srovnání s naší improvizovanou silou. Musíme spolknout pýchu a požádat [USA.GetName] o pomoc a přesvědčit je, že komunistický stát přímo v jejich sféře není preferovatelný." # todo: NEW TRANSLATION
  PAR_ban_vouchers: "Zakázat poukazy jako platidlo" # todo: NEW TRANSLATION
  PAR_ban_vouchers_desc: "Musíme zabránit zaměstnavatelům platit dělníkům tzv. 'bílé peníze' — poukazy, které zaměstnavatelé dávají jako alternativu k hotovosti, udržují nerovnost a závislost zaměstnanců. To musí skončit." # todo: NEW TRANSLATION
  PAR_allow_unions_to_strike: "Dovolit odborům stávkovat" # todo: NEW TRANSLATION
  PAR_allow_unions_to_strike_desc: "Silné odbory jsou potřebné k ochraně dělníků. Předchozí vláda zneškodnila sílu odborů, což už končí." # todo: NEW TRANSLATION
  PAR_allow_women_workers: "Povolit ženské dělnice" # todo: NEW TRANSLATION
  PAR_allow_women_workers_desc: "Po katastrofálních válkách (Trojspojenecká a následná) nám chybí pracovní síla kvůli nedostatku mužů v produktivním věku." # todo: NEW TRANSLATION
  PAR_order_italian_planes: "Objednat [ITA.GetAdjective] letadla" # todo: NEW TRANSLATION
  PAR_order_italian_planes_desc: "Musíme modernizovat armádu. Oslovíme [ITA.GetName], aby naše letectvo bylo na úrovni a odvrátilo jakoukoli hrozbu od sousedů." # todo: NEW TRANSLATION
  PAR_a_call_out_for_aid: "Výzva o pomoc" # todo: NEW TRANSLATION
  PAR_a_call_out_for_aid_desc: "Využijeme prezidentovu [FRA.GetAdjective] manželku, aby lobovala u [FRA.GetAdjective] vlády a umožnila dobrovolníkům pomoci v našem boji." # todo: NEW TRANSLATION
  PAR_request_weapons: "Požádat [USA.GetName] o zbraně" # todo: NEW TRANSLATION
  PAR_request_weapons_desc: "S paltry zásobou lehkých zbraní to nezvítězíme. Musíme oslovit [USA.GetName] a přesvědčit je, že komunistická vláda v jejich sféře není žádoucí." # todo: NEW TRANSLATION
  PAR_to_cross_a_river: "Překročit řeku" # todo: NEW TRANSLATION
  PAR_to_cross_a_river_desc: "Řeka Paraguay je pro nás hlavní překážkou a brání většině přechodů přirozeně. Měli bychom požádat vojensky zkušenou mocnost s vyspělým námořnictvem o pomoc." # todo: NEW TRANSLATION
  PAR_ask_for_bankroll: "Požádat o financování" # todo: NEW TRANSLATION
  PAR_ask_for_bankroll_desc: "Nezvládneme tuto válku, když je ekonomika v troskách. Je jasné, že potřebujeme zahraniční zdroje, které to zafinancují, abychom zabránili pádu země do anarchie." # todo: NEW TRANSLATION
  PAR_assasinate_rafael_franco: "Zastřelit Rafaela Franca" # todo: NEW TRANSLATION
  PAR_assasinate_rafael_franco_desc: "Pokud utneme hlavu hada, může to výrazně snížit morálku nepřítele. Navážeme kontakt s místními disidenty v Chaku a poskytneme jim prostředky, aby to učinili." # todo: NEW TRANSLATION
  PAR_goad_bolivia: "Provokovat Bolívii" # todo: NEW TRANSLATION
  PAR_goad_bolivia_desc: "Kdybychom dokázali zatahnout Bolívii do konfliktu, povstalci by byli mnohem slabší. Riskantní, ale pošleme falešný telegram zmiňující Francoovo přání expandovat do Bolívie po skončení občanské války, snad donutit [BOL.GetAdjective] vládu, aby zasáhla." # todo: NEW TRANSLATION
  PAR_revenge_for_the_chaco_war: "Pomsta za válku v Chacu" # todo: NEW TRANSLATION
  PAR_revenge_for_the_chaco_war_desc: "[BOL.GetName] stále očividně touží po regionu Chaco a je jen otázkou času, kdy znovu zaútočí. Musíme být proaktivní a udeřit první." # todo: NEW TRANSLATION
  PAR_access_the_sea: "Získat přístup k moři" # todo: NEW TRANSLATION
  PAR_access_the_sea_desc: "Naše země nikdy neměla přístav u moře, ale každá velmoc ho potřebuje. Musíme ho získat za každou cenu." # todo: NEW TRANSLATION
  PAR_by_all_means_which_to_win: "Vše, co vede k vítězství" # todo: NEW TRANSLATION
  PAR_by_all_means_which_to_win_desc: "Dokud válka neskončí, potřebujeme, aby celá ekonomika byla zaměřena na konflikt. Populace trpí, ale pokud prohrajeme, bude to mnohem horší pod komunistickou nadvládou..." # todo: NEW TRANSLATION
  PAR_military_pensions: "Vojenské penze" # todo: NEW TRANSLATION
  PAR_military_pensions_desc: "Stará vláda odmítala vyplácet penze veteránům války v Chacu. My neuděláme stejnou chybu." # todo: NEW TRANSLATION
  PAR_rebuild_humaita: "Přestavět Humaitá" # todo: NEW TRANSLATION
  PAR_rebuild_humaita_desc: "Pevnost Humaitá byla zničena během Paraguay War, ale stála jako bulwark proti útokům z jihu. Znovu ji vybudujeme jako symbol odolnosti a provokaci vůči nepřátelům." # todo: NEW TRANSLATION
  PAR_a_great_charter: "Velká charta" # todo: NEW TRANSLATION
  PAR_a_great_charter_desc: "Naše ústava potřebuje být zrušena a nová velká charta napsána. Nová budoucnost pro zemi!" # todo: NEW TRANSLATION
  PAR_pull_back_troops_from_the_chaco: "Stáhnout jednotky z Chaco" # todo: NEW TRANSLATION
  PAR_pull_back_troops_from_the_chaco_desc: "Jednotky ve Chacu se musí stáhnout, aby se snížilo riziko eskalace s [BOL.GetName], a to i přes odpor armády." # todo: NEW TRANSLATION
  PAR_central_bank_of_paraguay: "Centrální banka Paraguaye" # todo: NEW TRANSLATION
  PAR_central_bank_of_paraguay_desc: "Vytvoříme centrální banku, která se stane jediným kanálem pro zahraniční obchod." # todo: NEW TRANSLATION
  PAR_emergency_powers: "Nouzové pravomoci" # todo: NEW TRANSLATION
  PAR_emergency_powers_desc: "Země je ve zranitelném stavu uvnitř i vně a vyžaduje silného vůdce. To lze jen, pokud bude mít pravomoci rychle a rozhodně jednat." # todo: NEW TRANSLATION
  PAR_chaco_war_decoration: "Vyznamenání za válku v Chacu" # todo: NEW TRANSLATION
  PAR_chaco_war_decoration_desc: "Veteráni války v Chacu si zaslouží dekorační vyznamenání, která jim předchozí vláda neposkytla. Malý náklad na uklidnění armády." # todo: NEW TRANSLATION
  PAR_invite_japanese_settlers: "Pozvat japonské osadníky" # todo: NEW TRANSLATION
  PAR_invite_japanese_settlers_desc: "S [BRA.GetName] zastavujícím japonskou imigraci je možnost pozvat je sem. Osadníci přinesou povzbuzení zemědělství a ekonomiky." # todo: NEW TRANSLATION
  PAR_suspend_elections: "Pozastavit volby" # todo: NEW TRANSLATION
  PAR_suspend_elections_desc: "Volby musí být odloženy v současném klimatu. Rezignace liberálních ministrů zanechala málo, kteří by se nám postavili." # todo: NEW TRANSLATION
  PAR_discipline_hierarchy_and_order: "Disciplína, hierarchie a pořádek" # todo: NEW TRANSLATION
  PAR_discipline_hierarchy_and_order_desc: "Po zrušení voleb oznámíme novou politiku „Disciplína, hierarchie a pořádek. Přísný soubor zásad, které budou řídit naši zemi, a osoby, které šíří převratné ideje, budou podrobeny internaci“" # todo: NEW TRANSLATION
  PAR_get_rid_of_colonel_peredes: "Zbavte se plukovníka Paredese" # todo: NEW TRANSLATION
  PAR_get_rid_of_colonel_peredes_desc: "Ministr vnitra Paredes je díky svému vlivu potenciálním rivalem. Odstraníme ho, abychom posílili naši autoritu" # todo: NEW TRANSLATION
  PAR_ban_the_liberal_party: "Zakázat Liberální stranu" # todo: NEW TRANSLATION
  PAR_ban_the_liberal_party_desc: "Liberální strana spřádá spiknutí s Bolivijci. Vyhnanství jejich vůdců je jediným vhodným trestem. Sílu získáme od Colorados" # todo: NEW TRANSLATION
  PAR_ensure_army_loyalty: "Zajistit loajalitu armády" # todo: NEW TRANSLATION
  PAR_ensure_army_loyalty_desc: "Nesouhlas roste a lid vykazuje rozsáhlý odpor a generální stávky. Abychom se vyhnuli stejnému puči jako náš předchůdce, armáda dostane velkou část HDP naší země." # todo: NEW TRANSLATION
  PAR_fedrerista_land_reforms: "Febreristické pozemkové reformy" # todo: NEW TRANSLATION
  PAR_fedrerista_land_reforms_desc: "Musíme provést zásadní pozemkové reformy, abychom posílili farmáře a přerozdělili půdu od mocných velkostatkářů." # todo: NEW TRANSLATION
  PAR_align_with_the_guion_rojo: "Sblížit se s Guión Rojo" # todo: NEW TRANSLATION
  PAR_align_with_the_guion_rojo_desc: "Musíme dostat paramilitární organizaci strany Colorados a jejího vůdce Juana Natalicia Gonzáleze pod naše křídla. Využijeme je k zastrašování a obtěžování naší politické opozice." # todo: NEW TRANSLATION
  PAR_nazify_the_army: "Nazifikovat armádu" # todo: NEW TRANSLATION
  PAR_nazify_the_army_desc: "Nacistická symbolika se již šíří armádou jako požár. Cokoli jiného než přijetí toho a dokonce povzbuzení by rozhněvalo armádu. Můžeme toho využít k přiblížení se k [GER.GetName] a současně posílit vojenskou identitu." # todo: NEW TRANSLATION
  PAR_radicalize_the_police: "Radikalizovat policii" # todo: NEW TRANSLATION
  PAR_radicalize_the_police_desc: "Policie je nezbytná pro udržení vnitřního pořádku, zatímco armáda se soustředí na vnější hrozby, ale může se stát silnějším nástrojem podpory státu. Poskytneme jim větší prostředky a výměnou je podřadíme vládě, a pokud se armáda nebo policie stanou příliš mocnými, vždy je můžeme postavit proti sobě." # todo: NEW TRANSLATION
  PAR_neuter_the_guion_rojo: "Neutralizovat Guión Rojo" # todo: NEW TRANSLATION
  PAR_neuter_the_guion_rojo_desc: "Radikální paramilitární skupina Colorados, Guión Rojo, představuje bezpečnostní hrozbu pro vládu a neustálou trn v oku. Musíme skupinu neutralizovat a odzbrojit dříve, než se rozvine v otevřený konflikt." # todo: NEW TRANSLATION
  PAR_get_rid_of_obsolete_guns: "Zbavit se zastaralých zbraní" # todo: NEW TRANSLATION
  PAR_get_rid_of_obsolete_guns_desc: "Výzbroj naší armády se skládá ze zastaralých zbraní. Musíme modernizovat tím, že se zbavíme šrotu, který nás brzdí, a zmodernizujeme naše sklady." # todo: NEW TRANSLATION
  PAR_liga_nacional_independiente: "Liga Nacional Independiente" # todo: NEW TRANSLATION
  PAR_liga_nacional_independiente_desc: "Abychom podpořili agendu našeho vůdce, posílíme progresivní skupinu LNI, abychom zvýšili legitimitu vlády a potlačili disidentské hlasy." # todo: NEW TRANSLATION
  PAR_union_nacional_revolucionaria: "Partido Revolucionario Febrerista" # todo: NEW TRANSLATION
  PAR_union_nacional_revolucionaria_desc: "Naše nová strana se stane jedinou legální stranou v zemi. Nový začátek Revoluční národní unie, v níž moc a instituce země vycházejí z vedení strany." # todo: NEW TRANSLATION
  PAR_accept_american_loans: "Přijmout americké půjčky" # todo: NEW TRANSLATION
  PAR_accept_american_loans_desc: "Američané na nás tlačí, abychom se nepřipojili k mocnostem Osy, a jsou ochotni do naší země výrazně investovat, aby nás odvrátili od jejich protivníků." # todo: NEW TRANSLATION
  PAR_agricultural_technical_assistence: "Zemědělská a lékařská technická pomoc" # todo: NEW TRANSLATION
  PAR_agricultural_technical_assistence_desc: "Američané jsou ochotni nám poskytnout zemědělskou a lékařskou technologickou modernizaci, pokud odložíme jakékoli plány, které ohrožují jejich zájmy." # todo: NEW TRANSLATION
  PAR_put_estigarribia_on_a_pedestal: "Postavit Estigarribia na piedestal" # todo: NEW TRANSLATION
  PAR_put_estigarribia_on_a_pedestal_desc: "José Félix Estigarribia je všeobecně vnímán jako hrdina jak války v Chacu, tak nyní jako klíčová postava vítězící v občanské válce. Využijeme ho pro propagandistické účely k uklidnění rozbouření občanské války, sjednocení země a odměníme ho za jeho služby." # todo: NEW TRANSLATION
  PAR_purge_the_military_of_dissent: "Očistit armádu od nesouhlasu" # todo: NEW TRANSLATION
  PAR_purge_the_military_of_dissent_desc: "Estigarribia souhlasil, že vykoření veškerý zbytkový nesouhlas v armádě a očistí vazby na Francovu revoluci." # todo: NEW TRANSLATION
  PAR_aftermath_of_the_coup: "Následky občanské války" # todo: NEW TRANSLATION
  PAR_aftermath_of_the_coup_desc: "Země je zpustošená po řadě tvrdých ran. Válka Trojné aliance, konflikt o Chaco a nyní druhá občanská válka zanechaly naši zemi zdevastovanou, ale co můžeme dělat než to snést? Dnes začíná velká rekonstrukce, ¡Paz y justicia! Pro Paraguay!" # todo: NEW TRANSLATION
  PAR_soliders_for_prisoners: "Vězni jako vojáci" # todo: NEW TRANSLATION
  PAR_soliders_for_prisoners_desc: "Naše armáda po občanské válce postrádá muže, což zanechalo naši zemi zranitelnou. S [BOL.GetName] čekajícími na vhodný okamžik, aby si vzali zpět Chaco, potřebujeme prudký příliv mužů jako pojistku. Odpustíme vězňům, pokud souhlasí vstoupit do armády a posílit naše síly, dokud nebude možné vytvořit řádnou armádu." # todo: NEW TRANSLATION
  PAR_brazilian_road_finance: "[BRA.GetAdjective] financování silnic" # todo: NEW TRANSLATION
  PAR_brazilian_road_finance_desc: "[USA.GetName] přesvědčil [BRA.GetAdjective] vládu, aby investovala do rozšíření naší silniční infrastruktury" # todo: NEW TRANSLATION
  par_has_accepted_american_funds: " Přijal @USA americké prostředky" # todo: NEW TRANSLATION
  par_has_accepted_american_funds_tt: "Přijme @USA§Y[USA.GetAdjective]§! prostředky, což zabrání připojení k jiným frakcím na §Y210 dní§!" # todo: NEW TRANSLATION
  PAR_join_the_allies: "Připojit se ke Spojencům" # todo: NEW TRANSLATION
  PAR_join_the_allies_desc: "[USA.GetName] na nás tlačil, abychom se připojili ke spojencům, a nevidíme žádnou alternativu, která by nevedla k významným embargům." # todo: NEW TRANSLATION
  PAR_join_the_axis: "Připojit se k Ose" # todo: NEW TRANSLATION
  PAR_join_the_axis_desc: "Je jasné, že našimi ideologickými spojenci jsou [GER.GetAdjective] a jeho spojenci. Připojíme se k Ose a budeme se těšit z tohoto nového světového řádu." # todo: NEW TRANSLATION
  PAR_join_the_cominterm: "Připojit se ke Kominterně" # todo: NEW TRANSLATION
  PAR_join_the_cominterm_desc: "Ani Osa ani Spojenci nenabízejí alternativu, jež by byla v souladu s naší ideologií, ale [SOV.GetName] je zřejmou alternativou k těmto dvěma zlům." # todo: NEW TRANSLATION
  PAR_mythologize_the_father_of_the_nation: "$GUAY_mythologize_the_father_of_the_nation$" # todo: NEW TRANSLATION
  PAR_mythologize_the_father_of_the_nation_desc: "$GUAY_mythologize_the_father_of_the_nation_desc$" # todo: NEW TRANSLATION
  PAR_cult_of_personality: "$GUAY_cult_of_personality$" # todo: NEW TRANSLATION
  PAR_cult_of_personality_desc: "$GUAY_cult_of_personality_desc$" # todo: NEW TRANSLATION
  PAR_nationalize_foreign_owned_companies: "$GUAY_nationalize_foreign_owned_companies$" # todo: NEW TRANSLATION
  PAR_nationalize_foreign_owned_companies_desc: "$GUAY_nationalize_foreign_owned_companies_desc$" # todo: NEW TRANSLATION
  PAR_adopt_minority_languages: "$GUAY_adopt_minority_languages$" # todo: NEW TRANSLATION
  PAR_adopt_minority_languages_desc: "$GUAY_adopt_minority_languages_desc$" # todo: NEW TRANSLATION
  PAR_free_seconday_schools: "$GUAY_free_seconday_schools$" # todo: NEW TRANSLATION
  PAR_free_seconday_schools_desc: "$GUAY_free_seconday_schools_desc$" # todo: NEW TRANSLATION
  PAR_the_permanent_leader: "$GUAY_the_permanent_leader$" # todo: NEW TRANSLATION
  PAR_the_permanent_leader_desc: "$GUAY_the_permanent_leader_desc$" # todo: NEW TRANSLATION
  PAR_specialized_terrain_training: "$GUAY_specialized_terrain_training$" # todo: NEW TRANSLATION
  PAR_specialized_terrain_training_desc: "$GUAY_specialized_terrain_training_desc$" # todo: NEW TRANSLATION
  PAR_urbanization: "$GUAY_urbanization$" # todo: NEW TRANSLATION
  PAR_urbanization_desc: "$GUAY_urbanization_desc$" # todo: NEW TRANSLATION
  idea_PAR_emergency_powers: "Země pod výjimečnými pravomocemi" # todo: NEW TRANSLATION
  idea_PAR_emergency_powers_desc: "Země je pod výjimečným zákonem, který vládě umožňuje tvrdě zasahovat proti nesouhlasným hlasům a uplatňovat větší zahraničněpolitickou moc." # todo: NEW TRANSLATION
  URG_terras_dictatorship: "Terrova diktatura" # todo: NEW TRANSLATION
  URG_terras_dictatorship_desc: "Gabriel Terra uchvátil kontrolu nad velkou částí země v autopuči před 2 lety, ale stále máme práci, abychom dále upevnili kontrolu nad institucemi." # todo: NEW TRANSLATION
  URG_prohibition_of_usury: "Zákaz lichvy" # todo: NEW TRANSLATION
  URG_prohibition_of_usury_desc: "Už nemůžeme dovolit věřitelům poskytovat půjčky, které nepřiměřeně zvýhodňují věřitele. Je třeba zavést zákony proti lichvě, aby tomu zabránily." # todo: NEW TRANSLATION
  URG_womens_vote: "Volební právo žen" # todo: NEW TRANSLATION
  URG_womens_vote_desc: "Každý stát, který chce být brán jako moderní, musí uznat práva žen a rovnoprávnost pohlaví." # todo: NEW TRANSLATION
  URG_break_relations_with_the_ussr: "Přerušit vztahy s [SOV.GetName]" # todo: NEW TRANSLATION
  URG_break_relations_with_the_ussr_desc: "[SOV.GetName] je nepřirozený útvar. Je zřejmé, že pokud bude budoucí světový řád, spočívá ve Střední Evropě a [USA.GetName], ale nevidíme důvod udržovat vztahy s pariasním státem." # todo: NEW TRANSLATION
  URG_pay_of_all_external_debts: "Splacení všech zahraničních dluhů" # todo: NEW TRANSLATION
  URG_pay_of_all_external_debts_desc: "Stále máme některé zahraniční dluhy vůči různým zemím, a v současném klimatu se státu nehodí mít nevyrovnané závazky." # todo: NEW TRANSLATION
  URG_import_substitution: "Substituce dovozu" # todo: NEW TRANSLATION
  URG_import_substitution_desc: "Založíme naši moderní ekonomiku na belgickém modelu substituce dovozu, abychom vytvořili moderní hospodářství." # todo: NEW TRANSLATION
  URG_la_teja_refinery: "Rafinérie La Teja" # todo: NEW TRANSLATION
  URG_la_teja_refinery_desc: "Založení moderní rafinérie ropy nám umožní stát se konkurenceschopnými na světové scéně a diverzifikovat naši ekonomiku." # todo: NEW TRANSLATION
  URG_revaluation_law: "Zákon o revalvaci" # todo: NEW TRANSLATION
  URG_revaluation_law_desc: "Revaluační zákon z roku 1935 je třeba dále rozšířit, aby Oddělení emisí monopolizovalo veškerou bankovní činnost." # todo: NEW TRANSLATION
  URG_brou: "BROU" # todo: NEW TRANSLATION
  URG_brou_desc: "Banka Východní republiky Uruguay (BROU) musí získat další pravomoci a zřídit měnový fond na zlikvidování našich zahraničních dluhů." # todo: NEW TRANSLATION
  URG_right_to_food_housing_and_health: "Právo na potraviny, bydlení a zdravotní péči" # todo: NEW TRANSLATION
  URG_right_to_food_housing_and_health_desc: "Zakotvíme právo na potraviny, bydlení a zdravotní péči jako klíčový pilíř v ústavě a vyplatíme podporu nejchudším občanům." # todo: NEW TRANSLATION
  URG_conaprole: "Conaprole" # todo: NEW TRANSLATION
  URG_conaprole_desc: "Mléko je dobré, plné živin a hojně dostupné a jsme ideální země k jeho využití. Národní družstvo mlékařů (Conaprole) bude mít monopol na mléčné výrobky a související infrastrukturu, což podpoří rozvoj země." # todo: NEW TRANSLATION
  URG_ministry_of_public_works: "Podpora Ministerstva veřejných prací" # todo: NEW TRANSLATION
  URG_ministry_of_public_works_desc: "Abychom podpořili industrializaci země, vytvoříme rozsáhlý program silnic a dělnických bytů prostřednictvím Ministerstva veřejných prací." # todo: NEW TRANSLATION
  URG_rapid_industrialization: "Rychlá industrializace" # todo: NEW TRANSLATION
  URG_rapid_industrialization_desc: "Vše je připraveno posunout naši zemi do nové éry. Vydáme se na cestu rychlé industrializace a plně uvedeme naši zemi do 20. století." # todo: NEW TRANSLATION
  URG_pluna: "Pluna" # todo: NEW TRANSLATION
  URG_pluna_desc: "Pluna je rostoucí vlajkový dopravce pro nákladní i charterové služby. Investice do něj mohou posunout náš letecký průmysl do moderní éry." # todo: NEW TRANSLATION
  URG_mercado_modelo: "Mercado Modelo" # todo: NEW TRANSLATION
  URG_mercado_modelo_desc: "Je čas nechat za sebou starý zemědělský trh a inaugurovat Mercado Modelo, největší zemědělský trh v zemi." # todo: NEW TRANSLATION
  URG_tour_to_italy: "Cesta do [ITA.GetName]" # todo: NEW TRANSLATION
  URG_tour_to_italy_desc: "Náš vůdce podnikne cestu do [ITA.GetName], aby posílil ekonomická pouta mezi našimi zeměmi." # todo: NEW TRANSLATION
  URG_recognize_francoist_spain: "Uznat frankistické Španělsko" # todo: NEW TRANSLATION
  URG_recognize_francoist_spain_desc: "Je jasné, že frankistické Španělsko je legitimním španělským státem. Okamžitě jej uznáme za pravé Španělsko." # todo: NEW TRANSLATION
  URG_rincon_del_bonete_hydroelectric_power_station: "Vodní elektrárna Rincón del Bonete" # todo: NEW TRANSLATION
  URG_rincon_del_bonete_hydroelectric_power_station_desc: "Elektrifikace naší země je klíčem k modernizaci. [GER.GetAdjective] stát je ochoten financovat výstavbu takového projektu, čímž posílí naše pouta." # todo: NEW TRANSLATION
  URG_allow_nazi_movements_among_german_uruguayan: "[GER.GetAdjective]-[URG.GetAdjective] nacistická hnutí" # todo: NEW TRANSLATION
  URG_allow_nazi_movements_among_german_uruguayan_desc: "V zemi existuje malé nacistické hnutí mezi [GER.GetAdjective]-[URG.GetAdjective] menšinami, nesporně ovlivněné zahraniční politikou jejich vlasti. Někteří volají po potlačení této rétoriky, ale lze ji využít k dalšímu šíření naší agendy." # todo: NEW TRANSLATION
  URG_merge_falangist_movements: "Sjednotit falangistická hnutí" # todo: NEW TRANSLATION
  URG_merge_falangist_movements_desc: "S výjimkou urugujayského revizionismu podporovaného Adolfem Agorio, je falangismus nejpopulárnějším autoritářským hnutím v zemi, ale je rozdělen do několika skupin. Sjednotíme je, aby se stali větším hnutím, než jaké mohou být jednotlivě." # todo: NEW TRANSLATION
  URG_accion_revisionista_del_uruguay: "Acción Revisionista del Uruguay" # todo: NEW TRANSLATION
  URG_accion_revisionista_del_uruguay_desc: "Adolfo Agorio je jednou z hlavních postav urugujského fašismu. Jeho a jemu podobní vliv by mohl být odrazovým můstkem pro větší hnutí, které se rozšíří po [URG.GetName]. Pozveme je do vlády a dáme jim patřičnou legitimitu." # todo: NEW TRANSLATION
  URG_force_through_corporatism: "Prosadit korporativismus" # todo: NEW TRANSLATION
  URG_force_through_corporatism_desc: "Vláda se již jednou pokusila prosadit korporativismus, ale politici se tomu tehdy razantně postavili a myšlenka byla zrušena. Dnes nebude žádný kompromis, prosadíme toto zákonodárství za každou cenu" # todo: NEW TRANSLATION
  URG_establish_the_german_uruguayan_cultural_center: "Posílit Fuhrmannovo kulturní centrum" # todo: NEW TRANSLATION
  URG_establish_the_german_uruguayan_cultural_center_desc: "Kultúrní centrum [GER.GetAdjective]-[URG.GetAdjective] založil Arnulf Fuhrmann, aby šířil pronacistickou propagandu v zemi, což se od růstu Osy jen zvětšilo. Zatímco se vláda snaží tomu zabránit, budeme toto úsilí financovat a uplácet příslušné lidi, aby zůstalo neporušené." # todo: NEW TRANSLATION
  URG_the_fuhrmann_plan: "Fuhrmannův plán" # todo: NEW TRANSLATION
  URG_the_fuhrmann_plan_desc: "Arnulf Fuhrmann navrhl, aby se [URG.GetName] stalo [GER.GetName] kolonií, působící jako odrazový můstek pro frontu Osy v Jižní Americe. Možná ne jako kolonie, ale jako správce osové Jižní Ameriky?" # todo: NEW TRANSLATION
  URG_the_american_springboard: "Americký odrazový můstek" # todo: NEW TRANSLATION
  URG_the_american_springboard_desc: "S upevněnou mocí a mocným ochráncem za námi jsme připraveni začít dobývat naše sousedy." # todo: NEW TRANSLATION
  URG_food_for_the_warmachine: "Potraviny pro válečný stroj" # todo: NEW TRANSLATION
  URG_food_for_the_warmachine_desc: "S velkou částí zemědělské půdy pod naší kontrolou můžeme začít posílat potraviny našim spojencům, čímž posílíme naši moc." # todo: NEW TRANSLATION
  URG_colorado_victory: "Vítězství Colorados ve volbách" # todo: NEW TRANSLATION
  URG_colorado_victory_desc: "Nikdy nebylo pochyb, že Colorados budou nadále vládnout [URG.GetName]" # todo: NEW TRANSLATION
  URG_terra_election: "Volby v roce 1938 proběhly" # todo: NEW TRANSLATION
  URG_blanco_victory: "Vítězství Blancos ve volbách" # todo: NEW TRANSLATION
  URG_blanco_victory_desc: "Povyk, pravděpodobně způsobený diktaturou Gabriela Terry, odcizil voliče od Colorados a přivedl k moci Blancos." # todo: NEW TRANSLATION
  URG_declare_neutrality: "Vyhlásit neutralitu" # todo: NEW TRANSLATION
  URG_declare_neutrality_desc: "Nesmíme se vměšovat do evropských záležitostí." # todo: NEW TRANSLATION
  URG_legalize_the_pool: "Legalizovat sázení" # todo: NEW TRANSLATION
  URG_legalize_the_pool_desc: "Legalizace sázení zvýší příjmy státu a zároveň bude velmi populární mezi masami." # todo: NEW TRANSLATION
  URG_break_diplomatic_relations_with_the_axis: "Přerušit diplomatické vztahy s mocnostmi Osy" # todo: NEW TRANSLATION
  URG_break_diplomatic_relations_with_the_axis_desc: "Navzdory vyhlášení neutrality je jasné, že Osa zla už nemůže být tolerována. Válka jasně favorizuje Spojence a nevyplatí se nám být na prohrávající straně." # todo: NEW TRANSLATION
  URG_join_the_allies: "Připojit se ke Spojencům" # todo: NEW TRANSLATION
  URG_join_the_allies_desc: "Po tlaku ze strany [USA.GetName] je jasné, že se už nemůžeme válce vyhýbat. To málo, co můžeme udělat, nyní vložíme do boje." # todo: NEW TRANSLATION
  URG_a_new_constitution: "Nová ústava" # todo: NEW TRANSLATION
  URG_a_new_constitution_desc: "Současná ústava je nepoužitelná. Potřebujeme novou, která posune zemi do nové éry." # todo: NEW TRANSLATION
  URG_the_good_coup: "„Dobrý“ puč" # todo: NEW TRANSLATION
  URG_the_good_coup_desc: "Ústava byla setkána s prudkým odporem. Nemůžeme se zabývat zbytečnou politikou, pokud chceme přivést Uruguay do budoucnosti. Jako to udělal Terra předtím, provedeme autopuč, ale místo masových zatýkání a násilí to provedeme bezkrvavě a bez pronásledování." # todo: NEW TRANSLATION
  URG_law_no_9914: "Zákon č. 9914" # todo: NEW TRANSLATION
  URG_law_no_9914_desc: "S [FIN.GetName] pod útokem od [SOV.GetNameDef] vláda schválila zákon 9914, který umožňuje odložit pesos, aby pomohly Finům. Nasbírali jsme vlnu a 10 600 000 gramů konzervovaného hovězího masa, přičemž každá plechovka nese nápis „od urugayského lidu hrdinné armádě Finska“." # todo: NEW TRANSLATION
  URG_investigate_german_and_italian_cultural_organization: "Vyšetřit německé a italské organizace" # todo: NEW TRANSLATION
  URG_investigate_german_and_italian_cultural_organization_desc: "Kulturní a sportovní organizace spojené s Itálií a Německem jsou podezřelé z ukrývání fašistických sympatizantů. Musíme na ně dohlížet a vyšetřovat je kvůli jakémukoli pochybení." # todo: NEW TRANSLATION
  URG_american_air_bases: "Americké letecké základny" # todo: NEW TRANSLATION
  URG_american_air_bases_desc: "Amerika na nás tlačí, abychom jim dovolili zřídit letecké základny na našem území. To nám jistě pomůže bránit se jakékoli hrozbě Osy." # todo: NEW TRANSLATION
  URG_law_no_9943: "Zákon č. 9943" # todo: NEW TRANSLATION
  URG_law_no_9943_desc: "Navzdory neutralitě je jasné, že svět se rychle propadá do nejistoty. Musíme připravit naše síly a zavést celostátní brannou povinnost k obraně našich hranic." # todo: NEW TRANSLATION
  URG_herrerismo: "Herrerismo" # todo: NEW TRANSLATION
  URG_herrerismo_desc: "Náš vůdce vytvořil Herrerismo, směs nacionalismu, konzervatismu a populismu. S tímto doufá vybudovat silnou politickou základnu." # todo: NEW TRANSLATION
  URG_traditionalism: "Tradiční hodnoty" # todo: NEW TRANSLATION
  URG_traditionalism_desc: "Návrat k tradici je cesta do budoucnosti. To, co fungovalo dřív, bude fungovat i teď." # todo: NEW TRANSLATION
  URG_ruralism: "Venkovství" # todo: NEW TRANSLATION
  URG_ruralism_desc: "Naše voličské jádro je na venkově a je nezbytné, abychom do něj silně investovali." # todo: NEW TRANSLATION
  URG_americanism: "Amerikanismus" # todo: NEW TRANSLATION
  URG_americanism_desc: "Musíme zajistit, aby se naše zaměření jako země soustředilo na jihoamerické hodnoty a chránilo je v zahraniční politice." # todo: NEW TRANSLATION
  URG_anti_imperialism: "Antiemperialismus" # todo: NEW TRANSLATION
  URG_anti_imperialism_desc: "Musíme zaujmout jasné stanovisko proti imperialismu a vměšování cizích mocností do Jižní Ameriky." # todo: NEW TRANSLATION
  URG_anticentralism: "Proti centralizaci" # todo: NEW TRANSLATION
  URG_anticentralism_desc: "Je zřejmé, že snahy centralizovat zemi kolem Montevidea nejsou proveditelné. Lepší je zachovat hodnoty venkovské třídy tam, kde jsou, a městské populace tam, kde jsou, aby všichni mohli společně prosperovat." # todo: NEW TRANSLATION
  URG_legacy_of_batlle: "Odkaz Batllea" # todo: NEW TRANSLATION
  URG_legacy_of_batlle_desc: "Ať nás budoucnost zavede kamkoli, je jasné, že strana Colorado je navždy spjata s odkazem José Batlle y Ordóñeze. Vždy budeme přijímat jeho myšlenku univerzální sociální spravedlnosti" # todo: NEW TRANSLATION
  URG_statism: "Statismus" # todo: NEW TRANSLATION
  URG_statism_desc: "V těchto časech je nutný jasný a silný stát s centralizovanou kontrolou nad sociálními a ekonomickými záležitostmi." # todo: NEW TRANSLATION
