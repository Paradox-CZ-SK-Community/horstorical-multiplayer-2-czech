  SMB_jet_tech_bonus: "Bonus pro pokročilé letectví" # todo: NEW TRANSLATION
  SMB_carrier_conversion: "Přestavěné letadlové lodě" # todo: NEW TRANSLATION
  SMB_carrier_conversion_desc: "Naše námořní letecká síla nestačí k obraně našich národních zájmů. Zatímco si nemůžeme dovolit stavět speciální letadlové lodě, můžeme zakoupit vyřazené křižníky a přestavět je na jednoduché letadlové lodě jako dočasné řešení." # todo: NEW TRANSLATION
  JUNO_army_academy_random_generals_tt: "§YTři§! náhodně vybraní armádní velitelé získají §G+1§! dovednost plánování" # todo: NEW TRANSLATION
  JUNO_support_company_initiative: "Iniciativa podpůrné roty" # todo: NEW TRANSLATION
