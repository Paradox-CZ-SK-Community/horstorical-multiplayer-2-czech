  SMB_mountain_guns: "Investovat do horských děl" # todo: NEW TRANSLATION
  SMB_mountain_guns_desc: "Naše armáda zaznamenala, že ačkoliv může být velmi silná, dělostřelectvo je v horském terénu Chile téměř nepoužitelné. Proto zadali objednávku na horská děla konstruovaná pro snadnější použití v horách, abychom mohli nadále využívat tuto smrtící zbraň." # todo: NEW TRANSLATION
  SMB_tierra_del_fuego_training: "Výcvik na Tierra del Fuego" # todo: NEW TRANSLATION
  SMB_tierra_del_fuego_training_desc: "Naši vojáci musí být řádně vycvičeni, pokud mají účinně bojovat v chladném jihu a na horách. Musíme proto zajistit výcviková tábory pro jednotky na Tierra del Fuego, aby se lépe aklimatizovali na chlad." # todo: NEW TRANSLATION
  SMB_atacama_training: "Cvičit v poušti Atacama" # todo: NEW TRANSLATION
  SMB_atacama_training_desc: "Naši vojáci musí být řádně vycvičeni, chceme‑li, aby efektivně bojovali v horku tropů a pouští. Nejlepší řešení je zřídit výcvikové tábory v poušti Atacama, kde se mohou lépe aklimatizovat na vedro." # todo: NEW TRANSLATION
  SMB_a_land_of_mountains: "Země hor" # todo: NEW TRANSLATION
  SMB_a_land_of_mountains_desc: "[ROOT.GetName] má dlouhou tradici využívání horského terénu ve svůj prospěch při boji a v budoucnu tomu nebude jinak. Jsme národ zvyklý žít v horách a využijeme naše odborné znalosti k poražení každého obra, na kterého narazíme." # todo: NEW TRANSLATION
  SMB_navy_desc: "[SMB_navy_desc_key]" # todo: NEW TRANSLATION
  SMB_navy_desc_default: "Naše námořnictvo od Velké války stagnuje natolik, že mnoho našich plavidel již není k ničemu. Je čas investovat do flotily a zahájit masivní modernizační program." # todo: NEW TRANSLATION
  SMB_CHL_navy_desc: "Ač má naše flotila dlouhou a hrdou tradici, prestiž námořnictva byla vážně poškozena námořní vzpourou v roce 1931. Investováním do Armada de Chile můžeme pomoci obnovit veřejnou důvěru v naše námořnictvo." # todo: NEW TRANSLATION
  SMB_naval_academy_desc: "[SMB_naval_academy_desc_key]" # todo: NEW TRANSLATION
  SMB_naval_academy_default_desc: "Pouhá výroba a údržba lodí není dostatečná k vytvoření námořnictva. Potřebujeme důstojníky a specialisty vysoce vyškolené v použití námořních prostředků v boji. Proto zřídíme [ROOT.GetAdjective] námořní akademii k výcviku další generace námořních důstojníků." # todo: NEW TRANSLATION
  SMB_naval_academy_CHL_desc: "Naše Escuela Naval má dlouhou historii vzdělávání schopných námořních důstojníků, ale pokračující investice jsou klíčové, aby naši admirálové a kapitáni byli připraveni na moderní námořní válku." # todo: NEW TRANSLATION
  SMB_construct_naval_bases_desc: "Naše námořní zařízení jsou zastaralá a zoufale potřebují modernizaci. Investicemi do nich budeme schopni stavět a udržovat mnohem schopnější námořní prostředky." # todo: NEW TRANSLATION
  SMB_naval_foreign_advisors_desc: "Naši námořní důstojníci měli v poslední době málo příležitostí ověřit své schopnosti v boji. Můžeme tedy těžit z pozvání důstojníků z cizích námořnictv k výcviku našich důstojníků v moderních námořních taktikách." # todo: NEW TRANSLATION
  SMB_reescalate_the_naval_arms_race_desc: "I když nemáme se sousedy formální dohodu o velikosti našich námořnictev, od Velké války jsme se zdržovali jejich výrazného rozšiřování. Válka je však opět na obzoru a bylo by lepší mít náskok v přezbrojení před sousedy." # todo: NEW TRANSLATION
  SMB_blue_water_fleet_desc: "Projekce námořní síly je kritická pro každou zemi usilující o zařazení mezi velmoci nebo udržení silného odstrašení vůči možným nepřátelům. Měli bychom proto zajistit, aby naše námořnictvo mělo správné vybavení a výcvik pro efektivní působení i daleko od domovských přístavů." # todo: NEW TRANSLATION
  SMB_coastal_fleet_desc: "Nemáme velké ambice bojovat po celém světě. Hlavním cílem naší flotily by proto mělo být chránit naše pobřeží a zabránit nepříteli v vylodění sil na našich březích." # todo: NEW TRANSLATION
  SMB_purchase_cruisers_and_dreadnoughts_desc: "Ač se naše průmyslová síla rozrůstá, čas není na naší straně. Abychom adekvátně posílili námořnictvo, potřebujeme co nejdříve více kapitálních lodí. Obrátíme se proto na velmoci, zda jsou ochotny prodat odstavené dreadnoughty a křižníky." # todo: NEW TRANSLATION
  SMB_minelaying_desc: "Udržovat dostatek lodí k obraně našeho rozsáhlého pobřeží po celou dobu může být nesmírně drahé. Pokládání min nabízí levnější řešení, které může odradit nebo zpomalit nepřátelské síly, dokud dorazí flotila." # todo: NEW TRANSLATION
  SMB_escort_fleet_desc: "Dny velkých bitevních flotil jsou pryč, moderní námořní válka vyžaduje flotily menších plavidel v eskortních formacích spolu s omezeným počtem kapitálních lodí. Námořnictvo musí proto přesměrovat své plány, aby takové taktiky zvládlo." # todo: NEW TRANSLATION
  SMB_raiding_fleet_desc: "Námořní zásobovací trasy jsou pro fungování většiny ekonomik zásadní. Využití našich námořních prostředků k narušení těchto tras může přimět i ty nejsilnější země padnout na kolena." # todo: NEW TRANSLATION
  SMB_degaussing_desc: "Začneme odmagnetovávat trupy našich lodí a snižovat jejich magnetický podpis. To je ochrání před magnetickými minami a sníží elektronický profil lodí." # todo: NEW TRANSLATION
  SMB_naval_invasion_desc: "Vyrovnání se s nepřátelskou zemí často vyžaduje vylodění vojáků na jejím pobřeží. Abychom maximalizovali schopnost provádět takové operace, začneme cvičit armádu a námořnictvo společně." # todo: NEW TRANSLATION
  SMB_cruiser_subs_desc: "Atlantský a Tichý oceán jsou rozsáhlé a vyžadují ponorky, které mohou samostatně operovat efektivně po delší dobu. Musíme proto investovat do vývoje vlastních křižníkových ponorek." # todo: NEW TRANSLATION
  SMB_midget_subs_desc: "Provoz samostatně nasaditelných ponorek v rozlehlých oceánech by byl marný. Lepší využití zdrojů dosáhneme stavbou menších plavidel určených do mělčích vod našich pobřeží." # todo: NEW TRANSLATION
  SMB_expand_repair_yards_desc: "I ty nejsilnější lodě s nejefektivnějšími posádkami nakonec budou potřebovat opravy před návratem do služby. Měli bychom investovat do našich námořních loděnic, aby byl tento proces co nejrychlejší." # todo: NEW TRANSLATION
  SMB_enlarge_naval_facilities_desc: "Nedávné události ve světě jasně ukazují, že naše námořnictvo se musí rozšířit, pokud chceme udržet adekvátní flotilu. Prvním krokem je rozšíření stávajících námořních zařízení." # todo: NEW TRANSLATION
  SMB_merchant_marine_desc: "Přeprava surovin po moři je pro národní bezpečnost mnoha států nezbytná, náš stát není výjimkou. Měli bychom proto vybudovat profesionální obchodní flotilu schopnou podporovat naše ozbrojené síly v krizi." # todo: NEW TRANSLATION
  SMB_aircraft_carriers_desc: "Abychom nezůstali pozadu za nepřáteli, musíme začlenit letadla do námořnictva. K tomu je nutné vyrobit vlastní letadlové lodi. Využití trupů našich větších zastaralých lodí může zrychlit jejich výrobu." # todo: NEW TRANSLATION
  SMB_fortification_effort_desc: "I když námořnictvo a letectvo jsou hlavními prostředky, jak zabránit nepřátelským silám dosáhnout našich břehů, měli bychom udržovat silný pás pobřežních opevnění jako poslední linii obrany proti případnému vetřelci." # todo: NEW TRANSLATION
