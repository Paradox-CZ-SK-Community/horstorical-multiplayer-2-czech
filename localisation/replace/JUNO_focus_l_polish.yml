l_polish:
  SMB_army_default: "Vyzbrojit Fuerzas Armadas" # todo: NEW TRANSLATION
  SMB_army_default_desc: "Ač nejsou k opovržení, naše ozbrojené síly jsou stále slabší, než bychom si přáli. Vyzbrojení vojáků modernějšími zbraněmi a jejich výcvik, aby byly připraveny k boji kdykoli, je nezbytné." # todo: NEW TRANSLATION
  SMB_military_facilities_default: "Rozšířit vojenská zařízení" # todo: NEW TRANSLATION
  SMB_military_facilities_default_desc: "Abychom řádně vyzbrojili armádu, musíme zvětšit zbrojní průmysl. Stavba nových průmyslových zařízení určených speciálně pro výrobu vojenské techniky je tedy nutností." # todo: NEW TRANSLATION
  SMB_department_of_propaganda_default: "Oddělení propagandy" # todo: NEW TRANSLATION
  SMB_department_of_propaganda_default_desc: "Svět hoří a navzdory našemu úsilí ne všichni v civilním obyvatelstvu podporují válečnou politiku. Musíme proto vytvořit oddělení věnované přesvědčování obyvatel o výhodách ozbrojeného mezinárodního boje." # todo: NEW TRANSLATION
  SMB_logistics_department_default: "Založení logistického oddělení" # todo: NEW TRANSLATION
  SMB_logistics_department_default_desc: "Jižní Amerika možná je naším domovem, ale přesto je to nemilosrdný kontinent pro boje běžných armád. Abychom tento problém zmírnili, bylo by prospěšné založit odvětví ozbrojených sil věnované výhradně správě a distribuci logistiky." # todo: NEW TRANSLATION
  SMB_support_company_default: "Význam podpůrných jednotek" # todo: NEW TRANSLATION
  SMB_support_company_bra: "Výcvik džunglových průkopníků" # todo: NEW TRANSLATION
  SMB_jungle_pioneers: "$SMB_support_company_bra$" # todo: NEW TRANSLATION
  SMB_jungle_pioneers_desc: "$SMB_support_company_default_desc$" # todo: NEW TRANSLATION
  SMB_jungle_pioneers_tt: "Unlocks support battalion §YDžungloví průkopníci:§!\n §YDžungle§!:\n  Pohyb §G+40%§!, \n  Útok §G+5%§!, \n  Obrana §G+5%§!" # todo: NEW TRANSLATION
  SMB_support_company_default_desc: "Naše nedávné vytvoření logistického oddělení vedlo k řadě poznatků. Za prvé, aby tok zásob udržel, musí být vyrobeno dostatečné množství vhodného vybavení a zásob, a náš současný materiál nestačí. Musíme modernizovat naše podpůrné vybavení, pokud chceme držet krok s konkurencí." # todo: NEW TRANSLATION
  SMB_department_of_military_intelligence_default: "Oddělení vojenské rozvědky" # todo: NEW TRANSLATION
  SMB_department_of_military_intelligence_default_desc: "I když si slova mohou odporovat, je důležité pochopit, že bez řádných informací o pozicích a motivacích nepřítele bude obtížné je porazit v přímém boji. Vytvoření oddělení vojenské rozvědky pro armádu je proto nutností." # todo: NEW TRANSLATION
  SMB_motorized_default: "Investovat do motorového průmyslu" # todo: NEW TRANSLATION
  SMB_motorized_default_desc: "Budoucnost války zahrnuje rychlá vozidla, která obkličují a ničí nepřátele, aniž by jim dali čas zareagovat, nikoli pěchotu v liniích z 16. či 17. století — strategie, která zbytečně plýtvá časem a lidskou silou s malým efektem." # todo: NEW TRANSLATION
  SMB_tank_warfare_default_CHL: "Válka v Patagonii" # todo: NEW TRANSLATION
  SMB_tank_warfare_default: "Tanková válka" # todo: NEW TRANSLATION
  SMB_tank_warfare_default_desc: "Nejlepším doplňkem pohyblivé armády je jednotka silných kovových kolosů s palebnou silou, která přemůže téměř každého nepřítele. Jediná otázka je, zda by měla být naše výroba tanků zaměřena na německou Blitz strategii, nebo by měly sloužit jako podpora pěchoty?" # todo: NEW TRANSLATION
  SMB_tank_warfare_tt: "Odemyká rozhodnutí §YSpecializovat§! naše národní programy obrněné techniky" # todo: NEW TRANSLATION
  SMB_domestic_production_default: "Zaměřit se na domácí výrobu" # todo: NEW TRANSLATION
  SMB_domestic_production_default_desc: "I když je to bezpochyby obtížnější a časově náročnější, je mnohem přínosnější vyvíjet a vyrábět tanky v naší vlastní zemi, abychom zajistili kvalitu produktu a nespoléhali se na dodávky, které mohou být odcizeny ještě před doručením." # todo: NEW TRANSLATION
  SMB_mechanized_troops_default: "Mechanizovat jednotky" # todo: NEW TRANSLATION
  SMB_mechanized_troops_default_desc: "Abychom posunuli naše ozbrojené síly a správně uchopili budoucnost válčení, provedeme rozsáhlé úsilí o mechanizaci našich běžných jednotek, aby spolu s tankovými pluky mohly na bojišti řádit kryté brněním." # todo: NEW TRANSLATION
  SMB_army_academy_default: "Rozšířit vojenskou akademii" # todo: NEW TRANSLATION
  SMB_army_academy_default_desc: "Efektivní zbraně nejsou jediným faktorem určujícím výsledek bitvy. Dalším velkým faktorem je dovednost jednotlivého vojáka i generála, který velení. Abychom toho dosáhli, měli bychom investovat do rozšíření operací armádního oddělení naší vojenské akademie." # todo: NEW TRANSLATION
  SMB_regular_infantry_default: "Síla běžného vojáka" # todo: NEW TRANSLATION
  SMB_regular_infantry_default_desc: "Ač je výzbroj důležitá, skutečná síla armády spočívá v jednotlivém vojákovi bránícím vlast, chránícím své hodnoty a bojujícím za své blízké. Proto musíme co nejvíce zvýšit morálku běžného vojáka a dát mu nejlepší šance vyhrát své nejtěžší bitvy." # todo: NEW TRANSLATION
  SMB_artillery_CHL: "Využít výrobu dusičnanů" # todo: NEW TRANSLATION
  SMB_artillery_default: "Specializace průmyslu těžkých děl" # todo: NEW TRANSLATION
  SMB_artillery_default_desc: "Naše ekonomika není tak silná jako u velmocí jako Británie, Francie a Itálie. Proto budeme muset specializovat výrobu těžkých děl, pokud chceme silnější a lepší vybavení, i když bychom si přáli mít peníze na vše, co chceme." # todo: NEW TRANSLATION
  SMB_foreign_designs_default: "Získávání zahraničních návrhů" # todo: NEW TRANSLATION
  SMB_foreign_designs_default_desc: "I když bychom si přáli mít vědce a inženýry k vlastní výrobě obrněnců, je nejlepší využít naše kontakty a vyjednat dobré obchody na mezinárodním trhu; v současnosti je to jediná realistická možnost získat specializované vybavení." # todo: NEW TRANSLATION
  SMB_foreign_advisors_default: "Zahraniční poradci" # todo: NEW TRANSLATION
  SMB_foreign_advisors_default_desc: "Ač jsou [ROOT.GetAdj] vojenské instrukce dobré, nejsou tak kvalitní jako ti, kteří bojovali v mnoha konfliktech a byli vyškoleni na prestižních vojenských akademiích v jiných zemích. Měli bychom tedy přilákat zahraniční vojenské poradce, kteří pomohou školit naše armády v odbornostech jejich zemí a tak posílí ozbrojené síly." # todo: NEW TRANSLATION
  SMB_army_professionalism_CHL: "Prusifikace armády" # todo: NEW TRANSLATION
  SMB_army_professionalism_default: "Dále zvyšovat profesionalitu armády" # todo: NEW TRANSLATION
  SMB_army_professionalism_default_desc: "I když se může zdát dobré mít co nejvíce vojáků připravených k nástupu, podle našich zahraničních vojenských poradců je mnohem důležitější zajistit, aby armáda podávala špičkový výkon v kterémkoli okamžiku." # todo: NEW TRANSLATION
  SMB_conscription_default: "Zvýšit brannou povinnost" # todo: NEW TRANSLATION
  SMB_conscription_default_desc: "Ač profesionalita našich vojáků může být zpochybněna, není pochyb, že tomu, co armádě nyní zoufale chybí, je více vojáků k zaplnění řad, protože trpíme nedostatkem mužů ochotných vstoupit do ozbrojených sil." # todo: NEW TRANSLATION
  SMB_conscription_CHL: "Ponaučení z Velké války" # todo: NEW TRANSLATION
  SMB_experimental_weapons_department_default: "Oddělení experimentálních zbraní" # todo: NEW TRANSLATION
  SMB_experimental_weapons_department_default_desc: "Pokud nechceme zaostávat za rivaly v technické oblasti, bylo by nejlepší začít teoretizovat a pokoušet se vyvíjet takzvané zázračné zbraně, abychom nebyli na bojišti překonáni." # todo: NEW TRANSLATION
  SMB_nuclear_program_default: "Domácí jaderný program" # todo: NEW TRANSLATION
  SMB_nuclear_program_default_desc: "Američané a Němci usilovně pracují na odhalení tajemství atomu a nemůžeme si dovolit za nimi zaostávat. Ač mají válku na mysli, naši vědci rovněž vidí způsoby, jak využít štěpení atomu ke zlepšení civilního života." # todo: NEW TRANSLATION
  SMB_nuclear_program_key_BRA: "Programa Paralelo" # todo: NEW TRANSLATION
  SMB_special_forces_default: "Programy speciálních sil" # todo: NEW TRANSLATION
  SMB_special_forces_default_desc: "Naše armáda, i když malá, by mohla být zásadně posílena využitím speciálně vycvičených vojáků, kteří vynikají v určitých situacích a typech boje. Zavedení programů pro výcvik a udržování takových vojáků by mělo být naší nejvyšší prioritou." # todo: NEW TRANSLATION
  SMB_special_forces_option_1_default: "Posílit horské pluky" # todo: NEW TRANSLATION
  SMB_special_forces_option_1_default_desc: "Horské jednotky armády by měly získat zvláštní pozornost od našeho vrchního velení, jelikož provádějí činy, o kterých by si naše běžné jednotky mohly nechat jen zdát. Umožňují boj v zrádných Andách a mohou podporovat naše běžné jednotky při postupu." # todo: NEW TRANSLATION
  SMB_special_forces_option_2_default: "Silný sbor mariňáků" # todo: NEW TRANSLATION
  SMB_special_forces_option_2_default_desc: "Jelikož námořnictvo je jednou z našich silných stránek, bylo by více než prospěšné využít toho a umožnit mu vlastní vojenské odvětví složené z vyčerpávajícím způsobem vycvičených a vysoce efektivních mariňáků." # todo: NEW TRANSLATION
  SMB_special_forces_option_2_CHL_desc: "[ROOT.GetNameDefCap] má dlouhou tradici námořní pěchoty, ale od konce Války v Pacifiku byly zredukovány na pobřežní dělostřelecké útvary. Přeměnou těchto jednotek na sbor mariňáků vybavený pro expediční válku bude [ROOT.GetNameDef] opět schopen projekce síly zámořsky, tak jako úspěšně činil v 19. století." # todo: NEW TRANSLATION
  SMB_special_forces_option_3_default: "Rozšířit letecké odvětví armády" # todo: NEW TRANSLATION
  SMB_special_forces_option_3_default_desc: "Jelikož letectvo je jednou z našich silných stránek, bylo by prospěšné využít toho a umožnit mu mít vlastní vojenskou větev složenou ze speciálně vycvičených a mimořádně efektivních parašutistů." # todo: NEW TRANSLATION
  SMB_special_forces_option_1_continuation_default: "Programy výcviku rangerů" # todo: NEW TRANSLATION
  SMB_special_forces_option_1_continuation_default_desc: "Abychom podpořili naše horské jednotky, měli bychom nasadit rangers — vojáky zvlášť cvičené v útocích a průzkumu nejen v horském prostředí, ale také v lesích a džunglích Jižní Ameriky." # todo: NEW TRANSLATION
  SMB_special_forces_option_2_continuation_default: "Podpora mariňáků" # todo: NEW TRANSLATION
  SMB_special_forces_option_2_continuation_default_desc: "Aby naši mariňáci fungovali na plný výkon, měli bychom zvážit vývoj technologií je podporujících, jako jsou přistávací vozidla a lepší techniky distribuce zásob při vylodění na břeh." # todo: NEW TRANSLATION
  SMB_special_forces_option_3_continuation_default: "Podpora leteckých vylodění" # todo: NEW TRANSLATION
  SMB_special_forces_option_3_continuation_default_desc: "Aby měli naši parašutisté co největší šanci na úspěch při seskoku, měli bychom vyvíjet technologie, které zvýší jejich přežitelnost, ať už jde o výsypnou výstroj nebo maskované přídavné kontejnery s výzbrojí." # todo: NEW TRANSLATION
  SMB_air_defense_default: "Protivzdušná obrana" # todo: NEW TRANSLATION
  SMB_air_defense_default_desc: "Nyní, když naši rivalové odhalili své pravé záměry a začali vyvíjet vlastní letecké zbraně, musíme připravit naši reakci. Měli bychom tedy zahájit rychlou výstavbu a nasazení protiletadlových pozic a děl." # todo: NEW TRANSLATION
  SMB_air_force_default: "Vyzbrojit Fuerzas Aéreas" # todo: NEW TRANSLATION
  SMB_air_force_default_desc: "Mnozí teoretici by tvrdili, že oblastí, v níž nejvíce zaostáváme, je rozvoj moderního letectva. Musíme na tom tvrdě pracovat: stavět nové hangáry a zařízení a vyškolit další piloty." # todo: NEW TRANSLATION
  SMB_air_academy_default: "Zřídit řádnou leteckou akademii" # todo: NEW TRANSLATION
  SMB_air_academy_default_desc: "Nejen vojáci pozemních sil potřebují řádné vzdělání. Naši piloti, ač nadšení, postrádají odborný výcvik potřebný k vítězství v soubojích. Abychom to vyřešili, měli bychom rozšířit vojenskou akademii o více kurzů zaměřených na letectvo." # todo: NEW TRANSLATION
  SMB_construct_air_bases_default: "Postavit nové letecké základny" # todo: NEW TRANSLATION
  SMB_construct_air_bases_default_desc: "Kromě profesionálně vycvičených a motivovaných pilotů nám chybí další klíčová složka pro velké letectvo – letiště. Ačkoliv jich pár máme, nestačí k rozšíření letectva na konkurenceschopnou úroveň." # todo: NEW TRANSLATION
  SMB_domestic_designs_default: "Domácí návrhy" # todo: NEW TRANSLATION
  SMB_domestic_designs_default_desc: "Bylo by nejlepší vytvářet a vyrábět vlastní modely a návrhy letadel, protože jiné země nelze považovat za důvěryhodné při navrhování či výrobě strojů vhodných pro naše piloty." # todo: NEW TRANSLATION
  SMB_license_designs_default: "Licencovat zahraniční návrhy" # todo: NEW TRANSLATION
  SMB_license_designs_default_desc: "Výzkum a vývoj vlastních návrhů letadel zabere příliš mnoho času a úsilí. Měli bychom proto licencovat zahraniční vybavení a soustředit se na jeho výrobu zde v [ROOT.GetNameDef]." # todo: NEW TRANSLATION
  SMB_purchase_aircraft_default: "Nakoupit zahraniční letadla" # todo: NEW TRANSLATION
  SMB_purchase_aircraft_default_desc: "Naše letectvo dospělo k závěru, že by bylo příliš nákladné a časově náročné nejen vyvíjet, ale i vyrábět vlastní letadla. Prosazují proto nákup zahraničního vybavení, čehož bychom se měli držet." # todo: NEW TRANSLATION
  SMB_establish_aircraft_industry_default: "Domácí letecký průmysl" # todo: NEW TRANSLATION
  SMB_establish_aircraft_industry_BRA: "Empresa Brasileira de Aeronáutica" # todo: NEW TRANSLATION
  SMB_establish_aircraft_industry_default_desc: "Je zřejmé, že pokud chceme udržet produkční efektivitu co nejvyšší, musíme v našich hranicích vybudovat rozsáhlý letecký průmysl." # todo: NEW TRANSLATION
  SMB_flying_fortress_default: "Létající pevnosti" # todo: NEW TRANSLATION
  SMB_flying_fortress_default_desc: "Jediný způsob, jak správně využít letectvo, je bombardovat nepřítele do podřízení, dokud před horizontem nezůstane nic stát. Měli bychom proto stavět velká letadla schopná nést co nejvíce výbušnin." # todo: NEW TRANSLATION
  SMB_tactical_air_force_default: "Taktické letectvo" # todo: NEW TRANSLATION
  SMB_tactical_air_force_default_desc: "Letecké síly by neměly sloužit jen k podpoře pozemních jednotek, ale k vykonávání celé řady komplexních úkolů, které samotné pozemní síly nezvládnou. To je podstata vynikajícího letectva." # todo: NEW TRANSLATION
  SMB_nimble_air_force_default: "Obratné letectvo" # todo: NEW TRANSLATION
  SMB_nimble_air_force_default_desc: "Letouny by měly být schopny předčířit nejen nepřátelská letadla, ale i dohled protiletadlových děl a námořních plavidel. Letectvo by mělo sestávat z menších strojů určených k vzdušným soubojům a úderům efektivním způsobem, aniž by se staly příliš těžkými na rychlé a rozhodné manévrování." # todo: NEW TRANSLATION
  SMB_strategic_bombing_default: "Zaměřit se na strategické bombardování" # todo: NEW TRANSLATION
  SMB_strategic_bombing_default_desc: "Válku vyhráváte tím, že porazíte nepřítele nejen v boji, ale i tím, že ochromíte jeho ekonomiku a průmyslové kapacity. Proto by mělo být strategické bombardování naším hlavním cílem ve válce." # todo: NEW TRANSLATION
  SMB_army_support_default: "Podpora armády" # todo: NEW TRANSLATION
  SMB_army_support_default_desc: "Armáda nemůže zvítězit, pokud je aktivně napadána ze vzduchu. Proto by naše letectvo mělo kromě obrany vojáků být silně zaměřeno i na provádění takových útoků proti našim oponentům." # todo: NEW TRANSLATION
  SMB_winning_the_air_war_default: "Vítězství ve vzdušné válce" # todo: NEW TRANSLATION
  SMB_winning_the_air_war_default_desc: "Ač je podpora pozemních sil a námořní bombardování důležité, bez kontroly oblohy jsou tyto akce bezcenné. Naše letectvo by mělo být proto zaměřeno na dosažení co největší kontroly nad oblohou." # todo: NEW TRANSLATION
  SMB_naval_support_default: "Zaměřit se na námořní podporu" # todo: NEW TRANSLATION
  SMB_naval_support_default_desc: "Hlavním cílem našich letadel je vyčistit cestu a chránit naše námořnictvo a civilní konvoje. Je proto důležité navrhovat letadla pro roli námořní podpory a hlídkování a zajistit, aby mohla přežít palbu palubních protiletadlových děl." # todo: NEW TRANSLATION
  SMB_air_modifier_boost_1_default: "Specializace na pozemní podporu" # todo: NEW TRANSLATION
  SMB_air_modifier_boost_1_default_desc: "Je velmi důležité zajistit, aby se pěchota vždy dostala tam, kam potřebuje; proto je důležité zaměřit letectvo na její podporu, ať už prostřednictvím přímé letecké podpory, nebo bombardování za liniemi nepřítele." # todo: NEW TRANSLATION
  SMB_air_modifier_boost_2_default: "Vývoj pokročilých konstrukcí letadel" # todo: NEW TRANSLATION
  SMB_air_modifier_boost_2_default_desc: "Pokud chceme, aby naše stroje přežily kontakt s nepřítelem, musí nejen vyhýbat se co nejvíce zásahům, ale také vydržet pár zásahů a doletět zpět k opravám. Proto bychom měli vyvíjet lepší konstrukce trupu a motory, aby piloti byli v bezpečí za každých okolností." # todo: NEW TRANSLATION
  SMB_air_doctrine_default: "Doktrinální pokroky" # todo: NEW TRANSLATION
  SMB_air_doctrine_default_desc: "Je třeba poznamenat, že bez správné strategie ani nejlepší piloti a letadla nemohou v boji vyniknout. Války jsou o plánování, strategiích a maximálním využití individuálních sil národa. Měli bychom proto vyvinout velké úsilí k vytvoření nových doktrín pro naše letectvo." # todo: NEW TRANSLATION
  SMB_aircraft_carriers_default: "Letadlové lodě" # todo: NEW TRANSLATION
  SMB_joint_operative_command_default: "Velitelství společných operací" # todo: NEW TRANSLATION
  SMB_joint_operative_command_default_desc: "Nyní, když jsme rozvinuli armádu a vytvořili dobré základy pro letectvo, je čas zajistit koordinaci a spolupráci mezi těmito odvětvími. Zřídíme společné velitelské centrum složené z velitelů vybraných z obou složek." # todo: NEW TRANSLATION
  SMB_war_planning_office_default: "Úřad pro válečné plánování" # todo: NEW TRANSLATION
  SMB_war_planning_office_default_desc: "Musíme také zajistit, aby armáda dostávala řádné a promyšlené plány a rozkazy, abychom v informační válce nezaostali a nezískali zastaralé informace vedoucí k zákeřným útokům a zničení. Měli bychom proto založit úřad pro válečné plánování, který lépe zkoordinuje tyto snahy." # todo: NEW TRANSLATION
  SMB_women_in_aviation_default: "Ženy v letectví" # todo: NEW TRANSLATION
  SMB_women_in_aviation_default_desc: "Ač ne vždy tak jsou vnímány, ženy vždy hrály důležitou roli ve společnosti, a nyní je čas, aby převzaly úkoly dříve považované pouze za mužské, jako je výroba i pilotování našich letadel." # todo: NEW TRANSLATION
