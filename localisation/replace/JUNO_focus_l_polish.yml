  SMB_jungle_warfare_training: "Zřídit CIGS" # todo: NEW TRANSLATION
  SMB_jungle_warfare_training_desc: "Několik našich vojenských důstojníků nás vyzvalo, abychom investovali do zřízení specializovaného výcvikového zařízení v Amazonii. Cílem bude připravit naše jednotky na nekonvenční válčení v džungli a podporovat využití terénu jako spojence v boji." # todo: NEW TRANSLATION
  SMB_brown_water_navy: "Říční flotila" # todo: NEW TRANSLATION
  SMB_brown_water_navy_desc: "Řeky protékající džunglemi Jižní Ameriky nejsou naší armádou dostatečně využívány. Rozšíříme naši říční flotilu o několik malých říčních útočných člunů, které budou podporovat naše vojáky, když jsou daleko od posil či zásob." # todo: NEW TRANSLATION
