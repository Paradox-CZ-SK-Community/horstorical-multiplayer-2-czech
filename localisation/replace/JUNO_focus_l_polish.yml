  SMB_purchase_destroyers_and_subs: "[SMB_purchase_destroyers_and_subs_key]" # todo: NEW TRANSLATION
  SMB_purchase_destroyers_and_subs_desc: "Jak se svět stále více destabilizuje, potřebujeme rozšířit naše schopnosti námořní projekce síly. Naštěstí některá z hlavních námořnictev mohou být ochotna se zbavit svých starších plavidel." # todo: NEW TRANSLATION
