  tank_pintle_hmg: "Těžký kulomet na pantu" # todo: NEW TRANSLATION
  tank_pintle_hmg_desc: "Těžký kulomet na pantu namontovaný na vrcholu tankové věže. Umístění zbraně vystavuje člena posádky, čímž snižuje celkovou účinnost, ale umožňuje tanku zasahovat více cílů, včetně letadel. To je zvláště užitečné při útoku." # todo: NEW TRANSLATION
  car_pintle_hmg: "Těžký kulomet na pantu" # todo: NEW TRANSLATION
  car_pintle_hmg_desc: "Těžký kulomet na pantu namontovaný na vrcholu věže obrněného vozu. Umístění zbraně vystavuje člena posádky, čímž snižuje celkovou účinnost, ale umožňuje obrněnému vozu zasahovat více cílů, včetně letadel. To je zvláště užitečné při útoku." # todo: NEW TRANSLATION
  tank_rocket_rails: "Bočně montované rakety" # todo: NEW TRANSLATION
  tank_rocket_rails_desc: "Sada raketometů na lištách instalovaných na boku věže." # todo: NEW TRANSLATION
  car_rocket_rails: "Bočně montované rakety" # todo: NEW TRANSLATION
  car_rocket_rails_desc: "Sada raketometů na lištách instalovaných na boku věže." # todo: NEW TRANSLATION
  car_heavy_machine_gun_special: "Vnitřní těžký kulomet" # todo: NEW TRANSLATION
  car_heavy_machine_gun_special_desc: "Těžký kulomet v montáži uvnitř hlavní korby. Umístění zbraně omezuje palebný úhel, snižuje celkovou účinnost, ale umožňuje obrněnému vozu zasahovat více cílů. To je zvláště užitečné při útoku." # todo: NEW TRANSLATION
  mechanized_chassis_desc: "Mechanizovaná pěchota je pěchota vybavená obrněnými transportéry (APC) nebo bojovými vozidly pěchoty (IFV) pro transport a boj. Mechanizovaná pěchota se od motorové pěchoty odlišuje tím, že její vozidla poskytují určitou úroveň ochrany proti nepřátelné palbě, na rozdíl od měkce opláštěných kolových vozidel (nákladní auta nebo džípy) motorové pěchoty." # todo: NEW TRANSLATION
  mechanized_chassis_0_desc: "Mechanizovaná pěchota je pěchota vybavená obrněnými transportéry (APC) nebo bojovými vozidly pěchoty (IFV) pro transport a boj. Mechanizovaná pěchota se od motorové pěchoty odlišuje tím, že její vozidla poskytují určitou úroveň ochrany proti nepřátelné palbě, na rozdíl od měkce opláštěných kolových vozidel (nákladní auta nebo džípy) motorové pěchoty." # todo: NEW TRANSLATION
  mechanized_chassis_1_desc: "Mechanizovaná pěchota je pěchota vybavená obrněnými transportéry (APC) nebo bojovými vozidly pěchoty (IFV) pro transport a boj. Mechanizovaná pěchota se od motorové pěchoty odlišuje tím, že její vozidla poskytují určitou úroveň ochrany proti nepřátelné palbě, na rozdíl od měkce opláštěných kolových vozidel (nákladní auta nebo džípy) motorové pěchoty." # todo: NEW TRANSLATION
  mechanized_chassis_2_desc: "Mechanizovaná pěchota je pěchota vybavená obrněnými transportéry (APC) nebo bojovými vozidly pěchoty (IFV) pro transport a boj. Mechanizovaná pěchota se od motorové pěchoty odlišuje tím, že její vozidla poskytují určitou úroveň ochrany proti nepřátelné palbě, na rozdíl od měkce opláštěných kolových vozidel (nákladní auta nebo džípy) motorové pěchoty." # todo: NEW TRANSLATION
  tank_nsb_car_engine_upgrade: "Motor" # todo: NEW TRANSLATION
  tank_nsb_car_armor_upgrade: "Pancéřování" # todo: NEW TRANSLATION
  car_squeezebore_adaptor: "Squeeze-bore adaptér" # todo: NEW TRANSLATION
  car_squeezebore_adaptor_desc: "Speciální adaptér na konci hlavně snižuje průměr závěru a vtlačí střelu na menší ráži. To výrazně zvyšuje rychlost výstřelu a tím i průbojnost děla. Vyžaduje však speciální munici vyrobenou z drahých materiálů." # todo: NEW TRANSLATION
  car_holzgas_engine: "Dřevoplynový motor" # todo: NEW TRANSLATION
  car_holzgas_engine_desc: "Motor, který spaluje dřevo za účelem výroby hořlavého plynu nebo používá stlačený plyn k pohonu motoru. Olej není potřeba, ale motor je sám o sobě velmi těžkopádný a nespolehlivý." # todo: NEW TRANSLATION
  car_hydrostatic_engine: "Hydrostatický pohon" # todo: NEW TRANSLATION
  car_hydrostatic_engine_desc: "Hydrostatický pohon je převod, který vyžaduje specializovaný motor. Zvyšuje rychlost otáčení věže a průchodnost tanku a zároveň spotřebovává méně paliva díky pohonu hydraulikou." # todo: NEW TRANSLATION
  car_petrol_electric_engine: "Benzín-elektrický motor" # todo: NEW TRANSLATION
  car_petrol_electric_engine_desc: "Kombinace benzínového motoru napájejícího elektrický motor. Složitý, drahý a nespolehlivý, přesto nabízí bezkonkurenční výkon v taktických manévrech." # todo: NEW TRANSLATION
  tank_designer_mech_amtrac_chassis: "Amfibická mechanizovaná" # todo: NEW TRANSLATION
