  SOV_armored_car_at_equipment_1: "BA-64E-37"
  SOV_armored_car_at_equipment_1_short: "BA-64E-37"
  ITA_armored_car_at_equipment_1: "AS.42 47/32"
  ITA_armored_car_at_equipment_1_short: "AS.42 47/32"
  JAP_armored_car_at_equipment_1: "Obrněný vůz Typ 4"
  JAP_armored_car_at_equipment_1_short: "Obrněný vůz Typ 4"
  FRA_armored_car_at_equipment_1: "Voiture spéciale 207"
  FRA_armored_car_at_equipment_1_short: "V.S. 207"
  DELETE_DOCK: "Odstranit loděnici"
  naval_bomber3: "Námořní bombardéry 1944"
  air_offensex_desc: "Při zaměření na denní bombardování musíme udržet naše bombardéry v bezpečí před zachytávajícími stíhači. Výcvik našich pilotů stíhaček pro úzkou spolupráci s bombardéry zlepší jejich schopnosti při ochraně bombardérů v nepřátelském vzdušném prostoru."
  fighter_baitingx: "Nástraha pro stíhače"
  fighter_baitingx_desc: "Tím, že se jevíme zranitelně, můžeme nepřátelské letouny přilákat do léček."
  dogfighting_experiencex: "Zkušenosti v soubojích"
  dogfighting_experiencex_desc: "Není snadné sledovat relativní pozice přátel a nepřátel v hektickém víru vzdušného souboje, ale s narůstající zkušeností se naši piloti v tom zlepšují."
  fighter_ace_initiativex: "Iniciativa eso stíhačů"
  fighter_ace_initiativex_desc: "Udílení zvláštních ocenění a statusu pilotům, kteří dosáhnou statusu esa sestřelením pěti nepřátel, podporuje riskování a pocit elitářství u esových pilotů - i když to má tendenci udržovat zkušené piloty v bojových pozicích."
  modifier_repair_speed_air_base_factor: "§YLetecká základna§! Rychlost oprav"
  multialtitude_flyingx: "Létání na více výškách"
  multialtitude_flyingx_desc: "Vzdušný boj probíhá ve třech dimenzích, ale většině pilotů je obtížnější sledovat letadla nad a pod nimi. Můžeme toho využít rozptýlením formací vertikálně."
  offensive_formationsx: "Ofenzivní formace"
  offensive_formationsx_desc: "Výcvik v více ofenzivně orientovaných formacích činí naše stíhače smrtícími v boji."
  fighter_sweepsx: "Stíhací hlídky"
  fighter_sweepsx_desc: "Agresivní hlídky stíhačů nad nepřátelským územím mohou chytit jejich letadla při startu nebo přistání, když jsou obzvlášť zranitelná, nebo narušit výcvikové lety nepřítele."
  force_rotationx: "Rotace sil"
  force_rotationx_desc: "Boj nebo dlouhé období intenzivního nasazení je vyčerpávající, ale střídáním čerstvých sil kdykoli je to možné můžeme snížit chyby způsobené únavou pilotů."
  air_defencex: "Vzdušná obrana"
  air_defencex_desc: "Výcvik pilotů, aby byli neustále ve střehu, i když se zdá, že nebezpečí není, zvyšuje jejich šance na zachycení nepřátelských letadel."
  dispersed_fightingx: "Rozptýlené nasazení"
  dispersed_fightingx_desc: "Přijetí více rozptýlené formace umožňuje stejnému počtu letadel hlídkovat větší oblast."
  forward_interceptionx: "Předsunutá interceptace"
  forward_interceptionx_desc: "Operováním blíže k nepřátelskému vzdušnému prostoru se zvyšuje pravděpodobnost, že naši stíhači zachytí nepřátelská letadla dříve, než dosáhnou svých cílů."
  fighter_veteran_initiativex: "Iniciativa veteránů stíhaček"
  fighter_veteran_initiativex_desc: "Zaměření na dlouhodobé přežití pilotů, jak rozumnou taktikou, tak rotací zkušených pilotů do výcvikových pozic, znamená, že mohou předávat zkušenosti novým pilotům."
  formation_fightingx: "Létání ve formaci"
  formation_fightingx_desc: "Létání ve správných formacích umožňuje našim pilotům krýt si navzájem slepé úhly, což vede ke zvýšené schopnosti odhalit nepřátelská letadla."
  air_skirmishx: "Letecké přestřelky"
  air_skirmishx_desc: "Bohužel není vždy možné zničit každé nepřátelské letadlo nad naší zemí, ale je možné je obtěžovat od okamžiku, kdy jsou spatřena, až do okamžiku, kdy odletí, neustále je oslabovat."
  home_defencex: "Domácí obrana"
  home_defencex_desc: "Pozorovatelé na zemi i stanice pro detekci a naslouchání spolupracují s naším letectvem při sledování a ničění nepřátelských vpádů."
  battlefield_destructionx: "Ničení na bojišti"
  battlefield_destructionx_desc: "Zatímco letectvo může útočit na vzdálené nepřátelské země, může být také velmi užitečné při přímé podpoře armády v bitvách."
  dive_bombingx: "Bombardování z ponoru"
  dive_bombingx_desc: "Bombardování z ponoru umožňuje větší přesnost, ale pro nejlepší výsledky vyžaduje specializovaná letadla, která dokážou zpomalit ponor a vydržet zatížení při vytažení."
  direct_ground_supportx: "Přímá podpora pozemních sil"
  direct_ground_supportx_desc: "Úzkou koordinací pilotů CAS s pozemními pozorovateli lze leteckou palebnou podporu přesně nasměrovat tak, aby nejlépe pomohla jednotkám v bitvě."
  bomber_veteran_initiativex: "Iniciativa veteránů bombardérů"
  bomber_veteran_initiativex_desc: "Politika, kdy veteráni předávají své znalosti nováčkům, výrazně zvyšuje jejich šance na přežití."
  bomber_ace_initiativex: "Iniciativa esových bombardérů"
  bomber_ace_initiativex_desc: "Formální uznání a odměňování esových pilotů bombardérů podporuje odvahu a iniciativu."
  cas_veteran_initiativex: "Iniciativa veteránů pozemního útoku"
  cas_veteran_initiativex_desc: "Politika, kdy veteráni předávají své znalosti nováčkům, výrazně zvyšuje jejich šance na přežití."
  cas_ace_initiativex: "Iniciativa esových pozemních útočníků"
  cas_ace_initiativex_desc: "Formální uznání a odměňování esových pilotů CAS podporuje odvahu a iniciativu."
  hunt_and_destroyx: "Lov a likvidace"
  hunt_and_destroyx_desc: "Kromě poskytování přímé palebné podpory mohou jednotky CAS samostatně hledat cíle a často překvapit nepřátelské pozemní síly, když se pohybují směrem k frontě."
  naval_strike_torpedo_tacticsx: "Taktika torpédových útoků"
  naval_strike_torpedo_tacticsx_desc: "Výcvik pilotů pro přesnější útoky torpédy učiní naše nálety na nepřátelské lodě efektivnější."
  naval_strike_torpedo_tactics_oix: "Taktika torpédových útoků"
  naval_strike_torpedo_tactics_oix_desc: "Výcvik pilotů pro přesnější útoky torpédy učiní naše nálety na nepřátelské lodě efektivnější."
  naval_strike_tacticsx: "Taktika námořních úderů"
  naval_strike_tacticsx_desc: "Výcvik pilotů v předvídání pohybu lodí a koordinaci útoků učiní naše nálety na nepřátelské lodě efektivnější."
  low_echelon_supportx: "Podpora nízkých ešelonů"
  low_echelon_supportx_desc: "Přidělením jednotek CAS přímo malým pozemním formacím zajistíme, že budou mít vždy dodatečnou palebnou sílu k dispozici, i když jsou mimo dosah tradičního dělostřelectva."
  combat_unit_destructionx: "Zničení bojových jednotek"
  combat_unit_destructionx_desc: "Výcvik pilotů CAS, aby opakovaně útočili na stejný cíl, dokud nebude potvrzeno jeho zničení, zajišťuje, že cíle nebudou ponechány po těsném zásahu."
  operational_destructionx: "Operační ničení"
  operational_destructionx_desc: "Útoky na zásobovací linie nepřátelských pozemních sil omezují jejich schopnost přesouvat se mezi bojišti. To znamená výhodu pro naši armádu v oblastech, kde máme vzdušnou nadvládu."
  infrastructure_destructionx: "Ničení infrastruktury"
  infrastructure_destructionx_desc: "Výcvik pilotů v nejlepších způsobech útoku na infrastrukturu, jako jsou železnice a mosty, činí taktická bombardování účinnějšími."
  logistical_bombingx: "Logistické bombardování"
  logistical_bombingx_desc: "Větší zaměření na útoky ze vzduchu na nepřátelské zásobovací linie dává naší pozemní armádě větší výhodu v dané oblasti."
  battlefield_supportx: "Podpora na bojišti"
  battlefield_supportx_desc: "Je obtížné pro taktická bombardovací letadla útočit na cíle v těsné blízkosti našich pozemních jednotek, protože nivelní bombardování je méně přesné než bombardování z ponoru, ale více výcviku a spolupráce s pozemními pozorovateli může tyto problémy překonat."
  carousel_bombingx: "Kruhové bombardování"
  carousel_bombingx_desc: "Bombardéry často chtějí jednoduše vysypat všechny bomby po dosažení cílové oblasti a pak co nejrychleji odletět domů. To může fungovat při plošném bombardování, ale při zásahu malého cíle je efektivnější setrvat nad cílem a shazovat jen část nákladu najednou pro maximální přesnost."
  keypoint_bombingx: "Bombardování klíčových bodů"
  keypoint_bombingx_desc: "Přesné bombardování cílených klíčových bodů na bojišti v podpoře našich pozemních sil jim může výrazně pomoci porazit nepřítele."
  ground_support_integrationx: "Integrace pozemní podpory"
  ground_support_integrationx_desc: "Plné začlenění našeho taktického bombardovacího letectva s pozemními pozorovateli zvyšuje jejich přesnost a umožňuje jim přímo podporovat naše pozemní síly v boji."
  strategic_destructionx: "Strategické ničení"
  strategic_destructionx_desc: "Naši piloti mají přístup k strategickým cílům mnohem rychleji než naše námořní nebo pozemní síly. Bez prostředků k vyzbrojení jejich nováčků brzy převýšíme nepřátelské síly."
  high_level_bombingx: "Bombardování z velké výšky"
  high_level_bombingx_desc: "Z větších výšek se lze vyhnout některým leteckým soubojům a protiletadlovému ozbrojení. Shazování bomb z vyšší výšky vyžaduje větší přesnost, ale je bezpečnější."
  massed_bomber_formationsx: "Husté formace bombardérů"
  massed_bomber_formationsx_desc: "Držením formace se bombardéry mohou vzájemně bránit a zvyšují naše šance na úspěšné shození bomb."
  night_bombingx: "Noční bombardování"
  night_bombingx_desc: "S oslabenými nepřátelskými obrannými prostředky a našimi bombardéry krytými tmou můžeme být ofenzivní a efektivní nonstop. Ukažme nepříteli, jak jsme neústupní.\n\n"
  dead_reckoning_bombingx: "Bombardování podle odhadu"
  dead_reckoning_bombingx_desc: "Měřením rychlosti, směru a driftu z předchozích pozic můžeme vypočítat přesnější shození bomb i během noci."
  infiltration_bombingx: "Infiltrační bombardování"
  infiltration_bombingx_desc: "Připojování se k nepřátelským formacím nebo jejich sledování až zpět na základnu může vypadat jako šílenství. S dostatečným cvičením je to však možné."
  pathfinder_groupsx: "Skupiny průkopníků"
  pathfinder_groupsx_desc: "Veteránští piloti jsou vybaveni nejlepšími nástroji k osvětlení pozic cílů. Žádný kouř ani špatné počasí nemůže zastavit bombardéry ve vykonání mise."
  day_bombingx: "Denní bombardování"
  day_bombingx_desc: "Soustředěné úsilí přes den je ničivé díky velké výhodě viditelnosti. Projekce síly je vítaným vedlejším efektem.\n\n"
  escort_relay_systemx: "Systém střídání eskorty"
  escort_relay_systemx_desc: "Bombardéry doprovázené stíhači výrazně zlepšují naši schopnost reagovat na nepřátelskou palbu."
  flying_fortressx: "Létající pevnost"
  flying_fortressx_desc: "Vybavení našich vysoko létajících těžkých bombardérů zbraněmi k ochraně a dostatečným pancéřováním, aby vydržely zásahy a přesto se vrátily domů."
  mass_destructionx: "Hromadné ničení"
  mass_destructionx_desc: "Bombardéry jsou vybaveny nejničivějšími zbraněmi ve velkém množství. Zaručuje výsledky i pokud projde jen málo pilotů."
