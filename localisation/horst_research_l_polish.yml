  GER_jaegartroops: "Jägaři I"
  GER_jaegartroops_desc: "Jägaři jsou jednotky specializované na přežití v divočině boreálního lesa. Obvykle jsou tyto jednotky domorodé ve svém teritoriu a jejich výcvik trvá dlouho."
  GER_jaegartroops2_desc: "Jägaři jsou jednotky specializované na přežití v divočině boreálního lesa. Obvykle jsou tyto jednotky domorodé ve svém teritoriu a jejich výcvik trvá dlouho."
  GER_jaegartroops3_desc: "Jägaři jsou jednotky specializované na přežití v divočině boreálního lesa. Obvykle jsou tyto jednotky domorodé ve svém teritoriu a jejich výcvik trvá dlouho."
