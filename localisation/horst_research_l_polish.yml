  car_4x4_suspension: "Pohon čtyř kol" # todo: NEW TRANSLATION
  car_4x4_suspension_desc: "4 kola umožňují vyšší rychlost a snadnější výrobu, čímž vzniká rychlé a obratné průzkumné vozidlo." # todo: NEW TRANSLATION
  car_6x6_suspension: "Pohon šesti kol" # todo: NEW TRANSLATION
  car_6x6_suspension_desc: "6 kol je pomalejší, ale má lepší ovladatelnost, což činí lepší vozidla pro podporu pěchoty na frontě a lov partyzánů." # todo: NEW TRANSLATION
  car_8x8_suspension: "Pohon osmi kol" # todo: NEW TRANSLATION
  car_8x8_suspension_desc: "Konfigurace 8x8 činí obrněný vůz podobnějším tankům, s lepší ovladatelností a větším potenciálem na léčky." # todo: NEW TRANSLATION
  car_riveted_armor: "Nýtované pancéřování" # todo: NEW TRANSLATION
  car_riveted_armor_desc: "Pancéřové desky připevněné k rámu nýty. Velmi osvědčená technologie, poměrně levná, ale nýty představují slabá místa v pancíři a mohou ublížit posádce, pokud jsou zasaženy." # todo: NEW TRANSLATION
  car_welded_armor: "Svařované pancéřování" # todo: NEW TRANSLATION
  car_welded_armor_desc: "Pancéřové desky jsou svařeny k podvozku. Rychlejší proces než lití, přitom poskytuje dobrou ochranu." # todo: NEW TRANSLATION
  car_flat_armor: "Ploché uspořádání pancíře" # todo: NEW TRANSLATION
  car_flat_armor_desc: "Dominantní v meziválečném období, plochý pancíř se snadno vyrábí a poskytuje méně stísněnou korbu pro posádku, což zvyšuje efektivní koordinaci." # todo: NEW TRANSLATION
  car_semi-flat_armor: "Poloploché uspořádání pancíře" # todo: NEW TRANSLATION
  car_semi-flat_armor_desc: "Kompromis mezi skloněným a neskloněným pancířem; na některých místech je úhel mnohem strmější a tedy efektivní tloušťka větší, zatímco v jiných částech korby ploché desky umožňují snadnější umístění součástí." # todo: NEW TRANSLATION
  car_sloped_armor: "Skloněné uspořádání pancíře" # todo: NEW TRANSLATION
  car_sloped_armor_desc: "Pancéřování umístěné pod úhlem vůči dopadající střele má mnohem větší efektivní tloušťku než stejná tloušťka umístěná vertikálně. Také zvyšuje šanci, že střela se odrazí. Vyžaduje však návrh celého vozidla kolem této koncepce, což ztěžuje montáž." # todo: NEW TRANSLATION
  car_nft_two_man_tank_turret: "Kasematové umístění děla" # todo: NEW TRANSLATION
  car_nft_two_man_tank_turret_desc: "Umístění hlavního děla v otevřené kasematě umožňuje montáž větších kanónů." # todo: NEW TRANSLATION
  car_rocket_launcher: "§GBasic§! Raketomet" # todo: NEW TRANSLATION
  car_rocket_launcher_desc: "Vícehlavňový odpalovač neřízených vysoce explozivních raket. Vysoký objem palby mu dává vynikající výkon proti měkkým cílům, ale i přímé zásahy proti obrněným cílům příliš neublíží." # todo: NEW TRANSLATION
  car_rocket_launcher_2: "§2Vylepšený§! Raketomet" # todo: NEW TRANSLATION
  car_rocket_launcher_2_desc: "I když existuje řada zlepšení přesnosti, hlavní výhodou tohoto vylepšeného raketometu je, že může nést více raket k odpálení na nepřítele." # todo: NEW TRANSLATION
  car_medium_howitzer_desc: "Střední polní houfnice upravená pro montáž do vozidla. Jejím hlavním účelem je nepřímá palebná podpora proti měkkým cílům, ale může být v případě nutnosti vystřelena přímo na cíl. Nese jen malé množství průbojné munice, proto není vhodná pro proti-tankovou práci." # todo: NEW TRANSLATION
  car_medium_howitzer_2: "§GVylepšená§! Střední houfnice" # todo: NEW TRANSLATION
  car_medium_howitzer_2_desc: "Střední polní houfnice upravená pro montáž do vozidla. Jejím hlavním účelem je nepřímá palebná podpora proti měkkým cílům, ale může být v případě nutnosti vystřelena přímo na cíl. Nese jen malé množství průbojné munice, proto není vhodná pro proti-tankovou práci." # todo: NEW TRANSLATION
  car_medium_howitzer_3: "§2Pokročilá§! Střední houfnice" # todo: NEW TRANSLATION
  car_medium_howitzer_3_desc: "Střední polní houfnice upravená pro montáž do vozidla. Jejím hlavním účelem je nepřímá palebná podpora proti měkkým cílům, ale může být v případě nutnosti vystřelena přímo na cíl. Nese jen malé množství průbojné munice, proto není vhodná pro proti-tankovou práci." # todo: NEW TRANSLATION
  amtrac_chassis: "Amfibická vyloďovací vozidla" # todo: NEW TRANSLATION
  amtrac_chassis_short: "Amtracy" # todo: NEW TRANSLATION
  amtrac_chassis_desc: "Amfibické traktory, nebo Amtracy, umožňují vylodění mariňáků na pláž pod pancéřovou ochranou. To však stojí na úkor špatné spotřeby paliva." # todo: NEW TRANSLATION
  amtrac_chassis_0: "Základní amfibický traktor" # todo: NEW TRANSLATION
  amtrac_chassis_0_short: "Základní amtrac" # todo: NEW TRANSLATION
  amtrac_chassis_0_desc: "Amfibické traktory, nebo Amtracy, umožňují vylodění mariňáků na pláž pod pancéřovou ochranou. To však stojí na úkor špatné spotřeby paliva." # todo: NEW TRANSLATION
