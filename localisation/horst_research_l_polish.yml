  amtrac_riveted_armor: "Nýtované pancéřování" # todo: NEW TRANSLATION
  amtrac_riveted_armor_desc: "Spojování ocelových desek nýty je levné a rychlé, nevyžaduje kvalifikovanou pracovní sílu. Má to však za následek, že každý nýt se stává slabým místem." # todo: NEW TRANSLATION
