  sov_fighter_equipment_desc: "Stíhačky jsou rychlé a obratné a mohou plnit mnoho úkolů. Všechno od boje o vzdušnou nadvládu, ochrany našich bombardérů až po zachytávání nepřátelských bombardérů."
