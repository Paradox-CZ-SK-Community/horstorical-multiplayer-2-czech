  amtrac_full_horstmann_suspension: "Horstmannovo zavěšení" # todo: NEW TRANSLATION
  amtrac_full_horstmann_suspension_desc: "Podobné Christieho zavěšení, Horstmannovo zavěšení rozkládá hmotnost na více kol, což umožňuje montáž těžšího vybavení bez obav o poruchy." # todo: NEW TRANSLATION
  amtrac_full_hydropneumatic_suspension: "Hydropneumatické zavěšení" # todo: NEW TRANSLATION
  amtrac_full_hydropneumatic_suspension_desc: "Složitější typ zavěšení; po nárazu do výmolu se silniční kola zvednou, což dovoluje přesnější palbu za jízdy a obsazení obranných pozic v nerovném terénu." # todo: NEW TRANSLATION
