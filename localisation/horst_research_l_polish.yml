  tank_front_plate_fixed_superstructure_turret: "Střelecký štít věže" # todo: NEW TRANSLATION
  tank_front_plate_fixed_superstructure_turret_desc: "Kovové pancéřové desky jsou namontovány před požadovanou hlavní výzbrojí k ochraně střelců před čelní palbou z malých zbraní. Boky jsou však vážně oslabeny ve srovnání s úplnější pevnou nadstavbou. Tento štít umožňuje továrně namontovat větší dělo, než by bylo obvyklé na lehčím podvozku. Štít navíc stojí téměř nic ve srovnání s jinými možnostmi." # todo: NEW TRANSLATION
  tank_platform_mount_turret: "Střelecká platforma" # todo: NEW TRANSLATION
  tank_platform_mount_turret_desc: "Na podvozek je dodatečně upravena platforma pro montáž polního děla. Střelecká posádka je při střelbě vystavena palbě z malých zbraní. Tank se tak stává téměř bezcenným v tradiční pancéřové roli. Poskytuje však týmu lepší ochranu během pohybu než jiná motorová polní děla. Navíc činí tank levnějším na výrobu díky menší potřebě pancéřování a mírně rychlejšímu výrobnímu procesu. Továrna může také namontovat větší dělo, než by bylo obvyklé na podvozku. Přiznejme si, vypadá to jako kovová plošina s několika kusy dřeva umístěného na přerostlém traktoru." # todo: NEW TRANSLATION
  hull_gun: "Dělo pro blízkou podporu" # todo: NEW TRANSLATION
  hull_gun_desc: "Dělo pro blízkou podporu namontované v sekundární věži nebo uvnitř korby tanku. Umístění děla výrazně omezuje jeho palebný úhel a tím i účinnost, ale umožňuje zasáhnout více cílů. To je zvláště užitečné při útoku." # todo: NEW TRANSLATION
