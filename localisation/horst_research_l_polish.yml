  armor_spearhead_tt: "\nSpolečnosti podpory obrněných jednotek budou vyžadovat o 20 % méně vybavení (o 50 % méně u společností podpory lehkých obrněných jednotek) a o 50 % méně pro signalizační jednotky\n"
  jaegartroops: "Průzkumníci I"
  jaegartroops_desc: "Průzkumníci jsou jednotky specializované na přežití v divočině boreálního lesa. Obvykle jsou tyto jednotky domorodé ve svém teritoriu a jejich výcvik trvá dlouho."
  jaegartroops2_desc: "Průzkumníci jsou jednotky specializované na přežití v divočině boreálního lesa. Obvykle jsou tyto jednotky domorodé ve svém teritoriu a jejich výcvik trvá dlouho."
  jaegartroops3_desc: "Průzkumníci jsou jednotky specializované na přežití v divočině boreálního lesa. Obvykle jsou tyto jednotky domorodé ve svém teritoriu a jejich výcvik trvá dlouho."
