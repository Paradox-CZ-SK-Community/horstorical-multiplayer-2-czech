  GER_light_tank_chassis_4_desc: "VK1602 Leopard byl plánovaný německý průzkumný vůz navržený v roce 1942. Původně se plánovalo vyzbrojit vozidlo 75mm kanónem Kwk 41, což bylo nakonec změněno na menší 50mm dělo. VK1602 měl šikmé čelní pancéřování, ovlivněné středním tankem Panther. Aby se zlepšily terénní schopnosti, byl VK1602 osazen pásy širokými 350 mm." # todo: NEW TRANSLATION
