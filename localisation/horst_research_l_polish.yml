  amtrac_radio: "Radio" # todo: NEW TRANSLATION
  amtrac_radio_desc: "Základní obousměrné rádio umožňuje mechanizované pěchotě koordinovat taktické manévry v malém měřítku." # todo: NEW TRANSLATION
  amtrac_smoke_launchers: "Dýmovnice" # todo: NEW TRANSLATION
  amtrac_smoke_launchers_desc: "Baterie pyrotechnických zařízení, která lze spustit zevnitř tanku k vytvoření hustého mraku dýmu, aby tank skryl svou polohu. Velmi užitečné při obraně nebo po vjetí do léčky." # todo: NEW TRANSLATION
  amtrac_extra_ammo_storage: "Další sklad munice" # todo: NEW TRANSLATION
  amtrac_extra_ammo_storage_desc: "Dodatečné regály s připravenou municí umožňují tanku zůstat v boji mnohem déle bez doplňování. Pokud je však pancíř prorazen, výsledky mohou být katastrofální. Obzvláště problematické při útoku." # todo: NEW TRANSLATION
