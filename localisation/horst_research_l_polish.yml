  infantry_subtitle_camelry: "sss"
  jaeger_desc: "Průzkumníci, také nazývaní Jägaři ('lovci'), jsou jednotky specializované na přežití v divočině boreálního lesa. Obvykle jsou tyto jednotky domorodé ve svém teritoriu a jejich výcvik trvá dlouho."
  shocktroop: "Úderné jednotky"
  shocktroop_desc: "Úderné jednotky mohou prorazit nepřátelské linie a dosáhnout průlomu. To je téměř nezbytné pro jakoukoli formu hluboké bitvy a může to výrazně přispět k vyvedení obránců z rovnováhy."
  armored_car_at_recon: "Průzkumný protitankový obrněný vůz"
  armored_car_at_equipment_1: "Protitankový obrněný vůz"
  armored_car_at_equipment_1_desc: "Naše lehké mechanizované jednotky se dříve či později setkají s nepřátelskými tanky. Vyvinutí speciální protitankové varianty by jim dalo šanci v boji."
  GER_armored_car_at_equipment_1: "Sdkfz 234/4 \"Pakwagen\""
  GER_armored_car_at_equipment_1_short: "Pakwagen"
  ENG_armored_car_at_equipment_1: "AEC 6-pounder"
  ENG_armored_car_at_equipment_1_short: "AEC 6pdr."
  USA_armored_car_at_equipment_1: "M38 90mm Turret"
