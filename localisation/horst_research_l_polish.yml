  amtrac_chassis_1_short: "Vylepšený amtrac" # todo: NEW TRANSLATION
  amtrac_chassis_1_desc: "Tyto amtracy mají několik vylepšení oproti základní verzi, jako je zadní nakládací rampa pro snazší vyložení na pláži." # todo: NEW TRANSLATION
  car_medium_cannon_3: "§2Pokročilý§! Střední kanón" # todo: NEW TRANSLATION
  car_medium_cannon_3_desc: "Univerzální zbraň vhodná pro širokou škálu úkolů. Neexceluje ani v protipěchotním, ani v protivozbrojeném boji, ale dává vozidlu velkou flexibilitu." # todo: NEW TRANSLATION
