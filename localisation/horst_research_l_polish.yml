  mech_chassis: "Mechanizované vybavení" # todo: NEW TRANSLATION
  mech_chassis_desc: "Mechanizovaná pěchota je pěchota vybavená obrněnými transportéry (APC) nebo bojovými vozidly pěchoty (IFV) pro transport a boj. Mechanizovaná pěchota se od motorové pěchoty odlišuje tím, že její vozidla poskytují určitou úroveň ochrany proti nepřátelné palbě, na rozdíl od měkce opláštěných kolových vozidel (nákladní auta nebo džípy) motorové pěchoty." # todo: NEW TRANSLATION
