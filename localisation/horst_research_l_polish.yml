  INFANTRY_TITLE_CAMELRY: "UK/FRA/ITA/NZL\nAST/SAF/EFR\nSPR/IRQ/IEA POUZE"
  INFANTRY_TITLE_JUNGLETROOPS: "USA/FRA/RAJ\nNZL/AST/JAP\nMAN/CAN POUZE"
