  HOL_propaganda_campaings: "Nizozemská válečná propaganda" # todo: NEW TRANSLATION
  HOL_propaganda_campaings_desc: "To nám dává možnost vytvářet válečné propagandistické kampaně. [propaganda_campaings_desc]" # todo: NEW TRANSLATION
  propaganda_campaings_default_desc: "S válkou na obzoru si nemůžeme dovolit, aby byl náš lid ovlivněn nepřátelskými myšlenkami a nakonec se obrátil proti naší vládě. Pouze aktivními propagandistickými kampaněmi můžeme přežít příští desetiletí!" # todo: NEW TRANSLATION
  propaganda_campaings_democratic_desc: "Náš národ je poražen. Němci obsadili naši vlast, náš lid se cítí poražený a sklíčený. Potřebujeme znovu vzkřísit nizozemského bojového ducha, pokud se chceme bránit proti rostoucí hrozbě na východě." # todo: NEW TRANSLATION
