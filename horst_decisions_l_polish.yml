  prca_tokens_tt2: "§YPropagační tokeny§!\nAktuální propagační tokeny: [?ROOT.prca_tokens|Y]\nTýdenní zisk: [?ROOT.prca_tokens_weekly|=+]\n  Národní oddělení: [?ROOT.prca_departments_tokens_weekly|=+]\n Týdenní propagační tokeny: [?ROOT.prca_newspaper_tokens_weekly|=+] [prca_newspaper_modifiers]\n Týdenní propagační tokeny: [?ROOT.prca_movie_tokens_weekly|=+] [prca_movie_modifiers]\n \nAktuální maximum: §Y100§!" # todo: NEW TRANSLATION
  prca_tokens_tt2_desc: "§YPropagační tokeny§! se používají k zahájení propagačních kampaní, které poskytují důležité výhody proti nepříteli. Lze je získat prostřednictvím různých §YPříprav§! nebo vytvořením §YOddělení§!." # todo: NEW TRANSLATION
