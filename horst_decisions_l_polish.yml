  HMP_supply_route_info: "Pokud není kontrolován žádný §LKoridor Lend-Lease§!, budeme zcela neschopni posílat lend-lease Sovětskému svazu. To může být katastrofální.\n\nNemůžeme posílat žádné lend-lease před zimou 1941–1942. §CZásilky§! mohou trvat až celý měsíc, než dorazí." # todo: NEW TRANSLATION
