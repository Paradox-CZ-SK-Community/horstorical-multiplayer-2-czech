  HMP_ll_soviets_send: "Posílat lend-lease Sovětskému svazu" # todo: NEW TRANSLATION
  HMP_ll_soviets_send_desc: "Operace Barbarossa je největší vojenská operace v lidské historii. Osa lze oslabit pouze sovětskou krví a spojeneckým lend-lease.\n\nPošleme §CZásilky§! Sovětskému svazu za každý §GDodací koridor§! nebo §GStrategický cíl§!, který ovládáme během Operace Barbarossa. Přijetí našich lend-lease zásilek závisí na kontrole klíčových §GDodacích koridorů§! do Sovětského svazu. Pokud budou všechny §GDodací koridory§! uzavřeny, naši sovětský spojenci nebudou moci obdržet žádný lend-lease, dokud nebudou koridory znovu zajištěny.\n\nJedna §CZásilka§! má přibližně hodnotu £production_cost §G2000 výroby§! v materiálech.\n\nSovětský svaz může vyměnit §CZásilku§! za přibližně stejné množství následujícího vybavení: §YPěchotní vybavení I§!, §YProtiletadlové vybavení II§!, §YPodpůrné vybavení§!, §YDělostřelecké vybavení II§!, §YRaketové dělostřelectvo I§!, §YMoto-raketové dělostřelectvo§!, §YProtitankové vybavení II§!, §YMotorové vybavení§!, §YMechanizované vybavení I§!, §YAmpibické traktory I§!, §YLehké/Střední/Těžké tanky III§!, §YSupertěžké tanky I§!, a §YDomácí stíhače II§!.\n\n§GDodací koridory§! jsou aktuálně [Root.GetSovSupplyRoute]\n§GArktická trasa§! přes přístav Murmansk je aktuálně kontrolována §O[213.CONTROLLER.GetFlag][213.CONTROLLER.GETNAME]§! [GetSovSupplyRouteMurmansk].\n\n§GPacifická trasa§! přes Honolulu a Vladivostok je aktuálně kontrolována §O[416.CONTROLLER.GetFlag][416.CONTROLLER.GETNAME]§! a §O[408.CONTROLLER.GetFlag][408.CONTROLLER.GETNAME]§!, [GetSovSupplyRouteVladivostok]\n\n§GPerský koridor§! přes Írán a Baku je aktuálně kontrolován §O[412.CONTROLLER.GetFlag][412.CONTROLLER.GETNAME]§! a §O[229.CONTROLLER.GetFlag][229.CONTROLLER.GETNAME]§!, [GetSovSupplyRouteIran]\n\n§GStředozemní trasa§! přes Maltu a Sevastopol je aktuálně kontrolována §O[116.CONTROLLER.GetFlag][116.CONTROLLER.GETNAME]§! a §O[137.CONTROLLER.GetFlag][137.CONTROLLER.GETNAME]§!, [GetSovSupplyRouteMalta]\n\n[GetObjOkinawa]\n\n[GetObjIwoJima]\n\n[GetObjMarcusIsland]\n\n[GetObjPalau]\n\n[GetObjSingapore]\n\n[GetObjHongKong]\n\n[GetObjSaipan]\n\nSovětský svaz má §O[?SOV.SOV_barb_ll_token|+0]§! §CZásilky§! válečného materiálu k dispozici.\n\nSovětský svaz obdržel celkem §O[?SOV.SOV_barb_ll_token2|+0]§! §CZásilek§! válečného materiálu od spojenců během války." # todo: NEW TRANSLATION
