  HOL_request_allied_favors2_tt: "\nOdemkneme rozhodnutí, která umožní Walravenu van Hallovi oklamat Němce a podpořit odboj, čímž získáme §H1 offmap civilní továrnu§!." # todo: NEW TRANSLATION
