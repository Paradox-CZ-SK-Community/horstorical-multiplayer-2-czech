  prca_increase_poster_production2: "Zvýšit produkci plakátů" # todo: NEW TRANSLATION
  prca_increase_poster_production2_desc: "Plakáty jsou nejjednodušší způsob, jak komunikovat naše cíle a ideály masám. Abychom zajistili, že můžeme tento nástroj nadále efektivně používat, musíme zvýšit výrobu nových plakátů." # todo: NEW TRANSLATION
  prca_publish_a_special_issue2: "Vydat speciální vydání" # todo: NEW TRANSLATION
  prca_publish_a_special_issue2_desc: "Poslední zprávy nechaly některé naše lidi nejisté a kritické. I když nemůžeme veřejnosti zcela zatajit aktuální události, můžeme jejich pozornost odklonit prostřednictvím speciálního vydání novin." # todo: NEW TRANSLATION
  prca_run_a_speech_of_leader2: "Rozhlasový projev Oranje od [Root.GetLeader]" # todo: NEW TRANSLATION
  prca_run_a_speech_of_leader2_desc: "[Root.GetLeader] je hlas, který drží náš národ pohromadě i v těžkých časech. Jeho poslední projev již inspiroval mnoho lidí a je velmi důležité, aby ho všichni slyšeli." # todo: NEW TRANSLATION
  prca_produce_a_war_movie2: "Produkce válečného filmu" # todo: NEW TRANSLATION
  prca_produce_a_war_movie2_desc: "Ať už drama, akce nebo animovaný film, hrdinské činy našich vojáků musí být náležitě zobrazeny. Tímto způsobem můžeme nadále inspirovat armádu i domácí frontu pro naši věc." # todo: NEW TRANSLATION
  prca_form_newspaper_department2: "Založit oddělení novin" # todo: NEW TRANSLATION
  prca_form_newspaper_department2_desc: "Noviny, které lze rychle a ve velkém množství vyrábět, nabízejí ideální prostředek k manipulaci veřejného mínění ve prospěch nás. S válkou na obzoru je velmi důležité, abychom měli úplnou kontrolu nad tímto mocným nástrojem." # todo: NEW TRANSLATION
  prca_form_newspaper_department_tt: "Umožňuje §YNovinové oddělení§!, které poskytuje (Týdenní propagační tokeny: §G+1.00§!).\n" # todo: NEW TRANSLATION
  prca_form_radio_department2: "Založit rozhlasové oddělení" # todo: NEW TRANSLATION
  prca_form_radio_department2_desc: "Vynález rozhlasu otevřel nespočet nových možností pro šíření propagandy. Kontrolou vysílaných programů můžeme zajistit, že mocný hlas naší země bude slyšet nejen mezi našimi lidmi, ale i po celém světě." # todo: NEW TRANSLATION
  prca_form_radio_department_tt: "Umožňuje §YRozhlasové oddělení§!, které poskytuje (Týdenní propagační tokeny: §G+2.00§!).\n" # todo: NEW TRANSLATION
  prca_form_movie_department2: "Založit filmové oddělení" # todo: NEW TRANSLATION
  prca_form_movie_department_desc2: "Neexistuje žádné jiné médium jako filmy, které může během minut ovlivnit mínění celých mas. Naši nepřátelé již rychle produkují válečné filmy a je zásadní, abychom i my používali toto zbraň ke kontrole veřejného mínění." # todo: NEW TRANSLATION
  prca_form_movie_department_tt: "Umožňuje §YFilmové oddělení§!, které poskytuje (Týdenní propagační tokeny: §G+3.00§!).\n" # todo: NEW TRANSLATION
