  route_capacity_display_tt: "Odeslali jsme [?ENG.SOV_ll_this_month|+0] £convoy_texticon  z [?ENG.SOV_ll_monthly_cap|+0] £convoy_texticon  §CZásilek§!, které nám může tento měsíc dovolit naše §GKapacita dodací trasy§." # todo: NEW TRANSLATION
  TotalConvoysSent: "Celkem odesláno: [?ENG.SOV_barb_ll_token2|+0] £convoy_texticon" # todo: NEW TRANSLATION
  arctic_corridor_history: "§G+3 Kapacita trasy Lend-Lease§!\n\nArktické konvoje byly trasou lend-lease, která vedla přes Norský a Barentsův průliv do sovětského přístavu Murmansk. Trasa byla plná mlhy, nepříznivého počasí (zejména v zimě), trvalé noci a plovoucího ledu, což z ní činilo jednu z nejnebezpečnějších tras." # todo: NEW TRANSLATION
  med_corridor_history: "§G+5 Kapacita trasy Lend-Lease§!\n\nStředozemní trasa byla trasou lend-lease, která dodávala britské a americké zásoby prostřednictvím Bosporu do sovětských přístavů na Černém moři." # todo: NEW TRANSLATION
  pacific_corridor_history: "§G+5 Kapacita trasy Lend-Lease§!\n\nPacifická trasa vedla podél americko-sovětského pobřeží přes Beringův průliv, po které byly přenášeny americké zásoby lend-lease. Pacifická trasa byla považována za nebezpečnou kvůli hrozbě japonských ponorek, ale málo lodí bylo Japonci potopeno ze strachu z rozhořčení sovětů." # todo: NEW TRANSLATION
  persian_corridor_history: "§G+25 Kapacita trasy Lend-Lease§!\n\nPerský koridor byl trasou lend-lease přes Írán do sovětského Ázerbájdžánu, kterou byly přenášeny britská pomoc a americké zásoby lend-lease do Sovětského svazu. Tento perský koridor se stal jedinou životaschopnou, celoroční trasou vyvinutou k zásobování sovětských potřeb." # todo: NEW TRANSLATION
  HMP_soviet_lend_lease_system_desc: "Můžeme posílat £convoy_texticon §CZásilky§! v hodnotě £production_cost §G2000 výroby§! materiálů Sovětskému svazu za každý §LKoridor Lend-Lease§! nebo §GStrategický cíl§! (viz Balance of Power), který ovládáme během operace Barbarossa. Každý §LKoridor Lend-Lease§! také dává §GKapacitu trasy Lend-Lease§!, která zvyšuje limit £convoy_texticon §CZásilek§! které můžeme připravit v kterémkoli měsíci. Přijetí našich lend-lease zásilek je podmíněno kontrolou alespoň jednoho §LKoridoru Lend-Lease§! do Sovětského svazu. Každé kliknutí níže spotřebuje pět našich £convoy_texticon §CZásilek§! stejně jako pět §HKonvojů§!. Budeme moci posílat §CZásilky§! od listopadu 1941." # todo: NEW TRANSLATION
