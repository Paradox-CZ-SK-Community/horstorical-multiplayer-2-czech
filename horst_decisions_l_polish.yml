  SS_recruitment_pfu: "Naverbovat divize Waffen-SS" # todo: NEW TRANSLATION
  SS_recruitment_pfu_desc: "Himmler žádá, abychom rozšířili naše Waffen-SS na plnohodnotné bojové divize, které by bojovaly po boku Wehrmachtu. To by bylo velkým přínosem pro naše válečné úsilí, umožňovalo by to mnoha možným dobrovolníkům z okupovaných i neutrálních zemí připojit se k našemu boji proti komunismu." # todo: NEW TRANSLATION
  SS_recruitment_leibstandarte: "1. SS pancéřová divize LSSAH" # todo: NEW TRANSLATION
  SS_recruitment_leibstandarte_desc: "1. SS-Leibstandarte Adolf Hitler byla elitní jednotka Waffen-SS, která bojovala na východním i západním frontě během druhé světové války. LSSAH byla považována za jednu z nejefektivnějších a nejlépe vybavených německých jednotek války." # todo: NEW TRANSLATION
  SS_recruitment_dasreich: "2. SS pancéřová divize Das Reich" # todo: NEW TRANSLATION
  SS_recruitment_dasreich_desc: "Divize SS Das Reich byla elitní jednotka Waffen-SS, která bojovala na východním i západním frontě během druhé světové války. Das Reich byla také známá svou statečností v boji, zejména během bitvy u Kurska a později během Ardennské ofenzívy." # todo: NEW TRANSLATION
  SS_recruitment_totenkopf: "3. SS pancéřová divize Totenkopf" # todo: NEW TRANSLATION
  SS_recruitment_totenkopf_desc: "Divize SS Totenkopf byla elitní jednotka Waffen-SS, která bojovala na východním i západním frontě během druhé světové války. Vznikla z vězeňských strážců a vybraných vojáků SS; Totenkopf byla známá jako Divize Smrtihlav pro svůj charakteristický znak lebky a kříž." # todo: NEW TRANSLATION
  SS_recruitment_polizei: "4. SS Panzer-Grenadier-divize Polizei" # todo: NEW TRANSLATION
  SS_recruitment_polizei_desc: "Divize SS Polizei byla původně policejní brigádou v rámci SS, ale později přeskupena na plnohodnotnou panzer-grenadýrskou divizi. Jednotka se podílela na invazi do Francie, Řecka a později do Sovětského svazu." # todo: NEW TRANSLATION
  SS_recruitment_wiking: "5. SS pancéřová divize Wiking" # todo: NEW TRANSLATION
  SS_recruitment_wiking_desc: "Divize SS Wiking byla elitní zahraniční jednotkou Waffen-SS, která bojovala na východním frontě během druhé světové války. Divize byla složena z ideologických dobrovolníků z Dánska, Norska, Švédska, Finska, Estonska, Nizozemska a Belgie pod velením veteránských německých důstojníků." # todo: NEW TRANSLATION
  SS_recruitment_nord: "6. SS Nord Gebirgsjäger-divize" # todo: NEW TRANSLATION
  SS_recruitment_nord_desc: "Divize SS Nord byla elitní horská divize, která bojovala na východním frontě v arktickém kruhu. Teploty v tomto klimatu byly trvale pod bodem mrazu; vojáci byli často zraněni omrzlinami uprostřed bojů." # todo: NEW TRANSLATION
  SS_recruitment_prinz: "7. SS Prinz Eugen Gebirgsjäger-divize" # todo: NEW TRANSLATION
  SS_recruitment_prinz_desc: "SS Prinz Eugen byla Gebirgsjäger-divize složená převážně z etnických Němců z Balkánu a jižní Evropy. Divize bojovala převážně proti komunistickým jugoslávským partyzánům v protipartyzánské roli, ale později ve válce se ocitla v boji proti postupující Rudé armádě." # todo: NEW TRANSLATION
  SS_recruitment_hohenstaufen: "9. SS pancéřová divize Hohenstaufen" # todo: NEW TRANSLATION
  SS_recruitment_hohenstaufen_desc: "SS Hohenstaufen byla pancéřovaná divize Waffen-SS, která bojovala na východních i západních frontách během druhé světové války. Složena z mladých německých branců s ostříleným poddůstojnickým personálem z divize Leibstandarte, byla to velmi schopná jednotka." # todo: NEW TRANSLATION
  SS_recruitment_frundsberg: "10. SS pancéřová divize Frundsberg" # todo: NEW TRANSLATION
  SS_recruitment_frundsberg_desc: "SS Frundsberg byla pancéřovaná divize Waffen-SS, která bojovala na východních i západních frontách během druhé světové války. Složena z mladých německých a maďarských branců s ostříleným poddůstojnickým personálem z divize Leibstandarte, byla to velmi schopná jednotka." # todo: NEW TRANSLATION
  SS_recruitment_nordland: "11. SS Panzer-Grenadier-divize Nordland" # todo: NEW TRANSLATION
  SS_recruitment_nordland_desc: "Divize SS Nordland byla další zcela zahraničně naverbovaná jednotka Waffen-SS, která bojovala na východním frontě během druhé světové války. Složena z dobrovolníků napříč Skandinávií, statečně bojovala v obléhání Leningradu a později v bitvě na linii Tannenberg." # todo: NEW TRANSLATION
  SS_recruitment_hitlerjugend: "12. SS pancéřová divize Hitlerjugend" # todo: NEW TRANSLATION
  SS_recruitment_hitlerjugend_desc: "SS Hitlerjugend byla pancéřovaná divize Waffen-SS, která bojovala na západním frontě během druhé světové války. Složena zcela z Hitlerjugend a elitního poddůstojnického sboru z jiných divizí Waffen-SS, byla to velmi schopná jednotka, která bojovala v zadních osahách v Normandii, ale nejvíce se proslavila v Ardennské ofenzívě." # todo: NEW TRANSLATION
  SS_recruitment_latvian_ss: "15., 19., 20. pobaltské SS panzer-grenadýrské divize" # todo: NEW TRANSLATION
  SS_recruitment_latvian_ss_desc: "Složeny z lotyšských a estonských dobrovolníků, tyto divize vytvořily velké panzer-grenadýrské divize, které bojovaly proti Sovětskému svazu v letech 1943–1945. Nejvíce proslulé svou bojovou efektivitou v bitvě na linii Tannenberg, jednotky těchto divizí odrazily sovětskou armádu osmkrát větší, způsobily jí poměr obětí přes 10:1 s malou nebo žádnou podpůrnou pancéřovou silou." # todo: NEW TRANSLATION
  SS_recruitment_reichsfuhrer_ss: "16., 17., 18. německé SS panzer-grenadýrské divize" # todo: NEW TRANSLATION
  SS_recruitment_reichsfuhrer_ss_desc: "Složeny převážně z etnicky německých dobrovolníků z Maďarska a dalších okupovaných území, tyto divize vytvořily panzer-grenadýrské divize, které bojovaly proti Sovětskému svazu na Ukrajině a ve střední Evropě, a také ve Francii proti spojeneckým invazím." # todo: NEW TRANSLATION
  SS_recruitment_handschar: "13., 21., 23. balkánské Gebirgsjäger-divize" # todo: NEW TRANSLATION
  SS_recruitment_handschar_desc: "Složeny z Albánců, Bosňáků a Chorvatů, tyto divize byly převážně protipartyzánské divize SS Gebirgsjäger, které bojovaly na Balkáně proti partyzánům a později proti postupující sovětské armádě." # todo: NEW TRANSLATION
  SS_recruitment_charlemagne: "33. SS panzer-grenadýrská divize Charlemagne" # todo: NEW TRANSLATION
  SS_recruitment_charlemagne_desc: "Divize Charlemagne byla vytvořena z pozůstalých francouzských dobrovolníků ve Wehrmachtu a bojovala proti sovětským silám postupujícím do Německa. Proslavila se jako jedna z posledních divizí v Berlíně; kladla zuřivý odpor v Říšském sněmu a mnozí odmítli kapitulovat ze strachu z odvetných kroků svých vlád." # todo: NEW TRANSLATION
  ger_wehrmacht_pfu: "Heer" # todo: NEW TRANSLATION
  ger_wehrmacht_pfu_desc: "Hřbet německých ozbrojených sil. Pokud má Vaterland přežít nadcházející bouři, OKH musí být připraven následovat vůdcovy příkazy bez ohledu na jejich drastickou povahu, abychom nezapomněli na naši přísahu." # todo: NEW TRANSLATION
  ger_luftwaffe_pfu: "Luftwaffe" # todo: NEW TRANSLATION
  ger_luftwaffe_pfu_desc: "Göring pověřil Luftwaffe, aby uštědřila Británii rozhodující úder rozsáhlou bombardovací kampaní, která by měla přesvědčit Brity k uvažování o míru, ale pokud toho rychle nedosáhneme, OKW může zvážit přesměrování našich zdrojů jinam." # todo: NEW TRANSLATION
  ger_kriegsmarine_pfu: "Kriegsmarine" # todo: NEW TRANSLATION
  ger_kriegsmarine_pfu_desc: "Vzhledem ke stavu Kriegsmarine Oberkommando der Marine nařídilo, abychom uplatnili doktrínu obchodního nájezdování v pokusu ochudit spojence o životně důležité zdroje ze zahraničí a zásobovat frontu." # todo: NEW TRANSLATION
  ger_wehrmacht_grossdeutschland: "Panzer-Division Großdeutschland" # todo: NEW TRANSLATION
  ger_wehrmacht_grossdeutschland_desc: "Divize Großdeutschland byla elitní bojovou jednotkou německé armády, která bojovala na východním frontě během druhé světové války. Původně vznikla z ceremoniální gardové jednotky v 30. letech; její činy na východním frontě v bitvách u Moskvy, Rževu a později u Kurska jí získaly reputaci." # todo: NEW TRANSLATION
  ger_schwere_panzer: "Schwere Panzer-Division 502" # todo: NEW TRANSLATION
  ger_schwere_panzer_desc: "Schwere Panzer-Division 502 byla formací těžkých tanků po zahájení operace Barbarossa a zavedení výkonných sovětských tanků T-34 a KV-1. Bojující na východním frontě byla jednou z nejúspěšnějších německých těžkých tankových divizí; hlásila zničení 1 400 tanků a 2 000 samohybných děl." # todo: NEW TRANSLATION
  ger_volksturm: "Zformovat Volkssturm" # todo: NEW TRANSLATION
  ger_volksturm_desc: "Volkssturm byla národní milice zřízená nacistickou stranou v posledních měsících druhé světové války. Byla tvořena muži a dětmi považovanými za neschopné služby nebo jinak nesloužícími v pravidelných ozbrojených silách." # todo: NEW TRANSLATION
  ger_battle_of_britain: "Bitva o Británii" # todo: NEW TRANSLATION
  ger_battle_of_britain_desc: " " # todo: NEW TRANSLATION
  ger_luftwaffe_goring_division: "Panzer Division Hermann Göring" # todo: NEW TRANSLATION
  ger_luftwaffe_goring_division_desc: "Hermann Göring byla elitní německá pancéřovaná divize Luftwaffe. HG zasáhla v bojích v severní Africe, na Sicílii, v Itálii a později na východním frontě." # todo: NEW TRANSLATION
  ger_luftwaffe_infantry: "Luftwaffen Feld-Divisionen" # todo: NEW TRANSLATION
  ger_luftwaffe_infantry_desc: "Luftwaffen polní divize byly vytvořeny z 200 000–250 000 pozemního, podpůrného a jiného přebytečného personálu Luftwaffe. Toto rozhodnutí bylo původně autorizováno v říjnu 1942 na základě návrhů, že německou armádu lze posílit převedením personálu z jiných služeb." # todo: NEW TRANSLATION
  ger_battle_of_atlantic: "Bitva o Atlantik" # todo: NEW TRANSLATION
  ger_battle_of_atlantic_desc: " " # todo: NEW TRANSLATION
  ger_submarine_bases: "Vybudovat kryty pro ponorky" # todo: NEW TRANSLATION
  ger_submarine_bases_desc: "Vybudování základen pro ponorky a ochranných krytů ve Francii by nám pomohlo provozovat naše ponorkové síly v Atlantiku, aniž bychom museli překračovat nebezpečný Lamanš pro opravy a servis v Německu." # todo: NEW TRANSLATION
  ger_kriegsmarine_infantry: "Marine Infanterie-Divisionen" # todo: NEW TRANSLATION
  ger_kriegsmarine_infantry_desc: "Marine Infanterie-divize byly aktivovány z personálu Kriegsmarine, který již nebyl potřebný k obsluze lodí nebo pro pobřežní zařízení. Po sovětských a spojeneckých invazích do Německa byly divize nasazeny do obranných operací v severozápadním Německu." # todo: NEW TRANSLATION
  USA_pay_farm_subsidiesx: "Vyplatit zemědělské dotace" # todo: NEW TRANSLATION
  USA_prepare_people_for_war: "Připravit lidi na válku" # todo: NEW TRANSLATION
  scw_ticker: "Španělská občanská válka" # todo: NEW TRANSLATION
  anti_neutrality_raids: "Protimonarchistické razie" # todo: NEW TRANSLATION
  anti_neutrality_raids_desc: "Musíme tvrdě zakročit proti monarchistickým a autoritářským elementům v naší zemi kvůli dlouhodobé stabilitě. Jejich vliv je příliš velký a může se stát problémem pro stát." # todo: NEW TRANSLATION
